body:
  text: 南史卷六十八列傳第五十八趙知禮蔡景歷子徵宗元饒韓子高華皎劉師知謝岐毛喜沈君理陸山才趙知禮字齊旦天水隴西人也父孝穆梁候官令知禮涉獵文史善書翰陳武帝之討元景仲也或薦之引為書記知禮為文贍速每占授軍書下筆便就率皆稱旨由是侍左右深被委任當時計畫莫不預焉武帝征侯景至白茅灣上表於梁元帝及與王僧辨論軍事其文並知禮所製及景平授中書侍郎封始平縣子陳受命位散騎常侍太府卿權知領軍事天嘉元年進爵為伯王琳平授吳州刺史知禮沈靜有謀謨每軍國大事文帝輒令璽書問之再遷右將軍領前軍將軍卒贈侍中諡曰忠子元恭嗣蔡景歷字茂世濟陽考城人也祖點梁尚書左戶侍郎父大同輕車嶽陽王記室參軍景歷少俊爽有孝行家貧好學善尺牘工草隸為海陽令政有能名在侯景中與南康嗣王會理通謀匡復事泄被執賊黨王偉保護之獲免因客游京口侯景平陳武帝鎮朱方素聞其名以書要之景歷對使人答書筆不停綴文無所改帝得書甚加欽賞即日授征北府中記室參軍仍領記室衡陽獻王昌為吳興太守帝以鄉里父老尊卑有數恐昌年少接對乖禮乃遣景歷輔之承聖中還掌記室武帝將討王僧辨獨與侯安都等數人謀之景歷弗之知部分既畢召令草檄景歷援筆立成辭義感激事皆稱旨及受禪遷祕書監中書通事舍人掌詔誥永定二年坐妻弟受周寶安餉馬為御史中丞沈炯所劾降為中書侍郎舍人如故三年武帝崩時外有強寇文帝鎮南皖朝無重臣宣后呼景歷及江大權杜稜定議祕不發喪疾召文帝景歷躬共宦者及內人密營斂服時既暑熱須營梓宮恐斤斧之聲聞外乃以蠟為祕器文詔依舊宣行文帝即位復為祕書監舍人如故以定策功封新豐縣子纍遷散騎常侍文帝誅侯安都景歷勸成其事以功遷太子左衛率進爵為侯常侍舍人如故坐妻兄劉洽依倚景歷權勢前後姦詭並受歐陽威餉絹百匹免官華皎反以景歷為武勝將軍吳明徹軍司皎平明徹於軍中輒戮安成內史楊文通又受降人馬仗有不分明景歷又坐不能匡正被收久之獲宥宣帝即位纍遷通直散騎常侍中書通事舍人掌詔誥仍復封邑太建五年都督吳明徹北侵所向剋捷大破周梁士彥於呂梁方進圍彭城時宣帝鋭意河南以為指麾可定景歷稱師老將驕不宜過窮遠略帝惡其沮衆大怒猶以朝廷舊臣不加深罪出為豫章內史未行為飛章所劾以在省之日贓樜狼籍帝令有司案問景歷但承其半於是御史中丞宗元饒奏免景歷所官徙居會稽及吳明徹敗帝追憶景歷前言即日追還以為征南鄱陽王咨議數日遷員外散騎常侍兼御史中丞復本爵封入守度支尚書舊式拜官在午後景歷拜日適逢輿駕幸玄武觀在位皆侍宴帝恐景歷不預特令早拜其見重如此卒官贈太常卿諡曰敬十三年改葬重贈中領軍禎明元年配享武帝廟庭二年車駕親幸其宅重贈景歷侍中中撫將軍諡曰忠敬給鼓吹一部於墓所立碑景歷屬文不尚雕靡而長於事應機敏速為當時所稱有文集三十卷子徵嗣江大權字伯謀濟陽考城人位少府封四會縣伯太建二年卒於通直散騎常侍徵字希祥幼聰敏精識強記年六歲詣梁吏部尚書河南褚翔嗟其穎悟七歲丁母憂居喪如成人禮繼母劉氏性悍忌視之不以道徵供侍益謹初無怨色徵本名覽景歷以其有王祥之性更名字焉陳武帝為南徐州召補迎主簿尋授太學博士太建中纍遷太子中舍人兼東宮領直襲封新豐侯至德中位太子中庶子中書舍人掌詔誥尋授左戶尚書與僕射江總知撰五禮事後主器其才幹任寄日重遷吏部尚書每十日一往東宮於皇太子前論述古今得喪及當時政務又敕以廷尉寺獄事無大小取徵議決俄敕遣徵收募兵士自為部曲徵善撫恤得物情旬月之間衆近一萬位望既重兼聲位熏灼物議咸忌憚之尋徙中書令中書清簡無事或云徵有怨言後主聞之大怒收奪人馬將誅之左右致諫獲免禎明三年隋軍濟江後主以徵有幹用令權知中領軍事徵日夜勤苦備盡心力後主嘉焉謂曰事寧有以相報及決戰於鍾山南岡敕徵守宮城西北大營尋令督衆軍戰事陳亡隨例入長安徵美容儀有口辨多所詳究至於士流官宦陳宗戚屬及當朝制度憲章儀軌戶口風俗山川土地問無不對然性頗便佞進取不能以退素自業初拜吏部尚書啓後主借鼓吹後主謂所司曰鼓吹軍樂有功乃授蔡徵不自量揆紊我朝章然其父景歷既有締構之功宜且如啓拜訖即追還徵不修廉隅皆此類也隋文帝聞其敏贍召見顧問言輒會旨然纍年不調久之除太常丞歷尚書戶部儀曹郎轉給事郎卒子翼位司徒屬入隋為東宮學士宗元饒南郡江陵人也少好學以孝聞仕梁為征南府外兵參軍及司徒王僧辨幕府初建元饒與沛國劉師知同為主簿陳武帝受禪稍遷廷尉卿尚書左丞宣帝初軍國務廣事無巨細一以咨之臺省號為稱職遷御史中丞知五禮事時合州刺史陳褒贓樜狼籍遣使就渚斂魚又令人於六郡乞米百姓甚苦之元饒劾奏免之吳興太守武陵王伯禮豫章內史南康嗣王方泰等驕蹇放橫元饒案奏皆見削黜元饒性公平善持法諳曉故事明練政體吏有犯法政不便時及於名教不足者隨事糾正多所裨益遷南康內史以秩米三千餘斛助人租課存問高年拯救乏絶百姓甚賴焉以課最入朝詔加散騎常侍後為吏部尚書卒韓子高會稽山陰人也家本微賤侯景之亂寓都下景平陳文帝出守吳興子高年十六為總角容貌美麗狀似婦人於淮渚附部伍寄載欲還鄉里文帝見而問曰能事我乎子高許諾子高本名蠻子帝改名之性恭謹執備身刀及傳酒炙帝性急子高會意旨稍長習騎射頗有膽決願為將帥及平杜龕配以士卒文帝甚愛之未嘗離左右帝嘗夢騎馬登山路危欲墮子高推捧而升文帝之討張彪也沈泰等先降帝據有州城周文育鎮北郭香巖寺張彪自剡縣夜還襲城文帝自北門出倉卒暗夕軍人擾亂唯子高在側文帝乃遣子高自亂兵中往見文育反命酬答於暗中又往慰勞衆軍文帝散兵稍集子高引入文育營因共立柵明日敗彪彪奔松山浙東平文帝乃分麾下多配子高子高亦輕財禮士歸之者甚衆文帝嗣位除右軍將軍封文招縣子及王琳平子高所統益多將士依附之其有所論進帝皆任使焉天嘉六年為右衛將軍文帝不豫入侍醫藥廢帝即位加散騎常侍宣帝入輔子高兵權過重深不自安好參訪臺閣又求出為衡廣諸鎮光大元年八月前上虞縣令陸昉及子高軍主告其謀反宣帝在尚書省因召文武在位議立皇太子子高預焉執送廷尉其夕與到仲舉同賜死父延慶及子弟並原宥華皎晉陵暨陽人也世為小吏皎梁代為尚書比部令史侯景之亂事景之黨王偉陳武帝南下文帝為景所囚皎遇文帝甚厚及景平文帝為吳興太守以皎為都録事深見委任及文帝平杜龕仍配以甲兵御下分明善於撫接解衣推食多少必均天嘉元年封懷仁縣伯王琳東下皎隨侯瑱拒之琳平知江州事後隨都督吳明徹征周迪迪平以功進爵為侯仍授都督湘州刺史皎起自下吏善營産業又征川洞多致銅鼓及生口並送都下廢帝即位改封重安縣公韓子高誅後皎內不自安光大元年密啓求廣州以觀時主意宣帝僞許之而詔書未出皎亦遣使引周兵又崇奉梁明帝士馬甚盛詔乃以吳明徹為湘州刺史實欲以輕兵襲之慮皎先發乃前遣明徹率衆三萬乘金翅直趣郢州又遣撫軍大將軍淳于量率衆五萬乘大艦繼之時梁明帝遣水軍為皎聲援周武帝遣衛公宇文直頓魯山又遣柱國長湖公元定攻圍郢州梁明帝授皎司空巴州刺史戴僧朔衡陽內史任蠻奴巴陵內史潘智虔嶽陽太守章昭裕桂陽太守曹宣湘東太守錢明並隸於皎又長沙太守曹慶等本隸皎下因為之用帝恐上流宰守並為皎扇惑乃下詔曲赦湘巴二州其賊主帥節將並許開恩出首皎以大艦載薪因風放火俄而風轉自焚皎大敗乃與戴僧朔奔江陵元定等無復船渡步趣巴陵巴陵城已為陳軍所據乃降送于建鄴皎遂終於江陵其黨並誅唯任蠻奴章昭裕曹宣劉廣業獲免劉師知沛國相人也家本素族祖奚之齊淮南太守以善政聞父景彥梁司農卿師知本名師智以與敬帝諱同改焉好學有當務才博涉書傳工文筆善儀體臺閣故事多所詳悉紹泰初陳武帝入輔以師知為中書舍人掌詔誥時兵亂後朝儀多闕武帝為丞相及加九錫並受禪其儀注多師知所定梁敬帝在內殿師知常侍左右及將加害師知詐帝令出帝覺繞牀走曰師知賣我陳霸先反我本不須作天子何意見殺師知執帝衣行事者加刃焉既而報陳武帝曰事已了武帝曰卿乃忠於我後莫復爾師知不對武帝受命仍兼舍人性疏簡與物多忤雖位宦不遷而任遇甚重其所獻替皆有弘益及武帝崩六日成服時朝臣共議大行皇帝靈座俠御人衣服吉凶之制博士沈文阿議宜服吉師知議云既稱成服本備喪禮案梁昭明太子薨成服俠侍之官悉著衰斬唯著鎧不異此即可擬愚謂六日成服俠靈座須服衰絰中書舍人蔡景歷江德藻謝岐等同師知議時以二議不同乃啓取左丞徐陵決斷陵云案山陵鹵簿吉部伍中公卿以下導引者爰及武賁鼓吹執蓋奉車並是吉服豈容俠御獨為衰絰若言公卿胥吏並服衰絰此與梓宮部伍有何差別若言文物並吉司事者凶豈容袵絰而奉華蓋衰衣而升玉路邪同博士議謝岐議曰靈筵祔宗廟梓宮祔山陵實如左丞議但山陵鹵簿備有吉凶從靈輿者儀服無變從梓宮者皆服苴衰爰至士禮悉同此制此自是山陵之儀非關成服今謂梓宮靈扆共在西階稱為成服亦無鹵簿直是爰自胥吏上至王公四海之內必備衰絰案梁昭明太子薨略是成例豈容凡百士庶悉皆服重而侍中至於武衛最是近官反鳴玉紆青與平吉不異左丞既推以山陵事愚意或謂與成服有殊陵重答云老病屬纊不能多說古人爭議多成怨府傅玄見尤於晉代王商取陷於漢朝謹自三緘敬同高命若萬一不死猶得展言庶與羣賢更申揚榷文阿猶執所見衆議不能決乃具録二議奏聞上從師知議遷鴻臚卿舍人如故天嘉元年坐事免尋起為中書舍人復掌詔誥天康元年文帝不豫師知與尚書僕射到仲舉等入侍醫藥帝崩豫顧命宣帝入輔師知與仲舉等遣舍人殷不佞矯詔令宣帝還東府事覺於北獄賜死初文帝敕師知撰起居注自永定二年秋至天嘉元年為十卷謝岐會稽山陰人也父達梁太學博士岐少機警好學仕梁為山陰令侯景亂流寓東陽景平依于張彪彪在吳郡及會稽庶事委之彪每征討留岐監郡知後事彪敗陳武帝引參機密為兼尚書右丞時軍旅屢興糧儲多闕岐所在幹理深被知遇永定元年為給事黃門侍郎中書舍人兼右丞如故天嘉二年卒贈通直散騎常侍弟嶠篤學為通儒毛喜字伯武滎陽陽武人也祖稱梁散騎侍郎父栖忠中權司馬喜少好學善草隸陳武帝素知之及鎮京口命喜與宣帝往江陵仍敕宣帝咨禀之及梁元帝即位以宣帝為領直喜為尚書功論侍郎及魏平江陵喜與宣帝俱遷長安文帝即位喜自周還進和好之策陳朝乃遣周弘正等通聘及宣帝反國又遣喜入周以家屬為請周冢宰宇文護執喜手曰能結二國之好者卿也仍迎柳皇后及後主還天嘉三年至都宣帝時為驃騎將軍仍以喜為府咨議參軍領中記室府朝文翰皆喜詞也文帝嘗謂宣帝曰我諸子皆以伯為名汝諸子宜用叔為稱宣帝以訪喜喜即條自古名賢杜叔英虞叔卿等二十餘人以啓之文帝稱善文帝崩廢帝沖昧宣帝録尚書輔政僕射到仲舉等矯太后令遣宣帝還東府當時疑懼無敢厝言喜即馳入謂宣帝曰今日之言必非太后之意宗社至重願加三思竟如其策右衛將軍韓子高始與仲舉通謀其事未發喜謂宣帝曰宜簡人馬配與子高並賜鐵炭使修器甲宣帝曰子高即欲收執何更如是喜曰山陵始畢邊寇多而子高受委前朝名為杖順宜推心安誘使不自疑圖之一壯士之力耳宣帝卒行其計及帝即位除給事黃門侍郎兼中書舍人典軍國機密宣帝議北侵敕喜撰軍制十三條詔頒天下文多不載論定策功封東昌縣侯以太子右衛率右將軍行江夏武陵桂陽三王府國事母憂去職詔封喜母庾氏東昌國太夫人遣員外散騎常侍杜緬圖其墓田上親與緬案圖指畫其見重如此歷位御史中丞五兵尚書參掌選事及得淮南之地喜陳安邊之術宣帝納之即日施行帝又欲進兵彭汴以問喜喜以為淮左新平邊人未輯周氏始吞齊國難與爭鋒未若安人保境斯久長之術也上不從吳明徹卒俘于周喜後歷丹陽尹吏部尚書及宣帝崩叔陵構逆敕中庶子陸瓊宣旨令南北諸軍皆取喜處分賊平加侍中初宣帝委政於喜喜數有諫爭事並見從自明徹敗後帝深悔不用其言謂袁憲曰一不用喜計遂令至此由是益見親重喜乃言無回避時皇太子好酒德每共親幸人為長夜之宴喜嘗言之宣帝太子遂銜之即位後稍見疏遠及被始興王傷創愈置酒引江總以下展樂賦詩醉酣而命喜于時山陵初畢未及踰年喜見之不懌欲諫而後主已醉喜言心疾仆于階下移出省中後主醒乃謂江總曰我悔召毛喜知其無病但欲阻我歡宴非我所為耳乃與司馬申謀曰此人負氣吾欲將乞鄱陽兄弟聽其報讎可乎對曰終不為官用願如聖旨傅縡爭之曰若許報讎欲置先皇何地後主曰當與一小郡勿令見人事耳至德元年授永嘉內史喜至郡不受奉秩政弘清靜人吏安之遇豐州刺史章大寶舉兵反郡與豐州接而素無備喜乃修城隍器械又遣兵援建安賊平授南安內史禎明元年徵為光祿大夫領左驍騎將軍道卒有集十卷子處沖嗣沈君理字仲倫吳興人也祖僧畟梁左戶尚書父巡元帝時位少府卿魏平荊州梁宣帝署金紫光祿大夫君理美風儀博涉有識鑒陳武帝鎮南徐州巡遣君理致謁深見器重命尚會稽長公主及帝受禪拜駙馬都尉封永安亭侯為吳郡太守時兵革未寧百姓荒弊君理總集士卒修飾器械深以幹理見稱文帝嗣位纍遷左戶尚書天嘉六年為東陽太守天康元年以父憂去職自請往荊州迎柩朝議以在位重臣難令出境乃遣長兄君嚴往焉及還將葬詔贈巡侍中領軍將軍諡曰敬子太建中歷位太子詹事吏部尚書宣帝以君理女為皇太子妃賜爵望蔡縣侯位侍中尚書右僕射卒贈翊左將軍開府儀同三司諡曰貞憲君理弟君高君公君高字季高少知名性剛直有吏能位衛尉卿平越中郎將都督廣州刺史甚得人和卒諡祁子君公自梁元帝敗後常在江陵禎明中與蕭瓛蕭巖叛隋歸陳後主擢為太子詹事君公博學有才辨善談論後主深器之陳亡入隋文帝以其叛亡命斬于建康君理第五叔邁亦方正有幹局位通直散騎常侍侍東宮陸山才字孔章吳郡吳人也祖翁寶梁尚書水部郎父泛中散大夫山才倜儻好尚文史范陽張纘纘弟綰並欽重之紹泰中都督周文育出鎮南豫州不知書疏以山才為長史政事悉以委之文育南討剋蕭勃禽歐陽頠計畫多出山才後文育重鎮豫章金口山才復為鎮南長史豫章太守文育為熊曇朗所害曇朗囚山才等送于王琳未至而侯安都敗琳將常衆愛由是山才獲反纍遷度支尚書坐侍宴與蔡景歷言語過差為有司所奏免官尋授散騎常侍遷西陽武昌二郡太守卒諡曰簡子論曰趙知禮蔡景歷屬陳武經綸之日居文房書記之任此乃宋齊之初傅亮王儉之職若乃校其才用理不同年而卒能膺務濟時蓋其遇也希祥勞臣之子才名自致迹涉便佞貞介所羞元饒始終任遇無虧公道名位自卒其殆優乎子高權重為戮亦其宜也華皎經綸云始既蹈元功殷憂之辰自同徑草雖致奔敗未足為非師知送往多闕見忌新主謀人之義可無慎哉然晚遇誅夷非其過也毛喜逢時遇主好謀而成見廢昏朝不致公輔惜矣沈陸所以見重固亦雅望之所致焉
