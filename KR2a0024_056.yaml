body:
  text: 南史卷五十六列傳第四十六張弘策子緬纘綰庾域子子輿鄭紹叔呂僧珍樂藹子法才張弘策字真簡范陽方城人梁文獻皇后之從父弟也父安之青州主簿南蠻行參軍弘策幼以孝聞母嘗有疾五日不食弘策亦不食母強為進粥弘策乃食母所餘遭母憂三年不食鹽菜幾至滅性兄弟友愛不忍暫離雖各有室常同臥起世比之姜肱兄弟弘策與梁武帝年相輩幼見親狎隨帝游處每入室常覺有雲氣體輒肅然弘策由此特加敬異建武末與兄弘胄從武帝宿酒酣移席星下語及時事帝曰天下方亂舅知之乎冬下魏軍方動則亡漢北王敬則猜嫌已久當乘間而作弘策曰敬則張兩赤眼容能立事帝曰敬則庸才為天下唱先爾主上運祚盡於來年國權當歸江劉而江甚隘劉又暗弱都下當大亂死人如亂麻齊之歷數自茲亡矣梁楚漢當有英雄興弘策曰瞻烏爰止于誰之屋帝笑曰光武所云安知非僕弘策起曰今夜之言是天意也請定君臣之分帝曰舅欲斆鄧晨乎是冬魏軍攻新野齊明帝密詔武帝代曹武監雍州事弘策聞之心喜謂帝曰夜中言當驗帝笑曰且勿多言弘策從帝西行仍參帷幄身親勞役不憚辛苦齊明帝崩遺詔以帝為雍州刺史乃表弘策為録事參軍帶襄陽令帝觀海內方亂有匡濟之心密為儲備謀猷所及唯弘策而已時帝長兄懿罷益州還為西中郎長史行郢州事帝使弘策到郢陳計於懿曰昔晉惠庸主諸王爭權遂內難九興外寇三作方今喪亂有甚於此六貴爭權人握王憲制主畫敕各欲專成且嗣主在宮本無令譽媟近左右蜂目忍人一居萬機恣其所欲豈肯虛坐主諾委政朝臣積相嫌二必大誅戮始安欲為趙倫形迹已露蹇人上天信無此理且性甚猜狹徒取禍機所可當軸江劉而已祏怯而無斷暄弱而不才折鼎覆餗跂踵可待蕭坦胸懷猜忌動言相傷徐孝嗣才非柱石聽人穿鼻若隙開釁起必中外土崩今得外藩幸圖身計及今猜防未生宜召諸弟以時聚集郢州控帶荊湘西注漢沔雍州士馬呼吸數萬時安則竭誠本朝時亂則為國翦暴如不早圖悔無及也懿聞之變色心未之許及懿遇禍帝將起兵夜召弘策呂僧珍入定議旦乃發兵以弘策為輔國將軍軍主領萬人督後部事及郢城平蕭穎達楊公則諸將皆欲頓軍夏口帝以為宜乘勝長驅直指建鄴弘策與帝意合又訪寧朔將軍庾域域又同即日上道凡磯浦村落軍行宿次立頓處所弘策預為圖皆在目中城平帝遣弘策與呂僧珍先往清宮封檢府庫于時城內珍寶委積弘策申勒部曲秋毫無犯遷衛尉卿加給事中天監初加散騎常侍封洮陽縣侯弘策盡忠奉上知無不為交友故舊隨才薦拔縉紳皆趨焉時東昏餘黨孫文明等初逢赦令多未自安文明又嘗夢乘馬至雲龍門心惑其夢遂作亂帥數百人因運荻炬束仗得入南北掖門至夜燒神獸門總章觀入衛尉府弘策踰垣匿于龍廄遇賊見害賊又進燒尚書省及閣道雲龍門前軍司馬呂僧珍直殿省帥羽林兵邀擊不能却上戎服御前殿謂僧珍曰賊夜來是衆少曉則走矣命打五鼓賊謂已曉乃散官軍捕文明斬于東市張氏親屬臠食之帝哭之慟曰痛哉衛尉天下事當復與誰論詔贈車騎將軍諡曰閔侯弘策為人寬厚通率篤舊故及居隆重不以貴地自高故人賓客接之如布衣祿賜皆散之親友及遇害莫不痛惜焉子緬嗣緬字元長年數歲外祖中山劉仲德異之曰此兒非常器非止為張氏寶方為海內令名也齊永元末兵起弘策從武帝向都留緬襄陽年始十歲每聞軍有勝負憂喜形於顏色及弘策遇害緬喪過于禮武帝每遣喻之服闋襲封洮陽縣侯起家祕書郎出為淮南太守時年十八武帝疑其年少未間吏事遣主書封取郡曹文案見其斷決允愜甚稱賞之再遷雲麾外兵參軍緬少勤學自課讀書手不輟卷有質疑者隨問便對略無遺失殿中郎缺帝謂徐勉曰此曹舊用文學且雁行之首宜詳擇其人勉舉緬充選頃之為武陵太守還拜太子洗馬中舍人緬母劉氏以父沒家貧葬禮有闕遂終身不居正室不隨子入官府緬在郡所得俸祿不敢用至乃妻子不易衣裳及還都並供之母振遺親屬雖纍載所蓄一朝隨盡緬私室常然如貧素者纍遷豫章內史緬為政任恩惠不設鉤距吏人化其德亦不敢欺故老咸云數十年未有也後為御史中丞坐收捕人與外國使鬬左降黃門兼領先職俄復舊任緬居憲司推繩無所顧望號為徑直武帝乃遣圖其形於臺省以勵當官遷侍中未拜卒詔便舉哀昭明太子亦往臨哭緬抄後漢晉書衆家異同為後漢紀四十卷晉抄三十卷又抄江左集未及成文集五卷緬弟纘纘字伯緒出繼從伯弘籍武帝舅也梁初贈廷尉卿纘年十一尚武帝第四女富陽公主拜駙馬都尉封利亭侯召補國子生起家祕書郎時年十七身長七尺四寸眉目疏朗神采爽發武帝異之嘗曰張壯武云後八世有逮吾者其此子乎纘好學兄緬有書萬餘卷晝夜披讀殆不輟手祕書郎四員宋齊以來為甲族起家之選待次入補其居職例不數十日便遷任纘固求不徙欲遍觀閣內書籍嘗執四部書目曰若讀此畢可言優仕矣如此三載方遷太子舍人轉洗馬中舍人並掌管記纘與琅邪王錫齊名普通初魏使彭城人劉善明通和求識纘與錫纘時年二十三善明見而嗟服纍遷尚書吏部郎俄而長兼侍中時人以為早達河東裴子野曰張吏部有喉脣之任已恨其晚矣子野性曠達自云年出三十不復詣人初未與纘遇便虛相推重因為忘年之交大通中為吳興太守居郡省煩苛務清靜人吏便之大同二年徵為吏部尚書後門寒素一介者皆見引拔不為貴門屈意人士翕然稱之負其才氣無所與讓定襄侯祗無學術頗有文性與兄衡山侯恭俱為皇太子愛賞時纘從兄謐聿並不學問性又凡愚恭祗嘗預東宮盛集太子戲纘曰丈人謐聿皆何在纘從容曰纘有謐聿亦殿下之衡定太子色慚或云纘從兄聿及弼愚短湘東王在坐問纘曰丈人二從聿弼藝業何如纘曰下官從弟雖並無多猶賢殿下之有衡定舉坐愕然其忤物如此五年武帝詔曰纘外氏英華朝中領袖司空已後名冠范陽可尚書僕射纘本寒門以外戚顯重高自擬倫而詔有司空范陽之言深用為狹以朱䌇草詔與䌇不平初纘與參掌何敬容意趣不協敬容居權軸賓客輻湊有過詣纘纘輒距不前曰吾不能對何敬容殘客及是遷為讓表曰自出守股肱入居衡尺可以仰首伸眉論列是非者矣而寸襟所滯近蔽耳目深淺清濁豈有能預加以矯心飾貌酷非所間不喜俗人與之共事此言以指敬容也在職議南郊御乘素輦適古今之衷又議印綬官若備朝服宜並著綬時並施行改為湘州刺史述職經塗作南征賦初吳興吳規頗有才學邵陵王綸引為賓客深相禮遇及綸作牧郢蕃規隨從江夏遇纘出之湘鎮路經郢服綸餞之南浦纘見規在坐意不能平忽舉杯曰吳規此酒慶汝得陪今宴規尋起還其子翁孺見父不悅問而知之翁孺因氣結爾夜便卒規恨纘慟兒憤哭兼至信次之間又致殞規妻深痛夫子翌日又亡時人謂張纘一杯酒殺吳氏三人其輕傲皆此類也至州務公平遣十郡慰勞解放老疾吏役及關市戍邏先所防人一皆省並州界零陵衡陽等郡有莫徭蠻者依山險為居歷政不賓服因此向化益陽縣人作田二頃皆異畝同穎在政四年流人自歸戶口增十餘萬州境大寧晚頗好積聚多寫圖書數萬卷有油二百斛米四千石他物稱是太清二年徙授領軍俄改雍州刺史初聞邵陵王綸當代己為湘州其後更用河東王譽纘素輕少王州府候迎及資待甚薄譽深銜之及至州譽遂託疾不見纘仍檢括州府庶事留纘不遣會聞侯景寇建鄴譽當下援湘東王時鎮江陵與纘有舊纘將因之以斃譽兄弟時湘東王與譽及信州刺史桂陽王慥各率所領入援臺下硤至江津譽次江口湘東王屆郢州之武城屬侯景已請和武帝詔罷援軍譽自江口將旋湘鎮欲待湘東至謁督府方還州纘乃貽湘東書曰河東戴檣上水欲襲江陵嶽陽在雍共謀不逞江陵遊軍主朱榮又遣使報云桂陽住此欲應譽察湘東信之乃鑿船沈米斬纜而歸至江陵收慥殺之荊湘因構嫌隙纘尋棄其部曲攜其二女單舸赴江陵湘東遣使責讓譽索纘部下仍遣纘向雍州前刺史嶽陽王察推遷未去鎮但以城西白馬寺處之會聞賊陷臺城察因不受代州助防杜岸紿纘曰觀嶽陽不容使君使君素得物情若走入西山義舉事無不濟纘以為然因與岸兄弟盟乃要雍州人席引等於西山聚衆乃服婦人衣乘青布輿與親信十餘人奔引等杜岸馳告察察令中兵參軍尹正等追討纘以為赴期大喜及至並禽之纘懼不免請為沙門名法緒察襲江陵常載纘隨後逼使為檄固辭以疾及軍退敗行至湕水南防守纘者慮追兵至遂害之棄尸而去元帝承制贈開府儀同三司諡簡憲公元帝少時纘便推誠委結及帝即位追思之嘗為詩序云簡憲之為人也不事王侯負才任氣見余則申旦達夕不能已已懷夫人之德何日忘之纘著鴻寶一百卷文集二十卷初纘之往雍州資産悉留江陵性既貪婪南中資賄填積及死湘東王皆使收之書二萬卷並摙還齊珍寶財物悉付庫以粽蜜之屬還其家次子希字子顏早知名尚簡文第九女海鹽公主承聖初位侍中纘弟綰綰字孝卿少與兄纘齊名湘東王繹嘗策之百事綰對闕其六號為百六公位員外散騎常侍中軍宣城王長史遷御史中丞武帝遣其弟中書舍人絢宣旨曰為國之急唯在執憲直繩用人之本不限升降晉宋時周閔蔡廓兼以侍中為之卿勿疑是左遷時宣城王府望重故有此旨焉大同四年元日舊制僕射中丞坐位東西相當時綰兄纘為僕射及百司就列兄弟並導騶分趨兩陛前代未有時人榮之出為豫章內史在郡述制旨禮記正言義四姓衣冠士子聽者常數百人八年安成人劉敬宮挾祅道遂聚黨攻郡進寇豫章刺史湘東王遣司馬王僧辨討賊受綰節度旬月間賊黨悉平十年復為御史中丞綰再為憲司彈糾無所回避豪右憚之時城西開士林館聚學者綰與右衛朱䌇太府卿賀琛遞述制旨禮記中庸義太清三年為吏部尚書宮城陷奔江陵位尚書右僕射魏剋江陵朝士皆俘入關綰以疾免卒於江陵次子交字少游尚簡文第十一女定陽公主承聖二年官至祕書丞掌東宮管記庾域字司大新野人也少沈靜有名鄉曲梁文帝為郢州辟為主簿歎美其才曰荊南嵵梓其在斯乎加以恩禮長沙宣武王為梁州以為録事參軍帶華陽太守時魏軍攻圍南鄭州有空倉數十所域手自封題指示將士曰此中粟皆滿足支二年但努力堅守衆心以安軍退以功拜羽林監及長沙王為益州域隨為懷寧太守罷任還家妻子猶事井臼而域所衣大布餘奉專充供養母好鶴唳域在位營求孜孜不怠一旦雙鶴來下論者以為孝感所致永元初南康王板西中郎咨議參軍母憂去職梁武帝舉兵起為寧朔將軍領行選武帝東下師次楊口和帝遣御史中丞宗夬勞軍域乃諷夬曰黃鉞未加非所以總率侯伯夬反西臺即授武帝黃鉞蕭穎胄既都督中外諸軍事論者謂武帝應致箋域爭不聽乃止郢城平域及張弘策議與武帝意同即命衆軍便下域謀多被納用霸府初開為咨議參軍天監初封廣牧縣子後軍司馬出為寧朔將軍巴西梓潼二郡太守梁州長史夏侯道遷降魏魏襲巴西域固守城中糧盡將士皆齕草供食無有離心魏軍退進爵為伯于時兵後人飢域上表振貸不待報輒開倉為有司所糾上遷域西中郎司馬輔國將軍寧蜀太守卒于官子子輿子輿字孝卿幼而歧嶷五歲讀孝經手不釋卷或曰此書文句不多何用自苦答曰孝德之本何謂不多齊永明末除州主簿時父在梁州遇疾子輿奔侍醫藥言淚並長沙宣武王省疾見之顧曰庾録事雖危殆可憂更在子輿尋丁母憂哀至輒嘔血父戒以滅性乃禁其哭泣梁初為尚書郎天監三年父出守巴西子輿以蜀路險難啓求侍從以孝養獲許父遷寧蜀子輿亦相隨父於路感心疾每痛至必叫子輿亦悶絶及父卒哀慟將絶者再奉喪還鄉秋水猶壯巴東有淫預石高出二十許丈及秋至則才如見焉次有瞿塘大灘行旅忌之部伍至此石猶不見子輿撫心長叫其夜五更水忽退減安流南下及度水復舊行人為之語曰淫預如幞本不通瞿塘水退為庾公初發蜀有雙鳩巢舟中及至又栖廬側每聞哭泣之聲必飛翔簷宇悲鳴激切欲為父立佛寺未有定處夢有僧謂曰將修勝業嶺南原即可營造明往履歷果見標度處所有若人功因立精舍居墓所以終喪服闋手足枯攣待人而起仍布衣蔬食志守墳墓叔該謂曰汝若固志吾亦抽簪於是始仕雖以嫡長襲爵國秩盡推諸弟纍遷兼中郎司馬大通二年除巴陵內史便道之官路中遇疾或勸上郡就醫子輿曰吾疾患危重全濟理難豈可貪官陳尸公廨因勒門生不得輒入城市即於渚次卒遺令單衣帢履以斂酒脯施靈而已鄭紹叔字仲明滎陽開封人也纍世居壽陽祖琨宋高平太守紹叔年二十餘為安豐令有能名後為本州中從事史時刺史蕭誕弟諶被誅臺遣收誕兵使卒至左右驚散紹叔獨馳赴焉誕死侍送喪柩衆咸稱之到都司空徐孝嗣見而異之曰祖逖之流也梁武帝臨司州命為中兵參軍領長流因是厚自結附帝罷州還都謝遣賓客紹叔獨固請願留帝曰卿才幸自有用我今未能相益宜更思他塗固不許於是乃還壽陽刺史蕭遙昌苦要引紹叔終不受命遙昌將囚之鄉人救解得免及帝為雍州紹叔間道西歸補寧蠻長史扶風太守東昏既害朝宰頗疑于帝紹叔兄植為東昏直後東昏遣至雍州託候紹叔潛使為刺客紹叔知之密白帝及植至帝於紹叔處置酒宴之戲植曰朝廷遣卿見圖今日間宴是見取良會也賓主大笑令植登城隍周觀府署士卒器械舟艫戎馬莫不富實植退謂紹叔曰雍州實力未易圖也紹叔曰兄還具為天子言之兄若取雍州紹叔請以此衆一戰送兄於南峴相持慟哭而別續復遣主帥杜伯符亦欲為刺客詐言作使上亦密知宴接如常伯符懼不敢發上後即位作五百字詩具及之初起兵紹叔為冠軍將軍改驍騎將軍從東下江州平留紹叔監州事曰昔蕭何鎮關中漢祖得成山東之業寇恂守河內光武建河北之基今之九江昔之河內我故留卿以為羽翼前途不捷我當其咎糧運不繼卿任其責紹叔流涕拜辭於是督江湘糧運無闕乏天監初入為衛尉卿紹叔少孤貧事母及祖母以孝聞奉兄恭謹乃居顯要糧賜所得及四方遺餉悉歸之兄室忠於事上所聞纖豪無隱每為帝言事善則曰臣愚不及此皆聖主之策不善則曰臣智慮淺短以為其事當如是殆以此誤朝廷也臣之罪深矣帝甚親信之母憂去職紹叔有至性帝常使人節其哭頃之封營道縣侯復為衛尉卿以營道縣戶凋弊改封東興縣侯三年魏圍合肥紹叔以本號督衆軍鎮東關事平復為衛尉既而義陽入魏司州移鎮關南以紹叔為司州刺史紹叔至創立城隍繕兵積穀流人百姓安之性頗矜躁以權勢自居然能傾心接物多所舉薦士亦以此歸之徵為左衛將軍至家疾篤詔於宅拜授輿載還府中使醫藥一日數至卒於府舍帝將臨其殯紹叔宅巷陋不容輿駕乃止詔贈散騎常侍護軍將軍諡曰忠紹叔卒後帝嘗潸然謂朝臣曰鄭紹叔立志忠烈善必稱君過則歸己當今殆無其比其見賞惜如此子貞嗣呂僧珍字元瑜東平范人也世居廣陵家甚寒微童兒時從師學有相工歷觀諸生指僧珍曰此兒有奇聲封侯相也事梁文帝為門下書佐身長七尺七寸容貌甚偉曹輩皆敬之文帝為豫州刺史以為典籤帶蒙令帝遷領軍將軍補主簿祅賊唐𧜛之寇東陽文帝率衆東討使僧珍知行軍衆局事僧珍宅在建陽門東自受命當行每日由建陽門道不過私室文帝益以此知之司空陳顯達出軍沔北見而呼坐謂曰卿有貴相後當不見減深自努力建武二年魏軍南攻五道並進武帝帥師援義陽僧珍從在軍中時長沙宣武王為梁州刺史魏軍圍守連月義陽與雍州路斷武帝欲遣使至襄陽求梁州問衆莫敢行僧珍固請充使即日單舸上道及至襄陽督遣援軍且獲宣武王書而反武帝甚嘉之東昏即位司空徐孝嗣管朝政欲要僧珍與共事僧珍知不久當敗竟弗往武帝臨雍州僧珍固求西歸得補邔令及至武帝命為中兵參軍委以心膂僧珍陰養死士歸之者甚衆武帝頗招武猛士庶響從會者萬餘人因命按行城西空地將起數千間屋為止舍多伐材竹沈於檀溪積茅蓋若山阜皆未之用僧珍獨悟其指因私具櫓數百張及兵起悉取檀溪材竹裝為船艦葺之以茅並立辦衆軍將發諸將須櫓甚多僧珍乃出先所具每船付二張爭者乃息武帝以僧珍為輔國將軍步兵校尉出入臥內宣通意旨大軍次江寧武帝使僧珍與王茂率精兵先登赤鼻邏其日東昏將李居士來戰僧珍等大破之乃與茂進白板橋壘立茂移頓越城僧珍守白板李居士知城中衆少直來薄城僧珍謂將士曰今力不敵不可戰亦勿遙射須至塹𩹉當並力破之俄而皆越塹僧珍分人上城自率馬步三百人出其後內外齊擊居士等應時奔散及武帝受禪為冠軍將軍前軍司馬封平固縣侯再遷左衛將軍加散騎常侍入直祕書省總知宿衛天監四年大舉北侵自是僧珍晝直中書省夜還祕書五年旋軍以本官領太子中庶子僧珍去家久表求拜墓武帝欲榮以本州乃拜南兗州刺史僧珍在任見士大夫迎送過禮平心率下不私親戚兄弟皆在外堂並不得坐指客位謂曰此兗州刺史坐非呂僧珍牀及別室促膝如故從父兄子先以販葱為業僧珍至乃棄業求州官僧珍曰吾荷國重恩無以報效汝等自有常分豈可妄求叨越當速反葱肆耳僧珍舊宅在市北前有督郵廨鄉人咸勸徙廨以益其宅僧珍怒曰豈可徙官廨以益吾私宅乎姊適于氏住市西小屋臨路與列肆雜僧珍常導從鹵簿到其宅不以為恥在州百日徵為領軍將軍直祕書省如先常以私車輦水灑御路僧珍既有大勳任總心膂性甚恭慎當直禁中盛暑不敢解衣每侍御坐屏氣鞠躬對果食未嘗舉箸因醉後取一甘食武帝笑謂曰卿今日便是大有所進祿俸外又月給錢十萬其餘賜賚不絶於時初武帝起兵攻郢州久不下咸欲走北僧珍獨不肯纍日乃見從一夜僧珍忽頭痛壯熱及明而顙骨益大其骨法蓋有異焉十年疾病車駕臨幸中使醫藥日有數四僧珍語親舊曰吾昔在蒙縣熱病發黃時必謂不濟主上見語卿有富貴相必當不死俄而果愈吾今已富貴而復發黃所苦與昔政同必不復起竟如言卒于領軍官舍武帝即日臨殯贈驃騎將軍開府儀同三司諡曰忠敬武帝痛惜之言為流涕子淡嗣初宋季雅罷南康郡市宅居僧珍宅側僧珍問宅價曰一千一百萬怪其貴季雅曰一百萬買宅千萬買鄰及僧珍生子季雅往賀署函曰錢一千閽人少之弗為通強之乃進僧珍疑其故親自發乃金錢也遂言於帝陳其才能以為壯武將軍衡州刺史將行謂所親曰不可以負呂公在州大有政績樂藹字蔚遠南陽淯陽人晉尚書令廣之六世孫也家居江陵方頤隆準舉動醞藉其舅雍州刺史宗賣心嘗陳器物試諸甥姪藹時尚幼而無所取賣心由此奇之又取史傳各一卷授藹等使讀畢言所記藹略讀具舉賣心益善之齊豫章王嶷為荊州刺史以藹為驃騎行參軍領州主簿參知州事嶷嘗問藹城隍風俗山川險易藹隨問立對若案圖牒嶷益重焉州人嫉之或譖藹廨門如市嶷遣覘之方見藹閉閣讀書後為大司馬記室永明八年荊州刺史巴東王子響稱兵反及敗焚燒府舍官曹文書一時蕩盡齊武帝見藹問以西事藹占對詳敏帝悅用為荊州中從事敕付以修復府州事藹還州繕修廨署數百區頃之咸畢豫章王嶷薨藹解官赴喪率荊湘二州故吏建碑墓所南康王為西中郎以藹為咨議參軍蕭穎胄引藹及宗夬劉坦任以經略天監初纍遷御史中丞初藹發江陵無故於船得八車輻如中丞健步避道者至是果遷焉性公強居憲臺甚稱職時長沙宣武王將葬而車府忽於庫失油絡欲推主者藹曰昔晉武庫火張華以為積油萬石必然今庫若灰非吏罪也既而檢之果有積灰時稱其博物弘恕二年出為平越中郎將廣州刺史前刺史徐元瑜罷歸遇始興人士反逐內史崔睦舒因掠元瑜財産元瑜走歸廣州借兵於藹託欲討賊而實謀襲藹藹覺誅之尋卒於官藹姊適徵士同郡劉虬亦明識有禮訓藹為州迎姊居官舍三分祿秩以供焉西土稱之子法才法才字元備幼與弟法藏俱有美名沈約見之曰法才實才子為建康令不受奉秩比去將至百金縣曹啓輸臺庫武帝嘉其清節曰居職若斯可以為百城表矣遷太舟卿尋除南康內史恥以讓奉受名辭不拜歷位少府卿江夏太守因被代表求便道還鄉至家割宅為寺棲心物表尋卒法藏位征西録事參軍早亡子子雲美容貌善舉止位江陵令元帝承制除光祿卿魏剋江陵衆奔散呼子雲子雲曰終為虜矣不如守以死節遂仆地卒於馬蹄之下論曰張弘策惇厚慎密首預帝圖其位遇之隆豈徒外戚云爾至如太清板蕩親屬離二纘不能叶和蕃嶽克濟溫陶之功而苟懷私怨以成釁隙之首風格若此而為梁之亂階惜乎庾域鄭紹叔呂僧珍等或忠誠亮藎或恪勤匪懈締構王業皆有力焉僧珍之肅恭禁省紹叔之勤誠靡二蓋有人臣之節矣藹雖異帷幄之勳亦讚雲雷之業其當官任事寵秩不亦宜乎
