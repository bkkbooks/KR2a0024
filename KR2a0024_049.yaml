body:
  text: 南史卷四十九列傳第三十九庾杲之叔父蓽王諶從叔摛何憲孔逖孔圭劉懷珍子靈哲從父弟峻劉沼懷珍從子懷慰懷慰子霽杳歊懷珍從孫訏懷珍族弟善明庾杲之字景行新野人也祖深之位義興太守以善政聞父粲為宋南郡王義宣丞相城局參軍王舉兵見殺杲之幼有孝行宋司空劉勔見而奇之謂曰見卿足使江漢崇望嵵梓發聲解褐奉朝請稍遷尚書駕部郎清貧自業食唯有韭葅𦵩韭生韭雜菜任昉嘗戲之曰誰謂庾郎貧食鮭嘗有二十七種纍遷尚書左丞王儉謂人曰昔袁公作衛軍欲用我為長史雖不獲就要是意向如此今亦應須如我輩人也乃用杲之為衛將軍長史安陸侯蕭緬與儉書曰盛府元僚實難其選庾景行泛淥水依芙蓉何其麗也時人以入儉府為蓮花池故緬書美之歷位黃門吏部郎御史中丞參大選美容質善言笑嘗兼侍中夾侍柳世隆在御坐謂齊武帝曰庾杲之為蟬冕所映彌有華采陛下故當與其即真上甚悅王儉仍曰國家以杲之清美所以許其假職若以其即真當在胡諧之後武帝嘗與朝臣商略酒後謂羣臣曰我後當得何諡羣臣莫有答者王儉因目杲之從容曰陛下壽等南山方與日月齊明千載之後豈是臣子輕所仰量時人雅歎其辨答杲之嘗兼主客郎對魏使使問杲之曰百姓那得家家題門帖賣宅答曰朝廷既欲掃蕩京洛剋復神州所以家家賣宅耳魏使縮鼻而不答時諸王年少不得妄稱接人敕杲之及濟陽江淹五日一詣諸王使申遊好再遷尚書吏部郎參大選事太子右衛率加通直常侍九年卒上甚惜之諡曰貞子蓽字休野杲之叔父也仕齊為驃騎功曹史博涉羣書有口辨永明中與魏和親以蓽兼散騎常侍報使還拜散騎侍郎知東宮管記事後為荊州別駕前後紀綱皆致富饒蓽再為之清身率下杜絶請託布被蔬食妻子不免飢寒齊明帝聞而嘉焉手敕褒美州里榮之初梁州人益州刺史鄧元起功勳甚著名地卑瑣願名挂士流時始興忠武王憺為州將元起位已高而解巾不先州官則不為鄉里所悉元起乞上籍出身州從事憺命蓽用之蓽不從憺大怒召蓽責之曰元起已經我府卿何為苟惜從事蓽曰府是尊府州是蓽州宜須品藻憺不能折遂止纍遷會稽郡丞行郡府事時承雕弊之後百姓凶荒米斗至數千人多流散蓽撫循甚有理唯守公祿清節愈厲至有經日不舉火太守永陽王聞而饋之蓽謝不受天監元年卒停尸無以斂柩不能歸梁武帝聞之詔賜絹百匹穀五百斛初蓽為西楚望族兄子杲之又有寵於齊武帝蓽早歷顯官鄉人樂藹有幹用素與蓽不平互相陵競藹事齊豫章王嶷嶷薨藹仕不得志自步兵校尉求助戍歸荊州時蓽為州別駕益忽藹及梁武帝踐阼藹以西朝勳為御史中丞蓽始得會稽行事既恥之矣會職事微有譴帝以藹其鄉人也使宣旨誨之蓽大憤故發病卒子喬復仕為荊州別駕時元帝為荊州刺史而州人范興話以寒賤仕叨九流選為州主簿又皇太子令及之故元帝勒喬聽興話到職及屬元日府州朝賀喬不肯就列曰庾喬忝為端右不能與小人范興話為雁行元帝聞乃進喬而停興話興話羞慚還家憤卒世以喬為不墜家風喬子敻少聰慧家富於財好賓客食必列鼎又狀貌豐美頤頰開張人皆謂敻必為方伯無餒乏之慮及魏剋江陵卒致餓死時又有水軍都督褚蘿面甚尖危有從理入口竟保衣食而終王諶字仲和東海郯人晉少傅雅玄孫也祖慶員外常侍父元閔護軍司馬宋大明中沈曇慶為州辟諶為迎主簿又為州迎從事湘東王彧國常侍鎮北行參軍及彧即帝位是為明帝除司徒參軍帶薛令兼中書舍人諶有學義見親遇常在左右帝所行慘僻諶屢諫不從請退坐此繫尚方後拜中書侍郎明帝好圍置圍州邑以建安王休仁為圍州都大中正諶與太子右率沈勃尚書水部郎庾圭之彭城丞王抗四人為小中正朝請褚思莊傅楚之為清定訪問後為尚書左丞領東觀祭酒即明帝所置總明觀也遷黃門郎齊永明初纍遷豫章王太尉司馬武帝與諶相遇於宋明之世甚委任之歷黃門郎領驍騎將軍太子中庶子諶貞正和謹朝廷稱為善人多與之厚八年轉冠軍將軍長沙王車騎長史徙廬江王中軍長史又徙西陽王子明征虜長史行南兗府州事諶少貧常自紡績及通貴後每為人說之世稱其達九年卒諶從叔摛以博學見知尚書令王儉嘗集才學之士總校虛實類物隸之謂之隸事自此始也儉嘗使賓客隸事多者賞之事皆窮唯廬江何憲為勝乃賞以五花簟白團扇坐簟執扇容氣甚自得摛後至儉以所隸示之曰卿能奪之乎摛操筆便成文章既奧辭亦華美舉坐擊賞摛乃命左右抽憲簟手自掣取扇登車而去儉笑曰所謂大力者負之而趨竟陵王子良校試諸學士唯摛問無不對為秣陵令清直請謁不行羽林隊主潘敞有寵二宮勢傾人主婦弟犯法敞為之請摛摛投書於地更鞭四十敞怒譖之明日而見代永明八年天忽黃色照地衆莫能解司徒法曹王融上金天頌摛曰是非金天所謂榮光武帝大悅用為永陽郡後卒於尚書左丞何憲字子思廬江灊人博涉該通羣籍畢覽天閣寶祕人間散逸無遺漏焉任昉劉渢共執祕閣四部書試問其所知自甲至丁書說一事并述作之體連日纍夜莫見所遺宗人何遁退讓士也見而美之願與為友憲位本州別駕國子博士永明十年使于魏時又有孔逖字世遠會稽山陰人也好典故學與王儉至交升明中為齊臺尚書儀曹郎屢針闕禮多見信納上謂王儉曰逖真所謂儀曹不忝厥職也儉為宰相逖常謀議幄帳每及選用頗失鄉曲情儉從容啓上曰臣有孔逖猶陛下之有臣永明中為太子家令卒時人呼孔逖何憲為王儉三公及卒儉惜之為撰祭文孔圭字德璋會稽山陰人也祖道隆位侍中父靈産泰始中晉安太守有隱遁之志於禹井山立館事道精篤吉日於靜屋四向朝拜涕泣滂沱東出過錢唐北郭輒於舟中遙拜杜子恭墓自此至都東向坐不敢背側元徽中為中散大夫頗解星文好術數齊高帝輔政沈攸之起兵靈産白高帝曰攸之兵衆雖強以天時冥數而觀無能為也高帝驗其言擢遷光祿大夫以簏盛靈産上靈臺令其占候餉靈産白羽扇素隱几曰君有古人之風故贈君古人之服當世榮之圭少學涉有美譽太守王僧虔見而重之引為主簿舉秀才再遷殿中郎高帝為驃騎取為記室參軍與江淹對掌辭筆為尚書左丞父憂去官與兄仲智還居父山舍仲智妾李氏驕妬無禮圭白太守王敬則殺之永明中歷位黃門郎太子中庶子廷尉江左承用晉時張杜律二十卷武帝留心法令數訊囚徒詔獄官詳正舊注先是尚書刪定郎王植撰定律奏之削其煩害録其允衷取張斐注七百三十一條杜預注七百九十一條或二家兩釋於義乃備者又取一百七條其注相同者取一百三條集為一書凡一千七百三十二條為二十卷請付外詳校擲其違謬詔從之於是公卿八座參議考正舊注有輕重處竟陵王子良下意多使從輕其中朝議不能斷者則制旨平決至九年圭表上律文二十卷録序一卷又立律學助教依五經例詔報從之事竟不行轉御史中丞建武初為平西長史南郡太守圭以魏連歲南伐百姓死傷乃上表陳通和之策帝不從徵侍中不行留本任圭風韻清疏好文詠飲酒七八斗與外兄張融情趣相得又與琅邪王思遠廬江何點點弟胤並款交不樂世務居宅盛營山水憑几獨酌傍無雜事門庭之內草萊不翦中有蛙鳴或問之曰欲為陳蕃乎圭笑答曰我以此當兩部鼓吹何必效蕃王晏嘗鳴鼓吹候之聞羣蛙鳴曰此殊聒人耳圭曰我聽鼓吹殆不及此晏甚有慚色永元元年為都官尚書遷太子詹事加散騎常侍三年圭疾東昏屏除以牀舁之走因此疾甚遂卒贈金紫光祿大夫劉懷珍字道玉平原人漢膠東康王寄之後也其先劉植為平原太守因家焉祖昶從慕容德南度河因家于北海都昌宋武帝平齊以為青州中從事位至員外常侍伯父奉伯宋世位至陳南頓二郡太守懷珍幼隨奉伯至壽陽豫州刺史趙伯符出獵百姓聚觀懷珍獨避不視奉伯異之曰此兒方興吾家本州辟主簿元嘉二十八年亡命司馬順則聚黨東陽州遣懷珍將數千人討平之宋文帝問破賊事懷珍讓功不肯當親人怪問焉懷珍曰昔國子尼恥陳河間之級吾豈能論邦域之捷哉時人稱之江夏王義恭出鎮盱眙道遇懷珍以應對見重取為驃騎長史兼墨曹行參軍孝建初為義恭大司馬參軍直閣將軍隨府轉太宰參軍大明二年以軍功拜樂陵河間二郡太守賜爵廣晉縣侯司空竟陵王誕反郡人王弼門族甚盛勸懷珍起兵助誕懷珍殺之帝嘉其誠除豫章王子尚車騎參軍母憂去職服闋見江夏王義恭義恭曰別子多年那得不老對曰公恩未報何敢便老義恭善其對纍遷黃門郎領虎賁中郎將桂陽王休範反加懷珍前將軍守石頭出為豫州刺史加督建平王景素反懷珍遣子靈哲領兵赴建鄴沈攸之在荊楚遣使人許天保說結懷珍斬之送首於齊高帝封中宿縣侯進平南將軍增督二州初宋孝武世齊高帝為舍人懷珍為直閣相遇早舊懷珍假還青州高帝有白驄馬齧人不可騎送與懷珍別懷珍報上百匹絹或謂懷珍曰蕭公此馬不中騎是以與君耳君報百匹不亦多乎懷珍曰蕭君局量堂堂寧應負人此絹吾方欲以身名託之豈計錢物多少高帝輔政以懷珍內資未多徵為都官尚書領前將軍以第四子晃代為豫州刺史或疑懷珍不受代高帝曰我布衣時懷珍便推懷投款況在今日寧當有異晃發經日疑論不止上乃遣軍主房靈人領百騎進送晃謂靈人曰論者謂懷珍必有異同我期之有素必不應爾卿是其鄉里故遣卿行非唯衛新亦以迎故懷珍還乃授相國右司馬及齊臺建朝士人人爭為臣吏以懷珍為宋臺右衛懷珍謂帝曰人皆迎新臣獨送故豈以臣篤於本乎齊建元元年轉左衛將軍加給事中改封霄城侯懷珍年老以禁旅辛勤求為間職轉光祿大夫卒遺言薄葬贈雍州刺史諡敬侯子靈哲字文明位齊郡太守前軍將軍靈哲所生母嘗病靈哲躬自祈禱夢見黃衣老公與藥曰可取此食之疾立可愈靈哲驚覺於枕間得之如言而疾愈藥似竹根於齊前種葉似茈嫡母崔氏及兄子景煥泰始中為魏所獲靈哲為布衣不聽樂及懷珍卒當襲爵靈哲固辭以兄子在魏存亡未測無容越當茅土朝廷義之靈哲傾産贖嫡母及景煥纍年不能得武帝哀之令北使者請之魏人送以還南襲懷珍封爵靈哲位兗州刺史隆昌元年卒峻字孝標本名法武懷珍從父弟也父琁之仕宋為始興內史峻生朞月而琁之卒其母許氏攜峻及其兄法鳳還鄉里宋泰始初魏剋青州峻時年八歲為人所略為奴至中山中山富人劉寶愍峻以束帛贖之教以書學魏人聞其江南有戚屬更徙之代都居貧不自立與母並出家為尼僧既而還俗峻好學寄人廡下自課讀書常燎麻炬從夕達旦時或昏睡爇其鬚髮及覺復讀其精力如此時魏孝文選盡物望江南人士才學之徒咸見申擢峻兄弟不蒙選拔齊永明中俱奔江南更改名峻字孝標自以少時未開悟晚更厲精明慧過人苦所見不博聞有異書必往祈借清河崔慰祖謂之書淫於是博極羣書文藻秀出故其自序云黌中濟濟皆升堂亦有愚者解衣裳言其少年魯鈍也時竟陵王子良招學士峻因人求為子良國職吏部尚書徐孝嗣抑而不許用為南海王侍郎不就至齊明帝時蕭遙欣為豫州引為府刑獄禮遇甚厚遙欣尋卒久不調梁天監初召入西省與學士賀蹤典校祕閣峻兄孝慶時為青州刺史峻請假省之坐私載禁物為有司所奏免官安成王秀雅重峻及安成王遷荊州引為戶曹參軍給其書籍使撰類苑未及成復以疾去因遊東陽紫巖山築室居焉為山栖志其文甚美初梁武帝招文學之士有高才者多被引進擢以不次峻率性而動不能隨衆沉浮武帝每集文士策經史事時范雲沈約之徒皆引短推長帝乃悅加其賞賚會策錦被事咸言已罄帝試呼問峻峻時貧悴冗散忽請紙筆疏十餘事坐客皆驚帝不覺失色自是惡之不復引見及峻類苑成凡一百二十卷帝即命諸學士撰華林遍略以高之竟不見用乃著辨命論以寄其懷論成中山劉沼致書以難之凡再反峻並為申析以答之會沼卒不見峻後報者峻乃為書以序其事其文論並多不載峻又嘗為自序其略云余自比馮敬通而有同之者三異之者四何則敬通雄才冠世志剛金石余雖不及之而節亮慷慨此一同也敬通逢中興明君而終不試用余逢命世英主亦擯斥當年此二同也敬通有忌妻至於身操井臼余有悍室亦令家道轗軻此三同也敬通當更始世手握兵符躍馬肉食余自少迄長戚戚無歡此一異也敬通有子仲文官成名立余禍同伯道永無血胤此二異也敬通膂力剛強老而益壯余有犬馬之疾溘死無時此三異也敬通雖芝殘蕙焚終填溝壑而為名賢所慕其風流郁烈芬芳久而彌盛余聲塵寂莫世不吾知魂魄一去將同秋草此四異也所以力自為序遺之好事云峻本將門兄法鳳自北歸改名孝慶字仲昌早有幹略齊末為兗州刺史舉兵應梁武封餘干男歷官顯重峻獨篤志好學居東陽吳會人士多從其學普通三年卒年六十門人諡曰玄靖先生劉沼字明信中山魏昌人六世祖輿晉驃騎將軍沼幼善屬文及長博學位終秣陵令懷慰字彥泰懷珍從子也祖奉伯宋元嘉中為冠軍長史父乘人冀州刺史死於義嘉事懷慰持喪不食醯醬冬日不用絮衣養孤弟妹事寡叔母皆有恩義仕宋為尚書駕部郎懷慰宗從善明等為齊高帝心腹懷慰亦預焉齊國建上欲置齊郡於都下議者以江右土沃流人所歸乃置於瓜步以懷慰為輔國將軍齊郡太守上謂懷慰曰齊邦是王業所基吾方欲以為顯任經理之事一以委卿又手敕曰有文事必有武備今賜卿玉環刀一口懷慰至郡修城郭安集居人墾廢田二百頃決沉湖灌溉不受禮謁人有餉其新米一斛者懷慰出所食麥飯示之曰食有餘幸不煩此因著廉吏論以達其意高帝聞之手敕褒賞進督秦沛二郡妻子在都賜米三百石兗州刺史柳世隆與懷慰書曰膠東流化潁川致美以今方古曾何足云懷慰本名聞慰武帝即位以與舅氏名同敕改之後兼安陸王北中郎司馬卒明帝即位謂僕射徐孝嗣曰劉懷慰若在朝廷不憂無清吏也子霽杳歊霽字士湮九歲能誦左氏傳十四居父憂有至性每哭輒嘔血家貧與弟杳歊勵志勤學及長博涉多通梁天監中歷位西昌相尚書主客侍郎海鹽令霽前後宰二邑並以和理稱後除建康令不拜母明氏寢疾霽年已五十衣不解帶者七旬誦觀世音經數萬遍夜中感夢見一僧謂曰夫人算盡君精誠篤志當相為申延後六十餘日乃亡霽廬于墓哀慟過禮常有雙白鶴循翔廬側處士阮孝緒致書抑譬焉霽思慕不已未終喪而卒著釋俗語八卷文集十卷杳字士深年數歲徵士明僧紹見之撫而言曰此兒實千里之駒十三丁父憂每哭哀感行路梁天監中為宣惠豫章王行參軍杳博綜羣書沈約任昉以下每有遺忘皆訪問焉嘗於約坐語及宗廟犧樽約云鄭玄答張逸謂為畫鳳皇尾婆娑然今無復此器則不依古杳曰此言未必可安古者樽彝皆刻木為鳥獸鑿頂及背以出內酒魏時魯郡地中得齊大夫子尾送女器有犧樽作犧牛形晉永嘉中賊曹嶷於青州發齊景公冢又得二樽形亦為牛象二處皆古之遺器知非虛也約大以為然約又云何承天纂文奇博其書載張仲師及長頸王事此何所出杳曰仲師長尺二寸唯出論衡長頸是毗騫王朱建安扶南以南記云古來至今不死約即取二書尋檢一如杳言約郊居宅時新構閣齊杳為贊二首并以所撰文章呈約約即命工書人題其贊於壁仍報杳書共相歎美又在任昉坐有人餉昉金森酒而作榐字昉問杳此字是不杳曰葛洪字苑作木旁鏩昉又曰酒有千日醉當是虛言杳曰桂陽程鄉有千里酒飲之至家而醉亦其例昉大驚曰吾自當遺忘實不憶此杳云出楊元鳳所撰置郡事元鳳是魏代人此書仍載其賦三重五品商溪金寬里昉即檢楊記言皆不差王僧孺被使撰譜訪杳血脈所因杳云桓談新論云太史三代世表旁行邪上並效周譜以此而推當起周代僧孺歎曰可謂得所未聞周捨又問杳尚書著紫荷橐相傳云挈囊竟何所出杳曰張安世傳云持橐簪筆事孝武皇帝數十年韋昭張晏注並曰橐囊也簪筆以待顧問范岫撰字書音訓又訪杳焉尋佐周捨撰國史出為臨津令有善績秩滿縣三百餘人詣闕請留敕許焉後詹事徐勉舉杳及顧協等五人入華林撰遍略書成以晉安王府參軍兼廷尉正以足疾解因著林庭賦王僧孺見而歎曰郊居以後無復此作纍遷尚書儀曹郎僕射徐勉以臺閣文議專委杳焉出為餘姚令在縣清潔湘東王繹發教褒美之大通元年為步兵校尉兼東宮通事舍人昭明太子謂曰酒非卿所好而為酒之職政為卿不愧古人耳太子有瓠食器因以賜焉曰卿有古人之風故遺卿古人之器俄有敕代裴子野知著作郎事昭明太子薨新宮建舊人例無停者敕特留杳焉僕射何敬容奏轉杳王府咨議武帝曰劉杳須先經中書仍除中書侍郎尋為平西湘東咨議參軍兼舍人著作如故遷尚書左丞卒杳清儉無所嗜好自居母憂便長斷腥羶持齊蔬食臨終遺命斂以法服載以露車還葬舊墓隨得一地容棺而已不得設靈筵及祭醊其子遵行之撰要雅五卷楚辭草木疏一卷高士傳二卷東宮新舊記三十卷古今四部書目五卷文集十五卷並行於世歊字士光生夕有香氣氛氳滿室幼有識慧四歲喪父與羣兒同處獨不戲弄六歲誦論語毛詩意所不解便能問難十二讀莊子逍遙篇曰此可解耳客問之隨問而答皆有情理家人每異之謂為神童及長博學有文才不娶不仕與族弟訏並隱居求志遨遊林澤以山水書籍相娛而已奉母兄以孝悌稱寢食不離左右母意有所須口未及言歊已先知手自營辦狼狽供奉母每疾病夢歊進藥及翌日轉有間效其誠感如此性重興樂尤愛山水登危履嶮必盡幽遐人莫能及皆歎其有濟勝之具常欲避人世以母老不忍違每隨兄霽杳從宦少時好施務周人之急人或遺之亦不拒也久而歎曰受人者必報不則有愧於人吾固無以報人豈可常有愧乎天監十七年忽著革終論以為形者無知之質神者有知之性有知不獨存依無知以自立故形之於神逆旅之館耳及其死也神去此館速朽得理是以子羽沈川漢伯方壙文楚黃壤士安麻索此四子者得理也若從四子而遊則平生之志得矣然積習生常難卒改革一朝肆志儻不見從今欲翦截煩厚務存儉易進不裸尸退異常俗不傷存者之念有合至人之道且張奐止用幅巾王肅唯盥手足范冉斂畢便葬爰珍無設筵几文度故舟為棺子廉牛車載柩叔起誡絶墳隴康成使無卜吉此數公者尚或如之況為吾人而尚華泰今欲髣佛景行以為軌則氣絶不須復魂盥漱而斂以一千錢市成棺單故裙衫衣巾枕履此外送往之具棺中常物一不得有所施世多信李彭之言可謂惑矣余以孔釋為師差無此惑斂訖載以露車歸於舊山隨得一地地足為坎坎足容棺不須磚甓不勞封樹勿設祭饗勿置几筵其蒸嘗繼嗣言象所絶事止余身無傷世教初訏之疾歊盡心救療及卒哀傷為之誄又著悲友賦以序哀情忽有老人無因而至謂曰君心力堅猛必破死生但運會所至不得久留一方耳彈指而去歊心知其異試遣尋之莫知其所於是信心彌篤既而寢疾恐貽母憂乃自言笑勉進湯藥謂兄霽杳曰兩兄祿仕足伸供養歊之歸泉復何所憾願深割無益之悲十八年年三十二卒始沙門釋寶志遇歊於興皇寺驚起曰隱居學道清淨登仙如此三說歊未死之春有人為其庭中栽柿歊謂兄子弇曰吾不見此實爾其勿言至秋而亡人以為知命親故誄其行迹諡曰貞節處士先是有太中大夫琅邪王敬胤以天監八年卒遺命不得設復魄旌旐一蘆藉下一枚覆上吾氣絶便沐浴籃輿載尸還忠侯大夫要中若不行此則戮吾尸於九泉敬胤外甥許慧詔因阮研以聞詔曰敬胤令其息崇素氣絶便沐浴藉以二蘆鑿地周身歸葬忠侯此達生之格言賢夫玉匣石槨遠矣然子於父命亦有所從有所不從今崇素若信遺意土周淺薄屬辟不施一朝見侵狐鼠戮尸已甚父可以訓子子亦不可行之外內易棺此自奉親之情藉土而葬亦通人之意宜兩捨兩取以達父子之志棺周於身土周於槨去其牲奠斂以時服一可以申情二可以稱家禮教無違生死無辱此故當為安也訏字彥度懷珍從孫也祖承宗宋太宰參軍父靈真齊鎮西咨議武昌太守訏幼稱純孝數歲父母繼卒訏居喪哭泣孺慕幾至滅性赴弔者莫不傷焉後為伯父所養事伯母及昆姊孝友篤至為宗族所稱自傷早孤人有誤觸其諱者未嘗不感結流涕長兄潔為娉妻剋日成婚訏聞而逃匿事息乃還本州刺史張稷辟為主簿主者檄召訏乃挂檄於樹而逃陳留阮孝緒博學隱居不交當世居一鹿牀環植竹木寢處其中時人造之未嘗見也訏經一造孝緒即顧以神交訏族兄歊又履高操三人日夕招攜故都下謂之三隱訏善玄言尤精意釋典曾與歊聽講鍾山諸寺因共卜築宋熙寺東澗有終焉之志尚書郎何炯嘗遇之於路曰此人風神穎俊蓋荀奉倩衛叔寶之流也命駕造門拒而不見族祖孝標與書稱之曰訏超超越俗如半天朱霞歊矯矯出塵如雲中白鶴皆儉歲之粱稷寒年之纖纊訏嘗著穀皮巾披納衣每遊山澤輒留連忘返神理間正姿貌甚華在林谷之間意氣彌遠或有遇之者皆謂神人家甚貧苦併日而食隆冬之月或無檳絮訏處之晏然人不覺其飢寒也自少至長無喜慍之色每於可競之地輒以不競勝之或有加陵之者莫不退而愧服由是衆論咸歸重焉天監十七年卒於歊舍臨終執歊手曰氣絶便斂斂畢即埋靈筵一不須立勿設饗祀無求繼嗣歊從而行之宗人至友相與刊石立銘諡曰玄貞處士善明懷珍族弟也父懷人仕宋為齊北海二郡太守元嘉末青州饑荒人相食善明家有積粟躬食饘粥開倉以救鄉里多獲全濟百姓呼其家田為續命田善明少而靜處讀書刺史杜驥聞名候之辭不相見年四十刺史劉道隆辟為中從事懷人謂善明曰我已知汝立身復欲見汝立官也善明應辟仍舉秀才宋孝武見其策強直甚異之泰始初徐州刺史薛安都反青州刺史沈文秀應之時州居東陽城善明家在郭內不能自拔伯父彌之詭說文秀求自效文秀使領軍主張靈慶等五千人援安都彌之出門密謂部曲曰始免禍坑矣行至下邳乃背文秀善明從伯懷恭為北海太守據郡相應善明密契收集門宗部曲得三千人夜斬關奔北海族兄乘人又聚衆勃海以應朝廷而彌之尋為薛安都所殺明帝贈青州刺史以乘人為冀州刺史善明為北海太守除尚書金部郎乘人病卒仍以善明為冀州刺史文秀既降除善明海陵太守郡境邊海無樹木善明課人種榆檟雜果遂獲其利還為直閣將軍五年魏剋青州善明母在焉移置代郡善明布衣蔬食哀戚如持喪明帝每見為之歎息轉巴西梓潼二郡太守善明以母在魏不願西行泣涕固請見許朝廷多哀善明心事元徽初遣北使朝議令善明舉人善明舉州鄉北平田惠紹使魏贖母還時宋後廢帝新立羣臣執政善明獨事齊高帝委身歸誠出為西海太守行青冀二州刺史善明從弟僧副與善明俱知名於鄉里泰始初魏攻淮北僧副將部曲二千人東依海島齊高帝在淮陰壯其所為召與相見引為安成王撫軍參軍後廢帝肆暴高帝憂恐常令僧副微行伺察聲論使密告善明及東海太守垣崇祖使動魏兵善明勸靜以待之高帝納焉廢帝見殺善明為高帝驃騎咨議南東海太守行南徐州事沈攸之反高帝深以為憂善明獻計曰沈攸之控引八州縱情蓄斂苞藏賊志於焉十年性既險躁才非持重起逆纍旬遲回不進豈應有所待也一則暗於兵機二則人情離怨三則有掣肘之患四則天奪其魄本疑其輕速掩襲未備今六師齊奮諸侯同舉此已籠之鳥耳事平高帝召善明還都謂曰卿策沈攸之雖張良陳平適如此耳仍遷太尉右司馬齊臺建為右衛將軍辭疾不拜司空褚彥回謂善明曰高尚之事乃卿從來素意今朝廷方相委待詎得便學松喬邪善明答曰我本無宦情既逢知己所以勠力驅馳天地廓清朝廷濟濟鄙吝既申不敢昧於富貴矣高帝踐阼以善明勳誠欲與之祿召謂曰淮南近畿國之形勝非親賢不居卿與我臥理之乃代明帝為淮南宣城二郡太守遣使拜授封新淦伯善明至郡上表陳事凡一十一條其一以為天地開創宜存問遠方廣宣慈澤其二以為京都遠近所歸宜遣醫藥問其疾苦年九十以上及六疾不能自存者隨宜量賜其三以為宋氏赦令蒙原者寡愚謂今下赦書宜令事實相副其四以為劉昶猶存容能送死境上諸城宜應嚴備其五以為宜除宋氏大明以來苛政細制以崇簡易其六以為凡諸土木之費且可權停其七以為帝子王女宜崇儉約其八以為宜詔百官及府州郡縣各貢讜言以弘廣唐虞之美其九以為忠貞孝悌宜擢以殊階清儉苦節應授以政務其十以為革命惟始宜擇才北使其十一以為交州險敻要荒之表宋末政苛遂至怨叛今宜懷以恩德未應遠勞將士搖動邊氓又撰賢聖雜語奏之託以諷諫上優詔答之又諫起宣陽門表陳宜明守宰賞罰立學校制齊禮開賓館以接鄰國上答曰夫賞罰以懲守宰飾館以待遐荒皆古之善政吾所宜勉更撰新禮或非易制國學之美已敕公卿宣陽門今敕停寡德多闕思復有聞善明身長七尺九寸質素不好聲色所居茅齊斧木而已牀榻几案不加剗削少立節行常云在家當孝為吏當清子孫楷栻足矣及纍為州郡頗黷財賄崔祖思怪而問之答曰管子云鮑叔知我因流涕曰方寸亂矣豈暇為廉所得金錢皆以贖母及母至清節方峻所歷之職廉簡不煩俸祿散之親友與崔祖思友善祖思出為青冀二州善明遺書舊因相勗以忠概及聞祖思死慟哭仍得病建元二年卒遺命薄殯贈左將軍豫州刺史諡烈伯子滌嗣善明家無遺儲唯有書八千卷高帝聞其清貧賜滌家葛塘屯穀五百斛曰葛屯亦吾之垣下令後世知其見異善明從弟僧副字士雲位前將軍封豐陽男卒於巴西梓潼二郡太守上圖功臣像讚僧副亦在焉兄法護字士伯有學業位濟陰太守論曰詩稱抑抑威儀惟人之則又云其儀不忒正是四國觀夫杲之風流所得休野行己之度蓋其有焉仲和性履所遵德璋業尚所守殆人望也懷珍宗族文質斌斌自宋至梁時移三代或以隱節取高或以文雅見重古人云立言立德斯門其有之乎
