body:
  text: 南史卷十七列傳第七劉敬宣劉懷肅弟懷敬懷慎劉粹族弟損孫處蒯恩向靖子柳劉鍾虞丘進孟懷玉弟龍符胡藩劉康祖伯父簡之簡之弟謙之簡之子道産道産子延孫劉敬宣字萬壽彭城人也父牢之晉鎮北將軍敬宣八歲喪母晝夜號泣中表異之輔國將軍桓序鎮蕪湖牢之參序軍事四月八日敬宣見衆人灌佛乃下頭上金鏡為母灌像因悲泣不自勝序謂牢之曰卿此兒非唯家之孝子必為國之忠臣起家王恭前軍參軍又參會稽世子元顯征虜軍事隆安二年王恭起兵京口以誅司馬尚之為名牢之時為恭前軍司馬恭以豪戚自居甚相陵忽牢之心不能平及恭此舉使牢之為前鋒牢之遣敬宣襲恭敗之元顯以敬宣為後將軍咨議參軍三年孫恩為亂牢之自表東討敬宣請以騎傍南山趣其後吳賊畏馬又懼首尾受敵遂大敗之進平會稽遷後軍從事中郎宋武帝既纍破祅賊功名日盛敬宣深相憑結元顯進號驃騎敬宣仍隨府轉元顯驕肆羣下化之敬宣每預宴會調戲無所酬答元顯甚不悅元興元年牢之南討桓玄元顯為征討大都督日夜昏酣牢之以道子昏暗元顯淫凶慮平玄之日亂政方始會玄遣信説牢之牢之欲假手於玄誅執政然後乘玄之隙可以得志天下將許玄降敬宣諫恐玄威望既成則難圖牢之怒曰吾豈不知今日取之如反覆手但平後令我奈驃騎何遣敬宣為任玄既得志害元顯廢道子以牢之為會稽太守牢之與敬宣謀襲玄期以明旦爾日大霧府門晚開日旰敬宣不至牢之謂謀泄欲奔廣陵而敬宣還京口迎家牢之謂已為玄禽乃縊而死敬宣奔喪哭畢就司馬休之高雅之等俱奔洛陽往來長安求救於姚興後奔慕容德敬宣素明天文知必有興復晉室者尋夢丸土服之覺而喜曰丸者桓也桓吞吾當復本土乎乃結青州大姓諸崔封謀滅德推休之為主時德司空劉軌大被任高雅之又要軌謀泄乃相與殺軌而去會宋武帝平京口手書召敬宣即馳還襲封武岡縣男後拜江州刺史劉毅之少人或以雄桀許之敬宣曰此人外寬內忌自伐而尚人若一旦遭逢當以陵上取禍毅聞深恨及在江陵知敬宣還尋知為江州大駭惋敬宣愈不自安安帝反正自表求解武帝恩款周洽所賜莫與為比敬宣女嫁賜錢三百萬雜綵千匹帝方大相寵任欲令立功義熙三年表遣敬宣伐蜀博士周祗諫以為道遠運漕難繼毛修之家讎不雪不應以得死為恨劉敬宣蒙生存之恩亦宜性命仰答將軍欲驅二死之甘心忘國家之重計愚情竊所未安不從假敬宣節監征蜀諸軍事敬宣至黃武去成都五百里食盡遇疾疫而還為有司奏免官五年武帝伐慕容超除中軍咨議參軍與兗州刺史劉藩大破超軍進圍廣固屢獻規略盧循逼建鄴敬宣分領鮮卑獸斑突騎置陳甚整循走仍從南討為左衛將軍敬宣寬厚善待士多伎藝弓馬音律無事不善尚書僕射謝混美才地少所交納與敬宣遇便盡禮或問混卿未嘗輕交而傾蓋劉壽何也混曰孔文舉禮太史子義天下豈有非之邪初敬宣蜀還劉毅欲以重法繩之武帝既相任待又何無忌謂不宜以私憾傷至公毅雖止猶謂武帝曰平生之舊豈可孤信光武悔之於龐萌曹公失之於孟卓宜深慎之毅出為荊州謂敬宣曰欲屈卿為長史南蠻豈有見輔意乎敬宣懼禍以告武帝帝笑曰但令老兄平安必無過慮後領冀州刺史時帝西討劉毅豫州刺史諸葛長人監太尉軍事貽敬宣書曰盤龍狼戾專恣自取夷滅異端將盡世路方夷富貴之事相與共之敬宣報曰下官常懼福過災生實思避盈居損富貴之旨非所敢當便以長人書呈帝謂王誕曰阿壽故為不負我十一年進號右軍將軍時晉宗室司馬道賜為敬宣參軍會武帝西征司馬休之而道賜乃陰結同府辟閭道秀左右小將王猛子等謀反道賜自號齊王規據廣固舉兵應休之猛子取敬宣刀殺敬宣文武佐吏即討道賜道秀猛子斬之先是敬宣嘗夜與僚佐宴空中有投一隻芒屩於坐墜敬宣食盤上長三尺五寸已經人著耳鼻間並欲壞頃之而敗喪至武帝臨哭甚哀子光祖嗣宋受禪國除劉懷肅彭城人宋武帝從母兄也家世貧窶而躬耕好學仕晉為費令及聞武帝起義棄縣來奔義熙元年為輔國將軍淮南歷陽二郡太守二年又領劉毅撫軍司馬以建義功封東興縣侯其冬桓石綏司馬國璠陳襲於胡桃山聚衆為寇懷肅討破之江淮間羣蠻及桓氏餘黨為亂懷肅自請討之及行失旨毅上表免懷肅官三年卒追贈左將軍無子弟懷慎以子蔚祖嗣位江夏內史蔚祖卒子道存嗣位太尉江夏王義恭咨議參軍孝武伐元凶道存出奔義軍元凶乃殺其母以徇景和中為義恭太宰從事中郎義恭敗以黨與下獄死懷肅次弟懷敬澀訥無才能初武帝産而皇妣殂孝皇帝貧薄無由得乳人議欲不舉帝從母生懷敬未期乃斷懷敬乳而自養帝帝以舊恩懷敬纍見寵授至會稽太守時以為速武帝曰亡姨於我恩重此何可忘歷尚書金紫光祿大夫懷敬子真道為錢唐令元嘉十三年東土飢帝遣揚州中從事史沈演之巡行在所演之表真道及餘杭令劉道錫有美政上嘉之各賜穀千斛以真道為步兵校尉十四年出為梁南秦二州刺史十八年氐帥楊難當侵寇漢中真道討破之而難當寇盜猶不已文帝遣龍驤將軍裴方明率禁兵五千受真道節度十九年方明至武興率太子積弩將軍劉康祖等進軍大致剋捷以真道為建威將軍雍州刺史方明輔國將軍梁南秦二州刺史又詔故晉壽太守薑道盛殞身鋒鏑可贈給事中賜錢十萬道盛注古文尚書行於世真道方明並坐破仇池斷割金銀諸雜寶貨又藏難當善馬下獄死懷敬弟懷慎少謹慎質直從宋武帝征討位徐州刺史為政嚴猛境內震肅以平廣固盧循功封南城縣男十二年武帝北伐以為中領軍征虜將軍宿衛輦轂坐府內相殺免官雖名位轉優而恭恪愈至每所之造位任不踰己者皆束帶門外下車其謹退類如此永初元年以佐命功進爵為侯位五兵尚書加散騎常侍光祿大夫景平元年遷護軍將軍祿賜班於宗族家無餘財卒諡肅侯子德願嗣大明初為遊擊將軍領石頭戍事坐受賈客韓佛智貨下獄奪爵後為秦郡太守德願性粗率為孝武狎侮上寵姬殷貴妃薨葬畢數與羣臣至殷墓謂德願曰卿哭貴妃若悲當加厚賞德願應聲便號慟撫膺劈踴涕泗交流上甚悅以為豫州刺史又令醫術人羊志哭殷氏志亦嗚咽他日有問志卿那得此副急淚志時新喪愛姬答曰我爾日自哭亡妾耳志滑稽善為諧謔上亦愛狎之德願善御車嘗立兩柱使其中劣通車軸乃於百餘步上振轡長驅未至數尺打牛奔從柱間直過其精如此孝武聞其能為之乘畫輪車幸太宰江夏王義恭第德願岸著籠冠短朱衣執轡進止甚有容狀永光中為廷尉與柳元景厚善元景敗下獄誅懷慎庶長子榮祖少好騎射為武帝所知及盧循攻逼時賊乘小艦入淮拔柵武帝宣令三軍不得輒射賊榮祖不勝憤怒冒禁射之所中應弦而倒帝益奇焉以戰功參太尉軍事從討司馬休之彭城內史徐逵之敗沒諸將意沮榮祖請戰愈厲上乃解所著鎧授之榮祖陷陳身被數創及帝北伐轉鎮西中兵參軍水軍入河與朱超石大破魏軍於半城帝大饗戰士謂榮祖曰卿以寡剋衆攻無堅城雖古名將何以過此永初中為輔國將軍追論半城功賜爵都鄉侯榮祖為人輕財貴義善撫將士然性褊頗失士君子心卒于官懷慎弟懷默江夏內史子孫登武陵內史孫登子亮少工刀楯以軍功封順陽縣侯歷梁益二州刺史在任廉儉所得公祿悉以還官宋明帝下詔褒美亮在梁州忽服食欲致長生迎武當山道士孫懷道使合仙藥藥成服之而卒及就斂尸弱如生諡曰剛侯孫登弟道隆前廢帝景和中位右衛將軍封永昌縣侯委以腹心之任泰始初又為明帝盡力遷左衛將軍中護軍賜死事在建安王休仁傳劉粹字道沖沛郡蕭人也家在京口初為州從事從宋武帝平建鄴征廣固以功封西安縣五等侯纍遷中軍咨議參軍盧循之逼京口任重文帝時年四歲武帝使粹奉文帝鎮京口後為江夏相族兄毅二於武帝粹不與毅同而盡心武帝帝將謀毅衆並疑粹在夏口帝愈信之及大軍至竭其誠力事平封灄陽縣男永初元年以佐命功改封建安縣侯文帝即位為雍州刺史加都督元嘉三年討謝晦初晦與粹善以粹子曠之為參軍至是帝甚疑之王弘曰粹無私必無憂也及受命南討一無所顧文帝以此嘉之晦亦不害曠之遣還粹尋卒曠之嗣粹弟道濟位益州刺史任長史費謙等聚斂傷政害人初晉末有司馬飛龍者自稱晉宗室走仇池元嘉九年聞道濟綏撫失和遂自仇池入綿竹為亂道濟遣軍討斬之先是道濟以五城人帛氐奴梁顯為參軍督護費謙固執不與遠方商人至者謙又抑之商旅呼嗟百姓咸欲為亂氐奴等因聚黨為盜及趙廣等詐言司馬殿下猶在陽泉山中蜀土僑舊翕然並反奉道人程道養言是飛龍道養枹罕人也趙廣改名為龍興號為蜀王車騎大將軍益梁二州牧建號泰始元年備置百官以道養弟道助為驃騎將軍長沙王鎮涪城廣自號鎮軍將軍帛氐奴為征虜將軍梁顯為鎮北將軍奉道養圍成都道濟遣中兵參軍裴方明頻破之十年正月賊復大至攻逼成都道濟卒方明等共埋尸於後齋使書與道濟相似者為教酬答籤疏不異常日雖母妻不知也二月道養升壇郊天方就柴燎方明擊大敗之會平西將軍臨川王義慶使巴東太守周籍之帥衆援成都廣等屯據廣漢分守郫川籍之與方明攻郫克之方明禽偽驃騎將軍司馬龍伸斬之龍伸即道助也涪蜀皆平俄而張尋攻破陰平復與道養合逃于郪山其餘羣賊出為盜不絶文帝遣寧朔將軍蕭汪之討之十四年餘黨乃平遷趙廣張尋等於建鄴十六年廣尋復與國山令司馬敬琳謀反伏誅粹族弟損字子騫衛將軍毅從父弟也父鎮之字仲德以毅貴顯間居京口未嘗應召常謂毅汝必破我家毅甚畏憚每還京口未嘗敢以羽儀入鎮之門以左光祿大夫徵不就卒於家損元嘉中為吳郡太守至昌門便入太伯廟時廟室頽毀垣牆不修損愴然曰清塵尚可髣佛衡宇一何摧頽即令修葺卒贈太常損同郡宗人有劉伯龍者少而貧薄及長歷位尚書左丞少府武陵太守貧寠尤甚常在家慨然召左右將營十一之方忽見一鬼在傍撫掌大笑伯龍歎曰貧窮固有命乃復為鬼所笑也遂止孫處字季高會稽永興人也籍注字故以字行少任氣武帝征孫恩季高樂從及平建鄴封新夷縣五等侯盧循之難武帝謂季高曰此賊行破非卿不能破其窟穴即遣季高泛海襲番禺拔之循父嘏長史孫建之司馬虞夫等輕舟奔始興即分遣振武將軍沈田子等討平嶺表諸郡循於左里走還襲廣州季高破走之義熙七年季高卒追贈南海太守封候官縣侯九年武帝表贈交州刺史蒯恩字道恩蘭陵承人也武帝征孫恩縣差恩伐馬芻常負大束兼倍餘人每捨芻於地歎曰大丈夫彎弓三石奈何充馬士武帝聞之即給器仗自征祅賊常為先登膽力過人甚見愛信於婁縣戰箭中右目平京城定建鄴以軍功封都鄉侯從伐廣固破盧循隨劉藩追斬徐道覆與王鎮惡襲江陵隨朱齡石伐蜀又從伐司馬休之自從征討凡百餘戰身被重創武帝録其前後功封新寧縣男武帝北伐留恩侍衛世子命朝士與之交恩益自謙損與人語常呼官位自稱鄙人撫士卒甚有恩紀世子開府再遷為司馬後入關迎桂陽公義真沒於赫連勃勃傳國至孫無子國除向靖字奉仁小字彌河內山陽人也名與武帝祖諱同故以小字行彌與武帝有舊從平京城參建武軍事進平建鄴以功封山陽縣五等侯又從征廣固討盧循所在著績封安南縣男武帝西伐司馬休之征關中並見任使及帝受命以佐命功封曲江縣侯位太子左衛率加散騎常侍卒于官彌立身儉約不營室宇無園田商貨之業時人稱之子植嗣多過失不受母訓奪爵更以植次弟楨紹封又坐殺人國除楨弟柳字玄季有學義才能立身方雅太尉袁淑司空徐湛之東揚州刺史顏竣皆與友善及竣貴柳猶以素情自許不推先之順陽范璩誡柳曰名位不同禮有異數卿何得作曩時意邪柳曰我與士遜心期久矣豈可一旦以勢利處之及柳為南康郡涉義宣事敗繫建康獄屢密請竣求相申救孝武嘗與竣言及柳事竟不助之柳遂伏法璩字伯玉平北將軍汪曾孫也位淮南太守劉鍾字世之彭城人也少孤依鄉人中山太守劉回共居常慷慨於貧賤從宋武帝征伐盡其心力及義旗建帝板鍾為郡主簿曰豫是彭城鄉人赴義者並可依劉主簿於是立義隊連戰皆捷及桓謙屯于東陵卞範之屯覆舟山西武帝疑賊有伏兵顧左右政見鍾謂曰此山下當有伏兵卿可往探之鍾馳進果有伏兵一時奔走後除南齊國內史封安丘縣五等侯求改葬父祖及親屬十喪帝厚加資給從征廣固孟龍符於陳陷沒鍾直入取其尸而反盧循逼建鄴鍾拒柵身被重創賊不得入循南走鍾又隨劉藩追徐道覆斬之後隨朱齡石伐蜀為前鋒去成都二百里鍾于時腳疾齡石乃詣鍾謀且欲養鋭息兵以伺其隙鍾曰不然前揚言大衆向內水譙道福不敢捨涪城今重軍卒至出其不意蜀人已破膽矣賊今阻兵守險是其懼不敢戰非能持久也因其凶懼攻之其勢必克若緩兵彼將知人虛實當為蜀子虜耳齡石從之明日陷其二城徑平成都以廣固功封永新縣男十二年武帝北伐鍾居守纍遷右衛將軍元熙元年卒傳國至孫齊受禪國除虞丘進字豫之東海郯人也少時隨謝玄討苻堅有功封關內侯後從宋武帝征孫恩頻戰有功從定建鄴除燕國內史封龍川縣五等侯及盧循逼都孟昶等議奉天子過江進廷議不可面折昶等武帝甚嘉之除鄱陽太守後隨劉藩斬徐道覆義熙九年以前後功封望蔡縣男永初二年纍遷太子右衛率卒追論討司馬休之功進爵為子傳國至曾孫齊受禪國除孟懷玉平昌安丘人也世居京口宋武帝東伐孫恩以為建武司馬豫義旗從平京口定建鄴以功封鄱陽縣五等侯盧循逼都以戰功為中軍咨議參軍循平封陽豐縣男位江州刺史南中郎將卒官無子國除懷玉弟龍符驍果有膽氣早為武帝所知以軍功封平昌縣五等子從伐廣固以車騎參軍加龍驤將軍廣川太守乘勝追奔被圍見害追贈青州刺史封臨沅縣男胡藩字道序豫章南昌人也少孤居喪以毀聞太守韓伯見之謂藩叔尚書少廣曰卿此姪當以義烈成名州府辟不就須二弟冠婚畢乃參郗恢征虜軍事時殷仲堪為荊州刺史藩外兄羅企生為仲堪參軍藩過江陵省企生因説仲堪曰桓玄意趣不常節下崇待太過非將來計也仲堪不悅藩退謂企生曰倒戈授人必至大禍不早去後悔無及後玄自夏口襲仲堪藩參玄後軍軍事仲堪敗企生果以附從及禍藩轉參太尉大將軍相國軍事宋武帝起兵玄戰敗將出奔藩扣馬曰今羽林射手猶有八百皆是義故西人一旦捨此欲歸可復得乎玄直以鞭指天而已於是奔散相失追及玄於蕪湖玄見藩喜謂張須無曰卿州故為多士今復見王修桑落之敗藩艦被燒並鎧入水潛行三十許步方得登岸乃還家武帝素聞藩直言於殷氏又為玄盡節召參鎮軍軍事從征慕容超超軍屯聚臨朐藩言於武帝曰賊屯軍城外留守必寡今往取其城而斬其旗幟此韓信所以剋趙也帝乃遣檀韶與藩潛往即剋其城賊見城陷一時奔走還保廣固圍之將拔之夜忽有鳥大如鵝蒼黑色飛入帝帳𩹉衆以為不祥藩賀曰蒼黑者胡虜色胡虜歸我大吉之祥明旦攻城陷之從討盧循於左里頻戰有功封吳平縣五等子尋除鄱陽太守從伐劉毅初毅當之荊州表求東道還建鄴辭墓去都數十里不過拜闕帝出倪塘會毅藩請殺之乃謂帝曰公謂劉衛軍為公下乎帝曰卿謂何如對曰夫豁達大度功高天下連百萬之衆允天人之望毅固以此服公至於涉獵記傳一詠一談自許以雄豪加以誇伐搢紳白面之士輻湊而歸此毅不肯為公下也帝曰吾與毅俱有剋復功其過未彰不可自相圖至是謂藩曰昔從卿倪塘之謀無今舉也又從征司馬休之復為參軍徐逵之敗沒帝怒即日於馬頭岸度江江津岸壁立數丈休之臨岸置陳無由可登帝呼藩令上藩有疑色帝怒命左右録來欲斬之藩不受命顧曰寧前死耳以刀頭穿岸劣容腳指徑上隨之者稍多及登殊死戰敗之從伐關中參太尉軍事統別軍至河東暴風漂輜重艦度北岸魏軍牽得此艦藩氣憤率左右十二人乘小船徑往魏騎五六百見藩來並笑之藩素善射登岸射之應弦而倒者十許人魏軍皆退悉收所失而反又遣藩及朱超石等追魏軍於半城魏騎數萬合圍藩及超石不盈五千力戰大破之武帝還彭城參相國軍事論平司馬休之及廣固功封陽山縣男元嘉中位太子左衛率卒諡曰壯侯子隆世嗣藩諸子多不遵法度第十四子遵世同孔熙先逆謀文帝以藩功臣不欲顯其事使江州以他事殺之十六子誕世十七子茂世後欲奉庶人義康交州刺史檀和之至豫章討平之劉康祖彭城呂人也世居京口父虔之輕財好施位江夏相宋武帝西征司馬休之及魯宗之宗之子軌襲殺虔之追贈梁秦二州刺史封新康縣男康祖便弓馬膂力絶人以浮蕩蒱酒為事每犯法為郡縣所録輒越屋踰牆莫之能禽夜入人家為有司所圍突圍去並莫敢追因夜還京口半夕便至明旦守門詣府州要職俄而建康移書録之府州執事者並證康祖其夕在京口遂得無恙前後屢被糾劾文帝以勳臣子每原貸之後襲封拜員外郎再坐蒱戲免官孝武為豫州刺史鎮歷陽以康祖為征虜中兵參軍既被委任折節自修歷南平王鑠安蠻府司馬元嘉二十七年魏太武帝親率大衆攻圍汝南文帝遣諸軍救援康祖總統為前驅次新蔡攻破魏軍去懸瓠四十里太武燒營而還轉左軍將軍文帝欲大舉北侵康祖以歲月已晚請待明年上不許其年秋蕭斌王玄謨沈慶之等入河康祖率豫州軍出許洛玄謨等敗歸南平王鑠在壽陽上慮為魏所圍召康祖速反康祖回軍未至壽陽數十里會魏永昌王以長安之衆八萬騎與康祖相及於尉武康祖有八千人乃結車營而進魏軍四面來攻衆分為三且休且戰康祖率厲將士無不一當百魏軍死者太半流血沒踝矢中頭而死於是大敗舉營淪覆免者裁數十人魏人傳康祖首示彭城面如生贈益州刺史諡曰壯康祖伯父簡之有志幹為宋武帝所知帝將謀興復收集才力之士嘗再造簡之會有客簡之悟其意謂虔之曰劉下邳再來必當有意既不得語汝可試往見之及虔之至武帝已剋京口虔之即投義簡之聞之殺耕牛會衆以赴之位太尉咨議參軍簡之弟謙之好學撰晉紀二十卷位廣州刺史太中大夫簡之子道産初為無錫令襲爵晉安縣五等侯元嘉三年纍遷梁南秦二州刺史加都督在州有惠化後為雍州刺史領寧蠻校尉加都督兼襄陽太守善於臨職在雍部政績尤著蠻夷前後不受化者皆順服百姓樂業由此有襄陽樂歌自道産始也卒于官諡曰襄侯道産澤被西土及喪還諸蠻皆備縗絰號哭追送至于沔口長子延孫孝武初位侍中封東昌縣侯纍遷尚書右僕射大明元年除金紫光祿大夫領太子詹事又出為南徐州刺史先是武帝遺詔京口要地去都密邇自非宗室近戚不得居之劉氏之居彭城者分為三里帝室居綏輿里左將軍劉懷肅居安上里豫州刺史劉懷武居叢亭里三里及延孫所居呂縣凡四劉雖同出楚元王由來不序昭穆延孫於帝室本非同宗不應有此授時司空竟陵王誕為徐州上深相畏忌不欲使居京口遷之廣陵廣陵與京口對岸使腹心為徐州據京口以防誕故以南徐州授延孫而與之合族使諸王序親三年南兗州刺史竟陵王誕有罪不受徵延孫馳遣中兵參軍杜幼文赴討及至誕已閉城自守乃還誕遣劉公泰齎書要之延孫斬公泰送首建鄴復遣幼文受沈慶之節度五年詔延孫曰舊京樹親由來常準今此防久弭當以還授小兒乃徵延孫為侍中尚書左僕射領護軍延孫病不任拜赴卒贈司徒給班劍二十人有司奏諡忠穆詔改為文穆子質嗣論曰劉敬宣與宋武恩結龍潛義分早合雖興復之始事隔逢迎而深期久要未之或爽隆赫之任遂止於人存飾終之數無聞於身後恩禮之有厚薄將別有以乎劉懷肅劉懷慎劉粹孫處蒯恩向靖劉鍾虞丘進孟懷玉孟龍符胡藩等或階緣恩舊一其心力或攀附風雲奮其鱗羽咸能振拔塵滓自致封侯詩云無德不報其言信矣康祖門奉興王早裂封壤受委疆埸赴蹈為期道産樹績漢南歷年踰十遺風餘烈有足稱焉覽其行事可謂異迹均美延孫隆名盛寵擇而後授遂以腹心之託自致宗臣之重亦其遇也
