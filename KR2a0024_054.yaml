body:
  text: 南史卷五十四列傳第四十四梁簡文帝諸子元帝諸子簡文二十子王皇后生哀太子大器南郡王大連陳淑容生尋陽王大心左夫人生南海王大臨安陸王大春謝夫人生瀏陽公大雅張夫人生新興王大莊包昭華生西陽王大鈞范夫人生武寧王大威褚修華生建平王大球陳夫人生義安王大昕朱夫人生綏建王大摯其臨川王大款桂陽王大成汝南王大封樂良王大圜並不知母氏潘美人生皇子大訓早亡無封其餘不知不載哀太子大器字仁宗簡文嫡長子也中大通四年封宣城郡王太清二年十月侯景寇建鄴敕太子為臺內大都督三年五月簡文即位六月丁亥立為皇太子大寶二年八月景廢簡文將害太子時景黨稱景命召之太子方講老子將下牀而刑人掩至太子顏色不變徐曰久知此事嗟其晚耳刑者將以衣帶絞之太子曰此不能見殺乃指繫帳竿下繩命取絞之而絶時年二十八太子性寬和兼神用端嶷在賊中每不屈意左右竊問其故答曰賊若未須見殺雖復陵呵叱其終不敢言若見害時至雖一日百拜無益於死問者又曰官今憂逼而神貌怡然未喻此意答曰吾自度死必在賊前若諸叔外來平夷羯寇必前見殺然後就死若其遂開拓上流必先見殺後取富貴何能以無益之愁橫憂必死之命景之西上攜太子同行及敗歸船往往相失所乘船入樅陽浦舟中腹心並勸因此入北太子曰自國家喪敗志不圖生主上蒙塵寧忍違離吾今若去乃是叛父非謂避賊天下豈有無父之國便涕泗鳴咽命即前進賊以太子有器度每憚之恐為後患故先及禍承聖元年四月追諡哀太子祔太廟陰室尋陽王大心字仁恕簡文第二子也幼而聰朗善屬文中大通四年以皇孫封當陽縣公大同元年為都督郢州刺史時年十三簡文以其幼戒之曰事無大小悉委行事大心雖不親州務發言每合於理衆皆驚服太清元年為雲麾將軍江州刺史貪冒財賄不能綏接百姓二年侯景寇都大心招集士卒與上流諸軍赴援宮闕三年臺城陷上甲侯蕭韶南奔宣密詔加散騎常侍進號平南將軍大寶元年封尋陽王初歷陽太守莊鐵以城降侯景既而又奉其母來奔大心以鐵舊將厚為其禮軍旅之事悉以委之以為豫章內史景數遣軍西上寇抄大心輒令鐵擊破之禽其將趙加婁賊不能進時鄱陽王範率衆棄合肥屯于柵口待援兵總集欲俱進大心聞之遣要範西上以盆城處之廩饋甚厚欲與勠力共除禍難會鐵據豫章反大心令中兵參軍韋約討之鐵敗乞降鄱陽世子嗣先與鐵善乃謂範曰昔與鐵遊處其人才略從橫若降江州必不全其首領請援之乃遣將侯瑱救鐵夜破韋約等營大心大懼於是二蕃釁起景將任約略地至盆城大心遣司馬韋質拒戰敗績時帳下猶有勇士千餘人咸説曰既無糧儲難以守固若輕騎往建州以圖後舉策之上也其母陳淑容不從撫胸慟哭大心乃止遂與約和二年將遇害繞牀謂賊廂公王僧貴曰我以全州歸命何忍相苦乃見射而殞臨川王大款字仁師簡文第三子也初封石城縣公位中書侍郎太清三年簡文即位封江夏郡王大寶元年奔江陵湘東王承制改封臨川王魏剋江陵遇害南海王大臨字仁宣簡文帝第四子也大同二年封寧國縣公少而敏慧年十一遭左夫人憂哭泣毀瘠以孝聞後入國學明經射策甲科拜中書侍郎遷給事黃門侍郎十一年長兼侍中出為琅邪彭城二郡太守侯景亂屯端門都督城南諸軍事大寶元年封南海郡王出為都督東揚州刺史又除吳郡太守時張彪起義於會稽吳人陸令公潁川庾孟卿等勸大臨投之大臨曰彪若成功不藉我力如其撓敗以我説焉不可往也二年遇害南郡王大連字仁靖簡文第五子也少俊爽能屬文舉止風流雅有巧思妙達音樂兼善丹青大同二年封臨城縣公七年與南海王俱入國學並射策甲科皆拜中書侍郎十年武帝幸朱方大連與兄大臨並從武帝問曰汝等習騎不對曰臣等未奉詔不敢輒習敕令給馬試之大連兄弟據鞍往還各得馳驟之節帝大説即賜所乘馬及為啓謝辭又甚美帝他日謂簡文曰昨見大臨大連風韻可愛足慰吾老年遷給事黃門侍郎轉侍中太清元年出為東揚州刺史侯景入寇建鄴大連率衆四萬來赴及臺城沒援軍散還東揚州會稽豐沃糧仗山積東人懲景苛虐咸樂為用而大連沈湎于酒宋子仙攻之大連棄城走追及於信安縣大連猶醉弗之覺於是三吳悉為賊有大寶元年封南郡王賊遣將趙伯超劉神茂來攻大連專委部將留異以城應賊大連棄走為賊所獲侯景以為江州刺史二年遇害安陸王大春字仁經簡文第六子也少博涉書記善吹笙天性孝謹體貌瓌偉腰帶十圍大同六年封西豐縣公拜中書侍郎後為寧遠將軍知石頭戍軍事侯景內寇大春奔京口隨邵陵王入援戰于鍾山軍敗肥大不能行為賊所獲大寶元年封安陸郡王出為東揚州刺史二年遇害桂陽王大成字仁和簡文第八子也初封新淦公太清三年簡文即位封山陽郡王大寶元年奔江陵湘東王承制改封桂陽王大成性甚凶粗兼便弓馬至江陵被甲夜出人謂為劫斫之遂失左髻魏剋江陵遇害汝南王大封字仁睿簡文第九子也初封臨汝公太清三年簡文即位封宜都郡王大寶元年奔江陵湘東王承制封汝南王魏剋江陵遇害瀏陽公大雅字仁風簡文第十二子也大同九年封瀏陽縣公少聰警美姿儀特為武帝所愛臺城陷大雅猶命左右格戰賊至漸衆乃自縋而下發憤感疾薨新興王大莊字仁禮簡文第十三子也性躁動大同九年封高唐縣公大寶元年封新興郡王位南徐州刺史二年遇害西陽王大鈞字仁博簡文第十四子也性厚重不妄戲弄年七歲武帝嘗問讀何書對曰學詩因令諷誦即誦周南音韻清雅帝重之因賜王羲之書一卷大寶元年封西陽郡王位丹陽尹二年監揚州遇害武寧王大威字仁容簡文第十五子也美風儀眉目如畫大寶元年封武寧郡王二年為丹陽尹遇害皇子大訓字仁德簡文第十六子也少而腳疾不敢躡履太清三年未封而亡年十歲建平王大球字仁玉簡文帝第十七子也大寶元年封建平郡王性明慧夙成初侯景圍臺城武帝素歸心釋教每發誓願云若有衆生應受諸苦衍身代當時大球年甫七歲聞而驚謂母曰官家尚爾兒安敢辭乃六時禮佛亦云凡有衆生應獲苦報悉大球代受其早慧如此二年遇害義安王大昕字仁朗簡文帝第十八子也年四歲母陳夫人卒便哀毀有若成人晨夕涕泣眼為之傷及武帝崩大昕奉慰簡文嗚噎不自勝左右莫不掩泣大寶元年封義安郡王二年遇害綏建王大摯字仁瑛簡文第十九子也幼雄壯有膽氣及臺城陷乃歎曰大丈夫會當滅虜屬嬭媼驚掩其口曰勿妄言禍將及大摯笑曰禍至非由此大寶元年封二年遇害樂良王大圜簡文第二十子也大寶元年封後入周仕隋位內史侍郎元帝諸子徐妃生武烈世子方等王貴嬪生貞惠世子方諸始安王方略袁貴人生愍懷太子方矩夏貴妃生敬皇帝自餘不顯武烈世子方等字實相元帝長子也少聰敏有俊才善騎射尤長巧思性愛林泉特好散逸嘗著論曰人生處世如白駒過隙耳一壺之酒足以養性一簞之食足以怡形生在蒿蓬死葬溝壑瓦棺石椁何以異茲吾嘗夢為魚因化為鳥方其夢也何樂如之及其覺也何憂斯類良由吾之不及魚鳥者遠矣故魚鳥飛浮任其志性吾之進退在掌握舉首懼觸搖足恐墮若使吾終得與魚鳥同遊則去人間如脫屣耳初徐妃以嫉妬失寵方諸母王氏以冶容幸嬖及王夫人終元帝歸咎徐妃方等意不自安元帝聞之又惡方等方等益懼故述此論以申其志時武帝年高欲見諸王長子元帝遣方等方等欣然升舟冀免憂辱行至繇水遇侯景亂元帝召之方等啓曰昔申生不愛其死方等豈顧其生元帝省書歎息知無還意乃配步騎一萬使援臺城賊每來攻方等必身當矢石城陷方等歸荊州收集士馬甚得衆和元帝始歎其能方等又勸修築城柵以備不虞既成樓雉相望周回七十餘里元帝觀之甚説入謂徐妃曰若更有一子如此吾復何憂徐妃不答垂泣而退元帝忿之因疏其穢行榜于大閣方等入見益以自危時河東王為湘州刺史不受令方等求征之元帝謂曰汝有水厄深宜慎之拜為都督令南討方等臨行謂所親曰吾此段出征必死無二死而獲所吾豈愛生及至麻溪軍敗溺死求尸不得元帝聞之心喜不以為戚後追思其才贈侍中中軍將軍揚州刺史諡忠壯世子並招魂以葬之方等注范曄後漢書未就所撰三十國春秋及篤靜子行於世元帝即位改諡武烈世子封子莊為永嘉王及魏剋江陵莊年甫七歲為人家所匿後王琳迎送建鄴及敬帝立出質于齊敬帝太平二年陳武帝將受禪王琳請莊于齊以主梁嗣自盆城濟江二月即帝位于郢州年號天啓置百官王琳總其軍國明年莊為陳人所敗其御史中丞劉仲威奉以奔壽陽遂入齊齊武平元年授特進開府儀同三司封梁王齊朝許以興復竟不果而齊亡莊在鄴飲氣而死貞惠世子方諸字明智元帝第二子也幼聰警博學明老易善談玄風采清越特為元帝所愛母王氏又有寵及方等敗後元帝謂曰不有所廢其何以興勿以汝兄為念因拜中撫軍將軍以自副又出為郢州刺史鎮江夏以鮑泉為行事時元帝遣徐文盛與侯景將任約相持方諸年十五童心未革恃文盛在近不恤軍政日與鮑泉蒱酒為樂侯景知之乃遣其將宋子仙從間道襲之百姓奔告方諸與鮑泉並不信曰文盛大軍在下虜安得來始命閉門賊已入城方諸方踞泉腹以五色毦辮其鬚子仙執方諸以歸王僧辨軍至蔡洲景遂害之元帝追諡貞惠世子愍懷太子方矩字德規元帝第四子也少勤學美容止初封南安侯太清初纍遷侍中中衛將軍元帝承制拜王太子改名元良承聖元年十一月丙子立為皇太子及升儲位昵狎羣下好著微服嘗入朝公服中著碧絲布袴摳衣高元帝見之大怪遣尚書周弘正責之因使太子師弘正他日弘正謁見元帝問曰太子比頗受卿導不對曰太子聖德乃未極日新幸無大過帝曰卿以我父子故未直言從容之間無失和嶠之對便有廢立計未及行而江陵喪亡遇害太子聰穎凶暴猜忍俱有元帝風敬帝承制追諡愍懷太子始安王方略元帝第十子貞惠世子母弟也母王氏王琳之次姊元帝即位拜貴嬪次妹又為良人並蒙寵幸方略益鍾愛侯景亂元帝結好于魏方略年數歲便遣入關元帝親送近畿執手歔欷既而旋駕憶之賦詩曰如何吾幼子勝衣已別離十日無由宴千里送遠垂至長安即得還贈遺甚厚江陵喪亡遇害貴嬪良人並更誕子未出閣無封失名論曰簡文提挈寇戎元帝崎嶇危亂諸子之備踐艱棘蓋時運之所鍾乎武烈以幹蠱之材居冢嗣之任竟亦當年擯落通塞亦云命也哀哉
