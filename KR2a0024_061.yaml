body:
  text: 南史卷六十一列傳第五十一陳伯之陳慶之子昕暄蘭欽陳伯之濟陰睢陵人也年十三四好著獺皮冠帶刺刀候鄰里稻熟輒偷刈之嘗為田主所見呵之曰楚子莫動伯之曰君稻幸多取一擔何苦田主將執之因拔刀而進曰楚子定何如田主皆反走徐擔稻而歸及年長在鍾離數為劫盜嘗授面覘人船船人斫之獲其左耳後隨鄉人車騎將軍王廣之廣之愛其勇每夜臥下榻征伐常將自隨頻以戰功纍遷驃騎司馬封魚復縣伯梁武起兵東昏假伯之節督前驅諸軍事豫州刺史轉江州據尋陽以拒梁武郢城平武帝使説伯之即以為江州刺史子武牙為徐州刺史伯之雖受命猶懷兩端帝及其猶豫逼之伯之退保南湖然後歸附與衆軍俱下建康城未平每降人出伯之輒喚與耳語帝疑其復懷翻覆會東昏將鄭伯倫降帝使過伯之謂曰城中甚忿卿欲遣信誘卿須卿降當生割卿手腳卿若不降復欲遣刺客殺卿伯之大懼自是無異志矣城平封豐城縣公遣之鎮伯之不識書及還江州得文牒辭訟唯作大諾而已有事典籤傳口語與奪決於主者伯之與豫章人鄧繕永興人戴承忠並有舊繕經藏伯之息免禍伯之尤德之及在州用繕為別駕承忠為記室參軍河南褚𥱰都下之薄行者武帝即位頻造尚書范雲雲不好𥱰堅拒之𥱰益怒私語所知曰建武以後草澤底下悉成貴人吾何罪而見棄今天下草創喪亂未可知陳伯之擁強兵在江州非代來臣有自疑之意且復熒惑守南斗詎非為我出今者一行事若無成入魏何減作河南郡於是投伯之書佐王思穆事之大見親狎及伯之鄉人朱龍符為長流參軍並乘伯之愚暗恣行姦險伯之子武牙時為直閣將軍武帝手疏龍符罪親付武牙武牙封示伯之帝又遣代江州別駕鄧繕伯之並不受命曰龍符健兒鄧繕在事有績臺所遣別駕請以為中從事繕於是日夜説伯之云臺家府庫空竭無復器仗三倉無米此萬世一時機不可失𥱰承忠等每贊成之伯之謂繕今段啓卿若復不得便與卿共下使反武帝敕部內一郡處繕伯之於是集府州佐史謂曰奉齊建安王教率江北義勇十萬已次六合見使以江州見力運糧速下我荷明帝厚恩誓以死報使𥱰詐為蕭寶寅書以示僚佐於聽事前為壇殺牲以盟伯之先歃長史以下次第歃𥱰説伯之今舉大事宜引人望程元沖不與人同心臨川內史王觀僧虔之孫人身不惡可召為長史以代元沖伯之從之仍以𥱰為尋陽太守承忠輔義將軍龍符豫州刺史豫章太守鄭伯倫起郡兵拒守程元沖既失職於家合率數百人使伯之典籤呂孝通戴元則為內應伯之每旦常作伎日晡輒臥左右仗身皆休息元沖因其解弛從北門入徑至聽事前伯之聞叫自率出蕩元沖力不能敵走逃廬山伯之遣使還報武牙兄弟武牙等走盱眙盱眙人徐文安莊興紹張顯明邀擊之不能禁反見殺武帝遣王茂討伯之敗走間道亡命出江北與子武牙及褚𥱰俱入魏魏以伯之為使持節散騎常侍都督淮南諸軍事平南將軍光祿大夫曲江縣侯天監四年詔太尉臨川王宏北侵宏命記室丘遲私與之書曰陳將軍足下無恙幸甚幸甚將軍勇冠三軍才為世出棄燕雀之毛羽慕鴻鵠以高翔昔因機變化遭遇時主立功立事開國稱孤朱輪華轂擁旄萬里何其壯也如何一旦為奔亡之虜聞鳴鏑而股戰對穹廬以屈膝又何劣邪尋君去就之際非有他故直以不能內審諸己外受流言沈迷猖蹶以至於此聖朝赦罪責功棄瑕録用推赤心於天下安反側於萬物此將軍之所知非假僕一二談也昔朱鮪涉血於友于張繡倳刃於愛子漢主不以為疑魏君待之若舊況將軍無昔人之罪而勳重於當代夫迷塗知反往哲是與不遠而復先典攸高主上屈法申恩吞舟是漏將軍松柏不翦親戚安居高堂未傾愛妾尚在悠悠爾心亦何可言當今功臣名將雁行有序佩紫懷黃讚帷幄之謀乘軺建節奉疆埸之任並刑馬作誓傳之子孫將軍獨靦顏借命驅馳氈裘之長寧不哀哉夫以慕容超之強身送東市姚泓之盛面縛西都故知霜露所均不育異類姬漢舊邦無取雜種北虜僭號中原多歷年所惡積禍盈理至焦爛況偽孽昏狡自相夷戮部落攜離酋豪猜二方當係頸蠻邸縣首藁街而將軍魚遊於沸鼎之中燕巢於飛幕之上不亦惑乎暮春三月江南草長雜花生樹羣亂飛見故國之旗鼓感生平於疇日撫絃登陴豈不愴恨所以廉公之思趙將吳子之泣西河人之情也將軍獨無情哉想早勵良規自求多福當今皇帝盛明天下安樂白環西獻楛矢東來夜郎滇池解辮請職朝鮮昌海蹶角受化唯北狄野心掘強沙塞之間欲延歲月之命耳中軍臨川殿下明德茂親總茲戎重方弔人洛汭伐罪秦中若遂不改方思僕言聊布往懷君其詳之伯之得書乃於壽陽擁衆八千歸降武牙為魏人所殺伯之既至以為平北將軍西豫州刺史永新縣侯未之任復為驍騎將軍又為太中大夫久之卒於家其子猶有在魏者褚𥱰在魏魏人欲用之魏元會𥱰戲為詩曰帽上著籠冠袴上著朱衣不知是今是不知非昔非魏人怒出為始平太守日日行獵墮馬而死陳慶之字子雲義興國山人也幼隨從梁武帝帝性好每從夜至旦不輟等輩皆寐唯慶之不寢聞呼即至甚見親賞從平建鄴稍為主書散財聚士思立效除奉朝請普通中魏徐州刺史元法僧於彭城求入內附以慶之為武威將軍與胡龍牙成景俊率諸軍應接還除宣猛將軍文德主帥仍率軍送豫章王綜入鎮徐州魏遣安豐王元延明臨淮王元彧率衆十萬來拒延明先遣其別將丘大千觀兵近境慶之擊破之後豫章王棄軍奔魏慶之乃斬關夜退軍士獲全普通七年安西將軍元樹出征壽春除慶之假節總知軍事魏豫州刺史李憲遣其子長鈞別築兩城相拒慶之攻拔之憲力屈遂降慶之入據其城轉東宮直閣大通元年隸領軍曹仲宗伐渦陽魏遣常山王元昭等來援前軍至駝澗去渦陽四十里韋放曰賊鋒必是輕鋭戰捷不足為功如不利沮我軍勢不如勿擊慶之曰魏人遠來皆已疲倦須挫其氣必無不敗之理於是與麾下五百騎奔擊破其前軍魏人震恐慶之還共諸將連營西進據渦陽城與魏相持自春至冬各數十百戰師老氣衰魏之援兵復欲築壘於軍後仲宗等恐腹背受敵謀退慶之杖節軍門曰須虜圍合然後與戰若欲班師慶之別有密敕仲宗壯其計乃從之魏人掎角作十三城慶之陷其四壘九城兵甲猶盛乃陳其俘馘鼓譟攻之遂奔潰斬獲略盡渦水咽流詔以渦陽之地置西徐州衆軍乘勝前頓城父武帝嘉焉手詔慰勉之大通初魏北海王元皓來降武帝以慶之為假節飈勇將軍送皓還北皓於渙水即魏帝號授慶之前軍大都督自銍縣進遂至睢陽魏將丘大千有衆七萬分築九壘以拒慶之自旦至申攻陷其三大千乃降時魏濟陰王元暉業率羽林庶子二萬人來救梁宋進屯考城慶之攻陷其城禽暉業仍趣大梁皓進慶之徐州刺史武都郡王仍率衆而西魏左僕射楊昱等率御仗羽林宗子庶子衆七萬據滎陽拒皓兵強城固魏將元天穆大軍復將至先遣其驃騎將軍爾朱兆騎將魯安等援楊昱又遣右僕射爾朱世隆西荊州刺史王羆據虎牢時滎陽未拔士衆皆恐慶之乃解鞍秣馬宣喻衆曰我等才有七千賊衆四十餘萬今日之事義不圖存須平其城壘一鼓悉使登城壯士東陽宋景休義興魚天愍踰堞而入遂剋之俄而魏陳外合慶之率精兵三千大破之魯安於陳乞降天穆兆單騎獲免進赴虎牢爾朱世隆棄城走魏孝莊出居河北其臨淮王彧安豐王延明率百僚備法駕迎皓入洛陽宮御前殿改元大赦皓以慶之為車騎大將軍魏上黨王元天穆又攻拔大梁分遣王老生費穆據虎牢刁宣刁雙入梁宋慶之隨方掩襲並降天穆與十餘騎北度河慶之麾下悉著白袍所向披靡先是洛中謠曰名軍大將莫自牢千兵萬馬避白袍自發銍縣至洛陽十四旬平三十二城四十七戰所向無前初魏莊帝單騎度河宮衛嬪侍無改於常皓既得志荒于酒色不復視事與安豐臨淮計將背梁以時事未安且資慶之力用慶之心知之乃説皓曰今遠來至此未伏尚多宜啓天子更請精兵并勒諸州有南人沒此者悉須部送皓欲從之元延明説皓曰慶之兵不出數千已自難制今更增其衆寧肯為用魏之宗社於斯而滅皓由是疑慶之乃密啓武帝停軍洛下南人不出一萬魏人十倍軍副馬佛念言於慶之曰勳高不賞震主身危二事既有將軍豈得無慮今將軍威震中原聲動河塞屠皓據洛則千載一時慶之不從皓前以慶之為徐州刺史因求之鎮皓心憚之遂不遣魏將爾朱榮爾朱世隆元天穆爾朱兆等衆號百萬挾魏帝來攻皓皓據洛陽六十五日凡所得城一時歸魏慶之度河守北中郎城三日十一戰傷殺甚衆榮將退還時有善天文人劉靈助謂榮曰不出十日河南大定榮乃為濟自硤石與皓戰於河橋皓大敗走至臨潁被禽洛陽復入魏慶之馬步數千結陳東反榮親自來追軍人死散慶之乃落鬚髮為沙門間行至豫州州人程道雍等潛送出汝陰至都仍以功除右衛將軍封永興侯出為北兗州刺史都督緣淮諸軍事會有祅賊沙門僧強自稱為帝土豪蔡伯寵起兵應之攻陷北徐州詔慶之討焉慶之斬伯寵僧強傳其首中大通二年除南北司二州刺史加都督慶之至鎮遂圍縣瓠破魏潁州刺史婁起揚州刺史是云寶於溱水又破行臺孫騰豫州刺史堯雄梁州刺史司馬恭於楚城罷義陽鎮兵停水陸轉運江湘諸州並得休息開田六千頃二年之後倉廩充實又表省南司州復安陸郡置上明郡大同二年魏遣將侯景攻下楚州執刺史桓和景仍進軍淮上慶之破之時大寒雪景棄輜重走是歲豫州飢慶之開倉振給多所全濟州人李升等八百人表求樹碑頌德詔許焉五年卒諡曰武慶之性祗慎每奉詔敕必洗沐拜受儉素不衣紈綺不好絲竹射不穿札馬非所便而善撫軍士能得其死力長子昭嗣梁世寒門達者唯慶之與俞藥藥初為武帝左右帝謂曰俞氏無先賢世人云俞錢非君子所宜改姓喻藥曰當令姓自於臣歷位雲旗將軍安州刺史慶之第五子昕字君章七歲能騎射十二隨父入洛遇疾還都詣鴻臚卿朱索索訪北間事昕聚土畫城指麾分別索甚奇之慶之在縣瓠魏驍將堯雄子寶樂特為敢勇求單騎校戰昕躍馬直趣寶樂雄即潰散後為臨川太守太清二年侯景圍歷陽敕召昕還昕啓云采石急須重鎮王質水軍輕弱恐虜必濟乃板昕為雲騎將軍代質未及下渚景已度江為景所禽令收集部曲將用之昕誓而不許景使其儀同范桃棒嚴禁之昕因説桃棒令率所領歸降襲殺王偉宋子仙桃棒許之遂立盟射城中遣昕夜縋而入武帝大喜敕即受降簡文遲疑纍日不決外事泄昕弗之知猶依期而下景邀得之逼昕令更射書城中云桃棒且輕將數十人先入景欲裹甲隨之昕不從遂見害少弟暄學不師受文才俊逸尤嗜酒無節操遍歷王公門沈湎喧譊過差非度其兄子秀常憂之致書於暄友人何胥冀以諷諫暄聞之與秀書曰旦見汝書與孝典陳吾飲酒過差吾有此好五十餘年昔吳國張長公亦稱耽嗜吾見張時伊已六十自言引滿大勝少年時吾今所進亦多於往日老而彌篤唯吾與張季舒耳吾方與此子交歡於地下汝欲夭吾所志邪昔阮咸阮籍同遊竹林宣子不聞斯言王湛能玄言巧騎武子呼為癡叔何陳留之風不嗣太原之氣巋然翻成可怪吾既寂漠當世朽病殘年産不異於顏原名未動於卿相若不日飲醇酒復欲安歸汝以飲酒為非吾以不飲酒為過昔周伯仁度江唯三日醒吾不以為少鄭康成一飲三百杯吾不以為多然洪醉之後有得有失成厮養之志是其得也使次公之狂是其失也吾常譬酒之猶水亦可以濟舟亦可以覆舟故江咨議有言酒猶兵也兵可千日而不用不可一日而不備酒可千日而不飲不可一飲而不醉美哉江公可與共論酒矣汝驚吾墯馬侍中之門陷池武陵之第遍布朝野自言焦悚丘也幸苟有過人必知之吾生平所願身沒之後題吾墓云陳故酒徒陳君之神道若斯志意豈避南征之不復賈誼之慟哭者哉何水曹眼不識杯鐺吾口不離瓢杓汝寧與何同日而醒與吾同日而醉乎政言其醒可及其醉不可及也速營糟丘吾將老焉爾無多言非爾所及暄以落魄不為中正所品久不得調陳天康中徐陵為吏部尚書精簡人物縉紳之士皆嚮慕焉暄以玉帽簪插髻紅絲布裹頭袍拂踝靴至膝不陳爵里直上陵坐陵不之識命吏持下暄徐步而出舉止自若竟無怍容作書謗陵陵甚病之後主之在東宮引為學士及即位遷通直散騎常侍與義陽王叔達尚書孔範度支尚書袁權侍中王瑳金紫光祿大夫陳褒御史中丞沈瓘散騎常侍王儀等入禁中陪侍遊宴謂為狎客暄素通脫以俳優自居文章諧謬語言不節後主甚親昵而輕侮之嘗倒縣于梁臨之以刃命使作賦仍限以晷刻暄援筆即成不以為病而弄轉甚後主稍不能容後遂搏艾為帽加于其首火以爇之然及於髮垂泣求哀聲聞于外而弗之釋會衛尉卿柳莊在坐遽起撥之拜謝曰陳暄無罪臣恐陛下有玩人之失輒矯赦之造次之愆伏待刑憲後主素重莊意稍解敕引暄出命莊就坐經數日暄發悸而死蘭欽字休明中昌魏人也幼而果決趫捷過人宋末隨父子雲在洛陽於市騎徆後子雲還南梁天監中以軍功至冀州刺史欽兼文德主帥征南中五郡諸洞反者所至皆平欽有謀略勇決善戰步行日二百里勇武過人善撫馭得人死力以軍功封安懷縣男纍遷都督梁南秦二州刺史進爵為侯征梁漢事平進號智武將軍改授都督衡州刺史未及述職會西魏攻圍南鄭梁州刺史杜懷寶來請救欽乃大破魏軍追入斜谷斬獲略盡魏相安定公遣致馬二千匹請結鄰好欽百日之中再破魏軍威振鄰國詔加散騎常侍仍令述職經廣州因破俚帥陳文徹兄弟並禽之至衡州進號平南將軍改封曲江縣公在州有惠政吏人詣闕請立碑頌德詔許焉後為廣州刺史前刺史新渝侯映之薨南安侯恬權行州事冀得即真及聞欽至嶺原貨人塗刀以毒削瓜進之欽及愛妾俱死帝聞大怒檻車收恬削爵土欽子夏禮侯景至歷陽率其部曲邀景兵敗死之論曰陳伯之雖輕狡為心而勇徑自立其纍至爵位蓋有由焉及喪亂既平去就不已卒得其死亦為幸哉慶之初同燕雀之遊終懷鴻鵠之志及乎一見任委長驅伊洛前無強陳攻靡堅城雖南風不競晚致傾覆其所剋捷亦足稱之蘭欽戰有先鳴位非虛受終逢鴆毒唯命也夫
