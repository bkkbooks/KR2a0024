body:
  text: 南史卷五十二列傳第四十二梁宗室下安成康王秀子機機弟推南平元襄王偉子恪恪弟恭恭子靜恭弟祗鄱陽忠烈王恢子範範子嗣範弟咨咨弟修修弟泰始興忠武王憺子亮亮弟映映弟曄安成康王秀字彥達文帝第七子也年十三吳太妃亡秀母弟始興王憺時年九歲與秀並以孝聞居喪纍日不進飲文帝親取粥授之哀其早孤命側室陳氏並母二子陳亦無子有母德視二子如己生秀美風儀性方靜雖左右近侍非正衣冠弗之見由是親友及家人咸敬焉仕齊為太子舍人長沙王懿平崔慧景後為尚書令居端右衡陽王暢為衛尉掌管籥東昏日夕逸遊衆頗勸懿廢之懿弗聽東昏左右惡懿勳高又慮廢立並間懿懿亦危之自是諸親咸為之備及難作臨川王宏以下諸弟姪俱隱人間罕有發泄唯桂陽王融及禍武帝兵至新林秀及諸親並自拔赴軍建康平為南徐州刺史天監元年封安成郡王京口自崔慧景亂後纍被兵革人戶流散秀招懷撫納惠愛大行仍屬飢年以私財贍百姓所濟甚多六年為江州刺史將發主者求堅船以為齋舫秀曰吾豈愛財而不愛士乃教以牢者給參佐下者載齋物既而遭風齋舫遂破及至州聞前刺史取徵士陶潛曾孫為里司歎曰陶潛之德豈可不及後胤即日辟為西曹時夏水泛長津梁斷絶外司請依舊僦度收其價秀教曰刺史不德水潦為患可利之乎給船而已七年遭慈母陳太妃憂詔起視事尋遷荊州刺史加都督立學校招隱逸辟處士河東韓懷明南平韓望南郡庾承先河東郭麻等是歲魏縣瓠城人反殺豫州刺史司馬悅引司州刺史馬仙琕仙琕籤荊州求應赴衆咸謂宜待臺報秀曰彼待我為援援之宜速待敕非應急也即遣兵赴之及沮水暴長頗敗人田秀以穀二萬斛贍之使長史蕭琛簡州貧老單丁吏一日散遣百餘人百姓甚悅荊州嘗苦旱咸欲徙市開渠秀乃責躬親祈楚望俄而甘雨即降遂獲有年又武寧太守為弟所殺乃偽云土反秀照其姦慝望風首款咸謂之神於荊州起天居寺以武帝遊梁館也及去任行次大雷風波暴起船艫淪溺秀所問唯恐傷人十三年為郢州刺史加都督郢州地居衝要賦斂殷煩人力不堪至以婦人供作秀務存約己省去遊費百姓安堵境內晏然夏口常為戰地多暴露骸骨秀於黃鶴樓下祭而埋之一夜夢數百人拜謝而去每冬月常作襦袴以賜凍者時司州叛蠻田魯生魯賢超秀據蒙籠來降武帝以魯生為北司州刺史魯賢北豫州刺史超秀定州刺史為北境捍蔽而魯生超秀互相讒毀有去就心秀撫喻懷納各得其用當時賴之遷雍州刺史在路薨武帝聞之甚痛悼焉遣南康王績緣道迎候初秀之西也郢州人相送出境聞其疾百姓商賈咸為請命及薨四州人裂裳為白帽哀哭以迎送之雍州蠻迎秀聞薨祭哭而去喪至都贈司空諡曰康秀美容儀每在朝百僚屬目性仁恕喜慍不形於色左右嘗以石擲殺所養鵠齋帥請按其罪秀曰吾豈以鳥傷人在都旦臨公事人進食誤覆之去而登車竟朝不飯亦弗之誚也時諸王並下士建安安成二王尤好人物世以二安重士方之四豪秀精意學術搜集經記招學士平原劉孝標使撰類苑書未及畢而已行於世秀於武帝布衣昆弟及為君臣小心畏敬過於疏賤者帝益以此賢之少偏孤於始興王憺尤篤憺久為荊州刺史常以所得奉中分秀秀稱心受之不辭多也昆弟之睦時議歸之佐史夏侯亶等表立墓碑志詔許焉當世高才遊王門者東海王僧孺吳郡陸倕彭城劉孝綽河東裴子野各製其文欲擇用之而咸稱實録遂四碑並建世子機嗣機字智通位湘州刺史薨於州機美姿容善吐納家既多書博學強記然而好弄尚力遠士子邇小人為州專意聚斂無政績頻被案劾將葬有司請諡詔曰王好內怠政宜諡曰煬所著詩賦數千言元帝集而序之子操嗣機弟推字智進少清敏好屬文深為簡文所親賞普通六年以王子封南浦侯歷淮南晉陵吳郡太守所臨必赤地大旱吳人號旱母焉侯景之亂守東府城陷推握節死之南平元襄王偉字文達文帝第八子也幼清警好學仕齊為晉安王驃騎外兵參軍武帝為雍州慮天下將亂求迎偉及始興王憺俄聞已入沔帝欣然謂佐史曰阿八十一行至吾無憂矣及起兵留行雍州州府事及帝剋郢魯下尋陽圍建鄴而巴東太守蕭惠訓子璝及巴西太守魯休烈起兵逼荊州蕭穎胄憂憤暴卒西朝凶懼徵兵於偉偉乃割州府將吏配始興王憺往赴之憺至璝等皆降齊和帝詔以偉為都督雍州刺史天監元年封建安王初武帝軍東下用度不足偉取襄陽寺銅佛毀以為錢富僧藏鏹多加毒害後遂惡疾十三年纍遷為左光祿大夫加親信四十人歲給米萬斛藥直二百四十萬供月二十萬並二衛兩營雜役二百人倍先置防閣白直左右職局一百人以疾甚故不復出蕃而加奉秩十五年所生母陳太妃薨毀頓過禮水漿不入口纍日帝每臨幸抑譬之偉雖奉詔而殆不勝喪惡疾轉增因求改封十七年改封南平郡位侍中左光祿大夫開府儀同三司中大通四年為中書令大司馬薨贈侍中太宰諡曰元襄偉性端雅持軌度少好學篤誠通恕趨賢重士常如弗及由是四方遊士當時知名者莫不畢至疾亟喪明便不復出齊世青溪宮改為芳林苑天監初賜偉為第又加穿築果木珍奇窮極雕靡有侔造化立遊客省寒暑得宜冬有籠爐夏設飲扇每與賓客遊其中命從事中郎蕭子範為之記梁蕃邸之盛無過焉而性多恩惠尤愍窮乏常遣腹心左右歷訪閭里人士有貧困吉凶不舉者即遣贍恤之平原王曼穎卒家貧無以殯友人江革往哭之其妻兒對革號訴革曰建安王當知必為營理言未訖而偉使至給其喪事得周濟焉每祁寒積雪則遣人載樵米隨乏絶者賦給之晚年崇信佛理尤精玄學著二旨義製性情幾神等論其義僧寵及周捨殷鈞陸倕並名精解而不能屈朝廷得失時有匡正子姪邪僻義方訓誘斯人斯疾而不得助主興化梁政漸替自公薨焉世子恪嗣世子恪字敬則弘雅有風則姿容端麗位雍州刺史年少未間庶務委之羣下百姓每通一辭數處輸錢方得聞徹賓客有江仲舉蔡薳王臺卿庾仲容四人俱被接遇並有蓄積故人間歌曰江千萬蔡五百王新車庾大宅遂達武帝帝接之曰主人憒憒不如客尋以廬陵王代為刺史恪還奉見武帝以人間語問之恪大慚不敢一言後折節學問所歷以善政稱太清中為郢州刺史及亂邵陵王至郢恪郊迎之讓位焉邵陵不受及王僧辨至郢恪歸荊州元帝以為尚書令司空賊平為揚州刺史時帝未遷都以恪宗室令譽故先使歸鎮社稷大寶三年薨于長沙未之鎮也贈太尉諡曰靖節王恪弟恭恭字敬範天監八年封衡山縣侯初樂山侯正則有罪敕讓諸王獨謂元襄王曰汝兒非直無過並有義方歷位監南徐州事時衡州刺史武會超在州子姪縱暴州人朱朗聚黨反武帝以恭為刺史時朗已圍始興恭至緩服徇賊示以恩信羣賊伏其勇是夜退三舍以避軍吏請追恭曰賊以政苛致叛非有陳吳之心緩之則自潰急之則並力諸君置之明日朗遣使請降恭杖節受之一無所問即日收始興太守張寶生及會超弟之子子仁斬之軍門以其賄而虐也有司奏恭縱罪人專戮二千石有詔宥之遷湘州刺史善解吏事所在見稱而性尚華侈廣營第宅重齋步閣模寫宮殿尤好賓友酣宴終辰坐客滿筵言談不倦時元帝居蕃頗事聲譽勤心著述巵酒未嘗妄進恭每從容謂曰下官歷觀時人多有不好歡興乃仰眠牀上看屋梁而著書千秋萬歲誰傳此者勞神苦思竟不成名豈如臨清風對朗月登山泛水肆意酣歌也尋除寧蠻校尉雍州刺史便道之鎮簡文少與恭遊特被賞狎至是手令勗以政事恭至州政績有聲百姓請於城南立碑頌德詔許焉名為政德碑是夜聞數百人大叫碑石下明旦視之碑涌起一尺恭命以大柱置于碑上使力士數十人抑之不下又以酒脯祭之使人守視俄而自復視者竟不見之恭聞而惡焉先是武帝以雍為邊鎮運數州粟以實儲倉恭乃多取官米還贍私宅又典籤陳保印侵剋百姓為荊州刺史廬陵王所啓被詔徵還在都朝謁白服隨列帝曰白衣者為誰對曰前衡山侯恭帝厲色曰不還我陳保印吾當白汝未已而保印實投湘東王王改其姓名曰袁逢恭竟不用侯景亂卒於城中詔特復本封元帝追諡曰僖侯子靜字安仁少有美名號為宗室後進有文才而篤志好學既內足於財多聚經史散書滿席手自讎校何敬容欲以女妻之靜忌其太盛拒而不納時論服焉然好戲笑輕論人物時以此少之位給事黃門侍郎深為簡文所愛賞太清三年卒贈侍中恭弟祗字敬謨美風儀幼有令譽天監中封定襄縣侯後歷位北兗州刺史侯景亂與從弟湘潭侯退謀起兵內援會州人反城應景祗遂奔東魏鄱陽忠烈王恢字弘達文帝第十子也幼聰穎七歲能通孝經論語義發擲無遺及長美風儀涉獵史籍仕齊位北中郎外兵參軍前軍主簿宣武王之難逃在都下武帝起兵恢藏伏得免大軍至新林乃奉迎天監元年封鄱陽郡王除郢州刺史加都督初郢城內疾疫死者甚多不及藏殯恢下車遽命埋瘞又遣四使巡行州部境內大寧時有進筒中布者恢以奇貨異服即命焚之於是百姓仰德纍遷都督益州刺史成都去新城五百里陸路往來悉訂私馬百姓患焉纍政不能改恢乃市馬千匹以付所訂之家須則以次發之百姓賴焉再遷開府儀同三司都督荊州刺史普通七年薨於州詔贈侍中司徒諡曰忠烈恢美容質善談笑愛文酒有士大夫風則所在雖無皎察亦不傷物有孝性初鎮蜀所生費太妃猶停都後於都不豫恢未之知一夜忽夢還侍疾及覺憂惶廢寢食俄而都信至太妃已瘳後有目疾久廢視瞻有道人慧龍得療眼術恢請之及至空中忽見聖僧及慧龍下針豁然開朗咸謂精誠所致恢性通恕輕財好施凡歷四州所得奉祿隨而散之在荊州嘗從容問賓僚曰中山好酒趙王好吏二者孰愈衆未有對者顧謂長史蕭琛曰漢時王侯蕃屏而已視事親人自有其職中山聽樂可得任性彭祖代吏近於侵官今之王侯不守蕃國當佐天子臨人清白其優乎坐者咸服有男女百人男封侯者三十九人女主三十八人世子範嗣範字世儀溫和有器識為衛尉卿每夜自巡警武帝嘉其勞苦出為益州刺史行至荊州而忠烈王薨因停自解武帝不許詔權監荊州及湘東王至範依舊述職遣弟湘潭侯退隨喪而下大同元年以開通劍道剋復華陽增封尋徵為領軍將軍侍中範雖無學術而以籌略自命愛奇玩古招集文才率意題章亦時有奇致嘗得舊琵琶題云齊竟陵世子範嗟人往物存攬筆為詠以示湘東王王吟咏其辭作琵琶賦和之後為都督雍州刺史範作牧蒞人甚得時譽撫循將士盡獲歡心於是養士馬修城郭聚軍糧於私邸時廬陵王為荊州既是都督府又素不相能乃啓稱範謀亂範亦馳啓自理武帝恕焉時論者猶謂範欲為賊又童謠云莫匆匆且寬公誰當作天子草覆車邊已時武帝年高諸王莫肯相服簡文雖居儲二亦不自安而與司空邵陵王綸特相疑阻綸時為丹陽尹威震都下簡文乃選精兵以衛宮內兄弟相二聲聞四方範以名應謠言而求為公未幾加開府儀同三司範心密喜以為謠驗武帝若崩諸王必亂範既得衆又有重名謂可因機以定天下乃更收士衆希望非常太清元年大舉北侵初謀元帥帝欲用範時朱虉取急外還聞之遽入曰嗣王雄豪蓋世得人死力然所至殘暴非常非弔人之材昔陛下登北顧亭以望謂江右有反氣骨肉為戎首今日之事尤宜詳擇帝默然曰會理何如對曰陛下得之臣無恨矣會理懦而無謀所乘襻輿施版屋冠以牛皮帝聞不悅行至宿預貞陽侯明請行又以明代之而以範為征北大將軍總督漢北征討諸軍事尋遷南豫州刺史侯景敗於渦陽退保壽陽乃改範為合州刺史鎮合肥時景不臣迹露範屢啓言之朱虉每抑而不奏及景圍都範遣世子嗣與裴之高等入援遷開府儀同三司臺城不守範乃棄合肥出守東關請兵于魏遣二子為質魏人據合肥竟不助範範進退無計乃泝流西上軍於樅陽遣信告尋陽王大心大心要還九江欲共兵西上範得書大喜乃引軍至盆城以晉熙為晉州遣子嗣為刺史江州郡縣輒更改易於是尋陽政令所行唯存一郡又疑畏範市糴不通範乃復遣其弟觀寧侯永將兵通南川助莊鐵時二鎮相猜無復圖賊之志範數萬之衆皆無復食人多餓死範竟發背而薨衆祕不發喪奉弟南安侯恬為主有衆數千範將侯瑱襲莊鐵於豫章殺之盡並其軍乃迎喪往郡於松門遇風柩沈于水鈎求得之及于慶之逼豫章侯瑱以範子十六人降賊賊盡於石頭坑殺之世子嗣字長胤容貌豐偉腰帶十圍性驍果有膽略倜儻不護細行而復傾身養士皆得死力範之薨也嗣猶據晉熙城中食盡士皆乏絶侯景遣任約攻嗣時賊方盛咸勸且止嗣按劍叱之曰今日之戰蕭嗣效命死節之秋也及戰遇流矢中頸不許拔帶箭手殺數人賊退方命拔之應時氣絶妻子為任約所禽初範既與尋陽王大心相持及嗣之死猶未敢發範喪範弟咨字世恭位衛尉卿封武林侯簡文即位之後景周衛轉嚴外人莫得見唯咨及王克殷不害並以文弱得出入臥內晨昏左右天子與之講論六藝不輟於時及南康王會理事敗克不害懼禍乃自疏咨不忍離帝朝覲無絶賊惡之令其仇人刁戌刺殺咨於廣莫門外咨弟修字世和封宜豐侯局力貞固風儀嚴整九歲通論語十一能屬文鴻臚卿裴子野見而賞之性至孝年十二丁所生徐氏艱自荊州反葬中江遇風前後部伍多致沈溺修抱柩長號血淚俱下隨波搖蕩終得無他葬訖因廬墓次先時山中多猛獸至是絶迹野鳥馴狎棲宿簷宇武帝嘉之以班告宗室為兼衛尉卿美姿貌每屯兵周衛武帝視之移輦初嗣王範為衛尉夜中行城常因風便鞭箠宿衛欲令帝知其勤及修在職夜必再巡而不欲人知或問其故曰夜中警逴實有其勞主上慈愛聞之容或賜止違詔則不可奉詔則廢事且胡質之清尚畏人知此職司之常何足自顯聞者歎服時王子侯多為近畿小郡歷試有績乃得出為邊州帝以修識量宏達自衛尉出鎮鍾離徙為梁秦二州刺史在漢中七年移風改俗人號慈父長史范洪胄有田一頃將秋遇蝗修躬至田所深自咎責功曹史琅邪王廉勸修捕之修曰此由刺史無德所致捕之何補言卒忽有飛鳥千羣蔽日而至瞬息之間食蟲遂盡而去莫知何鳥適有臺使見之具言於帝璽書勞問手詔曰犬牙不入無以過也州人表請立碑頌德嗣王範在盆城頗有異論武陵王大生疑防流言噂修深自分釋求送質子並請助防武陵王乃遣從事中郎蕭固咨以當世之事具觀修意修泣涕為言忠臣孝子之節王敬納之故終修之時不為不義一夕忽有狗據修所臥牀而臥修曰此其戎乎因大修城壘承聖元年魏將達奚武來攻修遣記室參軍劉璠至益州求救於武陵王紀遣將楊乾運援之拜修隨郡王璠還至嶓冢乃降于魏乾運班師璠至城下説城中降魏修數之曰卿不能死節反為説客邪命射之間信遣至荊州元帝遣與相聞修中直兵參軍陳晷甚勇有口求為覘候見獲以辭烈被害乃遣咨議虞馨致武牛酒武謂曰梁已為侯景所敗王何為守此孤城修答守之以死誓為斷頭將軍魏相安定公宇文泰遣書喻之力屈乃降安定公禮之甚厚未幾令還江陵厚遣之以文武千家為綱紀之僕元帝慮其為變中使覘伺不絶於道至之夕命劫竊之及旦修表輸馬仗而後帝安修入覲望閣悲不自勝元帝亦慟盡朝皆泣尋拜湘州刺史長沙頻遇兵荒人戶凋弊修勸穡務分未期流人至者三千餘家元帝多忌動加誅翦修靜恭自守埋聲晦迹元帝亦以宗室長年深相敬禮及江陵被圍問至即日登舟赴救至巴陵西而江陵覆滅敬帝立遙授修太尉遷太保時王室浸微修雖圖義舉力弱不能自振遂發背歐血而薨年五十二修弟泰字世怡封豐城侯歷位中書舍人傾竭財産以事時要超為譙州刺史江北人情獷強前後刺史並綏撫之泰至州便遍發人丁使擔腰輿扇繖等物不限士庶恥為之者重加杖責多輸財者即放免之於是人皆思亂及侯景至人無戰心乃先覆敗始興忠武王憺字僧達文帝第十一子也仕齊為西中郎外兵參軍武帝起兵憺為相國從事中郎與南平王偉留守齊和帝即位以憺為給事黃門侍郎時巴東太守蕭惠訓子璝等兵逼荊州蕭穎胄暴卒尚書僕射夏侯詳議迎憺行荊州事憺率雍州將吏赴之以書喻璝等皆降是冬武帝平建鄴明年和帝詔以憺為都督荊州刺史天監元年加安西將軍封始興郡王時軍旅之後公私匱乏憺厲精為政廣闢屯田減省力役存問兵死之家供其窮困人甚安之是歲嘉禾生一莖六穗甘露降于黃閣四年荊州大旱憺使祠于天井有巨蛇長二丈出繞祠壇俄而注雨歲大豐憺自以少年始居重任開導物情辭訟者皆立待符教決於俄頃曹無留事下無滯獄六年州大水江溢堤壞憺親率將吏冒雨賦丈尺築之而雨甚水壯衆皆恐或請避焉憺曰王尊尚欲身塞河堤我獨何心以免乃登堤歎息終日輟膳刑白馬祭江神酹酒於流以身為百姓請命言終而水退堤立邴洲在南岸數百家見水長驚走登屋緣樹憺募人救之一口賞一萬估客數十人應募洲人皆以免吏人歎服咸稱神勇又分遣諸郡遭水死者給棺槥失田者與糧種是歲嘉禾生于州界吏人歸美焉七年慈母陳太妃薨水漿不入口六日居喪過禮武帝優詔勉之使攝州任是冬詔徵以本號還朝人歌曰始興王人之爹徒我反赴人急如水火何時復來哺乳我荊土方言謂父為爹故云後為中衛將軍中書令領衛尉卿憺性好謙降意接士常與賓客連榻坐時論稱之九年拜都督益州刺史舊守宰丞尉歲時乞丐躬歷村里百姓苦之習以為常憺至州停斷嚴切百姓以蘇又興學校祭漢蜀郡太守文翁由是人多向方者十四年遷都督荊州刺史同母兄安成王秀將之雍州薨于道憺聞喪自投于地席哭泣不飲不食者數日傾財産賻送部伍大小皆取足焉天下稱其悌十八年徵為侍中中撫軍將軍開府儀同三司領軍將軍即開府黃閣薨二宮悲惜輿駕臨幸者七焉贈司徒諡曰忠武憺未薨前夢改封中山王策授如他日意頗惡之數旬而卒憺有惠西土荊州人聞薨皆哭於巷嫁娶有吉日移以避哀子亮嗣亮弟映字文明年十二為國子生天監十七年詔諸生答策宗室則否帝知映聰解特令問策又口對並見奇謂祭酒袁昂曰吾家千里駒也起家淮南太守諸兄未有除命乃抗表讓焉映美容儀普通二年封廣信縣侯丁父憂隆冬席地哭不絶聲不嘗穀粒唯飲冷水因患癥結除太子洗馬詔以憺艱難王業追增國封嗣王陳讓既不獲許乃乞頒邑諸弟帝許之改封新渝縣侯後居太妃憂泣血三年服闋為吳興太守郡纍不稔中大通三年野穀生武康凡二十二處自此豐穰映製嘉穀頌以聞中詔稱美後為北徐州刺史在任弘恕人吏懷之常載粟帛遊於境內遇有貧者即以振焉勝境名山多所尋履及徵將還鍾離人顧思遠挺叉行部伍中映見甚老使人問對曰年一百一十二歲凡七娶有子十二死亡略盡今唯小者年已六十又無孫息家闕養乏是以行役映大異之召賜之食食兼於人檢其頭有肉角長寸遂命後舟載還都謁見天子與之言往事多異所傳擢為散騎侍郎賜以奉宅朝夕進見年百二十卒又普通中北侵攻穰城城內有人年二百四十歲不復能食穀唯飲曾孫婦乳簡文帝命勞之賜以束帛荊州上津鄉人張元始年一百一十六歲膂力過人進食不異至年九十七方生兒兒遂無影將亡人人告別乃至山林樹木處處履行少日而終時人以為知命湘東王愛奇重異遂留其枕映後歷給事黃門侍郎衛尉卿廣州刺史卒官諡曰寬侯映弟曄字通明美姿容善談吐初封安陸侯憺特所鍾愛常目送之曰吾所深憂左右問其故答曰其過俊發恐必無年及憺不豫侍疾衣不釋帶言與淚並憺薨扶而後起服闋改封上黃侯位兼宗正卿簡文入居監撫曄獻儲德頌遷給事黃門侍郎出為晉陵太守美才仗氣言多激揚常乘折角牛榖木履被服必於儒者名盛海內為宗室推重特被簡文友愛與新渝建安南浦並預密宴號東宮四友簡文日有五六使來往曄初至郡屬旱躬自祈禱果獲甘潤郡雀林村舊多猛獸為害曄在政六年此暴遂息卒于郡初曄寢疾歷年官曹壅滯有司案諡法言行相違曰替乃諡替侯論曰自昔王者創業莫不廣植親親割裂州國封建子弟是以大斾少帛崇於魯衛盤石犬牙寄深梁楚梁武遠遵前軌蕃屏懿親至於戚枝咸被任遇若蕭景才辨固亦梁之令望者乎臨川不才頻叨重寄古者睦親之道粲而不殊加之重名則有之矣而宏屢黷彝典一撓師徒梁之不綱於斯為甚正德穢行早顯逆心夙構比齊襄而迹可匹似吳濞而勢不侔徒為賊景之階梯竟取國敗而身滅哀哉安成南平鄱陽始興俱以名迹著美蓋亦有梁之間平也
