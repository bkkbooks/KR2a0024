body:
  text: 南史卷五十一列傳第四十一梁宗室上吳平侯景子勱勸勔勃弟昌昂昱長沙宣武王懿子業孫孝儼業弟藻猷猷子韶駿猷弟朗明永陽昭王敷衡陽宣王暢桂陽簡王融子象象子慥臨川靖惠王宏宏子正仁正義正德正德子見理正德弟正則正則弟正立正立子賁正立弟正表正信吳平侯景字子昭梁武帝從父弟也祖道賜以禮讓稱居鄉有爭訟專賴平之又周其疾急鄉里號曰墟王皆竊言曰其後必大仕宋終于書侍御史齊末追贈左光祿大夫三子長曰尚之次曰文帝次曰崇之尚之敦厚有器業為司徒建安王中兵參軍一府稱為長者遷步兵校尉卒官梁天監初追諡曰文宣侯子靈鈞仕齊為廣德令武帝起兵行會稽郡事頃之卒追封東昌縣侯子謇嗣崇之仕齊官至東陽太守以幹能顯政尚嚴厲永明中錢唐唐𧜛之反別衆破東陽崇之遇害天監初追諡忠簡侯景崇之子也八歲隨父在郡居喪以毀聞及長好學才辨有識斷仕齊為永寧令政為百城最永嘉太守范述曾居郡號稱廉平雅服景為政乃榜郡門曰諸縣有疑滯者可就永寧令決以疾去官永嘉人胡仲宣等千人詣闕表請景為郡不許永元二年以長沙宣武王懿勳除步兵校尉是冬懿遇害景亦逃難武帝起兵以景行南兗州事時天下未定沔北傖楚各據塢壁景示以威信渠帥相率面縛請罪旬日境內皆平武帝踐阼封吳平縣侯南兗州刺史加都督詔景母毛氏為國太夫人禮如王國太妃假金章紫綬景居州清恪有威裁明解吏職文案無壅下不敢欺吏人畏敬如神會年荒計口振恤又為饘粥於路以賦之死者給棺具人甚賴焉天監七年為左驍騎將軍兼領軍將軍領軍管天下兵要宋孝建以來制局用事與領軍分權典事以上皆得呈奏領軍垂拱而已及景在職峻切官曹肅然制局監皆近幸頗不堪命以是不得久留中尋出為寧蠻校尉雍州刺史加都督八年魏荊州刺史元志攻潺溝驅迫羣蠻羣蠻悉度漢水來降議者以為蠻纍為邊患可因此除之景曰窮來歸我誅之不祥且魏人來侵每為矛楯若悉誅蠻則魏軍無礙非長策也乃開樊城受降因命司馬朱思遠寧蠻長史曹義宗中兵參軍孟惠俊擊志於潺溝大破之景初到州省除參迎羽儀器服不得煩擾吏人修葺城壘申警邊備理辭訟勸農桑郡縣皆改節自勵州內清靜抄盜絶迹十三年復為領軍將軍直殿省知十州損益事月加祿五萬景為人雅有風力長於辭令其在朝廷為衆所瞻仰於武帝雖屬為從弟而禮寄甚隆軍國大事皆與議決十五年加侍中及太尉揚州刺史臨川王宏坐法免詔景以安右將軍監揚州置佐史即宅為府景越親居揚州固讓至于涕泣帝弗許在州尤稱明斷符教嚴整有田舍老姥訴得符還至縣縣吏未即發姥語曰蕭監州符如火汝手何敢留之其為人所畏敬如此遷都督郢州刺史將發帝幸建興苑餞別為之流涕在州復有能名齊安竟陵郡接魏界多盜賊景移書告示魏即焚塢戍保境不復侵略卒于州贈開府儀同三司諡曰忠子勱勱字文約弱不好弄喜慍不形於色位太子洗馬母憂去職殆不勝喪每一思至必徒步之墓或遇風雨仆臥中路坐地號慟起而復前家人不能禁景特所鍾愛曰吾百年後其無此子乎使左右節哭服闋除太子中舍人景薨于郢鎮或以路遠祕其凶問以疾漸為辭勱乃奔波屆于江夏不進水漿者七日廬于墓所親友隔絶會叔父曇下詔獄勱乃率昆弟羣從同詣大理雖門生故吏莫能識之後襲封吳平侯對揚王人悲慟嗚咽傍人亦為隕涕除淮南太守以善政稱遷宣城內史郡多猛獸常為人患及勱在任獸暴為息又遷豫章內史道不拾遺男女異路徙廣州刺史去郡之日吏人悲泣數百里中舟乘填塞各齎酒肴以送勱勱人為納受隨以錢帛與之至新淦縣岓山村有一老姥以槃擎鰌魚自送舟側奉上之童兒數十人入水扳舟或歌或泣廣州邊海舊饒外國舶至多為刺史所侵每年舶至不過三數及勱至纖豪不犯歲十餘至俚人不賓多為海暴勱征討所獲生口寶物軍賞之外悉送還臺前後刺史皆營私蓄方物之貢少登天府自勱在州歲中數獻軍國所須相繼不絶武帝歎曰朝廷便是更有廣州有詔以本號還朝而西江俚帥陳文徹出寇高要又詔勱重申蕃任未幾文徹降附勱以南江危險宜立重鎮乃表臺於高涼郡立州敕仍以為高州以西江督護孫固為刺史徵為太子左衛率勱性率儉而器度寬裕左右嘗將羹至胸前翻之顏色不異徐呼更衣聚書至三萬卷披玩不倦尤好東觀漢記略皆誦憶劉顯執卷策勱酬應如流乃至卷次行數亦不差失少交結唯與河東裴子野范陽張纘善卒於道贈侍中諡曰光侯勱弟勸勸字文肅少以清靜自立封西鄉侯位南康內史太舟卿大寶元年與南康王會理謀誅侯景事發遇害勸弟勔勔字文祗封東鄉侯位太子洗馬及勸同見害勔弟勃位定州刺史封曲江鄉侯大寶初廣州刺史元景仲將謀應侯景西江督護陳霸先攻景仲迎勃為刺史時湘東王繹在荊州雖承制授職力不能制遂從之勃乃鎮嶺南為廣州刺史後江表定以王琳代為廣州以勃為晉州刺史魏剋江陵勃復據廣州敬帝承制加司徒紹泰中為太尉尋進為太保及陳武禪代之際舉兵不從尋敗遇害昌字子建景弟也位衡州刺史性好酒在州每醉徑出入人家或獨詣草野刑戮頗無期度醉時所殺醒或求焉亦無悔也纍遷兼宗正卿屢為有司所劾久留都忽忽不樂遂縱酒虛悸在石頭東齋引刀自刺而卒弟昂昂字子明位輕車將軍監南兗州初兄景再為兗州德惠在人及昂來代時人方之馮氏徵為琅邪彭城二郡太守時有女子年二十許散髮黃衣在武窟山石室中無所修行唯不甚食或出人間時飲少酒鵝卵一兩枚人呼為聖姑就求子往往有效造者充滿山谷昂呼問無所對以為祅惑鞭之二十創即差失所在中大通元年為領軍將軍久之封湘陰侯出為江州刺史卒諡曰恭侯昂弟昱字子真少而狂狷不拘禮度異服危冠交遊冗雜尤善屠牛業以為常於宅內酤酒好騎射歷位中書侍郎每求試邊州武帝以其輕脫無威望抑而不許遷給事黃門侍郎上表請自解帝手詔責之坐免官因此杜門絶朝覲普通五年坐於宅內鑄錢為有司所奏下廷尉得免死徙臨海郡行至上虞有敕追還令受菩薩戒既至恂恂盡禮改意蹈道持戒又精潔帝甚嘉之以為晉陵太守下車勵名迹除煩苛明法憲嚴於姦吏旬日之間郡中大安俄而暴卒百姓行號巷哭市里為之喧沸設祭奠於郡庭者四百餘人田舍有婦女夏氏年百餘歲扶曾孫出郡悲泣不自勝其惠化所感如此百姓相率為立廟建碑以紀其德又詣都表求贈諡詔贈湘州刺史諡曰恭子文帝十男張皇后生長沙宣武王懿永陽昭王敷武帝衡陽宣王暢李太妃生桂陽簡王融融為東昏所害敷暢齊建武中卒武帝踐阼並追封郡王陳太妃生臨川靖惠王宏南平元襄王偉吳太妃生安成康王秀始興忠武王憺費太妃生鄱陽忠烈王恢長沙宣武王懿字元達文帝長子也少有令譽解褐齊安南邵陵王行參軍襲爵臨湘縣侯歷位晉陵太守以善政稱永明末為梁南秦二州刺史加督是歲魏軍入漢中遂圍南鄭懿隨機拒擊乃解圍遁去又遣氐帥楊元秀攻取魏歷城等六戍魏人震懼邊境遂寧永元二年裴叔業據豫州反懿以豫州刺史領歷陽南譙二郡太守討之叔業懼遂降魏武帝時在雍州遣典籤趙景悅説懿興晉陽之甲誅君側之罪懿不答既而平西將軍崔慧景入寇奉江夏王寶玄圍臺城齊室大亂馳信召懿懿時方食投箸而起率鋭卒三千人入援武帝馳遣虞安福下都説懿曰誅賊之後則有不賞之功當明君賢主尚或難立況於亂朝何以自免若賊滅之後仍勒兵入宮行伊霍故事此萬世一時若不欲爾便放表還歷陽託以外拒為事則威振內外誰敢不從一朝放兵受其厚爵高而無人必生後悔長史徐曜甫亦苦勸並不從慧景遣其子覺來拒懿擊大破之乘勝而進慧景衆潰追斬之授尚書令都督征討水陸諸軍事時東昏肆虐茹法珍王咺之等執政宿臣舊將並見誅夷懿既勳高獨居朝右深為法珍等所憚乃説東昏將加酷害徐曜甫知之密具舟江渚勸令西奔懿不從曰古皆有死豈有叛走尚書令邪尋見留省賜藥與弟融俱殞謂使者曰家弟在雍深為朝廷憂之中興元年贈司徒宣德太后臨朝改贈太傅天監元年追崇丞相封長沙郡王諡曰宣武給九旒鸞輅黃屋左纛葬禮依晉安平王故事懿名望功業素重武帝本所崇敬帝以天監元年四月丙寅即位是日即見褒崇戊辰乃始贈第二兄敷第四弟暢第五弟融至五月有司方奏追皇考皇妣尊號遷神主于太廟帝不親奉命臨川王宏侍從七月帝臨軒遣兼太尉散騎常侍王份奉策上太祖文皇帝獻皇后及德皇后尊號既先卑後尊又臨軒命策識者頗致譏議焉懿子業字靜曠幼而明敏仕齊為太子舍人宣武之難與二弟藻象俱逃匿於王嚴秀家東昏知之收嚴秀付建康獄考掠備極乃以鉗拔手爪至死不言竟以免禍天監二年襲封長沙王歷位祕書監侍中都督南兗州刺史運私邸米僦人作甓以砌城武帝善之徙湘州尤著善政零陵舊有二猛獸為暴無故相枕而死郡人唐睿見猛獸傍一人曰刺史德感神明所以兩猛獸自斃言訖不見衆並異之業性敦篤所在留惠普通四年為侍中金紫光祿大夫薨諡曰元王文集行於世子孝儼嗣孝儼字希莊射策甲科除祕書郎太子舍人從幸華林園於坐獻相風烏華光殿景陽山等頌其文甚美帝深賞異之薨諡曰章子嗣業弟藻藻字靖藝仕齊位著作佐郎天監元年封西昌縣侯為益州刺史時鄧元起在蜀自以有剋劉季連功恃宿將輕少藻藻怒乃殺之既天下草創邊徼未安州人焦僧護聚衆數萬據郫繁作亂藻年未弱冠集僚佐議欲自擊之或陳不可藻大怒斬之階側乃乘平肩輿巡行賊壘賊聚弓亂射矢下如雨從者舉楯禦箭又命除之由此人心大安賊乃夜遁藻命騎追擊平之九年徵為太子中庶子初鄧元起之在蜀也崇於聚斂財貨山積金玉珍帛為一室名為內藏綺縠錦罽為一室號曰外府藻以外府賜將帥內藏歸王府不有私焉及是還朝輕裝就路再遷侍中藻性謙退不求聞達善屬文尤好古體自非公宴未嘗妄有所為縱有小文成輒棄本歷雍兗二州刺史頻蒞州鎮人吏咸稱之推善下人常如弗及普通六年為軍師將軍與西豐侯正德北侵渦陽輒班師為有司奏免官削爵土八年復封爵中大通三年為中軍將軍太子詹事出為丹陽尹帝每稱其小字歎曰子弟並如迦葉吾復何憂入為尚書左僕射加侍中固辭不許大同五年遷中衛將軍開府儀同三司中書令侍中如故藻性恬靜獨處一室牀有膝痕宗室衣冠莫不楷則常以爵祿太過每思屏退門庭間寂賓客罕通簡文尤敬愛之自遭家禍布衣蒲席不食鮮禽非公庭不聽音樂武帝每以此稱之出為南徐州刺史侯景亂藻遣世子彧率兵入援及城開加散騎常侍侯景遣其儀同蕭雍代之據京口藻因感氣疾或勸奔江北藻曰吾國之台鉉任寄特隆既不能誅翦逆賊正當同死朝廷耳因不食而薨藻弟猷封臨汝侯為吳興郡守性倜儻與楚王廟神交飲至一斛每酹祀盡歡極醉神影亦有酒色所禱必從後為益州刺史侍中中護軍時江陽人齊苟兒反衆十萬攻州城猷兵糧俱盡人有異心乃遙禱請救是日有田老逢一騎浴鐵從東方來問去城幾里曰百四十時日已晡騎舉矟曰後人來可令之疾馬欲及日破賊俄有數百騎如風一騎過請飲田老問為誰曰吳興楚王來救臨汝侯當此時廟中請祈無驗十餘日乃見侍衛土偶皆泥濕如汗者是日猷大破苟兒猷在州頗僭濫客筵內遂有香橙不置連榻武帝末知之以此為愆還都以憂愧成疾卒諡曰靈以與神交也猷子韶字德茂初封上甲縣都鄉侯太清初為舍人城陷奉詔西奔及至江陵人士多往尋覓令韶説城內事韶不能人人為説乃疏為一卷客問者便示之湘東王聞而取看謂曰昔王韶之為隆安紀十卷説晉末之亂離今之蕭韶亦可為太清紀十卷矣韶乃更為太清紀其諸議論多謝吳為之韶既承旨撰著多非實録湘東王德之改超繼宣武王封長沙王遂至郢州刺史韶昔為幼童庾信愛之有斷袖之歡衣食所資皆信所給遇客韶亦為信傳酒後為郢州信西上江陵途經江夏韶接信甚薄坐青油幕下引信入宴坐信別榻有自矜色信稍不堪因酒酣乃徑上韶牀踐踏肴饌直視韶面謂曰官今日形容大異近日時賓客滿坐韶甚慚恥韶弟駿字德款善草隸工文章晚更習武膂力絶人與永安侯確相類位尚書殿中郎超武將軍封南安侯城陷為賊任約所禮謀召鄱陽嗣王範襲約反為所害猷弟朗字靖徹天監五年例以王子封侯歷太子洗馬桂州刺史加都督性倨而虐羣下患之記室庾丹以忠諫見害帝聞之使於嶺表以功自效丹父景休位御史中丞丹少有俊才與伏挺何子朗俱為周捨所狎初景休罷巴東郡頗有資産丹負錢數百萬責者填門景休怒不為之償既而朝賢之丹不之景休景休悅乃悉為還之為建康正坐事流廣州朗弟明字靖通少被武帝親愛封貞陽侯太清元年為豫州刺史百姓詣闕拜表言其德政樹碑于州門內及碑匠採石出自肥陵明乃廣營帳多召人物躬自率領牽至州識者笑之曰王自立碑非州人也武帝既納侯景大舉北侵使南康王會理總兵明乃拜表求行固請乃許之會理已至宿預詔改以明代為都督水陸諸軍趣彭城大圖進取敕曰侯景志清鄴洛以雪讎恥其先率大軍隨機撫定汝等衆軍可止於寒山築堰引清水以灌彭城大水一泛孤城自殄慎勿妄動明師次呂梁十八里作寒山堰以灌彭城水及于堞不沒者三板魏遣將慕容紹宗赴救明謀略不出號令莫行諸將每咨事輒怒曰吾自臨機制變勿多言衆乃各掠居人明亦不能制唯禁其一軍無所侵掠紹宗至決堰水明命將救之莫肯出魏軍轉逼人情大駭胡貴孫謂趙伯超曰不戰何待伯超懼不能對貴孫乃入陳苦戰伯超擁衆弗敢救曰與戰必敗不如全軍早歸乃使具良馬載其愛妾自隨貴孫遂沒伯超子威方將赴戰伯超懼其出使人召之遂相與南還明醉不能興衆軍大敗明見俘執北人懷其不侵掠謂之義王及至魏魏帝引見明及諸將帥釋其禁送晉陽勃海王高澄禮明甚重謂曰先王與梁主和好十有餘年聞彼禮佛文常云奉為魏主並及先王此甚是梁主厚意不謂一朝失信致此紛擾因欲與梁通和使人以明書告武帝方致書以慰高澄東魏除明散騎常侍及聞社稷淪蕩哀泣不捨晝夜魏平江陵齊文宣使送明至梁並前所獲梁將湛海珍等皆聽從明歸令上黨王渙率衆送之是時太尉王僧辨司空陳霸先在建康推晉安王方智為太宰都督中外諸軍事承制置百官渙軍漸進明與僧辨書求迎僧辨不從及渙破東關斬裴之橫僧辨懼乃納明於是梁輿東度齊師北反明至望朱雀門便長慟迄至所止道俗參問皆以哭對之及稱尊號改承聖四年為天成元年大赦境內以方智為太子授王僧辨大司馬遣其子章馳到齊拜謝齊遇明及僧辨使人在館供給宴會豐厚一同武帝時使及陳霸先襲殺僧辨復奉晉安王是為敬帝而以明為太傅建安王報齊云僧辨陰謀篡逆故誅之仍請稱臣于齊永為蕃國齊遣行臺司馬恭及梁人盟於歷陽明年齊人徵明霸先猶稱蕃將遣使送明疽發背死時王琳與霸先相抗齊文宣遣兵納永嘉王莊主梁祀追諡明曰閔皇帝永陽昭王敷字仲達文帝第二子也少有學業仕齊為隨郡內史招懷遠近士庶安之以為前後之政莫及明帝謂徐孝嗣曰學士舊聞例不解理官聞蕭隨郡唯置酒清言而路不拾遺行何風化以至於此答曰古者修文德以來遠人況止郡境而已帝稱善徵為廬陵王咨議參軍卒武帝即位贈司空封永陽郡王諡曰昭天監二年子伯遊嗣伯遊字士仁位會稽太守薨諡曰恭衡陽宣王暢文帝第四子也有美名仕齊位太常封江陵縣侯卒天監元年追贈開府儀同三司封衡陽郡王諡曰宣三年子元簡位郢州刺史卒於官諡曰孝葬將引柩有聲議者欲開視王妃柳氏曰晉文已有前例不聞開棺無益亡者之生徒增生者之痛遂止少子獻嗣桂陽簡王融文帝第五子也仕齊位太子洗馬與宣武王懿俱遇害天監元年贈撫軍大將軍封桂陽郡王諡曰簡無子詔以長沙宣武王第九子象嗣象字世翼容止間雅簡於交遊事所生母以孝聞位丹陽尹象生長深宮始親庶政舉無失德朝廷稱之再遷湘州刺史加都督湘州舊多猛獸為暴及象任州日四猛獸死于郭外自此靜息故老咸稱德政所感歷位太常卿加侍中遷祕書監薨諡曰敦子慥嗣慥字元貞位信州刺史有威惠太清二年赴援臺城遇敕還蕃尋為張纘所構書報湘東王曰河東桂陽二蕃掎角欲襲江陵湘東乃水步兼行至荊鎮慥尚軍江津不以為意湘東至乃召慥深加慰喻慥心乃安後留止省內慥心知禍及遂肆醜言湘東大怒付獄殺之臨川靖惠王宏字宣達文帝第六子也長八尺美鬚眉容止可觀仕齊為北中郎桂陽王功曹史宣武之難兄弟皆被收道人釋惠思藏宏及武帝師下宏至新林奉迎建康平為中護軍領石頭戍事天監元年封臨川郡王位揚州刺史加都督四年武帝詔宏都督諸軍侵魏宏以帝之介弟所領皆器械精新軍容甚盛北人以為百數十年所未之有軍次洛口前軍剋梁城宏部分乖方多違朝制諸將欲乘勝深入宏聞魏援近畏懦不敢進召諸將欲議旋師呂僧珍曰知難而退不亦善乎宏曰我亦以為然柳惔曰自我大衆所臨何城不服何謂難乎裴邃曰是行也固敵是求何難之避馬仙琕曰王安得亡國之言天子掃境內以屬王有前死一尺無却生一寸昌義之怒鬚盡磔曰呂僧珍可斬也豈有百萬之師輕言可退何面目得見聖主乎朱僧勇胡辛生拔劍而起曰欲退自退下官當前向取死議者已罷僧珍謝諸將曰殿下昨來風動意不在軍深恐大致沮喪欲使全師而反又私裴邃曰王非止全無經略庸怯過甚吾與言軍事都不相入觀此形勢豈能成功宏不敢便違羣議停軍不前魏人知其不武遺以巾幗北軍歌曰不畏蕭娘與呂姥但畏合肥有韋武武謂韋睿也僧珍歎曰使始興吳平為元帥我相毗輔中原不足平今遂敵人見欺如此乃欲遣裴邃分軍取壽陽大衆停洛口宏固執不聽乃令軍中曰人馬有前行者斬自是軍政不和人懷憤怒魏奚康生馳遣楊大眼謂元英曰梁人自剋梁城已後久不進軍其勢可見當是懼我王若進據洛水彼自奔敗元英曰蕭臨川雖騃其下有好將韋裴之屬亦未可當望氣者言九月賊退今且觀形勢未可便與交鋒張惠紹次下邳號令嚴明所至獨剋下邳人多有欲來降惠紹曰我若得城諸卿皆是國人若不能破賊徒令公等失鄉非朝廷弔人本意也今且安堵復業勿妄自辛苦降人咸悅九月洛口軍潰宏棄衆走其夜暴風雨軍驚宏與數騎逃亡諸將求宏不得衆散而歸棄甲投戈填滿水陸捐棄病者強壯僅得脫身宏乘小船濟江夜至白石壘款城門求入臨汝侯登城謂曰百萬之師一朝奔潰國之存亡未可知也恐姦人乘間為變城門不可夜開宏無辭以對乃縋食饋之惠紹聞洛口敗亦退軍六年遷司徒領太子太傅八年為司空揚州刺史十一年正月為太尉其年冬以公事左遷驃騎大將軍開府同三司之儀未拜遷揚州刺史十二年加司空十五年所生母陳太妃薨去職尋起為中書監驃騎大將軍揚州刺史如故宏妾弟吳法壽性粗狡恃宏無所畏忌輒殺人死家訴有敕嚴討法壽在宏府內無如之何武帝制宏出之即日償辜南司奏免宏司徒驃騎揚州刺史武帝注曰愛宏者兄弟私親免宏者王者正法所奏可宏自洛口之敗常懷愧憤都下每有竊發輒以宏為名屢為有司所奏帝每貰之十七年帝將幸光宅寺有士伏於驃騎航待帝夜出帝將行心動乃於朱雀航過事發稱為宏所使帝泣謂宏曰我人才勝汝百倍當此猶恐顛墜汝何為者我非不能為周公漢文念汝愚故宏頓首曰無是無是於是以罪免而縱恣不悛奢侈過度修第擬於帝宮後庭數百千人皆極天下之選所幸江無畏服玩侔於齊東昏潘妃寶屧直千萬好食鰿魚頭常日進三百其他珍膳盈溢後房食之不盡棄諸道路江本吳氏女也世有國色親從子女遍遊王侯後宮男免兄弟九人因權勢橫於都下宏未幾復為司徒普通元年遷太尉揚州刺史侍中如故七年四月薨自疾至薨輿駕七出臨視及薨詔贈侍中大將軍揚州牧假黃鉞並給羽葆鼓吹一部增班劍為六十人諡曰靖惠宏以介弟之貴無他量能恣意聚斂庫室垂有百間在內堂之後關籥甚嚴有疑是鎧仗者密以聞武帝於友于甚厚殊不悅宏愛妾江氏寢膳不能暫離上他日送盛饌與江曰當來就汝歡宴唯攜布衣之舊射聲校尉丘他卿往與宏及江大飲半醉後謂曰我今欲履行汝後房便呼後閣輿徑往屋所宏恐上見其賄貨顏色怖懼上意彌信是仗屋屋檢視宏性愛錢百萬一聚黃榜標之千萬一庫懸一紫標如此三十餘間帝與他卿屈指計見錢三億餘萬餘屋貯布絹絲綿漆蜜紵蠟朱沙黃屑雜貨但見滿庫不知多少帝始知非仗大悅謂曰阿六汝生活大可方更劇飲至夜舉燭而還兄弟情方更敦睦宏都下有數十邸出懸錢立券每以田宅邸店懸上文券期訖便驅券主奪其宅都下東土百姓失業非一帝後知制懸券不得復驅奪自此後貧庶不復失居業晉時有錢神論豫章王綜以宏貪吝遂為錢愚論其文甚切帝知以激宏宣旨與綜天下文章何限那忽作此雖令急毀而流布已遠宏深病之聚斂稍改宏又與帝女永興主私通因是遂謀弒逆許事捷以為皇后帝嘗為三日齋諸主並豫永興乃使二僮衣以婢服僮踰閾失屨閣帥疑之密言於丁貴嬪欲上言懼或不信乃使宮帥圖之帥令內輿人八人纏以純綿立於幕下齋坐散主果請間帝許之主升階而僮先趣帝後八人抱而擒之帝驚墜於扆搜僮得刀辭為宏所使帝祕之殺二僮於內以漆車載主出主恚死帝竟不臨之帝諸女臨安安吉長城三主並有文才而安吉最得令稱宏性好內樂酒沈湎聲色侍女千人皆極綺麗慎衛寡方故屢致降免宏子十人許可知者七人長子正仁字公業位祕書丞早卒諡哀世子正仁弟正義嗣正義字公威初以王子封平樂侯位太常卿南徐州刺史屬武帝幸朱方正義修解宇以待輿駕初京城之西有別嶺入江高數十丈三面臨水號曰北固蔡謨起樓其上以置軍實是後崩壞頂猶有小亭登降甚狹及上升之下輦步進正義乃廣其路傍施欄楯翌日上幸遂通小輿上悅登望久之敕曰此嶺不足須固守然京口實乃壯觀乃改曰北顧賜正義束帛後為東揚州刺史薨正義弟正德正德字公和少而凶慝招聚亡命破冢屠牛兼好弋獵齊建武中武帝胤嗣未立養以為子及平建康生昭明太子正德還本天監初封西豐縣侯纍遷吳郡太守正德自謂應居儲嫡心常怏怏每形於言普通三年以黃門侍郎為輕車將軍置佐史頃之奔魏初去之始為詩一絶內火籠中即詠竹火籠曰楨幹屈曲盡蘭麝氛氳銷欲知懷炭日正是履冰朝至魏稱是被廢太子時齊蕭寶寅先在魏乃上表魏帝曰豈有伯為天子父作揚州棄彼密親遠投他國不若殺之魏既不禮之正德乃殺一小兒稱為己子遠營葬地魏人不疑又自魏逃歸見於文德殿至庭叩頭武帝泣而誨之特復本封正德志行無悛常公行剝掠時東府有正德及樂山侯正則潮溝有董當門子暹世謂之董世子者也南岸有夏侯夔世子洪此四凶者為百姓巨蠹多聚亡命黃昏多殺人於道謂之打稽時勳豪子弟多縱恣以淫盜屠殺為業父祖不能制尉邏莫能禦車服牛馬號西豐駱馬樂山烏牛董暹金帖織成戰襖直七百萬後正則為劫殺沙門徙嶺南死洪為其父夔奏繫東冶死於徒暹坐與永陽王妃王氏亂誅三人既除百姓少安正德淫虐不革尋除給事黃門侍郎六年為輕車將軍隨豫章王北侵正德輒棄軍委走為有司所奏下獄帝復詔曰汝以猶子情兼常愛故越先汝兄剖符連郡往年在蜀昵近小人猶謂少年情志未定更於吳郡殺戮無辜劫盜財物雅然無畏及還京師專為逋逃乃至江乘要道湖頭斷路遂使京邑士女早閉晏開又奪人妻妾略人子女徐敖非直失其配匹乃橫尸道路王伯敖列卿之女誘為妾媵我每加掩抑冀汝自新了無悛革怨讎逾甚遂匹馬奔亡志懷反噬遣信慰問冀汝能還果能來歸遂我夙志謂汝不好文史志在武功令汝杖節董戎前驅豈謂汝狼心不改包藏禍胎志欲覆敗國計以快汝心今當宥汝以遠無令房纍自隨敕所在給汝稟餼王新婦見理等當停太尉間汝餘房纍悉許同行於是免官削爵土徙臨海郡未至徙所道追赦之八年復封爵正德北還求交朱虉帝既封昭明諸子虉言正德失職中大通四年特封臨賀郡王後為丹陽尹坐所部多劫盜復為有司所奏去職出為南兗州在任苛刻人不堪命廣陵沃壤遂為之荒至人相食噉既纍試無能從是黜廢轉增憤恨乃陰養死士常思國釁聚蓄米粟宅內五十間室並以為倉自征虜亭至于方山悉略為墅蓄奴僮數百皆黥其面太清二年秋侯景反知其有姦心景黨徐思玉在北經與正德相知至是景遣思玉至建鄴具以事告又與正德書曰今天子年尊姦臣亂國以景觀之計日必敗大王屬當儲二中被廢辱天下義士竊所忿慨大王豈得顧此私情棄茲億兆景雖不武實思自奮正德得書大喜曰侯景之意暗與人同天贊我也遂許之及景至正德潛運空舫詐稱迎荻以濟景焉朝廷未知其謀以正德為平北將軍屯朱雀航景至正德乃北向望闕三拜跪辭歔欷流涕引賊入宣陽門與景交揖馬上退據左衛府先是其軍並著絳袍袍𩹉皆碧至是悉反之賊以正德為天子號曰正平元年初童謠有之故以應也又世人相佷必稱正平耳正德乃以長子見理為太子以女妻景景為丞相與約曰平城之日不得全二宮又令畿內王侯三日不出者誅之及臺城開正德率衆揮刀欲入賊先使其徒守門故正德不果乃復太清之號降正德為侍中大司馬正德入問訊拜且泣武帝曰惙其泣矣何嗟及矣正德知為賊所賣深自咎悔密書與鄱陽嗣王契以兵入賊遮得書乃矯詔殺之先是正德妹長樂主適陳郡謝禧正德姦之燒主第縛一婢加玉釧於手以金寶附身聲云主被燒死檢取婢尸並金玉葬之仍與主通呼為柳夫人生二子焉日月稍久風聲漸露後黃門郎張準有一雉媒正德見而奪之尋會重雲殿為淨供皇儲以下莫不畢集準於衆中吒罵曰張準雉媒非長樂主何可略奪皇太子恐帝聞之令武陵王和止之乃休及出送雉媒還之其後梁室傾覆既由正德百姓至聞臨賀郡名亦不欲道童謠云寧逢五虎入市不欲見臨賀父子其惡之如是見理字孟節性甚凶粗長劍短衣出入廛里不為宗室所齒及肆逆甚得志焉招聚羣盜每夜輒掠劫於大航為流矢所中死正德弟正則正則字公衡天監初以王子封樂山侯纍遷太子洗馬舍人於第內私械百姓令養馬又盜鑄錢大通二年坐匿劫盜削爵徙鬱林帝敕廣州日給酒肉南中官司猶處以侯禮正則滋怨諸父與西江督護靳山顧通室招誘亡命將襲番禺未及期而事發遂鳴鼓會將攻州城刺史元景仲命長史元孝深討之正則敗逃于厠村人縛送之詔斬於南海有司請絶屬籍收妻子詔聽絶屬籍妻子特原正則弟正立正立字公山初封羅平侯母江有寵初正仁之亡宏溺情曲制以正立為世子正立微有學宏薨後知非朝議表求讓兄帝甚嘉焉諸侯例封五百戶正立改封實土建安縣侯食邑一千戶後位丹陽尹薨諡曰敏子賁嗣賁字世文性躁薄正德為侯景所立賁出投之專監造攻具以攻臺城常為賊耳目南康嗣王會理謀襲景賁與中宿世子子雍告之賊矯封賁竟陵王子雍隨郡王並改姓侯氏賁為宗正卿子雍都官尚書專權陵蔑朝政居嘗晝臥見柳敬禮蕭勸入室驅之賁驚起乞恩俄而賊惡其翻覆殺之正立弟正表封封山侯後奔樂山正表弟正信正信字公理封武化侯與正立同生亦被宏鍾愛然幼不慧常執白團扇湘東王取題八字銘玩之正信不知嗤之終搖握位給事中卒
