body:
  text: 南史卷四十二列傳第三十二齊高帝諸子上豫章文獻王嶷子子廉子恪子操子範子範子乾子範弟子顯子雲齊高帝十九男昭皇后生武帝豫章文獻王嶷謝貴嬪生臨川獻王映長沙威王晃羅太妃生武陵昭王曄任太妃生安成恭王皓陸修儀生鄱陽王鏘晉熙王銶袁修容生桂陽王鑠何太妃生始興簡王鑑宜都王鏗區貴人生衡陽王鈞張淑妃生江夏王鋒河東王鉉李美人生南平王鋭第九第十三第十四第十七皇子早亡衡陽王鈞出繼高帝兄元王後豫章文獻王嶷字宣儼高帝第二子也寬仁弘雅有大成之量高帝特鍾愛焉仕宋為尚書左戶郎錢唐令高帝破薛索兒改封西陽以先爵賜嶷為晉壽縣侯後為武陵內史時沈攸之責賧伐荊州界內諸蠻遂及五溪禁斷魚鹽羣蠻怨怒酉溪蠻王田頭擬殺攸之使攸之責賧千萬頭擬輸五百萬發氣死其弟婁侯篡立頭擬子田都走入獠中於是蠻部大亂抄掠至郡城下嶷遣隊主張英兒擊破之田都自獠中請立而婁侯亦歸附嶷誅婁侯於郡獄命田都繼其父蠻衆乃安入為宋順帝驃騎從事中郎詣司徒袁粲粲謂人曰後來佳器也高帝在領軍府嶷居青溪宅蒼梧王夜中微行欲掩襲宅內嶷令左右刀戟於中庭蒼梧從牆間窺見已有備乃去高帝憂危既切腹心荀伯玉勸帝度江北起兵嶷諫曰主上狂凶人不自保單行道路易以立功外州起兵鮮有剋勝於此立計萬不可失及蒼梧殞高帝報嶷曰大事已判汝明可早入順帝即位轉侍中總宮內直衛沈攸之之難高帝入朝堂嶷出鎮東府加冠軍將軍及袁粲舉兵夕丹陽丞王遜告變先至東府嶷遣帳內軍主戴元孫二千人隨薛道深等俱至石頭焚門之功元孫預焉先是王蘊薦部曲六十人助為城防實以為內應也嶷知蘊懷二不給其仗散處外省及難作搜檢皆已亡去上流平後武帝自尋陽還嶷出為都督江州刺史以定策功改封永安縣公仍徙鎮西將軍都督荊州刺史時高帝作輔嶷務存約省停府州儀迎物及至州坦懷納善側席思政王儉與嶷書曰舊楚蕭條仍歲多故政荒人散實須緝理公臨蒞甫爾英風惟穆江漢來蘇八荒慕義庾亮以來荊州無復此政古人云朞月有成而公旬日成化豈不休哉初沈攸之欲聚衆開人相告士庶坐執役者甚衆嶷至鎮一日遣三千餘人見囚五歲刑以下不連臺者皆原遣以市稅重多所寬假百姓甚悅禪讓之間武帝欲速定大業嶷依違其事默無所言建元元年高帝即位赦詔未至嶷先下令蠲除部內升明二年以前逋負遷侍中尚書令都督揚州刺史驃騎大將軍開府儀同三司封豫章郡王會魏軍動詔以嶷為南蠻校尉荊湘二州刺史都督八州尋給油絡俠望車二年給班劍二十人其夏於南蠻園東南開館立學上表言狀置生三十人取舊族父祖位正佐臺郎年二十五以下十五以上補之置儒林參軍一人文學祭酒一人勸學從事二人行釋菜禮以穀過賤聽人以米當口錢優評斛一百義陽劫帥張羣亡命積年鼓行為賊義陽武陵天門南平四郡界被其殘破沈攸之連討不禽末乃首用之攸之起事羣從下郢於路先叛結柴於三溪依據深險嶷遣中兵參軍虞欣祖為義陽太守使降意誘納之厚為禮遺於坐斬首其黨皆散四郡獲安入為中書監司空揚州刺史都督二州侍中如故加兵置佐以前軍臨川王映府文武配司空嶷以將還都修廨宇及路陌東歸部曲不得齎府州物出城發江津士女觀送數千人皆垂泣嶷發江陵感疾至都未瘳上深憂慮為之大赦三年六月壬子赦令是也疾愈上幸東府設金石樂使乘輿至宮六門武帝即位進位太尉增置兵佐解侍中增班劍三十人建元中武帝以事失旨高帝頗有代嫡之意而嶷事武帝恭悌盡禮未嘗違忤顏色故武帝友愛亦深性至孝高帝崩哭泣過度眼耳皆出血永明元年領太子太傅解中書監宋武以來州郡秩俸及雜供給多隨土所出無有定準嶷上表請明立定格班下四方永為制從之嶷不參朝務而言事密謀多見信納服闋加侍中宋元嘉制諸王入齊閣得白服裙帽見人主唯出太極四廂乃備朝衣自比以來此事一斷上與嶷同生相友睦宮內曲宴許依元嘉嶷固辭不奉敕唯車駕幸第乃白服烏紗帽以侍宴焉至於衣服制度動皆陳啓事無專制務從減省並不見許又啓曰北第舊邸本自甚華臣往歲作小眠齊皆補接為辦無乖格制要是柳柏之華一時新淨東府又有此齊亦為華屋而臣頓有二處住止下情竊所未安訊訪東宮玄圃乃有柏屋制甚古拙臣乃欲壞取以奉太子非但失之於前且補接既多不可見移亦恐外物或為異論不審可有垂許送東府齊理不上答曰見別紙汝勞疾亦復那得不動何意為作煩長啓事竟不從三年文惠太子講孝經畢嶷求解太傅不許嶷常慮盛滿又因言宴求解揚州授竟陵王子良上終不許曰畢汝一世無所多言武帝即位後頻發詔拜陵不果行遣嶷拜陵還過延陵季子廟觀沸井有水牛突部伍直兵執牛推問嶷不許取絹一匹橫繫牛角放歸其家政在寬厚故得朝野歡心四年唐𧜛之賊起嶷啓上曰此段小寇出於凶愚天網宏罩理不足論但聖明御世幸可不爾比藉聲聽皆云有由而然但頃小大士庶每以小利奉公不顧所損者大擲籍檢功巧督恤簡小塘藏丁匿口凡諸條制實長怨府此目前交利非天下大計一室之中尚不可精宇宙之內何可周洗公家何嘗不知人多欺巧古今政以不可細碎故不為耳為此者實非乖理但識理者百不有一陛下弟兒大臣猶不能伏理況復天下悠悠萬品怨積聚黨凶迷相類止於一處何足不除脫復多所便成紜紜上答曰欺巧那可容宋世混亂以為是不蚊蟻何足為憂至今都應散滅吾政恨其不辦大耳亦何時無亡命邪後乃詔聽復籍注是時武帝奢侈後宮萬餘人宮內不容太樂景第暴室皆滿猶以為未足嶷後房亦千餘人潁川荀丕獻書於嶷極言其失嶷咨嗟良久為書答之又為之減遣丕字令哲後為荊州西曹書佐長史王秀與其書題之云西曹荀君丕報書曰第五之位不減驃騎亦不知西曹何殊長史且人之處世當以德行稱著何遽以一爵高人邪相如不見屈於澠池毛遂安受辱於郢都造敵臨事僕必先於二子未知足下之貴足下之威孰若秦楚兩王僕以德為寶足下以位為寶各寶其寶於此敬宜於是直題云長史王君時尚書令王儉當朝丕又與儉書曰足下建高人之名而不顯高人之迹將何以書於齊史哉及南郡綱紀啓荊州刺史隨王子隆請罪丕丕自申乃免又上書極諫武帝言甚直帝不悅丕竟於荊州獄賜死徐孝嗣聞其死曰丕縱有罪亦不應殺數千年後其如竹帛何五年嶷進位大司馬八年給皂輪車尋加中書監固讓嶷身長七尺八寸善持容範文物衛從禮冠百僚每出入殿省皆瞻望嚴肅自以地位隆重深懷退素北宅舊有園田之美乃盛修理之武帝嘗問臨川王映居家何事樂映曰政使劉瓛講禮顧講易朱廣之講莊老臣與二三諸彥兄弟友生時復擊贊以此為樂上大賞之他日謂嶷曰臨川為善遂至於斯嶷曰此大司馬公之次弟安得不爾上仍以玉如意指嶷曰未若皇帝之次弟為善最多也嶷常戒諸子曰凡富貴少不驕奢以約失之者鮮矣漢世以來侯王子弟以驕恣之故大者滅身喪族小者削奪邑地可不戒哉稱疾不利住東城纍求還第令世子子廉代鎮東府上數幸嶷第宋長寧陵隧道出第前路上曰我便是入他家墓內尋人乃徙其表闕騏驎於東岡騏驎及闕形勢甚巧宋孝武於襄陽致之後諸帝王陵皆模範而莫及也永明末車駕數遊幸唯嶷陪從上嘗出新林苑同輦夜歸至宮門嶷下輦辭出上曰今夜行無使為尉司所呵也嶷對曰京輦之內皆屬臣州願陛下不垂過慮上大笑賜以魏所送車每幸第不復屏人敕外監曰我往大司馬第是還家耳嶷妃庾氏嘗有疾瘳上幸嶷邸後堂設金石樂宮人畢至登桐臺使嶷著烏紗帽極日盡歡敕嶷備家人之禮嶷謂上曰古來言願陛下壽比南山或稱萬歲此殆近貌言如臣所懷實願陛下極壽百年亦足矣上曰百年復何可得止得東西一百於事亦濟因相執流涕十年上封嶷諸子舊例王子封千戶嶷欲五子俱封啓減人五百戶其年疾篤表解職不許賜錢五百萬營功德薨年四十九其日上視疾至薨乃還宮詔斂以袞冕之服溫明祕器大鴻臚持節護喪事太官朝夕送祭奠大司馬太傅二府文武悉停過葬詔贈假黃鉞都督中外諸軍事丞相揚州牧緑綟綬具九服錫命之禮侍中大司馬太傅王如故給九旒鸞輅黃屋左纛虎賁班劍百人轀輬車前後部羽葆鼓吹喪葬送儀並依漢東平王蒼故事嶷臨終召子子廉子恪曰吾無後當共相勉勵篤睦為先才有優劣位有通塞運有富貧此自然理無足以相陵侮勤學行守基業修閨庭尚間素如此足無憂患聖主儲皇及諸親賢亦當不以吾沒易情也三日施靈惟香火盤水干飯酒脯檳榔而已朔望菜食一盤加以甘果此外悉省葬後除靈可施吾常所乘輿扇繖朔望時節席地香火盤水酒脯干飯檳榔便足棺器及墓中勿用餘物為後患也朝服之外唯下鐵環刀一口作冢勿令深一一依格莫過度也後堂樓可安佛供養外國二僧餘皆如舊與汝遊戲後堂船乘吾所乘牛馬送二宮及司徒服飾衣裘悉為功德子廉等號泣奉行武帝哀痛特至蔬食積旬太官朝夕送祭奠敕王融為銘云半嶽摧峯中河墜月帝流涕曰此正吾所欲言也至其年十二月乃舉樂宴朝臣樂始舉上便歔欷流涕嶷薨後第庫無見錢武帝敕貨雜物服飾得數百萬起集善寺月給第見錢百萬至上崩乃省嶷性泛愛不樂聞人過失左右投書相告置靴中竟不視取火焚之齊庫失火燒荊州還資評直三千餘萬主局各杖數十而已嶷薨後忽見形於沈文季曰我未應便死皇太子加膏中十一種藥使我不差湯中復加藥一種使利不斷吾已訴先帝先帝許還東邸當判此事因胸中出青紙文書示文季曰與卿少舊因卿呈上俄失所在文季祕而不傳甚懼此事少時太子薨又嘗見形於第後園乘腰輿指麾處分呼直兵直兵無手板左右授一玉手板與之謂曰橘樹一株死可覓補之因出後園閣直兵倒地仍失手板羣吏中南陽樂藹彭城劉繪吳郡張稷最被親禮藹與竟陵王子良箋欲率荊江湘三州僚吏建碑託中書侍郎劉繪營辦藹又與右率沈約書請為文約答曰郭有道漢末之匹夫非蔡伯喈不足以偶三絶謝安石素族之台輔時無麗藻迄乃有碑無文況文獻王冠冕彝倫儀刑宇內自非一代辭宗難或與此約閭閈鄙人名不入第欻酬今旨便是以禮許人聞命慚顏已不覺汗之霑背也建武中第二子子恪託約及太子詹事孔圭為文妃庾氏有女功婦德嶷甚重之宋時武帝及嶷位宦尚輕家又貧薄庾氏常徹己損身以相營奉兄弟每行來公事晚還飢疲躬營飲食未嘗不迎時先辦雖豐儉隨事而香淨適口穆皇后不自營又不整潔上亦以此貴之又不妬忌嶷倍加敬重嶷薨後少時亦亡子廉字景藹初嶷養魚復侯子響為嗣子子廉封永新侯子響還本子廉為世子位淮陵太守太子中舍人前將軍善撫諸弟十一年卒贈侍中諡哀世子子元琳嗣梁武受禪詔曰豫章王元琳故竟陵王昭胄子同齊氏宗國高武嫡胤宜祚井邑以傳于後降封新淦侯子廉弟子恪字景沖永明中以王子封南康縣侯年十二和從兄司徒竟陵王子良高松賦衛軍王儉見而奇之建武中為吳郡太守及大司馬王敬則於會稽反奉子恪為名而子恪奔走未知所在始安王遙光勸上併誅高武諸子孫於是並敕竟陵王昭胄等六十餘人入永福省令太醫煮椒二斛并命辦數十具棺材謂舍人沈徽孚曰椒熟則一時賜死期三更當殺之會上暫臥主書單景雋啓依旨斃之徽孚堅執曰事須更審爾夕三更子恪徒跣奔至建陽門上聞驚覺曰故當未賜諸侯命邪徽孚以答上撫牀曰遙光幾誤人事及見子恪顧問流涕諸侯悉賜供饌以子恪為太子中庶子東昏即位為侍中中興二年為相國咨議參軍梁天監元年降爵為子位司徒左長史子恪與弟子範等嘗因事入謝梁武帝在文德殿引見謂曰夫天下之寶本是公器苟無期運雖有項籍之力終亦敗亡宋孝武為性猜忌兄弟粗有令名者無不因事鴆毒所遺唯景和至朝臣之中疑有天命而致害者枉濫相繼于時雖疑卿祖無如之何如宋明帝本為庸常被免豈疑得全又復我于時已年二歲彼豈知我應有今日當知有天命者非人所害害亦不能得我初平建康城朝廷內外皆勸我云時代革異物心須一宜行處分我于時依此而行誰謂不可政言江左以來代謝必相誅戮此是傷於和氣國祚例不靈長此是一義二者齊梁雖曰革代義異往時我與卿兄弟宗屬未遠卿勿言兄弟是親人家兄弟自有周旋者不周旋者況五服之屬邪齊業之初亦是甘苦共嘗腹心在我卿兄弟年少理當不悉我與卿兄弟便是情同一家豈當都不念此作行路事此是二義且建武屠滅卿門我起義兵非惟自雪門恥亦是為卿兄弟報仇卿若能在建武永元之時撥亂反正我雖起樊鄧豈得不釋戈推奉我今為卿報仇且時代革異望卿兄弟盡節報我耳且我自藉喪亂代明帝家天下不取卿家天下昔劉子輿自稱成帝子光武言假使成帝更生天下亦不復可得況子輿乎梁初人勸我相誅滅者我答之猶如向言若苟有天命非我所殺若其無運何忽行此政是示無度量曹志親是魏武帝孫入事晉武為晉室忠臣此即卿事例卿是宗室情義異他方坦然相期小待自當知我寸心又文獻王時內齊直帳閹人趙叔祖天監初入臺為齊帥在壽光省武帝呼問曰汝比見北第諸郎不若見道我此意今日雖是革代情同一家但今盤石未立所以未得用諸郎非唯在我未宜我亦是欲使諸郎得得安耳但閉門高枕後自當見我心叔祖即出具宣敕意子恪普通三年纍遷都官尚書四年轉吏部大通二年出為吳郡太守卒官諡曰恭子子恪兄弟十六人並入梁有文學者子恪子質子顯子雲子暉子恪常謂所親曰文史之事諸弟備之矣不煩吾復牽率但退食自公無過足矣子恪亦涉學頗屬文隨棄其本故不傳文集子恪次弟子操封泉陵侯王侯出身官無定準素姓三公長子一人為員外郎建武中子操解褐為給事中自此齊末皆以為例永泰元年兄南康侯子恪為吳郡太守避王敬則難歸以子操為吳郡太守永元中為黃門郎子操弟子範字景則齊永明中封祁陽縣侯拜太子洗馬天監初降爵為子位司徒主簿丁所生母憂去職子範有孝性居喪以毀聞服闋纍遷大司馬南平王從事中郎王愛文學士子範偏被恩遇常曰此宗室奇才也使製千字文其辭甚美王命記室蔡薳注釋之自是府中文筆皆使具草後為臨賀王正德長史正德遷丹陽尹復為正德信威長史領尹丞歷官十餘年不出蕃府而諸弟並登顯列意不能平及是為到府箋曰上蕃首僚於茲再忝河南雌伏自此重叨老少異時盛衰殊日雖佩恩寵還羞年鬢子範少與弟子顯子雲才名略相比而風采容止不逮故宦途有優劣每讀漢書杜緩傳云六弟五人至大官唯中弟欽官不至最知名常吟諷之以況己也後為祕書監簡文即位召為光祿大夫加金章紫綬以逼賊不拜其年葬簡皇后使製哀策文理哀切帝謂武林侯蕭咨曰此段莊陵萬事零落唯哀冊尚有典刑敕賚米千石子範無居宅尋卒於招提寺僧房賊平元帝追贈金紫光祿大夫諡曰文前後文集三十卷子滂確並少有文章簡文在東宮時嘗與邵陵王數諸蕭文士滂確並預焉滂位中軍宣城王記室先子範卒確位司徒右長史魏平江陵入長安滂弟乾字思惕容止雅正性恬簡善隸書得叔父子雲之法九歲補國子周易生祭酒袁昂深敬重之仕梁為宣城王咨議參軍陳武帝鎮南徐州引為司空從事中郎及受命永定元年除給事黃門侍郎時熊曇朗在豫章周迪在臨川留異在東陽陳寶應在建安共相連結閩中豪帥立柴自保武帝患之令乾往諭以逆順謂曰昔陸賈南征趙他歸順隨何奉使黥布來臣追想清風髣佛在目卿宜勉建功名不煩更勞師旅乾至示以逆順所在款附其年就除建安太守天嘉二年留異反陳寶應助之又資周迪兵糧出寇臨川因逼建安乾單使臨郡不能守乃棄郡以避寶應時閩中宰守並受寶應署置乾獨不屈徙居郊野及寶應平都督章昭達以聞文帝甚嘉之超授五兵尚書卒諡靜子子顯字景陽子範弟也糼聰慧嶷偏愛之七歲封寧都縣侯梁天監初降為子位太尉録事參軍子顯身長八尺狀貌甚雅好學工屬文嘗著鴻序賦尚書令沈約見而稱曰可謂明道之高致蓋幽通之流也又採衆家後漢考正同異為一家之書又啓撰齊史書成表奏詔付祕閣纍遷邵陵王友後除黃門郎中大通二年遷長兼侍中梁武帝雅愛子顯才又嘉其容止吐納每御筵侍坐偏顧訪焉嘗從容謂曰我造通史此書若成衆史可廢子顯對曰仲尼讚易道黜八索述職方除九丘聖製符同復在茲日時以為名對三年以本官領國子博士武帝製孝經義未列學官子顯在職表置助教一人生十人又啓撰武帝集并普通北伐記遷國子祭酒加侍中於學遞述武帝五經義遷吏部尚書侍中如故子顯風神灑落雍容間雅簡通賓客不畏鬼神性愛山水為伐社文以見其志飲酒數斗頗負才氣及掌選見九流賓客不與交言但舉扇一撝而已衣冠竊恨然簡文素重其為人在東宮時每引與促宴子顯嘗起更衣簡文謂坐客曰常聞異人間出今日始見知是蕭尚書其見重如此出為吳興太守卒時年四十九詔贈侍中中書令及請諡手敕曰恃才傲物宜諡曰驕子顯嘗為自序其略云余為邵陵王友忝還京師遠思前比即楚之唐宋梁之嚴鄒追尋平生頗好辭藻雖在名無成求心已足若乃登高目極臨水送歸風動春朝月明秋夜早雁初開花落葉有來斯應每不能已也且前代賈傅崔馬邯鄲繆路之徒並以文章顯所以屢上歌頌自比古人天監十六年始預九日朝宴稠人廣坐獨受旨云今雲物甚美卿將不斐然賦詩詩既成又降旨曰可謂才子余退謂人曰一顧之恩非望而至遂方賈誼何如哉未易當也每有製作特寡思功須其自來不以力構少來所為詩賦則鴻序一作體兼衆製文備多方頗為好事所傳故虛聲易遠子顯所著後漢書一百卷齊書六十卷普通北伐記五卷貴儉傳三卷文集二十卷子序愷並少知名序太清中位中庶子卒愷太子家令愷才學譽望時論以方其父簡文在東宮早引接之時中庶子謝嘏出守建安於宣猷堂餞飲並召時才賦詩同用十五劇韻愷詩先就其辭又美簡文與湘東王令曰王筠本自舊手後進有蕭愷可稱信為才子先是太學博士顧野王奉令撰玉篇簡文嫌其書詳略未當以愷博學於文字尤善使更與學士刪改太清中卒於侍中子顯弟子雲子雲字景喬年十二齊建武四年封新浦縣侯自製拜章便有文采梁天監初降爵為子及長勤學有文藻弱冠撰晉書至年二十六書成百餘卷表奏之詔付祕閣子雲性沈靜不樂仕進風神間曠任性不羣夏月對賓客自裸袒而兄弟不睦乃至吉凶不相弔問時論以此少之年三十方起家為祕書郎遷太子舍人撰東宮新記奏之敕賜束帛纍遷丹陽郡丞湘東王繹為丹陽尹深相賞好如布衣之交中大通三年為臨川內史在郡以和理稱人吏悅之還除散騎常侍歷侍中國子祭酒梁初郊廟未革牲牷樂辭皆沈約撰至是承用子雲啓宜改之敕答曰此是主者守株宜急改也仍使子雲撰定敕曰郊廟歌辭應須典誥大語不得雜用子史文章淺言而沈約所撰亦多舛謬子雲作成敕並施用子雲善草隸為時楷法自云善效鍾元常王逸少而微變字體嘗答敕云臣昔不能拔賞隨時所貴規摹子敬多歷年所年二十六著晉史至二王列傳欲作論草隸法言不盡意遂不能成略指論飛白一事而已十許年始見敕旨論書一卷商略筆狀洞徹字體始變子敬全範元常逮爾以來自覺功進其書迹雅為武帝所重帝嘗論書曰筆力徑駿心手相應巧逾杜度美過崔實當與元常並驅爭先其見賞如此出為東陽太守百濟國使人至建鄴求書逢子雲為郡維舟將發使人於渚次候之望船三十許步行拜行前子雲遣問之答曰侍中尺牘之美遠流海外今日所求唯在名迹子雲乃為停船三日書三十紙與之獲金貨數百萬性吝自外答餉不書好紙好事者重加賂遺以要其答太清元年復為侍中國子祭酒二年侯景寇逼子雲逃人間三年宮城失守奔晉陵餒卒于顯雲寺僧房年六十三所著晉書一百一十卷東宮新記二十卷子特字世達早知名亦善草隸時人比之衛衛瓘武帝嘗使特書及奏帝曰子敬之迹不及逸少蕭特之書遂逼於父位太子舍人海鹽令坐事免先子雲卒遺啓簡文求為墓志銘帝為製銘焉子雲弟子暉字景光少涉學亦有文才性恬靜寡嗜欲嘗預重雲殿聽制講三慧經退為講賦奏之甚見賞卒於驃騎長史
