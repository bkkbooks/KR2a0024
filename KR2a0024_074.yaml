body:
  text: 南史卷七十四列傳第六十四孝義下滕曇恭徐普濟張悌陶季直沈崇傃荀匠吉翂甄恬趙拔扈韓懷明褚修張景仁宛陵女子衛敬瑜妻王劉景昕陶子鏘成景俊李慶緒謝藺子貞殷不害弟不佞司馬皓張昭弟乾王知玄滕曇恭豫章南昌人也年五歲母楊氏患熱思食寒瓜土俗所不産曇恭歷訪不能得銜悲哀切俄遇一桑門問其故曇恭具以告桑門曰我有兩瓜分一相遺還以與母舉室驚異尋訪桑門莫知所在及父母卒曇恭並水漿不入口者旬日感慟嘔血絶而復蘇隆冬不著繭絮蔬食終身每至忌日思慕不自堪晝夜哀慟其門外有冬生樹二株時忽有神光自樹而起俄見佛像及夾侍之儀容光顯著自門而入曇恭家人大小咸共禮拜久之乃滅遠近道俗咸傳之太守王僧虔引曇恭為功曹固辭不就王儉時隨僧虔在郡號為滕曾子梁天監元年陸璉奉使巡行風俗表言其狀曇恭有子三人皆有行業時有徐普濟者長沙臨湘人居喪未葬而鄰家火起延及其舍普濟號慟伏棺上以身蔽火鄰人往救之焚炙已悶絶纍日方蘇又有建康人張悌家貧無以供養以情告鄰富人富人不與不勝忿遂結四人作劫所得衣物三劫持去實無一錢入己縣抵悌死罪悌兄松訴稱與弟景是前母子後母唯生悌松長不能教誨乞代悌死景又曰松是嫡長後母唯生悌若從法母亦不全亦請代死母又云悌應死豈以弟罪枉及諸兄悌亦引分乞全兩兄供養縣以上讞帝以為孝義特降死後不得為例陶季直丹陽秣陵人也祖愍祖宋廣州刺史父景仁中散大夫季直早慧愍祖甚愛異之嘗以四函銀列置於前令諸孫各取其一季直時年四歲獨不取曰若有賜當先父伯不應度及諸孫故不取愍祖益奇之五歲喪母哀若成人初母未病令於外染衣卒後家人始贖季直抱之號慟聞者莫不酸感及長好學淡於榮利徵召不起時人號曰聘君後為望蔡令以病免時劉彥節袁粲以齊高帝權盛將圖之彥節素重季直欲與謀季直以袁劉儒者必致顛殞固辭不赴俄而彥節等敗齊初為尚書比部郎時褚彥回為尚書令素與季直善頻以為司空司徒主簿委以府事彥回卒尚書令王儉以彥回有至行欲諡文孝公季直曰文孝是司馬道子諡恐其人非具美不如文簡儉從之季直又請為彥回立碑始終營護甚有吏節再遷東莞太守在郡號為清和後為鎮西咨議參軍齊武帝崩明帝作相誅鋤異己季直不能阿意取容明帝頗忌之出為輔國長史北海太守邊職上佐素士罕為之者或勸季直造門致謝明帝留以為驃騎咨議參軍兼尚書左丞遷建安太守為政清靜百姓便之梁臺建為給事黃門侍郎常稱仕至二千石始願畢矣無為久預人間事乃辭疾還鄉里梁天監初就拜太中大夫武帝曰梁有天下遂不見此人十年卒于家季直素清苦絶倫又屏居十餘載及死家徒四壁子孫無以殯斂聞者莫不傷其志事云沈崇傃字思整吳興武康人也父懷明宋兗州刺史崇傃六歲丁父憂哭踊過禮及長事所生母至孝家貧常傭書以養天監二年太守柳惲辟為主簿崇傃從惲到郡還迎其母未至而母卒崇傃以不及侍疾將欲致死水漿不入口晝夜號哭旬日殆將絶氣兄弟謂曰殯葬未申遽自毀滅非全孝道也崇傃心悟乃稍進食母權瘞去家數里哀至輒之瘞所不避雨雪每倚墳哀慟飛鳥翔集夜有猛獸來望之有聲狀如歎息者家貧無以遷厝乃行乞經年始獲葬焉既而廬于墓側自以初行喪禮不備復以葬後更行服三年久食麥屑不噉鹽酢坐臥於單薦因虛腫不能起郡縣舉至孝梁武聞即遣中書舍人慰勉之乃詔令釋服擢補太子洗馬旌其門閭崇傃奉詔釋服而涕泣如居喪固辭不受官乃除永寧令自以祿不及養哀思不自堪未至縣卒荀匠字文師潁陰人晉太保勗九世孫也祖瓊年十五復父仇於成都巿以孝聞宋元嘉末度淮逢武陵王舉義為元凶追兵所殺贈員外散騎侍郎父法超仕齊為安復令卒官匠號慟氣絶身體皆冷至夜乃蘇既而奔喪每宿江渚商侶不忍聞其哭聲梁天監元年其兄斐為鬱林太守征俚賊為流矢所中死於陳喪還匠迎于豫章望舟投水傍人赴救僅而得全及至家貧不得時葬居父憂並兄服歷四年不出廬戶自括髮不復櫛沐髮皆禿落哭無時聲盡則係之以泣目眥皆爛形骸枯悴皮骨裁連雖家人不復識郡縣以狀言武帝詔遣中書舍人為其除服擢為豫章王國左常侍匠雖即吉而毀悴逾甚外祖孫謙誡之曰主上以孝臨天下汝行過古人故擢汝此職非唯君父之命難拒故亦揚名後世所顯豈獨汝身哉匠乃拜竟以毀卒吉翂字彥霄馮翊蓮勺人也家居襄陽翂幼有孝性年十一遭所生母憂水漿不入口殆將滅性親黨異之梁天監初父為吳興原鄉令為吏所誣逮詣廷尉翂年十五號泣衢路祈請公卿行人見者皆為隕涕其父理雖清白而恥為吏訊乃虛自引咎罪當大辟翂乃撾登聞鼓乞代父命武帝異之尚以其童幼疑受教於人敕廷尉蔡法度嚴加脅誘取其款實法度乃還寺盛陳徽纆厲色問曰爾求代父死敕已相許便應伏法然刀鋸至劇審能死不且爾童孺志不及此必為人所教姓名是誰若有悔異亦相聽許對曰囚雖蒙弱豈不知死可畏憚顧諸弟幼藐唯囚為長不忍見父極刑自延視息所以內斷胸臆上干萬乘今欲殉身不測委骨泉壤此非細故奈何受人教邪法度知不可屈撓乃更和顏誘語之曰主上知尊侯無罪行當釋亮觀君神儀明秀足稱佳童今若轉辭幸父子同濟奚以此妙年苦求湯鑊翂曰凡鯤鮞螻蟻尚惜其生況在人斯豈願咱說但父挂深劾必正刑書故思殞仆冀延父命翂初見囚獄掾依法備加桎梏法度矜之命脫其二械更令著一小者翂弗聽曰翂求代父死死囚豈可減乎竟不脫械法度以聞帝乃宥其父丹陽尹王志求其在廷尉故事並請鄉居欲於歲首舉充純孝翂曰異哉王尹何量翂之薄夫父辱子死斯道固然若翂有靦面目當其此舉則是因父買名一何甚辱拒之而止年十七應辟為本州主簿出監萬年縣攝官朞月風化大行自雍還郢湘州刺史柳忱復召為主簿後秣陵鄉人裴儉丹陽尹丞臧盾揚州中正張仄連名薦翂以為孝行純至明通易老敕付太常旌舉初翂以父陷罪因成悸疾後因發而卒甄恬字彥約中山無極人也世居江陵數歲喪父哀感有若成人家人矜其小以肉汁和飯飼之恬不肯食年八歲嘗問其母恨生不識父遂悲泣纍日忽若有見言形貌則其父也時以為孝感家貧養母常得珍羞及居喪廬於墓側有鳥玄黃雜色集於廬樹恬哭則鳴哭止則止又有白鳩白雀栖宿其廬州將始興王憺表其行狀詔旌表門閭加以爵位恬官至安南行參軍趙拔扈新城人也兄震動富於財太守樊文茂求之不已震動怒曰無厭將及我文茂聞其語聚其族誅之拔扈走免亡命聚黨至社樹呪曰文茂殺拔扈兄今欲報之若事克斫樹處更生不克即死三宿三枿生十丈餘人間傳以為神附者十餘萬既殺文茂轉攻傍邑將至成都十餘日戰敗退保新城求降文茂黎州刺史文熾弟襄陽人也韓懷明上黨人也客居荊州十歲母患尸疰每發輒危殆懷明夜於星下稽顙祈禱時寒甚切忽聞香氣空中有人曰童子母須臾永差無勞自苦未曉而母平復鄉里以此異之十五喪父幾至滅性負土成墳賻助無所受免喪與鄉人郭麻俱師南陽劉虬虬嘗一日廢講獨居涕泣懷明竊問虬家人答云是外祖亡日時虬母亦已亡矣懷明聞之即日罷學還家就養虬歎曰韓生無丘吾之恨矣家貧肆力以供甘脆嬉怡膝下朝夕不離母側母年九十以壽終懷明水漿不入口一旬號哭不絶聲有雙白鳩巢其廬上字乳馴狎若家禽焉服釋乃去及除喪蔬食終身衣衾無所改梁天監初刺史始興王憺表言之州纍辟不就卒于家褚修吳郡錢唐人也父仲都善周易為當時之冠梁天監中歷位五經博士修少傳父業武陵王紀為揚州引為宣惠參軍兼限內記室修性至孝父喪毀瘠過禮因患冷氣及丁母憂水漿不入口二十三日每號慟輒嘔血遂以毀卒張景仁廣平人也父梁天監初為同縣韋法所殺景仁時年八歲及長志在復讎普通七年遇法於公田渚手斬其首以祭父墓事竟詣郡自縛乞依刑法太守蔡天起上言於州時簡文在鎮乃下教褒美之原其罪下屬長蠲其一戶租調以旌孝行又天監中宣城宛陵女子與母同床眠母為猛獸所取女啼號隨拿猛獸行數十里獸毛盡落獸乃置其母而去女抱母猶有氣息經時乃絶鄉里言於郡縣太守蕭琛表上詔榜其門閭又霸城王整之姊嫁為衛敬瑜妻年十六而敬瑜亡父母舅姑咸欲嫁之誓而不許乃截耳置盤中為誓乃止遂手為亡壻種樹數百株墓前柏樹忽成連理一年許還復分散女乃為詩曰墓前一株柏根連復並枝妾心能感木頽城何足奇所住戶有燕巢常雙飛來去後忽孤飛女感其偏栖乃以縷繫腳為志後歲此燕果復更來猶帶前縷女復為詩曰昔年無偶去今春猶獨歸故人恩既重不忍復雙飛雍州刺史西昌侯藻嘉其美節乃起樓於門題曰貞義衛婦之閭又表於臺後有河東劉景昕事母孝謹母常病癖三十餘年一朝而瘳鄉里以為景昕誠感荊州刺史湘東王繹辟為主簿陶子鏘字海育丹陽秣陵人也父延尚書比部郎兄尚宋末為幸臣所怨被繫子鏘公私緣訴流血稽顙行路嗟傷逢謝超宗下車相訪回入縣詣建康令勞彥遠曰豈忍見人昆季如此而不留心勞感之兄得釋母終居喪盡禮與范雲鄰雲每聞其哭聲必動容改色欲相申薦會雲卒初子鏘母嗜蓴母沒後以供奠梁武義師初至此年冬營蓴不得子鏘痛恨慟哭而絶久之乃蘇遂長斷蓴味成景俊字超范陽人也祖興仕魏為五兵尚書父安樂淮陽太守梁天監六年常雍和殺安樂以城內附景俊謀復讎因殺魏宿預城主以地南入普通六年雍和為鄱陽內史景俊購人刺殺之未久重購雍和家人鴆殺其子弟噍類俱盡武帝義之每為屈法景俊家讎既雪每思報效後除北豫州刺史侵魏所向必推其智勇時以比馬仙琕兼有政績見懷北豫州吏人樹碑紀德卒諡曰忠烈云李慶緒字孝緒廣漢郪人也父為人所害慶緒九歲而孤為兄所養日夜號泣志在復讎投州將陳顯達仍於部伍白日手刃其仇自縛歸罪州將義而釋之梁天監中為東莞太守丁母憂去職廬于墓側每慟嘔血數升後為巴郡太守號良吏纍遷衛尉封安陸縣侯益州三百年無復貴仕慶緒承恩至此便欲西歸尋徙太子右衛率未拜而卒謝藺字希如陳郡陽夏人晉太傅安之八世孫也父經北中郎咨議參軍藺五歲時父未食乳媼欲令先飯藺終不進舅阮孝緒聞之歎曰此兒在家則曾子之流事君則藺生之匹因名曰藺稍授以經史過目便能諷誦孝緒每曰吾家陽元也及丁父憂晝夜號慟毀瘠骨立母阮氏常自守視譬抑之服闋吏部尚書蕭子顯嘉其至行擢為王府法曹行參軍纍遷外兵記室參軍時甘露降士林館藺獻頌武帝嘉之有詔使製北兗州刺史蕭楷德政碑又奉詔令製宣城王奉述中庸頌後為兼散騎常侍使魏會侯景入附境上交兵藺母既慮不得還感氣而卒及藺還入境夜夢不祥旦便投列馳歸及至號慟嘔血氣絶久之水漿不入口每哭眼耳口鼻皆血流經月餘日因夜臨而卒所製詩賦碑頌數十篇子貞貞字元正幼聰敏有至性祖母阮氏先苦風眩每發便一二日不能飲食貞時年七歲祖母不食貞亦不食往往如此母王氏授以論語孝經讀訖便誦八歲嘗為春日間居詩從舅王筠奇之謂所親曰至如風定花猶落乃追步惠連矣年十三尤善左氏春秋工草隸蟲篆十四丁父艱號頓於地絶而復蘇者數矣初貞父藺以憂毀卒家人賓客復憂貞從父洽族兄皓乃共請華嚴寺長爪禪師為貞說法仍譬以母須侍養不宜毀滅乃少進饘粥及魏剋江陵入長安皓逃難番禺貞母出家于宣明寺及陳武帝受禪皓還鄉里供養貞母將二十年初貞在周嘗侍周武帝愛弟趙王招讀招厚禮之聞其獨處必晝夜涕泣私問知母在鄉乃謂曰寡人若出居藩當遣侍讀還家後數年招果出因辭面奏請放貞還帝奇招仁愛遣隨聘使杜子暉歸國是歲陳太建五年也始自周還時始興王叔陵為揚州刺史引祠部侍郎阮卓為記室辟貞為主簿尋遷府録事參軍領丹陽丞貞知叔陵有異志因與卓自疏於王每有宴遊輒以疾辭未嘗參預叔陵雅重之弗之罪也及叔陵肆逆唯貞與卓不坐再遷南平王友掌記室事府長史汝南周確新除都官尚書請貞為讓表後主覽而奇之及問知貞所作因敕舍人施文慶曰謝貞在王家未有祿秩可賜米百石以母憂去職頃之敕起還府纍啓固辭敕不許貞哀毀羸瘠終不能之官舍吏部尚書姚察與貞友善及貞病篤問以後事貞曰孤子釁禍所集將隨灰壤族子凱等粗自成立己有疏付之此固不足仰塵厚德弱兒年甫六歲名靖字依仁情纍所不能忘敢以為託是夜卒後主問察曰謝貞有何親屬察以靖答即敕長給衣糧初貞之病有遺疏告族子凱氣絶之後若依僧家尸林法是吾所願正恐過為獨異可用薄板周身載以露車覆以草席坎山次而埋之又靖年尚小未閲人事但可三月施小床設香水盡卿兄弟相厚之情即除之無益之事勿為也殷不害字長卿陳郡長平人也祖汪齊豫章王行參軍父高明梁尚書中兵郎不害性至孝居父憂過禮由是少知名家世儉約居甚貧寠有弟五人皆幼弱不害事老母養小弟勤劇無所不至士大夫以篤行稱之年十七仕梁為廷尉平長於政事兼飾以儒術名法有輕重不便者輒上書言之多見納用大同五年兼東宮通事舍人時朝政多委東宮不害與舍人庾肩吾直日奏事梁武帝嘗謂肩吾曰卿是文學之士吏事非卿所長何不使殷不害來邪其見知如此簡文以不害善事親賜其母蔡氏錦裙襦氈席被褥單復畢備侯景之亂不害從簡文入臺及臺城陷簡文在中書省景帶甲將兵入朝陛見過謁簡文衝突左右甚不遜侍衛者莫不驚恐辟易唯不害與中庶子徐摛侍側不動簡文為景所幽遣人請不害與居處景許之不害供侍益謹梁元帝立以不害為中書郎兼廷尉卿魏平江陵失母所在時甚寒雪凍死者填滿溝壑不害行哭尋求聲不暫輟遇見死人溝中即投身捧視舉體凍僵水漿不入口者七日始得母尸憑尸而哭每舉音輒氣絶行路皆為流涕即江陵權殯與王褒庾信俱入長安自是蔬食布衣枯槁骨立見者莫不哀之太建七年自周還陳除司農卿遷晉陵太守在郡感疾詔以光祿大夫徵還養疾後主即位加給事中初不害之還也周留其長子僧首因居關中禎明三年陳亡僧首來迎不害道卒年八十五不害弟不佞不佞字季卿少立名節居父喪以至孝稱好讀書尤長吏術梁承聖初為武康令時兵荒饑饉百姓流移不佞循撫招集繈負至者以千數會魏剋江陵而母卒道路隔絶久不得奔赴四載之中晝夜號泣居處飲食常為居喪之禮陳武帝受禪除婁令至是第四兄不齊始於江陵迎母喪柩歸葬不佞居處之節如始聞問若此者又三年身自負土手植松柏每歲時伏臘必三日不食文帝時兼尚書右丞遷東宮通事舍人及廢帝嗣立宣帝為太傅録尚書輔政甚為朝望所歸不佞素以名節自立又受委東宮乃與僕射到仲舉中書舍人劉師知尚書左丞王暹等謀矯詔出宣帝衆人猶豫未敢先發不佞乃馳詣相府面宣詔旨令相王還第及事發仲舉等皆伏誅宣帝雅重不佞特赦之免其官而已及即位以為軍師始興王咨議參軍後兼尚書左丞加通直散騎常侍卒官不佞兄不疑不占不齊並早亡事第二寡嫂張氏甚謹所得祿奉不入私室長子梵童位尚書金部郎司馬皓字文升河內溫人也高祖柔之晉侍中以南頓王孫紹齊文獻王攸後父子産即梁武帝之外兄也位嶽陽太守皓幼聰警有至性年十二丁內艱哀慕過禮水漿不入口殆經一旬每號慟必至悶絶父每喻之令進粥然猶毀瘠骨立服闋以姻戚子弟入問訊梁武帝見其羸疾歎息久之字其小字謂其父曰昨見羅兒面顏憔悴使人惻然便是不墜家風為有子矣後纍遷正員郎丁父艱哀毀愈甚廬于墓側日進薄麥粥一升墓在新林連接山阜舊多猛獸皓結廬數載豺狼絶迹常有兩鳩栖宿廬所馴狎異常承聖中除太子庶子魏剋江陵隨例入長安而梁宗屠戮太子殯瘞失所及周受禪皓以宮臣乃抗表求還江陵改葬辭甚酸切周朝優詔答之即敕荊州以禮安厝陳太建八年自周還宣帝特降殊禮歷位通直散騎常侍太中大夫卒有集十卷子延義字希忠少沉敏好學初隨父入關丁母憂喪過于禮及皓還都延義乃躬負靈櫬晝伏宵行冒履冰霜手足皸瘃至都遂致攣廢數年乃愈位司徒從事中郎張昭字德明吳郡吳人也幼有孝性父熯常患消渴嗜鮮魚昭乃身自結網捕魚以供朝夕弟乾字玄明聰敏好學亦有至性及父卒兄弟並不衣綿帛不食鹽酢日唯食一升麥屑粥每一感慟必致歐血鄰里聞之皆為涕泣父服未終母陸氏又卒兄弟遂六年哀毀形容骨立家貧未得大葬遂布衣蔬食十有餘年杜門不出屏絶人事時衡陽王伯信臨州舉乾孝廉固辭不就兄弟並因毀成疾昭一眼失明乾亦中冷苦癖年並未五十終于家子胤俱絶宣帝時有太原王知玄者僑居會稽剡縣居家以孝聞及丁父憂哀毀而卒帝嘉之詔改所居青苦里為孝家里論曰自澆風一起人倫毀薄蓋抑引之教導俗所先變里旌閭義存勸奬是以漢世士務修身故忠孝成俗至于乘軒服冕非此莫由晉宋以來風衰義缺刻身厲行事薄膏腴若使孝立閨庭忠被史策多發溝畎之中非出衣簪之下以此而言聲教不亦卿大夫之恥乎
