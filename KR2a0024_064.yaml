body:
  text: 南史卷六十四列傳第五十四江子一胡僧祐徐文盛陰子春子鏗杜崱兄岸弟幼安兄子龕王琳張彪江子一字元亮濟陽考城人晉散騎常侍統之七世孫也父法成奉朝請子一少慷慨有大志家貧以孝聞苦侍養多闕因終身蔬食仕梁起家為王國侍郎奉朝請上書言事為當軸所排乃拜表求入北為刺客武帝異之又啓求觀書祕閣武帝許之有敕直華林省其姑夫左衛將軍朱虉權要當朝休下之日賓客輻湊虉不為物議所歸欲引子一為助子一未嘗造門其高潔如此為遂昌曲阿令皆著美績後為南津校尉弟子四歷尚書金部郎大同初遷右丞兄弟性並剛烈子四自右丞上封事極言得失武帝甚善之詔曰屋漏在上知之在下其令尚書詳擇施於時政左戶郎沈炯少府丞顧璵嘗奏事不允帝厲色呵責之子四乃趨前代炯等對對甚激切帝怒呼縛之子四乃據地不受帝怒亦歇乃釋之猶坐免職及侯景攻陷歷陽自橫江將度子一帥舟師千餘人於下流欲邀之其副董桃生走子一乃退還南洲收餘衆步赴建鄴見於文德殿帝怒之具以事對且曰臣以身許國常恐不得其死今日之事何所復惜不死闕前終死闕後耳及城被圍開承明門出戰子一及弟尚書左丞子四東宮直殿主帥子五並力戰直前賊坐甲不起子一引矟撞之賊縱突騎衆並縮子一刺其騎騎倒矟折賊解其肩時年六十二弟曰與兄俱出何面獨旋乃免胄赴敵子四矟洞胸死子五傷脰還至塹一慟而絶賊義子一之勇歸之面如生詔贈子一給事黃門侍郎子四中書侍郎子五散騎侍郎侯景平元帝又追贈子一侍中諡義子子四黃門侍郎諡毅子子五中書侍郎諡烈子子一續黃圖及班固九品並辭賦文章數十篇行於世胡僧祐字願果南陽冠軍人也少勇決有武幹仕魏位銀青光祿大夫以大通三年避爾朱氏之難歸梁頻上封事武帝器之拜文德主帥使戍項城魏剋項城因入北中大通元年陳慶之送魏北海王元皓入洛陽僧祐又歸梁徐南天水天門二郡太守有善政性好讀書愛緝綴然文辭鄙野多被謿謔而自謂實工矜伐彌甚晚事梁元帝侯景之亂西沮蠻反元帝令僧祐討之使盡誅其渠帥僧祐諫忤旨下獄大寶二年景圍王僧辨於巴陵元帝乃引僧祐於獄拜為假節武猛將軍封新市縣侯令援僧辨將發泣下謂其子曰汝可開朱白二門吾不捷則死吉則由朱凶則由白也元帝聞而壯之前至赤沙亭會陸法和至乃與並軍大敗景將任約軍禽約送江陵侯景聞之遂遁後拜領軍將軍厚自封殖以所加鼓吹置齊中對之自娛人曰此是羽儀公名望隆重不宜若此答曰我性愛之須見耳或出游亦以自隨人士笑之承聖二年為車騎將軍開府儀同三司及魏軍至以僧祐為都督城東諸軍事俄中流矢卒城遂潰徐文盛字道茂彭城人也家本魏將父慶之梁天監初自北歸南未至道卒文盛仍統其衆稍立功績大同末為寧州刺史州在僻遠羣蠻劫竊相尋前後刺史莫能制文盛推心撫慰夷人感之風俗遂改太清二年聞國難乃召募得數萬人來赴元帝以為秦州刺史加都督授以東討之略東下至武昌遇侯景將任約遂與相持元帝又命護軍將軍尹悅平東將軍杜幼安巴州刺史王珣等會之並受文盛節度大敗約於貝磯約退保西陽文盛進據蘆洲又與相持景聞之率大衆西上援約至西陽諸將咸曰景水軍輕進又甚飢疲擊之必大捷文盛不許文盛妻石氏先在建鄴至是景載以還之文盛深德景遂密通信使都無戰心衆咸憤怨杜幼安宋簉等乃率所領獨進大破景獲其舟艦以歸會景密遣騎間道襲陷郢州軍中懼遂大潰文盛奔還荊州元帝仍以為城北面大都督又聚斂贓汙甚多元帝大怒下令數其十罪除其官爵文盛私懷怨望帝聞之乃以下獄時任約被禽與文盛同禁文盛謂約曰何不早降令我至此約曰門外不見卿馬跡使我何處得降文盛無以答遂死獄中陰子春字幼文武威姑臧人也晉義熙末曾祖襲隨宋武帝南遷至南平因家焉父智伯與梁武帝鄰居少相善嘗入帝臥內見有異光成五色因握帝手曰公後必大貴非人臣也天下方亂安蒼生者其在君乎帝曰幸勿多言於是情好轉密帝每有求如外府焉及帝踐阼官至梁秦二州刺史子春仕歷位朐山戍主東莞太守時青州石鹿山臨海先有神廟刺史王神念以百姓祈禱糜費毀神影壞屋舍當坐棟上有一大蛇長丈餘役夫打撲不禽得入海水爾夜子春夢見人通名詣子春云有人見苦破壞宅舍既無所託欽君厚德欲憩此境子春心密記之經二日而知之甚驚以為前所夢神因辦牲醑請召安置一處數日復夢一朱衣人相聞辭謝云得君厚惠當以一州相報子春心喜供事彌勤經月餘魏欲襲朐山間諜前知子春設伏摧破之詔授南青州刺史鎮朐山又遷都督梁秦二州刺史子春雖無他才行臨人以廉潔稱閨門混雜而身服垢汙腳數年一洗言每洗則失財敗事云在梁州以洗足致梁州敗太清二年徵為左衛將軍遷侍中屬侯景亂元帝令子春隨王僧辨攻平邵陵王又與左衛將軍徐文盛東討景至貝磯與景遇子春力戰冠諸軍會郢州陷沒軍遂退卒於江陵子鏗鏗字子堅博涉史傳尤善五言詩被當時所重為梁湘東王法曹行參軍初鏗嘗與賓友宴飲見行觴者因回酒炙以授之衆坐皆笑鏗曰吾儕終日酣酒而執爵者不知其味非人情也及侯景之亂鏗嘗為賊禽或救之獲免鏗問之乃前所行觴者陳天嘉中為始興王中録事參軍文帝嘗宴羣臣賦詩徐陵言之帝即日召鏗預宴使賦新成安樂宮鏗援筆便就帝甚歎賞之纍遷晉陵太守員外散騎常侍頃之卒有文集三卷行於世杜崱京兆杜陵人也其先自北歸南居於雍州之襄陽子孫因家焉父懷寶少有志節梁天監中纍有軍功後又立功南鄭位梁秦二州刺史大同初魏軍復圍南鄭懷寶命第三子嶷帥二百人與魏前鋒戰於光道寺流矢中其目失馬敵人交矟將至嶷斬其一騎而上馳以歸嶷膂力絶人便馬善射一日中戰七八合所佩霜明朱弓四石餘力斑絲矟長二丈五同心敢死士百七十人每出殺傷數百人敵人憚之號為杜彪懷寶卒於州諡曰桓侯嶷位西荊州刺史時讖言獨梁之下有瞎天子元帝以嶷其人也會嶷改葬父祖帝敕圖墓者惡為之逾年而嶷卒崱嶷弟也幼有志氣居鄉里以膽勇稱後為新興太守太清三年隨嶽陽王來襲荊州元帝與崱兄岸有舊密書邀之崱乃與岸弟幼安兄子龕等夜歸元帝以為武州刺史封枝江縣侯令隨領軍王僧辨東討侯景至巴陵景遁加侍中進爵為公仍隨僧辨追景至石頭景敗崱入據臺城景平加散騎常侍江州刺史是月齊將郭元建攻秦州刺史嚴超達於秦郡王僧辨令崱赴援陳武帝亦自歐陽來會元建衆却崱因縱兵大破之元建遁時元帝執王琳於江陵琳長史陸納等於長沙反元帝徵崱與王僧辨討之及納等戰于車輪大敗之後納等降崱又與王僧辨西討平武陵王於硤口旋鎮遘疾卒諡曰武崱兄弟九人兄嵩岑嶷岌岸及弟幼安並知名岸字公衡太清中與崱隨嶽陽王察攻荊州同歸元帝帝以為北梁州刺史封江陵縣侯岸請以五百騎襲襄陽去城三十里城中覺之察夜知其師掩襄陽以岸等襄陽豪帥於是夜遁歸襄陽岸等知察至遂奔其兄南陽太守於廣平察遣將尹正薛暉等攻拔之獲岸等並其母妻子女並斬於襄陽北門母龔保林數岸於衆岸曰老婢教汝兒殺汝叔乃枉殺忠良察命拔其舌臠殺而烹之盡誅諸杜宗族親者幼弱下蠶室又發其墳墓燒其骸骨灰而揚之並以為漆及建鄴平崱兄弟發安寧陵焚之以報漆之酷元帝亦不責也幼安性至孝寬厚雄勇過人與兄崱同歸元帝帝以為西荊州刺史封華容縣侯與王僧辨討河東王譽於長沙平之又令助徐文盛東討侯景至貝磯大破景將任約斬其儀同叱羅子通湘州刺史趙威方等仍進軍大舉口別攻拔武昌景度蘆洲上流以壓文盛幼安與衆軍大敗之會景密遣騎襲陷郢州執刺史方諸人情大駭文盛由漢口遁歸衆軍大敗幼安降景景以其多反覆殺之龕岑之子也少驍勇善用兵與諸父歸元帝帝以為鄖州刺史封中廬縣侯與王僧辨討平河東王譽又隨僧辨下繼徐文盛軍至巴陵聞侯景陷郢州西上將至乃與僧辨等守巴陵景至圍之數旬不剋而遁遷太府卿定州刺史及衆軍至姑孰景將侯子鑒逆戰龕與陳武帝王琳等擊之大敗子鑒遂至石頭景親會戰龕與衆軍大破之論功為最授東揚州刺史又與王僧辨降陸納平武陵王及魏平江陵後齊納貞陽侯明以紹梁嗣以龕為震州刺史吳興太守遷南豫州刺史封溧陽縣侯又加散騎常侍鎮南大將軍龕僧辨壻也始為吳興太守以陳武帝既非素貴及為之本郡以法繩其宗門無所縱捨武帝銜之切齒及僧辨敗龕乃據吳興以拒之頻敗陳文帝軍龕好飲酒終日醉勇而無略部將杜泰私通於文帝說龕降文帝龕然之其妻王氏曰霸先讎隙如此何可求和因出私財賞募復大敗文帝軍後杜泰降文帝龕尚醉不覺文帝遣人負出項王寺前斬之王氏因截髮出家杜氏一門覆矣王琳字子珩會稽山陰人也本兵家元帝居蕃琳姊妹並入後庭見幸琳由此未弱冠得在左右少好武遂為將帥太清二年帝遣琳獻米萬石未至都城陷乃中江沈米輕舸還荊稍遷嶽陽內史以軍功封建寧縣侯侯景遣將宋子仙據郢州琳攻剋之禽子仙又隨王僧辨破景後拜湘州刺史琳果徑絶人又能傾身下士所得賞物不以入家麾下萬人多是江淮羣盜平景之勳與杜龕俱為第一恃寵縱暴於建鄴王僧辨禁之不可懼將為亂啓請誅之琳亦疑禍令長史陸納率部曲前赴湘州身輕上江陵陳謝將行謂納等曰吾若不反子將安之咸曰請死相泣而別及至帝以下吏而使廷尉卿黃羅漢太舟卿張載宣喻琳軍陸納等及軍人並哭對使者莫肯受命乃縶黃羅漢殺張載載性刻為帝所信荊州疾之如讎故納等因人之欲抽其腸繫馬腳使繞而走腸盡氣絶又臠割備五刑而斬之元帝遣王僧辨討納納等敗走長沙是時湘州未平武陵王兵下又甚盛江陵公私恐懼人有異圖納啓申琳無罪請復本位求為奴婢元帝乃鎖琳送僧辨時納出兵方戰會琳至僧辨升諸樓車以示之納等投戈俱拜舉軍皆哭曰乞王郎入城即出乃放琳入納等乃降湘州平仍復琳本位使拒武陵王紀紀平授衡州刺史元帝性多忌以琳所部甚盛又得衆心故出之嶺外又授都督廣州刺史其友人主書李膺帝所任遇琳告之曰琳蒙拔擢常欲畢命以報國恩今天下未平遷琳嶺外如有萬一不虞安得琳力忖官正疑琳耳琳分望有限可得與官爭為帝乎何不以琳為雍州刺史使鎮武寧琳自放兵作田為國禦捍若警急動靜相知孰若遠棄嶺南相去萬里一日有變將欲如何琳非願長坐荊南政以國計如此耳膺然其言而不敢啓故遂率其衆鎮嶺南元帝為魏圍逼乃徵琳赴援除湘州刺史琳師次長沙知魏平江陵已立梁王察乃為元帝舉哀三軍縞素遣別將侯平率舟師攻梁琳屯兵長沙傳檄諸方為進趣之計時長沙蕃王蕭韶及上游諸將推琳主盟侯平雖不能度江頻破梁軍又以琳兵威不接翻更不受指麾琳遣將討之不剋又師老兵疲不能進乃遣使奉表詣齊並獻馴象又使獻款于魏求其妻子亦稱臣于梁陳武帝既殺王僧辨推立敬帝以侍中司空徵琳不從命乃大營樓艦將圖義舉琳將張平宅乘一艦每將戰勝艦則有聲如野猪故琳戰艦以千數以野猪為名陳武帝遣將侯安都周文育等討琳仍受梁禪安都歎曰我其敗乎師無名矣逆戰於沌口琳乘平肩輿執鉞而麾之禽安都文育其餘無所漏唯以周鐵武一人背恩斬之鎖安都文育置琳所坐艦中令一閹豎監守之琳乃移湘州軍府就郢城帶甲十萬練兵於白水浦琳巡軍而言曰可以為勤王之師矣溫太真何人哉南江渠帥熊曇朗周迪懷二琳遣李孝欽樊猛與余孝頃同討之三將軍敗並為迪所囚安都文育等盡逃還建鄴初魏剋江陵之時永嘉王莊年甫七歲逃匿人家後琳迎還湘中衛送東下及敬帝立出質于齊請納莊為梁主齊文宣遣兵援送仍遣兼中書令李騊駼冊拜琳為梁丞相都督中外諸軍録尚書事又遣中書舍人辛賣心游詮之等齎璽書江表宣勞自琳以下皆有頒賜琳乃遣兄子叔寶率所部十州刺史子弟赴鄴奉莊纂梁祚於郢州莊授琳侍中使持節大將軍中書監改封安成郡公其餘並依齊朝前命及陳文帝立琳乃輔莊次于濡須口齊遣揚州道行臺慕容儼率衆臨江為其聲援陳遣安州刺史吳明徹江中夜上將襲盆城琳遣巴陵太守任忠大敗之明徹僅以身免琳兵因東下陳遣太尉侯瑱司空侯安都等拒之瑱等以琳軍方盛引軍入蕪湖避之時西南風至急琳謂得天道將直取揚州侯瑱等徐出蕪湖躡其後比及兵交西南風翻為瑱用琳兵放火燧以擲瑱船者皆反燒其船琳船艦潰亂兵士透水死者十二三其餘皆棄船上岸為陳軍所殺殆盡初琳命左長史袁泌御史中丞劉仲威同典兵侍衛莊及軍敗泌遂降陳仲威以莊投歷陽又送壽陽琳尋與莊同入齊齊孝昭帝遣琳出合肥鳩集義故更圖進取琳乃繕艦分遣招募淮南傖楚皆願勠力陳合州刺史裴景暉琳兄珉之壻也請以私屬導引齊師孝昭委琳與行臺左丞盧潜率兵應赴沈吟不決景暉懼事泄挺身歸齊齊孝昭賜琳璽書令鎮壽陽其部下將帥悉聽以從乃除琳驃騎大將軍開府儀同三司揚州刺史封會稽郡公又增兵秩兼給鐃吹琳水陸戒嚴將觀釁而動屬陳氏結好於齊使琳更聽後圖琳在壽陽與行臺尚書盧潛不協更相是非被召還鄴齊武成置而不問除滄州刺史後以琳為特進侍中所居屋脊無故剝破出赤蛆數升落地化為血蠕動有龍出於門外之池雲霧起晝晦會陳將吳明徹寇齊齊帝敕領軍將軍尉破胡等出援秦州令琳共為經略琳謂所親曰今太歲在東南歲星居牛斗分太白已高皆利為客我將有喪又謂破胡曰吳兵甚鋭宜長策制之慎勿輕鬬破胡不從戰軍大敗琳單馬突圍僅而獲免還至彭城齊令便赴壽陽並許召募又進封琳巴陵郡王陳將吳明徹進兵圍之堰肥水灌城而齊將皮景和等屯於淮西竟不赴救明徹晝夜攻擊城內水氣轉侵人皆患腫死病相枕從七月至十月城陷被執百姓泣而從之吳明徹恐其為變殺之城東北二十里時年四十八哭者聲如雷有一叟以酒脯來至號酹盡哀收其血懷之而去傳首建康懸之於市琳故吏梁驃騎府倉曹參軍朱瑒致書陳尚書僕射徐陵求琳首曰竊以朝市遷貿時傳骨鯁之風歷運推移間表忠貞之迹故典午將滅徐廣為晉家遺老當塗已謝馬孚稱魏室忠臣用能播美於前書垂名於後世梁故建寧公琳洛濱餘胄沂川舊族立功代邸效績中朝當離亂之辰總蕃伯之任爾乃輕躬殉主以身許國實追蹤於往彥信踵武於前修而天厭梁德尚思匡繼徒蘊包胥之念終遘萇弘之眚洎王業光啓鼎祚有歸於是遠跡山東寄命河北雖輕旅臣之歎猶懷客卿之禮感茲知己忘此捐軀至使身沒九泉頭行萬里誠復馬革裹尸遂其生平之志原野暴骸會彼人臣之節然身首異處有足悲者封樹靡卜良可愴焉瑒早簉末僚預參下席降薛君之吐握荷魏公之知遇是用霑巾雨袂痛可識之顏回腸疾首切猶生之面伏惟聖恩博厚明詔爰發赦王經之哭許田橫之葬瑒雖芻賤竊亦有心琳經蒞壽陽頗存遺愛曾游江右非無舊德比肩東閣之吏繼踵西園之賓願歸彼境還修窀穸庶孤墳既築或飛銜土之燕豐碑式樹時留墮淚之人近故舊王綰等已有論牒仰蒙制議不遂所陳昔廉公告逝即肥川而建塋域孫叔云亡仍芍陂而植楸檟由此言之抑有其例不使壽春城下唯傳報葛之人滄洲島上獨有悲田之客昧死陳祈伏待刑憲陵嘉其志節又明徹亦數夢琳求首並為啓陳主而許之仍與開府主簿劉韶慧等持其首還于淮南權瘞八公山側義故會葬者數千人瑒等乃間道北歸別議迎接尋有揚州人茅智勝等五人密送喪柩達于鄴贈十五州諸軍事揚州刺史侍中特進開府録尚書事諡曰忠武王葬給轀輬車琳體貌間雅立髮委地喜怒不形於色雖無學業而強記內敏軍府佐史千數皆識其姓名刑罰不濫輕財愛士得將卒之心少為將帥屢經喪亂雅有忠義之節雖本圖不遂齊人亦以此重之待遇甚厚及敗為陳軍所執吳明徹欲全之而其下將領多琳故吏爭來致請並相資給明徹由此忌之故及於難當時田夫野老知與不知莫不為之歔欷流泣觀其誠信感物雖李將軍之恂恂善誘殆無以加焉琳十七子長子敬在齊襲王爵武平末通直常侍第九子衍隋開皇中開府儀同三司大業初卒於渝州刺史張彪不知何許人自云家本襄陽或云左衛將軍衡州刺史蘭欽外弟也少亡命在若邪山為盜頗有部曲臨城公大連出牧東揚州彪率所領客焉始為防閣後為中兵參軍禮遇甚厚及侯景將宋子仙攻下東揚州復為子仙所知後去子仙還入若邪舉義征子仙不捷仍走向剡趙伯超兄子稜為侯景山陰令去職從彪後懷異心僞就彪計請酒為盟引刀子披心出血自歃彪信之亦取刀刺血報之刀始至心稜便以手案之望入彪心刀斜傷得不深稜重取刀刺彪頭面被傷頓絶稜謂已死因出外告彪諸將言已殺訖欲與求富貴彪左右韓武入視彪已蘇細聲謂曰我尚活可與手於是武遂誅稜彪不死復奉表元帝帝甚嘉之及侯景平王僧辨遇之甚厚引為爪牙與杜龕相似世謂之張杜貞陽侯踐位為東揚州刺史並給鼓吹室富於財晝夜樂聲不息剡令王懷之不從彪自征之留長史謝岐居守會僧辨見害彪不自展拔時陳文帝已據震澤將及會稽彪乃遣沈泰吳寶真還州助岐保城彪後至泰等反與岐迎陳文帝入城彪因其未定踰城而入陳文帝遂走出彪復城守沈泰說陳文帝曰彪部曲家口並在香巖寺可往收取遂往盡獲之彪將申進密與泰相知因又叛彪彪復敗走不敢還城據城之西山樓子及暗得與弟崑崙妻楊氏去猶左右數人追隨彪疑之皆發遣唯常所養一犬名黃蒼在彪前後未曾捨離乃還入若邪山中沈泰說陳文帝遣章昭達領千兵重購之並圖其妻彪眠未覺黃蒼驚吠劫來便嚙一人中喉即死彪拔刀逐之映火識之曰何忍舉惡卿須我者但可取頭誓不生見陳蒨劫曰官不肯去請就平地彪知不免謂妻楊呼為鄉里曰我不忍令鄉里落他處今當先殺鄉里然後就死楊引頸受刀曾不辭憚彪不下刀便相隨下嶺到平處謂劫曰卿須我頭我身不去也呼妻與訣曰生死從此而別若見沈泰申進等為語曰功名未立猶望鬼道相逢劫不能生得遂殺彪並弟致二首於昭達黃蒼號叫彪尸側宛轉血中若有哀狀昭達進軍迎彪妻便拜稱陳文帝教迎為家主楊便改啼為笑欣然意悅請昭達殯彪喪墳冢既畢黃蒼又俯伏冢間號叫不肯離楊還經彪宅謂昭達曰婦人本在容貌辛苦日久請暫過宅莊飾昭達許之楊入屋便以刀割髮毀面哀哭慟絶誓不更行陳文帝聞之歎息不已遂許為尼後陳武帝軍人求取之楊投井決命時寒比出之垂死積火溫燎乃蘇復起投於火彪始起於若邪興於若邪終於若邪及妻犬皆為時所重異楊氏天水人散騎常侍曒之女也有容貌先為河東裴仁林妻因亂為彪所納彪友人吳中陸山才嗟泰等翻背刊吳昌門為詩一絶曰田橫感義士韓王報主臣若為留意氣持寄禹川人論曰忠義之道安有常哉善言者不必能行蹈之者在所忽江子一胡僧祐太清之季名宦蓋微江則自致亡軀胡亦期之殞命然則貞徑之節歲寒自有性也文盛克終有鮮詩人得所誡焉子春戰乃先鳴幽通有助及乎梁州之敗而以濯足為尤杜氏終致覆亡亦云圖墓之咎吉凶之兆二者豈易知乎王琳亂朝忠節志雪仇恥然天方相陳義難弘濟斯則大廈落構豈一木所能支也張彪一遇何懷死而後已唯妻及犬義悉感人記傳所陳何以加此異乎
