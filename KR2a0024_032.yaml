body:
  text: 南史卷三十二列傳第二十二張邵子敷孫沖兄子暢暢子融寶積徐文伯嗣伯張邵字茂宗會稽太守裕之弟也初為晉琅邪內史王誕龍驤府功曹桓玄徙誕於廣州親故皆離棄之唯邵情禮彌謹流涕追送時寇亂年飢邵又資饋其妻子桓玄篡位父敞先為尚書以答事微謬降為廷尉卿及宋武帝討桓玄邵白敞表獻忠發帝大悅命署寺門曰有犯張廷尉家者軍法論事平以敞為吳郡太守及王謐為揚州召邵補主簿劉毅位居亞相好士愛才當世莫不輻湊唯邵不往親故怪而問之邵曰主公命世人傑何煩多問劉穆之言於帝帝益親之轉太尉參軍署長流賊曹盧循至蔡洲武帝至石頭使邵守南城時百姓水際望賊帝不解其意以問邵邵曰節鉞未反奔散之不暇亦何暇觀望今當無復恐耳帝以邵勤練憂公重補州主簿邵悉心政事精力絶人及誅劉藩邵時在西州直廬即夜誡衆曹曰大軍當大討可各各條倉庫及舟船人領至曉取辦旦日帝求諸簿最應時即至怪問其速諸曹答曰宿受張主簿處分帝曰張邵可謂同人憂慮矣九年世子始開征虜府以邵補録事參軍轉號中軍遷咨議參軍領記室十一年武帝北伐邵請見曰人生危脆宜有遠慮若劉穆之邂逅不幸誰可代之尊業如此若有不諱則處分云何帝曰此自委穆之與卿耳青州刺史祗鎮廣陵輒率衆至滁中掩討亡命劉穆之慮其為變議欲遣軍邵曰韶據中流道濟為軍首若有相疑之迹則大府立危不如逆遣慰勞必無患也祗果不動及穆之暴卒朝廷恇懼便發詔以司馬徐羡之代之邵獨曰今誠急病任終在徐然世子無專行之義宜須咨信反方使世子出命曰朝廷及大府事悉咨徐司馬其餘啓還武帝善其臨事不撓得大臣節十四年世子改授荊州邵諫曰儲二之重四海所繫不宜外出敢以死請世子竟不行文帝為中郎將荊州刺史以邵為司馬領南郡相衆事悉決於邵武帝受命以佐命功封臨沮伯分荊州立湘州以邵為刺史將署府邵以長沙內地非用武之國置府妨人乖為政要從之荊州刺史謝晦反遺書要邵邵不發函使呈文帝元嘉五年轉征虜將軍領寧蠻校尉雍州刺史加都督初王華與邵不和及華參要親舊為之危心邵曰子陵方弘至公豈以私隙害正義是任也華實舉之及至襄陽築長圍修立堤堰創田數千頃公私充給丹淅二川蠻屢為寇邵誘其帥並出因大會誅之遣軍掩其村落悉禽既失信羣蠻所在並起水陸路斷七年子敷至襄陽定省當還都羣蠻欲斷取之會蠕蠕國獻使下蠻以為是敷因掠之邵坐降號揚烈將軍江夏王義恭鎮江陵以邵為撫軍長史持節南蠻校尉九年坐在雍州營私畜取贓貨二百四十五萬下廷尉免官削爵土後為吳興太守卒追復爵邑諡曰簡伯邵臨終遺命祭以菜果葦席為車諸子從焉長子敷敷字景胤生而母亡年數歲問知之雖童蒙便有感慕之色至十歲許求母遺物而散施已盡唯得一扇乃緘録之每至感思輒開笥流涕見從母悲感哽咽性整貴風韻甚高好讀玄言兼屬文論初父邵使與高士南陽宗少文談繫象往復數番少文每欲屈握麈尾歎曰吾道東矣於是名價日重宋武帝聞其美召見奇之曰真千里駒也以為世子中軍參軍數見接引纍遷江夏王義恭撫軍記室參軍義恭就文帝求一學義沙門會敷赴假還江陵入辭文帝令以後車載沙門往謂曰道中可得言晤敷不奉詔曰臣性不耐雜上甚不悅遷正員中書郎敷小名父邵小名梨文帝戲之曰何如梨答曰梨是百果之宗何敢比也中書舍人秋當周赳並管要務以敷同省名家欲詣之赳曰彼若不相容接便不如勿往詎可輕行當曰吾等並已員外郎矣何憂不得共坐敷先旁設二牀去壁三四尺二客就席敷呼左右曰移我遠客赳等失色而去其自標遇如此善持音儀盡詳緩之致與人別執手曰念相聞餘響久之不絶張氏後進皆慕之其源起自敷也遷黃門侍郎始興王濬後將軍司徒左長史未拜父在吳興亡成服凡十餘日始進水漿葬畢不進鹽菜遂毀瘠成疾伯父茂度每止譬之輒更感慟絶而復續茂度曰我冀譬汝有益但更甚耳自是不復往未期而卒孝武即位詔旌其孝道追贈侍中改其所居稱孝張里敷弟柬襲父封位通直郎柬勇力手格猛獸元凶以為輔國將軍孝武至新亭柬出奔墜淮死子式嗣弟沖沖字思約出繼伯父敷沖母戴顒女有儀範張氏內取則焉沖少有至性隨從叔永為將帥除盱眙太守永征彭城遇寒軍人足脛凍斷者十七八沖足指皆墮齊永明八年為假節監青冀二州行刺史事沖父初卒遺命祭我必以鄉土所産無用牲物沖在鎮四時還吳國取果菜每至蒸嘗輒流涕薦焉仍轉刺史永元二年為南兗州刺史遷司州裴叔業以壽春降魏又遷沖南兗州刺史並未拜崔慧景事平徵建安王寶夤還都以沖為郢州刺史一歲之中頻授四州刺史至是乃受任封定襄侯梁武帝起兵手書喻意又遣辨士説之沖確然不回東昏遣驍騎將軍薛元嗣制局監暨榮伯領兵及糧運送沖使拒西師元嗣等懲劉山陽之敗疑沖不敢進停住夏首浦聞梁武師將至元嗣榮伯相率入郢城時竟陵太守房僧寄被代還至郢東昏敕僧寄留守魯山除驍騎將軍僧寄謂沖曰下官雖未荷朝廷深恩實蒙先帝厚澤蔭其樹者不折其枝實欲微立塵效沖深相許諾共結盟誓分部拒守遣軍主孫樂祖數千人助僧寄據魯山岸立城壘明年二月梁武圍魯山城遣軍主曹景宗等過江攻郢城沖中兵參軍陳光靜等間出擊之光靜戰死沖固守不出病將死厲府僚以誠節言終而卒元嗣榮伯與沖子孜及長史江夏程茂固守東昏詔贈沖散騎常侍護軍將軍元嗣等處圍城之中無他經略唯迎蔣子文及蘇侯神日禺中於州聽上祀以求福鈴鐸聲晝夜不止又使子文導從登陴巡行旦日輒復如之識者知其將亡僧寄病死孫樂祖窘以城降郢被圍二百餘日士庶病死者七八百家魯山陷後二日程茂及元嗣等議降使孜為書與梁武帝沖故吏青州中從事房長瑜謂孜曰前使君忠貫昊天操愈松竹郎君但當端坐畫一以荷析薪若天運不與幅巾待命以下從使君今若隨諸人之計非唯郢州士女失高山之望亦恐彼所不取也不從卒以郢城降時以沖及房僧寄比臧洪之被圍也贈僧寄益州刺史暢字少微邵兄褘子也褘少有操行為晉琅邪王國郎中令從王至洛還京都宋武帝封藥酒一罌付褘使密加鴆毒受命於道自飲而卒暢少與從兄敷演鏡齊名為後進之秀起家為太守徐佩之主簿佩之被誅暢馳出奔赴制服盡哀為論者所美弟牧嘗為猘犬所傷醫云宜食蝦牧甚難之暢含笑先嘗牧因此乃食創亦即愈纍遷太子中庶子孝武鎮彭城暢為安北長史沛郡太守元嘉二十七年魏太武南征太尉江夏王義恭統諸軍出鎮彭城太武親率大衆去彭城數十里彭城衆力雖多軍食不足義恭欲棄彭城南歸計議彌日不定時歷城衆少食多安北中兵參軍沈慶之議欲以車營為函箱陳精兵為外翼奉二王及妃媛直趨歷城分城兵配護軍將軍蕭思話留守太尉長史何勗不同欲席卷奔鬱洲自海道還都二議未決更集羣僚謀之暢曰若歷城鬱洲有可至之理下官敢不高讚今城內乏食百姓咸有走情但以關扃嚴固欲去莫從耳若一旦動腳則各自散走欲至所在何由可得今軍食雖寡朝夕猶未窘罄豈有捨萬安之術而就危亡之道若此計必用下官請以頸血樜君馬迹孝武聞暢議謂義恭曰張長史言不可異也義恭乃止魏太武得至仍登城南亞父冢於戲馬臺立檳屋先是隊主蒯應見執其日晡時太武遣送應至小巿門致意求甘蔗及酒孝武遣人送酒二器甘蔗百挺求駱駝明日太武又自上戲馬臺復遣使至小巿門求與孝武相見遣送駱駝并致雜物使於南門受之暢於城上與魏尚書李孝伯語孝伯問君何姓答云姓張孝伯曰張長史暢曰君何得見識孝伯曰君聲名遠聞足使我知因言説久之城內有具思者嘗在魏義恭遣視知是孝伯乃開門進餉物太武又求酒及甘橘暢宣孝武旨又致螺杯雜粽南土所珍太武復令孝伯傳語曰魏主有詔借博具暢曰博具當為申致有詔之言政可施於彼國何得稱之於此孝伯曰鄰國之君何為不稱詔於鄰國之臣暢曰君之此稱尚不可聞於中華況在諸王之貴而獨曰鄰國之君邪孝伯曰魏主言太尉鎮軍久闕南信殊當憂邑若欲遣信當為護送暢曰此方間路甚多不復以此勞魏主孝伯曰亦知有水路似為白賊所斷暢曰君著白衣故稱白賊邪孝伯大笑曰今之白賊亦不異黃巾赤眉暢曰黃巾赤眉似不在江南孝伯曰亦不離青徐暢曰今者青徐實為有賊但非白賊耳又求博具俄送與太武又遣送氈及九種鹽并胡豉云此諸鹽各有所宜白鹽是魏主所食黑者療腹脹氣悶細刮取六銖以酒服之胡鹽療目痛柔鹽不用食療馬脊創赤鹽駮鹽臭鹽馬齒鹽四種並不中食胡豉亦中噉又求黃甘并云魏主致意太尉安北何不遣人來至我間彼此之情雖不可盡要須見我小大知我老少觀我為人若諸佐不可遣亦可使僮來暢又宣旨答曰魏主形狀才力久為來往所具李尚書親自銜命不患彼此不盡故不復遣信又云魏主恨向所送馬殊不稱意安北若須大馬當更送之脫須蜀馬亦有佳者暢曰安北不乏良駟送自彼意非此所求義恭又餉炬燭十挺孝武亦致錦一匹又曰知更須黃甘誠非所吝但會不足周彼一軍向給魏主未應便乏故不復重付太武復求甘蔗安石榴暢曰石榴出自鄴下亦當非彼所乏孝伯曰君南土膏粱何為著屩君而著此使將士云何暢曰膏粱之言誠為多愧但以不武受命統軍戎陳之間不容緩服太武又遣就二王借箜篌琵琶箏笛等器及子孝伯辭辨亦北土之美暢隨宜應答吐屬如流音韻詳雅風儀華潤孝伯及左右人並相視歎息時魏聲云當出襄陽故以暢為南譙王義宣司空長史南郡太守三十年元凶弒逆義宣發哀之日即便舉兵暢為元佐位居僚首哀容俯仰蔭映當時舉哀畢改服著黃袴褶出射堂簡人音姿容止莫不矚目見者皆願為盡命事平徵為吏部尚書封夷道縣侯義宣既有異圖蔡超等以暢人望勸義宣留之乃解南蠻校尉以授暢加冠軍將軍領丞相長史暢遣門生荀僧寶下都因顏竣陳義宣釁狀僧寶有私貨停巴陵不時下會義宣起兵津路斷絶僧寶遂不得去義宣將為逆遣嬖人翟靈寶告暢暢陳必無此理請以死保之靈寶知暢不回勸義宣殺以徇衆賴丞相司馬竺超人得免進號撫軍別立軍部以收人望暢雖署文檄而飲酒常醉不省文書隨義宣東下梁山戰敗於亂兵自歸為軍人所掠衣服都盡遇右將軍王玄謨乘輿出營暢已得敗衣因排玄謨上輿玄謨意甚不悅諸將請殺之隊主張世營救得免執送都下廷尉尋見原起為都官尚書轉侍中代子淹領太子右衛率孝武宴朝賢暢亦在坐何偃因醉曰張暢故是奇才同義宣作賊亦能無咎非才何以致此暢乃厲聲曰太初之時誰黃其閣帝曰何事相苦初元凶時偃父尚之為元凶司空義師至新林門生皆逃尚之父子與婢妾共洗黃閣故暢譏之孝建二年出為會稽太守卒諡曰宣暢愛弟子輯臨終遺命與輯合墳論者非之暢弟悅亦有美稱歷侍中臨海王子頊前軍長史南郡太守晉安王子勛建偽號召拜為吏部尚書與鄧琬共輔偽政事敗悅殺琬歸降復為太子中庶子後拜雍州刺史泰始六年明帝於巴郡置三巴校尉以悅補之加持節輔師將軍領巴郡太守未拜卒暢子浩官至義陽王昶征北咨議參軍浩弟淹黃門郎封廣晉縣子太子右衛率東陽太守逼郡吏燒臂照佛百姓有罪使禮佛贖愆動至數千拜坐免官禁錮起為光祿勳臨川內史後與晉安王子勛同逆軍敗見殺淹弟融融字思光弱冠有名道士同郡陸修靜以白鷺羽麈尾扇遺之曰此既異物以奉異人解褐為宋新安王子鸞行參軍王母殷淑儀薨後四月八日建齋并灌佛僚佐襯者多至一萬少不減五千融獨注襯百錢帝不悅曰融殊貧當序以佳祿出為封溪令從叔永出後渚送之曰似聞朝旨汝尋當還融曰不患不還政恐還而復去及行路經嶂嶮獠賊執融將殺食之融神色不動方作洛生詠賊異之而不害也浮海至交州於海中遇風終無懼色方詠曰乾魚自可還其本鄉肉脯復何為者哉又作海賦文辭詭激獨與衆異後以示鎮軍將軍顧覬之覬之曰卿此賦實超玄虛但恨不道鹽耳融即求筆注曰漉沙構白熬波出素積雪中春飛霜暑路此四句後所足也覬之與融兄有恩好覬之卒融身負墳土在南與交趾太守卞展善展於嶺南為人所殺融挺身奔赴舉秀才對策中第為尚書殿中郎不就改為儀曹郎尋請假奔叔父喪道中罰幹錢敬道鞭杖五十寄繫延陵獄大明五年制二品清官行僮幹杖不得出十為左丞孫緬所奏免官復位攝祠部倉部二曹時領軍劉勔戰死融以祠部議上應哭勔見從又俗人忌以正月開太倉融議不宜拘束小忌尋兼掌正見宰殺回車徑去自表解職再遷南陽王友融父暢為丞相長史義宣事難暢將為王玄謨所殺時玄謨子瞻為南陽王長史融啓求去官不許融家貧欲祿乃與從叔征北將軍永書曰融昔幼學早訓家風雖則不敏率以成性布衣韋帶弱年所安簞食瓢飲不覺不樂但世業清貧人生多待榛栗棗修女贄既長束帛禽鳥男禮已大勉身就官十年七仕不欲代耕何至此事昔求三吳一丞雖屬舛錯今聞南康缺守願得為之融不知階級階級亦可不知融政以求丞不得所以求郡求郡不得亦可復求丞又與吏部尚書王僧虔書曰融天地之逸人也進不辨貴退不知賤實以家貧纍積孤寡傷心八姪俱孤二弟頓弱豈能山海陋祿申融情纍阮籍愛東平土風融亦欣晉平間外時議以融非御人才竟不果辟齊太傅掾稍遷中書郎非其所好乞為中散大夫不許張氏自敷以來並以理音辭修儀範為事至融風止詭越坐常危膝行則曳步翹身仰首意制甚多見者驚異聚觀成巿而融了無慚色隨例同行常稽遲不進高帝素愛融為太尉時與融發接見融常笑曰此人不可無一不可有二即位後手詔賜融衣曰見卿衣服粗故誠乃素懷有本交爾藍縷亦虧朝望今送一通故衣意謂雖故乃勝新也是吾所著已令裁減稱卿之體并履一量高帝出太極殿西室融入問訊彌時方登階及就席上曰何乃遲為對曰自地升天理不得速時魏主至淮而退帝問何意忽來忽去未有答者融時下坐抗聲曰以無道而來見有道而去公卿咸以為捷融善草書常自美其能帝曰卿書殊有骨力但恨無二王法答曰非恨臣無二王法亦恨二王無臣法融假還鄉詣王儉別儉立此地舉袂不前融亦舉手呼儉曰歜曰王前儉不得已趨就之融曰使融不為慕勢而令君為趍士豈不善乎常歎云不恨我不見古人所恨古人又不見我融與吏部尚書何戢善往詣戢誤通尚書劉澄下車入門乃曰非是至戶望澄又曰非是既造席視澄曰都自非是乃去其為異如此又為長沙王鎮軍竟陵王征北咨議並領記室司徒從事中郎永明二年總明觀講敕朝臣集聽融扶入就榻私索酒飲之事畢乃長歎曰嗚呼仲尼獨何人哉為御史中丞到撝所奏免官尋復職融形貌短醜精神清徹王敬則見融革帶寬殆將至髀謂曰革帶太急融曰既非步吏急帶何為融假東出武帝問融住在何處答曰臣陸處無屋舟居無水後上問其從兄緒緒曰融近東出未有居止權牽小船於岸上住上大笑後使融接對北使李道固就席道固顧而言曰張融是宋彭城長史張暢子不融嚬蹙久之曰先君不幸名達六夷豫章王大會賓僚融食炙始行畢行炙人便去融欲求鹽蒜口終不言方搖食指半日乃息出入朝廷皆拭目驚觀之八年朝臣賀衆瑞公事融扶入拜起復為有司所奏見原遷司徒兼右長史竟陵張欣時為諸暨令坐罪當死欣時父興世討宋南譙王義宣官軍欲殺融父暢興世以袍覆暢而坐之以此得免興世卒融著高履為負土成墳至是融啓竟陵王子良乞代欣時死子良答曰此乃是長史美事恐朝有常典不得如長史所懷遷黃門郎太子中庶子司徒左長史融有孝義忌月三旬不聽樂事嫂甚謹父暢臨終謂諸子曰昔丞相事難吾以不同將見殺緣司馬竺超人得活爾等必報其子後超人孫微冬月遭母喪居貧融弔之悉脫衣以為賻披牛被而反常以兄事微豫章王嶷竟陵王子良薨自以身經佐吏哭輒盡慟建武四年病卒遺令建白旐無旒不設祭令人捉麈尾登屋復魂曰吾生平所善自當陵雲一笑三千買棺無製新衾左手執孝經老子右手執小品法華經妾二人哀事畢各遣還家曰吾生平之風調何至使婦人行哭失聲不須暫停閨閣融玄義無師法而神解過人高談鮮能抗拒永明中遇疾為門律自序云吾文章之體多為世人所驚汝可師耳以心不可使耳為心師也夫文豈有常體但以有體為常政當有其體丈夫當刪詩書制禮樂何至因循寄人籬下臨卒又戒其子曰手澤存焉父書不讀況父音情婉在其韻吾意不然別遺爾旨吾文體英變變而屢奇豈吾天挺蓋不隤家聲汝可號哭而看之融文集數十卷行於世自名其集為玉海司徒褚彥回問其故融云蓋玉以比德海崇上善耳張氏前有敷演鏡暢後有充融卷稷第六弟寶積建武中出為廬陵太守時名流謝糟何點陸惠曉孔圭至融弟鐵之舍點造坐便曰今日可謂盛集二五我兄弟之流阿六張氏保家之子顧見王思遠曰卿詐作善非實得也二五謂孔圭及融並第五寶積永元中為湘州行事蕭穎胄於江陵乘腰輿詣穎胄舉動自若穎胄問何至之晚答曰本朝危亂四海橫流既不能為比干之死實未忍為微子之去是以至晚穎胄深以為善即用為相府咨議後位御史中丞融與東海徐文伯兄弟厚文伯字德秀濮陽太守熙曾孫也熙好黃老隱於秦望山有道士過求飲留一瓠與之曰君子孫宜以道術救世當得二千石熙開之乃扁鵲鏡經一卷因精心學之遂名震海內生子秋夫彌工其術仕至射陽令嘗夜有鬼呻吟聲甚悽愴秋夫問何須答言姓某家在東陽患腰痛死雖為鬼痛猶難忍請療之秋夫曰云何厝法鬼請為芻人案孔穴針之秋夫如言為灸四處又針肩井三處設祭埋之明日見一人謝恩忽然不見當世伏其通靈秋夫生道度叔嚮皆能精其業道度有腳疾不能行宋文帝令乘小輿入殿為諸皇子療疾無不絶驗位蘭陵太守宋文帝云天下有五絶而皆出錢唐謂杜道鞠彈范悅詩褚欣遠模書褚胤圍徐道度療疾也道度生文伯叔嚮生嗣伯文伯亦精其業兼有學行倜儻不屈意於公卿不以醫自業融謂文伯嗣伯曰昔王微嵇叔夜並學而不能殷仲堪之徒故所不論得之者由神明洞徹然後可至故非吾徒所及且褚侍中澄富貴亦能救人疾卿此更成不達答曰唯達者知此可崇不達者多以為深纍既鄙之何能不恥之文伯為效與嗣伯相埒宋孝武路太后病衆醫不識文伯診之曰此石博小腸耳乃為水劑消石湯病即愈除鄱陽王常侍遺以千金旬日恩意隆重宋明帝宮人患腰痛牽心每至輒氣欲絶衆醫以為肉癥文伯曰此髮癥以油投之即吐得物如髮稍引之長三尺頭已成蛇能動挂門上適盡一髮而已病都差宋後廢帝出樂遊苑門逢一婦人有娠帝亦善診診之曰此腹是女也問文伯曰腹有兩子一男一女男左邊青黑形小於女帝性急便欲使剖文伯惻然曰若刀斧恐其變異請針之立落便寫足太陰補手陽明胎便應針而落兩兒相續出如其言子雄亦傳家業尤工診察位奉朝請能清言多為貴遊所善事母孝謹母終毀瘠幾至自滅俄而兄亡扶杖臨喪撫膺一慟遂以哀卒嗣伯字叔紹亦有孝行善清言位正員郎諸府佐彌為臨川王映所重時直閣將軍房伯玉服五石散十許劑無益更患冷夏日常復衣嗣伯為診之曰卿伏熱應須以水發之非冬月不可至十一月冰雪大盛令二人夾捉伯玉解衣坐石取冷水從頭澆之盡二十斛伯玉口噤氣絶家人啼哭請止嗣伯遣人執杖防閣敢有諫者撾之又盡水百斛伯玉始能動而見背上彭彭有氣俄而起坐曰熱不可忍乞冷飲嗣伯以水與之一飲一升病都差自爾發熱冬月猶單褌衫體更肥壯常有嫗人患滯冷積年不差嗣伯為診之曰此尸注也當取死人枕服之乃愈於是往古冢中取枕枕已一邊腐缺服之即差後秣陵人張景年十五腹脹面黃衆醫不能療以問嗣伯嗣伯曰此石蛔耳極難療當取死人枕之依語枕以湯投之得大利并蛔蟲頭堅如石五升病即差後沈僧翼患眼痛又多見鬼物以問嗣伯嗣伯曰邪氣入肝可覓死人枕服之竟可埋枕於故處如其言又愈王晏問之曰三病不同而皆用死人枕而俱差何也答曰尸注者鬼氣伏而未起故令人沉滯得死人枕投之魂氣飛越不得復附體故尸注可差石蛔者久蛔也醫療既僻蛔蟲轉堅世間藥不能遣所以須鬼物驅之然後可散故令死人枕也夫邪氣入肝故使眼痛而見魍魎應須而邪物以鈎之故用死人枕也氣因枕去故令埋於冢間也又春月出南籬門戲聞笪屋中有呻吟聲嗣伯曰此病甚重更二日不療必死乃往視見一老姥稱體痛而處處有爤黑無數嗣伯還斗餘湯送令服之服訖痛勢愈甚跳投床者無數須臾所爤處皆拔出釘長寸許以膏塗諸瘡口三日而復云此名釘疽也時又有薛伯宗善徙疽公孫泰患背伯宗為氣封之徙置齋前柳樹上明旦消樹邊便起一瘤如拳大稍稍長二十餘日瘤大膿爛出黃赤汁斗餘樹為之痿損論曰有晉自宅淮海張氏無乏賢良及宋齊之間雅道彌盛其前則云敷演鏡暢蓋其尤著者也然景胤敬愛之道少微立履所由其殆優矣思光行己卓越非常俗所遵齊高帝所云不可有二不可無一斯言其幾得矣徐氏妙理通靈蓋非常所至雖古之和鵲何以加茲融與文伯款好故附之云爾
