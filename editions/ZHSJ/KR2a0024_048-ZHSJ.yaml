body:
  text: 南史卷四十八列傳第三十八陸澄陸慧曉子倕孫繕兄子閑閑子絳絳弟厥厥弟襄襄兄子雲公雲公子瓊瓊子從典瓊從父弟琰琰弟瑜瑜從兄玠從弟琛陸杲子罩陸澄字彥深吳郡吳人也祖劭臨海太守父瑗州從事澄少好學博覽無所不知行坐眠食手不釋卷宋泰始初為尚書殿中郎議皇后諱班下應依舊稱姓左丞徐爰案司馬孚議皇后不稱姓春秋逆王后于齊並不言姓澄以意立議坐免官白衣領職郎官舊坐杖有名無實澄在官積前後罰凡至千數後兼左丞泰始六年詔皇太子朝服袞冕九章澄與儀曹郎丘仲起議服冕以朝實著經文秦除六冕漢明還備魏晉以來不欲令臣下服袞冕故位公者加侍官今皇太子禮絕羣后宜遵聖王盛典革近代之制累遷御史中丞齊建元元年驃騎諮議沈憲等家奴客為劫子弟被劾憲等晏然左丞任遐奏澄不糾請免澄官上表自理言舊例無左丞糾中丞之義詔外詳議尚書令褚彥回檢宋以來左丞糾正而中丞不糾免官者甚衆奏澄謏聞膚見貽撓後昆上掩皇明下籠朝議請以見事免澄所居官詔澄以白衣領職永明元年累遷度支尚書尋領國子博士尚書令王儉謂之曰昔曹志繆悅為此官以君係之始無慚德儉嘗問澄曰崇禮門有鼓而未嘗鳴其義安在答曰江左草創崇禮闥皆是茅茨故設鼓有火則扣以集衆相傳至今又與儉書陳王弼注易玄學之所宗今若弘儒鄭注不可廢并言左氏杜學之長穀梁舊有麋信近益以范甯不足兩立世有一孝經題為鄭玄注觀其用辭不與注書相類案玄自序所注衆書亦無孝經且為小學之類不宜列在帝典儉答曰易體微遠實貫羣籍豈可專據小王便為該備依舊存鄭高同來說元凱注傳超邁前儒穀梁小書無俟兩注存麋略范率由舊式凡此諸議並同雅論疑孝經非鄭所注僕以此書明百行之首實人倫所先七略藝文並陳之六藝不與蒼頡凡將之流也鄭注虛實前代不嫌意謂可安仍舊立置儉自以博聞多識讀書過澄澄謂曰僕少來無事唯以讀書為業且年位已高令君少便鞅掌王務雖復一覽便諳然見卷軸未必多僕儉集學士何憲等盛自商略澄待儉語畢然後談所遺漏數百十條皆儉所未覩儉乃歎服儉在尚書省出巾箱几案雜服飾令學士隸事事多者與之人人各得一兩物澄後來更出諸人所不知事復各數條并舊物奪將去轉散騎常侍祕書監吳郡中正光祿大夫加給事中尋領國子祭酒竟陵王子良得古器小口方腹而底平可容七八升以問澄澄曰此名服匿單于以與蘇武子良詳視器底有字彷彿可識如澄所言隆昌元年以老疾轉光祿大夫加散騎常侍未拜卒諡靜子澄當世稱為碩學讀易三年不解文義欲撰宋書竟不成王儉戲之曰陸公書也家多墳籍人所罕見撰地理書及雜傳死後乃出澄弟鮮得罪宋世當死澄於路見舍人王道隆叩頭流血以此見原揚州主簿顧測以兩奴就鮮質錢鮮死子暉誣為買券澄為中丞測遂為澄所抑世以此少之陸慧曉字叔明吳郡吳人晉太尉玩之玄孫也自玩至慧曉祖萬載世為侍中皆有名行慧曉伯父仲元又為侍中時人方之金張二族父子真仕宋為海陵太守時中書舍人秋當見幸家在海陵假還葬父子真不與相聞當請發人修橋又以妨農不許彭城王義康聞而賞之王僧達貴公子孫以才物為吳郡太守入昌門曰彼有人焉顧琛一公兩掾英英門戶陸子真五世內侍我之流亞子真自臨海太守眼疾歸為中散大夫卒慧曉清介正立不雜交游同郡張緒稱之曰江東裴樂也初應州郡辟舉秀才歷諸府行參軍以母老還家侍養十餘年不仕齊高帝輔政除為尚書殿中郎鄰族來相賀慧曉舉酒曰陸慧曉年踰三十婦父領選始作尚書郎卿輩乃復以為慶邪高帝表禁奢侈慧曉撰答詔草為帝所賞引為太傅東閤祭酒齊建元初遷太子洗馬廬江何點常稱慧曉心如照鏡遇形觸物無不朗然王思遠如懷冰暑月亦有霜氣當時以為實錄慧曉與張融並宅其間有池池上有二株楊柳點歎曰此池便是醴泉此木便是交讓及武陵王曄守會稽上為精選僚吏以慧曉為征虜功曹與府參軍沛國劉璡同從述職璡清介士也行至吳謂人曰吾聞張融與慧曉並宅其間有水此必有異味故命駕往酌而飲之曰飲此水則鄙吝之萌盡矣何點薦慧曉於豫章王嶷補司空掾加以恩禮累遷安西諮議領冠軍錄事參軍武帝第三子廬陵王子卿為南豫州刺史帝稱其小名謂司徒竟陵王子良曰烏熊癡如熊不得天下第一人為行事無以壓一州既而曰吾思得人矣乃使慧曉為長史行事別帝問曰卿何以輔持廬陵答曰靜以修身儉以養性靜則人不擾儉則人不煩上大悅後為司徒右長史時陳郡謝朏為左長史府公竟陵王子良謂王融曰我府前世誰比融曰明公二上佐天下英奇古來少見其比子良西邸抄書令慧曉參知其事尋遷西陽王征虜巴陵王後軍臨汝公輔國三府長史行府州事復為西陽王左軍長史領會稽郡丞行郡事隆昌元年徙為晉熙王冠軍長史江夏內史行郢州事慧曉歷輔五政立身清肅僚佐以下造詣必起送之或謂慧曉曰長史貴重不宜妄自謙屈答曰我性惡人無禮不容不以禮處人未嘗卿士大夫或問其故慧曉曰貴人不可卿而賤者乃可卿人生何容立輕重於懷抱終身常呼人位建武初除西中郎長史行事內史如故俄徵黃門郎未拜遷吏部郎尚書令王晏選門生補內外要局慧曉為用數人而止晏恨之送女妓一人欲與申好慧曉不納吏曹都令史歷政來諮執選事慧曉任己獨行未嘗與語帝遣主書單景儁謂曰都令史諳悉舊貫可共參懷慧曉謂景儁曰六十之年不復能諮都令史為吏部郎也上若謂身不堪便當拂衣而退帝甚憚之後欲用為侍中以形短小乃止出為晉安王鎮北司馬征北長史東海太守行府州事入為五兵尚書行揚州事崔慧景事平領右軍將軍出監南徐州朝議又欲以為侍中王亮曰濟河須人今且就朝廷借之以鎮南兗州王瑩王志皆曰侍中彌須英華方鎮猶應有選者亮曰角其二者則貂璫緩拒寇切當今朝廷甚弱宜從切者乃以為輔國將軍南兗州刺史加督至鎮俄爾以疾歸卒贈太常三子僚任倕並有美名時人謂之三陸初授慧曉兗州三子依次第各作一讓表辭並雅麗時人歎伏僚學涉子史長於微言美姿容鬚眉如畫位西昌侯長史蜀郡太守倕字佐公少勤學善屬文於宅內起兩茅屋杜絕往來晝夜讀書如此者數歲所讀一徧必誦於口嘗借人漢書失五行志四卷乃暗寫還之略無遺脫幼為外祖張岱所異岱嘗謂諸子曰此兒汝家陽元也十七舉本州秀才刺史竟陵王子良開西邸延英俊倕預焉梁天監初為右軍安成王主簿與樂安任昉友為感知己賦以贈昉昉因此名以報之及昉為中丞簪裾輻湊預其讌者殷芸到溉劉苞劉孺劉顯劉孝綽及倕而已號曰龍門之游雖貴公子孫不得預也遷臨川王東曹掾梁武帝雅愛倕才乃敕撰新漏刻銘其文甚美遷太子中舍人又詔為石闕銘敕褒美之賜絹三十匹累遷太常卿卒子纘早慧七歲通經為童子郎卒次緬有似於倕一看殆不能別繕字士繻倕兄子也父任御史中丞繕幼有志尚以雅正知名梁承聖中為中書侍郎掌東宮管記魏平江陵繕微服遁還建鄴紹泰元年除司徒右長史御史中丞以父任所終固辭陳武帝作輔為司徒司馬及受命位侍中出為新安太守文帝嗣位徵為中庶子領步兵校尉掌東宮管記繕儀表端麗進退閑雅趨步躡履文帝使太子諸王咸取則焉後復拜御史中丞猶以父所終固辭不許乃權換廨宇徙以居之太建中歷度支尚書侍中太子詹事尚書右僕射尋遷左僕射參掌選事別敕與徐陵等七人參議政事卒贈特進諡曰安子以繕東宮舊臣特賜祖奠繕子辯慧年數歲詔引入殿內進止有父風宣帝因賜名辯慧字敬仁繕兄子見賢亦方雅位少府卿卒閑字遐業慧曉兄子也有風概與人交不苟合少為同郡張緒所知仕至揚州別駕齊明帝崩閑謂所親人曰宮車晏駕百司將聽冢宰主王地重才弱必不能振難將至矣乃感心疾不復預州事永元末刺史始安王遙光據東府作亂或勸去之閑曰吾為人吏何可逃死臺軍攻陷城閑以綱佐被收至杜姥宅尚書令徐孝嗣啟閑不預逆謀未及報徐世標命殺之閑四子厥絳完襄也絳字魏卿時隨閑抱頸求代死不獲遂以身蔽刀刃行刑者俱害之厥字韓卿少有風概好屬文齊永明九年詔百官舉士同郡司徒左西曹掾顧暠之表薦厥州舉秀才時盛為文章吳興沈約陳郡謝朓琅邪王融以氣類相推轂汝南周顒善識聲韻約等文皆用宮商將平上去入四聲以此制韻有平頭上尾𧔧腰鶴膝五字之中音韻悉異兩句之內角徵不同不可增減世呼為永明體沈約宋書謝靈運傳後又論其事厥與約書曰范詹事自序性別宮商識清濁特能適輕重濟艱難古今文人多不全了斯處縱有會此者不必從根本中來尚書亦云自靈均以來此祕未覩或暗與理合匪由思至張蔡曹王曾無先覺潘陸顏謝去之彌遠大旨欲宮商相變低昂舛節若前有浮聲則後須切響一簡之內音韻盡殊兩句之中輕重悉異辭既美矣理又善焉但觀歷代衆賢似不都闇此處而云此祕未覩近於誣乎案范云不從根本中來尚書云匪由思至斯則揣情謬於玄黃擿句著其音律也范又云時有會此者尚書云或闇與理合則美詠清謳有辭章調韻者雖有差謬亦有會合推此以往可得而言夫思有合離前哲同所不免文有開塞即事不得無之子建所以好人譏彈士衡所以遺恨終篇既曰遺恨非盡美之作理可詆訶君子執其詆訶便謂合理為闇豈如指其合理而寄詆訶為遺恨邪自魏文屬論深以清濁為言劉楨奏書大明體勢之致齟齬妥怗之談操末續巔之說興玄黃於律呂比五色之相宣苟此祕未覩茲論為何所指邪愚謂前英已早識宮徵但未屈曲指的若今論所申至於掩瑕藏疾合少謬多則臨淄所云人之著述不能無病者也非知之而不改謂不改則不知斯曹陸又稱竭情多悔不可力強者也今許以有病有悔為言則必自知無悔無病之地引其不了不合為闇何獨誣其一合一了之明乎意者亦質文時異今古好殊將急在情物而緩於章句情物文之所急美惡猶且相半章句意之所緩故合少而謬多義兼於斯必非不知明矣長門上林殆非一家之賦洛神池雁便成二體之作孟堅精正詠史無虧於東主平子恢富羽獵不累於憑虛王粲初征他文未能稱是楊脩敏捷暑賦彌日不獻率意寡尤則事促乎一日翳翳愈伏而理賒於七步一人之思遲速天懸一家之文工拙壤隔何獨宮商律呂必責其如一邪論者乃可言未窮其致不得言曾無先覺也約答曰宮商之聲有五文字之別累萬以累萬之繁配五聲之約高下低昂非思力所學又非止若斯而已十字之文顛倒相配字不過十巧歷已不能盡何況復過於此者乎靈均以來未經用之於懷抱固無從得其髣髴矣若斯之妙而聖人不尚何耶此蓋曲折聲韻之巧無當於訓義非聖哲玄言之所急也是以子雲譬之雕蟲篆刻云壯夫不為自古辭人豈不知宮羽之殊商徵之別雖知五音之異而其中參差變動所昧實多故鄙意所謂此祕未覩者也以此而推則知前世文士便未悟此處若以文章之音韻同絃管之聲曲美惡妍蚩不得頓相乖反譬猶子野操曲安得忽有闡緩失調之聲以洛神比陳思他賦有似異手之作故知天機啟則律呂自調六情滯則音律頓舛也士衡雖云煥若縟錦寧有濯色江波其中復有一片是衞文之服此則陸生之言即復不盡者矣韻與不韻復有精粗輪扁不能言之老夫亦不盡辯此約論四聲妙有詮辯而諸賦亦往往與聲韻乖時有王斌者不知何許人著四聲論行於時斌初為道人博涉經籍雅有才辯善屬文能唱導而不修容儀嘗弊衣於瓦官寺聽雲法師講成實論無復坐處唯僧正慧超尚空席斌直坐其側慧超不能平乃罵曰那得此道人祿蔌似隊父唐突人因命驅之斌笑曰既有勳僧正何為無隊父道人不為動而撫機問難辭理清舉四座皆屬目後還俗以詩樂自樂人莫能名之永元元年始安王遙光反厥父閑被誅厥坐繫尚方尋有赦厥感慟而卒年二十八文集行於世時有會稽虞炎以文學與沈約俱為文惠太子所遇意眄殊常官至驍騎將軍襄字師卿厥第四弟也本名衰字趙卿有奏事者誤字為襄梁武帝乃改為襄字師卿天監三年都官尚書范岫表薦襄起家著作佐郎後昭明太子統聞襄業行啟武帝引與遊處自廬陵王記室除太子洗馬遷中舍人並掌管記出為揚州中從事以父終此官固辭武帝不許聽與府司馬換廨居之昭明太子敬耆老襄母年將八十與蕭琛傅昭陸杲每月常遣存問加賜珍羞衣服襄母常卒患心痛醫方須三升粟漿時冬月日又逼暮求索無所忽有老人詣門貨漿量如方劑始欲酬直無何失之時以襄孝感所致後為太子家令復掌管記母憂去職襄年已五十毀頓過禮太子憂之日遣使誡喻中大通七年為鄱陽內史先是郡人鮮于琮服食修道法常入山采藥拾得五色幡毦又於地中得石璽竊怪之琮先與妻別室望琮所處常有異氣益以為神大同元年遂結門徒殺廣晉令王筠號上願元年署置官屬其黨轉相誑惑有衆萬餘人將出攻郡襄先已率人吏修城隍為備及賊至破之生獲琮時鄰郡豫章安成等守宰案其黨與因求貨賄皆不得其實或有善人盡室罹禍唯襄郡枉直無濫人作歌曰鮮于抄後善惡分人無橫死賴陸君又有彭李二家先因忿爭遂相誣告襄引入內室不加責誚但和言解喻之二人感恩深自悔咎乃為設酒食令其盡歡酒罷同載而還因相親厚人又歌曰陸君政無怨家鬬既罷讎共車在政六年郡中大寧郡人李睍等四百二十人詣闕拜表陳襄德化求於郡立碑降敕許之又表乞留襄襄固乞還太清元年為度支尚書侯景圍臺城以襄直侍中省城陷襄逃還吳景將宋子仙進攻錢唐會海鹽人陸黯舉義襲郡殺偽太守蘇單于推襄行郡事時淮南太守文成侯蕭寧逃賊入吳襄遣迎寧為盟主遣黯及兄子映公帥衆躡子仙與戰黯敗走吳下軍聞之亦散襄匿于墓下一夜憂憤卒襄弱冠遭家禍釋服猶若居憂終身蔬食布衣不聽音樂口不言殺害五十年侯景平元帝贈侍中追封餘干縣侯雲公字子龍襄兄完子也完位寧遠長史琅邪彭城二郡丞雲公五歲誦論語毛詩九歲讀漢書略能記憶從祖倕與沛國劉顯質問十事雲公對無所失顯歎異之及長好學有才思為平西湘東王繹行參軍雲公先製太伯廟碑吳興太守張纘罷郡經途讀其文歎曰今之蔡伯喈也纘至都掌選言之武帝召為尚書儀曹郎入直壽光省以本官知著作郎事累遷中書黃門郎兼掌著作雲公善弈嘗夜侍坐武冠觸燭火帝笑謂曰燭燒卿貂帝將用為侍中故以此戲之時天泉池新製鯿魚舟形闊而短帝暇日常泛此舟朝中唯引太常劉之遴國子祭酒到溉右衞朱虉雲公時年位尚輕亦預焉太清元年卒張纘時為湘州與雲公叔襄兄晏子書曰都信至承賢兄子賢弟黃門殞逝非唯貴門喪寶實有識同悲其為士流稱重如此雲公從父兄才子亦有才名位太子中庶子廷尉與雲公並有文集行於世雲公子瓊字伯玉幼聰慧有思理六歲為五言詩頗有詞采大同末雲公受梁武帝詔校定品到溉朱虉以下並集瓊時年八歲於客前覆局由是都下號曰神童虉言之武帝召見瓊風神警亮進退詳審帝甚異之十一丁父憂毀瘠有至性從祖襄歎曰此兒必荷門基所謂一不為少及侯景作逆攜母避地于縣之西鄉勤苦讀書晝夜無怠遂博學善屬文陳天嘉中以文學累遷尚書殿中郎瓊素有令名深為陳文帝所賞及討周迪陳寶應等都官符及諸大手筆並中敕付瓊遷新安王文學掌東宮管記及宣帝為司徒妙簡僚佐吏部尚書徐陵薦瓊於宣帝言瓊識具優敏文史足用進居郎署歲月過淹左西掾缺允膺茲選雖階次小踰其屈滯已積乃除司徒左西掾尋兼通直散騎常侍聘齊太建中為給事黃門侍郎轉中庶子領大著作撰國史後主即位直中書省掌詔誥至德元年除度支尚書參選事掌誥詔并判廷尉建康二獄事初瓊父雲公奉梁武敕撰嘉瑞記瓊述其旨而續焉自永定訖于至德勒成一家之言遷吏部尚書著作如故瓊詳練譜牒雅有識鑑先是吏部尚書宗元饒卒尚書右僕射袁憲舉瓊宣帝未之用至是居之號為稱職瓊性謙儉不自封植雖位望日隆而執志逾下園池室宇無所改作車馬衣服不尚鮮華四時祿俸皆散之宗族家無餘財暮年深懷止足思避權要謝疾不視事俄丁母憂初瓊之侍東宮母隨在官舍及喪還鄉詔加賻贈後主自制誌銘朝野榮之瓊哀慕過毀以至德四年卒有集二十卷行於世子從典字由儀幼聰敏年八歲讀沈約集見回文研銘援筆擬之便有佳致十二作柳賦其詞甚美從父瑜特所賞愛及瑜將終命家中墳籍皆付之從典乃集瑜文為十卷仍製集序其文甚工從典篤好學業博涉羣書位太子洗馬司徒左西掾陳亡入隋位著作佐郎尚書右僕射楊素奏從典續司馬遷史記迄于隋其書未就坐弟受漢王諒職免後卒於南陽縣主簿琰字溫玉瓊之從父弟也父令公梁中軍宣城王記室參軍琰幼孤好學有志操州舉秀才累遷宣惠始興王外兵參軍直嘉德殿學士陳文帝聽覽餘暇頗留心史籍以琰博學善占誦引置左右嘗使製刀銘琰援筆即成無所點竄帝嗟賞久之賜衣一襲俄兼通直散騎常侍副琅邪王厚聘齊至鄴而厚卒琰為使主時年二十餘風氣韶亮占對閑敏齊士大夫甚傾心焉太建初為武陵王明威府功曹史兼東宮管記丁母憂去官卒至德二年追贈司農卿琰寡慾鮮矜競遊心經籍晏如也所製文筆多不存本後主求其遺文撰成二卷弟瑜字幹玉少篤學美詞藻州舉秀才再遷軍師晉安王外兵參軍東宮學士兄琰時為管記並以才學娛侍左右時人比之二應太建中累遷太子洗馬中舍人瑜聰敏強記常受莊老於汝南周弘正學成實論於僧滔法師並通大旨時皇太子好學欲博覽羣書以子集繁多命瑜抄撰未就而卒太子為之流涕親製祭文仍與詹事江總論述其美詞甚傷切至德二年追贈光祿卿有集十卷瑜有從父兄玠從父弟琛玠字潤玉梁大匠卿晏子之子也弘雅有識度好學能屬文後主在東宮徵為管記仍兼中舍人尋以疾失明將還鄉里太子解衣贈之為之流涕太建八年卒至德二年追贈少府卿有集十卷琛字潔玉宣毅臨川王長史丘公之子也少警俊事後母以孝聞後主嗣位為給事黃門侍郎中書舍人參掌機密琛性頗疎坐漏泄禁中語詔賜死陸杲字明霞吳郡吳人也祖徽字休猷宋補建康令清平無私為文帝所善元嘉十五年除平越中郎將廣州刺史加督清名亞王鎮之為士庶所愛詠二十三年為益州刺史亦加督卹隱有方威惠兼著寇盜靜息人物殷阜蜀土安之卒於官身亡之日家無餘財文帝甚痛惜之諡曰簡子父叡揚州中從事杲少好學工書畫舅張融有高名杲風韻舉止頗類時稱曰無對日下唯舅與甥為尚書殿中曹郎拜日八坐丞郎並到上省交禮而杲至晚不及時刻坐免官後為司徒從事中郎梁臺建為相國西曹掾天監五年位御史中丞性婞直無所顧望時山陰令虞肩在任贓汙數百萬杲奏收劾之中書舍人黃睦之以肩事託杲杲不答梁武聞之以問杲杲答曰有之帝曰識睦之不答曰臣不識其人時睦之在御側上指示曰此人是也杲謂曰君小人何敢以罪人屬南司睦之失色領軍將軍張稷是杲從舅杲嘗以公事彈稷稷因侍宴訴帝曰陸杲是臣親通小事彈臣不貸帝曰杲職司其事卿何得為嫌杲在臺號不畏強禦為義興太守在郡寬惠為下所稱歷左戶尚書太常卿出為臨川內史將發辭武帝於坐通啟求募部曲帝問何不付所由呈聞杲答所由不為受帝頗怪之以其臨路不咎問後入為金紫光祿大夫特進卒諡質子杲素信佛法持戒甚精著沙門傳三十卷弟煦學涉有思理位太子家令撰晉書未就又著陸史十五卷陸氏驪泉志一卷並行於時子罩字洞元少篤學多所該覽善屬文簡文居蕃為記室參軍撰帝集序稍遷太子中庶子掌管記禮遇甚厚大同七年以母老求去公卿以下祖道於征虜亭皇太子賜黃金五十斤時人方之疎廣母終後位終光祿卿初簡文在雍州撰法寶聯璧罩與羣賢並抄掇區分者數歲中大通六年而書成命湘東王為序其作者有侍中國子祭酒南蘭陵蕭子顯等三十人以比王象劉邵之皇覽焉論曰陸澄學稱博古而用不合今夫干將見重於時貴其所以立斷於事未能周務書得所譏矣叔明持身有檢殆為人望雅道相傳可謂載德者也杲諒直見稱罩文以取達亦足美乎舊陸徽著傳事迹蓋寡今以附孫杲上云
