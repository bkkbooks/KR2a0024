body:
  text: 南史卷二十二列傳第十二王曇首子僧綽孫儉曾孫騫騫子規騫弟暕暕子承訓僧綽弟僧虔僧虔子慈慈子泰慈弟志志弟子筠志弟彬寂王曇首太保弘之弟也幼有素尚兄弟分財曇首唯取圖書而已辟琅邪王大司馬屬從府公修復洛陽園陵與從弟球俱詣宋武帝帝曰並膏粱世德乃能屈志戎旅曇首答曰既從神武之師自使懦夫立志時謝晦在坐曰仁者果有勇帝悅及至彭城大會戲馬臺賦詩曇首文先成帝問弘曰卿弟何如卿答曰若但如下官門戶何寄帝大笑曇首有智局喜慍不見於色閨門內雍雍如也手不執金玉婦女亦不得以為飾玩自非祿賜一毫不受於人為文帝鎮西長史武帝謂文帝曰曇首輔相才也汝可每事諮之及文帝被迎入奉大統議者皆致疑曇首與到彥之從兄華並勸上行上猶未許曇首固陳并言天人符應上乃下率府州文武嚴兵自衞臺所遣百官衆力不得近部伍中兵參軍朱容子抱刀在平乘戶外不解帶者累旬及即位謂曇首曰非宋昌獨見無以致此以曇首為侍中領驍騎將軍容子為右軍將軍誅徐羨之等及平謝晦皆曇首及華力也元嘉四年車駕出北堂使三更竟開廣莫門南臺云應須白獸幡銀字不肯開尚書左丞羊玄保奏免御史中丞傅隆以下曇首曰既無墨敕又闕幡雖稱上旨不異單刺元嘉元年二年雖有再開門例此乃前事之違今之守舊未為非禮其不請白獸幡銀字致開門不時由尚書相承之失亦合糾正上特無問更立科條遷太子詹事侍中如故自謝晦平後上欲封曇首等會讌集舉酒勸之因拊御牀曰此坐非卿兄弟無復今日出詔以示之曇首曰豈可因國之災以為身幸陛下雖欲私臣當如直史何封事遂寢時弘錄尚書事又為揚州刺史曇首為上所親委任兼兩宮彭城王義康與弘並錄意常怏怏又欲得揚州以曇首居中分其權任愈不悅曇首固乞吳郡文帝曰豈有欲建大厦而遺其棟梁賢兄比屢稱疾固辭州任將來若相申許此處非卿而誰時弘久疾屢遜位不許義康謂賓客曰王公久疾不起神州詎合臥臨曇首勸弘減府兵力之半以配義康乃悅七年卒時年三十七文帝臨慟歎曰王詹事所疾不救國之衰也中書舍人周赳侍側曰王家欲衰賢者先殞上曰直是我家衰耳贈光祿大夫九年以預誅徐羨之等謀追封豫寧縣侯諡曰文孝武即位配饗文帝廟庭子僧綽嗣僧綽幼有大成之度衆便以國器許之好學練悉朝典年十三文帝引見拜便流涕哽咽上亦悲不自勝襲封豫寧縣侯尚文帝長女東陽獻公主初為江夏王義恭司徒參軍累遷尚書吏部郎參掌大選究識流品任舉咸盡其分僧綽深沉有局度不以才能高人父曇首與王華並被任遇華子新建侯嗣才劣位遇亦輕僧綽嘗謂中書侍郎蔡興宗曰弟名位應與新建齊弟超至今日蓋姻戚所致也遷侍中時年二十九始興王濬嘗問其年僧綽自嫌早達逡巡良久乃答其謙退若此元嘉末文帝頗以後事為念大相付託朝政大小皆參焉從兄微清介士也懼其太盛勸令損抑僧綽乃求吳郡及廣州並不許會巫蠱事洩上先召僧綽具言之及將廢立使尋求前朝舊典劭於東宮夜饗將士僧綽密以啟聞上又令撰漢魏以來廢諸王故事送與江湛徐湛之湛之欲立隨王誕江湛欲立南平王鑠文帝欲立建平王宏議久不決誕妃即湛之女鑠妃湛妹也僧綽曰建立之事仰由聖懷臣謂惟宜速斷幾事雖密不可使難生慮表取笑千載上曰卿可謂能斷大事此事不可不殷勤且庶人始亡人將謂我無復慈愛之道僧綽曰恐千載之後言陛下惟能裁弟不能裁兒上默然江湛出閤謂僧綽曰卿向言將不傷直邪僧綽曰弟亦恨君不直及劭弒逆江湛在尚書上省聞變曰不用王僧綽言至此劭立轉僧綽吏部尚書及檢文帝巾箱及湛家書疏得僧綽所啟饗士并廢諸王事乃收害焉因此陷北第諸侯王以為與僧綽有異志孝武即位追贈金紫光祿大夫諡曰愍侯初太社西空地本吳時丁奉宅孫晧流徙其家江左初為周顗蘇峻宅後為袁悅宅又為章武王司馬秀宅皆以凶終及給臧燾亦頻遇禍故世稱凶地僧綽嘗謂宅無吉凶請以為第始造未及居而敗子儉儉字仲寶生而僧綽遇害為叔父僧虔所養數歲襲爵豫寧縣侯拜受茅土流涕嗚咽糼篤學手不釋卷賓客或相稱美僧虔曰我不患此兒無名政恐名太盛耳乃手書崔子玉座右銘以貽之丹陽尹袁粲聞其名及見之曰宰相之門也栝栢豫章雖小已有棟梁氣矣終當任人家國事言之宋明帝選尚陽羨公主拜駙馬都尉帝以儉嫡母武康公主同太初巫蠱事不可以為婦姑欲開冢離葬儉因人自陳密以死請故事不行年十八解褐祕書郎太子舍人超遷祕書丞依七略撰七志四十卷表獻之又撰定元徽四部書目母憂服闋為司徒右長史晉令公府長史著朝服宋大明以來著朱衣儉上言宜復舊制時議不許及蒼梧暴虐儉告袁粲求外出引晉新安主婿王獻之任吳興為例補義興太守昇明二年為長兼侍中以父終此職固讓先是齊高帝為相欲引時賢參贊大業時謝朏為長史帝夜召朏却人與語久之朏無言唯有二小兒捉燭帝慮朏難之仍取燭遣兒朏又無言帝乃呼左右儉素知帝雄異後請間言於帝曰功高不賞古來非一以公今日位地欲北面居人臣可乎帝正色裁之而神采內和儉因又曰儉蒙公殊眄所以吐所難吐何賜拒之深宋以景和元徽之淫虐非公豈復寧濟但人情澆薄不能持久公若小復推遷則人望去矣豈唯大業永淪七尺豈可得保帝笑曰卿言不無理儉又曰公今名位故是經常宰相宜禮絕羣后微示變革當先令褚公知之儉請銜命帝曰我當自往經少日帝自造彥回款言移晷乃謂曰我夢應得官彥回曰今授始爾恐一二年間未容便移且吉夢未必便在旦夕帝還告儉儉曰褚是未達理虞整時為中書舍人甚閑辭翰儉乃自報整使作詔及高帝為太尉引儉為右長史尋轉左專見任用大典將行禮儀詔策皆出於儉褚彥回唯為禪詔又使儉參懷定之齊臺建遷尚書右僕射領吏部時年二十八多所引進時客有姓譚者詣儉求官儉謂曰齊桓滅譚那得有君答曰譚子奔莒所以有僕儉賞其善據卒得職焉高帝嘗從容謂儉曰我今日當以青溪為鴻溝對曰天應人順庶無楚漢之事時朝儀草創衣服制則未有定準儉議曰漢景六年梁王入朝中郎謁者金貂出入殿門左思魏都賦云藹藹列侍金貂齊光此藩國侍臣有貂之明文晉百官表云太尉參軍四人朝服武冠此又宰府之明文又疑百僚敬齊公之禮儉又曰晉王受命勸進云沖等眷眷稱名則應盡禮而世子禮秩未定儉又曰春秋曹世子來朝待以上公之禮下其君一等今齊公九命禮冠列蕃世子亦宜異數並從之世子鎮石頭城仍以為世子宮儉又曰魯有靈光殿漢之前例也聽事為崇光殿外齋為宣德殿以散騎常侍張緒為世子詹事車服悉依東宮制度高帝踐阼與儉議佐命功臣從容謂曰卿謀謨之功莫與為二卿止二千戶意以為少趙充國猶能自舉西零之任況卿與我情期異常儉曰昔宋祖創業佐命諸公開國不過二千以臣比之唯覺超越上笑曰張良辭侯何以過此建元元年改封南昌縣公時都下舛雜且多姦盜上欲立符伍家家以相檢括儉諫曰京師翼翼四方是湊必也持符於事既煩理成不曠謝安所謂不爾何以為京師乃止是歲有司奏定郊殷之禮儉以為宜以今年十月殷祭宗廟自此以後五年再殷祭二年正月上辛有事南郊即以其日還祭明堂又用次辛饗祀北郊而並無配從之明年轉左僕射領選如故初宋明帝紫極殿珠簾綺柱飾以金玉江左所未有高帝欲以其材起宣陽門儉與褚彥回及叔父僧虔連名表諫上手詔酬納宋世宮門外六門城設竹籬是年初有發白虎樽言白門三重門竹籬穿不完上感其言改立都牆儉又諫上答曰吾欲後世無以加也朝廷初基制度草創儉問無不決上每曰詩云惟岳降神生甫及申今天為我生儉也其年固請解選見許帝幸樂遊宴集謂儉曰卿好音樂孰與朕同儉曰沐浴唐風事兼比屋亦既在齊不知肉味帝稱善後幸華林宴集使各効伎藝褚彥回彈琵琶王僧虔柳世隆彈琴沈文季歌子夜來張敬兒舞儉曰臣無所解唯知誦書因跪上前誦相如封禪書上笑曰此盛德之事吾何以堪之後上使陸澄誦孝經起自仲尼居儉曰澄所謂博而寡要臣請誦之乃誦君子之事上章上曰善張子布更覺非奇也於是王敬則脫朝服袒以絳糾髻奮臂拍張叫動左右上不悅曰豈聞三公如此答曰臣以拍張故得三公不可忘拍張時以為名答儉尋以本官領太子詹事加兵三百人時皇太子妃薨左衞將軍沈文季經為宮臣未詳服不儉議曰漢魏以來宮僚先備臣隸之節具體在三存既盡敬亡豈無服昔庾翼喪妻王允滕含猶謂府吏宜有小君之服況臣節之重宜依禮為舊君之妻齊衰三月而除上崩遺詔以儉為侍中尚書令鎮軍每上朝令史有三五十人隨上諮事辯析未嘗壅滯褚彥回時為司徒錄尚書笑謂儉曰觀令判斷甚樂儉曰所以得厝私懷實由禀明公不言之化武帝即位給班劍二十人進號衞將軍掌選事時有司以前代嗣位或仍前郊年或別為郊始晉宋以來未有畫一儉議曰晉明帝太寧三年南郊其年九月崩成帝即位明年改元亦郊簡文咸安二年南郊其年七月崩孝武即位明年改元亦郊宋元嘉三十年正月南郊二月崩孝武嗣位明年亦郊此二代明例差可依放今聖明係業幽顯宅心言化則頻郊非嫌語事則元號初改禋燎登配孝敬兼遂謂明年正月宜饗祀二郊虔祭明堂自茲以後依舊間歲有司又以明年正月上辛應南郊而立春在上辛後郊在立春前為疑儉曰宋景平元年正月三日辛丑南郊其月十一日立春元嘉十六年正月六日辛未南郊其月八日立春此近世明例也並從之永明二年領丹陽尹三年領國子祭酒又領太子少傅舊太子敬二傅同至是朝議接少傅以賓友禮宋時國學頹廢未暇修復宋明帝泰始六年置總明觀以集學士或謂之東觀置東觀祭酒一人總明訪舉郎二人儒玄文史四科科置學士十人其餘令史以下各有差是歲以國學既立省總明觀於儉宅開學士館以總明四部書充之又詔儉以家為府四年以本官領吏部先是宋孝武好文章天下悉以文采相尚莫以專經為業儉弱年便留意三禮尤善春秋發言吐論造次必於儒教由是衣冠翕然並尚經學儒教於此大興何承天禮論三百卷儉抄為八帙又別抄條目為十三卷朝儀舊典晉宋來施行故事撰次諳憶無遺漏者所以當朝理事斷決如流每博議引證先儒罕有其例八坐丞郎無能異者令史諮事賓客滿席儉應接銓序傍無留滯十日一還監試諸生巾卷在庭劍衞令史儀容甚盛作解散幘斜插簪朝野慕之相與放効儉常謂人曰江左風流宰相惟有謝安蓋自況也武帝深委仗之士流選用奏無不可五年儉即本號開府儀同三司固讓六年重申前命先是詔儉三日一還朝尚書令史出外諮事上以往來煩數詔儉還尚書下省月聽十日出外儉啟求解選上不許七年乃上表固請見許改領中書監參掌選事其年疾上親臨視薨年三十八詔衞軍文武及臺所給兵仗悉停侍葬又詔追贈太尉加羽葆鼓吹增班劍為六十人葬禮依太宰文簡公褚彥回故事諡文憲公儉寡嗜慾唯以經國為務車服塵素家無遺財手筆典裁為當時所重少便有宰臣之志賦詩云稷契匡虞夏伊呂翼商周及生子字曰玄成取仍世作相之義撰古今喪服集記并文集並行於世梁武帝受禪詔為儉立碑降爵為侯儉弟遜宋昇明中為丹陽丞告劉彥節事不蒙封賞建元初為晉陵太守有怨言儉慮為禍因褚彥回啟聞中丞陸澄依事舉奏詔以儉竭誠佐命特降刑書宥遜遠徙永嘉郡於道伏誅長子騫嗣騫字思寂本字玄成與齊高帝偏諱同故改焉性凝簡慕樂廣為人未嘗言人之短諸女子姪皆嬪王尚主朔望來歸輜軿填咽非所欲也敕歲中不過一再見嘗從容謂諸子曰吾家本素族自可依流平進不須苟求也歷黃門郎司徒右長史不事產業有舊墅在鍾山八十餘頃與諸宅及故舊共佃之常謂人曰我不如鄭公業有田四百頃而食常不周以此為愧永元末召為侍中不拜三年春枉矢晝見西方長十餘丈騫曰此除舊布新之象也及梁武起兵騫曰天時人事其在此乎梁武霸府建引為大司馬諮議參軍遷侍中及帝受禪降封為侯歷位度支尚書中書令武帝於鍾山西造大愛敬寺騫舊墅在寺側者即王導賜田也帝遣主書宣旨就騫市之欲以施寺答云此田不賣若敕取所不敢言酬對又脫略帝怒遂付市評田價以直逼還之由是忤旨出為吳興太守騫性侈於味而儉於服頗以多忌為累又惰於接物雖主書宣敕或過時不見才望不及弟暕特以儉之嫡故不棄於時暕為尚書左丞僕射當朝用事騫自中書令為郡邑邑不樂在郡臥不視事徵復為度支尚書加給事中領射聲校尉以母憂去職普通三年卒年四十九贈侍中金紫光祿大夫諡曰安子規規字威明八歲丁所生母憂居喪有至性齊太尉徐孝嗣每見必為流涕稱曰孝童叔父暕亦深器重之常曰此兒吾家千里駒也年十二略通五經大義及長遂博涉有口辯為本州迎主簿起家祕書郎累遷太子洗馬天監十二年改造太極殿畢規獻新殿賦其辭甚工後為晉安王綱雲麾諮議參軍久之為新安太守父憂去職服闋襲封南昌縣侯除中書黃門侍郎敕與陳郡殷芸琅邪王錫范陽張緬同侍東宮俱為昭明太子所禮湘東王繹時為丹陽尹與朝士宴集屬規為酒令規從容曰江左以來未有茲舉特進蕭琛金紫光祿大夫傅昭在坐並謂為知言朱异嘗因酒卿規規責以無禮普通初陳慶之北侵陷洛陽百僚稱慶規退曰可吊也又何賀焉道家有云非為功難成功難也昔桓溫得而復失宋武竟無成功我孤軍無援深入寇境將為亂階俄見覆沒六年武帝於文德殿餞廣州刺史元景隆詔羣臣賦詩同用五十韻規援筆立奏其文又美武帝嘉焉即日授侍中後為晉安王長史王立為太子仍為散騎常侍太子中庶子侍東宮太子賜以所服貂蟬并降令書悅是舉也尋為吳郡太守主書芮珍宗家在吳前守宰皆傾意附之至是珍宗假還規遇之甚薄珍宗還都密奏規不理郡事俄徵為左戶尚書郡境千餘人詣闕請留表三奏不許求於郡樹碑許之規常以門宗貴盛思減退後為太子中庶子領步兵校尉辭疾不拜遂於鍾山宋熙寺築室居焉卒贈光祿大夫諡曰文皇太子出臨哭與湘東王繹令曰王威明風韻遒上神峰標映千里絕迹百尺無枝實俊人也一爾過隙永歸長夜金刀掩芒長淮絕涸去歲冬中已傷劉子今茲寒孟復悼王生俱往之傷信非虛說規集後漢衆家異同注續漢書二百卷文集二十卷子襃魏剋江陵入長安暕字思晦騫弟也年數歲而風神警拔有成人之度時父儉作宰相賓客盈門見暕曰公才公望復在此矣弱冠選尚淮南長公主拜駙馬都尉歷祕書丞齊明帝詔求異士始安王遙光薦暕及東海王僧孺除暕驃騎從事中郎天監中歷位侍中吏部尚書領國子祭酒門貴與物隔不能留心寒素頗稱刻薄後為尚書左僕射領國子祭酒卒諡曰靖子承幼訓並通顯承字安期初為祕書郎累遷中書黃門侍郎兼國子博士時膏腴貴遊咸以文學相尚罕以經術為業唯承獨好儒業遷長兼侍中俄轉國子祭酒承祖儉父暕皆為此職三世為國師前代未之有久之出為東陽太守政存寬惠吏人悅之卒郡諡曰章承性簡貴有風格右衞朱异當朝用事每休下車馬填門有魏郡申英者門寒才俊好危言高論以忤權右嘗指异門曰此中輻湊皆為利往能不至者唯大小王東陽耳小東陽即承弟幼也時唯承兄弟及褚翔不至异門世並稱之訓字懷範生而紫胞師媼云法當貴幼聰警有識量僧正惠超見而奇之謂門人羅智國曰四郎眉目疎朗舉動和韻此是興門戶者智國以白暕暕亦曰不墜基業其在文殊文殊訓小字也年十三暕亡憂毀家人莫識十六召見文德殿應對爽徹上目送久之謂朱异曰可謂相門有相初補國子生問說師袁昂昂曰久籍高名有勞虛想及觀容止若披雲霧俄而諸袁子弟來昂謂諸助教曰我兒出十數若有一子如此實無所恨射策除祕書郎累遷祕書丞嘗賦詩云旦奭匡世功蕭曹佐甿俗追祖儉之志也後拜侍中入見武帝帝問何敬容曰褚彥回年幾為宰相敬容曰少過三十上曰今之王訓無謝彥回訓美容儀善進止文章為後進領袖年二十六卒諡溫子僧虔金紫光祿大夫僧綽弟也父曇首與兄弟集會子孫任其戲適僧達跳下地作彪子時僧虔累十二博既不墜落亦不重作僧綽採蠟燭珠為鳳皇僧達奪取打壞亦復不惜伯父弘歎曰僧達俊爽當不減人然亡吾家者終此子也僧虔必至公僧綽當以名義見美或云僧虔採燭珠為鳳皇弘稱其長者云僧虔弱冠雅善隸書宋文帝見其書素扇歎曰非唯跡逾子敬方當器雅過之為太子舍人退默少交接與袁淑謝莊善淑每歎之曰卿文情鴻麗學解深拔而韜光潛實物莫之窺雖魏陽元之射王汝南之騎無以加焉遷司徒左西屬兄僧綽為宋元凶所害親賓咸勸之逃僧虔泣曰吾兄奉國以忠貞撫我以慈愛今日之事苦不見及耳若同歸九泉猶羽化也孝武初出為武陵太守攜諸子姪兄子儉中塗得病僧虔為廢寢食同行客慰喻之僧虔曰昔馬援處子姪之間一情不異鄧攸於弟子更逾所生吾實懷其心誠未異古亡兄之胤不宜忽諸若此兒不救便當回舟謝職還為中書郎再遷太子中庶子孝武欲擅書名僧虔不敢顯跡大明世常用掘筆書以此見容後為御史中丞領驍騎將軍甲族由來多不居憲臺王氏分枝居烏衣者位宦微減僧虔為此官乃曰此是烏衣諸郎坐處我亦可試為耳泰始中為吳興太守始王獻之善書為吳興郡及僧虔工書又為郡論者稱之徙會稽太守中書舍人阮佃夫家在東請假歸客勸僧虔以佃夫要幸宜加禮接僧虔曰我立身有素豈能曲意此輩彼若見惡當拂衣去耳佃夫言於宋明帝使御史中丞孫敻奏僧虔坐免官尋以白衣領侍中元徽中為吏部尚書尋加散騎常侍轉右僕射昇明二年為尚書令嘗為飛白書題尚書省壁曰圓行方止物之定質修之不已則溢高之不已則慄馳之不已則躓引之不已則迭是故去之宜疾當時嗟賞以比坐右銘兄子儉每覲見輒勗以前言往行忠貞止足之道雅好文史解音律以朝廷禮樂多違正典人間競造新聲時齊高帝輔政僧虔上表請正聲樂高帝乃使侍中蕭惠基調正清商音律齊受命轉侍中丹陽尹郡縣獄相承有上湯殺囚僧虔上言湯本救疾而實行寃暴若罪必入重自有正刑若去惡宜疾則應先啟豈有死生大命而潛制下邑上納其言而止文惠太子鎮雍州有盜發古冢者相傳云是楚王冢大獲寶物玉履玉屏風竹簡書青絲綸簡廣數分長二尺皮節如新有得十餘簡以示僧虔云是科斗書考工記周官所闕文也高帝素善書篤好不已與僧虔賭書畢謂曰誰為第一對曰臣書第一陛下亦第一帝笑曰卿可謂善自為謀或云帝問我書何如卿答曰臣正書第一草書第二陛下草書第二而正書第三臣無第三陛下無第一帝大笑曰卿善為辭然天下有道丘不與易也帝示僧虔古迹十一卷就求能書人名僧虔得人間所有卷中所無者吳大皇帝景帝歸命侯書桓玄書及王丞相導領軍洽中書令珉張芝索靖衞伯儒張翼十一卷奏之又上羊欣所撰能書人名一卷遷湘州刺史侍中如故清簡不營財產百姓安之武帝即位以風疾欲陳解遷侍中左光祿大夫開府儀同三司僧虔少時羣從並會客有相之云僧虔年位最高仕當至公餘人莫及及此授僧虔謂兄子儉曰汝任重於朝行當有八命之禮我若復此授一門有二台司實所畏懼乃固辭上優而許之客問其故僧虔曰吾榮位已過無以報國豈容更受高爵方貽官謗邪儉既為朝宰起長梁齋制度小過僧虔視之不悅竟不入戶儉即日毀之永明三年薨時年六十追贈司空侍中如故諡簡穆僧虔頗解星文夜坐見豫章分野當有事故時僧虔子慈為豫章內史慮有公事少時而僧虔薨棄郡奔赴時有前將軍陳天福坐討唐𧜛之於錢唐掠奪百姓財物棄市先是天福將行令家人豫作壽冢未至東又信催速就冢成而得罪因以葬焉又宋世光祿大夫劉鎮之年三十許病篤已辦凶具既而疾愈因畜棺以為壽九十餘乃亡此器方用因此而言天道未易知也僧虔論書云宋文帝書自言可比王子敬時議者云天然勝羊欣功夫少於欣王平南廙右軍叔過江右軍之前以為最亡曾祖領軍書右軍云弟書遂不減吾變古制今惟右軍領軍不爾至今猶法鍾張亡從祖中書令書子敬云弟書如騎騾駸駸欲度驊騮前庾征西翼書少時與右軍齊名右軍後進庾猶不分在荊州與都下人書云小兒輩賤家雞皆學逸少書須吾下當比之張翼王右軍自書表晉穆帝令翼寫題後答右軍當時不別久後方悟云小人幾欲亂真張芝索靖韋誕鍾會二衞並得名前代無以辨其優劣唯見其筆力驚異耳張澄當時亦呼有意郗愔章草亞於右軍郗嘉賓草亞於二王緊媚過其父桓玄自謂右軍之流論者以比孔琳之謝安亦入能書錄亦自重為子敬書嵇康詩羊欣書見重一時親受子敬行書尤善正乃不稱名孔琳之書天然縱放極有筆力規矩恐在羊欣後丘道護與羊欣俱面受子敬故當在欣後范曄與蕭思話同師羊欣後小叛既失故步為復小有意耳蕭思話書羊欣之影風流趨好殆當不減筆力恨弱謝綜書其舅云緊生起是得賞也恨少媚好謝靈運書乃不倫遇其合時亦得入流賀道力書亞丘道護庾昕學右軍亦欲亂真矣僧虔嘗自書讓尚書令表辭制既雅筆迹又麗時人以比子敬崇賢吳郡顧寶先卓越多奇自以伎能僧虔乃作飛白以示之寶先曰下官今為飛白屈矣僧虔著書賦儉為注序甚工僧虔宋世嘗有書誡子曰知汝恨吾未許汝學欲自悔厲或以闔棺自欺或更擇美業且得有慨亦慰窮生但亟聞斯唱未覩其實吾未信汝非徒然也往年有意於史取三國志聚置牀頭百日許復徙業就玄汝曾未窺其題目未辨其指歸而終日自欺人人不受汝欺也由吾不學無以為訓然重華無嚴父放勛無令子亦各由己耳汝輩竊議亦當云阿越不學何忽自課汝見其一耳不全爾也設令吾學如馬鄭亦復甚勝復倍不如今亦必大減致之有由從身上來也汝今壯年自勤數倍許勝劣及吾耳吾在世雖乏德素要復推排人間數十許年故是一舊物人或以比數汝耳即化之後若自無調度誰復知汝事者舍中亦有少負令譽弱冠越超清級者于時王家門中優者龍鳳劣猶虎豹失蔭之後豈龍虎之議況吾不能為汝蔭政應各自努力耳或有身經三公蔑爾無聞布衣寒素卿相屈體父子貴賤殊兄弟聲名異何也體盡讀數百卷書耳吾今悔無所及欲以前車誡爾後乘也汝年入立境方應從宦兼有室累何處復得下帷如王郎時邪各在爾身已切豈復關吾邪鬼唯知愛深松茂栢寧知子弟毀譽事因汝有感故略胸懷子慈慈字伯寶年八歲外祖宋太宰江夏王義恭迎之內齋施寶物恣所取慈取素琴石硯及孝子圖而已義恭善之袁淑見其幼時撫其背曰叔慈內潤也少與從弟儉共書學謝鳳子超宗嘗候僧虔仍往東齋詣慈慈正學書未即放筆超宗曰卿書何如虔公慈曰慈書比大人如雞之比鳳超宗狼狽而退十歲時與蔡興宗子約入寺禮佛正遇沙門懺約戲慈曰衆僧今日可謂虔虔慈應聲曰卿如此何以興蔡氏之宗歷位吳郡太守大司馬長史侍中領步兵校尉司徒左長史慈患脚齊武帝敕王晏慈有微疾不能騎聽乘車在仗後江左以來少例也慈妻劉彥節女子觀尚武帝長女吳縣公主修婦禮姑未嘗交答江夏王鋒為南徐州王妃慈女也以慈為東海太守行南徐州府州事還為冠軍將軍廬陵王中軍長史未拜永明九年卒贈太常諡懿子泰泰字仲通幼敏悟年數歲時祖母集諸孫姪散棗栗於牀羣兒競之泰獨不取問其故對曰不取自當得賜由是中表異之少好學手所抄寫二千許卷及長通和溫雅家人不見喜慍之色姊夫齊江夏王鋒為齊明帝害外生蕭子友並孤弱泰資給撫訓逾於子姪梁天監元年為祕書丞自齊永元之末後宮火延燒祕書圖書散亂殆盡泰表校定繕寫武帝從之歷中書侍郎掌吏部仍即真自過江吏部郎不復典大選令史以下小人求競者輻湊前後少能稱職泰為之不為貴賤請屬易意天下稱平轉黃門侍郎每預朝宴刻燭賦詩文不加點帝深賞歎沈約常曰王有養炬謝有覽舉養泰小字炬筠小字也始革大理以泰為廷尉卿再歷侍中後為都官尚書泰能接人士故每願其居選官頃之為吏部尚書衣冠屬望未及選舉仍疾改除散騎常侍左驍騎將軍未拜卒諡夷子廓志字次道慈之弟也九歲居所生母憂哀容毀瘠為中表所異弱冠選尚宋孝武女安固公主拜駙馬都尉褚彥回為司徒引志為主簿謂其父僧虔曰朝廷之恩本為殊特所可光榮在屈賢子累遷宣城內史清謹有恩惠郡人張倪吳慶爭田經年不決志到官父老相謂曰王府君有德政吾鄉里乃有如此爭倪慶因相攜請罪所訟地遂成閑田後為東陽太守郡獄有重囚十餘冬至日悉遣還家過節皆反唯一人失期志曰此自太守事主者勿憂明旦果至以婦孕吏人益歎服之為吏部尚書在選以和理稱崔慧景平以例加右軍將軍封臨汝侯固讓改領右衞將軍及梁武軍至城內殺東昏百僚署名送首志歎曰冠雖弊可加足乎因取庭樹葉捼服之偽悶不署名梁武覽牋無志署心嘉之弗以讓也霸府開為驃騎大將軍長史梁臺建位散騎常侍中書令天監初為丹陽尹為政清靜部下有寡婦無子姑亡舉責以斂葬既而無以還之志愍其義以俸錢償焉時年饑每旦為粥於郡門以賦百姓衆悉稱惠常懷止足謂諸子姪曰謝莊在宋孝武時位止中書令吾自視豈可過之三年為散騎常侍中書令因多謝病簡通賓客九年還為散騎常侍金紫光祿大夫卒志善草隸當時以為楷法齊游擊將軍徐希秀亦號能書常謂志為書聖志家居建康禁中里馬糞巷父僧虔門風寬恕志尤惇厚所歷不以罪咎劾人門下客嘗盜脫志車幰賣之志知而不問待之如初賓客遊其門者專蓋其過而稱其善兄弟子姪皆篤實謙和時人號馬糞諸王為長者普通四年志改葬武帝厚賻贈之諡曰安有五子緝休諲操素志弟揖位太中大夫揖子筠筠字元禮一字德柔幼而警悟七歲能屬文年十六為芍藥賦其辭甚美及長清靜好學與從兄泰齊名沈約見筠以為似外祖袁粲謂僕射張稷曰王郎非唯額類袁公風韻都欲相似稷曰袁公見人輒矜嚴王郎見人必娛笑唯此一條不能酷似仕為尚書殿中郎王氏過江以來未有居郎署或勸不就筠曰陸平原東南之秀王文度獨步江東吾得比蹤昔人何所多恨乃欣然就職沈約每見筠文咨嗟嘗謂曰昔蔡伯喈見王仲宣稱曰王公之孫吾家書籍悉當相與僕雖不敏請附斯言自謝朓諸賢零落平生意好殆絕不謂疲暮復逢於君約於郊居宅閣齋請筠為草木十詠書之壁皆直寫文辭不加篇題約謂人曰此詩指物程形無假題署約製郊居賦搆思積時猶未都畢示筠草筠讀至雌霓五的反連蜷約撫掌欣抃曰僕常恐人呼為霓五兮反次至墜石磓星及冰懸埳而帶坻筠皆擊節稱贊約曰知音者希真賞殆絕所以相要政在此數句耳筠又嘗為詩呈約約即報書歎詠以為後進擅美筠又能用強韻每公宴並作辭必妍靡約嘗啟上言晚來名家無先筠者又於御筵謂王志曰賢弟子文章之美可謂後來獨步謝朓常見語云好詩圓美流轉如彈丸近見其數首方知此言為實累遷太子洗馬中舍人並掌東宮管記昭明太子愛文學士常與筠及劉孝綽陸倕到洽殷鈞等遊宴玄圃太子獨執筠袖撫孝綽肩曰所謂左把浮丘袖右拍洪崖肩其見重如此筠又與殷鈞以方雅見禮後為中書郎奉敕製開善寺寶誌法師碑文辭甚麗逸又敕撰中書表奏三十卷及所上賦頌都為一集後為太子家令復掌管記普通元年以母憂去職筠有孝性毀瘠過禮中大通二年為司徒左長史三年昭明太子薨敕製哀策文復見嗟賞尋出為臨海太守在郡侵刻還資有芒屩兩舫他物稱是為有司奏不調累年後歷祕書監太府卿度支尚書司徒左長史及簡文即位為太子詹事筠家累千金性儉嗇外服粗弊所乘牛嘗飼以青草及遇亂舊宅先為賊焚乃寓居國子祭酒蕭子雲宅夜忽有盜攻懼墜井卒時年六十九家人十三口同遇害人棄尸積於空井中筠狀貌寢小長不滿六尺性弘厚不以藝能高人而少擅才名與劉孝綽見重當時其自序云余少好抄書老而彌篤雖偶見瞥觀皆即疏記後重省覽歡興彌深習與性成不覺筆倦自年十三四建武二年乙亥至梁大同六年四十六載矣幼年讀五經皆七八十遍愛左氏春秋吟諷常為口實廣略去取凡三過五抄餘經及周官儀禮國語爾雅山海經本草並再抄子史諸集皆一遍未嘗倩人假手並躬自抄錄大小百餘卷不足傳之好事蓋以備遺忘而已又與諸兒書論家門集云史傳稱安平崔氏及汝南應氏並累葉有文才所以范蔚宗云崔氏彫龍然不過父子兩三世耳非有七葉之中名德重光爵位相繼人人有集如吾門者也沈少傅約常語人云吾少好百家之言身為四代之史自開闢以來未有爵位蟬聯文才相繼如王氏之盛也汝等仰觀堂搆思各努力筠自撰其文章以一官為一集自洗馬中書中庶吏部左佐臨海太府各十卷尚書三十卷凡一百卷行於世子祥仕陳位黃門侍郎揖弟彬彬字思文好文章習篆隸與志齊名時人為之語曰三真六草為天下寶齊武帝起舊宮彬獻賦文辭典麗尚齊高帝女臨海長公主拜駙馬都尉仕齊歷太子中庶子徙永嘉太守卜室於積穀山有終焉之志梁天監中歷吏部尚書祕書監卒諡惠彬立身清白推賢接士有士君子風彬弟寂寂字子玄性迅動好文章讀范滂傳未嘗不歎悒王融敗後賓客多歸之齊建武初欲獻中興頌兄志謂曰汝膏粱年少何患不達不鎮之以靜將恐貽譏寂乃止位祕書郎卒年二十一論曰王曇首之才器王僧綽之忠直其世祿不替也豈徒然哉仲寶雅道自居早懷伊呂之志竟而逢時遇主自致宰輔之隆所謂衣冠禮樂盡在是矣齊有人焉於斯為盛其餘文雅儒素各禀家風箕裘不墜亦云美矣
