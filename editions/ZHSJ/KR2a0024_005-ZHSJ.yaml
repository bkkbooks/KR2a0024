body:
  text: 南史卷五齊本紀下第五廢帝鬱林王諱昭業字元尚小字法身文惠太子長子也高帝為相王鎮東府時年五歲牀前戲高帝方令左右拔白髮問之曰兒言我誰耶答曰太翁高帝笑謂左右曰豈有為人作曾祖而拔白髮者乎即擲鏡鑷其後問訊高帝指示賓客曰我基於此四世矣及武帝即位封為南郡王時年十歲永明五年十一月戊子冠於東宮崇正殿其日小會賜王公以下帛各有差給南郡王扶二人七年有司奏給班劍二十人鼓吹一部高選友學禮絕羣王十一年給皁輪三望車文惠太子薨立南郡王為皇太孫居東宮其年七月戊寅武帝崩皇太孫即帝位大赦八月壬午詔稱遺詔以護軍將軍武陵王曄為衞將軍征南大將軍陳顯達即本號並開府儀同三司以尚書左僕射西昌侯鸞為尚書令右僕射王晏為左僕射吏部尚書徐孝嗣為右僕射癸未加司徒竟陵王子良位太傅增班劍三十人蠲除三調及衆逋在今年七月三十日以前者省御府及無用池田邸冶減關市征稅先是每有蠲原之詔多無事實督責如故是時西昌侯鸞任知朝政天下咸望風來蘇至此恩信兩行海內莫不欣然九月辛酉追尊文惠皇太子為世宗文皇帝冬十月壬寅尊皇太孫太妃為皇太后立皇后何氏十一月庚戌魏人來聘辛亥立臨汝公昭文為新安王曲江公昭秀為臨海王皇弟昭粲為永嘉王隆昌元年春正月丁未大赦改元加太傅竟陵王子良殊禮鎮軍將軍西昌侯鸞即本號為大將軍給鼓吹一部親兵五百人以領軍鄱陽王鏘為書右僕射詔百僚極陳得失又詔王公以下各舉所知辛亥祀南郊宥隆昌元年以來流人戊午拜崇安陵甲戌使司徒參軍劉斅聘于魏二月辛卯祀明堂夏四月辛巳衞將軍開府儀同三司武陵王曄薨戊子太傅竟陵王子良薨丁酉以驃騎將軍廬陵王子卿為衞將軍尚書右僕射鄱陽王鏘為驃騎將軍並開府儀同三司閏月丁卯以鎮軍大將軍西昌侯鸞即本號開府儀同三司五月甲戌朔日有蝕之秋七月癸巳皇太后令廢帝為鬱林王帝少美容止好隸書武帝特所鍾愛敕皇孫手書不得妄出以貴之進退音吐甚有令譽生而為竟陵文宣王所攝養常在袁妃間竟陵王移住西州帝亦隨住焉性甚辯慧哀樂過人接對賓客皆款曲周至矯情飾詐陰懷鄙慝與左右無賴羣小二十許人共衣食同臥起妃何氏擇其中美貌者皆與交歡密就富市人求錢無敢不與及竟陵王移西邸帝獨住西州每夜輒開後堂閤與諸不逞小人至諸營署中淫宴凡諸小人並逆加爵位皆疏官名號於黃紙使各囊盛以帶之許南面之日即便施行又別作籥鉤兼善效人書每私出還輒扃籥封題如故故人無知者師史仁祖侍書胡天翼聞之相與謀曰若言之二宮則其事未易若於營署為異人所毆打及犬物所傷豈直罪止一身亦當盡室及禍年各已七十餘生寧足吝邪數日中二人相係自殺二宮不知也武帝以暨陽縣寒人給事中綦母珍之代仁祖剡縣寒人馬澄代天翼文惠太子每禁其起居節其用度帝謂豫章王妃庾氏曰阿婆佛法言有福生帝王家今見作天王便是大罪左右主帥動見拘執不如市邊屠酤富兒百倍文惠太子自疾及薨帝侍疾及居喪哀容號毀旁人見者莫不嗚咽裁還私室即歡笑酣飲備食甘滋葬畢立為皇太孫問訊太妃截壁為閤於太妃房內往何氏間每入輒彌時不出武帝往東宮帝迎拜號慟絕而復蘇武帝自下輿抱持之寵愛日隆又在西州令女巫楊氏禱祀速求天位及文惠薨謂由楊氏之力倍加敬信呼楊婆宋氏以來人間有楊婆兒哥蓋此徵也武帝有疾又令楊氏日夜禱祈令宮車早晏駕時何妃在西州武帝未崩數日疾稍危與何氏書紙中央作一大喜字而作三十六小喜字繞之侍武帝疾憂容慘慼言發淚下武帝每言及存亡帝輒哽咽不自勝武帝以此謂為必能負荷大業謂曰五年中一委宰相汝勿厝意五年以後勿復委人若自作無成無所多恨臨崩執帝手曰阿奴若憶翁當好作如此再而崩大斂始畢乃悉呼武帝諸伎備奏衆樂諸伎雖畏威從事莫不哽咽流涕素好狗馬即位未逾旬便毀武帝所起招婉殿以材賜閹人徐龍駒於其處為馬埒馳騎墜馬面並傷稱疾不出者數日多聚名鷹快犬以粱肉奉之及武帝梓宮下渚帝於端門內奉辭十早𥁕輬車未出端門便稱疾還內裁入閤即於內奏胡伎鞞鐸之聲震響內外時司空王敬則問新除射聲校尉蕭坦之曰便如此不當怱怱邪坦之曰此政是內人哭響徹耳自山陵之後便於閤內乘內人車問訊往皇后所生母宋氏間因微服游走市里又多往文帝崇安陵隧中與羣小共作諸鄙褻擲塗賭跳放鷹走狗雜狡獪帝既失道朝事大小皆決之西昌侯鸞鸞有諫多不見從極意賞賜左右動至百數十萬每見錢曰我昔思汝一箇不得今日得用汝未武帝聚錢上庫五億萬齋庫亦出三億萬金銀布帛不可稱計即位未朞歲所用已過半皆賜與諸不逞羣小取諸寶器以相擊剖破碎之以為笑樂及至廢黜府庫悉空其在內常裸袒著紅紫錦繡新衣錦帽紅縠褌雜采衵服好鬬雞密買雞至數千價武帝御物甘草杖宮人寸斷用之徐龍駒為後閤舍人日夜在六宮房內帝與文帝幸姬霍氏淫通改姓徐氏龍駒勸長留宮內聲云度霍氏為尼以餘人代之皇后亦淫亂齋閤通夜洞開內外淆雜無復分別中書舍人綦母珍之朱隆之直閤將軍曹道剛周奉叔並為之羽翼西昌侯鸞屢諫不納既而尼媼外入頗傳異語乃疑鸞有異志中書令何胤以皇后從叔見親使直殿省常隨后呼胤為三父與胤謀誅鸞令胤受事胤不敢當依違杜諫乃止又謀出鸞於西州中敕用事不復關諮鸞慮變先使蕭諶坦之等於省誅曹道剛朱隆之等率兵自尚書省入雲龍門戎服加朱衣於上比入門三失履王晏徐孝嗣蕭坦之陳顯達王廣之沈文季係進帝在壽昌殿裸身與霍氏相對聞外有變使閉內殿諸房閤令閹人登興光樓望還報云見一人戎服從數百人急裝在西鍾樓下須臾蕭諶領兵先入宮帝走向愛姬徐氏房拔劍自刺不入以帛纏頸輿接出延德殿諶初入殿宿衞將士皆執弓楯欲戰諶曰所取自有人卿等不須動宿衞信之及帝出各欲自奮帝竟無一言出西弄遇弒年二十二舁尸出徐龍駒宅殯葬以王禮霍氏及廣昌君宋並賜死餘黨亦見誅先是文惠太子立樓館於鍾山下號曰東田太子屢游幸之東田反語為顛童也武帝又於青溪立宮號曰舊宮反之窮也果以輕狷而至於窮又武帝時有小史姓皇名太子武帝曰皇太子非名之謂於是移點於外易名為犬子處士何點曰太子者天地之所懸三才之所係今化而為犬不得立矣既而文惠太子薨鬱林海陵相繼廢黜此其驗也永明中百姓忽著破後帽始自建業流于四遠貴賤翕然服之此服祅也帽自蕭諶之家其流遂遠天意若曰武穆文昭皆當滅而諶亦誅死之効焉廢帝海陵恭王諱昭文字季尚文惠太子第二子也永明四年封臨汝公鬱林王即位改封新安王及鬱林廢西昌侯鸞奉帝纂統延興元年秋七月丁酉皇帝即位大赦改元賜文武位二等以鎮軍大將軍西昌侯鸞為驃騎大將軍開府儀同三司錄尚書事都督揚州刺史加班劍為三十人封宣城郡公出鎮東城以尚書左僕射王晏為尚書令以丹陽尹徐孝嗣為左僕射以領軍將軍沈文季為右僕射以車騎大將軍陳顯達為司空以驃騎大將軍鄱陽王鏘為司徒命宣城公鸞甲仗百人入殿陳顯達王晏徐孝嗣蕭諶各五十人入殿八月壬辰魏人來聘甲午以前司空王敬則為太尉辛丑復置南蠻校尉官甲辰詔使者觀省風俗九月癸未誅新除司徒鄱陽王鏘中軍大將軍隨王子隆遣平西將軍王廣之誅南兗州刺史安陸王子敬於是江州刺史晉安王子懋起兵遣中護軍王玄邈討誅之乙酉又誅湘州刺史南平王銳郢州刺史晉熙王銶南豫州刺史宜都王鏗丁亥以衞將軍廬陵王子卿為司徒以撫軍將軍桂陽王鑠為中軍將軍開府儀同三司冬十月丁酉加宣城公鸞黃鉞進授都督中外諸軍事太傅領大將軍揚州牧加殊禮進爵為王戊戌誅新除中軍將軍桂陽王鑠撫軍將軍衡陽王鈞侍中秘書監江夏王鋒鎮軍將軍建安王子真左將軍巴陵王子倫是時宣城王鸞輔政帝起居皆諮而後行思食蒸魚菜太官令答無錄公命竟不與辛亥皇太后令廢帝為海陵王使宣城王入纂皇統建武元年詔海陵王依漢東海王彊故事給虎賁旄頭畫輪車設鍾簴宮縣十一月稱王有疾數遣御師往視乃殞之給溫明秘器斂以袞冕之服大鴻臚監護喪事葬給轀輬車九旒大輅黃屋左纛前後部羽葆鼓吹挽歌二部依東海王彊故事諡曰恭先是武帝立禪靈寺於都下當世以為壯觀天意若曰禪者禪也靈者神明之目也武帝晏駕而鼎業傾移也永明世市里小兒以鐵相擊於地謂之鬬鑿鑿之為言族也至是宗室族滅矣又武帝時以燕支為朱衣朝士皆服之及明帝以宗子入纂此又奪朱之效也時又多以生紗為帽半其裙而析之號曰倚勸先是人間語好云擾攘建武至是朝士勸進實為怱遽倚勸擾攘之言於是驗矣高宗明皇帝諱鸞字景栖始安貞王道生之子也小字玄度少孤高帝撫育過諸子宋泰豫元年為安吉令有嚴能之名昇明中累遷淮南宣城二郡太守進號輔國將軍高帝踐阼封西昌侯位郢州刺史永明元年為侍中領驍騎將軍王子侯舊乘纏帷車帝獨乘下帷儀從如素士公事混撓販食人擔火誤燒牛鼻豫章王以白武帝帝笑焉轉為散騎常侍左衞將軍清道而行十年累遷尚書左僕射領右衞將軍武帝遺詔為侍中尚書令尋加鎮軍將軍給班劍二十人隆昌元年即本號為大將軍給鼓吹一部親兵五百人尋加中書監開府儀同三司海陵王立為驃騎大將軍錄尚書事揚州刺史加都督增班劍為三十人封宣城郡公鎮東府城給兵五千人錢二百萬布千匹九江事難假黃鉞事寧表送之尋加黃鉞都督中外諸軍事太傅領大將軍揚州牧增班劍為四十人給幢絡三望車前後部羽葆鼓吹劍履上殿入朝不趨贊拜不名置左右長史司馬從事中郎掾屬各四人封宣城王未拜太后令廢海陵王以上入纂高帝為第三子羣臣三請乃受命建武元年冬十月癸亥皇帝即位大赦改元文武賜位二等以太尉王敬則為大司馬以司空陳顯達為太尉乙丑詔斷遠近上禮丁卯詔自今雕文篆刻歲時光新可悉停省藩牧守宰或有薦獻事非任土嚴加禁斷十一月壬申日有蝕之帝宿沐浴不御內其日潔齋蔬食斷朝務屏人單衣帢危坐以至事畢追尊始安貞王為景皇妃江氏為懿后別立寢廟號陵曰脩安封桂陽王鑠等諸王子皆為列侯凡諸王侯得罪者諸子皆復屬籍又詔遣大使觀省四方癸酉革永明之制依晉宋舊典太子以師禮敬少傅甲戌進大司馬尋陽公王敬則等十三人爵邑各有差省新林苑先是百姓地者悉以還主廢南蠻校尉官己卯追崇妃劉氏為敬皇后號陵曰興安庚辰立皇子寶義為晉安王寶玄為江夏王寶源為廬陵王寶寅為建安王寶融為隨郡王寶攸為南平王甲申斷官長貢獻及私餉遺以安陸昭王緬第二子寶晊襲封安陸王丁亥詔細作中署材官車府凡諸工可悉開番假遞令休息戊子立皇子寶卷為皇太子賜天下為父後者爵一級己丑詔東宮肇建遠近或有慶禮可悉斷之永明中御史中丞沈深表百官年登七十者皆令致仕並窮困私門庚子詔自縉紳年及可一遵永明七年以前銓之科十二月庚戌宣德太僕劉朗之游擊將軍劉璩之子坐不贍給兄子致使隨母他嫁免官禁錮終身付之鄉論是歲魏孝文皇帝遷都洛陽二年春正月辛未降都下繫囚殊死以下詔王公以下各舉所知內外羣僚各進忠言無有所諱魏攻豫司徐梁四州壬申遣鎮南將軍王廣之督司州右衞將軍蕭坦之督徐州尚書右僕射沈文季督豫州以拒魏己卯詔都下二縣有毀發墳壠隨宜修理乙未魏軍攻鍾離徐州刺史蕭惠休破之丙申加太尉陳顯達使持節都督西北道諸軍事丁酉內外纂嚴二月己未司州刺史蕭誕與衆軍攻敗魏軍詔雍豫司南兗徐五州遭遇兵戎之家悉停今年稅調丙寅停青州麥租魏軍自壽春退三月甲申解嚴夏四月己亥朔親錄三百里內獄訟自外委州郡訊察三署徒隸原遣有差魏軍圍漢中梁州刺史蕭懿拒退之五月甲午寢廟成詔監作長帥賜位一等六月壬戌誅領軍蕭諶西陽王子明南海王子罕邵陵王子貞秋九月己丑改封南平王寶攸為邵陵王蜀郡王子文為西陽王廣漢王子峻為衡陽王臨海王昭秀為巴陵王永嘉王昭粲為桂陽王冬十月癸卯詔罷東田毀興光樓幷詔水衡量省御乘乙卯納皇太子妃褚氏大赦王公以下班賜各有差斷四方上禮十二月丁酉詔晉帝諸陵悉皆修理幷增守衞吳晉陵失稔之鄉蠲三調有差三年春正月丁卯以陰平王楊炅子崇祖為沙州刺史封陰平王己巳詔申明守長六周之制事竟不行乙酉詔以去歲魏攻緣邊諸州郡將士有臨陣及病死者並送還本土三月壬午詔車府乘輿有金銀校飾者皆剔除之夏四月魏軍攻司州櫟城戍主魏僧擊破之冬閏十二月戊寅皇太子冠賜王公以下帛各有差為父後者賜爵一級斷遠近上禮四年春正月庚午大赦壬寅詔人產子者蠲其父母調役一年又賜米十斛新婚者蠲夫役一年丙辰誅尚書令王晏二月以尚書左僕射徐孝嗣為尚書令秋八月甲午追尊景皇所生王氏為恭太后魏軍攻沔北冬十月又逼司雍二州甲戌遣太子中庶子蕭衍右軍司馬張稷禦之十一月丙辰以氐楊靈珍為北秦刺史封仇池公武都王十二月丁丑遣度支尚書崔慧景率衆救雍州永泰元年春正月癸未朔大赦中軍大將軍徐孝嗣即本號開府儀同三司沔北諸郡為魏所攻相繼亡敗新野太守劉思忌隨宜應接食盡煮土為粥而救兵不至城被剋死之乙巳遣太尉陳顯達持節救雍州丁未誅河東王鉉臨賀王子岳西陽王子文衡陽王子峻南康王子琳永陽王子珉湘東王子建南郡王子夏巴陵王昭秀桂陽王昭粲二月癸丑遣左衞將軍蕭惠休假節援壽陽辛未豫州刺史裴叔業敗魏軍於淮北三月丙午蠲雍州遇魏軍之縣租布戊申詔增仲尼祭秩上以疾患不瘳望氣者云宜改元夏四月甲寅大赦改元文武賜位二等己未立武陵昭王子子坦為衡陽王丁丑大司馬會稽太守王敬則舉兵反五月壬午遣輔國將軍劉山陽率軍東討乙酉斬敬則傳首建鄴曲赦浙東吳晉陵等七郡秋七月己酉帝崩于正福殿年四十七遺詔徐孝嗣可重申八命中書監本官悉如故沈文季可尚書左僕射常侍護軍如故江祏可右僕射江祀可侍中劉暄可衞尉卿軍政大事委陳太尉內外衆事無大小委徐孝嗣遙光坦之江祏其大事與沈文季江祀劉暄參懷心腹之任可委劉悛蕭惠休崔慧景羣臣上諡曰明皇帝廟號高宗葬興安陵帝明審有吏才持法無所借制御親幸臣下肅清驅使寒人不得用四幅繖大存儉約罷武帝所起新林苑以地還百姓廢文惠太子所起東田斥賣之永明中輿輦舟乘悉剔取金銀還主衣庫以牙角代之嘗用皁莢訖授餘濼與左右曰此猶堪明日用太官進御食有裹蒸帝十字畫之曰可四片破之餘充晚食而武帝掖庭中宮殿服御一無所改其儉約如此性猜忌亟行誅戮信道術用計數每出行幸先占利害簡於出入將南則詭言之西將東則詭言之北皆不以實竟不南郊初有疾無輟聽覽羣臣莫知及疾篤敕臺省府署文簿求白魚以為藥外始知之身衣絳衣服飾皆赤以為厭勝巫覡云後湖水頭經過宮內致帝有疾帝乃自至太官行水溝左右啟太官無此水則不立決意塞之欲南引淮流會崩事寢廢帝東昏侯諱寶卷字智藏明帝第二子也本名明賢明帝輔政後改焉建武元年立為皇太子永泰元年七月己酉明帝崩太子即皇帝位八月庚申鎮北將軍晉安王寶義進號征北大將軍開府儀同三司冬十月己未詔刪省律科癸亥詔蕭坦之江祏更直殿省總監宿衞辛未詔劉暄江祏更直延明殿省十一月戊子立皇后褚氏庚寅尚書令徐孝嗣議王侯貴人昏連卺以真銀盃蓋出近俗又牢燭侈繢亦虧曩制今除金銀連鎖自餘新器悉用埏陶牢燭華侈亦宜停之奏可永元元年春正月戊寅朔大赦改元辛卯祀南郊丁酉改封隨王寶融為南康王安陸王寶晊為湘東王竟陵王昭冑為巴陵王二月太尉陳顯達敗績於馬圈夏四月丙午朔魏孝文皇帝崩己巳立皇子誦為皇太子大赦賜為父後者爵一級五月癸亥加撫軍大將軍始安王遙光開府儀同三司六月甲子詔原雍州今年三調秋七月辛未淮水變赤如血丙戌殺尚書右僕射江祏侍中江祀地震自此至來歲晝夜不止小屋多壞丁亥都下大水死者甚衆賜死者材器並加振卹八月乙巳蠲遇水資財漂蕩者今年調稅又詔為馬圈戰亡將士舉哀丙辰揚州刺史始安王遙光據東府反詔曲赦都下中外戒嚴遣領軍將軍蕭坦之致討戊午斬遙光傳首己巳以尚書令徐孝嗣為司空以領軍蕭坦之為尚書左僕射閏月丙子以江陵公寶覽為始安王九月甲辰殺尚書左僕射蕭坦之右衞將軍曹武戊午殺領軍將軍劉暄壬戌以頻殺大臣大赦冬十月乙未誅尚書令新除司空徐孝嗣右僕射新除鎮軍將軍沈文季庚子以吳興太守蕭惠休為尚書右僕射辛丑以侍中王亮為左僕射十一月丙辰太尉江州刺史陳顯達舉兵反於尋陽乙丑加護軍將軍崔慧景平南將軍督衆軍南討十二月甲申陳顯達至都宮城嚴警乙酉斬顯達傳其首餘黨盡平二年春正月庚午詔討豫州刺史裴叔業二月己丑叔業病死兄子植以壽春降魏三月乙卯命平西將軍崔慧景攻壽春丙午尚書右僕射蕭惠休卒丁未崔慧景於廣陵反舉兵內向壬子命右衞將軍左興盛督都下水步衆軍禦之南徐州刺史江夏王寶玄以京城納慧景乙卯遣中領軍王瑩率衆軍屯北籬門壬戌慧景至瑩等敗績甲子慧景入建鄴臺城內閉門拒守豫州刺史蕭懿興兵入援己巳以懿為尚書右僕射夏四月癸酉慧景棄衆走斬之詔曲赦都下及南徐南兗二州乙亥以新除尚書右僕射蕭懿為尚書令丙子以中領軍王瑩為尚書右僕射五月己酉江夏王寶玄伏誅壬子赦乙丑曲赦都下及南徐兗二州六月庚寅車駕於樂游苑內會如三元都下放女人觀秋七月甲辰夜宮內火唯東閤內明帝舊殿數區及太極以南得存餘皆蕩盡冬十月己卯殺尚書令蕭懿十一月甲寅西中郎長史蕭穎冑起兵於荊州十二月雍州刺史蕭衍起兵於襄陽是歲魏宣武皇帝景明元年三年春正月丙申朔日有蝕之帝與宮人於閱武堂元會皇后正位閹人行儀帝戎服臨視丁酉以驃騎大將軍晉安王寶義為司徒以新除撫軍將軍建安王寶寅為車騎將軍開府儀同三司乙巳長星見竟天辛亥祀南郊大赦詔百官陳讜言二月丙寅乾和殿西廂火壬午詔遣羽林兵征雍州中外纂嚴始內橫吹五部於殿內晝夜奏之壬戌蚩尤旗見三月乙巳南康王寶融即皇帝位於江陵癸丑遣平西將軍陳伯之西征六月蕭穎冑弟穎孚起兵廬陵戊子赦江州安成廬陵二郡秋七月癸巳曲赦荊雍二州雍州刺史張欣泰前南譙太守王靈秀率石頭文武奉建安王寶寅向臺至杜姥宅宮門閉乃散走丙辰龍鬬于建康淮激水五里八月辛卯以太子左率李居士總督西討諸軍事屯新亭九月甲辰蕭衍至南豫州輔國將軍監南豫州事申冑軍二萬人於姑孰奔歸丙辰李居士與衍軍戰於新亭見敗冬十月甲戌王珍國又戰敗於朱雀航戊寅寧朔將軍徐元瑜以東府城降青冀二州刺史桓和入衞屯東宮尋亦降衍於是閉宮城門自守十二月丙寅新除雍州刺史王珍國侍中張稷率兵入殿殺帝時年十九帝在東宮便好弄不喜書學明帝亦不以為非但勗以家人之行令太子求一日再入朝發詔不許使三日一朝在宮嘗夜捕鼠達旦以為笑樂明帝臨崩屬後事以隆昌為戒曰作事不可在人後故委任羣小誅諸宰臣無不如意性訥澀少言不與朝士接欲速葬惡靈在太極殿徐孝嗣固爭得踰月每當哭輒云喉痛太中大夫羊闡入臨無髮號慟俯仰幘遂脫地帝輟哭大笑謂宦者王寶孫曰此謂禿鶖啼來乎自江祏始安王遙光等誅後無所忌憚日夜於後堂戲馬鼓譟為樂合夕便擊金鼓吹角令左右數百人叫雜以羌胡橫吹諸伎常以五更就臥至晡乃起王侯以下節朔朝見晡後方前或際暗遣出臺閣案奏月數十日乃報或不知所在閹豎以紙包裹魚肉還家並是五省黃案二年元會食後方出朝賀裁竟便還殿西序寢自巳至申百僚陪位皆僵仆菜色比起就會怱遽而罷太子所生母黃貴嬪早亡令潘妃母養之拜潘氏為貴妃乘臥輿帝騎馬從後著織成袴褶金薄帽執七寶縛矟又有金銀校具錦繡諸帽數十種各有名字戎服急裝縛袴上著絳衫以為常服不變寒暑陵冒雨雪不避阬穽馳騁渴乏輒下馬解取腰邊蠡器酌水飲之復上馳去馬乘具用錦繡處患為雨所濕織雜采珠為覆蒙備諸雕巧教黃門五六十人為騎客又選營署無賴小人善走者為逐馬鷹犬左右數百人常以自隨奔走往來略不暇息置射雉場二百九十六處翳中帷帳及步障皆袷以綠紅錦金銀鏤弩牙瑁帖箭每出輒與鷹犬隊主徐令孫媒翳隊主俞靈韻齊馬而走左右爭逐之又甚有筋力牽弓至三斛五斗能擔幢初學擔幢每傾倒在幢杪者必致踠傷其後白虎幢七丈五尺齒上擔之折齒不倦擔幢諸校具服飾皆自製之綴以金華玉鏡衆寶舍人主書及至左右主帥並皆侍側逞諸變態曾無愧顏始欲騎馬未習其事俞靈韻為作木馬人在其中行動進退隨意所適其後遂為善騎陳顯達平漸出游走不欲令人見之驅斥百姓唯置空宅而已是時率一月二十餘出既往無定處尉司常慮得罪東行驅西南行驅北應旦出夜便驅逐吏司奔驅叫呼盈路打鼓蹋圍鼓聲所聞便應奔走臨時驅迫衣不暇披乃至徒跣走出犯禁者應手格殺百姓無復作業終日路隅從萬春門由東宮以東至郊外數十里皆空家盡室巷陌縣幔為高障置人防守謂之屏除高障之內設部伍羽儀復有數部皆奏鼓吹羌胡伎鼓角橫吹夜反火光照天每三四更中鼓聲四出幡戟橫路百姓喧走士庶莫辨或於市肆左側過親幸家環繞宛轉周徧都下老小震驚啼號塞道處處禁斷不知所過疾患困篤者悉掆移之無人掆者扶匐道側吏司又加捶打絕命者相係從騎及左右因之入富家取物無不蕩盡工商莫不廢業樵蘇由之路斷至於乳婦昏姻之家移產寄室或輿病棄屍不得殯葬有棄病人於青溪邊者吏懼為監司所問推置水中泥覆其面須臾便死遂失骸骨前魏興太守王敬賓新死未斂家人被驅不得留視及家人還鼠食兩眼都盡如此非一又嘗至沈公城有一婦人當產不去帝入其家問何獨在答曰臨產不得去因剖腹看男女又長秋卿王儇病篤不聽停家死於路邊丹陽尹王志被驅急狼狽步走惟將二門生自隨藏朱雀航南酒壚中夜方得羽儀而歸喜游獵不避危險至蔣山定林寺一沙門病不能去藏於草間為軍人所得應時殺之左右韓暉光曰老道人可念帝曰汝見麞鹿亦不射邪仍百箭俱發故貴人富室者皆數處立宅以為避圍之舍每還宮常至三更百姓然後得反禁斷又不即通處處屯咽或泥塗灌注或冰凍嚴結老幼啼號不可聞見時人以其所圍處號為長圍及建康城見圍亦名長圍識者以為讖焉三年殿內火合夕便發其時帝猶未還宮內諸房閤已閉內人不得出外人又不敢輒開比及開死者相枕領軍將軍王瑩率衆救火太極殿得全內外叫喚聲動天地帝三更中方還先至東宮慮有亂不敢便入參覘審無異乃歸其後出游火又燒璿儀曜靈等十餘殿及栢寢北至華林西至秘閣三千餘間皆盡左右趙鬼能讀西京賦云栢梁既災建章是營於是大起諸殿芳樂芳德仙華大興含德清曜安壽等殿又別為潘妃起神仙永壽玉壽三殿皆帀飾以金璧其玉壽中作飛仙帳四面繡綺窗間盡畫神仙又作七賢皆以美女侍側鑿金銀為書字靈獸神禽風雲華炬為之玩飾椽桷之端悉垂鈴佩江左舊物有古玉律數枚悉裁以鈿笛莊嚴寺有玉九子鈴外國寺佛面有光相禪靈寺塔諸寶珥皆剝取以施潘妃殿飾性急暴所作便欲速成造殿未施梁桷便於地畫之唯須宏麗不知精密酷不別畫但取絢曜而已故諸匠賴此得不用情又鑿金為蓮華以帖地令潘妃行其上曰此步步生蓮華也塗壁皆以麝香錦幔珠簾窮極綺麗縶役工匠自夜達曉猶不副速乃剔取諸寺佛剎殿藻井仙人騎獸以充足之武帝興光樓上施青漆世人謂之青樓帝曰武帝不巧何不純用瑠璃潘氏服御極選珍寶主衣庫舊物不復周用貴市人間金銀寶物價皆數倍虎珀釧一隻直百七十萬都下酒租皆折輸金以供雜用猶不能足下揚南徐二州橋桁塘埭丁計功為直斂取見錢供太樂主衣雜費由是所在塘瀆悉皆隳廢又訂出雄雉頭鶴氅白鷺縗百品千條無復窮已親倖小人因緣為姦科一輸十又各就州縣求為人輸準取見直不為輸送守宰懼威口不得道須物之處以復重求如此相仍前後不息百姓困盡號泣道路少府太官凡諸市買事皆急速催求相係吏司奔馳遇便虜奪市廛離散商旅靡依又以閱武堂為芳樂苑窮奇極麗當暑種樹朝種夕死死而復種率無一生於是徵求人家望樹便取毀徹牆屋以移置之大樹合抱亦皆移掘插葉繫華取玩俄頃剗取細草來植階庭烈日之日至便焦燥紛紜往還無復已極山石皆塗以采色跨池水立紫閣諸樓壁上畫男女私褻之像明帝時多聚金寶至是金以為泥不足周用令富室賣金不問多少限以賤價又不還直張欣泰嘗謂舍人裴長穆曰宮殿何事頓爾夫以秦之富起一阿房而滅今不及秦一郡而頓起數十阿房其危殆矣答曰非不悅子之道顧言不用耳潘妃放恣威行遠近父寶慶與諸小共逞姦毒富人悉誣為罪田宅貲財莫不啟乞或云寄附隱藏復加收沒計一家見陷禍及親隣又慮後患男口必殺明帝之崩竟不一日蔬食居處衣服無改平常潘妃生女百日而亡制斬衰絰杖衣悉粗布羣小來弔盤旋地坐舉手受執蔬膳積旬不聽音伎左右直長閹豎王寶孫諸人共營肴羞云為天子解菜又於苑中立店肆模大市日游市中雜所貨物與宮人閹豎共為裨販以潘妃為市令自為市吏錄事將鬬者就潘妃罰之帝小有得失潘則與杖乃敕虎賁威儀不得進大荊子閤內不得進實中荻雖畏潘氏而竊與諸姊妹淫通每游走潘氏乘小輿宮人皆露褌著綠絲屩帝自戎服騎馬從後又開渠立埭躬自引船埭上設店坐而屠肉于時百姓歌云閱武堂種楊柳至尊屠肉潘妃酤酒又偏信蔣侯神迎來入宮晝夜祈禱左右朱光尚詐云見神動輒諮啟並云降福始安之平遂加位相國末又號為靈帝車服羽儀一依王者又曲信小祠日有十數師巫魔媼迎送紛紜光尚輒託云神意范雲謂光尚曰君是天子要人當思百全計光尚曰至尊不可諫正當託鬼神以達意耳後東入樂游人馬忽驚以問光尚光尚曰向見先帝大瞋不許數出帝大怒拔刀與光向等尋覔既不見處乃縛菰為明帝形北向斬之縣首苑門上自永元以後魏每來伐繼以內難揚南徐二州人丁三人取兩以此為率遠郡悉令上米準行一人五十斛輸米既畢就役如故又先是諸郡役人多依人士為附隸謂之屬名又東境役苦百姓多注籍詐病遣外醫巫在所檢占諸屬名幷取病身凡屬名多不合役止避小小假並是役蔭之家凡注病者或已積年皆攝充將役又追責病者租布隨其年歲多少銜命之人皆給貨賂隨意縱捨又橫調徵求皆出百姓羣小以陳顯達下數日便敗崔慧景圍城正得十日及蕭衍師至亦謂為然裹糧食樵芻凡所須物為百日備帝謂茹法珍曰須來至白門前當一決及至近郊乃聚兵為固守計召王侯分置尚書都坐及殿省尚書舊事悉充紙鎧使冠軍將軍王珍國領三萬人據大桁莫有鬬志遣王寶孫督戰呼為王倀子寶孫切罵諸將帥直閤將軍席豪發憤突陣死豪驍將也既斃衆軍於是土崩軍人從朱雀觀上自投及赴淮水死者無數於是閉城自守城內軍事委王珍國兗州刺史張稷入衞以稷為副實甲猶七萬人帝著烏帽袴褶備羽儀登南掖門臨望又虛設鎧馬齋仗千人皆張弓拔白出東掖門稱蔣王出盪又受刀敕等教著五音兒衣登城望戰還與御刀左右及六宮於華光殿立軍壘以金玉為鎧仗親自臨陣詐被創勢以板掆將去以此厭勝又於閱武堂設牙門軍頓每夜嚴警帝於殿內騎馬從鳳莊門入徽明門馬被銀蓮葉具裝鎧雜羽孔翠寄生逐馬左右衞從晝眠夜起如平常聞外鼓吹叫聲被大紅袍登景陽樓望弩幾中之衆皆怠怨不為致力募兵出戰至城門數十步皆坐甲而歸慮城外有伏兵乃燒城傍諸府署六門之內皆盡城中閣道西掖門內相聚為市販死牛馬肉蕭衍長圍既立塹柵嚴固然後出盪屢戰不捷帝尤惜金錢不肯賞賜茹法珍叩頭請之帝曰賊來獨取我邪何為就我求物後堂儲數百具榜啟為城防帝曰擬作殿竟不與城防巧手而悉令作殿晝夜不休又催御府細作三百人精仗須圍解以擬屏除金銀雕鏤雜物倍急於常法珍蟲兒又說帝曰大臣不留意使圍不解宜悉誅之珍國張稷懼禍乃謀應蕭衍以計告後閤舍人錢強強許之密令游盪主崔叔智夜開雲龍門稷及珍國勒兵入殿分軍又從西上閤入後宮御刀豐勇之為內應是夜帝在含德殿吹笙歌作女兒子臥未熟聞兵入趨出北戶欲還後宮清曜閤已閉閹人禁防黃泰平刀傷其膝仆地顧曰奴反邪直後張齊斬首送蕭衍宣德太后令依漢海昏侯故事追封東昏侯和帝諱寶融字智昭明帝第八子也建武元年封隨郡王永元元年改封南康王出為西中郎將荊州刺史督七州軍事二年十一月甲寅長史蕭穎冑奉王舉兵其日太白及辰星俱見西方乙卯教纂嚴丙辰以雍州刺史蕭衍為使持節都督前鋒諸軍事戊午衍表勸進十二月乙亥羣僚勸進並不許壬辰驍騎將軍夏侯亶自建鄴至江陵稱宣德太后令西中郎將南康王宜纂承皇祚光臨億兆可且封宣城王相國荊州牧加黃鉞置僚屬三年正月乙巳王受命大赦唯梅蟲兒茹法珍等不在例是日長星見竟天甲寅建牙于城南二月己巳羣僚上尊號立宗廟及南北郊中興元年春三月乙巳皇帝即位大赦改永元三年為中興文武賜位二等是夜彗星竟天以相國左長史蕭穎冑為尚書令加雍州刺史蕭衍尚書左僕射都督征討諸軍以晉安王寶義為司空廬陵王寶源為車騎將軍開府儀同三司丙午有司奏封庶人寶卷為零陵侯詔不許又奏為涪陵王詔可夏四月戊辰詔凡東討衆軍及諸向義之衆普復除五年秋七月丁巳魯山城主孫樂祖以城降己未郢城主薛元嗣降八月丙子平西將軍陳伯之降九月己未詔假黃鉞蕭衍若定京邑得以便宜從事冬十一月壬寅尚書令鎮軍將軍蕭穎冑卒十二月丙寅建康城平己巳宣德皇太后令以征東大將軍蕭衍為大司馬錄尚書驃騎大將軍揚州刺史封建安郡公依晉武陵王遵承制故事壬申改封建安王寶寅為鄱陽王癸酉以司徒揚州刺史晉安王寶義為太尉領司徒乙酉以尚書右僕射王瑩為左僕射二年春正月戊戌宣德皇太后臨朝入居內殿壬寅大司馬蕭衍都督中外諸軍事加殊禮己酉以大司馬長史王亮為守尚書令甲寅加大司馬蕭衍位相國梁公備九錫禮二月壬戌誅湘東王寶晊丙戌進梁公蕭衍爵為王三月辛丑鄱陽王寶寅奔魏誅邵陵王寶攸晉熙王寶嵩桂陽王寶貞庚戌車駕東歸至姑孰丙辰遜位于梁丁巳廬陵王寶源薨四月辛酉禪詔至皇太后遜居外宮梁受命奉帝為巴陵王宮于姑孰戊辰巴陵王殂年十五追尊為齊和帝葬恭安陵初梁武帝欲以南海郡為巴陵國邑而遷帝焉以問范雲雲俛首未對沈約曰今古殊事魏武所云不可慕虛名而受實禍梁武頷之於是遣鄭伯禽進以生金帝曰我死不須金醇酒足矣乃引飲一升伯禽就加摺焉先是文惠太子與才人共賦七言詩句後輒云愁和帝至是其言方驗又永明中望氣者云新林婁湖青溪並有天子氣於其處大起樓苑宮觀武帝屢游幸以應之又起舊宮於青溪以弭其氣而明帝舊居東府城西延興末明帝龍飛至是梁武帝衆軍城於新林而武帝舊宅亦在征虜百姓皆著下屋白紗帽而反裙覆頂東昏曰裙應在下今更在上不祥命斷之於是百姓皆反裙向下此服祅也帽者首之所寄今而向下天意若曰元首方為猥賤乎東昏又令左右作逐鹿帽形甚窄狹後果有逐鹿之事東昏宮𩹉又作散叛髮反髻根向後百姓爭學之及東昏狂惑天下散叛矣東昏又與羣小別立帽騫其口而舒兩翅名曰鳳度三橋向後總而結之名曰反縛黃麗東昏與刀敕之徒親自著之皆用金寶鑿以璧璫又作著調帽鏤以金玉間以孔翠此皆天意梁武帝舊宅在三橋而鳳度之名鳳翔之驗也黃麗者皇離為日而反縛之東昏戮死之應也調者梁武帝至都而風俗和調先是百姓及朝士皆以方帛填胸名曰假兩此又服祅假非正名也儲兩而假之明不得真也東昏誅其子廢為庶人假兩之意也論曰鬱林地居長嫡瑕釁未彰而武皇之心不變周道故得保茲守器正位尊極既而愆鄙內作兆自宮闈雖為害未遠而足傾社稷郭璞稱永昌之名有二日之象隆昌之號實亦同焉明帝越自支庶任當負荷乘機而作大致殲夷流涕行誅非云義舉事苟非安能無內愧既而自樹本枝根胤孤弱貽厥所授屬在凶愚用覆宗祊亦其理也夫名以行義往賢垂範備而之禪術士誡之東昏以卷名藏以終之其兆先徵蓋亦天所命矣
