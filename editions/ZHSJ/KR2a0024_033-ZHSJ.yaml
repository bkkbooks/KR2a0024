body:
  text: 南史卷三十三列傳第二十三范泰子曄荀伯子族子萬秋徐廣郗紹廣兄子豁鄭鮮之裴松之孫昭明曾孫子野何承天曾孫遜范泰字伯倫順陽人也祖汪晋安北將軍徐兗二州刺史父甯豫章太守並有名前代泰初為太學博士外弟荊州刺史王忱請為天門太守忱嗜酒醉輒累旬及醒則儼然端肅泰陳酒既傷生所宜深誡其言甚切忱嗟歎久之曰見規者衆未有若此者也或問忱范泰何如謝邈忱曰茂度漫又問何如殷覬忱曰伯通易忱常有意立功謂泰曰今城池既立軍甲亦充將欲掃除中原以申宿昔之志伯通意銳當令擁戈前驅以君持重欲相委留事何如泰曰百年逋寇前賢挫屈者多矣功名雖貴鄙生所不敢謀會忱病卒召泰為驃騎諮議參軍遷中書郎時會稽世子元顯專權內外百官請假不復表聞唯籤元顯而已泰言以為非宜元顯不納以父憂去職襲爵陽遂鄉侯桓玄輔晉使御史中丞祖台之奏泰及前司徒左長史王准之輔國將軍司馬珣之並居喪無禮泰坐廢徙丹徒宋武帝義旗建累遷黃門侍郎御史中丞坐議殷祠事謬白衣領職出為東陽太守歷侍中度支尚書時僕射陳郡謝混後進知名武帝嘗從容問混泰名輩誰比對曰王元太一流人也徙為太常初司徒道規無子養文帝及道規薨以兄道憐第二子義慶為嗣武帝以道規素愛文帝又令居重及道規追封南郡公應以先華容縣公賜文帝泰議以為禮無二主由是文帝還本屬後加散騎常侍為尚書兼司空與右僕射袁湛授宋公九錫隨軍到洛陽武帝還彭城與泰登城泰有足疾特命乘輿泰好酒不拘小節通率任心雖公坐笑言不異私室武帝甚賞愛之然短於為政故不得在政事官武帝受命議建國學以泰領國子祭酒泰上表陳奬進之道時學竟不立又言事者多以錢貨減少國用不足欲更造五銖泰又諫曰臣聞為國拯弊莫若務本百姓不足君孰與足未有人貧而國富本不足而末有餘者也故囊漏貯中識者不吝反裘負薪存毛實難王者不言有無諸侯不說多少食祿之家不與百姓爭利故拔葵所以明政織蒲謂之不仁是以貴賤有章職分無爽今之所憂在農人尚寡倉廩未充轉運無已資食者衆家無私積難以禦荒耳夫貨存貿易不在少多昔日之貴今者之賤彼此共之其揆一也但令官人均通則無患不足若使必資貨廣以收國用者則龜貝之屬自古所行尋銅之為器在用也博矣鍾律所通者遠機衡所揆者大夏鼎負圖實冠衆瑞晉鐸呈象亦啟休徵器有要用則貴賤同資物有適宜則家國共急今毀必資之器而為無施之錢於貨則功不補勞在用則君人俱困校之以實損多益少伏願思可久之道探欲速之情弘山海之納擇芻牧之說景平初加位特進明年致仕解國子祭酒少帝在位多諸愆失泰上封事極諫少帝雖不能納亦不加譴徐羨之傅亮等與泰素不平及廬陵王義真少帝見害泰謂所親曰吾觀古今多矣未有受遺顧託而嗣君見殺賢王嬰戮者也元嘉二年泰表賀元正并陳旱災多所奬勸拜表遂輕舟遊東陽任心行止不關朝廷有司劾奏之文帝不問時文帝雖當陽親覽而羨之等猶執重權泰復上表論得失言及執事諸子禁之表竟不奏三年羨之伏誅進位侍中左光祿大夫國子祭酒領江夏王師特進如故上以泰先朝舊臣恩禮甚重以有脚疾宴見之日特聽乘輿到坐所陳時事上每優容之其年秋旱蝗又上表言有蝗之處縣官多課人捕之無益於枯苗有傷於殺害又女人被宥由來尚矣謝晦婦女猶在尚方匹婦一至亦能有所感激書奏上乃原謝晦婦女時司徒王弘輔政泰謂弘曰彭城王帝之次弟宜徵還入朝共參朝政弘納其言時旱災未已加以疾疫泰又上表有所勸誡泰博覽篇籍好為文章愛奬後生孜孜無倦撰古今善言二十四篇及文集傳於世暮年事佛甚精於宅西立祇洹精舍五年卒初議贈開府殷景仁曰泰素望不重不可擬議台司竟不果及葬王弘撫棺哭曰君生平重殷鐵今以此為報追贈車騎將軍諡曰宣侯第四子曄最知名曄字蔚宗母如厠產之額為塼所傷故以塼為小字出繼從伯弘之後襲封武興縣五等侯少好學善為文章能隸書曉音律為秘書丞父憂去職服闋為征南大將軍道濟司馬領新蔡太守後為尚書吏部郎元嘉九年彭城太妃薨將葬祖夕僚故並集東府曄與司徒左西屬王深及弟司徒祭酒廣夜中酣飲開北牖聽挽歌為樂彭城王義康大怒左遷宣城太守不得志乃刪衆家後漢書為一家之作至於屈伸榮辱之際未嘗不致意焉遷長沙王義欣鎮軍長史兄暠為宜都太守嫡母隨暠在官亡報之以疾曄不時奔赴及行又攜伎妾自隨為御史中丞劉損所奏文帝愛其才不罪也服闋累遷左衞將軍太子詹事曄長不滿七尺肥黑禿眉鬢善彈琵琶能為新聲上欲聞之屢諷以微旨曄偽若不曉終不肯為上嘗宴飲勸適謂曄曰我欲歌卿可彈曄乃奉旨上歌既畢曄亦止弦初魯國孔熙先博學有從橫才志文史星算無不兼善為員外散騎侍郎不為時知久不得調初熙先父默之為廣州刺史以贓貨下廷尉大將軍彭城王義康保持之故免及義康被黜熙先密懷報効以曄意志不滿欲引之無因進說曄甥謝綜雅為曄所知熙先藉嶺南遺財家甚富足乃傾身事綜始與綜諸弟共博故為拙行以物輸之情意稍款綜乃引熙先與曄戲熙先故為不敵前後輸曄物甚多曄既利其財寶又愛其文藝遂與申莫逆之好熙先始以微言動曄曄不回曄素有閨庭論議朝野所知故門胄雖華而國家不與姻以此激之曰丈人若謂朝廷相待厚者何故不與丈人婚為是門戶不得邪人作犬豕相遇而丈人欲為之死不亦惑乎曄默然不答其意乃定時曄與沈演之並為上所知待每被見多同曄若先至必待演之演之先至常獨被引曄又以此為怨曄累經義康府佐見待素厚及宣城之授意好乖離綜為義康大將軍記室參軍隨鎮豫章綜還申義康意於曄求解晚隙復敦往好曄既有逆謀欲探時旨乃言於上曰臣歷觀前史二漢故事諸蕃王政以妖詛幸災便正大逆之罰況義康姦心釁跡彰著遐邇而至今無恙臣竊惑焉且大梗常存將成亂階上不納熙先素善天文云文帝必以非道晏駕當由骨肉相殘江州應出天子以為義康當之綜父述亦為義康所遇綜弟約又是義康女夫故文帝使綜隨從南上既為熙先奬說亦有酬報之心廣州人周靈甫有家兵部曲熙先以六十萬錢與之使於廣州合兵靈甫一去不反大將軍府史仲承祖義康舊所信念屢銜命下都亦潛結腹心規有異志聞熙先有誠密相結納丹陽尹徐湛之素為義康所愛雖為舅甥恩過子弟承祖因此結事湛之告以密計承祖南下申義康意於蕭思話及曄云本欲與蕭結婚恨始意不果與范本情不薄中間相失傍人為之耳有法略道人先為義康所養粗被知待又有王國寺法靜尼出入義康家內皆感激舊恩規相拯拔並與熙先往來使法略罷道法略本姓孫改名景玄以為臧質寧遠參軍熙先善療病兼能診脈法靜尼妹夫許耀領隊在臺宿衞殿省嘗有疾因法靜尼就熙先乞療得損因成周旋熙先以耀膽幹因告逆謀耀許為內應豫章胡藩子遵世與法靜甚款亦密相酬和法靜尼南上熙先遣婢采藻隨之付以牋書陳說圖讖法靜還義康餉熙先銅匕銅鑷袍段奩等物熙先慮事泄酖采藻殺之湛之又謂曄等臧質見與異常質與蕭思話款密二人並受大將軍眷遇必無異同不憂兵力不足但當勿失機耳乃備相署置湛之為撫軍將軍揚州刺史曄中軍將軍南徐州刺史熙先左衞將軍其餘皆有選擬凡素所不善及不附義康者又有別簿並入死目熙先使弟休先豫為檄文言賊臣趙伯符肆兵犯蹕禍流儲宰乃奉戴義康又以既為大事宜須義康意旨乃作義康與湛之書宣示同黨二十二年九月征北將軍衡陽王義季右將軍南平王鑠出鎮上於武帳岡祖道曄等期以其日為亂許耀侍上扣刀以目曄曄不敢視俄而坐散差互不得發十一月徐湛之上表告狀於是悉出檄書選事及同惡人名手迹詔收綜等並皆款服唯曄不首上頻使窮詰乃曰熙先苟誣引臣熙先聞曄不服笑謂殿中將軍沈邵之曰凡諸處分符檄書疏皆曄所造及改定云何方作此抵上示以曄墨迹曄乃引罪明日送曄付廷尉入獄然後知為湛之所發熙先望風吐款辭氣不撓上奇其才使謂曰以卿之才而滯於集書省理應有異志此乃我負卿也熙先於獄中上書陳謝幷陳天文占候誡上有骨肉相殘之禍其言深切曄後與謝綜等得隔壁遙問綜曰疑誰所告綜曰不知曄乃稱徐湛之小名曰乃是徐僮也在獄為詩曰禍福本無兆性命歸有極必至定前期誰能延一息在生已可知來緣無識好醜共一丘何足異枉直豈論東陵上寧辨首山側雖無嵇生琴庶同夏侯色寄言生存子此路行復即上有白團扇甚佳送曄令書出詩賦美句曄受旨援筆而書曰去白日之炤炤襲長夜之悠悠上循覽悽然曄本謂入獄便死而上窮其獄遂經二旬曄更有生望獄吏因戲之曰外傳詹事或當長繫曄聞之驚喜綜熙先笑之曰詹事嘗共論事無不攘袂瞋目及在西池射堂上躍馬顧眄自以為一世之雄而今擾攘紛紜畏死乃爾設令今時賜以性命人臣圖主何顏可以生存曄謂衞獄將曰惜哉埋如此人將曰不忠之人亦何足惜曄曰大將言是也及將詣市曄最在前於獄門顧謂綜曰次第當以位邪綜曰賊帥當為先在道語笑初無慚恥至市問綜曰時欲至未綜曰勢不復久曄既食又苦勸綜綜曰此異疾篤何事強飯曄家人悉至市監刑職司問曰須相見不曄問綜曰家人已來幸得相見將不暫別綜曰別與不別亦何所存來必當號泣正足亂人意曄曰號泣何關人向見道邊親故相瞻望吾意故欲相見於是呼前曄妻先撫其子回罵曄曰君不為百歲阿家不感天子恩遇身死固不足塞罪奈何枉殺子孫曄乾笑云罪至而已曄所生母對泣曰主上念汝無極汝曾不能感恩又不念我老今日奈何仍以手擊曄頸及頰曄妻云罪人阿家莫憶莫念妹及妓妾來別曄乃悲泣流漣綜曰舅殊不及夏侯色曄收淚而已綜母以子弟自陷逆亂獨不出視曄語綜曰姊今不來勝人多也曄轉醉子藹亦醉取地土及果皮以擲曄呼為別駕數十聲曄問曰汝瞋我邪藹曰今日何緣復瞋但父子同死不能不悲耳曄常謂死為滅欲著無鬼論至是與徐湛之書當相訟地下其繆亂如此又語人寄語何僕射天下決無佛鬼若有靈自當相報收曄家樂器服玩並皆珍麗妓妾亦盛飾母住止單陋唯有二盛藮薪弟子冬無被叔父單布衣曄及黨與並伏誅曄時年四十八謝綜弟緯徙廣州藹子魯連吳興昭公主外孫請全生命亦得遠徙孝武即位乃還曄性精微有思致觸類多善衣裳器服莫不增損制度世人皆法學之撰和香方其序之曰麝本多忌過分必害沈實易和盈斤無傷零藿虛燥詹唐黏溼甘松蘇合安息鬱金奈多和羅之屬並被珍於外國無取於中土又棗膏昏鈍甲煎淺俗非唯無助於馨烈乃當彌增於尤疾也所言悉以比類朝士麝本多忌比庾仲文零藿虛燥比何尚之詹唐黏濕比沈演之棗膏昏鈍比羊玄保甲煎淺俗比徐湛之甘松蘇合比慧琳道人沈實易和以自比也曄獄中與諸生姪書以自序其略曰吾少懶學問年三十許始有尚耳自爾以來轉為心化至於所通處皆自得之胸懷常謂情志所託故當以意為主以文傳意以意為主則其旨必見以文傳意則其辭不流然後抽其芬芳振其金石耳觀古今文人多不全了此處年少中謝莊最有其分手筆差易於文不拘韻故也吾思乃無定方但多公家之言少於事外遠致以此為恨亦由無意於文名故也本未開史書政覺其不可解耳既造後漢轉得統緒詳觀古今著述及評論殆少可意者班氏最有高名既任情無例唯志可推耳博贍不可及之整理未必愧也吾雜傳論皆有精意深旨至於循吏以下及六夷諸序論筆勢縱放實天下之奇作其中合者往往不減過秦篇嘗共比方班氏所作非但不愧之而已欲徧作諸志前漢所有者悉令備雖事不必多且使見文得盡又欲因事就卷內發論以正一代得失意復不果贊自是吾文傑思殆無一字空設奇變不窮同合異體乃自不知所以稱之此書行故應有賞音者紀傳例為舉其大略耳諸細意甚多自古體大而思精未有此也恐世人不能盡之多貴古賤今所以稱情狂言耳吾於音樂聽功不及自揮但所精非雅聲為可恨然至於一絕處亦復何異邪其中體趣言之不可盡絃外之意虛響之音不知所從而來亦嘗以授人士庶中未有一毫似者此永不傳矣吾書雖小小有意筆勢不快餘竟不成就每愧此名曄自序並實故存之藹幼而整潔衣服竟歲未嘗有塵點死時年二十曄少時兄晏常云此兒進利終破門戶果如其言初何尚之處銓衡自謂天下無滯才及熙先就拘帝詰尚之曰使孔熙先年三十猶作散騎侍郎那不作賊熙先死後又謂尚之曰孔熙先有美才地冑猶可論而翳迹仕流豈非時匠失乎尚之曰臣昔謬得待罪選曹誠無以濯汙揚清然君子之有智能猶鵷鳳之有文采俟時而振羽翼何患不出雲霞之上若熙先必蘊文采自棄於汙泥終無論矣上曰昔有良才而不遇知己者何嘗不遺恨於後哉荀伯子潁川潁陰人晉驃騎將軍羨之孫也父猗祕書郎伯子少好學博覽經傳而通率好為雜語遨遊閭里故以此失清途解褐駙馬都尉奉朝請員外散騎侍郎著作郎徐廣重其才學舉伯子及王韶之並為佐郎同撰晉史及著桓玄等傳遷尚書祠部郎義熙元年上表稱故太傅鉅平侯羊祜勳參佐命功盛平吳而享嗣闕然蒸嘗莫寄漢以蕭何元功故絕世輒紹愚謂鉅平之封宜同酇國故太尉廣陵公陳准黨翼孫秀禍加淮南竊饗大國因罪為利會西朝政刑失裁中興復因而不奪今王道惟新豈可不大判臧否謂廣陵之國宜在削除故太保衞瓘本爵菑陽縣公既被橫禍乃進第秩加贈蘭陵又轉江夏中朝公輔多非理終瓘功德不殊亦無緣獨受偏賞宜復本封以正國章詔付門下前散騎常侍江夏公衞璵及潁川陳茂先各自陳先代勳不伏貶降詔皆付門下並不施行伯子為妻弟謝晦薦達為尚書左丞出補臨川內史車騎將軍王弘稱伯子沈重不華有平陽侯之風伯子常自矜藉蔭之美謂弘曰天下膏粱唯使君與下官耳宣明之徒不足數也遷散騎常侍又上表曰百官位次陳留王在零陵王上臣愚竊以為疑昔武王克殷封神農後於焦黃帝後於祝帝堯後於薊帝舜後於陳夏后後於嵵殷後於宋杞陳並為列國而薊祝焦無聞斯則襃崇所承優於遠代之顯驗也是以春秋次序諸侯宋居嵵陳之上考之近代事亦有徵晉泰始元年詔賜山陽公劉康子弟一人爵關內侯衞公姬署宋侯孔紹子弟一人駙馬都尉又泰始三年太常上言博士劉嘉等議稱衞公署於大晉在三恪之數應降稱侯臣以為零陵王位宜在陳留之上從之為御史中丞莅職勤恪有匪躬之稱立朝正色衆咸憚之凡所奏劾莫不深相訶毀或延及祖禰示其切直又頗雜嘲戲故世人以此非之補司徒左長史卒於東陽太守文集傳於世子赤松為尚書右丞以徐湛之黨為元凶所殺伯子族弟昶字茂祖與伯子絕服元嘉初以文義至中書郎昶子萬秋萬秋字元寶亦用才學自顯昶見釋慧琳謂曰昨萬秋對策欲以相示答曰此不須看若非先見而答貧道不能為若先見而答貧道奴皆能為昶曰此將不傷道德耶答曰大德所以不德乃相對笑竟不看焉萬秋孝武初為晉陵太守坐於郡立華林閤置主衣主書下獄免前廢帝末為御史中丞卒官徐廣字野人東莞姑幕人也父藻都水使者兄邈太子前衞率家世好學至廣尤精百家數術無不研覽家貧未嘗以產業為意妻中山劉謐之女忿之數以相讓廣終不改如此十數年家道日弊遂與廣離後晉孝武帝以廣博學除為祕書郎校書祕閣增置職僚隆安中尚書令王珣舉為祠部郎李太后崩廣議服曰太皇太后名位既正體同皇極理制備盡情禮彌申陽秋之義母以子貴既稱夫人禮服從正故成風顯夫人之號文公服三年之喪子於父之所生體尊義重且禮祖不厭孫固宜遂服無屈而緣情立制若嫌明文不存則疑斯從重謂應同於為祖母後齊衰三年時從其議及會稽王世子元顯錄尚書欲使百僚致敬臺內使廣立議由是內外並執下官禮廣常為愧恨義熙初宋武帝使撰車服儀注仍除鎮軍諮議參軍領記室封樂成縣五等侯轉員外散騎常侍領著作郎二年尚書奏廣撰成晉史六年遷驍騎將軍時有風雹為災廣獻言武帝多所勸勉又轉大司農領著作郎遷祕書監初桓玄篡位安帝出宮廣陪列悲慟哀動左右及武帝受禪恭帝遜位廣又哀感涕泗交流謝晦見之謂曰徐公將無小過廣收淚答曰身與君不同君佐命興王逢千載嘉運身世荷晉德眷戀故主因更歔欷永初元年詔除中散大夫廣言墳墓在晉陵丹徒又生長京口息道玄忝宰此邑乞隨之官歸終桑梓許之贈賜甚厚性好讀書年過八十猶歲讀五經一遍元嘉二年卒廣所撰晉紀四十二卷義熙十二年成表上之又有答禮問百餘條行於世時有高平郗紹亦作晉中興書數以示何法盛法盛有意圖之謂紹曰卿名位貴達不復俟此延譽我寒士無聞於時如袁宏干寶之徒賴有著述流聲於後宜以為惠紹不與至書成在齋內中法盛詣紹紹不在直入竊書紹還失之無復兼本於是遂行何書徐豁字萬同廣兄子也父邈晉太子前衞率豁宋永初初為尚書左丞山陰令精練法理為時所推元嘉初為始興太守表陳三事文帝嘉之賜絹二百匹穀一千斛徙廣州刺史未拜卒鄭鮮之字道子滎陽開封人魏將作大匠渾之玄孫也祖襲大司農經為江乘令因居縣境父遵尚書郎鮮之下帷讀書絕交遊之務初為桓偉輔國主簿先是兗州刺史滕恬為丁零翟遼所沒屍喪不反恬子羨仕宦不廢論者嫌之桓玄在荊州使羣僚博議鮮之議曰名教大極忠孝而已至乎變通抑引每事輒殊本而尋之皆求心而遺迹迹之所乘遭遇或異故聖人或就迹以助教或因迹以成罪屈申與奪難可等齊舉其阡陌皆可終言矣天可逃乎而伊尹廢君君可脅乎而鬻拳見善忠可愚乎而箕子同仁自此以還殊實而齊聲異譽而等美者不可勝言今如滕羨情事者或終身隱處不關人事或升朝理務無譏前哲通滕者則以無譏為證塞滕者則以隱處為美折其兩中則異同之情可見矣夫聖人立教猶言有禮無時君子不行有禮無時政以事有變通不可宗一故耳宋武帝起義兵累遷御史中丞性剛直甚得司直之體外甥劉毅權重當時朝野莫不歸附鮮之盡心武帝獨不屈意於毅毅甚恨焉以與毅舅甥制不相糾使書侍御史丘洹奏彈毅輒宥傳詔羅道盛詔無所問時新制長吏以父母疾去官禁錮三年山陰令沈叔任父疾去職鮮之因此上議曰今省父母之疾而加以罪名悖義疾理莫此為大謂宜從舊於義為允從之於是自二品以上父母及為祖父母後者墳墓崩毀及疾病族屬輒去並不禁錮劉毅當鎮江陵武帝會於江寧朝士畢集毅素好摴蒱於是會戲帝與毅斂局各得其半積錢隱人毅呼帝併之先擲得雉帝甚不悅良久乃答之四坐傾屬既擲得盧毅意大惡謂帝曰知公不以大坐席與人鮮之大喜徒跣繞牀大叫聲聲相續毅甚不平謂之曰此鄭君何為者無復甥舅之敬帝少事戎旅不經涉學及為宰相頗慕風流時或談論人皆依違不敢難鮮之難必切至未嘗寬假與帝言要須帝理屈然後置之帝有時慚恧變色感其輸情時人謂為格佞十二年武帝北伐以為右長史鮮之曾祖晉江州長史哲墓在開封求拜省帝以騎送之及入咸陽帝遍視阿房未央故地悽愴動容問鮮之秦漢所以得喪鮮之具以賈誼過秦對帝曰及子嬰而亡已為晚矣然觀始皇為人智足見是非所任不得人何也答曰夫佞言似忠姦言似信中人以上乃可語上始皇未及中人所以暗於識士前至渭濱帝復歎曰此地寧復有呂望邪鮮之曰昔葉公好龍而真龍見燕昭市骨而駿足至明公以旰食待士豈患海內無人帝稱善者久之宋國初建轉奉常赫連勃勃陷關中武帝復欲北討鮮之表諫及踐阼遷太常都官尚書時傅亮謝晦位遇日隆范泰嘗衆中讓誚鮮之曰卿與傅謝俱從聖主有功關洛卿乃居僚首今日答颯去人遼遠何不肖之甚鮮之熟視不對鮮之為人通率在武帝坐言無所隱晦亦甚憚焉而隱厚篤實贍恤親故遊行命駕或不知所適隨御者所之尤為武帝所狎上曾內殿宴飲朝貴畢至唯不召鮮之坐定謂羣臣曰鄭鮮之必當自來俄而外啟尚書鄭鮮之詣神獸門求啟事帝大笑引入其被遇如此以從征功封龍陽縣五等子景平中徐傅當權出為豫章太守時王弘為江州刺史竊謂人曰鄭公德素先朝所禮方於前代鍾元常王景興之流今徐傅出以為郡抑當有以尋有廢立事元嘉三年弘入為相舉鮮之為尚書右僕射四年卒文集行於世子愔始安太守裴松之字世期河東聞喜人也祖昧光祿大夫父珪正員外郎松之博覽墳籍立身簡素年二十拜殿中將軍此官直衞左右晉孝武太元中革選名家以參顧問始用琅邪王茂之會稽謝輶皆南北之望義熙初為吳興故彰令在縣有績入為尚書祠部郎松之以世立私碑有乖事實上表陳之以為諸欲立碑者宜悉令言上為朝議所許然後聽之庶可以防遏無徵顯彰茂實由是普斷武帝北伐領司州刺史以松之為州主簿轉中從事既剋洛陽松之居州行事宋國初建毛德祖使洛陽武帝敕之曰裴松之廊廟之才不宜久居邊務今召為世子洗馬與殷景仁同可令知之時議立五廟樂松之以妃臧氏廟用樂亦宜與四廟同除零陵內史徵為國子博士元嘉三年誅司徒徐羨之等分遣大使巡行天下並兼散騎常侍班宣二十四條詔書松之使湘州甚得奉使之義論者美之轉中書侍郎上使注陳壽三國志松之鳩集傳記廣增異聞既成奏之上覽之曰裴世期為不朽矣出為永嘉太守勤卹百姓吏人便之後為南琅邪太守致仕拜中散大夫尋為國子博士進太中大夫使續成何承天國史未及撰述卒子駰南中郎參軍松之所著文論及晉記駰注司馬遷史記並行於世駰子昭明昭明少傳儒史之業宋泰始中為太學博士有司奏太子婚納徵用玉璧虎皮未詳何所準擬昭明議禮納徵儷皮鄭云皮為庭實鹿皮也晉太子納妃注以虎皮二太元中公主納徵虎豹皮各一此豈謂婚禮不詳王公之差故取虎豹文蔚以尊其事虎豹雖文而徵禮所不言熊羆雖古而婚禮所不及珪璋雖美或為用各異今宜準經誥凡諸僻謬一皆詳正於是有司參議加珪璋豹熊羆皮各二元徽中出為長沙郡丞罷任刺史王蘊謂曰卿清貧必無還資湘中人士有須一禮之命者我不愛也昭明曰下官忝為郡佐不能光益上府豈以鴻都之事仰累清風歷祠部通直郎齊永明三年使魏武帝謂曰以卿有將命之才使還當以一郡相賞還為始安內史郡人龔玄宜云神人與其玉印玉板書不須筆吹紙便成字自稱龔聖人以此惑衆前後郡太守敬事之昭明付獄案罪及還甚貧罄武帝曰裴昭明當罷郡還遂無宅我不讀書不知古人中誰可比之遷射聲校尉九年復北使建武初為王玄邈安北長史廣陵太守明帝以其在事無啟奏代還責之昭明曰臣不欲競執關鍵故耳昭明歷郡皆清勤常謂人曰人生何事須聚畜一身之外亦復何須子孫若不才我聚彼散若能自立則不如一經故終身一不事產業中興二年卒子子野子野字幾原生而母魏氏亡為祖母殷氏所養殷柔明有文義以章句授之年九歲殷氏亡泣血哀慟家人異之少好學善屬文仕齊為江夏王行參軍遭父憂去職初父寢疾彌年子野禱請備至涕泗霑濡父夜夢見其容旦召視如夢俄而疾間以為至孝所感命著孝感傳固辭乃止及居喪每之墓所草為之枯有白兔白鳩馴擾其側梁天監初尚書僕射范雲嘉其至行將表奏之會雲卒不果樂安任昉有盛名為後進所慕遊其門者昉必推薦子野於昉為從中表獨不至昉亦恨焉故不之善久之兼廷尉正時三官通署獄子野嘗不在同僚輒署其名奏有不允子野從坐免職或勸言請有司可無咎子野笑曰雖慚柳季之道豈因訟以受服自此免黜久之終無恨意中書郎范縝與子野未遇聞其行業而善焉會遷國子博士乃上表讓之有司以資歷非次不為通後為諸暨令在縣不行鞭罰人有爭者示之以理百姓稱悅合境無訟初子野曾祖松之宋元嘉中受詔續修何承天宋史未成而卒子野常欲繼成先業及齊永明末沈約所撰宋書稱松之已後無聞焉子野更撰為宋略二十卷其事評論多善而云戮淮南太守沈璞以其不從義師故也約懼徒跣謝之請兩釋焉歎其述作曰吾弗逮也蘭陵蕭琛言其評論可與過秦王命分路揚鑣於是吏部尚書徐勉言之於武帝以為著作郎掌修國史及起居注頃之兼中書通事舍人尋除通直員外著作舍人如故敕又掌中書詔誥時西北遠邊有白題及滑國遣使由岷山道入貢此二國歷代弗賓莫知所出子野曰漢潁陰侯斬胡白題將一人服虔注云白題胡名也又漢定遠侯擊虜八滑從之此其後乎時人服其博識敕仍使撰方國使圖廣述懷來之盛自要服至于海表凡二十國子野與沛國劉顯南陽劉之遴陳郡殷芸陳留阮孝緒吳郡顧協京兆韋稜皆博學深相賞好顯尤推重之時吳平侯蕭勱范陽張纘每討論墳籍咸折衷於子野繼母曹氏亡居喪過禮服闋再遷員外郎普通七年大舉北侵敕子野為移魏文受詔立成武帝以其事體大召尚書僕射徐勉太子詹事周捨鴻臚卿劉之遴中書侍郎朱虉集壽光殿以觀之時並歎服武帝目子野曰其形雖弱其文甚壯俄又敕為書喻魏相元叉其夜受旨子野謂可待旦方奏未之為也及五鼓敕催令速上子野徐起操筆昧爽便就及奏武帝深嘉焉自是諸符檄皆令具草子野為文典而速不尚靡麗制多法古與今文體異當時或有詆訶者及其末翕然重之或問其為文速者子野答云人皆成於手我獨成於心遷中書侍郎鴻臚卿領步兵校尉子野在禁省十餘年默靜自守未嘗有所請謁外家及中表貧乏所得奉悉給之無宅借官地二畝起茅屋數間妻子苦飢寒唯以教誨為本子姪祗畏若奉嚴君劉顯常以師道推高之末年深信釋教終身飯麥食蔬中大通二年卒先是子野自占死期不過庚戌歲是年自省移疾謂同官劉之亨曰吾其逝矣遺命務存儉約武帝悼惜為之流涕贈散騎常侍即日舉哀先是五等君及侍中以上乃有諡及子野特以令望見嘉賜諡貞子子野少時集注喪服續裴氏家傳各二卷抄合後漢事四十餘卷又敕撰衆僧傳二十卷百官九品二卷附益諡法一卷方國使圖一卷文集二十卷並行於世又欲撰齊梁春秋始草創未就而卒及葬湘東王為之墓誌銘陳于藏內邵陵王又立墓誌堙于羨道羨道列誌自此始焉子騫官至通直郎何承天東海郯人也五歲喪父母徐廣姊也聰明博學故承天幼漸訓義宋武起義初撫軍將軍劉毅鎮姑孰板為行參軍毅嘗出行而鄢陵縣吏陳滿射鳥箭誤中直帥雖不傷人處法棄市承天議曰獄貴情斷疑則從輕昔有驚漢文帝乘輿馬者張釋之劾以犯蹕罪止罰金何者明其無心於驚馬也故不以乘輿之重加於異制今滿意在射鳥非有心於中人案律過誤傷人三歲刑況不傷乎微罰可也宋臺建為尚書祠部郎與傅亮共撰朝儀謝晦鎮江陵請為南蠻長史晦進號衞將軍轉諮議參軍領記室元嘉三年晦將見討間計於承天曰大小既殊逆順又異境外求全上計也以腹心領兵戍義陽將軍率衆於夏口一戰若敗即趨義陽以出北境此其次也晦良久曰荊楚用武之國且當決戰走不晚也及晦下承天留府不從到彥之至馬頭承天自詣歸罪見宥後兼尚書左丞吳興餘杭人薄道舉為菍制同籍朞親補兵道舉從弟代公道生等並為菍大功親非應在補讁之例法以代公等母存為朞親則子宜隨母補兵承天議曰尋劫制同籍朞親補兵大功則不在此例婦人三從既嫁從夫夫死從子今道舉為劫若其叔父尚存制應補讁妻子營居固其宜也但為劫之時叔父已歿代公道生並是從弟大功之親不合補讁今若以叔母為朞親令代公隨母補兵既乖大功不讁之制又失婦人三從之道由於主者守朞親之文不辨男女之異謂代公等母子並宜見原承天為性剛愎不能屈意朝右頗以所長侮同列不為僕射殷景仁所平出為衡陽內史昔在西方與士人多不協在郡又不公清為州司所糾被收繫獄會赦免十六年除著作佐郎撰國史承天年已老而諸佐郎並名家年少潁川荀伯子嘲之常呼為嬭母承天曰卿當云鳳凰將九子嬭母何言邪尋轉太子率更令著作如故時丹陽溧陽丁況等久喪而不棺葬承天議曰禮云還葬當謂荒儉一時故許其稱財而不求備丁況三家數年中葬輒無棺櫬實由淺情薄恩同於禽獸者耳竊以丁寶等同伍積年未嘗勸之以義繩之以法十六年冬既無新科又未申明舊制有何嚴切欻然相糾或由隣曲分爭以興此言如聞在東諸處此例既多江西淮北尤為不少若但讁此三人殆無所肅開其一端則互相恐動臣愚謂況等三家且可勿問因此附定制旨若人葬不如法同伍當即糾言三年除服之後不得追相告引十九年立國子學以本官領國子博士皇太子講孝經承天與中庶子顏延之同為執經頃之遷御史中丞時魏軍南伐文帝訪羣臣捍禦之略承天上安邊論凡陳四事其一移遠就近以實內地其二浚復城隍以增阻防其三纂偶車牛以飾戎械其四計丁課仗勿使有闕文多不載承天素好弈頗用廢事又善彈箏文帝賜以局子及銀裝箏承天奉表陳謝上答曰局子之賜何必非張武之金邪承天博見古今為一時所重張永嘗開玄武湖遇古冢冢上得一銅斗有柄文帝以訪朝士承天曰此亡新威斗王莽三公亡皆賜之一在冢外一在冢內時三台居江左者唯甄邯為大司徒必邯之墓俄而永又啟冢內更得一斗復有一石銘大司徒甄邯之墓時帝每有疑議必先訪之信命相望於道承天性褊促嘗對主者厲聲曰天何言哉四時行焉百物生焉文帝知之應遣先戒曰善候何顏色如其不悅無須多陳二十四年承天遷廷尉未拜上欲以為吏部郎已受密旨承天宣漏之坐免官卒於家年七十八先是禮論有八百卷承天刪減并合以類相從凡為三百卷并前傳雜語所纂文及文集並傳於世又改定元嘉曆改漏刻用二十五箭皆從之曾孫遜遜字仲言八歲能賦詩弱冠州舉秀才南鄉范雲見其對策大相稱賞因結忘年交謂所親曰頃觀文人質則過儒麗則傷俗其能含清濁中今古見之何生矣沈約嘗謂遜曰吾每讀卿詩一日三復猶不能已其為名流所稱如此梁天監中兼尚書水部郎南平王引為賓客掌記室事後薦之武帝與吳均俱進倖後稍失意帝曰吳均不均何遜不遜未若吾有朱虉信則異矣自是疏隔希復得見卒於仁威廬陵王記室初遜為南平王所知深被恩禮及聞遜卒命迎其柩而殯藏焉并餼其妻子東海王僧孺集其文為八卷初遜文章與劉孝綽並見重時謂之何劉梁元帝著論論之云詩多而能者沈約少而能者謝朓何遜遜從叔僴字彥夷亦以才著聞宦遊不達作拍張賦以喻意末云東方曼倩發憤於侏儒遂與火頭食子稟賜不殊位至臺郎時有會稽虞騫工為五言名與遜埒官至王國侍郎後又有會稽孔翁歸濟陽江避並為南平王大司馬府記室翁歸工為詩避博學有思理注論語孝經二人並有文集論曰夫令問令望詩人所以作詠有禮有法前哲由斯播美觀夫范荀二公並以學業自著而干時之譽本期俱不為弘雖才則有餘而望乃不足蔚宗藝用有過人之美迹其行事何利害之相傾徐廣動不違仁義兼儒行鮮之時稱格佞斯不佞矣松之雅道為貴實光載德承天素訓所資無慚舅氏美矣乎
