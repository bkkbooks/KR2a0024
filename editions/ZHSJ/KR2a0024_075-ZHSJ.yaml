body:
  text: 南史卷七十五列傳第六十五隱逸上陶潛宗少文孫測從弟彧之沈道虔孔淳之周續之戴顒翟法賜雷次宗郭希林劉凝之龔祈朱百年關康之辛普明樓惠明漁父褚伯玉顧歡盧度杜京產孔道徽京產子栖剡縣小兒易有君子之道四焉語默之謂也故有入廟堂而不出徇江湖而永歸隱避紛紜情迹萬品若道義內足希微兩亡藏景窮巖蔽名愚谷解桎梏於仁義示形神於天壤則名教之外別有風猷故堯封有非聖之人孔門謬鷄黍之客次則揚獨往之高節重去就之虛名或慮全後悔事歸知殆或道有不申行吟山澤皆用宇宙而成心借風雲以為氣求志達道未或非然故須含貞養素文以藝業不爾則與夫樵者在山何殊異也若夫陶潛之徒或仕不求聞退不譏俗或全身幽履服道儒門或遁迹江湖之上或藏名巖石之下斯並向時隱淪之徒歟今並綴緝以備隱逸篇焉又齊梁之際有釋寶誌者雖處非顯晦而道合希夷求其行事蓋亦俗外之徒也故附之云陶潛字淵明或云字深明名元亮尋陽柴桑人晉大司馬侃之曾孫也少有高趣宅邊有五柳樹故常著五柳先生傳云先生不知何許人不詳姓字閑靜少言不慕榮利好讀書不求甚解每有會意欣然忘食性嗜酒而家貧不能得親舊知其如此或置酒招之造飲輒盡期在必醉既醉而退曾不吝情去留環堵蕭然不蔽風日裋褐穿結簞瓢屢空晏如也常著文章自娛頗示己志忘懷得失以此自終其自序如此蓋以自況時人謂之實錄親老家貧起為州祭酒不堪吏職少日自解而歸州召主簿不就躬耕自資遂抱羸疾江州刺史檀道濟往候之偃臥瘠餒有日矣道濟謂曰夫賢者處世天下無道則隱有道則至今子生文明之世奈何自苦如此對曰潛也何敢望賢志不及也道濟饋以粱肉麾而去之後為鎮軍建威參軍謂親朋曰聊欲絃歌以為三徑之資可乎執事者聞之以為彭澤令不以家累自隨送一力給其子書曰汝旦夕之費自給為難今遣此力助汝薪水之勞此亦人子也可善遇之公田悉令吏種秫稻妻子固請種粳乃使二頃五十畝種秫五十畝種粳郡遣督郵至縣吏白應束帶見之潛歎曰我不能為五斗米折腰向鄉里小人即日解印綬去職賦歸去來以遂其志曰歸去來兮田園將蕪胡不歸既自以心為形役兮奚惆悵而獨悲悟已往之不諫知來者之可追實迷塗其未遠覺今是而昨非舟遙遙以輕颺風飄飄而吹衣問征夫以前路恨晨光之熹微乃瞻衡宇載欣載奔僮僕歡迎弱子候門三徑就荒松菊猶存攜幼入室有酒盈罇引壺觴而自酌眄庭柯以怡顏倚南牕而寄傲審容膝之易安園日涉而成趣門雖設而常關策扶老以流憩時矯首而遐觀雲無心以出岫鳥勌飛而知還景翳翳其將入撫孤松而盤桓歸去來兮請息交以絕遊世與我而相遺復駕言兮焉求悅親戚之情話樂琴書以消憂農人告余以春及將有事於西疇或命巾車或棹扁舟既窈窕以窮壑亦崎嶇而經丘木欣欣以向榮泉涓涓而始流善萬物之得時感吾生之行休已矣乎寓形宇內復幾時曷不委心任去留胡為遑遑欲何之富貴非吾願帝鄉不可期懷良辰以孤往或植杖而芸耔登東臯以舒嘯臨清流而賦詩聊乘化以歸盡樂夫天命復奚疑義熙末徵為著作佐郎不就江州刺史王弘欲識之不能致也潛嘗往廬山弘令潛故人龐通之齎酒具於半道栗里要之潛有脚疾使一門生二兒舉籃轝及至欣然便共飲酌俄頃弘至亦無忤也先是顏延之為劉柳後軍功曹在尋陽與潛情發後為始安郡經過潛每往必酣飲致醉弘欲要延之一坐彌日不得延之臨去留二萬錢與潛潛悉送酒家稍就取酒嘗九月九日無酒出宅邊菊叢中坐久之逢弘送酒至即便就酌醉而後歸潛不解音聲而畜素琴一張每有酒適輒撫弄以寄其意貴賤造之者有酒輒設潛若先醉便語客我醉欲眠卿可去其真率如此郡將候潛逢其酒熟取頭上葛巾漉酒畢還復著之潛弱年薄宦不潔去就之迹自以曾祖晉世宰輔恥復屈身後代自宋武帝王業漸隆不復肯仕所著文章皆題其年月義熙以前明書晉氏年號自永初以來唯云甲子而已與子書以言其志幷為訓戒曰吾年過五十而窮苦荼毒性剛才拙與物多忤自量為己必貽俗患僶俛辭事使汝幼而飢寒耳常感孺仲賢妻之言敗絮自擁何慚兒子此既一事矣但恨隣靡二仲室無萊婦抱茲苦心良獨罔罔少來好書偶愛閑靖開卷有得便欣然忘食見樹木交蔭時鳥變聲亦復歡爾有喜嘗言五六月北窗下臥遇涼風暫至自謂是羲皇上人意淺識陋日月遂往疾患以來漸就衰損親舊不遺每有藥石見救自恐大分將有限也汝輩幼小家貧無役柴水之勞何時可免念之在心若何可言然雖不同生當思四海皆兄弟之義鮑叔敬仲分財無猜歸生伍舉班荊道舊遂能以敗為成因喪立功佗人尚爾況共父之人哉潁川韓元長漢末名士身處卿佐八十而終兄弟同居至於沒齒濟北氾幼春晉時操行人也七世同財家人無怨色詩云高山景行汝其慎哉又為命子詩以貽之元嘉四年將復徵命會卒世號靖節先生其妻翟氏志趣亦同能安苦節夫耕於前妻鋤於後云宗少文南陽涅陽人也祖承宜都太守父繇之湘鄉令母同郡師氏聰辯有學義教授諸子少文善居喪為鄉閭所稱宋武帝既誅劉毅領荊州問毅府諮議參軍申永曰今日何施而可永曰除其宿釁倍其惠澤貫門次顯擢才能如此而已武帝納之乃辟少文為主簿不起問其故答曰栖丘飲谷三十餘年武帝善其對而止少文妙善琴書圖畫精於言理每游山水往輒忘歸征西長史王敬弘每從之未嘗不彌日也乃下入廬山就釋慧遠考尋文義兄臧為南平太守逼與俱還乃於江陵三湖立宅閑居無事武帝召為太尉行參軍驃騎道憐命為記室參軍並不就二兄早卒孤累甚多家貧無以相贍頗營稼穡人有餉遺並受之武帝敕南郡長給吏役又數致餼賚後子弟從祿乃悉不復受武帝開府辟召下書召少文與雁門周續之並為太尉掾皆不起宋受禪及元嘉中頻徵並不應妻羅氏亦有高情與少文協趣羅氏沒少文哀之過甚既乃悲情頓釋謂沙門釋慧堅曰死生之分未易可達三復至教方能遣哀衡陽王義季為荊州親至其室與之歡宴命為諮議參軍不起好山水愛遠遊西陟荊巫南登衡岳因結宇衡山欲懷尚平之志有疾還江陵歎曰老疾俱至名山恐難徧覩唯澄懷觀道臥以游之凡所游履皆圖之於室謂之撫琴動操欲令衆山皆響古有金石弄為諸桓所重桓氏亡其聲遂絕唯少文傳焉文帝遣樂師楊觀就受之少文孫測亦有祖風測字敬微一字茂深家居江陵少靜退不樂人間歎曰家貧親老不擇官而仕先哲以為美談余竊有惑誠不能潛感地金冥致江鯉但當用天之道分地之利孰能食人厚祿憂人重事乎齊驃騎豫章王嶷徵為參軍不起測答府云何為謬傷海鳥橫斤山木母喪身自負土植松柏嶷復遣書請之辟為參軍測答曰性同鱗羽愛止山壑眷戀松雲輕迷人路縱宕巖流有若狂者忽不知老至而今鬢已白豈容課虛責有限魚鳥慕哉永明三年詔徵太子舍人不就欲游名山乃寫祖少文所作尚子平圖於壁上測長子賓宦在都知父此旨便求祿還為南郡丞測遂付以家事刺史安陸王子敬長史劉寅以下皆贈送之測無所受齎老子莊子二書自隨子孫拜辭悲泣測長嘯不視遂往廬山止祖少文舊宅魚復侯子響為江州厚遣贈遺測曰少有狂疾尋山採藥遠來至此量腹而進松朮度形而衣薜蘿淡然已足豈容當此橫施子響命駕造之測不見後子響不告而來奄至所住測不得已巾褐對之竟不交言子響不悅而退侍中王秀之彌所欽慕乃令陸探微畫其形與己相對又貽書曰昔人有圖畫僑札輕以自方耳王儉亦雅重之贈以蒲褥筍席頃之測送弟喪還西仍留舊宅永業寺絕賓友唯與同志庾易劉虬宗人尚之等往來講說荊州刺史隨王子隆至鎮遣別駕宗忻口致勞問測笑曰貴賤理隔何以及此竟不答建武二年徵為司徒主簿不就卒測善畫自圖阮籍遇蘇門於行鄣上坐臥對之又畫永業佛影臺皆為妙作好音律善易老續皇甫謐高士傳三卷嘗游衡山七嶺著衡山廬山記尚之字敬文亦好山澤徵辟一無所就以壽終彧之字叔粲少文從父弟也早孤事兄恭謹家貧好學雖文義不逮少文而真澹過之徵辟一無所就宋元嘉初大使陸子真觀採風俗三詣彧之每辭疾不見告人曰我布衣草萊之人少長壟畝何宜枉軒冕之客子真還表薦之又不就徵卒於家沈道虔吳興武康人也少仁愛好老易居縣北石山下孫恩亂後饑荒縣令庾肅之迎出縣南廢頭里為立宅臨溪有山水之玩時復還石山精廬與諸孤兄子共釜庾之資困不改節受琴於戴逵王敬弘深貴重之郡州府凡十二命皆不就有人竊其園菜者外還見之乃自逃隱待竊者去後乃出人又拔其屋後大筍令人止之曰惜此筍欲令成林更有佳者相與乃令人買大筍送與之盜者慚不取道虔使置其門內而還常以捃拾自資同捃者或爭穟道虔諫之不止悉以其所得與之爭者愧恧後每爭輒云勿令居士知冬月無複衣戴顒聞而迎之為作衣服幷與錢一萬及還分身上衣及錢悉供諸兄弟子無衣者鄉里少年相率受學道虔常無食以立學徒武康令孔欣之厚相資給受業者咸得有成宋文帝聞之遣使存問賜錢三萬米二百斛悉供孤兄子嫁娶徵員外散騎侍郎不就累世事佛推父祖舊宅為寺至四月八日每請像請像之日輒舉家感慟焉道虔年老菜食無經日之資而琴書為樂孜孜不倦文帝敕郡縣使隨時資給卒子慧鋒修父業不就州辟孔淳之字彥深魯人也祖惔尚書祠部郎父粲祕書監徵不就淳之少有高尚愛好墳籍為太原王恭所稱居會稽剡縣性好山水每有所游必窮其幽峻或旬日忘歸嘗游山遇沙門釋法崇因留共止遂停三載法崇歎曰緬想人外三十年矣今乃傾蓋于茲不覺老之將至也及淳之還乃不告以姓除著作佐郎太尉參軍並不就居喪至孝廬于墓側服闋與徵士戴顒王弘之及王敬弘等共為人外之游又申以婚姻敬弘以女適淳之子尚遂以烏羊繫所乘車轅提壺為禮至則盡歡共飲迄暮而歸或怪其如此答曰固亦農夫田父之禮也會稽太守謝方明苦要之不能致使謂曰苟不入吾郡何為入吾郭淳之笑曰潛游者不識其水巢栖者非辯其林飛沈所至何問其主終不肯往茅室蓬戶庭草蕪徑唯牀上有數帙書元嘉初復徵為散騎侍郎乃逃于上虞縣界家人莫知所在弟默之為廣州刺史出都與別司徒王弘要淳之集冶城即日命駕東歸遂不顧也元嘉七年卒默之儒學注穀梁春秋默之子熙先事在范曄傳周續之字道祖雁門廣武人也其先過江居豫章建昌縣續之八歲喪母哀戚過於成人奉兄如事父豫章太守范甯於郡立學招集生徒遠方至者甚衆續之年十二詣甯受業居學數年通五經五緯號曰十經名冠同門稱為顏子既而閑居讀老易入廬山事沙門釋慧遠時彭城劉遺人遁迹廬山陶深明亦不應徵命謂之尋陽三隱劉毅鎮姑孰命為撫軍參軍徵太學博士並不就江州刺史每相招請續之不尚峻節頗從之游常以嵇康高士傳得出處之美因為之注武帝北討世子居守迎續之館于安樂寺延入講禮月餘復還山江州刺史劉柳薦之武帝俄辟太尉掾不就武帝北伐還鎮彭城遣使迎之禮賜甚厚每曰真高士也尋復南還武帝踐阼復召之上為開館東郭外招集生徒乘輿降幸幷見諸生問續之禮記不可長與我九齡射於矍圃之義辯析精奧稱為名通續之素患風痺不復堪講乃移病鍾山景平元年卒通毛詩六義及禮論注公羊傳皆傳於世無子兄子景遠有續之風戴顒字仲若譙郡銍人也父逵兄勃並隱遁有高名顒十六遭父憂幾於毀滅因此長抱羸患以父不仕復修其業父善琴書顒並傳之凡諸音律皆能揮手會稽剡縣多名山故世居剡下顒及兄勃並受琴於父父沒所傳之聲不忍復奏各造新弄勃制五部顒制十五部顒又制長弄一部並傳於世中書令王綏嘗攜客造之勃等方進豆粥綏曰聞卿善琴試欲一聽不答綏恨而去桐廬縣又多名山兄弟復共游之因留居止勃疾患醫藥不給顒謂勃曰顒隨兄得閑非有心於語默兄今疾篤無可營療顒當干祿以自濟耳乃求海虞令事垂行而勃卒乃止桐廬僻遠難以養疾乃出居吳下吳下土人共為築室聚石引水植林開澗少時繁密有若自然乃述莊周大旨著逍遙論注禮記中庸篇三吳將守及郡內衣冠要其同游野澤堪行便去不為矯介衆論以此多之宋國初建元嘉中徵並不就衡陽王義季鎮京口長史張邵與顒姻通迎來止黃鵠山山北有竹林精舍林澗甚美顒憩于此澗義季亟從之游顒服其野服不改常度為義季鼓琴並新聲變曲其三調游弦廣陵止息之流皆與世異文帝每欲見之嘗謂黃門侍郎張敷曰吾東巡之日當宴戴公山下也以其好音長給正聲伎一部顒合何嘗白鵠二聲以為一調號為清曠自漢世始有佛像形制未工逵特善其事顒亦參焉宋世子鑄丈六銅像於瓦官寺既成面恨瘦工人不能改乃迎顒看之顒曰非面瘦乃臂胛肥耳及減臂胛瘦患即除無不歎服十八年卒無子景陽山成顒已亡矣上歎曰恨不得使戴顒觀之翟法賜尋陽柴桑人也曾祖湯祖莊父矯並高尚不仕逃避徵辟法賜少守家業立室廬山頂喪親後便不復還家不食五穀以獸皮及結草為衣雖鄉親中表莫得見焉徵辟一無所就後家人至石室尋求因復遠徙違避徵聘遁跡幽深卒於巖石間雷次宗字仲倫豫章南昌人也少入廬山事沙門釋慧遠篤志好學尤明三禮毛詩隱退不受徵辟宋元嘉十五年徵至都開館於鷄籠山聚徒教授置生百餘人會稽朱膺之潁川庾蔚之並以儒學總監諸生時國子學未立上留意藝文使丹陽尹何尚之立玄學太子率更令何承天立史學司徒參軍謝元立文學凡四學並建車駕數至次宗館資給甚厚久之還廬山公卿以下並設祖道後又徵詣都為築室於鍾山西巖下謂之招隱館使為皇太子諸王講喪服經次宗不入公門乃使自華林東門入延賢堂就業二十五年卒于鍾山子肅之頗傳其業郭希林武昌人也曾祖翻晉世高尚不仕希林少守家業徵召一無所就卒子蒙亦隱居不仕劉凝之字隱安小名長生南郡枝江人也父期公衡陽太守兄盛公高尚不仕凝之慕老萊嚴子陵為人推家財與弟及兄子立屋於野外非其力不食州里重其行辟召一無所就妻梁州刺史郭銓女也遣送豐麗凝之悉散之屬親妻亦能不慕榮華與凝之共居儉苦夫妻共乘蒲笨車出市買易周用之外輒以施人為村里所誣一年三輸公調求輒與之又嘗有人認其所著屐笑曰僕著已敗令家中覔新者備君此人後田中得所失屐送還不肯復取臨川王義慶衡陽王義季鎮江陵並遣使存問凝之答書頓首稱僕不為百姓禮人或譏焉凝之曰昔老萊向楚王稱僕嚴陵亦抗禮光武未聞巢許稱臣堯舜時戴顒與衡陽王義季書亦稱僕荊州年饑義季慮凝之餒斃餉錢十萬凝之大喜將錢至市門觀有飢色者悉分與之俄頃立盡性好山水一旦攜妻子泛江湖隱居衡山之陽登高嶺絕人迹為小屋居之採藥服食妻子皆從其志卒年五十九龔祈字孟道武陵漢壽人也從祖玄之父黎人並不應徵辟祈風姿端雅容止可觀中書郎范述見之歎曰此荊楚之僊人也自少及長徵辟一無所就時或賦詩而言不及世事卒年四十二朱百年會稽山陰人也祖凱之晉左衞將軍父濤揚州主簿百年少有高情親亡服闋攜妻孔氏入會稽南山伐樵採箬為業每以樵箬置道頭輒為行人所取明旦已復如此人稍怪之積久方知是朱隱士所賣須者隨其所堪多少留錢取樵箬而去或遇寒雪樵箬不售無以自資輒自榜船送妻還孔氏天晴迎之有時出山陰為妻買繒采五三尺好飲酒遇醉或失之頗言玄理時為詩詠往往有高勝之言隱迹避人唯與同縣孔覬友善覬亦嗜酒相得輒酣對盡歡百年室家素貧母以冬月亡衣並無絮自此不衣緜帛嘗寒時就覬宿衣悉裌布飲酒醉眠覬以臥具覆之百年不覺也既覺引臥具去體謂覬曰緜定奇溫因流涕悲慟覬亦為之傷感除太子舍人不就顏竣為東揚州發教餉百年穀五百斛不受時山陰又有寒人姚吟亦有高趣為衣冠所重竣餉吟米二百斛吟亦辭之百年卒山中蔡興宗為會稽太守餉百年妻米百斛百年妻遣婢詣郡門奉辭固讓時人美之以比梁鴻妻關康之字伯愉河東楊人也世居京口寓屬南平昌少而篤學姿狀豐偉下邳趙繹以文義見稱康之與友善特進顏延之等當時名士十許人入山候之見其散髮被黃布帊席松葉枕一塊白石而臥了不相眄延之等咨嗟而退不敢干也晉陵顧悅之難王弼易義四十餘條康之申王難顧遠有情理又為毛詩義經籍疑滯多所論釋嘗就沙門支僧納學算妙盡其能徵辟一無所就棄絕人事守志閑居弟雙之為臧質車騎參軍與質俱下至赭圻病卒瘞於水濱康之時得病小差牽以迎喪因得虛勞病寢頓二十餘年時有閒日輒臥論文義宋孝武即位遣大使巡行天下使反薦康之宜加徵聘不見省康之性清約獨處一室希與妻子相見不通賓客弟子以業傳受尤善左氏春秋齊高帝為領軍時素好此學送本與康之康之手自點定又造禮論十卷高帝絕賞愛之及崩遺詔以入玄宮康之以宋明帝泰始初與平原明僧紹俱徵辭以疾時又有河南辛普明東陽樓惠明皆以篤行聞普明字文達少就康之受業至性過人居貧與兄共處一帳兄亡仍以帳施靈蚊甚多通夕不得寢而終不道侵螫僑居會稽會稽士子高其行當葬兄皆送金為贈後至者不復受人問其故答曰本以兄墓不周故不逆親友之意今實己足豈可利亡者餘贈邪齊豫章王嶷為揚州徵為議曹從事不就惠明字智遠立性貞固有道術居金華山舊多毒害自惠明居之無復辛螫之苦藏名匿迹人莫之知宋明帝召不至齊高帝徵又不至文惠太子在東宮苦延方至仍又辭歸俄自金華輕棹西下及就路回之豐安旬日之間唐𧜛之祅賊入城塗地唯豐安獨全時人以為有先覺齊武帝敕為立館漁父者不知姓名亦不知何許人也太康孫緬為尋陽太守落日逍遙渚際見一輕舟陵波隱顯俄而漁父至神韻蕭灑垂綸長嘯緬甚異之乃問有魚賣乎漁父笑而答曰其釣非釣寧賣魚者邪緬益怪焉遂褰裳涉水謂曰竊觀先生有道者也終朝鼓枻良亦勞止吾聞黃金白璧重利也駟馬高蓋榮勢也今方王道文明守在海外隱鱗之士靡然向風子胡不贊緝熙之美何晦用其若是也漁父曰僕山海狂人不達世務未辨賤貧無論榮貴乃歌曰竹竿籊籊河水浟浟相忘為樂貪餌吞鉤非夷非惠聊以忘憂於是悠然鼓棹而去緬字伯緒太子僕興曾之子也有學義宋明帝甚知之位尚書左丞東中郎司馬褚伯玉字元璩吳郡錢唐人也高祖含始平太守父逿征虜參軍伯玉少有隱操寡慾年十八父為之昏婦入前門伯玉從後門出遂往剡居瀑布山性耐寒暑時人比之王仲都在山三十餘年隔絕人物王僧達為吳郡苦禮致之伯玉不得已停郡信宿纔交數言而退寧朔將軍丘珍孫與僧達書曰聞褚先生出居貴館此子滅景雲棲不事王侯抗高木食有年載矣自非折節好賢何以致之昔文舉棲冶城安道入昌門於茲而三焉却粒之士飡霞之人乃可暫致不宜久羈君當思遂其高步成其羽化望其還策之日暫紆清塵亦願助為譬說僧達答曰褚先生從白雲游舊矣古之逸人或留慮兒女或使華陰成市而此子索然唯朋松石介於孤峯絕嶺者積數十載近故要其來此冀慰日夜比談討芝桂借訪荔蘿若已窺煙液臨滄洲矣知君欲見之輒當申譬宋孝建二年散騎常侍樂詢行風俗表薦伯玉加徵聘本州議曹從事不就齊高帝即位手詔吳會二郡以禮迎遣又辭疾上不欲違其志敕於剡白石山立太平館居之建元元年卒年八十六伯玉常居一樓上仍葬樓所孔珪從其受道法為於館側立碑顧歡字景怡一字玄平吳郡鹽官人也家世寒賤父祖並為農夫歡獨好學年六七歲知推六甲家貧父使田中驅雀歡作黃雀賦而歸雀食稻過半父怒欲撻之見賦乃止鄉中有學舍歡貧無以受業於舍壁後倚聽無遺忘者夕則然松節讀書或然糠自照及長篤志不倦聞吳興東遷邵玄之能傳五經文句假為書師從之受業同郡顧顗之臨縣見而異之遣諸子與游及孫憲之並受經焉年二十餘更從豫章雷次宗諮玄儒諸義母亡水漿不入口六七日廬于墓次遂隱不仕於剡天台山開館聚徒受業者常近百人歡早孤讀詩至哀哀父母輒執書慟泣由是受學者廢蓼莪篇不復講焉晚節服食不與人通每旦出戶山鳥集其掌取食好黃老通解陰陽書為數術多効驗初以元嘉中出都寄住東府忽題柱云三十年二月二十一日因東歸後元凶弒逆是其年月日也弟子鮑靈綬門前有一株樹大十餘圍上有精魅數見影歡印樹樹即枯死山陰白石村多邪病村人告訴求哀歡往村中為講老子規地作獄有頃見狐狸黿鼉自入獄中者甚多即命殺之病者皆愈又有病邪者問歡歡曰家有何書答曰唯有孝經而已歡曰可取仲尼居置病人枕邊恭敬之自差也而後病者果愈後人問其故答曰善禳惡正勝邪此病者所以差也齊高帝輔政徵為揚州主簿及踐阼乃至稱山谷臣顧歡上表進政綱一卷時員外郎劉思効表陳讜言優詔並稱美之歡東歸上賜麈尾素琴永明元年詔徵為太學博士同郡顧黯為散騎侍郎黯字長孺有隱操與歡不就徵會稽孔珪嘗登嶺尋歡共談四本歡曰蘭石危而密宣國安而疎士季似而非公深謬而是總而言之其失則同曲而辯之其塗則異何者同昧其本而競談其末猶未識辰緯而意斷南北羣迷暗爭失得無準情長則申意短則屈所以四本並通莫能相塞夫中理唯一豈容有二四本無正失中故也於是著三名論以正之尚書劉澄臨川王常侍朱廣之並立論難與之往復而廣之才理尤精詣也廣之字處深吳郡錢唐人也善清言初歡以佛道二家教異學者互相非毀乃著夷夏論曰夫辯是與非宜據聖典道經云老子入關之天竺維衞國國王夫人名曰淨妙老子因其晝寢乘日精入淨妙口中後年四月八日夜半時剖右腋而生墜地即行七步於是佛道興焉此出玄妙內篇佛經云釋迦成佛有塵劫之數出法華無量壽或為國師道士儒林之宗出瑞應本起歡論之曰五帝三皇不聞有佛國師道士無過老莊儒林之宗孰出周孔若孔老非聖誰則當之然二經所說如合符契道則佛也佛則道也其聖則符其跡則反或和光以明近或曜靈以示遠道濟天下故無方而不入智周萬物故無物而不為其入不同其為必異各成其性不易其事是以端委搢紳諸華之容剪髮曠衣羣夷之服擎跽罄折侯甸之恭狐蹲狗踞荒流之肅棺殯槨葬中夏之風火焚水西戎之俗全形守禮繼善之教毀貌易性絕惡之學豈伊同人爰及異物鳥王獸長往往是佛無窮世界聖人代興或昭五典或布三乘在鳥而鳥鳴在獸而獸吼教華而華言化夷而夷語耳雖舟車均於致遠而有川陸之節佛道齊乎達化而有夷夏之別若謂其致既均其法可換者而車可涉川舟可行陸乎今以中夏之性効西戎之法既不全同又不全異下棄妻孥上絕宗祀嗜欲之物皆以禮伸孝敬之典獨以法屈悖禮犯順曾莫之覺弱喪忘歸孰識其舊且理之可貴者道也事之可賤者俗也捨華効夷義將安取若以道邪道固符合矣若以俗邪俗則大乖矣屢見刻舷沙門守株道士交諍小大互相彈射或域道以為兩或混俗以為一是牽異以為同破同以為異則乖爭之由淆亂之本也尋聖道雖同而法有左右始乎無端終乎無末泥洹仙化各是一術佛號正真道稱正一一歸無死真會無生在名則反在實則合但無生之教賒無死之化切切法可以進謙弱賒法可以退夸強佛教文而博道教質而精精非粗人所信博非精人所能佛言華而引道言實而抑抑則明者獨進引則昧者競前佛經繁而顯道經簡而幽幽則妙門難見顯則正路易遵此二法之辨也聖匠無心方圓有體器既殊用教亦易施佛是破惡之方道是興善之術興善則自然為高破惡則勇猛為貴佛跡光大宜以化物道跡密微利用為己優劣之分大略在茲夫蹲夷之儀婁羅之辯各出彼俗自相聆解猶蟲躍鳥聒何足述効歡雖同二法而意黨道教宋司徒袁粲託為道人通公駁之其略曰白日停光星隱照誕降之應事在老先似非入關方昭斯瑞又西域之記佛經之說俗以膝行為禮不慕蹲坐為恭道以三遶為虔不尚踞傲為肅豈專戎土爰亦茲方襄童謁帝膝行而進趙王見周三環而止今佛法垂化或因或革清信之士容衣不改息心之人服貌必變變本從道不遵彼俗俗風自殊無患其亂孔老釋迦其人或同觀方設教其道必異孔老教俗為本釋氏出世為宗發軫既殊其歸亦異又仙化以變形為上泥洹以陶神為先變形者白首還緇而未能無死陶神者使塵惑日損湛然常存泥洹之道無死之地乖詭若此何謂其同歡答曰案道經之作著自西周佛經之來始乎東漢年踰八百代懸數十若謂黃老雖久而濫在釋前是呂尚盜陳之齊劉季竊王莽之漢也又夷俗長𢔛法與華異翹左跂右全是蹲踞故周公禁之於前仲尼誡之於後又佛起於戎豈非戎俗素惡邪道出於華豈非華風本善邪今華風既變惡同戎狄佛來破之良有以矣佛道實貴故戒業可遵戎俗實賤故言貌可棄今諸華士女氏族弗革而露首偏踞濫用夷禮又若觀風流教其道必異佛非東華之道道非西夷之法魚鳥異川永不相關安得老釋二教交行八表今佛既東流道亦西邁故知俗有精粗教有文質然則道教執本以領末佛教救末以存本請問所歸異在何許若以翦落為異則胥靡翦落矣若以立像為異則俗巫立像矣此非所歸歸在常住常住之象常道孰異神仙有死權便之說神仙是大化之總稱非窮妙之至名至名無名其有名者二十七品仙變成真真變成神或謂之聖各有九品品極則入空寂無為無名若服食茹芝延壽萬億壽盡則死藥極則枯此修考之士非神仙之流也明僧紹正二教論以為佛明其宗老全其生守生者蔽明宗者通今道家稱長生不死名補天曹大乖老莊立言本理文惠太子竟陵王子良並好釋法吳興孟景翼為道士太子召入玄圃衆僧大會子良使景翼禮佛景翼不肯子良送十地經與之景翼造正一論大略曰寶積云佛以一音廣說法老子云聖人抱一以為天下式一之為妙空玄絕於有境神化贍於無窮為萬物而無為處一數而無數莫之能名強號為一在佛曰實相在道曰玄牝道之大象即佛之法身以不守之守守法身以不執之執執大象但物有八萬四千行說有八萬四千法法乃至於無數行亦達於無央等級隨緣須導歸一歸一曰回向向正即無邪邪觀既遣億善日新三五四六隨用而施獨立不改絕學無憂曠劫諸聖共遵斯一老釋未始於嘗分迷者分之而未合億善徧修修徧成聖雖十號千稱終不能盡終不能盡豈可思議司徒從事中郎張融作門律云道之與佛逗極無二吾見道士與道人戰儒墨道人與道士辨是非昔有鴻飛天首積遠難亮越人以為鳧楚人以為乙人自楚越鴻常一耳以示太子僕周顒顒難之曰虛無法性其寂雖同位寂之方其旨則別論所謂逗極無二者為逗極於虛無當無二於法性邪足下所宗之本一物為鴻乙耳驅馳佛道無免二末未知高鑒緣何識本輕而宗之其有旨乎往復文多不載歡口不辯善於著論又注王弼易二繫學者傳之知將終賦詩言志曰五塗無宅三清有常舍精氣因天行游魂隨物化鵬鵾適大海蜩鳩之桑柘達生任去留善死均日夜委命安所乘何方不可駕翹心企前覺融然從此謝自剋死日自擇葬時卒於剡山時年六十四身體香軟道家謂之屍解仙化焉還葬舊墓木連理生墓側縣令江山圖表狀武帝詔歡諸子撰歡文議三十卷又始興人廬度字孝章亦有道術少隨張永北侵魏永敗魏人追急阻淮水不得過度心誓曰若得免死從今不復殺生須臾見兩楯流來接之得過後隱居廬陵西昌三顧山鳥獸隨之夜有鹿觸其壁度曰汝勿壞我壁鹿應聲去屋前有池養魚皆名呼之次第來取食乃去逆知死年月與親友別永明末以壽終杜京產字景齊吳郡錢唐人也祖運劉毅衞軍參軍父道鞠州從事善彈京產少恬靜閉意榮宦頗涉文義專修黃老會稽孔覬清剛有峻節一見而為款交郡命主簿州辟從事稱疾去與同郡顧歡同契於始寧東山開舍授學齊建元中武陵王曄為會稽齊高帝遣儒士劉瓛入東為曄講瓛故往與之游曰杜生當今之臺尚也京產請瓛至山舍講書傾資供待子栖躬自屣履為瓛生徒下食孔珪周顒謝𦵩並致書以通殷勤永明十年珪及光祿大夫陸澄祠部尚書虞悰太子右率沈約司徒右長史張融表薦京產徵為奉朝請不至於會稽日門山聚徒教授建武初徵員外散騎侍郎京產曰莊生持釣豈為白璧所回辭疾不就卒會稽山陰人孔道徽守志業不仕與京產友善道徽父祐至行通神隱於四明山嘗見山谷中有數百斛錢視之如瓦石不異采樵者競取入手即成沙礫曾有鹿中箭來投祐祐為之養創愈然後去太守王僧虔與張緒書曰孔祐敬康曾孫也行動幽祗德標松桂引為主簿遂不可屈此古之遺德也道徽少厲高行能世其家風隱居南山終身不窺都邑豫章王嶷為揚州辟西曹書佐不至鄉里宗慕之道徽兄子總有操行遇飢寒不可得衣食縣令吳興丘仲孚薦之除竟陵王侍郎竟不至永明中會稽鍾山有人姓蔡不知名隱山中養鼠數千頭呼來即來遣去即去言語狂易時謂之謫仙不知所終京產高祖子恭以來及子栖世傳五斗米道不替栖字孟山善清言能彈琴刺史齊豫章王嶷聞其名辟議曹從事仍轉西曹書佐竟陵王子良數致禮接國子祭酒何胤掌禮又重栖以為學士掌昏冠儀以父老歸養栖肥白長壯及京產病旬日間便皮骨自支京產亡水漿不入口七日晨夜不罷哭不食鹽菜每營買祭奠身自看視號泣不自持朔望節歲絕而復續嘔血數升時何胤謝朏並隱東山遺書敦譬誡以毀滅至祥禫暮夢見其父慟哭而絕初胤兄點見栖歎曰卿風韻如此雖獲嘉譽不永年矣卒時年三十六當時咸嗟惜焉建武二年剡縣有小兒年八歲與母俱得赤班病母死家人以小兒猶惡不令其知小兒疑之問云母嘗數問我病昨來覺聲羸今不復問何也因自投下牀扶匐至母尸側頓絕而死鄉隣告之縣令宗善才求表廬事竟不行
