body:
  text: 南史卷二十六列傳第十六袁湛弟豹豹子淑淑兄子顗顗從弟粲顗弟子彖彖從弟昂馬仙琕昂子君正君正子樞憲君正弟敬泌袁湛字士深陳郡陽夏人也祖耽晉歷陽太守父質琅邪內史並知名湛少與弟豹並為從外祖謝安所知安以其兄子玄女妻湛宋武帝起兵以為鎮軍諮議參軍以從征功封晉寧縣五等男義熙十二年為尚書右僕射武帝北伐湛兼太尉與兼司空尚書范泰奉九命禮物拜授武帝帝沖讓湛等隨軍至洛陽住栢谷塢泰議受使未畢不拜晉帝諸陵湛獨至五陵展敬時人美之初陳郡謝重王胡之外孫也於諸舅敬禮多闕重子絢湛之甥也嘗於公坐慢湛湛正色謂曰汝便是兩世無渭陽情絢有愧色十四年卒贈左光祿大夫文帝即位以后父贈侍中以左光祿大夫開府儀同三司諡曰敬公大明三年孝武幸籍田經湛墓遣使致祭增守墓五戶子淳淳子植並早卒湛弟豹字士蔚好學博聞善談雅俗每商較古今兼以誦詠聽者忘疲為御史中丞時鄱陽縣侯孟懷玉上母檀拜國太夫人有司奏許豹以婦人從夫爵懷玉父大司農綽見居列卿妻不宜從子奏免尚書右僕射劉柳等官詔並贖論後為丹陽尹太尉長史義熙九年卒官以參伐蜀謀追封南昌縣五等子子淑淑字陽源少有風氣年數歲伯父湛謂人曰此非凡兒至十餘歲為姑夫王弘所賞博涉多通不為章句學文采遒豔從橫有才辯彭城王義康命為司徒祭酒義康不好文學雖外相禮接意好甚疎從母兄劉湛欲其附己而淑不為改意由是大相乖失淑乃賦詩曰種蘭忌當門懷璧莫向楚楚少別玉人門非植蘭所尋以久疾免官元嘉二十六年累遷尚書吏部郎其秋大舉北侵從容曰今當席卷趙魏檢玉岱宗願上封禪書一篇文帝曰盛德之事我何足以當之出為始興王濬征北長史南東海太守淑始到府濬引見謂曰不意舅遂垂屈佐淑答曰朝廷遣下官本以光公府望也還為御史中丞時魏軍南伐至瓜步文帝使百官議防禦之術淑上議其言甚誕淑喜誇每為時人所嘲始興王濬嘗送錢三萬餉淑一宿復遣人追取謂為使人謬誤欲以戲淑淑與濬書曰聞之前志曰七年之中一與一奪義士猶或非之況密邇旬次何其裒益之亟也竊恐元凶將為逆其夜淑在直呼淑及蕭斌等流涕告以明旦當行大事望相與勠力淑斌並曰自古無此願加善思劭怒斌懼曰謹奉令淑叱之曰卿便謂殿下真有是邪殿下幼時嘗患風或是疾動耳劭愈怒因問曰事當剋不淑曰居不疑之地何患不剋但既剋之後為天地所不容大禍亦旋至耳劭左右引淑衣曰此是何事而可言罷劭因起賜淑等袴褶又就主衣取錦裁三尺為一段又中裂之分斌與淑及左右使以縛袴褶淑出還省繞牀至四更乃寢劭將出已與蕭斌同載呼淑甚急淑眠終不起劭停車奉化門催之相續徐起至車後劭使登車辭不上劭命左右殺之於奉化門外槐樹下劭即位追贈太常孝武即位贈侍中太尉諡曰忠憲公又詔淑及徐湛之江湛王僧綽卜天與四家長給禀淑文集傳於世諸子並早卒兄洵吳郡太守諡曰貞洵子顗顗字國章初為豫州主簿累遷晉陵太守襲南昌縣五等子大明末拜侍中領前軍將軍時新安王子鸞以母嬖有盛寵太子在東宮多過上微有廢太子立子鸞之意從容言之顗盛稱太子好學有日新之美帝怒振衣而入顗亦厲色而出左丞徐爰言於帝請宥之帝意解後帝又以沈慶之才用不多言論頗相嗤毀顗又陳慶之忠勤有幹略堪當重任由是前廢帝深感顗慶之亦懷其德景和元年誅羣公欲引進顗任以朝政遷為吏部尚書封新淦縣子俄而意趣乖異寵待頓衰始令顗與沈慶之徐爰參知選事尋復反以為罪使有司糾奏坐白衣領職從幸湖熟往反數日不被命顗慮禍求出乃除建安王休仁安西長史休仁不行即以顗為領寧蠻校尉雍州刺史加都督顗舅蔡興宗謂曰襄陽星惡豈可冒邪顗曰白刃交前不救流矢今日之行本願生出彪口且天道遼遠何必皆驗如其有徵當修德以禳之於是狼狽上路慮見追後至尋陽曰今知免矣與鄧琬款狎過常每清閑必盡日窮夜顗與琬人地本殊衆知其有異志矣及至襄陽使劉胡繕修兵械會明帝定大事進顗號右將軍遣荊州典籤邵宰乘驛還江陵道由襄陽顗反意已定而糧仗未足欲且奉表於明帝顗子祕書丞戩曰一奉表疏便為彼臣以臣伐君於義不可顗從之顗詐云被太皇太后令使其起兵便建牙馳檄奉勸晉安王子勛即大位與琬書使勿解甲子勛即位進顗號安北將軍加尚書左僕射顗本無將略在軍中未嘗戎服語不及戰陣唯賦詩談義而已不能撫接諸將劉胡每論事酬對甚簡由此大失人情胡常切齒恚恨胡以南運未至軍士匱乏就顗換襄陽之資顗答曰都下兩宅未成方應經理不可損徹又信往來之言言都下米貴斗至數百以為不勞攻伐行自離散於是擁甲以待之明帝使顗舊門生徐碩奉手詔譬顗曰卿未經為臣今追蹤竇融猶未晚也及劉胡叛走不告顗顗至夜方知大怒罵曰今年為小子所誤呼取飛燕謂其衆曰我當自出追之因又遁走至鵲頭與戍主薛伯珍及其所領數千步取青林欲向尋陽夜止山間宿殺馬勞將士顗顧伯珍曰我舉八州以謀王室未一戰而散豈非天邪非不能死豈欲草間求活望一至尋陽謝罪主上然後自刎耳因慷慨叱左右索節無復應者及旦伯珍請求間言乃斬顗首詣錢溪馬軍主襄陽俞湛之降湛之因斬伯珍併送首以為己功明帝忿顗違叛流尸於江弟子彖收瘞於石頭後岡後廢帝即位方得改葬顗子戩昂戩為黃門侍郎戍盆城尋陽敗伏誅粲字景倩洵弟子也父濯揚州秀才早卒粲幼孤祖哀之名之曰愍孫伯叔並當世榮顯而愍孫飢寒不足母琅邪王氏太尉長史誕之女也躬事績紡以供朝夕愍孫少好學有清才隨伯父洵為吳郡擁弊衣讀書足不踰戶其從兄顗出遊要愍孫愍孫輒稱疾不動叔父淑雅重之語子弟曰我門不乏賢愍孫必當復為三公或有欲與顗婚顗父洵曰顗不堪政可與愍孫婚耳愍孫在坐流涕起出早以操行見知宋孝武即位稍遷尚書吏部郎太子右衞率侍中孝建元年文帝諱日羣臣並於中興寺八關齋中食竟愍孫別與黃門郎張淹更進魚肉食尚書令何尚之奉法素謹密以白孝武孝武使御史中丞王謙之糾奏並免官大明元年復為侍中領射聲校尉封興平縣子三年坐納山陰人丁承文貨舉為會稽郡孝廉免官五年為左衞將軍加給事中七年轉吏部尚書左衞如故其年皇太子冠上臨宴東宮與顏師伯柳元景沈慶之等並摴蒱愍孫勸師伯酒師伯不飲愍孫因相裁辱曰不能與佞人周旋師伯見寵於上上常嫌愍孫以寒素陵之因此發怒曰袁濯兒不逢朕員外郎未可得也而敢以寒士遇物將手刃之命引下席愍孫色不變沈柳並起謝久之得釋出為海陵太守廢帝即位愍孫在郡夢日墮其胸上因驚尋被徵管機密歷吏部尚書侍中驍衞將軍愍孫峻於儀範廢帝倮之迫使走愍孫雅步如常顧而言曰風雨如晦雞鳴不已明帝泰始元年為司徒左長史南東海太守愍孫清整有風操自遇甚高嘗著妙德先生傳以續嵇康高士傳後以自況曰有妙德先生陳國人也氣志深虛姿神清映性孝履順棲沖業簡有舜之遺風先生幼夙多疾性疎懶無所營尚然九流百氏之言雕龍談天之藝皆泛識其大歸而不以成名家貧嘗仕非其好也混其聲迹晦其心用席門常掩三逕裁通雖揚子寂漠嚴叟沈冥不是過也修道遂志終無得而稱焉又嘗謂周旋人曰昔有一國國中一水號曰狂泉國人飲此水無不狂唯國君穿井而汲獨得無恙國人既並狂反謂國主之不狂為狂於是聚謀共執國主療其狂疾火艾針藥莫不必具國主不任其苦於是到泉所酌水飲之飲畢便狂君臣大小其狂若一衆乃歡然我既不狂難以獨立比亦欲試飲此水矣幼慕荀奉倩為人孝武時求改名粲不許至明帝立乃請改為粲字景倩其外孫王筠又云明帝多忌諱反語袁愍為殞門帝意惡之乃令改焉二年遷領軍將軍仗士三十人入六門其年徙中書令領太子詹事三年轉尚書僕射尋領吏部五年加中書令又領丹陽尹粲負才尚氣愛好虛遠雖位任隆重不以事務經懷獨步園林詩酒自適家居負郭每杖策逍遙當其意得悠然忘反郡南一家頗有竹石粲率爾步往亦不通主人直造竹所嘯詠自得主人出語笑款然俄而車騎羽儀併至門方知是袁尹又嘗步屧白楊郊野間道遇一士大夫便呼與酣飲明日此人謂被知顧到門求進粲曰昨飲酒無偶聊相要耳竟不與相見嘗作五言詩言訪迹雖中宇循寄乃滄洲蓋其志也七年為尚書令初粲忤於孝武其母候乘輿出負塼叩頭流血塼碎傷目自此後粲與人語有誤道眇目者輒涕泣彌日嘗疾母憂念晝寢夢見父容色如平生與母語曰愍孫無憂將為國家器不患沈沒但恐富貴終當傾滅耳母未嘗言及粲貴重懼傾滅乃以告之粲故自挹損明帝臨崩粲與褚彥回劉勔並受顧命加班劍二十人給鼓吹一部後廢帝即位加兵五百人元徽元年丁母憂葬竟攝令親職加衞將軍不受性至孝居喪毀甚祖日及祥詔衞軍斷客二年桂陽王休範為逆粲扶曳入殿詔加兵自隨府置佐吏時兵難危急賊已至南掖門諸將意沮咸莫能奮粲慷慨謂諸將帥曰寇賊已逼而衆情離阻孤子受先帝顧託本以死報今日當與褚護軍同死社稷因命左右被馬辭色哀壯於是陳顯達等感激出戰賊即平殄事寧授中書監即本號開府儀同三司領司徒以揚州解為府固不肯移三年徙尚書令衞軍開府如故並固辭服終乃受命加侍中進爵為侯又不受時粲與齊高帝褚彥回劉彥節遞日入直平決萬機粲閑默寡言不肯當事主書每往諮決或高詠對之時立一意則衆莫能改素寡往來門無雜賓閑居高臥一無所接談客文士所見不過一兩人順帝即位遷中書監司徙侍中如故齊高帝既居東府故使粲鎮石頭粲素靜退每有朝命逼切不得已然後方就及詔移石頭即便順旨有周旋人解望氣謂粲曰石頭氣甚凶往必有禍粲不答又給油絡通幰車仗士五十人入殿時齊高帝方革命粲自以身受顧託不欲事二姓密有異圖劉彥節宋氏宗室前湘州刺史王蘊太后兄子素好武事並慮不見容於齊高帝皆與粲結諸將帥黃回任候伯孫曇瓘王宜興彭文之卜伯興等並與粲合昇明元年荊州刺史沈攸之舉兵反齊高帝自詣粲粲稱疾不見粲宗人袁達以為不宜示異同粲曰彼若劫我入臺便無辭以拒一如此不復得出矣時齊高帝入屯朝堂彥節從父弟領軍將軍韞入直門下省卜伯興為直閤黃回諸將皆率軍出新亭粲剋日謀矯太后令使韞伯興率宿衞兵攻齊高帝於朝堂回率軍來應彥節候伯等並赴石頭事泄先是齊高帝遣將薛深蘇烈王天生等領兵戍石頭云以助粲實禦之也又令腹心王敬則為直閤與伯興共總禁兵王蘊聞彥節已奔歎曰今年事敗矣乃狼狽率部曲向石頭薛深等據門射之蘊謂粲已敗乃便散走齊高帝以報敬則敬則誅韞幷伯興又遣軍主戴僧靜向石頭助薛深自倉門入時粲與彥節等列兵登東門僧靜分兵攻府西門彥節與兒踰城出粲還坐列燭自照謂其子最曰本知一木不能止大厦之崩但以名義至此耳僧靜挺身暗往奮刀直前欲斬之子最覺有異大叫抱父乞先死兵士人人莫不隕涕粲曰我不失忠臣汝不失孝子仍求筆作啟云臣義奉大宋策名兩畢今便歸魂墳壠永就山丘僧靜乃幷斬之初粲大明中與蕭惠開周朗同車行逢大耳臼儿開駐車惠開自照鏡曰無年可仕朗執鏡良久曰視死如歸粲最後曰當至三公而不終至是如言最字文高時年十七既父子俱殞左右分散任候伯等其夜並自新亭赴石頭其後皆誅粲小兒數歲乳母將投粲門生狄靈慶靈慶曰吾聞出郎君者有厚賞今袁氏已滅汝匿之尚誰為乎遂抱以首乳母號泣呼天曰公昔於汝有恩故冒難歸汝奈何欲殺郎君以求小利若天地鬼神有知我見汝滅門此兒死後靈慶常見兒騎大滺狗戲如平常經年餘鬬場忽見一狗走入其家遇靈慶於庭噬殺之少時妻子皆沒此狗即袁郎所常騎者也齊永明元年武帝詔曰袁粲劉彥節並與先朝同奬宋室沈攸之於景和之世特有乃心雖末節不終而始誠可錄歲月彌往宜霑優隆於是並命改葬粲省事莫嗣祖粲常所委信與劉彥節等宣密謀至是齊高帝問曰汝知袁粲謀逆何不啟嗣祖曰小人無識曲蒙袁公厚恩實不仰負今日就死分甘官若賜性命亦不忍背粲而獨生也戴僧靜勸殺之帝曰彼各為其主遂赦焉用為省事歷朝所賞梁豫章王直新出閤中旨用嗣祖為師彖字偉才顗弟覬之子也覬好學美才早有清譽仕宋位武陵內史彖少有風氣善屬文及談玄舉秀才歷諸王府參軍不就覬臨終與兄顗書曰史公才識可喜足懋先基矣史公彖小字也及顗見誅宋明帝投尸江中不許斂葬彖與舊奴一人微服求尸四十餘日乃得密瘞石頭後岡身自負土懷其文集未嘗離身明帝崩後乃改葬顗從叔司徒粲祖舅征西將軍蔡興宗並器之仕宋為齊高帝太傅相國主簿秘書丞仕齊為中書郎兼太子中庶子又以中書郎兼御史中丞坐彈謝超宗簡奏依違免官後拜廬陵王諮議時南郡江陵縣人苟蔣之弟胡之婦為曾口寺沙門所淫夜入苟家蔣之殺沙門為官司所檢蔣之列家門穢行欲告則恥欲忍則不可實己所殺胡之列又如此兄弟爭死江陵令宗躬啟州荊州刺史廬江王求博議彖曰夫迅寒急節乃見松筠之操危機迥構方識貞孤之風竊以蔣之胡之殺人原心非暴辯讞之日友于讓生事憐左右義哀行路昔文舉引謗獲漏疏網蔣之心迹同符古人若陷以深刑實傷為善由是蔣之兄弟免死累遷太子中庶子出為冠軍將軍監吳興郡事彖性剛固以微言忤武帝又薄王晏為人晏請交不答武帝在便殿用金柄刀子翦瓜晏在側曰外聞有金刀之言恐不宜用此物帝窮問所以晏曰袁彖為臣說之上銜怒良久彖到郡坐過用祿錢免官付東冶彖妹為竟陵王子良妃子良世子昭冑時年八歲見武帝而形容慘悴帝問其故昭冑流涕曰臣舅負罪今在尚方臣母悲泣不食已積日臣所以不寧帝曰特為兒赦之既而帝遊孫陵望東冶曰冶中有一好貴囚數日與朝臣幸冶履行庫藏因宴飲賜囚徒酒肉敕見彖與語明日釋之後為侍中彖充腴異衆每從射雉郊野數人推扶乃能徒步幼而母卒養於伯母王氏事之如親閨門孝義隆昌元年卒諡靖子彖宗人廓之字思度宏之曾孫也父景雋宋世為淮南太守以非罪見誅廓之終身不聽音樂布衣蔬食足不出門示不臣於宋時人以比晉之王裒顏延之見其幼時歎曰有子如袁廓足矣齊國建方出仕稍至殿中郎王儉柳世隆傾心待之為太子洗馬于時何僴亦稱才子為文惠太子作楊畔歌辭甚側麗太子甚悅廓之諫曰夫楊畔者既非典雅而聲甚哀思殿下當降意簫韶奈何聽亡國之響太子改容謝之昂字千里雍州刺史顗之子也顗敗藏於沙門沙門將以出關關吏疑非常人沙門杖而語之遂免或云顗敗時昂年五歲乳媼攜抱匿於廬山州郡於野求之於乳媼匿所見一彪因去遂免會赦得出猶徙晉安在南唯勤學至元徽中聽還時年十五初顗敗傳首建鄴藏於武庫以漆題顗名以為誌至是始還之昂號慟嘔血絕而復蘇以淚洗所題漆字皆滅人以為孝感葬訖更制服廬于墓次從兄彖常撫視抑譬之昂容質修偉冠絕人倫以父亡不以理終身不聽音樂後與彖同見從叔司徒粲粲謂彖曰昂幼孤而能至此故知名器自有所在仕齊為王儉鎮軍府功曹史儉後為丹陽尹於後堂獨引見昂指北堂謂曰卿必居此累遷黃門郎昂本名千里齊永明中武帝謂曰昂昂千里之駒在卿有之今改卿名為昂即字千里後為衞軍武陵王長史丁母憂哀毀過禮服未除而從兄彖卒昂幼孤為彖所養乃制朞服人有怪而問之昂致書以喻之曰竊聞禮由恩斷服以情申故小功他邦加制一等同爨有緦明之典籍孤子夙以不天幼傾乾蔭資敬未奉過庭莫承藐藐沖年未達朱紫從兄提養訓教示以義方每假其談價虛其聲譽得及人次實亦有由兼開拓房宇處以華曠同財共有恣其取足爾來三十餘年憐愛之至言無異色姊妹孤姪成就一時篤念之深在終彌固此恩此愛畢壤不追既情若同生而服為諸從言心即事實未忍安昔馬棱與從弟毅同居毅亡棱為心服三年由也之不除喪亦緣情而致制雖識不及古誠懷感慕常願千秋之後從服朞齊不圖門衰禍集一旦草土殘息復罹今酷尋惟慟絕彌劇彌深今以餘喘欲遂素志庶寄其罔慕之痛少伸無已之情雖禮無明據乃事有先例率迷而至必欲行之臨紙哽咽言不識次後為御史中丞時尚書令王晏弟詡為廣州多納賕貨昂依事劾奏不憚權家當時號為正直初昂為洗馬明帝為領軍欽昂風素頻降駕焉及踐阼奏事多留與語謂曰我昔以卿有美名親經相詣昂答曰陛下在田之日遂蒙三顧草廬帝甚悅尋出為豫章內史丁所生母憂去職以喪還江路風潮暴駭昂乃縛衣著柩誓同沉溺及風止餘船皆沒唯昂船獲全咸謂精誠所致葬訖起為吳興太守永元末梁武帝起兵州郡望風皆降昂獨拒境帝手書喻之曰夫禍福無門興亡有數天之所棄人孰能匡機來不再圖之宜早頃藉聽道路承欲狼顧一隅既未喻雅懷聊申往意獨夫狂悖振古未聞窮凶極虐歲月滋甚天未絕齊聖明啟運億兆有賴百姓來蘇吾荷任前驅掃除京邑屠潰之期當不云遠兼熒惑出端門太白入氐室天文表於上人事符於下不謀同契實在茲辰且范岫申冑久薦誠款各率所守仍為掎角而足下欲以區區之郡禦堂堂之師根本既傾枝葉安附今竭力昏主未足為忠家門屠滅非所謂孝忠孝俱盡將欲何依去就之宜幸加詳擇昂答曰都史至辱誨承藉以衆論謂僕有勤王之舉兼蒙誚責獨無送款循復嚴旨若臨萬仞三吳內地非用兵之所況以偏隅一郡何能為役近奉敕以此境多虞見使安慰自承麾斾屆止莫不膝袒軍門唯僕一人敢後至者正以自揆庸素文武無施直是陳國賤男子耳雖欲獻心不增大軍之勇置其愚默寧沮衆帥之威幸藉將軍含弘之大可得從容以禮竊以一𧹞微施尚復投殞況食人之祿而頓忘一旦非唯物議不可亦恐明公鄙之建康城平昂舉哀慟哭時帝使豫州刺史李元履巡撫東土敕元履曰袁昂道素之門世有忠節天下須共容之勿以兵威陵辱元履至宣旨昂亦不請降開門徹備而已及至帝亦不問其過天監二年以為後軍臨川王參軍事昂啟謝曰恩隆絕望之辰慶集冥心之日焰灰非喻荑枯未擬摳衣聚足顛狽不勝臣徧歷三墳備詳六典巡校賞罰之科洞檢生死之律莫不嚴五辟於明君之朝峻三章於聖主之日是以塗山始會致防風之誅酆邑方搆有崇侯之伐未有緩憲於斮戮之人賒刑於耐罪之族出萬死入一生如臣者也推恩及罪在臣實大披心瀝血敢乞言之臣東國賤人學行何取既殊鳴雁直木固無結綬彈冠徒藉羽儀易農就仕往年濫職守秩東隅仰屬龔行風驅電掩當其時也負鼎圖者日至執玉帛者相望獨在愚臣頓昏大義徇鴻毛之輕忘同德之重但三吳險薄五湖交通屢起田儋之變每懼殷通之禍空慕君魚保境遂失師涓抱器後至者斬臣甘斯戮明刑徇衆誰曰不然幸因約法之弘承解網之宥猶當降等薪粲遂乃頓釋鉗赭斂骨吹魂還編黔庶濯疵蕩穢入楚遊陳天波既洗雲油遽沐古人有言非死之難處死之難臣之所荷曠古不書臣之所死未知何地武帝答曰朕遺射鉤卿無自外尋為侍中遷吏部尚書帝謂曰齊明帝用卿為黑頭尚書我用卿為白頭尚書良以多愧對曰臣生四十七年于茲矣四十以前臣之自有七年以後陛下所養七歲尚書未為晚達帝曰士固不妄有名十五年為尚書左僕射尋為尚書令時僕射徐勉勢傾天下在昂處宴賓主甚歡勉求昂出內人傳盃昂良久不出勉苦求之昂不獲已命出五六人始至齋閤昂謂勉曰我無少年老嫗並是兒母非王妃母便是主大家今令問訊卿勉聞大驚求止方知昂為貴昂在朝謇諤世號宗臣昭明太子薨立晉安王綱為皇太子昂獨表言宜立昭明長息歡為皇太孫雖不見用擅聲朝野自是告老乞骸骨不干時務昂雅有人鑒遊處不雜入其門者號登龍門大通中位司空大同六年薨時年八十詔即日舉哀初昂臨終遺疏不受贈諡敕諸子不得言上行狀及立銘誌凡有所須悉皆停省因復曰吾釋褐從仕不期富貴但官序不失等倫衣食粗知榮辱以此闔棺無慚鄉里往忝吳興屬在昏明之際既闇於前覺無誠於聖朝不識天命甘貽顯戮幸遇殊恩得全門戶自念負罪私門階榮望絕保存性命以為幸甚不謂叨竊寵靈一至於此常欲竭誠酬報申吾乃心所以朝廷每興師北伐吾輒啟求行誓之丹款實非矯言既庸懦無施皆不蒙許雖欲罄命其議莫從今日瞑目畢恨泉壤聖朝遵古如吾名品或有追遠之恩脫有贈官慎勿祗奉諸子累表陳奏詔不許諡曰穆正公有集二十卷初昂之歸梁有馬仙琕者亦以義烈稱仙琕字靈馥扶風郿人父伯鸞宋冠軍司馬仙琕少以果敢聞父憂毀瘠過禮負土成墳手植松栢仕齊位豫州刺史梁武起兵使其故人姚仲賓說之仙琕先為設酒乃斬於軍門以徇帝又遣其族叔懷遠說之仙琕曰大義滅親又命斬之懷遠號泣軍中為請乃免武帝至新林仙琕猶於江西日抄運漕建康城平仙琕舉哀謂衆曰我受人任寄義不容降今衆寡不侔勢必屠滅公等雖無二心其如親老何我為忠臣君為孝子各盡其道不亦可乎於是悉遣城內兵出降餘壯士數十閉門獨守俄而兵入圍之數十重仙琕令士皆持滿兵不敢近日晚乃投弓曰諸君但來見取我義不降乃檻送建康至石頭而脫之帝使待袁昂至俱入曰使天下見二義士帝勞之曰射鉤斬袪昔人弗忌卿勿以戮使斷運苟自嫌絕也謝曰小人如失主犬後主飼之便復為用帝笑而美之俄而母卒帝知其貧賻給甚厚仙琕號泣謂弟仲艾曰蒙大造之恩未獲上報今復荷殊澤當與爾以心力自効耳天監四年師侵魏仙琕每戰冠三軍與諸將論議口未嘗言功人問其故仙琕曰大丈夫為時所知當進不求名退不逃罪乃平生願也何功可論為南義陽太守累破山蠻郡境清謐以功封去洭縣伯遷司州刺史進號貞威將軍魏豫州人白早生使以懸瓠來降武帝使仙琕赴之又遣直閤將軍武會超馬廣率衆為援仙琕進頓楚王城遣副將齊苟兒助守懸瓠魏中山王英攻懸瓠執齊苟兒進禽馬廣送洛陽仙琕不能救會超等亦相次退散魏軍進據三關仙琕坐徵還為雲騎將軍十年朐山人殺琅邪太守劉晰以城降魏詔假仙琕節討之魏徐州刺史盧昶以衆十餘萬赴焉仙琕累戰破走之進爵為侯遷豫州刺史加都督仙琕自為將及居州郡能與士卒同勞逸身衣不過布帛所居無幃幕衾屏行則飲食與厮養最下者同其在邊境常單身潛入敵境伺知壁壘村落險要處所攻戰多剋捷士卒亦甘心為用帝雅愛仗之卒於州贈左衞將軍諡曰剛初仙琕幼名仙婢及長以婢名不典乃以玉代女云子巖夫嗣昂子君正字世忠少聰敏年數歲父疾晝夜不眠專侍左右家人勸令暫臥答曰官既未差眠亦不安歷位太子庶子君正美風儀善自居處以貴公子早得時譽為豫章內史性不信巫邪有師萬世榮稱道術為一郡巫長君正在郡小疾主簿熊岳薦之師云須疾者衣為信命君正以所著襦與之事竟取襦云神將送與北斗君君正使檢諸身於衣𩹉獲之以為亂政即刑於市而焚神一郡無敢行巫遷吳郡太守侯景亂率數百人隨邵陵王綸赴援及臺城陷還郡君正當官莅事有名稱而蓄聚財產服玩靡麗賊遣張太墨攻之新城戍主戴僧易勸令拒守己以戍兵自外擊之君正不能決吳人陸映公等懼不濟賊種族其家勸之迎賊君正性怯懦乃送米及牛酒郊迎賊賊掠奪其財物子女因是感疾卒子樞樞字踐言美容儀性沈靜好學手不釋卷家本顯貴貲產充積而樞獨處率素傍無交往非公事未嘗出游榮利之懷淡如也侯景之亂樞往吳郡省父疾丁父憂時四方擾亂人求苟免樞居喪以至孝聞王僧辯平侯景鎮建鄴衣冠爭往造請樞杜門靜居不求聞達紹泰中歷吏部尚書吳興郡太守陳永定中徵為侍中掌選遷都官尚書掌選如故樞博學明悉舊章初陳武帝長女永嗣公主先適陳留太守錢蕆生子岊主及岊並卒于梁時武帝受命唯主追封至是將葬尚書請議加蕆駙馬都尉幷贈岊官樞議曰昔王姬下嫁必適諸侯同姓為主聞於公羊之說車服不繫顯於詩人之篇漢氏初興列侯尚主自斯以後降嬪素族駙馬都尉置由漢武或以假諸功臣或以加於戚屬是以魏曹植表駙馬奉車取為一號齊職儀曰凡尚公主必拜駙馬都尉魏晉以來因為瞻準蓋以王姬之重庶姓之輕若不加其等級寧可合巹而酳所以假駙馬之位乃崇於皇女也今公主早薨伉儷已絕既無禮數致疑何須駙馬之授案杜預尚晉宣帝第二女晉武踐阼而主已亡泰始中追贈公主元凱無復駙馬之號梁文帝女新安穆公主早薨天監初王氏無追拜之事遠近二例足以校明無勞此授今宜追贈亭侯時議以為當天嘉三年為吏部尚書領丹陽尹以葬父拜表自解詔令葬訖停宅視郡事服闋還職時僕射到仲舉雖參掌選事銓衡汲引並出於樞舉薦多會上旨謹慎周密清白自居文武職司鮮有遊其門者廢帝即位遷尚書左僕射卒諡曰簡懿有集十卷行於世弟憲憲字德章幼聰敏好學有雅量梁武帝修建庠序別開五館其一館在憲宅西憲常招引諸生與之談論新義出人意表同輩咸嗟服焉大同八年武帝撰孔子正言章句下國學宣制旨義憲時年十四被召為正言生祭酒到溉目送之愛其神采國子博士周弘正謂憲父君正曰賢子今茲欲策試不君正曰未敢令試居數日君正遣門客岑文豪與憲候弘正會弘正將升講坐弟子異集乃延憲入室授以麈尾令憲豎義時謝岐何妥在坐弘正謂曰二賢雖窮奧賾得無憚此後生邪何謝乃遞起義端深極理致憲與往復數番酬對閑敏弘正謂妥曰恣卿所問勿以童幼期之時觀者重沓憲神色自若辯論有餘弘正亦起數難終不能屈因告文豪曰卿還諮袁吳郡此郎已堪見代博士矣時生徒對策多行賄賂文豪請具束脩君正曰我豈能用錢為兒買第邪學司銜之及憲試爭起劇難憲隨問抗答剖析如流到溉顧憲曰袁君正其有後矣及君正將之吳郡溉祖道於征虜亭謂君正曰昨策生蕭敏孫徐孝克非不解義至於風神器局去賢子遠矣尋舉高第以貴公子選尚南沙公主即梁簡文帝女也大同元年釋褐祕書郎遷太子舍人侯景寇逆憲東之吳郡尋丁父憂哀毀過禮陳武帝作相除司徒戶曹初謁遂抗禮長揖中書令王勱謂憲曰卿何矯衆不拜錄公憲曰於理不應致拜衞尉趙知禮曰袁生舉止詳中故有陳汝之風陳受命授中書侍郎兼散騎常侍與黃門郎王瑜使齊數年不遣天嘉初乃還太建三年累遷御史中丞羽林監時豫章王叔英不奉法度逼取人馬憲依事劾奏免叔英自是朝野嚴憚憲詳練朝章尤明聽斷至有獄情未盡而有司具法者即伺閑為帝言之所申理甚衆嘗陪宴承香閤賓退後宣帝留憲與衞尉樊俊徙席山亭談宴終日帝謂俊曰袁家故為有人其見重如此自侍中遷吳郡太守以父任固辭改授南康內史遷吏部尚書憲以久居清顯累表自求解任帝曰諸人在職屢有謗書卿處事已多可謂清白別相甄錄且勿致辭遷右僕射參掌選事先是憲長兄樞為左僕射至是憲為右僕射臺省目樞為大僕射憲為小僕射朝廷榮之及宣帝不豫憲與吏部尚書毛喜俱受顧命始興王叔陵之肆逆也憲指麾部分預有力焉後主被創病篤執憲手曰我兒尚幼後事委卿憲曰羣情喁喁冀聖躬康復後事之委未敢奉詔以功封建安縣伯領太子中庶子尋除侍中太子詹事及太子加元服行釋奠禮憲表請解職不許尋給扶二人皇太子頗不率典訓憲手表陳諫十條皆援引古今言辭切直太子雖外示容納心無悛改後主欲立寵姬張貴妃子始安王為嗣嘗從容言之吏部尚書蔡徵順旨稱贊憲厲色折之曰皇太子國家儲副億兆宅心卿是何人輕言廢立然是夏竟廢太子為吳興王後主知憲有規諫之事歎曰袁德章實骨鯁臣即日詔為尚書僕射禎明三年隋軍來伐隋將賀若弼進燒宮城北掖門兵衞皆散走朝士各藏唯憲侍左右後主謂曰我從來待卿不先餘人今日見卿可謂歲寒知松栢後凋也非唯由我無德亦是江東衣冠道盡後主將避匿憲正色曰北兵之入必無所犯大事如此陛下安之臣願陛下依梁武見侯景故事以待之不從因下榻馳去憲從出後堂景陽殿後主投井中憲拜哭而出及至長安隋文帝嘉其雅操下詔以為江表稱首授開府儀同三司昌州刺史開皇十四年授晉王廣府長史十八年卒時年七十贈大將軍安成郡公諡曰簡長子承家仕隋至祕書丞國子司業君正弟敬敬字子恭純素有風格幼便篤學老而無倦仕梁位太子中舍人魏剋江陵流寓嶺表陳武帝受禪敬在廣州依歐陽頠頠卒其子紇據州將有異志敬累諫不從宣帝即位遣章昭達討紇紇將敗恨不納敬言朝廷義之徵為太子中庶子歷左戶都官二尚書太常卿散騎常侍金紫光祿大夫加特進至德三年卒諡靖德子子元友嗣敬弟泌泌字文洋清正有幹局容體魁岸志行修謹仕梁歷諸王府佐侯景之亂泌兄君正為吳郡太守梁簡文帝在東宮板泌為東宮領直令往吳中召募士卒及景圍臺城泌率所領赴援城陷依鄱陽嗣王範範卒泌降景景平王僧辯表泌為富春太守兼丹陽尹貞陽侯明僭位以為侍中使於齊陳武帝受禪泌自齊從梁永嘉王莊往王琳所及莊稱尊號以泌為侍中丞相長史琳敗衆皆散唯泌輕舟送達于北境屬莊於御史中丞劉仲威然後拜辭歸陳請罪文帝深義之累遷通直散騎常侍兼侍中聘周及宣帝入輔以泌為司徒左長史卒于官臨終戒其子芳華曰吾於朝廷素無功績瞑目之後斂手足旋葬無得受贈諡其子述泌遺意朝廷不許贈金紫光祿大夫諡曰質論曰天長地久四時代謝靈化悠遠生不再來所以據洪圖而輕天下吝寸陰而賤尺璧夫義重於生空傳前誥投軀徇主罕遇其人觀夫宋齊以還袁門世蹈忠義固知風霜之概松筠其性乎若無陽源之節丹青夫何取貴顗雖末路披猖原心有本彖之出處所蹈實懋家風粲執履之迹近乎仁勇古人所謂疾風勁草豈此之謂乎昔王經峻節既被旌於晉世粲之貞固亦改葬於齊朝其激厲之方異代同符者矣昂命屬崩離身逢危季雖獨夫喪德臣節無改拒梁武之命義烈存焉隆從兄之服悌心高已既而抗言儲嗣無忘直道辭榮身後有心黜殯自初及末無虧風範從微至著皆為稱職蓋一代之名公也樞風格峻整憲仁義率由韓子稱人臣委質心無有二憲弗渝歲暮良可稱云敬泌立履之地亦不為替矣
