body:
  text: 南史卷八梁本紀下第八太宗簡文皇帝諱綱字世讚小字六通武帝第三子昭明太子母弟也天監二年十月丁未生于顯陽殿五年封晉安王普通四年累遷都督雍州刺史中大通三年被徵入朝未至而昭明太子謂左右曰我夢與晉安王對奕擾道我以班劍授之王還當有此加乎四月昭明太子薨五月丙申立晉安王為皇太子七月乙亥臨軒策拜以修繕東宮權居東府四年九月移還東宮太清三年臺城陷太子坐永福省見侯景神色自若無懼容五月丙辰帝崩辛巳太子即皇帝位大赦癸未追尊穆貴嬪為皇太后追諡妃王氏為簡皇后六月丙戌以南康王會理為司空丁亥立宣城王大器為皇太子壬辰立當陽公大心為尋陽郡王石城公大款為江夏郡王寧國公大臨為南海郡王臨城公大連為南郡王西豐公大春為安陸郡王新淦公大成為山陽郡王臨湘公大封為宜都郡王高唐公大莊為新興郡王秋七月甲寅廣州刺史元景仲謀應侯景西江督護陳霸先攻之景仲自殺霸先迎定州刺史蕭勃為刺史庚午以司空南康王會理為兼尚書令是月九江大饑人相食者十四五八月癸卯征東大將軍開府儀同三司南徐州刺史蕭藻薨丙午侯景矯詔儀同三司位比正公自今悉不加將軍以為定準冬十月丁未地震是月百濟國遣使朝貢見城寺荒蕪哭于闕下大寶元年春正月辛亥朔大赦改元丁巳天雨黃沙己未西魏剋安陸執司州刺史柳仲禮盡有漢東地丙寅月晝見于東方癸酉前江都令祖皓起義兵于廣陵二月癸未侯景攻下廣陵皓見害乙巳以尚書僕射王克為左僕射丙午侯景逼帝幸西州夏五月丙辰東魏靜帝遜位于齊庚午開府儀同三司鄱陽王範薨自春迄夏大旱人相食都下尤甚六月庚子前司州刺史羊鴉仁自尚書省出奔江陵秋七月戊辰賊行臺任約寇江州刺史尋陽王大心以州降之八月甲午湘東王繹遣領軍將軍王僧辯逼郢州邵陵王綸棄郢州走九月乙亥侯景自進位相國封二十郡為漢王冬十月乙未景又逼帝幸西州曲宴自加宇宙大將軍都督六合諸軍事立皇子大鈞為西陽郡王大威為武寧郡王大球為建安郡王大昕為義安郡王大摯為綏建郡王大圜為樂梁郡王壬寅侯景害司空南康王會理十一月任約進據西陽分兵寇齊昌執衡陽王獻送都下害之湘東王繹遣前寧州刺史徐文盛拒約南郡王前中兵參軍張彪起義於會稽若邪山攻破浙東諸縣二年春二月邵陵王綸走至安陸董城為魏所攻見殺三月庚戌魏文帝崩夏四月侯景圍巴陵六月乙巳解圍宵遁秋七月景還至建鄴八月戊午景遣偽衞尉卿彭雋廂公王僧貴入殿廢帝為晉安王害皇太子大器尋陽王大心西陽王大鈞武寧王大威建安王大球義安王大昕及尋陽王諸子二十餘人矯為帝詔以為次當支庶宜歸正嫡禪位于豫章王棟使呂季略送詔令帝寫之帝書至先皇念神器之重思社稷之固越升非次遂主震方嗚咽不能自止賊衆皆為掩泣乃幽帝于永福省棟即位改元天正使害南海王大臨於吳郡南郡王大連於姑孰安陸王大春於會稽新興王大莊於京口冬十月壬寅帝崩於永福省時年四十九賊偽諡曰明皇帝廟稱高宗明年三月己丑王僧辯平侯景率百官奉梓宮升廟堂元帝追崇為簡文皇帝廟號太宗四月乙丑葬莊陵帝幼而聰睿六歲便能屬文武帝弗之信於前面試帝攬筆立成文武帝歎曰常以東阿為虛今則信矣及長器宇寬弘未嘗見喜慍色尊嚴若神方頤豐下須鬢如畫直髮委地雙眉翠色項毛左旋連錢入背手執玉如意不相分辨眄睞則目光燭人讀書十行俱下辭藻艷發博綜羣言善談玄理自十一便能親庶務歷試藩政所在稱美性恭孝居穆貴嬪憂哀毀骨立所坐席霑濕盡爛在襄陽拜表侵魏遣長史柳津司馬董當門壯武將軍杜懷寶振遠將軍曹義宗等進軍剋南陽新野等都拓地千餘里及居監撫多所弘宥文案簿領纖豪必察弘納文學之士賞接無倦嘗於玄圃述武帝所製五經講疏聽者傾朝野雅好賦詩其自序云七歲有詩癖長而不倦然帝文傷於輕靡時號宮體所著昭明太子傳五卷諸王傳三十卷禮大義二十卷長春義記一百卷法寶連璧三百卷謝客文涇渭三卷玉簡五十卷光明符十二卷易林十七卷竈經二卷沐浴經三卷馬槊譜一卷品五卷彈譜一卷新增白澤圖五卷如意方十卷文集一百卷並行於世初即位制年號將曰文明以外制強臣取周易內文明而外柔順之義恐賊覺乃改為大寶雖在蒙塵尚引諸儒論道說義披尋墳史未嘗暫釋及見南康王會理誅知不久指所居殿謂舍人殷不害曰龐涓死此下又曰吾昨夢吞土試思之不害曰昔重耳饋塊卒反晉國陛下所夢將符是乎帝曰儻幽冥有徵冀斯言不妄初景納帝女溧陽公主公主有美色景惑之妨於政事王偉每以為言景以告主主出惡言偉知之懼見讒乃謀廢帝而後間主苦勸行殺以絕衆心廢後王偉乃與彭儁王脩纂進觴於帝曰丞相以陛下幽憂既久使臣上壽帝笑曰已禪帝位何得言陛下此壽酒將不盡此乎於是儁等幷齎酒餚曲項琵琶與帝極飲帝知將見殺乃盡酣謂曰不圖為樂一至於斯既醉而寢偉乃出儁進土囊王脩纂坐上乃崩竟協於夢偉撤戶扉為棺遷殯于城北酒庫中帝自幽縶之後賊乃撤內外侍衞使突騎圍守牆垣悉有枳棘無復紙乃書壁及板鄣為文自序云有梁正士蘭陵蕭世讚立身行道終始若一風雨如晦雞鳴不已弗欺暗室豈況三光數至於此命也如何又為文數百篇崩後王偉觀之惡其辭切即使刮去有隨偉入者誦其連珠三首詩四篇絕句五篇文並悽愴云世祖孝元皇帝諱繹字世誠小字七符武帝第七子也初武帝夢眇目僧執香鑪稱託生王宮既而帝母在采女次侍始褰戶幔有風回裾武帝意感幸之采女夢月墮懷中遂孕天監七年八月丁巳生帝舉室中非常香有紫胞之異武帝奇之因賜采女姓阮進為修容十三年封湘東王太清元年累遷為鎮西將軍都督荊州刺史三年三月侯景陷建鄴四月世子方等至自建鄴知臺城不守帝命柵江陵城周回七十里鎮西長史王沖等拜牋請為太尉都督中外諸軍事承制主盟帝不許曰吾於天下不賤寧俟都督之名帝子之尊何藉上台之位議者可斬投筆流淚沖等重請不從又請為司空以主諸侯亦弗聽乃開鎮西府辟天下士是月帝徵兵於湘州刺史河東王譽譽拒命尋上甲侯韶自建鄴至宣三月十五日密詔授帝位假黃鉞大都督中外諸軍事司徒承制於是立行臺於南郡而置官司焉七月遣世子方等討河東王譽軍敗死之又遣鎮兵將軍鮑泉討譽九月乙卯雍州刺史岳陽王詧舉兵寇江陵其將杜崱兄弟來降詧遁走鮑泉攻湘州未剋又遣左衞將軍王僧辯代將及簡文帝即位改元為大寶元年帝以簡文制于賊臣卒不遵用正月使少子方晷質于魏魏不受質而結為兄弟四月剋湘州斬譽湘州平雍州刺史岳陽王詧自稱梁王蕃于魏魏遣兵助伐襄陽先是邵陵王綸書已言凶事祕之以待湘州之捷是月壬寅始命陳瑩報武帝崩問帝哭于正寢六月江夏王大款山陽王大成宜都王大封自信安來奔九月辛酉以前郢州刺史南平王恪為中衞將軍尚書令開府儀同三司改封大款為臨川郡王大成為桂陽郡王大封為汝南郡王十一月甲子南平王恪等奉牋進位相國總百揆帝不從二年三月侯景悉兵西上四月景遣其將宋子仙任約襲郢州執刺史方諸庚戌領軍王僧辯屯師巴陵五月癸未帝遣將胡僧祐陸法和援巴陵六月僧祐等擊破景將任約軍禽約景解圍宵遁以王僧辯為征東將軍開府儀同三司尚書令帥衆追景所至皆捷進圍郢州獲賊將宋子仙等九月盤盤國獻馴象十月辛丑朔紫雲如蓋臨江陵城是月簡文帝崩開府儀同三司王僧辯等奉表勸進帝奉諱大臨三日百官縞素答表不許司空南平王恪率宗室領軍將軍胡僧祐率羣僚江州別駕張佚率吏人並奉牋勸進帝固讓十一月乙亥僧辯又奉表勸進又不從時巨寇尚存帝未欲即位而四方表勸前後相屬乃下令斷表承聖元年二月王僧辯衆軍發自尋陽帝馳檄四方購獲景及逆者封萬戶開國公絹布五萬疋三月僧辯等平景傳首江陵戊子以賊平告明堂太社己丑僧辯等又表勸進曰衆軍以今月戊子總集建康賊景鳥伏獸窮頻擊頻挫姦竭詐盡深溝自固臣等分勒武旅百道同趨突騎短兵犀函鐵楯結隊千羣持戟百萬止紂七步圍項三重轟然大潰羣凶四滅京師少長俱稱萬歲長安酒食於此價高九縣雲開六合清朗矧伊黔首誰不載躍伏惟陛下咀痛茹哀嬰憤忍酷自紫庭絳闕胡塵四起壖垣好畤冀馬雲屯泣血臨兵嘗膽誓衆而吳楚一家方與七國俱反管蔡流言又以三監作亂西涼義衆阻秦塞而不通幷州遺黎跨飛狐而見絕豺狼當路非止一人鯨鯢不梟焉五載英武克振怨並雪永尋霜露伊何可勝臣等輒依故實奉修社廟使者持節分告園陵嗣后升遐龍輴未殯承華掩曜梓宮莫測並即隨由備辦禮具凶荒四海同哀六軍袒哭聖情孝友理當感慟日者百司岳牧仰祈宸鑒以錫珪之功既歸有道當璧之禮允屬聖明而優詔謙冲杳然凝邈飛龍可躋而乾爻在四帝閽云叫而閶闔未開謳歌再馳是用翹首所以越人固執熏丹穴以求君周人樂推踰岐山而事主漢王不即位無以貴功臣光武止蕭王豈謂紹宗廟黃帝遊於襄城尚訪御人之道放勛寂於姑射猶使鐏俎有歸伊此儻來豈聖人所欲帝王所應不獲已而然伏讀璽書尋諷制旨領懷物外未奉慈衷陛下日角龍顏之姿表於徇齊之日彤雲素靈之瑞基於應物之初博學則大哉無所與名深言則曄乎文章之觀忠為令德孝實動天加以英威茂略雄圖武算指麾則丹浦不戰顧眄則阪泉自蕩地維絕而重紐天柱傾而更植鑿河津於孟門百川復啟補穹儀以五石萬物再生縱陛下拂袗衣而游廣成登粬山而去東土羣臣安得仰訴兆庶何所歸仁況郊祀配天罍篚禮曠齋宮清廟匏竹不陳仰望鸞輿匪朝伊夕瞻言法駕載渴且飢豈可久稽衆議有曠彝則舊邦凱復函洛已平高奴櫟陽宮館雖毀濁河清渭佳氣猶存臯門有伉甘泉四敞土圭測景仙人承露斯蓋九州之赤縣六合之樞機博士捧圖書而稍還太常定禮儀其已立豈得不揚清警而赴名都具玉鑾而旋正寢昔東周既遷鎬京遂其不復長安一亂郟洛永以為居夏后以萬國朝諸侯文王以六州匡天下方之跡基百里劍仗三尺以殘楚之地抗拒六戎一旅之卒翦夷三叛坦然大定御輦東歸解五牛於冀州秣六馬於譙郡緬求前古其可得歟對揚天命無所讓德有理存焉敢重祈奏帝尚未從辛卯宣猛將軍朱買臣奉帝密旨害豫章王棟及其二弟橋樛四月乙巳益州刺史新除假黃鉞太尉武陵王紀僭位於蜀年號天正帝遣兼司空蕭泰祠部尚書樂子雲拜謁塋陵修復社廟丁巳下令解嚴五月庚午司空南平王恪及宗室王侯大都督王僧辯等復拜表上尊號帝猶固讓甲申以開府儀同三司江州刺史王僧辯為司徒乙酉斬賊左僕射王偉尚書呂季略少府卿周石珍舍人嚴亶於江陵市乃下令赦境內齊將潘樂辛術等攻秦郡王僧辯遣將杜崱帥衆拒之以陳霸先為征北大將軍開府儀同三司徐州刺史齊人賀平侯景八月武陵王紀率巴蜀之衆東下遣護軍將軍陸法和屯巴峽以拒之九月甲戌司空南平王恪薨十月乙未前梁州刺史蕭循自魏至江陵以為平北將軍開府儀同三司戊申執湘州刺史王琳於殿內庚戌琳長史陸納及其將潘烏累等舉兵反攻陷湘州是月四方征鎮王公卿士復勸進表三上乃許之冬十一月丙子皇帝即位於江陵改太清六年為承聖元年逋租宿責並許弘宥孝子順孫悉皆賜爵長徒鎻士特加原宥禁錮奪勞一皆曠蕩是日帝不升正殿公卿陪列而已時有兩日俱見己卯立王太子方矩為皇太子改名元良立皇子方智為晉安郡王方略為始安郡王追尊所生妣阮脩容為文宣太后改諡忠壯太子為武烈太子封武烈子莊為永嘉王是月陸納遣將軍潘烏累等破衡州刺史丁道貴於淥口道貴走零陵十二月陸納分兵襲巴陸湘州刺史蕭循擊走之天門山獲野人出山三日而死星隕吳郡淮南有野象數百壞人室廬宣城郡猛獸暴食人是歲魏廢帝元年二年春正月乙丑詔王僧辯討陸納戊寅以吏部尚書王襃為尚書右僕射己卯江夏宮南門籥牡飛三月庚寅有兩龍見湘州西江夏五月甲申魏大將尉遲迥進兵逼巴西潼州刺史楊乾運以城納迥己丑武陵王紀軍至西陵六月乙卯王僧辯平湘州秋七月武陵王紀衆大潰見殺八月戊戌尉遲迥平蜀九月齊遣郭元建及將邢杲遠步大汗薩東方老帥衆頓合肥冬十一月辛酉僧辯留鎮姑孰豫州刺史侯瑱據東關壘徵吳興太守裴之橫帥衆繼之戊戌以尚書右僕射王襃為左僕射湘東太守張綰為右僕射十二月宿預土人東方光據城歸化齊江西州郡皆起兵應之三年春正月魏帝為相安定公所廢而立齊王廓是為恭帝元年三月主衣庫見黑蛇長丈許數十小蛇隨之舉頭高丈餘南望俄失所在帝又與宮人幸玄洲苑復見大蛇盤屈於前羣小蛇遶之並黑色帝惡之宮人曰此非怪也恐是錢龍帝敕所司即日取數千萬錢鎮於蛇處以厭之因設法會赦囚徒振窮乏退居栖心省又有蛇從屋墮落帝帽上忽然便失又龍光殿上所御肩輿復見小蛇縈屈輿中以頭駕夾膝前金龍頭上見人走去逐之不及城濠中龍騰出煥爛五色竦躍入雲六七小龍相隨飛去羣魚騰躍墜死於陸道龍處為窟若數百斛圌舊大城上常有紫氣至是稍復消歇甲辰以司徒王僧辯為太尉車騎大將軍戊申以護軍將軍郢州刺史陸法和為司徒夏四月癸酉以征北大將軍開府儀同三司陳霸先為司空六月癸未有黑氣如龍見于殿內秋九月辛卯帝於龍光殿述老子義先是魏使宇文仁恕來聘齊使又至江陵帝接仁恕有闕魏相安定公憾焉乙巳使柱國萬紐于謹來攻冬十月丙寅魏軍至襄陽梁王蕭詧率衆會之丁卯停講內外戒嚴輿駕出行城柵大風拔木丙子續講百僚戎服以聽詔徵王僧辯十一月甲申幸津陽門講武置南北兩城主帝親觀閱風雨總集部分未交旗幟飄亂帝趣駕而無復次序風雨隨息衆竊驚焉乙酉以領軍胡僧祐為都督城東城北諸軍事右僕射張綰為副左僕射王襃都督城西城南諸軍事直殿省元景亮為副丁亥魏軍至柵下丙申徵廣州刺史王琳入援丁酉大風城內火燒居人數千家以為失在婦人斬首尸之是日帝猶賦詩無廢以胡僧祐為開府儀同三司庚子信州刺史徐世譜晉安王司馬任約軍次馬頭岸是夜有流星墜城中帝援蓍筮之卦成取龜式驗之因抵于地曰吾若死此下豈非命乎因裂帛為書催僧辯曰吾忍死待公可以至矣戊申胡僧祐朱買臣等出戰買臣敗績辛亥魏軍大攻帝出枇杷門親臨陣督戰僧祐中流矢薨軍敗反者斬西門守卒以納魏軍帝見執如梁王蕭詧營甚見詰辱他日乃見魏僕射長孫儉譎儉云埋金千斤於城內欲以相贈儉乃將帝入城帝因述詧相辱狀謂儉曰向聊相譎欲言耳豈有天子自埋金乎儉乃留帝於主衣庫十二月丙辰徐世譜任約退戍巴陵辛未魏人戕帝明年四月梁王方智承制追尊為元皇帝廟號世祖帝聰悟俊朗天才英發出言為論音響若鍾年五六歲武帝嘗問所讀書對曰能誦曲禮武帝使誦之即誦上篇左右莫不驚歎初生患眼醫療必增武帝自下意療之遂盲一目乃憶先夢彌加愍愛及長好學博極羣書武帝嘗問曰孫策在江東于時年幾答曰十七武帝曰正是汝年帝性不好聲色頗慕高名為荊州刺史起州學宣尼廟嘗置儒林參軍一人勸學從事二人生三十人加廩餼帝工書善畫自圖宣尼像為之贊而書之時人謂之三絕與裴子野劉顯蕭子雲張纘及當時才秀為布衣交常自比諸葛亮桓溫惟纘許焉性好矯飾多猜忌於名無所假人微有勝己者必加毀害帝姑義興昭長公主子王銓兄弟八九人有盛名帝妬害其美遂改寵姬王氏兄王珩名琳以同其父名忌劉之遴學使人鴆之如此者甚衆雖骨肉亦徧被其禍始居文宣太后憂依丁蘭作木母及武帝崩祕喪逾年乃發凶問方刻檀為像置于百福殿內事之甚謹朝夕進蔬食動靜必啟聞迹其虛矯如此性愛書籍既患目多不自執卷置讀書左右番次上直晝夜為常略無休已雖睡卷猶不釋五人各伺一更致達曉常眠熟大鼾左右有睡讀失次第或偷卷度紙帝必驚覺更令追讀加以檟楚雖戎略殷湊機務繁多軍書羽檄文章詔誥點毫便就殆不游手常曰我韜於文士愧於武夫論者以為得言始在尋陽夢人曰天下將亂王必維之又背生黑子巫媼見曰此大貴不可言初武帝敕賀革為帝府諮議使講三禮革西上意甚不悅過別御史中丞江革江革告之曰吾嘗夢主上徧見諸子至湘東王脫帽授之此人後必當璧卿其行乎革頷之及太清之禍遂膺歸運自侯景之難州郡太半入魏自巴陵以下至建康緣以長江為限荊州界北盡武寧西拒峽口自嶺以南復為蕭勃所據文軌所同千里而近人戶著籍不盈三萬中興之盛盡於是矣武陵之平議者欲因其舟艦遷都建鄴宗懍黃羅漢皆楚人不願移帝及胡僧祐亦俱未欲動僕射王襃左戶尚書周弘正驟言即楚非便宗懍及御史中丞劉懿以為建鄴王氣已盡且渚宮洲已滿百於是乃留尋而歲星在井熒惑守心帝觀之慨然而謂朝臣文武曰吾觀玄象將恐有賊但吉凶在我運數由天避之何益及魏軍逼閽人朱買臣按劍進曰惟有斬宗懍黃羅漢可以謝天下帝曰曩實吾意宗黃何罪二人退入於人中及魏人燒柵買臣謝答仁勸帝乘暗潰圍出就任約帝素不便馳馬曰事必無成徒增辱耳答仁又求自扶帝以問僕射王襃襃曰答仁侯景之黨豈是可信成彼之勳不如降也乃聚圖書十餘萬卷盡燒之答仁又請守子城收兵可得五千人帝然之即授城內大都督以帝鼓吹給之配以公主既而又召王襃謀之答仁請入不得歐血而去遂使皇太子王襃出質請降有頃黃門郎裴政犯門而出帝乘白馬素衣出東門抽劍擊闔曰蕭世誠一至此乎魏師至凡二十八日徵兵四方未至而城見剋在幽逼求酒飲之製詩四絕其一曰南風且絕唱西陵最可悲今日還蒿里終非封禪時其二曰人世逢百六天道異貞何言異螻蟻一旦損鵾鵬其三曰松風侵曉哀霜雰當夜來寂寥千載後誰畏軒轅臺其四曰夜長無歲月安知秋與春原陵五樹杏空得動耕人梁王詧遣尚書傅準監行刑帝謂之曰卿幸為我宣行準捧詩流淚不能禁進土囊而殞之梁王詧使以布帊屍斂以蒲席束以白茅以車一乘葬于津陽門外愍懷太子元良及始安王方略等皆見害徐世譜任約自馬頭走巴陵約後降于齊將軍裴畿畿弟機並被害謝答仁三人相抱俱見屠汝南王大封尚書左僕射王襃以下並為俘以歸長安乃選百姓男女數萬口分為奴婢小弱者皆殺之帝於伎術無所不該嘗不得南信筮之遇剝之艮曰南信已至今當遣左右季心往看果如所說賓客咸驚其妙凡所占決皆然初從劉景受相術因訊以年答曰未至五十當有小厄禳之可免帝自勉曰苟有期會禳之何益灨四十七矣特多禁忌牆壁崩倒屋宇傾頹年月不便終不修改庭草蕪沒令鞭去之其慎護如此著孝德傳忠臣傳各三十卷丹陽尹傳十卷注漢書一百十五卷周易講疏十卷內典博要百卷連山三十卷詞林三卷玉韜金樓子補闕子各十卷老子講疏四卷懷舊傳二卷古今全德志荊南地記貢職圖古今同姓名錄一卷筮經十二卷式贊三卷文集五十卷初承聖二年三月有二龍自南郡城西升天百姓聚觀五采分明江陵故老竊相泣曰昔年龍出建康淮而天下大亂今復有焉禍至無日矣帝聞而惡之踰年而遘禍又江陵先有九十九洲古老相承云洲滿百當出天子桓玄之為荊州刺史內懷篡逆之心乃遣鑿破一洲以應百數隨而崩散竟無所成宋文帝為宜都王在藩一洲自立俄而文帝纂統後遇元凶之禍此洲還沒太清末枝江楊之閣浦復生一洲羣公上疏稱慶明年而帝即位承聖末其洲與大岸相通惟九十九云敬皇帝諱方智字慧相小字法真元帝第九子也太清三年封興梁侯承聖元年封晉安郡王二年出為江州刺史三年十一月魏剋江陵太尉王僧辯司空陳霸先定議以帝為梁王太宰承制四年二月癸丑於江州奉迎至建鄴入居朝堂以太尉王僧辯為中書監錄尚書驃騎大將軍都督中外諸軍事加司空陳霸先班劍二十人以湘州刺史蕭循為太尉廣州刺史蕭勃為司徒三月齊遣其上黨王高渙送貞陽侯蕭明來主梁嗣至東關遣吳興太守裴之橫拒之與戰敗績死之四月司徒陸法和以郢州附齊遣江州刺史侯瑱討之七月辛丑僧辯納貞陽侯蕭明自采石濟江甲辰入建鄴丙午即偽位年號天成以帝為皇太子司空陳霸先襲殺王僧辯黜蕭明而奉帝焉紹泰元年秋九月丙午皇帝即位冬十月己巳大赦改元以貞陽侯蕭明為司徒封建安郡公壬子加司空陳霸先尚書令都督中外諸軍事震州刺史杜龕舉兵攻信武將軍陳蒨於長城義興太守韋載應之癸丑以太尉蕭循為太保以司徒蕭明為太傅司徒蕭勃為太尉以鎮南將軍王琳為車騎將軍開府儀同三司戊午尊所生夏貴妃為皇太后立妃王氏為皇后辛未司空陳霸先東討韋載降之丙子南豫州刺史任約譙秦二州刺史徐嗣徽舉兵據石頭反十一月庚辰齊安州刺史翟子崇楚州刺史劉仕榮淮州刺史柳達摩率衆赴任約入石頭十二月庚戌任約徐嗣徽等至采石迎齊援丙辰遣猛烈將軍侯安都於江寧邀擊敗之約嗣徽等奔江西庚申翟子崇等降並放還北太平元年春正月戊寅大赦追贈諡簡文帝諸子封故永安侯確子後為邵陵王奉攜王後癸未震州刺史杜龕降詔賜死赦吳興郡己亥以太保宜豐侯蕭循襲封鄱陽王東揚州刺史張彪圍臨海太守王懷振於剡巖二月庚戌遣周文育陳蒨襲會稽討彪彪敗走以中衞將軍臨川王大款即本號開府儀同三司丙辰若邪村人斬張彪傳首建鄴赦東揚州甲子以東土經杜龕張彪之亂遣大使巡省是月齊人來聘使侍中王廓報聘三月壬午班下遠近並雜用今古錢戊戌齊將蕭軌出柵口向梁山陳霸先大敗之夏四月壬申侯安都輕兵襲齊行臺司馬恭於歷陽大破之五月癸未太傅建安公蕭明薨庚寅齊軍水步入丹陽縣內外纂嚴六月壬子齊軍至玄武湖西北乙卯陳霸先大破齊軍戊午大赦辛酉解嚴秋七月丙子司空陳霸先進位司徒丁亥以開府儀同三司侯瑱為司空八月己酉太保鄱陽王循薨九月壬寅大赦改元司徒陳霸先進位丞相錄尚書事改封義興郡公加中權將軍王沖開府儀同三司以吏部尚書王通為尚書右僕射冬十月乙亥魏相安定公薨十一月起雲龍神武門十二月壬申進太尉蕭勃為太保甲午封前壽昌令劉叡為汝陰王前鎮西法曹行參軍蕭沇為巴陵王奉宋齊二代後庚子魏恭帝遜位于周二年春正月壬寅詔求魯國孔氏族為奉聖侯幷繕廟堂供備祀典又詔諸州各置中正舊放舉選不得輒承單狀序官皆須中正押上然後量授其選中正每求耆德該悉以他官領之以開府儀同三司王琳為司空以尚書右僕射王通為左僕射二月庚午遣領軍將軍徐度入東關太保廣州刺史蕭勃舉兵反詔平西將軍周文育平南將軍侯安都等南討戊子徐度至合肥燒齊船舶三千艘癸巳周文育軍於巴山獲蕭勃偽帥歐陽頠三月甲寅德州刺史陳法武前衡州刺史譚遠於始興攻殺蕭勃夏四月癸酉曲赦江廣衡三州幷督內為賊所拘逼者己卯鑄四柱錢一當二十齊遣使通和壬辰改四柱錢一當十丙申復閉細錢五月乙巳平西將軍周文育進號鎮南將軍平南將軍侯安都進號鎮北將軍並開府儀同三司戊辰余孝頃遣使詣丞相府求降秋八月加丞相陳霸先殊禮九月周冢宰宇文護殺閔帝丞相陳霸先改授相國封陳國公冬十月戊辰進陳國公爵為王辛未帝遜位于陳陳受命奉帝為江陰王薨于外邸時年十六追諡敬皇帝論曰帝王之位天下之重職文武之道守國所常遵其於行用義均水火相資則可專任成亂觀夫有梁諸帝皆一之而已簡文文明之姿稟乎天授粵自支庶入居明兩經國之算其道弗聞宮體所傳且變朝野雖主虛號何救滅亡元帝居勢勝之地啟中興之業既雪讎恥且應天人而內積猜忍外崇矯飾攀號之節忍酷於踰年定省之制申情於木偶竟而雍州引寇釁起河東之戮益部親尋事習邵陵之窘悖辭屈於僧辯殘虐極於圓正不義不昵若斯之甚而復謀無經遠心勞志大近捨宗國遠迫強隣外弛藩籬內崇講肆卒於溘至戕隕方追始皇之迹雖復文籍滿腹何救社廟之墟歷觀書契以來蓋亦廢興代有未見三葉遘愍頓若蕭宗之酷敬皇以此沖年當斯頹運將不高揖其可得乎初武帝末年都下用錢每百皆除其九謂為九佰竟而有侯景之亂及江陵將覆每百復除六文稱為六佰識者以為九者陽九六者百六蓋符歷數非人事也善乎鄭文貞公論之曰高祖固天攸縱聰明稽古道亞生知學為博物允文允武多藝多才爰自諸生有不羈之度屬昏凶肆虐天倫及禍糾合義旅將雪家寃曰紂可伐不期而會龍躍樊漢電擊湘郢翦離德如振槁取獨夫如拾遺其雄才大略固無得而稱矣既縣白旗之首方應皇天之眷布德施惠悅近來遠開蕩蕩之王道革靡靡之商俗大修文教盛飾禮容鼓扇玄風闡揚儒業介胄仁義折衝尊俎聲振寰宇澤流遐裔干戈載戢凡數十年濟濟焉洋洋焉魏晉以來未有若斯之盛也然不能息末敦本彫為樸慕名好事崇尚浮華抑揚孔墨流連釋老或終夜不寢或日旰不食非弘道以利物惟飾智以驚愚且心未遺榮虛厠蒼頭之伍高談脫屣終戀黃屋之尊夫人之大欲在乎飲食男女至於軒冕殿堂非有切身之急高祖屏除嗜欲眷戀軒冕得其所難而滯於所易可謂神有所不達智有所不通矣逮夫精華稍竭鳳德已衰惑於聽受權在姦佞儲后百辟莫能盡言險躁之心暮年逾甚見利而動愎諫違卜開門揖盜棄好即讎釁起蕭牆禍成戎羯身殞非命災被億兆衣冠斃鋒鏑之下老幼粉戎馬之足瞻彼黍離痛深周廟永言麥秀悲甚殷墟自古以安為危既成而敗顛覆之速書契所未聞也易曰天之所助者順人之所助者信高祖之遇斯屯剝不得其死蓋動而之險不由信順失天人之助其能免於此乎太宗敏叡過人神采秀發多聞博達富贍詞藻然文艷用寡華而不實體窮淫麗義罕疎通哀思之音遂移風俗以此而貞萬國異乎周誦漢莊矣我生不辰載離多難桀逆構扇巨猾滔天始同牖里之拘終類望夷之禍悠悠蒼昊其可問哉昔國步初屯兵魏闕羣后釋位投袂勤王元帝以盤石之宗受分陝之任屬君親之難居連率之長不能撫劍嘗膽枕戈泣血躬先士卒致命前驅遂乃擁衆逡巡內懷觖望坐觀國變以為身幸不急莽卓之誅先行昆弟之戮又沈猜忍酷多行無禮騁智辯以飾非肆忿戾以害物爪牙重將心膂謀臣或顧眄以就拘囚或一言而及葅醢朝之君子相顧懍然自謂安若泰山算無遺策怵於邪說即安荊楚雖元惡克翦社稷未寧而西隣責言禍敗旋及斯乃上靈降鑒此焉假手天道人事其可誣乎其篤志藝文採浮華而棄忠信戎昭果毅先骨肉而後寇讎口誦六經心通百氏有仲尼之學有公旦之才適足以益其驕矜增其禍患何補金陵之覆沒何救江陵之滅亡哉敬帝遭家不造紹茲屯運征伐有所自出政刑不由於己時無伊霍之輔焉得不為高讓歟
