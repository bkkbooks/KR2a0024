body:
  text: 南史卷二十九唐李延夀撰列傳第十九蔡廓子興宗撙孫凝孫約約弟撙蔡廓字子度濟陽考城人晉司徒謨之曽孫也祖系撫軍長史父綝司徒左西屬廓博渉羣書言行以禮起家著作佐郎後為宋武帝太尉參軍中書黄門郎以方梗閑素為武帝所知載遷太尉従事中郎未拜遭母憂性至孝三年不櫛沭殆不勝䘮宋臺建為侍中建議以為鞫獄不宜令子孫下辭明言父祖之罪虧敎傷情莫此為大自今但令家人與囚相見無乞鞫之訴便足以明伏罪不湏責家人下辭朝議從之世子左衛率謝靈運輒殺人御史中丞王准之坐不糾免官武帝以廓剛直補御史中丞多所糾奏百寮震肅時中書令傅亮任寄隆重學冠當時朝廷儀典皆取㝎扵亮亮每事諮廓然後行亮意若有不同廓終不為屈遷司徒左長史出為豫章太守徴為吏部尚書廓因北地傅隆問亮選事若悉以見付不論不然不能拜也亮以語錄尚書徐羡之羡之曰黄門郎以下悉以委蔡吾徒不復厝懐自此以上故宜共參同異廓曰我不能為徐干木署紙尾遂不拜干木羡之小字也選案黄紙録尚書與吏部尚書連名故廓言署紙尾也羡之亦以廓正直不欲使居權要徙為祠部尚書文帝入奉大統尚書令傅亮率百官奉迎廓亦俱行至尋陽遇疾不堪前髙将進路詣别廓謂曰營陽在吴宜厚加供奉一旦不幸卿諸人有殺主之名欲立扵世将可得邪時亮已與羡之議害少帝乃馳信止之信至已不及羡之大怒曰與人共計云何裁轉背便賣惡扵人及文帝即位謝晦将之荆州與廓别屏人問曰吾其免乎廓曰卿受先帝顧命任以社稷廢昏立明義無不可但殺人二昆而以之北面挟震主之威據上流之重以古推今自免為難也廓年位並輕而時流所推重每至時嵗皆束帶詣門奉兄軌如父家事大小皆諮而後行公禄賞賜一皆入軌有所資湏悉就典者請焉從武帝在彭城妻郗氏書求夏服廓答書曰知湏夏服計給事自應相供無容别寄時軌為給事中元嘉二年廓卒武帝常云羊徽蔡廓可平世三公少子興宗興宗字興宗幼為父廓所重謂有已風與親故書曰小兒四嵗神氣似可不入非類室不與小人逰故以興宗為之名以興宗為之字年十嵗䘮父哀毁有異凡童廓罷豫章郡還起二宅先成東宅以與兄軌軌罷長沙郡還送錢五十萬以禆宅直興宗年十一白母曰一家由来豐儉必共今日宅直不宜受也母悦而從焉軌深有愧色謂其子淡曰我年六十行事不及十嵗小兒尋又䘮母少好學以業尚素立見稱為中書侍郎中書令建平王宏侍中王僧綽並與之厚善元凶弑立僧綽被誅凶威方盛親故莫敢往興宗獨臨哭盡哀孝武踐阼累遷尚書吏部侍郎時尚書何偃疾患上謂興宗曰卿詳練清濁今以選事相付便可開門當之無所讓也後拜侍中每正言得失無所顧憚孝武新年拜陵興宗負璽陪乗及還上欲因以射雉興宗正色曰今致䖍園陵情敬兼重從禽猶有餘日請待他辰上大怒遣令下車由是失㫖竟陵王誕據廣陵爲逆事平孝武輿駕出宣陽門敕左右文武呌稱萬嵗興宗時陪輦帝顧曰卿獨不呌興宗從容正色荅曰陛下今日政應涕泣行誅豈得軍中皆稱萬嵗帝不悦興宗奉㫖慰勞廣陵州别駕范羲與興宗素善在城内同誅興宗至躬自妆殯致䘮還豫章舊墓上聞謂曰卿何敢故爾觸網興宗抗言荅曰陛下自殺賊臣自葬周旋既犯嚴制政當甘扵斧鉞耳帝有慙色又廬江内史周朗以正言得罪鏁付寧州親戚故人無敢贍送興宗時在直請急詣朗别上知尤怒坐屬疾多日白衣領職後為廷尉卿有解士先者告申坦昔與丞相義宣同謀時坦已死子令孫作山陽郡自繫廷尉興宗議曰若坦昔為戎首身今尚存累經肆眚猶應蒙宥令孫天屬理相為隠况人亡事逺追相誣訐斷以禮律義有合闗見従出為東陽太守後為左户尚書轉掌吏部時上方盛淫宴虐侮羣臣自江夏王義恭以下咸加穢辱唯興宗以方直見憚不被侵媟尚書僕射顔師伯謂儀曹郎王耽之曰蔡尚書常免昵戲去人實逺耽之曰蔡豫章昔在相府亦以方嚴不狎武帝宴私之日未嘗相召每至官賭常在勝明蔡尚書今日可謂能荷矣大明末前廢帝即位興宗告太宰江夏王義恭應湏策文義恭曰建立儲副本為今日復安用此興宗曰累朝故事莫不皆然近永初之末榮陽王即位亦有文策今在尚書可檢視也不從時義恭錄尚書受遺輔政阿衡幼主而引身避事政歸近習越騎校尉戴法興中書舎人巢尚之專制朝權威行近逺興宗職管九流銓衡所寄每至上朝輒與令録以下陳欲登賢進士之意又箴規得失博論朝政義恭素性恇撓阿順法興恒慮失㫖每聞興宗言輒戰懼無計先是大明世奢侈無度多所造立賦調煩嚴徴役過苦至是發詔悉皆削除由是紫極殿南北馳道之屬皆被毁壊自孝建以来至大明末凡諸制度無或存者興宗扵都坐慨然謂顔師伯曰先帝雖非盛徳要以道始終三年無改古典所貴今殯宫始撤山陵未逺而凡諸制度興造不論是非一皆刋削雖復禪代亦不至爾天下有識當以此窺人師伯不能用興宗每奏選事法興尚之等輒㸃㝎回換僅有存者興宗扵朝堂謂義恭及師伯曰主上諒闇不親萬機選舉密事多被刪改非復公筆迹不知是何天子意王景文謝莊等遷授失序興宗又欲改為羙選時薛安都為散騎常侍征虜将軍太子率殷恒為中庶子興宗先選安都為左衞将軍常侍如故殷恒為黄門領校太宰嫌安都為多欲單為左衛興宗曰率衛相去㡬何之間且已失征虜非乃超越復奪常侍則頓為降貶若謂安都晚過微人本宜裁抑今名噐不輕宜有選序謹依選體非私安都義恭曰若宫官宜加越授者殷恒便應侍中那得為黄門而已興宗又曰中庶侍中相去實逺且安都作率十年殷恒中庶百日今又領校不為少也使選令史顔禕之薛慶先等往復論執義恭然後署案既而中㫖以安都為右衛加給事中由是大忤義恭及法興等出興宗為吴郡太守固辭又轉南東海太守又不拜苦求益州義恭扵是大怒上表言興宗之失詔付外詳議義恭因使尚書令栁元景奏興宗及尚書袁愍孫私相許與自相選署亂羣害政混穢大猷扵是除興宗永昌太守郡屬交州朝廷喧然莫不嗟駭先是興宗納何后寺尼智妃為妾姿貌甚美迎車已去而師伯密遣人誘之潛往載取興宗迎人不得及興宗被徙論者並言由師伯師伯甚病之法興等既不欲以徙大臣為名師伯又欲止息物議由此停行頃之法興見殺尚之被繋義恭師伯並誅復起興宗為臨海王子頊前軍長史南郡太守行荆州事不行時前廢帝凶暴興宗外甥袁顗為雍州刺史固勸興宗行曰朝廷形勢人情所見在内大臣朝夕難保舅今出居陕西為八州行事顗在襄沔地勝兵强去江陵咫尺水陸通便若一朝有事可共立桓文之功豈與受制凶狂禍難不測同年而語乎興宗曰吾素門平進與主上甚疎未容有患宫省内外既人不自保比者㑹應有變若内難得弭外釁未必可量汝欲在外求全我欲居内免禍各行所見不亦善乎時士庶危懼衣冠咸欲逺徙後皆流離外難百不一存重除吏部尚書太尉沈慶之深慮危禍閉門不通賔客甞遣左右范羡詣興宗屬事興宗謂羡曰公關門絶客以避悠悠之請謁耳身非有求何為見拒羡復命慶之使要興宗興宗因説之曰主上比者所行人倫道盡今所忌憚唯在扵公公威名素著天下所服今舉朝惶惶人懐危怖指撝之日誰不景従如其不斷旦暮禍及僕昔佐貴府蒙眷異常故敢盡言願思其計慶之曰僕比日前慮不復自保但盡忠奉國始終以之正當委天任命耳加老罷私門兵力頓闕雖有其意事亦無從興宗曰當今懐謀思奮者非復要富貴期功賞各欲救死朝夕耳殿内将帥正聽外間消息若一人唱首則俯仰可定况公威風先著統戎累朝諸舊部曲布在宫省誰敢不從僕在尚書中自當唱率百寮案前世故事更簡賢明以奉社稷又朝廷諸所行造人間皆言公悉豫之今若沉疑不决當有先公起事者公亦不免附惡之禍也且車駕屢幸貴第酣醉彌留又聞斥屏左右獨入閤内此萬世一時機不可失僕荷眷深重故吐去梯之言公宜詳其禍福慶之曰此事大非僕所能行事至政當抱忠以沒耳頃之慶之果以見忌致禍時領軍将軍王𤣥謨大将有威名邑里訛言𤣥謨當建大事或言已見誅𤣥謨典籖包法榮家在東陽興宗故郡人也為𤣥謨所信使至興宗間興宗謂曰領軍比日殊當憂懼法榮曰頃者殆不復食夜亦不眠恒言收已在門不保俄頃興宗因法榮勸𤣥謨舉事𤣥謨又使法榮報曰此亦未易可行其當不泄君語右衛将軍劉道隆為帝所寵信専統禁兵乗輿當夜幸著作佐郎江斆宅興宗乗馬車従道隆従車後過興宗謂曰劉公比日思一閑道隆深達此音掐興宗手曰蔡公勿言時帝每因朝宴棰毆羣臣自驃騎大将軍建安王休仁以下侍中袁愍孫等咸見陵曵唯興宗得免頃之明帝定大事𤣥謨責所親故吏郭季産女壻韋希真等曰當艱難時周旋軰無一言相和發者季産曰蔡尚書令包法榮所道非不㑹機但大事難行耳季産言亦何益𤣥謨有慙色當明帝起事之夜廢帝横屍太醫閤口興宗謂尚書左僕射王景文曰此雖凶悖是天下之主宜使䘮禮麤足者直如此四海必将乗人時諸方並舉兵反朝廷所保丹陽淮南數郡其間諸縣或已應賊東兵已至永世宫省危懼上集羣臣以謀成敗興宗曰宜鎮之以静以至信待人比者逆徒親戚布在宫省若繩之以法則土崩立至宜明罪不相及之義上従之遷尚書右僕射尋領衛尉明帝謂興宗曰頃日人情言何事當濟不興宗曰今米甚豐賤而人情更安以此算之清蕩可必但臣之所憂更在事後猶羊公言既平之後方當勞聖慮耳尚書禇彦回以手板築興宗興宗言之不已上曰如卿言赭圻平函送袁顗首敕従登南掖門樓以觀之興宗潜然流涕上不悦事平封興宗始昌縣伯固讓而許之封樂安縣伯國秩吏力終以不受時殷琰據夀陽為逆遣輔國将軍劉勔攻圍之四方既平琰嬰城固守上使中書為詔譬琰興宗曰天下既平是琰思順之日陛下宜賜手詔數行今直使中書為詔彼必疑非真不従琰得詔謂劉勔詐造果不敢降久乃歸順先是徐州刺史薛安都據彭城反後遣使歸欵泰始二年冬遣鎮軍将軍張永率軍迎之興宗曰安都遣使歸順此誠不虚今不過湏單使一人咫尺書耳若以重兵迎之勢必疑懼或能招引北虜為患不測時張永已行不見信安都聞大軍過淮果引魏軍永戰大敗遂失淮北四州其先見如此初永敗問至上在乾明殿先召司徒建安王休仁又召興宗謂休仁曰吾慙蔡僕射以敗書示興宗曰我愧卿三年出為郢州刺史初吴興邱珍孫言論常侵興宗珍孫子景先人才甚羙興宗與之周旋及景先為鄱陽郡㑹晉安王子勛為逆轉在竟陵為吴喜所殺母老女幼流離夏口興宗至郢州親自臨哭致其䘮柩家累皆得東還遷㑹稽太守領兵置佐加都督㑹稽多諸豪右不遵王憲幸臣近習參半宫省封略山湖妨人害政興宗皆以法繩之又以王公妃主多立邸舍子息滋長督責無窮啓罷省之并陳原諸逋負解遣雜役並見從三吴舊有鄉射禮元嘉中羊𤣥保為吴郡行之久不復修興宗行之禮儀甚整明帝崩興宗與尚書令袁粲右僕射褚彦回中領軍劉勔鎮軍将軍沈攸之同被顧命以興宗為征西将軍開府儀同三司都督荆州刺史加班劒二十人被徴還都時右軍将軍王道隆任參國政權重一時躡履到興宗前不敢就席良久方去竟不呼坐元嘉初中書舍人秋當詣太子詹事王曇首不敢坐其後中書舍人𢎞興宗為文帝所愛遇上謂曰卿欲作士人得就王球坐乃當判耳殷劉並雜無所益也若往詣球可稱㫖就席及至球舉扇曰君不得爾𢎞還依事啓聞帝曰我便無如此何至是興宗復爾道隆等以興宗强正不欲使擁兵上流改為中書監左光禄大夫開府儀同三司固辭不拜興宗行己恭恪光祿大夫北地傅隆與父廓善興宗常修父友之敬又太原孫敬玉常通興宗侍兒被禽反接興宗命與杖敬玊了無怍容興宗竒其言對命釋縳試以伎能髙其筆札因以侍兒賜之為立室宇位至尚書右丞其遏惡揚善若此敬玉子㢘仕梁以清能位至御史中丞興宗家行尤謹奉歸宗姑事寡嫂養孤兄子有聞扵世太子左率王錫妻范聰明婦人也有才學書讓錫弟僧達曰昔謝太傅奉寡嫂王夫人如慈母今蔡興宗亦有恭和之稱其為世所重如此妻劉氏早卒一女甚幼外甥袁顗始生子彖而妻劉氏亦亡興宗姊即顗母也一孫一姪躬自撫飬年齒相比欲為婚姻每見興宗輒言此意大明初詔興宗女與南平王敬猷婚興宗以姊生平之懐屢經陳啓帝答曰卿諸人欲各行己意則國家何由得婚且姊言豈是不可違之處邪舊意既乖彖亦他娶其後彖家好不終顗又禍敗彖亦淪廢當時孤微理盡敬猷遇害興宗女無子婺居名門髙胄多欲結姻明帝亦敕適謝氏興宗並不許以女適彖泰豫元年卒年五十八遺命薄葬奉還封爵追贈後授子順固辭不受又奉表疏十餘上詔特申其請以旌克讓之風初興宗為郢州府參軍彭城顔敬以式卜曰亥年當作公官有大字者不可受也及有開府之授而太嵗在亥果薨扵光祿大夫云文集傳扵世子順字景𤣥方雅有父風位大尉従事中郎昇明末卒弟約約字景撝少尚宋孝武女安吉公主拜駙馬都尉仕齊累遷太子中庶子領屯騎校尉永明八年八月合朔約既武冠觧劒扵省眠至下鼓不起為有司所奏贖論出為宜都王冠軍長史淮南太守行府州事武帝謂曰今用卿為近蕃上佐想副我所期約曰南豫密邇京師不化自理臣亦何人爝火不息時諸王行事多相裁割約居右任主佐之間穆如也遷司徒左長史齊明帝為録尚書輔政百僚脱屐到席約躡屐不改帝謂江祏曰蔡氏是禮度之門故自可悦祏曰大将軍有揖客復見扵今約好飲酒夷淡不與世雜永元二年卒扵太子詹事年四十四贈太常弟撙撙字景節少方雅退黙與第四兄寅俱知名仕齊位給事黄門侍郎丁母憂廬于墓側齊末多難服闋因居墓所除太子中庶子太尉長史並不就梁臺建為侍中遷臨海太守公事左遷太子中庶子復為侍中吴興太守初撙在臨海百姓楊元孫以婢采蘭貼與同里黄權約生子酬乳哺直權死後元孫就權妻吴贖婢母子五人吴背約不還元孫訴撙判還本主吴能為巫出入撙内以金釧賂撙妾遂改判與吴元孫撾登聞鼓訟之為有司劾時撙已去郡雖不坐而常以為耻口不言錢及在吴興不飲郡井齋前自種白莧紫茄以為常餌詔褒其清加信武将軍時帝将為昭明太子納妃意在謝氏袁昻曰當今貞素簡勝唯有蔡撙乃遣吏部尚書徐勉詣之停車三通不報勉笑曰當湏我召也遂投刺乃入天監九年宣城郡吏吴承伯挟祅道聚衆攻宣城殺太守朱僧勇轉寇吴興吏人並請避之撙堅守不動命衆出戰摧破斬承伯餘黨悉平累遷吏部尚書在選𢎞簡有名稱又為侍中領袐書監武帝甞謂曰卿門舊尚有堪事者多少撙曰臣門客沈約范岫各已被升擢此外無人約時為太子少傅岫為右衛将軍撙風骨梗正氣調英嶷當朝無所屈讓甞奏用琅邪王筠為殿中郎武帝嫌不取參掌通署乃推白牒扵香橙地下曰卿殊不了事撙正色俯身拾牒起曰臣謂舉爾所知許允已有前事既是所知而用無煩參軍署名臣撙少而仕宦未甞有不了事之目因捧牒直出便命駕而去仍欲抗表自解帝尋悔取事為畫帝嘗設大臣䴵撙在坐帝頻呼姓名撙竟不荅食䴵如故帝覺其負氣乃改喚蔡尚書撙始放筯執笏曰爾帝曰卿向何聾今何聡對曰臣預為右戚且職在納言陛下不應以名垂喚帝有慙色性甚凝厲善自居適女為昭明太子妃自詹事以下咸来造謁往往稱疾相聞間遣之及其引進但暄寒而已此外無復餘言後為中書令卒扵吴郡太守諡曰康子司空袁昂嘗謂諸賔曰自蔡侯卒不復更見此人其為名軰所知如此子彦深宣城内史彦深弟彦髙給事黄門侍郎彦髙子凝凝字子居美容止及長博渉經傳有文詞尤工草𨽻陳太建元年累遷太子中舍人以名公子選尚信義公主拜駙馬都尉中書侍郎遷晉陵太守及将之郡更令左右修中書廨宇謂賔友曰庶来者無勞尋授吏部侍郎凝年位未髙而才地為時所重常端坐西齋自非素貴名流罕所交接趣時者多譏焉宣帝嘗謂凝曰我欲用義興主壻錢肅為黄門侍郎卿意如何凝正色曰帝鄉舊戚恩由聖㫖則無所復問若格以僉議黄散之職故湏人門兼美帝黙然而止肅聞而不平義興公主日譖之尋免官遷交趾頃之追還後主嗣位為給事黄門侍郎後主嘗置酒歡甚将移宴𢎞範宫衆人咸従唯凝與袁憲不行後主曰何為凝曰長樂尊嚴非酒後所過臣不敢奉詔衆人失色後主曰卿醉矣令引出他日後主謂吏部尚書蔡徴曰蔡凝負地矜才無所用也尋遷信威晉熙王府長史鬱欝不得志乃喟然歎曰天道有廢興夫子云樂天知命斯理庶㡬可逹因著小室賦以見志陳亡入隋道病卒年四十七子君知頗知名論曰蔡廓體業𢎞正風格峻舉興宗出内所踐不隕家聲位在具臣而情懐伊霍仁者有勇驗在斯乎然自廓及凝年移四代髙風素氣無乏扵時其所以取貴不徒然矣至扵矜倨之失盖其風俗所通格以正道故亦名敎之深尤也南史卷二十九南史卷二十九考證蔡興宗傳蔡尚書今日可謂能荷矣宋書荷字上有負字使選令史顔褘之薛慶先等往復論執一本無史字誤蔡凝傳若格以僉議黄散之職故湏人門兼美僉一本作檢南史卷二十九考證
