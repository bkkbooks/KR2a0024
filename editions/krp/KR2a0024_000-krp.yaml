body:
  text: 南史目錄正史類唐李延壽撰本紀十卷列傳七十卷凡八十卷本紀南史卷一宋本紀上第一武帝諱裕氏姓劉少帝諱義符南史卷二宋本紀中第二文帝諱義隆孝武帝諱駿前廢帝諱子業南史卷三宋本紀下第三眀帝諱彧後廢帝諱昱順帝諱凖南史卷四齊本紀上第四高帝諱道成姓蕭氏武帝諱賾南史卷五齊本紀下第五廢帝鬱林王諱昭業廢帝海陵王諱昭文眀帝諱鸞廢帝東昏侯諱寳卷和帝諱寳融南史卷六梁本紀上第六武帝上諱衍氏姓蕭南史卷七梁本紀中第七武帝下南史卷八梁本紀下第八簡文帝諱綱元帝諱繹敬帝諱方智南史卷九陳本紀上第九武帝諱霸先姓陳氏文帝諱蒨廢帝諱伯宗南史卷十陳本紀下第十宣帝諱頊後主諱叔寳列傳南史卷十一列傳第一后妃上宋孝穆趙皇后孝懿蕭皇后武敬臧皇后武張夫人文章胡太后少帝司馬皇后文元袁皇后潘淑妃孝武昭路太后眀宣沈太后孝武文穆王皇后宣貴妃前廢帝何皇后眀恭王皇后後廢帝陳太妃後廢帝江皇后順陳太妃順謝皇后齊宣孝陳皇后高昭劉皇后武穆裴皇后文安王皇后鬱林王何妃海陵王王妃眀敬劉皇后東昏褚皇后和王皇后南史卷十二列傳第二后妃下梁文獻張皇后武徳郗皇后武丁貴嬪武阮脩容簡文王皇后元徐妃敬夏太后敬王皇后陳武宣章皇后文沈皇后廢帝王皇后宣柳皇后後主沈皇后張貴妃南史卷十三列傳第三宋宗室及諸王長沙景王道憐臨川烈武王道規鮑照營浦侯遵考從子季連武帝諸子廬陵孝獻王義真彭城王義康江夏文獻王義恭南郡王義宣衡陽文王義季南史卷十四列傳第四文帝諸子元凶劭始興王濬南平穆王鑠竟陵王誕建平宣簡王宏廬陵王褘晉熙王昶武昌王渾始安王休仁晉平刺王休祐海陵王休茂鄱陽哀王休業臨慶沖王休倩新野懐王夷父桂楊王休範巴陵哀王休若孝武諸子豫章王子尚晉安王子勛松滋侯子房臨海王子頊始平孝敬王子鸞永嘉王子仁始安王子真邵陵王子元齊敬王子羽淮南王子孟晉陵孝王子雲南海哀王子師淮陽思王子霄東平王子嗣武陵王贊眀帝諸子邵陵殤王友隨颺王翽新興王嵩始建王禧南史卷十五列傳第五劉穆之曾孫祥之從子秀徐羨之從孫湛之蒨湛之孫孝嗣孝嗣孫君傅亮族兄隆檀道濟兄韶祗韶孫珪韶弟南史卷十六列傳第六王鎮惡朱齡石弟超石毛脩之孫惠素傅𢎞之朱脩之王𤣥謨子瞻𤣥載從弟𤣥象𤣥邈南史卷十七列傳第七劉敬宣劉懐肅弟懐敬懐慎劉粹族弟損孫處蒯恩向靖子柳劉鍾虞丘進孟懐玉弟龍符胡藩劉康祖伯父簡之産簡之弟謙之孫簡之子道道産子延南史卷十八列傳第八趙倫之子伯符蕭思話子惠開眎惠眀惠眀子素惠眀弟惠基惠休弟子介惠基子洽引惠基弟惠休琛介子允惠開從子臧燾𤣥孫嚴弟嚴族叔未甄厥燾熹熹子質未甄子盾南史卷十九列傳第九謝晦兄瞻澹弟㬭從叔謝裕子恂純𤣥孫徽裕弟述述孫朓謝方明子惠連謝靈運孫超宗卿曾孫幾南史卷二十列傳第十謝𢎞微子莊顥孫朏弟曾孫譓子𤣥孫哲弟舉朏弟顥卄瀹卄瀹覽覽舉子嘏僑舉兄子南史卷二十一列傳第十一王𢎞子錫遠錫弟僧逹祐曽孫融子𢎞弟子微微兄遠子僧僧祐籍𢎞從孫瞻瑜𢎞𤣥孫沖沖子瑒南史卷二十二列傳第十二王曇首子僧綽鶱弟暕孫儉承曽孫鶱僧鶱子規䖍暕子訓綽弟僧僧䖍子慈志弟子筠慈子泰志弟彬慈弟志寂南史卷二十三列傳第十三王誕凡子偃瑩偃子藻弟亮藻弟子瑩從王華從弟琨王惠從弟球王彧子絢奐絢弟繢份繢孫克錫彧兄子蘊奐弟份孫銓僉通勱質固南史卷二十四列傳第十四王裕之孫秀之綸延之曾阮韜延之子之孫峻峻子琮王鎮之弟𢎞之思𢎞之孫晏晏從弟遠王韶之王悦之王准之曾孫清之清子猛從弟逡珪之族子素南史卷二十五列傳第十五王懿到彦之孫撝洽撝子沆仲沆從兄漑漑弟洽子舉垣護之弟子崇祖閎崇祖從兄榮祖榮祖從父閎弟子曇深張興世子欣泰南史卷二十六列傳第十六袁湛弟豹子豹子淑從淑兄子顗仙顗從弟粲顗弟彖彖弟昻馬琕昻子君正君正弟敬君正子樞泌憲南史卷二十七列傳第十七孔靖孫琇之孫奐琇之曾孔琳之孫覬殷景仁從祖弟淳南史卷二十八列傳第十八褚裕之弟淡之彦𤣥孫球囘裕之兄子湛之子向湛之子囘彦子賁蓁蓁向子翔炫子澐彦囘弟澄蒙從弟炤澐子蒙子玠炫南史卷二十九列傳第十九蔡廓子興宗約弟撙孫約凝曾孫南史卷三十列傳第二十何尚之子偃𦙍孫戢從偃弟子求之求弟點㝢點弟𦙍弟炯尚弟子昌昌㝢子敬容南史卷三十一列傳第二十一張裕子永瓖岱瓖岱兄子緒弟緒子完弟充永子子率率盾瓖稷稷子嵊種稷從子南史卷三十二列傳第二十二張邵子敷寳孫沖徐兄子暢文暢子融嗣伯融弟積文伯伯從弟南史卷三十三列傳第二十三范泰子曅荀伯子族子萬秋徐廣郗紹子豁廣兄鄭鮮之裴松之孫昭眀野曾孫子何承天曾孫遜南史卷三十四列傳第二十四顔延之子竣師伯從子沈懐文子沖曇慶從兄周朗族孫顒𢎞顒子捨直捨弟子𢎞正𢎞讓直𢎞子確南史卷三十五列傳第二十五劉湛庾悦族弟登之遠登之弟仲文仲容仲文子𢎞仲文族孫顧琛顧覬之孫憲之南史卷三十六列傳第二十六羊欣羊𤣥保子戎希兄子沈演之子勃從兄孫顗憲孫浚演之子憲江夷子湛孫曽孫斆世𤣥孫蒨夷祿子智深五世䋔六孫揔弟江秉之孫謐南史卷三十七列傳第二十七沈慶之孫昭略之子文季從弟子文秀從子攸攸之孫僧昭宗慤從子夬南史卷三十八列傳第二十八柳元景元景弟子世隆盼世隆子惔憚子偃偃子憚弟憕惔弟憚憕弟忱世隆從弟慶遠禮慶遠子津津子仲禮敬南史卷三十九列傳第二十九殷孝祖族子琰劉勔子悛繪孫孺子覽綽遵孝悛弟子苞悛弟繪孝綽子諒孝綽弟潛繪弟瑱南史卷四十列傳第三十魯爽薛安都從子深鄧琬劉胡宗越吳喜黄囘南史卷四十一列傳第三十一齊宗室衡陽元王道度繼子鈞始安貞王道生始安王遙光曲江公遙欣子幾安陸昭王􅒺新吳侯景先南豐伯赤斧子穎胄穎達衡陽公諶臨汝侯坦之南史卷四十二列傳第三十二齊高帝諸子上豫章文獻王嶷子子廉乾子恪範子操顯子範子範子子弟子子雲南史卷四十三列傳第三十三齊高帝諸子下臨川獻王映長沙威王晃武陵昭王曅安成恭王暠鄱陽王鏘桂陽王鑠始興簡王鑑江夏王鋒南平王鋭宜都王鏗晉熙王銶河東王鉉南史卷四十四列傳第三十四齊武帝諸子文惠太子長懋竟陵文宣王子良子昭胄廬陵王子卿魚復侯子響安敬王子敬晉安王子懋南郡王子隆建安王子真西陽王子眀南海王子罕巴陵王子倫邵陵王子貞臨賀王子岳西陽王子文衡陽王子峻南康王子琳湘東王子建南郡王子夏文惠諸子巴陵王昭秀桂陽王昭粲眀帝諸子巴陵隠王寶義江夏王寶𤣥廬陵王寶源鄱陽王寶寅邵陵王寶脩晉熙王寶嵩桂陽王寳貞南史卷四十五列傳第三十五王敬則陳顯達張敬兒崔慧景南史卷四十六列傳第三十六李安人子元履戴僧靜桓康焦度曹武子世宗呂安國周山圖周盤龍子奉叔王廣之子珍國張齊南史卷四十七列傳第三十七荀伯玉崔祖思祖思叔父景真宗人文仲景真子元祖蘇侃虞悰胡諧之范栢年虞玩之劉休江祏劉暄南史卷四十八列傳第三十八陸澄陸慧曉子倕厥孫繕弟兄子閑兄閑子絳絳弟厥襄襄子雲公雲公子瓊瑜瓊子從典從瓊從弟琰琰弟瑜從兄玠弟琛陸杲子罩南史卷四十九列傳第三十九庾杲之叔父蓽王諶從叔摛何憲孔逷孔珪劉懐珍子靈哲霽從父弟峻懐慰子杳歊劉沼從從子懐慰懐珍孫訏懐珍族弟善眀南史卷五十列傳第四十劉瓛弟璡弟族子顯顯從㲄眀僧紹子山賓庾易子黔婁肩吾於陵劉虬子之遴坦之亨虬從弟南史卷五十一列傳第四十一梁宗室上吳平侯景子勵弟昌勸昻勔昱勃長沙宣武王懿子業韶孫孝儼猷業弟藻眀猷猷子駿弟朗永陽昭王敷衡陽宣王暢桂陽簡王融子象慥象子臨川靜惠王宏宏子正仁理正義徳正徳則正徳子見正弟正正則弟正立正立弟正表正立子賁正信南史卷五十二列傳第四十二梁宗室下安成康王秀秀子機機弟推南康元襄王偉偉子恪恭子靜恪弟恭恭弟祇鄱陽忠烈王恢恢子範諮弟脩範子嗣脩弟泰範弟諮始興忠武王憺憺子亮映弟曄亮弟映南史卷五十三列傳第四十三梁武帝諸子昭眀太子統豫章王綜南康簡王績廬陵茂王續邵陵攜王綸武陵王紀南史卷五十四列傳第四十四梁簡文帝諸子哀太子大器尋陽王大心臨川王大款南海王大臨南郡王大連安陸王大春桂陽王大成汝南王大封瀏陽公大雅新興王大莊西陽王大鈞武寧王大威皇子大訓建平王大球義安王大昕綏建王大摰樂良王大圜元帝諸子忠烈世子方等貞惠世子方諸愍懐太子方矩始安王方略南史卷五十五列傳第四十五王茂曹景宗席闡文夏侯詳子亶魚𢎞夔吉士瞻蔡道恭楊公則鄧元起羅研李膺張惠紹子登馮道根康絢昌義之南史卷五十六列傳第四十六張𢎞策子緬綰纘庾域子子與鄭紹叔呂僧珍樂藹子法才南史卷五十七列傳第四十七沈約子旋孫衆范雲從兄縝南史卷五十八列傳第四十八韋叡兄纂載闡鼎叡子放稜孫粲弟放弟正正子正弟稜黯裴邃邃子之禮之平子忌兄子之高横之高弟之平之高弟之南史卷五十九列傳第四十九江淹任昉王僧孺南史卷六十列傳第五十范岫傅昭弟映孔休源江革子徳藻徐勉許懋子亨殷鈞宗人芸南史卷六十一列傳第五十一陳伯之陳慶之子昕暄蘭欽南史卷六十二列傳第五十二賀瑒子革琛弟子司馬褧朱异顧協徐摛子陵陵陵子儉儀弟孝克份鮑泉鮑行卿客卿行卿弟南史卷六十三列傳第五十三王神念子僧辯羊偘子球鵾羊鴉仁南史卷六十四列傳第五十四江子一胡僧祐徐文盛陰子春子鏗杜崱兄岸龕弟幼安兄子王琳張彪南史卷六十五列傳第五十五陳宗室諸王永脩侯擬遂興侯詳宜黄侯慧紀衡陽獻王昌子伯信南康愍王曇朗子方泰方慶文帝諸子始興王伯茂鄱陽王伯山新安王伯固晉安王伯恭廬陵王伯仁江夏王伯義武陵王伯禮永陽王伯智桂陽王伯謀宣帝諸子始興王叔陵豫章王叔英長沙王叔堅建安王叔卿宜都王叔眀河東王叔獻新蔡王叔齊晉熙王叔文淮南王叔彪始興王叔重尋陽王叔儼岳陽王叔慎義陽王叔達巴山王叔雄武昌王叔虞湘東王叔平臨賀王叔敖陽山王叔宣西陽王叔穆南安王叔儉南郡王叔澄沅陵王叔興岳山王叔韶新興王叔純巴東王叔謨臨海王叔顯新會王叔坦新寧王叔隆新昌王叔榮太原王叔匡後主諸子太子深吳興王𦙍南平王嶷永嘉王彦南海王䖍信義王祗邵陵王兢會稽王莊東陽王恮吳郡王藩錢塘王恬南史卷六十六列傳第五十六杜僧眀周文育子寶安侯瑱侯安都歐陽頠子紇黄法氍淳于量章昭達吳眀徹裴子烈南史卷六十七列傳第五十七胡穎徐度子敬成杜稜周鐵虎程靈洗子文季沈恪陸子隆錢道戢駱文牙孫瑒徐世譜周敷荀朗周炅魯悉達弟廣達蕭摩訶子世廉任忠樊毅弟猛南史卷六十八列傳第五十八趙知禮蔡景歴子徵宗元饒韓子高華晈劉師知謝岐毛喜沈君理陸山才南史卷六十九列傳第五十九沈炯虞荔弟寄傅縡章華顧野王蕭濟姚察南史卷七十列傳第六十循吏吉翰杜驥申怙杜慧慶阮長之甄法崇孫彬傅琰孫岐虞愿王洪軌李珪之沈瑀范述曾孫謙從子廉何遠郭祖深南史卷七