body:
  text: 南史卷五十三唐李延壽撰列傳第四十三梁武帝諸子武帝八男丁貴嬪生昭眀太子統簡文皇帝廬陵威王續阮修容生孝元皇帝吴淑媛生豫章王綜董昭儀生南康簡王績丁充華生邵陵攜王綸葛修容生武陵王紀昭明太子統字徳施小字維摩武帝長子也以齊中興元年九月生于襄陽武帝既年垂强仕方有冡嗣時徐元瑜降而續又荆州使至云蕭頴胄暴卒時人謂之三慶少日而建鄴平識者知天命所集天監元年十一月立為皇太子時年㓜依舊於内拜東宫官属文武皆入直永福省五年五月庚戍出居東宫太子生而聰叡三嵗受孝經論語五嵗徧讀五經悉通諷誦性仁孝自出宫恒思戀不樂帝知之毎五日一朝多便留永福省或五日三日乃還宫八年九月於壽安殿講孝經盡通大義講畢親臨釋奠于國學年十二於内省見獄官将讞事問左右曰是皂衣何為者曰廷尉官属召視其書曰是皆可念我得判否有司以統幼紿之曰得其獄皆刑罪上統皆署杖五十有司抱具獄不知所為具言於帝帝笑而從之自是數使聴訟毎有欲寛縦者即使太子决之建康縣讞誣人誘口獄翻縣以太子仁愛故輕當杖四十令曰彼若得罪便合家孥戮今縱不以其罪罪之豈可輕罰而已可付冶十年十四年正月朔旦帝臨軒冠太子於太極殿舊制太子著逺㳺冠金蟬翠緌纓至是詔加金博山太子羙姿容善舉止讀書數行並下過目皆憶每游宴祖道賦詩至十數韻或作劇韻皆属思便成無所點易帝大𢎞佛教親自講説太子亦素信三寶徧覽衆經乃於宫内别立慧義殿專為法集之所招引名僧自立三諦法義普通元年四月甘露降于慧義殿咸以為至徳所感時俗稍奢太子欲以己率物服御朴素身衣浣衣膳不兼肉三年十一月始興王憺薨舊事以東宫禮絶傍親書翰並依常儀太子以為疑命僕射劉孝綽議其事孝綽議曰案張鏡撰東宫儀記稱三朝發哀者踰月不舉樂鼓吹寝奏服限亦然尋傍絶之義義在去服服雖可奪情豈無悲鐃歌輟奏良亦為此既有悲情宜稱兼慕卒哭之後依常舉樂稱悲竟此理例相符謂猶應兼慕請至卒哭僕射徐勉左率周捨家令陸襄並同孝綽議太子令曰張鏡儀記云依士禮終服月稱慕悼又云凡三朝發哀者踰月不舉劉僕議云傍絶之義義在去服服雖可奪情豈無悲卒哭之後依常舉樂稱悲竟此理例相符尋情悲之説非止卒哭之後縁情為論此自難一也用張鏡之舉樂棄張鏡之稱悲一鏡之言取捨有異此自難二也陸家令止云多厯年所恐非事證雖復累稔所用意常未安近亦嘗以此問外由来立意謂猶應有慕悼之言張豈不以舉樂為大稱悲事小所以用小而忽大良亦有以至如元正六佾事為國章雖情或未安而禮不可廢鏡吹軍樂比之亦然書疏方之事則成小差可縁心聲樂自外書疏自内樂自他書自己劉僕之議即情未安可令諸腎更共詳衷司農卿明山賓歩兵校尉朱异議稱慕悼之辭宜終服月於是付典書遵用以為永凖七年十一月貴嬪有疾太子還永福省朝夕侍疾衣不解帶及薨步從喪還宫至殯水漿不入口每哭輙慟絶武帝敕中書舎人顧協宣旨曰毁不滅性聖人之制不勝喪比於不孝有我在那得自毁如此可即强進飲粥太子奉敕乃進數合自是至葬日進麥粥一升武帝又敕曰聞汝所進過少轉就羸痩我比更無餘病政為汝如此胷中亦填塞成疾故應彊加饘粥不俟我恒爾懸心雖屢奉敕勸逼終喪日止一溢不嘗菜果之味體素壮腰帶十圍至是減削過半每入朝士庻見者莫不下泣太子自加元服帝便使省萬㡬内外百司奏事者填塞於前太子明於庻事每所奏謬誤巧妄皆即辯析示其可否徐令改正未嘗彈糾一人平斷法獄多所全宥天下皆稱仁性寛和容衆喜愠不形於色引納才學之士賞愛無倦恒自討論墳籍或與學士商㩁古今繼以文章著述率以為常于時東宮有書㡬三萬卷名才並集文學之盛晉宋以来未之有也性愛山水於𤣥圃穿築更立亭館與朝士名素者遊其中嘗泛舟後池番禺侯軌盛稱此中宜奏女樂太子不荅詠左思招隠詩云何必絲與竹山水有清音軌慙而止出宫二十餘年不畜音聲未薨少時敕賜太樂女伎一部略非所好普通中太軍北侵都下米貴太子因命菲衣減膳每霖雨積雪遣腹心左右周行閭巷視貧困家及有流離道路以米密加振賜人十石又出主衣絹帛年常多作襦袴各三千領冬月以施寒者不令人知若死亡無可斂則為備棺槥每聞逺近百姓賦役勤苦輙斂容變色常以戸口未實重於勞擾吴郡屢以水災不熟有上言當漕大瀆以瀉浙江中大通二年春詔遣前交州刺史王奕假節發吴吴興信義三郡人丁就役太子上疏曰伏聞當遣王奕等上東三郡人丁開漕溝渠導洩震澤使吴興一境無復水災蹔勞永逸必獲後利未萌難覩竊有愚懐所聞吴興累年失収人頗流移吴郡十城亦不全熟唯信義去秋有稔復非恒役之民今日東境榖稼猶貴劫盗屢起所在有司皆不聞奏今征戍未歸强丁疎少此雖小舉竊恐難合吏一呼門動為人蠧又出丁之處逺近不一比得齊集已妨蠶農去年稱為豐嵗公私未能足食如復今兹失業慮恐為弊更深且草竊多伺候人間虚實若善人從役則抄盗彌增吴興未受其益内地已離其弊不審可得權停此功侍優實以不武帝優詔以喻焉太子孝謹天至毎入朝未五鼓便守城門開東宫雖燕居内殿一坐一起恒向西南靣臺宿被召當入危坐逹旦三年三月㳺後池乗彫文舸摘芙蓉姬人蕩舟沒溺而得出因動股恐貽帝憂深誡不言以寝疾聞武帝敕看問輙自力手書啓及稍篤左右欲啓聞猶不許曰云何令至尊知我如此惡因便鳴咽四月乙巳暴惡馳啓武帝比至已薨時年三十一帝臨哭盡哀詔斂以衮冕諡曰昭明五月庚寅葬安寧陵詔司徒左長史王筠為哀册文朝野惋愕都下男女奔走宫門號泣滿路四方甿庻及壃徼之人聞喪者哀慟太子性仁恕見在宫禁防捉荆子者問之云以清道驅人太子恐復致痛使捉手板代之頻食中得蠅蟲之属密置柈邉恐㕑人獲罪不令人知又見後閣小兒攤戲後属有獄牒攤者法士人結流徒庻人結徒太子曰私錢自戲不犯公物此科太重令注刑止三嵗士人免官獄牒應死者必降長徒自此以下莫不減半所著文集二十卷又撰古今典誥文言為正序十卷五言詩之善者為英華集二十卷文選三十卷薨後長子東中郎将南徐州刺史華容公歡封豫章郡王次子枝江公譽封河東郡王曲江公詧封岳陽郡王􅩼封武昌郡王鑒封義陽郡王各三千戸女悉同正主蔡妃供侍一同常儀唯别立金華宫為異帝既廢嫡立庶海内噂􅊱故各封諸子大郡以慰其心岳陽王詧流涕受拜累日不食初丁貴嬪薨太子遣人求得善墓地将斬草有賣地者因閹人俞三副求市若得三百萬許以百萬與之三副宻啓武帝言太子所得地不如今所得地於帝吉帝末年多忌便命市之葬畢有道士善圖墓云地不利長子若厭伏或可申延乃為蠟鵞及諸物埋墓側長子位有宫監鮑邈之魏雅者二人初並為太子所愛邈之晚見疎於雅宻啓武帝云雅為太子厭禱帝宻遣檢掘果得鵞等物大驚将窮其事徐勉固諌得止於是唯誅道士由是太子迄終以此慙慨故其嗣不立後邵陵王臨丹陽郡因邈之與鄉人争婢議以為誘略之罪牒宫簡文追感太子寃揮淚誅之邈之兄子僧隆為宫直前未知邈之姪即日驅出先是人間謡曰鹿子開城門城門鹿子開當開復未開使我心徘徊城中諸少年逐歡歸去来鹿子開者反語為来子哭云帝哭也歡前為南徐州太子果薨遣中書舎人臧厥追歡於崇正殿解髪臨哭歡既嫡孫次應嗣位而遲疑未决帝既新有天下恐不可以少主主大業又以心銜故意在晉安王猶豫自四月上旬至五月二十一日方决歡止封豫章王還任往謡言心徘徊者未定也城中諸少年逐歡歸去来復還徐方之象也歡字孟孫位雲麾将軍江州刺史薨諡安王子棟嗣棟字元吉及簡文見廢侯景奉以為主棟方與妃張氏鋤葵而法駕奄至棟驚不知所為泣而升輦及即位升武徳殿欻有廻風從地涌起翻飛華蓋徑出端門時人知其不終於是年號天正追尊昭明太子曰昭眀皇帝安王為安皇帝金華敬妃蔡氏為敬皇后太后王氏為皇太后妃為皇后未㡬行禪讓禮棟封淮隂王及二弟橋樛並鎖於宻室景敗走兄弟相扶出逢杜崱於道崱去其鎖弟曰今日免横死矣棟曰倚伏難知吾猶有懼初王僧辯之為都督将發諮元帝曰平賊之後嗣君萬福未審有何儀注帝曰六門之内自極兵威僧辯曰平賊之謀臣為己任成濟之事請别舉人由是帝别敕宣猛将軍朱買臣使行忍酷㑹簡文已被害棟等與買臣遇見呼往船共飲未竟並沉于水河東王譽字重孫普通二年封枝江縣公中大通三年改封河東郡王累遷南中郎将湘州刺史未㡬侯景宼建鄴譽入援至青草湖臺城沒有詔班師譽還湘鎮時元帝軍于武城新除雍州刺史張纉宻報元帝曰河東起兵岳陽聚米将来襲江陵元帝甚懼沉米斷纜而歸因遣諮議周𢎞直至譽所督其糧衆譽曰各自軍府何忽疑人使三反譽並不從元帝大怒遣世子方等征之反為譽敗死又令信州刺史鮑泉討譽并陳示禍福譽謂曰欲前即前無所多説泉軍于石槨寺譽逆撃不利而還泉進軍橘洲譽攻之又見敗於是遂圍之譽幼而有驍勇馬上用弩兼有膽氣能撫士卒甚得衆心元帝又遣領軍王僧辯代鮑泉攻譽譽将潰圍而出㑹其麾下将慕容華引僧辯入城遂被執謂守者曰勿殺我得一見七官申此讒賊死無恨主者曰奉令不許遂斬首送荆鎮元帝返其首以葬焉初譽之将敗引鏡照靣不見其頭又見長人蓋屋兩手據地噉其臍又見白狗大如驢從城出不知所在舉甚惡之俄而城陷豫章王綜字世謙武帝第二子也天監三年封豫章郡王累遷北中郎将南徐州刺史入為侍中鎮右将軍初綜母吳淑媛在齊東昏宫寵在潘余之亞及得幸於武帝七月而生綜宫中多疑之淑媛寵衰怨望及綜年十四五恒夢一年少肥壮自挈其首對綜如此非一綜轉成長心驚不已頻宻問淑媛曰夢何所如夢既不一淑媛問夢中形色頗類東昏因宻報之曰汝七月日生兒安得比諸皇子汝今太子次弟幸保富貴勿洩綜相抱哭毎日夜恒泫泣又毎靖室閉戸藉地被髪席藁輕財好士分施不輟唯留身上故衣外齋接客分麤服厨厙恒致罄乏常於内齋布沙於地終日跣行足下生胝日能行三百里嘗有人士姓王以屯躓投告綜于時大乏唯有眠牀故皂複帳即下付之其降意下士以伺風雲之㑹諸侯王妃主及外人並知此懐唯武帝不疑及長有才學善属文武帝御諸子以禮朝見不甚數綜恒怨不見知每出蕃淑媛恒随之至鎮時年十五尚裸袒嬉戲於前晝夜無别妃袁氏尚書令昻之女也淑媛恒節其宿止遇袁妃尤不以道内外咸有穢聲綜後在徐州政刑酷暴又有勇力制及奔馬㩧殺駒犢常隂服微行著烏絲布帽夜出無有期度招引道士探求數術性聰敏多通每武帝有敕疏至輙忿恚形於顔色帝性嚴羣臣不敢輕言得失凡綜所行弗之知也於徐州還頻裁表陳便宜求經略邉境帝並優敕荅之徐州所有練樹並令斬殺以帝小名練故累致意尚書僕射徐勉求出鎮襄陽勉未敢言因是怒勉餉以白團扇圖伐檀之詩言其賄也在西州於别室歳時設席祠齊氏七廟又累微行至曲阿拜齊明帝陵然猶無以自信聞俗説以生者血瀝死者骨滲即為父子綜乃私發齊東昏墓出其骨瀝血試之既有徴矣在西州生次男月餘日潛殺之既瘞夜遣人發取其骨又試之其酷忍如此每對東宫及諸王辭色不恭遜嘗改嵗後問訊臨川王宏出至中閣登宏羊車次遺糞而出居都下所為多如此者普通四年為都督南兖州刺史頗勤於事而不見賔客其辭訟則隔簾理之方幅出行垂帷於輿毎云惡人識其靣也初齊故建安王蕭寶寅在魏綜求得北来道人釋法鸞使入北通問於寶寅謂為叔父襄陽人梁話母死法鸞説綜厚賜之言終可任使綜遺話錢五萬及葬畢引在左右法鸞在廣陵往来通魏尤數毎舎淮隂苗文寵家言文寵於綜綜引為國常侍六年魏将元法僧以彭城降帝使綜都督衆軍權鎮彭城并攝徐州府事武帝曉别𤣥象知當更有敗軍失将恐綜為北所禽手敕綜令拔軍毎使居前勿在人後綜恐帝覺與魏安豐王元延眀相持夜潛與梁話苗寵三騎開北門涉汴河遂奔蕭城自稱隊主見延眀而拜延眀坐之問其名氏不荅曰殿下問人有見識者延眀召使視之曰豫章王也延眀喜下地執其手荅其拜送于洛陽及旦齋内諸閣猶閉不開衆莫知所以唯見城外魏軍呌曰汝豫章王昨夜已来在我軍中城中既失王所在衆軍皆退不得還者甚衆湘州益陽人任煥常有騅馬乗之退走煥脚為抄所傷人馬俱弊煥於橋下歇抄復至煥脚痛不復得上馬於是向馬泣曰騅子我於此死矣馬因跪其前脚煥乃得上馬遂免難綜長史江華大府卿祖暅並為魏軍所擒武帝聞之驚駭綜至魏位侍中司空髙平公丹陽王梁話苗寵並為光祿大夫綜改名纘字徳之追服齊東昏斬衰魏太后及羣臣並弔八月有司奏削爵土絶其属籍改子直姓悖氏未及旬日有詔復属籍封直永新侯久之乃䇿免吴淑媛俄遇鴆而卒有詔復其品秩諡曰敬使直主其喪及蕭寶寅據長安反綜復去洛陽欲奔之魏法度河橋不得乗馬綜乗馬而行橋吏執之送洛陽魏孝荘初歴位司徒太尉尚帝姊夀陽長公主陳慶之之至洛也送綜啓求還時吴淑媛尚在敕使以綜小時衣寄之信未逹而慶之敗未㡬終於魏初綜在魏不得志嘗作聴鐘鳴悲落葉以申其志當時莫不悲之後梁人盗其柩来奔武帝猶以子禮祔葬陵次直字思方位晋陵太守沙州刺史南康簡王績字世謹小字四果武帝第四子也天監七年封南康郡王十年為南徐州刺史時年七嵗主者有受貨洗改解書長史王僧孺弗之覺績見而詰之便即首服衆咸歎其聰警十七年為都督南兖州刺史在州以善政稱尋有詔徵還百姓曹樂等三百七十人詣闕上表稱績尤異一十五條乞留為州任優詔許之普通四年徵為侍中雲麾将軍領石頭戍軍事五年出為江州刺史丁董淑媛憂居喪過禮固求解職乃徴授安右将軍領石頭戍軍事尋加䕶軍羸瘠不親視事大通三年因感疾薨于任贈開府儀同三司諡曰簡績寡玩好少嗜欲居無僕妾躬事儉約所有租秩悉寄天府既薨後少府有南康國無名錢數千萬子㑹理嗣㑹理字長才少聰慧好文史年十一而孤特為武帝所愛衣服禮秩與正王不殊十五為湘州刺史多信左右行事劉納每禁之㑹理心不平證以贓貨収送建業納歎曰我一見天子使汝等知㑹理厚送資糧數遣慰喻令心腹於青草湖為盗殺納百口俱盡累遷都督南兖州刺史太清元年督衆軍北侵至彭城為魏師所敗退歸本鎮二年侯景圍城㑹理入援㑹北徐州刺史封山侯正表将應其兄正徳外託赴援實謀襲廣陵㑹理撃破之方得進路臺城陷㑹理歸鎮侯景遣前臨江太守董紹先以武帝手敕召㑹理其僚佐曰紹先書豈天子意咸勸拒之㑹理用其典籖范子鸞計曰天子年尊受制賊虜今有手敕召我入朝臣子之心豈得違背且處江北功業難成不若身赴京都圖之肘腋遂納紹先紹先入以烏幡麾衆單馬遣之至都景以為司空兼尚書令雖在宼手毎思匡復與西鄉侯歡等潛布腹心要結壮士時范陽祖皓斬董紹先據廣陵城起義期以㑹理為内應皓敗辭相連及侯景矯詔免㑹理官猶以白衣領尚書令是冬景往晋熙都下虚弱㑹理復與桞敬禮及北兖州司馬成欽謀之敬禮曰舉大事必有所資今無寸兵安可以動㑹理曰湖熟有吾故舊三千餘人昨来相知剋期響集計賊守兵不過千人若大兵外攻吾等内應直取王偉事必有成縱景後歸無能為也敬禮曰善于時百姓厭賊咸思用命建安侯賁以謀告王偉偉遂収㑹理及其弟通理時有錢唐禇冕㑹理之舊亦囚於省問事之所起考掠千計終無所言㑹理隔壁聞之遥曰禇郎卿豈不為吾致此邪然勿言王偉害㑹理等冕竟以不服偉赦之㑹理弟通理字仲宣位太子洗馬封祁陽侯至是亦遇害通理弟乂理字季英生十旬而簡王薨至三嵗能言見内人分散涕泣相送問其故或曰此簡王宫人喪畢去耳乂理便號泣悲不自勝諸宫人見之莫不哀感為之停者三人服闋見武帝升殿又悲不自勝帝為之収涕謂左右曰此兒大必為竒士大同八年封安樂縣侯乂理慷慨慕立功名每讀書見忠臣烈士未嘗不廢卷歎曰一生之内當無愧古人博覽多識有文才嘗祭孔文舉墓并為立碑製文甚美及侯景内宼乂理聚客赴南兖州随兄㑹理入援及城陷又随㑹理還廣陵因入齊為質乞師行二日㑹景遣董紹先據廣陵遂追獲之防嚴不得與兄相見乃偽請先還都入辭母因謂其姊固安主曰兄若至願使善為計自勉勿顧以為念前途亦思立効但未知天命何如耳至都以魏降人元貞忠正可以託孤乃以玉柄扇贈之貞怪不受乂理曰後當見憶㑹祖皓起兵乂理奔長蘆為景所害元貞始悟其前言往収葬焉廬陵威王續字世訢武帝第五子也天監八年封廬陵王少英果旅力絶人馳射應發命中武帝歎曰此我之任城也嘗馳射於帝前續中兩麞冠於諸人帝大悦中大通二年為都督雍州刺史寧蠻校尉大同元年遷江州刺史又為驃騎将軍開府儀同三司又為都督荆州刺史薨贈司空諡曰威始元帝母阮脩容得幸由丁貴嬪之力故元帝與簡文相得而與廬陵王少相狎長相謗元帝之臨荆州有宫人李桃兒者以才慧得進及還以李氏行時行宫户禁重續具状以聞元帝泣對使訴於簡文簡文和之不得元帝猶懼送李氏還荆州世所謂西歸内人者自是二王書問不通及續薨元帝時為江州聞問入閤而躍屧為之破尋自江州復為荆州荆州人迎于我境帝數而遣之吏人失望續多聚馬仗蓄養趫雄耽色愛財極意収斂倉儲庫藏盈溢臨終有啓遣中錄事參軍謝宣融送所上金銀器千餘件武帝始知其富以為財多徳寡因問宣融曰王金盡於此乎宣融曰此之謂多安可加也夫王之過如日月之食欲令陛下知之故終而不隠帝意乃解世子憑以非前誅死次子應嗣應不慧王薨至内庫閱珍物見金鋌問左右曰此可食否荅曰不可應曰既不可食並特乞汝他皆此類邵陵攜王綸字世調小字六真武帝第六子也少聰頴愽學善属文尤工尺牘天監十三年封邵陵郡王普通五年以西中郎将權攝南徐州事在州輕險躁虐喜怒不恒車服僣擬肆行非法遨逰市里雜於厮𨽻嘗問賣䱉者曰刺史何如對者言其躁虐綸怒令吞䱉以死自是百姓惶駭道路以目嘗逢喪車奪孝子服而著之匍匐號呌籖帥懼罪宻以聞帝始嚴責綸不能改於是遣代綸悖慢逾甚乃取一老公短痩類帝者加以衮冕置之髙坐朝以為君自陳無罪使就坐剥褫捶之於庭忽作新棺木貯司馬崔㑹意以轜車挽歌為送葬之法使嫗乘車悲號㑹意不堪輕騎還都以聞帝恐其奔逸以禁兵取之将於獄賜盡昭眀太子流涕固諫得免免官削爵土還第大通元年復封爵中大通四年為揚州刺史綸素驕縱欲盛器服遣人就市賒買錦采絲布數百疋擬與左右職局防閣為絳衫内人帳幔百姓並關閉邸店不出臺續使少府市采經時不能得敕責府丞何智通具以聞因被責還第恒遣心腹馬容戴子髙戴𤓰李撤趙智英等於路尋何智通於白馬巷逢之以槊刺之刃出於背智通以血書壁作邵陵字乃絶遂知之帝懸錢百萬購賊有西州㳺軍将宋鵲子條姓名以啓敕遣舎人諸曇粲領齋仗五百人圍綸第於内人檻中禽𤓰撤智英子髙驍勇踰牆突圍遂免智通子敞之割炙食之即載出新亭四靣火炙之焦熟敞車載錢設鹽蒜雇百姓食撤一臠賞錢一千徒黨并母肉遂盡綸鎖在第舎人諸曇粲并主帥領仗身守視免為庶人經三旬乃脱鎻頃之復封爵後預餞衡州刺史元慶和於坐賦詩十二韻未云方同廣川國寂寞久無聲大為武帝賞曰汝人才如此何慮無聲旬日間拜郢州刺史太清二年位中衞将軍開府儀同三司侯景搆逆加征討大都督率衆討景将發帝誡曰侯景小豎頗習行陣未可以一戰即殄當以歳月圖之綸發白下中江而浪起有物蕩舟将覆識者尤異之及次鍾離景已度采石綸乃晝夜兼道旋軍入赴濟江中流風起人馬溺者十一二遂率西豐公大春新塗公大成等步騎三萬發京口将軍趙伯超請從徑路直指鍾山出其不意綸從之衆軍奄至賊徒大駭分為三道攻綸綸大破之翊日賊又来攻日晚賊稍退南安侯駿以數十騎馳之賊回拒駿駿部亂賊因逼大軍大軍潰綸至鍾山戰敗奔還京口軍主霍俊見獲賊送于城下逼云已禽邵陵王俊偽許之乃曰王小失利政為糧盡還京口俊為託邏所獲非軍敗也賊以刀背毆其髀俊色不變賊義而捨之俊中書舎人靈超子也三年正月綸與東揚州刺史大連等入援至驃騎洲進位司空臺城陷綸奔禹穴東土皆附臨城公大連懼将害已乃圖之綸覺乃去至尋陽尋陽公大心欲以州讓之不受大寶元年綸至郢州刺史南平王恪讓州於綸綸不受乃上綸為假黄鉞都督中外諸軍事綸於是置百官改聽事為正陽殿内外齋省悉題署焉而數有變怪祭城隍神将烹牛有赤蛇繞牛口出南浦施安幄帳無何風起飄沒于江于時元帝圍河東王譽於長沙既久譽請救於綸綸欲往救之為軍糧不繼遂止乃與元帝書曰道之斯羙以和為貴况天時地利不及人和豈可手足肱支自相屠害即日大敵猶彊天讐未雪余爾昆弟在外三人如不匡救安用臣子如使逆宼未除家禍仍搆料今訪古未或弗亡夫征戰之理義在克勝至於骨肉之戰愈勝愈酷捷則非功敗則有喪勞兵損義虧失多矣侯景之軍所以未窺江外者政為藩屏盤固宗鎮彊密若自相魚肉是謂代景行師景便不勞兵力坐致成效醜徒聞此何快如之元帝復書陳譽有罪不可解圍之状綸省書流涕曰天下之事一至於斯左右聞之莫不掩泣於是大脩器甲将討侯景元帝聞其盛乃遣王僧辯帥舟師一萬以逼綸綸将劉龍武等降僧辯綸遂與子躓等十餘人輕舟走武昌沙門法聲與綸有舊藏之巖石之下時綸長史韋質司馬姜偉先在外聞綸敗馳往迎元帝復遣将徐文盛追攻之綸復収卒屯于齊昌郡将引魏軍共攻南陽侯景将任約襲綸綸敗走定州刺史田龍祖迎綸綸懼為所執復歸齊昌行収兵至汝南魏所署汝南城主李素孝者綸之故吏開城納之綸乃脩復城池收集士卒将攻竟陵魏聞之遣大将楊忠儀同侯㡬通攻破城執綸綸不為屈通乃卧大鼓使綸坐上殺之投于江岸經日色不變鳥獸莫敢近時飛雪飄零屍横道路周回數步獨不霑灑舊主帥安陸人郝破敵斂之於襄陽葬之日黄雪雰糅唯冡壙所獨不下雪楊忠知而悔焉使以太牢往祭殯焉百姓憐之為立祠廟岳陽王詧遣迎喪葬於襄陽望楚山南贈太宰諡曰安後元帝議追加諡尚書左丞劉㲄議諡法怠政交外曰攜従之綸任情卓越輕財愛士不競人利府無儲積聞有輙求既得即散士亦以此歸之初鎮京口大造器甲既涉聲論投之于江及後出征戎備頗闕乃歎曰吾昔造仗本備非常無事涉疑遂使零散今日討抄卒無所資初昭明之薨簡文入居監撫綸不謂徳舉而云時無豫章故以次立及廬陵之沒綸􅔵望滋甚於是伏兵于莽用伺車駕而臺舎人張僧𦙍知之其謀頗洩又綸獻曲阿酒百器上以賜寺人飲之而斃上乃不自安頗加衞士以警宫内於是傳者諸相疑阻而綸亦不懼武帝竟不能有所廢黜卒至宗室争競為天下笑長子堅字長白大同元年以例封汝南侯亦善草𨽻性頗庸短嘗與所親書題云嗣王其人得書大駭執以諫堅堅曰前言戲耳人曰不願以此為戲耳侯景圍城堅屯太陽門終日蒲飲不撫軍政吏士有功未嘗申理疫癘所加亦不存恤士咸憤怨太清三年堅書佐董勛華白曇朗等以堅私室醖釀亟有烹宰不相霑及忿恨夜遣賊登樓城遂陷堅遇害弟確確字仲正少驍勇有文才尤工楷𨽻公家碑碣皆使書之除祕書丞武帝謂曰為汝能文所以特有此授大同二年封為正階侯復徙封永福常在第中習騎射學兵法時人以為狂左右或進諫確曰聴吾為國家破賊使汝知之鍾山之役確所向披靡羣賊憚之確每臨陣對敵意甚詳贍帶甲據鞍自朝及夕馳驟往返不以為勞諸将服其壮勇軍敗賊使負砲不之知也確因隙自㧞得逹朱方及後侯景乞盟憚確及趙威方在外慮為後患啓求召確入城詔乃召確為南中郎将廣州刺史確知此盟多貳城必淪沒欲先遣趙威方入確因南奔綸聞之逼確使入確猶不肯綸流涕謂曰汝欲反邪時臺使周石珍在坐確曰侯景雖云欲去而不解長圍以意而推其事可見今召我入未見益也石珍曰敕㫖如此侯豈得辭確執意猶堅綸大怒謂趙伯超曰譙州卿為我斬之當齎首赴闕伯超揮刃眄曰我識君耳刀豈識君確流涕而出遂入城及景背盟復圍城城陷確排闥入啓時武帝方寝確曰城已陷矣帝曰猶可一戰否對曰人心不可臣向格戰不禁縋下僅得至此武帝歎曰自我得之自我失之亦復何恨幸不累子孫乃使確為慰勞文謂曰爾速去謂汝父無以二宫為念及出見景景愛其旅力恒令在左右後從景仰見飛鳶羣賊争射不中確射之應弦即落賊徒忿嫉咸勸除之先是綸遣典籖唐法隆密導確確謂使者曰侯景輕恌可一夫力致確不惜死欲手刃之卿還啓家王願勿以一子為念後與景獵鍾山同逐禽引弓将射景弦斷不得發賊覺殺之武陵王紀字世詢武帝第八子也少而寛和喜怒不形於色勤學有文才天監十三年封武陵王尋授揚州刺史中書詔成武帝加四句曰貞白儉素是其清也臨財能讓是其廉也知法不犯是其慎也庶事無留是其勤也紀特為帝愛故先作牧揚州大同三年為都督益州刺史以路逺固辭帝曰天下方亂惟益州可免故以處汝汝其勉之紀歔欷既出復入帝曰汝嘗言我老我猶再見汝還益州也紀在蜀開建寧越嶲貢獻方物十倍前人朝嘉其績加開府儀同三司初天監中震太陽門成字曰紹宗梁位唯武王解者以武陵王於是朝野属意焉及侯景陷臺城上甲侯韶西上至硖出武帝密勅加紀侍中假黄鉞都督征討諸軍事驃騎大将軍太尉承制大寶元年六月辛酉紀乃移告諸州征鎮遣世子圓照領二蜀精兵三萬受湘東王繹節度繹命圓照且頓白帝未許東下七月甲辰湘東王繹遣鮑檢報紀以武帝崩問十一月壬寅紀總戎将發益鎮繹使胡智監至蜀書止之曰蜀中斗絶易動難安弟可鎮之吾自當滅賊又别紙云地擬孫劉各安境界情深魯衞書信恒通二年四月乙丑紀乃僭號於蜀改年曰天正暗與蕭棟同名識者尤之以為於文天為二人正為一止言各一年而止也紀又立子圓照為皇太子圓正為西陽王圓滿竟陵王圓普南譙王圓肅宜都王以巴西梓潼二郡太守永豐侯撝為征西大将軍益州刺史封秦郡王司馬王僧略直兵參軍徐怦並固諫皆殺之僧略僧辯弟怦勉從子也以諫且以怦與将帥書云事事往人口具以為反於已誅之永豐侯撝歎曰王不克矣夫善人國之基也今乃誅之不亡何待又謂所親曰昔桓𤣥年號大亨識者為謂二月了而𤣥之敗實在仲春今年曰天正在文為一止其能久乎丁卯元帝遣萬州刺史宋簉襲圓照於白帝圓照弟圓正時為西陽太守召至鎻于省内初楊乾運求為梁州刺史不得紀以為潼州刺史楊法深求為黎州刺史亦不得以為沙州刺史二憾不獲所請各遣使通西魏及聞魏軍侵蜀紀遣其将譙淹回軍赴援魏将尉遲迥逼涪水楊乾運降之迥即趨成都五月己巳紀次西陵軍容甚盛元帝命䕶軍将軍陸法和立二城於峡口名七勝城鎖江以斷峡時陸納未平蜀軍復逼元帝甚憂法和告急旬日相繼元帝乃拔任約於獄以為晉安王司馬撤禁兵以配之并遣宣猛将軍劉棻共約西赴六月紀築連城攻絶鐵鎖元帝復於獄拔謝荅仁為步兵校尉配衆一旅上赴紀之将發也江水可掲前部不得行及登舟無雨而水長六尺劉孝勝喜曰殆天贊也将至峡有黒龍負舟其将帥咸謂天助及頓兵日久頻戰不利師老糧盡智力俱殫又魏人入劒閣成都虚弱憂懑不知所為先是元帝已平侯景執所俘馘頻遣報紀世子圓照鎮巴東留執不遣啓紀云侯景未平宜急征討已聞荆鎮為景所滅疾下大軍紀謂為實然故仍率衆沿江急進於路方知侯景已平便有悔色召圓照責之圓照曰侯景雖誅江陵未服宜速平蕩紀亦以既居尊位宣言於衆敢諫者死蜀中将卒日夜思歸所署江州刺史王開業進曰宜還救根本更思後圖諸将僉以為然圓照劉孝勝獨言不可紀乃止既而聞王琳将至潛遣将軍侯叡傍險出法和後臨水築壘禦琳及法和元帝書遺紀遣光州刺史鄭安中往喻意於紀許其還蜀専制㟭方紀不從命報書如家人禮既而侯叡為任約謝荅仁所破又陸納平諸軍並西赴元帝乃與紀書曰甚苦大智季月煩暑流金鑠石聚蚊成雷封狐千里以兹玉體辛苦行陣乃睠西顧我勞如何自獯醜憑陵羯胡叛換吾年為一日之長属有平亂之功膺此樂推事歸當璧儻遣使乎良所希也如曰不然於此投筆友于兄弟分形共氣兄肥弟痩無復相代之期讓棗推梨長罷懽愉之日上林静拱聞四鳥之哀鳴宣室披圖嗟萬始之長逝心乎愛矣書不盡言大智紀别字也帝又為詩曰回首望荆門驚浪且雷奔四鳥嗟長别三聲悲夜猿圓正在獄中連句曰水長二江急雲生三峽昏願貫淮南罪思報阜陵恩帝看詩而泣紀頻敗知不振遣署度支尚書樂奉業往江陵論和緝之計元帝知紀必破遂拒而不許於是兩岸十餘城遂俱降游撃将軍樊猛率所領至紀所紀在船中遶牀而走以金擲猛等曰此顧卿送我一見七官卿必當富貴猛曰天子何由可見殺足下此金何之猶不敢逼圍而守之法和馳啓上密敕樊猛曰生還不成功也猛率甲士祝文簡張天成㧞刀升舟猶左右奔擲第五子圓满馳来就父紀首既落圓滿軀亦分法和收太子圓照兄弟三人問圓照曰阿郎何以至此圓照曰失計願為公作奴法和叱遣之圓照字明周中大同初為益州東齋郎宋寧宋興二都太守逺鎮諸王世子皆在建鄴質守帝特愛紀故遣以副紀紀之搆釁悉其謀也次弟圓正先見鎖在江陵及紀既以兵終元帝使謂曰西軍已敗汝父不知存亡意欲使其自裁而圓正既奉此問便號哭盡哀以禍難之興皆由圓照於是唯哭世子言不絶聲上謂圓正聞問悲感必應自殺頻看知不能死又付廷尉獄及見圓照曰阿兄何乃亂人骨肉使酷痛如此圓照更無所言唯云計誤並命絶食於獄齧臂啖之十三日死天下聞而悲之圓正字明允紀第二子美風儀善談論寛和好施愛接士人封江安侯歴西陽太守有恵政既居上流人附者甚衆及侯景作逆圓正収兵衆且一萬後遂跋扈中流不從王命及景破復謀入蜀元帝将圖之署為平南将軍及至弗見使南平嗣王恪等醉而囚之時紀稱梁王及紀敗死為有司奏請絶紀属籍元帝許之賜姓饕餮氏紀最為武帝所愛武帝諸子罕登公位唯紀以功業顯著先啓黄扉兄邵陵王綸屢以罪黜心毎不平及聞紀為征西綸撫枕歎曰武陵有何功業而位乃前我朝廷憒憒似不知人武帝聞之大怒曰武陵有恤人拓境之勲汝有何績太清初帝思之使善畫者張僧繇至蜀圖其状在蜀十七年南開寧州越嶲西通資陵吐谷渾内脩耕桑鹽鐵之功外通商賈逺方之利故能殖其財用器甲殷積馬八千匹上足者置之内廐開寝殿以通之日落輙出步馬便騎射尤工舞矟九日講武躬領幢隊及聞國難謂僚佐曰七官文士豈能匡濟既東下黄金一斤為餅百餅為簉至有百簉銀五倍之其他錦罽繒采稱是毎戰則懸金帛以示将士終不賞賜寧州刺史陳知祖請散金銀募勇士不聴慟哭而去自是人有離心莫肯為用紀頗學觀占善風角亦知不復能濟瞻望氣色歎吒天道椎牀聲聞于外有請事者以疾辭不見既死埋於沙州不封無櫬元帝以劉孝勝付廷尉尋免之初紀将僭號祅怪不一内寝栢殿柱繞節生花其莖四十有六靃靡可愛状似荷花識者曰王敦祅花非佳事也時蜀知星人説紀曰官若東下當用申年太白出西從之為利申嵗發蜀酉年入荆不可失也發蜀之嵗太白在西北及眀年則已東出矣論曰甚矣讒佞之為巧也夫言附正直跡在恭敬悦目㑹心無施不可至乃離父子間兄弟廢楚嫡疎漢嗣可為太息良非一塗以昭眀之親之賢梁武帝之愛之信謗言一及至死不能自明况於下此者也綜處秦政之疑懐負尺之志肆行狂悖卒致奔亡廬陵多財為累雄心自立未及騁暴早卒為幸南康為政有方居喪以禮惜乎早夭不拯危季邵陵少而險躁人道頓忘晚致勤王其殆優矣武陵地居勢勝卒致傾覆才輕志大能無及乎南史卷五十三南史卷五十三考證昭眀太子統傳徐元瑜降而續又荆州使至又監本誤人今从南本時年幼依舊於内梁書於字上有居字應增入五嵗徧讀五經悉通諷誦通一本作融胸中亦填塞成疾填梁書作圯不俟我恒爾懸心俟梁書作使不畜音聲未薨少時敕賜太樂女妓一部畧非所好梁書無未薨二字又太作大詔遣前交州刺史王奕奕梁書作弁唯信義去秋有稔信義梁書作義興為英華集二十卷梁書同應从南本改為文章英華集二十卷復還徐方之象也還監本作逺河東王譽傳譽曰各自軍府何忽疑人疑梁書作𨽻南康簡王績傳天監七年封南康郡王七梁書作八少府有南康國無名錢數千萬梁書無少字子乂理傳大同八年封安樂縣侯八監本誤三今改从閣本又安樂梁書作建安邵陵攜王綸傳以西中郎将權攝南徐州事徐梁書作兖又云中大同元年出為統東将軍南徐州刺史本書不載殆彼此互訛也恒遣心腹馬容戴子髙戴𤓰李撒趙智英等於路尋何智通於白馬巷逢之以槊刺之梁書作令客戴子髙於都巷刺殺之綸遂與子躓等十餘人輕舟走武昌躓梁書作確下文確傳確自臺城出即在景左右旋欲手刃景為賊所殺則確未嘗有走武昌事當以躓為是子確傳後徙封永安安監本訛福今从梁書武陵王紀傳震太陽門成字曰紹宗梁位唯武王解者以武陵王解者以武陵王梁書作解者以為武王者武陵王也較眀六月紀築連城攻絶鐵鎖紀梁書作約誤也上文元帝命陸法和鎖江以斷峽遣劉棻共任約西赴下文元帝復以謝荅仁上赴所謂赴者皆赴法和也則此攻絶鐵鎖自當属紀不當属約矣武陵王紀子圓正傳識者曰王敦祅花非佳事也祅梁書作杖南史卷五十三考證
