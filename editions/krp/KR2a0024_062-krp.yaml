body:
  text: 南史卷六十二唐李延壽撰列傳第五十二賀瑒子革琛弟子司馬褧朱异顧協徐摛子陵儀陵子儉克份陵弟孝鮑泉鮑行卿客卿行卿弟賀瑒字徳璉會稽山隂人晉司空循之𤣥孫也世以儒術顯伯祖道養工卜筮經遇工歌女人病死為筮之曰此非死也天帝召之歌耳乃以土塊加其心上俄頃而蘇祖道力善三禮有盛名仕宋為尚書三公郎建康令父損亦傳家業瑒少聰敏齊時沛國劉瓛為㑹稽府丞見瑒深器異之嘗與俱造吳郡張融指瑒謂曰此生將來為儒者宗矣薦之為國子生舉明經後為太學博士梁天監初為太常丞有司舉脩賓禮召見說禮義武帝異之詔朝朔望預華林講四年初開五館以瑒兼五經博士别詔為皇太子定禮撰五經義時武帝方創定禮樂瑒所建議多見施行七年拜歩兵校尉領五經博士卒于館所著禮易老莊講疏朝廷博士議數百篇賓禮儀注一百四十五卷瑒於禮尤精館中生徒常數百弟子明經對䇿至數十人二子革季弟子琛並傳瑒業革字文明少以家貧躬耕供養年二十始輟耒就文受業精力不怠有六尺方牀思義未達則横卧其上不盡其義終不肯食通三禮及長徧治孝經論語毛詩左傳為兼太學博士長七尺八寸雍容都雅吐納蘊藉敕於永福省為邵陵湘東武陵三王講禮後為國子博士於學講授生徒常數百人出為西中郎湘東王諮議參軍帶江陵令王於州置學以革領儒林祭酒講三禮荆楚衣冠聽者甚衆前後再監南平郡為人吏所懷尋兼平西長史南郡太守革至孝常恨食禄代耕不及為養在荆州歴為郡縣所得俸秩不及妻孥専擬還鄉造寺以申感思子徽美風儀能談吐深為革愛先革卒革哭之因遘疾而卒季亦明三禮位中書黃門郎兼著作琛字國寳幼孤伯父瑒授其經業一聞便通義理瑒異之常曰此兒當以明經致貴瑒卒後琛家貧常往還諸暨販粟以養母雖自執舟檝閑則習業尤精三禮年二十餘瑒之門徒稍從問道初瑒於鄉里聚徒教授四方受業者三千餘人瑒天監中亡至是復集琛乃築室郊郭之際茅茨數間年將三十便事講授既世習禮學究其精微古述先儒吐言辯絜坐之聽授終日不疲湘東王㓜年臨郡彭城到溉為行事聞琛美名命駕相造㑹琛正講學侣滿筵既聞上佐忽來莫不傾動琛說經無輟曽不降意溉下車欣然就席便申問難往復從容義理該贍溉嘆曰通儒碩學復見賀生今且還城尋當相屈琛了不酬答神用頺然溉言之王請補郡功曹史琛辭以母老終於固執俄遭母憂廬於墓所服闋猶未還舍生徒復從之琛哀毁積年骨立而已未堪講授諸生營救稍稍習業普通中太尉臨川王宏臨州召補祭酒從事琛年已四十餘始應辟命武帝聞其有學術召見文徳殿與語悅之謂僕射徐勉曰琛殊有門業仍補王國侍郎稍遷兼中書通事舍人參軍禮事累遷尚書左丞詔琛撰新諡法便即施用時皇太子議大功之末可以冠子嫁女琛駮議曰令㫖以大功之末可得冠子嫁女不自冠自嫁推以記文竊猶致惑案嫁冠之禮本是父之所成無父之人乃可自冠故記稱大功小功並以冠子嫁子為文非關唯得為子已身不得也小功之末既得自娶而亦云冠子娶婦其義益明故先列二服每明冠子嫁子結於後句方顯自娶之義既明小功自娶即知大功自冠矣蓋是約言而見㫖若謂緣父服大功子服小功小功服輕故得為子冠嫁大功服重故不得自嫁自冠者則小功之末非明父子服殊不應復云冠子嫁子也若謂小功之文言已可娶大功之文不言己冠故知身有大功不得自行嘉禮但得為子冠嫁竊謂有服不行嘉禮本為吉凶不可相干子雖小功之末可得行冠嫁猶應須父得為其冠嫁若父於大功之末可以冠子嫁子是於吉凶禮無礙吉凶禮無礙豈不得自冠自嫁若自冠自嫁於事有礙則冠子嫁子寜獨可通今許其冠子而塞其自冠是琛之所惑也又令㫖推下殤小功不可娶婦則降服大功亦不得為子冠嫁伏尋此㫖若為降服大功不可冠子嫁子則降服小功亦不可自冠自嫁是為凡厥降服大功小功皆不得冠娶矣記文應云降服則不可寜得唯稱下殤今不言降服的舉下殤實有其義夫出嫁出後或有再降出後之身於本姊妹降為大功若是大夫服士父又以尊降則成小功其於冠嫁義無以異所以然者出嫁則有受我出後則有傳重並欲使薄於此而厚於彼此服雖降彼服則隆昔實朞親雖復再降猶依小功之禮可冠可娶若夫朞降大功大功降為小功止是一等降殺有倫服末嫁冠故無有異唯下殤之服特明不娶之義者蓋緣以幼弱之故夭喪情深既無受厚他姓又異傳重彼宗嫌其年㓜頓成殺畧故特明不娶以示本重之恩是以凡厥降服冠嫁不殊唯在下殤乃明不娶其義若此則不得言大功之降服皆不冠嫁也且記云下殤小功言下殤則不得通於中上語小功又不兼於大功若實大功小功降服皆不冠嫁上中二殤亦不冠嫁者記不得直云下殤小功則不可恐非文意此又琛之所疑也遂從琛議加員外散騎常侍舊尚書南坐無貂貂自琛始也遷御史中丞參禮儀如先琛性貪嗇多受賕賂家産既豐買主第為宅為有司奏坐免官後為通直散騎常侍領尚書左丞參禮儀事琛前後居職凡郊廟諸儀多所創定每進見武帝與語常移晷刻故省中語曰上殿不下有賀雅琛容止閑雅故時人呼之遷散騎常侍參禮儀如故時武帝年髙任職者緣飾奸諂深害時政琛啓陳事條封奏大畧其一曰今北邊稽服政是生聚教訓之時而天下户口減落誠當今之急務國家之於關外賦稅蓋微乃至年常租調動致逋積而人失安居寜非牧守之過其二事曰今天下宰守所以皆尚貪殘罕有亷白者良由風俗侈靡使之然也欲使人守亷隅吏尚清白安可得邪今誠宜嚴為禁制導之以節儉貶黜雕飾糾奏浮華使衆皆知變其耳目改其好惡則易於反掌其三事曰斗筲之人詭競求進運挈瓶之智徼分外之求以深刻為能以繩逐為務長弊増奸寔由於此今誠願責其公平之効黜其殘愚之心則下安上謐無徼倖之患矣其四事曰自征伐北境帑藏空虚今天下無事而猶日不暇給良有以也夫國弊則省其事而息其費事省則養人費息則財聚若言小費不足害財則終年不息矣以小役不足妨人則終年不止矣書奏武帝大怒召主書於前口受敕責琛曰朕有天下四十餘年公車讜言日聞聽覽毎苦倥偬更増惛惑卿珥貂紆組博問洽聞不宜同於闒茸止取名字言我能上事恨朝廷不能受卿云今北邊稽服政是生聚教訓之時而人失安居牧守之過但大澤之中有龍有蛇縱不盡善不能皆惡卿可分明顯出其人卿云宜導之以節儉又云至道者必以淳素為先此言大善夫子言其身正不令而行其身不正雖令不從朕絶房室三十餘年不與女人同屋而寢亦三十餘年於居處不過一牀之地雕飾之物不入於宮此亦人所共知受生不飲酒受生不好音聲所以朝中曲宴未嘗奏樂朕三更出理事随事多少事或少中前得竟事多至日昃方得就食既常一食若晝若夜無有定時疾苦之日或亦再食昔腰過於十圍今之瘦削裁二尺餘舊帶猶存非為妄說為誰為之救物故也書云股肱惟人良臣惟聖向使朕有股肱可得中主今乃不免居九品之下不令而行徒虚言耳卿又云百司莫不奏事詭競求進今不許外人呈事於義可否以噎廢飡此之謂也若斷呈事誰尸其任専委之人云何可得是故古人云専聽生姦獨任成亂何者是宜具以奏聞琛奉敕但謝過而已不敢有所指斥太清二年為中軍宣城王長史侯景陷城琛被創未死賊求得之輿至闕下求見僕射王克領軍朱异勸開城納賊克等讓之涕泣而止賊復輿送莊嚴寺療之明年臺城不守琛逃歸鄉里其年賊寇㑹稽復執琛送出都以為金紫光禄大夫卒琛所撰三禮講疏五經滯義及諸儀注凡百餘篇子翊位巴山太守司馬褧字元表河内温人也曽祖純之晉大司農髙密敬王祖讓之員外常侍父燮善三禮仕齊位國子博士褧少傳家業强力専精手不釋卷沛國劉瓛為儒者宗嘉其學深相賞好與樂安任昉善昉亦推重之梁天監初詔通儒定五禮有舉褧脩嘉禮除尚書祠部郎時創定禮樂褧所建議多見施行兼中書通事舍人每吉凶禮當時名儒明山賓賀瑒等疑不能斷者皆取决焉累遷御史中丞十六年出為宣毅南康王長史行府國并石頭戍軍事褧雖居外官有敕預文徳武徳二殿長名問訊不限日遷晉安王長史卒王命記室庾肩吾集其文為十卷所撰嘉禮儀注一百一十二卷朱异字彦和吳郡錢塘人也祖昭之以學解稱於鄉叔父謙之字處光以義烈知名年數嵗所生母亡昭之假葬於田側為族人朱㓜方燎火所焚同產姊密語之謙之雖小便哀感如持喪長不昏娶齊永明中手刄殺㓜方詣獄自繫縣令申靈朂表上之齊武帝嘉其義慮相報復乃遣謙之随曹武西行將發㓜方子懌於津陽門伺殺謙之兄巽之即异父也又刺殺懌有司以聞武帝曰此皆是義事不可問悉赦之吳興沈顗聞而歎曰弟死於孝兄狥於義孝友之節萃此一門巽之字處林有志節著辯相論幼時顧歡見而異之以女妻焉仕齊官至吳平令异年數嵗外祖顧歡撫之謂其祖昭之曰此兒非常器當成卿門户年十餘好羣聚蒱博頗為鄉黨所患及長乃折節從師梁初開五館异服膺於博士明山賓居貧以傭書自業寫畢便誦徧覧五經尤明禮易渉獵文史兼通雜藝博奕書算皆其所長年二十出都詣尚書令沈約靣試之因戲异曰卿年少何乃不廉异逡廵未達其旨約乃曰天下唯有文義棊書卿一時將去可謂不廉也尋上書言建康宜置獄司比廷尉敕付尚書詳議從之舊制年二十五方得釋褐時异適二十一特敕擢為揚州議曹從事史尋有詔求異能之士五經博士明山賓表薦异年時尚少徳備老成在獨無散逸之想處闇有對賓之色器宇𢎞深神表峰峻金山萬丈緣陟未登玉海千尋窺映不測加以珪璋新琢錦組初搆觸響鏗鏘遇采便發觀其信行非唯十室所稀若使負重遙途必有千里之用武帝召見使說孝經周易義甚悅之謂左右曰朱异實異後見明山賓曰卿所舉殊得人仍召直西省俄兼太學博士其年帝自講孝經使异執讀遷尚書儀曹郎入兼中書通事舍人後除中書郎時秋日始拜有飛蟬正集异武冠上時咸謂蟬珥之兆遷太子右衞率普通五年大舉北侵魏徐州刺史元法僧遣使請舉地内屬詔有司議其虚實异曰自王師北討剋獲相繼徐州地轉削弱咸願歸罪法僧懼禍其降必非偽也帝仍遣异報法僧并敕衆軍應接受异節度及至法僧遵承朝㫖如异策焉遷散騎常侍异容貌魁梧能舉止雖出自諸生甚閑軍國故實自周捨卒後异代掌機密其軍旅謀謨方鎮改換朝儀國典詔誥敕書並典掌之每四方表疏當局簿領諮詳請斷填委於前异屬辭落紙覽事下議縱横敏贍不暫停筆頃刻之間諸事便了遷右衛將軍啓求於儀賢堂奉述武帝老子義敕許之及就講朝士及道俗聽者千餘人為一時之盛時城西又開士林館以延學士异與左丞賀琛遞日述武帝禮記中庸義皇太子又召异於𤣥圃講易大同八年改加侍中异博解多藝圍棊上品而貪財冒賄欺罔視聽以伺候人主意不肯進賢黜惡四方餉饋曽無推拒故逺近莫不忿疾起宅東陂窮乎美麗晚朝來下酣飲其中毎迫曛黄慮臺門將闔乃引其鹵簿自宅至城使捉城門停留管籥既而聲勢所驅薰灼内外產與羊侃相埓好飲食極滋味聲色之娛子鵞炰鯂不輟於口雖朝謁從車中必齎飴餌而輕慠朝賢不避貴戚人或誨之异曰我寒士也遭逢以至今日諸貴皆恃枯骨見輕我下之則為蔑尤甚我是以先之自徐勉周捨卒後外朝則何敬容内省則异敬容質慤無文以綱維為己任异文華敏洽曲營世譽二人行異而俱見倖异在内省十餘年未嘗被譴司農卿傅岐嘗謂异曰今聖上委政於君安得每事從㫖頃者外開殊有異論异曰政言我不能諌爭耳當今天子聖明吾豈可以其所聞干忤天聽太清二年為中領軍舍人如故初武帝夢中原盡平舉朝稱慶甚悅以語异曰吾生平少夢夢必有實异曰此宇内方一之徵及侯景降敕召羣臣廷議尚書僕射謝舉等以為不可許武帝欲納之未决嘗夙興至武徳閤口獨言我國家猶若金甌無一傷缺承平若此今便受地詎是事宜脫至紛紜悔無所及异探帝微㫖答曰聖明御㝢上應蒼𤣥北土遺黎誰不慕仰為無機㑹未達其心今侯景分魏國大半逺歸聖朝若不容受恐絶後來之望帝深納异言又感前夢遂納之及貞陽侯敗没帝憂曰今乃作晉家事乎尋而貞陽自魏遣使述魏相髙澄欲申和睦敕有司定議异又議以和為允帝從之其年六月遣建康令謝挺通直郎徐陵使北通好時侯景鎮壽春疑懼累啓請絶和及致書與异餉金二百兩又致書於制局監周石珍令具申聞异納其金而不停北使景遂反初景謀反合州刺史鄱陽王範司州刺史羊鴉仁並累有啓聞异以景孤立寄命必不應爾乃謂使曰鄱陽王遂不許國家有一客並不為聞奏及賊至板橋使前壽州司馬徐思玉先至求見於上上召問之思玉紿稱反賊請閒陳事上將屏左右舍人髙善寳曰思玉從賊中來情偽難測安可使其獨在殿上時异侍坐乃曰徐思玉豈是刺客邪何言之僻善寳曰思玉已將臨賀入北詎可輕信言未卒思玉果出賊啓异大慙賊遂以討异及陸驗為名及景至城下又射啓言朱异等蔑弄朝權輕作威福臣為讒臣所陷欲加屠戮陛下誅异等臣歛轡北歸帝問簡文曰有是乎對曰然帝召有司將誅之簡文曰賊特以异等為名耳今日殺异無救於急適足貽笑將來若祅氛既息誅之未晚帝乃止异之方倖在朝莫不側目雖皇太子亦不能平至是城内咸尤异簡文為四言愍亂詩曰愍彼阪田嗟斯氛霧謀之不臧褰我王度又製圍城賦末章云彼髙冠及厚履並鼎食而乘肥升紫霄之丹地排玉殿之金扉陳謀謨之啓沃宣政刑之福威四郊以之多壘萬邦以之未綏問豺狼其何者訪虺蜴之為誰並以指异又帝登南樓望賊顧謂异曰四郊多壘誰之罪歟异流汗不能對慙憤發病卒時年六十七詔贈尚書右僕射舊尚書官不以為贈及异卒武帝悼惜之方議贈事左右有善异者乃啓曰异生平所懷願得執法帝因其宿志特有此贈异居權要三十餘年善承上㫖故特被寵任歴官自員外常侍至侍中四官皆珥貂自右衞率至領軍四職並驅鹵簿近代未之有也异及諸子自潮溝列宅至青溪其中有臺池翫好毎暇日與賓客遊焉四方饋遺財貨充積性吝嗇未嘗有散施厨下珍羞恒腐爛毎月常棄十數車雖諸子别房亦不分贍所撰禮易講疏及儀注文集百餘篇子肅位國子博士次閏司徒掾並遇亂卒顧協字正禮吳郡吳人晉司空和六世孫也幼孤随母養於外氏外從祖右光禄大夫張永嘗攜内外孫姪游虎丘山協年數嵗永撫之曰兒欲何戲協曰兒政欲枕石漱流永歎息曰顧氏興於此子及長好學以精力稱外氏諸張多賢逹有識鑒内弟率尤推重焉初為揚州議曹從事舉秀才尚書令沈約覽其策而歎曰江左以來未有斯作為兼廷尉正太尉臨川王聞其名召掌書記仍侍西豐侯正徳讀正徳為巴西梓潼郡協除所部新安令未至縣遭母憂刺史始興王厚資遣之送喪還於峽江遇風同旅皆漂溺唯協一妨觸石得泊焉咸謂精誠所致張率嘗薦之於帝問協年率言三十有五帝曰北方高凉四十强仕南方卑濕三十已衰如協便為已老但其事親孝與友信亦不可遺於草澤卿便稱敕喚出於是以協為兼太學博士累遷湘東王參軍兼記室普通中有詔舉士湘東王表薦之即召拜通直散騎侍郎兼中書通事舍人大通三年霆撃大航華表然盡建康縣馳啓協以為非吉祥未即呈聞後帝知之曰霆之所擊一本罰惡龍二彰朕之有過協掩惡揚善非曰忠公由是見免後守鴻臚卿員外散騎常侍卿舍人並如故自為近臣便繁㡬密毎有述製敕前示協時軰榮之卒官無衾以歛為士子所嗟歎武帝悼惜之為舉哀贈散騎常侍諡曰溫子協少清介有志操初為廷尉正冬服單薄寺卿蔡法度欲解襦與之憚其清嚴不敢發口謂人曰我願解身上襦與顧郎顧郎難衣食者竟不敢以遺之及為舍人同官者皆潤屋協在省十六載器服飲食不改於常有門生始來事協知其廉潔不敢厚餉止送錢二千協發怒杖二十因此事者絶於饋遺自丁艱憂遂終身布衣蔬食少時將娉舅息女未成昏而協母亡免喪後不復娶年六十餘此女猶未他適協義而迎之晚雖判合卒無𦙍嗣協博極羣書於文字及禽獸草木尤稱精詳撰異姓苑五卷瑣語十卷文集十卷並行於世徐摛字士秀東海郯人也一字士繢祖憑道宋海陵太守父超之梁天監初位員外散騎常侍摛㓜好學及長徧覽經史屬文好為新變不拘舊體晉安王綱出戍石頭武帝謂周捨曰為我求一人文學俱長兼有行者欲令與晉安游處捨曰臣外弟徐摛形質陋小若不勝衣而堪此選帝曰必有仲宣之才亦不簡貎乃以摛為侍讀大通初王總戎北侵以摛兼寜蠻府長史參贊戎政教命軍書多自摛出王入為皇太子轉家令兼管記尋帶領直摛文體既别春坊盡學之宮體之號自斯而始帝聞之怒召摛加誚責及見應對明敏辭義可觀乃意釋因問五經大義次問歴代史及百家雜記末論釋教摛商較從横應答如響帝甚加歎異更被親狎寵遇日隆領軍朱异不悅謂所親曰徐叟出入兩宮漸來見逼我須早為之所遂承間白帝曰摛年老又愛泉石意在一郡自養帝謂摛欲之乃召摛曰新安大好山水任昉等並經為之卿為我臨此郡中大通三年遂出為新安太守為政清靜教人禮義勸課農桑朞月風俗便改秩滿為中庶子時臨城公納夫人王氏即簡文妃姪女晉宋以來初昏三日婦見舅姑衆賓皆列觀引春秋義云丁丑夫人姜氏至戊寅公使大夫宗婦覿用幣戊寅即丁丑之明日故禮官據此皆云宜依舊貫簡文問摛摛議曰儀禮云質明贊見婦於舅姑雜記又云婦見舅姑兄弟姊妹皆立於堂下政言婦是外宗未審􅈺令所以舅延外客姑率内賓堂下之儀以備盛禮近代婦於舅姑本有戚屬不相瞻者夫人乃妃姪女有異他姻覿見之儀謂應可畧簡文從其議除太子左衞率及侯景攻陷臺城時簡文居永福省賊衆奔入侍衞走散莫有存者摛獨侍立不動徐謂景曰侯公當以禮見何得如此凶威遂折侯景乃拜由是常憚摛簡文嗣位進授左衞將軍固辭不拜簡文被閉摛不獲朝謁因感氣疾而卒年七十八贈侍中太子詹事諡貞子長子陵最知名陵字孝穆母臧氏嘗夢五色雲化為鳳集左肩上已而誕陵年數嵗家人攜以候沙門釋寳誌寳誌摩其頂曰天上石麒麟也光宅寺慧雲法師毎嗟陵早就謂之顏回八嵗屬文十三通莊老義及長博渉史籍從横有口辯父摛為晉安王諮議王又引陵參寜蠻府軍事王立為皇太子東宮置學士陵充其選稍遷尚書度支郎出為上虞令御史中丞劉孝儀與陵先有隙風聞劾陵在縣贓污因坐免久之為通直散騎侍郎梁簡文在東宮撰長春殿義記使陵為序又令於少傅府述今所製莊子義太清二年兼通直散騎常侍使魏魏人授館宴賓是日甚熱其主客魏收謿陵曰今日之熱當由徐常侍來陵即答曰昔王肅至此為魏始制禮儀今我來聘使卿復知寒暑收大慙齊文襄為相以收失言囚之累日及侯景入寇陵父摛先在圍城之内陵不奉家信便蔬食布衣若居哀恤㑹齊受魏禪梁元帝承制於江陵復通使於齊陵累求復命終拘留不遣乃致書於僕射楊遵彥不報及魏平江陵齊送貞陽侯明為梁嗣乃遣陵随還太尉王僧辯初拒境不納明往復致書皆陵辭也及明入僧辯得陵大喜以為尚書吏部郎兼掌詔誥其年陳武帝誅僧辯仍進討韋載而任約徐嗣徽承虚襲石頭陵感僧辯舊恩往赴約約平武帝釋陵不問以為尚書左丞紹泰二年又使齊還除給事黄門侍郎祕書監陳受禪加散騎常侍天嘉四年為五兵尚書領大著作六年除散騎常侍御史中丞時安成王頊為司空以帝弟之尊權傾朝野直兵鮑僧叡假王威風抑塞辭訟大臣莫敢言陵乃奏彈之文帝見陵服章嚴肅若不可犯為歛容正坐陵進讀奏狀時安成王殿上侍立仰視文帝流汗失色陵遣殿中郎引王下殿自是朝廷肅然遷吏部尚書領大著作陵以梁末以來選授多失其所於是提舉綱維綜覈名實時有冒進求官馳競不已者乃為書宣示之曰永定之時聖朝草創干戈未息尚無條序府庫空虚賞賜懸乏白銀難得黃札易營權以官階代於錢絹義在撫接無計多少致令員外常侍路上比肩諮議參軍市中無數豈是朝章應其如此今衣冠禮樂日富年華何可猶作舊意非理望也所見諸君多踰本分猶言大屈未諭髙懷若問梁朝朱領軍异亦為卿相此不踰其本分耶比是天子所㧞非闗選序梁武帝云世間人言有目色我特不目色范悌宋文帝亦云人豈無運命毎有好官缺輒憶羊𤣥保此則清階顯職不由選也既忝衡流諸賢深明鄙意自是衆咸服焉時論比之毛玠及宣帝入輔謀黜異志者引陵預其議廢帝即位封建昌縣侯太建中為尚書左僕射抗表推周𢎞正王勱等帝召入内殿曰卿何為固辭而舉人乎陵曰𢎞正舊藩長史王勱太平中相府長史張種帝鄉賢戚若選賢舊臣宜居後固辭累日乃奉詔及朝議北侵宣帝命舉元帥衆議在淳于量陵獨曰不然吳明徹家在淮左悉彼風俗將畧人才當今無過者於是爭論數日不能決都官尚書裴忌曰臣同徐僕射陵應聲曰非但明徹良將忌即良副也是日詔明徹為大都督令忌監軍事遂剋淮南數十州地宣帝因置酒舉杯屬陵曰賞卿知人七年領國子祭酒以公事免侍中僕射尋加侍中給扶十二年為中書監領太子詹事以年老累表求致事宣帝亦優禮之詔將作為造大齋令陵就第攝事後主即位遷左光禄大夫太子少傅至徳元年卒年七十七詔贈特進初後主為文示陵云他人所作陵嗤之曰都不成辭句後主銜之至是諡曰章偽侯陵器局深逺容止可觀性又清簡無所營樹俸禄與親族共之太建中食建昌户户送米至水次親戚有貧匱者皆召令取焉數日便盡陵家尋致乏絶府寮怪問其故陵云我有車牛衣裳可賣餘家有可賣不其周給如此少而崇信釋教經論多有釋解後主在東宮令陵講大品經義學名僧自逺雲集毎講筵商較四坐莫能與抗目有青睛時人以為聰慧之相也自陳創業文檄軍書及受禪詔策皆陵所製為一代文宗亦不以矜物未嘗詆訶作者其於後進接引無倦文宣之時國家有大手筆必命陵草之其文頗變舊體緝裁巧密多有新意毎一文出好事者已傳寫成誦遂傳于周齊家有其本後逢喪亂多散失存者三十卷陵有四子儉份儀僔儉一名報㓜而脩立勤學有志操汝南周𢎞直重其為人妻之以女梁元帝名為尚書金部郎中常侍宴賦詩元帝歎賞之曰徐氏之子復有文矣魏平江陵還建鄴累遷中書侍郎太建初廣州刺史歐陽紇舉兵反宣帝令儉持節喻㫖紇見儉盛列仗衛言辭不恭儉曰呂嘉之事誠當已逺將軍獨不見周廸陳寳應乎紇黙然不答懼儉沮衆不許入城置儉於孤園寺紇嘗出見儉儉謂曰將軍業已舉事儉須還報天子儉之性命雖在將軍將軍成敗不在於儉幸不見留紇於是遣儉從間道馳還宣帝乃命章昭達討紇以儉監昭達軍紇平為兼中書通事舍人後主立累遷尋陽内史為政嚴明盗賊靜息遷散騎常侍襲封建昌侯入為御史中丞儉公平無所阿附尚書令江總望重一時為儉所劾後主深委任焉禎明二年卒份少有父風九嵗為夢賦陵見之謂所親曰吾幼屬文亦不加此為海鹽令有政績入為太子洗馬性孝弟陵嘗疾篤份燒香泣涕跪誦孝經日夜不息如是者三日陵疾豁然而愈親戚皆謂份孝感所致先陵卒儀少聰警仕陳位尚書殿中郎陳亡隱于錢塘之赭山隋煬帝召為學士尋除著作佐郎大業四年卒陵弟孝克有口辯能談𤣥理性至孝遭父憂殆不勝喪事所生母陳氏盡就養之道梁末侯景宼亂孝克養母饘粥不能給妻東莞臧氏領軍將軍盾女也甚有容色孝克乃謂曰今饑荒如此供養交闕欲嫁卿與當世人望彼此俱濟於卿如何臧氏弗許之時有孔景行者為侯景將多從左右逼而迎之臧氏涕泣而去所得穀帛悉以遺母孝克又剃髪為沙門改名法整兼乞食以充給焉臧氏亦深念舊恩數私致饋餉故不乏絶後景行戰死臧氏伺孝克於途中累日乃見謂孝克曰往日之事非為相負今既得脫當歸供養孝克嘿然無答於是歸俗更為夫妻後東遊居錢塘之佳義里與諸僧討論釋典遂通三論毎日二時講旦講佛經晚講禮傳道俗受業者數百人天嘉中除剡令非其好尋去職太建四年徵為祕書丞不就乃蔬食長齋持菩薩戒晝夜講誦法華經宣帝甚嘉其操行後為國子祭酒孝克毎侍宴無所食噉至席散當其前膳羞損減帝密記以問中書舍人管斌斌自是伺之見孝克取珍果納紳帶中斌當時莫識其意後尋訪方知其以遺母斌以啓宣帝嗟歎良久乃敕自今宴享孝克前饌並遣將還以餉其母時論美之至德中皇太子入學釋奠百司陪列孝克發孝經題後主詔皇太子北面致敬禎明元年入為都官尚書自晉以來尚書官僚皆攜家屬居省省在臺城内下舍門中有閣道東西跨路通于朝堂其第一即都官省西抵閣道年代久逺多有鬼怪毎夜昏之際無故有聲光或見人著衣冠從井中出須臾復没或門閤自然開閉居多死亡尚書周確卒於此省孝克代確便即居之經兩載祅變皆息時人咸以為貞正所致孝克性清素好施惠故不免飢寒後主敕以石頭津稅給之孝克悉用設齋寫經随盡二年為散騎常侍侍東宮陳亡随例入長安家道壁立所生母患欲粳米為粥不能常辦母亡後孝克遂常噉麥有遺粳米者孝克對而悲泣終身不復食焉開皇十二年長安疾疫隋文帝聞其名行召令於尚書都堂講金剛般若經尋授國子博士後侍東宮講禮傳十九年以疾卒年七十三臨終正坐念佛室内有非常香氣鄰里皆驚異之子萬載位太子洗馬鮑泉字潤岳東海人也父㡬字景𤣥家貧以母老詣吏部尚書王亮干禄亮一見嗟賞舉為舂陵令後為明山賓所薦為太常丞以外兄傅昭為太常依制緦服不得相臨改為尚書郎終於湘東王諮議參軍泉美鬚髯善舉止身長八尺性甚警悟博渉史傳兼有文筆少事元帝為國常侍早見擢任謂曰我文之外無出卿者後為通直侍郎常乘髙幰車從數十左右繖蓋服玩甚精道逢國子祭酒王承承疑非舊貴遣訪之泉從者答曰鮑通直承怪焉復欲辱之遣逼車問鮑通直復是何許人而得如此都下少年遂為口實見尚豪華人相戲曰鮑通直復是何許人而得如此以為笑謔及元帝承制累遷至信州刺史方等之敗元帝大怒泉與王僧辯討之僧辯曰計將安出泉曰事等沃雪何所多慮僧辯曰君言文士常談耳江東少有武幹非精兵一萬不可以往竟陵甲卒不久當至猶可重申欲與卿入言之泉許諾及僧辯如向言泉嘿然不繼元帝大怒於是械繫僧辯時人比泉為酈寄泉既專征長沙久而不剋元帝乃數泉二十罪為書責之曰靣如冠玉還疑木偶鬚似蝟毛徒勞繞喙乃從獄中起王僧辯代泉為都督使舍人羅重歡領齋仗三百人與僧辯往及至長沙遣通泉曰羅舍人被令送王竟陵來泉愕然顧左右曰得王竟陵助我經畧賊不足平矣乃拂席坐而待之僧辯入乃背泉而坐曰鮑郎卿有罪令旨使我鏁卿卿勿以故意見期命重歡出令示泉鏁之牀下泉顏色自若了無懼容曰稽緩王師罪乃甘分但恐後人更思鮑泉之憒憒耳僧辯色甚不平泉乃啓陳淹遲之罪元帝尋復其任令與僧辯等東逼邵陵王於郢州郢州平元帝以世子方諸為刺史泉為長史行州府事方諸見泉和弱毎有諮陳未嘗用使泉伏牀騎背為馬書其衣作其姓名由是州府盡相欺侯景宻遣將宋子仙任約襲之方諸與泉不恤軍政唯蒱酒自樂云賊何由得至既而傳告者衆始命闔門城陷賊執方諸及泉送之景所後景攻王僧辯於巴陵不剋敗還乃殺泉於江夏沉其屍於黄鶴磯初泉夢著朱衣行水上及死舉身帶血而沉于江如其夢泉於儀禮尤明撰新儀三十卷行於世時又有鮑行卿以博學大才稱位後軍臨川王録事兼中書舍人遷歩兵校尉上玉璧銘武帝發詔褒賞好韻語及拜歩兵靣謝帝曰作舍人不免貧得五校實大校例皆如此有集二十卷撰皇室儀十三卷乘輿龍飛記二卷弟客卿位南康太守客卿三子檢正至並才藝知名俱為湘東王五佐正好交遊無日不適人人為之語曰無處不逢烏噪無處不逢鮑佐正不為湘東王所知獻書告退王恨之及建鄴城陷正為尚書外兵郎病不能起景雜於死屍焚之王聞之曰忠非紀信利非象齒焚如棄如於是乎得君子以此知湘東王不仁檢為湘東鎭西府中記室使蜀不屈於武陵王見害論曰夏侯勝云士患不明經術經術明取青紫如拾地芥耳於賀瑒賀琛朱异司馬褧其得之矣而异遂徼寵倖任事居權不能以道佐時茍取容媚及延寇敗國實异之由禍難既彰不明其罪亦既身死寵贈猶殊罰既弗加賞亦斯濫夫太清之亂固其宜矣顧協清介足以追蹤古人徐摛貞正仁者信乎有勇孝穆聰明特達締搆興王獻替謀猷亮直斯在泉本文房之士毎處荷戈之任非材之責勝任不亦難乎南史卷六十二南史卷六十二考證朱异傳起宅東坡窮乎美麗晚朝來下酣飲其中朝一本作日子鵝炰鯂不輟於口鯂一本作鰌字書鯂音蘇與甦同若鰌恐非佳品疑有訛字愍彼阪田阪南本作陂徐摛傳簡文被閉摛不獲朝謁梁書閉字上有幽字徐陵傳既忝衡流諸賢深明鄙意忝監本誤尒今改正又陳書云既忝衡流應須粉墨所望諸賢深明鄙意較明白𢎞正舊藩長史王勱太平中相府長史陳書無中字徐儉傳儉一名報報陳書作衆汝南周𢎞直重其為人直陳書作正徐陵弟孝克傳欲嫁卿與當世人望彼此俱濟當世陳書作富應改从之鮑泉傳父㡬幾梁書作機泉於儀禮尤明撰新儀三十卷行於世三梁書作四南史卷六十二考證
