body:
  text: 南史卷五十六唐李延夀撰列傳第四十六張𢎞䇿子緬纘綰庾域子子輿鄭紹叔吕僧珍樂藹子法才張𢎞策字真簡范陽方城人梁文獻皇后之從父弟也父安之青州主簿南蠻行參軍𢎞䇿幼以孝聞母甞有疾五日不食𢎞䇿亦不食母彊為進粥𢎞策乃食母所餘遭母憂三年不食鹽菜幾至滅性兄弟友愛不忍暫離雖各有室常同卧起世比之姜肱兄弟𢎞䇿與梁武帝年相輩幼見親狎恒隨帝游處毎入室常覺有雲氣體輒肅然𢎞䇿由此特加敬異建武末與兄𢎞胄從武帝宿酒酣移席星下語及時事帝曰天下方亂舅知之乎冬下魏軍方動則亡漢北王敬則猜嫌已久當乘間而作𢎞䇿曰敬則張兩赤眼容能立事帝曰敬則庸才為天下唱先爾主上運祚盡於來年國權當歸江劉而江甚隘劉又闇弱都下當大亂死人如亂麻齊之厯數自兹亡矣梁楚漢當有英䧺興𢎞策曰瞻烏爰止于誰之屋帝笑曰光武所云安知非僕𢎞策起曰今夜之言是天意也請定君臣之分帝曰舅欲斆鄧晨乎是冬魏軍攻新野齊明帝密詔武帝代曹武監雍州事𢎞䇿聞之心喜謂帝曰夜中言當驗帝笑曰且勿多言𢎞䇿從帝西行仍參帷幄身親勞役不憚辛苦齊明帝崩遺詔以帝為雍州刺史乃表𢎞䇿為録事參軍帶襄陽令帝觀海内方亂有匡濟之心密為儲備謀猷所及唯𢎞䇿而已時帝長兄懿罷益州還為西中郎長史行郢州事帝使𢎞䇿到郢陳計於懿曰昔晉惠庸主諸王争權遂内難九興外宼三作方今喪亂有甚於此六貴争權人握王憲制主畫勑各欲專成且嗣主在宫本無令譽媟近左右蜂目忍人一居萬機恣其所欲豈肯虚坐主諾委政朝臣積相嫌贰必大誅戮始安欲為趙倫形迹已露蹇人上天信無此理且性甚猜狹徒取禍機所可當軸江劉而已祏怯而無斷暄弱而不才折鼎覆餗跂踵可待蕭坦胷懐猜忌動言相傷徐孝嗣才非柱石聽人穿鼻若隙開釁起必中外土崩今得外藩幸圖身計及今猜防未生宜召諸弟以時聚集郢州控帶荆湘西注漢沔雍州士馬呼吸數萬時安則竭誠本朝時亂則為國剪暴如不早圖悔無及也懿聞之變色心未之許及懿遇禍帝将起兵夜召𢎞䇿吕僧珍入定議旦乃發兵以𢎞䇿為輔國将軍主領萬人督後部事及郢城平蕭頴逹楊公則諸将皆欲頓軍夏口帝以為宜乘勢長驅直指建鄴𢎞䇿與帝意合又訪寜朔将軍庾域域又同即日上道凡磯浦村落軍行宿次立頓處所𢎞䇿預為圖皆在目中城平帝遣𢎞䇿與吕僧珍先往清宫封檢府庫于時城内珍寳委積𢎞䇿申勒部曲秋毫無犯遷衛尉卿加給事中天監初加散騎常侍封洮陽縣侯𢎞䇿盡忠奉上知無不為交友故舊隨才薦㧞縉紳皆趨焉時東昏餘黨孫文明等初逄赦令多未自安文明又嘗夢乘馬至雲龍門心惑其夢遂作亂帥數百人因運荻炬束仗得入南北掖門至夜燒神獸門總章觀入衛尉府𢎞䇿踰垣匿于龍廐遇賊見害賊又進燒尚書省及閣道雲龍門前軍司馬吕僧珍直殿省帥羽林兵邀擊不能却上戎服御前殿謂僧珍曰賊夜來是衆少曉則走矣命打五鼓賊謂已曉乃散官軍捕文明斬于東市張氏親屬臠食之帝哭之慟曰痛哉衛尉天下事當復與誰論詔贈車騎将軍諡曰閔侯𢎞䇿為人寛厚通率篤舊故及居隆重不以貴地自髙故人賔客接之如布衣禄賜皆散之親友及遇害莫不痛惜焉子緬嗣緬字元長年數嵗外祖中山劉仲徳異之曰此兒非常器非止為張氏寳方為海内令名也齊永元末兵起𢎞䇿從武帝向都留緬襄陽年始十嵗每聞軍有勝負憂喜形於顔色及𢎞策遇害緬喪過于禮武帝毎遣喻之服闋襲封洮陽縣侯起家秘書郎出為淮南太守時年十八武帝疑其年少未閑吏事遣主書封取郡曹文案見其斷決乆惬甚稱賞之再遷雲麾外兵參軍緬少勤學自課讀書手不輟卷有質疑者隨問便對略無遺失殿中郎缺帝謂徐勉曰此曹舊用文學且鴈行之首宜詳擇其人勉舉緬充選頃之為武陵太守還拜太子洗馬中舍人緬母劉氏以父沒家貧𦵏禮有闕遂終身不居正室不隨子入官府緬在郡所得俸禄不敢用至乃妻子不易衣裳及還都竝供之母振遺親屬雖累載所蓄一朝隨盡緬私室常閴然如貧素者累遷豫章内史緬為政任恩惠不設鉤距吏人化其徳亦不敢欺故老咸云數十年未有也後為御史中丞坐收捕人與外國使闘左降黄門兼領先職俄復舊任緬居憲司推繩無所顧望號為勁直武帝乃遣圖其形於臺省以勵當官遷侍中未拜卒詔便舉哀昭明太子亦往臨哭緬抄後漢晉書抄三十卷又抄江左集未及成文集五卷緬弟纘纘字伯緒出繼從伯𢎞籍武帝舅也梁初贈廷尉卿纘年十一尚武帝第四女富陽公主拜駙馬都尉封利亭侯召補國子生起家秘書郎時年十七身長七尺四寸眉目疎朗神采爽發武帝異之嘗曰張壮武云後八世有逮吾者其此子乎纘好學兄緬有書萬餘卷晝夜披讀殆不輟手秘書郎四員宋齊以來為甲族起家之選待次入補其居職例不數十日便遷任纘固求不徙欲遍觀閣内書籍帝執四部書目曰君讀此畢可言優仕矣如此三載方遷太子舍人轉洗馬中舍人並掌管記纘與琅邪王錫齊名普通初魏使彭城人劉善明通和求識纘與錫纘時年二十三善明見而嗟服累遷尚書吏部郎俄為長史兼侍中時人以為早逹河東裴子野曰張吏部有喉脣之任已恨其晚矣子野性曠逹自云年出三十不復詣人初未與纘遇便虚相推重因為忘年之交大通中為呉興太守居郡省煩苛務清静人吏便之大同二年徴為吏部尚書後門寒素一介者皆見引㧞不為貴門屈意人士翕然稱之負其才氣無所與讓定襄侯袛無學術頗有文性與兄衡山侯恭俱為皇太子愛賞時纘從兄謐聿並不學問性又凡愚恭袛嘗預東宫盛集太子戱纘曰丈人謐聿皆何在纘從容曰纘有謐聿亦殿下之衡定太子色慙或云纘從兄聿及弼愚短湘東王在坐問纘曰丈人二從聿弼藝業何如纘曰下官從弟雖竝無多猶賢殿下之有衡定舉坐愕然其忤物如此五年武帝詔曰纘外氏英華朝中領袖司空已後名冠范陽可尚書僕射纘本寒門以外戚顯重髙自擬倫而詔有司空范陽之言深用為狹以朱异草詔與异不平初纘與參掌何敬容意趨不協敬容居權軸賔客輻凑有過詣纘纘輒距不前曰吾不能對何敬容殘客及是遷為讓表曰自出守股肱入居衡尺可以仰首伸眉論列是非者矣而寸衿所滯近蔽耳目深淺清濁豈有能預加以矯心飾貎酷非所閑不喜俗人與之共事此言以指敬容也在職議南郊御乘素輦適古今之𠂻又議印綬官若備朝服宜竝著綬時竝施行改為湘州刺史述職經塗作南征賦初呉興呉規頗有才學邵陵王綸引為賔客深相禮遇及綸作牧郢蕃規隨從江夏遇纘出之湘鎮路經郢服綸餞之南浦纘見規在坐意不能平忽舉盃曰呉規此酒慶汝得陪今宴規尋起還其子翁孺見父不悦問而知之翁孺因氣結爾夜便卒規恨纘慟兒憤哭兼至信次之間又致殞規妻深痛夫子翌日又亡時人謂張纘一盃酒殺呉氏三人其輕傲皆此類也至州務公平遣十郡慰勞解放老疾吏役及闗市戌邏先所防人一皆省併州界零陵衡陽等郡有莫傜蠻者依山險為居厯政不賔服因此向化益陽縣人作田二頃皆異畝同穎在政四年流人自歸户口増十餘萬州境大寜晚頗好積聚多寫圖書數萬卷有油二百斛米四千石佗物稱是太清二年徙授領軍俄改雍州刺史初聞邵陵王綸當代已為湘州其後更用河東王譽纘素輕少王州府候迎及資待甚薄譽深銜之及至州譽遂託疾不見纘仍檢括州府付度事留纘不遣㑹聞侯景宼建鄴譽當下援湘東王時鎮江陵與纘有舊纘将因之以斃譽兄弟時湘東王與譽及信州刺史桂陽王慥各率所領入援䑓下硤至江津譽次江口湘東王届郢州之武城屬侯景已請和武帝詔罷援軍譽自江口将旋湘鎮欲待湘東至謁督府方還州纘乃貽湘東書曰河東戴檣上水欲襲江陵岳陽在雍共謀不逞江陵遊軍王朱榮又遣使報云桂陽住此欲應譽詧湘東信之乃覆船沉米斬纜而歸至江陵收慥殺之荆湘因構嫌隙纘尋棄其部曲攜其二女單舸赴江陵湘東遣使責讓譽索纘部下仍遣纘向雍州前刺史岳陽王詧推遷未去鎮但以城西白馬寺處之㑹聞賊陷䑓城詧因不受代州助防杜岸紿纘曰觀岳陽不容使君使君素得物情若走入西山舉義事無不濟纘以為然因與岸兄弟盟乃要雍州人席引等於西山聚衆乃服婦人衣乘青布輿與親信十餘人奔引等杜岸馳告詧詧令中兵參軍尹正等追討纘以為赴期大喜及至竝禽之纘懼不免請為沙門名法緒詧襲江陵常載纘隨後逼使為檄固辭以疾及軍退敗行至湕水南防守纘者慮追兵至遂害之棄尸而去元帝承制贈開府儀同三司諡簡憲公元帝少時纘便推誠委結及帝即位追思之嘗為詩序云簡憲之為人也不事王侯負才任氣見余則申旦逹夕不能已已懐夫人之徳何日忘之纘著鴻寳一百卷文集二十卷初纘之往雍州資産悉留江陵性既貪婪南中貲賄填積及死湘東王皆使收之書二萬卷竝摙還齊珍寳貨物悉付庫以粽密之屬還其家次子希字子顔早知名尚簡文第九女海鹽公主承聖初位侍中纘弟綰綰字孝卿少與兄纘齊名湘東王繹嘗䇿之百事綰對闕其六號為百六公位員外散騎常侍中軍宣城王長史遷御史中丞武帝遣其弟中書舍人絢宣旨曰為國之急唯在執憲直繩用人之本不限升降晉宋時周閔蔡廓兼以侍中為之卿勿疑是左遷時宣城王府望重故有此㫖焉大同四年元日舊制僕射中丞坐位東西時當綰兄纘為僕射及百司就列兄弟竝𨗳騶分騶兩塗前代未有時人榮之出為豫章内史在郡述制旨禮記正言義四姓衣冠士子聽者常數百人八年安成人劉敬宫挾祅道遂聚黨攻郡進宼豫州刺史湘東王遣司馬王僧辯討賊受綰節度旬月間賊黨悉平十年復為御史中丞綰再為憲司彈糾無所回避豪右憚之時城西開士林館聚學者綰與右衛朱异太府卿賀琛遞述制旨禮記中庸義太清三年為吏部尚書宫城陷奔江陵位尚書右僕射魏剋江陵朝士皆俘入闗綰以疾免卒於江陵次子交字少游尚簡文第十一女定陽公主承聖二年官至秘書丞掌東宫管記庾域字司大新野人也少沉静有名鄉曲梁文帝為郢州辟為主簿歎美其才曰荆南杞梓其在斯乎加以恩禮長沙宣武王為梁州以為錄事參軍帶華陽太守時魏軍攻圍南鄭州有空倉數十所域手自封題指示将士曰此中粟皆滿足支二年但努力堅守衆心以安軍退以功拜羽林監及長沙王為益州域隨為懐寜太守罷任還家妻子猶事井臼而域所衣大布餘俸專充供飬母好鶴唳域在位營求孜孜不怠一旦䨇鶴來下論者以為孝感所致永元初南康王板西中郎諮議參軍母憂去職梁武帝舉兵起為寜朔将軍領行選武帝東下師次楊口和帝遣御史中丞宗夬勞軍域乃諷夬曰黄鉞未加非所以總率侯伯夬反西臺即授武帝黃鉞蕭頴胄既都督中外諸軍事論者謂武帝應致牋域争不聽乃止郢城平域及張𢎞䇿議與武帝意同即命衆軍便下域謀多被納用覇府初開為諮議參軍天監初封廣牧縣子後軍司馬出為寜朔将軍巴西梓潼二郡太守梁州長史夏侯道遷降魏魏襲巴西域固守城中糧盡将士皆齕草供食無有離心魏軍退進爵為伯于時兵後人饑域上表振貸不待報輒開倉為有司所糾上遷域西中郎司馬輔國将軍寜蜀太守卒于官子子輿子輿字孝卿幼而歧嶷五嵗讀孝經手不釋卷或曰此書文句不多何用自苦答曰孝徳之本何謂不多齊永明末除州主簿時父在梁州遇疾子輿奔侍醫藥言淚恒并長沙宣武王省疾見之顧曰庾録事雖危殆可憂更在子輿尋丁母憂哀至輒嘔血父戒以滅性乃禁其哭泣梁初為尚書郎天監三年父出守巴西子輿以蜀路險難啟求侍從以孝飬獲許父遷寜蜀子輿亦相隨父於路感心疾毎至必呌子輿亦悶絶及父卒哀慟将絶者再奉喪還鄉秋水猶壮巴東有滛預石髙出二十許丈及秋至則纔如見焉次有瞿塘大灘行侣忌之部伍至此石猶不見子輿撫心長呌其夜五更水忽退減安流南下及度水復舊行人為之語曰滛預如幞本不通瞿塘水退為庾公初發蜀有䨇鳩巢舟中及至又栖廬側毎聞哭泣之聲必飛翔簷宇悲鳴激切欲為父立佛寺未有定處夢有僧謂曰将修勝業嶺南原即可營造明往履厯果見標度處所有若人功因立精舍居墓所以終喪服闋手足枯攣待人而起仍布衣蔬食志守墳墓叔該謂曰汝若固志吾亦抽簪於是始仕雖以嫡長襲爵國秩盡推諸弟累遷兼中郎司馬大通二年除巴陵内史便道之官路中遇疾或勸上郡就醫子輿曰吾疾患危重全濟理難豈可貪官陳尸公廨因勒門生不得輒入城市即於渚次卒遺令單衣帢履以歛酒脯施靈而已鄭紹叔字仲明榮陽開封人也累世居夀陽祖琨宋高平太守紹叔年二十餘為安豐令有能名後為本州中從事史時刺史蕭誕弟諶被誅䑓遣收誕兵使卒至左右驚散紹叔獨馳赴焉誕死侍送喪柩衆咸稱之到都司空徐孝嗣見而異之曰祖逖之流也梁武帝臨司州命為中兵參軍領長流因是厚自結附帝罷州還都謝遣賔客紹叔獨固請願留帝曰卿才幸自有用我今未能相益宜更思佗塗固不許於是乃還夀陽刺史蕭遥昌苦要引紹叔終不受命遥昌將囚之鄉人救解得免及帝為雍州紹叔間道西歸補寜蠻長史扶風太守東昏既害朝宰頗疑于帝紹叔兄植為東昏直後東昏遣至雍州託候紹叔潛使為刺客紹叔知之密白帝及植至帝於紹叔處置酒宴之戱植曰朝廷遣卿見圖今日閑宴是見取良㑹也賔主大笑令植登城隍周觀府署士卒器械舟艫戎馬莫不富實植退謂紹叔曰雍州實力未易圖也紹叔曰兄還具為天子言之兄若取雍州紹叔請以此衆一戰送兄於南峴相持慟哭而别續復遣主帥杜伯符亦欲為刺客詐言作使上亦密知宴接如常伯符懼不敢發上後即位作五百字詩具及之初起兵紹叔為冠軍将軍改驍騎将軍從東下江州平留紹叔監州事曰昔蕭何鎮闗中漢祖得成山東之業宼恂守河内光武建河北之基今之九江昔之河内我故留卿以為羽翼前途不㨗我當其咎糧運不繼卿任其責紹叔流涕拜辭於是督江湘糧運無闕乏天監初入為衛尉卿紹叔少孤貧事母及祖母以孝聞奉兄恭謹及居顯要糧賜所得及四方遺餉悉歸之兄室忠於事上所聞纎毫無隐每為帝言事善則曰臣愚不及此皆聖主之䇿不善則曰臣智慮淺短以為其事當如是殆以此誤朝廷也臣之罪深矣帝甚親信之母憂去職紹叔有至性帝嘗使人節其哭頃之封營道縣侯復為衛尉卿以營道縣户凋弊改封東興縣侯三年魏圍合肥紹叔以本號督衆軍鎮東闗事平復為衛尉既而義陽入魏司州移鎮闗南以紹叔為司州刺史紹叔至創立城隍繕兵積榖流人百姓安之性頗矜躁以權勢自居然能傾心接物多所舉薦士亦以此歸之徴為左衛将軍至家疾篤詔於宅拜授輿載還府中使醫藥一日數至卒於府舍帝将臨其殯紹叔宅巷陋不容輿駕乃止詔贈散騎常侍䕶軍将軍諡曰忠紹叔卒後帝嘗澘然謂朝臣曰鄭紹叔立志忠烈善必稱君過則歸已當今殆無其比見賞惜如此子貞嗣吕僧珍字元瑜東海范陽人也世居廣陵家甚寒微童兒時從師學有相工厯觀諸生指僧珍曰此兒有竒聲封侯相也事梁文帝為門下書佐身長七尺七寸容貎甚偉曹輩皆敬之文帝為豫州刺史以為典籖帶䝉令帝遷領軍将軍補主簿袄賊唐㝢之宼東陽文帝率衆東討使僧珍知行軍衆局事僧珍宅在建陽門東自受命當行毎日由建陽門道不過私室文帝益以此知之司空陳顯逹出軍沔北見而呼坐謂曰卿有貴相後當不見減深自努力建武二年魏軍南攻五道竝進武帝帥師援義陽僧珍從在軍中時長沙宣武王為梁州刺史魏軍圍守連月義陽與雍州路斷武帝欲遣使至襄陽求梁州問衆莫敢行僧珍固請充使即日單舸上道及至襄陽督遣援軍且獲宣武王書而反武帝甚嘉之東昏即位司空徐孝嗣管朝政欲要僧珍與共事僧珍知不久當敗竟弗往武帝臨雍州僧珍固求西歸得補卭令及至武帝命為中兵參軍委以心膂僧珍隂飬死士歸之者甚衆武帝頗招武猛士庶響從㑹者萬餘人因命按行城西空地将起數千間屋為止舍多伐材竹沉於檀溪積茅盖若山阜皆未之用僧珍獨悟其指因私具櫓數百張及兵起悉取檀溪材竹装為船艦葺之以茅竝立辦衆軍将發諸将須櫓甚多僧珍乃出先所具每船付二張争者乃息武帝以僧珍為輔國将軍歩兵校尉出入卧内宣通意㫖大軍次江寜武帝使僧珍與王茂率精兵先登赤鼻邏其日東昏将李居士來戰僧珍等大破之乃與茂進白板橋壘立茂移頓越城僧珍守白板李居士知城中衆少直來薄城僧珍謂将士曰今力不敵不可戰亦勿遥射須至壍裏當并力破之俄而皆越壍僧珍分人上城自率馬歩三百人出其後内外齊擊居士等應時奔散及武帝受禪為冠軍将軍前軍司馬封平固縣侯再遷左衛将軍加散騎常侍入直祕書省總知宿衛天監四年大舉北侵自是僧珍晝直中省夜還祕書五年旋軍以本官領太子中庶子僧珍去家久表求拜墓武帝欲榮以本州乃拜南兗州刺史僧珍在任見士大夫迎送過禮平心率下不私親戚兄弟皆在外堂竝不得坐指客位謂曰此兗州刺史坐非吕僧珍牀及别室促膝如故從父兄子先以販葱為業僧珍至乃棄業求州官僧珍曰吾荷國重恩無以報効汝等自有常分豈可妄求叨越當速反葱肆耳僧珍舊宅在市北前有督郵廨鄉人咸勸徙廨以益其宅僧珍怒曰豈可徙官廨以益吾私宅乎姊適于氏住市西小屋臨路與列肆雜僧珍常𨗳從鹵簿到其宅不以為耻在州百日徴為領軍将軍直祕書省如先常以私車輦水灑御路僧珍既有大勲任總心膂性甚恭慎當直禁中盛暑不敢解衣毎侍御座屏氣鞠躬對果食未嘗舉箸因醉後取一甘食武帝笑謂曰卿今日便是大有所進禄俸外又月給錢十萬其餘賜賚不絶於時初武帝起兵攻郢州久不下咸欲走北僧珍獨不肯累日乃見從一夜僧珍忽頭痛壮熱及明而顙骨益大其骨法盖有異焉十年疾病車駕臨幸中使醫藥日有數四僧珍語親舊曰吾昔在䝉縣熱病發黄時必謂不濟主上見語卿有富貴相必當不死俄而果愈吾今已富貴而復發黄所苦與昔政同必不復起竟如言卒于領軍官舍武帝即日臨殯贈驃騎将軍開府儀同三司諡曰忠敬武帝痛惜之言為流涕子淡嗣初宋季雅罷南康郡市宅居僧珍宅側僧珍問宅價曰一千一百萬怪其貴季雅曰一百萬買宅千萬買隣及僧珍生子季雅往賀署函曰錢一千閽人少之弗為通強之乃進僧珍疑其故親自發乃金錢也遂言於帝陳其才能以為壮武将軍衡州刺史将行謂所親曰不可以負吕公在州大有政績樂藹字蔚逺南陽淯陽人晉尚書令廣之六世孫也家居江陵方頤隆準舉動醖藉其舅雍州刺史宗慤嘗陳器物試諸甥姪藹時尚幼而無所取慤由此竒之又取史傳各一卷授藹等使讀畢言所記藹略讀具舉慤益善之齊豫章王嶷為荆州刺史以藹為驃騎行參軍領州主簿參知州事嶷嘗問藹城隍風俗山川險易藹隨問立對若案圖牒嶷益重焉州人嫉之或譖藹廨門如市嶷遣覘之方見藹閉閤讀書後為大司馬記室永明八年荆州刺史巴東王子響稱兵反及敗焚燒府舍官曹文書一時蕩盡齊武帝見藹問以西事藹占對詳敏帝悦用為荆州中從事勑付以修復府州事藹還州繕修廨署數百區頃之咸畢豫章王嶷薨藹解官赴喪率荆湘二州故吏建碑墓所南康王為西中郎以藹為諮議參軍蕭頴胄引藹及宗夬劉坦任以經略天監初累遷御史中丞初藹發江陵無故於船得八車輻如中丞健歩避道者至是果遷焉性公彊居憲䑓甚稱職時長沙宣武王将𦵏而車府忽於庫火油絡欲推主者藹曰昔晉武庫火張華以為積油久灰必然今庫若灰非吏罪也既而檢之果有積灰時稱其博物𢎞恕二年出為平越中郎将廣州刺史前刺史徐元瑜罷歸遇始興人士反逐内史崔睦舒因掠元瑜財産元瑜走歸廣州借兵於藹託欲討賊而實謀襲藹藹覺誅之尋卒於官藹姊適徵士同郡劉蚪亦明識有禮訓藹為州迎姊居官舍三分禄秩以供焉西土稱之子法才法才字元備幼與弟法蔵俱有美名沈約見之曰法才實才子為建康令不受奉秩比去将至百金縣曹啓輸臺庫武帝嘉其清節曰居職若斯可以為百城表矣遷太舟卿尋除南康内史恥以讓奉受名辭不拜厯位少府卿江夏太守因被代表求便道還鄉至家割宅為寺棲心物表尋卒法蔵位征西録事參軍早亡子子雲美容貌善舉止位江陵令承制除光禄卿魏剋江陵衆奔散呼子雲子雲曰終為虜矣不如守以死節遂仆地卒於馬蹄之下論曰張𢎞策惇厚慎密首預帝圖其位遇之隆豈徒外戚云爾至如太清板蕩親屬離貳纘不能叶和蕃岳克濟陶冶之功而茍懐私怨以成釁隙之首風格若此而為梁之亂階惜乎庾域鄭紹叔吕僧珍等或忠誠亮藎或恪勤匪解締構王業皆有力焉僧珍之肅恭禁者紹叔之勤誠靡貳盖有人臣之節矣藹雖異帷幄之勲亦讚雲雷之業其當官任事寵秩不亦宜乎南史卷五十六南史卷五十六考證張緬傳俄復舊任舊任閣本作為真張纘傳帝執四部書目曰君讀此畢可言優仕矣梁書帝作常君作若以粽密之屬還其家密閣本作宻應改从之張綰傳太清三年為吏部尚書三梁書作二吕僧珍傳姊適于氏于一本作干因醉後取一甘食甘監本誤升梁書嘗因醉後取一柑食之應改从之樂藹傳張華以為積油久灰必然久灰閣本作萬匹又注云匹一作石史臣論克濟陶冶之功陶冶梁書作温陶應改从之南史卷五十六考證
