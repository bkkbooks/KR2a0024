body:
  text: 南史卷五唐李延夀撰齊本紀下第五廢帝鬱林王諱昭業字元尚小字法身文恵太子長子也髙帝為相王鎮東府時年五歳牀前戯髙帝方令左右拔白髮問之曰兒言我誰耶荅曰太翁髙帝笑謂左右曰豈有為人作曽祖而拔白髮者乎即擲鏡鑷其後問訊髙帝指示賓客曰我基於此四世矣及武帝即位封為南郡王時年十歳永明五年十一月戊子冠於東宮崇正殿其日小會賜王公以下帛各有差給南郡王扶二人七年有司奏給班劒二十人鼓吹一部髙選友學禮絶羣王十一年給皂輪三望車文恵太子薨立南郡王為皇太孫居東宫其年七月戊寅武帝崩皇太孫即帝位大赦八月壬午詔稱遺詔以護軍将軍武陵王曄為衛將軍征南大将軍陳顯達即本號並開府儀同三司以尚書左僕射西昌侯鸞為尚書令右僕射王晏為左僕射吏部尚書徐孝嗣為右僕射癸未加司徒竟陵王子良位太傅増班劒三十人蠲除三調及衆逋在今年七月三十日以前者省御府及無用池田邸冶減闗市征稅先是每有蠲原之詔少無事實督責如故是時西昌侯鸞任知朝政天下咸望風来蘇至此恩信兩行海内莫不欣然九月辛酉追尊文惠皇太子為世宗文皇帝冬十月壬寅尊皇太孫太妃為皇太后立皇后何氏十一月庚戌魏人来聘辛亥立臨汝公昭文為新安王曲江公昭秀為臨海王皇弟昭粲為永嘉王隆昌元年春正月丁未大赦改元加太傅竟陵王子良殊禮鎮軍將軍西昌侯鸞即本號為大將軍給鼓吹一部親兵五百人以領軍鄱陽王鏘為尚書右僕射詔百僚極陳得失又詔王公以下各舉所知辛亥祀南郊宥隆昌元年以来流人戊午拜崇安陵甲戌使司徒參軍劉斆聘于魏二月辛卯祀明堂夏四月辛巳衛将軍開府儀同三司武陵王曄薨戊子太傅竟陵王子良薨丁酉以驃騎将軍廬陵王子卿為衛將軍尚書右僕射鄱陽王鏘為驃騎將軍並開府儀同三司閏月丁卯以鎮軍大將軍西昌侯鸞即本號開府儀同三司五月甲戌朔日有食之秋七月癸巳皇太后令廢帝為鬱林王帝少羙容止好𨽻書武帝特所鍾愛敕皇孫手書不得妄出以貴之進退音吐甚有令譽生而為竟陵文宣王所攝養常在袁妃間竟陵王移住西州帝亦随住焉性甚辯慧哀樂過人接對賓客皆款曲周至矯情飾詐隂懐鄙慝與左右無賴羣小二十許人共衣食同卧起妃何氏擇其中羙貌者皆與交歡密就富市人求錢無敢不與及竟陵王移西邸帝獨住西州每夜輙開後堂閤與諸不逞小人至諸營署中淫宴凡諸小人並逆加爵位皆䟽官名號於黄紙使各囊盛以帶之許南面之日即便施行又别作籥鉤兼善效人書每私出還輙扄籥封題如故故人無知者師史仁祖侍書胡天翼聞之相與謀曰若言之二宮則其事未易若於營署為異人所毆打及犬物所傷豈直罪止一身亦當盡室及禍年各已七十餘生寧足吝邪數日中二人相係自殺二宫不知也武帝以既陽縣寒人給事中綦母珍之代仁祖剡縣寒人馬澄代天翼文恵太子每禁其起居節其用度帝謂豫章王妃庾氏曰阿婆佛法言有福生帝王家今見作天王便是大罪左右主帥動見拘執不如市邊屠酤富兒百倍文恵太子自疾及薨帝侍疾及居喪哀容號毁旁人見者莫不嗚咽裁還私室即歡笑酣飲備食甘滋塟畢立為皇太孫問訊太妃截壁為閤於太妃房内往何氏間每入輙彌時不出武帝往東宮帝迎拜號慟絶而復蘇武帝自下輿抱持之寵愛日隆又在西州令女巫楊氏禱祀速求天位及文帝薨謂由楊氏之力倍加敬信呼楊婆宋氏以来人間有楊婆兒哥盖此徴也武帝有疾又令楊氏日夜禱祈令宮車早晏駕時何妃在西州武帝未崩數日疾稍危與何氏書紙中央作一大喜字而作三十六小喜字繞之侍武帝疾憂容慘慼言發淚下武帝每言及存亡帝輙哽咽不自勝武帝以此謂為必能負荷大業謂曰五年中一委宰相汝勿厝意五年以後勿復委人若自作無成無所多恨臨崩執帝手曰阿奴若憶翁當好作如此再而崩大斂始畢乃悉呼武帝諸伎偹奏衆樂諸伎雖畏威從事莫不哽咽流涕素好狗馬即位未逾旬便毁武帝所起招婉殿以材賜閹人徐龍駒於其處為馬埒馳騎墜馬面頟並傷稱疾不出者數日多聚名鷹快犬以粱肉奉之及武帝梓宫下渚帝於端門内奉辭輼輬車未出端門便稱疾還内裁入閤即於内奏胡伎鞞鐸之聲震響内外時司空王敬則問新除射聲校尉蕭坦之曰便如此不當怱怱邪坦之曰此政是内人哭響徹耳自山陵之後便於閤内乘内人車問訊往皇后所生母宋氏間因㣲服游走市里又多往文帝崇安陵隧中與羣小共作諸鄙褻擲塗賭跳放鷹走狗雜狡獪帝既失道朝事大小皆决之西昌侯鸞鸞有諫多不見從極意賞賜左右動至百數十萬每見錢曰我昔思汝一箇不得今日得用汝未武帝聚錢上庫五億萬齋庫亦出三億萬金銀布帛不可稱計即位未朞歳所用已過半皆賜與諸不逞羣小諸寳器以相撃剖破碎之以為笑樂及至廢黜府庫悉空其在内常裸袒着紅紫錦繡新衣錦帽紅縠褌雜采袒服好鬬雞密買雞至數千價武帝御物甘草杖宫人寸斷用之徐龍駒為後宮舎人日夜在六宫房内帝與文帝幸姬霍氏淫通改姓徐氏龍駒勸長留宮内聲云度霍氏為尼以餘人代之皇后亦淫亂齋閤通夜洞開外内淆雜無復分别中書舎人綦母珍之朱隆之直閤將軍曹道剛周奉叔並為之羽翼西昌侯鸞屢諫不納既而尼媼外入頗傳異語乃疑鸞有異志中書令何𦙍以皇后從叔見親使直殿省常随后呼𦙍為三父與𦙍謀誅鸞令𦙍受事𦙍不敢當依違杜諫乃止又謀出鸞於西州中敕用事不復闗諮鸞慮變先使蕭諶坦之等於省誅曺道剛朱隆之等率兵自尚書省入雲龍門戎服加朱衣於上比入門三失履王晏徐孝嗣蕭坦之陳顯達王廣之沈文季係進帝在夀昌殿裸身與霍氏相對聞外有變使閉内殿諸房閤令閹人登興光樓望還報云見一人戎服從數百人急装在西鍾樓下須叟蕭諶領兵先入宮帝走向愛姬徐氏房拔劒自刺不入以帛纒頸輿接出延徳殿諶初入殿宿衛將士皆衛執亐楯欲戰諶曰所取自有人卿䓁不須動宿衛信之及帝出各欲自奮帝竟無一言出西弄遇弑年二十二舁尸出徐龍駒宅濵塟以王禮霍氏及廣昌君宋並賜死餘黨亦見誅先是文恵太子立樓館於鍾山下號曰東田太子屢游幸之東田反語為顛童也武帝又於青溪立宮號曰舊宮反之窮廐也果以輕狷而至於窮又武帝時有小史姓皇名太子武帝曰皇太子非名之謂於是移點於外易名為犬子處士何點曰太子者天地之所懸三才之所係今化而為犬不得立矣既而文恵太子薨鬱林海陵相繼廢黜此其驗也永明中百姓忽著破後帽始自建業流于四逺貴賤翕然服之此服祅也帽自蕭諶之家其流遂逺天意若曰武穆文昭皆當滅而諶亦誅死之效焉廢帝海陵恭王諱昭文字季尚文惠太子第二子也永明四年封臨汝公鬱林王即位改封新安王及鬱林廢西昌侯鸞奉帝纂統延興元年秋七月丁酉皇帝即位大赦改元賜文武位二等以鎮軍大將軍西昌侯鸞為驃騎大將軍開府儀同三司録尚書事都督揚州刺史加班劒為三十人封宣城郡公出鎮東城以尚書左僕射王晏為尚書令以丹陽尹徐孝嗣為左僕射以領軍將軍沈文季為右僕射以車騎大將軍陳顯達為司空以驃騎大將軍鄱陽王鏘為司徙命宣城公鸞甲仗百人入殿陳顯達王晏徐孝嗣蕭諶各五十人入殿八月壬辰魏人来聘甲午以前司空王敬則為太尉辛丑復置南蠻校尉官甲辰詔使者觀省風俗九月癸未誅新除司徒鄱陽王鏘中書大將軍随王子隆遣平西將軍王廣之誅南兖州刺史安陸王子敬於是江州刺史晉安王子懋起兵遣中護軍王𤣥邈討誅之乙酉又誅湘州刺史南平王鋭郢州刺史晋熈王銶南豫州刺史宜都王鏗丁亥以衞將軍廬陵王子卿為司徒以撫軍将軍桂陽王鑠為中書將軍開府儀同三司冬十月丁酉加宣城公鸞黄鉞進授都督中外諸軍事太傅領大將軍揚州刺史加殊禮進爵為王戊戌誅新除中軍將軍桂陽王鑠撫軍將軍衡陽王鈞侍中祕書監江夏王鋒鎮軍將軍建安王子真左將軍巴陵王子倫是時宣城王鸞輔政帝起居皆諮而後行思食蒸魚菜太官令荅無録公命竟不與辛亥皇太后令廢帝為海陵王使宣城王入纂皇統建武元年詔海陵王依漢東海王彊故事給虎賁旄頭畫輪車設鍾簴宫縣十一月稱王有疾數遣御師往視乃殞之給溫明祕器斂以衮冕之服大鴻臚監護喪事塟給轀輬車九旒大輅黄屋左纛前後部羽葆鼔吹挽歌二部依東海王彊故事諡曰恭先是武帝立禪靈寺於都下當世以為壮觀天意若曰禪者禪也靈者神明之目漢文帝晏駕而鼎業傾移也永明世市里小兒以鐵相撃於地謂之鬬鑿鑿之為言族也至是宗室族滅矣又武帝時以燕支為朱衣朝士皆服之及明帝以宗子入纂此又奪朱之效也時又多以生紗為帽半其裙而析之號曰倚勸先是人間語好云擾攘建武至是朝士勸進實為怱遽倚勸擾攘之言於是驗矣髙祖明皇帝諱鸞字景栖始安貞王道生之子也小字𤣥度少孤髙帝撫育過諸子宋泰豫元年為安吉令有嚴能之名昇明中累遷淮南宣城二郡太守進號輔國將軍髙帝踐阼封西昌侯位郢州刺史永明元年為侍中領驍騎將軍王子侯舊乗纒帷車帝獨乘下帷儀從如素士公事混撓販食人擔火誤燒牛鼻豫章王以白武帝帝笑焉轉為散騎常侍左衛將軍清道而行十年累遷尚書左僕射領右衛將軍武帝遺詔為侍中尚書令尋加鎮軍將軍給班劒二十人隆昌元年即本號為大將軍給鼔吹一部親兵五百人尋加中書監開府儀同三司海陵王立為驃騎大將軍録尚書事揚州刺史加都督増班劒為三十人封宣城郡公鎮東府城給兵五千人錢二百萬布千匹九江事難假黄鉞事寧表送之尋加黄鉞都督中外諸軍事太傅領大將軍揚州牧増班劒為四十人給幢絡三望車前後部羽葆鼓吹劒履上殿入朝不趋贊拜不名置左右長史司馬從事中郎掾屬各四人封宣城王未拜太后令廢海陵王以上入纂髙帝為第三子羣臣三請乃受命建武元年冬十月癸亥皇帝即位大赦改元文武賜位二等以太尉王敬則為大司馬以司空陳顯達為太尉乙丑詔斷逺近上禮丁卯詔自今雕文篆刻歳時光新可悉停省藩牧守宰或有薦獻事非任土宜加禁斷十一月壬申日有蝕之帝宿沐浴不御内其日潔齋蔬食斷朝務屏人單衣帢危坐以至事畢追尊始安貞王為景皇妃江氏為懿后别立寝廟號陵曰修安封桂陽王鑠等諸王子皆為列侯凡諸王侯得罪者諸子皆復屬籍又詔遣大使觀省四方癸酉革永明之制依晋宋舊典太子以師禮敬少傅甲戌進大司馬尋陽公王敬則等十三人爵邑各有差省新林苑先是百姓地者悉以還主廢南蠻校尉官己卯追崇妃劉氏為敬皇后號陵曰興安庚辰立皇子寳義為晉安王寳𤣥為江夏王寳源為廬陵王寳寅為建安王寳融為随郡王寶攸為南平王甲中斷官長貢獻及私餉遺以安陸昭王緬第二子寳晊襲封安陸王丁亥詔細作中署材官車府凡諸工可悉開番假逓令休息戊子立皇子寳卷為皇太子賜天下為父後者爵一級己丑詔東宫肇建逺近或有慶禮可悉斷之永明中御史中丞沈深表百官年登七十者皆令致仕並窮困私門庚子詔自縉紳年及可一遵永明七年以前銓敘之科十二月庚戌宣徳右僕射劉朗之㳺撃將軍劉璩之子坐不贍給兄子致使随母他嫁免官禁錮終身付之郷論是歳魏孝文皇帝遷都洛陽二年春正月辛未降都下撃囚殊死以下詔王公以下各舉所知内外羣僚各進忠言無有所諱魏攻豫司徐梁四州壬申遣鎮軍王廣之督司州右衞將軍蕭坦之督徐州尚書右僕射沈文季督豫州以拒魏己卯詔都下二縣有毁發墳壠随宜修理乙未魏軍攻鍾離徐州刺史蕭恵休破之丙申加太尉陳顯達使持節都督西北道諸軍事丁酉内外纂嚴三月己未司州刺史蕭誕與衆軍攻敗魏軍詔雍豫司南兖徐五州遭遇兵戎之家悉停今年税調丙寅停青州麥租魏軍自夀春退甲申觧嚴夏四月己亥朔親録三百里内獄訟自外委州郡訊察三署徒𨽻原遣有差魏軍圍漢中梁州刺史蕭懿拒退之五月甲午寝廟成詔監作長帥賜位一等六月壬戌誅領軍蕭諶西陽王子明南海王子䍐邵陵王子貞秋九月己丑改封南平王寶攸為邵陵王蜀郡王子文為西陽王廣漢王子峻為衡陽王臨海王昭秀為巴陵王永嘉王昭粲為桂陽王冬十月癸卯詔罷東田毁光興樓并詔水衡量省御乘乙邜納皇太子妃褚氏大赦王公以下班賜各有差斷四方上禮十二月丁酉詔晉帝諸陵悉皆修理并増守衛呉晋陵失稔之郷蠲三調有差三年春正月丁酉以隂平王楊炅子崇祖為沙州刺史封隂平王二月己巳詔申明守長六周之制事竟不行乙酉詔以去歳魏攻緣邊諸州郡將士有臨陣及病死者並送還本土三月壬午詔車府乗輿有金銀飾者皆剔除之夏四月魏軍攻司州櫟城戍主魏僧崏撃破之冬閏十二月戊寅皇太子冠賜王公以下帛各有差為父後者賜爵一級斷逺近上禮四年春正月庚午大赦庚辰詔人産子者蠲其父母調役一年又賜米十斛新婚者蠲夫役一年壬辰誅尚書令王晏二月以尚書左僕射徐孝嗣為尚書令秋八月甲午追尊景皇所生王氏為恭太后魏軍攻沔北冬十月又逼司雍二州甲戌遣太子中庶子蕭衍右軍司馬張稷禦之十一月丙辰以氐楊靈珍為北秦刺史封仇池公武都王十二月丁丑遣度支尚書崔慧景率衆救雍州永泰元年春正月癸未朔大赦中軍大將軍徐孝嗣即本號開府儀同三司沔北諸郡為魏所攻相繼亡敗新野太守劉忌随宜應接食盡煮土為粥而救兵不至城被剋死之乙巳遣太尉陳顯達持節救雍州丁未誅河東王鉉臨賀王子岳西陽王子文衡陽王子峻南康王子琳永陽王子珉湘東王子建南郡王子夏巴陵王昭秀桂陽王昭粲二月癸丑遣左衞將軍蕭惠休假節援夀陽辛未豫州刺史裴叔業敗魏軍於淮北三月甲午蠲雍州遇魏軍之縣租布戊申詔増仲尼祭秩上以疾患不瘳望氣者云宜改元夏四月甲寅大赦改元文武賜位二等己未立武陵昭王子子坦為衡陽王丁丑大司馬會稽太守王敬則舉兵反五月壬午遣輔國將軍劉山陽率軍東討乙酉斬敬則傳首建業曲赦浙東吳晉陵等七郡秋七月己酉帝崩于正福殿年四十七遺詔徐孝嗣可重申八命中書監本官悉如故沈文季可尚書左僕射常侍護軍如故江祏可右僕射江祀可侍中劉暄可衛尉卿軍政大事委陳太尉内外衆事無大小委徐孝嗣遥光坦之江祏其大事與沈文季江祀劉暄參懐心腹之任可委劉悛蕭惠休崔慧景羣臣上諡曰明皇帝廟號髙宗塟興安陵帝明審有吏才持法無所借制御親幸臣下肅清驅使寒人不得用四幅繖大存儉約罷武帝所起新林苑以地還百姓廢文惠太子所起東田斥賣之永明中輿輦舟乘悉剔金銀還主衣庫以牙角代之嘗用皂莢訖授餘濼與左右曰此猶堪明日用大官進御食有裹蒸帝十字畵之曰可四片破之餘充晚食而武帝掖庭中宫殿服御一無所改其儉約如此性猜忌亟行誅戮信道術用計數每出行幸先占利害簡於出入将南則詭言之西將東則詭言之北皆不以實竟不南郊初有疾無輟聽覽羣臣莫知及疾䔍敕臺省府署文簿求白魚以為藥外始知之身衣絳衣服飾皆赤以為厭勝巫覡云後湖水頭經過宫内致帝有疾帝乃自至太官行水溝左右啟太官無此水則不立决意塞之欲南引淮流會崩事寝廢帝東昏侯諱寶卷字智藏明帝第二子也本名明賢明帝輔政後改焉建武元年立為皇太子永泰元年七月己酉明帝崩太子即皇帝位八月庚申鎮北将軍晉安王寶義進號征北大将軍開府儀同三司冬十月己未詔刪省律科癸亥詔蕭坦之江祏更直殿省總監宿衞辛未詔劉暄江祏更直延明殿省十一月戊子立皇后褚氏庚寅尚書令徐孝嗣議王侯貴人昏連卺以真銀盃盖出近俗又牢燭侈繢亦虧曩制今除金銀連鎻自餘新器悉用埏陶牢燭華侈亦宜停之奏可永元元年春正月戊寅朔大赦改元辛卯祀南郊丁酉改封随王寶融為南康王安陸王寶晊為湘東王竟陵王昭胃為巴陵王二月太尉陳顯達敗績於馬圈夏四月丙午朔魏孝文皇帝崩己巳立皇子誦為皇太子大赦賜為父後者爵一級五月癸亥加撫軍大將軍始安王遥光開府儀同三司六月甲子詔原雍州今年三調秋七月辛未淮水變赤如血丙戌殺尚書右僕射江祏侍中江祀地震自此至来嵗晝夜不止小屋多壊丁亥都下大水死者甚衆賜死者材器並加振恤八月乙巳蠲遇水資財漂蕩者今年調税又詔為馬圈戰亡將士舉哀丙辰揚州刺史始安王遥光據東府反詔曲赦都下中外戒嚴遣領軍将軍蕭坦之致討戊午斬遥光傳首己巳以尚書令徐孝嗣為司空以領軍蕭坦之為尚書左僕射閏月丙子以江陵公寶覽為始安王九月甲辰殺尚書左僕射蕭坦之右衛将軍曹武戊午殺領軍將軍劉暄壬戌以頻殺大臣大赦冬十月乙未誅尚書令新除司空徐孝嗣右僕射新除鎮軍將軍沈文季庚子以吳興太守蕭恵休為尚書右僕射辛丑以侍中王亮為左僕射十一月丙辰太尉江州刺史陳顯達舉兵反於尋陽乙丑加護軍将軍崔慧景平南將軍督衆軍南討十二月甲申陳顯逹至都宫城嚴警己酉斬顯達傳其首餘黨盡平二年春正月庚午詔討豫州刺史裴叔業二月己丑叔業病死兄子植以夀春降魏三月乙卯命平西将軍崔慧景攻夀春夏四月丙午尚書右僕射蕭惠休卒丁未崔慧景於廣陵反舉兵内向壬子命右衛將軍左興盛督都下水歩衆軍禦之南徐州刺史江夏王寶𤣥以京城納慧景乙卯遣中領軍王瑩率衆軍屯北籬門壬戌慧景至瑩等敗績甲子慧景入建業臺城内閉門拒守豫州刺史蕭懿興兵入援己巳以懿為尚書右僕射癸酉慧景弃衆走斬之詔曲赦都下及南徐南兖二州乙亥以新除尚書右僕射蕭懿為尚書令丙子以中領軍王瑩為尚書右僕射五月己酉江夏王寶𤣥伏誅壬子赦己丑曲赦都下及徐兖二州六月庚寅車駕於樂游苑内會如三元都下放女人觀秋七月甲辰夜宫内火唯東閤内明帝舊殿數區及太極以南得存餘皆蕩盡冬十月己亥殺尚書令蕭懿十一月甲寅西中郎長史蕭頴胄起兵於荆州十二月雍州刺史蕭衍起兵於襄陽是嵗魏宣武皇帝景明元年三年春正月丙申朔日有蝕之帝與宫人於閲武堂元會皇后正位閹人行儀帝戎服臨視丁酉以驃騎大将軍晉安王寶義為司徒以新除撫軍將軍建安王寶寅為車騎将軍開府儀同三司乙巳長星見竟天辛亥祀南郊大赦詔百官陳讜言二月丙寅乾和殿西廂火壬午詔遣羽林兵征雍州中外纂嚴始内横吹五部於殿内晝夜奏之壬戌蚩尤旗見三月乙巳南康王寶融即皇帝位於江陵癸丑遣平西將軍陳伯之西征六月蕭頴胄弟頴孚起兵廬陵戊子赦江州安成廬陵二郡秋七月癸巳曲赦荆雍二州雍州刺史張欣泰前南譙太守王靈秀率石頭文武奉建安王寶寅向臺至杜姥宅宫門閉乃散走丙辰龍鬬于建康淮激水五里八月辛卯以太子左率李居士總督西討諸軍事屯新亭九月甲辰蕭衍至南豫州輔國将軍監南豫州事申胄軍二萬人於姑熟奔歸丙辰李居士與衍軍戰於新亭見敗冬十月甲戌王珍國又戰敗於朱雀航戊寅寧朔将軍徐元瑜以東府城降青冀二州刺史桓和入衛屯東宫尋亦降衍於是閉宫城門自守十二月丙寅新除雍州刺史王珍國侍中張稷率兵入殿殺帝時年十九帝在東宫便好㺯不喜書學明帝亦不以為非但朂以家人之行令太子求一日再入朝發詔不許使三日一朝在宫嘗夜捕鼠達旦以為笑樂明帝臨崩屬後事以隆昌為戒曰作事不可在人後故委任羣小誅諸宰臣無不如意性訥澀少言不與朝士接欲速塟惡靈在太極殿徐孝嗣固争得踰月每當哭輙云喉痛太中大夫羊闡入臨無髮號慟俯仰幘遂脱地帝輟哭大笑謂宦者王寶孫曰此謂秃秋啼来乎自江祏始安王遥光等誅後無所忌憚日夜於後堂戱馬鼓譟為樂合夕便撃金鼓吹角令左右數百人呌雜以羌胡横吹諸伎常以五更就臥至晡乃起王侯以下節朔朝見晡後方前或際暗遣出臺閣案奏月數十日乃報或不知所在閹豎以紙包裹魚肉還家並是五省黄案二年元會食後方出朝賀裁竟便還殿西序寝自己至申百僚陪位皆僵仆菜色比起就會怱遽而罷太子所生母黄貴嬪早亡令潘妃母養之拜潘氏為貴妃乗卧輿帝騎馬從後著織成袴褶金薄帽執七寶縛矟又有金銀校具錦繡諸帽數十種各有名字戎服急装縛袴上著絳衫以為常服不變寒暑陵冒雨雪不避阬穽馳騁渴乏輙下馬觧取腰邊蠡器酌水飲之復上馳去馬乘具用錦繡處患為雨所濕織雜采珠為覆䝉備諸雕巧教黄門五六十人為騎客又選營署無賴小人善走者為逐馬鷹犬左右數百人常以自随奔走往来略不暇息置射雉場二百九十六處翳中帷帳及歩障皆袷以緑紅錦金銀鏤弩牙瑇瑁帖箭每出輙與鷹犬隊主徐令孫媒翳隊主俞靈韻齊馬而走左右争逐之又甚有筋力牽弓至三斛五斗能擔幢初學擔幢每傾倒在幢杪者必致踠傷其後白虎幢七丈五尺齒上擔之折齒不倦擔幢諸校具服飾皆自製之綴以金華玉鏡衆寶舎人主書及至左右主帥並皆侍側逞諸變態曾無愧顔始欲騎馬未習其事俞靈韻為作木馬人在其中行動進退随意所適其後遂為善騎陳顯達卒漸出游走不欲令人見之驅斥百姓唯置空宅而已是時率一月二十餘出既往無定處尉司常慮得罪東行驅西南行驅北應旦出夜便驅逐吏司奔驅呌呼盈路打鼓蹋圍鼓聲所聞便應奔走臨時驅廹衣不暇披乃至徒跣走出犯禁者應手格殺百姓無復作業終日路隅從萬春門由東宫以東至郊外數十里皆空家盡室巷陌縣幔為髙障置人防守謂之屏除髙障之内設部伍羽儀復有數部皆奏鼓吹羌胡伎鼓角横吹夜反火光照天每三四更中鼓聲四出幡㦸横路百姓喧走士庶莫辨或於市肆左側過親幸家環繞宛轉周徧都下老小震驚啼號塞道處處禁斷不知所過疾患困篤者悉掆移之無人掆者扶匐道側吏司又加捶打絶命者相係從騎及左右因之入富家取物無不蕩盡工商莫不廢業樵蘇由之路斷至於乳婦昏姻之家移産寄室或輿病棄屍不得殯塟有棄病人於青溪邊者吏懼為監司所問推至水中泥覆其面須臾便死遂失骸骨前魏興太守王敬賓新死未斂家人被驅不得留視及家人還鼠食兩眼都盡如此非一又常至沈公城有一婦人當産不去帝入其家問何獨在荅曰臨産不得去因剖腹看男女又長秋卿王儇病篤不聼停家死於路邊丹陽尹王志被驅急狼狽歩走惟將二門生自随藏朱雀航南酒壚中夜方得羽儀而歸喜游獵不避危險至蔣山定林寺一沙門病不能去藏於草間為軍人所得應時殺之左右韓暉光曰老道人可念帝曰汝見麞鹿亦不射邪仍百箭俱發故貴人富室者皆數處立宅以為避圍之舎每還宫常至三更百姓然後得反禁斷又不即通處處屯咽或泥塗灌注或氷凍嚴結老幼啼號不可聞見時人以其所圍處號為長圍及建康城見圍亦名長圍識者以為䜟焉三年殿内火合夕便發其時帝猶未還宫内諸房閤已閉内人不得出外人又不敢輒開比及開死者相枕領軍將軍王瑩率衆救火太極殿得全内外呌喚聲動天地帝三更中方還先至東宫慮有亂不敢便入參覘審無異乃歸其後出游火又燒璿儀曜靈等十餘殿及栢寢北至華林西至祕閣三千餘間皆盡左右趙鬼能讀西京賦云栢梁既災建章是營於是大起諸殿芳樂芳徳仙華大興含徳清曜安夀等殿又别為潘妃起神仙永夀玉夀三殿皆帀飾以金璧其玉夀中作飛仙帳四面繡綺窻間盡畫神仙又作七賢皆以羙女侍側鑿金銀為書字靈獸神禽風雲華炬為之玩飾椽桷之端悉垂鈴佩江左舊物有古玉律數枚悉裁以鈿笛荘嚴寺有玉九子鈴外國寺佛面有光相禪靈寺塔諸寶珥皆剥取以施潘妃殿飾性急暴所作便欲速成造殿未施梁桷便於地畫之唯須宏麗不知精密酷不别畵但取絢曜而已故諸匠賴此得不用情又鑿金為蓮華以帖地令潘妃行其上曰此歩歩生蓮華也塗壁皆以麝香錦幔珠簾窮極綺麗縶役工匠自夜達曉猶不副速乃剔取諸寺佛刹殿藻井仙人騎獸以充足之武帝興光樓上施青漆世人謂之青樓帝曰武帝不巧何不純用瑠璃潘氏服御極選珍寶主衣庫舊物不復周用貴市人間金銀寶物價皆數倍琥珀釧一隻直百七十萬都下酒租皆折輸金以供雜用猶不能足下揚南徐二州橋桁塘埭丁計功為直斂取見錢供太樂主衣雜費由是所在塘瀆悉皆隳廢又訂出雄雉頭鶴氅白鷺縗百品千條無復窮已親倖小人因緣為姦科一輸十又各就州縣求為人輸準取見直不為輸送守宰懼威口不得道須物之處以復重求如此相仍前後不息百姓困盡號泣道路少府大官凡諸市買事皆急速催求相係吏司奔馳遇便虜奪市廛離散商旅靡依又以閱武堂為芳樂苑窮竒極麗當暑種樹朝種夕死死而復種卒無一生於是徴求人家望樹便取毁徹牆屋以移置之大樹合抱亦皆移掘揷葉繋華取玩俄頃剗取細草来植階庭烈日之中至便焦燥紛紜往還無復已極山石皆塗以采色跨池水立紫閣諸樓壁上畵男女私褻之像明帝時多聚金寶至是金以為泥不足周用令富室買金不問多少限以賤價又不還直張欣泰嘗謂舎人裴長穆曰宫殿何事頓爾夫以秦之富起一阿房而滅今不及秦一郡而頓起數十阿房其危殆矣荅曰非不悦子之道顧言不用耳潘妃放恣威行逺近父寶慶與諸小共逞姦毒富人悉誣為罪田宅貲財莫不啟乞或云寄附隠藏復加収沒計一家見陷禍及親鄰又慮後患男口必殺明帝之崩竟不一日蔬食居處衣服無改平常潘妃生女百日而亡制斬衰絰杖衣悉麤布羣小来弔盤旋地坐舉手受執蔬膳積旬不聽音伎左右直長閹豎王寶孫諸人共營肴羞云為天子觧菜又於苑中立店肆模大市日游市中雜所貨物與宫人閹豎共為裨販以潘妃為市令自為市吏録事將鬭者就潘妃罰之帝小有得失潘則與杖乃敕虎賁威儀不得進大荆子閤内不得進實中荻雖畏潘氏而竊與諸姊妹滛通每游走潘氏乘小輿宫人皆露褌著緑絲屩帝自戎服騎馬從後又開渠立埭躬自引船埭上設店坐而屠肉于時百姓歌云閱武堂種楊栁至尊屠肉潘妃酤酒又偏信蔣侯神迎来入宫晝夜祈禱左右朱光尚詐云見神動輙諮啟並云降福始安之平遂加位相國末又號為靈帝車服羽儀一依王者又曲信小祠日有十數師巫魔媼迎送紛紜光尚輒託云神意范雲謂光尚曰君是天子要人當思百全計光尚曰至尊不可諫正當託鬼神以達意耳後東入樂游人馬忽驚以問光尚光尚曰向見先帝大瞋不許數出帝大怒拔刀與光尚等尋覓既不見處乃縛菰為明帝形北向斬之縣首苑門上自永元以後魏每来伐繼以内難揚南徐二州人丁三人取兩以此為率逺郡悉令上米準行一人五十斛輸米既畢就役如故又先是諸郡役人多依人士為附𨽻謂之屬名又東境役苦百姓多注籍詐病遣外醫巫在所檢占諸屬名并取病身凡屬名多不合役止避小小假並是役蔭之家凡注病者或已積年皆攝充將役又追責病者租布随其年歳多少銜命之人皆給貨賂随意縱捨又横調徵求皆出百姓羣小以陳顯達下數日便敗崔慧景圍城正得十日及蕭衍師至亦謂為然裹糧食樵芻凡所須物為百日備帝謂茹法珍曰須来至白門前當一决及至近郊乃聚兵為固守計召王侯分置尚書都坐及殿省尚書舊事悉充紙鎧使冠軍將軍王珍國領三萬人據大桁莫有鬬志遣王寳孫督戰呼為王倀子寶孫切罵諸將帥直閣將軍席豪發憤突陣死豪驍將也既斃衆軍於是土崩軍人從朱雀觀上自投及赴淮水死者無數於是閉城自守城内軍事委王珍國兖州刺史張稷入衞以稷為副實甲猶七萬人帝著烏帽袴褶偹羽儀登南掖門臨望又虚設鎧馬齋仗千人皆張弓拔白出東掖門稱蔣王出盪又受刀敕等教著五音兒衣登城望戰還與御刀左右及六宫於華光殿立軍壘以金玉為鎧仗親自臨陣詐被創勢以板掆將去以此厭勝又於閱武堂設牙門軍頓每夜嚴警帝於殿内騎馬從鳳荘門入徽明門馬被銀蓮葉具装鎧雜羽孔翠寄生逐馬左右衞從晝眠夜起如平常聞外鼓吹呌聲被大紅袍登景陽樓望弩幾中之衆皆怠怨不為致力募兵出戰至城門數十歩皆坐甲而歸慮城外有伏兵乃燒城傍諸府署六門之内皆盡城中閣道西掖門内相聚為市販死牛馬肉蕭衍長圍既立塹栅嚴固然後出盪屢戰不㨗帝尤惜金錢不肯賞賜茹法珍叩頭請之帝曰賊来獨取我邪何為就我求物後堂儲數百具榜啟為城防帝曰擬作殿竟不與城防巧手而悉令作殿晝夜不休又催御府細作三百人精仗須圍解以擬屏除金銀雕鏤雜物倍急於常法珍虫兒又説帝曰大臣不留意使圍不觧宜悉誅之珍國張稷懼禍乃謀應蕭衍以計告後閤舎人錢强强許之密令游盪主崔叔智夜開雲龍門稷及珍國勒兵入殿分軍又從西上閤入後宫御刀豐勇之為内應是夜帝在含徳殿吹笙歌作女兒子卧未熟聞兵入趋出北户欲還後宫清曜閤已閉閹人禁防黄泰平刀傷其膝仆地顧曰奴反邪直後張齊斬首送蕭衍宣徳太后令依漢海昏侯故事追封東昏侯和帝諱寶融字智昭明帝第八子也建武元年封随郡王永元元年改封南康王出為西中郎將荆州刺史督九州軍事二年十一月甲寅長史蕭頴胄奉王舉兵其日太白及長星俱見西方乙夘教纂嚴丙辰以雍州刺史蕭衍為使持節都督前鋒諸軍事戊午衍表勸進十二月乙亥羣僚勸進並不許壬辰驍騎將軍夏侯亶自建鄴至江陵稱宣徳太后令西中郎將南康王宜纂承皇祚光臨億兆可且封宣城王相國荆州牧加黄鉞置僚屬三年正月乙巳王受命大赦唯梅虫兒茹法珍等不在例是日長星見竟天甲寅建牙于城南二月己巳羣僚上尊號立宗廟及南北郊中興元年春三月乙巳皇帝即位大赦改永元三年為中興文武賜位二等是夜彗星竟天以相國左長史蕭頴胄為尚書令加雍州刺史蕭衍尚書左僕射都督征討諸軍以晉安王寶義為司空廬陵王寶源為車騎將軍開府儀同三司丙午有司奏封庶人寶卷為零陵侯詔不許又奏為涪陵王詔可夏四月戊辰詔凡東討衆軍及諸向義之衆普復除五年秋七月丁卯魯山城主孫樂祖以城降己未郢城主薛元嗣降八月丙子平西將軍陳伯之降九月己未詔假黄鉞蕭衍若定京邑得以便宜從事冬十一月壬寅尚書令鎮軍將軍蕭頴胄卒十二月丙寅建康城平己巳宣徳皇太后令以征東大將軍蕭衍為大司馬録尚書驃騎大將軍揚州刺史封建安郡公依晉武陵王遵承制故事壬申改封建安王寳寅為鄱陽王癸酉以司徒揚州刺史晉安王寶義為太尉領司徒乙酉以尚書右僕射王瑩為左僕射二年春正月戊戌宣徳皇太后臨朝入居内殿壬寅大司馬蕭衍都督中外諸軍事加殊禮己酉以大司馬長史王亮為守尚書令甲寅加大司馬蕭衍位相國梁公備九錫禮二月壬戌誅湘東王寶晊丙戌進梁公蕭衍爵為王三月辛丑鄱陽王寶寅奔魏誅邵陵王寳攸晉熈王寶貞庚戌車駕東歸至姑熟丙辰遜位于梁丁巳廬陵王寳源薨四月辛丑禪詔至皇太后遜居外宫梁受命奉帝為巴陵王宫于姑熟戊辰巴陵王殂年十五追尊為齊和帝塟恭安陵初梁武帝欲以南海郡為巴陵國邑而遷帝焉以問范雲雲俛首未對沈約曰今古殊事魏武所云不可慕虛名而受實禍梁武頷之於是遣鄭伯禽進以生金帝曰我死不須金醇酒足矣乃引飲一升伯禽就加摺焉先是文惠太子與才人共賦七言詩句後輙云愁和帝至是其言方驗又永明中望氣者云新林婁湖青溪並有天子氣於其處大起樓苑宫觀武帝屢游幸以應之又起舊宫於青溪以弭其氣而明帝舊居東府城西延興末明帝龍飛至是梁武帝衆軍城於新林而武帝舊宅亦在征虜百姓皆著下屋白紗帽而反裙覆頂東昏曰裙應在下今更在上不祥命斷之於是百姓皆反裙向下此服袄也帽者首之所寄今而向下天意若曰元首方為猥賤乎東昏又令左右作逐鹿帽形甚窄狹後果有逐鹿之事東昏宫裏又作散叛髮反髻根向後百姓争學之及東昏狂惑天下散叛矣東昏又與羣小别立帽騫其口而舒兩翅名曰鳳度三橋羣向後總而結之名曰反縛黄麗東昏與刀敕之徒親自著之皆用金寶鑿以璧璫又作著調帽鏤以金玉間以孔翠此皆天意梁武帝舊宅在三橋而鳳度之名鳯翔之驗也黄麗者皇離為日而反縛之東昏戮死之應也調者梁武帝至都而風俗和調先是百姓及朝士皆以方帛填胷名曰假兩此又服祅假非正名也儲兩而假之明不得真也東昏誅其子廢為庶人假兩之意也論曰鬱林地居長嫡瑕釁未彰而武皇之心不變周道故得保兹守器正位尊極既而愆鄙内作兆自宫闈雖為害未逺而足傾社稷郭璞稱永昌之名有二日之象隆昌之號實亦同焉明帝越自支庶任當負荷乘機而作大致殱夷流涕行誅非云義舉事茍非安能無内愧既而自樹本枝根胤孤弱貽厥所授屬在凶愚用覆宗祊亦其理也夫名以行義往賢垂範備而之禪術士誠之東昏以卷名藏以終之其兆先徴盖亦天所命矣南史卷五
