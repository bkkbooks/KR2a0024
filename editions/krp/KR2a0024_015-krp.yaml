body:
  text: 南史卷十五唐李延夀撰列傳第五劉穆之曽孫祥之從子秀徐羡之從孫湛之嗣湛之孫孝孝嗣孫君蒨傅亮族兄隆檀道濟兄韶韶孫珪韶弟祗劉穆之字道和小字道人東莞莒人也世居京口初為琅邪府主簿嘗夢與宋武帝汎海遇大風驚俯視船下見二白龍夾船既而至一山山峰聳秀意甚悦及武帝克京城從何無忌求府主簿無忌進穆之帝曰吾亦識之即馳召焉時穆之聞京城有叫聲晨出陌頭屬與信㑹直視不言者乆之反室壊布裳為袴往見帝帝謂曰我始舉大義湏一軍吏甚急誰堪其選穆之曰無見踰者帝笑曰卿能自屈吾事濟矣即於坐受署從平建鄴諸大處分皆倉卒立定並穆之所建遂動見諮詢穆之亦竭節盡誠無所遺隐時晋網寛弛威禁不行盛族豪家負勢陵縱重以司馬元顯政令違舛桓𤣥科條繁宻穆之斟酌時宜隨方矯正不盈旬日風俗頓改遷尚書祠部郎復為府主簿記室録事参軍領堂邑太守以平桓𤣥功封西華縣五等子及揚州刺史王謐薨帝次應入輔劉毅等不欲帝入議以中領軍謝混為揚州或欲令帝於丹徒領州以内事付僕射孟昶遣尚書右丞皮沈以二議諮帝沈先與穆之言穆之偽如厠即宻疏白帝言沈語不可從帝既見沈且令出外呼穆之問焉穆之曰公今日豈得居謙遂為守藩将邪劉孟諸公俱起布衣共立大義事乃一時相推非宿定臣主分也力敵勢均終相吞咀揚州根本所係不可假人前授王謐事出權道今若復佗授便應受制於人一失權柄無由可得公功髙勲重不可直置疑畏便可入朝共盡同異公至京邑彼必不敢越公更授餘人帝從其言由是入輔從廣固還拒盧循常居幕中畫策劉毅等疾之每從容言其權重帝愈信仗之穆之外所聞見大小必白雖閭里言謔皆一二以聞帝毎得人間委宻消息以示聰明皆由穆之又愛賔游坐客恒滿布耳目以為視聽故朝野同異穆之莫不必知雖親昵短長皆陳奏無隐人或譏之穆之曰我蒙公恩義無隐諱此張遼所以告闗羽欲叛也帝舉止施為穆之皆下節度帝書素拙穆之曰此雖小事然宣布四逺願公小復留意帝既不能留意又禀分有在穆之乃曰公但縱筆為大字一字徑尺無嫌大既足有所包其勢亦偉帝從之一紙不過六七字便滿穆之凡所薦達不納不止常云我雖不及荀令君之舉善然不舉不善穆之與朱齡石並便尺牘嘗於武帝坐與齡石並答書自旦至日中穆之得百函齡石得八十函而穆之應對無廢遷中軍䕶軍司馬加丹陽尹帝西討劉毅以諸葛長人監留府疑其難獨任留穆之輔之加建威将軍置佐吏配給實力長人果有異謀而猶豫不能發屏人謂穆之曰悠悠之言云太尉與我不平何以至此穆之曰公泝流逺伐以老母弱子委節下若一豪不盡豈容若此長人意乃小安穆之亦厚為之備謂所親曰貧賤常思富貴富貴必踐危機今日思為丹徒布衣不可得也帝還長人伏誅進前将軍帝西伐司馬休之中軍将軍道憐知留任而事無大小一决穆之遷尚書左僕射領選將軍尹如故帝北伐留世子為中軍将軍監太尉留府轉穆之左僕射領監軍中軍二府軍司将軍尹領選如故甲仗五十人入殿入居東城穆之内總朝政外供軍旅决斷如流事無壅滯賔客輻凑求訴百端内外諮禀盈階滿室目覽詞訟手答牋書耳行聽受口並酬應不相参渉皆悉贍舉又言談賞笑彌日亘時未嘗倦苦裁有閑暇手自冩書尋覽篇章校定墳籍性奢豪食必方丈旦輒為十人饌未嘗獨餐每至食時客止十人以還帳下依常下食以此為常嘗白帝曰穆之家本貧賤贍生多闕叨忝以來雖毎存約損而朝夕所湏微為過豐此外無一豪負公義熈十三年卒帝在長安本欲頓駕闗中經略趙魏聞問驚慟哀惋者数日以根本虛乃馳還彭城以司馬徐羡之代管留䑓而朝廷大事常决於穆之者並悉北諮穆之前軍府文武二萬人以三千配羡之建威府餘悉配世子中軍府追贈穆之開府儀同三司帝又表奏天子曰臣聞崇賢旌善王教所先念功簡勞義深追逺故司勲執策在勤必記徳之休明没而彌著故尚書左僕射前将軍臣穆之爰自布衣恊佐義始内竭謀猷外勤庶政宻勿軍國心力俱盡及登庸朝右尹司京畿敷讚百揆翼新大猷頃戎車逺役居中作捍撫寕之勲實洽朝野識量局致棟幹之器也方宣贊盛化緝隆聖世忠績未究逺邇悼心皇恩褒述班同三事榮哀既備寵靈已泰臣伏思尋自義熈草創艱患未弭外虞既殷内難亦荐時屯世故靡有寕嵗臣以寡乏負荷國重實賴穆之匡翼之勲豈唯讜言嘉謀溢于人聽若乃忠規宻謨潜慮帷幙造膝詭辭莫見其際事隔於皇朝功隐於視聽者不可勝紀所以陳力一紀遂克有成出征入輔幸不辱命㣲夫人之左右未有寕濟其事者矣履謙居寡守之彌固毎議及封爵輒深自抑絶所以勲髙當年而茅土弗及撫事永念胡寕可昧謂宜加贈正司追甄土宇俾忠貞之烈不冺於身後大賚所及永旌於善人臣契闊屯夷旋觀終始金蘭之分義深情感是以獻其乃懐布之朝聽於是重贈侍中司徒封南昌縣侯及帝受禪毎歎憶之曰穆之不死當助我理天下可謂人之云亡邦國殄瘁光禄大夫范泰對曰聖主在上英彦滿朝穆之雖功著艱難未容便闗興毁帝笑曰卿不聞驥騄乎貴日致千里耳帝後復曰穆之死人輕易我其見思如此以佐命元勲追封南康郡公諡曰文宣穆之少時家貧誕節嗜酒食不修拘檢好往妻兄家乞食多見辱不以為耻其妻江嗣女甚明識毎禁不令往江氏後有慶㑹屬令勿來穆之猶往食畢求㯽榔江氏兄弟戲之曰㯽榔消食君乃常飢何忽湏此妻復截髪市殽饌為其兄弟以餉穆之自此不對穆之梳沐及穆之為丹陽尹将召妻兄弟妻泣而稽顙以致謝穆之曰本不匿怨無所致憂及至醉穆之乃令厨人以金柈貯㯽榔一斛以進之元嘉二十五年車駕幸江寕經穆之墓詔致祭墓所長子慮之嗣卒子邕嗣先是郡縣為封國者内史相並於國主稱臣去任便止孝建中始革此制為下官致敬河東王歆之嘗為南康相素輕邕後歆之與邕俱豫元㑹並坐邕嗜酒謂歆之曰卿昔見臣今能見勸一盃酒不歆之因斆孫晧歌答曰昔為汝作臣今與汝比肩既不勸汝酒亦不願汝年邕性嗜食瘡痂以為味似鰒魚嘗詣孟靈休靈休先患灸瘡痂落在牀邕取食之靈休大驚痂未落者悉褫取飴邕邕去靈休與何朂書曰劉邕向顧見噉遂舉體流血南康國吏二百許人不問有罪無罪逓與鞭瘡痂常以給膳邕卒子肜嗣坐刀斫妻奪爵以弟彪紹齊建元初降封南康縣侯虎賁中郎将坐廟墓不修削爵為羽林監又坐與亡弟母楊别居楊死不殯葬崇聖寺尼慧首剃頭為尼以五百錢為買棺以泥洹轝送𦵏為有司奏事寝不出穆之中子式之字延叔為宣城淮南二郡太守犯贓貨揚州刺史王𢎞遣從事檢校之式之召從事謂曰還白使君劉式之於國粗有㣲分偷数百萬錢何有况不偷邪從事還白𢎞由此得停從征闗洛有功封徳陽縣五等侯卒諡曰恭子瑀字茂琳始興王濬為南徐州以瑀為别駕瑀性陵物䕶前時濬征北府行参軍吳郡顧邁輕薄有才能濬待之厚瑀乃折節事邁邁以瑀與之欵盡濬所言宻事悉以語瑀瑀與邁共進射堂下忽顧左右索單衣幘邁問其故瑀曰公以家人待卿言無不盡卿外宣泄我是公吏何得不啟白之濬大怒啟文帝徙邁廣州瑀性使氣尚人後為御史中丞甚得志彈蕭惠開云非才非望非勲非徳彈王僧逹云蔭藉髙華人品冗末朝士莫不畏其筆端轉右衛将軍年位本在何偃前孝武初偃為吏部尚書瑀圖侍中不得與偃同從郊祀時偃乘車在前瑀策駟居後相去数十歩瑀蹋馬及之謂偃曰君轡何疾偃曰牛駿馭精所以疾耳偃曰君馬何遲曰騏驥羅於覊絆所以居後偃曰何不着鞭使致千里答曰一蹙自造青雲何至與駑馬争路然甚不得意謂所親曰人仕宦不出當入不入當出安能長居戸限上因求益州及行甚不得意至江陵與顔竣書曰朱修之三世叛兵一日居荆州青油幕下作謝宣明面目向使齋帥以長刀引吾下席於吾何有政恐匃奴輕漢耳坐奪人妻為妾免官後為吳興太守侍中何偃當案之云参伍時望瑀大怒曰我於時望何参伍之有遂與偃絶族叔秀之為丹陽瑀又與親故書曰吾家黒面阿秀遂居劉安衆處朝廷不為多士其年疽發背何偃亦發背癰瑀疾已篤聞偃亡懽躍叫呼於是亦卒諡曰剛祥字顯徴式之孫也父敳太宰從事中郎祥少好文學性韻剛疎輕言肆行不避髙下齊建元中為正員郎司徒褚彦囬入朝以腰扇鄣日祥從側過曰作如此舉止羞面見人扇鄣何益彦回曰寒士不遜祥曰不能殺袁劉安得免寒士永明初撰宋書譏斥禪代尚書令王儉宻以啟聞上銜而不問為臨川王驃騎從事中即祥兄整為廣州卒官祥就整妻求還資事聞朝廷又於朝士多所貶忽王奐為尚書僕射祥與奐子融同載行至中堂見路人驅驢祥曰驢汝好為之如汝人才皆已令僕著連珠十五首以寄其懐其譏議者云希世之寳違時必賤偉俗之器無聖則淪是以明玉黜於楚岫章甫窮於越人有以祥連珠啟上上令御史中丞任遐奏其過惡付廷尉上别遣敇祥曰我當原卿性命令卿萬里思愆卿若能改革當令卿得還乃徙廣州不得意終日縱酒少時卒秀之字道寳穆之從父兄子也祖爽山陰令父仲道餘姚令秀之少孤貧十嵗時與諸児戲前渚忽有大蛇來勢甚猛莫不顛沛驚呼秀之獨不動衆並異之東海何承天雅相知器以女妻之兄欽之為朱齡石右軍参軍隨齡石敗沒秀之哀慼不歡宴者十年宋景平二年除駙馬都尉元嘉中再為建康令政績有聲孝武鎮襄陽以為撫軍録事参軍襄陽令襄陽有六門堰良田数千頃堰乆决壊公私廢業孝武遣秀之修復雍部由是大豐後除西戎校尉梁南秦二州刺史加都督漢川饑饉秀之躬自儉約先是漢川悉以絹為貨秀之限令用錢百姓利之二十七年大舉北侵遣輔國将軍楊文徳巴西梓潼二郡太守劉𢎞宗受秀之節度震蕩汧隴元凶弑逆秀之即日起兵求赴襄陽司空南譙王義宣不許事寕遷益州刺史折留奉禄二百八十萬付梁州鎮庫此外蕭然梁益豐富前後刺史莫不大營聚畜多者致萬金所携賔僚並都下貧子出為郡縣皆以茍得自資秀之為政整肅逺近悦焉南譙王義宣據荆州為逆遣徴兵於秀之秀之斬其使以起義功封康樂縣侯徙丹陽尹先是秀之從叔穆之為丹陽與子弟聽事上宴聽事柱有一穿穆之謂子弟及秀之汝等試以栗遥擲柱入穿者後必得此郡唯秀之獨入焉其言遂驗時賖買百姓物不還錢秀之以為非宜陳之甚切雖納其言竟不用遷尚書右僕射時定制令𨽻人殺長吏科議者謂㑹赦宜以徙論秀之以為律文雖不顯人殺官長之㫖若遇赦但止徙論便與悠悠殺人曽無一異人敬官長比之父母行害之身雖遇赦謂宜長付尚方窮其天命家口補兵從之後為寕蠻校尉雍州刺史加都督將徵為左僕射㑹卒贈司空諡忠成公秀之野率無風采而心力堅正上以其蒞官清潔家無餘財賜錢二十萬布三百疋傳封至孫齊受禪國除徐羡之字宗文東海郯人也祖寕尚書吏部郎父祚之上虞令羡之為桓修撫軍中兵参軍與宋武帝同府深相親結武帝北伐稍遷太尉左司馬掌留任副貳劉穆之帝議北伐朝士多諫唯羡之黙然或問何獨不言羡之曰今二方已平拓地萬里唯有小羌未定公寝食不安何可輕豫其議穆之卒帝欲用王𢎞代之謝晦曰休元輕易不若徐羡之乃以羡之為丹陽尹總知留任甲仗二十人出入加尚書僕射義熈十四年軍人朱興妻周生子道扶年三嵗先得癎病周因其病發掘地生埋之為道扶姑雙女所告周棄市羡之議曰自然之愛豺狼猶仁周之凶忍宜加顯戮臣以為法律之外尚𢎞通理母之即刑由子明法為子之道焉有自容之地愚謂可特申之遐裔從之及武帝即位封南昌縣公位司空録尚書事揚州刺史羡之起自布衣又無術學直以局度一旦居廊廟朝野推服咸謂有宰相之望沉宻寡言不以憂喜見色頗工奕棊觀戲常若未觧當世倍以此推之傅亮蔡廓嘗言徐公曉萬事安異同嘗與傅亮謝晦宴聚亮晦才學辯博羡之風度詳整時然後言鄭鮮之歎曰觀徐傅言論不復學問為長武帝不豫加班劍三十人宫車晏駕與中書令傅亮領軍将軍謝晦鎮北將軍檀道濟同被顧命少帝詔羡之亮率衆宫内月一决獄帝後失徳羡之等将謀廢立而廬陵王義真多過不任四海乃先廢義真然後廢帝時謝晦為領軍以府舍内屋敗應修理悉移家人出宅聚将士於府内檀道濟以先朝舊将威服殿省且有兵衆召入朝告之謀既廢帝侍中程道惠勸立皇子義恭羡之不許及文帝即位改封南平郡公固讓加封有司奏車駕依舊臨華林園聽訟詔如先二公權訊元嘉二年羡之與傅亮歸政三奏乃見許羡之仍遜位退還私第兄子佩之及程道惠吳興太守王韶之等並謂非宜敦勸甚苦復奉詔攝任三年正月帝以羡之亮晦旬月間再肆醜毒下詔暴其罪誅之爾日詔召羡之至西門外時謝晦弟㬭為黄門郎正直報亮云殿中有異處分亮馳報羡之羡之乘内人問訊車出郭歩走至新林入陶竈中自縊而死年六十三羡之初不應召上遣領軍到彦之右衞将軍王華追討及死野人以告載尸付廷尉初羡之年少時嘗有一人來謂曰我是汝祖羡之拜此人曰汝有貴相而有大厄宜以錢二十八文埋宅四角可以免災過此可位極人臣後羡之隨親之縣住在縣内嘗暫出而賊自後破縣縣内人無免者雞犬亦盡唯羡之在外獲全又隨從兄履之為臨海樂安縣嘗行經山中見黒龍長丈餘頭有角前兩足皆具無後足曵尾而行及拜司空守闗将入彗星辰見危南又當拜時雙鶴集太極殿東鴟尾鳴喚竟以凶終羡之兄欽之位祕書監欽之子佩之輕薄好利武帝以其姻戚累加寵任為丹陽尹景平初以羡之知權頗豫政事與王韶之程道惠中書舍人邢安泰潘盛為黨時謝晦乆病連灸不堪見客佩之等疑其託疾有異圖與韶之道惠同載詣傅亮稱羡之意欲令作詔誅之亮曰已等三人同受顧命豈可自相殘戮佩之等乃止羡之既誅文帝特宥佩之免官而已其冬佩之謀反事發被誅佩之弟逵之尚武帝長女㑹稽宣公主為彭城沛二郡太守武帝諸子並糿以逵之姻戚将大任之欲先令立功及討司馬休之使統軍為前鋒待尅當即授荆州於陣見害追贈中書侍郎子湛之湛之字孝源㓜孤為武帝所愛常與江夏王義恭寝食不離帝側永初三年詔以公主一門嫡長且湛之致節之𦙍封枝江縣侯数嵗與弟淳之共車行牛奔車壊左右人馳來赴之湛之先令取弟衆咸歎其㓜而有識及長頗渉文義善自位待事祖母及母以孝聞元嘉中以為黄門侍即祖母年老辭以朝直不拜後拜祕書監㑹稽公主身居長嫡為文帝所禮家事大小必諮而後行西征謝晦使公主留止䑓内縂攝六宫毎有不得意輒號哭上甚憚之初武帝㣲時貧陋過甚嘗自新洲伐荻有納布衣襖等皆是敬皇后手自作武帝既貴以此衣付公主曰後世若有驕奢不節者可以此衣示之湛之為大将軍彭城王義康所愛與劉湛等頗相附及得罪事連湛之文帝大怒将致大辟湛之憂懼無計以告公主公主即日入宫及見文帝因號哭下牀不復施臣妾之禮以錦囊盛武帝納衣擲地以示上曰汝家本賤貧此是我母為汝父作此納衣今日有一頓飽食便欲殘害我児子上亦號哭湛之由此得全再遷太子詹事尋加侍中湛之善尺牘音辭流暢貴戚豪强産業甚厚室宇園池貴游莫及伎樂之妙冠絶一時門生千餘皆三吳富人子資質端羙衣服鮮麗毎出入行游塗巷盈滿泥雨日悉以後車載之文帝每嫌其侈縱時安成公何朂無忌之子臨汝公孟靈休昶之子也並名奢豪與湛之以肴膳器服車馬相尚都下為之語曰安成食臨汝餙湛之羙兼何孟朂官至侍中追諡荒公靈休善彈棊官至祕書監湛之後遷丹陽尹加散騎常侍以公主憂不拜過𦵏復授前職二十三年范曄等謀反湛之始與之同後發其事所陳多不盡為曄等欵辭所連有司以湛之闗豫逆黨事起積嵗末乃歸聞多有蔽匿請免官削爵付廷尉上不許湛之詣闕上疏請罪以為初通其謀為誘引之辭曄等並見怨咎規相祸䧟又昔義康南出之始敇臣入相伴慰慇懃異意頗形言㫖遺臣利刃期以際㑹臣苦相諌譬深加拒塞以為怨憤所至不足為虞便以闗啟懼成虚妄非為納受曲相蔽匿又令申情范曄釋中間之憾致懐蕭思話恨婚意未申謂此僥倖亦不宣達陛下敦惜天倫彰於四海蕃禁優簡親理咸通又昔蒙眷顧不容自絶音翰信命時相往來或言少意多㫖深文淺辭色之間往往難測臣顧惟心無邪悖故不稍以自嫌㥪㥪丹實具如此啓臣雖駑下情匪木石豈不知醜㸃難嬰伏劍為易而靦然視息忍此餘生實非茍吝㣲命假延漏刻誠以負戾灰滅貽耻方來貪及視息少自披訴乞蒙隨放伏待鈇鑕上優詔不許二十四年服闋轉中書令太子詹事出為南兖州刺史善政俱肅威惠並行廣陵舊有髙楼湛之更修整之南望鍾山城北有陂澤水物豐盛湛之更起風亭月觀吹䑓琴室果竹繁茂花藥成行招集文士盡游玩之適時有沙門釋惠休善屬文湛之與之甚厚孝武命使還俗本姓湯位至揚州從事史二十六年湛之入為丹陽尹領太子詹事二十七年魏太武帝至𤓰歩湛之與皇太子分守石頭二十八年魯爽兄弟率部曲來奔爽等軌子也湛之以為廟算特所奨納不敢茍申私怨乞屏田里不許轉尚書僕射領䕶軍将軍時尚書令何尚之以湛之國戚任遇隆重欲以朝政推之湛之以令事無不縂又以事歸尚之互相推委御史中丞袁淑奏並免官詔乃使湛之與尚之並受辭訴尚之雖為令而以朝事悉歸湛之初劉湛伏誅殷景仁卒文帝任沈演之庾仲文范曄等後又有江湛何瑀之自曄誅仲文免演之瑀之並卒至是江湛為吏部尚書與湛之並居權要世謂之江徐上毎疾湛之輒侍醫藥二凶巫蠱事發上欲廢劭賜濬死而孝武無寵故累出外藩不得停都下南平王鑠建平王宏並被愛而鑠妃即湛之妹湛之勸上立之徴鑠自夀陽入朝至又失㫖欲立宏嫌其非次議又不决與湛之議或連日累夕毎夜使湛之自執燭繞壁檢行慮有竊聽者劭入殺之旦其夕上與湛之屏人語至曉猶未滅燭湛之驚起趣北戸未及開見害時年四十四孝武即位追贈司空諡曰忠烈公子聿之為元凶所殺聿之子孝嗣孝嗣字始昌父被害孝嗣在孕母年少欲更行不願有子自牀投地者無算又以擣衣杵舂其腰并服墮胎藥胎更堅及生故小字遺奴㓜而挺立八嵗襲爵枝江縣公見宋孝武升階流涕迄于就席帝甚愛之尚康樂公主拜駙馬都尉泰始中以登殿不著韎為書侍御史蔡凖所奏罰金二兩孝嗣姑適東莞劉舍舎兄藏為尚書左丞孝嗣往詣之藏退謂舍曰徐郎是令僕人三十餘可知汝宜善自結昇明中為齊髙帝驃騎從事中郎帶南彭城太守轉太尉諮議参軍齊建元初累遷長史兼侍中善趨歩閑容止與太宰禇彦回相埒尚書令王儉謂人曰徐孝嗣将來必為宰相轉御史中丞武帝問儉曰誰可繼卿儉曰臣東都之日其在徐孝嗣乎出為吳興太守儉贈孝嗣四言詩曰方軌叔茂追清彦輔柔亦不茹剛亦不吐時人以比蔡子尼之行状也在郡有能名王儉亡上徵孝嗣為五兵尚書其年敇撰江左以來儀典令諮受孝嗣明年遷太子詹事從武帝幸方山上曰朕經始此山之南復為離宫應有邁靈丘靈丘山湖新林苑也孝嗣答曰繞黄山欵牛首乃盛漢之事今江南未廣願陛下少更留神上乃止竟陵王子良甚善之歴吏部尚書右軍将軍領太子左衞率䑓閣事多以委之武帝崩遺詔以為尚書右僕射隆昌元年為丹陽尹明帝謀廢鬱林遣左右莫智明以告孝嗣孝嗣奉㫖無所釐替即還家草太后令明帝入殿孝嗣戎服隨後鬱林既死明帝湏太后令孝嗣於袖出而奏之帝大悦時議悉誅髙武子孫孝嗣堅保持之故得無恙以廢立功封枝江縣侯甲仗五十人入殿轉左僕射明帝即位進爵為公給班劍二十人加兵百人舊拜三公乃臨軒至是帝特詔與陳顯逹王晏並臨軒拜授時王晏為令人情物望不及孝嗣晏誅轉尚書令孝嗣愛好文學器量𢎞雅不以權勢自居故見容明帝之世初在率府晝卧齋北壁下夢兩童子遽云移公牀孝嗣驚起聞壁有聲行数歩而壁崩壓牀建武四年即本號開府儀同三司讓不受時連年魏軍動國用虚乏孝嗣表立屯田帝已寝疾兵事未巳竟不行及崩受遺託重申開府之命加中書監永元初輔政自尚書下省出住宫城南宅不得還家帝失徳孝嗣不敢諫及江祏誅内懐憂恐然未嘗表色始安王遥光反衆懐惶惑見孝嗣入宫乃安然羣小用事不能制也時孝嗣以帝終亂天常與沈文季俱在南掖門欲要文季以門為應四五目之文季輒亂以他語孝嗣乃止進位司空固讓求觧丹陽尹不許孝嗣文人不顯同異名位雖大故得未及祸虎賁中郎将許凖有膽力陳説事機勸行廢立孝嗣遲疑謂必無用干戈理湏少主出游閉城門召百僚集議廢之雖有此懐終不能决羣小亦稍憎孝嗣勸帝除之其冬孝嗣入華林省遣茹法珍賜藥孝嗣容色不異謂沈昭略曰始安事吾欲以門應之賢叔若同無今日之恨少能飲酒飲藥至斗餘方卒乃下詔言誅之于時凡被殺者皆取其蟬冕剝其衣服衆情素敬孝嗣得無所侵長子演尚齊武帝女武康公主位太子中庶子第三子況尚明帝女山隂公主並拜駙馬都尉俱見殺孝嗣之誅衆人懼無敢至者唯㑹稽魏温仁奔赴以私財營䘮事當時稱之初孝嗣復故封使故吏吳興丘叡筮之當傳㡬世叡曰恐不終尊身孝嗣容色甚惡徐曰緣有此慮故令卿决之中興元年和帝贈孝嗣太尉二年改𦵏宣徳太后詔増班劍四十人加羽葆鼓吹諡曰文忠改封餘干縣公子緄仕梁位侍中太常信武将軍諡頃子緄子君蒨字懐簡㓜聰朗好學尤長丁部書問無不對善弦歌為梁湘東王鎮西諮議参軍頗好聲色侍妾数十皆佩金翠曵羅綺服玩悉以金銀飲酒数升便醉而閉門盡日酣歌每遇歡謔則飲至斗有時載伎肆意游行荆楚山川靡不畢踐朋從遊好莫得見之時襄陽魚𢎞亦以豪侈稱於是府中謡曰北路魚南路徐然其服翫次於𢎞也君蒨辯於辭令湘東王嘗出軍有人将婦從者王曰才愧李陵未能先誅女子将非孫武遂欲驅戰婦人君蒨應聲曰項籍壮士猶有虞兮之愛紀信成功亦資姬人之力君蒨文冠一府特有輕艶之才新聲巧變人多諷習竟卒於官傅亮字季友北地靈州人晋司𨽻校尉咸之𤣥孫也父瑗以學業知名位至安成太守瑗與郗超善超常造瑗見二子廸及亮亮年四五嵗超令人觧衣使持去初無悋色超謂瑗曰卿小児才名位宦當逺踰於兄然保家終在大者廸字長猷宋初終五兵尚書贈太常亮博渉經史尤善文辭義熈中累遷中書黄門侍郎直西省宋武帝以其乆直之勤勞欲以為東陽郡先以語廸大喜告亮亮不答即馳見武帝陳不樂出帝笑曰謂卿湏禄耳能如此甚恊所望也以為太尉從事中即掌記室宋國初建除侍中領世子中庶子加中書令從還夀陽武帝有受禪意而難於發言乃集朝臣宴飲從容曰桓𤣥暴簒鼎命已移我首唱大義興復皇室今年時衰暮欲歸老京師羣臣唯盛稱功徳莫曉此意亮悟㫖日晚宫門已閉叩扉請見曰臣暫宜還都帝知意無復他言直云湏㡬人自送亮曰湏数十人於是奉辭及出夜見長星竟天拊髀曰我常不信天文今始驗矣亮至都即徴帝入輔永初元年加太子詹事封建城縣公入直中書省專典詔命以亮任縂國權聽於省見客神獸門外每旦車常数百兩武帝登庸之始文筆皆是参軍滕演北征廣固悉委長史王誕自此之後至于受命表策文誥皆亮辭也演字彦将南陽西鄂人位至祕書監二年加亮尚書僕射及帝不豫與徐羡之謝晦並受顧命給班劍二十人少帝即位進中書監尚書令領䕶軍将軍少帝廢亮奉迎文帝立行䑓於江陵城南題曰大司馬門率行䑓百僚詣門拜表威儀甚盛文帝将下引見亮哭泣哀動左右既而問義真及少帝薨廢本末悲號嗚咽侍側者莫能仰視亮流汗霑背不能答於是布腹心於到彦之王華等及至都徐羡之問帝可方誰亮曰晋文景以上人羡之曰必能明我赤心亮曰不然及文帝即位加左光祿大夫開府儀同三司司空府文武即為左光禄府進爵始興郡公固讓進封元嘉三年帝将誅亮先呼入見省内宻有報之者亮辭以嫂病暫還遣信報徐羡之因乘車出郭門騎馬奔兄廸墓屯騎校尉郭泓收之初至廣莫門上亦使以詔謂曰以公江陵之誠當使諸子無恙亮讀詔訖曰亮受先帝布衣之眷遂蒙顧託黜昏立明社稷之計欲加之罪其無辭乎於是伏誅妻子流建安亮之方貴兄廸毎深誡焉而不能從及見世路屯險著論名曰演慎及少帝失徳内懐憂懼直宿禁中睹夜蛾赴燭作感物賦以寄意初奉大駕道路賦詩三首其一篇有悔懼之辭自知傾覆求退無由又作辛有穆生董仲道贊稱其見㣲之羙云隆字伯祚亮族兄也曽祖晞司徒屬父祖並早卒隆少孤貧有學行義熈初年四十為孟昶建威参軍累遷尚書左丞以族弟亮為僕射緦服不得相臨徙太子率更令元嘉初為御史中丞甚得司直之體轉司徒左長史㑹稽剡縣人黄初妻趙持殺息載妻王遇赦王有父母及男稱女葉依法徙趙二千里外隆議曰禮律之興本之自然求之情理非從天墮非從地出父子至親分形同氣稱之於載即載之於趙雖言三世為體猶一稱雖創鉅痛深固無讐祖之義向使石厚之子日磾之孫砥鋒挺鍔不與二祖同戴天日則石碏秺侯何得流名百代舊令言殺人父母徙之二千里外不施父子孫祖明矣趙當避王期功千里外耳令亦云凡流徙者同籍親近欲相隨者聽之此又大通情體因親以教愛也趙既流移載為人子何得不從載從而稱不行豈名教所許如此稱趙竟不可分趙雖内愧終身稱沉痛沒齒孫祖之義自不得以永絶事理然也從之出為義興太守有能名拜左戸尚書坐正直受節假對人未至委出白衣領職尋轉太常文帝以新撰禮論付隆使更下意隆表上五十二事後致仕拜光禄大夫歸老於家手不釋卷博學多通特精三禮年八十三卒檀道濟髙平金鄊人也世居京口少孤居䘮備禮奉兄姊以和謹稱宋武帝建義道濟與兄韶祗等從平京城俱参武帝建武将軍事累遷太尉参軍封作唐縣男義熈十二年武帝北伐道濟為前鋒所至望風降服徑進洛陽議者謂所獲俘囚應悉戮以為京觀道濟曰伐罪弔人正在今日皆釋而遣之於是中原感悦歸者甚衆長安平以為琅邪内史武帝受命以佐命功改封永修縣公位丹陽尹䕶軍将軍武帝不豫給班劍二十人出為鎮北将軍南兖州刺史徐羡之等謀廢立諷道濟入朝告以将廢廬陵王義真道濟屡陳不可竟不納将廢帝夜道濟入領軍府就謝晦晦悚息不得眠道濟寝便睡熟晦以此服之文帝即位給鼓吹一部進封武陵郡公固辭進封道濟素與王𢎞善時被遇方深道濟彌相結附毎搆羡之等𢎞亦雅仗之上将誅徐羡之等召道濟欲使西討王華曰不可上曰道濟從人者也曩非創謀撫而使之必将無慮道濟至之明日上誅羡之亮既而使道濟與中領軍到彦之前驅西伐上問策於道濟對曰臣昔與謝晦同從北征入關十策晦有其九才略明練殆難與敵然未嘗孤軍决勝戎事恐非其長臣悉晦智晦悉臣勇今奉王命外討必未陣而禽時晦本謂道濟與羡之同誅忽聞來上遂不戰自潰事平遷征南大将軍開府儀同三司江州刺史元嘉八年到彦之侵魏已平河南復失之道濟都督征討諸軍事北略地轉戰至濟上魏軍盛遂克滑䑓道濟時與魏軍三十餘戰多㨗軍至歴城以資運竭乃還時人降魏者俱説糧食已磬於是士卒憂懼莫有固志道濟夜唱籌量沙以所餘少米散其上及旦魏軍謂資糧有餘故不復追以降者妄斬以狥時道濟兵寡弱軍中大懼道濟乃命軍士悉甲身自服乘輿徐出外圍魏軍懼有伏不敢逼乃歸道濟雖不剋定河南全軍而反雄名大振魏甚憚之圖之以禳鬼還進位司空鎮夀陽道濟立功前朝威名甚重左右腹心並經百戰諸子又有才氣朝廷疑畏之時人或目之曰安知非司馬仲逹也文帝寝疾累年屡經危殆領軍劉湛貪執朝政慮道濟為異説又彭城王義康亦慮宫車晏駕道濟不復可制十二年上疾篤㑹魏軍南伐召道濟入朝其妻向氏曰夫髙世之勲道家所忌今無事相召祸其至矣及至上巳間十三年春将遣還鎮下渚未發有似鷦鳥集船悲鳴㑹上疾動義康矯詔召入祖道收付廷尉及其千給事黄門侍郎植司徒從事中卽粲太子舍人混征北主簿承伯祕書郎中尊等八人並誅時人歌曰可憐白浮鳩枉殺檀江州道濟死日建鄴地震白毛生又誅司空参軍薛肜髙進之並道濟心腹也道濟見收憤怒氣盛目光如炬俄爾間引飲一斛乃脱幘投地曰乃壊汝萬里長城魏人聞之皆曰道濟巳死吳子軰不足復憚自是頻嵗南伐有飲馬長江之志文帝問殷景仁曰誰可繼道濟答曰道濟以累有戰功故致威名餘但未任耳帝曰不然昔李廣在朝匈奴不敢南望後繼者復有幾人二十七年魏軍至𤓰歩文帝登石頭城望甚有憂色歎曰若道濟在豈至此韶字令孫以桓𤣥功封邑丘縣侯從征廣固率所領先登位琅邪内史從討盧循以功更封宜陽縣後拜江州刺史以罪免韶嗜酒貪横所蒞無政績上嘉其合門從義道濟又有大功故特見寵授卒子臻字係宗位員外郎臻子珪珪字伯玉位沅南令元嶶中王僧虔為吏部尚書以珪為征北板行参軍珪訴信虔求禄不得與僧虔書曰僕一門雖謝文通乃忝武達羣從姑叔三媾帝姻而令子姪餓死遂不荷濶蟬腹龜腸為日已久饑彪能赫人遽與肉餓驎不噬誰為落毛雖復孤徵百世國士姻媾位宦亦不後物尚書同堂姊為江夏王妃檀珪同堂姑為南譙王妃尚書伯為江州檀珪祖亦為江州僕於尚書人地本懸至於婚宦皆不殊絶今通塞雖異猶忝氣類尚書何事為爾見苦僧䖍報書曰吾與足下素無怨憾何以相苦直是意有左右耳乃用為安成郡丞祗字恭叔與兄韶弟道濟俱参義舉封西昌縣侯歴位廣陵相義熈十年亡命司馬國璠兄弟自北徐州界潛得過淮因天隂闇夜率百許人縁廣陵城入叫喚直上聽事祗被射傷股語左右曰賊乘暗得入欲掩我不備但打五鼓懼之曉必走矣賊聞鼓鳴直謂為曉乃奔散追殺百餘人宋國初建為領軍祗性矜豪樂在外放恣不願内職不得志發疾不自療其年卒于廣陵諡曰威侯傳嗣至齊受禪國除論曰自晋網不綱主威莫樹亂基王室毒被江左宋武一朝創業事屬横流改易紊章歸于平道以建武永平之風變太元隆安之俗此盖宣公之為乎其配饗清廟豈徒然也若夫怙才驕物公旦其猶病諸而以劉祥居之斯亡亦為幸焉秀之行已有道可謂位無虛授當徐傅二公跪承顧託若使死而可再固當赴蹈為期及至處權定機當震主之地甫欲攘抑後祸禦蔽身災使桐宫有卒追之痛淮王非中霧之疾若以社稷為存亡則義異於此湛之孝嗣臨機不决既以敗國且以殞身反受其亂斯其效也道濟始因録用故得忘瑕晚困大名以至顛覆韶祗克傳𦙍嗣其木鴈之間乎南史卷十五南史卷十五考證劉穆之傳力敵勢均終相吞咀咀監本訛阻今改正遷中軍䕶軍司馬䕶軍一本作太尉徐湛之傳與劉湛等頗相附及得罪事連湛之劉湛下監本衍之字今刪少自披訴乞蒙隨放隨宋書作隳緄子君蒨傳㓜聰朗好學尤長丁部書問無不對丁監本訛于今改正檀道濟傳夜道濟入領軍府就謝晦晦悚息不得眠謝晦下宋書有宿字韶傳以桓𤣥功封邑邱縣侯以字下應有平字邑應从宋書作巴以功更封宜陽縣後拜江州刺史宋書縣字下有侯字南史卷十五考證
