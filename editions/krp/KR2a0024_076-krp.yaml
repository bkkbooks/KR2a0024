body:
  text: 南史卷七十六唐李延夀撰列傳第六十六隱逸下臧榮緒吳苞趙僧巖蔡薈孔嗣之徐伯珍婁幼瑜沈麟士阮孝緒鄧郁陶𢎞景釋寳誌諸葛璩劉慧斐兄慧鏡慧鏡子曇浄范元琰庾詵張孝秀庾承先馬樞臧榮緒東莞莒人也祖奉先建陵令父庸人國子助敎榮緒幼孤躬自灌園以供祭祀母喪後乃著嫡寢論掃灑堂宇置筵席朔望輙拜薦焉甘珍未嘗先食純篤好學括東西晉為一書紀錄志傳百一十卷隱居京口敎授齊高帝為揚州刺史徴榮緒為主簿不到建元中司徒禇彦回啟高帝稱述其羙以置祕閣榮緒惇愛五經謂人曰昔吕尚奉丹書武王致齋降位李釋教誡並有禮敬之儀因甄明至道乃著拜五經序論常以宣尼庚子日生其日陳五經拜之自號披褐先生又以飲酒亂徳言常為誡永明六年卒初榮緒與關康之俱隱在京口時號為二隠呉苞字天蓋一字懷徳濮陽鄄城人也儒學善三禮及老莊宋太始中過江聚徒敎學冠黄葛巾竹麈尾蔬食二十餘年與劉瓛俱於禇彦回宅􅊰授瓛講禮苞講論語孝經諸生朝聽瓛晚聽苞也齊隆昌元年徵為太學博士不就始安王遙光及江祏徐孝嗣共為立館於鍾山下敎授朝士多到門焉當時稱其儒者自劉瓛以後聚徒講授唯苞一人而已以夀終時有趙僧巖蔡薈皆有景行慕苞為人僧巖北海人寥廓無常人莫能測與劉善明友善明為青州欲舉為秀才大驚拂衣而去後忽為沙門栖遲山谷常以一壺自隨一旦謂弟子曰吾今夕當死壺中大錢一千以通九泉之路臘燭一挺以照七尺之尸至夜而亡時人以為知命蔡薈字休明陳留人清抗不與俗人交李撝謂江斆曰古人稱安貧清白曰夷湼而不緇曰白至如蔡休明者可不謂之夷白乎又有魯國孔嗣之字敬伯宋時與齊高帝俱為中書舎人並非所好自廬江郡守去官隠居鍾山朝廷以為太中大夫卒徐伯珍字文楚東陽太末人也祖父竝郡掾史伯珍少孤貧學書無紙常以竹箭若葉甘蕉及地上學書山水暴出漂溺宅舎村鄰皆奔走伯珍累牀而坐誦書不輟叔父璠之與顔延之友善還祛蒙山立精舎講授伯珍往從學積十年究尋經史㳺學者多依之太守琅邪王曇生呉郡張淹並加禮辟伯珍應召便退如此者凡十二焉徵士沈儼造膝談論申以素交呉郡顧歡摘出尚書滯義伯珍詶答甚有條理儒者宗之好釋氏老莊兼明道術歳嘗旱伯珍筮之如期而雨舉動有禮過曲木之下趨而避之早䘮妻晚不復重娶自比曾參宅南九里有高山班固謂之九巖山後漢龍丘萇隠處也山多龍鬚檉柏望之五采世呼為婦人巖二年伯珍移居之階戸之間木生皆連理門前生梓樹一年便合抱館東石壁夜忽有赤光洞然俄爾而滅白雀一雙棲其戸牖論者以為隱徳之感焉刺史豫章王辟議曹從事不就家甚貧窶弟兄四人皆白首相對時人呼為四皓建武四年卒年八十四受業生凡千餘人伯珍同郡婁幼瑜字季亦聚徒教授不應徵辟彌為臨川王暎所賞異著禮据拾三十卷沈麟士字雲禎呉興武康人也祖膺期晉太中大夫父虔之宋樂安令麟士幼而俊敏年七歳聽叔父岳言𤣥賔散言無所遺失岳撫其肩曰若斯文不絶其在爾乎及長博通經史有高尚之心親亡居䘮盡禮服闋忌日輒流淚彌旬居貧織簾誦書口手不息鄉里號為織簾先生嘗為人作竹誤傷手便流淚而還同作者謂曰此不足損何至涕零答曰此本不痛但遺體毁傷感而悲耳嘗行路隣人認其所著屐麟士曰是卿屐邪即跣而反鄰人得屐送前者還之麟士曰非卿屐邪笑而受之宋元嘉末文帝令僕射何尚之抄撰五經訪舉學士縣以麟士應選不得已至都尚之深相接及至尚之謂子偃曰山藪故多竒士沈麟士黄叔度之流也豈可澄清淆濁邪汝師之麟士嘗苦無書因㳺都下歴觀四部畢乃歎曰古人亦何人哉少時稱疾歸鄉不與人物通養孤兄子義著鄉曲或勸之仕答曰魚縣獸檻天下一契聖人𤣥悟所以毎履吉先吾誠未能景行坐忘何為不希企日損乃作𤣥散賦以絶世太守孔山士辟不應宗人徐州刺史曇慶侍中懷文左率勃來候之麟士未嘗答也隠居餘千呉差山講經敎授從學士數十百人各營屋宇依止其側時為之語曰差山中有賢士開門敎授居成市麟士重陸機連珠毎為諸生􅊰之征北張永為呉興請麟士入郡麟士聞郡後堂有好山水即戴安道㳺呉興因古墓為山池也欲一觀之乃住停數月永欲請為功曹麟士曰明府徳履冲素留心山谷是以被褐負杖忘其疲病必欲飾混沌以蛾睂冠越客於文冕走雖不敏請附高卿有蹈東海死耳不忍受此黔劓永乃止昇明末太守王奐永明中中書郎沈約並表薦之徵皆不就乃與約書曰名者實之賓本所不庶中央無心空勤南北為恵反凶将在於斯麟士無所營求以篤學為務恒凴素儿鼔素琴不為新聲負薪汲水并日而食守操終老讀書不倦遭火燒書數千卷年過八十耳目猶聰明以反故抄寫火下細書復成二三千卷滿數十篋時人以為飬身静嘿所致製黒蝶賦以寄意著周易兩繋莊子内篇訓註易經禮記春秋尚書論語孝經䘮服老子要畧數十卷梁天監元年與何點同徵又不就二年卒於家年八十五以楊王孫皇甫謐深逹尘死而終禮矯俗乃自為終制遺令氣絶剔被取三幅布以覆屍及斂仍移布於屍下以為斂服反被左右兩際以周上不復製覆被不湏沐浴唅珠以米裠衫先着禈凡二服上加單衣幅巾履枕棺中唯此依士安用孝經既殯不復立靈座四節及祥權鋪席於地以設𤣥酒之奠人家相承漆棺今不復爾亦不湏旐成服後即塟作冢令小後祔更作小冢於濱合塟非古也冢不湏聚土成墳使上與地平王祥終制亦爾葬不湏轜車靈舫魌頭也不得朝夕下食祭奠之法至于葬惟清水一盃子彜奉而行之州鄉皆稱歎焉阮孝緒字士宗陳留尉氏人也父彦之宋太尉從事中郎以清幹流譽孝緒七歳出繼從伯之之母周氏卒遺財百餘萬應歸孝緒孝緒一無所納盡以歸之姊瑯琊王晏之母聞者咸歎異之乳人憐其傳重辛苦輒竊玉羊金獸等物與之孝緒見而駭愕啟彦之送還王氏幼至孝性沉静雖與童兒㳺戱恒以穿池築山為樂年十三徧通五經十五冠而見其父彦之彦之誡曰三加彌尊人倫之始宜思自勗以庇爾躬答曰願迹松子於瀛海追許由於穹谷庶保促生以免塵累自是屏居一室非定省未嘗出户家人莫見其靣親友因呼為居士年十六父丧不服緜纊雖蔬菜有味亦吐之外兄王晏貴顯屢至其門孝緒度之必至顛覆聞其笳管穿籬逃匿不與相見曾食醤羙問之云是王家所得便吐餐覆醤及晏誅親戚咸為之懼孝緒曰親而不黨何坐之及竟獲免梁武起兵圍建鄴家貧無以㸑僮妾竊隣人墓樵以繼火孝緒知之乃不食更令撤屋而炊所居以一鹿牀為精舍以樹環繞天監初御史中丞任昉尋其兄履之欲造而不敢望而歎曰其室雖邇其人甚逺其為名流所欽尚如此自是欽慕風譽者莫不懷刺斂衽望塵而息殷芸欲贈以詩昉曰趣舎既異何必相干芸乃止唯與比部郎裴子野交子野薦之尚書徐勉言其年十餘歳隨父為湘州行事不書官紙以成親之清白論其志行粗類管幼安以采章如似皇甫謐天監十二年詔公卿舉士祕書監傅照上疏薦之與呉郡范元琰俱徴並不到陳郡袁峻謂曰往者天地閉賢人隠今世路已清而子猶遁可乎答曰昔周徳雖興夷齊不厭薇蕨漢道方盛黄綺無悶山林為仁由已何關人世况僕非往賢之類邪初謝朏及伏暅應徴天子以為隠者茍立虛名以要顯譽故孝緒與何𦙍並得遂其高志後於鍾山聽􅊰母王氏忽有疾兄弟欲召之母曰孝緒至性㝠通必當自到果心驚而反隣里嗟異之合藥湏得生人葠舊傳鍾山所出孝緒躬歴幽險累日不逢忽見一鹿前行孝緒感而隨後至一所遂滅就視果獲此草母得服之遂愈時皆言其孝感所致有善筮者張有道曰見子隠迹而心難明自非考之龜蓍無以驗也及布卦既揲五爻曰此將為咸應感之法非嘉遁之兆孝緒曰安知後爻不為上九果成遁卦有道歎曰此所謂肥遁無不利象實應徳心迹并也孝緒曰雖獲遁卦而上九爻不發升遐之道便當髙謝許生乃著高隠傳上自炎皇終于天監末勘酌分為三品言行超逸名氏弗傳為上篇始終不耗姓名可錄為中篇挂冠人世栖心塵表為下篇湘東王著忠臣傳集釋氏碑銘丹陽尹錄研神記並先簡孝緒而後施行南平元襄王聞其名致書要之不赴曰非志驕富貴但性畏廟堂若使麏麚可驂何以異夫驥騄初建武末青溪宫東門無故自崩大風拔東宫門外楊樹或以問孝緒孝緒曰青溪皇家舊宅齊為木行東為木位今東門自壞木其衰矣武帝禁畜讖緯孝緒兼有其書或勸藏之答曰昔劉徳重淮南祕要適為更生之禍杜瓊所謂不如不知此言羙矣客有求之答曰己所不欲豈可嫁禍於人乃焚之鄱陽忠烈王妃孝緒姊也王嘗命駕欲就之㳺孝緒鑿垣而逃卒不肯見王悵然歎息王諸子篤渭陽之情歳時之貢無所受納未嘗相見竟不之識或問其故孝緒曰我本素賤不應為王侯姻戚邂逅所逢豈關始願劉敲曾以米饋之孝緒不納㪣亦棄之末年以蔬食斷酒其恒供養石像先有損壞心欲補之罄心敬禮經一夜忽然完復衆並異之大同二年正月孝緒自筮卦吾夀與劉著作同年及劉杳卒孝緒曰劉侯逝矣吾其幾何其年十月卒年五十八梁簡文在東宫隆恩厚贈子恕等述先志不受顧協以為恩異常均議令恭受門徒追論徳行諡曰文貞處士所著七錄削繁等一百八十一卷並行於世初孝緒所撰髙隠傳中篇所載一百三十七人劉㪣劉訏覽其書曰昔嵇康所贊缺一自擬今四十之數將待吾等成邪對曰所謂荀君雖少後事當付鍾君若素車白馬之日輒獲麟於二子敲訏果卒乃益二傳及孝緒亡訏兄絜錄其所遺行次篇末成絶筆之意云南嶽鄧先生名郁荆州建平人也少而不仕隠居衡山極峻之嶺立小板屋兩間足不下山斷穀三十餘載唯以澗水服雲母屑日夜誦大洞經梁武帝敬信殊篤為帝合丹帝不敢服起五嶽樓貯之供養道家吉日躬往禮拜白日神仙魏夫人忽來臨降乘雲而至從少嫗三十並著絳紫羅繡袿䙱年皆可十七八許色艶桃李質勝瓊瑶言語良乆謂郁曰君有仙分所以故來尋當相候至天監十四年忽見二青鳥悉如鶴大鼓翼鳴舞移晷方去謂弟子等曰求之甚勞得之甚逸近青鳥既來期會至矣少日無病而終山内唯聞香氣世未嘗有武帝後令周捨為鄧𤣥傳具序其事陶𢎞景字通明丹陽秣陵人也祖隆王府參軍父貞孝昌令初𢎞景母郝氏夢兩天人手執香鑪來至其所已而有娠以宋孝建三年丙申歳夏至日生幼有異操年四五歳恒以荻為筆畫灰中學書至十歳得葛洪神仙傳晝夜研尋便有養生之志謂人曰仰青雲覩白日不覺為逺矣父為妾所害𢎞景終身不娶及長身長七尺七寸神儀明秀朗目疎睂細形長額聳耳耳孔各有十餘毛出外二寸許右膝有數十黒子作七星文讀書萬餘卷一事不知以為深恥善琴棊工草隷未弱冠齊髙帝作相引為諸王侍讀除奉朝請雖在朱門閉影不交外物唯以披閲為務朝儀故事多所取焉家貧求宰縣不遂永明十年脫朝服挂神武門上表辭祿詔許之賜以束帛敕所在月給伏苓五斤白蜜二升以供服餌及發公卿祖之征虜亭供帳甚盛車馬塡咽咸云宋齊以來未有斯事於是止于句容之句曲山恒曰此山下是第八洞宫名金陵華陽之天周回一百五十里昔漢有咸陽三茅君得道來掌此山故謂之茅山乃中山立館自號華陽陶隠居人間書札即以隠居代名始從東陽孫㳺嶽受符圖經法徧歴名山尋訪仙藥身既輕㨗性愛山水毎經澗谷必坐臥其間吟詠盤桓不能己己謂門人曰吾見朱門廣厦雖識其華樂而無欲往之心望髙巖瞰大澤知此難立止自恒欲就之且永明中求祿得輙差舛若不爾豈得為今日之事豈唯身有仙相亦緣勢使之然沈約為東陽郡守高其志莭累書要之不至𢎞景為人員通謙謹出處㝠㑹心如明鏡遇物便了言無煩舛有亦隨覺永元初更築三層樓𢎞景處其上弟子居其中賓客至其下與物遂絶唯一家僮得至其所本便馬善射晚皆不為唯聼吹笙而已特愛松風庭院皆植松毎聞其響欣然為樂有時獨㳺泉石望見者以為仙人性好著述尚竒異顧惜光景老而彌篤尤明陰陽五行風角星算山川地理方圓産物毉術本草帝代年歴以算推知漢熹平三年丁丑冬至加時在日中而天實以乙亥冬至加時在夜半凡差三十八刻是漢歴後天二日十二刻也又以歴代皆取其先妣母后配饗地祗以為神理宜然碩學通儒咸所不悟又常造渾天象高三尺許地居中央天轉而地不動以機動之悉與天相㑹云修道所須非止史官用是深慕張良為人云古賢無比齊末為歌曰水丑木為梁字及梁武兵至新林遣弟子戴猛之假道奉表及聞議禪代𢎞景援引圗讖數處皆成梁字令弟子進之武帝既早與之游及即位後恩禮愈篤書問不絶冠蓋相望𢎞景既得神符袐訣以為神丹可成而苦無藥物帝給黃金朱砂曾青雄黃等後合飛丹色如霜雪服之體輕及帝服飛丹有驗益敬重之毎得其書燒香䖍受帝使造年歴至己巳歳而加朱點實太清三年也帝手敕招之錫以鹿皮巾後屢加禮聘並不出唯畫作兩牛一牛散放水草之間一牛著金籠頭有人執绳以杖驅之武帝笑曰此人無所不作欲斆曵尾之龜豈有可致之理國家毎有吉凶征討大事無不前以諮詢月中常有數信時人謂為山中宰相二宫及公王貴要參候相繼贈遺未嘗脫時多不納受縱留者即作功徳天監四年移居積金東澗𢎞景辟穀𨗳引之法自隠處四十許年年逾八十而有壯容仙書云眼方者夀千歳𢎞景末年一眼有時而方曾夢佛授其菩提記云名為勝力菩薩乃詣鄮縣阿育王塔自誓受五大戒後簡文臨南徐州欽其風素召至後堂以葛巾進見與談論數日而去簡文甚敬異之天監中獻丹於武帝中大通初又獻二丹其一名善勝一名成勝並為佳寳無疾自知應逝逆尅亡日仍為告逝詩大同二年卒時年八十五顔色不變屈申如常香氣累日氛氳滿山遺令既沒不湏沐浴不湏施牀止兩重席於地因所著舊衣上加生裓裙及臂衣靺冠巾法服左肘錄鈴右肘藥鈴佩符絡左腋下繞腰穿環結於前釵符於髻上通以大袈裟覆衾蒙首足明器有車馬道人道士並在門中道人左道士右百日内夜常然燈旦常香火弟子遵而行之詔贈太中大夫諡曰貞白先生𢎞景妙解術數逆知梁祚覆没預制詩云夷甫任散誕平叔坐論空豈悟昭陽殿遂作單于宫詩祕在篋裏化後門人方稍出之大同末人士競談𤣥理不習武事後侯景篡果在昭陽殿初𢎞景母夢青龍無尾自己升天𢎞景果不妻無子從兄以子松喬嗣所著學苑百卷孝經論語集注帝代年歴本草集注効驗方肘後百一方古今州郡記圗像集要及玉匱記七曜新舊術疏占候合丹法式共祕宻不傳及撰而未訖又十部唯弟子得之時有沙門釋寳誌者不知何許人有於宋太始中見之出入鍾山往來都邑年已五六十矣齊宋之交稍顯靈跡被髮徒跣語嘿不倫或被錦袍飲啖同於凡俗恒以鏡銅剪刀鑷屬挂杖負之而趍或徴索酒肴或累日不食預言未兆識他心智一日中分身易所逺近驚赴所居噂􅊱齊武帝忿其惑衆收付建康獄旦日咸見㳺行市里既而檢校猶在獄中其夜又語獄吏門外有兩輿食金鉢盛飯汝可取之果是文恵太子及竟陵王子良所供養縣令吕文顯以啓武帝帝乃迎入華林園少時忽重著三布帽亦不知於何得之俄而武帝崩文恵太子豫章文獻王相繼薨齊亦於此季矣靈味寺沙門釋寳亮欲以納被遺之未及有言寳誌忽來牽被而去蔡仲熊嘗問仕何所至了自不答直觧杖頭左索繩擲與之莫之觧仲熊至尚書左丞方知言驗永明中住東宫後堂從平旦門中出入末年忽云門上血汚衣褰裳走過至鬱林見害果以犢車載屍出自此門舎故閹人徐龍駒宅而帝頸血流於門限焉梁武帝尤深敬事嘗問年祚逺近答曰元嘉元嘉帝欣然以為享祚倍宋文之年雖剃鬚髮而常冠下裙帽納袍故俗呼為誌公好為讖記所謂誌公符是也高麗聞之遣使齎緜帽供養天監十三年卒將死忽移寺金剛像出置戸外語人云菩薩當去旬日無疾而終先是琅邪王筠至莊嚴寺寳誌遇之與交言歡飲至亡敕命筠為碑蓋先覺也諸葛璩字幼玫琅邪陽都人也世居京口璩幼事徴士關康之博涉經史復師徴士臧榮緒榮緒著晉書稱璩有發擿之功方之壺遂齊建武初南徐州行事江祀薦璩於明帝言璩安貧守道悦禮敦詩如其簡退可揚清厲俗請辟為議曹從事帝許之璩辭不赴陳郡謝脁為東海太守下教揚其風槩餉穀百斛梁天監中舉秀才不就璩性勤於誨誘後生就學者日至居宅狹陋無以容之太守張友為起􅊰舎璩處身清正妻子不見喜慍之色旦夕孜孜講誦不輟時人益以此宗之卒於家璩所著文章二十卷門人劉暾集而錄之劉慧斐字宣文彭城人也父元直淮南太守慧斐少博學能屬文起家梁安成王法曹行叅軍嘗還都途經尋陽㳺於匡山遇處士張孝秀相得甚歡遂有終焉之志因不仕居東林寺又於山北構園一所號曰離垢園時人仍謂為離垢先生慧斐尤明釋典工篆𨽻在山手寫佛經二千餘卷常所誦者百餘卷晝夜行道孜孜不怠逺近欽慕之簡文臨江州遺以几杖論者云自逺法師沒後将二百年始有張劉之盛矣元帝及武陵王等書問不絶大同三年卒慧斐兄慧鏡安成内史初元直居郡得罪慧鏡歴詣朝士乞哀懇惻甚至遂以孝聞子曇浄字元光篤行有父風解褐安成王國左常侍父卒於郡曇净奔䘮不食飲者累日絶而復蘇毎哭輙嘔血服闋因毁成疾會有詔士姓各舉四科曇净叔父慧斐舉以應孝行武帝用為海寧令曇净又以兄未為縣因以譲兄乃除安西行參軍父亡後事母尤淳至身營飡粥不以委人母疾衣不觧帶及母亡水漿不入口者殆一旬母䘮權瘞藥王寺時天寒曇净身衣單布衣廬於瘞所晝夜哭臨不絶聲哀感行路未期而卒范元琰字伯珪一字長玉呉郡錢塘人也祖悦之太學博士徵不至父靈瑜居父憂以毁卒元琰時童孺哀慕盡禮親黨異之及長好學博通經史兼精佛義然謙敬不以所長驕人祖母患癰恒自含吮與人言常恐傷物居家不出城市雖獨居如對賓客見者莫不改容惮之家貧唯以園蔬為業嘗出行見人盗其菘元琰遽退走母問其故具以實答母問盗者為誰答曰向所以退畏其愧恥今啟其名願不泄也於是母子祕之或有涉溝盗其筍者元琰因伐木為橋以度之自是盗者大慙一鄉無復草竊齊建武初徴為曹武平西參軍不至于時始安王遙光為揚州謂徐孝嗣曰曹武參軍豈是禮賢之職欲以西曹書佐聘之㑹遥光敗不果時人以為恨沛國劉瓛深加器異常表稱之天監九年縣令管慧辯上言義行揚州刺史臨川王宏辟命不至卒于家庾詵字彦寳新野人也幼聰警篤學經史百家無不該綜緯候書射棊筭機巧並一時之絶而性託夷簡特愛林泉十畆之宅山池居半蔬食弊衣不修産業遇火止出書數篢坐於池上有為火來者答云唯恐損竹乘舟從沮中山舎還載米一百五十石有人寄載三十石及至宅寄載者曰君三十斛我百五十斛詵嘿然不言恣其取足隣人有被執為盗見劾妄欵詵詵矜之乃以書質錢二萬令門生詐為其親代之酬備隣人獲免謝詵詵曰吾矜天下無辜豈期謝也梁武帝少與詵善及起兵署為平西府記室參軍詵不屈平生少所㳺狎河東栁惲欲與交拒而弗納普通中詔以為黄門侍郎稱疾不起晚年尤遵釋敎宅内立道塲環繞禮懺六時不輟誦法華經每日一徧後夜中忽見一道人自稱願公容止甚異呼詵為上行先生授香而去中大通四年因寢忽驚覺曰願公復來不可乆住顔色不變言終而亡年七十八舉室咸聞空中唱上行先生已生彌陁净域矣武帝聞而下詔諡貞節處士以顯髙烈詵所撰帝歴二十卷易林二十卷續伍端休江陵記一卷晋朝雜事五卷總抄八十卷行於世子曼倩字世華亦早有令譽元帝在荆州為中錄事毎出帝常目送之謂劉之遴曰荆南信多君子後轉諮議参軍所著䘮服儀文字體例老子義疏算經及七曜歴術并所製文章凡九十五卷子季才有學行承聖中位中書侍郎江陵平隨例入長安張孝秀字文逸南陽宛人也徙居尋陽曽祖須無祖僧監父希並别駕從事孝秀長六尺餘白晢羙鬚睂仕州中從事史遇刺史陳伯之叛孝秀與州中士大夫謀襲之事覺逃於盆水側有商人寘諸褚中展轉入東林伯之得其母郭以蠟灌殺之孝秀遣妻妾入匡山修行學道服闋建安王召為别駕因去職歸山居于東林寺有田數十頃部曲數百人率以力田盡供山衆逺近歸慕赴之如市孝秀性通率不好浮華常冠穀皮巾躡蒲履手執并閭皮麈尾服寒食散盛冬卧於石上博渉羣書専精釋典僧有虧戒律者集衆佛前作羯磨而笞之多能改過善談論工𨽻書凡諸藝能莫不明習普通三年卒室中皆聞非常香梁簡文甚傷悼焉與劉慧斐書述其貞白云庾承先字子通潁川鄢陵人也少沉静有志操是非不涉於言喜慍不形於色人莫能窺也弱歳受學於南陽劉虬強記敏識出於羣輩𤣥經釋典靡不該悉九流七畧咸所精練辟功曹不就乃與道士王僧鎮同㳺衡岳晚以弟疾還鄉里遂居土臺山梁鄱陽忠烈王在州欽其風味要與㳺處令講老子逺近名僧咸來赴集論難蜂起異端競至承先徐相酬答皆得所未聞忠烈王尤所欽重中大通三年廬山劉慧斐至荆州承先與之有舊往從之荆峽學徒因請承先講老子湘東王親命駕臨聽論議終日留連月餘乃還山王親祖道并贈篇什隠者羙之其年卒刺史厚有贈賻門人黄士龍讓曰先師平素食不求飽衣不求輕凡有贈遺皆無所受臨終之日誡約家門薄棺周形巾褐為斂雖蒙賚及不敢輕承敎旨以違平生之操錢布輙付使反時論髙之馬樞字要理扶風郿人也祖靈慶齊竟陵王錄事参軍樞數歳而孤為其姑所飬六歳能誦孝經論語老子及長博極經史尤善佛經及周易老子義梁邵陵王綸爲南徐州刺史素聞其名引為學士綸時自講大品經令樞講維摩老子周易同日發題道俗聽者二千人王欲極觀優劣乃謂衆曰與馬學士論義必使屈服不得空立客主於是數家學者各起問端樞乃依次剖判開其宗旨然後枝分派别轉變無窮論者拱黙聽受而已綸甚嘉之尋遇侯景之亂綸舉兵援臺乃留書二萬卷付樞樞肆志尋覽殆將周遍乃喟然歎曰吾聞貴爵位者以巢由為桎梏愛山林者以伊吕為管庫束名實則芻芥柱下之言翫清虚則糠粃席上之説稽之篤論亦各從其好也比求志之士望塗而息豈天之不恵高尚何山林之無聞甚乎乃隠于茅山有終焉之志陳天嘉元年文帝徵為度支尚書辭不應命時樞親故並居京口毎秋冬之際時往㳺焉及鄱陽王為南徐州刺史欽其高尚鄙不能致乃卑辭厚意令使邀之樞固辭以疾門人勸請不得已乃行王别築室以處之樞惡其崇麗乃於竹林間自營茅茨而居毎以王公餽餉辭不獲己者率十分受一樞少屬亂離凡所居處盗賊不入依託者常數百家目精洞黃能視闇中物有白䴏一雙巢其庭樹馴狎欄廡時至几案春來秋去幾三十年太建十三年卒撰道覺論行于世論曰夫獨往之人皆禀偏介之性不能摧志屈道借譽期通若使夫遇見信之主逢時來之運豈其放情江海取逸丘樊不得已而然故也且巖壑閑逺水石清華雖復崇門八襲高城萬雉莫不蓄壤開泉髣髴林澤故知松山桂渚非止素玩碧澗清潭翻成麗曯挂冕東都夫何難之有南史卷七十六南史卷七十六考證臧榮緒傳自號披褐先生披監本訛彼今改正呉苞傳臘燭一挺臘應作蠟今各本俱同仍之沈麟士傳走雖不敏請附高卿有蹈東海死耳卿一本作節昇明末太守王奐永明中中書郎沈約並表薦之並監本訛呈今改从南本陶𢎞景傳梁武帝尤深敬事問年祚逺近祚南本作數今从監本南史卷七十六考證
