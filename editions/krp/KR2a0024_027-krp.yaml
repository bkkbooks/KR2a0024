body:
  text: 南史卷二十七唐李延夀撰列傳第十七孔靖孫琇之孫奐琇之曽孔琳之孫覬殷景仁從祖弟淳孔靖字季恭㑹稽山隂人也名與宋武帝祖諱同故以字稱祖愉晉車騎將軍父誾散騎常侍季恭始察孝㢘累遷司徒左西掾未拜遭母憂隆安五年被起為山隂令不就宋武帝東征孫恩屢至㑹稽過季恭宅季恭正晝卧有神人衣服非常謂曰起天子在門既而失之遽出適見帝延入結交執手曰卿後當大貴願以身為託扵是曲意禮接贍給甚厚帝後討孫恩時桓𤣥篡形已著帝欲扵山隂建義季恭以山隂路逺且𤣥未居極位不如待其篡後扵京口圖之帝亦以為然時虞嘯父為㑹稽内史季恭求為府司馬不得乃出詣都及帝定桓𤣥以季恭為㑹稽内史使齎封板拜授正與季恭遇季恭便回舟夜還至即叩扉入郡嘯父本為桓𤣥所授聞𤣥敗開門請罪季恭慰勉使且安所住明日乃移季恭到任釐整浮華翦罰遊惰由是境内肅清累遷吴興太守加冠軍先是呉興頻䘮太守言項羽神為卞山王居郡聽事二千石常避之季恭居聽事竟無害也遷尚書左僕射固讓義熙八年復為㑹稽内史修飾學校督課誦習十年復為右僕射又讓不拜除領軍加散騎常侍十二年致仕拜金紫光禄大夫是嵗武帝北伐季恭求從以為太尉軍諮祭酒從平關洛宋臺初建以為尚書令又讓乃拜侍中特進左光禄大夫辭事東歸帝餞之戲馬臺百僚咸賦詩以述其美及受命加開府儀同三司讓累年不受薨以為贈子靈符位丹陽尹㑹稽太守尋加豫章王子尚撫軍長史靈符家本豐富産業甚廣又扵永興立墅周回三十三里水陸地二百六十五頃含帶二山又有果園九處為有司所糾詔原之而靈符答對不實坐免尋又復官靈符慤實有材幹不存華飾每所莅官政績修理廢帝景和中犯忤近臣為所讒搆遣使鞭殺之二子湛之深之扵都賜死明帝即位追贈靈符金紫光禄大夫深之大明中為尚書比部郎時安陸應城縣人張江陵與妻呉共罵母黄令死黄忿恨自經死已值赦案律子賊殺傷毆父母梟首罵詈棄市謀殺夫之父母亦棄市㑹赦免刑補治江陵罵母母以自裁重扵傷毆若同殺科則疑重用傷毆及詈科則疑輕制唯有打母遇赦猶梟首無詈母致死㑹赦之科深之議曰夫題里逆心而仁者不入名且惡之况乃人事故毆傷呪詛法所不原詈之致盡則理無可宥罰有從輕蓋疑失善求之文㫖非此之謂江陵雖遇赦恩故合梟首婦本以義愛非天屬黄之所恨情不在吳原死補治有允正法詔如深之議吴可棄市靈符弟靈運位著作郎靈運子琇之琇之有吏能仕齊為吴令有小兒年十嵗偷刈隣家稻一束琇之付獄案罪或諫之琇之曰十嵗便能為盗長大何所不為縣中皆震肅遷尚書左丞又以職事知名後兼左户尚書廷尉出為臨海太守在任清約罷郡還獻乾姜二十斤齊武帝嫌其少及知琇之清乃歎息出監吴興郡尋拜太守政稱清嚴眀帝輔政防備諸蕃致密㫖扵上佐使便宜従事隆昌元年遷琇之晉熙王冠軍長史江夏内史行郢州事欲令殺晉熙琇之辭不許欲自引决友人陸閑諫之琇之不從遂不食而死子臻至太子舍人尚書三公郎臻子㓜孫梁寧逺枝江公主簿無錫令㓜孫子奐奐字休文數嵗而孤為叔父虔孫所飬好學善屬文沛國劉顯以博學稱每深相歎羙執其手曰昔伯喈墳素悉與仲宣吾當希彼蔡君足下無愧王氏所保書籍尋以相付仕梁為尚書儀曹侍郎時左户郎沈炯為飛書所謗將䧟重辟連官臺閣人懐憂懼奐廷議理之竟得眀白侯景陷建鄴朝士並被拘縶或薦奐扵賊率侯子鑒乃脱桎梏厚遇之令掌書記時子鑒景之腹心朝士莫不卑屈奐獨無所下或諫奐曰不宜髙抗奐曰吾性命有在豈有取媚㓙醜以求全乎時賊徒剝掠子女拘逼士庶奐保持得全者甚衆尋遭母憂時天下䘮亂皆不能終三年䘮唯奐及吴國張種在寇亂中守法度並以孝聞及景平司徒王僧辯先下辟書引為左西掾梁元帝扵荆州即位徴奐及沈炯僧辯累表請留之帝手敕報曰孔沈二士今且借公其為朝廷所重如此僧辯為揚州刺史又補中從事史時侯景新平每事草創憲章故事無復存者奐博物强識甄明故實問無不知儀注體式牋書表翰皆出扵奐陳武帝作相除司徒左長史遷給事黄門侍郎齊遣東方老蕭軌来寇四方壅隔糧運不繼三軍取給唯在都下乃除奐建康令武帝剋日决戰乃令奐多營麥飯以荷葉裹之一宿之間得數萬裹軍人旦食訖盡棄其餘因而決戰大破賊武帝受禪遷太子中庶子永定三年除晉陵太守晉陵自宋齊以来為大郡雖經寇擾猶為全實前後二千石多行侵暴奐清白自守妻子並不之官唯以單船臨郡所得秩俸随即分贍孤寡郡中號曰神君曲阿富人殷綺見奐居處儉素乃餉以衣氊一具奐曰太守身居美禄何為不能辦此但百姓未周不容獨享温飽勞卿厚意幸勿為煩陳文帝即位徴為御史中丞奐性剛直多所糾劾朝廷甚敬憚之又達扵政體每所奏未嘗不稱善百司滯事皆付咨决遷散騎常侍領歩兵校尉中書舍人重除御史中丞尋為五兵尚書時文帝不豫臺閣事事並令僕射到仲舉共决及帝疾篤奐與宣帝及到仲舉并吏部尚書袁樞中書舍人劉師知等入侍醫藥文帝甞謂奐等曰今三方鼎峙宜湏長君朕欲近則晉成逺隆殷法卿等湏遵此意奐乃流涕歔欷跪而對曰陛下御膳違和痊復非久皇太子春秋鼎盛聖徳日躋廢立之事臣不敢聞帝曰古之遺直復見之卿乃用奐為太子詹事廢帝即位除散騎常侍國子祭酒出為南中郎康樂侯長史尋陽太守行江州事宣帝即位為始興王長史奐在職清儉多所規正宣帝嘉之賜米五百斛并累降敇書殷勤勞問太建六年為吏部尚書八年加侍中時有事北邉剋復淮泗封賞叙用紛紜重疊奐應接引進門無停賔加以識鑒人物詳練百氏凡所甄㧞衣冠縉紳莫不悦服性耿介絶諸請託雖儲副之尊公侯之重溺情相及終不為屈始興王叔陵之在湘州累諷有司固求台鉉奐曰衮章本以徳舉未必皇枝因抗言扵宣帝帝曰始興那忽望公且朕兒為公湏在鄱陽王後奐曰臣之所見亦如聖㫖後主時在東宫欲以江總為太子詹事令管記陸瑜言之奐奐曰江有潘陸之華而無園綺之實輔弼儲貳竊謂非材後主深以為恨乃自言扵宣帝宣帝將許之奐乃奏曰江總文華之人今皇太子文華不少無藉扵總如臣愚見願選敦重之才以居輔導帝曰誰可奐曰都官尚書王廓代有懿徳識性敦敏可以居之後主時亦在側乃曰廓王泰之子不可居太子詹事奐又曰宋朝范曄即范泰之子亦為太子詹事後主固爭之帝以總為詹事由是忤㫖初後主欲官其私寵微諷扵奐奐不從及左僕射陸繕遷職宣帝欲用奐代繕已草詔訖後主抑遂不行十四年為散騎常侍金紫光禄大夫領前軍將軍未行改領𢎞範宫衛尉至徳元年卒年七十餘有集十五卷弹文四卷子紹安紹薪紹忠紹忠字孝揚亦有才學位太子洗馬鄱陽東曹掾孔琳之字彦琳㑹稽山隂人也曽祖羣晉御史中丞祖沈丞相掾父廞光禄大夫琳之强正有志力少好文義解音律能弹棊妙善草𨽻桓𤣥輔政為太尉以為西閣祭酒𤣥時議欲廢錢用榖帛琳之議曰洪範八政以貨次食豈不以交易之所資為用之至要者乎故聖王制無用之貨以通有用之財既無毁敗之費又省難運之苦此錢所以嗣功龜貝厯代不廢者也榖帛為寳本充衣食今分以為貨則致損甚多又勞煩扵商販之手耗棄扵割截之用此之為弊著扵自曩故鍾繇曰巧偽之人競濕榖以要利制薄絹以充資魏世制以嚴刑弗能禁也是以司馬芝以為用錢非徒豐國亦所以省刑今既用而廢之則百姓頓亡其財是有錢無糧之人皆坐而飢困此斷之之弊也魏明帝時錢廢榖用四十年矣以不便扵人乃舉朝大議精才逹政之士莫不以宜復用錢彼尚舍榖帛而用錢足以明榖帛之弊著扵已試也𤣥又議復肉刑琳之以為唐虞象刑夏禹立辟盖淳薄既異致化不同書曰世輕世重言随時也夫三代風純而事簡故罕蹈刑辟季末俗巧而務殷故動陷憲網若三千行扵叔世必有踊貴之尤此五帝不相循法肉刑不可悉復者也漢文發仁惻之意傷自新之路莫由革古創制號稱刑厝然名輕而實重反更傷人故孝景嗣位輕之以緩緩而人慢又不禁邪期于刑罰之中所以見美扵昔厯代詳論而未獲厥中者也兵荒已後罹法更多棄市之刑本斬右趾漢文一謬承而弗革所以前賢悵恨議之而未辯鍾繇陳羣之意雖小有不同欲以右趾代棄市若從其言則所活者衆矣降死之生誠為輕法可以全其性命蕃其産育仁既濟物功亦益衆又今之所患逋逃為先屢叛不革宜令逃身靡所亦以肅戒未犯永絶惡原至扵餘條宜且依舊𤣥好人附悦而琳之不能順㫖是以不見知累遷尚書左丞揚州中從事史所居著績時責衆官獻便宜議者以為宜修庠序䘏典刑審官方明黜陟舉逸拔才務農簡調琳之扵衆議之外别建言曰夫璽印者所以辯章官爵立契符信官莫大扵皇帝爵莫尊扵公侯而傳國之璽厯代遞用襲封之印奕世相傳貴在仍舊無取改作今世唯尉一職獨用一印至扵内外羣官每遷悉改討尋其義私所未逹若謂官各異姓與傳襲不同則未若異代之為殊也若論其名器雖有公卿之貴未若帝王之重若以或有誅夷之臣忌其凶穢則漢用秦璽延祚四百未聞以子嬰身戮國亡而棄不佩帝王公侯之尊不疑扵傳璽人臣衆僚之卑何嫌扵即印載籍未聞其説推别自乖其凖而終年刻鑄䘮功消實金銀銅炭之費不可稱言非所以因循舊貫易簡之道愚請衆官即用一印無煩改作若新置官又官多印少文或零失然後乃鑄則仰裨天府非唯小益又曰凶門栢装不出禮典起自末代積習生常遂成舊俗爰自天子達于庶人誠行之有由卒革必駭然茍無闗扵情而有愆禮度存之未有所明去之未有所失固當式遵先典釐革後謬况復兼以游費實為人患者乎凡人事䘮儀多出閭里每有此湏動十數萬損人財力而義無所取至扵寒庶則人思自竭雖復室如懸罄莫不傾産單財所謂𦵏之以禮其若此乎謂宜一罷凶門之式遷尚書吏部郎義熙十一年除宋武帝平北征西長史遷侍中宋臺初建除宋國侍中永初二年為御史中丞眀憲直法無所屈撓奏劾尚書令徐羡之虧違憲典時羡之領揚州刺史琳之弟璩之為中従事羡之使璩之解釋琳之使停寢其事琳之不許曰我觸忤宰相政當罪止一身汝必不應從坐何湏勤勤邪自是百僚震肅莫敢犯禁武帝甚嘉之行經蘭臺親加臨幸遷祠部尚書不事産業家尤貧素景平元年卒追贈太常子邈有父風官至揚州中従事邈子覬覬字思逺少骨鯁有風力以是非為己任口吃好讀書早知名厯位中書黄門侍郎初晉安帝時散騎常侍選望甚重與侍中不異其後職任閑散用人漸輕孝建三年孝武欲重其選扵是吏部尚書顔竣奏以覬及司徒左長史王景文應舉帝不欲威權在下其後分吏部尚書置二人以輕其任侍中蔡興宗謂人曰選曹要重常侍閑淡改之以名而不以實雖主意欲為輕重人心豈可變邪既而常侍之選復卑選部之貴不異大明元年徙太子中庶子領翊軍校尉厯秘書監廷尉卿為御史中丞鞭令史為有司所糾原不問六年除安陸王子綏後軍長史江夏内史性使酒仗氣每醉輒彌日不醒僚類間多所陵忽尤不能曲意權幸莫不畏而疾之居常貧罄無有豐約未甞闗懐為府長史典籖諮事不呼前不敢前不令去不敢去雖醉日居多而眀曉政事醒時判决未嘗有壅衆咸曰孔公一月二十九日醉勝世人二十九日醒也孝武每欲引見先遣人覘其醉醒性真素不尚矯飾遇得寳玩服用不疑而他物麤敗終不改易時吳郡顧覬之亦尚儉素衣裘器服皆擇其陋者宋世清儉稱此二人覬弟道存從弟徽頗營産業二弟請假東還覬出渚迎之輜重十餘船皆是綿絹紙席之屬覬見之偽喜謂曰我比乏得此甚要因命置岸側既而正色謂曰汝軰忝預士流何至還東作賈客邪命燒盡乃去先是庾徽之為御史中丞性豪麗服玩甚華覬代之衣冠器用莫不麤率蘭臺令史並三吴富人咸有輕之之意覬蓬首緩帶風貌清嚴皆重跡屏氣莫敢欺犯庾徽之字景猷頴川􅋣陵人也後卒扵南東海太守覬後為司徒左長史道存代覬為後軍長史江夏内史時東土大旱都邑米貴一斗將百錢道存慮覬甚乏遣吏載五百斛米餉之覬呼吏謂之曰我在彼三載去官之日不辦有路糧郎至彼未㡬那能得此米邪可載米還彼吏曰自古以来無有載米上水者都下米貴乞扵此貨之不聽吏乃載米而去永光元年遷侍中後為尋陽王右軍長史行㑹稽郡事明帝即位召為太子詹事遣故佐平西司馬庾業為右軍司馬代覬行㑹稽郡事時上流反叛上遣都水使者孔璪入東慰勞璪至説覬以廢帝侈費倉儲耗盡都下罄匱資用已竭今南北並起逺近離叛若擁五郡之銳招動三吴事無不剋覬然其言遂發兵馳檄覬子長公璪二子淹𤣥並在都馳信密報泰始二年正月並逃叛東歸遣書要吴郡太守顧琛琛以母年篤老又密邇建鄴與長子寳素謀議未判少子寳先時為山隂令馳書報琛以南師已近朝廷孤弱不時順従必有覆滅之禍覬前鋒軍已度浙江琛遂據郡同反吴興太守王曇生義興太守劉延熙晉陵太守袁標一時響應庾業既東眀帝即以代延熙為義興以延熙為巴陵王休若鎮東長史業至長塘湖即與延熙合眀帝遣建威將軍沈懐明東討尚書張永係進巴陵王休若董統東討諸軍時覬所遣孫曇瓘等軍頓晉陵九里部陣甚盛懐明至奔牛所領寡弱張永至曲阿未知懐眀安否退還延陵就休若諸將帥咸勸退破罔休若宣令敢有言退者斬衆小定軍主劉亮又繼至兵力轉集人情乃安時齊髙帝率軍東討與張永等扵晉陵九里曲結營與東軍相持上遣積射將軍江方興南臺御史王道隆至晉陵視賊形勢賊帥孫曇瓘程扞宗陳景逺凡有五城互相連帶扞宗城猶未固道隆率所領急攻之俄頃城䧟斬扞宗首劉亮果勁便刀楯乃負楯而進直入重柵衆軍因之即皆摧破齊髙帝與永等乗勝馳擊之又大破之曇瓘因此敗走孔璪與曇生焚倉庫奔錢唐㑹稽聞西軍稍近將士多奔亡覬不能復制上虞令王晏起兵攻郡覬憂遽不知所為其夕率千人聲云東討實趨石瀃遇潮涸不得去衆叛都盡門生載以小船竄于山􅀈村村人縛以送晏晏調曰此事孔璪之為無豫卿事可作首辭當相為申上覬曰江東處分莫不由身委罪求活便是君軰行意耳晏乃斬之東閣外臨死求酒曰此是平生所好顧琛王曇生袁標等並詣吴喜歸罪喜皆宥之東軍主凡七十六人扵陣斬十七人餘皆原宥覬之起兵也夢行宣陽門道上顧望皆邱陵覬寤私告人曰邱陵者弗平建康其殆難剋覬弟道存位黄門吏部郎南海太守晉安王子勛建偽號以為侍中行雍州事事敗見殺殷景仁陳郡長平人也曽祖融晉太常祖茂之特進左光禄大夫父道裕早亡景仁少有大成之量司徒王謐見而以女妻之為宋武帝太尉行參軍厯位中書侍郎景仁不為文而敏有思致不談義而深逹理至扵國典朝議舊章記注莫不撰録識者知其有當世之志也甞建議請百官舉才以所薦能否黜陟武帝甚知之少帝即位補侍中累表辭讓優詔申其請以為黄門侍郎厯左衛將軍文帝即位委遇彌厚俄遷侍中左衛如故時與王華王曇首劉湛四人並為侍中以風力局幹冠冕一時同升之美近代莫及元嘉三年車駕征謝晦司徒王𢎞入居中書下省景仁長直共掌留任晦平代到彦之為中領軍侍中如故文帝所生章太后早亡上奉太后所生蘇氏甚謹六年蘇氏卒車駕親往臨哭詔欲遵二漢推恩之典景仁議以為漢氏推恩加爵于時承秦之弊儒術蔑如懼非盛明所宜軌蹈晉監二代朝政之所因君舉必書哲王之所慎體至公者懸爵賞扵無私奉天統者每屈情以申制所以作孚萬國貽則後昆上從之丁母憂𦵏竟起為領軍将軍固辭上使綱紀代拜遣中書舍人周﨣與載詣府服闋遷尚書僕射太子詹事劉湛代為領軍湛與景仁素善皆被遇扵武帝俱以宰相許之湛常居外任㑹王𢎞王華王曇首相係亡景仁引湛還朝共參朝政湛既入以景仁位遇本不踰己一旦居前意甚憤憤知文帝信仗景仁不可移奪乃深結司徒彭城王義康欲倚宰相之重以傾之十二年景仁遷中書令䕶軍將軍僕射如故尋復加領吏部湛愈怒義康納湛言毁景仁扵文帝帝遇之益隆景仁密陳相王權重非社稷計上以為然景仁對親舊歎曰引之令入便噬人乃稱疾請解不見許使停家飬病湛議欲遣人若劫盗者扵外殺之以為文帝雖知當不能傷至親之愛上微聞之徙景仁扵西掖門外晉鄱陽王第以為䕶軍府密邇宫禁故其計不行景仁卧疾者五年雖不見上而密函去来日中以十數朝政大小必以問焉影迹周密莫有窺其際者及將収湛之日景仁便拂拭衣冠寢疾既久左右皆不悟其意其夜上出華林園延賢堂召之景仁猶稱脚疾小牀輿以就坐誅討處分一皆委之代義康為揚州刺史僕射吏部如故遣使者授印綬主簿代拜畢便覺疾甚情理乖錯性本寛厚而忽更苛暴問左右曰今年男婚多女嫁多是冬大雪景仁乗輿出廳事觀望忽驚曰當閣何得有大樹既而曰我誤耳疾篤文帝謂不利在州使還住僕射下省為州凡月餘日卒或云見劉湛為祟追贈侍中司空諡曰文成公大明五年孝武行經景仁墓詔遣致祭子道矜幼而不慧位太中大夫道矜子恒明帝時位侍中度支尚書屬父疾積久為有司所奏詔曰道矜生便有病更無横疾恒因愚習惰久妨清序可除散騎常侍淳字粹逺景仁從祖弟也祖允晉太常父穆以和謹致稱自五兵尚書為宋武帝相國左長史元嘉中位特進右光禄大夫領始興王師卒官諡曰元子淳少好學有美名厯中書黄門侍郎黄門清切直下應留下省以父老特聽還家髙簡寡言早有清尚愛好文義未甞違捨在祕書閣撰四部書大目凡四十卷行扵世元嘉十一年卒朝廷痛惜之子孚有父風甞與侍中何朂共食孚羮盡朂云益殷蓴羮朂司空無忌子也孚徐輟筯曰何無忌諱孚位吏部郎為順帝撫軍長史子臻字後同幼有名行袁粲禇彦回並賞異之每造二公之席輒清言畢景王儉為丹陽尹引為郡丞袁昻先拜秘書丞求臻為到省表臻答曰何不見倩拜而見倩作表遂不為作厯位太子洗馬淳弟沖字希逺位御史中丞有司直之稱再遷度支尚書元凶妃即淳女而沖在東宫為邵所知遇邵弑立以為司𨽻校尉沖有學義文辭劭使為尚書符罪状孝武亦為劭盡力建鄴平賜死沖弟淡字夷逺亦厯黄門吏部郎太子中庶子大明中又以文章見知論曰季恭命偶興王恩深惟舊及位致崇寵而每存謙挹觀夫持滿之戒足以追蹤古人琇之貞素之風不踐無義之地易曰王臣蹇蹇其動也直休文行已之度可謂近之琳之二議深逹變通之道覬持身之節亦曰一時之良而聽言則悖晚致覆没痛矣㦲景仁逺大之情著扵初筮元嘉之盛幸致宗臣言聽計從扵斯為重羙矣乎南史卷二十七南史卷二十七考證孔靖傳言項羽神為卞山王又一項羽神事特進左光禄大夫辭事東歸帝餞之戲馬臺一本無左字又餞字上有親字靈符慤實有材幹材監本誤堪今改从閣本孔奐傳除司徒左長史遷給事黄門侍郎一本作除司徒長史左遷給事黄門侍郎加以識鑑人物詳練百氏監本脫以字一本并脫識字南史卷二十七考證
