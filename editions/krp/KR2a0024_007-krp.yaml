body:
  text: 南史卷七唐李延夀撰梁本紀中第七普通元年春正月乙亥朔大赦改元丙子日有蝕之己卯以司徒臨川王宏為太尉揚州刺史以金紫光禄大夫王份為尚書左僕射庚子扶南髙麗等國並遣使朝貢二月癸丑以髙麗王嗣子安為寧東將軍髙麗王三月滑國遣使朝貢夏四月河南國遣使朝貢秋七月己夘江淮海並溢九月乙亥有星晨見東方光爛如火是嵗魏正光元年二年春正月辛巳祀南郊詔置孤獨園以恤孤幼戊子大赦二月辛丑祀明堂三月庚寅大雪平地三尺夏四月乙夘改作南北郊内辰詔曰平秩東作義不在南前代因襲有乖禮制可於震方具兹千畝於是徙藉田於東郊外十五里五月癸夘琬琰殿火延燒後宮屋三千間閏月丁巳詔自今可停賀瑞六月丁夘義州刺史文僧明以州歸魏秋七月丁酉假大匠卿裴䆳節督衆軍侵魏甲寅魏荆州刺史桓叔興帥衆降八月丁亥始平郡石鼓村地自開成井方六尺六寸深三十二丈冬十一月百濟新羅國各遣使朝貢十二月戊辰以鎮東大將軍百濟王餘隆為寧東大將軍三年春正月庚子以呉郡太守王暕為尚書左僕射庚戌都下地震三月乙夘巴陵王蕭屏薨夏四月丁夘汝隂王劉端薨五月壬辰朔日有蝕之既癸巳大赦詔公卿百僚各上封事連率郡國舉賢良方正直言之士秋八月甲子婆利白題國各遣使朝貢冬十一月甲申開府儀同三司始興王憺薨四年春正月辛夘祀南郊大赦辛亥祀明堂二月乙亥耕藉田孝弟力田賜爵一級預耕之司尅日勞酒冬十月庚午以中衞將軍袁昻為尚書令即本號開府儀同三司十一月癸未朔日有蝕之甲辰尚書左僕射王暕卒十二月戊午用給事中王子雲議始鑄鐵錢狼牙修國遣使朝貢五年夏六月乙酉龍鬬于曲阿王陂因西行至建陵城所經樹木倒折開數十丈庚子以員外散騎常侍元樹為平北將軍北青兖二州刺史率衆侵魏六年春正月辛亥祀南郊大赦庚申魏徐州刺史元法僧以彭城来降自去嵗以来北侵諸軍所在尅獲甲戌以元法僧為司空封始安郡王二月辛巳改封法僧為宋王三月丙午賜新附人長復除詿誤罪失一無所問夏五月己酉修宿豫堰又修曹公堰於濟隂壬子遣中護軍夏侯亶督壽陽諸軍侵魏六月庚辰豫章王綜奔魏魏復據彭城秋七月壬戌大赦冬十二月壬辰都下地震是嵗魏孝昌元年七年春正月辛丑朔赦死罪以下夏四月乙酉太尉臨川王宏薨南州津改置校尉増加奉秩詔在位羣臣各舉所知凡是清吏咸使薦聞秋九月己酉荆州刺史鄱陽王恢薨冬十一月庚辰丁貴嬪薨大赦是嵗河南髙麗林邑滑國並遣使朝貢大通元年春正月乙丑以尚書右僕射徐勉為尚書左僕射詔百官奉禄自今可長給見錢辛未祀南郊詔流亡者聼復宅業蠲役五年尤貧家勿收今年三調孝弟力田賜爵一級是月司州刺史夏侯夔進軍三闗所至皆尅初帝創同泰寺至是開大通門以對寺之南門取反語以協同泰自是晨夕講義多由此門三月辛未幸寺捨身甲戌還宫大赦改元大通以符寺及門名夏五月丙寅成景儁尅魏臨潼竹邑冬十月庚戌魏東豫州刺史元慶和以渦陽内屬甲寅曲赦東豫州十一月丁夘以中護軍蕭藻為都督侵魏鎮于渦陽是嵗林邑師子髙麗等國各遣使朝貢二年春正月乙酉蠕蠕國遣使朝貢二月築寒山堰癸丑魏孝明皇帝崩夏四月戊戌魏余朱榮推奉孝莊帝庚子榮殺幼主及太后胡氏辛丑魏郢州刺史元願達以義陽降封願達為樂平王是時魏大亂其北海王顥臨淮王彧汝南王悦並来奔北青州刺史元儁南荆州刺史李志皆以地降冬十月丁亥以魏北海王顥主魏遣東宫直閤將軍陳慶之衞送還北魏豫州刺史鄧獻以地降是嵗魏武泰元年尋改為建義又改曰永安中大通元年春正月辛酉祀南郊大赦賜孝悌力田爵一級辛巳祀明堂夏四月癸巳陳慶之攻拔魏梁城進屠考城禽魏濟隂王暉業五月癸酉進尅虎牢魏孝荘帝出居河北乙亥元顥入京師僭號建武六月壬午以永興公主疾篤故大赦公主志也是月都下疫甚帝於重雲殿為百姓設救苦齋以身為禱閏月護軍將軍南康王績薨己夘魏將尒朱榮攻殺元顥京師反正秋九月辛巳朱雀航華表災癸巳幸同泰寺設四部無遮大會上釋御服披法衣行清淨大捨以便省為房素床瓦器乘小車私人執役甲午升講堂法坐為四部大衆開涅槃經題癸夘羣臣以錢一億萬奉贖皇帝菩薩大捨僧衆黙許乙巳百辟詣寺東門奉表請還臨宸極三請乃許帝三荅書前後並稱頓首冬十月己酉又設四部無遮大會道俗五萬餘人會畢帝御金輅還宫御太極殿大赦改元十一月戊子魏巴州刺史嚴始欣以城降是嵗盤盤蠕蠕國並遣使朝貢二年夏四月癸丑幸同泰寺設平等會庚申大雨雹六月丁巳遣魏汝南王悦還北主魏庚申以魏尚書左僕射范遵為司州牧随悦北侵是月林邑扶南國遣使朝貢秋八月庚戌幸徳陽堂祖魏主元悦山賊宼會稽郡縣九月壬午假超武將軍湛海珍節以討之是嵗魏荘帝殺其權臣尒朱榮其黨奉魏長廣王曄為主而殺孝荘帝年號建明三年春正月辛巳祀南郊大赦丙申以魏尚書僕射鄭元護為征北大將軍二月辛丑祀明堂夏四月己巳皇太子統薨六月癸丑立昭明太子子華容公歡為豫章郡王枝江公譽為河東郡王曲江公詧為岳陽郡王是月丹丹國遣使朝貢秋七月乙亥立晉安王綱為皇太子大赦賜為父後者及出處忠孝文武清勤並爵一級庚寅詔宗戚有服屬者並賜湯沐食郷亭侯各隨逺近以為差次壬辰以吏部尚書何敬容為尚書右僕射九月狼牙修國遣使朝貢是秋吳興生野稻饑者賴焉冬十月己酉上幸同泰寺升法座為四部衆説涅槃經訖于乙夘前樂山縣侯蕭正則有罪流徙至是招誘亡命欲宼廣州在所討平之十一月乙未上幸同泰寺升法座為四部衆説般若經訖于十二月辛丑是嵗魏尒朱兆又廢其主曄而奉節閔皇帝改建明二年為普泰元年又魏渤海王髙歡舉兵信都别奉渤海太守朗為主改普泰元年為中興四年春正月丙寅以開府儀同三司南平王偉為大司馬以司空宋王元法僧為太尉尚書令以開府儀同三司袁昻為司空立臨川靖惠王宏子正徳為臨賀郡王庚午立嫡皇孫大器為宣城郡王位列諸王上癸未魏南兖州刺史劉世明以城降二月壬寅以太尉元法僧還北主魏以侍中元景隆為徐州刺史封彭城郡王通置常侍元景宗為青州刺史封平昌郡王随法僧北侵庚戌新除揚州刺史邵陵王綸有罪免為庶人三月庚午侍中領國子博士蕭子顯表置制㫖孝經助教一人生十人專通帝所釋孝經義夏四月盤盤國遣使朝貢秋七月甲辰星隕如雨九月乙巳加司空袁昻尚書令冬十一月髙麗國遣使朝貢十二月丙子魏彭城王尒朱仲逺来奔以為定洛將軍封河南王北侵隨所尅土使自封建庚辰以太尉元法僧為郢州刺史驃騎大將軍開府同三司之儀是嵗魏相渤海王髙歡平尒朱氏廢節閔皇帝及自所奉渤海故王朗而奉平陽王修是為孝武皇帝改中興二年為大昌尋又改為永熙元年五年春正月辛夘祀南郊大赦賜孝悌力田爵一級先是一日丙夜南郊令解滌之等到郊所履行忽聞異香三随風至及將行事奏樂迎神畢有神光圓滿壇上朱紫黄白雜色食頃乃滅戊申都下地震己酉長星見辛亥祀明堂二月癸未幸同泰寺設四部大會升法座發金字般若經題訖于己丑三月丙辰大司馬南平王偉薨夏五月戊子都下大水御道通船六月己夘魏建義城主蘭保殺東徐州刺史崔祥以下邳降冬十月庚申以尚書右僕射何敬容為左僕射以吏部尚書謝舉為右僕射是嵗河南波斯盤盤國並遣使朝貢六年春二月癸亥耕藉田大赦賜孝悌力田爵一級三月己亥以行河南王可沓振為西秦河二州刺史正封河南王甲辰百濟國遣使朝貢夏四月丁卯熒惑在南斗秋七月甲辰林邑國遣使進貢冬十月丁夘以信武將軍元慶和為鎮北將軍封魏王率衆北侵閏十二月丙午西南有雷聲二是嵗魏孝武帝廹于其相髙歡出居闗中歡又别奉清河王世子善見為主是為孝静帝改永熈三年為天平元年魏於是始分為兩孝武既至闗中又與丞相宇文泰不平未㡬遇鴆而崩大同元年春正月戊申朔大赦改元二月辛巳祀明堂丁亥耕藉田辛丑髙麗丹丹國並遣使朝貢三月丙寅幸同泰寺設無遮大㑹辛未滑國遣使朝貢夏四月庚子波斯國遣使朝貢壬戌幸同泰寺鑄十方銀像并設無碍會秋七月辛夘扶南國遣使朝貢冬十月雨黄塵如雪十一月壬戌北梁州刺史蘭欽攻漢中魏梁州刺史元羅降癸亥復梁州是嵗西魏文皇帝大綂元年二年春二月乙亥耕藉田三月庚申詔求讜言及令文武在位舉士戊寅帝幸同泰寺設平等法會夏四月乙未以開府同三司之儀元法僧為太尉五月癸夘以魏梁州刺史元羅為青冀二州刺史封東郡王六月丁亥詔郊明堂陵廟等令改視散騎侍郎秋九月辛亥幸同泰寺設四部無得法會冬十月乙亥詔大舉北侵壬午幸同泰寺設無碍大會十一月雨黄塵如雪攬之盈掬己亥詔北侵衆軍班師辛亥都下地震生白毛長二尺十二月壬申與東魏通和三年春正月辛丑祀南郊大赦賜孝悌力田爵一級是夜朱雀門災壬寅雨灰黄色二月丁亥耕藉田癸巳以護軍將軍蕭藻為尚書左僕射三月戊戌立昭明太子子􅩼為武昌郡王譼為義陽郡王夏五月癸未幸同泰寺鑄十方金銅像設無得法會六月青州胊山隕霜秋七月青州雪害苗稼癸卯東魏人来聘己酉義陽王譼薨八月辛夘幸阿育王寺設無碍法喜食大赦九月使兼散騎常侍張臯聘于東魏閏九月甲子侍中太尉元法僧薨冬十月丙辰都下地震是嵗饑四年春二月己亥耕藉田三月河南蠕蠕國並遣使朝貢夏五月甲戌東魏人来聘六月辛丑日有食之秋七月癸亥詔以柬冶徒李𦙍之降象牙如来真形大赦戊辰使兼散騎常侍劉孝儀聘于柬魏八月甲辰詔南兖等十二州既經饑饉曲赦逋租宿責勿收今年三調九月閲武于樂游苑五年春正月乙夘以護軍將軍廬陵王續為驃騎將軍安右將軍尚書左僕射蕭藻為中衛將軍並開府儀同三司中權將軍丹陽尹何敬容以本號為尚書令吏部尚書張纉為尚書左僕射丁巳御史中丞參禮儀事賀琛奏今南北二郊及藉田往還並宜御輦不復乘路二郊請用素輦藉田往還乘常輦皆以侍中陪乘停大將軍及太僕詔付尚書博議施行改素輦名大同輦郊祀宗廟乘佩輦辛未祀南郊詔孝弟力田及州閭郷黨稱為善人者各賜爵一級秋八月乙酉扶南國獻生犀冬十一月乙亥東魏人来聘十二月使兼散騎常侍栁豹聘于東魏是嵗都下訛言天子取人肝以飴天狗大小相警日晚便閉門持仗數月乃止六年春正月庚戌朔曲赦司豫徐兗四州二月己亥耕藉田夏四月癸未詔晋宋齊三代諸陵有職司者勤加守護五月己夘河南王遣使朝獻馬及方物求釋迦像并經論十四條勅付像并制㫖涅槃般若金光明講䟽一百三卷秋七月丁亥東魏人来聘遣散騎常侍陸晏子報聘八月戊午大赦辛未盤盤國遣使朝貢九月戊戌司空袁昻薨冬十一月己夘曲赦都下十二月壬子江州刺史豫章王歡薨七年春正月辛巳祀南郊大赦辛丑祀明堂二月乙巳以行宕昌王梁彌泰為平西將軍河凉二州刺史正封宕昌王辛亥耕藉田乙夘都下地震夏四月戊申東魏人来聘遣兼散騎常侍明少遐報聘冬十一月丙子詔停所在使役女丁十二月壬寅東魏人来聘遣兼散騎常侍袁狎報聘丙辰於宫城西立士林舘延集學者是嵗宕昌蠕蠕髙麗百濟滑國各遣使朝貢百濟求涅槃等經疏及醫工畫師毛詩博士並許之交州人李賁攻刺史蕭諮八年春正月安成郡人劉敬躬挾左道以反二月戊戌江州刺史湘東王繹遣中兵曹子郢討禽之送于都斬之建康市三月於江州新蔡髙塘立頌平屯墾作蠻田九年春閏正月丙申地震生毛三月以太子詹事謝舉為尚書僕射夏四月林邑王破徳州攻李賁賁將范修又破林邑王於九德敗走之冬十一月益州刺史武陵王紀進號征西將軍開府儀同三司十年春正月李賁竊號於交阯年號天徳三月甲午幸蘭陵庚子謁建陵有紫雲䕃陵上食頃乃散帝望陵流涕所霑草皆變色陵傍有枯泉至是而流水香潔辛丑哭于修陵壬寅於皇基寺設法會詔賜蘭陵老少位一階并加頒賚所經縣邑無出今年租賦因賦還舊郷詩癸夘詔園陵職司恭事勤勞並錫位一階并加賜賚己酉幸京口城北固樓因改名北顧庚戌幸囘賔亭宴帝郷故老及所經近縣奉迎候者少長數千人各賚錢二千夏四月乙夘至自蘭陵詔鰥寡孤獨尤貧者贍恤各有差五月廣州人盧子略反刺史新渝侯映討平之詔曲赦廣州秋九月己丑赦冬十一月大雪平地三尺十一年春正月震華林園光嚴殿重雲閣帝自貶拜謝上天累刻乃止夏四月東魏人来聘冬十月己未詔復開贖罪典中大同元年春正月丁未曲阿縣建陵隧口石辟邪起舞有大蛇鬬隧中其一被傷奔走青蟲食陵樹葉略盡癸丑交州刺史楊㬓尅交阯嘉寧城李賁竄入屈獠洞交州平三月乙巳大赦庚戌幸同泰寺講金字三慧經仍施身夏四月丙戌皇太子以下奉贖仍於同泰寺解設法會大赦改元是夜同泰寺災六月辛巳竟天有聲如風水相薄秋七月甲子詔自今有犯罪者非大逆父母祖父母勿坐丙寅詔曰朝四暮三衆狙皆喜名實未虧而喜怒為用頃聞外間多用九佰錢佰減則物貴佰足則物賤非物有貴賤是心有顛倒至於逺方日更滋甚自今可通用足佰錢八月丁丑東揚州刺史武昌王􅩼薨甲午渇槃陁國遣使獻方物冬十一月癸酉汝隂王劉哲薨太清元年春正月己亥朔日有蝕之壬寅荆州刺史廬陵王續薨辛酉祀南郊大赦甲子祀明堂是月東魏相渤海王髙歡薨二月己夘白虹貫日庚辰東魏司徒侯景求以河南十三州内屬壬午以景為大將軍封河南王大行臺承制如鄧禹故事丁亥耕藉田三月庚子幸同泰寺設無遮大會上釋御服服法衣行清浄大捨名曰羯磨以五明殿為房設素木床葛帳土瓦器乘小輿私人執役乘輿法服一皆屏除甲辰遣司州刺史羊鴉仁率土州刺史桓和仁州刺史湛海珍等應接侯景兵未至而東魏遣兵攻景景又割地求救於西魏方解圍乙巳帝升光嚴殿講堂坐師子講金字三慧經捨身夏四月庚午羣臣以錢一億萬奉贖皇帝菩薩僧衆黙許戊寅百辟詣鳳莊門奉表三請三荅頓首並如中大通元年故事丁亥服衮冕御輦還宫幸太極殿如即位禮大赦改元是月神馬出皇太子獻寶馬頌六月戊辰以前雍州刺史鄱陽王範為征北將軍總督漢北征討諸軍事秋七月庚申羊鴉仁入縣瓠城八月乙丑諸軍北征以南豫州刺史蕭明為大都督赦緣邉初附諸州戊子以大將軍侯景録行臺尚書事九月癸夘王游苑成輿駕幸苑冬十一月東魏將慕容紹宗大敗蕭明于寒山明被俘執紹宗進圍潼州十二月戊辰命太子舎人元真還北為東魏主二年春正月癸巳朔兩月相承如鉤見于西方戊戌詔在位各舉所知己亥東魏克渦陽辛丑以尚書僕射謝舉為尚書令以守吏部尚書王克為尚書僕射甲辰東魏剋殷豫二州三月甲辰撫軍將軍髙麗王髙延卒以其子成為寧東將軍髙麗王樂浪公己未屈獠洞斬李賁傳首建鄴夏四月丙子詔在朝及州郡各舉士五月辛丑以新除中書令邵陵王綸為安前將軍開府儀同三司辛亥曲赦交愛徳三州六月天裂于西北長十丈闊二丈光出如電其聲若雷秋七月使兼散騎常侍謝班聘于東魏結和八月戊辰侯景舉兵反甲辰使開府儀同三司邵陵王綸都督衆軍討景曲赦南豫州九月戊辰地震江左尤甚壊屋殺人地生白毛長二尺益州市有飛螽萬羣螫人死冬十月侯景襲譙州進攻陷歴陽戊申以臨賀王正徳為平北將軍都督諸軍屯丹陽郡己酉景自横江濟采石辛亥至建鄴臨賀王正徳率衆附賊十一月戊午朔設壇刑白馬祀蚩尤於太極殿前己未景立蕭正徳為天子於南闕前辛酉賊攻䧟東府城庚辰邵陵王綸帥武州刺史蕭弄璋前譙州刺史趙伯超等入援乙酉進軍湖頭與賊戰賊敗績丙戌安北將軍鄱陽王範遣世子嗣雄信將軍裴之髙等率衆入援次張公洲十二月戊申天西北裂有光如火尚書令謝舉卒丙辰司州刺史栁仲禮前衡州刺史韋粲髙州刺史李遷仕前司州刺史羊鴉仁等率軍入援三年春正月丁巳大都督栁仲禮率衆軍分據南岸賊濟軍於青塘襲殺韋粲庚申白虹貫日三重邵陵王綸臨城公大連等率兵集南岸戊辰有流星長三十丈堕武庫李遷仕及天門太守樊文皎進軍青溪東為賊所破文皎死之壬午熒惑守心二月侯景遣使求和皇太子固請帝乃許之盟于西華門下景既運東城米歸于石頭亦不觧圍啟求遣諸軍退丁未皇太子又命南兗州刺史南康王會理前青冀二州刺史湘潭侯退率江北之衆頓于蘭亭苑甲子以開府儀同三司丹陽尹邵陵王綸為司空以合州刺史鄱陽王範為征北大將軍開府儀同三司以司州刺史栁仲禮為侍中尚書僕射時景姧計既成乃表陳帝失復舉兵向闕三月城内以景違盟設壇告天地神祗戊午前司州刺史羊鴉仁等進軍東府北與賊戰大敗時四方征鎮入援者三十餘萬莫有鬬志自相抄奪而已丁卯賊攻陷宫城縱兵大掠己巳賊矯詔遣石城公大款解外援軍庚午侯景自為都督中外諸軍事大丞相録尚書事辛未援軍各退散丙子熒惑守心夏四月己丑都下地震丙申又震己酉帝以所求不供憂憤寢疾是月青冀二州刺史明少遐東徐州刺史湛海珍北青州刺史王奉伯各舉州附東魏五月丙辰帝崩于淨居殿時年八十六辛亥遷梓宫于太極前殿十一月乙卯塟于修陵追尊為武皇帝廟號髙祖帝性淳孝六嵗獻皇太后崩水漿不入口三日哭泣有過成人及丁文帝憂時為齊随王諮議随府在荆鎮以病聞便投劾星馳不復寢食倍道就路憤風驚浪不暫停止帝形容本壯及至都銷毁骨立親表士友皆不復識望宅奉諱氣絶久之每哭輒歐血數升服内日惟食麥二溢拜埽山陵涕淚所洒松草變色及居帝位即於鍾山造大愛敬寺青溪邉造智度寺於臺内立至敬等殿又立七廟堂月中再設淨饌每至展拜涕泗滂沲哀動左右少而篤學能事畢究雖萬機多務猶卷不輟手燃燭側光常至戊夜撰通史六百卷金海三十卷制㫖孝經義周易講疏及六十四卦二繫文言序卦等義樂社義毛詩春秋答問尚書大義中庸講疏孔子正言孝經講䟽凡二百餘卷王侯朝臣皆奉表質疑帝皆為解釋修飾國學増廣生員立五舘置五經博士天監初何佟之賀瑒嚴植之明山賔等覆述制㫖并撰吉凶軍賓嘉五禮一千餘卷帝稱制斷疑焉大同中於臺西立士林舘領軍朱异太府卿賀琛舎人孔子祛等逓互講述皇太子宣城王亦於東宫宣猷堂及揚州解開講於是四方郡國莫不向風爰自在田及登寶位躬制賛序詔誥銘誄箴頌牋奏諸文又百二十卷六藝備閑棊登逸品隂陽緯候卜筮占決草𨽻尺牘騎射莫不稱妙晚乃溺信佛道日止一食膳無鮮腴惟豆羹糲飯而已或遇事擁日儻移中便𠻳口以過製涅槃大品淨名三慧諸經義記數百卷聽覽餘閑即於重雲殿及同泰寺講説名僧碩學四部聽衆常萬餘人身衣布衣木綿皂帳一冠三載一被二年自五十外便斷房室後宫職司貴妃以下六宫禕䄖三翟之外皆衣不曵地傍無錦綺不飲酒不聴音聲非宗廟祭祀大㑹饗宴及諸法事未嘗作樂勤於政務孜孜無怠每冬月四更竟即敕把燭看事執筆觸寒手為皴裂然仁愛不斷親親及所愛愆犯多有縱捨故政刑弛紊每決死罪常有哀矜涕泣然後可奏性方正雖居小殿暗室恒理衣冠小坐暑月未甞褰袒雖見内豎小臣亦如遇大賓也初齊髙帝夢屐而登殿顧見武明二帝後一人手張天地圖而不識問之荅曰順子後及崔慧景之逼長沙宣武王入援至越城夢乘馬飛半天而墜帝所馭化為赤龍騰虚獨上時臺内有宿衛士為覡常見太極殿有六龍各守一柱末忽失其二後見在宣武王宅時宣武為益州覡乃往蜀伏事及宣武在郢此覡還都乃見六龍俱在帝所寢齋遂去郢之雍中途遇疾且死謂同侣曰蕭雍州必作天子具以前事語之推此而言盖天命也雖在䝉塵齋戒不廢及疾不能進膳盥漱如初皇太子日中再朝每問安否涕泗交面賊臣侍者莫不掩泣疾乆口苦索蜜不得再曰荷荷遂崩賊祕之太子問起居不得見慟于閤下始天監中沙門釋寶誌為詩曰昔年三十八今年八十三四中復有四城北火酣酣帝使周捨封記之及中大同元年同泰寺災帝啟封見捨手迹為之流涕帝生於甲辰三十八尅建鄴之年也遇災嵗實丙寅八十三矣四月十四日而起火之始自浮屠第三層三者帝之昆季次也帝惡之召太史令虞履筮之遇巛履曰無害其繇云西南得朋東北喪朋安貞吉文言云東北喪朋乃終有慶帝曰斯魔鬼也酉應見夘金来尅木夘為隂賊鬼而帶賊非魔何也孰為致之酉為口舌當乎説位説言乎兌故知善言之口宜前為法事於是人人讃善莫不從風或刺血灑地或刺血書經穿心然燈坐禪不食及太清元年帝捨身光嚴重雲殿游仙化生皆震動三日乃止當時謂之祥瑞識者以非動而動在鴻範為祅以比石季龍之敗殿壁畵人頸皆縮入頭之類時海中浮鵠山去餘姚岸可千餘里上有女人年三百嵗有女官道士四五百人年並出百但在山學道遣使獻紅席帝方捨身時其使適至云此草常有紅鳥居下故以為名觀其圖狀則鸞鳥也時有男子不知何許人於大衆中自割身以飴饑鳥血流徧體而顔色不變又沙門智泉鐵鈎挂體以然千燈一日一夜端坐不動開講日有三足鳥集殿之東户自戶適于西南縣楣三飛三集白雀一見于重雲閣前連理樹又有五色雲浮於華林園昆明池上帝既流遁益甚境内化之遂至喪亡云論曰梁武帝時逄昏虐家遭寃禍既地居勢勝乘機而作以斯文徳有此武功始用湯武之師終濟唐虞之業豈曰人謀亦惟天命及據圖籙多歴嵗年制造禮樂敦崇儒雅自江左以来年踰二百文物之盛獨羙于兹然先王文武逓用徳刑備舉方之水火取法隂陽為國之道不可獨任而帝留心爼豆忘情干戚溺於釋教弛於刑典既而帝紀不立悖逆萌生反噬彎弧皆自子弟履霜弗戒卒至亂亡自古撥亂之君固己多矣其或樹置失所而以後嗣失之未有自己而得自己而喪追蹤徐偃之仁以致窮門之酷可為深痛可為至戒者乎南史卷七南史卷七考證武帝紀三月乙卯巴陵王蕭屏薨乙夘梁書作己夘又下文冬十一月甲申梁書作甲午俱彼此小異辛亥祀明堂辛亥梁書作丙午其北海王顥臨淮王彧汝南王悦並来奔彧監本訛或今改正先是一日丙夜南郊令解滌之等到郊所履行丙夜梁書作柬及將行事奏樂迎神畢迎監本作道今從閣本二郊請用素輦二監本訛三今从梁書詔晉宋齊三代諸陵有職司者勤加守護勤梁書作勒曲阿縣建陵隧口石辟邪起舞辟邪起舞梁書作騏驎動頃聞外間多用九佰錢佰梁書作陌夏四月庚午羣臣以錢一億萬奉贖午監本訛寅上文云三月庚子幸同泰寺乙巳升殿講經下文云戊寅百辟表請丁亥御輦還宫凡四十七日計乙巳後戊寅前不應有庚寅再查是年正月己亥朔則庚子乙巳為三月初旬戊寅丁亥為四月中旬末而庚午至戊寅距八日竊意庚午贖身既已黙許戊寅奉表三請三荅又遲九日丁亥回宫其為午字無疑也撰通史六百卷金海三十卷海梁書作䇿覆述制㫖并撰吉凶軍賓嘉五禮一千餘卷并監本訛拜今從梁書改正南史卷七考證
