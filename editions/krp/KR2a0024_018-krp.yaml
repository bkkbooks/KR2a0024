body:
  text: 南史卷十八唐李延壽撰列傳第八趙倫之子伯符蕭思話子惠開眎惠明惠眀子素惠明弟惠基惠基弟惠休惠基子洽介惠休弟子介子允引惠開從子琛臧燾𤣥孫嚴燾弟熹嚴族叔未甄熹子質未甄子盾厥趙倫之字幼成下邳僮人宋孝穆皇后之弟也幼孤貧事母以孝稱宋武帝起兵以軍功封閬中縣五等侯累遷雍州刺史武帝北伐倫之遣順陽太守傅𢎞之扶風太守沈田子出嶢栁大破姚泓於藍田及武帝受命以佐命功封霄城縣侯少帝卽位徴拜䕶軍元嘉三年拜領軍将軍倫之雖外戚貴寵而居月儉素性野拙澀於人間世事多所不觧久居方伯公私富貴入為䕶軍資力不稱以為見貶光禄大夫范泰好戲笑謂曰司徒公缺必用汝老奴我不言汝資地所任要是外戚髙秩次第所至耳倫之大喜每載酒肴詣泰五年卒諡元侯子伯符嗣伯符字潤逺少好弓馬為寧逺将軍總領義徒以居宫城北每火起及有劫盜輒身貫甲胄助郡縣赴討武帝甚嘉之文帝即位累遷徐兖二州刺史為政苛暴吏人畏懼如與虎狼居而劫盗逺迸無敢入境元嘉十八年徴為領軍将軍先是外監不𨽻領軍宜相統攝者自有别詔至此始統領焉後為丹陽尹在都嚴酷曹局不復堪命或委叛被録投水而死典筆吏取筆失㫖頓與五十鞭子倩尚文帝第四女海鹽公主甚愛重倩嘗因言戲以手擊主事上聞文帝怒離婚伯符慙懼發病卒諡曰肅傳國至孫朂齊受禅國除蕭思話南蘭陵人宋孝懿皇后弟子也父源之字君流歴徐兖二州刺史永初元年卒贈前将軍思話十歲許時未知書好騎屋棟打細腰鼓侵暴隣曲莫不患毒之自此折節數年中遂有令譽頗工𨽻書善弹琴能騎射後襲爵封陽縣侯元嘉中為青州刺史亡命司馬朗之兄弟聚黨謀為亂思話遣北海太守蕭汪之討斬之八年魏軍大至乃棄鎮奔平昌魏軍定不至由是徴繫尚方初在青州常所用銅斗覆在藥廚下忽於斗下得二死雀思話歎曰斗覆而䨇雀殞其不祥乎既而被繫及梁州刺史甄法䕶在任失和氐帥楊難當因此寇漢中乃自徒中起思話為梁南秦二州刺史平漢中悉收侵地置戍葭萌水思話遷鎮南鄭法護中山無極人也過江寓居南郡弟法崇自少府為益州刺史法護委鎮之罪為府所收於獄賜死文帝以法崇受任一方命言法護病卒文帝使思話上定漢中本末下之史官十四年遷臨川王義慶平西長史南蠻校尉文帝賜以弓琴手敕曰前得此琴言是舊物今以相借并徃桑弓一張理材乃快良材美器宜在盡用之地丈人真無所與讓也嘗從文帝登鍾山北嶺中道有盤石清泉上使於石上彈琴因賜以銀鍾酒謂曰相賞有松石間意歴寧蠻校尉雍州刺史監四州軍事徴爲吏部尚書思話以去州無復事力倩府軍身九人文帝戲之曰丈人終不爲田父於閭里何憂無人使邪未拜遷護軍將軍是時魏攻懸瓠文帝將大舉北侵朝士僉同思話固諌不從魏軍退卽代孝武爲徐兗二州刺史監四州軍事後爲圍碻磝城不拔退師歴下爲江夏王義恭所奏免官元凶弑立以爲徐兗二州刺史卽起義以應孝武孝武卽位徴爲尚書左僕射固辭改爲中書令丹陽尹散騎常侍時都下多劫掠二旬中十七發引咎陳遜不許後拜郢州刺史加都督卒贈征西將軍開府儀同三司謚曰穆侯思話外戚令望早見任待歴十二州杖節監督者九焉所至雖無皎皎清節亦無穢黷之累愛才好士人多歸之長子恵開少有風氣渉獵文史家雖貴戚而居服簡素初爲祕書郎意趣與人多不同比肩或三年不共語外祖光祿大夫沛郡劉成戒之曰汝恩戚家子無多異以取天下之疾轉太子舍人與汝南周朗同官友善以偏竒相尚孝建元年爲黄門侍郎與侍中何偃争推積射將軍徐冲之事偃任遇甚隆怒使門下推彈惠開乃上表解職由此忤㫖别敕有司以屬疾多免之思話素恭謹與惠開不同每加嫌責及見惠開自解表歎曰兒不幸與周朗周旋理應如此杖之二百尋除中庶子丁父艱居喪有孝性家素事佛凡爲父起四寺南岡下名曰禪岡寺曲阿舊鄉宅名曰禪鄉寺京口墓亭名曰禪亭寺所封封陽縣名曰禪封寺謂國僚曰封秩鮮而兄弟甚多若全關一人則在我所讓若人人等分又事可悲耻寺衆旣立自宜悉供僧衆襲封封陽縣侯爲新安王子鸞冠軍長史惠開妹當適桂陽王休範女又當適孝武子發遣之資應須二千萬乃以爲豫章内史聽其肆意聚納由是在郡著貪暴之名再遷御史中丞孝武與劉秀之詔曰今以蕭惠開爲憲司冀當稱職但一徃眼額已自殊有所震及在職百僚憚之後拜益州刺史路經江陵時吉翰子在荆州共惠開有舊爲設女樂樂人有美者惠開就求不得又欲以四女妓易之不許惠開怒收吉斬之卽納其妓啓云吉為劉義宣所遇交結不逞向臣訕毁朝政輒已戮之孝武稱快惠開素有大志至蜀欲廣樹經畧善於敘述聞其言者皆以爲大功可立才疎意廣竟無成功嚴用威刑蜀人號曰臥虎明識過人嘗三千沙門一閲其名退無所失明帝即位晉安王子勛反惠開乃集將佐謂曰吾荷世祖之眷當投袂萬里推奉九江蜀人素怨惠開嚴及是所遣兵皆不得前晉原郡及諸郡悉應並來圍城城内東兵不過二千凢蜀人惠開疑之悉皆遣出子勛尋敗蜀人並欲屠城以望厚賞明帝以蜀土險遠赦其誅責遣其弟惠基使蜀宣㫖而蜀人志在屠城不使王命速達遏留惠基惠基破其渠帥然後得前惠開奉㫖歸順城圍得解明帝又遣惠開宗人寶首水路慰勞益州寳首欲以平蜀爲功更奨說蜀人䖏䖏蜂起惠開乃啓陳情事遣宋寕太守蕭惠訓州别駕費欣業分兵並進大破之禽寳首送之惠開至都明帝問其故侍衛左右莫不悚然側目惠開舉動自若從容荅曰臣唯知逆順不識天命又云非臣不亂非臣不平初惠開府録事參軍劉希㣲負蜀人責將百萬爲責主所制未得俱還惠開與希㣲共事不厚而廐中凢有馬六十疋悉以乞希㣲償責其意趣不常如是惠開還資二千餘萬悉散施道俗一無所留後除桂陽王休範征北長史南東海太守其年會稽太守蔡興宗之郡惠開自京口請假還都相逄於曲阿惠開先與興宗名位畧同又經情款自以負釁推屈慮興宗不能詣已戒勒部下蔡會稽部伍若問慎不得荅惠開素嚴部下莫敢違興宗見惠開舟力甚盛遣人訪訊事力二三百人皆低頭直去無一人荅者尋除少府加給事中惠開素剛至是益不得志曰大丈夫入管喉舌出莅方伯乃復低頭入中邪寺内所住齋前嚮種花草甚美惠開悉剗除别種白楊每謂人曰人生不得行胷懐雖壽百歳猶爲夭也發病嘔血吐物如肝肺者卒子睿嗣齊受禪國除惠開與諸弟並不睦惠基使至益州遂不相見與同産弟惠明亦致嫌隙云惠明其次弟也亦有時譽泰始初爲吴興太守郡界有卞山山下有項羽廟相承云羽多居郡聽事前後太守不敢上惠明謂綱紀曰孔季恭嘗為此郡未聞有災遂盛設筵榻接賔數日見一人長丈餘張弓挾矢向惠明既而不見因發背旬日而卒子眎素梁天監中位丹陽尹丞初拜日武帝賜錢八萬眎素一朝散之親友遷司徒左西屬南徐州中從事性靜退少嗜慾好學能清言榮利不關於中喜怒不形於色在人間及居職並任情通率不自矜尚天然簡素及在京口便有終焉之志後為中書侍郎在位少時求為諸暨令到縣十餘日挂衣冠於縣門而去獨居屏事非親戚不得至其籬門妻卽齊太尉王儉女久與别居遂無子卒親故迹其事行諡曰貞文先生惠明弟惠基幼以外戚見宋江夏王義恭歎其詳審以女結婚歴中書黄門郎恵基善𨽻書及奕棊齊髙帝與之情好相得桂陽王休範妃惠基姊也髙帝謂之曰卿家桂陽遂復作賊髙帝頓新亭壘以惠基為軍副惠基弟惠朗親為休範攻戰惠基在城内了不自疑後為長兼侍中袁粲劉彦節起兵之夕髙帝以彦節是惠基妹夫惠基時直在省遣王敬則觀其指趣見惠基安静不與彦節相知由是益加恩信仕齊為都官尚書掌吏部永明中為侍中領驍騎將軍尚書令王儉朝宗貴望惠基同在禮閣非公事不私覿焉遷太常加給事中自宋大明以來聲伎所尚多鄭衛而雅樂正聲鮮有好者惠基觧音律尤好魏三祖曲及相和歌每奏輒賞悅不能已當時能棊人琅邪王抗第一品吴郡禇思莊會稽夏赤松第二品赤松思速善於大行思莊戲遲巧於鬭棊宋文帝時羊𤣥保為會稽帝遣思莊入東與𤣥保戲因置局圖還於帝前覆之齊髙帝使思莊與王抗交賭自食時至日暮一局始竟上倦遣還省至五更方决抗睡於局後寢思莊逹旦不寐時或云思莊所以品第致髙縁其用思深久人不能及抗思莊並至給事中永明中敕使抗品棊竟陵王子良使惠基掌其事初思話先於曲阿起宅有閑曠之致惠基常謂所親曰須婚嫁畢當歸老舊廬立身退素朝廷稱為善士卒贈金紫光祿大夫子洽字宏稱幼敏悟年七歳誦楚辭畧上口及長好學博涉善屬文仕梁位南徐州中從事近畿重鎮職更數千人前後居者皆致巨富洽清身率職饋遺一無所受妻子不免飢寒累遷臨海太守為政清平不尚威猛人俗便之後拜司徒左長史敕撰當塗堰碑辭甚贍麗卒於官文集二十卷行於世惠基弟惠休齊永明四年為廣州刺史罷任獻奉傾資上敕中書舍人茹法亮曰可問蕭惠休故當不復私邪吾欲分受之也後封建安縣子永元元年從吴興太守徴爲尚書右僕射吳興郡項羽神舊酷烈人云惠休事神謹故得美遷于時朝士多見殺二年惠休還至平望帝令服藥而卒贈金紫光祿大夫惠休弟惠朗同桂陽賊齊高帝赦之後為西陽王征虜長史行南兗州事坐法免官惠朗弟惠蒨仕齊左戸尚書子介介字茂鏡少頴悟有器識梁大同中武陵王紀為揚州刺史以介為府長史在職以清白稱武帝謂何敬容曰蕭介甚貧可以處一郡復曰始興郡頻無良守可以介為之由是出為始興太守及至甚著威德徴為少府卿尋加散騎常侍會侍中闕選司舉王筠等四人並不稱㫖帝曰我門中久無此職宜用蕭介為之應對左右多所匡正帝甚重之遷都官尚書每軍國大事必先訪介帝謂朱异曰端右材也中大同二年辭疾致仕帝優詔不許終不肯起乃遣謁者僕射魏祥就拜光祿大夫太清中侯景於渦陽敗走入壽陽帝敕助防韋黯納之介聞而上表致諌極言不可帝省表歎息卒不能用介性髙簡少交游唯與族兄琛從兄眎素及洽從弟淑等文酒賞㑹時人以比謝氏烏衣之游初武帝總延後進二十餘人置酒賦詩臧盾以詩不成罰酒一斗盾飲盡顔色不變言笑自若介染翰便成文無加㸃帝兩美之曰臧盾之飲蕭介之文卽席之美也年七十三卒於家第三子允字叔佐少知名風神凝逺通逹有識鑒容止醖藉仕梁位太子洗馬侯景攻䧟臺城百僚奔散允獨整衣冠坐于宫坊景軍敬焉弗之逼也尋出居京口時冦賊縱横百姓波駭允獨不行人問其故允曰性命自有常分豈可逃而免乎方今百姓爭欲奮臂而論大功何事於一書生哉莊周所謂畏景避迹吾弗為也乃閉門静䖏併日而食卒免於患陳永定中侯安都為南徐州刺史躬造其廬以申長幼之敬宣帝即位為黄門侍郎晉安王為南豫州以為長史時王尚少未親人務故委允行府事入為光祿卿允性敦重未嘗以榮利干懐及晉安出鎮湘州又苦攜允允少與蔡景歴善子徴修父黨之敬聞允將行乃詣允曰公年德並髙國之元老從容坐鎮旦夕自為列曹何為方辛苦蕃外荅曰已許晉安豈可忘信其恬榮勢如此至德中鄱陽王出鎮會稽允又為長史帶會稽郡丞行經延陵季子廟設蘋藻之薦託異代之交為詩以叙意辭理清典後主嘗問蔡徴允之為人徴曰其清虛𤣥逺殆不可測至於文章可得而言因誦允詩以對後主嗟賞久之尋拜光祿大夫及隋師濟江允遷于闗右時南士至長安者例皆授官允與尚書僕射謝伷辭以老疾隋文帝義之並厚賜帛尋卒年八十四弟引字叔休方正有器度性聰敏博學善屬文仕梁位西昌侯儀同府主簿侯景之亂梁元帝為荆州刺史朝士多歸之引曰諸王力争禍患方始今日逃難未是擇君之秋吾家再世為始興郡遺愛在人政可南行以存家門耳乃與弟肜及宗親等百餘人南奔嶺表時始興人歐陽頠為衡州刺史乃徃依焉頠遷廣州病死子紇領其衆引疑紇異圗因事規正由是情禮漸疎及紇反時都下士人岑之敬公孫挺等並惶駭唯引怡然謂之敬等曰管幼安袁曜卿亦但安坐耳君子正身以明道直已以行義亦何憂乎及章昭逹平番禺引始北還拜尚書金部侍郎引善書為當時所重宣帝嘗披奏事指引署名曰此字筆趣翩翩似鳥之欲飛引謝曰此乃陛下假其毛羽耳帝又謂引曰我每有所忿見卿輒意解何也引曰此自陛下不遷怒臣何預此恩引性抗直不事權貴宣帝每欲遷用輒為用事者所裁及吕梁覆師戎儲空匱轉引為庫部侍郎掌知營造引在職一年而器械充足歴中書黄門吏部侍郎廣州刺史馬靖甚得嶺表人心而甲兵精練每年深入俚洞數有戰功朝野頗生異議宣帝以引悉嶺外物情且遣引觀靖審其舉措諷令送質及至靖卽悟㫖遣兒弟為質後主卽位為中庶子建康令時殿内隊主吳璡及宦者李善度蔡脱兒等多所請屬引一皆不許引始族子密時為黄門郎諫引曰李蔡之權在位皆憚亦宜少為身計引曰吾之立身自有本末亦安能為李蔡致屈就令不平不過免職耳吳璡竟作飛書李蔡證之坐免官卒於家子徳言最知名引弟肜位太子中庶子南康王長史琛字彦瑜惠開從子也祖僧珍宋廷尉卿父惠訓齊末為巴東相梁武帝起兵齊和帝於荆州卽位惠訓與巴西太守魯休烈並以郡相抗惠訓使子璝據上眀建康城平始歸降武帝宥之以為太中大夫卒官琛少眀悟有才辯數歳時從伯惠開見而竒之撫其背曰必興吾宗起家齊太學博士時王儉當朝琛年少未為儉所識負其才氣候儉宴于樂游苑乃著虎皮靴策桃枝杖直造儉坐儉與語大悦儉時為丹陽尹辟為主簿永明九年魏始通好琛再銜命北使還為通直散騎侍郎時魏遣李彪來使齊武帝讌之琛於御筵舉酒勸彪彪不受曰公庭無私禮不容受勸琛荅曰詩所謂雨我公田遂及我私坐者皆悦服彪乃受琛酒累遷尚書左丞時齊明帝用法嚴峻尚書郎坐杖罰者皆卽科行琛乃密啓曰郎有杖起自後漢爾時郎官位卑親主文案與令史不異故郎三十五人令史二十人是以古人多耻為此職自魏晉以來郎官稍重今方參用髙華吏部又近於通貴不應官高昔品而罰遵曩科所以從來彈舉雖在空文而許以推遷或逄赦恩或入春令便得息停宋元嘉大明中經有被罰者别由犯忤主心非關常凖自泰始建元以來未經施行事廢已久人情未習自奉敕之後已行倉部郎江重欣杖督五十皆無不人懷慙懼兼有子弟成長彌復難為儀適其應行罰可特賜輸贖使與令史有異以彰優緩之澤帝納之自是應受罰者依舊不行東昏初嗣立時議無廟見文琛議據周頌烈文閔予皆為卽位朝廟之典於是從之梁武在西邸與琛有舊梁臺建以為御史中丞天監九年累遷平西長史江夏太守始琛為宣城大守有北僧南度唯齎一瓠蘆中有漢書序傳僧云三輔舊書相傳以為班固眞本琛固求得之其書多有異今者而紙墨亦古文字多如龍舉之例非𨽻非篆琛甚祕之及是以書餉鄱陽王範獻于東宮後為吳興太守郡有項羽廟土人名為憤王甚有靈驗遂於郡廰事安牀幕為神坐公私請禱前後二千石皆於廰拜祠以軛下牛充祭而避居他室琛至著履登廰事聞室中有叱聲琛厲色曰生不能與漢祖爭中原死據此廳事何也因遷之於廟又禁殺牛解祀以脯代肉琛頻莅大郡不事産業有闕則取不以為嫌歴左戸度支二尚書侍中帝每朝讌接琛以舊恩嘗犯武帝偏諱帝斂容琛從容曰名不偏諱陛下不應諱順上曰各有家風琛曰其如禮何又經預御筵醉伏上以棗投琛琛乃取栗擲上正中靣御史中丞在坐帝動色曰此中有人不得如此豈有說邪琛卽荅曰陛下投臣以赤心臣敢不報以戰栗上笑悦上每呼琛為宗老琛亦奉陳昔恩以早簉中陽夙忝同閈雖迷興運猶荷洪慈上荅曰雖云早契闊乃自非同志勿談興運初且道狂奴異琛常言少壯三好音律書酒年長以來二事都廢唯書籍不衰而琛性通脱常自解竈事畢餘餕必陶然致醉位特進金紫光祿大夫卒遺令諸子與妻同墳異藏祭以蔬菜𦵏止車十乘事存率素乘輿臨哭甚哀謚曰平子琛所撰漢書文府齊梁拾遺幷諸文集數十萬言子逰位少府卿逰子密字士㡬幼聰敏博學有文詞位黄門郎太子中庶子散騎常侍臧燾字徳仁東莞莒人宋武敬皇后兄也少好學善三禮貧約自立操行為鄉里所稱晉太元中衛将軍謝安始立國學徐兗二州刺史謝𤣥舉燾為助教晉孝武帝追崇庶祖母宣太后議者或謂宜配食中宗燾議曰陽秋之義母以子貴故仲子成風咸稱夫人經言考仲子宫若配食惠廟則宫無緣别築前漢孝文孝昭太后並繫子為號祭於寢園不配於髙祖孝武之廟後漢和帝之母曰恭懷皇后安帝祖母曰敬隱皇后順帝之母曰恭愍皇后雖不繫子為號亦祭於陵寢不配章安二帝此則二漢雖有太后皇后之異至於並不配食義同陽秋唯光武追廢吕后故以薄后配髙廟又衛后旣廢霍光追尊李夫人爲皇后配武帝廟此非母以子貴之例直以髙武二廟無配故耳又漢世立寢於陵自是晉制所異謂宜遠凖陽秋考宫之義近慕二漢不配之典尊號既正則罔極之情申别建寢廟則嚴禰之義顯繫子為稱兼明母貴之所由一舉而允三義固哲王之髙致也議者從之頃之去官以父母老家貧與弟熹俱棄人事躬耕自業約已養親者十餘年父母喪亡居喪六年以毁瘠著稱宋武帝義旗建參右将軍何無忌軍事隨府轉鎮南參軍武帝鎮京口參帝中軍軍事入補尚書度支郎改掌祠部襲封髙陵亭侯時太廟鴟尾災燾謂著作郎徐廣曰昔孔子在齊聞魯廟災曰必桓僖也今征西京兆四府君宜在毁落而猶列廟饗此其徴乎乃上議曰臣聞國之大事在祀與戎将營宫室宗廟為首古先哲王莫不致肅恭之誠心盡崇嚴乎祖考然後能流淳化於四海通幽感於神明固宜詳廢興於古典修情禮以求中者也禮天子七廟三昭三穆與太祖而七自考廟以至祖考五廟皆月祭之遠廟為祧有二祧享嘗乃止去祧為壇去壇為墠有禱然後祭之此宗廟之次親疏之序也鄭𤣥以為祧者文王武王之廟王肅以為五世六世之祖尋去祧之言則祧非文武之廟矣文武周之祖宗何云去祧為壇乎明遠廟為祧者無服之祖也又遠廟則有享甞之降去祧則有壇墠之殊明世遠者其義彌疏也若祧是文武之廟宜同月祭於太祖雖推后稷以配天由功徳之所始非尊崇之義每有差降也又禮有以多為貴者故傳稱徳厚者流光徳薄者流卑又言自上以下降殺以兩禮也此則尊卑等級之典上下殊異之文而云天子諸侯俱祭五廟何哉又王祭嫡殤下及來孫而上祀之禮不過髙祖推隆恩於下流替誠敬於尊廟亦非聖人制禮之意也是以泰始建廟從王氏議以禮父為士子為天子諸侯祭以天子諸侯其尸服以士服故上及征西以備六世之數宣皇雖為太祖尚在子孫之位至於殷祭之日未申東向之禮所謂子雖齊聖不先父食者矣今京兆以上旣遷太祖始得居正議者以昭穆未足欲屈太祖於卑坐臣以為非禮典之㫖也所謂與太祖而七自是昭穆旣足太廟在六世之外非為湏滿七廟乃得居太祖也議者又以四府君神主宜永同於殷祫臣又以為不然傳所謂毁廟之主陳乎太祖謂太祖以下先君之主也故白虎通云禘祫祭遷廟者以其繼君之體持其綂而不絶也豈如四府君在太祖之前非繼綂之主無靈命之瑞非王業之基昔以世近而及今則情禮已逺而當長饗殷祫永虛太祖之位求之禮籍未見其可昔永和之初大議斯禮于時虞喜范宣並以洪儒碩學咸謂四府君神主無縁永存於百世或欲瘞之兩階或欲藏之石室或欲為之改築雖所執小異而大歸是同若宣皇既居群廟之上而四主禘祫不已則大晉殷祭長無太祖之位矣夫理貴有中不必過厚禮與世遷豈可順而不斷故臣子之情雖篤而靈厲之諡彌彰追遠之懷雖切而遷毁之禮為用豈不有心於加厚顧禮制不可踰耳石室則藏於廟北改築則未知所䖏虞主所以依神神移則有瘞埋之禮四主若饗祀宜廢亦神之所不依也凖傍事例宜同虞主之瘞埋然經典難詳羣言錯繆非臣淺識所能折中時學者多從燾議竟未施行宋武帝受命拜太常雖外戚貴顯而彌自沖約茅屋蔬食不改其舊所得奉祿與親戚共之永初三年致事拜光祿大夫加金章紫綬卒少帝贈左光祿大夫長子邃宜都太守邃子凝之學渉有當世才與司空徐湛之為異常交年少時與傅僧祐俱以通家子始為文帝所引見時上與何尚之論鑄錢事凝之便干其語次上因回與語僧祐引凝之衣令止凝之大言曰明主難再遇便應政盡所懷上與徃復十餘反凝之辭韻詮序上甚賞焉後為尚書左丞以徐湛之黨為元凶所殺凝之子寅字士若事在沈攸之傅寅弟稜後軍參軍稜子嚴嚴字彦威幼有孝性居父憂以毁聞孤貧勤學行止書卷不離手從叔未甄為江夏郡攜嚴之官於途作屯游賦又作七筭辭並典麗性孤介未嘗造請梁㒒射徐勉欲識之嚴終不詣累遷湘東王宣惠輕車府參軍兼記室嚴於學多所諳記尤精漢書諷誦畧皆上口王嘗自執四部書目試之嚴自甲至丁卷中各對一事并作者姓名遂無遺失王遷荆州隨府轉西中郎安西錄事參軍歴義陽武寧郡守郡界蠻左前郡守常選武人以兵鎮之嚴獨以數門生單車入境郡蠻悦服後卒於鎮南諮議參軍文集十卷嚴族叔未甄燾曾孫也父潭左尸尚書未甄有才幹少為外兄汝南周顒所知仕梁為太尉長史丁所生母憂三年廬于墓側歴廷尉卿江夏太守卒子盾盾字宣卿幼從徴士琅邪諸葛璩受五經璩學徒常有數十百人盾䖏其間無所狎比璩曰此生王佐才也為尚書中兵郎羙風姿善容止每趣奏梁武帝甚悦焉入兼中書通事舍人盾有孝性嘗隨父宿直廷尉府母劉氏在宅夜暴亡盾左手中指忽痛不得寢及旦宅信果報凶問其感通如此服未終父卒居喪五年不出廬戸形骸枯悴家人不識武帝累敕抑譬後累遷御史中丞性公强甚稱職中大通五年帝幸同泰寺開講設四部大會衆數萬人南越所獻馴象忽於衆中狂逸衆皆駭散唯盾與散騎侍郎斐之禮嶷然自若帝甚嘉焉大同二年為中領軍領軍管天下兵要監局事多盾為人敏贍有風力長於撥繁職事甚理先是吳平侯蕭景居此職著聲至是盾復繼之後卒於領軍將軍諡曰忠盾弟厥字獻卿亦以幹局稱為晉安太守郡居山海常結聚逋逃前二千石討捕不能止厥下車宣化凶黨皆襁負而出自是居人復業然政嚴百姓謂之臧彪前後再兼中書通事舍人卒於兼司農卿厥前後居職所掌之局大事及蘭臺廷尉所不能决者悉以付厥辯斷精明咸得其理卒後有撾登聞鼓訴求付清直舍人帝曰臧厥既亡此事便無所付其見知如此子操尚書三公郎熹字義和燾之弟也與燾並好經學隆安初兵𧺫熹乃習騎射志立功名嘗與溧陽令阮崇獵遇猛獸突圍獵徒並散熹射之應弦而倒從宋武入京城進至建鄴桓𤣥走武帝便使熹入宫收圖書器物封府庫有金飾樂器武帝問熹卿欲此乎熹正色曰主上幽逼播越非所将軍首建大義劬勞王室雖復不肖實無情於樂帝笑曰聊以戲耳以建義功封始興縣五等侯參武帝車騎中軍軍事武帝将征廣固議者多不同熹贊成其行武帝遣朱齡石綂大衆伐蜀命熹竒兵出中水領建平巴東二郡太守蜀主譙縱遣大将譙撫之屯牛脾又遣譙小茍重兵塞打鼻熹至牛脾撫之敗走追斬之成都平熹遇疾卒於蜀追贈光祿勲子質字含文少好鷹犬善蒱博意錢之戲長六尺七寸出靣露口頽頂拳髪初為世子中軍參軍嘗詣䕶軍趙倫之倫之名位已重不相接質憤然起曰大丈夫各以老嫗作門户何至以此中相輕倫之慙謝質拂衣而去後為江夏王義恭撫軍參軍以輕薄無檢為文帝所嫌徙給事中會稽長公主每為之言乃出為建平太守甚得蠻楚心歴竟陵内史巴東建平三郡太守吏人便之質年始出三十屢居名郡渉獵文史尺牘便敏有氣幹好言兵文帝謂可大任以為徐兗二州刺史加都督在鎮奢凌爵命無章為有司所糺遇赦與范曄徐湛之等厚善曄謀反量質必與之同㑹事發復為義興太守二十七年遷南譙王義宣司空司馬南平内史未之職㑹魏太武帝圍汝南城主陳憲固守告急文帝遣質輕往壽陽與安蠻司馬劉康祖等救憲後太武率大衆數十萬刼彭城以質為輔國将軍北救始至盱眙太武已過淮二十八年正月太武自廣陵北返悉力攻盱眙就質求酒質封溲便與之太武怒甚築長圍一夜便合質報太武書云爾不聞童謡言邪虜馬飲江水狒狸死卯年冥期使然非復人事寡人受命相㓕期之白登師行未遠爾自送死豈容復令爾饗有桑乾哉假令寡人不能殺爾爾由我而死爾若有幸得為亂兵所殺爾若不幸則生相鎖縛載以一驢直送都市爾識智及衆豈能勝苻堅邪頃年展爾陸梁者是爾未飲江太歲未卯故耳時魏地童謡曰軺車北來如穿雉不意虜馬飲江水虜主北歸石濟死虜欲渡江天不徙故荅書引之太武大怒乃作鐵牀於上施鐵鑱破城得質當坐之此上質又與魏軍書冩臺格購斬太武封萬户侯賜布絹各萬疋魏以鉤車鉤垣樓城内繋絙數百人呌呼引之車不能退質夜以木桶盛人縣出城外截鉤獲之眀日又以衝車攻城土堅宻每頽落下不過數斗魏軍乃肉薄登城墜而復升莫有退者殺傷萬計死者與城平如此三旬死者過半太武乃觧圍而歸上嘉質功以為寧蠻校尉雍州刺史監四州諸軍事明年文帝又北侵使質率見力向潼闗質頓兵不肯時發又顧戀嬖妾棄軍營壘单馬還城散用臺庫見錢六七百萬為有司所紏上不問元凶弑立以質為丹陽尹質家遣門生師顗報質具言文帝崩問質使告司空義宣及孝武帝而自率衆五千馳下討逆自陽口進江陵見義宣時質諸子在都聞質舉義並逃亡義宣始得質報即日舉兵馳信報孝武板進質號征北将軍孝武即位加質車騎将軍開府儀同三司都督江州諸軍事使質自白下歩上薛安都程天祚等亦自南掖門入與質同會太極殿庭生禽元凶仍使質留守朝堂封始興郡公之鎮舫千餘乗部伍前後百餘里六平乘並施龍子幡時孝武自攬威權而質以少主遇之刑政慶賞不復諮禀朝廷自謂人才足為一世英傑始聞國祸便有異圖以義宣凢闇易制欲外相推奉以成其志及至江陵便致拜稱名質於義宣雖為兄弟而年近大十歳義宣驚曰君何意拜弟質曰事中宜然時義宣已推崇孝武故其計不行毎慮事泄及至新亭又拜江夏王義恭義恭愕然問質所以質曰天下屯危禮異常日前在荆州亦拜司空會義宣有憾於孝武質因此宻信説誘陳朝廷得失又謂震主之威不可持久質女為義宣子採妻謂質無復異同納其説且義宣腹心將佐蔡超竺超人等咸有富貴情願又勸義宣義宣時未受丞相質子敦為黄門侍郎奉詔敦勸道經尋陽質令敦具更譬説義宣義宣意乃定馳報豫州刺史魯爽期孝建元年秋同舉爽失㫖即起兵遣人至都報弟瑜席卷奔叛瑜弟𢎞為質府佐孝武馳使報質誅𢎞於是執臺使狼狽舉兵馳報義宣孝武遣撫軍将軍栁元景綂豫州刺史王𤣥謨等屯梁山洲兩岸築偃月壘水陸待之元景檄書宣告而義宣亦相次係至江夏王義恭書曰昔桓𤣥借兵於仲堪有似今日義宣由此與質相疑質進計曰今以萬人取南州則梁山中絶萬人綴𤣥謨必不敢輕動質浮舟外江直向石頭此上畧也義宣將從之義宣客顔樂之説義宣曰質若復拔東城則大功盡歸之矣宜遣麾下自行義宣遣腹心劉諶之就質陳軍城南𤣥謨留羸弱守城悉精兵出戰薛安都騎軍前出垣䕶之督諸將繼之乃大潰質求義宣欲計事宻已走矣質不知所為亦走至尋陽焚府舍載妓妾入南湖摘蓮噉之追兵至以荷覆頭沉於水出鼻軍士鄭俱兒望見射之中心兵刃亂至腹胃纒縈水草隊主裘應斬質傳首建鄴錄尚書江夏王義恭等奏依漢王莾事漆其頭藏於武庫詔可論曰趙倫之蕭思話俱以外戚之親並接風雲之會言親則在趙為宻論望則於蕭為重古人云人能𢎞道蓋此之謂乎惠開親禮雖篤弟隙尤著方寸之内孝友異情嶮於山川有驗於此臧氏文義之美傳于累代含文以致誅滅好亂之所致乎南史卷十八南史卷十八考證蕭恵開傳今以蕭恵開為憲司冀當稱職但一徃眼額已自殊有所震眼宋書作服蕭恵明傳郡界有卞山山下有項羽廟本卷中凡三見項羽事此其一也顧炎武謂恵明因發背旬日而卒與齊書李安民為吴興太守不祀神以牛而牛死安民尋卒畧相類蕭恵基弟恵休傳吴興郡項羽神舊酷烈又一項羽神事顧炎武謂下文云恵休事神謹故得美遷畧與本書蕭猷為吴興郡守所禱必從相類蕭琛傳負其才氣侯儉宴于樂游樂游下梁書有苑字後為吴興太守郡有項羽廟又一項羽神事頋炎武謂下文遷之于廟禁祀以牛畧與宋書孔季恭居聴事竟無害相類臧燾傳武帝鎮京口叅帝軍中軍事參帝監本誤參軍今从閣本臧盾傳美風姿善容止毎趣奏梁武帝甚悦焉趣一本作趨南史卷十八考證
