body:
  text: 南史卷三十一唐李延夀撰列傳第二十一張裕子永瓌岱瓌岱兄子緒弟緒子完弟充永子子率率盾瓌稷稷子嵊永從孫種張裕字茂度吴郡吴人也名與宋武帝諱同故以字稱曽祖澄晉光禄大夫祖彭祖廣州刺史父敞侍御史度支尚書吴國内史茂度仕為宋武帝太尉主簿揚州中從事累遷别駕武帝西伐劉毅北伐闗洛皆居守留任州事出為都督廣州刺史平越中郎將綏静百越嶺外安之元嘉元年為侍中都督益州刺史帝討荆州刺史謝晦詔益州遣軍襲江陵晦平西軍始至白帝茂度與晦素善議者疑其出軍遅留弟邵時為湘州刺史起兵應大駕上以邵誠節故不加罪累遷太常以脚疾出為義興太守上從容謂曰勿以西蜀介懐對曰臣不遭陛下之明墓本拱矣後為都官尚書以疾就拜光禄大夫加金章紫綬茂度内足扵財自絶人事經始本縣之華山為居止優㳺野澤如此者七年十八年除㑹稽太守素有吏能職事甚理卒扵官諡曰恭子子演位太子中舍人演四弟鏡永辯岱俱知名時謂之張氏五龍鏡少與光禄大夫顔延之鄰居顔談義飲酒喧呼不絶而鏡静黙無言聲後鏡與客談延之從籬邉聞之取胡牀坐聼辭義清𤣥延之心服謂客曰彼有人焉由是不復酣呌仕至新安太守演鏡兄弟中名最髙餘並不及初裕曽祖澄當葬父郭璞為占墓地曰葬某處年過百嵗位至三司而子孫不蕃某處年㡬減半位裁卿校而累世貴顯澄乃葬其劣處位光禄年六十四而亡其子孫遂昌云永字景雲初為郡主簿累遷尚書中兵郎先是尚書中條制繁雜元嘉十八年欲加脩撰徙永為刪定郎掌其任二十二年除建康令所居皆有稱績又除廣陵王誕北中郎録事參軍永渉獵書史能為文章善隷書騎射雜藝觸類兼善又有巧思益為文帝所知紙墨皆自營造上每得永表啟輒執玩咨嗟自嘆供御者了不及也二十三年造華林園𤣥武湖並使永監統凡所制置皆受則扵永永既有才能每盡心力文帝謂堪為將二十九年以永為揚威將軍冀州刺史加都督王𤣥謨申坦等諸將經畧河南進攻碻磝累旬不拔為魏軍所殺甚衆永即夜撤圍退軍不報告諸將衆軍驚擾為魏所乗死敗塗地永及申坦並為統府撫軍將軍蕭思話所收繫扵歴城獄文帝以屢征無功諸將不可任詔責永等與思話又與江夏王義恭書曰早知諸將軰如此恨不以白刃驅之今者悔何所及三十年元凶弑立起永為青州刺史及司空南譙王義宣起義又改永為冀州刺史加都督永遣司馬崔勲之中兵參軍劉宣則二軍馳赴國難時蕭思話在彭城義宣慮二人不相諧緝與思話書勸與永坦懐又使永從兄長史張暢與永書朂之使逺慕亷藺在公之徳近効平勃亡私之美事平召為江夏王義恭大司馬從事中郎領中兵孝武孝建元年臧質反遣永輔武昌王渾鎮京口大眀三年累遷廷尉上謂曰卿既與釋之同姓欲使天下復無寃人永曉音律太極殿前鐘聲嘶孝武嘗以問永永答鐘有銅滓乃扣鐘求其處鑿而去之聲遂清越明帝即位為青冀二州刺史監四州諸軍事統諸將討徐州刺史薛安都累戰剋㨗破薛索皃又遷鎮軍將軍尋為南兖州刺史加都督時薛安都據彭城請降而誠心不欵明帝遣永與沈攸之重兵迎之加督前鋒諸軍事進軍彭城安都招引魏兵既至永狼狽引軍還為魏軍追大敗復遇寒雪士卒離散永脚指㫁落僅以身免失其第四子三年徙㑹稽太守加都督將軍如故以北行失律固求自貶降號左將軍永痛悼所失之子有兼常哀服制雖除猶立靈坐飲食衣服待之加生毎出行常别具名車好馬號曰侍從有軍事輒語左右報郎君知也以破薛索皃功封孝昌縣侯在㑹稽賔客有謝方童阮湏何逹之等竊其權贓貨盈積方童等坐下獄死永又降號冠軍將軍廢帝即位為右光禄大夫侍中領安成王師出為吴郡太守元徽二年為征北將軍南兖州刺史加都督永少便驅馳志在宣力其為將帥能與士卒同甘苦朝廷所給賜脯餼必棊坐齊割手自頒賜年雖已老志氣未衰優㳺閑任意甚不樂及有此授喜悦非常即日命駕還都未之鎮遇桂陽王休範作亂永率所領屯白下休範至新亭前鋒攻南掖門永遣人覘賊既反唱言臺城䧟永衆潰棄軍還以舊臣不加罪止免官削爵以愧發病卒岱字景山州辟從事累遷東遷令時殷沖為吴興太守謂人曰張東遷親貧湏養所以棲遅下邑然名器方顯終當大至後為司徒左西曹掾母年八十籍注未滿岱便去官從實還養有司以岱違制將欲糾舉宋孝武曰觀過可以知仁不湏案也累遷山隂令職事閑理巴陵王休若為北徐州未親政事以岱為冠軍諮議參軍領彭城太守行府州國事後臨海王為征虜將軍廣州豫章王為車騎揚州晉安王為征虜南兖州岱歴為三府諮議三王行事與典籖主帥共事事舉而情得或謂岱曰主王既幼執事多門而毎能緝和公私云何致此岱曰古人言一心可以事百君我為政端平待物以禮悔吝之事無由而及明闇短長更是才用多少耳入為黄門郎新安王子鸞以盛寵為南徐州割吴郡屬焉髙選佐史孝武召岱謂曰卿美効夙著兼資宦已多今欲用卿為子鸞别駕總刺史之任無謂小屈終當大申也帝崩累遷吏部郎㤗始末為吴興太守元徽中為益州刺史加都督數年益土安其政累遷吏部尚書王儉為吏部郎時専㫁曹事岱毎相違執及儉為宰相以此頗不相善兄子瓌弟恕誅吴郡太守劉遐齊髙帝欲以恕為晉陵郡岱曰恕未閑從政美錦不宜濫裁髙帝曰恕為人我所悉其又與瓌同勲自應有賞岱曰若以家貧賜禄此所不論語功推事臣門之恥加散騎常侍建元元年中詔序朝臣欲以右僕射擬岱禇彦回謂得此過優若别有忠誠特宜升引者别是一理詔更量出為吴郡太守髙帝知岱歴任清直至郡未㡬手敕曰大郡任重乃未欲回換但總戎務殷宜湏望實今用卿為䕶軍加給事中岱拜竟詔以家為府武帝即位復為吴興太守岱晚節在吴興更以寛恕著名遷南兖州刺史未拜卒岱初作遺命分張家財封置箱中家業張減随復改易如此十數年諡曰貞子緒字思曼岱兄子也父演宋太子中舍人緒少知名清簡寡欲從伯敷及叔父鏡從叔暢並貴異之鏡比之樂廣敷云是我軰人暢言扵孝武帝用為尚書倉部郎都令史諮詳郡縣米事緒蕭然直視不以經懐宋明帝毎見緒輒歎其清淡轉太子中庶子本州大中正遷司徒左長史吏部尚書袁粲言扵帝曰臣觀張緒有正始遺風宜為宫職復轉中庶子後為侍中遷吏部郎參掌大選元徽初東宫官罷選曹擬舍人王儉為格外記室緒以儉人地兼美宜轉祕書丞從之緒又遷侍中嘗私謂客曰一生不觧作諾有以告袁粲褚彦回者由是出為吴郡太守緒初不知也昇明二年自祠部尚書為齊髙帝太傅長史建元元年為中書令緒善談𤣥深見敬異僕射王儉嘗云緒過江所未有北士可求之耳不知陳仲弓黄叔度能過之不駕幸荘嚴寺聼僧逹道人講維摩坐逺不聞緒言上難移緒乃遷僧逹以近之時帝欲用緒為右僕射以問王儉儉曰緒少有清望誠美選也南士由来少居此職褚彦回曰儉少年或未憶耳江左用陸玩顧和皆南人也儉曰晉氏衰政不可為則先是緒諸子皆輕俠中子充少時又不䕶細行儉又以為言乃止及立國學以緒為太常卿領國子祭酒以王延之代緒為中書令何㸃歎曰晉以子敬季琰為此職今以王延之張緒為之可謂清官後接之者實為未易緒長扵周易言精理奥見宗一時常云何平叔不觧易中七事武帝即位轉吏部尚書祭酒如故永明二年領南郡王師加給事中三年轉太子詹事師給事如故緒毎朝見武帝目送之謂王儉曰緒以位尊我我以徳貴緒遷散騎常侍金紫光禄大夫師如故給親信二十人復領中正長沙王晃屬選用吴郡聞人邕為州議曹緒以資籍不當執不許晃遺書扵緒固請之緒正色謂晃信曰此是身家州鄉殿下何得見逼乃止緒吐納風流聼者皆忘飢疲見者肅然如在宗廟雖終日與居莫能測焉劉悛之為益州獻蜀柳數株枝條甚長状若絲縷時舊宫芳林苑始成武帝以植扵太昌靈和殿前常賞玩咨嗟曰此楊柳風流可愛似張緒當年時其見賞愛如此王儉為尚書令丹陽尹時諸令史来問訊有一令史善俯仰進止可觀儉賞異之問曰經與誰共事荅云十餘嵗在張令門下儉目送之時尹丞殷存至在坐曰是康成門人也七年竟陵王子良領國子祭酒武帝敕王晏曰吾欲令司徒辭祭酒以授張緒物議以為如何子良竟不拜以緒領國子祭酒緒口不言利有財輒散之清談端坐或竟日無食門生見緒飢為之辦飱然未嘗求也死之日無宅以殯遺命凶事不設柳翣上以蘆葭轜車引柩靈上置盃水香火不設祭從弟融敬緒事之如親兄齎酒扵緒靈前酌酒慟哭曰阿兄風流頓盡追贈散騎常侍特進光禄大夫諡簡子子完宋後廢帝時為正員郎險行見寵坐廢錮完弟允永明中安西功曹淫通殺人伏法允兄充知名充字延符少好逸逰緒嘗告歸至吴始入西郭逢充獵右臂鷹左牽狗遇緒船至便放紲脱鞲拜扵水次緒曰一身兩役無乃勞乎充跪曰充聞三十而立今充二十九矣請至来嵗緒曰過而能改顔氏子有焉及眀年便脩改多所該通尤明老易能清言與從叔稷俱有令譽歴尚書殿中郎武陵王友時尚書令王儉當朝用事齊武帝皆取决焉儉方聚親賔充縠巾葛帔至便求酒言論放逸一坐盡傾及聞武帝欲以緒為尚書僕射儉執不可充以為愠與儉書曰頃日路長霖霞韜晦涼暑未平想無虧攝充幸以漁釣之閑鎌採之暇時復引軸以自娱逍遥乎前史從横萬古動黙之路多端紛綸百年升降之塗不一故金剛水柔性之别也圓行方止器之異也善御性者不違金水之質善為器者不易方圓之用充生平少偶不以利欲干懐三十六年差得以棲貧自澹介然之志峭聳霜崖確乎之情峯横海岸至如彯纓天閣既謝廊廟之華綴組雲臺終愧衣冠之秀寔由氣岸踈凝情塗狷隔獨師懐抱不見許扵俗人孤秀神崖毎邅回扵在世長羣魚鳥畢景松阿雖復玉沒扵訪珪之辰桂掩扵搜芳之日汎濫扵漁父之逰偃息扵卜居之㑹如此而已充何識哉若夫驚巖罩日吐海逢天竦石崩尋分危落仞桂蘭綺靡叢雜扵山幽松栢隂森相繚扵澗側元卿扵是乎不歸伯休亦以兹長往至扵飛竿釣渚濯足滄洲獨浪煙霞髙卧風月悠悠琴酒岫逺誰来灼灼文言空擬方寸不覺鬱然千里路隔江川毎至西風何嘗不歎丈人嵗路未强學優而仕道佐蒼生功横海望可謂徳盛當時孤松獨秀者也而茂陵之彦望冠盖而長懐渭川之甿佇簮裾而竦歎得無惜乎充崑西百姓岱表一人蠶而衣耕而食不能事王侯覓知己造時人騁游説容與扵屠博之間其懽甚矣然舉世皆謂充為狂充亦何能與諸君道之哉是以披聞見掃心胷述平生論語黙所可通夢交䰟推襟送抱者唯丈人而已闕廷敻阻書罷莫因儻遇樵夫妄塵執事儉以為脱畧弗之重仍以書示緒緒杖之一百又為御史中丞到撝所奏免官禁錮沈約見其書歎曰充始為之敗終為之成久之為司徒諮議參軍與琅邪王思逺同郡陸恵曉等並為司徒竟陵王賔客累遷義興太守為政清浄吏人便之後為侍中梁武帝兵至建鄴東昏逢殺百官集西鍾下召充充不至武帝霸府建以充為大司馬諮議參軍天監初歴太常卿吏部尚書居選以平允稱再遷散騎常侍國子祭酒登堂講説皇太子以下皆至時王侯多在學執經以拜充朝服而立不敢當再遷尚書僕射頃之出為吴郡太守下車恤貧老故舊莫不忻悦卒扵吴郡諡曰穆子子最嗣瓌字祖逸宋征北將軍南兖州刺史永之子也仕宋累遷桂陽内史不欲前兄瑋處禄自免不拜後為司徒右長史通直散騎常侍驍騎將軍初瓌父永拒桂陽王休範扵白下敗績阮佃夫等欲加罪齊髙帝固申明之瓌由此感恩自結後遭父母喪還吴持服昇明元年劉彦節有異圖弟遐為吴郡潜相影響髙帝宻遣殿中將軍卞白龍令瓌取遐諸張世有豪氣瓌宅中常有父時舊部曲數百遐召瓌委以軍事瓌偽受命與叔恕領兵十八人入郡斬之郡内莫敢動事㨗髙帝以告左軍張沖沖曰瓌以百口一擲出手得盧矣即授吴郡太守錫以嘉名封義城縣侯從弟融聞之與瓌書曰吴郡何晚何湏王反聞之嗟驚乃是阿兄郡人顧暠陸閑並少年未知名瓌並引為綱紀後並立名世以為知人齊建元元年改封平都侯遷侍中與侍中沈文季俱在門下髙帝嘗謂曰卿雖我臣我親卿不異賾嶷等文季毎遷直器物若遷瓌止朝服而已時集書毎兼門下東省實多清貧有不識瓌者常呼為散騎出為吴興太守瓌以既有國秩不取郡奉髙帝敕上庫别藏其奉以表其清武帝即位為寜蠻校尉雍州刺史加都督徴拜左戸尚書加右軍將軍還後安陸王􅒺臨雍州行部登蔓山有野老来乞􅒺問何不事産而行乞邪荅曰張使君臨州理物百姓家得相保後人政嚴故至行乞􅒺由是深加嗟賞後拜太常自謂閑職輒歸家武帝曰卿軰未富貴謂人不與既富貴那復欲委去瓌曰陛下御臣等若養馬無事就閑廐有事復牽来帝猶怒遂以為散騎常侍光禄大夫鬱林之廢朝臣到宫門參承明帝瓌託脚疾不至海陵立明帝疑外藩起兵以瓌鎮石頭督衆軍事瓌見朝廷多難遂恒卧疾建武末屢啟求還吴見許居室豪富伎妾盈房或有譏其衰暮畜伎瓌曰我少好音律老而方觧平生嗜欲無復一存唯未能遣此耳明帝疾甚防疑大司馬王敬則授瓌平東將軍吴郡太守以為之備及敬則反瓌遣兵迎拒扵松江聞敬則軍鼓聲一時散走瓌棄郡迯人間事平乃還郡為有司奏免官削爵永元初為光禄大夫三年梁武帝起兵東昏假瓌節戍石頭尋棄城還宫梁天監元年拜給事中右光禄大夫以脚疾拜扵家四年卒瓌有子十二人常云中應有好者子率知名率字士簡性寛雅十二能屬文常日限為詩一篇或數日不作則追補之稍進作賦頌至年十六向作二千餘首有虞訥者見而詆之率乃一旦焚毁更為詩示焉託云沈約訥便句句嗟稱無字不善率曰此吾作也訥慙而退時陸少𤣥家有父澄書萬餘卷率與少𤣥善遂通書籍盡讀其書建武三年舉秀才除太子舍人與同郡陸倕陸厥幼相友狎嘗同載詣左衛將軍沈約遇任昉在焉約謂昉曰此二子後進才秀皆南金也卿可識之由此與昉友梁天監中為司徒謝朏掾直文徳待詔省敕使抄乙部書又使撰古婦人事使工書人琅邪王琛吴郡范懐約等寫給後宫率取假東歸論者謂為慠世率懼乃為待詔賦奏之甚見稱賞手敕荅曰相如工而不敏枚臯速而不工卿可謂兼二子扵金馬矣又侍宴賦詩武帝别賜率詩曰東南有才子故能服官政余雖慙古昔得人今為盛率奏詩往反六首後引見扵玉衡殿謂曰卿東南物望朕宿昔所聞卿言宰相是何人不從天下不由地出卿名家竒才若復以禮律為意便是其人祕書丞天下清官東南望胄未有為之者今以相處為卿定名譽尋以為祕書丞掌集書詔䇿四年禊飲華光殿其日河南國獻赤龍駒能拜伏善舞詔率與到溉周興嗣為賦武帝以率及興嗣為工其年父憂去職有父時妓數十人其善謳者有色貌邑子儀曹郎顧珖之求娉謳者不願遂出家為尼嘗因齋㑹率宅珖之乃飛書言與率姦南司以事奏聞武帝惜其才寢其奏然猶致時論服闋久之不仕七年除中權建安王中記室參軍俄直夀光省脩丙丁部書抄累遷晉安王宣恵諮議參軍率在府十年恩禮甚篤後為揚州别駕率雖歴居職務未嘗留心簿領及為别駕奏事武帝覽牒問之並無對但荅云事在牒中帝不悦後歴黄門侍郎出為新安太守丁所生母憂卒率嗜酒不事扵家務尤忘懐在新安遣家僮載米三千石還宅及至遂耗太半率問其故荅曰雀鼠耗率笑而言曰壯哉雀䑕竟不研問自少屬文七畧及藝文志所載詩賦今無其文者並補作之所著文衡十五卷文集四十卷行扵世子長公率弟盾盾字士宣以謹重稱為無錫令遇劫問劫何湏劫以刀斫其頰眉目咄咄不易餘無所言扵是生資皆盡不以介懐為湘東王記室出監富陽令廓然獨處無所用心身死之日家無遺財唯有文集并書千餘卷酒米數甕而已稷字公喬瓌弟也幼有孝性所生母劉無寵遘疾時稷年十一侍養衣不觧帶每劇則累夜不寢及終毁瘠過人杖而後起見年軰幼童輒哽咽泣淚州里謂之淳孝長兄瑋善彈筝稷以劉氏先執此伎聞瑋為清調便悲感頓絶遂終身不聼之性疎率朗悟有才畧起家著作佐郎不拜父永及嫡母丘相繼殂六年廬于墓側齊永明中為豫章王嶷主簿與彭城劉繪俱見禮接未嘗被呼名毎呼為劉四張五以貧求為剡令畧不視事多為小山遊㑹山賊唐㝢之作亂稷率厲部人保全縣境所生母劉先假葬瑯邪黄山建武中改申葬禮賻助委積扵時雖不拒絶事畢随以還之自幼及長數十年中常設劉氏神坐出告反面如事生焉歴給事中黄門侍郎新興永寜二郡太守郡犯私諱改永寜為長寜永元末為侍中宿衞宫城梁武師至兼衞尉江淹出奔稷兼衞尉卿副王瑩都督城内諸軍事時東昏淫虐北徐州刺史王珍國就稷謀乃使直閣張齊行弑于含徳殿稷乃召右僕射王亮等列坐殿前西鍾下議遣國子博士范雲中書舍人裴長穆等使石頭城詣武帝以稷為侍中左衞將軍遷大司馬左司馬梁朝建為散騎常侍中書令及上即位封江安縣子位領軍將軍武帝常扵樂夀殿内宴稷醉後言多怨辭形扵色帝時亦酣謂曰卿兄殺郡守弟殺其君袖提帝首衣染天血如卿兄弟有何名稱稷曰臣乃無名稱至扵陛下不得言無勲東昏暴虐義師亦来伐之豈在臣而已帝捋其鬚曰張公可畏人中丞陸杲彈稷云領軍張稷門無忠貞官必險逹殺君害主業以為常武帝留中竟不問累遷尚書左僕射帝將幸稷宅以盛暑留幸僕射省舊臨幸供具皆酬太官饌直帝以稷清貧手詔不受宋時武帝經造張永至稷三世並降萬乗論者榮之稷雖居朝右毎慙口實乃名其子伊字懐尹霍字希光畯字農人同字不見見字不同以旌其志既懼且恨乃求出許之出為青冀二州刺史不得志常閉閣讀佛經禁防寛弛僚吏頗致侵擾州人徐道角等夜襲州城乃害之有司奏削爵土稷性明烈善與人交歴官無畜聚奉禄皆頒之親故家無餘財為吴興太守下車存問遺老引其子孫置之右職政稱寛恕初去郡就僕射徴道由吴鄉人候稷者滿水陸稷單装徑還都下人莫之識其率素如此稷長女楚媛適㑹稽孔氏無子歸宗至逢稷見害女以身蔽刃先父卒稷與族兄充融卷俱知名時目云充融卷稷為四張卷字令逺少以和理著稱能清言位都官尚書天監初卒稷子嵊嵊字四山稷初為剡令至嵊亭生之因名嵊字四山少敦孝行年三十餘猶班衣受稷杖動至數百收淚歡然方雅有志操能清言感家禍終身蔬食布衣手不執刀刃不聼音樂弟淮言氣不倫嵊垂泣訓誘起家祕書郎累遷鎮南湘東王長史尋陽太守王暇日𤣥言因為之筮得節卦謂嵊曰卿後當東入為郡恐不得終其天年嵊曰貴得其所耳時伏挺在坐曰君王可畏人也還為太府卿吴興太守侯景圍建鄴遣弟伊率郡兵赴援城䧟御史中丞沈浚違難東歸嵊往見之謂曰賊臣憑陵人臣効命之日今欲收集兵刃保據貴鄉雖復萬死誠亦無恨浚固勸嵊舉義時邵陵王綸東奔至錢唐聞之遣前舍人陸丘公板授嵊征東將軍嵊曰天子蒙塵今日何情復受榮號留板而已賊行臺劉神茂攻破義興遣使説嵊嵊斬其使仍遣軍破神茂侯景乃遣其中軍侯子鑒助神茂撃嵊嵊軍敗乃釋戎服坐扵聼事賊臨以刃終不屈執以送景景將舍之嵊曰死為幸乃殺之子弟遇害者十餘人景欲存其一子嵊曰吾一門已在鬼録不就爾處求恩扵是皆死賊平元帝追贈侍中中衞將軍開府儀同三司諡忠貞子嵊弟睪知名種字士苖永從孫也祖辯宋大司農廣州刺史父畧太子中庶子臨海太守種少恬静居處雅正傍無造請時人語曰宋稱敷演梁則卷充清虚學尚種有其風仕梁為中軍宣城王府主簿時已四十餘家貧求為始豐令及武陵王紀為益州刺史重選府僚以種為左西曹掾種辭以母老為有司奏坐黜免侯景之亂奉母東奔鄉里母卒種時年五十而毁瘠過甚又廹以凶荒未葬服雖畢居家飲食恒若在喪景平初司徒王僧辯以状奏起為中從事并為具葬禮葬訖種方即吉僧辯又以種年老無子賜以妾及居處之具陳武帝受禪為太常卿歴位左戸尚書侍中中書令金紫光禄大夫種沉深虛静識量宏博時以為宰相之器僕射徐陵嘗抗表譲位於種以為宜居左執其為時所推如此卒贈特進諡元子種仁恕寡欲雖歴顯位家産屢空終日晏然不以為病太建初女為始興王妃以居處僻陋特賜宅一區又累賜無錫嘉興縣秩嘗扵無錫見重囚在獄天寒呼囚暴日遂失之帝大笑而不深責有集十四卷種弟稜亦清静有識度位司徒左長史贈光禄大夫論曰張裕有宋之初早參霸政出内所歴莫非清顯諸子並荷崇搆克舉家聲其美譽所歸豈徒然也思曼立身簡素殆人望乎夫濯纓從事理存無二取信一主義絶百心以永元之末人憂塗炭公喬重圍之内首創大謀而旋見猜嫌又況異扵斯也然則士之行己可無深議四山赴蹈之方可謂矯其違矣南史卷三十一南史卷三十一考證張岱傳随復改易如此十數年復監本訛後今改从齊書張充傳充生平少偶不以利欲干懐三十六年差得以棲貧自澹少字下一本有長字盖以生平少長為句而偶字連下與下差字對也張嵊傳嵊曰死為幸乃殺之一本死字上有速字張種傳其為時所推如此一本無時字誤種弟稜亦清静有識度監本脱種弟二字今増正史臣論取信一主義絶百心絶監本訛終今从閣本南史卷三十一考證
