body:
  text: 南史卷四十三唐李延夀撰列傳第三十三齊髙帝諸子下臨川獻王映字宣光髙帝第三子也少而警悟羙言笑善容止仕宋位給事黄門侍郎南兖州刺史留心吏事自下莫不肅然令行禁止髙帝踐阼為雍州刺史加都督封臨川王甞致錢還都買物有獻訃者於江陵買貨至都還換可得微有所増映笑曰我是賈客邪乃復求利改授都督揚州刺史莅事聰敏府州曹局皆重足以奉禁令自宋彭城王義康以後未之有也永明元年為侍中驃騎將軍五年即本號開府儀同三司七年薨映善騎射解聲律工左右書左右射應接賓客風韻韶靡及薨朝野莫不惋惜贈司空九子皆封侯長子子晉永元初為侍中入梁為髙平太守第二子子游州陵侯為黄門侍郎謀反兄弟並伏誅長沙威王晃字宣明髙帝第四子也少有武力為髙帝所愛昇明二年代兄映為淮南宣城二郡太守晃便弓馬初沈攸之事起晃多從武容赫奕都街時人為之語曰煥煥蕭四繖其年遷西中郎將豫州刺史監三州諸軍事髙帝踐阼晃每陳政事輒為典籖所裁晃殺之上大怒手詔賜杖遷南徐州刺史加都督武帝為皇太子拜武進陵於曲阿後湖鬬隊使晃御馬軍上聞之乂不悦臨崩以晃屬武帝處以輦轂近藩勿令逺出永明元年以晃為都督南徐州刺史入為中書監時禁諸王蓄仗在都下者唯置捉刀左右四十人晃愛武􅎖罷徐州還私載數百人仗還都為禁司所覺投之江中帝聞之大怒將糾以法豫章王嶷稽首流涕曰晃罪誠不足宥陛下當憶先朝念白象白象晃小字也上亦垂泣髙帝大漸時戒武帝曰宋氏若骨肉不相圖佗族豈得乘其弊汝深戒之故武帝終無異意然晃亦不見親寵當時論者以武帝優於魏文減於漢明後拜車騎將軍侍中薨贈開府儀同三司武帝常幸鍾山晃從駕以馬矟刺道邊枯蘖上令左右數人引之銀纒皆卷聚而矟不出乃令晃復馳馬㧞之應手便去每逺州獻駿馬上輒令晃於華林中調試之髙帝常曰此我家任城也武帝緣此意故諡曰威武陵昭王曄字宣昭髙帝第五子也母羅氏從髙帝在淮隂以罪誅曄年四嵗思慕不異成人每慟吐血髙帝敕武帝曰三昧至性如此恐不濟汝可與共住每抑割之三昧曄小字也故曄見愛髙帝雖為方伯而居處甚貧諸子學書無紙筆曄常以指畫空中及畫掌學字遂工篆法少時又無棊局乃破荻為片縱横以為棊局指㸃行勢遂至名品性剛穎儁出與諸王共作短句詩學謝靈運體以呈髙帝帝報曰見汝二十字諸兒作中最為優者但康樂放蕩作體不辯有首尾安仁士衡深可宗尚顔延之抑其次也建元二年為會稽太守加都督上遣儒士劉瓛徃郡為曄講五經武帝即位歴中書令祠部尚書巫覡或言曄有非常之相以此自負武帝聞之故無寵未甞處方岳於御坐曲宴醉伏地貂抄肉柈帝笑曰汙貂對曰陛下愛其羽毛而疎其骨肉帝不悦性輕財重義有古人風罷會稽還都齋中錢不滿萬俸祿所入皆與參佐賔僚共之常曰兄作天子何畏弟無錢居止附身所須而已名後堂山為首陽蓋怨貧薄也甞於武帝前與竟陵王子良闈棊子良大北及退豫章文獻王謂曄曰汝與司徒手談故當小相推讓答曰曄立身以來未甞一口妄語執心疎婞偏不知悔好文章射為當時獨絶琅琊王瞻亦稱善射而不及曄也武帝幸豫章王嶷東田宴諸長王獨不召曄嶷曰風景殊羙今日甚憶武陵上仍呼使射屢發命中顧四坐曰手何如上神色甚怪嶷曰阿五常日不爾今可謂仰藉天威帝意乃釋後於華林射賭凡六箭五破一皮賜錢五萬文又上舉酒勸曄曰陛下常不以此處許臣上回面不答豫章王於邸起土山列種桐竹號為桐山武帝幸之置酒為樂顧臨川王映王邸亦有嘉名否映曰臣好栖静因以為稱又問曄曄曰臣山卑不曾栖靈昭景唯有薇蕨直號首陽山帝曰此直勞者之歌也久之出為江州刺史上以曄方出鎮求其宅給諸皇子遣舍人喻㫖曄曰先帝賜臣此宅使臣歌哭有所陛下欲以州易宅臣請不以宅易州帝恨之至鎮百餘日典籖趙渥之啓曄得失徵還為左戸尚書遷太常卿累不得志冬節問訊諸王皆出曄獨後來上已還便殿聞曄至引見問之曄稱牛羸不能取路上敕車府給副御牛一頭敕主客自今諸王來不隨例者不復為通公事還過竟陵王子良宅冬月道逢乞人脱襦與之子良見曄衣單進襦於曄曄曰我與向人亦復何異尚書令王儉詣曄曄留儉設食盤中菘菜䱒魚而已儉重其率真為飽食盡歡而去尋為丹陽尹始不復置行事自得親政轉侍中護軍將軍給油絡車又給扶二人武帝臨崩遺詔為衛將軍開府儀同三司大行在殯竟陵王子良在殿内太孫未至衆論喧疑曄衆中言曰若立長則應在我立嫡則應立太孫及鬱林立甚見馮賴隆昌元年薨贈司空班劒二十人安成恭王暠字宣曜髙帝第六子也性清和多疾厯位南中郎將江州刺史侍中領歩兵校尉中書令永明元年為散騎常侍祕書監領石頭戍事及夏薨鄱陽王鏘字宣韶髙帝第七子也建元末武帝即位為雍州刺史加都督武帝服除鏘方還始入覲拜便流涕武帝愕然問其故鏘收淚曰臣違奉彌年今奉顔色聖顔損瘦所以泣耳武帝歎曰我復是有此一弟累遷丹陽尹永明十年為領軍將軍鏘和悌羙令性謙慎好文章有寵於武帝領軍之授齊室諸王所未為鏘在官理事無壅當時稱之車駕游幸常甲仗衛從恩待次豫章王嶷其年給油絡車隆昌元年轉尚書左僕射遷侍中驃騎將軍開府儀同三司領兵置佐鏘雍容得物情為鬱林依信鬱林心疑明帝諸王問訊獨留鏘謂曰聞鸞於法身何如鏘曰臣鸞於宗戚最長且受寄先帝臣等年皆尚少朝廷之幹唯鸞一人願陛下無以為慮鬱林退謂徐龍駒曰我欲與公共計取鸞公既不同我不能獨辦且復小聼及鬱林廢鏘竟不知延興元年進位司徒侍中如故明帝鎮東府權威稍異鏘每徃明帝屣履至車迎鏘語及家國言淚俱下鏘以此推信之而宮臺内皆屬意於鏘勸令入宫發兵輔政制局監謝粲説鏘及隨王子隆曰殿下但乘油壁車入宫出天子置朝堂二王夾輔號令粲等閉城門上仗誰敢不同宣城公政當投井求活豈有一歩動哉東城人政共縛送耳子隆欲定計鏘以上臺兵力既悉度東府且慮難捷意甚猶豫馬隊主劉巨武帝時舊人詣鏘請間叩頭勸鏘立事鏘命駕將入復回還内與母陸太妃别日暮不成行典籖知謀告之數日明帝遣二千人圍鏘宅害鏘謝粲等皆見殺凡諸王被害皆以夜遣兵圍宅或斧斫關排牆呌噪而入家財皆見封籍焉桂陽王鑠字宣朗髙帝第八子也永明七年為中書令加散騎常侍時鄱陽王鏘好文章鑠好名理人稱為鄱桂鑠清羸有冷疾常枕卧武帝臨視賜牀帳衾褥性理偏詖遇其賞興則詩酒連日情有所廢則兄弟不通隆昌元年加前將軍給油絡車并給扶二人鄱陽王見害鑠遷中軍將軍開府儀同三司不自安至東府見明帝及出處分存亡之計謂侍讀山悰曰吾前日覲王王流涕嗚咽而鄱陽隨郡見誅今日見王王又流涕而有愧色其在吾邪其夜三更中兵至見害始興簡王鑑字宣徹髙帝第十子也性聰警年八嵗喪所生母號慕過人數日中便至骨立豫章文獻王聞之撫其首嗚咽謂髙帝曰此兒操行異人恐其不濟髙帝亦悲不自勝初封廣興郡王袁彖時為祕書丞早有令譽髙帝盛重鑑乃以彖為友後改封始興自晉以來益州刺史皆以良將為之宋泰始中益州市橋忽生小洲道士邵碩見之曰當有貴王臨州劉亮為刺史齋前石榴樹陵冬生華亮以問碩碩曰此謂狂華宋諸劉滅亡之象後二年君當終後九載宋當滅滅後有王勝憙來作此州冀爾時蜀土平碩始康人元徽二年忽告人云吾命終因卧而死後人見碩在荆州上明以一隻故履縛左脚而行甚疾遂不知所之永明二年武帝不復用諸將為益州始以鑑為益州刺史督益寧二州軍事加鼔吹一部勝憙反語為始興碩言於此乃驗先是劫帥韓武方常聚黨千餘人斷流為暴郡縣不能禁行旅斷絶鑑行至上明武方乃出降長史虞悰等咸請殺之鑑曰武方為暴積年所在不能制今降而被殺失信且無以勸善於是啓臺果被宥自是巴西蠻夷凶惡皆望風降附行次新城道路籍籍云陳顯達大選士馬不肯就徵巴西太守隂智伯亦以為然乃停新城十許日遣典籖張曇晳徃觀形勢俄而顯達遣使人郭安明朱公恩奉書貢遺咸勸鑑執之鑑曰顯達立節本朝必自無此曇晳還若有同異執安明等未晚居二日曇晳還説顯達遣家累已出城日夕望殿下至於是乃前時年十四好學善屬文不重華飾器服清素有髙士風與記室參軍蔡仲熊登張儀樓商略先言徃行及蜀土人物鑑言辭和辯仲熊應對無滯當時以為盛事州城北門常閉不開鑑問其故於虞悰悰答曰蜀中多夷暴有時抄掠至城下故相承閉之鑑曰古人云善閉無闗鍵且在徳不在門即令開之戎夷慕義自是清謐於州園地得古冢無復棺但有石槨銅器十餘種並古形玉璧三枚珍寳甚多不可皆識金銀為蠶蛇形者數斗又以朱沙為阜水銀為池左右咸勸取之鑑曰皇太子昔在雍有發古冢者得玉鏡玉屏風玉匣之屬皆將還都吾意常不同乃遣功曹何佇為之起墳諸寳物一不得犯性甚清在蜀積年未甞有所營造資用一嵗不滿三萬王儉常歎云始興王雖尊貴而行履都是素士時有廣漢什邡人段祖以淳于獻鑑古禮器也髙三尺六寸六分圍三尺四寸圓如筩銅色黑如漆甚薄上有銅馬以繩縣馬令去地尺餘灌之以水又以器盛水於下以芒莖當心跪注淳于以手振芒則聲如雷清響良乆乃絶古所以節樂也五年鑑獻龍角一枚長九尺三寸色紅有文九年為散騎常侍祕書監領石頭戍事上以與鑑久别車駕幸石頭宴㑹賞賜尋遷左衛將軍未拜遇疾上為南康王子琳起青陽巷第新成車駕與後宫幸第樂飲其日鑑疾上遣騎詔問疾相繼為之止樂尋薨江夏王鋒字宣穎髙帝第十二子也母張氏有容徳宋蒼梧王逼取之又欲害鋒髙帝甚懼不敢使居舊宅匿於張氏舍時年四嵗性方整好學書張家無紙札乃倚井欄為書書滿則洗之已復更書如此者累月又晨興不肯拂牕塵而先畫塵上學為書字五嵗髙帝使學鳳尾諾一學即工髙帝大悦以玉麒麟賜之曰麒麟賞鳳尾矣至十嵗便能屬文武帝時藩邸嚴急諸王不得讀異書五經之外唯得看孝子圖而已鋒乃密遣人於市里街巷買圖籍朞月之間殆將備矣好琴書蓋亦天性常覲武帝賜以寳裝琴仍於御前鼔之大見賞帝謂鄱陽王鏘曰闍黎琴亦是柳令之流亞其既事事有意吾欲試以臨人鏘曰昔鄒忌鼔琴威王委以國政乃出為南徐州刺史善與人交行事主文和别駕江祏等皆相友善後文和被徵為益州置酒告别文和流淚曰下官少來未甞作詩今日違戀不覺文生於性王儉聞之曰江夏可謂善變素絲也工書為當時藩王所推南郡王昭業亦稱工謂武帝曰臣書固應勝江夏王武帝答闍黎第一法身第二法身昭業小名闍黎鋒小名也隆昌元年為侍中領驍騎將軍尋加祕書監及明帝知權藩邸危懼江祏甞謂王晏曰江夏王有才行亦善能匿迹以琴道授羊景之景之著名而江夏掩能於世非唯七絃而已百氏亦復如之鋒聞歎曰江祏遂復為混沌書眉欲益反弊耳寡人聲酒是耽狗馬是好豈復一豪於平生哉當時以為話言常忽忽不樂著修栢賦以見志曰既殊羣而抗立亦含貞而挺正豈春日之自芳在霜下而為盛衝風不能摧其枝積雪不能改其性雖坎壈於當年度後凋之可詠時鼎業潛移鋒獨慨然有匡復之意逼之行事典籖故不遂也甞見明帝言次及遥光才力可委之意鋒答曰遥光之於殿下猶殿下之於髙皇衛宗廟安社稷實有攸寄明帝失色鋒有武力明帝殺諸王鋒與書詰責左右不為通明帝深憚之不敢於第收之鋒出登車兵人欲上車防勒鋒以手擊却數人皆應時倒地遂逼害之江斆聞其死流涕曰芳蘭當門不得不鋤其修栢之賦乎南平王鋭字宣毅髙帝第十五子也位左戸尚書朝直勤謹未甞屬疾永明七年出為南中郎將湘州刺史延興元年明帝作輔害諸王遣裴叔業平尋陽仍進湘州鋭防閤周伯玉大言於衆曰此非天子意今斬叔業舉兵匡社稷誰敢不同鋭典籖叱左右斬之鋭見害伯玉下獄誅宜都王鑑字宣儼髙帝第十六子也生三嵗喪母及有識問母所在左右告以早亡便思慕蔬食自悲不識母常祈請幽冥求一夢見至六嵗遂夢見一女人云是其母鏗悲泣向舊左右説容貌衣服事皆如平生聞者莫不歔欷清悟有學行永明十一年為南豫州刺史都督二州軍事雖未經庶務而雅得人心舉動每為籖帥所制立意多不得行州鎮姑熟于時人發桓温女冢得金巾箱織金篾為嚴器又有金蠶銀璽等物甚多條以啓聞鬱林敕以物賜之鏗曰今取徃物後取今物如此循環豈可熟念使長史蔡約自徃修復纎毫不犯年十歳時與吉景曜商略先言徃行左右誤排柟榴屏風倒壓其背神色不異言談不輟亦不顧視彌善射常以堋的大闊曰終日射侯何難之有乃取甘蔗挿地百歩射之十發十中永明中制諸王年未三十不得畜妾及武帝晏駕後有勸取左右者鏗曰在内不無使役既先朝遺㫖何忍而違及延興元年明帝誅髙武文恵諸子鏗聞之馮左右從容雅歩詠陸機弔魏武云昔以四海為己任死則以愛子託人如此者三左右皆泣後果遣呂文顯賚藥徃夜進㕔事正逢八闗齋鏗上髙坐謂文顯曰髙皇昔寵任君何事乃有今日之行答云出不獲已於是仰藥時年十八身長七尺鑑狀似兄嶷咸以國器許之及死有識者莫不痛惜初鏗出閤時年七嵗陶𢎞景為侍讀八九年中甚相接遇後𢎞景隠山忽夢鏗來慘然言别云某日命過無罪後三年當生某家𢎞景訪以幽中事多祕不出覺後即遣信出都參訪果與事符同𢎞景因著夢記云晉熙王銶字宣攸髙帝第十八子也隆昌元年位郢州刺史延興元年見害河東王鉉字宣𦙍髙帝第十九子也母張氏有寵於髙帝鉉又最幼尤所留心髙帝臨崩以屬武帝武帝甚加意焉為納柳世隆女為妃武帝與羣臣看新婦流涕不自勝豫章王嶷亦哽咽及明帝誅髙帝諸子以鉉髙帝所愛亦以才弱年幼故得全初鉉年三四嵗髙帝甞晝卧纒髪鉉上髙帝腹上弄繩髙帝因以繩賜鉉及崩後鉉以寳函盛繩嵗時輒開視流涕嗚咽人才甚凡而有此一至建武中髙武子孫憂疑鉉朝見常鞠躬俯僂不敢正行直視尋遷侍中衛將軍鉉年稍長四年誅王晏以謀立鉉為名鉉免官以王還第禁不得與外人交通永泰元年明帝暴疾甚乃見害聞收至欣然曰死生命也終不斆建安乞為奴而不得仰藥而卒鉉二子在孩抱亦見殺論曰豫章文獻王珪璋之質夙表天姿行已所安率由忠敬雖代宗之議早隆皇矚而天倫之愛無虧永明故知為仁由已不虚言也自宋受晉終馬氏遂為廢姓齊受宋禪劉宗盡見誅夷梁武革齊弗取前轍子恪兄弟並皆錄用雖見梁武之𢎞裕亦表文獻之餘慶昔陳思表云權之所存雖疎必重勢之所去雖親必輕原夫此言實存固本然就國之典既隨代革卿士入朝作貴藩輔皇王託體同稟尊極仕無常資秩有恒數禮地兼隆易生猜疑武帝顧命情深尊嫡密圖逺算意在求安以明帝同起布衣用存顧託遂韜永命於近戚寄重任於疎親以為子弟布列外有强大之固支庶中立可息覬覦之謀表裏相維洊隆家國曾不慮機能還衡權可制衆宗族殱滅一至於斯曹植之言逺有致矣南史卷四十三南史卷四十三考證始興簡王鑑傳道士邵碩見之曰當有貴王臨州王監本訛一今改从閣本時有廣漢什邠人叚祖以淳于獻鑑古禮器也邠一本作邡宜都王鏗傳左右誤排柟榴屏風倒壓其背柟閣本作楠又榴一本作瘤誤史臣論禮地兼隆易生猜疑猜疑閣本作推擬遂韜永命於近戚永一本作末南史卷四十三考證
