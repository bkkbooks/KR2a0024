body:
  text: 南史卷七十八唐李延夀撰列傳第六十八夷貊上海南諸國西南夷海南諸國大抵在交州南及西南大海洲上相去或四五千里逺者二三萬里其西與西域諸國接漢元鼎中遣伏波將軍路博徳開百越置日南郡其徼外諸國自武帝以來皆朝貢後漢桓帝世大秦天竺皆由此道遣使貢獻及呉孫權時遣宣化從事朱應中郎康泰通焉其所經過及傳聞則有百數十國因立記傳晉代通中國者蓋鮮故不載史官及宋齊至梁其奉正朔脩貢職航海往往至矣今采其風俗粗著者列為海南云林邑國本漢日南郡象林縣古越裳界也伏波將軍馬援開南境置此縣其地從廣可六百里城去海百二十里去日南南界四百餘里北接九徳郡其南界水步道二百餘里有西國夷亦稱王馬援所植二銅柱表漢家界處也其國有金山石皆赤色其中生金金夜則出飛狀如螢火又出瑇瑁貝齒古貝沉木香古貝者樹名也其華成時如鵝毳抽其緒紡之以作布布與紵布不殊亦染成五色織為斑布沉木香者土人斫斷積以歳年朽爛而心節獨在置水中則沉故名曰沉香次浮者棧香漢末大亂功曹區連殺縣令自立為王數世其後王無嗣外甥范熊代立死子逸嗣晉成帝咸康三年逸死奴文簒立文本日南西卷縣夷帥范稚家奴嘗牧牛於山澗得二鱧魚化而為鐵因以鑄刀刀成文向石咒曰若斫石破者文當王此國因斫石如斷芻藁文心異之范稚嘗使之商賈至林邑因敎林邑王作宫室及兵車器械王寵任之後乃讒言諸子各奔餘國及王死無嗣文偽於隣國迓王子置毒於漿中殺之遂脅國人自立時交州刺史姜莊使所親韓戢謝稚前後監日南郡並貪殘諸國患之穆帝永和三年臺遣夏侯覽為太守侵刻尤甚林邑素無田土貪日南地肥沃常欲略有之至是因人之怨襲殺覽以其屍祭天留日南三年乃還林邑交州刺史朱藩後遣督護劉雄戍日南文復滅之進宼九徳郡害吏人遣使告藩願以日南北境横山為界藩不許文歸林邑尋復屯日南文死子佛立猶屯日南征西將軍桓溫遣督䕶滕畯九真太守灌邃討之追至林邑佛乃請降安帝隆安三年佛孫湏達復宼日南九徳諸郡無歳不至殺傷甚多交州遂致虚弱湏達死子敵真立其弟敵鎧攜母出奔敵真追恨不能容其母弟捨國而之天竺禪位於其甥國相蔵驎固諫不從其甥立而殺蔵驎蔵驎子又攻殺之而立敵鎧同母異父弟曰文敵文敵復為扶南王子當根純所殺大臣范諸農平其亂自立為王諸農死子陽邁立陽邁初在孕其母夢生兒有人以金席藉之其色光麗夷人謂金之精者為陽邁若中國云紫磨者因以為名宋永初二年遣使貢獻以陽邁為林邑王陽邁死子咄立簒其父復曰陽邁其國俗居處為閣名曰干闌門戸皆北向書樹葉為紙男女皆以横幅古貝繞腰以下謂之干漫亦曰都漫穿耳貫小環貴者著革屣賤者跣行自林邑扶南以南諸國皆然也其王者著法服加瓔珞如佛像之飾出則乘象吹螺擊鼓罩古貝繖以古貝為幡旗國不設刑法有罪者使象蹋殺之其大姓號婆羅門嫁娶必用八月女先求男由賤男而貴女同姓還相婚姻使婆羅門引壻見婦握手相付咒曰吉利吉利為成禮死者焚之中野謂之火葬其寡婦孤居散髪至老國王事尼乾道鑄金銀人像大十圍元嘉初陽邁侵暴日南九徳諸郡交州刺史杜𢎞文建牙欲討之聞有代乃止八年又宼九徳郡入四會浦口交州刺史阮彌之遣隊主相道生帥兵赴討攻區栗城不尅乃還十二年十五年十六年十八年毎遣使貢獻獻亦陋薄而宼盗不已文帝忿其違慠二十三年使交州刺史檀和之振武將軍宗慤伐之和之遣司馬蕭景憲為前鋒陽邁聞之懼欲輸金一萬斤銀十萬斤銅三十萬斤還所略日南户其大臣䓯僧達諫止之乃遣大帥范扶龍戍其北界區栗城景憲攻城剋之乗勝即剋林邑陽邁父子並挺身逃奔獲其珍異皆是未名之寳又銷其金人得黄金數十萬斤和之髙平金鄉人檀馮之子也以功封雲杜縣子孝建三年為南兖州刺史坐酣飲黷貨迎獄中女子入内免官禁錮後病死見胡神為崇追贈左將軍諡曰襄子孝武孝建二年林邑又遣長史范龍跋奉使貢獻除龍跋揚武將軍大明二年林邑王范神成又遣長史范流奉表獻金銀器香布諸物明帝泰豫元年又遣使獻方物齊永明中范文贊累遣使貢獻梁天監九年文贊子天凱奉獻白猴詔加持節督縁海諸軍事威南將軍林邑王死子弼毳跋摩立奉表貢獻普通七年王髙戍勝鎧遣使獻方物詔以為持節督縁海諸軍事綏南將軍林邑王大通元年又遣使貢獻大通二年行林邑王髙戍律陁羅跋摩遣使貢獻詔以為持節督縁海諸軍事綏南將軍林邑王六年又遣使獻方物廣州諸山竝狸獠種類繁熾前後屢為侵暴歴世患之宋孝武大明中合浦大帥陳檀歸順拜龍驤將軍檀乞官軍征討未附乃以檀為高興太守遣前朱提太守費沉龍驤將軍武期南伐并通朱崖道竝無功輒殺檀而反沉下獄死扶南國日南郡之南海西大灣中去日南可七千里在林邑西南三千餘里城去海五百里有大江廣十里從西流東入海其國廣輪三千餘里土地洿下而平博氣候風俗大較與林邑同出金銀銅錫沉木香象犀孔翠五色鸚鵡其南界三千餘里有頓遜國在海崎上地方千里城去海十里有五王竝羈屬扶南頓遜之東界通交州諸賈人其西界接天竺安息徼外諸國往還交易其市東西交㑹日有萬餘人珍物寳貨無不有又有酒樹似安石榴采其花汁停瓮中數日成酒頓遜之外大海洲中又有毗騫國去扶南八千里傳其王身長丈二頭長三尺自古不死莫知其年王神聖國中人善惡及將來事王皆知之是以無敢欺者南方號曰長頸王國俗有室屋衣服噉粳米其人言語小異扶南有山出金金露生石上無央限也國法刑人並於王前噉其肉國内不受估客有往者亦殺而噉之是以商旅不敢至王常樓居不血食不事鬼神其子孫生死如常人唯王不死扶南王數使與書相報荅常遺扶南王純金五十人食器形如圓盤又如瓦塸名為多羅受五升又如椀者受一升王亦能作天竺書書可三千言說其宿命所由與佛經相似竝論善事又傳扶南東界即大漲海海中有大洲洲上有諸薄國國東有馬五洲復東行漲海千餘里至自然大洲其上有樹生火中洲左近人剝取其皮紡績作布以為手巾與蕉麻無異而色微青黒若小垢洿則投火中復更精絜或作燈炷用之不知盡扶南國俗本躶文身被髮不製衣裳以女人為王號曰桞葉年少壯健有似男子其南有激國有事鬼神者字混塡夢神賜之弓乘賈人舶入海混填晨起即詣廟於神樹下得弓便依夢乗舶入海遂至扶南外邑柳葉人衆見舶至欲劫取之混填即張弓射其舶穿度一靣矢及侍者桞葉大懼舉衆降混塡填乃敎柳葉穿布貫頭形不復露遂君其國納桞葉為妻生子分王七邑其後王混盤况以詐力間諸邑令相疑阻因舉兵攻併之乃選子孫中分居諸邑號曰小王盤况年九十餘乃死立中子盤盤以國事委其大將范蔓盤盤立三年死國人共舉蔓為王蔓勇健有權略復以兵威攻伐旁國咸服屬之自號扶南大王乃作大船窮漲海開國十餘闢地五六千里次當伐金鄰國蔓遇疾遣太子金生代行蔓姉子旃因簒蔓自立遣人詐金生而殺之蔓死時有乳下兒名長在人間至年二十乃結國中壯士襲殺旃旃大將范尋又攻殺長而代立更繕國内起觀閣遊戲之朝旦中晡三四見客百姓以蕉蔗龜鳥為禮國法無牢獄有訟者先齋三日乃燒斧極赤令訟者捧行七步又以金鐶鷄卵投沸湯中令採取之若無實者手即爛有理者則不又於城􅗂中養鰐魚門外圈猛獸有罪者輒以餧猛獸及鰐魚魚獸不食為無罪三日乃放之鰐大者長三丈餘状似鼉有四足喙長六七尺兩邉有齒利如刀劒常食魚遇得麞鹿及人亦噉之蒼梧以南及外國皆有之呉時遣中郎康泰宣化從事朱應使於尋國國人猶裸唯婦人著貫頭泰應謂曰國中實佳但人褻露可怪耳尋始令國内男子著横幅横幅今干漫也大家乃截錦為之貧者乃用布晉武帝太康中尋始遣使貢獻穆帝升平元年王竺旃檀奉表獻馴象詔以勞費停之其後王憍陳如本天竺婆羅門也有神語曰應王扶南憍陳如心悦南至盤盤扶南人聞之舉國欣戴迎而立焉復改制度用天竺法憍陳如死後王持棃陁跋摩宋文帝元嘉十一年十二年十五年奉表獻方物齊永明中王憍陳如闍邪跋摩遣使貢獻梁天監二年跋摩復遣使送珊瑚佛像并獻方物詔授安南将軍扶南王其國人皆醜黑拳髮所居不穿井數十家共一池引汲之俗事天神天神以銅為像二靣者四手四靣者八手手各有所持或小兒或鳥獸或日月其王出入乗象嬪侍亦然王坐則偏踞翹膝垂左膝至地以白疊敷前設金盆香爐於其上國俗居䘮則剃除鬚髮死者有四𦵏水葬則投之江流火𦵏則焚為灰燼土葬則瘞埋之鳥𦵏則棄之中野人性貪吝無禮義男女恣其奔隨十年十三年跋摩累遣使貢獻其年死庶子留陁跋摩殺其嫡弟自立十六年遣使竺當抱老奉表貢獻十八年復遣使送天竺旃檀瑞像婆羅樹葉并獻火齊珠鬱金蘇合等香普通元年中大通二年大同元年累遣使獻方物五年復遣使獻生犀又言其國有佛髮長一丈二尺詔遣沙門釋曇寳隨使往迎之先是三年八月武帝改造阿育王佛塔出舊塔下舎利及佛爪髮髮青紺色衆僧以手伸之隨手長短放之則旋屈為蠡形按僧伽經云佛髮青而細猶如藕莖丝佛三昧經云我昔在宫沐頭以尺量髮長一丈二尺放已右旋還成蠡文則與帝所得同也阿育王即鐵輪王王閻浮提一天下佛滅度後一日一夜役鬼神造八萬四千塔此即其一呉時有尼居其地為小精舎孫綝尋毁除之塔亦同滅呉平後諸道人復於舊處建立焉晉元帝初度江更修飾之至簡文咸安中使沙門安法程造小塔未及成而亡弟子僧顯繼而修立至孝武太元九年上金相輪及承露其後有西河離石縣胡人劉薩何遇疾暴亡而心猶喛其家未敢便殯經七日更蘇説云有兩吏見錄向西北行不測逺近至十八地獄隨報重輕受諸楚毒觀世音語云汝縁未盡若得活可作沙門洛下齊城丹陽會稽竝有阿育王塔可往禮拜乃若夀終則不堕地獄語竟如墜高巖忽然醒寤因此出家名慧達遊行禮塔次至丹陽未知塔處及登越城四望見長千里有異氣因就禮拜果是先阿育王塔所屢放光明由是定知必有舍利乃集衆就掘入一丈得三石碑竝長六尺中一碑有鐵函函中有銀函函中又有金函盛三舎利及髮爪各一枚髮長數尺即遷舎利近北對簡文所造塔西造一層塔十六年又使沙門僧尚加為三層即是武帝所開者也初穿土四尺得龍窟及昔人所捨金銀環釧釵鑷等諸雜寳物可深九尺許至石磉磉下有石函函内有鐡壺以盛銀坩坩内有金鏤甖盛三舎利如粟粒大圓正光潔函内有琉璃椀椀内得四舎利及髮爪爪有四枚竝為沉香色至其月二十七日帝又到寺禮拜設無碍大會大赦是日以金鉢盛水泛舎利其最小者隠不出帝禮數十拜舎利乃於鉢内放光旋回久之乃當中而止帝問大僧正慧念曰見不可思議事不慧念荅曰法身常住湛然不動帝曰弟子欲請一舎利還臺供養至九月五日又於寺設無碍大會遣皇太子王侯朝貴等奉迎是日風景明净傾都觀屬所設金銀供具等物並留寺供養并施錢一千萬為寺基業至四年九月十五日帝又至寺設無碍大會竪二刹各以金甖次玉甖重盛舎利及爪髪内七寳塔内又以石函盛寳塔分入兩刹刹下及王侯妃主百姓富室所捨金銀環釧等珍寶充積十一年十一月二日寺僧又請帝於寺發般若經題爾夕二塔俱放光明敕鎮東邵陵王綸製寺大功徳碑文先是二年改造㑹稽鄮縣塔開舊塔中出舎利遣光宅寺釋敬脫等四僧及舎人孫照暫迎還臺帝禮拜竟即送還縣入新塔下此縣塔亦是劉薩何所得也晉咸和中丹陽尹高悝行至張侯橋見浦中五色光長數尺不知何怪乃令人於光處得金像無有光趺悝乃下車載像還至長干巷首牛不肯進悝乃令馭人任牛所之牛徑牽至寺悝因留像付寺僧每至夜中常放光明又聞空中有金石之響經一歳臨海漁人張係世於海口忽見有銅花趺浮出取送縣縣人以送臺乃施像足宛然合會簡文咸安元年交州合浦人董宗之採珠沒水底得佛光燄交州送臺以施於象又合焉自咸和中得像至咸安初歴三十餘年光趺始具初高悝得像後有西域胡僧五人來詣悝曰昔於天竺得阿育王造像來至鄴下逢胡亂埋於河邊今尋覓失所五人嘗一夜俱夢見像曰已出江東為高悝所得悝乃送此五僧至寺見像歔欷涕泣像便放光照燭殿宇又瓦官寺慧邃欲摸寫像形寺主僧尚慮損金色謂邃曰若能令像放光回身西向乃可相許慧邃便懇拜請其夜像即轉坐放光回身西向明旦便許摸之像趺先有外國書莫有識者後有三藏那跋摩識之云是阿育王為第四女所造也及大同中出舊塔舎利敕市寺側數百家宅地以廣寺域造諸堂殿并瑞像周回閣等窮於輪奐焉其圖諸經變並呉人張繇運手繇丹青之工一時冠絶西南夷訶羅陁國宋元嘉七年遣使奉表曰伏承聖主信重三寳興立塔寺周滿世界今故遣使一人表此微心呵羅單國都闍婆洲元嘉七年遣使獻金剛指環赤鸚鵡鳥天竺國白疊古貝葉波國古貝等物十年呵羅單國王毗沙跋摩奉表曰常勝天子陛下諸佛世尊常樂安隠三達六通為世間𨗳是名如來是故至誠五體敬禮其後為子所簒奪十三年又上表二十六年文帝詔曰呵羅單婆皇婆逹三國頻越遐海欵化納貢遠誠宜甄可並加除授乃遣使䇿命之二十九年又遣長史婆和沙彌獻方物婆皇國元嘉二十六年國王舎利婆羅跋摩遣使獻方物四十一種文帝䇿命之為婆皇國王二十八年復遣使貢獻孝武孝建三年又遣長史竺那婆智奉表獻万物以那婆智為振威將軍大明三年獻赤白鸚鵡大明八年明帝泰始二年又遣使貢獻明帝以其長史竺湏羅逺前長史振威将軍竺那婆智並為龍驤将軍婆達國元嘉二十六年國王舎利不陵伽跋摩遣使獻方物文帝䇿命之為婆逹國王二十六年二十八年復遣使獻方物闍婆達國元嘉十二年國王師黎婆達呵陁羅跋摩遣使奉表曰宋國大主大吉天子足下教化一切種智安隠天人師降伏四魔成等正覺轉尊法輪度脱衆生我雖在逺亦霑靈潤槃槃國元嘉孝建大明中並遣使貢獻梁中大通元年四年其王使使奉表累送佛牙及畫塔并獻沉檀等香數十種六年八月復遣使送菩提國舍利及畫塔圖并菩提樹葉詹檀等香丹丹國中大通二年其王遣使奉表送牙像及畫塔二軀并獻火齊珠古貝雜香葯大同元年復遣使獻金銀琉璃雜寳香藥等物干陁利國在海南洲上其俗與林邑扶南略同出斑布古貝檳榔檳榔特精好為諸國之極宋孝武世王釋婆羅那鄰陁遣長史竺留陁獻金銀寳器梁天監元年其王瞿曇修跋陁羅以四月八日夢一僧謂曰中國今有聖主十年之後佛法大興汝若遣使貢奉禮敬則土地豐樂商旅百倍若不信我則境土不得自安初未之信既而又夢此僧曰汝若不信我當與汝往觀乃於夢中至中國拜覲天子既覺心異之陁羅本工畫乃寫夢中所見武帝容質飾以丹青仍遣使并畫工奉表獻玉盤等物使人既至摸寫帝形以還其國比本畫則符同焉因盛以寳函日加敬禮後跋陁死子毗針邪跋摩立十七年遣長史毗員跋摩奉表獻金芙蓉雜香藥等普通元年復遣使獻方物狼牙脩國在南海中其界東西三十日行南北二十日行北去廣州二萬四千里土氣物産與扶南略同偏多棧沉婆律香等其俗男女皆袒而被髮以古貝為干漫其王及貴臣乃如雲霞布覆胛以金绳為絡帶金環貫耳女子則布以瓔珞繞身其國累磚為城重門樓閣王出乗象有幡旄旗鼓罩白蓋兵衞甚嚴國人説立國以來四百餘年後嗣衰弱王族有賢者國人歸向之王聞乃加囚執其鎖無故自斷王以為神因不敢害乃逐出境遂奔天竺天竺妻以長女俄而狼牙王死大臣迎還為王二十餘年死子婆伽達多立天監十四年遣使阿撤多奉表婆利國在廣州東南海中洲上去廣州二月日行國界東西五十日行南北二十日行有一百三十六聚土氣暑熱如中國之盛夏穀一歳冄熟草木常榮海出文螺紫貝有石名坩貝羅初采之柔軟及刻削為物暴乾之遂大硬其國人披古貝如帊及為都縵王乃用斑丝者以瓔珞繞身頭著金冠髙尺餘形如弁綴以七寳之飾帶金装劍偏坐金髙坐以銀蹬支足侍女皆為金花雜寳之飾或持白眊拂及孔雀扇王出以象駕輿輿以雜香為之上施羽蓋珠簾其導從吹螺擊鼓王姓憍陳如自古未通中國問其先及年數不能記自言白浄王夫人即其國女天監十六年遣使奉表獻金席等普通三年其王頻伽復遣使珠智獻白鸚鵡青蟲兠鍪琉璃器古貝螺杯雜香藥等數十種中天竺國在大月支東南數千里地方三萬里一名身毒漢世張騫使大夏見卭竹杖蜀布國人云市之身毒即天竺也從月支髙附西南至西海東至盤越列國數十每國置王其名雖異皆身毒也漢時覊屬月支其俗土著與月支同而卑濕暑熱人畏戰弱於月支國臨大江名新陶源出崑崙分為五江總名恒水其水甘羙下有真鹽色正白如水精土出犀象貂鼠瑇瑁火齊金銀銅鐵金縷織成金罽細靡白疊好裘毾㲪火齊状如雲母色如紫金有光曜别之則蟬翼積之則如紗縠之重沓也西與大秦安息交市海中多大秦珍物珊瑚琥珀金碧珠璣琅玕鬱金蘇合蘇合是諸香汁煎之非自然一物也又云大秦人采蘇合先笮其汁以為香膏乃賣其滓與諸國賈人是以展轉來達中國不大香也鬱金獨出罽賓國華色正黄而細與芙蓉華裏被蓮者相似國人先取以上佛寺積日槁乃糞去之賈人以轉賣與他國也漢桓帝延熹九年大秦王安敦遣使自日南徼外來獻漢世唯一通焉其國人行賈往往至扶南日南交阯其南徼諸國人少有到大秦者孫權黄武五年有大秦賈人字秦論來到交阯太守呉邈遣送詣權權問論方土風俗論具以事對時諸葛恪討丹陽獲黝歙短人論見之曰大秦希見此人權以男女各十人差吏會稽劉咸送論咸於道物故乃徑還本國也漢和帝時天竺數遣使貢獻後西域反叛遂絶至桓帝延熹三年四年頻從日南徼外來獻魏晉世絶不復通唯呉時扶南王范旃遣親人蘇勿使其國從扶南發投拘利口循海大灣中正西北入歴灣邉數國可一年餘到天竺江口逆水行七千里乃至焉天竺王驚曰海濵極逺猶有此人乎即令觀視國内仍差陳宋等二人以月支馬四疋報旃勿積四年方至其時呉遣中郎康泰使扶南及見陳宋等具問天竺土俗云佛道所興國也人郭厖土饒沃其王號茂論所都城郭水泉分流繞于渠壍下注大江其宫殿皆雕文鏤刻街曲市里屋舎樓觀鐘鼓音樂服飾香華水陸通流百賈交會器玩珍瑋恣心所欲左右嘉維舎衛葉波等十六大國去天竺或二三千里共尊奉之以為在天地之中天監初其王屈多遣長史竺羅達奉表獻琉璃唾壺雜香古貝等物天竺迦毗黎國元嘉五年國王月愛遣使奉表獻金剛指環摩勒金環諸寳物赤白鸚鵡各一頭明帝泰始二年又遣貢獻以其使主竺扶大竺阿珍並為建威將軍元嘉十八年蘇摩黎國王那羅跋摩遣使獻方物孝武孝建二年斤陁利國王釋婆羅那隣陁遣長史竺留陁及多獻金銀寳器後廢帝元徽元年婆黎國遣使貢獻凡此諸國皆事佛道佛道自後漢明帝法始東流自此以來其教稍廣别為一家之學元嘉十二年丹陽尹蕭摹之奏曰佛化被于中國已歴四代而自頃以來更以奢競為重請自今以後有欲鑄銅像者悉詣臺自聞興造塔寺精舎皆先列言須許報然後就功詔可又沙汰沙門罷道者數百人孝武大明二年有曇標道人與羗人髙闍謀反上因是下詔所在精加沙汰後有違犯嚴其誅坐於是設諸條禁自非戒行精苦竝使還俗而諸寺尼出入宮掖交關妃后此制竟不能行先是晉世庾冰始創議欲使沙門敬王者後桓𤣥復述其義並不果行大明六年孝武使有司奏沙門接見皆盡敬詔可前廢帝初復舊孝武寵姬殷貴妃薨為之立寺貴妃子子鸞封新安王故以新安為寺號前廢帝殺子鸞乃毁廢新安寺驅斥僧徒尋又毁中興天寳諸寺明帝定亂下令修復宋世名僧有道生道人彭城人父為廣戚令道生為沙門法大弟子幼而聰悟年十五便能􅊰經及長有異觧立頓悟義時人推服元嘉十一年卒於廬山沙門慧琳為之誄慧琳者秦郡秦縣人姓劉氏少出家住冶城寺有才章兼内外之學為廬陵王義真所知嘗著均善論頗貶裁佛法云有白學先生以為中國聖人經綸百世其徳𢎞矣智周萬變天人之理盡矣道無隠旨敎罔遺筌聰叡廸哲何負於殊論哉有黑學道士陋之謂不照幽㝠之塗弗及來生之化雖尚虚心未能虚事不逮西域之深也為客主詶答其歸以為六度與五敎並行信順與慈悲齊立論行於世舊僧謂其敗黜釋氏欲加擯斥文帝見論賞之元嘉中遂參權要朝廷大事皆與議焉賔客輻凑門車常有數十兩四方贈賂相係勢傾一時方筵七八座上恒滿琳著髙屐披貂裘置通呈書佐權侔宰輔會稽孔顗嘗詣之遇賔客填咽暄凉而已顗慨然曰遂有黑衣宰相可謂冠履失所矣注孝經及莊子逍遥篇文論傳於世又有慧嚴慧議道人並住東安寺學行精整為道俗所推時鬬場寺多禪僧都下為之語曰鬬場禪師窟東安談義林孝武大明四年於中興寺設齋有一異僧衆莫之識問名答言名明慧從天安寺來忽然不見天下無此寺名乃改中興曰天安寺大明中外國沙門摩訶衍苦節有精理於都下出新經勝鬘經尤見重釋學師子國天竺旁國也其地和適無冬夏之異五穀隨人種不湏時節其國舊無人止有鬼神及龍居之諸國商估來共市易鬼神不見其形但出珍寳顯其所堪價商人依價取之諸國人聞其土樂因此競至或有住者遂成大國晉義熙初始遣使獻玉像經十載乃至像高四尺二寸玉色潔潤形制殊特殆非人工此像歴晉宋在瓦官寺先有徴士戴安道手製佛像五軀及顧長康維摩畫圖世人號之三絶至齊東昏遂毁玉像前截臂次取身為嬖妾潘貴妃作釵釧宋元嘉五年其王刹利摩訶遣使奉表貢獻十二年又遣使奉獻梁大通元年後王迦葉伽羅訶黎邪使使奉表貢獻南史卷七十八南史卷七十八考證林邑國傳故名曰沈香次浮者棧香棧梁書作􅀢扶南國傳王當樓居當梁書作常今各本俱同仍之開國十餘闢地五六千里餘監本訛徐今改正横幅今干漫也漫梁書作縵穆帝升平元年王竺旃檀奉表獻馴象王各本訛天今从梁書火𦵏則焚為灰燼為監本訛於今从閣本大同元年累遣使獻方物五年復遣使獻生犀三年監本誤九年今從梁書及下五年改正詔遣沙門釋曇寳隨使往迎之曇梁書作雲干陁利國傳宋孝武世王釋婆羅那鄰陁鄰一本作憐婆利國傳有石名坩貝羅梁書坩作蚶其國人披古貝如帊及為都縵王乃用班丝者梁書古作吉者作布南史卷七十八考證
