body:
  text: 南史卷七十九唐李延夀撰列傳第六十九夷貊下東夷西戎蠻西域諸國北狄東夷之國朝鮮為大得箕子之化其器物猶有禮樂云魏時朝鮮以東馬韓辰韓之屬世通中國自晉過江泛海來使有高句麗百濟而宋齊間常通職貢梁興又有加焉扶桑國在昔未聞也梁普通中有道人稱自彼而至其言元本尤悉故并錄焉髙句麗在遼東之東千里其先所出事詳北史地方可二千里中有遼山遼水所出漢魏世南與朝鮮獩貊東與沃沮北與夫餘接其王都於九都山下地多大山深谷無原澤百姓依之以居食澗水雖土著無良田故其俗節食好修宫室於所居之左大立屋祭鬼神又祠零星社稷人性凶急喜冦鈔其官有相加對盧沛者古鄒加主簿優台使者帛衣先人尊卑各有等級言語諸事多與夫餘同其性氣衣服有異本有五族有消奴部絶奴部慎奴部灌奴部桂婁部本消奴部為王微弱桂婁部代之其置官有對盧則不置沛者有沛者則不置對盧俗喜歌儛國中邑落男女每夜羣聚歌戱其人潔净自喜善蔵釀跪拜申一脚行皆走以十月祭天大會其公㑹衣服皆錦繡金銀以自飾大加主簿頭所著似幘而無後其小加著折風形如弁其國無牢獄有罪者則會諸加評議重者便殺之沒入其妻子其俗好淫男女多相奔誘已嫁娶便稍作送終之衣其死有槨無棺好厚𦵏金銀財幣盡於送死積石為封列植松柏兄死妻嫂其馬皆小便登山國人尚氣力便弓矢刀矛有鎧甲習戰鬬沃沮東獩皆屬焉晉安帝義熙九年髙麗王髙璉遣長史髙翼奉表獻赭白馬晉以璉為使持節都督營州諸軍事征東將軍高麗王樂浪公宋武帝踐阼加璉鎮東大將軍餘官竝如故三年加璉散騎常侍增督平州諸軍事少帝景平二年璉遣長史馬婁等來獻方物遣謁者朱邵伯王邵子等慰勞之元嘉十五年馮𢎞為魏所攻敗奔高麗北豐城表求迎接文帝遣使王白駒趙次興迎之并令髙麗資遣璉不欲𢎞南乃遣將孫潄髙仇等襲殺之白駒等率所領七千餘人生擒潄殺仇等二人璉以白駒等専殺遣使執送之上以逺國不欲違其意白駒等下獄見原璉每歳遣使十六年文帝欲侵魏詔璉送馬獻八百疋孝武孝建二年璉遣長史董騰奉表慰國哀再周并獻方物大明二年又獻肅慎氏楛矢石砮七年詔進璉為車騎大將軍開府儀同三司餘官並如故明帝泰始後廢帝元徽中貢獻不絶歴齊並授爵位百餘歳死子雲立齊隆昌中以為使持節散騎常侍都督營平二州征東大將軍樂浪公梁武帝即位進雲車騎大將軍天監七年詔為撫東大將軍開府儀同三司持節常侍都督王竝如故十一年十五年累遣使貢獻十七年雲死子安立普通元年詔安纂襲封爵持節督營平二州諸軍事寕東將軍七年安卒子延立遣使貢獻詔以延襲爵中大通四年六年大同元年七年累奉表獻方物太清二年延卒詔其子成襲延爵位百濟者其先東夷有三韓國一曰馬韓二曰辰韓三曰弁韓弁韓辰韓各十二國馬韓有五十四國大國萬餘家小國數千家總十餘萬户百濟即其一也後漸强大兼諸小國其國本與句麗俱在遼東之東千餘里晉世句麗既略有遼東百濟亦據有遼西晉平二郡地矣自置百濟郡晉義熙十三年以百濟王餘映為使持節都督百濟諸軍事鎮東將軍百濟王宋武帝踐阼進號鎮東大將軍少帝景平二年映遣長史張威詣闕貢獻元嘉二年文帝詔兼謁者閭丘恩子兼副謁者丁敬子等往宣旨慰勞其後每歳遣使奉獻方物七年百濟王餘毗復修貢職以映爵號授之二十七年毗上書獻方物私假臺使馮野夫西河太守表求易林式占腰弩文帝並與之毗死子慶代立孝武大明元年遺使求除授詔許之二年慶遣上表言行冠軍將軍右賢王餘紀十一人忠勤並求顯進於是詔並加優進明帝泰始七年又遣使貢獻慶死立子牟都都死立子牟大齊永明中除大都督百濟諸軍事鎮東大將軍百濟王梁天監元年進大號征東将軍尋為高句麗所破衰弱累年遷居南韓地普通二年王餘隆始復遣使奉表稱累破髙麗今始與通好百濟更為強國其年梁武帝詔隆為使持節都督百濟諸軍事寧東大將軍百濟王五年隆死詔復以其子明為持節督百濟諸軍事綏東將軍百濟王號所都城曰固麻謂邑曰檐魯如中國之言郡縣也其國之有二十二檐魯皆以子弟宗族分據之其人形長衣服潔浄其國近倭頗有文身者言語服章略與髙麗同呼帽曰冠襦曰複衫袴曰褌其言參諸夏亦秦韓之遺俗云中大通六年大同七年累遣使獻方物并請湼槃等經義毛詩博士并工匠畵師等並給之太清三年遣使貢獻及至見城闕荒毁並號慟涕泣侯景怒囚執之景平乃得還國新羅其先事詳北史在百濟東南五十餘里其地東濵太海南北與句麗百濟接魏時曰新盧宋時曰新羅或曰斯羅其國小不能自通使聘梁普通二年王姓募名泰始使隨百濟奉獻方物其俗呼城曰健牟羅其邑在内曰啄評在外曰邑勒亦中國之言郡縣也國有六啄評五十二邑勒土地肥羙宜植五穀多桑麻作縑布服牛乗馬男女有别其官名有子賁旱支壹旱支齊旱古謁旱支壹吉支竒貝旱支其冠曰遺子禮襦曰尉觧袴曰柯半靴曰洗其拜及行與高麗相類無文字刻木為信語言待百濟而後通焉倭國其先所出及所在事詳北史其官有伊支馬次曰彌馬獲支次曰奴往鞮人種禾稻紵麻蠶桑織績有薑桂橘椒蘇出黑雉真珠青玉有獸如牛名山鼠又有大虵吞此獸虵皮堅不可斫其上有孔乍開乍閉時或有光射中而虵則死矣物産略與儋耳朱崖同地氣温暖風俗不淫男女皆露䯰富貴者以錦繡雜采為帽似中國胡公頭食飲用籩豆其死有棺無槨封土作冢人性皆嗜酒俗不知正歳多夀考或至八九十或至百歳其俗女多男少貴者至四五妻賤者猶至両三妻婦人不婬妬無盗竊少諍訟若犯法輕者沒其妻子重則滅其宗族晉安帝時有倭王讚遣使朝貢及宋武帝永初二年詔曰倭讚逺誠宜甄可賜除授文帝元嘉二年讚又遣司馬曹達奉表獻方物讚死弟珍立遣使貢獻自稱使持節都督倭百濟新羅任那秦韓慕韓六國諸軍事安東大將軍倭國王表求除正詔除安東將軍倭國王珍又求除正倭洧等十三人平西征虜冠軍輔國将軍等號詔並聽之二十年倭國王濟遣使奉獻復以為安東將軍倭國王二十八年加使持節都督倭新羅任那加羅秦韓慕韓六國諸軍事安東將軍如故并除所上二十三人職濟死世子興遣使貢獻孝武大明六年詔授興安東将軍倭國王興死弟武立自稱使持節都督倭百濟新羅任那加羅秦韓慕韓七國諸軍事安東大将軍倭國王順帝昇明二年遣使上表言自昔祖禰躬擐甲胄跋涉山川不遑寧處東征毛人五十五國西服衆夷六十六國陵平海北九十五國王道融泰廓土遐畿累葉朝宗不愆于歳道逕百濟裝飾船舫而句麗無道圖欲見吞臣亡考濟方欲大舉奄喪父兄使垂成之功不獲一簣今欲練兵申父兄之志竊自假開府儀同三司其餘咸各假授以勸忠節詔除武使持節都督倭新羅任那秦韓慕韓六國諸軍事安東大將軍倭王齊建元中除武持節都督倭新羅任那加羅秦韓慕韓六國諸軍事鎮東大將軍梁武帝即位進武號征東大將軍其南有侏儒國人長四尺又南有黑齒國裸國去倭四千餘里船行可一年至又西南萬里有海人身黒眼白裸而醜其肉羙行者或射而食之文身國在倭東北七千餘里人體有文如獸其頟上有三文文直者貴文小者賤土俗歡樂物豐而賤行客不齎糧有屋宇無城郭國王所居飾以金銀珍麗繞屋為壍廣一丈實以水銀雨則流于水銀之上市用珍寳犯輕罪者則鞭杖犯死罪則置猛獸食之有枉則獸避而不食經宿則赦之大漢國在文身國東五千餘里無兵戈不攻戰風俗並與文身國同而言語異扶桑國者齊永元元年其國有沙門慧深來至荆州説云扶桑在大漢國東二萬餘里地在中國之東其上多扶桑木故以為名扶桑葉似桐初生如笋國人食之實如棃而赤績其皮為布以為衣亦以為錦作板屋無城郭有文字以扶桑皮為紙無甲兵不攻戰其國法有南北獄若有犯輕罪者入南獄重罪者入北獄有赦則放南獄不赦北獄在北獄者男女相配生男八歳為奴生女九歳為婢犯罪之身至死不出貴人有罪國人大會坐罪人於坑對之宴飲分訣若死别焉以灰繞之其一重則一身屏退二重則及子孫三重者則及七世名國王為乙祁貴人第一者為對盧第二者為小對盧第三者為納咄沙國王行有鼓角導從其衣色隨年改易甲乙年青丙丁年赤戊巳年黄庚辛年白壬癸年黑有牛角甚長以角載物至勝二十斛有馬車牛車鹿車國人養鹿如中國蓄牛以乳為酪有赤棃經年不壊多蒲桃其地無鐡有銅不貴金銀市無租估其昏姻法則壻往女家門外作屋晨夕灑掃經年而女不悅即驅之相恱乃成昏昏禮大抵與中國同親喪七日不食祖父母喪五日不食兄弟伯叔姑姊妹三日不食設坐為神像朝夕拜奠不制衰絰嗣王立三年不親國事其俗舊無佛法宋大明二年罽賔國嘗有比丘五人游行其國流通佛法經像敎令出家風俗遂改慧深又云扶桑東千餘里有女國容貎端正色甚潔白身體有毛髮長委地至二三月競入水則任娠六七月産子女人胷前無乳頂後生毛根白毛中有汁以乳子百日能行三四年則成人矣見人驚避偏畏丈夫食鹹草如禽獸鹹草葉似邪蒿而氣香味鹹梁天監六年有晉安人度海為風所飄至一島登岸有人居止女則如中國而言語不可曉男則人身而狗頭其聲如吠其食有小豆其衣如布築土為牆其形圓其戸如竇云河南宕昌鄧至武興其本並為氐𦍑之地自晉南遷九州分裂此等諸國地分西垂提挈于魏時通江左今採其舊土編于西戎云河南王者其先出自鮮卑慕容氏初慕容奕洛干有二子庶長曰吐谷渾嫡曰廆洛干卒廆嗣位吐谷渾避之西徙上隴度枹罕出涼州西南至赤水而居之地在河南故以為號事詳北史其界東至疊川西隣于闐北接髙昌東北通秦嶺方千餘里蓋古之流沙地焉乏草木少水潦四時恒有冰雪唯六七月雨雹甚盛若晴則風飄沙礫常蔽光景其地有麥無穀有青海方數百里放牝馬其側輒生駒土人謂之龍種故其國多善馬有屋宇雜以百子帳即穹盧也著小袖袍小口袴大頭長裙帽女子被髮為辮其後吐谷渾孫葉廷頗識書記自謂曾祖奕洛干始封昌黎公吾蓋公孫之子也禮以王父字為氏因姓吐谷渾亦為國號至其末孫阿豺始通江左受官爵弟子慕延宋元嘉末又自號河南王慕延死從弟拾寅立乃用書契起城池築宫殿其小王並立宅國中有佛法拾寅死子度易侯立易侯死子休留代立齊永明中以代為使持節都督西秦河沙三州鎮西將軍䕶羗校尉西秦河二州刺史梁興進代為征西將軍代死子休運籌襲爵位天監十三年遣使獻金裝馬腦鍾二口又表於益州立九層佛寺詔許焉十五年又遣使獻赤舞龍駒及方物其使或歳再三至或冄歳一至其地與益州隣常通商賈普通元年又奉表獻方物籌死子呵羅真立大通三年詔以為寕西将軍䕶羗校尉西秦河二州刺史真死子佛輔襲爵位其世子又遣使獻白龍駒於皇太子宕昌國在河南國之東益州之西北隴西之地西羗種也宋孝武世其王梁瑾忽始獻方物梁天監四年王梁彌博來獻甘草當歸詔以為使持節都督河梁二州諸軍事安西將軍東羗校尉河梁二州刺史隴西公宕昌王佩以金章彌博死子彌泰立大同七年復䇿授以父爵位其衣服風俗與河南略同鄧至國居西凉州界羗别種也世號持節平北將軍西涼州刺史宋文帝時王象屈耽遣使獻馬梁天監元年詔以鄧至王象舒彭為督西凉州諸軍事進號安北將軍五年舒彭遣使獻黄耆四百斤馬四疋其俗呼帽曰突何其衣服與宕昌同武興國本仇池楊難當自立為秦王宋文帝遣裴方明討之難當奔魏其兄子文徳又聚衆葭蘆宋因授以爵位魏又攻之文徳奔漢中從弟僧嗣又自立復戍葭蘆卒文徳弟文度立以弟文洪為白水太守屯武興宋世以為武都王武興之國自於此矣難當族弟廣香又攻殺文度自立為隂平王葭蘆鎮主死子炅立炅死子崇祖立崇祖死子孟孫立齊永明中魏南梁州刺史仇池公楊靈珍據泥切山歸齊齊武帝以靈珍為北梁州刺史仇池公文洪死以族人集始為北秦州刺史武都王梁天監初以集始為持節都督秦雍二州諸軍事輔國将軍平羗校尉北秦州刺史武都王靈珍為冠軍將軍孟孫為假節督沙州諸軍事平羗校尉沙州刺史隂平王集始死子紹先襲爵位二年以靈珍為持節督隴右諸軍事左將軍北凉州刺史仇池王十年孟孫死詔贈安沙将軍北雍州刺史子定襲封爵紹先死子智慧立大同元年剋復漢中智慧遣使上表求率四千戸歸梁詔許焉即以為東益州其國東連秦嶺西接宕昌其大姓有苻氏姜氏梁氏言語與中國同著烏皁突騎帽長身小袖袍小口袴皮鞾地植九穀婚姻偹六禮知書疏種桑蔴出紬絹布漆蠟椒等山出銅鐵書云蠻夷猾夏其作梗也已舊及于宋之方盛蓋亦屢興戍役豈詩所謂蠢爾蠻荆大邦為讐者乎今亦編錄以偹諸蠻云爾荆雍州蠻盤瓠之後也種落布在諸郡縣宋時因晉於荆州置南蠻雍州置寧蠻校尉以領之孝武初罷南蠻併大府而寧蠻如故蠻之順附者一户輸穀數斛其餘無雜調而宋人賦役嚴苦貧者不復堪命多逃亡入蠻蠻無徭役強者又不供官稅結黨連郡動有數百千人州郡力弱則起為盗賊種類稍多戸口不可知也所在多深險居武陵者有雄溪樠溪辰溪酉溪武溪謂之五溪蠻而宜都天門巴東建平江北諸郡蠻所居皆深山重阻人跡罕至焉前世以來屢為人患少帝景平二年宜都蠻帥石寧等一百二十三人詣闕上獻文帝元嘉六年建平蠻張維之等五十人七年宜都蠻田生等一百一十三人並詣闕獻見其後沔中蠻大動行旅殆絶天門漊中令宋矯之徭賦過重蠻不堪命十八年蠻田向求等為宼破漊中虜掠百姓荆州刺史衡陽王義季遣行參軍曾孫念討破之免矯之官二十年南郡臨沮當陽蠻反縳臨沮令傅僧驥荆州刺史南譙王義宣遣中兵參軍王諶討破之先是雍州刺史劉道産善撫諸蠻前後不附者皆引出平土多縁沔為居及道産亡蠻又反叛至孝武出為雍州羣蠻斷道臺遣軍主沈慶之連年討蠻所向皆平事在慶之傳二十八年正月龍山雉水蠻宼鈔湼陽縣南陽太守朱韶遣軍討之失利韶又遣二千人係之蠻乃散走是歳滍水諸蠻因險為宼雍州刺史隨王誕遣使説之又遣軍討沔北諸蠻襲濁山如口蜀松三砦剋之又圍斗錢柏義諸砦蠻悉力距戰軍大破之孝武大明中建平蠻向光侯宼暴峽川巴東太守王濟荆州刺史朱修之遣軍討之光侯走清江清江去巴東千餘里時巴東建平宜都天門四郡蠻為宼諸郡人戸流散百不存一明帝順帝世尤甚荆州為之虛弊云豫州蠻稟君後也盤瓠禀君事並具前史西陽有巴水蘄水希水赤亭水西歸水謂之五水蠻所在並深岨種落熾盛歴世為盗賊北接淮汝南極江漢地方數千里宋元嘉二十八年西陽蠻殺南川令劉臺二十九年新蔡蠻破大雷戍略公私船入湖有亡命司馬黑石逃在蠻中共為宼文帝遣太子歩兵校尉沈慶之討之孝武大明四年又遣慶之討西陽蠻大剋獲而反司馬黑石徒黨三人其一名智黑石號曰太公以為謀主一人名安陽號譙王一人名續之號梁王蠻文山羅等討禽續之為蠻世財所簒山羅等相率斬世財父子六人豫州刺史王𤣥謨遣殿中將軍郭元封慰勞諸蠻使縛送亡命蠻乃執智安陽二人送詣𤣥謨孝武使於夀陽斬之明帝初即位四方反叛及南賊敗於鵲尾西陽蠻田益之田義之成邪財田光興等起義攻郢州剋之以益之為輔國将軍都統四山軍事又以蠻戸立宋安光城二郡以義之為宋安太守光興為光城太守封益之邉城縣王成邪財陽城縣王成邪財死子婆思襲爵云玉門以西達于西海考之漢史通為西域高昌迄于波斯則其所也自晉宋以還雖有時而至論其風土甚未能詳今略備西域諸國編之于次云高昌國初闞氏為主其後為河西王沮渠茂䖍弟無諱襲破之其王闞爽奔於蠕蠕無諱據之稱王一世而滅於魏其國人又推麴氏為王名嘉魏授為車騎將軍司空公都督秦州諸軍事秦州刺史金城郡公在位二十四年卒國諡曰昭武王子堅堅嗣位魏授使持節驃騎大將軍散騎常侍都督𤓰州刺史西平郡公開府儀同三司高昌王其國蓋車師之故地南接河南東近敦煌西次龜兹北隣敕勒置四十六鎮交河田地髙寧臨川横截栁婆洿林新興寧由始昌篤進白刃等鎮官有四鎮將軍及置雜號將軍長史司馬門下校郎中兵校郎通事舎人通事令史諮議諫議校尉主簿國人言語與華略同有五經歴代史諸子集靣貎類高麗辮髮垂之於背著長身小袖袍縵襠袴女子頭髮辮而不垂著錦纈纓絡環釧昏姻有六禮其地高燥築土為城架木為屋土覆其上寒暑與益州相似備植九穀人多噉麵及牛羊肉出良馬蒲桃酒石鹽多草木有草實如繭繭中絲如細纑名曰白疊子國人取織以為布布甚軟白交市用焉有朝烏者旦旦集王殿前為行列不畏人日出然後散去梁大同中子堅遣使獻鳴鹽枕蒲桃良馬氍㲣等物滑國者車師之别種也漢永建元年八滑從班勇擊北虜有功勇上八滑為後部親漢侯自魏晉以來不通中國至梁天監十五年其王厭帶夷栗陁始遣使獻方物普通元年遣使獻黄師子白貂裘波斯錦等物七年又奉表貢獻魏之居代都滑猶為小國屬蠕蠕後稍強大征其旁國波斯盤盤罽賔焉耆龜兹疎勒姑墨于闐句般等國開地千餘里土地温暖多山川少樹木有五榖國人以麵及羊肉為糧其獸有師子兩腳駱駝野驢有角人皆善騎射著小袖長身袍用金玉為帶女人被裘頭上刻木為角長六尺以金銀飾之少女子兄弟共妻無城郭氈屋為居東向開户其王坐金牀隨太歳轉與妻並坐接客無文字以木為契與旁國通則使旁國胡為胡書羊皮為紙無職官事天神火神每日則出戸祀神而後食其跪一拜而止𦵏以木為槨父母死其子截一耳𦵏訖即吉其言語待河南人譯然後通呵跋檀周古柯胡密丹等國並滑旁小國也凡滑旁之國衣服容貎皆與滑同普通元年使使隨滑使來貢獻方物白題國王姓支名史稽毅其先蓋匃奴之别種胡也漢灌嬰與匃奴戰斬白題騎一人是也在滑國東去滑六日行西極波斯土地出粟麥𤓰果食物畧與滑同普通三年遣使獻方物龜兹者西域之舊國也自晉度江不通至梁普通二年王尼瑞摩珠那勝遣使奉表貢獻于闐者西域之舊國也梁天監九年始通江左遣使獻方物十三年又獻波羅婆歩障十八年又獻琉璃甖大同七年又獻外國刻玉佛渴盤陁國于闐西小國也西隣滑國南接罽賔國北連沙勒國都在山谷中城周回十餘里國有十二城風俗與于闐相類衣吉貝布着長身小袖袍小口袴地宜小麥資以為糧多牛馬駱駝羊等出好氈王姓葛沙氏梁中大同七年始通江左遣獻方物末國漢世且末國也勝兵萬餘戸北與丁零東與白題西與波斯接土人剪髮著氈帽小袖衣為衫則開頸而縫前多牛羊騾驢其王安末深盤梁普通五年始通江左遣使來貢獻波斯國其先有波斯匿王者子孫以王父字為氏因為國號國有城周回三十二里城髙四丈皆有樓觀城内屋宇數百千間城外佛寺二三百所西去城十五里有土山山非過髙其勢連接甚逺中有鷲鳥噉羊土人極以為患國中有優鉢曇花鮮華可愛出龍駒馬鹹地生珊瑚樹長一二尺亦有虎魄馬腦真珠玫瑰等國内不以為珍市買用金銀昏姻法下娉財訖女壻將數十人迎婦壻著金線錦袍師子錦袴戴天冠婦亦如之婦兄弟便來捉手付度夫婦之禮於兹永畢國西及南俱與娑羅門國北與泛慄國接梁中大通二年始通江左遣使獻佛牙北狄種類寔繁蠕蠕為族蓋匃奴之别種也魏自南遷因擅其地故無城郭隨水草畜牧以穹廬居辮髮衣錦小袖袍小口袴深雍鞾其地苦寒七月流澌亘河宋昇明中遣王洪軌使焉引之共謀魏齊建元三年洪軌始至是歳通使求并力攻魏其相國刑基祗羅回表言京房讖云卯金卒草肅應王歴觀圖緯代宋者齊又獻師子皮袴褶其國後稍侵弱永明中為丁零所破更為小國而移其居梁天監十四年遣使獻馬貂裘普通元年又遣使獻方物是後數歳一至焉大同七年又獻馬一疋金一斤其國能以術祭天而致風雪前對皎日後則泥潦横流故其戰敗莫能追及或於中夏為之則不能雨問其故蓋以㬉云論曰自晉氏南度介居江左北荒西裔隔礙莫通至於南徼東邉界壤所接洎宋元嘉撫運爰命干戈象浦之絶威震㝠海於是鞮譯相係無絶歳時以洎齊梁職貢有序及侯景之亂邉鄙日蹙陳氏基命衰微已甚救首救尾身其幾何故西賮南琛無聞竹素豈所謂有徳則來無道則去者也南史卷七十九南史卷七十九考證新羅傳梁普通二年王姓募名泰始使隨百濟獻方物泰閣本作秦倭國傳安東大將軍倭王齊建元中除武持節都督倭新羅任那加羅秦韓慕韓六國諸軍事鎮東大将軍鎮東大将軍上閣本脫去三十字今从監本豫州蠻傳西陽有巴水蘄水希水赤亭水西歸水謂之五水蘄監本訛斬今從閣本蠻所在並深岨岨監本訛屺今从閣本波斯國傳西去城十五里有土山土監本訛上今改正南史卷七十九考證
