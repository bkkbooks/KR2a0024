body:
  text: 南史卷三十七唐李延夀撰列傳第二十七沈慶之孫昭略子子文季攸弟子文秀昭從父兄攸之之從孫僧宗慤從子夬沈慶之字𢎞先吳興武康人也少有志力晉末孫恩作亂使其衆寇武康慶之未冠隨鄉族擊之屢捷由是以勇聞荒擾之後鄉邑流散慶之躬耕壟畝勤苦自立年四十未知名兄敞之為趙倫之征虜參軍監南陽郡擊蠻有功遂即真慶之徃襄陽省兄倫之見而賞之命子竟陵太守伯符板為寧逺中兵參軍竟陵蠻屢為寇慶之為設規略每擊破之伯符由此致將帥之稱永初二年慶之除殿中員外將軍又隨伯符𨽻到彦之北侵伯符病歸仍𨽻檀道濟道濟白文帝稱慶之忠謹曉兵上使領隊防東掖門稍得引接出入禁省領軍劉湛知之欲相引接謂曰卿在省年月乆逺比當相論慶之正色曰下官在省十年自應得轉不復以此仰累尋轉正員將軍及湛被収之夕上開門召慶之慶之戎服履韎縛袴入上見而驚曰卿何意乃爾急裝慶之曰夜半喚隊主不容緩服遣收吳郡太守劉斌殺之元嘉十九年雍州刺史劉道産卒羣蠻大動征西司馬朱脩之討蠻失利以慶之為建威將軍率衆助脩之失律下獄慶之専軍進討大破緣沔諸蠻後為孝武撫軍中兵參軍孝武以本號為雍州隨府西上征蠻寇屢有功還都復為廣陵王誕北中郎中兵參軍加建威將軍南濟隂太守雍州蠻又為寇慶之以將軍太守復隨王誕入沔及至襄陽率後軍中兵參軍栁元景隨郡太守宗慤等伐沔北諸山蠻大破之威震諸山羣蠻皆稽顙慶之患頭風好著狐皮帽羣蠻惡之號曰蒼頭公每見慶之軍輒畏懼曰蒼頭公已復來矣慶之引軍出前後破降甚衆又討犬羊諸山蠻緣險築重城施門櫓甚峻慶之連營山下營中開門相通又令諸軍各穿池於營内朝夕不外汲兼以防蠻之火頃之風甚蠻夜下山人提一炬燒營火至輒以池水灌滅之蠻被圍守日久並飢乏自後稍出歸降慶之前後所獲蠻並移都下以為營戸二十七年遷太子歩兵校尉其年文帝將北侵慶之諌曰道濟再行無功彦之失利而反今料王𤣥謨等未踰兩將恐重辱王師上曰王師再屈别有所由道濟養寇自資彦之中塗疾動虜所恃唯馬夏水浩大泛舟濟河碻磝必走滑䑓小戍易可覆㧞剋此二戍館榖弔人虎牢洛陽自然不固慶之固陳不可時丹陽尹徐湛之吏部尚書江湛並在坐上使湛之等難慶之慶之曰為國譬如家耕當問奴織當訪婢陛下今欲伐國而與白面書生輩謀之事何由濟上大笑及軍行慶之副𤣥謨𤣥謨進圍滑䑓慶之與蕭斌留守碻磝仍領斌輔國司馬𤣥謨攻滑䑓積旬不㧞魏太武大軍南向斌遣慶之將五千人救𤣥謨慶之曰少軍輕徃必無益也㑹𤣥謨退還斌將斬之慶之諫乃止蕭斌以前驅敗績欲絶死固碻磝慶之以為不可㑹制使至不許退諸將並宜留斌復問計於慶之慶之曰閫外之事將所得専制從逺來事勢已異節下有一范增而不能用空議何施斌及坐者並笑曰沈公乃更學問慶之厲聲曰衆人雖見古今不如下官耳學也𤣥謨自以退敗求戍碻磝斌乃還歴城申坦垣䕶之共據清口慶之奔驛馳歸二十九年師復行慶之固諌不從以立議不同不使北出是時亡命司馬黒石廬江叛吏夏侯方進在西陽五水讙動羣蠻自淮汝間至江沔咸離其患乃遣慶之督諸將討之制江豫荆雍並遣軍受慶之節度三十年孝武出次五洲總統羣帥慶之從巴水出至五洲諮受軍略㑹孝武典籖董元嗣自建鄴還陳元凶弑逆孝武遣慶之引諸軍慶之謂腹心曰蕭斌婦人不足數其餘將帥並易與耳今輔順討逆不憂不濟也時元凶密與慶之書令殺孝武慶之入求見孝武稱疾不敢見慶之突前以元凶手書呈簡孝武泣求入内與母辭慶之曰下官受先帝厚恩常願報徳今日之事唯力是視殿下是何疑之深帝起再拜曰家國安危在於將軍慶之即勒内外處分府主簿顔竣聞慶之至馳入見帝曰今四方尚未知義師之舉而劭據有天府首尾不相應赴此危道也宜待諸鎮唇齒然後舉事慶之厲聲曰今方興大事而黄頭小兒皆參預此禍至矣宜斬以徇衆帝曰竣何不拜謝竣起再拜慶之曰君但當知筆札之事於是處分旬日内外整辦時皆謂神兵百姓欣悦衆軍既集假慶之為武昌内史領府司馬孝武至尋陽慶之及栁元景等並勸即大位不許賊劭遣慶之門生錢無忌齎書說慶之觧甲慶之執無忌白之孝武踐阼以慶之為領軍將軍尋出為南兖州刺史加都督鎮盱台封南昌縣公孝建元年魯爽反遣慶之與薛安都等徃討之安都臨陣斬爽進慶之號鎮北大將軍尋與柳元景俱開府儀同三司固辭改封始興郡公慶之以年滿七十固請辭事以為侍中左光祿大夫開府儀同三司固讓乃至稽顙自陳言輒泣涕上不能奪聼以郡公罷就第月給錢十萬米百斛二衛史五十人大明三年司空竟陵王誕據廣陵反復以慶之為車騎大將軍開府儀同三司固讓南兖州刺史加都督率聚討之誕遣客沈道愍齎書說慶之餉以玉環刀慶之遣道愍反數以罪惡慶之至城下誕登樓謂曰沈公君白首之年何為來此慶之曰朝廷以君狂愚不足勞少壯故使僕來耳慶之塞壍造攻道立行樓土山并諸攻具時夏雨不得攻城上使御史中丞庾徽之奏免慶之官以激之制無所問誕餉慶之食提挈者百餘人慶之不開悉焚之誕於城上投函表令慶之為送慶之曰我奉制討賊不得為汝送表每攻城慶之輒身先士卒上戒之曰卿為統任當令處分有方何須身受矢石邪自四月至七月乃屠城斬誕進慶之司空又固讓爵於是與柳元景並依晉密陵侯鄭袤故事朝㑹慶之位次司空元景在從公之上給䘏吏五十人門施行馬初慶之甞夢引鹵簿入厠中慶之甚惡入厠之鄙時有善占夢者為觧之曰君必大富貴然未在旦夕問其故答云鹵簿固是富貴容厠中所謂後帝也知君富貴不在今主及中興之功自五校至是而登三事四年西陽五水蠻復為宼慶之以郡公統諸軍討平之慶之居清明門外有宅四所室宇甚麗又有園舍在婁湖慶之一夜攜子孫徙居之以宅還官悉移親戚中表於婁湖列門同閈焉廣開田園之業每指地語人曰錢盡在此中興身享大國家素富厚産業累萬金奴僮千計再獻錢千萬榖萬斛以始興封優近求改封南海郡不許妓妾十數人並羙容工藝慶之優游無事盡意歡愉自非朝賀不出門毎從游幸及校獵據鞍陵厲不異少壯太子妃上孝武金鏤匕筯及杅杓上以賜慶之曰觴酌之賜宜以大夫為先也上甞歡飲普令羣臣賦詩慶之粗有口辯手不知書每將署事輒恨眼不識字上逼令作詩慶之曰臣不知書請口授師伯上即令顔師伯執筆慶之口授之曰微生遇多幸得逢時運昌朽老筋力盡徒歩還南岡辭榮此聖世何愧張子房上甚悅衆坐並稱其辭意之羙孝武晏駕慶之與柳元景等並受顧命遺制若有大軍旅及征討悉委慶之前廢帝即位加慶之几杖給三望車一乘慶之每朝賀常乘猪鼻無幰車左右從者不過三五騎履行田園每農桑劇月無人從行遇之者不知三公也及加三望車謂人曰我每游履田園有人時與馬成三無人則與馬成二今乘此車安所之乎及賜几杖並固讓柳元景顔師伯甞詣慶之會其游田元景等鳴笳列卒滿道慶之獨與左右一人在田見之悄然改容曰夫貧賤不可居富貴亦難守吾與諸公並出貧賤因時際會榮貴至此唯當共思損挹之事老子八十之年目見成敗者已多諸君炫此車服欲何為乎於是揷杖而耘不為之顧元景等徹侍褰裳從之慶之乃與相對為歡慶之既通貴鄉里老舊素輕慶之者後見皆膝行而前慶之歎曰故是昔時沈公視諸沈為劫首者數十人士悉患之慶之詭為置酒大㑹一時殺之於是合境肅清人皆喜悅廢帝狂悖無道衆勸之廢立及柳元景等連謀以告慶之慶之與江夏王義恭不厚發其事帝誅義恭元景等以慶之為侍中太尉及義陽王昶反慶之從帝渡江總統衆軍帝凶暴日甚慶之猶盡言諫争帝意稍不悦及誅何邁慮慶之不同量其必至乃開清溪諸橋以絶之慶之果徃不得度而還帝又忌之乃遣其從子攸之齎藥賜死時年八十是嵗旦慶之夢有人以兩疋絹與之謂曰此絹足度寤而謂人曰老子今年不免矣兩疋八十尺也足度無盈餘矣及死贈賻甚厚遣贈侍中太尉如故給鸞輅輼輬車前後羽葆皷吹諡曰忠武公未及葬帝敗明帝即位追贈侍中司空諡曰襄公太始七年改封蒼梧郡公慶之羣從姻戚由慶之在列位者數十人長子文叔位侍中慶之之死也不肯飲藥攸之以被掩殺之文叔密取藥藏錄或勸文叔逃避文叔見帝斷截江夏王義恭支體慮奔亡之日帝怒容致義恭之變乃飲藥自殺文叔子昭明位祕書郎聞父死曰何忍獨生亦自縊死元徽元年還復先封時改始興為廣興昭明子曇亮襲廣興郡公齊受禪國除昭明弟昭略昭略字茂隆性狂儁不事公卿使酒杖氣無所推下甞醉晚日負杖攜家賔子弟至婁湖苑逢王景文子約張目視之曰汝是王約耶何乃肥而癡約曰汝沈昭略邪何乃瘦而狂昭略撫掌大笑曰瘦已勝肥狂已勝癡奈何王約奈汝癡何昇明末為相國西曹掾齊髙帝賞之及即位謂王儉曰南士中有沈昭略何職處之儉以擬前軍將軍上不欲違乃可其奏尋為中書郎累遷侍中王晏甞戯昭略曰賢叔可謂吳興僕射昭略曰家叔晚登僕射猶賢於尊君以卿為初蔭永元中與叔父文季俱被召入華林省茹法珍等進藥酒昭略怒罵徐孝嗣曰廢昏立明古今令典宰相無才致有今日以甌投其面曰使為破靣鬼死時言笑自若了無懼容徐孝嗣謂曰見卿使人想夏侯泰初答曰明府猶憶夏侯便是方寸不能都豁下官見龍逢比干欣然相對霍光脫問明府今日之事何辭答之邪昭略弟昭光聞收兵至家人勸逃去昭光不忍捨母入執母手悲泣遂見殺時昭明子曇亮已得逃去聞昭光死乃曰家門屠滅獨用生何為又絶吭而死時人歎其累世孝義中興元年贈昭略太常昭光廷尉文季字仲達文叔弟也以寛雅正直見知尤善塞及彈碁在宋封山陽縣五等伯位中書郎父慶之遇害諸子見收文叔謂之曰我能死爾能報遂自殺文季揮刀馳馬去收者不敢追遂免明帝立為黄門郎領長水校尉明帝宴㑹朝臣以南臺御史賀咸為柱下史糾不醉者文季不肯飲被驅下殿晉平王休祐為南徐州帝就褚彦回求幹事人為上佐彦回舉文季轉驃騎長史南東海太守休祐被殺雖用薨禮僚佐多不敢至文季獨徃墓展哀元徽初自祕書監出為吳興太守文季飲酒至五斗妻王氏飲亦至三斗甞對飲竟日而視事不廢昇明元年沈攸之反齊髙帝加文季冠軍將軍督吳興錢唐軍事初慶之死也攸之求行至是文季收攸之弟新安太守登之誅其宗族以復舊怨親黨無吹火焉君子以文季能報先恥齊國建為侍中領祕書監建元元年轉太子右衛率侍中如故改封西豐縣侯文季風采稜岸善於進止司徒褚彦回當時貴望頗以門戸裁之文季不為之屈武帝在東官於𤣥圃宴朝臣文季數舉酒勸彦回彦回甚不平啓武帝曰沈文季謂彦回經為其郡依然猶有故情文季曰惟桑與梓必恭敬止豈如明府亡國失土不識枌榆遂言及魏軍動事彦回曰陳顯達沈文季當今將略足委以邊事文季諱稱將門因是發怒啓武帝曰褚彦回遂品藻人流臣未知其身死之日何面目見宋明帝武帝笑曰沈率醉也中丞劉休舉其事見原後豫章王北宅後堂集㑹文季與彦回並善􅀢琶酒闌彦回取樂器為明君曲文季便下席大唱曰沈文季不能作伎兒豫章王嶷又解之曰此故當不損仲容之徳彦回顔色無異終曲而止永明中累遷領軍將軍文季雖不學發言必有辭采武帝謂文季曰南士無僕射多厯年所文季對曰南風不競非復一日當世善其對明帝輔政欲以文季為江州遣左右單景儁宣㫖文季陳讓稱老不願外出因問右執法有人未景儁還具言之延興元年以為尚書右僕射明帝即位加領太子詹事尚書令王晏甞戯文季為吳興僕射文季答曰琅邪執法似不出卿門建武二年魏軍南伐明帝以為憂制文季鎮夀春文季入城門嚴加備守魏軍尋退百姓無所損永元元年轉侍中左僕射始安王遥光反其夜遣於宅掩取文季欲以為都督而文季已還臺明日與尚書令徐孝嗣共坐南掖門上時東昏已行殺戮孝嗣深懐憂慮欲與文季論時事文季輒引以佗辭終不得及事寧加鎮軍將軍署府史文季以時方昏亂託老疾不豫朝機兄子昭略謂文季曰阿父年六十為員外僕射欲求免乎文季笑而不答未幾見害先被召便知敗舉動如常登車顧曰此行恐徃而不返於華林省死年五十八朝野寃之中興元年贈司空諡曰忠憲公文秀字仲逺慶之弟子也父邵之南中郎行參軍文秀宋前廢帝時累遷青州刺史將之鎮部曲出次白下文秀說慶之以帝狂悖禍在難測欲因此衆力圖之慶之不從及行慶之果見殺又遣直閤江方興領兵誅文秀未至而明帝已定亂時晉安王子勛據尋陽文秀與徐州刺史薛安都並同子勛反尋陽平定明帝遣其弟召之便歸命請罪即安本任四年封新城縣侯先是冀州刺史崔道固亦據歴城同反文秀遣信引魏魏遣慕容白曜援之及至而文秀已受朝命文秀善於撫御被魏圍三載無叛者五年為魏所剋終于北攸之字仲達慶之從父兄子也父叔仁為宋衡陽王義季征西長史兼行參軍領隊攸之少孤貧元嘉二十七年魏軍南攻朝廷發三吳之衆攸之亦行及至建業詣領軍將軍劉遵考求補白丁隊主遵考以為形陋不堪攸之歎曰昔孟甞君身長六尺為齊相今求士取肥大者哉因隨慶之征討二十九年征西陽蠻始補隊主巴口建義授南中郎府板長兼行參軍新亭之戰身被重創事寧為太尉行參軍封平洛縣五等侯隨府轉大司馬行參軍晉時都下二岸揚州舊置都部從事分掌二縣非違永初以後罷省孝建三年復置其職攸之掌北岸㑹稽孔璪掌南岸後又罷攸之遷員外散騎侍郎又隨慶之征廣陵屢有功被箭破骨孝武以其善戰配以仇池歩矟事平當加厚賞為慶之所抑遷太子旅賁中郎攸之甚恨之前廢帝景和元年除豫章王子尚車騎中兵參軍直閤與宋越譚金等並為廢帝所寵誅戮羣公攸之等皆為之用命封東興縣侯明帝即位以例削封尋告宋越譚金等謀反復召直閤㑹四方反叛南賊已次近道以攸之為寧朔將軍尋陽太守率軍據虎檻時王𤣥謨為大統未發前鋒有五軍在虎檻五軍後又駱驛繼至每夜各立姓號不相稟受攸之謂軍吏曰今衆軍同舉而姓號不同若有耕夫漁父夜相呵叱便致駭亂此敗道也請就一軍取號衆咸從之殷孝祖為前鋒都督失夫人情攸之内撫將士外諧羣帥衆並安之時殷孝祖中流矢死軍主范潜率五百人投賊人情震駭並謂攸之宜代孝祖為統時建安王休仁屯虎檻總統衆軍聞孝祖死遣寧朔將軍江方興龍驤將軍劉靈遺各率三千人赴赭圻攸之以為孝祖既死賊有乘勝之心明日若不更攻則示之以弱方興名位相亞必不為己下軍政不一致敗之由乃率諸軍主詣方興推重幷慰勉之方興甚悅攸之既出諸軍主並尤之攸之曰卿忘廉藺宼賈事邪吾本以濟國活家豈計此之升降明旦進戰自寅訖午大敗賊于赭圻尋進號輔國將軍代孝祖督前鋒諸軍事薛常保等在赭圻食盡南賊大帥劉胡屯濃湖以囊盛米繫流查及船腹陽覆船順風流下以餉赭圻攸之疑其有異遣人取船及流查大得囊米尋剋赭圻遷寧蠻校尉雍州刺史加都督袁顗復率大衆來入鵲尾相持既久軍主張興世越鵲尾上據錢溪劉胡自攻之攸之率諸將攻濃湖錢溪信至大破賊攸之悉以錢溪所送胡軍耳鼻示之顗駭懼急追胡還攸之諸軍悉力進攻多所斬獲胡於是棄衆而奔顗亦奔走赭圻濃湖之平也賊軍委棄資財珍貨山積諸軍各競収歛唯攸之張興世約勒所部不犯毫芥諸將以此多之攸之進平尋陽遷中領軍封貞陽縣公時劉遵考為光祿大夫攸之在御坐謂遵考曰形陋之人今何如帝問之攸之依實對帝大笑累遷郢州刺史為政刻暴或鞭士大夫上佐以下有忤意輒面加詈辱而曉達吏事自强不息士庶畏憚人莫敢欺聞有猛獸輒自圍捕徃無不得一日或得兩三若逼暮不禽則宿昔圍守賦歛嚴苦徴發無度繕修船舸營造器甲自至夏口便有異圖進監豫司之二郡軍事進號鎮軍將軍泰豫元年明帝崩攸之與蔡興宗並在外藩同預顧命㑹巴西人李承明反蜀土搔擾時荆州刺史建平王景素被徴新除荆州刺史蔡興宗未之鎮乃遣攸之權行荆州事㑹承明已平乃以攸之為鎮西將軍荆州刺史加都督聚歛兵力養馬至二千餘匹皆分賦邏將士使耕田而食廩財悉充倉儲荆州作部嵗送數千人仗攸之割留之簿上云供討四山蠻裝戰艦數百千艘沉之靈溪裹錢帛器械巨積漸懐不臣之心朝廷制度無所遵奉富貴擬於王者夜中諸廂廊然燭達旦後房服珠玉者數百人皆一時絶貌江州刺史桂陽王休範密有異志欲以微㫖動攸之使道士陳公昭作天公書一函題言沈丞相送攸之門者攸之不開書推檢得公昭送之朝廷後廢帝元徽二年休範舉兵襲都攸之謂僚佐曰桂陽今逼朝廷必聲言吾與之同若不顛沛勤王必增朝野之惑於是遣使受郢州刺史晉熙王爕節度會休範平使乃還進號征西大將軍開府儀同三司固讓開府攸之自擅閫外朝廷疑憚之累欲徵入慮不受命乃止四年建平王景素據京城反攸之復應朝廷景素尋平時有䑓直閣髙道慶家在江陵攸之初至州道慶在家牒其親戚十餘人求州從事西曹攸之為用三人道慶大怒自入州取教毁之而去道慶素便馬攸之與宴飲於㕔事前合馬槊道慶槊中攸之馬鞍怒索刃槊道慶馳馬而出還都說攸之反狀請三千人襲之朝議慮其事難濟髙帝又保持不許楊運長等常相疑畏乃與道慶密遣刺客齎廢帝手詔以金餅賜攸之州府佐吏進其階級時有象三頭至江陵城北數里攸之自出格殺之忽有流矢集攸之馬鄣泥其後刺客事發廢帝既殞順帝即位加攸之車騎大將軍開府儀同三司齊髙帝遣攸之子司徒左長史元琰齎廢帝刳斮之具以示之攸之曰吾寧為王陵死不作賈充生尚未得即起兵乃上表稱慶幷與齊髙帝書推功攸之有素書十數行常韜在兩襠角云是宋明帝與己約誓又皇太后使至賜攸之燭十挺割之得太后手令曰國家之事一以委公明日遂舉兵其妾崔氏許氏諫曰官年已老那不為百口作計攸之指兩襠角示之攸之素畜士馬資用豐積至是戰士十萬鐡馬三千將發江陵使沙門釋僧粲筮之云不至都當自郢州回還意甚不悦初發江津有氣狀如塵霧從西北來正蓋軍上齊髙帝遣衆軍西討攸之盡銳攻郢州行事柳世隆屢破之昇明二年還向江陵未至城已為雍州刺史張敬兒所據無所歸乃與第三子中書侍郎文和至華容之􅀈頭林投州吏家此吏甞為攸之所鞭待攸之甚厚不以徃罰為怨殺㹠薦食既而村人欲取之攸之於櫟林與文和俱自經死村人斬首送之都或割其腹心有五竅征西主簿茍昭先以家財葬攸之攸之晚好讀書手不釋卷史漢事多所記憶甞歎曰早知窮達有命恨不十年讀書及攻郢城夜甞風浪米船沉沒倉曹參軍崔靈鳳女先適柳世隆子攸之正色謂曰當今軍糧要急而卿不以在意由與城内婚姻邪靈鳳答曰樂廣有言下官豈以五男易一女攸之歡然意解攸之招集才力之士隨郡人雙泰真有幹力召不肯來攸之遣二十人被甲追之泰真射殺數人欲過家將母去事迫不獲單身走入蠻追者既失之錄其母去泰真既失母乃自歸攸之不罪曰此孝子也賜錢一萬轉補隊主其抑情待士如此初攸之賤時與吳郡孫超之全景文共乘一小船出都三人共上引埭有一人止而相之曰君三人皆當至方伯攸之曰豈有是事相者曰不驗便是相書誤耳後攸之為郢荆三州超之廣州刺史景文南豫州刺史景文字𢎞達齊永明中卒於光祿大夫攸之初至郢州有順流之志府主簿宗儼之勸攻郢城功曹臧寅以為攻守勢異非旬日所拔若不時舉挫銳損威攸之不從既敗諸將帥皆奔散或呼寅俱亡寅曰我委質事人豈可幸其成而責其敗乃投水死又倉曹參軍金城邊榮為府錄事所辱攸之為榮鞭殺錄事攸之自江陵下以榮為留府司馬守城張敬兒將至人或說之使詣敬兒降榮曰受沈公厚恩一朝緩急便改易本心不能也城敗見敬兒敬兒問曰邊公何為同人作賊不早來榮曰沈荆州舉義兵匡社稷身雖可滅要是宋世忠臣天下尚有直言之士不可謂之為賊身本不蘄生何須見問敬兒曰死何難命斬之榮歡笑而去容無異色太山程邕之者素依隨榮至是抱持榮謂敬兒曰君入人國不聞仁恵之聲而先戮義士三楚之人寧蹈江漢而死豈肯與將軍同日以生敬兒曰求死甚易何為不許先殺邕之然後及榮三軍莫不垂泣曰奈何一日殺二義士比之臧洪及陳容廢帝之殞攸之欲起兵問之星人葛珂之珂之曰起兵皆候太白太白見則成伏則敗昔桂陽以太白伏時舉兵一戰授首此近世明驗今蕭公廢昏立明正逢太白伏時此與天合也且太白尋出東方利用兵西方不利故攸之止不下及後舉兵珂之又曰今嵗星守南斗其國不可伐攸之不從果敗攸之表檄文疏皆其記室南陽宗儼之辭也事敗責之答曰士為知己豈為君輩所識遂伏誅攸之景和中與齊髙帝同直殿省申以歡好帝以長女義興憲公主妻攸之第三子文和生二女並養之宫中恩禮甚厚及嫁皆得素舊公家營遣焉齊武帝制以攸之弟雍之孫僧昭為義興公主後僧昭别名法朗少事天師道士常以甲子及甲午日夜著黄巾衣褐醮於私室時記人吉凶頗有應驗自云為太山錄事幽司中有所收錄必僧昭署名中年為山隂縣梁武陵王紀為㑹稽太守宴坐池亭蛙鳴聒耳王曰殊廢絲竹之聴僧昭呪厭十許口便息及日晚王又曰欲其復鳴僧昭曰王歡已闌今恣汝鳴即便喧聒又甞校獵中道而還左右問其故答曰國家有邊事須還處分問何以知之曰向聞南山虎嘯知耳俄而使至復謂人曰吾昔為幽司所使實為煩碎今已自解乃開匣出黄紙書上有一大字字不可識曰敎分判如此及太清初謂親知曰明年海内喪亂生靈十不一存乃苦求東歸既不獲許及亂百口皆殱僧昭位廷尉卿太清三年卒宗慤字元幹南陽湼陽人也叔父少文髙尚不仕慤年少問其所志慤答曰願乘長風破萬里浪少文曰汝若不富貴必破我門戸兄泌娶妻始入門夜被劫慤年十四挺身與劫相拒十餘人皆披散不得入室時天下無事士人並以文義為業少文既髙尚諸子羣從皆愛好墳典而慤任氣好武故不為鄉曲所知江夏王義恭為征北將軍南兖州刺史慤隨鎮廣陵時從兄綺為征北府主簿與慤同住綺妾與給吏牛泰私通綺入直而泰潜來就綺妾慤知之入殺牛泰然後白綺義恭壯其意不罪也後以補國上軍將軍元嘉二十二年伐林邑慤自奮願行義恭舉慤有膽勇乃除振武將軍為安西參軍蕭景憲軍副隨交州刺史檀和之圍區粟城林邑遣將范毗沙達來救區粟和之遣偏軍拒之為賊所敗又遣慤慤乃分軍為數道偃旗潜進討破之仍攻㧞區粟入象浦林邑王范陽邁傾國來逆以具裝被象前後無際慤以為外國有獅子威服百獸乃製其形與象相禦象果驚奔衆因此潰亂遂剋林邑收其珍異皆是未名之寳其餘雜物不可稱計慤一毫無犯唯有被梳枕刷此外蕭然文帝甚嘉之三十年孝武伐逆以慤為南中郎諮議參軍領中兵及事平功次柳元景孝武即位以為左衛將軍封洮陽侯孝建中累遷豫州刺史監五州諸軍事先是鄉人庾業家富豪侈侯服玉食與賓客相對膳必方丈而為慤設粟飯菜葅謂客曰宗軍人串噉麤食慤致飽而退初無異辭至是業為慤長史帶梁郡慤待之甚厚不以昔事為嫌大明三年竟陵王誕據廣陵反慤表求赴討乘驛詣都面受節度上停輿慰勉慤聳躍數十左右顧盻上壯之及行𨽻車騎大將軍沈慶之初誕誑其衆云宗慤助我及慤至躍馬繞城呼曰我宗慤也事平入為左衛將軍五年從獵墮馬腳折不堪朝直以為光祿大夫加金章紫綬有佳牛堪進御官買不肯賣坐免官明年復先職廢帝即位為寧蠻校尉雍州刺史加都督卒贈征西將軍諡曰肅侯配食孝武廟庭子羅雲卒子元寳嗣慤從子夬字明揚祖少文名列隠逸傳父繁西中郎諮議參軍夬少勤學有局幹仕齊為驃騎行參軍時竟陵王子良集學士於西邸並見圖畫夬亦預焉齊鬱林之為南郡王居西州使夬管書記以筆札貞正見許故任焉時與魏和通𠡠夬與尚書殿中郎任昉同接魏使皆時選也及文恵太子薨王為皇太孫夬仍管書記太孫即位多失徳夬頗自疎得為秣陵令遷尚書都官郎少帝見誅舊寵多被其災唯夬與傅昭以清正免齊明帝以為郢州中從事以父老去官南康王為荆州刺史引為别駕梁武帝起兵遷西中郎諮議時西土位望唯夬與同郡樂藹劉坦為州人所推服故領軍蕭頴胄深相委仗武帝受禪歴太子右衛率五兵尚書參掌大選天監三年卒子曜卿嗣論曰沈慶之以武毅之姿屬殷憂之日馳驅戎旅所在見推其戡難定功蓋亦宋之方邵及勤王之業克舉台鼎之位已隆年致懸車官成名立而卒至顛覆倚伏豈易知也諸子才氣並有髙風將門有將斯言得矣攸之地處上流聲稱義舉専威擅命年且逾十終從諸葛之薨代徳其有數乎宗慤氣概風雲竟成其志夬蹈履清正用升顯級亦各志能之士也南史卷三十七
