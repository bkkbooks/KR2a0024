body:
  text: 南史卷四十五唐李延夀撰列傳第三十五王敬則陳顯達張敬兒崔慧景王敬則臨淮射陽人也僑居晉陵南沙縣母為女巫常謂人云敬則生時胞衣紫色應得鳴鼓角人笑之曰汝子得為人吹角可矣敬則年長而兩掖下生乳各長數寸夢騎五色獅子性倜儻不羈好刀劒嘗與既陽縣吏鬬謂曰我若得既陽縣當鞭汝小吏背吏唾其靣曰汝得既陽縣我亦得司徒公矣屠狗商販徧於三吳使於髙麗與其國女子私通因不肯還被收錄然後反善拍張補刀㦸左右宋前廢帝使敬則跳刀高出白虎幢五六尺接無不中仍撫髀拍張甚為儇㨗補侠轂隊主領細鎧左右與夀寂之殺前廢帝及明帝即位以為直閤將軍封重安縣子敬則少時於草中射獵有蟲如烏豆集其身摘去乃脱其處皆流血敬則惡之詣道士卜道士曰此封侯瑞也敬則聞之喜故出都自効後補既陽令昔日鬬吏亡叛勒令出遇之甚厚曰我已得既陽縣汝何時得司徒公邪初至既陽縣陸主山下宗侣十餘船同發敬則船獨不進乃令弟入水推之見烏漆棺敬則呪云若是吉使船速進吾富貴當改葬爾船須㬰入縣收此棺葬之時軍荒後縣有一部劫逃入山中為人患敬則遣人致意劫帥使出首當相申論郭下廟神甚酷烈百姓信之敬則引神為誓必不相負劫帥既出敬則於廟中設酒㑹於坐收縛曰吾啟神若負誓還神十牛今不得違誓即殺十牛解神并斬諸劫百姓悦之元徽三年随齊高帝拒桂陽賊於新亭敬則與羽林監陳顯達寜朔將軍高道慶乘舸迎戰大破賊水軍事寜帶南太山守右侠轂主轉越騎校尉安成王車騎參軍蒼梧王狂虐左右不自安敬則以髙帝有威名歸誠奉事每下直輒往領軍府夜著青衣扶匐道路為高帝聽察髙帝令敬則於殿内伺機及楊玉夫將首投敬則敬則馳謁髙帝乃戎服入宮至永明門門郞疑非蒼梧還敬則慮人覘見以刀環塞窐孔呼開門甚急衞尉丞顏靈寳窺見髙帝乘馬在外竊謂親人今若不開内領軍天下㑹是亂爾門開敬則随帝入殿昇明元年遷輔國將軍領臨淮太守知殿内宿衞兵事沈攸之事起進敬則冠軍將軍髙帝入守朝堂袁粲起兵召領軍劉韞直閤將軍卜伯興等於宮内相應戒嚴將發敬則開闗掩襲皆殺之殿内竊發盡平敬則之力也政事無大小帝並以委之敬則不識書止下名然甚善決斷齊臺建為中領軍髙帝將受禪材官薦易太極殿柱順帝欲避土不肯出宮遜位明日當臨軒順帝又逃宮内敬則將輿入迎帝啟譬令出引令升車順帝不肯即上收淚謂敬則曰欲見殺乎敬則荅曰出居别宫爾官先取司馬家亦復如此順帝泣而彈指唯願後身生生世世不復夭王作因緣宮内盡哭聲徹於外順帝拍敬則手曰必無過慮當餉輔國十萬錢齊建元元年出為都督南兖州刺史封尋陽郡公加敬則妻懷氏爵為尋陽國夫人二年魏軍攻淮泗敬則恐委鎭還都百姓皆驚散奔走上以其功臣不問以為都官尚書遷吳興太守郡舊多剽掠有十數歳小兒於路取遺物敬則殺之以狥自此路不拾遺郡無劫盜又錄得一偷召其親屬於前鞭之令偷身長掃街路久之乃令偷舉舊偷自代諸偷恐為所識皆逃走境内以清仍入烏程從市過見屠肉枅歎曰吳興昔無此枅是我少時在此所作也召故人飲酒説平生不以屑也遷護軍以家為府三年以改葬去職詔贈敬則母尋陽國太夫人改授侍中撫軍髙帝遺詔敬則以本官領丹陽尹尋遷㑹稽太守加都督永明二年給鼓吹一部㑹土邉帶湖海人丁無士庶皆保塘役敬則以功力有餘悉評斂為錢送臺庫以為便宜上許之三年進號征東將軍宋廣州刺史王翼之子妾路氏酷暴殺婢媵翼之子法朗告之敬則付山陰獄殺之路氏家訴為有司所奏山陰令劉岱坐棄市刑敬則入朝上謂敬則曰人命至重是誰下意殺之都不啟聞敬則曰是臣愚意臣知何物科法見背後有節便言應得殺人劉岱亦引罪上乃赦之敬則免官以公領郡後與王儉俱即本號開府儀同三司時徐孝嗣於崇禮門候儉因嘲之曰今日可謂連璧儉曰不意老子遂與韓非同傳人以告敬則敬則欣然曰我南沙縣吏徼倖得細鎧左右逮風雲以至於此遂與王衞軍同日拜三公王敬則復何恨了無恨色朝士以此多之十一年授司空敬則名位雖達不以富貴自遇初為散輩使魏於北館種楊桞後員外郞虞長曜北使還敬則問我昔種楊桞樹今若大小長曜曰虜中以為甘棠武帝令羣臣賦詩敬則曰臣幾落此奴度上問之敬則對曰臣若解書不過作尚書都令史爾那得今日敬則雖不大識書而性甚警黠臨郡令省事讀辭下敎制決皆不失理明帝輔政密有廢立意隆昌元年出敬則為㑹稽太守加都督海陵王立進位太尉明帝即位為大司馬臺使拜授日雨大洪注敬則文武皆失色一客旁曰公由來如此昔拜丹陽尹吳興時亦然敬則大悦曰我宿命應得雨乃引羽儀備朝服導引出㕔事拜受意猶不自得吐舌久之帝既多殺害敬則自以髙武舊臣心懷憂懼帝雖外厚其禮而内相疑備數訪問敬則飲食體幹聞其衰老且以扂内地故得少安後遣蕭坦之將齋仗五百人行晉陵敬則諸子在都憂怖無計上知之問計於梁武帝武帝曰敬則豎夫易為感唯應錫以子女玉帛厚其使人如斯而已上納之吳人張思祖敬則謀主也為府司馬頻銜使上偽傾意待之以為游擊將軍遣敬則世子仲雄入東仲雄善彈琴江左有蔡邕焦尾琴在主衣庫上敕五日一給仲雄仲雄在御前鼓琴作懊儂曲歌曰常歎負情儂郞今果行許又曰君行不淨心那得惡人題帝愈猜愧永泰元年帝疾屢經危殆以張瓌為平東將軍吳郡太守置兵佐密防敬則内外傳言當有處分敬則聞之竊曰東今有誰秪是欲平我耳東亦何易可平吾終不受金甖金甖謂鴆酒也諸子怖懼第五子幼隆遣正員將軍徐嶽以情告徐州行事謝朓為計若同者當往報敬則朓執嶽馳啟之敬則城局參軍徐庶家在京口其子密以報庶庶以告敬則五官王公林公林敬則族子也常所委信公林勸敬則急送啟賜兒死單舟星夜還都敬則曰若爾諸郞要應有信且忍一夕其夜呼僚佐文武摴蒱賭錢謂衆曰卿諸人欲令我作何計莫敢先荅防閤丁興懷曰官秪應作爾敬則不聲明旦召山陰令王詢臺傳御史鍾離祖願敬則横刀跂坐問詢等發丁可得幾人庫見有幾錢物詢祖願對並乖旨敬則怒將出斬之王公林又諫敬則曰官詎不更思敬則唾其靣曰小子我作事何闗汝小子乃起兵招集配衣二三日便發欲劫前中書令何𦙍還為尚書令長史王弄璋司馬張思祖止之曰何令高蹈必不從不從便應殺之舉大事先殺朝賢事必不濟及率實甲萬人過浙江謂曰應須作檄思祖曰公今自還朝何用作此乃止朝廷遣輔國將軍前軍司馬左興盛直閤將軍馬軍主胡松三千餘人築壘於曲阿長岡尚書左僕射沈文秀為持節都督屯湖頭備京口路敬則以舊將舉事百姓擔篙荷鍤随逐之十餘萬衆至武進陵口慟哭乘肩輿而前遇興盛山陽二柴盡力攻之官軍不敵欲退而圍不開各死戰胡松領馬軍突其後白丁無器仗皆驚散敬則大呌索馬再上不得上興盛軍容袁文曠斬之傳首是時上疾已篤敬則倉卒東起朝廷震懼東昏侯在東宮議欲叛使人上屋望見征虜亭失火謂敬則至急裝欲走有告敬則者敬則曰檀公三十六䇿走是上計汝父子唯應急走耳蓋譏檀道濟避魏事也敬則之來聲勢甚盛凡十日而敗時年六十四朝廷漆其首藏在武庫至梁天監元年其故吏夏侯亶表請收葬許之陳顯達南彭城人也仕宋以軍功封彭澤縣子位羽林監濮陽太守𨽻齊髙帝討桂陽賊於新亭壘劉勔大桁敗賊進杜姥宅及休範死顯達出杜姥宅大戰於宣陽津陽門大破賊矢中左目而鏃不出地黄村潘嫗善禁先以釘釘柱嫗禹歩作氣釘即出乃禁顯達目中鏃出之事平封彭城侯再遷平越中郞將廣州刺史加都督沈攸之事起顯達遣軍援臺長史到遁司馬諸葛導勸顯達保境蓄衆密通彼此顯達於坐手斬之遣表疏歸心齊髙帝帝即位拜護軍將軍後御膳不宰牲顯達上熊蒸一盤上即以充飯後拜都督益州刺史武帝即位進號鎮西將軍益部山險多不賔服大度村獠前刺史不能制顯達遣使責其租賧獠帥曰兩眼刺史尚不敢調我遂殺其使顯達分部將吏聲將出獵夜往襲之男女無少長皆斬之自此山夷震服永明二年徵為侍中䕶軍將軍顯達累任在外經高帝之憂及見武帝流涕悲咽上亦泣心甚嘉之八年為征南大將軍江州刺史顯達謙厚有智計自以人微位重每遷官常有愧懼之色子十餘人誡之曰我本意不及此汝等勿以富貴陵人家既豪富諸子與王敬則諸兒並精車牛麗服飾當世快牛稱陳世子青王三郞烏呂文顯折角江瞿曇白鼻而皆集陳舍顯達知此不悦及子休尚為郢府主簿過九江拜别顯達曰凡奢侈者鮮有不敗麈尾蠅拂是王謝家物汝不須捉此自随即取於前燒除之其静退如此豫廢欝林之勲延興元年為司空進爵為公明帝即位進太尉封鄱陽郡公加兵二百人給油絡車後以太尉判鄱陽郡公為三公事而職典連率人以為格外三公上欲悉除髙武諸孫上微言問顯達荅曰此等豈足介慮上乃止顯達建武世心懷不安深自貶退車乘朽敗導從鹵簿皆用羸小侍宴酒後啟上借枕帝令與之顯達撫枕曰臣年已老富貴已足唯少枕枕死特就陛下乞之上失色曰公醉矣以年老告退不許永泰元年乃遣顯達北侵永元元年顯達督平北將軍崔慧景衆軍四萬圍南鄉界馬圈城去襄陽三百里攻之四十日魏軍食盡噉死人肉及樹皮外圍急魏軍突走顯達入據其城遣軍主莊丘黑進取南鄉縣魏孝文帝自領十餘萬騎奄至軍主崔恭祖胡松以烏布幔盛顯達數人擔之出均水口臺軍緣道奔退死者三萬餘人顯達素有威名著於外境至是大損䘮焉御史中丞范岫奏免顯達官又表解職並不許以為江州刺史鎮彭城初王敬則事起始安王遥光啟明帝慮顯達為變欲追軍還事平乃寢顯達亦懷危怖及東昏立彌不樂還都得此授甚喜尋加領征南大將軍給三望車顯達聞都下大相殺戮徐孝嗣等皆死傳聞當遣兵襲江州顯達懼禍十一月十五日舉兵欲直襲建業以掩不備又遥指郢州刺史建安王寳寅為主朝廷遣後軍將軍胡松等據梁山顯達率衆數千人發尋陽與松戰於采石大破之都下震恐十二月潛軍度取石頭北上襲城宮掖大駭閉門守備顯達馬矟從歩軍數百人於西州前與臺軍戰再合大勝矟折手猶殺十餘人官軍繼至顯達不能抗退走至西州後烏榜村騎官趙潭注矟刺落馬斬之籬側血涌湔籬似淳于伯之被刑時年七十三顯達在江州遇疾不療之而差意甚不悦是時連冬大雪梟首朱雀而雪不集諸子皆伏誅張敬兒南陽冠軍人也父醜為郡將軍官至節府參軍敬兒年少便弓馬有膽氣好射猛獸發無不中南陽新野風俗出騎射而敬兒尤多膂力稍宦至寜蠻行參軍随郡人劉胡伐襄陽諸山蠻深入險阻所向皆破又擊胡陽蠻官軍引退敬兒單馬在後賊不能抗山陽王休祐鎮夀陽求善騎射士敬兒及襄陽俞湛應選敬兒善事人遂見寵為長兼行參軍泰始初随府轉驃騎參軍署中兵領軍討義嘉賊與劉胡相拒於鵲尾洲啟明帝乞本郡事平除南陽太守敬兒之為襄陽府將也家貧每休假輒傭賃自給嘗為城東吳泰家擔水通泰所愛婢事發將被泰殺逃賣棺材中以蓋加上乃免及在鵲尾洲啟明帝云泰以絲助雍州刺史袁覬為弩弦黨同逆若事平之日乞其家財帝許之至是收籍吳氏唯家人倮身得出僮役財貨直數千萬敬兒皆有之先所通婢即以為妾後為越騎校尉桂陽王事起隸齊髙帝頓新亭賊矢石既交休範白服乘輿勞樓下敬兒與黄囘白髙帝求詐降以取之髙帝曰卿若辦事當以本州相賞敬兒相與出城南放仗走大呼稱降休範喜召至輿側囘陽致髙帝密意休範信之囘目敬兒敬兒奪取休範防身刀斬之其左右百人皆散敬兒持首歸新亭除驍騎將軍加輔國將軍髙帝置酒謂敬兒曰非卿之功無今日安帝以敬兒人位既輕不欲使便為襄陽重鎭敬兒求之不已乃微動髙帝曰沈攸之在荆州公知其欲何所作不出敬兒以防之恐非公之利也帝笑而無言乃除雍州刺史加都督封襄縣侯部泊沔口敬兒乘舴艋過江詣晉熙王燮中江遇風船覆左右丁壯者各泅水走餘二小史沒船下求敬兒救敬兒兩掖挟之随船仰得在水上如此翻覆行數十里方得迎接失所持節更給之至鎮厚結攸之得其事迹密白髙帝終無二心又與攸之司馬劉攘兵情欵及蒼梧廢敬兒疑攸之當因此起兵密問攘兵所言寄敬兒馬鐙一隻敬兒乃為備昇明元年冬攸之乃遣使報敬兒勞接周至為設食訖列仗於㕔事前斬之集部曲頓攸之下當襲江陵敬兒告變使至髙帝大喜進號鎭軍將軍改督攸之至郢城敗走其子元琰與兼長史江乂别駕傅宣等還江陸敬兒軍至白水元琰聞城外鶴唳謂是呌聲恐懼欲走其夜乂宣開門出奔城潰元琰奔寵洲見殺敬兒至江陵誅攸之親黨沒入其財物數千萬善者悉以入私送臺者百不一焉攸之於湯渚村自經死居人送首荆州敬兒使楯擎之蓋以青繖狥諸市郭乃送建業進爵為公敬兒在雍州貪殘人間一物堪用莫不奪取於襄陽城西起宅聚物貨宅大小殆侔襄陽又欲移羊叔子堕淚碑於其處置臺綱紀諫曰此羊太傅遺德不宜遷動敬兒曰太傅是誰我不識及齊受禪轉侍中中軍將軍遷散騎常侍車騎將軍置佐史髙帝崩遺詔加開府儀同三司於家竊泣曰官家大老天子可惜太子年少向我所不及也及拜王敬則戲之呼為褚彦囘敬兒曰我馬上所得終不能作華林閤勲也敬則甚恨焉初敬兒微時有妻毛氏生子道門而鄉里尚氏女有色貌敬兒悦之遂棄毛氏而納尚氏為室及居三司尚氏猶居襄陽宅慮不復外出乃迎家口悉下至都啟武帝不蒙勞問敬兒心自疑及垣崇祖死愈恐懼性好卜術信夢尤甚初征荆州每見諸將帥不遑有餘計唯敘夣云未貴時夢居村中社樹歘髙數十丈及在雍州又夢社樹直上至天以此誘説部曲自云貴不可言由是不自測量無知又使於鄉里為謡言使小兒輩歌曰天子在何處宅在赤谷口天子是阿誰非猪如是狗敬兒家在冠軍宅前有地名赤谷既得開府又望班劒語人曰我車邉猶少班蘭物敬兒長自荒逺少習武事既從容都下又四方寧靖益不得志其妻尚氏亦曰吾昔夢一手熱如火而君得南陽郡元徽中夢一髀熱如火君得本州建元中夢半體熱尋得開府今復舉體熱矣以告所親言其妻初夢次夢又言今舉體熱矣閹人聞其言説之事達武帝敬兒又遣使與蠻中交關武帝疑有異志永眀元年敕朝臣華林八關齋於坐收敬兒初左右雷仲顯常以盈滿誠敬兒不能從至是知有變抱敬兒泣敬兒脱冠貂投地曰用此物誤我及子道門道暢道休並伏誅少子道慶見宥後數年上與豫章王嶷三日曲水内宴舴艋船流至御坐前覆沒上由是言及敬兒悔殺之敬兒始不識書及為方伯乃習學讀孝經論語初徵為護軍乃潛於密室中屏人學揖讓答對空中俯仰妾侍竊窺笑焉將拜三司謂其妻嫂曰我拜後府開黄閣因口自為鼓聲初得鼓吹羞便奏之又於新林姥廟為妾祈子祝神口自稱三公其鄙俚如此始其母於田中臥夢犬子有角䑛之已而有娠而生敬兒故初名狗兒又生一子因狗兒之名復名猪兒宋明帝嫌狗兒名鄙改為敬兒故猪兒亦改為恭兒位正員郞謝病歸本縣常居上保村不肯出仕與居人不異與敬兒愛友甚篤及聞敬兒敗走入蠻後首出原其罪崔慧景字君山清河東武城人也祖構奉朝請父系之州别駕慧景少有志業仕宋為長水校尉齊髙帝在淮陰慧景與宗人祖思同時自結及髙帝受禪封樂安縣子為都督梁南秦二州刺史永明四年為司州刺史母䘮詔起復本任慧景每罷州輒傾資獻奉動數百萬武帝以此嘉之十年為都督豫州刺史􅉱林即位慧景以少主新立密與魏通朝廷疑之明帝輔政遣梁武帝至夀春安慰之慧景密啟送誠勸進建武四年為度支尚書領太子左率東昏即位為䕶軍時輔國將軍徐世標專權號令慧景備員而已帝既誅戮將相舊臣皆盡慧景自以年宿位重轉不自安及裴叔業以夀陽降魏即授慧景平西將軍假節侍中䕶軍如故率軍水路征夀陽軍頓白下將發帝長圍屏除出琅邪城送之帝戎服坐樓上召慧景騎進圍内無一人自随裁交數言拜辭而去慧景出至白下甚喜曰頸非復小豎等所折也子覺為直閤將軍慧景密與之期時江夏王寳𤣥鎭京口聞慧景北行遣左右余文興説之曰朝廷任用羣小猜害忠賢江劉徐沈君之所見身雖魯衛亦不知滅亡何時君今段之舉有功亦死無功亦死欲何求所免機不可失今擁彊兵北取廣陵收吳楚勁卒身舉州以相應取大功如反掌耳慧景常不自安聞言響應於時廬陵王長史蕭寅司馬崔恭祖守廣陵城慧景以寳𤣥事告恭祖恭祖先無宿契口雖相和心實不同還以事告寅共為閉城計寅心謂恭祖與慧景同謂曰廢昏立明人情所樂寧可違拒恭祖猶執不同俄而慧景至恭祖閉門不敢出慧景知其異已泣數行而去中兵參軍張慶延明巖卿等勸慧景襲取廣陵及密遣軍主劉靈運間行突入慧景俄係至遂據其城子覺至仍使領兵襲京口寳𤣥本謂大軍併來及見人少極失所望拒覺擊走之恭祖及覺精兵八千濟江恭祖心本不同及至䔉山欲斬覺以軍降京口事既不果而止覺等軍器精嚴桞燈沈佚等謂寳𤣥曰崔䕶軍威名既重乃誠可見既已脣齒忽中道立異彼以樂歸之衆亂江而濟誰能拒之於是登北固樓並千蠟燭為烽火舉以應覺帝聞變以右衞將軍左興盛假節督都下水陸衆軍慧景停二日便率大衆一時俱濟江趣京口寳𤣥仍以覺為前鋒恭祖次之慧景領大都督為衆軍節度東府石頭白下新亭諸城皆潰左興盛走不得入宮逃淮渚荻船中慧景擒殺之慧景稱宣德皇后令廢帝為吳王時栁燈别推寳𤣥恭祖為寳𤣥羽翼不復承奉慧景嫌之巴陵王昭胄先逃人間出投慧景意更向之故猶豫未知所立此聲頗泄燈恭祖始貳於慧景又恭祖勸慧景射火箭燒北掖樓慧景以大事垂定後若更造費用功多不從其計性好談義兼解佛理頓法輪寺對客髙談恭祖深懐怨望先是衞尉蕭懿為豫州刺史自厯陽歩道征壽陽帝遣密使告之懿率軍主胡松李居士等自采石濟岸頓越城舉火臺城中鼓呌稱慶恭祖先勸慧景遣二千人斷西岸軍令不得度慧景以城旦夕降外救自然應散不許恭祖請擊義師又不許乃遣子覺將精甲數千人度南岸義師昧旦進戰覺大敗慧景人情離沮恭祖頓軍興皇寺於東宮掠得女妓覺來逼奪由是忿恨其夜崔恭祖與驍騎劉靈運詣城降慧景乃將腹心數人潛去欲北度江城北諸軍不知猶為拒戰城内出盪殺數百人慧景餘衆皆奔慧景圍城凡十二日軍旅散在都下不為營壘及走衆於道稍散單馬至蟹浦投漁人太叔榮之榮之故為慧景門人時為蟹浦戍謂之曰吾以樂賜汝汝為吾覓酒既而為榮之所斬以頭内鰌籃中擔送都恭祖者慧景宗人驍果便馬矟氣力絶人頻經軍陣討王敬則與左興盛軍容袁文曠爭敬則首訴明帝曰恭祖秃焉綘衫手刺倒敬則故文曠得斬其首以死易勲而見枉奪若失此勲要當刺殺左興盛帝以其勇健謂興盛曰何容令恭祖與文曠爭功慧景平後恭祖繋尚方少時殺之覺亡命為道人見執伏法覺弟偃年十八便身長八尺博渉書記善蟲篆為始安内史藏竄得免和帝西臺立以為寧朔將軍中興元年詣公車尚書申冤言多指斥尋下獄死先是東陽女子婁逞變服詐為丈夫粗知圍棊觧文義徧游公卿仕至揚州議曹從事事發明帝驅令還東逞始作婦人服而去歎曰如此伎還之為老嫗豈不惜哉此人妖也隂而欲為陽事不果故泄敬則遙光顯達慧景之應也舊史裴叔業有傳事終於魏今畧之云論曰光武功臣所以能終身名者豈唯不任職事亦以繼奉章明心存正嫡王陳拔迹奮飛則建元永明之運身極鼎將則建武永元之朝勲非往時位踰昔等禮授雖重情分不交加以主猜政亂危亡慮及舉手扞頭人思自免干戈既用誠淪犯上之跡敵國起於同舟況又疎於此也敬兒挟震主之勇當鳥盡之運内惑邪夢跡渉覬覦其至殱亡亦其理也慧景以亂濟亂能無及乎南史卷四十五南史卷四十五考證王敬則傳敬則問我昔種楊桞樹今若大小長曜曰虜中以為甘棠甘監本誤明今从閣本陳顯達傳麈尾蠅拂是王謝家物汝不須捉此自随物閣本作許随一作遂一作逐今从監本以為江州刺史鎭彭城彭一本作盆張敬兒傳敬則甚恨焉恨監本訛敬今从閣本南史卷四十五考證
