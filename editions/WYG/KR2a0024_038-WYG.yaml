body:
  text: 南史卷三十八唐李延夀撰列傳第二十八柳元景元景弟子世隆子偃惔弟惲惲世隆子惔偃子盼惲弟憕津慶遠子憕弟忱禮津子仲世隆從弟慶逺敬禮柳元景字孝仁河東解人也髙祖純位平陽太守不拜曾祖卓自本郡遷於襄陽官至汝南太守祖恬西河太守父憑馮翊太守元景少便弓馬數随父伐蠻以勇穪寡言語有器質荆州刺史謝晦聞其名要之未及往而晦敗雍州刺史劉道産深愛其能㑹荆州刺史江夏王義恭復召之道産謂曰乆規相屈今貴王有召難輒相留乖意以為罔罔服闋累遷義恭司徒太尉城局參軍文帝見又知之先是劉道産在雍州有恵化逺蠻歸懐皆出緣沔為村落戸口殷盛及道産死羣蠻大為寇暴孝武西鎮襄陽義恭薦元景乃以為武威將軍随郡太守及至廣設方畧斬獲數百郡境肅然随王誕鎮襄陽元景徙為後軍中兵參軍及朝廷大舉北侵使諸鎮各出軍二十七年八月誕遣尹顯祖出貲谷魯方平薛安都龎法起入盧氏田義仁出魯陽加元景建威將軍總統軍帥後軍外兵參軍龎季明三秦冠族求入長安招懐闗陜乃自貲谷入盧氏盧氏人趙難納之元景率軍係進以前鋒深入懸軍無繼馳遣尹顯祖入盧氏以為諸軍聲援元景以軍食不足難可曠日相持乃束馬懸車引軍上百丈崖出溫谷以入盧氏法起諸軍進次方伯堆去𢎞農城五里元景引軍度熊耳山安都頓軍𢎞農法起進據潼闗季明率方平趙難諸軍向陜十一月元景率衆至𢎞農營於闗方口仍以元景為𢎞農太守初安都留住𢎞農而諸軍已進陜元景既到謂安都曰卿無坐守空城而令龎公孤軍深入宜急進軍衆軍竝造陜下列營以逼之竝大造攻具魏城臨河為固恃險自守季明安都方平顯祖趙難諸軍頻三攻未拔安都方平各列陣於城東南以待之魏兵大合輕騎挑戰安都瞋目橫矛單騎突陣四向奮擊左右皆辟易殺傷不可勝數於是衆軍竝鼔譟俱前魏多縱突騎衆軍患之安都怒甚乃脱兠鍪解所帶鎧唯著綘衲兩當衫馬亦去具裝馳入賊陣猛氣咆勃所向無前當其鋒者無不應刃而倒如是者數四每入衆無不披靡魏軍之將至也方平遣驛騎告元景時諸軍糧盡各餘數日食元景方督義租并上驢馬以為糧運之計遣軍副栁元怙簡歩騎二千以赴陜急卷甲兼行一宿而至詰朝魏軍又出列陣於城外方平諸軍竝成列安都并領馬軍方平悉勒歩卒左右掎角之餘諸義軍方於城西南列陣方平謂安都曰今勍敵在前堅城在後是吾取死之日卿若不進我當斬卿我若不進卿當斬我也安都曰卿言是也遂合戰安都不堪其憤橫矛直前殺傷者甚多流血凝肘矛折易之復入副譚金率騎從而奔之自詰旦戰至日晏魏軍大潰靣縛軍門者二千餘人諸將欲盡殺之元景以為不可乃悉釋而遣之皆穪萬嵗而去時北畧諸軍王𤣥謨等敗退魏軍深入文帝以元景不宜獨進且令班師諸軍乃自狐闗度白楊嶺出于長州安都斷後宋越副之法起自潼闗向商城與元景㑹季明亦從胡谷南歸竝有功而入誕登城望之以鞍下馬迎元景時魯爽向虎牢復使元景率安都等北出爽退乃遷再出北侵威信著於境外孝武入討元凶以為諮議參軍配萬人為前鋒宗慤薛安都等十三軍皆隸焉時義軍船乘小陋慮水戰不敵至蕪湖元景大喜倍道兼行至新亭依山建壘柵東西據險令軍中曰鼓繁氣易衰叫數力易竭但各銜枚疾戰一聼吾營鼓音元景察賊衰竭乃命開壘鼓譟以奔之賊衆大潰劭更率餘衆自來攻壘復大破之劭僅以身免上至新亭即位以元景為侍中領左衛將軍尋轉寧蠻校尉雍州刺史監雍梁南北秦四州荆之竟陵随二郡諸軍事始上在巴口問元景事平何所欲對曰願還鄉里故有此授初臧質起義以南譙王義宣闇弱易制欲相推奉潛報元景使率所領西還元景即以質書呈孝武語其信曰臧冠軍當是未知殿下義舉耳方應伐逆不容西還質以此恨之及元景為雍州質慮其為荆州後患穪𤓰牙不宜逺出上重違其言更以元景為領軍將軍加散騎常侍封曲江縣公孝建元年正月魯爽反遣左衛將軍王𤣥謨討之加元景撫軍將軍假節置佐係𤣥謨後以為領南蠻校尉雍州刺史加都督臧質義宣竝反王元謨南據梁山垣䕶之薛安都度據歴陽元景出屯采石𤣥謨求益兵上使元景進屯姑熟元景悉遣精兵助王𤣥謨以羸弱居守所遣軍多張旗幟梁山望之如數萬人皆謂都下兵悉至由是剋㨗與沈慶之俱以本號加開府儀同三司改封晉安郡公固讓開府復為領軍太子詹事加侍中大明三年為尚書令太子詹事侍中中正如故以封在嶺南改封巴東郡公又命左光祿大夫開府儀同三司侍中中正如故又讓開府乃與沈慶之俱依晉密陵侯鄭袤不受司空故事六年進司空侍中中書令中正如故又固讓乃授侍中驃騎大將軍南兖州刺史留衛都下孝武晏駕與太宰江夏王義恭尚書僕射顔師伯竝受遺詔輔幼主遷尚書令領丹陽尹侍中將軍如故加開府儀同三司給班劒二十人固辭班劒元景少時貧苦嘗下都至大雷日暮寒甚頗有羈旅之歎岸側有一老父自稱善相謂元景曰君方大富貴位至三公元景以為戲之曰人生免飢寒幸甚豈望富貴老父曰後當相憶及貴求之不知所在元景起自將率及當朝理務雖非所長而有𢎞雅之美時在朝勲要多事産業惟元景獨無所營南岸有數十畆菜園守園人賣菜得錢三萬送還宅元景怒曰我立此園種菜以供家中啖耳乃復賣以取錢奪百姓之利邪以錢乞守園人孝武嚴􅍊無常元景雖荷寵遇恒慮及禍太宰江夏王義恭及諸大臣莫不重足屏氣未嘗敢私相徃來孝武崩義恭元景等竝相謂曰今日始免橫死義恭與義陽等諸王元景與顔師伯等常相馳遂聲樂酣飲以夜繼晝前廢帝少有凶德内不能平殺戴法興後悖情轉露義恭元景憂懼乃與師伯等謀廢帝立義恭持疑未決發覺帝親率宿衛兵自出討之稱詔召元景左右奔告兵刃非常元景知禍至整朝服乗車應召出門逢弟車騎司馬叔仁戎服左右壯士數十人欲拒命元景苦禁之及出巷軍士大至下車受戮容色恬然長子慶宗有幹力而情性不倫孝武使元景送還襄陽於道賜死次子嗣宗紹宗茂宗孝宗文宗仲宗成宗秀宗至是並遇禍元景六弟僧景僧珍叔宗叔政叔珍叔仁僧珍叔仁及子姪在都下襄陽死者數十人元景少子承宗嗣宗子謩竝在孕獲全明帝即位贈太尉給班劒三十人羽葆鼔吹一部謐曰忠烈公元景從父兄元怙大明末同晉安王子勛逆事敗歸降元景從祖弟光世留鄉里仕魏為河北大守封西陵男與司徒崔浩親浩被誅光世南奔明帝時位右衛將軍順陽太守子欣慰謀反光世賜死世隆字彦緒元景弟子也父叔宗字雙驎位建威參軍事早卒世隆幼孤挺然自立不與衆同雖門勢子弟獨修布衣之業及長好讀書折節彈琴渉獵文史音吐溫潤元景愛賞異於諸子言於宋孝武得召見帝謂元景曰此兒將來復是三公一人為西陽王撫軍法曹行參軍出為武威將軍上庸太守帝謂元景曰卿昔以武威之號為随郡今復以授世隆使卿門世不之公也元景為前廢帝所殺世隆以在逺得免太始初四方反叛世隆於上庸起兵以應宋明帝為孔道存所敗衆散逃隐道存購之甚急軍人有貎相似者斬送之時世隆母郭妻閻竝見縶襄陽獄道存以所逆首示之母見首悲情小歇而妻閻號呌方甚竊謂郭曰今見不悲為人所覺唯當大慟以滅之世隆竟以免後為太子洗馬與張緒王延之沈琰為君子之交累遷晉熙王安西司馬加寧朔將軍時齊武帝為長史與世隆相遇甚懽齊髙帝之謀度廣陵也令武帝率衆同㑹都下世隆與長流參軍蕭景先等戒嚴待期事不行時朝廷疑憚沈攸之密為之防府州器械皆有素蓄武帝將下都劉懐珍白髙帝曰夏口是兵衝要地宜得其人髙帝納之與武帝書曰汝既入朝當湏文武兼資人委以後事世隆其人也武帝乃舉世隆自代轉為武陵王前軍長史江夏内史行郢州事昇明元年冬攸之反遣輔國將軍中兵參軍孫同等以三萬人為前驅又遣司馬冠軍劉攘兵等二萬人次之又遣輔國將軍中兵參軍王靈秀等分兵出夏口據魯山攸之乗輕舸從數百人先大軍下住白螺州坐胡牀以望其軍有自驕色既至郢以郢城弱小不足攻攸之將去世隆遣軍於西渚挑戰攸之果怒晝夜攻戰世隆随宜拒應衆皆披却武帝初下與世隆别曰攸之一旦為慶雖留攻城不可卒㧞卿為其内我為其外乃無憂耳至是武帝遣軍主桓敬陳𦙍叔苟元賓等八軍據西塞令堅壁以待賊疲慮世隆危急遣腹心胡元直潛使入郢城通援軍消息内外竝喜郢城既不可攻而平西將軍黄回軍至西陽乗三層艦作羌胡伎沂流而進攸之素失人情本逼以威力初發江陵已有叛者至此稍多攸之大怒於是一人叛遣十人追竝去不返劉攘兵射書與世隆請降開門納之攸之怒銜鬚咀之收攘兵兄子天賜女壻張平慮斬之軍旅大散世隆乃遣軍副劉僧麟緣道追之攸之已死徵為侍中仍遷尚書右僕射封貞陽縣侯出為呉郡太守居母憂寒不衣絮齊髙帝踐阼起為南豫州刺史加都督進爵為公上手詔司徒褚彦回甚傷美之彦回曰世隆事陛下在危盡忠居憂杖而後起立人之本二理同極加榮增寵足以敦厲風俗建元二年授右僕射不拜性愛渉獵啓髙帝借祕閤書上給二千卷三年出為南兖州刺史加都督武帝即位加散騎常侍世隆善卜别龜甲價至一萬永明初世隆曰永明九年我亡亡後三年丘山崩齊亦於此季矣屏人命典籖李黨取筆及髙齒屐題簾箔旌曰永明十一年因流涕謂黨曰汝當見吾不見也遷䕶軍而衛軍王儉脩下官敬甚謹世隆止之儉曰將軍雖存𢎞眷如王典何其見重如此性清亷唯盛事墳典張緒問曰觀君舉措當以清名遺子孫邪荅曰一身之外亦復何湏子孫不才將為争府如其才也不如一經光祿大夫韋祖征州里宿德世隆雖已貴重每為之拜人或勸祖征止之答曰司馬公所為後生楷法吾豈能止之哉後授尚書左僕射湘州蠻動遣世隆以本官總督伐蠻衆軍仍為湘州刺史加都督至鎮以方畧討平之在州立邸興生為御史中丞庾杲之所奏詔不問復入為尚書左僕射不拜乃轉尚書令世隆少立功名晚専以談義自業善彈琴世稱栁公雙瑣為士品第一常自云馬矟第一清談第二彈琴第三在朝不干世務垂簾鼔琴風韻清逺甚獲世譽以疾遜位拜左光祿大夫侍中永明九年卒詔給東園祕器贈司空班劒二十人諡曰忠武世隆曉數術於倪塘創墓與賓客踐履十往五往常坐一處及卒墓工圖墓正取其坐處焉所著龜經祕要二卷行於世長子悦字文殊少有清致位中書郎早卒諡曰恭世隆次子惔惔字文通好學工製文尤曉音律少與長兄悦齊名王儉謂人曰栁氏二龍可謂一日千里儉為尚書左僕射嘗造世隆宅世隆謂為詣已徘徊乆之及至門唯求悦及惔遣謂世隆曰腎子俱有盛才一日見顧今故報禮若仍相造似非本意恐年少窺人嘗預齊武烽火樓晏帝善其詩謂豫章王嶷曰惔非徒風韻清夾亦屬文遒麗後為巴東王子響友子響為荆州惔随之鎮子響昵近小人惔知將為禍稱疾還都及難作竟以得免累遷新安太守居郡以無政績免建武末為梁南秦二州刺史及梁武帝起兵惔舉漢中以應梁武受命為太子詹事加散騎常侍武帝之鎮襄陽惔祖道帝解茅土玉環贈之天監二年元㑹帝謂曰卿所佩玉環是新亭所贈邪對曰既而瑞感神衷臣謹服之無斁帝因勸之酒惔時未卒爵帝曰吾常比卿劉越石近辭巵酒邪罷㑹封曲江縣侯帝因宴為詩貽惔曰爾寔冠羣后惟余實念功帝又嘗謂曰徐元瑜違命嶺南周書父子兄弟罪不相及朕已放其諸子何如惔曰罰不及嗣賞延于後今復見之聖朝時以為知言尋遷尚書左僕射年六十卒於湘州刺史諡曰穆惔度量寛博家人未嘗見其喜慍甚重其婦頗成畏憚性愛音樂女伎精麗畧不敢視僕射張稷與惔狎密而為惔妻賞敬稷每詣惔必先相問夫人惔每欲見妓恒因稷請奏其妻隔幔坐妓然後出惔因得留目惔著仁政傳及諸詩賦粗有辭義子昭位中書郎襲爵曲江侯惔弟惲字文暢少有志行好學善尺牘與陳郡謝􅊪隣居深見友愛􅊪曰宅南栁郎可為表儀初宋時有嵇元榮羊蓋者竝善琴云傳戴安道法惲從之學惲特窮其妙齊竟陵王子良聞而引為法曹行參軍唯與王暕陸果善每歎曰暕雖名家猶恐累我也雅被子良賞狎子良嘗置酒後園有晉太傅謝安鳴琴在側援以授惲惲彈為雅㺯子良曰卿巧越嵇心妙臻羊體良質美手信在今夜豈止當今稱竒亦可追蹤古烈為太子洗馬父憂去官著述先頌申其岡極之心文甚哀麗後試守鄱陽相聼吏屬得盡三年喪禮署之文教百姓稱焉還除驃騎從事中郎梁武帝至建業惲候謁石頭以為征東府司馬上牋請城平之日先收圖籍及遵漢髙寛大之義帝從之徙為相國右司馬天監元年除長兼侍中與僕射沈約等共定新律惲立性貞素以貴公子早有令名少工篇什為詩云亭臯木葉下壠首秋雲飛琅邪王融見而嗟賞因書齋壁及所執白團扇武帝與宴必詔惲賦詩嘗和武帝登景陽樓篇云太液滄波起長楊髙樹秋翠華承漢逺彫輦逐風游深見賞美當時咸共稱傳歴平越中郎將廣州刺史祕書監右衛將軍再為呉興太守為政清静人吏懷之於郡感疾自陳解任父老十餘人拜表陳請事未施行卒初惲父世隆彈琴為士流第一惲每奏其父曲常感思復變體備寫古曲嘗賦詩未就以筆捶琴坐客過以筯扣之惲驚其哀韻乃製為雅音後傳擊琴自於此惲常以今聲轉棄古法乃著清調論具有條流齊竟陵王嘗宿晏明旦將朝見惲投壺梟不絶停轝乆之進見遂晚齊武帝遲之王以實對武帝復使為之賜絹二十匹嘗與琅邪王瞻博射嫌其皮闊乃摘梅帖烏珠之上發必命中觀者驚駭梁武帝好奕棊使惲品定棊譜登格者二百七十八人第其優劣為棊品三卷惲為第二焉帝謂周捨曰吾聞君子不可求備具美栁惲可謂具美分其才藝足了十人惲著十杖龜經性好毉術盡其精妙少子偃字彦游年十二梁武帝引見詔問讀何書對曰尚書又問有何美句對曰德唯善政政在飬民衆咸異之詔尚武帝女長城公主拜駙馬都尉都亭侯位鄱陽内史卒子盼尚陳文帝女富陽公主拜駙馬都尉後主即位以帝舅加散騎常侍盼性愚戇使酒因醉乗馬入殿門為有司劾免卒於家贈侍中中䕶軍后從祖弟莊清警有鑒識自盼卒後太后宗屬唯莊為近兼素有名望深被恩禮位度支尚書陳亡入隋為岐州司馬惲弟憕憕字文深少有大意好𤣥言通老易梁武帝舉兵至姑熟憕與兄惲及諸友朋於小郊候接時道路猶梗憕與諸人同憇逆旅食俱去行里餘憕曰寧我負人不人負我若復有追堪憇此客命左右燒逆旅舍以絶後追當時服其善斷歴位給事黃門侍郎與琅邪王峻齊名俱為中庶子時人號為方王後為鎮北始興王長史王移鎮益州復請憕帝曰栁憕風標才氣恐不能乆為少王臣王祈請數四不得已以為鎮西長史蜀郡太守在蜀亷恪為政益部懷之憕弟忱忱字文若年數嵗父世隆及母閻氏竝疾忱不解帶經年及居喪以毁聞仕齊為西中郎主簿東昏遣巴西太守劉山陽由荆州襲梁武帝于雍州西中郎長史蕭穎胄計未定召忱及其所親席闡文等夜入議之忱及闡文竝勸同武帝穎胄從之以忱為寧朔將軍累遷侍中郢州平穎胄議遷都夏口忱以巴峽未賓不宜輕捨根本摇動人心不從俄而巴東兵至峽口遷都之議乃息論者以為見機及梁受命封州陵伯歴五兵尚書祕書監散騎常侍改授給事中光祿大夫疾篤不拜卒諡曰穆忱兄弟十五人多少亡唯第二兄惔第三兄惲第四兄憕及忱三兩年間四人迭為侍中復居方伯當世罕比子範嗣慶逺字文和元景弟子也父叔珍義陽内史慶逺仕齊為魏興太守郡遭㬥水人欲移於杞城慶逺曰吾聞江河長不過三日命築土而已俄而水退百姓服之後為襄陽令梁武帝之臨雍州問京兆人杜惲求州綱紀惲言慶逺武帝曰文和吾已知之所問未知者耳因辟為别駕慶逺謂所親曰天下方亂定霸者其吾君乎因盡誠協贊及起兵慶逺常居帷幄為謀主從軍東下身先士卒武帝行營見慶逺頓舍嚴整每歎曰人人若是吾又何憂建康城平為侍中带淮陵齊昌二郡太守城内嘗夜火衆竝驚懼武帝時居宫中悉斂諸門籥問栁侍中何在慶逺至悉付之其見任如此霸府建為從事中郎武帝受禪封重安侯位散騎常侍改封雲杜侯出為雍州刺史加都督帝餞於新亭謂曰卿衣錦還鄉朕無西顧憂矣始武帝為雍州慶逺為别駕謂曰昔羊公語劉𢎞卿後當居吾處今相觀亦復如是曾未十年而慶逺督府談者以為逾於魏詠之累遷侍中領軍將軍給扶出為雍州刺史慶遠重為本州頗厲清節士庶懐之卒官贈開府儀同三司諡曰忠恵侯喪還都武帝親出臨之初慶逺從父兄世隆嘗謂慶逺曰吾昔夣太尉以褥席見賜吾遂亞台司適又夣以吾褥席與汝汝必光我門族至是慶逺亦繼世隆焉子津字元舉雖乏風華性甚强直人或勸之聚書津曰吾常請道士上章驅鬼安用此鬼名邪歴散騎常侍太子詹事襲封雲杜侯侯景圍城既急帝召津問䇿對曰陛下有邵陵臣有仲禮不忠不孝賊何由可平太清三年城陷卒子仲禮勇力兼人少有膽氣身長八尺眉目疎朗初簡文帝為雍州刺史津為長史及簡文入居儲宫津亦得侍從仲禮留在襄陽馬仗軍人悉付之撫循故舊甚得衆和起家著作佐郎稍遷電威將軍陽泉縣侯中大通中西魏將賀㧞勝來逼樊鄧仲禮出擊破之除黄門郎稍遷司州刺史武帝思見其靣使畫工圖之初侯景潛圖反噬仲禮先知之屢啓求以精兵三萬討景朝廷不許及景濟江朝野便望其至兼蓄雍司精卒與諸蕃赴援見推總督景素聞其名甚憚之仲禮亦自謂當世英雄諸將莫己若也韋粲見攻仲禮方食投箸被練馳之騎能屬者七十比至粲已敗仲禮因與景戰於青塘大敗之景與仲禮交戰各不相知仲禮矟將及景而賊將支伯仁自後斫仲禮再斫仲禮中肩馬陷于淖賊聚矟刺之騎將郭山石救之以免自此壯氣外衰不復言戰神情傲佷凌蔑將帥邵陵王綸亦鞭䇿軍門每日必至累刻移時仲禮亦弗見也綸既忿歎怨隙遂成而仲禮常置酒髙㑹日作優倡毒掠百姓汙辱妃主父津登城謂曰汝君父在難不能盡心竭力百代之後謂汝為何仲禮聞之言笑自若晚又與臨城公大連不協景嘗登朱雀樓與之語遺以金環是後開營不戰衆軍日固請皆悉拒焉南安侯駿謂曰城急如此都督不復處分如脱不守何靣以見天下義士仲禮無以應之及臺城陷侯景矯詔使石城公大欵以白虎幡解諸軍仲禮召諸將軍㑹議邵陵王以下畢集王曰今日之命委之將軍仲禮熟視不對裴之髙王僧辯曰將軍擁衆百萬致宫闕淪沒正當悉力決戰何所多言仲禮竟無一言諸軍乃随方各散時湘東王繹遣王琳送米二十萬石以饋軍至姑熟聞臺城陷乃沉米於江而退仲禮及弟敬禮羊鴉仁王僧辯趙伯超竝開營降賊時城雖淪陷援軍甚衆軍士咸欲盡力及聞降莫不歎憤論者以為梁禍始於朱异成於仲禮仲禮等入城竝先拜景而後見帝帝不與言既而景留栁敬禮羊鴉仁而遣仲禮僧辯西上各復本位餞於後渚景執仲禮手曰天下之事在將軍耳郢州巴西竝以相付及至江陵㑹岳陽王詧南宼湘東王以仲禮為雍州刺史襲襄陽仲禮方觀成敗未發及南陽圍急杜岸請救仲禮乃以别將夏侯强為司州刺史守義陽自帥衆如安陸使司馬康昭如竟陵討孫暠暠執魏戍人以降仲禮命其將王叔孫為竟陵太守副軍馬岫為安陸太守置孥於安陸而以輕兵師于漴頭將侵襄陽岳陽王詧告急于魏魏遣大將楊忠援之仲禮與戰于漴頭大敗并弟子禮沒于魏魏相安定公待仲禮以客禮西魏於是盡得漢東仲禮弟敬禮少以勇烈聞麤􅍊無行檢恒畧賣人為百姓所苦故襄陽有栁四郎歌起家著作佐郎稍遷扶風太守侯景度江敬禮率馬歩三千赴援至都與景頻戰甚著威名臺城陷與兄仲禮俱見景景遣仲禮經畧上流留敬禮質以為䕶軍將軍景餞仲禮於後渚敬禮謂仲禮曰景今來㑹敬禮抱之兄便可殺雖死無恨仲禮壯其言許之及酒數行敬禮目仲禮仲禮見備衛嚴不敢動遂不果㑹景征晉熙敬禮與南康王㑹理謀襲其城剋期將發建安侯蕭賁告之遂遇害臨死曰我兄老婢也國敗家亡實余之責今日就死豈非天乎論曰栁元景行己所資豈徒武毅當朝任職實兼雅道卒至覆族遭逢亦有命乎世隆文武器業殆人望也諸子門素所傳俱云克構仲禮始終之際其不副也何哉豈應天方喪梁不然何斯人而有斯迹也南史卷三十八南史卷三十八考證栁元景傳時魯夾向虎牢復使元景率安都等北出爽退乃遷遷當係還字之訛給班劒三十人班監本訛斑今改正栁惔傳周書父子兄弟罪不相及梁書無父子兄弟四字栁惔弟惲傳唯與王暕陸果善果應作杲栁忱傳忱以巴峽未賔峽梁書作硤誤栁慶逺傳俄而水退退梁書作過問京兆人杜惲求州綱紀梁書少紀字栁仲禮弟敬禮傳將發建安侯蕭賁告之侯監本訛偞今改正又告之梁書作知而去之南史卷三十八考證
