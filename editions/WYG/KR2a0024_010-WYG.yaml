body:
  text: 南史卷十唐李延壽撰陳本紀下第十髙宗孝宣皇帝諱頊字紹世小字帥利始興昭烈王第二子也梁中大通二年七月辛酉生有赤光滿室少寛容多智略及長美容儀身長八尺三寸垂手過膝有勇力善騎射武帝平侯景鎮京口梁元帝徴武帝子姪入侍武帝遣帝赴江陵累官為中書侍郎時有軍主李總與帝有舊每同游處帝嘗夜被酒張燈而寐總適出尋反乃見帝是大龍便驚走他室魏平江陵遷於長安帝貎若不慧魏将楊忠門客張子煦見而竒之曰此人虎頭當大貴也永定元年遥襲封始興郡王文帝嗣位改封安成王天嘉三年自周還授侍中中書監中衛将軍置佐吏歴位司空尚書令廢帝即位拜司徒録尚書都督中外諸軍事光大二年正月進位太傅領司徒加殊禮劍履上殿十一月甲寅慈訓太后黜廢帝為臨海王以帝入纉皇統是月齊武成帝殂太建元年春正月甲午皇帝即位於太極前殿大赦改元文武賜位一階孝弟力田及為父後者賜爵一級鰥寡不能自存者人賜榖五斛復太皇太后尊號曰皇太后立妃柳氏為皇后世子叔寳為皇太子封皇子江州刺史康樂侯叔陵為始興王奉昭烈王祀乙未謁太廟丁酉分命大使觀省四方風俗以尚書僕射沈欽為左僕射度支尚書王勱為右僕射辛丑祀南郊壬寅封皇子建安侯叔英為豫章王豐城侯叔堅為長沙王二月乙亥耕籍田夏五月甲午齊人來聘丁巳以吏部尚書徐陵為尚書右僕射秋七月辛卯皇太子納妃沈氏王公以下賜帛各有差冬十月新除左衛将軍歐陽紇據廣州反辛未遣開府儀同三司章昭逹討之二年春二月癸未章昭逹禽歐陽紇送都斬於建康市廣州平三月丙申皇太后崩丙午曲赦廣衡二州丁未大赦又詔自討周廸華皎以來兵所有死亡者並令收斂并給棺槥送還本鄉夏四月乙卯臨海王伯宗薨戊寅皇太后祔葬於萬安陵五月壬午齊人來弔六月戊子新羅國遣使朝貢辛卯大雨雹乙巳分遣大使廵州郡省寃屈冬十一月辛酉髙麗國遣使朝貢十二月癸巳雷三年春正月癸丑以尚書右僕射徐陵為尚書僕射辛酉祀南郊二月辛巳祀明堂丁酉耕藉田三月丁丑大赦夏四月壬辰齊人來聘五月辛亥髙麗新羅丹丹天竺盤盤等國並遣使朝貢六月丁亥江隂王蕭季卿以罪免甲辰封東中郎長沙王府諮議参軍蕭彞為江隂王冬十月乙酉周人來聘十二月壬辰司空章昭逹薨四年春正月丙午以尚書僕射徐陵為左僕射中書監王勱為右僕射二月乙酉立皇子叔卿為建安王三月乙丑扶南林邑國並遣使朝貢夏五月癸卯尚書右僕射王勱卒是月周人誅冢宰宇文䕶秋八月辛未周人來聘九月庚子朔日有蝕之辛亥大赦丙寅以故太尉徐度儀同三司杜稜程靈洗配食武帝廟庭故司空章昭逹配食文帝廟庭冬十一月己亥地震是嵗周建徳元年五年春正月癸酉以吏部尚書沈君理為尚書右僕射領吏部辛巳祀南郊二月辛丑祀明堂乙卯夜有白氣如虹自北方貫北斗紫宫三月壬午以開府儀同三司呉明徹都督征討諸軍事畧地北邊丙戌西衡州獻馬生角己丑皇孫𦙍生内外文武賜帛各有差為父後者賜爵一級夏六月癸卯周人來聘秋九月癸未尚書右僕射沈君理卒壬辰晦夜明冬十月己亥以特進周𢎞正為尚書右僕射乙巳呉明徹剋壽陽城斬王琳傳首建鄴梟於朱雀航十二月壬辰詔熊曇朗留異陳寳應周廸鄧緖等及王琳首並還親屬以𢎞廣宥乙巳立皇子叔明為宜都王叔獻為河東王是嵗諸軍畧地所在剋㨗六年春正月壬戌赦江右淮北諸州甲申周人來聘髙麗國遣使朝貢二月壬辰朔日有蝕之辛亥耕藉田夏四月庚子彗星見六月壬辰尚書右僕射周𢎞正卒冬十一月乙亥詔北邊行軍之所並給復十年十二月戊戌以吏部尚書王瑒為尚書僕射七年春正月辛未祀南郊三月辛未詔豫二兖譙徐合霍南司定九州及南豫江郢所部在江北諸郡置雲旗義士徃大軍及諸鎮備防夏四月丙戌有星孛於大角庚寅監豫州陳桃根獻青牛詔以還百姓乙未桃根又上織成羅紋錦被表各二詔於雲龍門外焚之壬子郢州獻瑞鍾六六月丙戌詔為北行将士死王事者剋日舉哀壬辰以尚書右僕射王瑒為尚書僕射己酉改作雲龍神虎門秋八月癸卯周人來聘閏九月壬辰都督呉明徹大破齊軍於吕梁是月甘露頻降樂㳺苑丁未輿駕幸苑採甘露宴群臣詔於苑龍舟山立甘露亭冬十月己巳立皇子叔齊為新蔡王叔文為晉熈王十二月壬戌以尚書僕射王瑒為左僕射太子詹事陸繕為右僕射甲子南康郡獻瑞鍾一八年春二月壬申以開府儀同三司呉明徹為司空夏五月庚寅尚書左僕射王瑒卒六月甲寅以尚書右僕射陸繕為左僕射新除晉陽太守王克為右僕射秋九月戊戌立皇子叔彪為淮南王九年春正月乙亥齊主傳位於其太子恒自號太上皇是月周滅齊二月壬子耕藉田秋七月己卯百濟國遣使朝貢庚辰大雨震萬安陵華表己丑震慧日寺刹及瓦官寺重門一女子震死冬十月戊午司空呉明徹破周将梁士彦於吕梁十二月戊申東宫成皇太子移於新宫十年春二月甲子周軍救梁士彦大敗司空呉明徹於吕梁及将卒皆見囚俘不反三月辛未震武庫丙子分命衆軍以備周乙酉大赦夏四月庚戌詔絓在軍者並賜爵二級又詔御府堂署所營造禮樂儀服軍噐之外悉皆停息掖庭常供王侯妃主諸有奉卹者並各量減庚申大雨雹六月丁酉周武帝崩閏六月丁卯大雨震大皇寺刹荘嚴寺露盤重陽閣東樓千秋門内槐樹及鴻臚府門秋七月戊戌新羅國遣使朝貢八月戊寅隕霜殺稻菽九月乙巳立方明壇於婁湖戊申以揚州刺史始興王叔陵兼王官伯臨盟甲寅幸婁湖臨誓衆乙卯分遣大使以盟誓班下四方以上下相警冬十月戊子以尚書左僕射陸繕為尚書僕射十二月乙亥合州廬江蠻田伯興出宼樅陽刺史魯廣逹討平之是嵗周宣政元年十一年春正月丁酉南兖州言龍見二月癸亥耕藉田秋七月辛卯初用大貨六銖錢八月丁卯幸大壮觀閲武冬十月甲戌以尚書僕射陸繕為尚書左僕射以祠部尚書晉安王伯恭為右僕射十一月辛卯大赦戊戌周将梁士彦圍壽陽剋之辛亥又剋霍州癸丑以揚州刺史始興王叔陵為大都督總督水歩衆軍十二月乙丑南北兖晉三州及盱台山陽陽平馬頭秦歴陽沛北譙南梁等九郡民並自㧞向建鄴周又剋譙北徐二州自是淮南之地盡歸於周矣己巳詔非軍國所湏多所減損歸於儉約是嵗周宣帝大象元年十二年夏四月癸亥尚書左僕射陸繕卒己卯大雩壬午雨五月癸巳以尚書右僕射晉安王伯恭為尚書僕射己酉周宣帝崩六月壬戌大風吹壊臯門中闥秋八月己未周鄖州總管司馬消難以所統九州八鎮之地來降詔因以消難為大都督加司空封隨郡公庚申詔鎮西将軍樊毅進督沔漢諸軍事遣南豫州刺史任忠率衆趨歴陽超武将軍陳慧紀為前軍都督趨南兖州戊辰以司空司馬消難為大都督水陸諸軍事庚午通直散騎常侍淳于陵剋臨江郡癸酉智武将軍魯廣逹剋郭黙城甲戌大雨霖丙子淳于陵剋柘州城九月癸未周臨江太守劉顯光率衆來降是夜天東南有聲如風水相激三夜乃止丁亥周将王延貴率衆援歴陽任忠擊破之禽延貴等己酉周廣陵義軍主曹藥率衆來降冬十月癸丑大雨震電十二月庚辰南徐州刺史河東王叔獻薨十三年春正月壬午以中權将軍䕶軍将軍鄱陽王伯山即本號開府儀同三司以尚書僕射晉安王伯恭為左僕射吏部尚書袁憲為右僕射二月乙亥耕藉田秋九月癸亥夜大風從西北來發屋㧞樹大雨雹冬十月壬寅丹丹國遣使朝貢十二月辛巳彗星見西南是嵗周静帝大定元年遜位於隋文帝改元開皇元年十四年春正月己酉上弗像甲寅崩於宣福殿時年五十三遺詔凡厥終制事從省約金銀之飾不以入壙明噐皆用瓦以日易月及公除之制悉依舊準在位百司三日一臨四方州鎮五等諸侯各守所職並停奔赴二月辛卯羣臣上諡曰孝宣皇帝廟號髙宗癸巳葬顯寜陵帝之在田本有恢𢎞之度及居尊位實允天人之屬於時國歩初弭創痍未復淮南之地並入於齊帝志復舊境意反侵地彊弱之形理則懸絶犯斯不韙適足為禽及周兵滅齊乘勝而舉畧地還至江際自此懼矣既而修飾都城為扞禦之備獲銘云二百年後當有癡人修破吾城者時莫測所從云後主諱叔寳字元秀小字黄奴宣帝嫡長子也梁承聖二年十一月戊寅生於江陵明年魏平江陵宣帝遷於長安留後主於穰城天嘉三年歸建鄴立為安成王世子光大二年累遷侍中太建元年正月甲午立為皇太子十四年正月甲寅宣帝崩乙卯始興王叔陵構逆伏誅丁巳太子即皇帝位於太極前殿大赦在位文武及孝弟力田為父後者並賜爵一級孤老鰥寡不能自存者賜榖人五斛帛二匹癸亥以侍中丹陽尹長沙王叔堅為驃騎将軍開府儀同三司揚州刺史乙丑尊皇后為皇太后丁卯立皇弟叔敦為始興王奉昭烈王祀己巳立妃沈氏為皇后辛未立皇弟叔儼為尋陽王叔慎為岳陽王叔逹為義陽王叔熊為巴山王叔虞為武昌王甲戌設無礙大㑹於太極前殿三月癸亥詔内外衆官九品以上各薦一人又詔求忠讜無所隐諱己己以新除翊左将軍永陽王伯智為尚書僕射夏四月丙申立皇子永康公𦙍為皇太子賜天下為父後者爵一級王公以下賚帛各有差庚子詔鏤金銀薄庶物化生土木人綵華之屬及布帛短狹輕疎者並傷財廢業尤成蠧患又僧尼道士挾邪左道不依經律人間滛祀祅書諸珍怪事詳為條制並皆禁絶秋七月辛未大赦是月自建鄴至荆州江水色赤如血八月癸未天有聲如風水相激乙酉夜又如之九月丙午設無礙大㑹於太極前殿捨身及乘輿御服大赦辛亥夜天東北有聲如蟲飛漸移西北丙寅以驃騎将軍開府儀同三司揚州刺史長沙王叔堅為司空征南将軍江州刺史豫章王叔英即本號開府儀同三司至徳元年春正月壬寅大赦改元以江州刺史豫章王叔英為驃騎将軍開府儀同三司以司空揚州刺史長沙王叔堅為江州刺史征東将軍開府儀同三司癸卯立皇子深為始安王秋八月丁卯以驃騎将軍開府儀同三司長沙王叔堅為司空九月丁巳天東南有聲如蟲飛冬十月丁酉立皇弟叔平為湘東王叔敖為臨賀王叔宣為陽山王叔穆為西陽王叔儉為南安王叔澄為南郡王叔興為沅陵王叔韶為岳山王叔純為新興王十二月丙辰頭和國遣使朝貢司空長沙王叔堅有罪免戊午夜天開自西北至東南其内有青黄雜色隆隆若雷聲二年春正月丁卯分遣大使廵省風俗癸巳大赦夏五月戊子以吏部尚書江總為尚書僕射秋七月壬午皇太子加元服在位文武賜帛各有差孝弟力田為父後者賜爵一級鰥寡癃老不能自存者人榖五斛冬十一月丙寅大赦是月盤盤百濟國並遣使朝貢三年春正月戊午朔日有蝕之庚午鎮左将軍長沙王叔堅即本號開府儀同三司三月辛酉前豐州刺史章大寳舉兵反夏四月庚戌豐州義軍主陳景詳斬大寳傳首建鄴冬十月己丑丹丹國遣使朝貢十一月己未詔修復仲尼廟辛巳幸長干寺大赦十二月癸卯髙麗國遣使朝貢是嵗梁明帝殂四年春正月甲寅詔王公以下各薦所知無隔輿皁二月丙申立皇弟叔謨為巴東王叔顯為臨江王叔坦為新㑹王叔隆為新寜王夏五月丁巳立皇子荘為㑹稽王秋九月甲午幸𤣥武湖肄艫艦閲武丁未百濟國遣使朝貢冬十月癸亥以尚書僕射江總為尚書令吏部尚書謝伷為尚書僕射十一月己卯大赦禎明元年春正月戊寅大赦改元乙未地震秋九月庚寅梁太傅安平王蕭巖荆州刺史蕭瓛遣其都官尚書沈君公詣荆州刺史陳紀請降辛卯巖等帥其文武官男女濟江甲午大赦冬十一月丙子以蕭巖為平東将軍開府儀同三司東揚州刺史丁亥以驃騎大将軍開府儀同三司豫章王叔英為兼司徒十二月丙辰以前鎮衛大将軍開府儀同三司東揚州刺史鄱陽王伯山為鎮衛大将軍開府儀同三司二年春正月辛巳立皇子恮為東陽王恬為錢唐王夏四月戊申有群鼠無數自蔡洲岸入石頭渡淮至於青塘兩岸數日自死隨流出江是月郢州南浦水黒如墨五月甲午東冶鑄鐵有物赤色大如數升自天墜鎔所有聲隆隆如雷鐵飛出墻外燒人家六月戊戌扶南國遣使朝貢庚子廢皇太子𦙍為呉興王立揚州刺史始安王深為皇太子辛丑以太子詹事袁憲為尚書僕射丁巳大風自西北激濤水入石頭城淮渚暴溢漂沒舟乘冬十月己亥立皇子蕃為呉王己酉幸莫府山大校獵十一月丁卯詔剋日於大政殿訊獄丙子立皇弟叔榮為新昌王叔匡為太原王初隋文帝受周禪甚敦鄰好宣帝尚不禁侵掠太建末隋兵大舉聞宣帝崩乃命班師遣使赴弔修敵國之禮書稱姓名頓首而後主益驕書末云想彼統内如宜此宇宙清泰隋文帝不説以示朝臣清河公楊素以為主辱再拜請罪及襄邑公賀若弼並奮求致討後副使袁彦聘隋竊圖隋文帝状以歸後主見之大駭曰吾不欲見此人毎遣間諜隋文帝皆給衣馬禮遣以歸後主愈驕不虞外難荒於酒色不恤政事左右嬖侫珥貂者五十人婦人美貎麗服巧態以從者千餘人常使張貴妃孔貴人等八人夾坐江總孔範等十人預宴號曰狎客先令八婦人襞采箋製五言詩十客一時繼和遲則罰酒君臣酣飲從夕逹旦以此為常而盛修宫室無時休止税江税市徴取百端刑罰酷濫牢獄常滿覆舟山及蒋山栢林冬月常多采醴後主以為甘露之瑞前後災異甚多有神自稱老子游於都下與人對語而不見形言吉凶多驗得酒輒釂之經三四年乃去船下有聲云明年亂視之得嬰兒長三尺而無頭蒋山衆鳥鼔兩翼以拊膺曰奈何帝奈何帝又建鄴城無故自壊青龍出建陽門井涌霧赤地生黒白毛大風㧞朱雀門臨平湖草舊塞忽然自通後主又夢黄衣圍城乃盡去繞城橘樹又見大蛇中分首尾各走夜中索飲忽變為血有血霑階至於坐牀頭而火起有狐入其牀下捕之不見以為祅乃自賣於佛寺為奴以禳之於郭内大皇佛寺起七層塔未畢火從中起飛至石頭燒死者甚衆又采木湘州擬造正寝栰至牛渚磯盡沒水中既而漁人見栰浮於海上起齊雲觀國人歌曰齊雲觀宼來無際畔始北齊末諸省官人多稱省主未幾而滅至是舉朝亦有此稱識者以為省主主将見省之兆隋文帝謂僕射髙熲曰我為百姓父母豈可限一衣帶水不拯之乎命大作戰船人請密之隋文帝曰吾将顯行天誅何密之有使投柹於江若彼能改吾又何求及納梁蕭瓛蕭巖隋文愈忿以晉王廣為元帥督八十總管致討乃送璽書暴後主二十惡又散寫詔書書三十萬紙徧喻江外諸軍既下江濱鎮戌相繼奏聞新除湘州刺史施文慶中書舍人沈客卿掌機密並抑而不言初蕭巖蕭瓛之至也徳教學士沈君道夢殿前長人朱衣武冠頭出欄上攘臂怒曰那忽受叛蕭誤人事後主聞之忌二蕭故逺散其衆以巖為東揚州刺史瓛為呉州刺史使領軍任忠出守呉興郡以襟帶二州使南平王嶷鎮江州永嘉王彦鎮南徐州尋詔二王赴期明年元㑹命縁江諸防船艦悉從二王還都為威勢以示梁人之來者由是江中無一鬬船上流諸州兵皆阻楊素軍不得至都下甲士尚十餘萬人及聞隋軍臨江後主曰王氣在此齊兵三度來周兵再度至無不摧沒虜今來者必自敗孔範亦言無渡江理但奏伎縱酒作詩不輟三年春正月乙丑朔朝㑹大霧四塞入人鼻皆辛酸後主昏睡至晡時乃罷是日隋将賀若弼自北道廣陵濟韓擒虎趨横江濟分兵晨襲采石取之進㧞姑熟次於新林時弼攻下京口縁江諸戌望風盡走弼分兵斷曲阿之衝而入丙寅采石戍主徐子建至告變戊辰乃下詔曰犬羊陵縱侵竊郊畿螽蠆有毒宜時掃定朕當親御六師廓清八表内外並可戒嚴於是以蕭摩訶為皇畿大都督樊猛為上流大都督樊毅為下流大都督司馬消難施文慶並為大監軍重立賞格分兵鎮守要害僧尼道士盡皆執役庚午賀若弼攻䧟南徐州辛未韓擒虎又䧟南豫州隋軍南北道並進辛巳賀若弼進軍鍾山頓白土岡之東南衆軍敗績弼乘勝進軍宫城燒北掖門是時韓擒虎率衆自新林至石子岡鎮東大将軍任忠出降擒虎仍引擒虎經朱雀航趣宫城自南掖門入城内文武百司皆遁出唯尚書僕射袁憲後閤舍人夏侯公韻侍側憲勸端坐殿上正色以待之後主曰鋒刃之下未可交當吾自有計乃逃於井二人苦諫不從以身蔽井後主與争乆之方得入沈后居處如常太子深年十五閉閤而坐舍人孔伯魚侍焉戍士叩閤而入深安坐勞之曰戎旅在塗不至勞也既而軍人窺井而呼之後主不應欲下石乃聞呌聲以䋲引之驚其太重及出乃與張貴妃孔貴人三人同乘而上隋文帝聞之大驚開府鮑宏曰東井上於天文為秦今王都所在投井其天意邪先是江東謡多唱王獻之桃葉辭云桃葉復桃葉度江不用檝但度無所苦我自接迎汝及晉王廣軍於六合鎮其山名桃葉果乘陳船而度丙戌晉王廣入據䑓城送後主於東宮三月己巳後主與王公百司同發自建鄴之長安隋文帝權分京城人宅以俟内外修整遣使迎勞之陳人謳詠忘其亡焉使還奏言自後主以下大小在路五百里纍纍不絶隋文帝嗟歎曰一至於此及至京師列陳之車服噐物於庭引後主於前及前後二太子諸父諸弟衆子之為王者凡二十八人司空司馬消難尚書令江總僕射袁憲驃騎蕭摩訶䕶軍樊毅中領軍魯廣逹鎮軍将軍任忠吏部尚書姚察侍中中書令蔡徴左衛将軍樊猛自尚書郎以上二百餘人文帝使納言宣詔勞之次使内史令宣詔讓後主後主伏地屏息不能對乃見宥隋文帝詔陳文武宣三帝陵總給五户分守之初武帝始即位其夜奉朝請史普直宿省夢有人自天而下導從數十至太極殿前北面執玉䇿金字曰陳氏五帝三十二年及後主在東宫時有婦人突入唱曰畢國主有鳥一足集其殿庭以觜畫地成文曰獨足上髙䑓盛草變為灰欲知我家處朱門當水開解者以為獨足盖指後主獨行無衆盛草言荒穢隋承火運草得火而灰及至京師與其家屬館於都水䑓所謂上髙䑓當水也其言皆驗或言後主名叔寳反語為少福亦敗亡之徴云既見宥隋文帝給賜甚厚數得引見班同三品毎預宴恐致傷心為不奏呉音後監守者奏言叔寳云既無秩位每預朝集願得一官號隋文帝曰叔寳全無心肝監者又言叔寳常耽醉罕有醒時隋文帝使節其酒既而曰任其性不爾何以過日未幾帝又問監者叔寳所嗜對曰嗜驢肉問飲酒多少對曰與其子弟日飲一石隋文帝大驚及從東廵登芒山侍飲賦詩曰日月光天徳山川壮帝居太平無以報願上東封書幷表請封禪隋文帝優詔謙讓不許後從至仁壽宮常侍宴及出隋文帝目之曰此敗豈不由酒将作詩功夫何如思安時事當賀若弼度京口彼人密啟告急叔寳為飲酒遂不省之髙熲至日猶見啓在牀下未開封此亦是可笑盖天亡也昔苻氏所征得國皆榮貴其主茍欲求名不知違天命與之官乃違天也隋文帝以陳氏子弟既多恐京下為過皆分置諸州縣每嵗賜以衣服以安全之後主以隋仁壽四年十一月壬子終於洛陽時年五十二贈大将軍封長安縣公諡曰煬葬河南洛陽之芒山論曰陳宣帝噐度𢎞厚有人君之量文帝知冢嗣仁弱早存太伯之心及乎弗悆咸已委託矣至於纉業之後拓土開疆盖徳不逮文智不及武志大不已晚致吕梁之敗江左日蹙抑此之由也後主因削弱之餘鍾滅亡之運刑政不樹加以荒淫夫以三代之隆歴世數十及其亡也皆敗於婦人况以區區之陳外鄰明徳覆車之跡尚且追蹤叔季其獲支數年亦為幸也雖忠義感慨致慟井隅何救麥秀之深悲適足取笑乎干祀嗟乎始梁末童謡云可憐巴馬子一日行千里不見馬上郎但見黄塵起黄塵汗人衣皁莢相料理及僧辯滅群臣以謡言奏聞曰僧辯本乘巴馬以撃侯景馬上郎王字也塵謂陳也而不解皁莢之謂既而陳滅於隋說者以為江東謂羖羊角為皁莢隋氏姓楊楊羊也言終滅於隋然則興亡之兆盖有數云南史卷十南史卷十考證宣帝紀乙未桃根又上織成羅紋錦被表各二詔於雲龍門外焚之表陳書作裘二月壬子耕藉田壬子陳書作壬午丙子淳于陵剋柘州城柘陳書作祐後主紀光大二年累遷侍中二監本訛三今以光大止有二年改正之立皇弟叔敦為始興王敦陳書作重庚子詔鏤金銀薄庶物化生土木人綵華之屬庶監本作度今从陳書及南本叔韶為岳山王岳監本訛樂今从本傳改肆艫艦閲武肆南本作肄閣本注一作肄東冶鑄鐵有物赤色大如數升自天墜鎔所升陳書作斗盖升斗二字古文相似易致訛也南史卷十考證
