body:
  text: 南史卷二十八唐李延夀撰列傳第十八褚裕之弟淡之彦𤣥孫球湛之子回裕之兄子湛之彦回子賁蓁蓁子向弟向子翔彦回從炤炫彦回弟澄炫子澐澐孫玠褚裕之字叔度河南陽翟人晉太傅裒之曽孫也祖歆秘書監父爽金紫光禄大夫長兄秀之字長倩厯大司馬琅邪王從事中郎黄門侍郎宋武帝鎮西長史秀之妹晉恭帝后也秀之雖晉氏姻戚而盡心扵武帝遷侍中出補大司馬右司馬晉恭帝即位為祠部尚書宋受命徙太常元嘉初卒扵官秀之弟淡之字仲原亦厯顯官為宋武帝車騎従事中郎尚書吏部郎廷尉卿左衛將軍宋受命為侍中淡之兄弟並盡忠事武帝恭帝每生男輒令方便殺焉或誘賂内人或密加毒害前後如此非一及恭帝遜位居秣陵宫常懼見禍與褚后共止一室慮有酖毒自煑食扵前武帝將殺之不欲遣人入内令淡之兄弟視后褚后出别室相見兵人乃踰垣而入進藥扵恭帝帝不肯飲曰佛教自殺者不得復人身乃以被掩之後㑹稽郡缺朝議欲用蔡廓武帝曰彼自是蔡家佳兒何闗人事可用褚佛佛淡之小字也乃用淡之為㑹稽太守景平二年富陽孫氏聚合門宗謀逆其支黨在永興縣潛相影響永興令羊恂覺其謀以告淡之淡之不信乃以誣人之罪收縣職局扵是孫法先自號冠軍大將軍與孫道慶等攻没縣邑更相樹置遥以鄮令司馬文宣為征西大將軍建旗鳴鼓直攻山隂淡之自假陵江將軍以山隂令陸邵領司馬加振武將軍前員外散騎常侍王茂之為長史前國子博士孔欣前員外散騎常侍謝苓之並參軍事召行參軍七十餘人前鎮西諮議參軍孔甯子左光禄大夫孔季恭子山士並在艱中皆起為將軍遣隊主陳願郡議曹掾虞道納二軍過浦陽江願等戰敗賊遂推鋒而前去城二十餘里淡之遣陸邵水軍禦之而身率所領出次近郊邵與行參軍漏恭期合力大敗賊扵柯亭淡之尋卒諡曰質子裕之名與武帝同故行字焉初為太宰琅邪王行參軍武帝車騎參軍司徒左西屬中軍諮議參軍署中兵加建威將軍從征鮮卑盡其誠力盧循攻查浦叔度力戰有功循南走武帝板行廣州刺史加督建威將軍領平越中郎將在任四年廣營貲貨資財豐積坐免官禁錮終身還至都凡諸親舊及一面之欵無不厚加贈遺尋除太尉諮議參軍相國右司馬武帝受命為右衛將軍武帝以其名家而能竭盡心力甚嘉之封番禺縣男尋加散騎常侍永初四年出為雍州刺史領寧蠻校尉在任三年以清簡致稱景平二年卒子恬之嗣恬之弟寂之著作佐郎早卒寂之子曖尚宋文帝第六女琅邪真長公主位太宰參軍亦早卒曖子繢位太子舍人亦尚宋公主繢子球字仲寳少孤貧篤志好學有才思宋建平王景素元徽中誅滅唯有一女存故吏何昌㝢王思逺聞球清立以此女妻之仕齊為溧陽令在縣清白資公奉而已仕梁厯都官尚書通直散騎常侍祕書監領著作司徒右長史常侍著作如故自魏孫禮晉荀組以後台佐加貂始自球也後為散騎常侍光禄大夫加給事中湛之字休𤣥秀之子也尚宋武帝第七女始安哀公主拜駙馬都尉著作佐郎哀公主薨復尚武帝第五女呉郡宣公主諸尚主者並因世胄不必皆有才能湛之謹實有意幹故為文帝所知厯顯位為太子中庶子司徒左長史侍中左衛將軍左户尚書丹陽尹元凶弑􅊇以為吏部尚書復出為丹陽尹統石頭戍事孝武入伐劭自攻新亭壘使湛之率水師俱進湛之因攜二息彦回澄登輕舟南奔彦回始生一男為劭所殺孝武即位以為尚書右僕射孝建元年為中書令丹陽尹後拜尚書左僕射以南奔賜爵都鄊侯大明四年卒諡敬侯子彦回彦回幼有清譽宋元嘉末魏軍逼𤓰歩百姓咸負擔而立時父湛之為丹陽尹使其子弟並着芒屩扵齋前習行或譏之湛之曰安不忘危也彦回時年十餘甚有慙色湛之有一牛至所愛無故墮聽事前井湛之率左右躬自營救之郡中喧擾彦回下簾不視也又有門生盗其衣彦回遇見謂曰可密藏之勿使人見此門生慙而去不敢復還後貴乃歸罪待之如初尚宋文帝女南郡獻公主拜駙馬都尉除著作佐郎累遷秘書丞湛之卒彦回悉推財與弟澄唯取書數千卷湛之有兩厨寳物在彥回所生郭氏間嫡母吴縣主求之郭欲不與彦回曰但令彥回在何患無物猶不許彦回流涕固請乃從之襲爵都鄊侯厯位尚書吏部郎景和中山隂公主淫恣窺見彦回悦之以白帝帝召彦回西上閣宿十日公主夜就之備見逼迫彦回整身而立従夕至曉不為移志公主謂曰君鬚髯如戟何無文夫意彦回曰回雖不敏何敢首為亂階宋明帝即位累遷吏部尚書有人求官密袖中將一餅金因求請間出金示之曰人無知者彦回曰卿自應得官無假此物若必見與不得不相啓此人大懼妆金而去彦回敘其事而不言其名時人莫之知也帝之在蕃與彦回以風素相善至是深相委仗陳事皆見從改封雩都伯厯侍中領尚書右衛将軍彦回美儀貌善容止俯仰進退咸有風則每朝㑹百僚逺國使莫不延首目送之明帝甞嘆曰褚彦回能遲行緩歩便得宰相矣時人以方何平叔嘗聚袁粲舍初秋涼夕風月甚美彦回援琴奏别鵠之曲宫商既調風神諧暢王彧謝荘並在粲坐撫節而歎曰以無累之神合有道之噐宫商暫離不可得已時傖人常珍竒與薛安都為逆降叛非一後又求降眀帝加以重位彦回謂全其首領扵事已𢎞不足大加寵異帝不従珍竒尋又叛彦回後為呉郡太守帝寢疾危殆馳使召之欲託後事及至召入帝坐帳中流涕曰吾近危篤故召卿欲使著黄羅􅘼指牀頭大函曰文書皆函内寘此函不得復開彦回亦悲不自勝黄羅􅘼乳母服也帝雖小間猶懐身後慮建安王休仁人才令羙物情宗向帝與彦回謀誅之彦回以為不可帝怒曰卿癡不足與議事彦回懼而奉㫖復為吏部尚書衛尉卿尚書右僕射以母老疾晨昏須飬辭衛尉不許明帝崩遺詔以為中書令䕶軍将軍與尚書令袁粲受顧命輔幼主粲等雖同見託而意在彦回彦回同心理事務𢎞儉約百姓賴之既而王道隆阮佃夫用事姦賂公行彦回不能禁也遭所生䘮毁頓不復可識朞年不盥櫛唯泣淚處乃見其本質焉詔斷哭禁弔客葬畢起為中軍将軍本官如故元徽二年桂陽王休範反彦回與衛將軍袁粲入衛宫省鎮集衆心彦回初為丹陽與従弟炤同載道逢齊髙帝彦回舉手指髙帝車謂炤曰此非常人也出為吴興髙帝餉物别彦回又語人曰此人才貌非常将来不可測也及顧命之際引髙帝豫焉髙帝既平桂陽遷中領軍南兖州髙帝固讓與彦回及衛軍袁粲書陳情彦回粲荅書不従髙帝乃受命其年加彦回尚書令侍中給班劒二十人固讓令三年進爵為侯服闋改授中書監侍中䕶軍如故給鼓吹一部時淮北屬江南無復鰒魚或有間闗得至者一枚直數千錢人有餉彦回鰒魚三十枚彦回時雖貴而貧薄過甚門生有獻計賣之云可得十萬錢彦回變色曰我謂此是食物非曰財貨且不知堪賣錢聊爾受之雖復儉乏寧可賣餉取錢也悉與親游噉之少日便盡明年嫡母吴郡公主薨毁瘠骨立葬畢詔攝職固辭又以朞祭禮及表解職並不許蒼梧暴虐稍甚齊髙帝與彦回及袁粲言世事粲曰主上幼年微過易改伊霍之事非季世所行縦使功成亦終無全地彦回黙然歸心髙帝及廢蒼梧羣公集議袁粲劉彦節既不受任彦回曰非蕭公無以了此手取事授髙帝髙帝曰相與不肯我安得辭事乃㝎順帝立改號衞将軍開府儀同三司侍中如故甲仗五十人入殿及袁粲懐貳曰褚公眼睛多白所謂白虹貫日亡宋者終此人也他日粲謂彦回曰國家所倚唯公與劉丹陽及粲耳願各自勉無使竹帛所笑彦回曰願以鄙心寄公之腹則可矣然竟不能貞固及髙帝輔政王儉議加黄鉞任遐曰此大事應報褚公帝曰褚脱不與卿将何計遐曰彦回保妻子愛性命非有竒才異節遐能制之果無違異及沈攸之事起髙帝召彦回謀議彦回曰西夏舋難事必無成公當先備其内耳髙帝宻為其備事平進中書監司空齊臺建彦回白髙帝引何曾自魏司徒為晉丞相求為齊官髙帝謙而不許建元元年進位司徒侍中中書監如故改封南康郡公彦回讓司徒乃與僕射王儉書欲依蔡謨事例儉以非所宜言勸彦回受命終不就尋加尚書令二年重申前命為司徒又固讓魏軍動髙帝欲發王公以下無官者従軍彦回諫以為無益實用空致擾動上乃止三年七月帝親甞酎盛暑欲夜出彦回與左僕射王儉諫以為自漢宣帝以来不夜入廟所以誡非常人君之重所宜克慎從之時朝廷機事彦回多與議謀每見從納禮遇甚重上大宴集酒後謂朝臣曰卿等並宋時公卿亦當不言我應得天子王儉等未及荅彦回歛板曰陛下不得言臣不早識龍顔上笑曰吾有愧文叔知公為朱祐久矣彦回善彈琵琶齊武帝在東宫宴集賜以金鏤柄銀柱琵琶性和雅有噐度不妄舉動宅甞失火煙爓甚逼左右驚擾彦回神色怡然索輿徐去然世頗以名節譏之于時百姓語曰可憐石頭城寧為袁粲死不作彦回生髙帝崩遺詔以為録尚書事江左以来無單拜録者有司疑立優策尚書令王儉議以為見居本官别拜録應有策書而舊事不載中朝以来三公王侯則優策並設官品第二策而不優優者褒美策者兼明委寄尚書職居天官政化之本故尚書令品雖第三拜必有策録尚書品秩不見而總任彌重前代多與本官同拜故不别有策即事縁情不容均之凡僚宜有策書用申隆寄既異王侯不假優文従之尋増彦回班劒為三十人五日一朝頃之寢疾彦回少時嘗篤病夢人以卜著一具與之遂差其一至是年四十八矣嵗初便寢疾而太白熒惑相係犯上将彦回慮不起表遜位武帝不許乃改授司空驃騎將軍侍中録尚書事如故薨年四十八家無餘財負責數十萬詔給東園秘噐時司空掾屬以彦回未拜疑應為吏敬以不王儉議依禮婦在塗聞夫家䘮改服而入今掾屬雖未服勤而吏節禀扵天朝宜申禮敬司徒府史又以彦回既解職而未恭後授府應上服以不儉又議依中朝士孫徳祖従樂陵遷為陳留未入境樂陵郡吏依見君之禮陳留迎吏依娶女有吉日齋衰弔司徒府宜依居官制服又詔贈太宰侍中録尚書公如故增班劒為六十人葬送禮悉依宋太保王𢎞故事諡曰文簡先是庶姓三公轜車未有㝎格王儉議官品第一皆加幢絡自彦回始也又詔彦回妻宋故巴西主埏􅎬蹔啓宜贈南康郡公夫人長子賁字蔚先少耿介父背袁粲等附髙帝賁深執不同終身愧恨之有棲退之志位侍中彦回薨服闋見武帝賁流涕不自勝上甚嘉之以為侍中領歩兵校尉左户尚書常謝病在外上以此望之遂諷令辭爵讓與弟蓁仍居墓下及王儉薨乃騎水牛出弔以繫門外柱入哭盡哀而退家人不知也㑹疾篤其子霽載以歸疾小間知非故處大怒不肯復飲食内外閤悉釘塞之不與人相聞數日裁餘氣息謝􅊪聞其弊往候之排閤不可開以杵搥破進見賁曰事之不可得者身也身之不可全者名也名與身俱滅者君也豈不全之㦲賁曰吾少無人間心豈身名之可慕但願啓手歸全必在舊隴兒軰不才未逹余趣移尸徙殯失吾素心更以此為恨耳永明七年卒蓁字茂緒位義興太守八年改封巴東郡侯明年表讓封還賁子霽詔許之建武末蓁位太子詹事度支尚書領前軍将軍永元元年卒太常諡穆子蓁子向字景政年數嵗父母相繼亡沒毁若成人親表異之及長淹雅有器量位長兼侍中向風儀端麗眉目如畵每公庭就列為衆所瞻望焉仕梁卒扵北中郎廬陵王長史子翔翔字世舉起家秘書郎累遷宣城王主簿中大通五年梁武帝宴羣臣樂游苑别詔翔與王訓為二十韻詩限三刻成翔扵坐立奏帝異焉即日補宣城王文學俄遷友時宣城友文學加正王二等翔超為之時論美焉出為義興太守在政潔己省繁苛去游費百姓安之郡西亭有古樹積年枯死翔至郡忽更生枝葉咸以為善政所感以秩滿吏人詣闕請之敕許焉尋徴為吏部郎去郡百姓無老少追送出境涕泣拜辭翔居小選公清不為請屬易意號為平允遷侍中太清二年守吏部尚書丁母憂以毁卒翔少有孝行為侍中時母病篤請沙門祈福中夜忽見户外有異光又聞空中彈指及旦疾遂愈咸以為精誠所致云澄字彦道彦回弟也初湛之尚始安公主薨納側室郭氏生彦回後尚吴郡主生澄彦回事主孝謹主愛之湛之亡主表彦回為嫡澄尚宋文帝女廬江公主拜駙馬都尉厯官清顯善醫術建元中為吴郡太守百姓李道念以公事到郡澄見謂曰汝有重疾荅曰舊有冷疾至今五年衆醫不差澄為診脉謂曰汝疾非冷非熱當是食白􅊪雞子過多所致令取蘇一升煑服之始一服乃吐得一物如升涎裹之動開看是雞雛羽翅爪距具足能行走澄曰此未盡更服所餘藥又吐得如向者雞十三頭而病都差當時稱妙豫章王感病髙帝召澄為療立愈尋遷左户尚書彦回薨澄以錢一萬一千就招提寺贖髙帝所賜彦回白貂坐褥壊作裘及䙬又贖彦回介幘犀導及彦回常所乗黄牛永明元年為御史中丞袁彖所奏免官禁錮見原遷侍中領右軍将軍以勤謹見知澄女為東昏皇后永元元年卒追贈金紫光禄大夫炤字彦宣彦回從父弟也父法顯鄱陽太守炤少有髙節王儉甞稱才堪保傅為成安郡還以一目眇召為國子博士不拜常非彦回身事二代彦回子賁往問訊炤炤問曰司空今日何在賁曰奉璽紱在齊大司馬門炤正色曰不知汝家司空将一家物與一家亦復何謂彦回拜司徒賔客满坐炤歎曰彦回少立名行何意披猖至此門户不幸乃復有今日之拜使彦回作中書郎而死不當是一名士邪名徳不昌遂有期頤之夀彦回性好戯以軺車給之炤大怒曰著此辱門户那可令人見索火燒之馭人奔車乃免炤弟炫炫字彦緒少清簡為従舅王景文所知從兄彦回謂人曰従弟㢘勝獨立乃十倍扵我為正員郎從宋明帝射雉帝至日中無所得甚猜羞召問侍臣曰吾旦来如臯遂空行可笑坐者莫荅炫獨曰今節候雖適而雲霧尚凝故斯翬之禽驕心未警但得神駕猶豫羣情便可載驩帝意解乃扵雉場置酒遷中書侍郎司徒右長史昇明初炫以清尚與彭城劉俣陳郡謝朏濟陽江斆入殿侍文義號為四友齊臺建為侍中領歩兵校尉以家貧建元初出補東陽太守前後三為侍中與従兄彦回操行不同故彦回之世不至大官永明元年為吏部尚書炫居身清立非弔問不雜交游論者以為美及在選部門庭蕭索賔客罕至出行左右常捧一黄紙㡌箱風吹紙剝殆盡罷江夏郡還得錢十七萬於石頭并分與親族病無以市藥以冠劒為質表自陳解改授散騎常侍領安成王師國學建以本官領博士未拜卒無以殯斂時年四十一贈太常諡貞子子澐澐字士洋仕梁為曲阿令厯晉安王中錄事正員郎烏程令兄游亡棄縣還為太尉屬延陵令中書侍郎太子率更令御史中丞湘東王府諮議參軍卒澐之為縣令清慎可紀好學解音律重賔客雅為湘東王所親愛澐子蒙位太子舍人蒙子玠玠字温理九嵗而孤為叔父驃騎従事中郎随所養早有令譽先逹多以才噐許之及長羙風儀善占對博學能屬文訓義典實不尚淫靡陳天嘉中兼通直散騎常侍聘齊還遷中書侍郎太建中山隂縣多豪猾前後令皆以贓汚免宣帝謂中書舍人蔡景厯曰稽隂大邑久無良宰卿文士之内試思其人景厯進玠帝曰甚善卿言與朕意同乃除山隂令縣人張次的王休逹等與諸猾吏賄賂通姦全丁大户類多隱没玠鏁次的等具状啓臺宣帝手敕慰勞并遣使助玠搜括所出軍人八百餘户時舍人曹義達為宣帝所寵縣人陳信家富諂事義達信父顯文恃勢横暴玠乃遣使執顯文鞭之一百扵是吏人股慄信後因義達譖玠竟坐免官玠在任嵗餘守禄俸而已去官之日不堪自致因留縣境種蔬菜以自給或以玠非百里才玠曰吾委輸課最不後列城除殘去暴姦吏局蹐若謂其不能自潤脂膏則如来命以為不達従政吾未服也時人以為信然皇太子知玠無還装手書賜粟米二百斛扵是還都後累遷御史中丞玠剛毅有膽决善騎射甞従司空侯安都扵徐州出獵遇猛獸玠射之載發皆中口入腹俄而獸斃及為御史中丞甚有直繩之稱卒扵官皇太子親製誌銘以表惟舊至徳二年贈秘書監所製章奏雜文二百餘篇皆切事理由是見重於世子亮位尚書殿中侍郎論曰褚氏自至江左人焉不墜彦回以此世資時譽早集及扵逢迎興運謗議沸騰既以人望見推亦以人望而責也炤貞勁之性炫㢘勝之風求之古人亦何以加此玠公平諒直文武兼資可謂世業無隕者矣南史卷二十八南史卷二十八考證褚裕之傳與行參軍漏恭期合力大敗賊扵柯亭期監本訛欺今从閣本褚彦回傳人君之重所宜克慎宜一本作以謂朝臣曰卿等並宋時公卿亦當不言我應得天子當不一本作不當南史卷二十八考證
