body:
  text: 南史卷二十二唐李延壽撰列傳第十二王曇首子僧綽騫子規孫儉暕騫弟曽孫騫暕子承訓僧綽弟僧虔慈弟志僧虔子慈志弟子筠慈子泰志弟彬寂王曇首太保𢎞之弟也幼有素尚兄弟分財曇首唯取圖書而已辟琅邪王大司馬属従府公修復洛陽園陵與従弟球俱詣宋武帝帝曰並膏梁世徳乃能屈志戎旅曇首答曰既従神武自使懦夫立志時謝晦在坐曰仁者果有勇帝悦及至彭城大㑹戲馬臺賦詩曇首文先成帝問𢎞曰卿弟何如卿答曰若但如下官門户何寄帝大笑曇首有智局喜愠不見於色閨門内雍雍如也手不執金玉婦女亦不得以為飾玩自非禄賜一毫不受於人為文帝鎮西長史武帝謂文帝曰曇首輔相才也汝可每事諮之及文帝被迎入奉大統議者皆致疑曇首與到彦之従兄華並勸上行上猶未許曇首固諫并言天人符應上乃下率府州文武嚴兵自衛臺所遣百官衆力不得近部伍中兵參軍朱容子抱刀在平乘户外不觧帶者累旬及即位謂曇首曰非宋昌獨見無以致此以曇首為侍中領驍騎将軍容子為右軍将軍誅徐羡之等及平謝晦皆曇首及華力也元嘉四年車駕出北堂使三更竟開廣莫門南臺云應湏白獸幡銀字棨不肯開尚書左丞羊𤣥保奏免御史中丞傅隆㫖下曇首曰既無異敕又闕幡棨雖稱上㫖不異單刺元嘉元年二年雖有再開門例此乃前事之違今之守舊未為非禮其不請白獸幡銀字􅙺致開門不時由尚書相承之失亦合糾正上特無問更立科條遷太子詹事侍中如故自謝晦平後上欲封曇首等㑹讌集舉酒勸之因拊御牀曰此坐非卿兄弟無復今日出詔以示之曇首曰豈可因國之災以為身幸陛下雖欲私臣當如直史何封事遂寝時𢎞録尚書事又為揚州刺史曇首為上所親委任兼兩宫彭城王義康與𢎞並録意常怏怏又欲得揚州以曇首居中分其權任愈不悦曇首固乞吴郡文帝曰豈有欲建大厦而遺其棟梁賢兄比屢稱疾固辭州任将來若相申許此處非卿而誰時𢎞久疾屢遜位不許義康謂賓客曰王公久疾不起神州詎合卧臨曇首勸𢎞減府兵力之半以配義康乃悦七年卒時年三十七文帝臨慟歎曰王詹事所疾不救國之衰也中書舍人周﨣侍側曰王家欲衰賢者先殞上曰直是我家衰耳贈光禄大夫九年以預誅徐羡之等謀追封豫寧縣侯諡曰文孝武即位配饗文帝廟庭子僧綽嗣僧綽幼有大成之度衆便以國器許之好學練悉朝典年十三文帝引見拜便流涕哽咽上亦悲不自勝襲封豫寧縣侯尚文帝長女東陽獻公主初為江夏王義恭司徒參軍累遷尚書吏部郎參掌大選究識流品任舉咸盡其分僧綽深沉有局度不以才能髙人父曇首與王華並被任遇華子新建侯嗣才劣位遇亦輕僧綽嘗謂中書侍郎蔡興宗曰弟名位與新建齊弟超至今日盖姻戚所致也遷侍中時年二十九始興王濬嘗問其年僧綽自嫌早達逡廵良久乃答其謙退若此元嘉末文帝頗以後事為念大相付託朝政大小皆參焉従兄微清介士也懼其太盛勸令損抑僧綽乃求吴郡及廣州並不許㑹巫蟲事洩上先召僧綽具言之及将廢立使尋求前朝舊典劭於東宫夜饗将士僧綽宻以唘聞上又令撰漢魏以來廢諸王故事送與江湛徐湛之欲立随王誕江湛欲立南平王鑠文帝欲立建平王宏議久不決誕妃即湛之女鑠妃湛妹也僧綽曰建立之事仰由聖懐臣謂惟宜速斷幾事難宻不可使難生慮表取笑千載上曰卿可謂能斷大事此事不可不殷勤且庶人始亡人将謂我無復慈愛之道僧綽曰恐千載之後言陛下惟能裁弟不能裁兒上默然江湛出閤謂僧綽曰卿向言将不傷直邪僧綽曰弟亦恨君不直及劭弑逆江湛在尚書上省聞變曰不用王僧綽言至此劭立轉僧綽吏部尚書及檢文帝巾箱及湛家書疏得僧綽所唘饗士并廢諸王事乃収害焉因此䧟北第諸侯王以為與僧綽有異志孝武即位追贈金紫光禄大夫諡曰愍侯初太社西空地本吴時丁奉宅孫皓流徙其家江左初為周顗蘇峻宅後為袁悦宅又為章武王司馬秀宅皆以凶終及給臧燾亦頻遇禍故世稱凶地僧綽嘗謂宅無吉凶請以為第始造未及居而敗子儉儉字仲寳生而僧綽遇害為叔父僧虔所養四嵗襲爵豫寧縣侯拜受茅土流涕嗚咽幼篤學手不釋卷賓客或相稱羙僧虔曰我不患此兒無名政恐名太盛耳乃手書崔子玉座右銘以貽之丹陽尹袁粲聞其名及見之曰宰相之門也栝栢豫章雖小已有棟梁氣矣終當任人家國事言之宋明帝選尚陽羡公主拜駙馬都尉帝以儉嫡母武康主同太初巫蠱事不可以為婦姑欲開冡離葬儉因人自陳密以死請故事不行年十八觧褐祕書郎太子舍人超遷祕書丞依七畧撰七志四十卷表獻之又撰定元徽四部書目母憂服闋為司徒右長史晉令公府長史著朝服宋大明以來著朱衣儉上言宜復舊制時議不許及蒼梧暴虐儉告袁粲求外出引晉新安主婿王獻之任吴興為例補義興太守昇明二年為長史兼侍中以父終此職固讓先是齊髙帝為相欲引時賢參讃大業時謝朏為長史帝夜召朏却人與語久之朏無言唯有二小兒捉燭帝慮朏難之仍取燭遣兒朏又無言帝乃呼左右儉素知帝雄異後請間言於帝曰功髙不賞古來非一以公今日位地欲北面居人臣可乎帝正色裁之而神采内和儉因又曰儉蒙公殊眄所以吐所難吐何賜拒之深宋以景和元徽之淫虐非公豈復寧濟但人情澆薄不能持久公若小復推遷則人望去矣豈唯大業永淪七尺豈可得保帝笑曰卿言不無理儉又曰公今名位故是經常宰相宜禮絶羣后微示變革當先令褚公知之儉請銜命帝曰我當自往經少曰帝自造彦囘款言移晷乃謂曰我夢應得官彦囘曰今授始爾恐一二年間未容便移且吉夢未必便在旦夕帝還告儉儉曰褚是未逹理虞整時為中書舍人甚閑辭翰儉乃自報整使作詔及髙帝為太尉引儉為右長史尋轉左専見任用大典将行禮儀詔策皆出於儉褚彦回唯為詔又使儉參懐定之齊臺建遷尚書左僕射領吏部時年二十八多所引進時客有姓譚者詣儉求官儉謂曰齊桓滅譚那得有君答曰譚子奔莒所以有僕儉賞其善據卒得職焉髙帝嘗従容謂儉曰我今日當以青溪為鴻溝對曰天應人順庶無椘漢之事時朝儀草創衣服制則未有定凖儉議曰漢景六年梁王入朝中郎謁者金貂出入殿門左思魏都賦云藹藹列侍金貂齊光此藩國侍臣有貂之明文晉百官表云太尉參軍四人朝服武冠此又宰府之明文又疑百僚敬齊公之禮儉又曰晉王受命勸進云沖等眷眷稱名則應盡禮而世子禮秩未定儉又曰春秋曹世子來朝待以上公之禮下其君一等今齊公九命禮冠列藩世子亦宜異數並従之世子鎮石頭城仍以為世子宫儉又曰魯有靈光殿漢之前例也聴事為崇光殿外齋為宣徳殿以散騎常侍張緒為世子詹事車服悉依東宫制度髙帝踐阼與儉議佐命功臣従容謂曰卿謀謨之功莫與為二卿止二千户意以為少趙充國猶能自舉西零之任況卿與我情期異常儉曰昔宋祖創業佐命諸公開國不過二千以臣比之唯覺超越上笑曰張良辭侯何以過此建元元年改封南昌縣公時都下舛雜且多姦盜上欲立符伍家家以相檢括儉諫曰京師翼翼四方是湊必也持符於事既煩理成不曠謝安所謂不爾何以為京師乃止是嵗有司奏定郊殷之禮儉以為宜以今年十月殷祭宗廟自此以後五年再殷祭二年正月上辛有事南郊即以其日還祭明堂又用次辛饗祀北郊而並無配従之明年轉左僕射領選如故初宋眀帝紫極殿珠簾綺柱飾以金玉江左所未有髙帝欲以其材起宣陽門儉與褚彦回及叔父僧䖍連名表諫上手詔酬納宋世宫門外六門城設竹籬是年初有發白虎樽言白門三重門竹籬穿不完上感其言改立都墻儉又諫上答曰吾欲後世無以加也朝廷初基制度草創儉問無不決上每曰詩云惟岳降神生甫及申今天為我生儉也其年固請觧選見許帝幸樂遊宴集謂儉曰卿好音樂孰與朕同儉曰沐浴唐風事兼比屋亦既在齊不知肉味帝稱善後幸華林宴集使各效伎藝褚彦回彈琵琶王僧虔栁世隆彈琴沈文季歌子夜來張敬兒舞儉曰臣無所解唯知誦書因跪上前誦相如封禪書上笑曰此盛徳之事吾何以堪之後上使陸澄誦孝經起自仲尼居儉曰澄所謂博而寡要臣請誦之乃誦君子之事上章上曰善張子布更覺非竒也於是王敬則脱朝服袒以絳糾髻奮臂拍張呌動左右上不悦曰豈聞三公如此答曰臣以拍張故得三公不可忘拍張時以為名答儉尋以本官領太子詹事加兵三百人時皇太子妃薨左衛将軍沈文季經為宫臣未詳服不儉議曰漢魏以來宫僚先備臣隷之節具體在三存既盡敬亡豈無服昔庾翼喪妻王允滕含猶謂府吏宜有小君之服况臣節之重宜依舊君之妻齊衰三月而除上崩遺詔以儉為侍中尚書令鎮軍每上朝令史恒有三五十人随上諮事辯析未嘗壅滯褚彦回時為司徒録尚書笑謂儉曰觀令判斷甚樂儉曰所以得厝私懐寔由禀明公不言之化武帝即位給班劒二十人進號衛将軍掌選事時有司以前代嗣位或仍前郊年或别為郊始晉宋以來未有畫一儉議曰晉明帝大寧三年南郊其年九月崩成帝即位明年改元亦郊簡文咸安三年南郊其年七月崩孝武即位明年改元亦郊宋元嘉三十年正月南郊二月崩孝武嗣位明年亦郊此二代明例差可依放今聖明係業幽顯宅心言化則頻郊非嫌語事則元號初改禋燎登配孝敬兼遂謂明年正月宜饗禮二郊虞祭明堂自茲以後依舊間嵗有司又以明年正月上辛應南郊而立春在上辛後郊在立春前為疑儉曰宋景平元年正月三日辛丑南郊其月十一日立春元嘉十六年正月六日辛未南郊其月八日立春此近世明例也並從之永明二年領丹陽尹三年領國子祭酒又領太子少傅舊太子敬二傅同至是朝議接少傅以賔友禮宋時國學頽廢未暇修復宋明帝泰始六年置總明觀以集學士或謂之東觀置東觀祭酒一人總明訪舉郎二人儒𤣥文史四科科置學士十人其餘令史以下各有差是嵗以國學既立省總明觀於儉宅開學士館以總明四部書充之又詔儉以家為府四年以本官領吏部先是宋孝武好文章天下悉以文采相尚莫以専經為業儉弱年便留意三禮尤善春秋發言吐論造次必於儒教由是衣冠翕然並尚經學儒教於此大興何承天禮論三百卷儉抄為八帙又别抄條目為十三卷朝儀舊典晉末來施行故事撰次諳憶無遺漏者所以當朝理事斷決如流每博議引正先儒罕有其例八坐丞郎無能異者令史諮事賔客滿席儉應接銓序傍無留滯十日一還監試諸生巾卷在庭劒衛令史儀容甚盛作觧散幘斜揷簮朝野慕之相與放效儉常謂人曰江左風流宰相惟有謝安盖自况也武帝深委仗之士流選用奏無不可五年儉即本號開府儀同三司固讓六年重申前命先是詔儉三日一還朝尚書令史出諮事上以往来煩數詔儉還尚書下省月聴十日出外儉唘求觧選上不許七年乃上表固請見許改領中書監參掌選事其年疾上親臨視薨年三十八詔衛軍文武及臺所給兵仗悉停侍葬又詔追贈太尉加羽葆鼓吹増班劒為六十人葬禮依太宰文簡公褚彦回故事諡文憲公儉寡嗜慾唯以經國為務車服塵素家無遺財手筆典裁為當時所重少便有宰臣之志賦詩云稷契匡虞夏伊吕翼商周及生子字曰𤣥成取仍世作相之義撰古今喪服集記并文集並行於世梁武帝受禪詔為儉立碑降爵為侯儉弟遜宋昇明中為丹陽丞告劉彦節事不蒙封賞建元初為晉陵太守有怨言儉慮為禍因禇彦囘唘聞中丞陸澄依事舉奏詔以儉竭誠佐命特降刑書宥遜逺徙永嘉郡於道伏誅長子騫嗣騫字思寂本字𤣥成與齊髙帝偏諱同故改焉性凝簡慕樂廣為人未嘗言人之短諸女子姪皆嬪王尚王朔望來歸輜軿填咽非所欲也敕嵗中不過一稱見嘗従容謂諸子曰吾家本素族自可依流平進不湏茍求也歴黄門郎司徒右長史不事産業有舊墅在鍾山八十餘頃與諸宅及故舊共佃之常謂人曰我不如鄭公業有田四百頃而食常不周以此為愧永元末召為侍中不拜三年春枉矢晝見西方長十餘丈騫曰此除舊布新之象也及梁武起兵騫曰天時人事其在此乎梁武霸府建引為大司馬諮議參軍遷侍中及帝受禪降封為侯歴位度支尚書中書令武帝於鍾山西造大愛敬寺騫舊墅在寺側者即王導賜田也帝遣主書宣㫖就騫市之欲以施寺答云此田不賣若敕取所不敢言酬對又脱畧帝怒遂付市評田價以直逼還之由是忤㫖出為吴興太守騫性侈於味而儉於服頗以多忌為累又惰於接物雖王書宣敕或過時不見才望不及弟􅀈特以儉之嫡故不棄於時􅀈為尚書左丞僕射當朝用事騫自中書令為郡邑邑不樂在郡卧不視事徴復為度支尚書加給事中領射聲校尉以母憂去職普通三年卒年四十九贈侍中金紫光禄大夫諡曰安子規規字威明八嵗丁所生母憂居喪有至性齊太尉徐孝嗣每見必為流涕稱曰孝童叔父􅀈亦深器重之常曰此兒吾家千里駒也年十二畧通五經大義及長遂博涉有口辯為本州迎主簿起家祕書郎累遷太子洗馬天監十二年改造太極殿畢規獻新殿賦其辭甚工後為晉安王綱雲麾諮議叅軍久之為新安太守父憂去職服闋襲封南昌縣侯除中書黄門侍郎敕與陳郡殷芸琅邪王錫范陽張緬同侍東宫俱為昭眀太子所禮湘東王繹時為丹陽尹與朝士宴集属規為酒令規從容曰江左以来未有茲舉特進蕭琛金紫光禄大夫傅昭在坐並謂為知言朱异嘗因酒卿規規責以無禮普通初陳慶之北侵陷洛陽百僚稱慶規退曰可弔也又何賀焉道家有云非為功難成功難也昔桓温得而復失宋武竟無成功我孤軍無援深入寇境将為亂階俄見覆沒六年武帝於文徳殿餞廣州刺史元景隆詔羣臣賦詩同用五十韻規援筆立奏其文又羙武帝嘉焉即日授侍中後為晉安王長史王立為太子仍為散騎常侍太子中庶子侍東宫太子賜以所服貂蟬并降令書悦是舉也尋為吴郡太守主書苪珍宗家在吴前守宰皆傾意附之至是珍宗假還規遇之甚薄珍宗還都密奏規不理郡事俄徴為左户尚書郡境千餘人詣闕請留表三奏不許求於郡樹碑許之規常以門宗貴盛恒思減退後為太子中庶子領步兵校尉辭疾不拜遂於鍾山宋熙寺築室居焉卒贈光禄大夫諡曰文皇太子出臨哭與湘東王繹令曰王威明風韻遒上神峯標映千里絶迹百尺無枝實俊人也一爾過隙永歸長夜金刀掩芒長淮絶涸去嵗冬中已傷劉子今茲寒孟復悼王生俱往之傷信非虛說規集後漢衆家異同注續漢書二百卷文集二十卷子褒魏尅江陵入長安暕字思晦騫弟也年數嵗而風神警拔有成人之度時父儉作宰相賓客盈門見暕曰公才公望復在此矣弱冠選尚淮南長公主拜駙馬都尉歴祕書丞齊明帝詔求選士始安王遥光薦暕及東海王僧􅐐除暕騎從事中郎天監中歴位侍中吏部尚書領國子祭酒門貴與物隔不能留心寒素頗稱刻薄後為尚書左僕射領國子祭酒卒諡曰靖子承訓並通顯承字安期初為祕書郎累遷中書黄門侍郎兼國子博士時膏腴貴遊咸以文學相尚罕以經術為業唯承獨好儒業遷長史兼侍中俄轉國子祭酒承祖儉父暕皆為此職三世為國師前代未之有久之出為東陽太守政存寛恵吏人悦之卒郡諡曰章承性簡貴有風格右衛朱异當朝用事每休下車馬填門有魏郡申英者門寒才俊好危言髙論以忤權右嘗指异門曰此中輻湊皆為利往能不至者唯大小王東陽耳小東陽即承弟穉也時唯承兄弟及褚翔不至异門世並稱之訓字懐範生而紫胞師媪云法當貴幼聰警有識量僧正恵超見而竒之謂門人羅智國曰四郎眉目疎朗舉動和韻此是興門户者智國以白暕暕亦曰不墜基業其在文殊文殊訓小字也年十三暕亡憂毁家人莫識十六召見文徳殿應對爽徹上目送之久謂朱异曰可謂相門有相初補國子生問說師袁昻昻曰久籍髙名有勞虛想及觀容止若披雲霧俄而諸袁子弟來昻謂諸助教曰我兒出十數若有一子如此實無所恨射策除祕書郎累遷祕書丞嘗詩云旦奭匡世功蕭曹佐甿俗追祖儉之志也後拜侍中入見武帝帝問何敬容曰褚彦回年幾為宰相敬容曰少過三十上曰今之王訓無謝彦回訓羙容儀善進止文章為後進領袖年二十六卒諡温子僧䖍金紫光禄大夫僧綽弟也父曇首與兄弟集㑹子孫任其戲適僧逹跳下地作彪子時僧虔累十二博棊既不墜落亦不重作僧綽採蠟燭珠為鳯皇僧逹奪取打壊亦復不惜伯父𢎞歎曰僧逹俊爽當不減人然亡吾家者終此子也僧䖍必至公僧綽當以名義見羙或云僧䖍採燭珠為鳯皇𢎞稱其長者云僧䖍弱冠雅善隸書宋文帝見其書素扇歎曰非唯跡逾子敬方當器雅過之為太子舍人退黙少交接與袁淑謝莊善淑每歎之曰卿文情鴻麗學觧深拔而韜光潜實物莫之窺雖魏陽元之射王汝南之騎無以加焉遷司徒左西属兄僧綽為宋元凶所害親賓咸勸之逃僧䖍泣曰吾兄奉國以忠貞撫我以慈愛今日之事苦不見及耳若同歸九泉猶羽化也孝武初出為武陵太守擕諸子姪兄子儉中塗得病僧䖍為廢寝食同行客慰喻之僧䖍曰昔馬援子姪之間一情不異鄧攸於弟子更逾所生吾實懐其心誠未異古亡兄之𦙍不宜忽諸若此兒不救便當回舟謝職還為中書郎再遷太子中庶子孝武欲擅書名僧䖍不敢顯跡大眀世常用拙筆書以此見容後為御史中丞領驍騎将軍甲族由来多不居憲臺王氏分枝居烏衣者位宦微減僧虔為此官乃曰此是烏衣諸郎坐處我亦可試為耳泰始中為吴興太守始王獻之善書為吴興郡及僧䖍工書又為郡論者稱之徙㑹稽太守中書舍人阮佃夫家在東請假歸客勸僧䖍以佃夫要幸宜加禮接僧䖍曰我立身有素豈能曲意此軰彼若見惡當拂意去耳佃夫言於宋眀帝使御史中丞孫夐奏僧䖍坐免官尋以白衣領侍中元徽中為吏部尚書尋加散騎常侍轉右僕射昇明二年為尚書令嘗為飛白書題尚書省壁曰圓行方止物之定質修之不已則溢髙之不已則慄馳之不已則躓引之不已則迭是故去之宜疾當時嗟賞以比坐右銘兄子儉每覲見輒朂以前言往行忠貞止足之道雅好文史觧音律以朝廷禮樂多違正典人間競造新聲時齊髙帝輔政僧虔上表請正聲樂髙帝乃使侍中蕭恵基調正清商音律齊受命轉侍中丹陽尹郡縣獄相承有上湯殺囚僧虔上言湯本救疾而實行寃暴若罪必入重自有正刑若去􅁖宜疾則應先唘豈有死生大命而潛制下邑上納其言而止文恵太子鎮雍州有盜發古冡者相傳云是椘王冡大獲寳物玉履玉屏風竹簡書青絲綸簡廣數分長二尺皮節如新有得十餘簡以示僧䖍云是科斗書考工記周官所闕文也髙帝素善書篤好不已與僧䖍賭書畢謂曰誰為第一對曰臣書第一陛下亦第一帝笑曰卿可謂善自為謀或云帝問我書何如卿答曰臣正書第一草書第二陛下草書第二而正書第三臣無第三陛下無第一帝大笑曰卿善為辭然天下有道丘不與易也帝示僧虔古迹十一卷就求能書人名僧䖍得人間所有卷中所無者吴大皇帝景帝歸命侯書桓𤣥書及王丞相導領軍洽中書令珉張芝索靖衛伯儒張翼十一卷奏之又上羊欣所撰能書人名一卷遷湘州刺史侍中如故清簡不營財産百姓安之武帝即位以風疾欲陳觧遷侍中左光禄大夫開府儀同三司僧䖍少時羣􅀙並㑹客有相之云僧䖍年位最髙仕當至公餘人莫及及此授僧虔謂兄子儉曰汝任重於朝行當有八命之禮我若復此授一門有二台司實所畏懼乃固辭上優而許之客問其故僧虔曰吾榮位已過無以報國豈容更受髙爵方貽官謗邪儉既為朝宰起長梁齋制度小過僧䖍視之不悦竟不入戸儉即日毁之永明三年薨時年六十追贈司空侍中如故諡簡穆僧䖍頗觧星文夜坐見豫章分野當有事故時僧䖍子慈為豫章内史慮有公事少時而僧䖍薨棄郡奔赴時有前将軍陳天福坐討唐㝢之於錢唐掠奪百姓財物棄市先是天福将行令家人豫作夀冡未至東又信催速就冡成而得罪因以葬焉又宋世光禄大夫劉鎮之年三十許病篤已辦凶具既而疾愈因畜棺以為夀九十餘乃亡此器方用因此而言天道未易知也僧虔論書云宋文帝書自言可比王子敬時議者云天然勝羊欣工夫少於欣王平南廙右軍叔過江右軍之前以為最亡曽祖領軍右軍云弟書遂不減吾變古制今惟右軍領軍不爾至今猶法鍾張亡従祖中書令書子敬云弟書如騎騾駸駸恒欲度驊騮前庾征西翼書少時與右軍齊名右軍後進庾猶不分在荆州與都下人書云小兒軰賤家雞皆學逸少書湏吾下當比之張翼王右軍自書表晉穆帝令翼寫題後答右軍當時不别久後方悟云小人幾欲亂真張芝索靖韋誕鍾㑹二衛並得名前代無以辨其優劣唯見其筆力驚異耳張澄當時亦呼有意郗愔章草亞於右軍郗嘉賓草亞於二王緊媚其父桓𤣥自謂右軍之流論者以比孔琳之謝安亦入能書録亦自重為子敬書嵇康詩羊欣書見重一時親受子敬行書尤善正乃不稱名孔琳之書天然縦放極有筆力規矩恐在羊欣後丘道護與羊欣俱面受子敬故當在欣後范曄與蕭思話同師羊欣後小叛既失故步為復小有意耳蕭思話書羊欣之影風流趨好殆當不減筆力恨弱謝綜書其舅云緊生起是得賞也恨少媚好謝靈運書乃不倫遇其合時亦得入流賀道力書亜丘道護庾昕學右軍亦欲亂真矣僧䖍嘗自書讓尚書令表辭制既雅筆迹又麗時人以比子敬崇賢吴郡顧寳先卓越多竒自以伎能僧䖍乃作飛白以示之寳先曰下官今為飛白屈矣僧䖍著書賦儉為注序甚工僧䖍宋世嘗有書誡子曰知汝恨吾未許汝學欲自悔厲或以闔棺自欺或更擇羙業且得有慨亦慰窮生但亟聞斯唱未覩其實吾未信汝非徒然也往年有意於史取三國志聚置牀頭百日許復徙業就𤣥汝曽未窺其題目未辨其指歸而終日自欺人人不受汝欺也由吾不學無以為訓然重華無嚴父放勛無令子亦各由己耳汝軰竊議亦當云阿越不學何忽自課汝見其一耳不全爾也設令吾學如馬鄭亦復甚勝復倍不如今亦必大減致之有由従身上来也汝今壮年自勤數倍許勝劣及吾耳吾在世雖乏徳素要復推排人間十許年故是一舊物人或以比數汝耳即化之後若自無調度誰復知汝事者舍中亦有少負令譽弱冠越超清級者于是王家門中優者龍鳯劣猶虎豹失蔭之後豈龍虎之議况吾不能為汝蔭政應各自努力耳或有身經三公蔑爾無聞布衣寒素輕相屈體父子貴賤殊兄弟聲名異何也體盡讀數百卷書耳吾今悔無所及欲以前車誠爾後乘也汝年入立境方應従宦兼有室累何處復得下帷如王即時邪各爾身已切豈復闗吾邪鬼唯知愛深松茂柏寧知子弟毁譽事因汝有感故畧叙胷懷子慈慈字伯寳年八嵗外祖宋太宰江夏王義恭迎之内齋施寳物恣所取慈取素琴石硯及孝子圖而已義恭善之袁淑見其幼時撫其背曰叔慈内潤也少與従弟儉共書學謝鳯子超宗嘗候僧虔仍往東齋詣慈慈正學書未即放筆超宗曰卿書何如䖍公慈曰慈書比大人如雞之比鳯超宗狼狽而退十嵗時與蔡興宗子約入寺禮佛正遇沙門懴約戲慈曰衆僧今日可謂䖍䖍慈應聲曰卿如此何以興蔡氏之宗歴位吴郡太守大司馬長史侍中領步兵校尉司徒左長史慈患脚齊武帝敕王晏慈有微疾不能騎聴乘車在仗後江左以来少例也慈妻劉彦節女子觀尚武帝長女吴縣公主修婦禮姑未嘗交答江夏王鋒為南徐州王妃慈女也以慈為東海太守行徐州府州事還為冠軍将軍廬陵王中軍長史未拜永眀九年卒贈太常諡懿子泰泰字仲通幼敏悟年數嵗時祖母集諸孫姪散棗栗於牀羣兒競之泰獨不取問其故對曰不取自當得賜由是中表異之少好學手所抄寫二千許卷及長通和温雅家人不見喜愠之色姉夫齊江夏王鋒為齊明帝所害外生蕭子友並孤弱泰資給撫訓逾於子姪梁天監元年為祕書丞自齊永元之末後官火延燒祕書圖書散亂殆盡泰表校㝎繕寫武帝従之歴中書侍郎掌吏部仍即真自過江吏部郎不復典大選令史以下小人求競者輻湊前後少能稱職泰為之不為貴賤請属易意天下稱平轉黄門侍郎每預朝宴刻燭賦詩文不加㸃帝湥賞歎沈約常曰王有養炬謝有覽舉養泰小字炬筠小字也始革大理以泰為廷尉卿再歴侍中後為都官尚書泰能接人士故每願其居選官頃之為吏部尚書衣冠属望未及選舉仍疾改除散騎常侍左驍騎将軍未拜卒諡夷子廓志字次道慈之弟也九嵗居所生母憂哀容毁瘠為中表所異弱冠選尚宋孝武女安固公主拜駙馬都尉褚彦囘為司徒引志為主簿謂其父僧虔曰朝廷之恩本為殊特所可光榮在屈賢子累遷宣城内史清謹有恩恵郡人張倪吴慶争田經年不決志到官父老相謂曰王府君有徳政吾鄉里乃有如此争倪慶因相擕請罪所訟地遂成閒田後為東陽太守郡獄有重囚十餘冬至日悉遣還家過節皆反唯一人失期志曰此自太守事主者勿憂眀旦果至以婦孕吏人益歎服之為吏部尚書在選以和理稱崔慧景平以例加右軍将軍封臨汝侯固讓改領右衛将軍及梁武軍至城内殺東昏百僚署名送首志歎曰冠雖弊可加足乎因取庭樹葉挼服之偽悶不署名梁武覽牋無志署心嘉之弗以讓也霸府開為驃騎大将軍長史梁臺建位散騎常侍中書令天監初為丹陽尹為政清静都下有寡婦無子姑亡舉責以斂葬既而無以還之志愍其義以俸錢償焉時年饑每旦為粥於郡門以賦百姓衆悉稱恵常懷止足謂諸子姪曰謝莊在宋孝武時位止中書令吾自視豈可過之三年為散騎常侍中書令因多謝病簡通賓客九年遷為散騎常侍金紫光禄大夫卒志善藁隷當時以為楷法齊游擊将軍徐希秀亦號能書常謂志為書聖志家居建康禁中里馬糞巷父僧䖍門風寛恕志尤惇厚所厯不以罪咎劾人門下客嘗盜脱志車幰賣之志知而不問待之如初賓客遊其門者専盖其過而稱其善兄弟子姪皆篤實謙和時人號馬糞諸王為長者普通四年志改葬武帝厚賻贈之諡曰安有五子緝休諲操素志弟揖位太中大夫揖子筠筠字元禮一字徳柔幼而警悟七嵗能属文年十六為芍藥賦其辭甚羙及長清静好學與従兄泰齊名沈約見筠以為似外祖袁粲謂僕射張稷曰王郎非唯額類袁公風韻都欲相似稷曰袁公見人輒矜嚴王郎見人必娱笑唯此一條不能酷似仕為尚書殿中郎王氏過江以来未有居郎署或勸不就筠曰陸平原東南之秀王文度獨步江東吾得比蹤昔人何所多恨乃欣然就職沈約每見筠文咨嗟嘗謂曰昔蔡伯喈見王仲宣稱曰王公之孫吾家書籍悉當相與僕雖不敏請附斯言自謝朓諸賢零落平生意好殆絶不謂疲暮復逢於君約於郊居宅閣齋請筠為草木十詠書之壁皆直寫文辭不加篇題約謂人曰此詩指物程形無假題署約製郊居賦搆思積時猶未都畢示筠草筠讀至雌霓五的反連蜷約撫掌欣抃曰僕常恐人呼為霓五兮反次至墜石磓星及冰懸埳而帶坻筠皆擊節稱贊約曰知音者希真賞殆絶所以相要政在此數句耳筠又嘗為詩呈約約即報書歎詠以為後進擅羙筠又能用强韻每公宴並作辭必妍靡約嘗唘上言晚来名家無先筠者又於御筵謂王志曰賢弟手文章之羙可謂後米獨步謝朓常見語云好詩圓羙流轉如彈丸近見其數首方知此言為實累遷太子洗馬中舍人並掌東宮管記昭明太子愛文學士常與筠及劉孝綽陸倕到洽殷鈞等遊宴𤣥圃太子獨執筠袖撫孝綽肩曰所謂左把浮丘袖右拍洪崖肩其見重如此筠又與殷鈞以方雅見禮後為中書郎奉敕製開善寺寳誌法師碑文辭甚麗逸又敕撰中書表奏三十卷及所上賦頌都為一集後為太子家令復掌管記普通元年以母憂去職筠有孝性毁瘠過禮大通二年為司徒左長史三年昭眀太子薨敕製哀策文復見嗟賞尋出為臨海太守在郡侵刻還資有芒屩兩舫他物稱是為有司奏不調累年後歴祕書監太府卿度支尚書司徒左長史及簡文即位為太子詹事筠家累千金性儉嗇外服麤弊所乘牛嘗飼以青草及遇亂舊宅先為賊焚乃寓居國子祭酒蕭子雲宅夜忽有盜攻懼墜井卒時年六十九家人十二口同遇害人棄屍積於空井中筠状貎寝小長不滿六尺性𢎞厚不以藝能髙人而少擅才名與劉孝綽見重當時其自序云余少好抄書老而彌篤雖遇見瞥觀皆即疏記後重省覽懽興彌深習與性成不覺筆倦自年十三四建武二年乙亥至梁大同六年四十載矣幼年讀五經皆七八十遍愛左氏春秋吟諷常為口實廣畧去取凡三週五抄餘經及周官儀禮國語爾雅山海經本草並再抄子史諸集皆一遍未嘗倩人假手並躬自抄録大小百餘卷不足傳之好事盖以備遺忘而已又與諸兒書論家門集云史傳稱安平崔氏及汝南應氏並累葉有文才所以范蔚宗云崔氏雕龍然不過父子兩三世耳非有七葉之中名徳重光爵位相繼人人有集如吾門者也沈少傅約常語人云吾少好百家之言身為四代之史自開闢以来未有爵位蟬聨文才相繼如王氏之盛也汝等仰觀堂搆思各努力筠自撰其文章以一官為一集自洗馬中書中庶吏部左佐臨海太府各十卷尚書三十卷凡一百卷行於世子祥仕陳位黄門侍郎揖弟彬彬字思文好文章習篆隸與志齊名時人為之語曰三真六草為天下寳齊武帝起舊宫彬獻賦文辭典麗尚齊髙帝女臨海長公主拜駙馬都尉仕齊歴太子中庶子徙永嘉太守卜室於積榖山有終焉之志梁天監中歴吏部尚書祕書監卒諡恵彬立身清白推賢接士有士君子風彬弟寂寂字子𤣥性迅動好文章讀范滂傳未嘗不歎悒王融敗後賓客多歸之齊建武初欲獻中興頌兄志謂曰汝膏粱年少何患不逹不鎮之以静将恐貽譏寂乃止位祕書郎卒年二十一論曰王曇首之才器王僧綽之忠直其世禄不替也豈徒然哉仲寳雅道自居早懐伊吕之志竟而逄時遇主自致宰輔之隆所謂衣冠禮樂盡在是矣齊有人焉於斯為盛其餘文雅儒素各稟家風箕裘不墜亦云羙矣南史卷二十二南史卷二十二考證王僧綽傳陛下惟能裁弟不能裁兒兒監本訛兄今改正王儉傳年三十八三監本訛四今从閣本王慈傳衆僧今日可謂䖍䖍僧監本訛生今改从閣本南史卷二十二考證
