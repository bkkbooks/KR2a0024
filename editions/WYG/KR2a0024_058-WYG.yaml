body:
  text: 南史卷五十八唐李延夀撰列傳第四十八韋叡兄纂載閛鼎叡子放稜孫粲弟放弟正正子正弟稜黯裴邃邃子之禮髙兄子之髙子忌之弟之横之高弟之平韋叡字懷文京兆杜陵人也世為三輔著姓祖𤣥避吏隱長安南山宋武帝入闗以太尉掾徴不至伯父祖征宋末為光祿勲父祖歸寜逺長史叡事繼母以孝聞祖征累為郡守毎携叡之職視之如子時叡内兄王憕姨弟杜惲並有鄊里盛名祖征謂叡曰汝自謂何如憕惲叡謙不敢對祖征曰汝文章或小減學識當過之然幹國家成功業皆莫汝逮也外兄杜幼文為梁州刺史要叡俱行梁土富饒往者多以賄敗叡雖幼獨以廉聞宋永元初袁顗為雍州刺史見而異之引為主簿顗到州與鄧琬起兵叡求出為義成郡故免顗之禍累遷齊興太守本州别駕長水校尉右軍將軍齊末多故欲還鄊里求為上庸太守俄而太尉陳顯逹䕶軍將軍崔慧景頻逼建鄴人心惶駭西土人謀之叡曰陳雖舊將非髙人才崔頗更事懦而不武天下真人殆興吾州矣乃遣其二子自結於梁武及兵起檄至叡率郡人伐竹為筏倍道来赴有衆二千馬二百匹帝見叡甚恱撫几曰佗日見君之面今日見君之心吾事就矣師剋郢魯平茄湖叡多建䇿皆見用大軍發郢謀留守將上難其人乆之顧叡曰棄騏驥而不乘焉遑遑而更索即日以為江夏太守行郢州府事初郢城之拒守也男女垂十萬閉壘經年疾疫死者十七八皆積屍於牀下而生者寢䖏其上每屋盈滿叡料簡隱䘏咸為營理百姓頼之梁臺建徴為大理武帝即位遷廷尉封梁都子天監二年改封永昌再遷豫州刺史領厯陽太守魏遣衆来伐叡率州兵擊走之四年侵魏詔叡都督衆軍叡遣長史王超宗梁郡太守馮道根攻魏小峴城未能㧞叡廵行圍柵魏城中忽出數百人陳於門外叡欲擊之諸將皆曰向本輕来請還授甲而後戰叡曰魏城中二千餘人閉門堅守足以自保今無故出人扵外必其驍勇若能挫之其城自拔衆猶遲疑叡指其節曰朝廷授此非以為飾韋叡之法不可犯也乃進兵魏軍敗因急攻之中宿而城拔遂進討合肥先是右軍司馬胡景略至合肥乆未能下叡案行山川曰吾聞汾水可以灌平陽即此是也乃堰肥水頃之堰成水通舟艦繼至魏初分築東西小城夹肥叡先攻二城既而魏援將楊靈𦙍帥軍五萬奄至衆懼不敵請表益兵叡曰賊已至城下方復求軍且吾求濟師彼亦徴衆師克在和古人之義也因戰破之軍人少安初肥水堰立使軍主王懐静築城於岸守之魏攻陷城乘勝至叡城下軍監潘靈祐勸叡退還巢湖諸將又請走保三丈叡怒曰將軍死綏有前無却因令取繖扇麾幢樹之堤下示無動志叡素羸毎戰不甞騎馬以板輿自載督勵衆軍魏兵鑿堤叡親與爭魏軍却因築壘於堤以自固起鬭艦髙與合肥城等四面臨之城潰俘獲萬餘所獲軍實無所私焉初胡景略與前軍趙祖悦同軍交惡志相陷害景略一怒自齧其齒齒皆流血叡以將帥不和将致患禍酌酒自勸景略曰且願兩虎勿復私鬭故終於此役得無害焉叡每晝接客旅夜算軍書三更起張燈逹曙撫循其衆常如不及故投募之士争歸之所至頓舎修立館宇藩籬墉壁皆應凖䋲合肥既平有詔班師去魏軍既近懼為所躡叡悉遣輜重居前身乘小輿殿後魏人服叡威名望之不敢逼全軍而還於是遷豫州於合肥五年魏中山王元英攻北徐州圍刺史昌義之於鍾離衆兵百萬連城四十餘武帝遣征北將軍曹景宗拒之次邵陽洲築壘相守未敢進帝怒詔叡㑹焉賜以龍環御刀曰諸將有不用命者斬之叡自合肥徑隂陵大澤過澗谷輙飛橋以濟師人畏魏軍盛多勸叡緩行叡曰鍾離今鑿穴而䖏負户而汲車馳卒奔猶恐其後而况緩乎旬日而至邵陽初帝𠡠景宗曰韋叡卿鄊望宜善敬之景宗見叡甚謹帝聞曰二將和師必濟矣叡扵景宗營前二十里夜掘長壍樹鹿角截洲為城比曉而營立元英大驚以杖擊地曰是何神也景宗慮城中危懼乃募軍士言文逹洪騏驎等齎𠡠入城使固城守潜行水底得逹東城城中戰守日苦始知有援於是人百其勇魏將楊大眼將萬餘騎来戰大眼以勇冠三軍所向皆靡叡結車為陣大眼聚騎圍之叡以彊弩二千一時俱發洞甲穿中殺傷者衆矢貫大眼右臂亡魂而走明旦元英自率衆来戰叡乘素木輿執白角如意以麾軍一日數合英甚憚其彊魏軍又夜来攻城飛矢雨集叡子黯請下城以避箭叡不許軍中驚叡扵城上厲聲呵之乃定魏人先於邵陽洲兩岸為兩橋樹柵數百歩跨淮通道叡装大艦使梁郡太守馮道根廬江太守裴邃秦郡太守李文釗等為水軍會淮水暴長叡即遣之鬭艦競發皆臨賊壘以小船載草灌之以膏従而焚其橋風怒火盛敢死之士拔柵斫橋水又漂疾倐忽之間槁柵盡壊道根等皆身自搏戰軍人奮勇呼聲動天地無不一當百魏人大潰元英脱身遁走魏軍趨水死者十餘萬斬首亦如之其餘釋甲稽顙乞為囚奴猶數十萬叡遣報昌義之義之且悲且喜不暇答但呌曰更生更生帝遣中書郎周捨勞軍於淮上叡積所獲於軍門捨觀之謂叡曰君此獲復與熊耳山等矣以功進爵為侯七年遷左衛將軍俄為安西長史南郡太守㑹司州刺史馬仙琕自北還軍為魏人所躡三闗擾動詔叡督衆軍援焉叡至安陸増築城二丈餘更開大壍起髙樓衆頗譏其示弱叡曰不然為將當有怯時是時元英復追仙琕將復邵陽之恥聞叡至乃退帝亦詔罷軍十三年為丹陽尹以公事免十四年為雍州刺史初叡起兵鄊中客隂雙光泣止叡叡遷為州雙光道候叡笑曰若従公言乞食於路矣餉耕牛十頭叡扵故舊無所惜士大夫年七十以上多與假板縣令鄊里甚懐之十五年拜表致仕優詔不許徴拜護軍給鼓吹一部入直殿省居朝廷恂恂未甞忤視武帝甚禮敬之性慈愛撫孤兄子過扵己子厯官所得祿賜皆散之親故家無餘財後為䕶軍居家無事慕萬石陸賈之為人因畫之扵壁以自玩時雖老暇日猶課諸兒以學第三子稜尤明經史世稱其洽聞叡每坐使稜説書其所發擿稜猶弗之逮武帝方鋭意釋氏天下咸従風而化叡自以信受素薄位居大臣不欲與衆俯仰所行略如佗日普通元年遷侍中車騎將軍未拜卒於家年七十九遺令薄葬斂以時服武帝即日臨哭甚慟贈車騎将軍開府儀同三司諡曰嚴叡雅有曠世之度涖人以愛恵為本所居必有政績將兵仁愛士卒營幕未立終不肯舍井竈未成亦不先食被服必扵儒者雖臨陣交鋒常緩服乘輿執竹如意以麾進止與裴邃俱為梁世名將餘人莫及初邵陽之役昌義之甚徳叡請曹景宗與叡㑹因設錢二十萬貫賭之景宗擲得雉叡徐擲得盧遽取一子反之曰異事遂作塞景宗時與羣帥争先啟之㨗叡獨居後其不尚勝率多如是世尤以此賢之叡兄纂闡並早知名纂仕齊位司徒記室特進沈約甞稱纂扵上曰恨陛下不與此人同時其學非臣輩也闡為建寧縣所得俸祿百餘萬還家悉委伯父䖏分鄊里宗事之位通直郎叡子放字元直身長七尺七寸腰帶八圍容貌甚偉襲封永昌縣侯位竟陵太守在郡和理為吏人所稱大通元年武帝遣兼領軍曹仲宗等攻渦陽又以放為明威將軍總兵㑹之魏大将軍費穆帥衆奄至放軍營未立麾下止有二百餘人放従弟洵驍果有勇力單騎擊刺屢折魏軍洵馬亦被傷不能進放胄又三貫矢衆皆失色請放突去放厲聲叱之曰今日唯有死爾乃免胄下馬據胡牀處分士卒皆殊死戰莫不一當百逐北至渦陽魏又遣常山王元昭大將軍李奬乞伏寳費穆等五萬人来援放大破之渦陽城主王偉以城降魏人棄諸營壘一時奔潰衆軍乗之斬獲略盡禽穆弟超并王偉送建鄴還為太子右衛率中大通二年徙北徐州刺史卒於鎮諡曰宜侯放性𢎞厚篤實輕財好施扵諸弟尤雍穆每將逺别及行役初還常同一室卧起時比之三姜初放與吴郡張率皆有側室懐孕因指為婚姻其後各産男女未及成長而率亡遺嗣孤弱放常贍䘏之及為北徐州時有貴族請昏者放曰吾不失信於故友乃以息岐娶率女又以女適率子時稱放能篤舊子粲粲字長倩少有父風好學仗氣身長八尺容觀甚偉初為雲麾晉安王行叅軍後為外兵参軍兼中兵時潁川庾仲容吴郡張率前輩才名與粲同府並忘年交好及王為皇太子粲自記室遷歩兵校尉入為東宫領直後襲爵永昌縣侯累遷右衛率領直粲以舊恩任寄稠宻雖居職累徙常留宿衛頗擅權誕倨不為時輩所平右衛朱昇甞扵酒席厲色謂粲曰卿何得已作領軍面向人大同中帝甞不豫一日暴劇皇太子以下並入侍疾内外咸云帝崩粲將率宫甲度臺微有喜色問所由那不見辦長梯以為大行幸前殿須長梯以復也帝後聞之怒曰韋粲願我死有司奏推之帝曰各為其主不足推故出為衡州刺史皇太子出餞新亭執粲手曰與卿不為乆别乆之帝復召還為散騎常侍還至廬陵聞侯景作逆便簡閲部下倍道赴援至豫章即就内史劉孝儀共謀之孝儀曰必如此當有𠡠安可輕信單使妄相驚動或恐不然時孝儀置酒粲怒以杯抵地曰賊已度江便逼宫闕水陸阻斷何暇有報假令無𠡠豈得自安韋粲今日何情飲酒即馳馬出部分將發㑹江州刺史當陽公大心遣使要粲粲乃分麾下配第八弟助第九弟警為前軍粲馳往見大心曰上游蕃鎮江州去都最近殿下情計實宜在先但中流任重當須應接不可闕鎮今宜張軍聲勢移鎮盆城遣偏將賜隨於事便足大心然之遣中兵栁昕帥兵二千隨粲粲悉留家累於江州以輕舸就路至南洲粲外弟司州刺史栁仲禮亦帥歩騎萬餘人至横江粲即送糧仗給之并散私金帛以賞其戰士先是安北鄱陽王範亦自合肥遣西豫州刺史裴之髙與其世子嗣帥江西之衆赴都屯于張公洲待上流諸軍至是之髙遣船度仲禮與粲合軍進屯新林王㳺苑粲建議推仲禮為大都督報下流衆軍裴之髙自以年位髙恥居其下乃云栁節下已是州將何須我復鞭板累日不決粲乃抗言於衆曰今同赴國難義在除賊所推栁司州者政以乆捍邊疆先為侯景所憚且士馬精鋭無出其前若論位次栁在粲下語其年齒亦少於粲直以社稷之計不得復論今日貴在將和若人心不同大事去矣裴公朝之舊齒豈應復挟私以阻大計粲請為諸君解釋之乃單舸至之髙營切讓之之髙泣曰吾荷國榮自應帥先士卒頋恨衰老不能効命企望柳使君共平凶逆前謂衆議已定無俟老夫爾若必有疑當剖心相示於是諸將定議仲禮方得進軍次新亭賊列陣於中興寺相持至晚各解歸是夜仲禮入粲營部分衆軍旦日將戰諸将各有據守令粲頓青塘當石頭中路粲慮柵壘未立賊争之頗以為憚謂仲禮曰下官才非禦武直欲以身狥國節下善量其宜不可致有虧䘮仲禮曰青塘立營廹近淮渚欲以糧儲船乘盡就廹之此事大非兄不可若疑兵少當更差軍相助粲帥所部水陸俱進時昏霧軍人失道比及青塘夜已過半壘柵至曉未合景登禪靈寺門望粲營未立便率鋭卒来攻軍敗乘勝入營左右髙馮牽粲避賊粲不動兵死略盡遂見害粲子尼及三弟助警構従弟昂皆戰死親戚死者數百人賊傳粲首闕下以示城内簡文聞之流涕謂御史中丞蕭愷曰社稷所寄唯在韋公如何不幸先死行陣詔贈䕶軍將軍元帝平侯景追諡忠貞子諒以學業為陳始興王叔陵所引為中錄事参軍兼記室叔陵敗伏誅放弟正正字敬直位襄陵太守初正與東海王僧孺善及僧孺為吏部郎叅掌大選賓友故人莫不傾意正獨澹然及僧孺擯廢正復篤素分有踰曩日論者稱焉卒於給事黄門侍郎子載載字徳基少聰慧篤志好學年十二隨叔父稜見沛國劉顯顯問漢書十事載隨問應無疑滯及長博渉文史沉敏有器局仕梁為尚書三公郎侯景之亂元帝承制以為中書侍郎尋為尋陽太守隨都督王僧辯東討侯景景平厯位琅邪義興太守陳武帝誅王僧辯乃遣周文育襲載載嬰城自守載所屬縣並陳武舊兵多善用弩載收得數十人繫以長鎖令所親監之使射文育軍約曰十發不兩中者死每發輙中所中皆斃相持數旬陳武帝聞文育軍不利以書喻載以誅王僧辯意并奉梁敬帝𠡠𠡠載解兵載得書乃以衆降陳武帝引載恒置左右與之謀議徐嗣徽任約等引齊軍濟江據石頭城帝問計於載載曰齊軍若分兵先據三吴之路略地東境則時事去矣今可急扵淮南即侯景故壘築城以通東道轉輸别令輕兵絶其糧運使進無所虜退無所資則齊将之首旬日可致帝従之永定中位散騎常侍太子右衛率天嘉元年以疾去官載有田十餘頃在江乘縣之白山至是遂築室而居屏絶人事吉凶慶弔無所往来不入籬門者㡬十載卒於家載弟鼎鼎字超盛少通曉博渉經史眀隂陽逆刺尤善相術仕梁起家湘東王法曹叅軍遭父憂水漿不入口者五日哀毁過禮殆將滅性服闋為邵陵王主簿侯景之亂鼎兄昻於京口戰死鼎負屍出寄于中興寺求棺無所得鼎哀憤慟哭忽見江中有物流至鼎所竊異之往視乃新棺也因以充斂元帝聞之以為精誠所感侯景平司徒王僧辯以為戸曹屬累遷中書侍郎陳武帝在南徐州鼎望氣知其當王遂寄孥焉因謂陳武帝曰眀年有大臣誅死後四嵗梁其代終天之厯數當歸舜後昔周滅殷氏封媯汭于宛邱其裔子孫因為陳氏㒒觀眀公天縦神武繼絶統者無乃是乎武帝隂有圗僧辯意聞其言大喜因而定䇿及受禪拜黄門侍郎太建中以廷尉卿為聘周使加散騎常侍後為太府卿至徳初鼎盡貨田宅寓居僧寺友人大匠卿毛彪問其故答曰江東王氣盡於此矣吾與爾當葬長安期運將及故破産爾初鼎之聘周也甞遇隋文帝謂曰觀公容貌不乆必大貴貴則天下一家嵗一周天老夫當委質願深自愛及陳亡驛召入京授上儀同三司待遇甚厚每公宴鼎恒預焉性簡貴雖為亡國之臣未甞俯仰當世時吏部尚書韋世康兄弟顯貴隋文帝従容謂鼎曰世康與公逺近對曰臣宗族南徙昭穆非臣所知帝曰卿百代卿族豈忘本也命官給酒肴遣世康請鼎還杜陵鼎乃自楚太傅孟以下二十餘世並考論昭穆作韋氏譜七卷示之歡飲十餘日乃還時蘭陵公主寡上為之求夫選親衛栁述及蕭瑒等以示鼎鼎曰瑒當封侯而無貴妻之相述亦通顯而守位不終上曰位由我爾遂以主降述上又問鼎諸兒誰為嗣位答曰至尊皇后所最愛者當與之非臣敢預知也上笑曰不肯顯言乎開皇十三年除光州刺史以仁義教導務𢎞清静州中有土豪外修邊幅而内行不軌常為劫盗鼎於都㑹時謂之曰卿是好人那忽作賊因條其徒黨姦謀逗遛其人驚懼即自首伏又有人客㳺通主家之妾及其還去妾盗珍物於夜逃亡尋扵草中為人所殺主家知客與妾通因告客殺之縣司鞫問具得姦狀因斷客死獄成上於鼎鼎覽之曰此客實姦而不殺也乃某寺僧詃妾盗物令奴殺之贓在某䖏即放此客遣人掩僧并獲贓物自是部内肅然咸稱其神道無拾遺尋追入京頃之而卒于長安年七十九正弟稜稜字威直性恬素以書史為業博物彊記當世士咸就質疑位終光祿卿著漢書續訓二卷稜弟黯黯字務直性彊正少習經史位太府卿侯景濟江黯屯六門尋改為都督城西面諸軍時景於城外起東西二土山城内亦應之簡文親自負土哀太子以下躬執畚鍤黯守西土山晝夜苦戰以功授輕車將軍加持節卒於城内初黯為太㒒卿而兄子粲為左衛率黯以常怏怏謂人曰韋粲已落驊騮前朝廷是能用才不識者頗以此闚之裴邃字深眀河東聞喜人魏冀州刺史徽之後也祖夀孫寓居夀陽為宋武帝前軍長史父仲穆驍騎將軍邃十嵗能屬文善左氏春秋齊東昏踐阼始安王蕭遥光為揚州刺史引邃為叅軍遥光敗邃還夀陽㑹刺史裴叔業以夀陽降魏邃遂隨衆北徙魏宣武帝雅重之仕魏為魏郡太守魏遣王肅鎮夀陽邃固求隨肅密圗南歸梁天監初自㧞南還除後軍諮議参軍邃求邊境自効以為廬江太守五年征邵陽洲魏人為長橋斷淮以濟邃築壘逼橋每戰輙剋於是密作沒突艦㑹甚雨淮水暴溢邃乘艦徑造橋側進擊大破之以功封夷陵縣子遷廣陵太守與鄊人共入魏武廟因論帝王功業其妻甥王篆之密啟梁武帝云裴邃多大言有不臣跡由是左遷始安太守邃志立功邊垂不願閑逺乃致書扵呂僧珍曰昔阮咸顔延有二始之歎吾才不逮古人今為三始非其願也將如之何後為竟陵太守開置屯田公私便之再遷西戎校尉北梁秦二州刺史復開創屯田數千頃倉廩盈實省息邉運人吏獲安乃相率餉絹千餘匹邃従容曰汝等不應爾吾又不可逆納其二匹而已入為大匠卿普通二年義州刺史文僧明以州入魏魏軍来援以邃為信武将軍督衆軍討焉邃深入魏境出其不意魏所署義州刺史封夀據檀公峴邃擊破之遂圍其城夀請降義州平除豫州刺史加督鎮合肥四年大軍北侵以邃督征討諸軍事先襲夀陽攻其郛斬門而入一日戰九合為後軍蔡秀成失道不至邃以援絶拔還於是邃復整兵收集士卒令諸將各以服色相别邃自為黄袍騎先攻拔狄邱甓城黎漿又屠安成馬頭沙陵等戍眀年略地至汝潁間所在響應魏夀陽守將長孫承業河間王元琛出城挑戰邃臨淮歎曰今日不破河間方為謝𤣥所笑乃為四甄以待之令直閤将軍李祖憐偽遁以引承業承業等悉衆追之四甄競發魏衆大敗斬首萬餘級承業奔走閉門不敢復出在軍疾篤命衆軍守備送喪還合肥尋卒贈侍中左衛将軍進爵為侯諡曰烈邃沉深有思略為政寛眀能得士心居身方正有威重将吏憚之少敢犯法及卒淮肥間莫不流涕以為邃不死當大闢土字子之禮嗣之禮字子義美儀容能言𤣥理為西豫州刺史母憂居䘮唯食麥飯邃廟在光宅寺西堂宇𢎞敞松栢鬱茂范雲廟在三橋蓬蒿不翦梁武帝南郊道經二廟頋而歎曰范為已死裴為更生大同初都下旱蝗四籬門外桐栢凋盡唯邃墓犬牙不入當時異之厯位黄門侍郎武帝設無遮㑹儛象驚排突陛衛王公皆散唯之禮與散騎常侍臧盾不動帝壮之以之禮為壮勇将軍北徐州刺史盾兼中領軍將軍之禮卒扵少府卿諡曰壯子政承聖中位給事黄門侍郎魏剋江陵随例入長安之髙字如山邃兄中散大夫髦之子也頗讀書少負意氣常隨叔父邃征討所在立功甚為邃所器重戎政咸以委焉夀陽之役邃卒於軍所之髙𨽻夏侯夔平夀陽仍除梁郡太守封都城縣男時魏汝陰来附𠡠之髙應接仍除潁州刺史父憂還都起為光逺將軍令討平隂陵盗以為譙州刺史侯景之亂之髙為西豫州刺史率衆入援南豫州刺史鄱陽嗣王範命之髙總督江右援軍諸軍事頓張公洲栁仲禮至横江之髙遣船舸迎致仲禮與韋粲等俱㑹青塘及城陷之髙還合肥與鄱陽王範西上元帝遣召之以為侍中䕶軍将軍到江陵時之髙第六弟之悌在侯景中或傳之悌斬侯景元帝使兼中書舍人黄羅漢報之髙之髙竟無言直云賊自殺賊非之髙所聞元帝深嗟其介直承制除特進金紫光祿大夫卒諡曰恭子畿官至太子右衛率魏剋江陵力戰死之之髙第五弟之平字如原少倜儻有志略以軍功封費縣侯承聖中累遷散騎常侍太子詹事陳文帝初除光祿大夫慈訓宫徴衛尉並不就乃築山穿池植以卉木居䖏其中有終焉志天康元年卒諡曰僖子子忌忌字無畏少聰敏有識量頗渉史傳為當時所稱侯景之亂招集勇力乃随陳武帝征討及陳武帝誅王僧辯僧辯弟僧智舉兵據吴郡陳武帝遣黄他攻之不能剋命忌勒部下精兵自錢唐直趣吴郡夜至城下鼓譟薄之僧智疑大軍至輕舟奔杜龕忌入據吴郡陳武帝嘉之表授吴郡太守天嘉五年累遷衛尉卿封東興縣侯及華皎稱兵上流宣帝時為錄尚書輔政盡命衆軍出討委忌總知中外城防諸軍事宣帝即位改封樂安縣侯厯位都官尚書及吴眀徹督衆北伐詔忌以本官監明徹軍淮南平授豫州刺史忌善於綏撫甚得人和及明徹進軍彭汴以眀徹為都督與眀徹俱進吕梁軍敗見囚于周授上開府隋開皇十四年卒於長安年七十三之髙第十二弟之横之横字如岳少好賓㳺重氣侠不事産業之髙以其縦誕乃為狭被蔬食以激厲之之横歎曰大丈夫富貴必作百幅被遂與僮屬數百人扵芍陂大營田墅遂致殷積梁簡文在東宫聞而要之以為河東王常侍遷直閤将軍侯景之亂𨽻鄱陽王範討景景濟江仍與範世子嗣入援臺城城陷退還合肥侯景遣任約逼晉熙範令之横下援未及至範薨之横乃還時尋陽王大心在江州範副梅思立密要大心襲盆城之横斬思立而拒大心大心以州降侯景之横與兄之髙歸元帝位廷尉卿河東内史随王僧辯拒侯景景退遷東徐州刺史封豫寜侯又隨僧辯破景景東奔僧辯命之横與杜崱入守臺城及陸納據湘州叛又𨽻僧辯南討斬納将李賢眀平之又破武陵王於峡口還除吴興太守乃作百幅被以成其志魏剋江陵齊遣上黨王髙渙挟貞陽侯眀攻東闗晉安王承制以之横為徐州刺史都督衆軍出守蘄城之横營壘未周而齊軍大至兵盡矢窮遂於陣沒贈司空諡曰忠壮子鳳寶嗣論曰韋裴少年勵􅍾俱以學尚自立晚節驅馳各著功於戎馬觀叡制勝之道謂為魁梧之傑然而形甚羸瘠身不跨鞌板輿指麾隱如敵國其器分有在隆名豈虚得乎邃自効邊疆盛績克舉其志不遂良可悲夫二門子弟各著名節與梁終始克荷隆構将門有將斯言豈曰妄乎南史卷五十八
