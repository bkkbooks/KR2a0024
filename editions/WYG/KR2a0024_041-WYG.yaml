body:
  text: 南史卷四十一唐李延夀撰列傳第三十一齊宗室衡陽元王道度繼子鈞始安貞王道生始安王遥光曲江公遥欣子幾安陸昭王􅃡新吳侯景先南豐伯赤斧子頴胄穎達衡陽公諶臨汝侯坦之衡陽元王道度齊髙帝長兄也始與髙帝俱受學於雷次宗宣帝問次宗二子學業次宗答曰其兄外朗其弟内潤皆良璞也仕宋位安定太守卒齊建元元年髙帝追加封諡無子髙帝以第十一子鈞繼鈞字宣禮年五嵗所生區貴人病便加慘悴左右依常以五色䬳飴之不肯食曰須侍姨差年七嵗出繼衡陽元王見髙帝未拜便涕泗横流髙帝執其手曰伯叔父猶父勿怨所以令汝出繼以汝有意堪奉蒸甞故耳即敕外如先給通幰車雉尾扇等事事依正王區貴人卒居喪盡禮服闋當問訊武帝尫羸骨立登車三上不能升乃止典籖曹道人具以聞武帝即幸鈞邸見之愴然還謂褚蓁曰昨見衡陽猶竒毁損卿可數相撫悦先是貴人以華釵厨子幷翦刻錦繡中倒炬鳳皇蓮芰星月之屬賜鈞以為玩弄貴人亡後每嵗時及朔望輒開視再拜哽咽見者皆為之悲性好學善屬文與琅邪王智深以文章相會濟陽江淹亦逰焉武帝謂王儉曰衡陽王須文學當使華實相稱不得止取貴㳺子弟而已乃以太子舍人蕭敷為文學鈞常手自細書寫五經部為一卷置於巾箱中以備遺忘侍讀賀玠問曰殿下家自有墳素復何須蠅頭細書别藏巾箱中答曰巾箱中有五經於檢閲既易且一更手寫則永不忘諸王聞而爭効為巾箱五經巾箱五經自此始也居身清率言未甞及時事會稽孔珪家起園列植桐柳多構山泉殆窮真趣鈞徃遊之珪曰殿下處朱門遊紫闥詎得與山人交邪荅曰身處朱門而情遊江海形入紫闥而意在青雲珪大羙之吳郡張融清抗絶俗雖王公貴人視之慠如也唯雅重鈞謂從兄緒曰衡陽王飄飄有凌雲氣其風情素韻彌足可懐融與之遊不知老之將至見賞如此厯位祕書監延興元年為明帝所殺明帝立以永陽王子珉仍本國繼元王為孫子珉字雲璵武帝第二十子也初封義安郡王後改永陽永泰元年見害復以武陵昭王曄子子坦奉元王後始安貞王道生字孝伯髙帝次兄也仕宋位奉朝請卒髙帝即位追加封諡三子長鳳次鸞是為明帝次􅃡是為安陸昭王鳳字景慈仕宋位正員郎卒髙帝即位諡靖世子建武元年明帝追尊道生為景皇妃江氏為后立寢廟於御道西陵曰修安追封鳳始安靖王改華林鳳莊門為望賢門太極東堂畫鳳鳥題為神鳥而改鸞鳥為神雀子遥光嗣始安王遥光字元暉生而躄疾髙帝謂不堪奉拜祭祀欲封其弟武帝諌乃以遥光襲爵位中書郎明帝輔政誅賞諸事唯與遥光共謀議勸明帝併殺髙武諸子弟見從建武元年為揚州刺史三年進號撫軍將軍好吏事頗多慘害足疾不得同朝例常乘輿自望賢門入每與明帝久清閑言畢帝索香火明日必有所誅太子不悦學唯曼逰是好朝議令蔡仲熊為太子講禮未半遥光從容曰文義之事此是士大夫以為伎藝欲求官耳皇太子何用講為上以為然乃停講永泰元年即本號為大將軍給油絡車帝不豫遥光數入侍疾帝疾漸甚河東王鉉等七王一夕見殺遥光意也帝崩遺詔加遥光侍中中書令給扶永元元年給班劒二十人即本號開府儀同三司遥光多忌人有餉履者以為戱已大被嫌責劉繪甞為牋云智不及葵亦以忤㫖既輔東昏潜結江祏兄弟謀自樹立弟遥欣在荆楚擁兵居上流密相影響遥光當據東府號令使遥欣急下潜謀將發而遥欣病死江祏被誅東昏召遥光入殿告以祏罪遥光懼還省便陽狂號哭自此稱疾不復入臺先是遥光行還入城風飄儀繖出城外遥光弟遥昌先卒夀春豫州部曲皆歸遥光及遥欣喪還葬武進停東府前渚荆州衆力送者甚盛東昏誅江祏後慮遥光不自安欲轉為司徒還第召入喻旨遥光慮見殺收集荆豫二州部曲於府東門衆頗怪其異莫知其指趣也遥光召親人丹陽丞劉渢及城局參軍劉晏中兵參軍曹樹生等并諸傖楚欲以討劉暄為名夜遣數百人破東冶出囚尚方取仗又召驍騎將軍垣厯生厯生隨信至便勸遥光令率城内兵夜攻臺輦荻燒城門曰公但乘輿隨後反掌可得遥光意疑不敢出天稍曉遥光戎服至㕔事停輿處分上仗登城行賞賜厯生復勸出軍遥光不肯望臺内自變及日出臺軍稍至遥光於是戒嚴勅都下領軍蕭坦之屯湘官寺鎮軍司馬曹武屯青溪大橋太子右率左興盛屯東府門東籬門衆軍圍東城遥光遣垣厯生從西門出戰臺軍屢北殺軍主桑天愛初遥光問諮議參軍蕭暢暢正色拒不從既而暢與撫軍長史沈昭略奔臺人情大沮又垣歴生從南門出戰為曹武所禽謂武曰卿以主上為聖明梅茹為賢相者則我當死且我今死卿明亦死遂殺之遥光聞厯生見獲大怒於牀上自竦踊使殺厯生兒其晚臺軍射火箭燒東北角樓至夜城潰遥光還小齋令人反拒左右並踰屋出臺軍主劉國寳時當伯等先入遥光聞外兵至吹滅火扶匐下牀軍人排閤入斬之遥光舉事四日而卒舉事之夕月蝕識者以月為大臣蝕而既必滅之道未敗之夕城内皆夢羣蛇緣城四出各共說之咸以為異臺軍入城焚屋宇且盡遥光㓜時甚貞正明帝傾意待之東昏為兒童時明帝使與遥光共齋居止呼遥光為安兄恩情甚至及遥光誅後東昏登舊宮土山望東府愴然呼曰安兄乃嗚咽左右不忍視見思如此天下知名之士劉渢渢弟謙陸閑閑子綘司馬端崔慶逺皆坐誅曲江公遥欣字重暉始安王遥光弟也宣帝兄西平太守奉之無後以遥欣繼為曽孫遥欣髫齓中便嶷然明帝謂江祏曰遥欣雖㓜觀其神彩殊有局幹必成令器未知年命何如耳安陸昭王􅃡曰不患其兄弟不富貴但恐􅃡不及見耳言之慘然而悲始年七嵗出齋時有一左右小兒善彈飛鳥無不應弦墜落遥欣謂曰凡戱多端何急彈此鳥自空中翔飛何闗人事無趣殺此生亦復不急左右感其言遂不復彈鳥時少年通好此事所在遂止年十五六便博覽經史弱冠拜中書郎明帝入輔遥欣與始安王遥光等參預政事凡所談薦皆得其人由是朝野輻湊軒蓋盈門延興元年明帝以遥欣為兖州刺史時豐城公遥昌亦出鎮壽春帝於便殿密宴始安王遥光亦在座帝慘然謂遥欣曰昭王云不患汝兄弟不富貴而言不及見如何因悲慟不自勝君臣皆嗚咽侍者雨淚及泊歐陽岸忽謂左右曰比何都不見彈左右云有門生因彈見朂遂以此廢所在皆止遥欣笑曰我小兒時聊復語耳那復遂斷邪建武元年進號西中郎將封聞喜縣公遷荆州刺史加都督改封曲江公明帝子弟弱小晉安王寳義有廢疾故以遥光為揚州居中遥欣居陜西在外威權并在其門遥欣好勇聚畜武士以為形援永泰元年詔遥欣以本官領雍州刺史寧蠻校尉移州鎮襄陽魏軍退不行卒贈司空諡康公葬用王禮子幾字徳𤣥年十嵗便能屬文早孤有弟九人並㓜幾恩愛篤睦聞於朝廷性温和與物無競清貧自立好學善草𨽻書湘州刺史楊公則曲江公故吏也毎見幾謂人曰康公此子可謂桓靈寳重出及公則卒幾為之誄時年十五沈約見而竒之謂其舅蔡撙曰昨見賢甥楊平南誄文不減希逸之作始驗康公積善之慶位中書侍郎尚書左丞末年専尚釋敎為新安太守郡多山水特其所好適性逰履遂為之記卒於官子清亦有文才位永康令遥欣弟遥昌字季暉建武元年封豐城縣公位豫州刺史卒諡憲公安陸昭王􅃡字景業善容止仕宋位中書郎建元元年封安陸侯為五兵尚書出為吳郡太守政有能名竟陵王子良與之書曰竊承下風數十年來姑蘓未有此政武帝嘉其能累遷寧蠻校尉雍州刺史加都督􅃡留心辭訟人人呼至案前親自顧問有不得理者勉喻之退皆無恨為百姓所畏愛及卒喪還百姓緣沔水悲泣設祭於峴山為立祠諡曰昭侯明帝少相友愛時為僕射領衛尉表求解職私第展哀詔不許每臨􅃡靈輒慟絶哭不成聲建武元年贈司徒安陸王子寳晊嗣永元元年改封湘東王東昏廢寳晊望物情歸已坐待法駕既而城内送歀于梁武帝宣徳太后臨朝拜太常不自安謀反及弟江陵公寳賢霄城公寳宏皆伏誅新吳侯景先髙帝從子也祖爰之員外郎父敬宗始興王國中軍景先少孤有至性隨母孔氏為舅氏鞠養髙帝嘉之常相提攜及鎮淮隂以景先領軍主自隨防衛城内委以心腹武帝為廣興郡啓髙帝求景先同行除武帝寧朔府司馬自此常相隨逐建元元年為太子左衛率封新吳縣伯見委任勢傾天下景先本名道先乃改為景先以避上諱初武帝少年與景先共車行泥路車久故壊至領軍府西門車轅折俱狼狽景先謂帝曰兩人脱作領軍亦不得忘今日艱辛及武帝踐阼詔以景先為兼領軍將軍拜日羽儀甚盛傾朝觀矚拜還未至府中門詔相聞領軍今日故當無折轅事邪景先奉謝景先事上盡心故恩寵特密初西還上坐景陽樓召景先語故舊唯豫章王一人在席而已轉中領軍車駕射雉郊外景先常甲仗從廉察左右尋進爵為侯始昇明中沈攸之於荆州舉兵武帝時鎮江州盆城景先夜乘城忽聞壍中有小兒呼蕭丹陽未測何人聲聲不絶試問誰空中應云賊尋當平何事嚴防語訖不復言即窮討之了不見明旦以白帝帝曰攸之自無所至焉知汝後不作丹陽尹景先曰寧有作理尋而攸之首至及永明三年詔以景先為丹陽尹謂曰此授欲驗徃年盆城壍空中言耳後假節司州諸軍事卒諡曰忠侯子毅位北中郎司馬性奢豪好弓馬為明帝所疑忌王晏事敗幷陷誅之南豐伯赤斧髙帝從祖弟也祖隆子衛軍錄事參軍父始之冠軍中兵參軍赤斧以和謹為髙帝所知髙帝輔政為黄門侍郎淮陵太守順帝遜位于丹陽故所立宮上令赤斧輔送至因留防衛薨乃還後為雍州刺史在州不營産利勤於奉公遷散騎常侍左衛將軍武帝親遇與蕭景先相比封南豐縣伯遷給事中太子詹事卒於家貧無絹為衾武帝聞之愈加惋惜諡懿伯子頴胄襲爵穎胄字雲長𢎞厚有父風起家祕書郎髙帝謂赤斧曰穎胄輕朱被身覺其趨進轉羙足慰人意遷太子舍人遭父喪感脚疾數年然後能行武帝有詔慰勉之賜以醫藥除竟陵王司徒外兵參軍晉熙王文學穎胄好文義弟穎基好武勇武帝登烽火樓詔羣臣賦詩穎胄詩合㫖上謂穎胄曰卿文弟武宗室便不乏才上以穎胄勲戚子弟自中書郎除左軍將軍知殿内文武事得入便殿出為新安太守吏人懐之後除黄門郎領四廂直遷衛尉明帝廢立穎胄從容不為同異乃引穎胄預功建武二年進爵為侯賜以常所乘白􅀈牛明帝每存儉約欲鑄壊太官元日上夀銀酒鎗尚書令王晏等咸稱盛徳穎胄曰朝廷盛禮莫過三元此一器既是舊物不足為侈帝不悦後預曲宴銀器滿席穎胄曰陛下前欲壊酒鎗恐宜移在此器也帝甚慙後為廬陵王後軍長史廣陵太守行兖州府事是年魏揚聲當飲馬長江帝懼敕穎胄移居人入城百姓驚恐席卷欲南度穎胄以魏軍尚逺不即施行魏軍亦尋退仍為南兖州刺史加都督和帝為荆州以穎胄為西中郎長史南郡太守行荆州府事時江祏専執朝權此行由祏穎胄不平曰江公盪我輩出東昏侯誅戮羣公委任厮小崔陳敗後方鎮各懐異計永元二年十月尚書令臨湘侯蕭懿及弟衛尉暢見害先遣輔國將軍劉山陽就穎胄兵襲梁武帝帝時為雍州刺史將起兵慮穎胄不同遣穎胄親人王天武詣江陵聲云山陽西上并襲荆雍書與穎胄勸同舉兵穎胄意猶未决初山陽出南州謂人曰朝廷以白虎幡追我亦不復還矣席捲妓妾盡室西行至巴陵遲回十餘日不進梁武帝復遣天武齎書與穎胄設竒略以疑之是時或云山陽謀殺穎胄以荆州同舉山陽至果不敢入城穎胄計無所出夜遣錢唐人朱景思呼西中郎城局參軍席闡文諮議參軍柳忱閉齋定議闡文曰蕭雍州畜養士馬非復一日江陵素畏襄陽人人衆又不敵取之不可必制制之嵗寒復不為朝廷所容今若殺山陽與雍州舉事立天子以令諸侯覇業成矣山陽持疑不進是不信我今斬送天武則彼疑可釋至而圖之罔不濟矣忱亦勸焉穎胄乃斬天武以示山陽山陽大喜輕將歩騎數百到州闡文勒兵斬之傳首于梁武東昏聞山陽死發詔討荆雍穎胄有器局既唱大事衆情歸之長沙寺僧鑄黄金為龍數千兩埋土中厯相傳付稱為下方黄鐡穎胄因取此龍以充軍實乃歎曰徃年江祏斥我至今始知禍福之無門也十二月移檄建業三年正月和帝為相國穎胄為左長史進號鎮軍將軍於是始選用方伯梁武屢表勸和帝即尊號穎胄使别駕宗史撰定禮儀上尊號改元於江陵立宗廟南北郊州府門城悉依建康官置尚書五省以城南射堂為蘭臺南郡太守為尹建武中荆州大風雨龍入栢齋中柱壁上有爪足處刺史蕭遥欣恐畏不敢居之至是以為嘉福殿中興元年三月穎胄為侍中尚書令監八州軍事荆州刺史留衛西朝以弟穎達為冠軍將軍及楊公則等率師隨梁武圍郢城穎達會軍於漢口與王茂曹景宗等攻陷郢城梁武進漂州使與曹景宗破東昏將李居士又從下東城初梁武之起也巴東太守蕭恵訓子璝巴西太守魯休烈弗從舉兵侵荆州敗輔國將軍任漾之於峽口穎胄遣軍拒之而梁武已平江郢圍建康時穎胄輔帝主有安重之勢素能飲酒噉白肉膾至三斗自以職居上將不能拒制璝等憂愧發疾而卒州中祕之使似其書者假為教命時梁武圍建康住石頭和帝宻詔報穎胄凶問亦祕不發喪及建康平蕭璝亦衆懼而潰和帝乃始發喪詔贈穎胄丞相前後部羽葆鼓吹班劒三十人輼輬車黄屋左纛梁天監元年追封巴東郡公喪還武帝車駕臨哭渚次葬依晉王導齊豫章王故事諡曰獻武弟穎達少好勇使氣穎胄齊建武末行荆州事穎達亦為西中郎外兵參軍俱在西府齊季多難頗不自安因與兄穎胄舉兵穎達弟穎孚自建業為廬陵人修景智潜引與南歸穎孚緣山逾嶂僅免道中絶糧後因食過飽而卒建康平梁武帝以穎達為前將軍丹陽尹及受禪贈穎孚右衛將軍封穎達作唐侯位侍中衛尉卿出為豫章内史意甚憒憒未發前預華林宴酒後於座辭氣不悦沈約因勸酒欲以釋之穎達大罵約曰我今日形容正是汝老䑕所為何忽復勸我酒舉坐驚愕帝謂之曰汝是我家阿五沈公宿望何意輕脱若以法繩汝汝復何理穎達竟無一言唯大涕泣帝心愧之未幾遷江州刺史少時懸瓠歸化穎達長史沈瑀等苛刻為盜所害衆頗疑穎達或傳謀反帝遣直閤將軍張豹子稱江中討盗實使防之穎達知朝廷之意唯飲酒不知州事後卒於左衛將軍諡康侯子敏嗣位新安太守好射雉未甞在郡辭訟者遷於畎焉後張弩損腰而卒第七子斆太清初為魏興太守梁州刺史宜豐侯循以為府長史梁州有古墓名曰尖冢或云張騫墳欲有發者輒聞鼓角與外相拒椎埋者懼而退斆謂無此理求自監督及開唯有銀鏤銅鏡方尺斆時居母服清談所貶衡陽公諶字彦孚髙帝絶服族子也祖道清員外郎父仙伯桂陽國下軍宋元徽末武帝在郢欲知都下消息髙帝遣諶就武帝宣傳謀計留為腹心昇明中為武帝中軍刑獄參軍南東莞太守以勞封安復縣男建元初武帝在東宫諶領宿衛髙帝殺張景真武帝令諶啓乞景真命髙帝不悅諶懼而退武帝即位除歩兵校尉南蘭陵太守領御仗主齋内兵仗悉委付之心膂密事皆使參掌為左中郎將後軍將軍太守如故武帝卧疾延昌殿諶在左右宿直上崩遺敕諶領殿内事如舊鬰林即位深委信諶諶每請急出宿帝通夕不能寐諶還乃安轉衞軍司馬兼衛尉丁母憂敕還本位守衛尉明帝輔政諶回附明帝勸行廢立密召諸王典籖約語之不許諸王外接人物諶親要日久衆皆憚而從之鬰林被廢日初聞外有變猶密為手敕呼諶其見信如此諶性險無䕶身計及廢帝日領兵先入後宫齋内仗身素𨽻服諶莫有動者海陵立轉中領軍進爵為公甲仗五十人入直殿内月十日還府建武元年轉領軍將軍左將軍南徐州刺史給扶進爵衡陽郡公明帝初許事剋用諶為揚州及有此授諶恚曰見炊飯推以與人王晏聞之曰誰復為蕭諶作甌筯者諶恃勲重干豫朝政明帝新即位遣左右要人於外聼察具知諶言深相疑阻二年六月上華林園宴諶及尚書令晏等數人盡歡坐罷留諶晚出至華林閤仗身執還入省上遣左右莫智明數諶曰隆昌之際非卿無有今日今一門二州兄弟三封朝廷相報政可極此卿恒懐怨望乃云炊飯已熟合甑與人邪今賜卿死諶謂智明曰天去人亦復不逺我與至尊殺髙武諸王是卿傳語來去我今死還取卿矣於省殺之至秋而智明死見諶為崇詔乃顯其過惡收付廷尉諶好左道吳興沈文猷相諶云相不減髙帝諶喜曰感卿意無為人言也至是文猷伏誅諶兄誕字彦偉永明中為建康令與秣陵令司馬廸之同乘行車前導四卒左丞沈昭略奏凡有鹵簿官共乘不得兼列騶寺請免誕等官詔贖論延興元年厯徐司二州刺史明帝立封安復侯徵為左衛將軍上欲殺諶以誕在邊鎮拒魏故未及行魏軍退六旬諶誅遣梁武帝為司州别使誅誕誕子稜妻江淹女字才君聞諶死曰蕭氏皆盡妾何用生慟哭而絶諶弟誄字彦文與諶同豫廢立封西昌侯位太子左衛率誅諶之日輔國將軍蕭季敞啓求收誄深加排苦乃至手相摧辱誄徐曰已死之人何足至此君不憶相提拔時邪幽冥有知終當相報季敞麤猛無行善於彌縫髙帝時為諶所奬説故累為郡守在政貪穢諶輒掩之後為廣州刺史白日見誄將兵入城收之少日果為西江都䕶周世雄所襲軍敗奔山中為蛭所嚙肉都盡而死慘楚備至後為村人所斬論者以為有天道焉臨汝侯坦之字君平髙帝絶服族子也祖道濟太中大夫父欣祖武進令坦之與蕭諶同族為東宫直閣以勤直為文恵所知除給事中蘭陵令武帝崩坦之率太孫文武度上臺除射聲校尉令如故未拜除正員郎南魯郡太守少帝以坦之文恵舊人親信不離得入内見皇后帝於宫中及出後堂雜狡獪坦之皆得在側或遇醉後倮袒坦之輒扶持諌喻見帝不可奉乃改附明帝密為耳目隆昌元年追錄坦之父勲封臨汝縣男少帝微聞外有異謀憚明帝在臺内敕移西州後在華林園華光殿露著黄縠褌跂牀垂脚謂坦之曰人言鎮軍與王晏蕭諶欲共廢我似非虚傳蘭陵所聞云何坦之甞作蘭陵令故稱之坦之曰天下寧當有此誰樂無事廢天子邪昔元徽獨在路上走三年人不敢近政坐枉殺孫超杜幼文等故敗耳官有何事一旦便欲廢立朝貴不容造以論政當是諸尼師母言耳豈可以尼姥言為信官若無事除此三人誰敢自保安陸諸王在外寧肯復還道剛之徒何能抗此帝曰蘭陵可好聼察作事莫在人後帝以為除諸執政應須當事人意在沈文季夜遣内左右密賂文季文季不受帝大怒謂坦之曰我賜文季不受豈有人臣拒天子賜坦之曰官遣誰送帝曰内左右坦之曰官若詔敕出賜令舍人主書送徃文季寧敢不受政以事不方幅故仰遣耳帝又夜醉乘馬從西歩廊向北馳走如此兩三將倒坦之諫不從執馬控帝運拳擊坦之不著倒地坦之與曹道剛扶抱還夀昌殿瑇琩牀上卧又欲起走坦之不能制坦之馳信報皇后至請譬良久乃眠時明帝謀廢殺既與蕭諶及坦之定謀少帝腹心直閣將軍曹道剛疑外間有異密有處分諶未能發始興内史蕭季敞南陽太守蕭穎基並應還都諶欲待二蕭至藉其威力以舉事明帝慮事變以告坦之坦之馳謂諶曰廢天子古來大事比聞曹道剛朱隆之等轉已猜疑衛尉明日若不就事無所復及弟有百嵗母豈能坐聼禍敗政應作餘計耳諶惶遽明日遂廢帝坦之力也海陵即位除黄門郎兼衛尉建武元年遷左衛將軍進爵為侯東昏立為侍中領軍將軍永元元年母憂起復職加將軍置府江祏兄弟欲立始安王遥光密告坦之坦之曰明帝取天下已非次第天下人至今不服今若復作此事恐四海瓦解我其不敢言及遥光起事遣人夜掩取坦之坦之科頭著褌踰墻走逢臺遊邏主顔端執之坦之謂曰始安作賊遣人見取向於宅奔走欲還臺耳君何見錄端不荅而守防逾嚴坦之謂曰身是大臣夜半奔走君理見疑以為得罪朝廷若不信自可歩徃東府參視亦不荅端至小街審知遥光舉事乃走還未至三十餘歩下馬再拜曰今日乞垂將接坦之曰向語君何所道豈容相欺端以馬與坦之相随去比至新亭道中收遥光所虜之餘得二百許人并有麤仗乃進西掖門開鼔後得入殿内其夕四更主書馮元嗣叩北掖門告遥光反殿内為之備向曉召徐孝嗣入左將軍沈約五更初聞難馳車走趨西掖門或勸戎服約慮外軍已至若戎衣或者謂同遥光無以自明乃朱服而入臺内部分既立坦之假節督衆軍討遥光事平遷尚書左僕射丹陽尹右軍如故進爵為公坦之肥黒無鬚語聲嘶時人號為蕭瘂剛佷専執羣小畏而惜之遥光事平二十餘日帝遣延明主帥黄文濟圍坦之宅誅之坦之從兄翼宗為海陵郡將發坦之謂文濟曰從兄海陵宅故應無他文濟曰海陵宅在何處坦之告之文濟曰政應得罪仍遣收之檢家赤貧唯有質錢帖子數百還以啓帝原其死和帝中興元年追贈坦之中軍將軍開府儀同三司論曰有齊宗室唯始安之後克昌明帝取之以非道遥光濟之以殘酷其卒至顛仆所謂亦以此終者也穎胄荆州之任蓋惟失職及其末途倚伏豈預圖之所致乎諶與坦之俱應顧託既以傾國亦以覆身各其宜矣南史卷四十一南史卷四十一考證始安王遥光傳太子右率左興盛屯東府門東籬門屯東府門東離門一本作屯府東籬門焚屋宇且盡屋字一本作居字曲江公遥欣子幾傳好學善草𨽻書草閣本作章南豐伯赤斧子穎胄傳梁武帝復遣天武齎書與穎胄遣監本誤追今改从梁書穎胄使别駕宗史撰定禮儀史應作夬雖梁書宗夬本傳未載此事而云故領軍將軍蕭穎胄深相委仗每事諮焉其為夬無疑也穎胄遣軍拒之而梁武已平江郢圍建康監本缺郢字今从閣本增入衡陽公諶傳諶每請急出宿帝通夕不能寐出宿監本訛宿出今据齊書改正臨汝侯坦之傳少帝以坦之文恵舊人親信不離得入内見皇后離各本誤難今改从齊書建武元年遷左衛將軍建監本訛孝今從閣本坦之科頭著褌踰墻走褌監本誤禪今從齊書羣小畏而惜之惜一本作憎應从之南史卷四十一考證
