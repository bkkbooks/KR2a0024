body:
  text: 南史卷三十二唐李延夀撰列傳第二十二張邵子敷寶孫沖徐兄子暢文暢子融嗣伯融弟積文伯伯從弟張邵字茂宗㑹稽太守裕之弟也初為晉琅邪内史王誕龍驤府功曹桓𤣥徙誕扵廣州親故皆離棄之唯邵情禮彌謹流涕追送時寇亂年饑邵又資饋其妻子桓𤣥簒位父敞先為尚書以荅事㣲謬降為廷尉卿及宋武帝討桓𤣥邵白敞表獻忠欵帝大悦命署寺門曰有犯張廷尉家者軍法論事平以敞為吴郡太守及王謐為揚州召邵補主簿劉毅位居亞相好士愛才當世莫不輻凑唯邵不往親故怪而問之邵曰主公命世人傑何煩多問劉穆之言扵帝帝益親之轉太尉参軍署長流賊曹盧循至蔡洲武帝至石頭使邵守南城時百姓水際望賊帝不觧其意以問邵邵曰節鉞未反奔散之不暇亦何暇觀望今當無復恐耳帝以邵勤練憂公重補州主簿邵悉心政事精力絶人及誅劉藩邵時在西州直廬即夜誡衆曹曰大軍當大討可各各條倉庫及舟船人領至曉取辦旦日帝求諸簿最應時即至怪問其速諸曹荅曰宿受張主簿處分帝曰張邵可謂同人憂慮矣九年世子始開征虜府以邵補録事参軍轉號中軍遷諮議參軍領記室十二年武帝北伐邵請見曰人生危脆宜有逺慮若劉穆之邂逅不幸誰可代之尊業如此若有不諱則處分云何帝曰此自委穆之與卿耳青州刺史檀祗鎮廣陵輙率衆至滁中掩討亡命劉穆之慮其為變議欲遣軍邵曰檀韶據中流道濟為軍首若有相疑之跡則大府立危不如逆遣慰勞必無患也祗果不動及穆之暴卒朝廷恇懼便發詔以司馬徐羡之代邵獨曰今誠急病任終在徐然世子無専行之義宜須諮信反方使世子出命曰朝廷及大府事悉諮徐司馬其餘啟還武帝善其臨事不撓得大臣節十四年世子改授荆州邵諌曰儲貳之重四海所繫不宜外出敢以死請世子竟不行文帝為中郎將荆州刺史以邵為司馬領南郡相衆事悉决扵邵武帝受命以佐命功封臨沮伯分荆州立湘州以邵為刺史將署府邵以長沙内地非用武之國置府妨人乖為政要從之荆州刺史謝晦反遺書要邵邵不發函使呈文帝元嘉五年轉征虜將軍領寜蠻校尉雍州刺史加都督初王華與邵不和及華參要親舊為之危心邵曰子陵方𢎞至公豈以私隙害正義是任也華實舉之及至襄陽築長圍脩立堤堰創田數千頃公私充給丹淅二州蠻屬為寇邵誘其帥竝出因大㑹誅之遣軍掩其村落悉禽既失信羣蠻所在竝起水陸路㫁七年子敷至襄陽定省當還都羣蠻欲㫁取之㑹蠕蠕國獻使下蠻以為是敷因掠之邵坐降號揚烈將軍江夏王義恭鎮江陵以邵為撫軍長史持節南蠻校尉九年坐在雍州營私畜取􅂍貨二百四十五萬下廷尉免官削爵土後為吴興太守卒追復爵邑諡曰簡伯邵臨終遺命祭以菜果葦席為轜車諸子從焉長子敷敷字景𦙍生而母亡年數嵗問知之雖童䝉便有感慕之色至十嵗許求母遺物而散施已盡唯得一扇乃緘録之毎至感思輒開笥流涕見從母悲感哽咽性整貴風韻甚髙好讀𤣥言兼屬文論初父邵使與髙士南陽宗少文談繫象往復數番少文毎欲屈握麈尾歎曰吾道東矣扵是名價日重宋武帝聞其美召見竒之曰真千里駒也以為世子中軍参軍數見接引累遷江夏王義恭撫軍記室参軍義㳟就文帝求一學義沙門㑹敷赴假還江陵入辭文帝令以後車載沙門往謂曰道中可得言晤敷不奉詔曰臣性不耐雜上甚不悦遷正員中書郎敷小名樝父邵小名黎文帝戲之曰樝何如黎荅曰黎是百果之宗樝何敢比也中書舍人狄當周﨣竝管要務以敷同省名家欲詣之﨣曰彼若不相容接便不如勿往詎可輕行當曰吾等竝已員外郎矣何憂不得共坐敷先旁設二牀去壁三四尺二客就席數呼左右曰移我逺客﨣等失色而去其自標遇如此善持音儀盡詳緩之致與人别執手曰念相聞餘響久之不絶張氏後進皆慕之其源起自敷也遷黄門侍郎始興王濬後將軍司徒左長史未拜父在吴興亡成服凡十餘日始進水漿葬畢不進鹽菜遂毁瘠成疾伯父茂度毎止譬之輒更感慟絶而復續茂度曰我冀譬汝有益但更甚耳自是不復往未朞而卒孝武即位詔旌其孝道追贈侍中改其所居稱孝張里敷弟柬襲父封位通直郎柬勇力手格猛獸元凶以為輔國將軍孝武至新亭東出奔墜淮而死子式嗣弟沖沖字思約出繼伯父敷沖母戴顒女有儀範張氏内取則焉沖少有至性随從叔永為將帥除盱台太守永征彭城遇寒軍人足脛凍㫁者十七八沖足指皆墮齊永明八年為假節監青兾二州行刺史事沖父初卒遺命祭我必以鄉土所産無用牲物沖在鎮四時還吴國取果菜毎至烝嘗輒流涕薦焉仍轉刺史永元二年為南兖州刺史遷司州裴叔業以夀春降魏又遷沖南兖州刺史竝未拜崔慧景事平徴建安王寶夤還都以沖為舒州刺史一嵗之中頻授四州刺史至是乃受任封定襄侯梁武帝起兵手書喻意又遣辯士説之沖確然不回東昏遣驍騎將軍薛元嗣制局監暨榮伯領兵及糧運送沖使拒西師元嗣等懲劉山陽之敗疑沖不敢進停住夏首浦聞梁武師將至元嗣榮伯相率入郢城時竟陵太守房僧寄被代還至郢東昏敕僧寄留守魯山除驍騎將軍僧寄謂沖曰下官雖未荷朝廷深恩實蒙先帝厚澤隂其樹者不折其枝實欲㣲立塵効沖深相許諾共結盟誓分部拒守遣軍主孫樂祖數千人助僧寄援魯山岸立城壘眀年二月梁武圍魯山城遣軍主曹景宗等過江攻郢城沖中兵叅軍陳光静等間出擊之光静戰死沖固守不出病將死厲府僚以誠節言終而卒元嗣榮伯與沖子孜及長史江夏程茂固守東昏詔贈沖散騎常侍䕶軍將軍元嗣等處圍城之中無他經畧唯迎蔣子文及蘇侯神日禺中扵州聼上祀以求福鈴鐸聲晝夜不止又使子文導從登陴廵行旦日輒復如之識者知其將亡僧寄病死孫樂祖窘以城降郢被圍二百餘日士庶病死者七八百家魯山䧟後二日程茂及元嗣等議降使孜為書與梁武帝沖故吏青州中從事房長瑜謂孜曰前使君忠貫昊天操愈松竹郎君但當端坐畫一以荷析薪若天運不與幅巾待命以下從使君今若随諸人之計非唯郢州士女失髙山之望亦恐彼所不取也不從卒以郢城降時以沖及房僧寄比臧洪之被圍也贈僧寄益州刺史暢字少㣲邵兄褘子也禕少有操行為晉琅邪王國郎中令從王至洛還京都宋武帝封藥酒一甖付禕使宻加酖毒受命扵道自飲而卒暢少與從兄敷演鏡齊名為後進之秀起家為太守徐佩之主簿佩之被誅暢馳出奔赴制服盡哀為論者所美弟牧嘗為猘犬所傷醫云宜食蝦蟇牧甚難之暢含笑先嘗牧因此乃食創亦即愈累遷太子中庶子孝武鎮彭城暢為安北長史沛郡太守元嘉二十七年魏太武南征太尉江夏王義恭統諸軍出鎮彭城太武親率大衆去彭城數十里彭城衆力雖多軍食不足義恭欲棄彭城南歸計議彌日不定時歴城衆少食多安北中兵参軍沈慶之議欲以車營為函箱陳精兵為外翼奉二王及妃媛直趨歴城分城兵配䕶軍將軍蕭思話留守太尉長史何朂不同欲席卷奔鬱洲自海道還都二議未决更集羣僚謀之暢曰若歴城鬱洲有可至之理下官敢不髙讃今城内乏食百姓咸有走情但以闗扄嚴固欲去莫從耳若一旦動腳則各自散走欲至所在何由可得今軍食雖寡朝夕猶未窘罄豈有捨萬安之術而就危亡之道若此計必用下官請以頸血汚君馬跡孝武聞暢議謂義恭曰張長史言不可異也義恭乃止魏太武得至仍登城南亞父冡扵戲馬臺立氊屋先是隊主蒯應見執其日晡時太武遣送應至小市門致意求甘蔗及酒孝武遣人送酒二器甘蔗百挺求駱駝明日太武又自上戲馬臺復遣使至小市門求與孝武相見遣送駱駝并致雜物使扵南門受之暢扵城上與魏尚書李孝伯語孝伯問君何姓荅云姓張孝伯曰張長史暢曰君何得見識孝伯曰君聲名逺聞足使我知因言説久之城内有具思者嘗在魏義恭遣視知是孝伯乃開門進餉物太武又求酒及甘橘暢宣孝武㫖又致螺盃雜粽南土所珍太武復令孝伯傳語曰魏主有詔借博具暢曰博具當為申致有詔之言政可施扵彼國何得稱之扵此孝伯曰鄰國之君何為不稱詔扵鄰國之臣暢曰君之此稱尚不可聞扵中華况在諸王之貴而獨曰鄰國之君邪孝伯曰魏主言太尉鎮軍久闕南信殊當憂邑苦欲遣信當為䕶送暢曰此方間路甚多不復以此勞魏主孝伯曰亦知有水路似為白賊所㫁暢曰君著白衣故稱白賊邪孝伯大笑曰今之白賊亦不異黄巾赤眉暢曰黄巾赤眉似不在江南孝伯曰亦不離青徐暢曰今者青徐實為有賊但非白賊耳又求博具俄送與太武又遣送氊及九種鹽并胡豉云此諸鹽各有所宜白鹽是魏主所食黒者療腹脹氣滿細刮取六銖以酒服之胡鹽療目痛柔鹽不用食療馬脊創赤鹽駮鹽臭鹽馬齒鹽四種並不中食胡豉亦中噉又求黄甘并云魏主致意太尉安北何不遣人来至我間彼此之情雖不可盡要湏見我小大知我老少觀我為人若諸佐不可遣亦可使僮来暢又宣㫖荅曰魏主形狀才力久為来往所具李尚書親自銜命不患彼此不盡故不復遣信又云魏主恨向所送馬殊不稱意安北若湏大馬當更送之脱湏蜀馬亦有佳者暢曰安北不乏良駟送自彼意非此所求義恭又餉炬燭十挺孝武亦致錦一匹又曰知更湏黄甘誠非所吝但㑹不足周彼一軍向給魏主未應便乏故不復重付太武復求甘蔗安石榴暢曰石榴出自鄴下亦當非彼所乏孝伯曰君南土膏粱何為著屩君而著此使將士云何暢曰膏粱之言誠為多愧但以不武受命統軍戎陣之間不容緩服太武又遣就二王借箜篌琵琶筝笛等器及棊子孝伯辭辯亦北土之美暢随宜應荅吐屬如流音韻詳雅風儀華潤孝伯及左右人並相視歎息時魏聲云當出襄陽故以暢為南譙王義宣司空長史南郡太守三十年元凶弑逆義宣發哀之日即便舉兵暢為元佐位居僚首哀容俯仰隂映當時舉哀畢改服著黄袴褶出射堂簡人音姿容止莫不矚目見者皆願為盡命事平徴為吏部尚書封夷道縣侯義宣既有異圖蔡超等以暢人望勸義宣留之乃觧南蠻校尉以授暢加冠軍將軍領丞相長史暢遣門生荀僧寶下都因顔竣陳義宣舋狀僧寶有私貨停巴陵不時下㑹義宣起兵津路㫁絶僧寶遂不得去義宣將為逆遣嬖人翟靈寶告暢暢陳必無此理請以死保之靈寶知暢不回勸義宣殺以狥衆頼丞相司馬竺超人得免進號撫軍别立軍部以收人望暢雖署文檄而飲酒常醉不省文書随義宣東下梁山戰敗扵亂兵自歸為軍人所掠衣服都盡遇右將軍王𤣥謨乗輿出營暢已得敗衣因排𤣥謨上輿𤣥謨意甚不悦諸將請殺之隊主張世營救得免執送都下廷尉尋見原起為都官尚書轉侍中代子淹領太子右衛率孝武宴朝賢暢亦在坐何偃因醉曰張暢故是竒才同義宣作賊亦能無咎非才何以致此暢乃厲聲曰太初之時誰黄其閤帝曰何事相苦初元凶時偃父尚之為元凶司空義師至新林門生皆迯尚之父子與婢妾共洗黄閤故暢譏之孝建二年出為㑹稽太守卒諡曰宣暢愛弟子輯臨終遺命與輯合墳論者非之暢弟悦亦有美稱歴侍中臨海王子頊前軍長史南郡太守晉安王子勛建偽號召拜為吏部尚書與鄧琬共輔偽政事敗悦殺琬歸降復為太子中庶子後拜雍州刺史泰始六年明帝扵巴郡置三巴校尉以悦補之加持節輔師將軍領巴郡太守未拜卒暢子浩官至義陽王昶征北諮議參軍浩弟淹黄門郎封廣晉縣子太子左衞率東陽太守逼郡吏燒臂照佛百姓有罪使禮佛贖愆動至數千拜坐免官禁錮起為光禄勲臨川内史後與晉安王子勛同逆軍敗見殺淹弟融融字思光弱冠有名道士同郡陸修静以白鷺羽塵尾扇遺之曰此既異物以奉異人觧褐為宋新安王子鸞行參軍王母殷淑儀薨後四月八日建齋并灌佛僚佐儭者多至一萬少不減五千融獨注儭百錢帝不悦曰融殊貧當序以佳禄出為封溪令從叔永出後渚送之曰似聞朝㫖汝尋當還融曰不患不還政恐還而復去及行路經嶂嶮獠賊執融將殺食之融神色不動方作洛生詠賊異之而不害也浮海至交州扵海中遇風終無懼色方詠曰乾魚自可還其本鄉肉脯復何為者哉又作海賦文辭詭激獨與衆異後以示鎮軍將軍顧顗之顗之曰卿此賦實超𤣥虚但恨不道鹽耳融即求筆注曰漉沙構白熬波出素積雪中春飛霜暑路此四句後所足也顗之與融兄有恩好顗之卒融身負墳土在南與交趾太守卞展善展扵嶺南為人所殺融挺身奔赴與秀才對䇿中第為尚書殿中郎不就改為儀曹郎尋請假奔叔父喪道中罰幹錢敬道鞭杖五十寄繫延陵獄大明五年制二品清官行僮幹杖不得出十為左丞孫緬所奏免官復位攝祠部倉部二曹時領軍劉勔戰死融以祠部議上應哭勔見從又俗人忌以正月開太倉融議不宜拘束小忌尋兼掌正厨見宰殺回車徑去自表觧職再遷南陽王友融父暢為丞相長史義宣事難暢將為王𤣥謨所殺時𤣥謨子瞻為南陽王長史融啟求去官不許融家貧欲禄乃與從叔征北將軍永書曰融昔幼學早訓家風雖則不敏率以成性布衣韋帶弱年所安簞食瓢飲不覺不樂但世業清貧人生多待榛栗棗脩女贄既長束帛禽鳥男禮已大勉身就官十年七仕不欲代耕何至此事昔求三吴一丞雖屬舛錯今聞南康缺守願得為之融不知階級階級亦可不知融政以求丞不得所以求郡求郡不得亦可復求丞又與吏部尚書王僧䖍書曰融天地之逸人也進不辨貴退不知賤實以家貧累積孤寡傷心八姪俱孤二弟頓弱豈能山海陋禄申融情累阮籍愛東平土風融亦欣晉平閑外時議以融非御人才竟不果辟齊太傅掾稍遷中書郎非其所好乞為中散大夫不許張氏自敷以来並以理音辭脩儀範為事至融風止詭越坐常危膝行則曵歩翹身仰首意制甚多見者驚異聚觀成市而融了無慙色随例同行常稽遲不進髙帝素愛融為太尉時與融欵接見融常笑曰此人不可無一不可有二即位後手詔賜融衣曰見卿衣服麤故誠乃素懐有本交爾藍縷亦虧朝望今送一通故衣意謂雖故乃勝新也是吾所著已令裁減稱卿之體并履一量髙帝出太極殿西室融入問訊彌時方登階及就席上曰何乃遲為對曰自地升天理不得速時魏主至淮而退帝問何意忽来忽去未有荅者融時下坐抗聲曰以無道而来見有道而去公卿咸以為㨗融善草書常自美其能帝曰卿書殊有骨力但恨無二王法荅曰非恨臣無二王法亦恨二王無臣法融假還鄉詣王儉别儉立此地舉袂不前融亦舉手呼儉曰歜曰王前儉不得已趨就之融曰使融不為慕勢而令君為趨士豈不善乎常歎云不恨我不見古人所恨古人又不見我融與吏部尚書何戢善往詣戢誤通尚書劉澄下車入門乃曰非是至戸望澄又曰非是既造席視澄曰都自非是乃去其為異如此又為長沙王鎮軍竟陵王征北諮議並領記室司徒從事中郎永明二年總明觀講敕朝臣集聽融扶入就榻私索酒飲之事畢乃長歎曰嗚呼仲尼獨何人哉為御史中丞到撝所奏免官尋復職融形貌短醜精神清徹王敬則見融革帶寛殆將至髀謂曰革帶太急融曰既非歩吏急帶何為融假東出武帝問融住在何處荅曰臣陸處無屋舟居無水後上問其從兄緒緒曰融近東出未有居止權牽小舩扵岸上住上大笑後使融接對北使李道固就席道固顧而言曰張融是宋彭城長史張暢子不融嚬䠞久之曰先君不幸名達六夷豫章王大㑹賔僚融食炙始行畢行炙人便去融欲求鹽蒜口終不言方摇食指半日乃息出入朝廷皆拭目驚觀之八年朝臣賀衆瑞公事融扶入拜起復為有司所奏見原遷司徒兼右長史竟陵張欣時為諸暨令坐罪當死欣時父興世討宋南譙王義宣官軍欲殺融父暢興世以袍覆暢而坐之以此得免興世卒融著髙履為負土成墳至是融啓竟陵王子良乞代欣時死子良荅曰此乃是長史美事恐朝有常典不得如長史所懐遷黄門郎太子中庶子司徒左長史融有孝義忌月三旬不聼樂事嫂甚謹父暢臨終謂諸子曰昔丞相事難吾以不同將見殺緣司馬竺超人得活爾等必報其子後超人孫㣲冬月遭母喪居貧融弔之悉脱衣以為賻披牛被而反常以兄事㣲豫章王嶷竟陵王子良薨自以身經佐吏哭輒盡慟建武四年病卒遺令建白旐無旒不設祭令人捉麈尾登屋復䰟曰吾生平所善自當凌雲一笑三千買棺無製新衾左手執孝經老子右手執小品法華經妾二人事哀畢各遣還家曰吾生平之風調何至使婦人行哭失聲不湏暫停閨閤融𤣥義無師法而神觧過人髙談鮮能抗拒永眀中遇疾為問律自序云吾文章之體多為世人所驚汝可師耳以心不可使耳為心師也夫文豈有常體但以有體為常政當其有體丈夫當刪詩書制禮樂何至因循寄人籬下臨卒又戒其子曰手澤存焉父書不讀況文音情婉在其韻吾意不然别遺爾㫖吾文體英變變而屢竒豈吾天挺盖不隤家聲汝可號哭而看之融文集數十卷行扵世自名其集為玉海司徒禇彦回問其故融云盖玉以比徳海崇上善耳張氏前有敷演鏡暢後有充融卷稷第六弟寶積建武中出為廬陵太守時名流謝􅊪何㸃陸恵曉孔珪集融弟鐵之舍㸃造坐便曰今日可謂盛集二五我兄弟之流阿六張氏保家之子顧見王思逺曰卿詐作善非實得也二五謂孔珪及融並第五寶積永元中為湘州行事蕭頴胄扵江陵乗腰輿詣頴胄舉動自若頴胄問何至之晚荅曰本朝危亂四海横流既不能為比干之死實未忍為㣲子之去是以至晚頴胄深以為善即用為相府諮議後位御史中丞融與東海徐文伯兄弟厚文伯字徳秀濮陽太守熈曽孫也熙好黄老隐扵秦望山有道士過求飲留一瓠􅕧與之曰君子孫宜以道術救世當得二千石熙開之乃扁鵲鏡經一卷因精心學之遂名震海内生子秋夫彌工其術仕至射陽令嘗夜有鬼呻聲甚悽愴秋夫問何湏荅言姓某家在東陽患腰痛死雖為鬼痛猶難忍請療之秋夫曰云何厝法鬼請為芻人案孔穴針之秋夫如言為灸四處又針肩井三處設祭埋之明日見一人謝恩忽然不見當世伏其通靈秋夫生道度叔嚮皆能精其業道度有腳疾不能行宋文帝令乗小輿入殿為諸皇子療疾無不絶驗位蘭陵太守宋文帝云天下有五絶而皆出錢唐謂杜道鞠彈棊范悦詩褚欣逺模書褚𦙍圍碁徐道度療疾也道度生文伯叔嚮生嗣伯文伯亦精其業兼有學行侗儻不屈意扵公卿不以醫自業融謂文伯嗣伯曰昔王微嵇叔夜並學而不能殷仲堪之徒故所不論得之者由神眀洞澈然後可至故非吾徒所及且褚侍中澄當貴亦能救人疾卿此更成不逹荅曰唯逹者知此可崇不逹者多以為深累既鄙之何能不恥之文伯為効與嗣伯相埒宋孝武路太后病衆醫不識文伯診之曰此石博小腸耳乃為水劑消石湯病即愈除鄱陽王常侍遺以千金旬日恩意隆重宋明帝宫人患腰痛牽心每至輒氣欲絶衆醫以為肉癥文伯曰此髪癥以油投之即吐得物如髪稍引之長三尺頭已成蛇能動挂門上適盡一髪而已病都差宋後廢帝出樂逰苑門逢一婦人有娠帝亦善診之曰此腹是女也問文伯曰腹有兩子一男一女男左邉青黑形小扵女帝性急便欲使剖文伯惻然曰若刀斧恐其變異請針之立落便寫足太隂補手陽明胎便應針而落兩皃相續出如其言子雄亦傳家業尤工診察位奉朝請能清言多為貴逰所善事母孝謹母終毁瘠㡬至自滅俄而兄亡扶杖臨喪撫膺一慟遂以哀卒嗣伯字叔紹亦有孝行善清言位正員郎諸府佐彌為臨川王映所重時直閤將軍房伯玉服五石散十許劑無益更患冷夏日常複衣嗣伯為診之曰卿伏熱應須以水發之非冬月不可至十一月冰雪大盛令二人夾捉伯玉觧衣坐石取冷水從頭澆之盡二十斛伯玉口噤氣絶家人啼哭請止嗣伯遣人執杖防閤敢有諌者撾之又盡水百斛伯玉始能動而見背上彭彭有氣俄而起坐曰熱不可忍乞冷飲嗣伯以水與之一飲一升病都差自爾恒發熱冬月猶單褌衫體更肥壯常有嫗人患滯冷積年不差嗣伯為診之曰此尸注也當取死人枕煮服之乃愈扵是往古冢中取枕枕已一邉腐缺服之即差後秣陵人張景年十五腹脹面黄衆醫不能療以問嗣伯嗣伯曰此石蚘耳極難療當死人枕煮之依語煮枕以湯投之得大利并蚘蟲頭堅如石五升病即差後沈僧翼患眼痛又多見鬼物以問嗣伯嗣伯曰邪氣入肝可覓死人枕煮服之竟可埋枕扵故處如其言又愈王晏問之曰三病不同而皆用死人枕而俱差何也荅曰尸注者鬼氣伏而未起故令人沉滯得死人枕投之䰟氣飛越不得復附體故尸注可差石蚘者久蚘也醫療既癖蚘中轉堅世間藥不能遣所以湏鬼物驅之然後可散故令煮死人枕也夫邪氣入肝故使眼痛而見魍魎應湏邪物以鈎之故用死人枕也氣因枕去故令埋扵冢間也又春月出南籬間戲聞笪屋中有呻聲嗣伯曰此病甚重更二日不療必死乃往視見一老姥稱體痛而處處有􅗼黒無數嗣伯還煑斗餘湯送令服之服訖痛勢愈甚跳投床者無數湏臾所􅗼處皆拔出釘長寸許以膏塗諸瘡口三日而復云此名釘疽也時又薛伯宗善徙癕疽公孫泰患背伯宗為氣封之徙置齋前柳樹上明旦癕消樹邉便起一瘤如拳大稍稍長二十餘日瘤大膿爛出黄赤汁斗餘樹為之痿損論曰有晉自宅淮海張氏無乏賢良及宋齊之間雅道彌盛其前則云敷演鏡暢盖其尤著者也然景𦙍敬愛之道少㣲立履所由其殆優矣思光行已卓越非常俗所遵齊髙帝所云不可有二不可無一斯言其㡬得矣徐氏妙理通靈盖非常所至雖古之和鵲何以加兹融與文伯欵好故附之云爾南史卷三十二南史卷三十二考證張邵傳初為晉瑯邪内史王誕龍驤府功曹桓𤣥徙誕扵廣州監本脱第二誕字今从晉書増正張敷傳樝何如梨何監本作可今从閣本其自標遇如此標一本作寵誤伯父茂度毎止譬之輙更感慟絶而復續茂度曰我冀譬汝有益但更甚耳冀監本訛異今改从閣本張暢傳義恭又餉炬燭十挺十一本作千今从魏書張融傳出為封溪令從叔永出後渚送之後監本訛夜今改正後以示鎮軍將軍顧顗之顗一本作覬顗之與融兄有恩好顗之卒融身負墳土監本脱兩之字今从齊書増入今聞南康缺守願得為之願監本訛應今从閣本南史卷三十二考證
