body:
  text: 南史卷二十四唐李延夀撰列傳第十四王裕之孫秀之綸之廷之子廷之峻曽孫阮韜琮峻子王鎮之弟𢎞之思逺晏従弟𢎞之孫晏王韶之王悦之王准之曽孫清清子猛准之従弟逡之珪之族子素王裕之字敬𢎞晉驃騎将軍廙之曾孫司州刺史胡之之孫也名與宋武帝諱同故以字行父茂之字興元晉陵太守敬𢎞少有清尚起家本國左常侍衛軍參軍性恬静樂山水求為天門太守及之郡妻弟荆州刺史桓𤣥遣信要令過已敬𢎞至巴陵謂人曰靈寳正當欲見其姊我不能為桓氏贅壻乃遣别船送妻往江陵彌年不迎山郡無事恣其游適意甚好之後為南平太守去官居作唐縣界𤣥輔政及篡位屢召不下宋武帝以為車騎従事中郎徐州中従事史征西将軍道規諮議參軍時府主簿宋協亦有髙趣道規竝以事外相期嘗共酣飲敬𢎞因醉失禮為外司所白道規即便引還重申初讌永初中累遷吏部尚書敬𢎞每被召即便祗奉既到宜退旋復觧官武帝嘉其志不茍違也除廬陵王師加散騎常侍自陳無徳不可師範令王固讓不拜元嘉三年為尚書僕射關署文案初不省讀嘗豫聴訟上問疑獄敬𢎞不對上變色問左右何故不以訊牒副僕射敬𢎞曰臣乃得訊牒讀之正自不觧上甚不悦雖加禮敬亦不以時務及之六年遷尚書令固讓表求還東上不能奪改授侍中特進左光禄大夫給親信三十人及東歸車駕幸冶亭餞送十二年徴為太子少傅敬𢎞詣都上表固辭不拜東歸上時不豫自力見焉十六年以為左光禄大夫開府儀同三司侍中如故又詣都表辭竟不拜東歸二十三年復申前命復辭明年薨於餘杭之舍亭山年八十八順帝昇明三年追諡文貞公敬𢎞形状短而起坐端方桓𤣥謂之彈棊發八勢所居舍亭山林澗環周備登臨之羙故時人謂之王東山文帝嘗問為政得失對曰天下有道庶人不議上髙其言左右嘗使二老婦女戴五條辮著青紋袴􅘼飾以朱粉女適尚書僕射何尚之弟述之敬𢎞嘗往何氏看女遇尚之不在因寄齋中臥俄頃尚之還敬𢎞還使二婦女守閤不聴尚之入云正熱不堪相見君可且去尚之於是移於他室上将為廬陵王納其女辭曰臣女幼既許孔淳之息子恢之被召為祕書郎敬𢎞求為奉朝請與恢之書曰彼秘書有限故有競朝請無限故無競吾欲使汝處不競之地文帝嘉之竝見許敬𢎞見兒孫嵗中不過一再相見見輙剋日未嘗敎子孫學問各随所欲人或問之答曰丹朱不應乏敎甯越不聞被捶恢之位新安太守嘗請假㝎省敬𢎞剋日見之至日輒不果假日将盡恢之求辭敬𢎞呼前至閤復不見恢之於閤外拜辭流涕而去恢之弟瓉之位吏部尚書金紫光禄大夫諡貞子瓉之弟昇之位都官尚書瓉之子秀之秀之字伯奮幼時祖父敬𢎞愛其風采仕宋為太子舍人父卒廬於墓側服闋復職吏部尚書褚彦回欲與結婚秀之不肯以此頻為兩府外兵參軍後為晉平太守朞年求還或問其故答曰此郡沃壤珍阜日至人所昧者財財生則禍逐智者不昧財亦不逐禍吾山資已足豈可久留以妨賢路乃上表請代時人以為王晉平恐富求歸仕齊為豫章王嶷驃騎長史嶷於荆州立學以秀之領儒林祭酒武帝即位累遷侍中祭酒轉都官尚書秀之祖父敬𢎞性貞正徐羡之傅亮當朝不與来往及致仕隠吴興與秀之父瓉之書深朂以静退瓉之為五兵尚書未嘗詣一朝貴江湛謂何偃曰王瓉之今便是朝隠及栁元景顔師伯貴要瓉之竟不候之至秀之為尚書又不與王儉款接三世不事權貴時人稱之轉侍中領射聲校尉出為随王鎮西長史南郡内史後為輔國将軍吴興太守秀之先為諸王長史行事便歎曰仲祖之識見於己多便無復仕進止營理舍亭山宅有終焉之志及除吴興郡隠業所在心願為之到郡修舊山移置輜重隆昌元年卒遺令朱服不得入棺祭則酒脯而已世人以僕妾直靈助哭當由喪主不能淳至欲以多聲相亂魂而有靈吾當笑之諡曰簡子延之字希季昇之子也少静黙不交人事仕宋為司徒左長史清貧居宇穿漏褚彦回以唘宋眀帝即敇材官為起三間齋屋歴吏部尚書尚書左僕射宋徳既衰齊髙帝輔政朝野之情人懐彼此延之與尚書令王僧虔中立無所去就時人語曰二王居平不送不迎髙帝以此善之昇明三年出為江州刺史加都督齊建元元年進號鎮南将軍延之與金紫光禄大夫阮韜俱宋領軍将軍劉湛外甥竝有早譽湛甚愛之曰韜後當為第一延之為次也延之甚不平每致餉下都韜與朝士同例髙武聞之與延之書曰韜云卿未嘗有别意當由劉家月旦故邪韜字長明陳留人晉金紫光禄大夫裕𤣥孫也為南兗州别駕刺史江夏王義恭逆求資費錢韜曰此朝廷物執不與宋孝武選侍中四人竝以風貎王彧謝莊為一雙韜與何偃為一雙常充兼假至始興王師卒延之居身簡素清静寡慾凡所經歴務存不擾在江州禄俸外一無所納獨處齋内未嘗出户吏人罕得見焉雖子弟亦不妄前時時見親舊未嘗及世事従容談詠而已後為尚書左僕射尋領竟陵王師卒諡簡子子綸之字元章為安成王記室參軍偃仰召㑹退居僚末司徒袁粲聞而歎曰格外之官便今日為重貴游居此位者遂以不掌文記為髙自綸之始也齊永眀中厯位侍中出為豫章太守下車祭徐孺子許子将墓圖畫陳蕃華歆謝鯤像於郡朝堂為政寛簡稱良二千石武帝幸琅邪城綸之與光禄大夫全景文等二十一人坐不參承為有司奏免官後位侍中都官尚書卒自敬𢎞至綸之竝方嚴皆剋日乃見子孫盖家風也綸之子昕有業行居父憂過禮謝􅊪欲遣參之孔珪曰何假參此豈有全理以憂卒峻字茂逺秀之子也少羙風姿善容止仕齊為桂陽内史梁天監初為中書侍郎武帝甚悦其風采與陳郡謝覽同見賞擢累遷侍中吏部尚書處選甚得名譽峻性詳雅無趨競心嘗與謝覽約官至侍中不復謀進仕覽自吏部尚書出為吴興郡平心不畏强禦亦由處俗情薄故也峻為侍中已後雖不退身亦淡然自守無所營務遷金紫光禄大夫未拜卒諡恵子子琮為國子生尚始興王女繁昌主琮不慧為學生所嗤遂離婚峻謝王王曰此自上意僕極不願如此峻曰下官曽祖是謝仁祖外孫亦不藉殿下姻媾為門户耳王鎮之字伯重晉司州刺史胡之之従孫而裕之従祖弟也祖耆之位中書郎父随之上虞令鎮之為剡上虞令竝有能名桓𤣥輔晉以為大将軍録事參軍時三吴饑荒遣鎮之衘命賑卹而會稽内史王愉不奉符㫖鎮之依事糾奏愉子綏𤣥之外甥當時貴盛鎮之為所排抑以母老求補安成太守以母憂去職在官清潔妻子無以自反乃棄官致喪還上虞舊墓葬畢為子摽之求安復令随子之官服闋為征西道規司馬南平太守後為御史中丞執正不撓百僚憚之出為建威将軍平越中郎将廣州刺史加都督宋武帝謂人曰鎮之少著清績必将繼羙吴隠嶺南弊俗非此不康也在鎮不受俸禄蕭然無營去官之日不異初至武帝初建相國府為諮議參軍領録事善於吏職嚴而不殘遷宋臺祠部尚書武帝踐阼卒於宣訓衛尉弟𢎞之𢎞之字方平少孤貧為外祖徴士何凖所撫育従叔獻之及太原王恭竝貴重之仕晉為司徒主簿家貧性好山水求為烏傷令桓𤣥輔晉桓謙以為衛軍參軍時殷仲文還姑熟祖送傾朝謙要𢎞之同行答曰凡祖離送别必在有情下官與殷風馬不接無緣扈従謙貴其言母随兄鎮之之安成郡𢎞之觧職同行義熙中何無忌及宋武帝辟召一無所就家在㑹稽上虞従兄敬𢎞為吏部尚書奏𢎞之為太子庶子不就文帝即位敬𢎞為尚書左僕射陳𢎞之髙行徴為通直散騎常侍又不就敬𢎞嘗觧貂裘與之即著以採藥性好釣上虞江有一處名三石頭𢎞之常垂綸於此經過者不識之或問漁師得魚賣不𢎞之曰亦自不得得亦不賣日夕載魚入上虞郭經親故門各以一兩頭置門内而去始寧沃川有佳山水𢎞之又依巖築室謝靈運顔延之並相欽重靈運與廬陵王義真牋曰㑹境既豐山水是以江左嘉遁竝多居之至若王𢎞之拂衣歸耕踰歴三紀孔淳之𨼆約窮岫自始迄今阮萬齡辭事就閑纂戎先業既逺同羲唐亦激貪厲競若遣一介有以相存真可謂千載盛羙也𢎞之元嘉四年卒顔延之欲為作誄書與其子曇生曰君家髙世之善有識歸重豫染豪翰所應載述況僕託慕末風竊以叙徳為事但恨短筆不足書羙誄竟不就曇生好文義以謙和見稱歴吏部尚書太常卿孝武末為吴興太守眀帝初興與四方同逆戰敗歸降被宥終於中散大夫阮萬齡陳留尉氏人祖思曠左光禄大夫父寧黄門侍郎萬齡少知名為孟昶建威長史時袁豹江夷相係為昶司馬時人謂昶府有三素望萬齡家在㑹稽剡縣頗有素情位左户尚書太常出為湘州刺史無政績後為散騎常侍金紫光禄大夫卒曇生弟普曜位秘書監普曜子晏晏字休黙一字士彦仕宋初為建安國左常侍稍至車騎晉熙王爕安西板晏主簿時齊武帝為長史與晏相遇府轉鎮西板晏為記室沈攸之事難随武帝鎮盆城齊髙帝時威權雖重而衆情猶有疑惑晏便専心奉事軍旅書翰皆見委性甚便僻漸見親待常參議機宻建元初為太子中庶子武帝在東宫専斷朝事多不聞唘晏慮及罪稱疾自疎武帝即位為長史兼侍中意任如舊遷侍中祭酒遭母喪起為司徒左長史晏父普曜藉晏勢多歴通官普曜卒晏居喪有禮永眀六年為丹陽尹晏位任親重自豫章王嶷尚書令王儉皆降意接之而晏每以疎漏被責連稱疾久之轉為江州刺史泣不願出留為吏部尚書太子右率終以舊恩見寵時尚書令王儉雖貴而疎晏既領選權行臺閣與儉頗不平儉卒禮官欲依王導諡為文獻晏唘上曰𨗳乃得此諡但宋來不加素族謂親人曰平頭憲事已行矣十一年為右僕射領太孫右衛率武帝崩遺㫖以尚書事付晏及徐孝嗣鬱林即位轉左僕射及眀帝謀廢立晏便響應接奉轉尚書令封曲江縣侯給鼓吹一部甲仗五十人入殿時明帝形勢已布而莫敢先言蕭諶兄弟握兵權遲疑未决晏頻三夜微歩詣諶議時人以此窺之明帝與晏東府語及時事晏抵掌曰公常言晏怯今定如何建武元年進號驃騎大将軍給班劒二十人又加兵百人領太子少傅進爵為公以魏軍動給兵千人晏篤於親舊為時所稱至是自謂佐命唯新言論常非武帝故事衆始怪之眀帝雖以事際須晏而心相疑斥料簡武帝中詔得與晏手詔三百餘紙皆是論國家事永明中武帝欲以眀帝代晏領選晏唘曰鸞清幹有餘然不諳百氏恐不可居此職乃止及見此詔愈猜薄之帝初即位始安王遥光便勸誅晏帝曰晏於我有勲且未有罪遥光曰晏尚不能為武帝安能為陛下帝黙然變色時帝常遣心腹左右陳世範等出塗巷采聴異言由是以晏為事晏性浮動志欲無懕自謂旦夕開府又望録尚書每謂人曰徐公應為令又和徐詩云槐序候方調其名位在徐前若三槐則晏不言自顯人或譏之晏人望未重又與上素疎中興初雖以事計委任而内相疑阻晏無防意既居朝端事多専決内外要職竝用周旋門義每與上争用人數呼相工自視云當大貴與客語好屏人上聞疑晏欲反遂有誅晏意有鮮于文粲與晏子徳元往来宻探朝㫖告晏有異志又左右單景儁陳世範等采巫覡言唘上云晏懐異圖是時南郊應親奉景儁等言晏因此與武帝故主帥於道中竊發㑹獸犯郊壇帝愈懼未郊前一日上乃停行先報晏及徐孝嗣孝嗣奉㫖而晏陳郊祀事大必宜自力景儁言益見信元㑹畢乃召晏於華林省誅之下詔顯其罪稱以河東王鉉識用微弱欲令守以虚器竝令収付廷尉晏之為員外郎也父普曜齋前栢樹忽變成梧桐論者以為梧桐雖有棲鳯之羙而失後凋之節及晏敗果如之又未敗前見屋桷子悉是大虵就視之猶木也晏惡之乃以紙裹桷子猶紙内摇動蓛蓛有聲又於北山廟答賽夜還晏醉部伍人亦飲酒羽儀錯亂前後十餘里中不復禁制識者云此不復久也未幾而敗晏子徳元有意尚位車騎長史徳元初名湛武帝曰劉湛江湛竝不善終此非佳名也晏乃改之至是及誅晏弟詡位少府卿敇未登黄門郎不得畜女伎詡與射聲校尉隂𤣥智坐畜伎免官禁錮十年敇特原詡亦篤舊後拜廣州刺史晏誅上遣殺之思逺晏從父弟也父羅雲平西長史思逺八嵗父卒祖𢎞之及外祖新安太守羊敬元並栖退髙尚故思逺少無仕心宋建平王景素辟南徐州主簿深見禮遇景素被誅左右離散思逺親視殯葬手種松栢與廬江何昌㝢沛郡劉璡上表理之事感朝廷景素女廢為庶人思逺分衣食以相資贍年長為備笄總訪求素對傾家送遣齊建元初歴竟陵王司徒録事參軍太子中舍人文恵太子與竟陵王子良素好士竝蒙賞接思逺求出為逺郡除建安内史長兄思𤣥卒思逺友于甚至表乞自觧不許及祥日又固陳武帝乃許之仍除中書郎大司馬諮議詔舉士竟陵王子良薦思逺及吴郡顧暠之陳郡殷叡時邵陵王子貞為吴郡除思逺為吴郡丞以本官行郡事論者以為得人後拜御史中丞臨海太守沈昭略贓私思逺依事劾奏明帝及思逺従兄晏昭略叔父文季竝請止之思逺不從案事如故建武中遷吏部郎思逺以晏為尚書令不欲竝居内臺權要之職上表固讓乃改授司徒左長史初眀帝廢立之際思逺謂晏曰兄荷武帝厚恩今一旦賛人如此事彼或可以權計相須未知兄将何以自立及此引決猶可保全門户不失後名晏曰方噉粥未暇此事及拜驃騎㑹子弟謂思逺兄思徴曰隆昌之末阿戎勸吾自裁若用其語豈有今日思逺遽應曰如阿戎所見猶未晚也晏既不能謙退位處朝端事多専斷内外要職並用門生帝外迹甚羙内相疑異思逺謂曰時事稍異兄覺不凡人多拙於自謀而巧於謀人晏黙然不答思逺退後晏方歎曰天下人遂勸人自殺旬日晏及禍眀帝後知思逺有此言謂江祏曰王晏早用思逺語當不至此思逺立身簡潔諸客有詣己者覘知衣服垢穢方便不前形儀新楚乃與促膝雖然及去之後猶令二人交帚拂其坐處明帝従祖弟季敞性甚豪縦使詣思逺令見禮度都水使者季珪之常曰見王思逺終日匡坐不妄言笑簮帽衣領無不整絜便憶丘明士見明士蓬頭散帶終日酣醉吐論從横唐突卿宰便復憶見思逺言其兩反也上既誅晏思逺遷為侍中掌優策及起居注卒年四十九贈太常諡曰貞子思逺與顧暠之善暠之卒後家貧思逺迎其妻子經恤甚至暠之字士明少孤好學有義信位太子中舍人兼尚書左丞王韶之字休泰胡之從孫而敬𢎞従祖弟也祖羡之鎮軍掾父偉之少有志尚當世詔命表奏輒手自書寫泰元隆安時事大小悉撰錄位本國郎中令韶之家貧好學嘗三日絶糧而執卷不輟家人誚之曰困窮如此何不耕答曰我常自耕耳父偉之為烏程令韶之因居縣境好史籍博渉多聞初為衛将軍謝琰行參軍得父舊書因私撰晉安帝陽秋及成時人謂宜居史職即除著作佐郎使續後事訖義熙九年善叙事辭論可觀遷尚書祠部郎晉帝自孝武以来常居内殿武官主書於中通呈以省官一人管詔誥住西省因謂之西省郎傅亮羊嶶相代在職義興十一年宋武帝以韶之博學有文辭補通直郎領西省事轉中書侍郎晉安帝之崩武帝使韶之與帝左右宻加酖毒恭帝即位遷黄門侍郎領著作西省如故凡諸詔黄皆其辭也武帝受命加驍騎将軍黄門如故西省職觧復掌宋書坐璽制謬誤免黄門事在謝晦傅韶之為晉史序王珣貨殖王廞作亂珣子𢎞廞子華竝貴顯韶之懼為所陷深附結徐羡之傅亮等少帝即位遷侍中出為吴郡大守羡之被誅王𢎞入相領揚州刺史𢎞雖與韶之不絶諸弟未相識者皆不復往来韶之在郡常慮為𢎞所繩夙夜勤勵政績甚羙𢎞亦抑其私憾文帝兩嘉之韶之稱為良守徴為祠部尚書加給事中坐去郡長取送故免官後為吴興太守卒撰孝傳三卷文集行於世宋廟歌辭韶之所制也子曄位臨賀太守王悦之字少明晉右軍将軍羲之曽孫也祖獻之中書令父靖之司徒左長史為劉穆之所厚就穆之求侍中如此非一穆之曰卿若不求久自得之遂不果悦之少厲清操亮直有風檢為吏部郎隣省有㑹同者遺悦之餅一甌辭不受曰此費誠小然少来不願當之宋眀帝泰始中為黄門郎御史中丞上以其廉介賜良田五頃以為侍中在門下盡其心力掌檢校御府太官太醫諸署時承奢忲之後姦竊者衆悦之按覆無所避得姦巧甚多於是衆署共咒詛悦之病甚恒見兩烏衣人捶之及卒上乃収典掌者十許人桎梏之送淮隂宻令度瓜歩江投之中流王准之字元魯晉尚書僕射彬𤣥孫也曽祖彪之位尚書令祖臨之父納之竝御史中丞彪之博聞多識練悉朝儀自是家世相傳竝諳江左舊事緘之青箱世謂之王氏青箱學准之兼明禮傳贍於文辭桓𤣥簒位以為尚書祠部郎宋武帝起兵為太尉主簿出為山隂令有能名預討盧循功封都亭侯宋臺建除御史中丞為百僚所憚自彪之至准之四世居此職准之嘗作五言詩范泰嘲之卿唯觧彈事耳准之正色答猶差卿世載雄狐坐世子左衛率謝靈運殺人不舉免官武帝受命拜黄門侍郎永初中奏曰鄭𤣥注禮三年之喪二十七月而吉古今學者多謂得禮之宜晉初用王肅議祥禫共月故二十五月而除遂以為制江左以来凖晉朝施用搢紳之士多遵𤣥義夫先王制禮以大順羣心喪也寧戚著自前經今大宋開泰品物遂理愚謂宜同即物情以𤣥義為制朝野一禮則家無殊俗従之元嘉中歴位侍中都官尚書改領吏部出為丹陽尹准之究識舊儀問無不對時大将軍彭城王義康錄尚書事每歎曰何須髙論𤣥虛正得如王准之兩三人天下便足然寡風素情悁急不為時流所重撰儀注咸見遵用卒贈太常子輿之征虜主簿輿之子進之仕齊位給事黄門侍郎扶風太守梁武帝之舉兵也所在響應隣郡多請進之同遣修謁進之曰非吾志也竟不行武帝嘉之梁臺建歴尚書左丞廣平天門二郡太守左衛将軍封建寧公進之子清位散騎常侍金紫光禄大夫鎮東府長史新野東陽二郡太守安南将軍封中盧公承聖末陳武帝殺太尉王僧辯遣文帝攻僧辯壻杜龕龕告難於清引兵援龕大敗陳文帝於吴興追奔至晉陵時廣州刺史歐陽頠亦同清援龕中更改異殺清而歸陳武帝子猛猛字世雄本名勇五歳而父清遇害陳文帝軍度浙江訪之将加夷滅母韋氏擕之遁于㑹稽遂免及長勤學不倦博渉經史兼習孫吴兵法以父遇酷終文帝之世不聴音樂蔬食布衣以喪禮自處宣帝立乃始求位太建初釋褐鄱陽王府中兵參軍再遷永陽王府録事參軍猛慷慨常慕功名先是上疏陳安邊拓境之策甚見嘉納至是詔随大都督吴眀徹略地以軍功封應陽縣子累遷太子右衛率徙晉陵太守威恵兼舉姦盜屏跡富商野次云以付王府君郡人歌之以比漢之趙廣漢至徳初徴為左驍騎将軍加散騎常侍深見信重時孔範施文慶等竝相與比周害其梗直議将出之而未有便㑹廣州刺史馬靖不受徴乃除猛都督東衡州刺史領始興内史與廣州刺史陳方慶共取靖猛至即禽靖送建鄴進爵為公加先勝将軍平越中郎将大都督發廣桂等二十州兵討嶺外荒梗所至皆平禎眀二年詔授鎮南大将軍都督二十四州諸軍事尋命徙鎮廣州未之鎮而隋師濟江猛總督所部赴援時廣州刺史臨汝侯方慶西衡州刺史衡陽王伯信竝隸猛督府各觀望不至猛使髙州刺史戴智烈清逺太守曽孝逺各以輕兵就斬之而發其兵及聞臺城不守乃舉哀素服藉槀不食歎曰申包胥獨何人㢤因勒兵縁江拒守以固誠節及審後主不死乃遣其部将辛昉馳驛赴京師歸款隋文帝大悦謂昉曰猛懐其舊主送故情深即是我之誠臣保守一方不勞兵甲又是我之功臣即日拜昉開府儀同三司仍詔猛與行軍總管韋洸便留嶺表經略猛母妻子先留建鄴因随後主入京詔賜宅及什物甚厚别賚物一千叚及遣璽書勞猛仍討平山越馳驛奏聞時文帝幸河東㑹猛使至大悦楊素賀因曰昔漢武此地聞喜用改縣名王猛今者告捷逺符前事於是又降璽書褒賞以其長子繕為開府儀同三司猛尋卒於廣州文帝聞而痛之遣使弔祭贈上開府儀同三司封歸仁縣公命其子繕襲仍授普州刺史仁夀元年繕弟續表陳猛志求葬闗中詔許之仍贈使持節大将軍宋州刺史三州諸軍事諡曰成納之弟瓌之字道茂位司空諮議參軍􅅛之子逡之逡之字宣約少禮學博聞仕宋位吴令昇眀末尚書右僕射王儉重儒術逡之以著作郎兼尚書左丞參定齊國儀禮初儉撰古今喪服集記逡之難儉十一條更撰世行五卷國學久廢齊建元二年逡之先上表立學轉國子博士又兼著作永明起居注後位南康相光禄大夫加給事中逡之率素衣裳不澣几案塵黒年老手不釋卷建武二年卒従弟珪之位長水校尉撰齊職儀永眀九年其子中軍參軍顥唘上其書凡五十卷詔付秘閣素字休業彬五世孫而逡之族子也髙祖翹之晉光禄大夫曽祖望之祖泰之竝不仕父元𢎞位平固令素少有志行家貧母老隠居不仕宋孝建大眀泰始中屢徴不就聲譽甚髙山中有蚿清長聴之使人不厭而其形甚醜素仍為蚿賦以自况卒年五十四論曰昔晉初度江王導卜其家世郭璞云淮流竭王氏滅觀夫晉氏以来諸王冠冕不替盖亦人倫所得豈唯世禄之所傳乎及于陳亡之年淮流實竭曩時人物掃地盡矣斯乃興亡之兆已有前定天之所廢豈智識之所謀乎南史卷二十四南史卷二十四考證王延之傳即敕材官為起三間齋屋材監本誤校今从各本改王鎮之傳晉司州刺史胡之之從孫孫監本誤祖今訂正王思逺傳與廬江何昌㝢沛郡劉進上表理之㝢監本訛寓今改正南史卷二十四考證
