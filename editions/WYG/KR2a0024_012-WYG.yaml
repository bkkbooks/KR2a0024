body:
  text: 南史卷十二唐李延壽撰列傳第二后妃下梁文獻張皇后武徳郗皇后武丁貴嬪武阮脩容簡文王皇后元徐妃敬夏太后敬王皇后陳武宣章皇后文沈皇后廢帝王皇后宣柳皇后後主沈皇后張貴妃梁文獻張皇后諱尚柔范陽方城人也父穆之娶文帝從姑而生后后以宋元嘉中嬪於文帝生長沙宣武王懿永陽昭王敷次生武帝方孕忽見庭前菖蒲花光采非常驚報侍者皆云不見后曰常聞見菖蒲花者當富貴因取吞之是月生武帝將産之夕后見庭内若有衣冠陪列焉次生衡陽宣王暢義興昭長公主令嫕后宋泰始七年殂於秣陵縣同夏里舍葬晉陵武進縣東城里山天監元年五月甲辰追上尊號為皇后諡曰文獻穆之字思静晉司空華六世孫也少方雅有識鑒初為員外散騎侍郎深被始興王濬引納穆之鑒其禍萌求為交阯太守政有異績宋文帝將以為交州刺史㑹病卒子𢎞籍字真藝齊初為鎮西叅軍卒於官梁武踐阼追贈穆之光祿大夫加金章紫綬贈𢎞籍廷尉卿𢎞籍無子從弟𢎞䇿以子纉嗣别有傳武徳郗皇后諱徽高平金鄉人也祖紹宋國子祭酒領東海王師父曄太子舍人早卒后母宋文帝女尋陽公主也方娠夢當生貴子及后生有赤光照室器物盡明家人怪之巫言此女光高將有所妨乃於水濵祓除之后幼明慧善隸書讀史傳女工之事無不閑習宋後廢帝將納為后齊初安陸王緬又欲結婚郗氏並辭以女疾乃止齊建元末嬪于武帝生永興公主玉姚永世公主玉婉永康公主玉嬛及武帝為雍州刺史殂于襄陽官舍年三十二其年歸葬南徐州南東海武進縣東城里山中興二年武帝為梁公齊帝詔贈后為梁公妃及武帝踐阼追崇為皇后諡曰徳陵曰脩陵后父曄贈金紫光祿大夫后酷妬忌及終化為龍入于後宫通夢於帝或見形光彩照灼帝體將不安龍輒激水騰涌於露井上為殿衣服委積常置銀鹿盧金瓶灌百味以祀之故帝卒不置后武丁貴嬪諱令光譙國人也祖父從官襄陽因居沔北五女村寓於劉惠明廡下貴嬪生於樊城初産有神光之異紫氣滿室故以光為名相者云當大貴少時與鄰女月下紡績諸女並患蚊蚋貴嬪弗之覺也鄉人魏益徳将聘之未及成而武帝鎮樊城嘗登樓以望見漢濱五采如龍下有女子擘絖則貴嬪也又丁氏因人以相者言聞之於帝帝贈以金環納之時年十四貴嬪生而有赤痣在左臂療之不滅又體多疣子至是無何並失所在徳后酷忌遇貴嬪無道使日舂五斛舂每中程若有助者被遇雖嚴益小心祗敬嘗於供養經案側髣髴若見神人心獨異之天監元年五月有司奏為貴人未拜其年八月又奏初貴嬪居顯陽殿及太子定位有司奏曰皇太子副貳宸極率土咸執吏禮既盡禮皇儲則所生不容無敬王侯妃主常得通信問者及六宫三夫人雖與貴嬪同列並應以敬皇太子之禮敬貴嬪宋元嘉中始興武陵國臣並以吏敬敬王所生潘淑妃路淑媛貴嬪於宫臣雖非小君其義不異與宋泰豫朝議百官以吏敬敬帝所生事義政同謂宫僚施敬宜同吏禮詣神虎門奉牋致謁年節稱慶亦同如此且儲妃作配率由盛則以婦踰姑彌乖從序謂貴嬪典章一與太子不異於是貴嬪備典章禮數同乎太子言則稱令貴嬪性仁恕及居宫接馭自下皆得其歡心不好華飾器服無珍麗未嘗為親戚私謁及武帝𢎞佛教貴嬪長進蔬膳受戒日甘露降于殿前方一丈五尺帝所立義皆得其指歸尤精浄名經普通七年十一月庚辰薨移殯於東宫臨雲殿時年四十二詔吏部郎張纉為哀冊文有司奏諡曰穆葬寕陵祔于小廟簡文即位追崇曰太后貴嬪父道遷天監初為歴陽太守廬陵威王之生武帝謂之曰賢女復育一男答曰莫道猪狗子世人以為笑後位兗州刺史宣城太守文宣阮太后諱令嬴㑹稽餘姚人也本姓石初齊始安王遥光納焉遥光敗入東昏宫建康城平為武帝采女在孕夢龍罩其牀天監六年八月生元帝于後宫是日大赦尋拜為脩容賜姓阮氏嘗随元帝出藩大同六年六月薨于江州正寢時年六十七其年十一月歸葬江寧縣通望山諡曰宣元帝即位有司奏追崇為文宣太后還祔小廟承聖二年追贈太后父齊故奉朝請石靈寳散騎常侍左衛将軍封武康縣侯母陳氏武康侯夫人簡文王皇后諱靈賓琅琊臨沂人也祖儉齊太尉南昌文憲公父騫金紫光祿大夫南昌安侯后幼而柔明叔父暕見之曰吾家女師也天監十一年拜晉安王妃生哀太子太器南郡王大連長山公主妙䂮大通三年十月拜皇太子妃太清三年三月薨于永福省時年四十五其年簡文即位追崇為皇后諡曰簡大寳元年九月葬莊陵元帝徐妃諱昭佩東海郯人也祖孝嗣齊太尉枝江文忠公父緄侍中信武将軍妃以天監十六年十二月拜湘東王妃生世子方等益昌公主含貞妃無容質不見禮帝三二年一入房妃以帝眇一目每知帝將至必為半面粧以俟帝見則大怒而出妃性嗜酒多洪醉帝還房必吐衣中與荆州後堂瑶光寺智逺道人私通酷妬忌見無寵之妾便交杯接坐纔覺有娠者即手加刀刃帝左右暨季江有姿容又與淫通季江每嘆曰栢直狗雖老猶能獵蕭溧陽馬雖老猶駿徐娘雖老猶尚多情時有賀徽者美色妃要之於普賢尼寺書白角枕為詩相贈答既而貞惠世子方諸母王氏寵愛未幾而終元帝歸咎於妃及方等死愈見疾太清三年遂逼令自殺妃知不免乃透井死帝以屍還徐氏謂之出妻葬江陵瓦官寺帝制金樓子述其淫行初妃嫁夕車至西州而疾風大起發屋折木無何雪霰交下帷簾皆白及長還之日又大雷震西州廰事兩柱俱碎帝以為不祥後果不終婦道敬夏太后㑹稽人也普通中納于湘東王宫生敬帝承聖元年冬拜晉安王國太妃紹泰元年尊為太后明年冬降為江隂國太妃敬王皇后琅邪臨沂人也承聖元年十一月拜晉安王妃紹泰元年十月拜皇后明年降為江隂王妃父僉自有傳陳武宣章皇后諱要兒吳興烏程人本姓鈕父景明為章氏所養因改姓焉后母蘇嘗遇道士以小龜遺已光采五色曰三年有徴及期后生紫光照室因失龜所在后少聰慧美容儀手爪長五寸色並紅白每有朞功之服則一爪先折武帝先娶同郡錢仲方女早卒後乃聘后后善書計能誦詩及楚辭帝為長城縣公后拜夫人永定元年立為皇后追贈后父梁散騎侍郎景明特進金紫光祿大夫加金章紫綬拜后母蘇安吉縣君二年安吉君卒與后父葬吳興明年追封后父為廣徳縣侯諡曰温武帝崩后與中書舍人蔡景歴定計祕不發喪時衡陽獻王昌未至召文帝及即位尊后為皇太后宫曰慈訓廢帝即位后為太皇太后光大二年后下令黜廢帝為臨海王命宣帝嗣立大建元年復為皇太后二年三月丙申崩于紫極殿時年六十五遺令喪事並從儉約諸饋奠不用牲牢其年四月羣臣上諡曰宣祔葬萬安陵后親屬無在朝者惟本族兄鈕洽官至中散大夫文沈皇后諱妙容吳興武康人也父法深梁安前中錄事參軍后年十嵗餘以梁大同中歸于文帝武帝之討侯景文帝時在吳興及后並被收景平乃獲免武帝踐阼后為臨川王妃文帝即位為皇后追贈后父法深光禄大夫加金章紫綬封建城縣侯諡曰恭追贈后母高為綏安縣君諡曰定廢帝即位尊后為皇太后宫曰安徳時宣帝與僕射到仲舉舍人劉師知等並受遺輔政師知與仲舉恒居禁中參决衆事而宣帝為揚州刺史與左右三百人入居尚書省師知忌宣帝權重矯敕令還東府理州務宣帝将出毛喜止帝曰今若出外便受制於人如曹爽願作富家公不可得也宣帝乃稱疾召師知留與語使毛喜先入言之於后后曰今伯宗年幼政事並委二郎此非我意喜又言於廢帝廢帝曰此自師知等為非朕意也喜出報宣帝帝因囚師知自入見后及帝極陳師知之短仍自草敕請畫以師知付廷尉其夜於獄賜死自是政歸宣帝后憂悶計無所出乃宻賂宦者蔣裕令誘建安人張安國使據郡反冀因此圖帝安國事發被誅時后左右近侍頗知其事后恐連逮黨與並殺之宣帝即位以后為文皇后陳亡入隋大業初自長安歸于江南頃之卒后兄欽襲爵建城侯位尚書左僕射欽素無伎能奉已而已卒諡曰成子觀嗣頗有學識官至御史中丞廢帝王皇后琅邪臨沂人也天嘉元年為皇太子妃廢帝即位立為皇后廢帝為臨海王后廢為妃至徳中薨后生臨海嗣王至澤至澤光大元年為皇太子大建元年襲封臨海嗣王陳亡入長安后父固自有傳宣柳皇后諱敬言河東解縣人也曾祖世隆祖惲父偃並有傳后九嵗幹理家事有若成人侯景之亂后與弟盼往江陵依梁元帝帝以長城公主故待遇甚厚以配宣帝承聖二年后生後主於江陵及魏剋江陵宣帝遷于闗右后與後主俱留穰城天嘉二年與后主還朝后為安成王妃宣弟即位立為皇后后美姿容身長七尺二寸手垂過膝初宣帝居鄉里先娶吳興錢氏及即位拜貴妃甚有寵后傾心下之每尚方供奉物其上者皆推於貴妃而已御其次焉宣帝崩始興王叔陵為亂後主賴后與吳媼救而獲免後主即位尊后為皇太后宫曰洪範是時新失淮南地隋師臨江又國遭大喪後主患創不能聽政其誅叔陵供大行喪事邉境防守及百司衆務雖假後主之敕實皆决之於后後主創愈乃歸政焉后性謙謹未嘗以宗族為請雖衣食亦無所分遺陳亡入長安隋大業十二年薨於東都年八十三葬于洛陽之芒山後主沈皇后諱婺華吳興武康人也父君理自有傳后母即武帝女㑹稽穆公主早亡時后尚幼而毁瘠過甚及服畢每嵗時朔望恒獨坐涕泣哀動左右内外敬異焉大建二年拜為皇太子妃後主即位立為皇后后性端静有識量寡嗜欲聰敏强記渉獵經史工書翰後主在東宫而后父君理卒居憂處别殿哀毁逾禮後主遇后既薄而張貴妃有寵總後宫之政后澹然未嘗有所忌怨而身居儉約衣服無錦繡之飾左右近侍纔百許人唯尋閱圖史及釋典為事嘗遇嵗旱自暴而誦佛經應時雨降無子飬孫姬子𦙍為已子數上書諫争後主将廢之而立張貴妃㑹國亡不果乃與後主俱入長安及後主薨后自為哀辭文甚酸切隋煬帝每廵幸恒令從駕及煬帝被殺后自廣陵過江於毗陵天静寺為尼名觀音貞觀初卒張貴妃名麗華兵家女也父兄以織席為業後主為太子以選入宫時龔貴嬪為良娣貴妃年十嵗為之給使後主見而悅之因得幸遂有娠生太子深後主即位拜為貴妃性聰慧甚被寵遇後主始以始興王叔陵之亂被傷卧于承香殿時諸姬並不得進唯貴妃侍焉而柳太后猶居栢梁殿即皇后之正殿也而沈皇后素無寵于後主不得侍疾别居求賢殿至徳二年乃於光昭殿前起臨春結綺望仙三閣高數十丈並數十間其窗牖壁帶縣楣欄檻之類皆以沉檀香為之又飾以金玉間以珠翠外施珠簾内有寳牀寳帳其服玩之屬瑰麗皆近古未有每微風暫至香聞數里朝日初照光映後庭其下積石為山引水為池植以竒樹雜以花藥後主自居臨春閣張貴妃居結綺閣龔孔二貴嬪居望仙閣並複道交相往來又有王季二美人張薛二淑媛袁昭儀何婕妤江脩容等七人並有寵遞代以游其上以宫人有文學者袁大捨等為女學士後主每引賓客對貴妃等游宴則使諸貴人及女學士與狎客共賦新詩互相贈答采其尤豔麗者以為曲調被以新聲選宫女有容色者以千百數令習而歌之分部迭進持以相樂其曲有玉樹後庭花臨春樂等其略云璧月夜夜满瓊樹朝朝新大抵所歸皆美張貴妃孔貴嬪之容色張貴妃髪長七尺鬒黑如漆其光可鑑特聰慧有神彩進止閑華容色端麗每瞻視眄睞光彩溢目照映左右嘗於閣上靚粧臨于軒檻宫中遥望飄若神仙才辯强記善侯人主顔色薦諸宫女後宫咸徳之競言其善又工厭魅之術假鬼道以惑後主置淫祀於宮中聚諸女巫使之鼓舞時後主怠於政事百司啓奏並因宦者蔡臨兒李善度進請後主倚隱囊置張貴妃於膝上共決之李蔡所不能記者貴妃並為疏條無所遺脫因參訪外事人間有一言一事貴妃必先知白之由是益加寵異冠絶後庭而後宫之家不遵法度有絓於理者但求恩於貴妃貴妃則令李蔡先啓其事而後從容為言之大臣有不從者因而譖之言無不聽於是張孔之權熏灼四方内外宗族多被引用大臣執政亦從風而靡閹宦便佞之徒内外交結轉相引進賄賂公行賞罰無常綱紀瞀亂矣及隋軍剋臺城貴妃與後主俱入井隋軍出之晉王廣命斬之於青溪中論曰飲食男女人之大欲存焉故聖人順于人情而為之度王宫六列士室二等皆随事升降以立節文若夫義篤閫闈政刑邦國古先哲王有以之致化矣夫后妃專夕配以徳升姬嬙並御進非色幸欲使情有覃被愛罔偏流專貞内表妖蠱外息乃可以輔興君徳燮理隂政宋氏因晉之舊典聘納有方俔天作儷必四岳之後自元嘉以降内職稍繁所選止於軍署徴引極乎厮皁非若晉氏采擇濫及冠冕者焉而愛止帷房權無外授戚屬餼賚嵗時不過肴漿斯為美矣及文帝之傾惑潘嫗謀及婦人大明之淪没殷姬並后匹嫡其為喪敗亦已甚矣齊氏孝昭二后並有賢明之訓惜乎早世不得母臨萬國有婦人焉空慕周典禎符顯瑞徒萃徽名高皇受命宫禁貶約衣不文繡色無紅采永巷貧空有同素室武帝嗣位運藉休平夀昌前興鳯華晚構香栢文檉花梁繡柱雕金鏤寳照燭房帷趙瑟吳趨承閑奏曲事由私蓄無損國儲明帝統業矯情儉陋奉已之制曾莫云改東昏喪道侈風大扇哲婦傾城同符殷夏可以垂誡其在斯乎梁武志在約已示存宫掖雖貴嬪之徽華早著誕育元艮唯見崇重無聞正位徐妃無行其殱滅也宜哉陳武撫兹歸運奄開帝業若夫儷天作則燮隆王化則宣太后其懿焉文宣宫壺無聞於喪徳後主嗣業實敗于椒房既曰牝晨亦唯家之索也南史卷十二南史卷十二考證武丁貴嬪傳貴嬪生而有赤痣在左臂痣南本作誌元帝徐妃傳東海郯人也郯梁書作剡又下文蕭溧陽馬雖老猶駿句溧訛漂今改正敬夏太后傳拜晉安王國太妃監本脫太字今从南本增入張貴妃傳共賦新詩互相贈答監本缺贈字今增入南史卷十二考證
