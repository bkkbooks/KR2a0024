body:
  text: 南史卷十四唐李延夀撰列傳第四宋宗室及諸王下文帝諸子孝武諸子孝明諸子文帝十九男元皇后生元凶劭潘淑妃生始興王濬路淑媛生孝武帝吳淑儀生南平穆王鑠髙修儀生廬陵昭王紹殷修華生竟陵王誕曹媫妤生建平宣簡王宏陳修容生東海王禕謝容華生晋熈王昶江修容生武昌王渾沈媫妤生明帝楊羙人生始安王休仁邢羙人生山陽王休祐蔡羙人生海陵王休茂董羙人生鄱陽哀王休業顔羙人生臨慶冲王休倩陳羙人生新野懐王夷父荀羙人生桂陽王休範羅羙人生巴陵哀王休若紹出繼廬陵孝獻王義真元凶劭字休逺文帝長子也帝即位後諒闇中生劭故秘之元嘉三年閏正月方云劭生自前代人君即位後皇后生太子唯殷帝乙踐阼正妃生紂至此又有劭焉始生三日帝往視之簮㡌甚堅無風而墜于劭側上不悦初命之曰劭在文為召刀後患焉改刀為力年六嵗拜為皇太子中庶子二率入直永福省為更築宮制度嚴麗年十二出居東宫納黄門侍郎殷淳女為妃十三加元服好讀史傳尤愛弓馬及長羙鬚眉大眼方口長七尺四寸親覽宫事延賔客意之所欲上必從之東宫置兵與羽林等十七年劭拜京陵大将軍彭城王義康竟陵王誕桂陽侯義融並從二十七年上将北侵劭與蕭思話固諫不從魏太武帝至𤓰歩上登石頭城有憂色劭曰不斬江湛徐湛之無以謝天下上曰北伐自我意不關二人但湛等不異耳由是與江徐不平上時務本業使宫内皆􅅙欲以諷勵天下有女巫嚴道育夫為劫坐沒入奚官劭姊東陽公主應閤婢王鸚鵡白公主道育通靈主乃白上託云善􅅙求召入道育云所奉天神當賜符應時主夕卧見流光相隨状若螢火遂入巾箱化為䨇珠圓青可愛於是主及劭並信惑之始興王濬素佞事劭並多過失慮上知使道育祈請欲令過不上聞歌儛呪詛不捨晝夜道育輒云自上天陳請必不泄露劭等敬事號曰天師後遂為巫蠱刻玉為上形像埋於含章殿前初東陽公主有奴陳天興鸚鵡飬以為子而與之淫通鸚鵡天興及寕州所獻黄門慶國並與巫蠱事劭以天興補隊主東陽主薨鸚鵡應出嫁劭慮言語泄與濬謀之嫁與濬府佐吳興沈懐逺為妾不啓上慮事泄因臨賀公主微言之上後知天興領隊遣閹人奚承祖讓劭曰汝間用隊主副盡是奴邪欲嫁者又嫁何處劭答南第昔屬天興求将吏驅使視形容粗健便兼隊副下人欲嫁者猶未有處時鸚鵡已嫁懐逺矣劭懼書告濬并使報臨賀主上若問嫁處當言未定濬答書曰啓此事多日今始来問當是有感發之者計臨賀故不應飜覆言語自生寒熱也此姥由來挾兩端難可孤保正爾自問臨賀冀得審實也其若見問當作依違答之天興先署佞人府位不審監上當無此簿領可急宜撻之殿下已見王未宜依此具令嚴自躬上啓聞彼人若為不已政可促其餘命或是大慶之漸凡劭濬相與書類如此所言皆為名號謂上為彼人或以為其謂太尉江夏王義恭為佞人東陽主第在西掖門外故云南第王即鸚鵡姓躬上啓聞者令道育上天白天神也鸚鵡既適懐逺慮與天興私通事泄請劭殺之劭宻使人害天興既而慶國謂往來唯有二人天興既死慮将見及乃以白上上驚惋即收鸚鵡家得劭濬手書皆呪詛巫蠱之言得所埋上形像於宫内道育叛亡捕之不得上詰責劭濬劭濬唯陳謝而已道育變服為尼逃匿東宫濬往京口又以自隨或出止人張旿家上謂江夏王義恭曰常見典籍有此謂之傳空言不意親覩劭南面之日非復我及汝事汝鬼子多将來遇此不幸耳先是二十八年彗星起畢昴入太㣲掃帝坐端門滅翼軫二十九年熒惑逆行守氐自十一月霖雨連雪陽光罕曜時道士范材修練形術是嵗自言死期如期而死既殯江夏王疑其仙也使開棺視之首如新刎血流于背上聞而惡焉三十年正月大風飛霰且雷上憂有竊發輒加劭兵東宫實甲萬人其年二月濬自京口入朝當鎮江陵復載道育還東宫欲将西上有告上云京口人張旿家有一尼服食出入征北内似是嚴道育上使掩得二婢云道育隨征北還都上惆悵惋駭湏檢覆廢劭賜濬死初濬母卒命潘淑妃養以為子淑妃愛濬濬心不附妃被寵上以謀告之妃以告濬濬報劭因有異謀每夜饗将士或親自行酒宻與腹心隊主陳叔児齋帥張超之任建之謀之其月二十一日夜詐作上詔云魯秀謀反汝可平明率衆入因使超之等集素所飬士二千餘人皆被甲云有所討宿召前中庶子右軍長史蕭斌及左衛率袁淑中舎人殷仲素左積弩将軍王正見並入告以大事自起拜斌等因流涕並驚愕明旦劭以朱服加戎服上乘畫輪車與蕭斌同載衛從如常入朝儀從萬春門入舊制東宫隊不得入城劭語門衛云受詔有所收討令後速來張超之等数十人馳入雲龍東中華門及齋閤拔刄徑上合殿上其夜與尚書僕射徐湛之屏人語至旦燭猶未滅門階戸席並無侍衛上以几自鄣超之行弑上五指俱落并殺湛之劭進至合殿中閤文帝已崩出坐東堂蕭斌執刀侍直呼中書舎人顧瑕瑕懼不時出及至問曰欲共見廢何不早啓未及答斬之遣人於崇禮闥殺吏部尚書江湛文帝左細仗主卜天與攻劭於東堂見殺又使人入殺潘淑妃剖其心觀其邪正使者阿㫖答曰心邪劭曰邪佞之心故宜邪也又殺文帝親信左右数十人急召始興王濬率衆屯中堂劭即偽位百僚至者裁数十人乃為書曰徐湛之弑逆吾勒兵入殿已無所及今罪人斯得元凶剋殄可大赦改元為太初素與道育所定也蕭斌曰舊踰年改元劭以問侍中王僧綽僧綽曰晋惠帝即位便改年劭喜而從之初使蕭斌作詔斌辭以不文乃使王僧綽始文帝未崩前一日甲夜太史奏東方有急兵其禍不測宜列萬人兵於太極前殿可以銷災上不從及劭弑逆聞而歎曰㡬誤我事乃問太史令曰我得㡬年對曰得十年退而語人曰十旬耳劭聞而怒毆殺之即位訖便稱疾還入永福省然後遷大行皇帝升太極殿以蕭斌為尚書僕射何尚之為司空大行大斂劭辭疾不敢出先給諸處兵仗悉收還武庫遣人謂魯秀曰徐湛之常欲相危我已為卿除之使秀與屯騎校尉龎秀之對掌軍隊以侍中王僧逹為吏部尚書司徒左長史何偃為侍中成服日劭登殿臨靈號慟不自持博訪公卿詢求政道遣使分行四方分浙江以東五郡為㑹州省揚州立司𨽻校尉以殷沖補之以大将軍江夏王義恭為太保司徒南譙王義宣為太尉荆州刺史始興王濬進號驃騎将軍王僧綽以先豫廢立見誅長沙王瑾弟楷臨川王􅈌桂陽侯覬新渝侯玠並以宿恨死禮官希㫖諡文帝不敢盡羙稱諡曰中宗景皇帝及聞南譙王義宣隨玊誕等起義師悉聚諸王於城内移江夏王義恭住尚書下舎分義恭諸子住侍中下省四月立妻殷為皇后孝武檄至劭自謂素習武事謂朝士曰卿等助我理文書勿厝意戎陣若有冦難吾當自出唯恐賊虜不敢動耳中外戒嚴防孝武世子於侍中省南譙王義宣諸子於太倉空屋劭使濬與孝武書言上親御六師太保又執鉞臨統吾與烏羊相尋即道上聖恩每厚法師令在殿内住想弟欲知消息故及烏羊者南平王鑠法師孝武世子小名也劭欲殺三鎮士庶家口江夏王義恭何尚之説曰凡舉大事不顧家口且多是驅逼今忽誅其餘累政足堅彼意耳劭乃下書一無所問濬及蕭斌勸劭勒水軍自上決戰江夏王義恭慮義兵倉卒船舫陋小不宜水戰乃進策以為宜以近待之逺出則京師空弱東軍乘虛容能為患不如飬鋭待期劭善其議蕭斌厲色曰南中即二十年少業能建如此大事豈復可量劭不納疑朝廷舊臣不為之用厚撫王羅漢魯秀悉以兵事委之多賜珍玩羙色以悦其志羅漢先為南平王鑠右軍参軍劭以其有将用故以心膂委焉或勸劭保石頭城者劭曰昔人所以固石頭俟諸侯勤王耳我若守此誰當見救唯應力戰决之日日自出行軍慰勞将士使有司奏立子偉之為皇太子及義軍至新亭劭登朱雀門躬自督戰将士懐劭重賞皆為之力戰将剋而魯秀打退鼓軍乃止為栁元景等所乘故大敗禇湛之擕二子與檀和之同歸順劭懼走還䑓城其夜魯秀又南奔二十五日江夏王義恭單馬南奔劭遣濬殺義恭諸子以輦迎蒋侯神像於宫内乞恩拜為大司馬封鍾山郡王蘇侯為驃騎将軍使南平王鑠為祝文罪状孝武二十七日臨軒拜子偉之為皇太子百官皆戎服劭獨衮衣下書大赦唯孝武劉義恭義宣誕不在原例五月三日魯秀等攻大航鉤得一舶王羅漢昏酣作妓聞官軍已度驚放仗歸降是夜劭閉守六門於門内鑿壍立柵以露車為楼城内沸亂将吏並踰城出奔劭使詹叔児燒輦及衮冕服蕭斌聞大航不守皇窘不知所為宣令所統皆使觧甲尋戴白幡來降即於軍門伏誅四日劭腹心白直諸同逆先屯閶闔門外並走還入殿程天祚與薛安都副譚金因而乘之即得俱入臧質從廣莫門入同㑹太極殿前即斬太子左衛率王正見建平東海等七王並號哭俱出劭穿西垣入武庫井中副隊髙禽執之濬率左右数十人與南平王鑠於西明門出俱南奔於越城遇江夏王義恭濬下馬曰南中即今何在義恭曰已君臨萬國又稱字曰虎頭來得無晚乎義恭曰恨晚又曰故當不死義恭曰可詣行闕請罪又曰未審猶能得一職自効不義恭又曰此未可量勒與俱自歸命於馬上斬首濬字休明将産之夕有鵬鳴於屋上聞者莫不惡之元嘉十三年八嵗封始興王濬少好文籍資質端妍母潘淑妃有盛寵時六宫無主潘專總内政濬人才既羙母又至愛文帝甚所留心與建平王宏侍中王僧綽中書郎蔡興宗等並以文義往復初元皇后性忌以潘氏見幸恚恨致崩故劭深病潘氏及濬濬慮将來受祸乃曲意事劭劭與之遂善多有過失屡為上所讓憂懼乃與劭共為巫蠱後出鎮京口乃因員外散騎侍郎徐爰求鎮江陵又求助於尚書僕射徐湛之而尚書令何尚之等咸謂濬太子次弟不應逺出上以上流之重宜有至親故以濬為衞将軍開府儀同三司荆州刺史加都督領䕶南蠻校尉濬入朝遣還京口為行留處分至京口数日而巫蠱事發時二十九年七月也上惋歎彌日謂潘淑妃曰太子圖富貴更是一理虎頭復如此非復思慮所及汝母子豈可一日無我邪明年荆州事方行二月濬還朝十四日臨軒受拜其日藏嚴道育事發明旦濬入謝上容色非常其夕即加詰問濬唯謝罪潘淑妃抱濬泣曰汝始呪詛事發猶冀克已思愆何意忽藏嚴道育今日用活何為可送藥来吾當先自取盡不忍見汝祸敗濬奮衣去曰天下事尋自判必不上累劭入弑之旦濬在西州府舎人朱法瑜曰䑓内叫喚宫門皆閉道上傳太子反未測禍變所至濬陽驚曰今當奈何濬未得劭信不知事之濟不騷擾不知所為将軍王慶曰今宫内有變未知主上安危預在臣子當投袂赴難濬不聽俄而劭遣張超之馳馬召濬濬問状訖即戎服乘馬而去朱法瑜固止濬濬不從至中門王慶又諌不宜從逆濬曰皇太子令敢有復言者斬及入見劭勸殺荀赤松等劭謂濬曰潘淑妃遂為亂兵所害濬曰此是下情由來所願其悖逆如此劭将敗勸劭入海輦珍寳繒帛下船及劭入井髙禽於井出之劭問天子何在禽曰至尊近在新亭将劭至殿前臧質見之慟哭劭曰天地所不覆載丈人何為見哭質因辯其逆状答曰先朝當見枉廢不能作獄中囚問計於蕭斌斌見勸如此又語質曰可得為乞逺徙不質曰主上近在航南自當有處分縛劭馬上防送軍門及至牙下據鞌顧望太尉江夏王義恭與諸王共臨視之義恭曰我背逆歸順有何大罪頓殺十二児劭曰殺諸弟此一事負阿父江湛妻庾氏乘車罵之龎秀之亦加誚讓劭厲聲曰汝軰復何煩爾先殺其四子語南平王鑠曰此何有哉乃斬于牙下臨刑歎曰不圖宋室一至如此劭濬及其子並梟首大航暴尸於市劭妻殷氏賜死於廷尉臨刑謂獄丞江恪曰汝家骨肉相殘何以枉殺天下無罪人恪曰受拜皇后非罪而何殷氏曰此權時耳當以鸚鵡為后也濬妻禇氏丹陽尹湛之之女湛之南奔之始即見離絶故免於誅其餘子女妾媵並於獄賜死投劭濬尸首於江其餘同逆及王羅漢等皆伏誅張超之聞兵入遂至合殿故基止於御床之所為亂兵所殺剖腹刳心臠割其肉諸将生噉之焚其頭骨時不見傳國璽問劭云在嚴道育處就取得之道育鸚鵡並都街鞭殺於石頭四望山焚其尸揚灰于江毁劭東宫所住齋汙瀦其處封髙禽新陽縣男追贈潘淑妃為長寕國夫人置守冢偽司𨽻校尉殷沖丹陽尹尹𢎞並賜死沖為劭草立符文又妃叔父𢎞為劭簡配兵士盡其心力故也南平穆王鑠字休𤣥文帝第四子也元嘉十六年年九嵗封南平王少好學有文才未弱冠擬古三十餘首時人以為亞迹陸機二十二年為南豫州刺史加都督時文帝方事外略罷南豫州併夀陽以鑠為豫州刺史領安蠻校尉二十六年魏太武圍汝南懸瓠城行汝南太守陳憲保城自固魏作髙楼施弩射城内城内負戸以汲又毁佛圖取金像以為大鈎施之衝車端以牽楼堞城内有一沙門頗有機思輒設竒以應之魏人以蝦蟇車填壍肉薄攻城死者與城等遂登屍以陵城憲鋭􅂔愈奮戰士無不一當百殺傷萬計汝水為之不流相拒四十餘日鑠遣安蠻司馬劉康祖與寕朔将軍臧質救之魏人燒攻具而退元凶弑立以鑠為侍中録尚書事劭迎蒋侯神於宫内疏孝武年諱厭呪祈請假授位號使鑠造策文及義軍入宫鑠與濬俱歸孝武濬即伏法上迎鑠入宫當時倉卒失國璽事寕更鑄給之進侍中司空領兵置佐以國哀未闋讓侍中鑠既歸義最晚常懐憂懼每於眠中蹶起坐與人語亦多謬僻語家人云我自覺無復魂守鑠為人負才狡競每與兄弟計度藝能與帝又不能和食中遇毒尋薨贈司徒加以楚穆之諡三子敬猷敬深敬先敬深封南安縣侯敬先繼廬陵王紹前廢帝景和末召鑠妃江氏入宫命左右於前逼之江氏不受命謂曰若不從當殺汝三子江氏猶不從於是遣使於第殺敬猷敬深敬先等鞭江氏一百其夕廢帝亦殞明帝即位追贈敬猷侍中諡曰懐改封孝武帝第十八子臨賀王子産字孝仁為南平王繼鑠後未拜被殺泰始五年立晋平王休祐第七子宣曜為南平王繼鑠休祐死宣曜被廢還本後廢帝元徽元年立衡陽恭王嶷第二子伯玉為南平王繼鑠後昇明三年被誅竟陵王誕字休文文帝第六子也元嘉二十年年十一封廣陵王二十六年為雍州刺史加都督以廣陵凋弊改封隨郡王上欲大舉侵魏以襄陽外接闗河欲廣其資力乃罷江州軍府文武悉配雍州湘州入䑓租税雜物悉給襄陽及大舉北侵命諸蕃並出師皆奔敗唯誕遣中兵参軍栁元景剋𢎞農闗陜元凶立以揚州浙江西屬司𨽻校尉浙江東五郡立㑹州以誕為刺史孝武入討遣寕朔将軍顧彬之受誕節度誕遣参軍劉季之舉兵與彬之并遇劭将華欽庾遵於曲阿之奔牛塘大敗之事平以誕為荆州刺史加都督衛将軍開府儀同三司誕以位號正與濬同惡之請求回改乃進號驃騎将軍加班劔二十人南譙王義宣不肯就徴以誕為侍中驃騎大将軍揚州刺史開府如故改封竟陵王誕性恭和得士庶之心頗有勇略明年義宣反有荆江兖豫四州之力勢震天下上即位日淺朝野大懼上欲奉乘輿法物以迎義宣誕固執不可曰奈何持此座與人帝加誕節仗士五十人出入六門上流平定誕之力也誕初討元凶豫同舉兵有奔牛之㨗至是又有殊勲上性多猜頗相疑憚而誕造立第舎窮極工巧園池之羙冠於一時多聚材力之士實之第内精甲利器莫非上品上意愈不平孝建二年以司空太子太傅出為都督南徐州刺史上以京口去都宻邇猶疑之大明元年秋又出為南兖州刺史加都督誕知見猜亦潜為之備至廣陵因魏侵邉修城隍聚糧練甲嫌隙既著道路常云誕反三年建康人陳文詔訴父饒為誕府史恒使入山圖畫道路不聽歸家誕大怒使人殺饒吳郡人劉成又訴稱息道龍伏事誕見誕在石頭城内修乘輿法物習唱警蹕向伴侣言之誕知宻捕殺道龍豫章人陳談之又上書稱弟詠之在誕左右見誕與左右荘慶傅元禮等潜圖姦逆常疏陛下年紀姓諱往巫鄭師憐家呪詛詠之與建康右尉黄逹往來誕疑其宣漏誣以罪被殺其年四月上使有司奏誕罪惡宜絶屬籍削爵土收付法獄上不許有司又固請乃貶爵為侯遣令之國上将謀誕以義興太守桓閬為兖州刺史配以羽林禁兵遣給事中戴明寳隨閬襲誕使閬以之鎮為名閬至廣陵誕未悟也明寳夜報誕典籖蒋成使為内應成以告府舎人許宗之宗之告誕誕驚起召録事参軍王璵之曰我何罪於天以至此斬蒋成勒兵自衛遣腹心率壮士擊明寳等破之閬即遇害明寳逃自海陵界還上遣車騎大将軍沈慶之討誕誕奉表投之城外自申於國無負并言帝宫闈之醜孝武忿誕深切凡誕左右腹心同籍朞親並誅之死者千数車駕出頓宣武堂内外纂嚴誕見衆軍大集欲棄城北走行十餘里衆並不欲去請誕乃還城五月十九日夜有流星長十餘丈從西北來墜城内是謂天狗占曰天狗所墜下有伏屍流血廣陵城舊不開南門云開南門者不利其主誕乃開焉彭城邵領宗在城内隂結死士欲襲誕先欲布誠於慶之乃説誕求為間構見許領宗既出致誠畢復還城内事泄誕鞭二百考問不伏遂支觧之上遣送章二紐其一曰竟陵縣開國侯食邑千戸募賞禽誕其二曰建興縣開國男食邑三百戸募賞先登若剋外城舉一烽剋内城舉二烽禽誕舉三烽七月二日慶之進軍剋其外城乘勝又剋小城誕聞軍入走趣後園墜水引出殺之傳首建業因葬廣陵貶姓留氏帝命城中無大小悉斬慶之執諫自五尺以下全之於是同黨悉伏誅城内女口為軍賞男丁殺為京觀死者尚数千人每風晨雨夜有號哭之聲誕母殷妻徐並自殺追贈殷長寕國淑妃初誕為南徐州刺史在京口夜大風飛落屋瓦城門鹿牀倒覆誕心惡之及遷鎮廣陵将入城衝風暴起揚塵晝晦又嘗中夜閑坐有赤光照室見者莫不駭愕誕左右侍直眠中夢人告之曰官湏髪為矟毦既覺已失髻矣如此者数十人誕甚怪懼大明二年發人築廣陵城誕循行有人干輿揚聲大罵曰大兵尋至何以辛苦百姓誕使執之問其本末答曰姓夷名孫家在海陵天公與道佛先議欲燒除此間人道佛苦諫强得至今大禍将至何不立六慎門誕問六慎門云何答曰古有言禍不過六慎門誕以其言狂悖殺之又五音士忽狂易見鬼驚怖啼哭曰外軍圍城城上張白布㠶誕執録二十餘日乃殺城䧟之日雲霧晦㝠白虹臨北門亘屬城内八年前廢帝即位義陽王昶為徐州刺史道經廣陵至墓盡哀表請改葬誕詔葬誕及妻子並以庶人禮明帝泰始四年又改葬祭以少牢王璵之琅邪人有才局其五子悉在建業璵之嘗乘城慶之縛其五子示而招之許以富貴璵之曰吾受主王厚恩不可以二心三十之年未獲死所耳安可以私親誘之五子號叫於外呼其父及城平慶之悉撲殺之建平宣簡王宏字休度文帝第七子也早䘮母元嘉二十一年年十一封建平王宏少而閑素篤好文籍文帝寵愛殊常為立第於雞籠山盡山水之羙建平國職髙他國一階歴位中䕶軍中書令元凶弑立孝武入討劭録宏殿内自拔莫由孝武先嘗以一手板與宏宏遣左右親信周法道齎手板詣孝武事平以為尚書左僕射使迎太后還加中軍将軍中書監為人謙儉周慎禮賢接士明逹政事上甚信仗之轉尚書令宏少多病求觧尚書令本號開府儀同三司未拜薨追贈司徒上痛悼甚至每朔望出臨靈自為墓誌銘并誄五年益諸弟國各千戸薨者不在其例唯宏追益子景素嗣景素少有父風位南徐州刺史加都督桂陽王休範為逆景素雖纂集兵衆以赴朝廷為名而隂懐兩端及事平進號鎮北将軍景素好文章書籍招集才義之士以收名譽由是朝野屬意而後廢帝狂凶失道内外皆謂景素宜當神器唯廢帝所生陳氏親戚疾忌之而楊運長阮佃夫並明帝舊𨽻貪㓜主以乆其權慮景素立不見容於長主深相忌憚元徽三年景素防閤将軍王季符恨景素因奔告之運長等便欲遣軍討之齊髙帝及衛将軍袁粲以下並保持之景素亦馳遣世子延齡還都具自申理運長等乃徙季符於梁州又奪景素征北将軍開府儀同三司自是廢帝狂悖日甚朝野並屬心景素陳氏及運長等彌相猜疑景素因此稍為自防之計多以金帛結材力之士時大臣誅夷孝武諸子孫或殺或廢無復在朝者且景素在藩甚得人心而謗聲日積深懐憂懼嘗與故吏劉璡獨處曲䑓有鵲集於承塵上飛鳴相追景素泫然曰若斯鳥者遊則参于風煙之上止則隐于林木之下飢則啄渴則飲形體無累于物得失不闗于心一何樂哉時廢帝單馬獨出游走郊野輔國将軍曹欣之等謀候廢帝出行因聚衆作難事剋奉景素景素每禁之未欲怱怱舉動運長宻遣傖人周天賜偽投景素勸為異計景素知即斬之送首還䑓四年七月羽林監桓祗祖奔景素言䑓城已潰景素信之即舉兵運長等常疑景素有異志即纂嚴景素本乏威略不知所為竟為䑓軍破斬之即葬京口景素性甚仁孝事獻太妃朝夕不違侍飬太妃有不安景素傍行蓬髪與人言呴呴常恐傷其情又甚儉素為荆州時州有髙齋刻楹栢構景素竟不處朝廷欲賜以甲第辭而不當兩宫所遺珍玩塵於笥篋食常不過一肉器用瓦素時有獻鏤玉器景素顧主簿何昌㝢曰我持此安所用哉乃謝而反之及敗後昌㝢與故記室王摛等上書訴其寃齊受禪景素故秀才劉璡又上書述其徳羙陳寃並不見省至齊武帝即位下詔曰宋建平王劉景素名父之子雖末路失圖而原心有木可聽以禮葬舊塋廬陵王禕字休秀文帝第八子也元嘉二十二年年十一封東海王大明七年進位司空明帝踐阼進太尉封廬陵王初廢帝目禕似驢上以廢帝之言類故改封焉文帝諸子禕尤凡劣諸兄弟並蚩鄙之南平王鑠薨子敬深婚禕視之白孝武借伎孝武答曰婚禮既不舉樂且敬深孤苦伎非宜也至是明帝與建安王休仁詔曰人既不比数西方公汝便為諸王之長時禕住西故謂之西方公泰始五年河東栁欣慰謀反欲立禕禕與相酬和欣慰結征北諮議參軍杜㓜文㓜文具奏其事上暴其罪惡黜為南豫州刺史車騎将軍開府儀同三司上遣腹心楊運長領兵防衛明年又令有司奏禕怨懟逼令自殺葬宣城晋熈王昶字休道文帝第九子也元嘉二十二年年十嵗封義陽王大明中位中書令中軍将軍開府儀同三司廢帝即位為徐州刺史加都督昶輕訬褊急不能事孝武大明中常被嫌責人間常言昶當有異志廢帝既誅羣公彌縱狂惑常語左右曰我即大位來遂未戒嚴使人邑邑江夏王義恭誅後昶表求入朝遣典籖蘧法生銜使帝謂法生義陽與太宰謀反我政欲討之今知求還甚善又問法生義陽謀反何不啟法生懼走還彭城帝因此北封法生至昶即起兵統内諸郡並不受命昶知事不㨗乃夜開門奔魏棄母妻唯携妾一人作丈夫服騎馬自隨在道慷慨為斷句曰白雲滿鄣來黄塵半天起闗山四面絶故鄕㡬千里因把姬手南望慟哭左右莫不哀哽每節悲慟遥拜其母昶家還都二妾各生一子明帝即位名長者曰思逺小者曰懐逺尋並卒帝以金千兩贖昶于魏不獲乃以第六皇子燮字仲綏繼昶封為晋熈王明帝既以燮繼昶乃詔曰晋熈國太妃謝氏沉刻無親物理罕比骨肉至親尚相棄蔑况以義合免苦為難可還其本家削絶藩秩先是改謝氏為射氏元徽元年燮年四嵗以為郢州刺史明年復昶所生謝氏為晋熈國太妃齊受禪燮降封安隂縣公謀反賜死武昌王渾字休深文帝第十子也元嘉二十四年年九嵗封汝隂王後徙武昌渾少而凶戾嘗忿左右拔防身刀斫之元凶弑立以為中書令山陵夕裸身露頭往散騎省戲因彎弓射通直郎周朗中枕以為笑樂孝建元年為雍州刺史監雍梁南北秦四州荆州之竟陵隨二郡諸軍事寕蠻校尉至鎮與左右人作文檄自稱楚王號年為元光備置百官以為戲笑長史王翼之得其手迹封呈孝武上使有司奏免為庶人下太常絶屬籍使付始安郡逼令自殺即葬襄陽大明四年聽還葬母江太妃墓次明帝即位追封義昌縣侯建安王休仁文帝第十二子也元嘉二十九年年十嵗立為建安王前廢帝景和元年累遷䕶軍将軍時帝狂悖無道誅害羣公忌憚諸父並聚之殿内毆捶陵曵無復人理休仁及明帝山陽王休祐形體並肥壮帝乃以籠盛稱之以明帝尤肥號為豬王號休仁為殺王休祐為賊王以三王年長尤所畏憚故常録以自近不離左右東海王禕凡劣號之驢王桂陽王休範巴陵王休若年少故並得從容嘗以木槽盛飯内諸雜食攪令和合掘地為阬穽實之以泥水祼明帝内坑中以槽食置前令以口就槽中食之用為歡笑欲害明帝及休仁休祐前後以十数休仁多計数每以笑調佞諛詶悦之故得推遷常於休仁前使左右淫逼休仁所生楊太妃左右並不得已順命至右衛将軍劉道隆道隆歡以奉㫖盡諸醜状時廷尉劉蒙妾孕臨月帝迎入後宫冀其生男欲立為太子明帝嘗忤旨帝怒乃祼之縛其手脚以杖貫手脚内使擔付太官即日屠豬休仁笑謂帝曰未應死帝問其故休仁曰待皇太子生殺豬取肝肺帝意觧曰且付廷尉一宿出之帝将南游荆湘二州明旦欲殺諸父便發其夕被弑於華林園休仁即日便執臣禮於明帝時南平王敬猷廬陵王敬先兄弟被害猶朱殯歛休仁休祐同載臨之開帷歡笑鼓吹往反時人咸非焉明帝以休仁為侍中司徒尚書令揚州刺史給三望車時劉道隆為䕶軍休仁求觧職曰臣不得與此人同朝上乃賜道隆死尋諸方逆命休仁都督征討諸軍事増班劔為三十人出據獸檻進赭圻尋領太子太傅總統諸軍中流平定休仁之力也明帝初與蘇侯神結為兄弟以祈福助及事平與休仁書曰此叚殊得蘇兄神力休仁年與明帝相亞俱好文籍素相愛及廢帝世同經艱危明帝又資其權譎之力泰始初四方逆命休仁親當矢石大勲克建任總百揆親寄甚隆四方輻湊上甚不悦休仁悟其㫖表觧揚州見許進位太尉領司徒固讓又加漆輪車劔履升殿受漆輪固辭劔履明帝末年多忌休仁轉不自安及殺晋平王休祐其年上疾篤與楊運長為身後計運長等又慮帝晏駕後休仁一旦居周公之地其軰不得執權彌贊成上使害諸王及上疾暴甚内外皆屬意休仁主書以下皆往東府詣休仁所親信豫自結納其或直不得出者皆懼上與運長等定謀召休仁入宿尚書下省其夜遣人齎藥賜休仁死休仁對使者罵曰上有天下誰之功也孝武以誅子孫而至于滅今復遵覆車枉殺兄弟奈何忠臣抱此寃濫我大宋之業其能乆乎上疾乆慮人情同異自力乘輿出端門休仁死後乃入詔稱其自殺宥其二子并全封爵有司奏請降休仁為庶人絶屬籍児息悉徙逺郡詔休仁特降為始安縣王并停子伯融等流徙聽襲封爵及帝疾甚見休仁為祟叫曰司徒小寛我尋崩伯融妃殷氏所生殷氏吳興太守沖女也范陽祖飜有醫術姿貌又羙殷氏有疾飜入視脉悦之遂與姦事泄遣還家賜死晋平刺王休祐文帝第十三子也孝建二年年十一封山陽王明帝即位以山陽荒弊改封晋平王位驃騎大将軍開府儀同三司荆州刺史休祐素無才能强梁自用大明之世未得自專至是貪淫好財色在荆州多營財貨以短錢一百賦人田登就求白米一斛米粒皆令徹白若碎折者悉不受人間糴此米一斗一百至時又不受米評米責錢凡諸求利皆如此百姓嗷然不復堪命徴為南徐州刺史加都督上以休祐貪虐不可莅人留之都下遣上佐行府州事休祐佷戾前後忤上非一在荆州時左右范景逹善彈碁上召之休祐留不遣上怒詰責之且慮休祐将來難制欲方便除之七年二月車駕於巖山射雉有一雉不肯入場日暮将反留休祐射之令不得雉勿歸休祐時從在黄麾内左右從者並在部伍後休祐便馳去上遣左右数人隨之上既還前驅清道休祐人從悉散不復相得上遣夀寂之等諸壮士追之日已欲闇與休祐相及蹴令墜馬休祐素勇壮有􅂔力奮拳左右排擊莫得近有一人自後引隂因頓地即共拉殺之遣人馳白上行唱驃騎落馬上聞驚曰驃騎體大落馬殊不易即遣御醫上藥相係至頃之休祐左右人至乆已絶矣輿以還第贈司空時巴陵王休若在江陵其日即馳信報休若曰吾與驃騎南山射雉驃騎馬驚與直閣夏文秀馬相蹋文秀墮地驃騎失控馬重驚觸松樹墜地落硎中時頓悶故馳報弟其年五月追免休祐為庶人十三子並徙晋平明帝尋病見休祐為祟使使至晋平撫其諸子帝尋崩廢帝元徽元年聽諸子還都順帝昇明三年稱謀反並賜死海陵王休茂文帝第十四子也孝建二年年十一封海陵王大明二年為雍州刺史加都督北中即将寕蠻校尉時司馬庾深之行府州事休茂性急欲自專深之及主帥每禁之常懐忿因左右張伯超至所親愛多罪過主帥常加訶責伯超懼罪謂休茂曰主帥宻疏官罪欲以啓聞休茂曰今為何計伯超曰唯殺行事及主帥舉兵自衛縱不成不失入虜中為王休茂從之夜使伯超等殺司馬庾深之集兵建牙馳檄休茂出城行營諮議参軍沈暢之等閉門拒之城䧟斬暢之其日参軍尹𤣥度起兵攻休茂禽之斬首母妻皆自殺同黨悉伏誅有司奏絶休茂屬籍貶姓為留不許即葬襄陽鄱陽哀王休業文帝第十五子也孝建二年年十一封鄱陽王三年薨以山陽王休祐次子士𢎞嗣被廢國除臨慶沖王休倩文帝第十六子也孝建元年年九嵗疾篤封東平王未拜薨大明七年立第二十七皇子子嗣為東平王紹休倩泰始三年還本遂絶六年以第五皇子智井為東平王繼休倩未拜薨其年追改休倩為臨慶王休倩為文帝所愛故前後屡加紹嗣新野懐王夷父文帝第十七子也元嘉二十九年薨明帝泰始五年追加封諡桂陽王休範文帝第十八子也孝建三年年九嵗封順陽王大明元年改封桂陽泰始六年累遷驃騎大将軍江州刺史加都督遺詔進位司空侍中加班劔三十人休範素凡訥少知觧不為諸兄齒遇明帝常指左右人謂王景文曰休範人才不及此以我故生便富貴釋氏願生王家良有以也及明帝晚年晋平王休祐以狠戾致禍建安王休仁以權逼不容巴陵王休若素得人情以此見害唯休範謹澁無才不為物情所向故得自保而常憂懼及明帝晏駕主㓜時艱休範自謂宗戚莫二應居宰輔事既不至怨憤彌結招引勇士繕修器械行人經過尋陽者莫不降意折節於是至者如歸朝廷知之宻相防禦母荀太妃薨即葬廬山以示不還之志時夏口闕鎮朝議以居尋陽上流欲樹置腹心重其兵力元徽元年乃以第五皇弟晋熈王燮為郢州刺史長史王奐行府州事配以實力出鎮夏口慮為休範所撥留自太子洑去不過尋陽休範怒欲舉兵乃上表修城堞其年進位太尉明年五月遂反發自尋陽晝夜取道大雷戍主杜道欣馳下告變道欣至一宿休範已至新林朝廷震動齊髙帝出次新亭壘時事起倉卒朝廷兵力甚弱及開武庫隨将士意取休範於新林歩上攻新亭壘屯騎校尉黄回乃偽往降并宣齊髙帝意休範大悦置之左右休範壮士李恒鍾爽進諫不宜親之休範曰不欺人以信時休範日飲醇酒以二子徳宣徳嗣付與齊髙帝為質至即斬之回與越騎校尉張茍児直前斬休範首持還左右並散初休範自新林分遣同黨杜墨蠡丁文豪等直向朱雀門休範雖死墨蠡等不知王道隆率羽林兵在朱雀門内聞賊至急召劉勔勔自石頭來赴戰死之墨蠡等乘勝直入朱雀門道隆為亂兵所殺墨蠡等唱云太尉至休範之死也齊髙帝遣隊主陳靈寳齎首還䑓逢賊埋首道側挺身得逹雖唱云已平而無以為據衆愈疑惑墨蠡徑至杜母宅宫省恇擾無復固志撫軍長史褚澄以東府納賊賊擁安成王據東府稱休範教曰安成王吾子也勿得侵賊勢方逼衆莫能振尋而丁文豪之衆知休範已死稍欲退散文豪勇氣殊壮厲聲曰我獨不能定天下邪休範首至又羽林監陳顯逹率所領於杜母宅破墨蠡等諸賊一時奔散斬墨蠡文豪等晋熈王燮自夏口遣軍平尋陽巴陵哀王休若文帝第十九子也孝建三年年九嵗封巴陵王明帝即位出為㑹稽太守加都督二年遷都督雍州刺史寕蠻校尉前在㑹稽録事参軍陳郡謝沉以諂側事休若多受財賂時内外戒嚴並袴褶沉居母䘮被起聲樂酣飲不異吉人衣冠既無殊異並不知沉居䘮沉嘗自稱孤子衆乃駭愕休若坐與沉褻黷降號鎮西将軍典籖夏寳期事休若無禮啓明帝殺之慮不許啓未報於獄行刑信反令鎖送而寳期已死上怒勅之曰孝建之世汝何敢爾使其母羅加杖三百四年改行湘州刺史六年為荆州刺史加都督征西大将軍開府儀同三司七年晋平王休祐被殺建安王休仁見疑都下訛言休若有至貴之表明帝以此言報之休若甚憂嘗衆賓滿坐有一異鳥集席隅哀鳴墜地死又聽事上有二大白蛇長丈餘唅唅有聲休若甚惡之㑹被徴為南徐州刺史加都督征北大将軍開府如故休若腹心将佐咸謂還朝必有大祸中兵参軍京兆王敬先勸割據荆楚休若執録馳使白明帝敬先坐誅休若至京口上以休若善能諧緝物情慮将來傾㓜主欲遣使殺之慮不奉詔徴入朝又恐猜駭乃偽授為江州刺史至即於第賜死贈侍中司空子沖始襲封孝武帝二十八男文穆皇后生廢帝子業豫章王子尚陳淑媛生晋安王子勛阮容華生安陸王子綏徐昭容生皇子子深何淑儀生松滋侯子房史昭華生臨海王子頊殷貴妃生始平孝敬王子鸞次永嘉王子仁與皇子子深同生何媫妤生皇子子鳳謝昭容生始安王子真江媫妤生皇子子𤣥史昭儀生邵陵王子元次齊敬王子羽與始平孝敬王子鸞同生江羙人生皇子子衡楊媫妤生淮南王子孟次皇子子况與皇子子𤣥同生次南平王子産與永嘉王子仁同生次晋陵孝王子雲次皇子子文並與始平孝敬王子鸞同生次廬陵王子輿與淮南王子孟同生次南海哀王子師與始平孝敬王子鸞同生次淮陽思王子霄與皇子子𤣥同生次皇子子雍與始安王子真同生次皇子子趨與皇子子鳳同生次皇子子期與皇子子衡同生次東平王子嗣與始安王子真同生張容華生皇子子悦安陸王子綏南平王子産廬陵王子輿並出繼皇子子深子鳳子𤣥子衡子况子文子雍未封早夭子趨子期子悦未封為明帝所殺豫章王子尚字孝師孝武第二子也孝建二年年六嵗封西陽王大明三年分浙江西立王畿以浙江東為揚州以子尚為刺史加都督六年改封豫章王領㑹稽太守七年進號車騎大将軍開府儀同三司時東土大旱鄞縣多疁田孝武使子尚表至鄞縣勸農又立左學召生徒置儒林祭酒一人學生師敬位比州中從事文學祭酒一人比州西曹勸學從事二人比祭酒從事前廢帝即位罷王畿復舊徴子尚都督揚南徐二州諸軍事領尚書令初孝建中孝武以子尚太子母弟甚留心後新安王子鸞以母幸見愛子尚寵衰及長凶慝有廢帝之風明帝既殞廢帝乃稱太皇太后令曰子尚頑凶楚玉淫亂並於第賜盡楚玉廢帝姊山隂公主也廢帝改封㑹稽郡長公主給鼓吹一部加班劒二十人未拜受而廢敗晋安王子勛字孝徳孝武第三子也眼患風不為孝武所愛大明四年年五嵗封晋安王七年為江州刺史加都督八年改授雍州未拜而孝武崩還為江州時廢帝狂凶多所誅害前撫軍諮議叅軍何邁謀因帝出為變迎立子勛事泄帝誅邁使八座奏子勛與邁通謀遣左右朱景送藥賜子勛死景至盆口遣報長史鄧琬琬等奉子勛起兵以廢立為名明帝定亂進子勛車騎将軍開府儀同三司琬等不受命泰始二年正月七日奉子勛為帝即偽位於尋陽年號義嘉備置百官四方響應是嵗四方貢計並詣尋陽及軍敗子勛見殺時年十一即葬尋陽廬山松滋侯子房字孝良孝武第六子也大明四年年五嵗封尋陽王前廢帝景和元年為㑹稽太守加都督明帝即位徵為撫軍領太常長史孔覬不受命舉兵應晋安王子勛上虞令王晏殺覬送子房還建業上宥之貶為松滋縣侯司徒建安王休仁以子房兄弟終為禍難勸上除之廢徙逺郡見殺年十一臨海王子頊字孝烈孝武第七子也初封歴陽王後改封臨海位荆州刺史明帝即位進督雍州長史孔道存不受命應晋安王子勛事敗賜死年十一始平孝敬王子鸞字孝羽孝武第八子也大明四年封襄陽王尋改封新安五年為北中郎将南徐州刺史領南琅邪太守母殷淑儀寵傾後宫子鸞愛冠諸子凡為上眄遇者莫不入于鸞府國為南徐州又割吳郡屬之六年丁母憂前廢帝素疾子鸞有寵及即位既誅羣臣乃遣使賜子鸞死時年十嵗子鸞臨死謂左右曰願後身不復生王家同生弟妹並死明帝即位改封始平王以建平王景素子延年嗣永嘉王子仁字孝龢孝武第九子也大明五年封永嘉王明帝即位以為湘州刺史帝尋從司徒建安王休仁計未拜賜死時年十嵗始安王子真字孝貞孝武第十一子也邵陵王子元字孝善孝武第十三子也並被明帝賜死齊敬王子羽字孝英孝武第十四子也生二嵗而薨追加封諡淮南王子孟字孝光孝武第十六子也初封淮南王明帝改封安成王未拜賜死晋陵孝王子雲字孝舉孝武第十九子也大明六年封未拜而亡南海哀王子師字孝友孝武第二十二子也大明七年封未拜為前廢帝所害明帝即位追諡淮陽思王子霄字孝雲孝武第二十三子也早薨追加封諡東平王子嗣字孝叔孝武帝第二十七子也明帝賜死武陵王贊字仲敷小字智隨明帝第九子也明帝既誅孝武諸子詔以智隨奉孝武為子封武陵郡王順帝昇明二年薨國除明帝十二男陳貴妃生後廢帝謝修儀生皇子法良陳昭華生順帝徐媫妤生第四皇子鄭修容生皇子智井次晋熈王燮與皇子法良同生泉羙人生邵陵殤王友次江夏王躋與第四皇子同生徐良人生武陵王賛杜修華生隨陽王翽次新興王嵩與武陵王賛同生又泉羙人生始建王禧智井燮躋賛並出繼法良未封第四皇子未有名早夭邵陵殤王友字仲賢明帝第七子也年五嵗出為南中即将江州刺史封邵陵王後廢帝元徽二年桂陽王休範誅後王室㣲弱友府州文案及臣吏不諱有無君之心順帝昇明二年徙南豫州刺史薨無子國除隨陽王翽字仲儀明帝第十子也初封南陽王昇明二年改封隨陽齊受禪封舞隂縣公新興王嵩字仲岳明帝第十一子也齊受禪降封定襄縣公始建王禧字仲安明帝第十二子也齊受禪降封荔浦縣公尋並云謀反賜死論云甚矣哉元嘉之遇禍也弑逆之釁事起肌膚因心之童遂亡天性雖鳴鏑之酷未極於斯其不至覆亡亦為幸也明皇統運疑隙内搆尋斧所加先自王戚晋刺以獷暴摧軀巴哀由和良酖體保身之路未知攸適昔之戒子慎勿為善詳求其㫖将逺有以乎詩云不自我先不自我後盖古人之畏亂也孝武諸子提挈以成舋亂遂至宇内沸騰王室如燬而帝之諸𦙍莫不殱焉强不如弱義在於此明帝負螟之慶事非已出枝葉不茂豈能庇其本乎南史卷十四南史卷十四考證文帝十九男傳陳脩容生東海王禕東海目録及本傳俱作廬陵元凶劭傳初使蕭斌作詔斌辭以不文乃使王僧綽監本脫辭字今从宋書増入劭使詹叔児燒輦及衮冕服上文云宻與腹心隊主陳叔児齋帥張超之任建之謀之此作詹叔児二者必有一訛竟陵王誕傳改封隨郡王隨監本作隋今改正開南門者不利其主不利其主監本作其主王今从宋書白虹臨北門亘屬城内屬一本作入晋熈王昶傳在道慷慨為斷句斷監本誤繼今改正先是改謝氏為射氏監本謝與射互誤今改正明年復昶所生謝氏為晋熈國太妃謝監本訛射今改正晋平刺王休祐傳且慮休祐将来難制欲方便除之監本脱欲字今増入孝武帝二十八男傳史昭華生臨海王子頊華一本作容始平孝敬王子鸞傳凡為上眄遇者莫不入于鸞府于一本作子永嘉王子仁傳字孝龢龢監本誤􅀈今改正武陵王賛傳此三行共四十八字監本複見於邵陵殤王友傳後查目録及閣本俱無之不知何人所贅増也今獨存此傳刪其複見者南史卷十四考證
