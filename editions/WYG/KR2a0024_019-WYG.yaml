body:
  text: 南史卷十九唐李延夀撰列傳第九謝晦兄瞻澹弟㬭從叔謝裕子恂純𤣥孫㣲裕弟述述孫朓謝方明子惠連謝靈運孫超宗卿曾孫幾謝晦字宣眀陳郡陽夏人晉太常裒之𤣥孫也裒子奕據安萬鐵並著名前史據子朗字長度位東陽太守朗子重字景重位㑹稽王道子驃騎長史重生絢瞻晦㬭遯絢位至宋文帝鎮軍長史早卒晦初為孟昶建威府中兵叅軍昶死帝問劉穆之昶府誰堪入府穆之舉晦即命為太尉叅軍武帝當訊獄其旦刑獄叅軍有疾以晦代之晦車中一覽訊牒隨問酬對無失帝竒之即日署刑獄賊曺累遷太尉主簿從征司馬休之時徐逵之戰死帝將自登岸諸将諌不從晦持帝帝曰我斬卿晦曰天下可無晦不可無公晦死何有會胡藩登岸賊退乃止晦美風姿善言笑眉目分明鬢髪如墨渉獵文義博贍多通時人以方楊徳祖微将不及晦聞猶以為恨帝深加愛賞從征闗洛内外要任悉委之帝於彭城大會命紙筆賦詩晦恐帝有失起諌帝卽代作曰先蕩臨淄穢却清河洛塵華陽有逸驥桃林無伏輪於是羣臣並作時謝琨風華為江左第一甞與晦俱在武帝前帝目之曰一時頓有兩玉人耳劉穆之遣使陳事晦徃徃異同穆之怒曰公復有還時不及帝欲以晦為從事中郎穆之堅執不與故終穆之世不遷及穆之喪問至帝哭之甚慟曰喪我賢友晦時正直喜甚自入閤參審其日教出轉晦從事中郎宋臺建為右衞将軍加侍中武帝聞咸陽淪沒欲復北伐晦諌以士馬疲怠乃止於是登城北望慨然不悦乃命羣僚誦詩晦詠王粲詩曰南登霸陵岸回首望長安悟彼下泉人喟然傷心肝帝流涕不自勝及帝受命於石頭登壇備法駕入宫晦領游軍為警加中領軍封武昌縣公永初二年坐行璽封鎮西司馬南郡太守王華而誤封北海太守球板免晦侍中尋轉領軍将軍加散騎常侍依晉中軍羊祜故事入直殿省總統宿衞及帝不豫給班劒二十人與徐羡之傅亮檀道濟並侍醫藥少帝即位加中書令與徐傅輔政及少帝廢徐羡之以晦領䕶南蠻校尉荆州刺史加都督欲令居外為援慮文帝至或别用人故遽有此授精兵舊将悉以配之文帝即位晦慮不得去甚憂惶及發新亭顧石頭城喜曰今得脱矣進封建平郡公固讓又給鼓吹一部至江陵深結侍中王華兾以免祸二女當配彭城王義康新野侯義賓元嘉二年遣妻及長子世休送女還都先是景平中魏師攻取河南至是欲誅羡之等并討晦聲言北行又言拜京陵裝舟艦傅亮與晦書言薄伐河朔事猶未巳朝野之慮憂懼者多又言當遣外監萬幼宗往時朝廷䖏分異常其謀頗泄三年正月晦弟黄門侍郎㬭馳使告晦晦猶謂不然呼諮議參軍何承天示以亮書曰計幼宗一二日必至傅公慮我好事故先遣此書承天曰外間所聞咸謂西討已定幼宗豈有止理晦尚謂虗使承天豫立答詔啓草北行宜湏眀年江夏内史程道慧得尋陽人書言其事已審使執晦晦問計於承天封曰蒙将軍殊顧常思報徳事變至矣何敢隐情然明日戒嚴動用軍法區區所懷懼不得盡晦懼曰卿豈欲我自裁哉承天曰尚未至此其在境外晦曰荆州用武之地兵糧易給聊且決戰走復何晚吾不愛死負先帝之顧如何又謂承天曰幼宗尚未至若後二三日無消息便是不復來邪承天曰程説其事已判豈容復疑晦欲焚南蠻兵籍率見力决戰士人多勸發兵晦問諸将戰士三千足守城乎南蠻司馬周超曰非徒守城若有外寇亦可立勲司馬庾登之請觧司馬南郡以授之暗即命超為司馬轉登之為長史文帝誅羡之等及晦子世休收㬭子世平兄子紹等晦知訖先舉羡之亮哀次發子弟凶問既而自出射堂集得精兵三萬人乃奉表言臣等若志欲專權不顧國典便當輔翼幼主孤背天日豈得㳂流數千虚館三月奉迎鑾駕以遵下武故廬陵王於滎陽之世屢被猜嫌積怨犯上自貽非命不有所廢将何以興耿弇不以賊遺君父臣亦何負於宋室邪又言羡之亮無罪見誅王𢎞兄弟輕躁昧進王華猜忌忍害帝時已戒嚴尚書符荆州暴其罪狀晦率衆二萬發自江陵舟艦列自江津至于破冢旗旌相照歎曰恨不得以此為勤王之師移檄建鄴言王𢎞曇首王華等罪又上表陳情初晦與徐傅謀為自全計晦據上流檀鎮廣陵各有强兵足制朝廷羡之亮於中知權可得持久及帝将行召檀道濟委之以衆晦始謂道濟不全及聞其來大衆皆潰晦得小船還江陵初雍州刺史劉粹遣弟竟陵太守道濟與臺軍主沈敞之襲江陵至沙橋周超大破之俄而晦至江陵無佗唯愧周超而已超其夜詣到彦之降晦乃擕弟遯兄子世基等七騎北走遯肥不能騎馬晦每待不得速至安陸延頭晦故吏戍主光順之檻送建鄴於路作悲人道以自哀周超既降到彦之以參府事劉粹遣告彦之沙橋之事敗由周超彦之乃執與晦等並伏誅世基絢之子也有才氣臨死為連句詩曰偉哉横海鱗壮矣垂天翼一旦失風水飜為螻蟻食晦續之曰功遂侔昔人保退無智力既渉太行險斯路信難陟晦女為彭城王義康妃聰眀有才貌被髪徒跣與晦訣曰阿父大丈夫當横屍戰場奈何狼籍都市言訖呌絶行人為之落淚晦死時年三十七庾登之殷道鸞何承天自晦下並見原瞻字宣逺一曰名檐字通逺晦次兄也六歳能屬文為紫石英贊果然詩為當時才士歎異與從叔琨族弟靈運俱有盛名甞作喜霽詩靈運寫之琨詠之王𢎞在坐以為三絶瞻幼孤叔母劉撫養有恩兄弟事之同於至親劉弟栁為吳郡将姊俱行瞻不能違逺自楚臺祕書郎觧職隨從故為栁建威長史後為宋武帝相國從事中郎晦時為宋臺右衞權遇已重於彭城還都迎家賔客輻湊時瞻在家驚駭謂晦曰吾家以素退為業汝遂勢傾朝野此豈門户福邪乃籬隔門庭曰吾不忍見此後因宴集靈運問晦潘陸與賈充優劣晦曰安仁諂於權門士衡邀競無已並不能保身自求多福公閭勲名佐世不得為並靈運曰安仁士衡才為一時之冠方之公閭本自遼絶瞻歛容曰若䖏貴而能遺權斯則是非不得而生傾危無因而至君子以眀哲保身其在此乎常以裁止晦如此及還彭城言於武帝曰臣本素士父祖位不過二千石弟年始三十志用凡近位任顯宻福過災生特乞降黜以保衰門前後屢陳帝欲以瞻為吴興郡又自陳請乃為豫章太守晦或以朝廷密事語瞻瞻輒向親舊説以為戲笑以絶其言晦遂建佐命功瞻愈憂懼永初二年在郡遇疾不療幸於不永晦聞疾奔波瞻見之曰汝為國大臣又總戎重萬里逺出必生疑謗時果有詐告晦反者瞻疾篤還都帝以晦禁旅不得出宿使瞻居於晉南郡公主壻羊賁故第在領軍府東門瞻曰吾有先人弊廬何為於此臨終遺晦書曰吾得歸骨山足亦何所多恨弟思自勉為國為家卒時年三十五瞻文章之美與從叔琨族弟靈運相抗靈運父瑍無才能為祕書郎早卒而靈運好臧否人物琨患之欲加裁折未有其方謂瞻曰非汝莫能乃與晦瞻𢎞㣲等共游戲使瞻與靈運共車靈運登車便商較人物瞻謂曰祕書早亡談者亦互有同異靈運黙然言論自此衰止瞻弟㬭字宣鏡年數歲所生母郭氏疾㬭晨昏温凊勤容戚顔未嘗暫改恐僕役營疾懈倦躬自執勞母為疾畏驚而㣲賤過甚一家尊卑感㬭至性咸納屨行屏氣語如此者十餘年位黄門侍郎從坐伏誅澹字景恒晦從叔也祖安晉太傅父瑶琅邪王友澹任逹仗氣不營當世與順陽范泰為雲霞之交歴位尚書宋武帝将受禅有司議使侍中劉叡進璽帝曰此選當湏人望乃使澹攝澹嘗侍帝宴酣飲大言無所屈鄭鮮之欲按之帝以為澹方外士不宜規矩繩之然意不説不以任寄後復侍飲醉謂帝曰陛下用羣臣但湏委屈順者乃見貴汲黯之徒無用也帝大笑景平中累遷光祿大夫從子晦為荆州将之鎮詣澹别晦色自矜澹問晦年答曰三十五澹笑曰昔荀中郎年二十九為北府都督卿比之已為老矣晦色甚愧元嘉中位侍中特進金紫光禄大夫卒初澹從弟混與劉毅昵澹常以為憂漸疎混每謂弟璞從子瞻曰益壽此性終當破家混尋見誅朝廷以澹先言故不及祸璞字景山幼孝友祖安深賞愛之位光祿勲謝裕字景仁朗弟允之子而晦從父也名與宋武帝諱同故以字行允字令度位宣城内史景仁幼為從祖安所知始為前軍行參軍會稽王世子元顯嬖人張法順權傾一時内外無不造門惟景仁不至年三十而方為著作佐即桓𤣥誅元顯見景仁謂四坐曰司馬庶人父子云何不敗遂令謝景仁三十而方佐著作郎𤣥建楚臺以補黄門侍郎及簒位領驍騎将軍景仁博聞强識善叙前言往行𤣥每與言不倦𤣥出行殷仲文卞範之之徒皆騎馬散從而使景仁陪輦宋武帝為桓修撫軍中兵參軍甞詣景仁諮事景仁與語説因留帝食食未辦而景仁為𤣥所召𤣥性促俄頃間騎詔續至帝屢求去景仁不許曰主上見待要應有方我欲與客食豈不得待竟安坐飽食然後應召帝甚感之及平建鄴景仁與百僚同見武帝目之曰此名公孫也歴位武帝鎮軍司馬復為車騎司馬義熙五年帝将伐慕容超朝議皆謂不可劉毅時鎮姑孰固止帝以為苻堅侵境謝太傅猶不自行宰相逺出傾動根本景仁獨曰公建桓文之烈應天人之心雖業髙振古而徳刑未樹宜推亾固存廣振威畧平定之後養鋭息徒然後觀兵洛汭修復園寝豈有縱敵貽患者哉帝從之及北伐大司馬琅邪王天子母弟屬當儲副帝深以根本為憂轉景仁大司馬左司馬專總府任又遷吏部尚書時從兄混為尚書左僕射依制不得相監帝啓依僕射王彪之尚書王劭前例不觧職坐選吏部令史邢安泰為都令史平原太守二官共除安泰以令史職拜謁陵廟為御史中丞鄭鮮之所糾白衣領職十一年為左僕射景仁性矜嚴整潔居宇净麗每唾輒唾左右人衣事畢即聼一日澣濯每欲唾左右争來受之武帝雅相知重申以昏姻廬陵王義真妃景仁女也十二年卒贈金紫光禄大夫𦵏日武帝親臨甚慟子恂字泰温位鄱陽太守恂子孺子少與族兄莊齊名多藝能尤善聲律車騎将軍王彧孺子姑之子也嘗與孺子宴桐臺孺子吹笙彧自起舞既而歎曰今日真使人飄颻有伊洛間意為新安王主簿出為廬江郡辭宋孝武謂有司曰謝孺子不可屈為小郡乃以為司徒主簿後以家貧求西陽太守卒官子璟少與從叔朓俱知名齊竟陵王子良開西邸招文學璟亦預焉位中書郎梁天監中為左户尚書再遷侍中固辭年老求金紫帝不恱未叙會卒子㣲字𤣥度美風采好學善屬文位兼中書舍人與河東裴子野沛國劉顯同官友善時魏中山王元畧還北梁武帝餞於武徳殿賦詩三十韻限三刻成㣲二刻便就文甚美帝再覧焉又為臨汝侯猷製放生文亦見賞於世後除尚書左丞及昭明太子薨帝立晉安王綱為皇太子将出詔唯召尚書右僕射何敬容宣恵将軍孔休源及㣲三人與議㣲時年位尚輕而任遇已重後卒於北中郎豫章王長史南蘭陵太守文集二十卷純字景懋景仁弟也劉毅鎮江陵以為衛軍長史南平相及王鎮惡襲毅毅時病佐史聞兵至馳還入府左右引車欲還外觧純叱之曰我人吏也逃欲安之及入毅兵敗衆散純為人所殺純弟甝字景甝位司徒右長史甝弟述字景先小字道兒少有至行隨純在江陵純遇害述奉純䘮還都至西塞遇暴風純喪舫流漂不知所在述乗小船尋求經純妻庾舫過庾遣人謂曰小郎去必無及寧可存亡俱盡邪述號泣答曰若安全至岸尚湏營理如其已致意外述亦無心獨存因冐浪而進見純䘮幾沒述號呌呼天幸而獲免咸以為精誠所致武帝聞而嘉之及臨豫州諷中正以為迎主簿甚被器遇景仁愛甝而憎述嘗設饌請宋武帝希命甝豫坐而帝召述述知非景仁夙意又慮帝命之請急不從帝馳遣呼述湏至乃餐其見重如此及景仁疾述盡心視湯藥飲食必嘗而後進衣不解帶不盥櫛者累旬景仁深感愧焉友愛遂篤及景仁卒哀號過禮景仁肥壮買材數具皆不合用述哀惶親選廼獲焉為太尉參軍從征司馬休之封吉陽縣五等侯元嘉二年拜中書侍郎後為彭城王義康驃騎長史領南郡太守義康入相述又為司徒左長史轉左衞将軍莅官清約私無宅舍義康遇之甚厚尚書㒒射殷景仁領軍将軍劉湛並與述為異常之交述美風姿善舉止湛每謂人曰我見謝道兒未嘗足雍州刺史張邵以黷貨将致大辟述表陳邵先朝舊勲宜蒙優貸文帝手詔詶納焉述語子綜曰主上矜邵夙誠自将曲恕吾所啓謬會故特見納若此跡宣布則為侵奪主恩使綜對前焚之帝後謂邵曰卿之獲免謝述力焉述有心虚疾性理時或乖謬卒於吳興太守䘮還未至都數十里殷景仁劉湛同乗迎赴望船流涕及劉湛誅義康外鎮将行歎曰謝述唯勸吾退劉湛唯勸吾進述亾而湛存吾所以得罪也文帝亦曰謝述若存義康必不至此三子綜約緯綜有才藝善隸書為太子中舍人與范曄謀反伏誅約亦死緯尚宋文帝第五女長城公主素為綜約所憎免死徙廣州孝建中還都方雅有父風位正貟郎子朓朓字𤣥暉少好學有美名文章清麗為齊隨王子隆鎮西功曹轉文學子隆在荆州好辭賦朓尤被賞不捨日夕長史王秀之以朓年少相動欲以啓聞朓知之因事求還道中為詩寄西府曰常恐鷹隼擊時菊委嚴霜寄言罻羅者寥廓已髙翔是也仍除新安王中軍記室朓牋辭子隆曰朓聞潢汙之水思朝宗而每竭駑蹇之乗希沃若而中疲何則臯壤摇落對之惆悵岐路東西或以嗚唈况乃服義徒擁歸志莫從邈若墜雨飄似秋蔕朓實庸流行能無算屬天地休眀山川受納襃米一介搜揚小善故得捨耒場圃奉筆兎園東泛三江西浮七澤契闊戎旃從容讌語長裾日曵後乗載脂榮立府廷恩加顔色沭髮晞陽未測涯涘撫臆論報早誓肌骨不悟滄溟未運波臣自蕩渤澥方春旅翮先謝清切藩房寂寥舊蓽輕舟反泝弔影獨留白雲在天龍門不見去徳滋永思徳滋深惟待青江可望候歸艎於春渚朱邸方開效􅅫心於秋實如其簪屨或存衽席無改雖復身填溝壑猶望妻子知歸攬涕告辭悲來横集時荆州信去倚待朓執筆便成文無㸃易以本官兼尚書殿中郎隆昌初敇朓接北使朓自以口訥啓讓見許明帝輔政以為驃騎諮議領記室掌霸府文筆又掌中書詔誥轉中書郎出為晉安王鎮北諮議南東海太守行南徐州事啓王敬則反謀上甚賞之遷尚書吏部郎朓上表三讓中書疑朓官未及讓以問國子祭酒沈約約曰宋元嘉中范曄讓吏部朱修之讓黄門蔡興宗讓中書並三表詔答近代小官不讓遂成恒俗恐有乖讓意王藍田劉安西並貴重初自不讓今豈可慕此不讓邪孫興公孔顗並讓記室今豈可三署皆讓邪謝吏部今授超階讓别有意豈闗官之大小撝謙之美本出人情若大官必讓便與詣闕章表不異例既如此謂都非疑朓讓優答不許朓善草隸長五言詩沈約常云二百年來無此詩也敬皇后遷祔山陵朓撰哀策文齊世莫有及者東昏失徳江祏欲立江夏王寶𤣥末更回惑與弟祀宻謂朓曰江夏年少脱不堪不可復行廢立始安年長入纂不乖物望非以此要富貴只求安國家爾遥光又遣親人劉渢致意於朓朓自以受恩眀帝不肯答少日遥光以朓兼知衞尉事朓懼見引即以祏等謀告左興盛又說劉暄曰始安一旦南靣則劉渢劉宴居卿今地但以卿為反覆人爾暄陽驚馳告始安王及江祏始安欲出朓為東陽郡祏固執不與先是朓常輕祏為人祏常詣朓朓因言有一詩呼左右取既而便停祏問其故云定復不急祏以為輕已後祏及弟祀劉渢劉宴俱候朓朓謂祏曰可謂帶二江之雙流以嘲弄之祏轉不堪至是搆而害之詔暴其過惡收付廷尉又使御史中丞范岫奏收朓下獄死時年三十六臨終謂門賔曰寄語沈公君方為三代史亦不得見沒初朓告王敬則反敬則女為朓妻常懷刀欲報朓朓不敢相見及當拜吏部謙挹尤甚尚書郎范縝嘲之曰卿人才無慙小選但恨不可刑于寡妻朓有愧色及臨誅歎曰天道其不可昧乎我雖不殺王公王公因我而死朓好奨人才會稽孔顗粗有才筆未為時知孔珪嘗令草讓表以示朓朓嗟吟良久手自折簡寫之謂珪曰士子聲名未立應共奨成無惜齒牙餘論其好善如此朓及殷叡素與梁武以文章相得帝以大女永興公主適叡子鈞第二女永世公主適朓子謨及帝為雍州二女並暫隨母向州及武帝即位二主始隨内還武帝意薄謨又以門单欲更適張𢎞策子策卒又以與王志子諲而謨不堪歎恨為書状如詩贈主主以呈帝甚蒙矜歎而婦終不得還尋用謨為信安縣稍遷王府諮議時以為沈約早與朓善為制此書云謝方明裕從祖弟也祖鐵字鐵石位永嘉太守父冲字秀度中書郎家在會稽病歸為孫恩所殺贈散騎常侍方明隨伯父吳興太守邈在郡孫恩寇會稽東土諸郡響應吳興人胡桀郜驃破東遷縣方眀勸邈避之不從賊至被害方明逃免初邈舅子長樂馮嗣之及北方學士馮翊仇𤣥逹俱投邈禮待甚簡二人並恨遂與恩通謀劉牢之謝琰等討恩恩走臨海嗣之等不得同去方更聚合方明體素羸弱而勇決過人結邈門生討嗣之等悉禽手刃之時亂後吉凶禮廢方明合門遇祸資産無遺而營舉凶功盡力數月𦵏送並畢平世備禮無以加也頃之孫恩重陷㑹稽謝琰見害因購方明甚急方明於上虞載母妹奔東陽由黃蘖嶠出鄱陽附載還都寄居國子學流離險戹屯苦備經而貞履之操在約無改桓𤣥剋建鄴丹陽尹卞範之勢傾朝野欲以女嫁方眀方眀終不回桓𤣥聞而賞之即除著作佐郎後從兄景仁舉為宋武中軍主簿方明知無不為帝謂曰愧未有𤓰衍之賞且當與卿共豫章國祿屢加賞賜方明嚴恪善自居遇雖暗室未嘗有惰容從兄混有重名唯歳節朝拜而已丹陽尹劉穆之權重當時朝野輻凑其不至者惟混方明郗僧施蔡廓四人而已穆之甚恨及混等誅後方明廓來往造穆之穆之太恱白武帝曰謝方明可謂名家駒及蔡廓直置並台鼎人無論復有才用頃之轉從事中郎仍為右將軍道憐長史武帝令府中衆事皆諮决之府轉爲中軍長史尋加晉陵太守復為驃騎長史南郡相委任如初嘗年終江陵縣獄囚事無輕重悉放歸家使過正三日還到罪重者二十餘人綱紀以下莫不疑懼時晉陵郡送故主簿𢎞季咸徐夀之並隨在西固諌以為昔人雖有其事或是記籍過言且當今人情偽薄不可以古義相許方明不納一時遣之囚及父兄並驚喜涕泣以為就死無恨至期有重罪一人醉不能歸違二日乃反餘一囚十日不來五官朱千期請見欲自討之方明知為囚事使左右謝五官不須入囚自當反囚逡巡墟里不能自歸鄉村責讓率領将送竟無逃者逺近歎服焉宋武帝受命位待中丹陽尹有能名轉會稽太守江東人户殷盛風俗峻刻彊弱相陵姦吏蜂起符書一下文攝相續方明深達政體不拘文法濶畧苛細務在統領貴族豪士莫敢犯禁除比伍之坐判久繫之獄前後征伐毎兵運不充悉倩士庶事寧皆使還本而守宰不明與奪乖謬人事不至必被抑塞方明簡太精當各順所宜東土稱詠之性尤愛惜未嘗有所是非承代前人不易其政必宜改者則漸變使無迹可尋卒官子恵連年十嵗熊屬文族兄靈運加賞之云每有篇章對惠連輒得佳語嘗於永嘉西堂思詩竟日不就忽夢見恵連即得池塘生春草大以為工嘗云此語有神功非吾語也本州辟主簿不就恵連先愛幸會稽郡吏杜德靈及居父憂贈以五言詩十餘首乗流遵歸路諸篇是也坐廢不豫榮位尚書僕射殷景仁愛其才言次白文帝言臣小兒時便見此文而論者云是恵連其實非也文帝曰若此便應通之元嘉七年方為司徒彭城王義康法曺行叅軍義康修東府城城壍中得古冢為之改𦵏使恵連為祭文留信待成其文甚羙又為雪賦以髙麗見奇靈運見其新文每曰張華重生不能易也文章並行於世年三十七卒既早亡輕薄多尤累故官不顯無子恵連弟恵宣位臨川太守謝靈運安西将軍奕之曽孫而方明從子也祖𤣥晉車騎将軍父瑍生而不慧位祕書郎早亾靈運幼便頴悟𤣥甚異之謂親知曰我乃生瑍瑍兒何為不及我靈運少好學博覽群書文章之羙與顔延之為江左第一縱横俊發過於延之深宻則不如也從叔祖混特加愛之襲封康樂公以國公例除員外散騎侍郎不就為琅邪王大司馬行叅軍性豪侈車服鮮麗衣物多改舊形制世共宗之咸稱謝康樂也累遷祕書丞坐事免宋武帝在長安靈運為世子中軍諮議黃門侍郎奉使慰勞武帝於彭城作撰征賦後為相國從事中郎世子左衛率坐輒殺門生免官宋受命降公爵為侯又為太子左衛率靈運多愆禮度朝廷惟以文義䖏之不以應實相許自謂才能宜叅權要既不見知常懷憤惋廬陵王義真少好文籍與靈運情欵異常少帝即位權在大臣靈運搆扇異同非毁執政司徒徐羡之等患之出為水嘉太守郡有名山水靈運素所愛好出守既不得志遂肆意遊遨徧歴諸縣動踰旬朔理人聴訟不復闗懷所至輒為詩詠以致其意在郡一周稱疾去職從弟晦曜𢎞㣲等並與書止之不從靈運父祖並𦵏始寧縣并有故宅及墅遂移籍㑹稽修營舊業傍山帶江盡幽居之羙與隐士王𢎞之孔淳之等放蕩為娱有終焉之志毎有一首詩至都下貴賤莫不競寫宿昔間士庶皆徧名動都下作山居賦并自注以言其事文帝誅徐羡之等徵為祕書監再召不起使光禄大夫范泰與書敦奨乃出使整祕閣書遺闕又令撰晉書粗立條流書竟不就尋遷侍中賞遇甚厚靈運詩書皆兼獨絶每文竟手自寫之文帝稱為二寳既自以名軰應叅時政至是惟以文義見接每侍上宴談賞而已王曇首王華殷景仁等名位素不踰之並見任遇意既不平多稱疾不朝直穿池植援種竹樹果驅課公役無復期度出郭游行或一百六七十里經旬不歸既無表聞又不請急上不欲傷大臣諷㫖令自觧靈運表陳疾賜假東歸将行上書勸伐河北而游娱宴集以夜續晝復為御史中丞傅隆奏免官是嵗元嘉五年也靈運既東與族弟恵連東海何長瑜頴川荀雍太山羊璿之以文章賞㑹共為山澤之游時人謂之四友惠連幼有竒才不為父方眀所知靈運去永嘉還始寧時方眀為㑹稽靈運造方眀遇惠連大相知賞靈運性無所推唯重惠連與為刎頸交時何長瑜教惠連讀書亦在郡内靈運又以為絶倫謂方眀曰阿連才悟如此而尊作常兒遇之長瑜當今仲宣而飴以下客之食尊既不能禮賢宜以長瑜還靈運載之而去荀雍字道雍官至員外散騎郎璿之字曜璠為臨川内史被司空竟陵王誕所遇誕敗坐誅長瑜才亞恵連雍璿不及也臨川王義慶招集文士長瑜自國侍郎至平西記室參軍嘗於江陵寄書與宗人何朂以韻語序義慶州府僚佐云陸展染白髪欲以媚側室青青不觧久星星行復出如此者五六句而輕薄少年遂演之凡人士並為題目皆加劇言苦句其文流行義慶大怒白文帝除廣州所統曽城令及義慶薨朝士並詣第叙哀何朂謂袁淑曰長瑜便可還也淑曰國新䘮未宜以流人為念廬陵王紹鎮尋陽以長瑜為南中郎行叅軍掌書記之任行至板橋遇暴風溺死靈運因祖父之資生業甚厚奴僮既衆義故門生數百鑿山浚湖功役無已尋山陟嶺必造幽峻巖嶂數十重莫不備盡登躡常著木屐上山則去其前齒下山去其後齒嘗自始寕南山伐木開徑直至臨海從者數百臨海太守王琇驚駭謂為山賊末知靈運乃安又要琇更進琇不肯靈運贈琇詩曰邦君難地嶮旅客易山行在㑹稽亦多從衆驚動縣邑太守孟顗事佛精懇而為靈運所輕嘗謂顗曰得道應湏慧業丈人生天當在靈運前成佛必在靈運後顗深恨此言又與王𢎞之諸人出千秋亭飲酒倮身大呼顗深不堪遣信相聞靈運大怒曰身自大呼何闗癡人事㑹稽東郭有回踵湖靈運求决以為田文帝令州郡履行此湖去郭近水物所出百姓惜之顗堅執不與靈運既不得回踵又求始寧休崲湖為田顗又固執靈運謂顗非存利人政慮决湖多害生命言論傷之與顗遂隙因靈運横恣表其異志發兵自防露板上言靈運馳詣闕上表自陳本末文帝知其見誣不罪也不欲復使東歸以為臨川内史在郡游放不異永嘉為有司所紏司徒遣使随州從事鄭望生收靈運靈運興兵叛逸遂有逆志為詩曰韓亾子房奮秦帝魯連耻本自江海人忠義感君子追討禽之送廷尉廷尉論正斬刑上愛其才欲免官而已彭城王義康堅執謂不宜恕詔以謝𤣥勲参㣲管宜宥及後嗣降死徙廣州後秦郡府将宋齊受使至涂口行達桃墟村見有七人下路聚語疑非常人還告郡縣遣兵隨齊掩討禽之其一人姓趙名欽云同村薛道雙先與靈運共事道雙因同村成國報欽云靈運犯事徙廣州給錢令買弓箭刀楯等物使道雙要合鄉里健兒於三江口簒之若得者如意後功勞是同遂合部黨要謝不得及還饑饉緣路為劫有司奏收之文帝詔於廣州棄市臨死作詩曰龔勝無餘生李業有終盡嵇公理既廹霍生命亦殞所稱龔勝李業猶前詩子房魯連之意也時元嘉十年年四十九所著文章傳於世孟顗字彦重平昌安邱人衛將軍昶弟也昶顗並美風姿時人謂之雙珠昶貴盛顗不就辟昶死後顗歴侍中僕射太子詹事散騎常侍左光祿大夫嘗就徐羡之因敘關洛中事顗歎劉穆之終後便無繼者王𢎞亦在甚不平曰昔魏朝酷重張郃謂不可一日無之及郃死何關興廢顗不悦衆賔笑而釋之後卒於㑹稽太守靈運子鳯坐靈運徙嶺南早卒鳯子超宗隨父鳯嶺南元嘉末得還與慧休道人來徃好學有文辭盛得名譽選補新安王子鸞國常侍王母殷淑儀卒超宗作誄奏之帝大嗟賞謂謝莊曰超宗殊有鳯毛靈運復出時右衛將軍劉道隆在御坐出候超宗曰聞君有異物可見乎超宗曰懸罄之室復有異物邪道隆武人無識正觸其父名曰旦侍宴至尊説君有鳯毛超宗徒跣還内道隆謂檢覔毛至闇待不得乃去泰始中為尚書殿中郎三年都令史駱宰議榮秀孝格五問並得為上四三為中二為下一不第超宗議不同詔從宰議齊高帝為領軍愛其才衛將軍袁粲聞之謂高帝曰超宗開亮善可與語取為長史臨淮太守粲誅高帝以超宗為義興太守昇明二年坐公事免詣東府門自通其日風寒高帝謂四坐曰此客至使人不衣自暖矣超宗既坐飲酒數杯辭氣横出高帝對之甚歡及齊受禪為黄門郎有司奏撰郊廟歌上敕司徒褚彦回侍中謝朏散騎侍郎孔珪太學博士王咺之總明學士劉融何法圖何曇秀作者凡十人超宗辭獨見用為人恃才使酒多所陵忽在直省常醉上召見語及北方事超宗曰虜動來二十年矣佛出亦無如之何以失儀出為南郡王中軍司馬人問曰承有朝命定是何府超宗怨望答曰不知是司馬為是司驢旣是驢府政應為司驢為有司奏以怨望免禁錮十年後司徒褚彦回因送湘州刺史王僧虔閣道壊墜水僕射王儉驚跣下車超宗拊掌笑曰落水三公墜車僕射彦回出水霑濕狼藉超宗先在僧虔舫抗聲曰有天道焉天所不容地所不受投畀河伯河伯不受彦囘大怒曰寒士不遜超宗曰不能賣袁劉得富貴焉免寒士前後言誚稍布朝野武帝即位使掌國史除竟陵王征北諮議領記室愈不得志超宗為子娶張敬兒女為婦帝甚疑之及敬兒誅超宗謂丹陽尹李安人曰徃年殺韓信今年殺彭越君欲何計安人具啓之上積懐超宗輕慢使兼中丞袁彖奏超宗請付廷尉武帝雖可其奏以彖言辭依違使左丞王逡之奏彖輕文畧奏撓法容非請免彖所居官詔彖匿情欺國愛朋罔主免官禁錮十年超宗下廷尉一宿髪白皓首詔徙越􅸋行至豫章上敕豫章内史虞悰赐盡勿傷其形骸明年超宗門生王永先又告超宗子才卿死罪二十餘條上疑其妄以才卿付廷尉辯以不實見原永先於獄盡之才卿弟幾卿清辯時號神童超宗從越􅸋詔家人不得相隨幾卿年八歳别父於新亭不勝其慟遂投於江超宗命估客數人入水救之良久涌出得就岸瀝耳目口鼻出水數斗十餘日乃裁能言居父憂哀毁過禮年十二召補國子生齊文慧太子自臨策試謂王儉曰幾卿本長𤣥理今可以經義訪之儉承㫖發問幾卿辯釋無滯文慧大稱賞焉儉謂人曰謝超宗為不死矣及長博學有文采仕齊為太尉晋安王主簿梁天監中自尚書三公郎為治書侍御史舊郎官轉為此職者世謂之南奔幾卿頗失志多陳疾臺事略不復理累遷尚書左丞幾卿詳悉故實僕射徐勉每有凝滯多詢訪之然性通脱㑹意便行不拘朝憲嘗預樂遊苑宴不得醉而還因詣道邊酒壚停車褰幔與車前三騶對飲時觀者如堵幾卿處之自若後以在省署夜著犢鼻褌與門生登閣道飲酒酣呼為有司糾奏坐免普通六年詔西昌侯藻督衆軍北侵幾卿啓求行擢為藻軍師長史將行與僕射徐勉别勉云淮肥之役前謝已著奇功未知今謝何如幾卿應聲曰已見今徐勝於前徐後謝何必愧於前謝勉黙然軍至渦陽退敗幾卿坐免官居白楊石井宅朝中交好者載酒從之客恒滿坐時左丞庾仲容亦免歸二人意相得並肆情誕縱或乘露車歴游郊野醉則執鐸挽歌不屑物議湘東王繹在荆鎮與書慰勉之後為太子率更令放逹不事容儀性不容非與物多忤有乖已者輒肆意罵之退無所言遷左丞僕射省嘗議集公卿幾卿外還宿醉未醒取枕高卧傍若無人又嘗於閣省祼袒酣飲及醉小遺下霑令史為南司所彈幾卿亦不介意轉左光禄長史卒文集行於世幾卿雖不持檢操然於家門篤睦兄才卿早卒子藻幼孤幾卿撫餋甚至及藻成立歴清官皆幾卿奨訓之力也論曰謝晦以佐命之功當頋托之重殷憂在日黜昏啓聖于社稷之計盖為大矣但廬陵之殞事非主命昌門之覆有乖臣道博陸所慎理異於斯加以身處上流兵權總已将欲以外制内豈人主所乆堪乎向令徐傅不亡道濟居外四權制命力足相侔劉氏之危則有逾累卵以此論罰豈曰妄誅宣逺所為寒心可謂睹其萌矣然謝氏自晉以降雅道相傳景恒景仁以徳素傳美景懋景先以莭義流譽方明行已之度𤣥暉藻繢之竒各擅一時可謂徳門者矣靈運才名江左獨振而猖獗不已自致覆亡人各有能兹言乃信惜乎南史卷十九南史卷十九考證謝瞻傳瞻文章之羙與從叔琨族弟靈運相抗琨一本作混應从之謝純弟述傳述號泣答曰若安全至岸尚須營理監本脱尚字今从各本増謝方明傳承代前人不易其政必宜改者則漸變政監本訛正今从梁書謝超宗傳常醉上召見語及北方事語監本訛詔今改正以失儀出為南郡王中軍司馬失監本訛朱今从閣本南史卷十九考證
