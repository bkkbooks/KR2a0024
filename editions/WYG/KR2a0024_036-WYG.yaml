body:
  text: 南史卷三十六唐李延夀撰列傳第二十六羊欣羊𤣥保子戎希凡子沈演之子勃顗凡孫演之從祖弟子憲憲孫浚江夷子湛斆曾孫斆子蒨紑子揔祿弟蒨子紑夷子智深江秉之孫謐羊欣字敬元泰山南城人也曾祖忱晉徐州刺史祖權黃門郎父不疑桂陽太守欣少靖黙無競於人美言笑善容止泛覧經籍尤長𨽻書父不疑為烏程令欣年十二時王獻之為呉興太守甚知愛之欣嘗夏月著新絹裙晝寢獻之入縣見之書裙數幅而去欣書本工因此彌善起家輔國參軍府解還家隆安中朝廷漸亂欣優遊私門不復進仕㑹稽王世子元顯每使書扇常不奉命元顯怒乃以為其後軍府舍人此職本用寒人欣意貎恬然不以髙卑見色論者穪焉嘗詣領軍謝混混拂席改服然後見之時混族子靈運在坐退告族兄瞻曰望蔡見羊欣遂改席易衣欣由此益知名桓𤣥輔政以欣為平西主簿參預機要欣欲自疎時漏密事𤣥覺其此意愈更重之以為楚臺殿中郎謂曰尚書政事之本殿中禮樂所出卿昔處股肱方此為輕欣就職少日穪病自免屏居里巷十餘年義熙中弟徽被知於武帝帝謂諮議參軍鄭鮮之曰羊徽一時美器世論猶在兄後即板欣補右軍劉藩司馬後為新安太守在郡四年簡恵著穪除臨川王義慶輔國長史廬陵王義真車騎諮議參軍竝不就文帝重以為新安太守在郡十三年樂其山水嘗謂子弟曰人生仕宦至二千石斯可矣及是便懷止足轉義興太守非其好也頃之穪病篤免歸除中散大夫素好黄老常手自書章有病不服藥飲符水而已兼善醫術撰藥方數十卷欣以不堪拜伏辭不朝覲自非尋省近親不妄行詣行必由城外未嘗入六門武帝文帝竝恨不識之元嘉十九年卒弟徽字敬猷時譽多欣位河東太守卒羊𤣥保太山南城人也祖楷晉尚書都官郎父綏中書侍郎𤣥保初為宋武帝鎮軍參軍少帝景平中累遷司徒右長史府公王𢎞甚知重之謂左長史庾登之吏部尚書王淮之曰卿二賢明美朗詣㑹悟多通然𢎞懿之望故當共推羊也頃之入為黃門侍郎善奕棋品第三文帝亦好奕與賭郡𤣥保戲勝以補宣城太守先是劉式之為宣城立吏人亡叛制一人不禽符伍里吏送州作部能禽者賞位二階𤣥保以為非宜陳之曰臣伏尋亡叛之由皆出於窮逼今立殊制於事為苦又尋此制施一邦而已若其是邪則應與天下為一若其非邪亦不宜獨行一郡由此制停歴丹陽尹㑹稽太守太常呉郡太守文帝以𤣥保亷素寡欲故頻授名郡為政雖無殊績而去後常必見思不營財利産業儉薄文帝嘗曰人仕宦非唯湏才亦湏運命每有好官缺我未嘗不先憶羊𤣥保元凶弑立以為吏部尚書領國子祭酒及孝武入伐朝士多南奔劭集羣僚橫刀怒曰卿等便可去矣衆竝懼莫敢言𤣥保容色不異徐曰臣其以死奉朝劭為解孝武即位為金紫光祿大夫以謹敬見知大明五年加散騎常侍特進𤣥保自少至老謹於祭奠四時珍新未得祠薦者口不妄嘗卒諡曰定子子戎少有才氣而輕薄少行檢語好為雙聲江夏王義恭嘗設齋使戎布牀湏臾王出以牀狹乃自開牀戎曰官家恨狹更廣八分王笑曰卿豈唯善雙聲乃辯士也文帝好與𤣥保棋嘗中使至𤣥保曰今日上何召我邪戎曰金溝清泚銅池摇颺既佳光景當得劇棋𤣥保嘗嫌其輕脱云此兒必亡我家位通直郎坐與王僧達謗時政賜死死後孝武帝引見𤣥保𤣥保謝曰臣無日磾之明以此上負上美其言戎二弟文帝竝賜名曰咸曰粲謂𤣥保曰欲令卿二子有林下正始餘風𤣥保既善棋而何尚之亦雅好其事呉郡禇𦙍年七嵗便入髙品及長冠絶當時𦙍父榮期與臧質同逆𦙍應從誅何尚之固請曰𦙍奕棋之妙超古冠今魏犨犯令以材獲免父戮子宥其例甚多特乞與其微命使異術不絶不許時人痛惜之𤣥保兄子希字泰聞少有才氣為尚書左丞時揚州刺史西陽王子尚上言山湖之禁雖有舊科人俗相因替而不奉熂山封水保為家利自頃以來頽弛日甚富彊者兼嶺而占貧弱者薪蘇無託至漁採之地亦又如兹斯實害人之深弊為政所宜去絶損益舊條更申恒制有司檢壬辰詔書占山䕶宅彊盜律論贓一丈以上皆棄市希以壬辰之制其禁嚴刻事既難遵理與時弛而占山封水漸染復滋更相因仍便成先業一朝頓去易致嗟怨今更刋革立制五條凡是山澤先恒熂爐飬種竹木雜果為林芿及陂湖江海魚梁鰌鮆場恒加功脩作者聼不追奪官品第一第二聼占山三頃第三第四品二頃五十畆第五第六品二頃第七第八品一頃五十畆第九品及百姓一頃皆依定格條上貲簿若先已占山不得更占先占闕少依限占足若非前條舊業一不得禁有犯者水土一尺以上竝計贓依常盜律論停除咸康二年壬辰之科從之時益州刺史劉瑀先為右衛將軍與府司馬何季穆共事不平季穆為尚書令建平王宏所親待屢毁瑀於宏㑹瑀出為益州奪士人妻為妾宏使希舉察之瑀坐免官瑀恨希切齒有門生謝元伯往來希間瑀宻令訪訊被免之由希曰此奏非我意瑀即日到宏門奉牋陳謝云聞之羊希希坐漏泄免官泰始三年為寧朔將軍廣州刺史四年希以沛郡劉思道行晉康太守領軍伐俚思道違節失利希遣收之思道不受命率所領襲州希踰城走思道獲而殺之希子崇字伯逺尚書主客郎丁母憂哀毁過禮及聞廣州亂即日便徒跣出新亭不能歩渉頓伏江渚門義以小船致之父𦵏畢乃不勝哀而卒沈演之字臺真呉興武康人也髙祖充晉車騎將軍呉國内史曾祖勁冠軍陳祐長史戍金墉為燕將慕容恪所陷不屈見殺贈東陽太守祖赤黔廷尉卿父叔任少有幹質朱齡石伐蜀為齡石建威府司馬平蜀之功亞於元帥以功封寧新縣男後拜益州刺史卒演之年十一尚書僕射劉栁見而知之曰此童終為令器沈氏家世為將而演之折節好學讀老子百遍以義理業尚知名襲父别爵吉陽縣五等侯舉秀才為嘉興令有能名元嘉中累遷尚書吏部郎先是劉湛劉斌等結黨欲排廢尚書僕射殷景仁演之雅杖正義與景仁素善盡心朝廷文帝甚嘉之及彭城王義康出藩誅劉湛等以演之為右衛將軍景仁尋卒乃以後軍長史范瞱為左衛將軍與演之對掌禁旅同參機密尋加侍中文帝謂之曰侍中領衛望實優顯此蓋宰相便坐卿其勉之上欲伐林邑朝臣多不同唯廣州刺史陸徽與演之贊成上意及林邑平賜羣臣黃金生口銅器等物演之所得偏多上謂曰廟堂之謀卿參其力平此逺夷未足多建茅土廊清舊都鳴鸞東岱不憂山河之不開也二十一年詔以演之為中領軍太子詹事范瞱懷逆謀演之覺其有異言之文帝曄尋伏誅歴位吏部尚書領太子右衛率素有心氣寢病歴年上使卧疾理事性好舉才申濟屈滯而謙約自持上賜女伎不受暴卒文帝痛惜贈金紫光祿大夫諡曰貞子睦位黃門侍郎與弟西陽王文學勃忿䦧坐徙始興郡勃輕薄好利位太子右衛率加給事中坐贓賄徙梁州後還給事阮佃夫王道隆等位司徒左長史為後廢帝所誅演之兄子坦之仕齊位都官郎坦之子顗顗字處黙幼清静有至行慕黃叔度徐孺子之為人讀書不為章句著述不尚浮華常獨處一室人罕見其面從叔勃貴顯每還呉興賔客填咽顗不至其門勃就之顗送迎不越閫勃歎曰吾乃今知貴不如賤也顗内行甚修事母凡孝友兄昂一名顒亦退素以家貧仕為始安令兄弟不能分離相随之任齊永明年中徴拜著作郎太子舍人通直郎竝不赴文恵太子嘗擬古詩云磊磊落落玉山崩顗聞之曰此讖言也既而太子薨至秋武帝崩鬰林海陵相次黜辱顗素不事家産及昂卒逢齊末兵荒與家人并日而食或有饋其粱肉者閉門不受唯採蓴荇根供食以樵採自資怡怡然恒不改其樂梁天監四年大舉北侵南陽樂藏為武康令以顗從役到建業揚州别駕陸任以書與呉興太守栁惲責之不能甄善别賢惲大慙即表停之卒家所著文章數十篇憲字彦章演之從祖弟子也祖説道巴西梓潼二郡太守父璞之北中郎行參軍憲少有幹局為駕部郎宋明帝與憲棋謂曰卿廣州刺史材也補烏程令甚著政績太守褚彦回歎美以為方圓可施少府管掌煩冗材幹者竝更其職憲以吏能累遷少府卿武陵王曄為㑹稽以憲為左軍司馬齊髙帝以山隂戸衆欲分為兩縣武帝啓曰縣豈不可御但用不得人耳乃以憲帶山隂令政聲大著孔珪請假東歸謂人曰沈令料事特有天才後為晉安王後軍長史廣陵太守西陽王子明代為南兖州憲仍留為冠軍長史太守如故永明八年子明典籖劉道濟贓私百萬為有司所奏賜死憲坐不糾免官後除散騎常侍未拜卒當時穪為良吏憲同郡丘仲起先是為晉平郡清亷自立褚彦回歎曰目見可欲心能不亂此楊公所以遺子孫也仲起字子震位至廷尉卒憲孫浚字叔源少渉學有才幹仕梁歴山隂呉建康三縣竝有能名太清二年累遷御史中丞時臺城為侯景所圍外援並至景表請求和解圍還江北詔許之遣右衛將軍柳津對景盟歃景知城内疾疫稍無守備因緩去期城内知其背盟復舉烽鼔譟後數日景復進表請和簡文使浚往景所景曰即日向熱非復行時政欲立效求停君可見為申聞浚曰大將軍此意意在得城下風所聞乆已乏食城内雖困尚有兵糧朝廷恐和好乖貳已密勑外軍若臺城傾覆勿以二宫為念當以死雪恥若不能决戰當深壁自守大將軍十萬之衆將欲何資景橫刀於膝瞋目叱之浚乃正色責景曰河南王人臣而舉兵向闕今朝廷已赦王罪結盟口血未乾而復翻背沈浚六十之年且天子使也奉命而行何用見脅徑去不顧景歎曰是真司直也然密銜之又勸張嵊立義後得殺之江夷字茂逺濟陽考城人也祖晉䕶軍將軍父敳驃騎諮議參軍夷少自藻厲為後進之美宋武帝板為鎮軍行參軍預討桓𤣥功封南郡州陵縣五等侯累遷大司馬武帝命大司馬府琅邪國事一以委焉武帝受命歴位吏部尚書呉郡太守營陽王於呉縣見害夷臨哭盡禮以兄疾去官後為右僕射夷美風儀善舉止歴任以和簡著穪出為湘州刺史加散騎常侍未之職卒遺令薄斂蔬奠務存儉約子湛湛字徽深居喪以孝聞愛文義善彈棋鼔琴兼明算術為彭城王義康司徒主簿太子中舍人司空檀道濟為子求娶湛妹不許義康有命又不從時人重其立志義康之盛人競求自昵唯湛自疎固求外出乃以為武陵内史随王誕為北中郎將南徐州刺史以湛為長史南東海太守委以政事元嘉二十五年徵為侍中任以機密遷左衛將軍時改選學職以太尉江夏王義恭領國子祭酒湛領博士轉吏部尚書家甚貧不營財利餉饋盈門一無所受無兼衣餘食嘗為上所召遇澣衣穪疾經日衣成然後起牛餓御人求草湛良乆曰可與飲在選職頗有刻覈之譏而公平無私不受請謁論者以此穪焉初上大舉北侵舉朝謂為不可唯湛贊成之及魏太武至𤓰歩以湛兼領軍軍事處分一以委焉魏遣使求昏上召太子劭以下集議衆竝謂宜許湛謂許之無益劭怒謂湛曰今三王在阨詎宜茍執異議聲色甚厲坐散俱出劭使班劍及左右推排之殆於傾倒劭後宴集未嘗命湛上乃為劭長子偉之娉湛第三女欲以和之上將廢劭使湛具詔草劭之入殺湛直上省聞呌乃匿傍小屋劭遣求之舍吏紿云不在此兵即殺舍吏乃得見湛湛據窻受害意色不撓五子恁恕憼愻法夀皆見殺初湛家數見怪異未敗少日所眠牀忽有數斗血孝武即位追贈左光祿大夫開府儀同三司諡曰忠簡公恁位著作佐郎恁子斆斆字叔文母宋文帝女淮陽長公主幼以戚屬召見孝武謂謝莊曰此小兒方當為名器少有美譽尚孝武女臨汝公主拜駙馬都尉為丹陽丞時袁粲為尹見斆歎曰風流不墜政在江郎數與宴賞留連日夜遷中書郎斆庶祖母王氏老疾斆視膳嘗藥七十餘日不解衣及累居内官毎以侍飬陳請朝廷優其朝直初湛娶褚秀之女大義不終褚彦回為衛軍重斆為人先通意引為長史随府轉司空長史領臨淮太守轉齊髙帝太尉從事中郎齊臺建為吏部郎髙帝即位斆以祖母乆疾啓求自解初宋明帝勑斆出繼其叔愻為從祖淳後於是僕射王儉啓禮無後小宗之文近代緣情皆由父祖之命未有既孤之後出繼宗族也雖復臣子一揆而義非天屬江忠簡𦙍嗣所寄唯斆一人傍無期屬斆宜還本若不欲江愻絶後可以斆小兒繼愻為孫尚書參議謂間世立後禮無其文荀顗無子立孫墜禮之始何琦又立此論義無所據於是斆還本家詔使自量立後者出為豫章内史還除太子中庶子未拜門客通贓利武帝遣使檢覆斆藏此客而躬自引咎上甚有怪色王儉從容啓上曰江斆若能臨郡此便是具美耳上意乃釋永明中為竟陵王司馬斆好文辭圍棋第五品為朝貴中最遷侍中歴五兵尚書東陽呉二郡太守復為侍中轉都官尚書領驍騎將軍王晏啓武帝曰江斆今重登禮閣兼掌六軍慈渥所覃實有優忝但語其事任殆同閑輩天㫖既欲升其名位愚謂以侍中領驍騎望實清顯有殊納言上曰斆常啓吾為其鼻中惡今既以何𦙍王瑩還門下故有此回換耳先是中書舍人紀僧真幸於武帝稍歴軍校容表有士風謂帝曰臣小人出自本縣武吏邀逢聖時階榮至此為兒昏得荀昭光女即時無復所湏唯就陛下乞作士大夫帝曰由江斆謝􅊪我不得措此意可自詣之僧真承㫖詣斆登榻坐定斆便命左右曰移吾牀讓客僧真喪氣而退告武帝曰士大夫故非天子所命時人重斆風格不為權倖降意隆昌元年為侍中領國子祭酒鬰林廢朝臣皆被召入宫斆至雲龍門方知廢立託散動醉吐車中而去明帝即位改領祕書監又改領晉安王師卒遺令不受賻贈詔賻錢三萬布百疋子蒨啓遵斆命不受詔嘉美之從其所請贈散騎常侍太常卿諡曰敬子子蒨蒨字彦標幼聰警讀書過口便誦選為國子生舉髙弟起家祕書郎累遷廬陵王主簿居父憂以孝聞廬于墓側明帝起兵遣寧朔將軍劉諓之為郡蒨拒之及建業平蒨坐禁錮俄被原歴太尉臨川王長史尚書吏部郎領右軍方雅有風格僕射徐勉權重唯蒨及王規與抗禮不為之屈勉因蒨門客翟景為子繇求昏於蒨女不答景再言之乃杖景四十由此與勉忤勉又為子求蒨弟葺及王泰女二人竝拒之葺為吏部郎坐杖曹中幹免官泰以疾假出宅乃遷散騎常侍皆勉意也初天監六年詔以侍中常侍竝侍帷幄分門下二局入集書其官品視侍中而非華胄所悦故勉斥泰為之蒨尋遷司徒左長史初王泰出閣武帝謂勉云江蒨資歴應居選部勉曰蒨有眼患又不悉人物乃止遷光祿大夫卒諡肅蒨好學尤悉朝儀故事撰江左遺典三十卷未就卒文集十五卷蒨弟曇字彦德少學渉有器度位侍中太子詹事承聖初卒曇弟祿祿字彦遐幼篤學有文章工書善琴形貎短小神明俊發位太子洗馬湘東王錄事參軍以氣陵府王王深憾焉廬陵威王續代為荆州留為驃騎諮議參軍獻書告别王答書乃致恨祿先為武寧郡頗有資産積錢於壁壁為之倒迮銅物皆鳴人戲之曰所謂銅山西傾洛鍾東應者也湘東王恨之既深以其名祿改字曰榮財以志其忿後為唐侯相卒撰列仙傳十卷行於世及井絜臯木人賦敗船詠竝以自喻子徽亦有文采而清狂不慧常以父為戲蒨子紑紑字含絜幼有孝性年十三父蒨患眼紑侍疾將期月衣不解帶夜夣一僧云患眼者飲慧眼水必差及覺説之莫能解者紑第三叔祿與草堂寺智者法師善往訪之智者曰無量夀經云慧眼見真能度彼岸蒨乃因智者啓捨同夏縣界牛屯里合為寺乞賜嘉名勑答云純臣孝子往往感應晉時顔含遂見冥中送藥又近見智者以卿第二息夣云飲慧眼水慧眼則五眼之一號可以慧眼為名及就創造泄故井井水清洌異於恒泉依夣取水洗眼及煮藥稍覺有瘳因此遂差時人謂之孝感南康王為徐州召為迎主簿紑性沉静好莊老𤣥言尤善佛義不樂進仕及父卒紑廬于墓終日號慟不絶聲月餘乃卒子揔揔字揔持七歳而孤依于外氏幼聰敏有至性元舅呉平侯蕭勵名重當世特所鍾愛謂曰爾神采英㧞後之知名當出吾右及長篤學有文辭仕梁為尚書殿中郎武帝撰正言始畢製述懐詩揔預同此作帝覽揔詩深見嗟賞轉侍郎尚書僕射范陽張纘度支尚書琅邪王筠都官尚書南陽劉之遴竝髙才碩學揔時年少有名纘等雅相推重為忘年友㑹之遴嘗酬惚詩深相欽挹累遷太子中舍人侯景寇建鄴詔以揔權兼太常卿守小廟臺城陷避難㑹稽郡憩於龍華寺乃製脩心賦揔第九舅蕭勃先據廣州又自㑹稽往依焉及元帝平侯景徵為始興内史㑹魏剋江陵不行自此流寓嶺南積歳陳天嘉四年以中書侍郎徴還累遷左戸尚書轉太子詹事揔性寛和温裕尤工五言七言溺於浮靡及為宫端與太子為長夜之飲飬良娣陳氏為女太子亟微行遊揔家宣帝怒免之後又歴侍中左戸尚書後主即位歴吏部尚書僕射尚書令加秩既當權任宰不持政務但日與後主遊宴後庭多為豔詩好事者相傳諷翫于今不絶唯與陳睻孔範王瑳等十餘人當時謂之狎客由是國政日頽綱紀不立有言之者輒以罪斥之君臣昏亂以至于滅禎明三年陳亡入隋拜上開府開皇十四年卒於江都年七十六其為自序云太建之時權移羣小諂嫉作威屢被摧黜奈何命也識者譏其言跡之乖有文集三十卷長子溢頗有文辭性慠誕驕物雖近屬故友不免詆欺歴中書黃門侍郎太子中庶子入隋為秦王文學卒江智深夷之弟子也父僧安宋太子中庶子夷有盛名夷子湛又有清譽父子竝貴達智深父少無名問湛禮敬甚簡智深常以為恨自非節歳不入湛門及為随王誕後軍參軍在襄陽誕待之甚厚時諮議參軍謝莊主簿沈懷文與智深友善懷文每穪曰人所應有盡有所應無盡無者其江智深乎元嘉末除尚書庫部郎時髙流官序不為臺郎智深門孤援寡獨有此選意甚不悦固辭不拜後為竟陵王誕司空主簿記室參軍領南濮陽太守遷從事中郎誕將為逆智深悟其機請假先反誕事發即除中書侍郎智深愛好文雅辭采清贍孝武深相知待恩禮冠朝上宴私甚數多命羣臣五三人遊集智深常為其首同侣未及前輒獨䝉引進每以越衆為慙未嘗有喜色每從遊幸與羣僚相随見傳詔馳來知常呼己聳動愧恧形於容貎論者以此多之遷驍騎將軍尚書吏部郎上每酣宴輒詆羣臣并使自相嘲訐以為歡笑智深素方退漸不㑹㫖上嘗使王僧朗戲其子景文智深正色曰恐不宜有此戲上怒曰江僧安癡人癡人自相惜智深伏席流涕由是恩寵大衰出為新安王子鸞北中郎長史南東海太守行南徐州事初上寵姬宣貴妃殷氏卒使羣臣議諡智深上議曰懷上以不盡嘉號甚銜之後車駕幸南山乘馬至殷氏墓羣臣皆騎從上以馬鞭指墓石柱謂智深曰此柱上不容有懷字智深益惶懼以憂卒子筠太子洗馬早卒後廢帝皇后筠之女也廢帝即位以后父追贈金紫光祿大夫筠妻王平望鄉君智深兄子槩早孤智深飬之如子槩歴黃門吏部郎侍中武陵王贊北中郎長史江秉之字𤣥叔濟陽考城人也祖逌晉太常父纂給事中秉之少孤弟妹七人竝幼撫育姻娶盡其心力宋少帝時為永世烏程令以善政著名東土徵為建康令為政嚴察部下肅然後為山隂令人戸三萬政事繁擾訟訴殷積階庭常數百人秉之御繁以簡常得無事宋世唯顧顗之亦以省務著績其餘雖復刑政脩理而未能簡事以在縣有能出補新安太守元嘉十二年轉任臨海竝以簡約見穪卒於官所得秩悉散之親故妻子常飢寒人有勸其營田秉之正色答曰食祿之家豈可與農人競利在郡作書案一枚去官留以付庫秉之宗人邃之字𤣥逺頗有文義撰文釋傳於世位司徒記室參軍秉之子徽尚書都官郎呉令元凶殺徐湛之子徽以黨與見誅子謐謐字令和父徽遇禍謐繫尚方宋孝武平建業乃得出為于湖令彊濟穪職宋明帝為兖州謐傾身奉事為帝所待即位以為驃騎參軍弟䝉貎醜帝常召見狎侮之謐再遷右丞兼比部郎太始四年江夏王義恭第十五女卒年十九未笄禮官議從成人服諸王服大功左丞孫敻重奏禮記女子十五而笄鄭𤣥云應年許嫁者也其未許嫁者則二十而笄射慈云十九猶為殤禮官違越經典於理無據太常以下結免贖論謐坐杖督五十奪勞百日謐又奏敻先不研辯混同謬議凖以事例亦宜及咎敻又結免贖論詔可出為建平王景素冠軍長史長沙内史行湘州事政敎苛刻僧遵道又與謐情欵随謐莅郡犯小事餓繫郡獄僧遵道裂三衣食之盡而死為有司奏徴還明帝崩遇赦免齊髙帝領南兖州謐為鎮軍長史廣陵太守入為遊撃將軍性疏俗善趨時利元徽末朝野咸屬意建平王景素謐深自委結景素事敗僅得免禍蒼梧王廢後物情尚懐疑貳謐獨竭誠歸事齊髙帝昇明元年為黃門侍郎領尚書左丞沈攸之事起議加髙帝黃鉞謐所建也事寧遷吏部郎齊建元元年位侍中既而驃騎豫章王嶷領湘州以謐為長史封永新縣伯三年為左戸尚書諸皇子出閣用文武主帥悉以委謐尋勑選曰江謐寒士誠當不得競等華儕然甚有才幹可遷掌吏部謐才長刀筆所在幹職髙帝崩謐穪疾不入衆頗疑其怨不預顧命武帝即位謐又不遷官以此怨望時武帝不豫謐詣豫章王嶷請問曰至尊非起疾東宫又非才公今欲何計武帝知之出謐為鎮北長史南東海太守未發憂甚乃以奕棋占卦云有客南來金椀玉杯上使御史中丞沈沖奏謐前後罪惡請收送廷尉詔赐死果以金甖盛藥鴆之子介建武中為呉令政亦深苛人門榜死人髑髏為謐首介棄官而去論曰敬元夷簡歸譽𤣥保𢎞懿見推其取重於世豈虚名也然𤣥保時隆帝念雖命禀於𤣥天跡其恩寵蓋亦猶賢之助沈氏世傳武節而演之以業尚見知綢繆帷幄遂參機務處黙保閑篤素叔源節見臨危懿德髙風所謂世有人矣茂逺自晉及陳雅道相係奕世載德斯之謂焉而揔溺於寵狎反以文雅為敗然則士之成名所貴彬彬而已𤣥叔清介著美足以追踪古烈令和窺覘成性終取躓於險塗宜矣南史卷三十六南史卷三十六考證羊𤣥保傳祖楷楷監本作揩今从閣本江秉之傳元凶殺徐湛之子徽以黨與見誅上云秉之子徽則此子字疑衍南史卷三十六考證
