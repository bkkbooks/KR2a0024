body:
  text: 南史卷六十唐李延壽撰列傳第五十范岫傅昭弟映孔休源江革子徳藻徐勉許懋子亨殷鈞宗人芸范岫字懋賓濟陽考城人也髙祖宣晉徵士父羲宋尚書殿中郎本州别駕竟陵王誕反羲在城中事平遇誅岫幼而好學早孤事母以孝聞外祖顔延之早相題目以為中外之寳蔡興宗臨荆州引為主簿及蔡將卒以岫貧乏遺㫖賜錢二十萬固辭拒之仕齊為太子家令文惠太子之在東宮沈約之徒以文才見引岫亦預焉岫文雖不逮約而名行為時軰所與博渉多通尤悉魏晉以來吉凶故事約常穪曰范公好事該博胡廣無以加南鄉范雲謂人曰諸君進止威儀當問范長頭以岫多識前代舊事也遷國子博士岫長七尺八寸姿容奇偉永明中魏使至詔妙選朝士有辭辯者接使於界首故以岫兼淮隂長史迎焉入為尚書左丞丁母憂居喪過禮朝廷頻起並不拜朝廷亮其哀款得終喪制出為安成内史創立鈞折行倉公私𢎞益徵黄門侍郎兼御史中丞吏將送一無所納永元末為輔國將軍冠軍晉安王長史行南徐州事梁武帝平建鄴承制徵為尚書吏部郎參大選天監五年為散騎常侍光禄大夫侍皇太子給扶累遷祠部尚書金紫光禄大夫卒官岫恭敬儼恪進止以禮自親喪後蔬食布衣以終身每所居官恒以廉絜著稱為長城令時有梓材巾箱至數十年經貴遂不改易在晉陵唯作牙管筆一雙猶以為費所著文集禮論雜儀字訓行於世二子褒偉傅昭字茂逺北地靈州人晉司𨽻校尉咸七世孫也祖和之父淡善三禮知名宋世淡事宋竟陵王誕誕反坐誅昭六歲而孤哀毁如成人為外祖所養十歲於朱雀航賣歴日雍州刺史袁顗見而奇之顗嘗來昭所昭讀書自若神色不改顗歎曰此兒神情不凡必成佳器司徒建安王休仁聞而悦之固欲致昭昭以宋氏多故遂不往或有穪昭於廷尉虞愿乃遣車迎昭時愿宗人通之在坐並當時名流通之貽昭詩曰英妙擅山東才子傾洛陽清塵誰能嗣及爾遘遺芳太原王延秀薦昭於丹陽尹袁粲深見禮辟為郡主簿使諸子從昭受學㑹明帝崩粲造哀䇿文乃引昭定其所製昭有其半焉粲每經昭户輒歎曰經其户寂若無人披其室其人斯在豈非名賢尋為總明學士奉朝請齊永明中累遷尚書儀曹郎先是御史中丞劉休薦昭於齊武帝永明初以昭為南郡王侍讀王嗣帝位故時臣𨽻爭求權寵唯昭及南陽宗夬保身而已守正無所參入竟不罹禍明帝踐阼引昭為中書通事舍人時居此職者皆權傾天下昭獨廉靜無所干豫器服率陋身安麤糲常揷燭板牀明帝聞之賜漆合燭盤敕曰卿有古人之風故賜卿古人之物累遷尚書左丞梁武帝素重昭梁臺建以為給事黄門侍郎領著作兼御史中丞天監三年兼五兵尚書參選事四年即真歴位左户尚書安成内史郡自宋來兵亂相接府舍穪凶毎昏旦間人鬼相觸在任者鮮以吉終及昭至有人夜見甲兵出曰傅公善人不可侵犯乃騰虚而去有頃風雨忽至飄郡聽事入隍中自是郡遂無患咸以昭貞正所致郡溪無魚或有暑月薦昭魚者昭既不納又不欲拒遂餧于門側郡多猛獸為害常設檻穽昭曰人不害猛獸猛獸亦不害人乃命去檻穽猛獸竟不為害歴祕書監太常卿遷臨海太守郡有宻巖前後太守皆自封固専收其利昭以周文之囿與百姓共之大可喻小乃教勿封縣令嘗餉栗置絹于簿下昭笑而還之普通五年為散騎常侍金紫光禄大夫昭所莅官常以清靜為政不尚嚴肅居朝廷無所請謁不畜私門生不交私利終日端居以書記為樂雖老不衰博極古今尤善人物魏晉以來官宦簿閥姻通内外舉而論之無所遺失世穪為學府性尤篤慎子婦嘗得家餉牛肉以進昭昭召其子曰食之則犯法告之則不可取而埋之其居身行已不負闇室類皆如此後進宗其學重其道人人自以為不逮卒諡曰貞長子諝位尚書郎湘東王外兵參軍諝子準有文才梁宣帝時位度支尚書昭弟映字徽逺三嵗而孤兄弟友睦脩身勵行非禮不動始昭之守臨海陸倕餞之賓主俱懽日暮不反映以昭年髙不可連夜極樂乃自往候接同乘而歸兄弟並已斑白時人美而服焉及昭卒映喪之如父年踰七十哀戚過禮服制雖除毎言輒慟天監中位烏程令卒於太中大夫子𢎞孔休源字慶緖㑹稽山隂人晉尚書沖之八世孫沖即開府儀同三司愉之世父也曾祖遥之宋尚書水部郎父佩齊通直郎休源十一而孤居喪盡禮毎見父手所寫書必哀慟流涕不能自勝見者莫不為之垂泣後就吳興沈麟士受經略通大義州舉秀才太尉徐孝嗣省其䇿深善之謂同坐曰董仲舒華令思何以尚此可謂後生之準的也觀此足穪王佐之才琅邪王融雅相友善乃薦之於司徒竟陵王為西邸學士梁臺建與南陽劉之遴同為太學博士當時以為美選休源初到都寓於宗人少府孔登曽以祠事入廟侍中范雲一與相遇深加襃賞曰不期忽覯清顔頓祛鄙吝觀天披霧騐之今日後雲命駕到少府登便拂筵整帶謂當詣已備水陸之品雲駐筯命休源及至命取其常膳止有赤倉米飯蒸鮑魚雲食休源食不舉主人之饌髙談盡日同載還家登深以為愧尚書令沈約當朝貴顯軒蓋盈門休源或時後來必虚襟引接處之坐右商略文義其為通人所推如此武帝嘗問吏部尚書徐勉求一有學藝解朝儀者為尚書儀曹郎勉曰孔休源識見清通詳練故事自晉宋起居注誦略上口武帝亦素聞之即日除兼尚書儀曹郎時多所改作毎逮訪前事休源即以所誦記隨機斷決曾無疑滯吏部郎任昉常謂之為孔獨誦遷建康獄正平反辯析時罕寃人後有選人為獄司者帝常引休源以勵之除中書舍人後為尚書左丞彈肅禮闈雅允朝望時周捨撰禮疑義自漢魏至于齊梁並皆搜采休源所有奏議咸預編録再遷長兼御史中丞正色直繩無所廻避百寮憚之後為晉安王長史南郡太守行荆州府州事帝謂曰荆州總上流衝要義髙分陜今以十嵗兒委卿善匡翼之勿憚周昌之舉也乃敕晉安王曰孔休源人倫儀表汝年尚㓜當每事師之尋始興王憺代鎮荆州復為憺府長史太守行府事如故在州累政甚有治績平心決斷請託弗行帝深嘉之歴祕書監復為晉安王府長史南蘭陵太守别敕専行南徐州事休源累佐名蕃甚得人譽王深相倚仗常於中齎别施一榻云此是孔長史坐人莫得預焉其見敬如此歴都官尚書普通七年揚州刺史臨川王宏薨武帝與羣臣議代居州任者時貴戚王公咸望遷授帝曰朕已得人孔休源才識通敏寔應此選乃授宣惠將軍監揚州事休源初為臨川王行佐及王薨而管州任時論榮之神州都㑹簿領殷繁休源剖斷如流傍無私謁中大通二年加金紫光禄大夫在州晝決辭訟夜覽墳籍每車駕廵幸常以軍國事委之昭明太子薨有敕夜召休源入宴居殿與羣公參定謀議立晉安王綱為皇太子自公卿珥貂揷筆奏決於休源前休源怡然無愧時人名為兼天子四年卒遺令薄葬節朔薦蔬菲而已帝為之流涕顧謝舉曰孔休源居職清忠方欲共康政道奄至隕沒朕甚痛之舉曰此人清介彊直臣竊為陛下惜之諡曰貞子休源風範彊正明練政體常以天下為己任武帝深委仗之累居顯職性縝密未嘗言禁中事聚書盈七千卷手自校練凡奏議彈文勒成十五卷長子雲章頗有父風位東揚州别駕少子宗範聰敏有識度位中書郎江革字休映濟陽考城人也祖齊之宋都水使者尚書金部郎父柔之齊尚書倉部郎有孝行以母憂毁卒革幼而聰敏早有才思六歳便解屬文柔之深加賞器曰此兒必興吾門九嵗丁父艱與第四弟觀同生少孤貧傍無師友兄弟自相訓朂讀書精力不倦十六喪母以孝聞服闋與觀俱詣太學補國子生舉髙第齊中書郎王融吏部郎謝朓雅相欽重朓嘗行還過候革時大寒雪見革弊絮單席而耽學不倦嗟歎久之乃脱其所著襦并手割半氊與革充臥具而去司徒竟陵王聞其名引為西邸學士弱冠舉南徐州秀才時豫章胡諧之行州事王融與諧之書令薦革諧之方貢琅邪王汎便以革代之僕射江袥深相引接袥為太子詹事啓革為丞袥時權傾朝右以革才堪經國令參掌機務詔誥文檄皆委以具革防杜形迹外人不知袥誅賓客皆罹其罪革獨以智免除尚書駕部郎中興元年梁武帝入石頭時吳興太守袁昂據郡拒義不從革製書與昂於坐立成辭義典雅帝深賞歎之令與徐勉同掌書記建安王為雍州刺史表求管記以革為征北記室參軍帶中廬令與弟觀少長共居不忍離别苦求同行以觀為征北行參軍兼記室時吳興沈約樂安任昉與革書云比聞雍府妙選英才文房之職總卿昆季可謂馭二龍於長途騁騏驥於千里途次江夏觀卒革在雍州為府王所禮款若布衣後為建康正頻遷秣陵建康令為政明肅豪彊憚之歴中書舍人尚書左丞晉安王長史尋陽太守行江州府事徙廬陵王長史太守行事如故以清嚴為屬城所憚時少王行事多傾意於籤帥革以正直自居不與典籤趙道智坐道智因還都啓事面陳革墮事好酒以琅邪王曇聰代為行事南州士庶為之語曰故人不道智新人佞散騎莫知度不度新人不如故遷御史中丞彈奏豪權一無所避後為鎮北豫章王長史廣陵太守時魏徐州刺史元法僧降附革被敕随府王鎮彭城城既失守革素不便馬汎舟而還途經下邳為魏人所執魏徐州刺史安豐王延明聞革才名厚加接待革穪腳疾不拜延明將害之見革辭色嚴正更加敬重時祖暅同被拘縶延明使暅作欹器漏刻銘革唾罵暅曰卿荷國厚恩已無報答乃為虜立銘孤負朝廷延明聞之乃令革作丈八寺碑并祭彭祖文革辭以囚執既久無復心思延明將加箠扑革厲色曰江革年六十不能殺身報主今日得死為幸誓不為人執筆延明知不可屈乃止日給脱粟三升僅餘性命㑹魏帝請中山王元略反北乃放革及祖暅還朝上大宴舉酒勸革曰卿那不畏延明害對曰臣行年六十死不為夭豈畏延明帝曰今日始見蘇武之節於是以為太尉臨川王長史時帝惑於佛教朝賢多啓求受戒革精信因果而帝未知謂革不奉佛法乃賜革覺意詩五百字云唯當勤精進自彊行勝脩豈可作底突如彼必死囚以此告革及諸貴遊又手敕曰果報不可不信豈可底突如對元延明邪革因乞受菩薩戒時武陵王紀在東州頗驕縱上以臧盾性弱不能匡正召革慰遣乃除武陵王長史㑹稽郡丞行府州事革門生故吏家多在東聞革應至並賫持緣道迎候革曰我通不受餉不容獨當故人筐篚至鎮唯資公俸食不兼味郡境殷廣辭訟日數百革分判辯析曾無疑滯人安吏畏百城震恐琅邪王騫為山隂令贓貨狼籍望風自解府王憚之毎侍讌言論必以詩書王因此躭學好文典籤沈熾文以王所制詩呈武帝帝謂僕射徐勉曰革果穪職乃除都官尚書將還贈遺一無所受送故依舊訂舫革並不納唯乘臺所給一舸舸艚偏欹不得安臥或請濟江徙重物以迮輕艚革既無物乃於西陵岸取石十餘片以實之其清貧如此尋監吳郡時境内荒儉刧盜公行革至郡唯有公給仗身二十人百姓皆懼不能靜寇革乃省游軍尉百姓逾恐革乃廣施恩惠盜賊盡息武陵王出鎮江州乃曰我得江革又得革清貧豈能一日忘之當與其同飽乃表革同行除南中郎長史尋陽太守徵入為度支尚書好奬進閭閻為後生延譽由是衣冠士子翕然歸之時尚書令何敬容掌選序用多非其人革性彊直每朝宴恒有襃貶以此為權貴所疾乃謝病還家除光禄大夫優游閑放以文酒自娛卒諡曰彊子有集二十卷行於世革歴官八府長史四王行事三為二千石傍無姬侍家徒壁立時以此髙之長子敏早卒次子徳藻德藻字德藻好學美風儀身長七尺四寸性至孝事親盡禮與異産昆弟居恩惠甚篤渉獵經籍善屬文仕梁為尚書比部郎以父憂去職服闋後容貌毁瘠如居喪時及陳武帝受禪為祕書監兼尚書左丞尋以本官兼中書舍人天監中兼散騎常侍與中書郎劉師知使齊著北征道里記三卷還除太子中庶子遷御史中丞坐公事免後自求宰縣補新渝令政尚恩惠頗有異績卒於官文帝贈散騎常侍文筆十五卷子椿亦善屬文位尚書右丞德藻弟從簡少有文情年十七作采荷調以刺何敬容為當時所賞位司徒從事中郎侯景亂為任約所害子兼叩頭流血乞代父命以身蔽刃遂俱見殺天下痛之徐勉字脩仁東海郯人也祖長宗宋武帝霸府行參軍父融南昌相勉糿孤貧早勵清節年六嵗屬霖雨家人祈霽率爾為文見穪耆宿及長好學宗人孝嗣見之歎曰此所謂人中之騏驥必能致千里又嘗謂諸子曰此人師也爾等則而行之年十八召為國子生便下帷專學精力無怠同時儕軰肅而敬之祭酒王儉毎見常目送之曰此子非常器也毎穪有宰輔之量射䇿甲科起家王國侍郎補太學博士時每有議定勉理證明允莫能貶奪同官咸取則焉遷臨海王西中郎田曹行參軍俄徙署都曹時琅邪王融一時才儁特相慕悦嘗請交焉勉謂所親曰王郎名髙望促難可輕􅗓衣裾融後果陷於法以此見推識鑒累遷領軍長史初與長沙宣武王游梁武帝深器賞之及武帝兵至建鄴勉於新林謁見帝甚加恩禮使管書記及帝即位拜中書侍郎進領中書通事舍人直内省遷臨川王後軍諮議尚書左丞自掌樞憲多所糾舉時論以為穪職天監三年除給事黄門侍郎尚書吏部郎參掌大選遷侍中時師方侵魏候驛填委勉參掌軍書劬勞夙夜動經數旬乃一還家羣犬驚吠勉歎曰吾憂國忘家乃至於此若吾亡後亦是傳中一事六年除給事中五兵尚書遷吏部尚書勉居選官彛倫有序既閑尺牘兼善辭令雖文案填積坐客充滿應對如流手不停筆又該綜百氏皆避其諱嘗與門人夜集客有虞暠求詹事五官勉正色答云今夕止可談風月不宜及公事故時人服其無私天監初官名互有省置勉撰立選簿奏之有詔施用其制開九品為十八班自是貪冒茍進者以財貨取通守道淪退者以貧寒見沒矣後為左衛將軍領太子中庶子侍東宮昭明太子尚糿敕知宮事太子禮之甚重毎事詢謀嘗於殿講孝經臨川王宏尚書令沈約備二傅勉與國子祭酒張充為執經王瑩張稷柳憕王暕為侍講時選極親賢妙盡人譽勉陳讓數四又與沈約書求換侍講詔弗許然後就焉舊揚徐首迎主簿盡選國華中正取勉子崧充南徐選首帝敕之曰卿寒士而子與王志子同迎偃王以來未之有也勉耻以其先為戲答旨不恭由是左遷散騎常侍領游擊將軍後為太子詹事又遷尚書右僕射詹事如故時人間喪事多不遵禮朝終夕殯相尚以速勉上疏曰禮記問喪云三日而後歛者以俟其生也三日而不生亦不生矣頃來不遵斯制送終之禮殯以朞日潤屋豪家乃或半晷衣衾棺槨以速為榮親戚徒𨽻各念休反故屬纊纔畢灰釘已具忘狐鼠之顧歩媿燕雀之徊翔傷情㓕理莫此為大且人子承衾之時志懑心絶喪事所資悉關他手愛憎深淺事寔難原如覘視或爽存沒違濫使萬有其一怨酷已多豈若緩其告歛之辰申其望生之兾請自今士庶宜悉依古三日大歛如其不奉加以糾繩詔可其奏又除尚書僕射中衛將軍勉以舊恩繼升重位盡心奉上知無不為爰自小選迄于此職常參掌衡石甚得士心禁省中事未嘗漏泄毎有表奏輒焚藁草博通經史多識前載齊世王儉居職已後莫有逮者朝儀國典昏冠吉凶勉皆預圖議初勉受詔知撰五禮普通六年功畢表上之曰夫禮以安上化人𢎞風訓俗經國家利後嗣者也唐虞三代咸必由之在乎有周憲章尤備因殷革夏損益可知雖復經禮三百曲禮三千經文三百威儀三千其大歸有五即宗伯所掌典禮吉為上凶次之賓次之軍次之嘉為下也故祠祭不以禮則不齊不莊喪紀不以禮則背死忘生者衆賓客不以禮則朝覲失其儀軍旅不以禮則致亂於師律冠昏不以禮則男女失其時為國脩身於斯攸急洎周室大壞王道既衰官守斯文日失其序暴秦滅學埽地無餘漢氏鬱興日不暇給猶命叔孫於外野方知帝王之為貴末葉紛綸遞有興毁及東京曹襃南宮制述集其散略百有餘篇雖寫以尺簡而終闕平奏其後兵革相尋異端互起章句既淪爼豆斯輟方領矩歩之容事滅於旌鼓蘭臺石室之典用盡於帷蓋至乎晉氏爰定新禮荀顗制之於前摰虞刪之於末既而中原喪亂罕有所遺江左草創因循而已釐革之風是則未暇伏惟陛下睿明啓運光天改物撥亂惟武經俗以文作樂在乎功成制禮𢎞於業定伏尋所定五禮起齊永明二年太子歩兵校尉伏曼容表求制一代禮樂于時參議置新舊學士十人止脩五禮諮禀衛將軍丹陽尹王儉學士亦分住郡中制作歴年猶未克就及文憲薨遺文散逸又以事付國子祭酒何𦙍經渉九載猶復未畢建武四年𦙍還東山齊明帝敕委尚書令徐孝嗣舊事本末隨在南第永元中孝嗣於此遇禍又多零落當時鳩集所餘權付尚書左丞蔡仲熊驍騎將軍何佟之共掌其事時禮局住在國子學中門外東昏之時頻有軍火其所散失又踰大半天監元年佟之啓審省置之宜敕使外詳時尚書參詳以天地初革庶務權輿宜俟隆平徐議刪撰欲且省禮局併還尚書儀曹詔㫖云禮壞樂􅆙故國異家殊寔宜以時修定以為永準於是尚書僕射沈約等參議請五禮各置舊學士一人人各自舉學士二人相助抄撰其中有疑者依前漢石渠後漢白虎随源以聞請㫖斷決乃以舊學士右軍記室參軍明山賓掌吉禮中軍騎兵參軍嚴植之掌凶禮中軍田曹行參軍兼太常丞賀瑒掌賓禮征虜記室參軍陸璉掌軍禮右軍參軍事司馬褧掌嘉禮尚書右丞何佟之總參其事佟之亡後以鎮北諮議參軍伏暅代之後又以暅代嚴植之掌凶禮暅尋遷官以五經博士繆昭掌凶禮復以禮儀深廣記載殘􅆙宜須博論共盡其致更使鎮軍將軍丹陽尹沈約太常卿張充及臣三人同參厥務臣又奉别敕總知其事末又使中書侍郎周捨庾於陵二人復豫參知若有疑義所掌學士當職先立議通諮五禮舊學士及參知各言同異條牒啓聞決之制㫖疑事既多嵗時又積制㫖裁斷其數不少莫不網羅經誥玉振金聲凡諸奏決皆載篇首具列聖㫖為不刋之則寜孝宣之能擬豈孝章之足云五禮之職事有繁簡及其列畢不得同時嘉禮儀注以天監六年五月七日上尚書合十有二帙一百一十六卷五百三十六條賓禮儀注以天監六年五月二十日上尚書合十有七帙一百三十三卷五百四十五條軍禮儀注以天監九年十月二十九日上尚書合十有八帙一百八十九卷二百四十條吉禮儀注以天監十一年十一月十日上尚書合二十有六帙二百二十四卷一千五條凶禮儀注以天監十一年十一月十七日上尚書合四十有七帙五百一十四卷五千六百九十三條大凡一百二十帙一千一百七十六卷八千一十九條又列副祕閤及五經典書各一通繕寫校定以普通五年二月始獲洗畢竊以撰正履禮歴代罕就皇明在運厥功克成周代三千舉其盈數今之八千随事附益質文相變故其數兼倍猶如八卦之爻因而重之錯綜成六十四也臣以庸識謬司其任淹留歴稔允當斯責兼勒成之初未遑表上寔由才輕務廣思力不周永言慙惕無忘寤寐自今春輿駕將親六師搜尋軍禮閱其條章靡不該備可以懸諸日月頒之天下者矣詔有司案以遵行尋加中書令勉以疾求解内任詔不許乃令停下省三日一朝有事遣主書論決患腳轉劇久闕朝覲固求陳解詔許疾差還省勉雖居顯職不營産業家無畜積奉禄分贍親族之貧乏者門人故舊或從容致言勉乃答曰人遺子孫以財我遺之清白子孫才也則自致輜軿如不才終為佗有嘗為書戒其子崧曰吾家本清廉故常居貧素至於産業之事所未嘗言非直不經營而已薄躬遭逢遂至今日尊官厚禄可謂備之毎念叨竊若斯豈由才致仰藉先門風範及以福慶故臻此爾古人所謂以清白遺子孫不亦厚乎又云遺子黄金滿籝不如一經詳求此言信非徒語吾雖不敏寔有本志庶得遵奉斯義不敢墜失所以顯貴以來將三十載門人故舊承薦便宜或使創闢田園或勸興立邸店又欲舳艫運致亦令貨殖聚歛若此衆事皆距而不納非謂拔葵去織且欲省息紛紜中年聊於東田開營小園者非存播藝以要利政欲穿池種樹少寄情賞又以郊際閑曠終可為宅儻獲懸車致事寔欲歌哭於斯慧日十住等既應營昏又須住止吾清明門宅無相容處所以爾者亦復有以前割西邊施宣武寺既失西廂不復方幅意亦謂此逆旅舍爾何事須華常恨時人謂是我宅古往今來豪富繼踵髙門甲第連闥洞房宛其死矣定是誰室但不能不為培塿之山聚石移果雜以花卉以娛休沐用託性靈随便架立不存廣大唯功德處小以為好所以内中逼促無復房宇近脩東邊兒孫二宅乃藉十住南還之資其中所須猶為不少既牽挽不至又不可中途而輟郊間之園遂不辦保貨與韋黯乃獲百金成就兩宅已消其半尋園價所得何以至此由吾經始歴年粗已成立桃李茂密桐竹成隂塍陌交通渠畎相屬華樓迴榭頗有臨眺之美孤峯叢薄不無糾紛之興瀆中並饒荷䓈湖裏殊富芰蓮雖云人外城闕密邇韋生欲之亦雅有情趣追述此事非有吝心蓋是事意所至爾憶謝靈運山家詩云中為天地物今成鄙夫有吾此園有之二十載今為天地物物之與我相校㡬何哉此直所餘今以分汝營小田舍親累既多理亦須此且釋氏之教以財物謂之外命外典亦穪何以聚人曰財况汝常情安得忘此聞汝所買湖熟田地甚為舄鹵彌復可安所以如此非物競故也雖事異寢丘聊可髣髴孔子曰居家理事可移於官既已營之宜使成立進退兩亡更貽耻笑若有所收獲汝可自分贍内外大小宜令得所非吾所知又復應霑之諸女爾汝既居長故有此及凡為人長殊復不易當使中外諧緝人無間言先物後已然後可貴老生云後其身而身先若能爾者更招巨利汝當自朂見賢思齊不宜忽略以棄日也棄日乃是棄身身名美惡豈不大哉可不慎歟今之所敕略言此意政謂為家以來不事資産暨立墅舍似乖舊業陳其始末無愧懷抱兼吾年時朽暮心力稍單牽課奉公略不克舉其中餘暇裁可自休或復冬日之陽夏日之隂良辰美景文案間隟負杖躡履逍遥陋館臨池觀魚披林聽鳥濁酒一杯彈琴一曲求數刻之暫樂庶居常以待終不宜復勞家間細務汝交關既定此書又行凡所資須付給如别自兹以後吾不復言及田事汝亦勿復與吾言之假使堯水湯旱豈如之何若其滿庾盈箱爾之幸遇如斯之事過並無俟令吾知也記云夫孝者善繼人之志善述人之事今且望汝全吾此志則無所恨矣第二子悱卒痛悼甚至不欲久廢王務乃為答客以自喻焉普通末武帝自算擇後宮吳聲西曲女妓各一部並華少賚勉因此頗好聲酒禄奉之外月别給錢十萬信遇之深故無與匹中大通中又以疾自陳移授特進右光禄大夫侍中中衛將軍置佐史扶如故増親信四十人兩宮參問冠盖結轍有敕每欲臨幸勉以拜伏有虧頻啓停出詔許之遂停輿駕及卒帝聞而流涕即日車駕臨殯贈右光禄大夫開府儀同三司皇太子亦舉哀朝堂有司奏諡居敬行簡曰簡帝益執心決斷曰肅因諡簡肅公勉雖骨鯁不及范雲亦不阿意茍合後知政事者莫及梁世之言相者穪范徐云善屬文勤著述雖當機務下筆不休常以起居注煩雜乃撰為流别起居注六百六十卷左丞彈事五卷在選曹撰選品三卷齊時撰太廟祝文二卷以孔釋二教殊途同歸撰㑹林五十卷凡所著前後二集五十卷又為人章表集十卷大同三年故佐史尚書左丞劉覽等詣闕陳勉行狀請刋石紀德即降詔立碑於墓焉悱字敬業糿聰敏能屬文位太子舍人掌書記累遷洗馬中舍人猶管書記出入宮坊者歴稔以足疾出為湘東王友俄遷晉安内史許懋字昭哲髙陽新城人魏鎮北將軍允九世孫也五世祖詢晉徵士祖珪宋給事著作郎桂陽太守父勇慧齊太子家令冗從僕射懋少孤性至孝居父憂執喪過禮篤志好學為州黨所穪十四入太學受毛詩旦領師説晚而覆講坐下聽者常數十百人因撰風雅比興義十五卷盛行於時尤明故事穪為儀注學起家後為豫章王行參軍轉法曹舉秀才遷鰾騎大將軍儀同中記室文惠太子聞而召之侍講於崇明殿後兼國子博士與司馬褧同志友善僕射江袥甚推重之號為經史笥梁天監初吏部尚書范雲舉懋參詳五禮除征西鄱陽王諮議參軍兼著作郎待詔文徳省時有請㑹稽封禪者武帝因集儒學士草封禪儀將行焉懋建議獨以為不可帝見其議嘉納之由是遂停十年轉太子家令凡諸禮儀多所刋正以足疾出為始平太守政有能名加散騎常侍轉天門太守中大通三年皇太子召與諸儒録長春義記四年拜中庶子是嵗卒撰述行記四卷有集十五卷子亨亨字亨道少傳家業孤介有節行博通羣書多識前代舊事甚為南陽劉之遴所重梁太清初為西中郎記室兼太常丞侯景之亂避地郢州㑹梁邵陵王自東至引為諮議參軍王僧辯之襲郢州素聞其名召為儀同從事中郎遷太尉從事中郎與吳興沈炯對掌書記府政朝務一以委之晉安王承制授給事黃門侍郎陳武帝受禪為太中大夫領大著作知梁史事初僧辯之誅也所司收僧辯及其子頠屍於方山同坎埋瘞至是無敢言者亨以故吏抗表請葬之與故義徐陵張種孔奐等相率以家財營葬凡七柩皆改窆焉光大中宣帝入輔以亨貞正有古人風甚相欽重常以師禮事之及到仲舉之謀出宣帝宣帝問亨亨勸勿奉詔宣帝即位拜衛尉卿卒於官亨初撰齊書并志五十卷遇亂亡失後撰梁史成者五十八卷梁太清之後所製文筆六卷子善心位尚書度支侍郎殷鈞字季和陳郡長平人晉荆州刺史仲堪五世孫也曽祖元素宋南康相坐元凶事誅元素娶尚書僕射琅邪王僧朗女生子寜早卒寜遺腹生子叡亦當從戮僧朗啓孝武救之得免叡有口辯司徒褚彦回甚重之謂曰諸殷自荆州以來無出卿叡歛容答曰殷族衰悴誠不如昔若此㫖為虚故不足降此㫖為實彌不可聞仕齊歴司徒從事中郎叡妻琅邪王奐女奐為雍州刺史啓叡為府長史奐誅叡亦見害鈞九歳以孝聞及長恬靜簡交游好學有思理善𨽻書為當時楷法南鄉范雲樂安任昉並穪美之梁武帝與叡少故舊以女永興公主妻鈞拜駙馬都尉歴祕書丞在職啓校定祕閤四部書更為目録又受詔料檢西省法書古迹列為品目累遷侍中東宮學士自宋齊以來公主多驕滛無行永興主加以險虐鈞形貎短小為主所憎毎被召入先滿壁為殷叡字鈞輒流涕以出主命婢束而反之鈞不勝怒而言於帝帝以犀如意擊主碎於背然猶恨鈞自侍中出為王府諮議後為明威將軍臨川内史鈞體羸多疾閉閤臥理而百姓化其徳劫盜皆奔出境嘗禽劫帥不加考掠和言誚責劫帥稽顙乞改過鈞便命遣之後遂為善人郡舊多山瘧更暑必動自鈞在任郡境無復瘧疾母憂去職居喪過禮昭明太子憂之手書誠喻服闋為散騎常侍領歩兵校尉侍東宮改領中庶子後為國子祭酒卒諡貞二子構渥鈞宗人芸芸字灌蔬倜儻不拘細行然不妄交游門無雜客勵精勤學博洽羣書幼而廬江何憲見之深相歎賞天監中位祕書監司徒左長史後直東宮學士省卒論曰范懋賓之徳美傳茂逺之清令孔休源之政事江休映之彊直並加之以學植飾之以文采其所以取髙時主豈徒然哉徐勉少而勵志發憤忘食脩身慎行運屬興王依光日月致位公輔提衡端執時無異議為梁氏宗臣信為美矣許懋業藝以經笥見推亨懐道好古以博覽歸譽其所以折議封禪求葬僧辯正直存焉豈唯文義而已古人云仁者有勇斯言近之殷鈞徳業自居又加之以政績文質斌斌亦足穪也南史卷六十南史卷六十考證傅昭傳父淡善三禮知名宋世事宋竟陵王誕事監本作仕今从閣本郡有蜜巖監本脱蜜字今从閣本増入縣令常餉栗置絹於簿下栗一本作粟孔休源傳時周捨撰禮疑義監本缺義字又下文休源所有奏議咸預編録句缺録字今俱増入江革傳㑹魏帝請中山王元畧反北請監本誤討今从魏書改正武陵王出鎮江州乃曰我得江革又得革清貧豈能一日忘之又一本作文許亨傳凡七柩皆改窆焉柩監本誤樞今改正南史卷六十考證
