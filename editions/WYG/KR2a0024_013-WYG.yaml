body:
  text: 南史卷十三唐李延夀撰列傳第三宋宗室及諸王上長沙景王道憐臨川烈武王道規鮑照營浦侯遵考從子季連武帝諸子長沙景王道憐宋武帝中弟也謝琰為徐州命為從事史武帝剋京城及平建業道憐常留侍太后後以軍功封新渝縣男從武帝征廣固所部獲慕容超以功改封竟陵縣公及討司馬休之道憐監太尉留府事江陵平為驃騎将軍開府儀同三司荆州刺史䕶南蠻校尉加都督北府文武悉配之道憐素無才能言音甚楚舉止多諸鄙拙畜聚常若不足去鎮日府庫為空徴拜司空徐兖二州刺史加都督出鎮京口武帝受命遷太尉封長沙王先是廬陵王義真為揚州刺史太后謂上曰道憐汝布衣兄弟宜用為揚州上曰寄奴於道憐豈有所惜揚州根本所寄事務至重非道憐所了太后曰道憐年五十豈不如十嵗子邪上曰車士雖為刺史事無大小皆由寄奴道憐年長不親其事於聽望不足太后乃無言竟不授永初三年薨加贈太傅葬禮依晋太宰安平王孚故事鸞路九旒黄屋左纛輼輬車挽歌二部前後羽葆鼓吹虎賁班劔百人文帝元嘉九年詔故太傅長沙景王故大司馬臨川烈武王故司徒南康文宣公劉穆之開府儀同三司華容縣公王𢎞開府儀同三司永修縣公檀道濟故青州刺史龍陽縣公王鎮惡並勒功天府配祭廟庭道憐子義欣嗣位豫州刺史鎮夀陽境内畏服道不拾遺遂為盛藩强鎮薨贈開府儀同三司諡曰成王子悼王瑾嗣傳爵至子齊受禪國除瑾弟韞字彦文位雍州刺史侍中領右衛将軍領軍将軍昇明二年被齊髙帝誅韞人才凡鄙特為明帝所寵在湘州雍州使善畫者圖其出行鹵簿羽儀常自披翫嘗以圖示征西将軍蔡興宗興宗戲之陽若不觧畫者指韞形問之曰此何人而在輿韞曰政是我其庸鄙類如此韞弟述字彦思亦甚庸劣從子俁疾危篤父彦節母蕭對之泣述嘗候之便命左右取酒肉令俁進之皆莫知其意或問焉答曰禮云有疾飲酒食肉述又嘗新有緦惨或詣之問其母安否述曰惟有愁惽次訪其子對曰所謂父子聚麀盖謂麀為憂也義欣弟義融封桂陽縣侯邑千戸凡王子為侯食邑皆千戸義融位五兵尚書領軍有質幹善於用短卒諡恭侯子孝侯覬嗣無子弟襲以子晃繼襲字茂徳性庸鄙為郢州刺史暑月露禈上聽事時綱紀政伏閤怪之訪問乃知是襲義融弟義宗㓜為武帝所愛字曰伯奴封新渝縣侯位太子左衛率坐門生杜徳靈放横打人入義宗第蔽隐免官徳靈以姿色故義宗愛寵之義宗卒於南兖州刺史諡曰惠侯子懐珍嗣無子弟彦節以子承繼彦節少以宗室清謹見知孝武時其弟遐坐通嫡母殷氏飬女雲敷殷每禁之及殷亡口血出衆疑遐行毒害孝武使彦節從弟祗諷彦節啓證其事彦節曰行路之人尚不應爾今日廼可一門同盡無容奉敕衆以此稱之後廢帝即位累遷尚書左僕射参選元徽元年領吏部加兵五百人桂陽王休範為逆中領軍劉勔出守石頭彦節權兼領軍将軍所給加兵自隨入殿封當陽侯與齊髙帝袁粲禇彦回分日入直平决機事遷中書令加撫軍将軍及帝廢為蒼梧王彦節出集議於路逢從弟韞韞問曰今日之事故當歸兄邪彦節曰吾等已讓領軍矣韞搥胸曰兄肉中詎有血邪今年族矣齊髙帝聞而惡之順帝即位轉尚書令時齊髙帝輔政彦節知運祚将遷宻懐異圖及沈攸之舉兵齊髙入屯朝堂袁粲鎮石頭潜與彦節及諸大将黄回等謀夜㑹石頭詰旦乃發彦節素怯騷擾不自安再晡後便自丹陽郡車載婦女盡室奔石頭臨去婦蕭氏强勸令食彦節歠羹冩胸中手振衣自禁其主簿丁靈衛聞難即入語左右曰今日之事難以取濟但我受劉公厚恩義無二情及至見粲粲驚曰何遽便來事今敗矣彦節曰今得見公萬死何恨從弟韞直省内與直閣将軍卜伯興謀其夜共攻齊髙帝㑹彦節事覺秣陵令劉實建康令劉遐宻告齊髙帝髙帝夜使驍騎将軍王敬則收殺之伯興亦遇害粲敗彦節踰城走於額檐湖見禽被殺彦節子俁嘗賦詩云城上草植根非不髙所恨風霜早時咸云此為祅句事敗俁與弟陔剃髪被法服向京口於客舍為人識執於建康獄盡殺之彦節既貴士子自非三署不得上方榻時人以此少之其妻蕭思話女也常懼禍敗每謂曰君富貴已足故應為児作計彦節不從故及禍彦節弟遐字彦道為嫡母殷暴亡有司糾之徙始安郡後得還位吳郡太守至是亦見誅遐人才甚凡自諱名有同主諱常對客曰孝武無道見枉殺母其頑騃若此及彦節當權遐累求方伯彦節曰我在事而用汝作州於聽望不足遐曰富貴則言不可相闗從坐之日得免不至是果死義宗弟義賓封興安侯位徐州刺史卒諡曰肅侯義賓弟義綦封營道縣侯凡鄙無識始興王濬嘗謂曰陸士衡詩云營道無烈心其何意苦阿父如此義綦曰下官初不識士衡何忽見苦其庸塞皆然位湘州刺史諡僖侯臨川烈武王道規字道則武帝少弟也倜儻有大志預謀誅桓𤣥時桓𢎞鎮廣陵以為征虜中兵参軍武帝剋京城道規亦以其日與劉毅孟昶斬𢎞𤣥敗走道規與劉毅何無忌追破之無忌欲乘勝追𤣥直造江陵道規曰諸桓世居西楚羣小皆為竭力桓振勇冠三軍且可頓兵以計策縻之無忌不從果為振敗乃退還尋陽繕舟甲復進遂平巴陵江陵之平道規推毅為元功無忌為次自居其末以起義勲封華容縣公累遷領䕶南蠻校尉荆州刺史加都督善於刑政士庶畏而愛之盧循冦逼建業道規遣司馬王鎮之及揚武将軍檀道濟廣武将軍到彦之等赴援朝廷至尋陽為循黨荀林所破林乘勝伐江陵聲言徐道覆已剋建業而桓謙自長安入蜀譙縱以謙為荆州刺史與其大将譙道福俱冦江陵道規乃㑹将士告之曰吾東來文武足以濟事欲去者不禁因夜開城門衆咸憚服莫有去者雍州刺史魯宗之自襄陽來赴或謂宗之未可測道規乃單車迎之衆咸感悦衆議欲使檀道濟到彦之共擊荀林等道規曰非吾自行不决乃使宗之居守委以心腹率諸将大敗謙斬之諮議劉遵追荀林斬之巴陵初謙至枝江江陵士庶皆與謙書言城内虚實道規一皆焚燒衆乃大安徐道覆奄至破冢魯宗之已還襄陽人情大震或傳循已剋都遣道覆上為刺史江漢士庶感其焚書之恩無復二志道規使劉遵為游軍拒道覆前驅失利道規壮􅂔愈厲遵自外横擊大破之初使遵為游軍衆咸言不宜割見力置無用之地及破道覆果得游軍之力衆乃服焉遵字慧明淮南海西人道規從母兄也位淮南太守追封監利縣侯道規進號征西大将軍開府儀同三司改授豫州以疾不拜義熈八年薨于都贈司徒諡曰烈武進封南郡公武帝受命贈大司馬追封臨川王無子以長沙景王第二子義慶嗣初文帝少為道規所養武帝命紹焉咸以禮無二繼文帝還本而定義慶為後義慶為荆州廟主當隨往江陵文帝下詔褒羙勲徳及慈蔭之重追崇丞相加殊禮鸞路九旒黄屋左纛給節鉞前後部羽葆鼓吹虎賁班劔百人及長沙太妃檀氏臨川太妃曹氏後薨葬皆凖給義慶㓜為武帝所知年十三襲封南郡公永初元年襲封臨川王元嘉中為丹陽尹有百姓黄初妻趙殺子婦遇赦應避孫讎義慶議以為周禮父母之仇避之海外盖以莫大之寃理不可奪至於骨肉相殘當求之法外禮有過失之宥律無讎祖之文况趙之縱暴本由於酒論心即實事盡荒耄豈得以荒耄之王母等行路之深讎宜共天同域無虧孝道六年加尚書左僕射八年太白犯左執法義慶懼有災禍乞外鎮文帝詔諭之以為𤣥象茫昧左執法嘗有變王光禄至今平安日蝕三朝天下之至忌晋孝武初有此異彼庸主耳猶竟無佗義慶固求觧僕射乃許之九年出為平西将軍荆州刺史加都督荆州居上流之重資實兵甲居朝廷之半故武帝諸子徧居之義慶以宗室令羙故特有此授性謙虛始至及去鎮迎送物並不受十二年普使内外羣臣舉士義慶表舉前臨汝令新野庾實前徵奉朝請陵龔祈處士南郡師覺授義慶留心撫物州統内官長親老不隨在官舎者一年聼三吏餉家先是王𢎞在江州亦有此制在州八年為西土所安撰徐州先賢傳十卷奏上之又擬班固典引為典叙以述皇代之羙改授江州又遷南兖州刺史並带都督尋即本號加開府儀同三司性簡素寡嗜慾愛好文義文辭雖不多足為宗室之表歴任無浮淫之過唯晚節奉沙門頗致費損少善騎乘及長不復跨馬招聚才學之士逺近必至太尉袁淑文冠當時義慶在江州請為衛軍諮議其餘吳郡陸展東海何長瑜鮑照等並有辭章之羙引為佐吏國臣所著世説十卷撰集林二百卷並行於世文帝每與義慶書常加意斟酌鮑照字明逺東海人文辭贍逸嘗為古樂府文甚遒麗元嘉中河濟俱清當時以為羙瑞照為河清頌其叙甚工照始嘗謁義慶未見知欲貢詩言志人止之曰即位尚卑不可輕忤大王照勃然曰千載上有英才異士沉沒而不聞者安可数哉大丈夫豈可遂蘊智能使蘭艾不辯終日碌碌與燕雀相隨乎於是奏詩義慶竒之賜帛二十匹尋擢為國侍即甚見知賞遷秣陵令文帝以為中書舎人上好文章自謂人莫能及照悟其㫖為文章多鄙言累句咸謂照才盡實不然也臨海王子頊為荆州照為前軍参軍掌書記之任子頊敗為亂兵所殺義慶在廣陵有疾而白虹貫城野􅍪入府心甚惡之因陳求還文帝許觧州以本號還朝二十一年薨于都下追贈司空諡曰康王子哀王曅嗣為元凶所殺曅子綽嗣昇明三年見殺國除營浦侯遵考武帝族弟也曽祖淳皇曽祖武原令混之弟位正員郎祖巖海西令父涓子彭城内史始武帝諸子並弱宗室唯有遵考及北伐平定以為并州刺史領河東太守鎮蒲坂闗中失守南還再遷冠軍将軍晋帝遜位居秣陵宫遵考領兵防衛武帝初即位封營浦縣侯元嘉中累遷寕蠻校尉雍州刺史加都督為政嚴暴聚斂無節為有司所糾上寝不問孝武大明中位尚書左僕射領崇憲太僕後老疾失明元徽元年卒贈左光禄大夫開府儀同三司諡曰元公子澄之昇明末貴逹澄之弟琨之為竟陵王誕司空主簿誕有寳琴左右犯其徽誕罰焉琨之諌誕曰此余寳也琨之曰前哲以善人為寳不以珠玉為寳故王孫圉稱觀父為楚國之寳未聞以琴瑟為寳誕忸然不悦誕之叛以為中兵参軍辭曰忠孝不得並琨之老父在将安之乎誕殺之後贈黄門郎詔謝莊為誄遵考從父弟思考亦官歴清顯卒於散騎常侍金紫光祿大夫子季連字惠續早歴清官齊髙帝受禪将及誅太宰禇彦回素善之固請乃免建武中為平西蕭遥欣長史南郡太守遥欣多招賓客明帝甚惡之季連有憾於遥欣乃宻表明帝言其有異迹明帝乃以遥欣為雍州刺史而心徳季連以為益州刺史令據遥欣上流季連父思考宋時為益州雖無政績州人猶以義故故善待之季連存問故老見父時人吏皆泣對之遂寕人龔愜累世有學行辟為府主簿及聞東昏失徳稍自驕矜性忌􅄶遂嚴愎酷佷土人始怨永元元年九月因聲講武遂遣中兵参軍宋買以兵襲中水穰人李託買戰不利退還州郡遂多叛亂明年十月巴西人趙續伯反奉其鄕人李𢎞為聖主𢎞乘佛輿以五綵褁青石誑百姓云天與已玉印當王蜀季連遣中兵参軍李奉伯大破獲之将刑謂刑人曰我湏臾飛去復曰汝空殺我我三月三日㑹更出遂斬之梁武帝平建鄴遣左右陳建孫送季連二子及弟通直即子深喻㫖季連受命修還装武帝以西䑓将鄧元起為益州刺史元起南郡人季連為南郡時待之素薄元起典籖朱道琛者嘗為季連府都録無賴季連欲殺之逃免至是説元起請先使檢校縁路奉迎及至言語不恭又歴造府州人士見器物輙奪之曰㑹屬人何湏苦惜軍府大懼言於季連季連以為然又惡昔之不禮元起益憤懣司馬朱士略説季連求為巴西郡守三子為質季連許之既而召兵算之精甲十萬臨軍歎曰據天嶮之地握此盛兵進可以匡社稷退不失作劉備欲以此安歸乎遂矯稱齊宣徳皇后令復反收朱道琛殺之書報朱士略兼召涪令李膺並不受命天監元年六月元起至巴西季連遣其将李奉伯拒戰見敗季連固守元起圍之城中餓死者相枕又從而相食三年乃肉袒請罪元起遷季連于外俄而造焉待之以禮季連謝曰早知如此豈有前日之事元起誅李奉伯送季連還都将發人莫之視唯龔愜送焉初元起在道懼事不集無以賞士之至者皆許以辟命於是受别駕中從事檄者将二千人季連既至詣闕謝罪自東掖門入数歩一稽首以至帝前帝笑謂曰卿欲慕劉備而曽不及公孫述豈無卧龍之臣乎赦為庶人四年出建陽門為蜀人藺相如所殺季連在蜀殺其父變名走建鄴至是報焉乃面縛歸罪帝壮而赦之宋武帝七男張夫人生少帝孫修華生廬陵孝獻王義真胡媫妤生文帝王修容生彭城王義康桓羙人生江夏文獻王義恭孫羙人生南郡王義宣吕羙人生衡陽文王義季廬陵孝獻王義真羙儀貌神情秀徹初封桂陽縣公年十二從北征及關中平武帝東遷欲留偏将恐不足固人心乃以義真為雍州刺史加都督以太尉諮議参軍京兆王修為長史委以闗中任帝将還三秦父老泣訴曰殘生不霑王化於今百年始覩衣冠方仰聖澤長安十陵是公家墳墓咸陽宫殿是公家屋宅捨此何之武帝為之憫然慰譬曰受命朝廷不得擅留今留第二児令文武才賢共鎮此境臨還自執義真手以授王修令修執其子孝孫手授帝義真又進都督并東秦二州領東秦州刺史時隴上流戸多在闗中望得歸本及置東秦州父老知無復經略隴右固闗中之意咸共歎息而赫連勃勃冦逼交至沈田子既殺王鎮惡王修又殺田子兼裁减義真賜左右物左右怨之因白義真曰鎮惡欲反故田子殺之修殺田子豈又欲反也義真使左右劉乞殺修修字叔京兆覇城人初南度見桓𤣥𤣥謂曰君平世吏部郎才也修既死人情離異武帝遣右将軍朱齡石代義真鎮闗中使義真疾歸諸将競歛財貨方軌徐行建威将軍傅𢎞之曰虜騎若至何以待之賊追兵果至至青泥大敗義真獨逃草中中兵参軍叚宏單騎追尋義真識其聲曰君非叚中兵邪身在此行矣必不兩全可刎身頭以南使家公望絶宏泣曰死生共之下官不忍乃束義真於背單馬而歸義真謂宏曰丈夫不經此何以知艱難初武帝未得義真審問怒甚剋日北伐謝晦諫不從及得宏啓知義真免乃止義真尋為司州刺史加都督以叚宏為義真諮議参軍宏鮮卑人為慕容超尚書左僕射武帝伐廣固歸降義真改揚州刺史鎮石頭永初元年封廬陵王武帝始踐阼義真色不悦侍讀博士蔡茂之問其故對曰安不忘危何可恃也明年遷司徒武帝不豫以為車騎将軍開府儀同三司南豫州刺史加都督鎮歴陽未之任而武帝崩義真聰敏愛文義而輕動無徳業與陳郡謝靈運琅邪顔延之慧琳道人並周旋異常云得志日以靈運延之為宰相慧琳道人為西豫州刺史徐羡之等嫌義真靈運延之昵狎過甚故吏范晏戒之義真曰靈運空踈延之隘薄魏文云鮮能以名節自立者但性情所得未能忘言於悟賞故與游耳将之鎮列部伍於東府前既有國哀義真與靈運延之慧琳等坐視部伍因宴舫裏使左右剔母舫函道施已船而取其勝者及至歴陽多所求索羡之等每不盡與深怨執政表求還都初少帝之居東宫多狎羣小謝晦嘗言於武帝曰陛下春秋既髙宜思存萬代神器至重不可使負荷非才帝曰廬陵何如晦曰臣請觀焉晦造義真義真盛欲與談晦不甚答還曰德輕於才非人主也由是出居于外及羡之等專政義真愈不悦時少帝失徳羡之等謀廢立次第應在義真以義真輕訬不任主社稷因其與少帝不恊奏廢為庶人徙新安郡前吉陽令張約之上䟽諌徙為梁州府軍参軍尋殺之景平二年羡之等遣使殺義真於徙所時年十八元嘉元年八月詔追復先封迎靈柩并孫修華謝妃一時俱還三年正月誅徐羡之傅亮等是日詔追崇侍中大将軍王如故贈張約以郡義真無子文帝第五子紹字休𦙍嗣襲廬陵王紹少寛雅位揚州刺史薨無子以南平王鑠子敬先嗣彭城王義康永初元年封彭城王歴南豫南徐二州刺史並加都督文帝即位為驃騎将軍開府儀同三司元嘉三年改授都督荆州刺史給班劒三十人義康少而聰察及居方任職事修理六年司徒王𢎞表義康宜還入輔徵為侍中司徒錄尚書事都督南徐州刺史二府置佐領兵與王𢎞共輔朝政𢎞既多疾且每事推謙自是内外衆務一斷之義康太子詹事劉湛有經國才用義康昔在豫州湛為長史既素情欵至是待遇特隆動皆諮訪故前後在藩多善政九年王𢎞薨又領揚州刺史十二年又領太子太傅義康性好吏職鋭意文案糾剔是非莫不精盡既專朝權事决自己生殺大事皆以錄命斷之凡所陳奏入無不可方伯以下並委義康授用由是朝野輻湊權傾天下義康亦自强不息無有懈倦府門每旦常有数百乘車雖復位卑人微皆被接引又聰識過人一聞必記嘗所蹔遇終身不忘稠人廣坐每標題所憶以示聰明人物益以此推服之愛惜官爵未嘗以階級私人凡朝士有才用者皆引入已府自下樂為竭力不敢欺負文帝有虛勞疾每意有所想便覺心中痛裂屬纊者相係義康入侍醫藥盡心衛奉湯藥飲食非口所嘗不進或連夕不寝彌日不觧衣内外衆事皆專决施行十六年進位大将軍領司徒義康素無術學待文義者甚薄袁淑嘗詣義康義康問其年答曰鄧仲華拜衮之嵗義康曰身不識也淑又曰陸機入洛之年義康曰身不讀書君無為作才語見向其淺陋若此既闇大體自謂兄弟至親不復存君臣形迹率心而行曽無猜防私置僮六千餘人不以言䑓時四方獻饋皆以上品薦義康而以次者供御上嘗冬月噉甘歎其形味並劣義康在坐曰今年甘殊有佳者遣還東府取甘大供御者三寸僕射殷景仁為帝所寵與劉湛素善而意好晚乖湛常欲因宰輔之權傾之景仁為帝所保持義康屡言不見用湛愈憤南陽劉斌湛之宗也有俗才用為義康所知自司徒右長史擢為左長史從事中郎琅邪王履主簿沛郡劉敬文祭酒魯郡孔𦙍秀並以傾側自入見帝疾篤皆謂宜立長君上嘗危殆使義康具顧命詔義康還省流涕以告湛及景仁曰天下艱難詎是㓜主所御湛景仁並不答而𦙍秀等輙就尚書儀曹索晋咸康立康帝舊事義康不知也及帝疾瘳微聞之而斌等既為義康所寵遂結朋黨若有盡忠奉國不同已者必搆以罪黜每采景仁短長或虛造同異以告湛自是主相之勢分矣義康欲以斌為丹陽尹言其家貧上覺之曰以為吳郡後㑹稽太守羊𤣥保求還義康又欲以斌代之上時未有所擬倉卒曰我已用王鴻上以嫌隙既成将致大禍十七年乃收劉湛又誅斌及大将軍録事参軍劉敬文并賊曹孔劭秀中兵邢懐明主簿孔𦙍秀丹陽丞孔文秀司空從事中郎司馬亮烏程令盛曇泰徙尚書庫部郎何黙子餘姚令韓景之永興令顔遥之湛弟黄門郎素斌弟給事中温於廣州王履廢於家青州刺史杜驥勒兵殿内以備非常義康時入宿留止中書省遣人宣㫖告以湛等罪義康上表遜位改授江州刺史出鎮豫章實幽之也停省十餘日桂陽侯義融新渝侯義宗祕書監徐湛之往來慰視於省奉辭便下渚上唯對之慟哭遣沙門慧琳視之義康曰弟子有還理不琳公曰恨公不讀数百卷書征虜司馬蕭斌為義康所昵劉斌等讒之被斥乃以斌為諮議領豫章太守事無大小皆委之司徒主簿謝綜素為義康所狎以為記室左右愛念者並聽隨從至豫章辭州見許資奉優厚朝廷大事皆報示之義康未敗時東府聽事前井水忽涌野雉江鷗並入所住齋前龍驤参軍巴東令扶育上表申明義康奏即收付建康賜死㑹稽長公主於兄弟為長帝所親敬上嘗就主宴集甚歡主起再拜頓首悲不自勝上不曉其意起自扶之主曰車子嵗暮必不見容特乞其命因慟哭上亦流涕指蒋山曰必無此慮若違今誓便是負初寕陵即封所飲酒賜義康曰㑹稽姊飲憶弟所飲餘今封送車子義康小字也二十二年太子詹事范曅等謀反事連義康詔特宥大辟并子女並免為庶人絶屬籍徙安成郡義康在安成讀漢書見淮南厲王長事廢書歎曰前代乃有此我得罪為宜也二十四年豫章胡誕世前吳平令袁惲等謀奉戴義康太尉江夏王義恭奏徙義康廣州奏可未行㑹魏軍至𤓰歩天下擾動上慮有異志者奉義康為亂孝武時鎮彭城及尚書左僕射何尚之並言宜早為之所二十八年正月遣中書舎人嚴麝持藥賜死義康不肯服藥曰佛教自殺不復人身乃以被掩殺之以侯禮葬安成郡子允元凶殺之孝武大明四年義康女玉秀等乞反葬舊塋詔聽之江夏文獻王義恭㓜而明嶷姿顔端麗武帝特所鍾愛帝性儉諸子飲食不過五醆盤義恭求湏果食日中無算得未嘗噉悉以與傍人諸王未嘗敢求求亦不得元嘉六年為都督荆州刺史義恭渉獵文義而驕奢不節及出藩文帝與書誡之曰禮賢下士聖人垂訓驕奢矜尚先哲所去豁達大度漢祖之徳猜忌褊急魏武之累漢書稱衛青云大将軍遇士大夫以禮與小人有恩西門安于矯性齊羙闗羽張飛任偏同弊行已舉事深宜鑒此汝一月日自用不可過三十萬若能省此益羙西楚殷曠常宜早起接對賓侣園池堂觀計無湏改作凡訊獄前一二日可取訊簿宻與劉湛軰粗共詳論慎無以喜怒加人能擇善者從之羙自歸已不可專意自决以矜獨斷之明也刑獄不可壅滞一月可再訊凡事皆應慎宻名器深宜慎惜不可妄以假人聲樂嬉游不宜令過宜数引見佐史非惟臣主自應相見不数則彼我不親不親無因得盡人人不盡何由具知衆事九年為南兖州刺史加都督鎮廣陵十六年進位司空明年彭城王義康有罪出藩徴義恭為侍中都督揚南徐兖三州司徒録尚書事領太子太傅給班劒二十人置佐領兵二十一年進太尉領司徒義恭小心且戒義康之失雖為總録奉行文書而已文帝安之年給相府錢二千萬他物稱此而義恭性奢用常不足文帝又别給錢年至千萬時有獻五百里馬者以賜義恭二十七年文帝欲有事河洛義恭總統羣帥出鎮彭城及魏軍至爪歩義恭與孝武閉城自守初魏軍深入上慮義恭不能固彭城備加誡勅義恭答曰臣雖未能臨瀚海濟居延庶免劉仲奔逃之恥及魏軍至義恭果欲走賴衆議得停降號驃騎将軍開府儀同三司魯郡孔子舊廟有栢樹二十四株歴漢晋其大連抱有二株先倒折土人崇敬莫之敢犯義恭悉遣伐取父老莫不歎息又以本官領南兖州刺史加都督移鎮盱眙修舘宇擬東城二十九年冬還朝上以御所乘蒼蠻船上迎之遭太妃憂改授大将軍南徐州刺史還鎮東府元凶肆逆其日劭急召義恭先是詔召太子及諸王慮有詐妄致害者召皆有人至是義恭求常所遣傳詔劭遣之而後入義恭凡府内兵仗並送還䑓進位太保孝武入討劭疑義恭異志使入尚書下省分諸子並神獸門外侍中下省孝武前鋒至新亭劭挾義恭出戰故不得自抜戰敗義恭單馬南奔劭大怒遣始興王濬殺義恭十二子義恭既至勸孝武即位授太尉録尚書六條事假黄鉞事寕進位太傅領大司馬増班劒為三十人以在藩所服玉環大綬賜之上不欲致禮太傅諷有司奏天子不應加拜從之及立太子東宫文案使先經義恭及南郡王義宣等反又加黄鉞白直百人入六門事平以臧質七百里馬賜義恭孝武以義宣亂逆由於彊盛欲削王侯義恭希㫖請省録尚書上從之又與驃騎大将軍竟陵王誕奏陳貶損之格九條詔外詳議於是有司奏九條之格猶有未盡更加附益凡二十四條大抵聽事不得南面坐施帳國官正冬不得跣登國殿公主妃傳令不得朱服輿不得重掆鄣扇不得雉尾劒不得鹿盧形槊眊不得孔雀白􅌁夾轂隊不得綘􅀈平乘誕馬不得過二匹胡伎不得綵衣舞伎正冬著袿衣不得莊面諸妃主不得著緄带信幡非䑓省官悉用綘郡縣内史相及封内長官於其封君罷官則不復追敬不稱臣諸鎮常行車前不得過六隊刀不得過銀銅餙諸王女封縣主諸王子孫襲封王之妃及封侯者夫人行並不得鹵簿諸王子繼體為王者婚葬吉凶悉依諸國公侯之禮不得同皇弟皇子車輿非軺車不得油幢平乘船皆下兩頭作露平形不得擬象龍舟詔可孝建二年為揚州刺史加入朝不趨賛拜不名劒履上殿固辭殊禮義恭撰要記五卷起前漢訖晋太元表上之詔付祕閣時西陽王子尚有盛寵義恭觧揚州以避之乃進位太宰領司徒義恭常慮為孝武所疑及海陵王休茂於襄陽為亂乃上表稱諸王貴重不應居邉有州不湏置府其餘制度又多所减省時孝武嚴暴義恭慮不見容乃卑辭曲意附㑹皆有容儀每有祥瑞輒上賦頌大明元年有三脊茅生石頭西岸又勸封禪上甚悦及孝武崩遺詔義恭觧尚書令加中書監栁元景領尚書令入住城内事無巨細悉闗二公大事與沈慶之参决若有軍旅可為總統尚書中事委顔師伯外監所統委王𤣥謨前廢帝即位復録尚書本官如故尚書令栁元景即本號開府儀同三司領兵置佐一依舊凖又増義恭班劍為四十人更申殊禮之命固辭殊禮義恭性嗜不恒與時移變自始至終屢遷第宅與人游欵意好亦多不終奢侈無度不愛財寳左右親幸一日乞與或至一二百萬小有忤意輒追奪之大明時資供豊厚而用常不足賒市百姓物無錢可還民有通辭求錢者輒題後作原字善騎馬觧音律游行或二三百里孝武恣其所之東至吳郡登虎丘山又登無錫縣烏山以望太湖大明中撰國史孝武自為義恭作傳及永光中雖任宰輔而承事近臣戴法興等常若不及前廢帝狂悖無道義恭元景謀欲廢立廢帝率羽林兵於第害之并四子斷析義恭支體分裂腹胃挑取眼睛以宻漬之以萬鬼目粽明帝定亂令書追崇侍中都督中外諸軍丞相領太尉中書監録尚書事王如故給九旒鸞輅虎賁班劍百人前後部羽葆㰻吹輼輬車泰始三年又詔陪祭廟庭南郡王義宣生而舌短澁於言論元嘉元年封竟陵王都督南兖州刺史遷中書監中軍将軍給鼓吹時竟陵羣蠻充斥役刻民散改封南譙王十三年出為江州刺史加都督初武帝以荆州上流形勝地廣兵彊遺詔諸子次第居之謝晦平後以授彭城王義康義康入相次江夏王義恭又以臨川王義慶宗室令望且臨川烈武王有大功於社稷義慶又居之其後應在義宣上以義宣人才素短不堪居上流十六年以衡陽王義季代義慶而以義宣為南徐州刺史而㑹稽公主每以為言上遲回乆之二十一年乃以義宣都督七州諸軍事車騎将軍荆州刺史先賜中詔曰師䕶以在西乆比表求還出内左右自是經國常理亦何必其應於一往今欲聽許以汝代之䕶雖無殊績絜已節用通懐期物不恣羣下此信未易在彼已有次第為士庶所安論者乃謂未議遷之今之回換更在欲為汝耳汝與䕶年時一軰各有其羙方物之義亦互有少劣若今向事脱一减之者既於西夏交有巨礙遷代之譏必歸責於吾矣師䕶義季小字也義宣至鎮勤自課厲政事修理白晳羙湏眉長七尺五寸腰帶十圍多畜嬪媵後房千餘尼媼数百男女三十人崇餙綺麗費用殷廣進位司空改侍中二十七年魏軍南侵義宣慮冦至欲奔上明及魏軍退文帝詔之曰善修民務不湏營潜逃計也遷司徒揚州刺史侍中如故元凶弑立以義宣為中書監太尉領司徒義宣聞之即時起兵徵聚甲卒傳檄近逺㑹孝武入討義宣遣参軍徐遺寳率衆三千助為先鋒孝武即位以義宣為中書監都督揚豫二州丞相錄尚書六條事揚州刺史加羽葆鼓吹給班劍四十人改封南郡王追諡義宣所生為獻太妃封次子宜陽侯愷為南譙王義宣固辭内任及愷王爵於是改授都督八州諸軍事荆湘二州刺史持節侍中丞相如故降愷為宜陽縣王将佐以下並加賞秩義宣在鎮十年兵彊財富既首創大義威名著天下凡所求欲無不必從朝廷所下制度意不同者一不遵承嘗獻孝武酒先自酌飲封送所餘其不識大體如此初臧質隂有異志以義宣凡弱易可傾移欲假手為亂以成其姦自襄陽往江陵見義宣便盡禮及至江州每宻信説義宣以為有大才負大功挾震主之威自古尠有全者宜在人前早有處分不爾一旦受祸悔無所及義宣隂納質言而孝武閨庭無禮與義宣諸女淫亂義宣因此發怒宻治舟甲剋孝建元年秋冬舉兵報豫州刺史魯爽兖州刺史徐遺寳使同爽狂酒失㫖其年正月便反遣府戸曹送版以義宣補天子并送天子羽儀遺寳亦勒兵向彭城義宣及質狼狽起兵二月加都督中外諸軍事置左右長史司馬使僚佐悉稱名遣傳奉表以姦臣交亂圗傾宗社輒徴召甲卒戮此凶醜詔答之太傅江夏王義恭又與義宣書諭以禍福義宣移檄諸州郡遣参軍劉諶之尹周之等率軍下就臧質雍州刺史朱修之起兵奉順義宣率衆十萬發自江津舳艫数百里是日大風船垂覆沒僅得入中夏口以第八子慆為輔國将軍留鎮江陵遣魯秀朱曇韶萬餘人北討朱修之秀初至江陵見義宣既出拊膺曰阿兄誤人事乃與癡人共作賊今年敗矣義宣至尋陽與質俱下質為前鋒至鵲頭聞徐遺寳敗魯爽於小峴授首相視失色孝武使鎮北大将軍沈慶之送爽首於義宣并與書義宣質並駭懼上先遣豫州刺史王𤣥謨舟師頓梁山洲内東西兩岸為却月城營柵甚固撫軍栁元景據姑熟為大統偏師鄭琨武念戍南浦質徑入梁山去𤣥謨一里許結營義宣屯蕪湖五月十九日西南風猛質乘風順流攻𤣥謨西壘冗從僕射胡子友等戰失利棄壘度就𤣥謨質又遣将龎法起数千兵趣南浦仍使自後掩𤣥謨與琨念相遇法起戰大敗赴水死略盡義宣至梁山質上出軍東岸攻𤣥謨𤣥謨分遣游擊將軍垣䕶之竟陵太守薛安都等出壘奮擊大敗質軍軍人一時投水䕶之等因風縱火焚其舟乘風勢猛盛煙爓覆江義宣時屯西岸延火燒營殆盡諸将乘風火之勢縱兵攻之衆一時奔潰義宣與質相失各單舸逩走東人士庶並歸順西人與義宣相隨者船舸猶有百餘女先適臧質子過尋陽入城取女載以西奔至江夏聞巴陵有軍被抄斷回入逕口歩向江陵衆散且盡左右唯有十許人脚痛不復能行就民僦露車自載無復食縁道求告至江陵郭外竺超人具羽儀迎之時帶甲尚萬餘人義宣既入城仍出聽事見客左右翟靈寳誡使撫慰衆賓以臧質違指授之宜用致失利今治兵繕甲更為後圗昔漢髙百敗終成大業而義宣誤云項羽千敗衆咸掩口而笑魯秀竺超人等猶為之爪牙欲收合餘燼更圖一决而義宣惽墊無復神守入内不復出左右腹心相率奔叛魯秀北走義宣不復自立欲隨秀去乃於内戎服盛糧糗带背刀携息慆及所愛妾五人皆著男子服相隨城内擾亂白刃交橫義宣大懼落馬仍便歩地超人送城外更以馬與之超人還守城義宣冀及秀望諸将送北入魏既失秀所在未出郭将士逃盡唯餘慆及五妾兩黄門而已夜還向城入南郡空廨無牀席地至旦遣黄門報超人超人遣故車一乘載送刺姦義宣止獄戸坐地歎曰臧質老奴誤我始與五妾俱入獄五妾尋被遣出義宣號泣語獄吏曰常日非苦今日分别始是苦大司馬江夏王義恭諸公王八坐與荆州刺史朱修之書言義宣反道叛恩便宜專行大戮書未逹修之已至江陵於獄盡之孝武聽還葬舊墓長子恢年十一拜南譙王世子晋氏過江不置城門校尉及衛尉官孝武欲重城禁故復置衛尉卿以恢為侍中領衛尉衛尉之置自恢始也義宣反録付廷尉自殺恢弟愷字景穆生而養於宫中寵均皇子十嵗封宜陽侯孝武時進為王義宣反問至愷於尚書寺内著婦人衣乘問訊車投臨汝公孟詡詡於妻室内為地窟藏之事覺并詡誅其餘並為修之所殺衡陽文王義季㓜而夷簡無鄙近之累文帝為荆州武帝使隨往由是特為文帝所愛元嘉元年封衡陽王十六年代臨川王義慶為都督荆州刺史先是義慶在任遇巴蜀擾亂師旅應接府庫空虛義季蓄財節用数年還復充實隊主續豐母老家貧無以充飬遂不食肉義季哀其志給豐母月米二斛錢一千并制豐噉肉義季素拙書上聽使人書啓事唯自署名而已嘗大蒐於郢有野老帶苫而耕命左右斥之老人擁耒對曰昔楚子盤游受譏令尹今陽和扇氣播厥之始一日不作人失其時大王馳騁為樂驅斥老夫非勸農之意義季止馬曰此賢者也命賜之食老人曰吁願大王均其賜也茍不奪人時則一時皆享王賜老人不偏其私矣斯飯也弗敢當問其名不言而退義季素嗜酒自彭城王義康廢後遂為長夜飲略少醒日文帝詰責曰此非唯傷事業亦自損性皆汝所諳近長沙兄弟皆縁此致故将軍蘇徴耽酒成疾旦夕待盡一門無此酣法汝於何得之義季雖奉㫖酣縱不改成疾以至於終二十一年徴為征北大将軍開府儀同三司南兖州刺史加都督發州之日帷帳器服諸應隨刺史者悉留之荆楚以為羙談二十二年遷徐州刺史明年魏攻邉北州擾動義季慮祸不欲以功勤自業無他經略唯飲酒而已文帝又詔責之二十四年薨於彭城太尉江夏王義恭表觧職迎䘮不許上遣東海王禕迎䘮追贈司空傳國至孫齊受禪國除論曰自古帝王之興雖係之于歴数至於經啓多難莫不兼藉親賢當於餘祅内侮荀桓交逼荆楚之勢同于累卵如使上略未盡一算或遺則得䘮之機未可知也烈武王擥羣才揚盛策一舉而埽勍冦盖亦人謀之致乎長沙雖位列台鼎不受本根之寄跡其行事有以知武皇之則哲廬陵以帝子之重兼髙明之姿釁跡未彰禍生忌克痛矣夫天倫猶子分形共氣親愛之道人理斯同富貴之情其義則舛善乎龎公之言比之周公管蔡若處茅屋之内宜無放殺之酷觀夫彭城南郡其然乎江夏地居愛子位當上相大明之世親禮冠朝屈體降身歸于卑下得使兩朝暴主永無猜色歴載踰十以尊戚自保及在永光㓜主南面公旦之重屬有所歸自謂踐氷之慮已除太山之安可恃曽未云㡬而磔體分肌古人以隐㣲致誡斯為篤矣衡陽晚存酒徳何先後之云殊其将存覆車之鑒不然何以致於是也南史卷十三南史卷十三考證長沙景王道憐傳融位五兵尚書領軍有質幹善於用短善於用短南本作善用短楯凡自諱名有同主諱主南本作至位湘州刺史諡僖侯僖監本訛僐今从閣本臨川烈武王道規傳左執法嘗有變王光禄至今平安王監本誤五今改从宋書營浦侯遵考傳州人猶以義故故善待之善待一本作喜得宋武帝七男傳一本衡陽文王義季下有義宣别有傳五字本卷南郡王義宣傳平列於後彼殆因宋書而衍者今从監本廬陵孝獻王義真傳脩字叔京兆覇城人宋書脩字叔治殆唐人避諱而刪之也使左右剔母舫函道施已船而取其勝者母一本作每今从梁書作母謂其母孫修儀也景平二年羡之等遣吏殺義真於徙所吏一本作使彭城王義康傳上嘗冬月噉甘歎其形味並劣甘一本作柑江夏文獻王義恭傳二十九年冬還朝上以御所乘蒼蠻船上迎之蠻宋書作鷹南郡王義宣傳生而舌短澁於言論監本無短字今从宋書及閣本増入南史卷十三考證
