body:
  text: 南史卷二十三唐李延夀撰列傳第十三王誕兄子偃亮瑩從弟偃子藻藻弟子瑩王華從弟琨王恵從弟球王彧子絢子藴彧兄絢弟繢奂繢孫克奂弟份份孫銓勱錫質僉固通王誕字茂世太保𢎞從祖兄也祖恬晉中軍將軍父混太常卿誕少有才藻晉孝武帝崩從叔尚書令珣為哀策出本示誕曰猶恨少序節物誕攬筆便益之接其秋冬代變後云霜繁廣除風回髙殿殉歎羙因而用之襲爵雉鄉侯為會稽王世子元顯後軍長史琅邪内史誕結事元顯嬖人張法順故見寵元顯納妾誕為之親迎隨府轉驃騎長史内史如故元顯討桓𤣥欲悉誅諸桓誕救桓脩等由此得免脩誕甥也及𤣥得志將見誅脩為陳請乃徙廣州盧循據廣州以誕為其平南府長史甚賓禮之誕久客思歸乃說循曰下官與劉鎮軍情味不淺若得北歸必蒙任寄時廣州刺史呉隠之亦為循所拘留誕又曰將軍今留吳公公私非計孫伯符豈不欲留華子魚但以一境不容二君耳於是誕及隠之俱得還誕為宋武帝太尉長史盡心歸奉帝甚仗之盧循自蔡洲南走劉毅固求追討誕宻白帝曰公既平廣固復滅盧循則功蓋終古勲無與二如此大威豈可使餘人分之毅與公同起布衣一時相推耳今既喪敗不宜復使立功帝納其說後為吳國内史母憂去職武帝伐劉毅起為輔國將軍誕固辭以墨絰從行時諸葛長人行太尉留府事心不自安武帝甚慮之毅既平誕求先下帝曰長人似有自疑心卿詎宜便去誕曰長人知下官蒙公垂盼今輕身單下必當以為無虞可少安其意帝笑曰卿勇過賁育矣於是先還後卒追封作唐縣五等侯子詡早卒誕兄嘏字偉世侍中左户尚書始興公嘏子偃偃字子游母晉孝武帝女鄱陽公主宋受禪封永成君偃尚宋武帝第二女吳興長公主諱榮男常倮偃縛諸庭樹時天夜雪噤凍久之偃兄恢排閣詬主乃免偃謙虛恭謹不以世事闗懐位右光禄大夫贈開府儀同三司諡恭公長子藻位東陽太守尚文帝第六女臨川長公主諱英媛公主性妬而藻别愛左右人吳崇祖景和中主讒之於廢帝藻下獄死主與王氏離婚宋世諸主莫不嚴妬明帝每疾之湖熟令袁慆妻以妬賜死使近臣虞通之撰妬婦記左光禄大夫江湛孫斆當尚孝武帝女上乃使人為斆作表讓婚曰伏承詔㫖當以臨海公主降嬪榮出望表恩加典外顧審輶蔽伏用憂惶臣寒門悴族人凡質陋閭閻有對本隔天姻如臣素流家貧業寡年近將冠皆已有室荆釵布裙足得成禮每不自觧無偶迄茲媒訪莫尋素族弗問自惟門慶屢降公主天恩所覃庸及醜末懐憂抱惕慮不獲免徴命所當果膺兹舉雖門泰宗榮於臣非倖仰縁聖貸冒陳愚實自晉氏以來配尚王姬者雖累經羙胄亟有名才至如王敦懾氣桓温歛威真長佯愚以求免子敬灸足以違禍王偃無仲都之質而倮雪於北階何瑀闕龍工之姿而投軀於深井謝莊殆自害於矇叟殷沖幾不免於强鉏彼數人者非無才意而勢屈於崇貴事隔於聞覽吞悲茹氣無所逃訴制勒甚於僕隷防閑過於婢妾往來出入人理之常當待賓客朋從之義而令掃轍息駕無闚門之期廢筵抽席絶接對之理非唯交友離異乃亦兄弟疎濶第令受酒肉之賜制以動靜監子待錢帛之私節其言笑姆妳争媚相勸以嚴尼媪競前相諂以急第令必凡庸下才監子皆葭萌愚豎議舉止則未閑是非聼言語則謬於虛實姆妳敢恃耆舊唯賛妬忌尼媪自唱多知務檢口舌其間又有應答問訊卜筮師母乃至殘餘飲食詰辯與誰衣被故弊必責頭領又出入之宜繁省難衷或進不獲前或入不聼出不入則嫌於欲疎求出則疑有别意召必以三晡為期遣必以日出為限夕不見晚魄朝不識曙星至於夜步月而弄琴晝拱􅃑而披卷一生之内與此長乖又聲影裁聞則少婢奔迸裾袂向席則醜老叢來左右整刷以疑寵見嫌賓客未冠以少容致斥禮有列媵象有貫魚本無嫚嫡之嫌豈有輕婦之誚今義絶傍私䖍恭正匹而每事必言無儀適設辭輒云輕易我又竊聞諸主聚集唯論夫族緩不足為急者法急則可為緩者師更相扇誘本其恒意不可貸借固實常辭或云野敗去或云人笑我雖曰家事有甚王憲發口所言恒同科律王藻雖復彊佷頗經學涉戲笑之事遂為寃魂褚曖憂憤用致夭絶傷理害義難以具聞夫螽斯之徳實致克昌專妬之行有妨繁衍是以尚主之門往往絶嗣駙馬之身通離釁咎以臣凡弱何以克堪必將毁族淪門豈伊身責前後嬰此其人雖衆然皆患彰遐邇事隔天朝故吞言咽理無敢論訴臣幸屬聖明矜照由道𢎞物以典處親以公臣之鄙懐可得自盡如臣門分世荷殊榮足守前基便預提拂清官顯位或由才升一叨婚戚咸成恩假是以仰冒非宜披露丹實非唯止陳一已規全身願實乃廣申諸門受患之切伏願天慈照察特賜蠲停使燕雀微羣得保叢蔚蠢物憐生自已彌篤若恩詔難降披請不申便當刋膚剪髪投山竄海帝以此表遍示諸主以諷切之并為戲笑元徽中臨川主表求還身王族守養弱嗣許之藻弟懋字昌業光禄大夫封南鄉侯懋子瑩瑩字奉光選尚宋臨淮公主拜駙馬都尉累遷義興太守代謝超宗超宗去郡與瑩交惡還都就懋求書屬瑩求一吏曰丈人一㫖如湯澆雪耳及至瑩答㫖以公吏不可超宗往懋處對諸賓謂懋曰湯定不可澆雪懋面洞赤唯大恥愧懋後往超宗處設精白䱒羙鮓麞􅦭懋問那得佳味超宗詭言義興始見餉陽驚曰丈人豈應不得邪懋大忿言於朝廷稱瑩供養不足坐失郡廢棄久之後歴侍中東陽太守以居郡有恵政遷吳興太守齊明帝勤憂庶政瑩頻處二郡皆有能名還為中領軍隨王長史意不平改為太子詹事中領軍永元初政由羣小瑩守職而已不能有所是非及尚書令徐孝嗣誅瑩頗綜朝政啓取孝嗣所居宅及取孝嗣封名枝江縣侯以為己封從弟亮謂曰此非盛徳也瑩怒曰我昔從東度為吳興束身登岸徐時為宰相不能見知相用為領軍長史今住其宅差無多慙時人咸謂失徳亮既當朝於瑩素雖不善時欲引與同事遷尚書左僕射未拜㑹䕶軍崔恵景自京口奉江夏王内向瑩拒恵景於湖頭衆敗瑩赴水乘舫入樂遊因得還臺城恵景敗瑩還居領軍府梁武兵至復假節都督宫城諸軍事建康平瑩乃以宅還徐氏初為武帝相國左長史及踐阼封建城縣公累遷尚書令瑩性清慎帝深善之時有猛獸入郭上意不悦以問羣臣羣臣莫對瑩在御筵乃歛板答曰昔擊石拊石百獸率舞陛下膺籙御圖虎象來格帝大悦衆咸服焉十五年位左光禄大夫開府儀同三司丹陽尹既為公湏開黄閣宅前促欲買南隣朱侃半宅侃懼見侵貨得錢百萬瑩乃回閣向東時人為之語曰欲向南錢可貪遂向東為黄銅及將拜印工鑄印六鑄而龜六毁及成頭空不實補而用之居職六日暴疾薨諡曰静恭少子實嗣起家祕書郎尚梁武帝女安吉公主襲爵建城縣公為新安太守實從兄來郡就求告實與銅錢五十萬不聽於郡及道散用從兄密於郡市貨還都求利及去郡數十里實乃知命追之呼從兄上岸盤頭令卒與杖搏頰乞原劣得免後為南康嗣王湘州長史長沙郡王三日出禊實衣冠傾崎王性方嚴見之意殊惡實稱主名謂王曰蕭玉誌念實殿下何見憎王驚赧即起後宻啟之因此廢銅亮字奉叔瑩從父弟也父攸字昌逹仕宋位太宰中郎贈給事黄門侍郎亮以名家子宋末選尚公主拜駙馬都尉歴任祕書丞齊竟陵王子良開西邸延才俊以為士林使工圖其像亮亦預焉累遷晉陵太守在職清公有羙政時有晉陵令沈㠝之性麤疎好犯亮諱亮不堪遂啟代之㠝之怏怏乃造坐云下官以犯諱被代未知明府諱若為攸字當作無骹尊傍犬為犬傍無骹尊若是有心攸無心攸乞告示亮不履下牀跣而走㠝之撫掌大笑而去建武末累遷吏部尚書時右僕射江祏管朝政多所進㧞為士所歸亮自以身居選部每持異議始亮未為吏部郎時以祏帝之内弟故深友祏祏為之延譽益為帝所器重至是與祏情好攜薄祏昵之如初及祏遇誅羣小放命凡所除拜悉由内寵亮弗能止外若詳審内無明鑒所選用拘資次而已當時不謂為能後為尚書左僕射及東昏肆虐亮取容以免梁武帝至新林内外百僚皆道迎其不能㧞者亦間路送誠款亮獨不遣及東昏遇殺張稷仍集亮等於太極殿前西鍾下坐議欲立齊湘東嗣王寳晊領軍瑩曰城閉已久人情離解征東在近何不諮問張稷又曰桀有昏徳鼎遷于殷今實微子去殷項伯歸漢之日亮黙然朝士相次下牀乃遣國子博士范雲齎東昏首送石頭推亮為首城平朝士畢至亮獨後裠履見武帝帝謂曰顛而不扶安用彼相亮曰若其可扶明公豈有今日之舉因泣而去霸府開以為大司馬長史梁臺建授侍中尚書令固讓乃為侍中中書監兼尚書令及受禪遷侍中尚書令中軍將軍封豫寧縣公天監二年轉左光禄大夫元日朝㑹亮辭疾不登殿設饌别省語笑自若數日詔公卿問訊亮無疾色御史中丞樂藹奏亮大不敬論棄市詔削爵廢為庶人四年帝宴華光殿求讜言尚書左丞范縝起曰司徒謝朏徒負虚名陛下擢之如此前尚書令王亮頗有政體陛下棄之如彼愚臣所不知帝變色曰卿可更餘言縝固執不已帝不悦御史中丞任昉因奏縝妄陳褒貶請免縝官詔可亮因屏居閉掃不通賔客遭母憂居䘮盡禮後為中書監加散騎常侍卒諡煬子王華字子陵誕従祖弟也祖薈衞將軍㑹稽内史父廞司徒右長史晉安帝隆安初王恭起兵討王國寶時廞丁母憂在家恭檄令起兵廞即聚衆應之以女為貞列將軍以女人為官屬及國寳死恭檄廞罷兵廞起兵之際多所誅戮至是不復得已因舉兵以討恭為名恭遣劉牢之擊廞廞敗走不知所在長子泰為恭所殺華時年十三在軍中與廞相失随沙門釋曇冰逃使提衣襆従後津邏咸疑焉華行遲曇冰罵曰奴子怠懈行不及我以杖捶華數十衆乃不疑由此得免遇赦還吳以父存没不測布衣蔬食不交游者十餘年宋武帝欲収其才用乃發廞喪使華制服服闋武帝北伐長安領鎮西將軍北徐州刺史辟華為州主簿後為别駕歴職著稱文帝鎮江陵為西中郎主簿諮議参軍文帝未親政事悉委司馬張邵華性尚物不欲人在已前邵性豪每行來常引夾轂華出入乘牽車従者不過兩三人以矯之嘗相逄華陽若不知是邵謂左右曰此鹵簿甚盛必是殿下乃下牽車立於道側及邵至乃驚邵白服登城為華所糾邵坐被徵華代為司馬文帝將入奉大統以少帝見害不敢下華曰先帝有大功於天下四海所服雖嗣主不綱人望未改徐羡之中才寒士傅亮布衣諸生非有晉宣帝王大將軍之心明矣畏廬陵嚴斷將來必不自容殿下寛叡慈仁所知已且越次奉迎兾以見徳悠悠之論殆必不然羡之亮晦又要檀道濟王𢎞五人同功孰肯相讓勢必不行今日就徵萬無所慮帝従之曰卿復欲為吾之宋昌矣乃留華總後任上即位以華為侍中右衞將軍先是㑹稽孔甯子為文帝鎮西諮議參軍以文義見賞至是為黄門侍郎領歩兵校尉甯子先為何無忌安成國侍郎還東修宅令門可容髙盖隣里笑之甯子曰大丈夫何常之有甯子與華並有富貴之願自羡之等執權日夜搆之於文帝甯子嘗東歸至金昌亭左右欲泊船甯子命去之曰此殺君亭不可泊也華每閑居諷詠常誦王粲登樓賦曰兾王道之一平假髙衢而騁力出入逄羡之等每切齒憤叱歎曰當見太平時否元嘉二年甯子卒三年誅羡之等華遷䕶軍將軍侍中如故宋世唯華與南陽劉湛不為飾讓得官即拜以此為常華以情事異人未嘗預宴集終身不飲酒有宴不之詣若有論事者乘車造門主人出車就之及王𢎞輔政而𢎞弟曇首為文帝所任與華相埓華常謂己力用不盡每歎曰宰相頓有數人天下何由得安四年卒年四十三九年以誅羡之功追封新建縣侯諡曰宣孝武即位配享文帝廟庭子定侯嗣卒子長嗣坐罵母奪爵以長弟佟紹封齊受禪國除琨華從父弟也父懌不辨菽麥時以為殷道矜之流人無肯與婚家以獵婢恭心侍之遂生琨初名崐崙懌後娶南陽樂𤣥女無子故即以琨為名立以為嗣琨少謹篤為從伯司徒謐所愛宋武帝初為桓脩參軍脩待帝厚後帝以事計圖脩猶懐昔顧使王華訪素門嫁其二女華為琨娶大女以小女適頴川庾敬度亦是舊族除琨郎中駙馬都尉奉朝請先是琨伯父廞得罪晉世諸子並從誅唯華得免華宋􅕊貴盛以門衰提擕琨恩若同生為之延譽歴位宣城義熙太守皆以廉約稱華終又託之宋文帝故琨屢居清顯孝建中為吏部郎吏曹選局貴要多所屬請琨自公卿下至士大夫例為用兩門生江夏王義恭嘗属琨用二人後復屬琨答不許出為平越中郎將廣州刺史加都督南土沃實在任者常致巨富世云廣州刺史但經城門一過便得三千萬琨無所取納表獻禄奉之半鎮舊有鼓吹又唘輸還及罷任孝武知其清問還資多少琨曰臣買宅百三十萬餘物稱之帝悦其對後為歴陽内史上以琨忠實徙為寵子新安王北中郎長史再歴度支尚書加光禄大夫初琨従兄華孫長襲華爵新建縣侯嗜酒多愆失琨表以長將傾基緒請以長小弟佟嗣焉琨後出為吴郡太守遷中領軍坐在郡用朝舍錢三十六萬營餉二宫諸王及作絳襖奉獻軍用左遷光禄大夫尋加太常及金紫加散騎常侍廷尉虞龢議社稷各一神琨案舊糾駮不為屈時龢見寵朝廷歎琨强正明帝臨崩出為㑹稽太守加都督坐誤竟囚降為冠軍順帝即位進右光禄大夫順帝遜位百僚陪列琨攀畫輪獺尾慟泣曰人以夀為歡老臣以夀為戚既不能先驅螻蟻頻見此事嗚噎不自勝百官人人雨淚齊髙帝即位領武陵王師加侍中時王儉為宰相属琨用東海郡迎吏琨使謂曰語郎三臺五省皆是郎用人外方小郡當乞寒賤省官何容復奪之遂不過其事尋解王師及髙帝崩琨聞國諱牛不在宅去臺數里遂歩行入宫朝士皆謂曰故宜待車有損國望琨曰今日奔赴皆自應爾遂得病卒贈左光禄大夫年八十四琨謙恭謹慎老而不渝朝㑹必早起簡閱衣裳料數冠幘如此數四或為輕薄所笑大明中尚書僕射顔師伯豪貴下省設女樂琨時為度支尚書要琨同聽傳酒行炙皆悉内妓琨以男女無親授傳行每至令置牀上回面避之然後取畢又如此坐上莫不撫手嗤笑琨容色自若師伯後為設樂邀琨琨不往中領軍劉勔晚節有栖退志表求東陽郡尚書令袁粲以下莫不賛羙之琨曰永初景平唯謝晦殷景仁為中領軍元嘉有到彦之為人望才譽勔不及也近聞加侍中已為怏怏便求東陽臣恐子房赤松未易輕擬其鯁直如此而儉於財用設酒不過兩盌輙云此酒難遇鹽豉薑蒜之屬並挂屏風酒漿悉置牀下内外有求琨手自賦之景和中討義陽王昶六軍戒嚴應須紫㯹左右欲營辦琨曰元嘉初征謝晦有紫檦在匣中不湏更作檢取果得焉而避諱過甚父名懌母名恭心並不得犯焉時咸謂矯枉過正王恵字令明誕從祖弟也祖劭車騎將軍父黙左光禄大夫恵幼而夷簡為叔父司徒謐所知恬静不交游未嘗有雜事陳郡謝瞻才辯有風氣嘗與兄弟羣従造恵談論鋒起文史間發恵時相詶應言清理逺瞻等慙而退宋武帝聞其名以問其從兄誕誕曰恵後來秀令鄙宗之羙也即以為行參軍累遷世子中軍長史時㑹稽内史劉懐敬之郡送者傾都恵亦造别還過從弟球球問向何所見恵言唯覺逢人耳素不與謝靈運相識嘗得交言靈運辯博辭義鋒起恵時然後言時荀伯子在坐退而告人曰靈運固自蕭散直上王郎有如萬頃陂焉嘗臨曲水風雨暴至坐者皆馳散恵徐起不異常日不以霑濡而改宋國初建當置郎中令武帝難其人謂傅亮曰今用郎中令不可減袁曜卿既而曰吾得其人矣曜卿不得獨擅其竒乃以恵居之宋少帝即位以蔡廊為吏部尚書不肯拜乃以恵代焉恵被召即拜未嘗接客人有與書求官得輒聚閣上及去職印封如初時以廊不拜恵即拜事異而意同也兄鑒頗好聚歛恵意不同謂曰何用田為鑒怒曰無田何由得食恵又曰何用食為其標寄如此卒贈太常無子球字蒨玉司徒謐之子恵従父弟也少與恵齊名宋武帝受命為太子中舍人宜都王友轉諮議參軍文帝即位王𢎞兄弟貴動朝廷球終日端拱未嘗相往来𢎞亦雅敬之歴位侍中中書令吏部尚書時中書舍人徐爰有寵於上上嘗命球及殷景仁與之相知球辭曰士庶區别國之章也臣不敢奉詔上改容謝焉球簡貴勢不交游筵席虚静門無異客曇首常云蒨玉亦是玉巵無當耳既而尚書僕射殷景仁領軍將軍劉湛並執重權傾動内外球雖通家姻戚未嘗往来居選職接客甚稀不視求官書疏而銓衡有序遷光禄大夫領廬陵王師時大將軍彭城王義康専以政事為本刀筆幹練者多被意遇謂劉湛曰王敬𢎞王球之属竟何所堪施為自富貴復那可解球兄子履深結劉湛委誠義康與劉斌等球每訓厲不納自大将軍從事中郎轉太子中庶子流涕訴義康不願違離故復為從事中郎文帝甚銜之及誅湛之夕履徒跣告球球命為取履先温酒與之謂曰常日謂汝何履怖不得答球徐曰阿父在汝何憂左右扶郎還齋亦以球故履免死廢於家殷景仁卒球除尚書僕射王師如故素有腳疾多病還家朝直至少録尚書江夏王義恭謂尚書何尚之曰當今乏才羣下宜加戮力而王球放恣如此宜以法糾之尚之曰球有素尚加又多疾公應以淡退求之未可以文案責也義恭又面唘文帝曰王球誠有素譽頗以物外自許端任要切或非所長帝曰誠知如此要是時望所歸昔周伯仁終日飲酒而居此任盖所以崇素徳也遂見優容後以白衣領職十八年卒時年四十九贈特進金紫光禄大夫無子從孫奂為後王彧字景文球從子也祖穆字伯逺司徒謐之長兄位臨海大守父僧朗仕宋位尚書右僕射明帝初以后父加特進贈開府儀同三司諡元公彧名與明帝諱同故以字行伯父智少簡貴有髙名宋武帝甚重之常言見王智使人思仲祖武帝與劉穆之討劉毅而智在焉他日穆之白武帝曰伐國重事公言何乃使王智知武帝笑曰此人髙簡豈聞此軰論議其見知如此為宋國五兵尚書封建陵縣五等子追贈太常智無子故父僧朗以景文繼智幼為從叔球所知憐羙風姿為一時推謝袁粲見之歎曰景文非但風流可悦乃哺歠亦復可觀有一客少時及見謝混答曰景文方謝叔源則為野父矣粲惆悵良久曰恨眼中不見此人景文好言理少與陳郡謝莊齊名文帝嘗與羣臣臨天泉池帝垂綸良久不獲景文越席曰臣以為垂綸者清故不獲貪餌衆皆稱善文帝甚相欽重故為明帝娶景文妹而以景文之名名明帝武帝第五女新安公主先適太原王景深離絶當以適景文景文固辭以疾故不成婚襲爵建陵子元凶以為黄門侍郎未及就孝武入討景文遣間使歸款以父在都下不獲致身事平頗見嫌責猶以舊恩累遷司徒左長史上以散騎常侍舊與侍中俱掌獻替欲髙其選以景文及㑹稽孔顗俱南北之望以補之尋復為司徒左長史以姊墓開不臨赴免官後拜侍中領射聲校尉左衛將軍加給事中太子中庶子坐與奉朝請毛法因蒱戲得錢百二十萬白衣領職景和元年為尚書右僕射明帝即位加領左衛將軍尋加丹陽尹遭父憂起為尚書左僕射丹陽尹固辭僕射出為江州刺史加都督服闋乃受詔封江安縣侯固讓不許後徴為尚書左僕射領吏部揚州刺史加太子詹事不願還朝求為湘州不許時又謂景文在江州不能潔已景文與上幸臣王道隆書深自申理景文屢辭内授上手詔譬之曰尚書左僕射卿已經此任東宫詹事用人雖羙職次政可比中書令耳庶姓作揚州徐干木王休元殷鐡並處之不辭卿清令才望何愧休元毗賛中興豈謝干木綢繆相與何後殷鐡邪司徒以宰相不應帶神州逺遵先㫖京口鄉基義重密邇畿内又不得不同驃騎陜西任要由來用宗室驃騎既去巴陵理應居之中流雖曰閑地控帶二江通接荆郢經塗之要由來有重鎮如此則揚州自成闕刺史卿若有辭便不知誰應處之此選大備與公卿疇懐非聊爾也固辭詹事領選徙為中書令常侍僕射揚州如故又進中書監領太子太傅常侍揚州如故景文固辭太傅上遣新除尚書右僕射禇彦回宣㫖不得已乃受拜時太子及諸皇子竝小上猶為身後計諸將帥吳喜夀寂之之徒慮其不能奉幼主並殺之而景文外戚貴盛張永累經軍旅又疑其將來難信乃自為謡言曰一士不可親弓長射殺人一士王字指景文弓長張字指張永景文彌懼乃自陳求解揚州詔答曰人居貴要但問心若為耳大明之世巢徐二戴位不過執戟權亢人主顔師伯白衣僕射横行尚書中袁粲作僕射領選而人往往不知有粲粲遷為令居之不疑今既省録令便居昔之録至置省事及幹僮竝依録格粲作令來亦不異為僕射人情向粲淡然亦復不改常以此居貴位要任當有致憂兢不卿今雖作揚州太子太傅位雖貴而不關朝政可安不懼差於粲也卿虛心受榮有而不為累貴髙有危殆之懼卑賤有溝壑之憂張單雙災木鴈兩失有心於避禍不如無心於任運夫千仞之木既摧於斧斤一寸之草亦悴於踐蹋髙崖之脩幹與深谷之淺條存亡之要巨細一揆耳晉將畢萬七戰死於牖下蜀相費禕從容坐談斃於刺客故甘心於履危未必逄禍縱意於處安不必全福但貴者自惜故每憂其身賤者自輕故易忘其已然為教者每誡貴不誡賤言其貴滿好自恃也凡名位貴逹人以存懐泰則觸人改容否則行路嗟愕至如賤者否泰不足以動人存亡不足以絓數死於溝瀆困於途路者天地之間亦復何限人不係意耳以此而推貴何必難處賤何必易安但人生自應卑慎為道行已用心務思謹惜若乃吉凶大期正應委之理運遭随參差莫不由命也既非聖人不能見吉凶之先見正是依稀於理言可行而為之耳得吉者是其命吉遇不吉者是其命凶以近事論之景和之世晉平庶人從夀陽歸亂朝人皆為之戰慄而乃遇中興之運袁顗圖避禍於襄陽當時皆羡之謂為陵霄駕鳯遂與義嘉同滅駱宰見狂主語人云越王長頸鳥喙可與共憂不可共樂范蠡去而全身文種留而遇禍今主長頸頗有越王之狀我在尚書中久不去必危遂求江南縣諸都令史住京師者皆遭中興之慶人人蒙爵級宰逢義嘉染罪金木纒身性命幾絶卿耳目所聞見安危在運何可預圖邪上既有疾而諸弟並已見殺唯桂陽王休範人才夲劣不見疑出為江州刺史慮一旦晏駕皇后臨朝則景文自然成宰相門族强盛藉元舅之重嵗暮不為純臣泰豫元年春上疾篤遣使送藥賜景文死使謂曰朕不謂卿有罪然吾不能獨死請子先之因手詔曰與卿周旋欲全卿門户故有此處分敕至之夜景文政與客棊扣函着復還封置局下神色怡然不變方與客棊思行爭刼竟斂子内奩畢徐謂客曰奉敕見賜以死方以敕示客酒至未飲門客焦度在側憤怒發酒覆地曰大丈夫安能坐受死州中文武可數百人足以一奮景文曰知卿至心若見念者為我百口計乃墨啟答敕并謝贈詔酌謂客曰此酒不可相勸自仰而飲之時年六十追贈開府儀同三司諡曰懿長子絢絢字長素早恵年五六嵗讀論語至周監於二代外祖何尚之戲之曰可改耶耶乎文哉絢應聲答曰尊者之名安可戲寧可道草翁之風必舅及長篤志好學位祕書丞先景文卒諡曰恭世子絢弟繢繢字叔素弱冠祕書郎太子舍人轉中書舍人景文以此授超階令繢經年乃受景文封曲安侯繢襲其本爵為始平縣五等男元徽末為黄門郎東陽太守齊武帝為撫軍吏部尚書張岱選繢為長史呈選牒髙帝笑曰此可謂素望再遷義興太守輒録郡吏陳伯喜付陽羡獄欲殺之縣令孔逭不知何罪不受繢教為有司奏坐白衣領職後長兼侍中武帝出射雉繢信佛法稱疾不從永元元年卒於太常諡靖子繢女適武帝寵子安陸王子敬永明二年納妃脩外舅姑之敬武帝遣文恵太子相随往繢家置酒設樂公卿皆冠冕而去當世榮之繢弟約齊明帝世數年廢錮梁武帝時為太子中庶子嘗謂約曰卿方當富貴必不容久滯屈及帝作輔謂曰我嘗相卿當富貴不言卿今日富貴便當見由歴侍中左户尚書廷尉繢長子儁不慧位止建安太守儁子克克羙容貎善容止仕梁歴司徒右長史尚書僕射臺城陷仕侯景位太宰侍中録尚書事景敗克迎侯王僧辯問克曰勞事夷狄之君克不能對次問璽紱何在克黙然良久曰趙平原將去平原名思賢景腹心也景授平原太守故克呼焉僧辯乃誚克曰王氏百世卿族便是一朝而墜仕陳位尚書右僕射藴字彦深彧兄子也父揩太中大夫揩人才凡劣故藴不為羣從所禮常懐恥慨家貧為廣徳令明帝即位四方叛逆欲以將領自奮每撫刀曰龍泉太阿汝知我者叔父景文常誡之曰阿答汝滅我門户藴曰答與童烏貴賤異童烏絢小字答藴小字也及事寧封吉陽男歴晉陵義興太守所莅竝貪縦後為給事黄門侍郎桂陽之逼王道隆為亂兵所殺藴力戰重創御溝側或扶以免事平撫軍長史禇澄為吳郡太守司徒左長史蕭恵開明言於朝曰禇澄開城以納賊更為股肱大郡王藴被甲死戰棄而不収賞罰如此何憂不亂禇彦回慙乃議用藴為湘州刺史及齊髙帝輔政藴與沈攸之連謀事敗斬於秣陵市奐字道明彧兄子也父粹字景深位黄門侍郎奐繼從祖球故小字彦孫年數歳常侍球許甚見愛奐諸兄出身諸王國常侍而奐起家著作佐郎琅邪顔延之與球情欵稍異常撫奐背曰阿奴始免寒士奐少而强濟叔父景文常以家事委之仕宋歴待中祠部尚書轉掌吏部昇明初遷丹陽尹初王晏父普曜為沈攸之長史常懼攸之舉事不得還奐為吏部轉普曜為内職晏深徳之及晏仕齊武帝以奐宋室外戚而從弟藴又同逆疑有異意晏叩頭保奐無異志時晏父母在都請以為質武帝乃止永明中累遷尚書右僕射王儉卒上欲用奐為尚書令以問晏晏位遇已重意不推奐答曰栁世隆有勲望恐不宜在奐後乃轉左僕射加給事中出為雍州刺史加都督與寧蠻長史劉興祖不睦十一年奐遣軍主朱公恩征蠻失利興祖欲以唘聞奐大怒収付獄興祖於獄以針畫漆盒盤為書報家稱枉令唘聞而奐亦馳信唘上誣興祖扇動荒蠻上知其枉敕送興祖還都奐恐辭情翻背輒殺之上大怒遣中書舍人吕文顯直閣將軍曹道剛領兵収奐又别詔梁州刺史曹武自江陵步出襄陽奐子彪凶愚頗干時政士人咸切齒時文顯以漆匣匣箜篌在船中因相誑云臺使封刀斬王彪及道剛曹武文顯俱至衆力既盛又懼漆匣之言於是議閉門拒命長史殷叡奐女壻也諌曰今開城門白服接臺使不過檻車徵還隳官免爵耳彪堅執不從叡又曰宜遣典籖間道送唘自申亦不患不被宥乃令叡書唘遣典籖陳道齊出城便為文顯所執叡又曰忠不背國勇不逃死百世門户宜思後計孰與仰藥自全則身名俱泰叡請先驅螻蟻又不從奐門生鄭羽叩頭唘奐乞出城迎臺使奐曰我不作賊欲先遣唘自申政恐曹吕軰小人相陵藉故且閉門自守耳彪遂出戰敗走歸土人起義攻州西門彪登門拒戰却之司馬黄瑶起寧蠻長史裴叔業於城内起兵攻奐奐聞兵入禮佛未及起軍人斬之彪及弟爽弼殷叡皆伏誅奐長子太子中庶子融融弟司徒從事中郎琛於都棄市餘孫皆原宥琛弟肅秉竝奔魏後得黄瑶起臠食之弟伷女為長沙王晃妃以男女竝長又且出繼特不離絶奐既誅故舊無敢至者汝南許明逹先為奐參軍躬為殯歛經理甚厚當時髙其節奐弟份份字季文仕宋位始安内史哀粲之誅親故無敢視者份獨往致慟由是顯名累遷大司農奐誅後其子肅奔魏份自拘請罪齊武帝宥之肅屢引魏人至邊份嘗因侍坐武帝謂曰比有北信不份改容對曰肅既近忘墳栢寧逺憶有臣帝亦以此亮焉後位祕書監仕梁位散騎常侍領歩兵校尉兼起部尚書武帝嘗於宴席問羣臣曰朕為有為無份曰陛下應萬物為有體至理為無帝稱善後累遷尚書左僕射歴侍中特進左光禄大夫監丹陽尹卒諡曰胡子長子琳字孝璋位司徒左長史琳齊代取梁武帝妹義興長公主有子九人竝知名長子銓字公衡羙風儀善占吐尚武帝女永嘉公主拜駙馬都尉銓雖學業不及弟錫而孝行齊焉時人以為銓錫二王可謂玉昆金友母長公主疾銓形貎瘠貶人不復識及居䘮哭泣無常因得氣疾位侍中丹陽尹卒於衛尉卿子溥字伯淮尚簡文帝女餘姚公主銓弟錫字公嘏幼而警悟與兄弟受業至應休散輒獨留不起精力不倦致損右目十三為國子生十四舉清茂除祕書郎再遷太子洗馬時昭明太子尚幼武帝敕錫與祕書郎張纉使入宮不限日數與太子游狎情兼師友又敕陸倕張率謝舉王規王筠劉孝綽到洽張緬為學士十人盡一時之選錫以戚属封永安侯普通初魏始連和使劉善明來聘敕中書舍人朱异接之善明彭城舊族氣調甚髙負其才氣酒酣謂异曰南國辯學如中書者幾人异曰异所以得接賓宴乃分職是司若以才辯相尚則不容見使善明乃曰王錫張纉北間所聞云何可見异具唘聞敕即使南苑設宴錫與張纉朱异四人而已善明造席遍論經史兼以嘲謔錫纉隨方酬對無所稽疑善明甚相歎挹他日謂异曰一日見二賢實副所期不有君子安能為國引宴之日敕使左右徐僧權於坐後言則書之累遷吏部郎中時年二十四謂親友曰吾以外戚謬被時知兼比羸病庶務難擁安能捨其所好而狥所不能乃稱疾不拜便謝遣胥徒拒絶賔客掩扉覃思室宇蕭然諸子温清隔簾趨倚公主乃命穿壁使子渉湜觀之卒年三十六贈侍中諡貞子錫弟僉僉字公㑹八嵗丁父憂哀毁過禮初補國子生祭酒袁昻稱為通理累遷始興内史丁所生母憂固辭不拜又除南康内史在郡義興主薨詔起復郡後為太子中庶子掌東宫管記卒贈侍中元帝下詔賢而不伐曰恭追諡曰恭子僉弟通通字公逹仕梁為黄門侍郎敬帝承制以為尚書右僕射陳武帝受禪遷右僕射太建元年為左光禄大夫六年加特進侍中將軍光禄佐吏扶竝如故未拜卒諡曰成弟勱勱字公齊羙風儀博涉書史恬然清簡未嘗以利欲干懐仕梁為輕車河東王功曹史王出鎮京口勱將隨之蕃范陽張纉時典選舉勱造纉言别纉嘉其風采乃曰王生才地豈可游外府乎奏為太子洗馬後為南徐州别駕從事史大同末梁武帝謁園陵道出朱方勱随例迎候敕令從輦側所經山川莫不顧問勱随事應對咸有故實又從登北顧樓賦詩辭義清典帝甚嘉之時河東王為廣州刺史乃以勱為冠軍河東王長史南海太守王至嶺南多所侵掠因懼罪稱疾委州還朝勱行州府事越中饒沃前後守宰例多貪縦勱獨以清白著聞入為給事黄門侍郎侯景之亂奔江陵歴位晉陵太守時兵饑之後郡中彫弊勱為政清簡吏人便安之徵為侍中遷五兵尚書㑹魏軍至元帝徴湘州刺史宜豐侯蕭循入援以勱監湘州及魏平江陵敬帝承制以為中書令加侍中歴陳武帝司空丞相長史侍中中書令竝如故及蕭勃平以勱為廣州刺史未行改為衡州刺史王琳據有上流衡廣攜貳勱不得之鎮留于大庾嶺太建元年累遷尚書右僕射時東境大水以勱為晉陵太守在郡甚有威恵郡人表請立碑頌勱政徳詔許之徵為中書監重授尚書左僕射領右軍将軍卒諡曰温子勱弟質質字子貞少慷慨渉獵書史梁世以武帝甥封甲口亭侯位太子中舍人庶子侯景濟江質領歩騎頓于宣陽門外景軍至都質不戰而潰為桑門潜匿人間城䧟後西奔荆州元帝承制歴位侍中吳州刺史領鄱陽内史魏平荆州侯瑱鎮盆城與質不協質率所部依于留異陳永定二年武帝命質率所部随都督周文育討王琳質與琳素善或譖云於軍中潜信交通武帝命文育殺質文育唘救之獲免文帝嗣位以為五兵尚書宣帝輔政為司徒左長史坐招聚博徒免官後為都官尚書卒諡曰安子弟固固字子堅少清正頗渉文史梁時以武帝甥封莫口亭侯位丹陽尹丞梁元帝承制以為相國户曹属掌管記尋聘魏魏人以其梁氏外戚待之甚厚承聖元年為太子中庶子遷尋陽太守魏剋荆州固之鄱陽随兄質度東嶺居信安縣陳永定中移居吴郡文帝以固清静且欲申以婚姻天嘉中歴位中書令散騎常侍國子祭酒以其女為皇太子妃禮遇甚重廢帝即位授侍中金紫光禄大夫宣帝輔政固以廢帝外戚妳媪恒往來禁中頗宣宻㫖事洩比黨皆誅宣帝以固本無兵權且居處清素止免所居官禁錮太建中卒於太常卿諡恭子固清虚寡欲居䘮以孝聞又信佛法及丁所生母憂遂終身蔬食夜則坐禪晝誦佛經嘗聘魏因宴饗祭請停殺一羊羊於固前跪拜又宴昆明池魏人以南人嗜魚大設罟網固以佛法咒之遂一鱗不獲子寛位侍中論曰王誕夙有名軰而間關夷險卒獲攀光日月葢亦得其時焉奉光奉叔竝得官成齊代而亮自著寒松斯為優矣瑩印章六毁豈鬼神之害盈乎景文弱年立譽芳聲籍甚榮貴之來匪由勢至若使泰始之朝身非外戚與袁粲羣公方驂竝路傾覆之災庶幾可免庾元規之讓中書令義歸此矣奐有愚子自致誅夷份𦙍嗣克昌特鍾門慶羙矣南史卷二十三
