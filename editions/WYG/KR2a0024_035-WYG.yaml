body:
  text: 南史卷三十五唐李延夀撰列傳第二十五劉湛庾悦族弟登之逺仲文子𢎞仲文族孫仲容仲文顧琛顧覬之孫憲之劉湛字𢎞仁南陽湼陽人也祖躭父柳竝晉左光祿大夫開府儀同三司湛出繼伯父淡襲封安衆縣五等男少有局力不尚浮華博渉經傳諳前代舊典弱年便有宰物情常自比管葛不為文章不喜談議除宋武帝太尉行參軍賞遇甚厚父柳亡於江州府州送故甚豐一無所受時論稱之服闋為相國參軍謝晦王𢎞竝稱其器幹武帝入受晉命以第四子義康為冠軍將軍豫州刺史留鎮夀陽以湛為長史梁郡太守義康弱年未親政府州事悉委湛進號右將軍仍随府轉義康以本號徙南豫州湛改領歴陽太守為人剛嚴用法姦吏犯贓百錢以上皆殺之自下莫不震肅廬陵王義真出為車騎將軍南豫州刺史湛又為長史太守如故義真時居武帝憂使帳下備膳湛禁之義真乃使左右人買魚肉珍羞於齋内别立㕑帳㑹湛入因命臑酒炙車螯湛正色曰公當今不宜有此設義真曰旦甚寒杯酒亦何傷長史事同一家望不為異酒至湛起曰既不能以禮自處又不能以禮處人後為廣州刺史嫡母憂去職服闋為侍中時王華王曇首殷景仁亦為侍中文帝於合殿與四人宴飲甚悦華等出帝目送良乆歎曰此四賢一時之秀同管喉唇恐後世難繼及撫軍將軍江夏王義恭鎮江陵以湛為使持節南蠻校尉領撫軍長史行府事王𢎞輔政而王華王曇首任事居中湛自謂才能不後之不願外出是行也謂為𢎞等所斥意甚不平常曰二王若非代邸之舊無以至此可謂遭遇風雲湛負其才氣常慕汲黯崔琰為人故名長子曰黯字長孺第二子曰琰字季珪琰於江陵病卒湛求自送喪還都義恭亦為之陳請文帝答義恭曰吾亦得湛啓事為之酸懷乃不欲茍違所請但汝弱年新渉軍務八州殷曠專斷事重疇諮委杖不可不得其人量算二三未獲便相順許今答湛啓權停彼𦵏頃朝臣零落相係寄懷轉寡湛實國器吾乃欲引其令還直以西夏任重要且停此事耳汝慶賞黜罰預得失者必宜悉相委寄義恭性甚狷隘年又漸大欲專政事每為湛所裁主佐之間嫌隙遂搆文帝聞之密遣詰讓義恭義恭陳湛無居下之禮又自以年長未得行意雖奉詔㫖每出怨言上友于素篤欲加酬順乃詔之曰當今之才委受已爾宜盡相彌縫取其可取棄其可棄先是王華既亡曇首又卒領軍將軍殷景仁以時賢零落白文帝徵湛八年召為太子詹事加給事中與景仁竝被任遇湛云今代宰相何難此正可當我南陽郡漢代功曹耳明年景仁轉尚書僕射領選䕶軍將軍湛代為領軍十二年又領詹事湛與景仁素欵又以其建議徵之甚相感悦及俱被時遇猜隙漸生以景仁專内任謂為間巳時彭城王義康專執朝權而湛昔為上佐遂以舊情委心自結欲因宰相之力回主心傾黜景仁獨當時務義康屢言之於文帝其事不行義康僚屬及湛諸附𨽻濳相約勒無敢歴殷氏門者湛黨劉敬文父成未悟其機詣景仁求郡敬文􅃍謝湛曰老父悖耄遂就殷鐡干祿由敬文闇淺上負生成合門慙懼無地自處敬文之姦諂如此義康擅權專朝威傾内外湛愈推崇之無復人臣之禮上稍不能平湛初入朝委任甚重善論政道并諳前代故事聼者忘疲每入雲龍門御者便解駕左右及羽儀随意分散不夕不出以此為常及晚節驅煽義康陵轢朝廷上意雖内離而接遇不改上謂所親曰劉斑初自西還吾與語常看日早晚慮其當去比入亦看日早晚慮其不去湛小字斑獸故云斑也遷丹陽尹詹事如故十七年所生母亡上與義康形迹既乖舋難將結湛亦知無復全地及至丁艱謂所親曰今年必敗常日頼口舌争之故得推遷耳今既窮毒無復此望禍至其能乆乎伏甲於室以待上臨弔謀又泄竟弗之幸十日詔收付廷尉於獄伏誅時年四十九黯等從誅弟素黃門郎徙廣州湛初被收歎曰便是亂邪又曰不言無我應亂殺我日自是亂法耳入獄見素曰乃復及汝邪相勸為惡惡不可為相勸為善正見今日如何湛生女輒殺之為時流所怪庾悦字仲豫潁州􅋣陵人也晉太尉亮之曾孫也祖義呉國内史父淮西中郎將豫州刺史悦仕晉為司徒右長史桓𤣥篡位為中書侍郎宋武平建業累遷建威將軍江州刺史加都督初劉毅家在京口酷貧嘗與鄉曲士大夫往東堂共射時悦為司徒右長史要府州僚佐出東堂毅已先至遣與悦相聞曰身竝貧躓營一遊甚難君如意人無處不可為適豈不能以此堂見讓悦素豪徑前不答毅時衆人竝避唯毅留射如故悦廚饌甚盛不以及毅毅既不去悦甚不歡毅又相聞曰身今年未得子鵝豈能以殘炙見恵悦又不答至是毅表解悦都督將軍官以刺史移鎮豫章以親將趙恢領千兵守尋陽建威府文武三千人悉入毅將府深相挫辱悦不得志疽發背到豫章少日卒登之字元龍悦族弟也曾祖冰晉司空祖蘊廣州刺史父廓東陽太守登之少以彊濟自立初為宋武帝鎮軍參軍預討桓𤣥功封曲江縣五等男累遷新安太守謝晦為荆州刺史請為長史南郡太守仍為衛軍長史登之與晦俱曹氏壻名位本同一旦為之佐意甚不惬到廰牋唯言即日恭到初無感謝之言毎入覲見備持箱囊几席之屬一物不具則不肯坐嘗於晦坐誦西征賦云生有脩短之命位有通塞之遇晦雖恨而常優容之晦拒王師欲登之留守登之不許晦敗登之以無任免官禁錮還家何承天戲之曰因禍為福未必皆知登之曰我亦㡬與三豎同戮承天為晦作表云當浮舟東下戮此三豎故登之為嘲後為司徒長史南東海太守府公彭城王義康專覧政事不欲自下厝意而登之性剛毎陳己志義康不悦出為呉郡太守以贓貨免官後拜豫章太守徵為中䕶軍未拜卒子仲逺初為宋明帝府佐廢帝景和中明帝疑防賓客故人無到門者唯仲逺朝謁不㬱明帝即位謂曰卿所謂疾風知勁草自軍錄事參軍擢拜太子中庶子卒於豫章太守贈侍中登之弟仲文仲文位廣平太守兄登之為謝晦長史仲文往省之時晦權重朝士竝加敬仲文獨與抗禮後為彭城王義康驃騎主簿未就徙為丹陽丞既未到府疑於府公禮敬下禮官博議中書侍郎裴松之議曰案春秋桓公八年祭公逆王后于紀公羊傳曰女在國稱女此其稱王后何王者無外其辭成矣推此而言則仲文為吏之道定於受勑之日矣名器既正則禮亦從之安可以未到廢其節乎宜執吏禮從之後始興王濬當鎮湘州以仲文為司馬濬不之任仍除南梁太守司馬如故于時領軍劉湛協附大將軍彭城王義康而與僕射殷景仁隙凡朝士遊殷氏者不得入劉氏之門獨仲文遊二人間密盡忠於朝廷景仁稱疾不朝見者歴年文帝常令仲文銜命去來湛不疑也義康出藩湛伏誅以仲文為尚書吏部郎與右衛將軍沈演之俱參機密歴侍中吏部尚書領義陽王師内外歸附勢傾朝野仲文為人强急不耐煩賓客訴非理者忿罵形於辭色素無術學不為衆望所推性好潔士大夫造之者未出戸輒令人拭席洗牀時陳郡殷沖亦好浄小史非浄浴新衣不得近左右士大夫小不整潔每容接之仲文好潔反是每以此見譏領選既不緝衆論又頗通貨賄用少府卿劉道錫為廣州刺史道錫至鎮餉白檀牽車常自乘焉或以白文帝帝見問曰道錫餉卿小車裝飾甚麗有之乎仲文懼起謝又仲文請急還家吏部令史錢泰主客令史周伯齊出仲文宅諮事泰能彈琵琶伯齊善歌仲文因留停宿尚書制令史諮事不得宿停外雖八座命亦不許為有司所奏上於仲文素厚將恕之召問尚書右僕射何尚之具陳仲文得失奏言仲文事如丘山若縱而不糺復何以為政晉武不為明主斷鬲令史遂能奮發華廙見待不輕廢錮累年後起改作城門校尉耳若言仲文有誠於國未知的是何事政當云與殷景仁不失其舊與劉湛亦復不疎且景仁當時意事豈復可蔑縱有微誠復何足掩其惡今賈充勲烈晉之重臣雖事業不稱不聞有大罪諸臣進説便即逺出陛下聖叡又更遲遲於此仲文身上之舋既自過於范曄所少賊一事耳伏願深加三思試以諸聲傳普訪諸可顧問者羣下見陛下顧遇既重恐不敢苦侵傷顧問之日宜布嫌責之旨若不如此亦當不辯有所得失時仲文自理不諳臺制令史竝言停外非嫌帝以小事不足傷大臣尚之又陳令史具向仲文説不得停之意仲文了不聼納非為不解直是茍相留耳雖是令史出乃逺虧朝典又不得謂之小事謝晦望實非今者之疇一事錯誤免侍中官王珣時賢少失桓𦙍春蒐之謬皆白衣領職況公犯憲制邪孔萬祀居左局言仲文貴要異他尚書令又云不癡不聾不成姑公敢作此言亦為異也文帝猶優游使尚之更陳其意尚之備言仲文愆曰臣思張遼之言闗羽雖兄弟曹公父子豈得不言觀今人臣憂國甚寡臣復結舌日月之明或有所蔽然不知臣者豈不謂臣有争競之心亦追以悵悵臣與仲文周旋俱被恩接不宜復生厚薄太尉昨與臣言説仲文有諸不可非惟一條逺近相崇畏震動四海仲文先與劉德願殊惡德願自持琵琶甚精麗遺之便復款然市令盛馥進數百口材助營宅恐人知作虛買券劉道錫驟有所輸傾南俸之半劉雍自謂得其力助事之如父夏中送甘蔗若新發於州國吏運載樵蘇無輟於道諸見人有物鮮或不求聞劉遵考有材便乞材見好燭槃便復乞之選用不平不可一二太尉又言仲文都無共事之體凡所選舉悉是其意政令太尉知耳論虞秀之作黃門太尉不正答和故得停太尉近與仲文疏欲用德願兒作州西曹仲文乃啓用為主簿即語德願以謝太尉前後漏泄賣恩亦復何極縱不罪故宜出之自從裴劉刑罰已來諸將力百倍今日事實好惡可問若赫然發憤顯明法憲陛下便可閑卧紫闥無復一事也帝欲出仲文為丹陽又以問尚之答言仲文蹈罪負恩陛下遲遲舊恩未忍窮法方復有尹京赫赫之授恐悉心奉國之人於此而息貪狼恣意嵗月滋甚如臣所聞天下議論仲文恒塵累日月未見一毫增輝乃更成形勢是老王雅也古人言無賞罰雖堯舜不能為政陛下豈可坐損皇家之重迷一凡夫令賈誼劉向重生豈不慷慨流涕於聖世邪臣昔啓范曄當時亦懼犯觸之尤茍是愚懷所挹政自不能不舒達所謂雖九死而不悔也臣謂仲文且外出若能修改在職著稱還亦不難而得少明國典粗酬四海之誚今愆舋如山榮任不損仲文若復有彰大之罪誰敢以聞亦知陛下不能採臣之言故是臣不能以已之意耳又曰臣見劉伯龍大慷慨仲文所行言有人送張幼緒語人吾雖得一縣負錢三十萬庾仲逺仍當送至新林見縛束猶未得解手荀萬秋嘗詣仲文逢一客姓夏侯主人問有好牛不言無問有好馬不又言無政有佳驢耳仲文便答甚是所欲客出門遂相聞索之劉道錫言仲文所舉就道錫索嫁女具及祠器乃當百萬數猶謂不然選令史章龍向臣説亦歎其受納之過言實得嫁女銅鑪四人舉乃勝細葛斗帳等物不可稱數在尚書中令奴酤酃酒利其百十亦是立臺閣所無不審少簡聖聼不帝乃可有司之奏免仲文官卒于家帝錄其宿誠追贈本官子𢎞逺𢎞逺字士操清實有士譽仕齊為江州長史刺史陳顯達舉兵敗斬於朱雀航將刑索帽著之曰子路結纓吾不可以不冠而死謂看者曰吾非賊乃是義兵為諸君請命耳陳公太輕事若用吾言天下將免塗炭𢎞逺子子曜年十四抱持父乞代命遂併殺之仲文從弟徽之位御史中丞徽之子漪齊邵陵王記室漪子仲容仲容字子仲幼孤為叔父泳所飬及長杜絶人事專精篤學晝夜手不輟卷初為安西法曹行參軍泳時貴顯吏部尚書徐勉擬泳子晏嬰為宫僚泳泣曰兄子幼孤人才粗可願以晏嬰所忝回用之勉許焉轉仲容為太子舎人遷安成王主簿時平原劉峻亦為府佐竝以强學為王所禮接後為永康錢唐武康令竝無績多被推劾乆之除安成王中記室當出随府皇太子以舊恩降餞賜詩曰孫生陟陽道吳子朝歌縣未若樊林舉置酒臨華殿時軰榮之後為尚書左丞坐推糺不直兔官仲容博學少有盛名頗任氣使酒好危言高論士友以此少之唯與王籍謝幾卿情好相得二人時亦不調遂相追随誕縱酣飲不持檢操遇太清亂遊㑹稽卒仲容抄子書三十卷諸集三十卷衆家地理書二十卷列女傳三卷文集二十卷竝行於代顧琛字𢎞瑋呉郡呉人晉司空和之曾孫也祖履之父惔竝為司徒左西曹掾琛謹確不尚浮華起家州從事駙馬都尉累遷尚書庫部郎元嘉七年文帝遣到彦之經畧河南大敗悉委棄兵甲武庫為之空虛文帝宴㑹有歸化人在座上問琛庫中仗猶有㡬許琛詭辭答有十萬人仗舊庫仗祕不言多少上既發問追悔失言及琛詭對上甚善之尚書等門有制八座以下門生随入者各有差不得雜以人士琛以宗人顧碩寄尚書張茂度門名而與顧碩同席坐明年坐譴出免中正凡尚書官大罪則免小罪譴出譴出者百日無代人聼還本職琛仍為彭城王義康所請再補司徒錄事參軍十五年出為義興太守初義康請琛入府欲委以腹心琛不能承事劉湛故尋見斥外十九年徙東陽太守欲使琛防守彭城王義康固辭忤旨廢黜還家積年及元凶弑立分㑹稽五郡置州以随王誕為刺史即以琛為㑹稽太守誕起義加冠軍將軍事平遷吳興太守孝建元年為吳郡太守以起義功封永新縣五等候大明元年呉縣令張闓坐居母喪無禮下廷尉錢唐令沈文秀判劾違謬應坐被彈琛宣言於衆闓被劾之始屢相申明又云當啓文秀留縣孝武聞之大怒謂琛賣惡歸上免官琛母老仍停家琛及前西陽太守張牧竝事司空竟陵王誕誕反遣客陸延稔齎書板琛及子弟官時孝武以琛素結事誕或有異志遣信就吳郡太守王曇生誅琛父子㑹延稔先至琛等即執斬之遣二子送延稔首啓聞孝武所遣誅琛使其日亦至而獲免琛母孔氏時年百餘嵗晉安帝隆安初琅邪王廞於呉中作亂以為貞烈將軍悉以女人為官屬以孔氏為司馬及孫恩亂後東土饑荒人相食孔氏散家糧以賑邑里得活者甚衆生子皆以孔為名焉琛仍為呉興太守明年坐郡人多翦錢及盜鑄免官歴位都官尚書廢帝即位為呉郡太守初琛景平中為朝請假還東日晚至方山于時商旅數十船悉泊岸側有一人𤣥衣介幘執鞭屏諸船云顧呉郡部伍尋至應泊此岸於是諸船各東西俄有一假裝至事力甚寡仍泊向處人問顧呉郡早晚至船人答無顧呉郡又問何船曰顧朝請耳莫不驚怪琛意竊知為善徵因誓之曰若得郡當於此立廟至是果為呉郡乃立廟方山號白馬廟云明帝泰始初與四方同反兵敗奉母奔㑹稽臺軍既至歸降後為員外常侍中散大夫卒次子寳先大明中為尚書水部郎先是琛為左丞荀萬秋所劾及寳先為郎萬秋猶在職自陳不拜孝武詔曰勑違糾慢憲司之職若有不公自當更有釐改而自頃劾無輕重輒致私絶此風難長主者嚴為其科先是宋世江東貴達者㑹稽孔季恭子靈符呉興丘深之及琛呉音不變深之字思𤣥呉興烏程人位侍中都官尚書卒於太常顧覬之字偉仁呉郡呉人也高祖謙字公讓晉平原内史陸機姊夫祖崇大司農父黃老司徒左西曹掾覬之為謝晦衛軍參軍晦愛其雅素深相知待歴位尚書都官郎殷劉隙著覬之不欲與殷景仁乆接乃辭腳疾免歸每夜常於床上行脚家人竊異之而莫曉其意及義康徙廢朝廷多受禍覬之竟免後為山隂令山隂􅇵邑三萬戸前後官長晝夜不得休事猶不舉覬之御繁以約縣用無事晝日垂簾門階閑寂自宋世為山隂務簡而事理莫能尚也後為尚書吏部郎嘗於文帝坐論江東人物言及顧榮袁淑謂覬之曰卿南人怯懦豈辦作賊覬之正色曰卿乃復以忠義笑人淑有愧色孝建中為湘州刺史以政績稱大明元年徵守度支尚書轉吏部尚書時沛郡相縣唐賜往比村彭家飲酒還因得病吐蠱二十餘物賜妻張從賜臨終言死後親刳腹五藏悉縻碎郡縣以張忍行刳剖賜子副又不禁止論妻傷夫五藏刑子不孝母子棄市竝非科例三公郎劉勰議賜妻痛往遵言兒識謝及理考事原心非在忍害謂宜哀矜覬之議以妻子而行忍酷不宜曲通小情謂副為不孝張同不道詔如覬之議後為吳郡太守幸臣戴法興權傾人主而覬之未嘗低意左光祿大夫蔡興宗與覬之善嫌其風節過峻覬之曰辛毗有云孫劉不過使吾不為三公耳後卒於湘州刺史諡曰簡子覬之家門雍穆為州郡所重子綽私財甚豐鄉里士庶多負責覬之禁不能止及後為吳郡誘出文券一大厨悉令焚之宣語逺近皆不湏還綽懊歎彌日覬之常執命有定分非智力所移唯應恭已守道信天任運而闇者不達妄意徼倖徒虧雅道無闗得喪乃以其意命弟子愿作定命論愿字子恭父深之散騎侍郎愿好學有才辭卒於太子舍人覬之孫憲之憲之字士思性尤清直宋元徽中為建康令時有盜牛者與本主争牛各稱己物二家辭證等前後令莫能決憲之至覆其狀乃令解牛任其所去牛徑還本宅盜者始伏其罪時人號曰神明至於權要請託長吏貪殘據法直繩無所阿縱性又清儉强力為政甚得人和故都下飲酒者醇㫖輒號為顧建康謂其清且美焉仕齊為衡陽内史先是郡境連嵗疾疫死者大半棺槨尤貴悉裏以葦席棄之路傍憲之下車分告屬縣求其親黨悉令殯𦵏其家人絶滅者憲之出公祿使紀綱營護之又土俗山人有病輒云先亡為禍皆開冢剖棺水洗枯骨名為除祟憲之曉諭為陳生死之别事不相由風俗遂改時刺史王奐初至唯衡陽獨無訟者乃歎曰顧衡陽之化至矣若九郡率然吾將何事後為東中郎長史行㑹稽郡事山隂人呂文度有寵於齊武帝於餘姚立邸頗縱橫憲之至郡即日除之文度後還𦵏郡縣争赴弔憲之不與相聞文度甚銜之亦卒不能傷也時西陵戌主杜元懿以呉興嵗儉㑹稽年登商旅往來倍嵗西陵牛埭税官格日三千五百求加至一倍計年長百萬浦陽南北津及栁浦四埭乞為官領攝一年格外長四百許萬武帝以示㑹稽使陳得失憲之議曰尋始立牛埭非茍通僦以納税也當以風濤迅險人力不㨗濟急以利物耳既公私是樂故輸直無怨京師航渡即其例也而後之監領各務已功或禁遏别道人生理㑹凡如此類不經埭煩牛者上詳被報䝉停格外十條從來喧訴始得暫弭案吳興頻嵗失稔今茲尤饉去乏從豐良由饑棘舊格新減尚未議登格外加倍將以何術皇慈恤隐振廪蠲調而元懿幸災𣙜利重增困瘼人而不仁古今共疾且比見加格置市者前後相屬非唯新加無贏竝皆舊格有闕愚恐元懿今啓亦當不殊若事不副言懼貽譴詰便百方侵苦為公賈怨其所欲舉腹心亦當獸而冠耳書云與其有聚斂之臣寧有盜臣言盜公為損蓋微斂民所害乃大也然掌斯任者應簡亷平則無害於人愚又以便宜者蓋謂便於公宜於人也竊見頃之言便宜者非能於人力之外用天分地者也率皆即日不宜於人方來未便於公名與實反有乖政體凡如此等誠宜深察山隂一縣課戸二萬其人貲不滿三千者殆將居半刻又刻之猶且三分餘一凡有貲者多是士人復除其貧極者悉皆露户役人三五屬官竝惟正供百端輸調又則常然皆衆局檢校首尾尋續橫相質累者亦復不少一人被攝十人相追一緒裁萌千孽互起蠶事弛而農業廢賤取庸而貴舉責應公贍私日不暇給欲無為非其可得乎死且不憚矧伊刑罰身且不愛何况妻子是以前檢未窮後巧復滋網辟徒峻猶不能悛竊尋人之多偽實由宋季軍旅繁興役賦殷重不堪勤􅇵竒巧所優積習生常遂迷忘反四海之大庶黎之衆心用參差難卒澄一化宜以漸不可疾責誠存不擾藏疾納洿務詳寛簡則稍自歸淳又被簡符前後累千符㫖既嚴不敢闇信縣簡送郡郡簡呈使殊形詭狀千變萬源聞者忽不經懷見殊刑者實足傷駭兼親屬里伍流離道路時轉窮涸事方未已其士人婦女彌難厝衷不簡則疑其有巧欲簡復未知所安愚謂此條宜委縣保舉其綱領略其毛目乃當有漏不出貯中庶嬰疾沉痼者重荷生造之恩也又永興諸暨離唐㝢寇擾公私殊燼彌復特甚儻逢水旱實不易思俗諺云㑹稽打鼓送恤吳興歩擔令史㑹稽舊稱沃壤今猶若此呉興本是塉土事在可知因循餘弊誠宜改張武帝竝從之由是深以方直見知遷南中郎巴陵王長史南兖南豫二州事典籖諮事未嘗接以顔色動遵法制時司徒竟陵王於宣城臨成定陵三縣界立屯封山澤數百里禁人樵採憲之固陳不可言甚切直王曰非君無以聞此德音即命罷屯禁遷給事黃門兼尚書吏部郎中宋時其祖覬之嘗為吏部於庭列植嘉樹謂人曰吾為憲之植耳至是憲之果為此職永明中為豫章内史在任清簡務存寛恵有貞婦萬晞者少孀居無子事舅姑尤孝父母欲奪而嫁之誓死不許憲之賜以束帛表其節義梁武帝平建業為揚州牧徵憲之為别駕從事史比至而已受禪憲之風疾漸篤因求還呉就加太中大夫憲之雖累經宰郡資無儋石及歸環堵不免饑寒天監八年卒於家臨終為制勅其子曰夫出生入死理均晝夜生既不知所從死亦安識所往延陵云精氣上歸于天骨肉下歸于地魂氣則無所不之良有以也雖復茫昧難徵要若非妄百年之期迅若馳隙吾今預為終制瞑目之後念竝遵行勿違吾志也莊周澹臺逹生者也王孫士安矯俗者也吾進不及達退無所矯常謂中都之制允理愜情衣周於身示不違禮棺周於衣足以蔽臭入棺之物一無所湏載以輴車覆以麤布為使人勿惡也漢明帝天子之尊猶祭以杅水脯糗范史雲列士之高亦奠以寒水乾飯況吾卑庸之人其可不節哀也喪易寧慼自是親親之情禮奢寧儉差可得由吾意不湏常施靈筵可止設香燈使致哀者有憑耳朔望祥忌可權安小牀蹔施几席唯下素饌勿用牲牢蒸嘗之祠貴賤罔替備物難辦多致疎怠祠先自有舊典不可有闕自吾已下止用蔬食時果勿同於上世示令子孫四時不忘其親耳孔子云雖菜羮𤓰祭必齋如者本貴誠敬豈求備物哉所著詩賦銘讚并衡陽郡記數十篇論曰古人云利令智昏甚矣利害之相傾也劉湛識用才能實包經國之畧豈知移弟為臣則君臣之道變用兄成主則兄弟之義殊而執數懷姦茍相宗悦與夫推長㦸而犯順何以異哉昔華元敗則以羊羮而取禍觀夫庾悦亦鵝炙以速尤乾餱以愆斯相類矣登之因禍而福倚伏無常仲文賄而為災乃狥財之過也顧琛呉郡徵兆於初筮覬之清白之迹見於暮年憲之莅政所在稱美時移三代一德無虧求之古人未為易遇觀其遺命可謂有始有卒者矣南史卷三十五南史卷三十五考證劉湛傳博渉經傳經閣本作史武帝入受晉命入監本訛又今改从宋書第二子曰琰字季珪琰於江陵病卒第二琰字監本誤母今从宋書改正主佐之間嫌隙遂搆佐監本訛佑今从閣本又曰不言無我應亂殺我日自是亂法耳監本作不言無戎應亂今从宋書庾悦傳經前不答毅時衆人並避時宋書作語庾登之傳子仲逺仲宋書作冲南史卷三十五考證
