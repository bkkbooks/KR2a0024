body:
  text: 南史卷六十七唐李延夀撰列傳第五十七胡穎徐度子敬成杜稜周鐵虎程靈洗子文季沈恪陸子隆錢道戢駱文牙孫瑒徐世譜周敷荀朗周炅魯悉達弟廣達蕭摩訶子世亷任忠樊毅弟猛胡穎字方秀呉興人也偉姿容性寛厚梁末陳武帝在廣州穎深自結託從克元景仲平蔡路餋李遷仕皆有功武帝進軍頓西昌以穎為巴丘令鎮大臯督糧運下至豫章以穎監豫章郡武帝率衆與王僧辯㑹白茅灣同討侯景以穎知留府事梁承聖初元帝授穎羅州刺史封漢陽縣侯尋除豫章内史隨武帝鎮京口齊遣郭元建出東闗武帝令穎率府内驍勇隨侯瑱於東關大破之後從武帝襲王僧辯又隨周文育於吳興討杜龕武帝受禪兼左衞將軍天嘉元年除散騎常侍呉興太守卒官諡曰壯二年配享武帝廟庭子六同嗣徐度字孝節安陸人也少倜儻不拘小節及長姿貎瓌偉嗜酒好博恒使僮僕屠酤為事初從梁始興内史蕭介征諸山洞以驍勇聞陳武帝在交阯乃委質焉侯景之亂武帝剋廣州平蔡路飬破李遷仕計畫多出於度侯景平後追錄前後戰功封廣徳縣侯武帝鎮朱方除蘭陵太守武帝遣衡陽獻王往荆州度率所領從焉江陵覆亡間行東歸武帝東討杜龕奉敬帝幸京口以度領宿衞并知留府事徐嗣徽任約等來寇武帝與敬帝還都時賊已據石頭使度頓軍於冶城寺明年嗣徽等又引齊寇濟江度隨衆軍破之於北郊壇以功除郢州刺史兼領呉興太守文帝即位累遷侍中中撫將軍開府儀同三司進爵為公天嘉元年以平王琳功改封湘東郡公及太尉侯瑱薨于湘州以度代瑱為都督湘州刺史秩滿復為侍中中軍大將軍文帝崩度預顧命許以甲仗五十人入殿省廢帝即位進位司空薨贈太尉諡曰忠肅太建四年配享武帝廟庭子敬成嗣敬成幼聰慧好讀書起家著作佐郎永定元年領度所部士卒隨周文育侯安都征王琳於沌口敗績為琳所縶二年隨文育安都得歸父度為呉郡太守以敬成監郡光大元年為巴州刺史尋領水軍隨吳明徹平華皎太建二年以父憂去職尋起為南豫州刺史襲爵湘東郡公五年除呉興太守隨都督呉明徹北討出秦郡别遣敬成為都督乘金翅自歐陽引埭泝江由廣陵齊人皆城守弗敢出自繁梁湖下淮剋淮隂山陽鹽城三郡仍進剋鬱州進號壯武將軍鎮朐山坐於軍中輒科訂并誅新附者免官尋除安州刺史鎮宿豫卒諡曰思子敞嗣杜稜字雄盛吳郡錢唐人也少落泊不為時知頗渉書傳游嶺南事梁廣州刺史新渝侯蕭映映卒從陳武帝平蔡路飬李遷仕皆有功梁元帝承制授石州刺史上陌縣侯侯景平後武帝鎮朱方以稜監義興琅邪二郡武帝謀誅王僧辯引稜與侯安都等共議稜難之武帝懼其泄已乃以手巾絞稜稜悶絶於地因閉於别室軍發召與同行及僧辯平後武帝東征杜龕等留稜與安都居守徐嗣徽任約引齊師濟江攻臺城安都與稜隨方抗拒未嘗解帶賊平以功除右衞將軍丹陽尹永定元年位侍中中領軍武帝崩文帝在南皖時内無嫡嗣外有强敵侯瑱侯安都徐度等並在軍中朝庭宿將唯稜在都獨典禁兵乃與蔡景歴等祕不發喪奉迎文帝文帝即位遷領軍將軍以預建立功改封永城縣侯位丹陽尹廢帝即位加特進侍中光大元年解尹量置佐史給扶太建元年出為呉興太守二年徴為侍中尋加特進䕶軍將軍三年以公事免侍中䕶軍四年復為侍中右光祿大夫將軍佐史扶並如故稜歴事三帝並見恩寵末年不預征役優游都下頃之卒於官贈開府儀同三司諡曰成配享武帝廟庭子安世嗣周鐵虎不知何許人也語音傖重膂力過人便馬槊事梁河東王蕭譽以勇敢聞譽為湘州以為臨蒸令侯景之亂梁元帝遣世子方等伐譽譽拒戰大捷方等死鐵虎功最及王僧辯討譽於陣獲之將烹焉鐵虎呼曰侯景未滅柰何殺壯士僧辯竒其言宥之還其麾下及侯景西上鐵虎從僧辯剋任約獲宋子仙每戰有功元帝承制授潼州刺史封沌陽縣子又從僧辯定建鄴降謝答仁平陸納於湘州錄前後功進爵為侯陳武帝誅僧辯鐵虎率所部降因復其本職徐嗣徽引齊寇度江鐵虎破其水軍嗣徽平遷太子左衞率尋隨周文育拒蕭勃文育命鐵虎偏軍襲勃禽勃前軍歐陽頠又隨文育西征王琳於沌口敗績與文育侯安都並為琳所禽琳見諸將與語唯鐵虎辭氣不屈故琳盡宥文育之徒獨鐵虎見害贈侍中䕶軍天嘉三年文帝又詔配食武帝廟庭子瑜嗣程靈洗字𤣥滌新安海寧人也少以勇力聞歩行日二百里便騎善游素為鄉里畏伏侯景之亂據黟歙聚徒以拒景景軍據有新安新安太守湘西鄉侯蕭隱奔依靈洗靈洗奉以主盟梁元帝授靈洗譙州刺史資領新安太守封巴丘縣侯後助王僧辯鎮防及武帝誅僧辯靈洗率所領來援其夜力戰於石頭西門武帝軍不利遣使招諭久之乃降帝深義之授蘭陵太守仍助防京口及平徐嗣徽靈洗有功除南丹陽太守封遂安縣侯後隨周文育西討王琳軍敗為琳所拘尋與侯安都等逃歸累遷太子左衞率武帝崩王琳前軍東下靈洗於南陵破之虜其兵士并獲青龍十餘乘以功授都督南豫州刺史侯瑱等敗王琳于柵口靈洗逐北據有魯山徴為左衞將軍天嘉四年周廸重寇臨川以靈洗為都督自鄱陽别道擊之廸又走山谷間遷中䕶軍出為都督郢州刺史廢帝即位進號雲麾將軍華皎之反遣使招靈洗靈洗斬皎使以聞朝廷深嘉其忠因推心待之使其子文季領水軍助防時周將元定率歩騎二萬助皎圍靈洗靈洗嬰城固守及皎敗乃出軍躡定定不獲濟江以其衆降因進攻剋周沔州禽其刺史裴寛以功改封重安縣公靈洗性嚴急御下甚苛刻士卒有小罪必以軍法誅之號令分明與士卒同甘苦衆亦以此徳之性好播植躬勤耕稼至於水陸所宜刈穫早晚雖老農不能及也妓妾無游手並督之紡績至於散用貲財亦弗儉吝卒贈鎮西將軍開府儀同三司諡曰忠壯太建四年配享武帝廟庭子文季嗣文季字少卿幼習騎射多幹略果決有父風靈洗與周文育侯安都等敗於沌口為王琳所執武帝召陷賊諸子弟厚遇之文季最有禮容深見賞文帝嗣位除宣惠始興王府限内中直兵參軍累遷臨海太守後乘金翅助父鎮郢城華晈平靈洗及文季並有扞禦之功及靈洗卒文季盡領其衆起為超武將軍仍助防郢州文季性至孝雖軍旅奪禮而毁瘠甚至服闋襲封重安縣公隨都督章昭達率軍往荆州征梁梁人與周軍多造舟艦置於青泥水中昭達遣文季共錢道戢盡焚其舟艦既而周兵大出文季僅以身免以功加通直散騎常侍太建五年都督呉明徹北討至秦郡秦郡前江浦通涂水齊人並下大柱為杙柵水中文季乃前領騎勇抜開其柵明徹率大軍自後而至攻剋秦郡又别遣文季攻涇州屠其城進㧞旴􅇇仍隨明徹圍夀陽文季臨事謹飭御下嚴整前後所克城壘率皆迮水為堰土木之功動踰數萬置陣役人文季必先於諸將夜則早起迄暮不休軍中莫不服其勤幹每戰為前鋒齊軍深憚之謂為程彪以功除散騎常侍帶新安内史累遷北徐州刺史加都督後隨明徹北侵軍敗為周所囚仍授開府儀同三司十一年自周逃歸至渦陽為邉吏執送長安死于獄是時既與周絶不之知至徳元年後主知之贈散騎常侍又詔傷其廢絶降封重安縣侯以子響襲封沈恪字子恭呉興武康人也深沉有幹局梁新渝侯蕭映之為廣州兼映府中兵參軍陳武帝與恪同郡情好甚昵蕭映卒後武帝南討李賁仍遣妻子附恪還鄉尋補東宫直後以嶺南勲除員外散騎侍郎仍令總集宗從子弟侯景圍臺城起東西二土山以逼城城内亦作土山應之恪為東土山主晝夜拒戰以功封東興侯及城䧟間行歸鄉武帝討景遣使報恪恪於東起兵相應賊平後授都軍副及武帝謀討王僧辯恪預兵事武帝使文帝還長城立柵備杜龕使恪還武康招集兵衆及僧辯誅龕果遣副將杜泰襲文帝於長城恪時已出縣誅龕黨與武帝尋遣周文育來援長城文育至泰乃走及龕平文帝襲束揚州刺史張彪以恪監呉興郡武帝受禪時恪自呉興入朝武帝使中書舍人劉師知引恪令勒兵入因衞敬帝如别宫恪排闥入見武帝叩頭謝曰恪身經事蕭家來今日不忍見此事分受死耳決不奉命武帝嘉其意不復逼更以盪主王僧志代之帝踐阼除呉興太守永定三年除散騎常侍會稽太守歴事文帝及廢帝累遷䕶軍將軍至宣帝即位除平越中郎將都督廣州刺史恪未至嶺前刺史歐陽紇舉兵拒嶮不得進朝廷遣司空章昭達討平紇乃得入州兵荒之後所在殘毁恪綏懐安輯被以恩惠嶺表賴之後主即位為特進金紫光祿大夫卒諡曰光子法興嗣陸子隆字興世呉郡人也祖敞之梁嘉興令父悛封氏令子隆少慷慨有志功名侯景之亂於鄉里聚徒時張彪為呉郡太守引為將帥仍隨彪徙鎮會稽及文帝討彪彪將沈泰呉寶眞申縉等皆降而子隆力戰敗績文帝義之復使領其部曲文帝嗣位子隆力戰領甲仗宿衞封益陽縣子累遷廬陵太守周廸據臨川反子隆隨章昭達討廸廸退走因隨昭達討陳寶應晉安平子隆功最遷武州刺史改封潮陽縣伯革晈據湘州反以子隆居其心腹晈深患之頻遣使招子隆不從攻又不剋及晈敗於郢州子隆出兵襲其後因與大軍相㑹進爵為侯尋遷都督荆州刺史荆州新置居公安城池未固子隆修立城郭綏集夷夏甚得人和號為稱職吏人詣闕求立碑頌美功績詔許之卒諡威子之武嗣之武年十六領其舊軍後為𢎞農太守乃𨽻呉明徹於吕梁軍敗逃歸為人所害子隆弟子才亦有幹略從子隆征討有功除始平太守封始康縣子卒於信州刺史錢道戢字子韜呉興長城人也父景深梁漢夀令道戢少以孝行著聞及長頗有材幹陳武帝微時以從妹妻焉武帝輔政道戢隨文帝平張彪於㑹稽以功拜東徐州刺史封永嘉縣侯天嘉元年為臨海太守侯安都之討留異道戢帥軍出松陽以斷其後異平以功拜都督衡州刺史領始興内史後與章昭達討歐陽紇紇平除左衞將軍太建二年又隨昭達征江陵以功加散騎常侍後為都督郢州刺史與儀同黄法􅉤攻下歴陽因以道戢鎮之卒官諡曰肅子邈嗣駱文牙字旗門呉興臨安人也父裕梁鄱陽嗣王中兵參軍事牙年十二宗人有善相者云此郎容貎非常必將逺致梁太清末陳文帝避地臨安文牙母陳覩帝儀表知非常人賓待甚厚及帝為呉興太守引文牙為將帥從平杜龕張彪勇冠衆軍文帝即位封臨安縣侯位越州刺史初文牙母卒時兵荒至是始葬詔贈臨安國太夫人諡曰恭太建八年文牙累遷散騎常侍入直殿省十年授豐州刺史至徳二年卒贈廣州刺史子義嗣孫瑒字徳璉呉郡呉人也父修道梁中散大夫以雅素知名瑒少倜儻好謀略博涉經史尤便書翰仕梁爲邵陵王中兵參軍事太清之難授假節宣猛将軍軍主王僧辯之討侯景也王琳為前軍琳與瑒親婭乃表薦為宜都太守後以軍功封富陽侯敬帝立累遷巴州刺史及陳武帝受禪王琳立梁永嘉王蕭荘於郢州徵瑒為少府卿仍徙都督郢州刺史總留府之任周遣大將軍史寧乘虚攻之瑒兵不滿千人乘城拒守周兵不能剋及王琳乘勝而進周兵乃解瑒於是盡有中流之地既而遣使奉表歸陳天嘉元年授湘州刺史封定襄縣侯瑒懐不自安乃固請入朝徴為侍中領軍將軍未拜文帝謂曰昔朱買臣願為本郡卿豈有意授乎改授呉郡太守給鼓吹一部秩滿徴拜散騎常侍中護軍及留異反據東陽詔瑒督舟師進討異平遷鎮右將軍頃之出為建安太守太建四年為都督荆州刺史出鎮公安為鄰境所憚居職六年以公事免及呉明徹軍敗吕梁詔授都督緣江水陸諸軍事尋授都督郢州刺史十二年坐疆場交通抵罪後主嗣位復爵邑歴位度支尚書侍中祠部尚書後主頻幸其宅賦詩述勲徳之羙遷五兵尚書領左軍將軍侍中如故禎明元年卒官諡曰桓瑒事親以孝聞於諸弟甚篤睦性通泰有財散之親友居家頗失於侈家庭穿築極林泉之致歌鍾舞女當世罕儔賓客填門軒蓋不絶及出鎮郢州乃合十數船為大舫於中立亭池植荷芰每良辰美景賓僚並集泛長江而置酒亦一時之勝賞焉常於山齋設講肆集𤣥儒之士冬夏資奉為學者所稱而處已率易不以名位驕物時興皇寺朗法師該通釋典瑒每造講筵時有抗論法侣莫不傾心又巧思過人為起部尚書軍國器械多所創立有鑒識男女婚姻皆擇素貴及卒尚書令江總為之銘誌後主又題銘後四十字遣左戸尚書蔡徴就宅宣敕鐫之其詞曰秋風動竹烟水驚波幾人樵徑何處山阿今時日月宿昔綺羅天長路逺地久靈多功臣未勒此意如何時論以為榮瑒二十一子第二子訓頗知名位高唐太守陳亡入隋徐世譜字興宗巴東魚復人也世居荆州為主師征伐蠻蜒至世譜尤勇敢有旅力善水戰梁元帝之為荆州刺史世譜將領鄉人事焉侯景之亂因預征討累遷至員外散騎常侍尋領水軍從司徒陸法和與景戰於赤亭湖時景軍甚盛世譜乃别造樓船拍艦火舫水車以益軍勢將戰又乘大艦居前大敗景軍禽景將任約景退走因隨王僧辯攻郢州世譜復乘大艦臨其倉門賊將宋子仙據城降以功除信州刺史封魚復縣侯仍隨僧辯東下恒為軍鋒景平以衡州刺史資領河東太守西魏攻荆門世譜鎮馬頭岸據有龍洲元帝授侍中都督江南諸軍事鎮南將軍䕶軍將軍魏剋江陵世譜東下依侯瑱紹泰元年徵為侍中左衞將軍陳武帝之拒王琳其水戰之具悉委世譜世譜性機巧諳解舊法所造器械並隨機損益妙思出人永定二年遷䕶軍將軍文帝即位歴特進右光祿大夫以疾失明謝病不朝卒諡曰桓周敷字仲逺臨川人也為郡豪族敷形貎眇小如不勝衣膽力勁果超出時軰性豪俠輕財重士鄉黨少年任氣者咸歸之侯景之亂鄉人周續合衆以討賊為事梁内史始興蕃王蕭毅以郡讓續續所部有欲侵掠毅者敷擁護之親率其黨捍送至豫章時梁觀寧侯蕭永長樂侯蕭基豐城侯蕭泰避難流寓聞敷信義皆往依之敷愍其危懼屈體崇敬厚加給䘏送之西上俄而續部下將帥爭權殺續以降周廸廸素無簿閥又失衆心倚敷族望深求交結敷未能自固事廸甚恭廸大憑仗之廸據臨川之工塘敷鎮臨川故郡侯景平梁元帝授敷寧州刺史封西豐縣侯陳武帝受禪王琳據有上流余孝頃與琳黨李孝欽等共圍周廸敷助於廸廸禽孝頃等敷功最多熊曇朗之殺周文育據豫章將兵襲敷敷大破之曇朗走巴山郡敷因與周廸黄法􅉤等進兵屠之王琳平授散騎常侍豫章太守時南江酋帥並顧戀巢窟唯敷獨先入朝天嘉二年詣闕進號安西將軍令還鎮豫章周廸以敷素出已下超致顯達深不平乃舉兵反遣弟方興襲敷敷大破之仍從都督呉明徹攻破廸禽方興再遷都督南豫州刺史廸又收餘衆襲東興文帝遣都督章昭達征廸敷又從軍至定川縣與廸相對廸紿敷求還朝欲立盟敷許之方登壇為廸所害諡曰脱子智安嗣位至太僕卿荀朗字深明潁川潁隂人也祖延祖梁潁川太守父伯通衞尉卿朗少慷慨有將帥大略侯景之亂據巢湖無所屬臺城䧟没後梁簡文帝密詔授朗豫州刺史令與外蕃討景景使儀同宋子仙任約等頻征之不能剋時都下饑朗更招致部曲衆至數萬侯景敗於巴陵朗截破其後軍景平後又别破齊將郭元建於踟蹰山及魏剋荆州陳武帝入輔齊遣蕭軌東方老等來寇據石頭朗自宣城來赴與侯安都等大破之武帝受禪賜爵興寧縣侯以朗兄昻為左衞將軍弟晷為太子右衞率武帝崩宣太后與舍人蔡景歴祕不發喪朗弟曉在都微知之謀率其家兵䕶臺事覺景歴殺曉仍繫其兄弟文帝即位並釋之因厚撫朗令與侯安都等拒王琳琳平遷都督合州刺史卒諡曰壯子法尚嗣法尚少倜儻有文武幹略禎明中為都督郢州刺史及隋軍濟江法尚降入隋歴邵觀綿豐四州刺史巴東敦煌二郡太守周炅字文昭汝南安成人也祖强齊梁州刺史父靈起梁廬桂二州刺史保城縣侯炅少豪俠任氣有將帥才梁太清元年為弋陽太守侯景之亂元帝承制改授西陽太守封西陵縣伯以軍功累遷都督江州刺史進為侯陳武帝踐阼王琳擁據上流炅以州從之後為侯安都所禽送都文帝釋之授定州刺史帶西陽武昌二郡太守太建五年為都督安州刺史改封龍源縣侯其年隨都督呉明徹北討所向剋捷一月之中獲十二城敗齊尚書左丞陸騫軍進攻巴州剋之於是江北諸城及榖陽土人並誅其渠帥以城降進號和戎將軍仍敕追炅入朝後梁定州刺史田龍昇以城降詔以為定州刺史封赤亭王及炅入朝龍昇以江北六州七鎮叛入于齊齊遣歴陽王高景安應之於是令炅為江北道大都督總統衆軍以討龍昇斬之盡復江北之地進號平北將軍卒於官贈司州刺史改封武昌郡公諡曰壯魯悉達字志通扶風郿人也祖斐齊衡州刺史陽塘侯父益之梁雲麾將軍新蔡義陽二郡太守悉達幼以孝聞侯景之亂糺合鄉人保新蔡力田蓄榖時兵荒都下及上川餓死者十八九有得存者皆攜老幼以歸焉悉達所濟活者甚衆招集晉熙等五部盡有其地使其弟廣達領兵隨王僧辯討平侯景梁元帝授北江州刺史敬帝即位王琳據有上流留異余孝頃周廸等所在蠭起悉達撫綏五郡甚得人和琳授悉達鎮北將軍陳武帝亦遣趙知禮授征西將軍江州刺史悉達兩受之遷延顧望武帝遣安西將軍沈泰潛師襲之不能剋齊遣行臺慕容紹宗來攻鬱口諸鎮悉達與戰大敗齊軍紹宗僅以身免王琳欲圖東下以悉達制其中流遣使招誘悉達終不從琳不得下乃連結於齊齊遣清河王高岳助之㑹裨將梅天飬等懼罪乃引齊軍入城悉達勒麾下数千人濟江而歸武帝帝見之喜曰來何遲也授北江州刺史彭澤縣侯悉達雖仗氣任俠不以富貴驕人雅好詞賦招禮賢才與之賞會文帝即位遷呉州刺史遭母憂哀毁過禮因遘疾卒諡孝侯子覽嗣弟廣達廣達字徧覽少慷慨志立功名虚心愛士賓客自逺而至時江表將帥各領部曲動以千數而魯氏尤為多仕梁為平南當陽公府中兵參軍侯景之亂與兄悉達聚衆保新蔡梁元帝承制授晉州刺史王僧辯之討侯景廣達出境候接資奉軍儲僧辯謂沈炯曰魯晉州亦是王師東道主人仍率衆隨僧辯景平加員外散騎常侍陳武受禪授東海太守後代兄悉達為呉州刺史封中宿縣侯光大元年遷南豫州刺史華晈稱兵上流詔司空淳于量進討軍至夏口見晈舟師强盛莫敢進廣達首率驍勇直衝賊軍廣達隨水沉溺久之因救獲免晈平授巴州刺史太建初與儀同章昭達入峽口招定安蜀等諸州鎮時周圖江左大造舟艦於蜀并運糧青泥廣達與錢道戢等將兵掩襲縱火焚之仍還本鎮廣達為政簡要推誠任下吏人便之及秩滿皆詣闕表請於是詔申二年衆軍北伐略淮南舊地廣達與齊軍會於大峴大破之斬其敷城主張元範進剋北徐州仍授北徐州刺史十年授都督合州刺史十一年周將梁士彦圍夀春詔遣中領軍樊毅左衞將軍任忠等分部趣陽平秦郡廣達率衆入淮為掎角以擊之周軍攻陷豫霍二州南北兗晉等各自抜諸將並無功盡失淮南之地廣達因免官以侯還第十二年與南豫州刺史樊毅北討剋郭黙城尋授平西將軍都督郢州以上七州諸軍事頓兵江夏周安州總管元景征江外廣達命偏師擊走之至徳二年為侍中改封綏越郡公尋為中領軍及賀若弼進軍鍾山廣達於白土岡置陣與弼旗鼓相對廣達躬擐甲胄手執桴鼓率勵敢死而進隋軍退走如是者數四及弼乘勝至宫城燒北掖門廣達猶督餘兵苦戰不息會日暮乃解甲靣臺再拜慟哭謂衆曰我身不能救國負罪深矣士卒皆涕泣歔欷於是就執禎明三年依例入隋廣達追愴本朝淪覆遘疾不療尋以憤慨卒尚書令江總撫柩慟哭乃命筆題其棺頭為詩曰黄泉雖抱恨白日自留名悲君感義死不作負恩生又製廣達墓銘述其忠槩初隋將韓擒虎濟江廣達長子世真在新蔡乃與其弟世雄及所部奔擒虎遣使致書招廣達廣達時屯兵都下乃自劾廷尉請罪後主謂曰世真雖異路中大夫公國之重臣吾所恃賴豈得自同嫌疑之間乎加賜黄金即日還營廣達有隊主楊孝辯時從廣達在軍中力戰陷陣其子亦隨孝辯揮刀殺隋兵十餘人力窮父子俱死蕭摩訶字元𦙍蘭陵人也父諒梁始興郡丞摩訶隨父之郡年數嵗而父卒其姊夫蔡路飬時在南康乃收飬之稍長果毅有勇力侯景之亂陳武帝赴援建鄴路飬起兵拒武帝摩訶時年十三單騎出戰軍中莫有當者及路飬敗摩訶歸侯安都常從征討安都遇之甚厚及任約徐嗣徽引齊兵為宼武帝遣安都北拒齊軍於鍾山龍尾及北郊壇安都謂摩訶曰卿驍勇有名千聞不如一見摩訶對曰今日令公見之及戰安都墜馬被圍摩訶獨騎大呼直衝齊軍齊軍稍解去安都乃免以平留異歐陽紇功累遷巴山太守太建五年衆軍北伐摩訶隨都督呉明徹濟江攻秦郡時齊遣大將尉破胡等率衆十萬來援其前隊有蒼頭犀角大力之號皆身長八尺膂力絶倫其鋒甚鋭又有西域胡妙於弓矢弦無虚發衆軍尤憚之及將戰明徹謂摩訶曰若殪此胡則彼軍奪氣君有關張之名可斬顔良矣摩訶曰願得識其形狀明徹乃召降人有識胡者云胡絳衣樺皮装弓兩端骨弭明徹遣人覘伺知胡在陣仍自酌酒飲摩訶摩訶飲訖馳馬衝齊軍胡挺身出陣前十餘歩彀弓未發摩訶遥擲銑鋧正中其額應手而仆齊軍大力十餘人出戰摩訶又斬之於是齊師退走以功封亷平縣伯尋進為侯位太僕卿又隨明徹進圍宿豫擊走齊將王康徳以功除晉熙太守九年明徹進軍吕梁與齊大戰摩訶率七騎先入手奪齊軍大旗齊軍大潰以功授譙州刺史及周武帝滅齊遣其將宇文忻爭吕梁忻時有精騎數千摩訶領十二騎深入周軍從横奮擊斬馘甚衆及周遣大將王軌來赴結長圍連鏁於吕梁下流斷大軍還路摩訶謂明徹曰聞軌始鏁下流其兩頭築城今尚未立公若見遣擊之彼必不敢相拒彼城若立則吾屬虜矣明徹奮髯曰搴旗陷陣將軍事也長算遠略老夫事也摩訶失色而退一旬之中水路遂斷周兵益至摩訶又請曰今求戰不得進退無路若潜軍突圍未足為恥願公率歩卒乘馬輿徐行摩訶驅馳前後必使公安達京邑明徹曰弟計乃良圖也然老夫受脤專征今被圍逼慙寘無地且歩軍既多吾為總督必須身居其後相率兼行弟馬軍宜須在前摩訶因夜發選精騎八千率先衝突自後衆騎繼焉比旦達淮南宣帝徵還授右衞將軍及宣帝崩始興王叔陵於殿内手刃後主遂奔東府城摩訶入受敕乃率馬歩數百趣東府城斬之以功授車騎大將軍封綏建郡公叔陵素所蓄聚金帛累巨萬後主悉以賜之改授侍中驃騎大將軍左光祿大夫舊制三公黄閤聽事置鴟尾後主特詔摩訶開黄閤門施行馬聽事寢堂並置鴟尾仍以其女為皇太子妃㑹隋總管賀若弼鎮廣陵後主委摩訶禦之授南徐州刺史禎明三年元㑹徴摩訶還朝弼乘虚濟江襲京口摩訶請率兵逆戰後主不許及弼進鍾山摩訶又曰弼懸軍深入壍壘未堅出兵掩襲必剋又不許及將出戰後主謂曰公可為我一決摩訶曰從來行陣為國為身今日之事兼為妻子後主多出金帛賦諸軍以充賞賜令中領軍魯廣達陳兵白土岡居衆軍南鎮東大將軍任忠次之護軍將軍樊毅都官尚書孔範又次之摩訶軍最居北衆軍南北亘二十里首尾進退不相知弼初謂未戰將輕騎登山望見衆軍因馳下置陣後主通於摩訶之妻故摩訶雖領勁兵八千初無戰意唯魯廣達田端以其徒力戰賀若弼及所部行軍七總管楊牙韓洪員明黄昕張黙言達奚隆張辯等甲士凡八千人各勒陣以待之弼躬當魯廣達麾下戰死者二百七十三人弼縱煙以自隱窘而復振陳兵得人頭皆走獻後主求賞金銀弼更趣孔範範兵暫交便敗走陳軍盡潰死者五千人諸門衞皆走黄昕馳燒北掖門而入員明禽摩訶以送弼弼以刀臨頸詞色不撓乃釋而禮之及城平弼置後主於徳教殿令兵衞守摩訶請弼曰今為囚虜命在斯須願一見舊主死無所恨弼哀而許之入見後主俯伏號泣仍於舊厨取食進之辭訣而出守衞者皆不能仰視隋文帝聞摩訶抗答賀若弼曰壯士也此亦人之所難入隋授開府儀同三司尋從漢王諒詣并州同諒作逆伏誅年七十三摩訶訥於言恂恂長者至於臨戎對寇志氣奮發所向無前年未弱冠隨侯安都在京口性好獵無日不畋游及安都征伐摩訶功居多子世亷有父風性至孝及摩訶凶終服闋後追慕彌切其父時賓故脱有所言及世亷對之哀慟不自勝言者為之歔欷終身不執刀斧時人嘉焉摩訶有騎士陳智深者勇力過人以平叔陵功為巴陵内史摩訶之戮也其子先已籍没智深收摩訶屍手自殯歛哀感行路君子義之潁川陳禹亦隨摩訶征討聰敏有識量渉獵經史解風角兵書頗能屬文便騎射官至王府諮議任忠字奉誠小名蠻奴汝隂人也少孤微不為鄉黨所齒及長譎詭多計略旅力過人尤善騎射州里少年皆附之梁鄱陽王蕭範為合州刺史聞其名引置左右侯景之亂忠率鄉黨數百人隨晉熙太守梅伯龍討景將王貴顯於夀春每戰却敵會土人胡通聚衆寇抄範命忠與主帥梅思立并軍討平之仍隨範世子嗣率衆入援會京城陷旋戍晉熙侯景平授蕩寇將軍王琳立蕭莊署忠為巴陵太守琳敗還朝授明毅將軍安湘太守仍隨侯瑱進討巴湘累遷豫寧太守衡陽内史華晈之舉兵也忠預其謀及晈平宣帝以忠先有密啓於朝廷釋而不問太建初隨章昭達討歐陽紇於廣州以功授直閤將軍遷武毅將軍廬陵内史秩滿入為右軍將軍五年衆軍北伐忠將出西道擊走齊歴陽王髙景安於大峴逐北至東闗仍剋其東西二城進軍蘄譙竝抜之徑襲合肥入其郛進剋霍州以功授員外散騎常侍封安復縣侯吕梁之喪師也忠全軍而還尋授忠都督夀陽新蔡霍州緣淮衆軍霍州刺史入為左衞將軍遷平南將軍南豫州刺史加都督率歩騎趣歴陽周遣王延貴率衆為援忠大破之生禽延貴後主嗣位進號鎮南將軍給鼓吹一部入為領軍將軍加侍中改封梁信郡公出為呉興内史及隋兵濟江忠自呉興入赴屯軍朱雀門後主召蕭摩訶以下於内殿定議忠曰兵法客貴速戰主貴持重今國家足食足兵宜固守臺城緣淮立柵北軍雖來勿與交戰分兵斷江路無令彼信得通給臣精兵一萬金翅三百艘下江徑掩六合彼大軍必言其度江將士已被獲自然挫氣淮南土人與臣舊相知悉今聞臣往必皆景從臣復揚聲欲往徐州斷彼歸路則諸軍不擊而自去待春水長上江周羅㬋等衆軍必沿流赴援此良計矣後主不能從明日歘然曰腹煩殺人喚蕭郎作一打忠叩頭苦請勿戰後主從孔範言乃戰於是據白土岡陣及軍敗忠馳入臺見後主言敗狀曰官好往無所用力後主與之金兩縢為我南岸收募人可為一戰忠曰陛下唯當具舟檝就上流衆軍臣以死奉衞後主信之勅忠出部分忠辭云臣處分訖即奉迎後主令官人装束以待忠久望不至時隋將韓擒虎自新林進軍忠率數騎往石子岡降之仍引擒虎軍共入南掖門臺城平入長安隋授開府儀同三司卒年七十七隋文帝後以散騎常侍袁元友能直言於後主嘉之擢拜主爵侍郎謂羣臣曰平陳之初我悔不殺任蠻奴受人榮祿兼當重寄不能横屍云無所用力與𢎞演納肝何其逺也子㓜武位儀同三司樊毅字智烈南陽湖陽人也祖方興梁散騎常侍司州刺史魚復縣侯父文熾梁散騎常侍東益州刺史新蔡縣侯毅家本將門少習武善騎射侯景之亂率部曲隨叔父文皎援臺城文皎於青溪戰殁毅赴江陵仍𨽻王僧辯討河東王蕭譽以功除右中郎將代兄俊為梁興太守領三州游軍隨宜豐侯蕭循討陸納於湘州軍次巴陵營頓未立納潜軍夜至薄營大譟軍中將士皆驚擾毅獨與左右數十人當營門力戰斬十餘級擊鼓申令衆乃定焉以功封夷道縣伯尋除天門太守進爵為侯及西魏圍江陵毅率郡兵赴援會魏剋江陵為後梁所俘久之遁歸陳武帝受禪毅與弟猛舉兵應王琳琳敗奔齊太尉侯瑱遣使招毅毅率子弟部曲還朝太建初為豐州刺史封高昌縣侯入為左衞將軍五年衆軍北伐毅攻廣陵楚子城抜之擊走齊軍及吕梁喪師詔以毅為大都督率衆度淮對清口築城與周人相拒霖雨城壊毅全軍自抜尋遷中領軍十一年周將梁士彦圍夀陽詔以毅為都督北討前軍事十三年為荆州刺史後主即位改封逍遙郡公入為侍中䕶軍將軍及隋軍濟江毅謂僕射袁憲曰京口采石俱是要所各須鋭卒數千金翅二百都下江中上下防捍如其不然大事去矣諸將咸從其議會施文慶等寢隋兵消息毅計不行臺城平隨例入關卒毅弟猛字智武幼俶儻有幹略及長便弓馬膽氣過人青溪之戰猛自旦訖暮與侯景軍短兵接戰殺傷甚衆臺城平隨兄毅西上梁南安侯方矩為湘州刺史以猛為司馬會武陵王紀舉兵自漢江東下方矩遣猛隨都督陸法和進軍拒之猛手禽紀父子三人斬於䑽中盡收其船艦器械以功封安山縣伯進軍撫定梁益還遷司州刺史進爵為侯陳永定元年周文育等敗於沌口為王琳所獲琳乘勝將事南中諸郡遣猛與李孝欽等將兵攻豫章進逼周廸軍敗為廸所執尋遁歸王琳琳敗還朝天嘉二年授永陽太守太建中以軍功封富川縣侯歴散騎常侍荆州刺史入為左衞將軍後主即位為南豫州刺史隋將韓擒虎之濟江猛在都下第六子廵攝行州事擒虎進軍攻陷之廵及家口竝見執時猛與左衞將軍蔣元遜領青龍八十艘為水軍於白下游奕以禦隋六合兵後主知猛妻子在隋懼有異志欲使任忠代之令蕭摩訶徐喻毅毅不悦摩訶以聞後主重傷其意乃止禎明三年入隋論曰梁氏云季運屬雲雷陳武帝杖旗掃難經綸伊始胡穎徐度杜稜周鐵武程靈洗等或感會風雲畢力驅馳之日或擢自降附乃贊興王之始咸得配享清廟豈徒然哉沈恪行已之方不踐非義之迹子隆持身之節無失事人之道仁矣乎錢道戢駱文牙孫瑒徐世譜周敷荀朗周炅魯悉達廣達蕭摩訶任忠樊毅等所以獲用當年其道雖異至於功名自立亦各因時當金陵覆没抑惟天數然任忠興亡之義無乃致虧與夫蕭魯所行固不同日持此百心而事二主欲求取信不亦難乎首領獲全亦為幸也南史卷六十七南史卷六十七考證胡穎傳呉興人也一本吳興東遷人也徐敬成傳起家著作佐郎永定元年陳書無佐字又元誤為九程靈洗傳遣使招諭久之乃降諭監本訛俞今改从陳書子文季傳秦郡前江浦通涂水涂陳書作塗齊軍深憚之謂為程彪彪一本作虎駱文牙傳駱文牙字旗門陳書無文字文牙母陳覩帝儀表知非常人陳監本訛陵今改从閣本魯廣達傳太建初與儀同章昭達入峽口招定安蜀等諸州鎮招陳書作拓時周圖江左一本周字下有氏將二字初隋將韓擒虎濟江廣達長子世真在新蔡乃與其弟世雄及所部奔擒擒遣使致書招廣達各卷或稱擒或稱擒虎此則兩行内亦有異同皆後人或加或刪而未盡者也蕭摩訶傳一旬之中水路遂斷周兵益至陳書無水路遂斷四字南史卷六十七考證
