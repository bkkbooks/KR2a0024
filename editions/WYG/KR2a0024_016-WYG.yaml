body:
  text: 南史卷十六唐李延夀撰列傳第六王鎮惡朱齡石弟超石毛修之孫惠素傅𢎞之朱修之王𤣥謨子瞻從弟𤣥象𤣥載𤣥邈王鎮惡北海劇人也祖猛仕苻堅任兼将相父休為河東太守鎮惡以五月生家人以俗忌欲令出繼疎宗猛曰此非常児昔孟嘗君惡月生而相齊是児亦将興吾門矣故名為鎮惡年十三而苻氏敗寓食黽池人李方家方善遇之謂方曰若遭英雄主要取萬戸侯當厚相報方曰君丞相孫人材如此何患不富貴至時願見用為本縣令足矣後隨叔父曜歸晋客荆州頗讀諸子兵書喜論軍國大事騎射非長而從横善果斷宋武帝伐廣固鎮惡時為天門郡臨澧令人或薦之武帝召與語異焉因留宿旦謂諸将曰鎮惡王猛孫所謂将門有将即以署前部賊曹拒盧循有功封博陸縣五等子武帝謀討劉毅鎮惡曰公若有事西楚請給百舸為前驅及西討轉鎮惡参軍事使率龍驤将軍蒯恩百舸前發鎮惡受命便晝夜兼行揚聲劉兖州上毅謂為信不知見襲鎮惡去江陵城二十里舍船歩上蒯恩在軍前鎮惡次之舸留一二人對舸岸上豎旗安鼓語所留人曰計我将至城便長嚴令後有大軍状又分隊在後令燒江津船鎮惡徑前襲城漳戍及百姓皆言劉藩實上晏然不疑将至城逢毅要将朱顯之馳前問藩所在軍人答云在後及至軍後不見藩又望見江津船艦被燒而鼓聲甚盛知非藩上便躍馬告毅令閉城門鎮惡亦馳進得入城便因風放火燒大城南門及東門又遣人以詔及赦并武帝手書凡三函示毅毅皆燒不視金城内亦未信帝自來及短兵接戰鎮惡軍人與毅下将或是父兄子弟中表親親且鬬且語知武帝在後人情離懈初毅常所乘馬在城外不得入倉卒無馬使就子肅取馬肅不與朱顯之謂曰人取汝父而惜馬汝走欲何之奪馬以授毅從大城東門出奔牛牧佛寺自縊鎮惡身被五箭手所執稍於手中破折江陵平後二十日大軍方至以功封漢夀縣子及武帝北伐為鎮西諮議行龍􅋮将軍領前鋒将發前将軍劉穆之謂曰昔晋文王委蜀於鄧艾今亦委卿以闗中卿其勉之鎮惡曰吾等因託風雲並蒙抽擢今咸陽不尅誓不濟江三秦若定而公九錫不至亦卿之責矣鎮惡入賊境戰無不㨗破虎牢及栢谷塢進次黽池造故人李方家升堂見母厚加酬賚即授方黽池令方軌徑據潼闗将士乏食乃親到𢎞農督人租百姓競送義粟軍食復振初武帝與鎮惡等期若尅洛陽湏待大軍未可輕前既而鎮惡等至潼闗為偽大将軍姚紹所拒不得進馳告武帝求糧援時帝軍入河魏軍屯河岸軍不得進帝呼所遣人開舫北戸指河上軍示之曰我語令勿進而深入岸上如此何由得遣軍鎮惡既得義租紹又病死偽撫軍将軍姚讚代紹守嶮衆力猶盛武帝至湖城讚引退大軍次潼闗謀進取計鎮惡請率水軍自河入渭直至渭橋鎮惡所乘皆蒙衝小艦行船者悉在艦内泝渭而進艦外不見有行船人北土素無舟檝莫不驚以為神鎮惡既至令将士食畢便棄船登岸渭水流急諸艦悉逐流去鎮惡撫士卒曰此是長安城北門外去家萬里而舫乘衣糧並已逐流唯宜死戰可立大功乃身先士卒即䧟長安城城内六萬餘戸鎮惡撫慰初附號令嚴肅於灞上奉迎武帝勞之曰成吾覇業者真卿也謝曰此明公之威諸将之力帝笑曰卿欲學馮異邪時闗中豐全鎮惡性貪收歛子女玉帛不可勝計帝以其功大不問時有白帝言鎮惡藏姚泓偽輦有異志帝使覘之知鎮惡剔取餙輦金銀棄輦於垣側帝乃安帝留第二子桂陽公義真為安西将軍雍秦二州刺史鎮長安鎮惡以征虜将軍領安西司馬馮翊太守委以扞禦之任及大軍東還赫連勃勃逼北地義真遣中兵参軍沈田子拒之虜甚盛田子退屯劉因堡遣使還報鎮惡鎮惡對田子使謂安西長史王修曰公以十嵗児付吾等當共思竭力今擁兵不進賊何由得平使反言之田子甚懼王猛之相苻堅也北人以方諸葛亮入闗之功又鎮惡為首時論者深憚之田子嶢栁之㨗威振三輔而與鎮惡争功武帝将歸留田子與鎮惡私謂田子曰鍾㑹不得遂其亂者為有衛瓘等也語曰猛獸不如羣狐卿等十餘人何懼王鎮惡故二人常有猜心時鎮惡師于涇上與田子俱㑹傳𢎞之壘田子求屏人因斬之幕下并兄基弟鴻遵深從弟昭朗凡七人𢎞之奔告義真義真率王智王修被甲登横門以察其變俄而田子至言鎮惡反修執田子以專戮斬焉是嵗義熈十四年正月十五日也追贈左将軍青州刺史及帝受命追封龍陽縣侯諡曰壯傳國至曽孫叡齊受禪國除朱齡石字伯児沛郡沛人也世為將伯父憲及斌並為西中即袁真将佐桓温伐真於夀陽真以憲兄弟潛通温並殺之齡石父綽逃歸温夀陽平真已死綽輒發棺戮尸温怒将斬之温弟冲請得免綽受冲更生之恩事冲如父位西陽廣平太守及冲薨綽歐血而死齡石少好武不事崖檢舅淮南蔣氏才劣齡石使舅卧聽事翦紙方寸帖着舅枕以刀子縣擲之相去八九尺百擲百中舅畏齡石終不敢動舅頭有大瘤齡石伺眠宻割之即死武帝尅京城以為建武参軍從至江乘将戰齡石言世受桓氏恩不容以兵刃相向乞在軍後帝義而許之以為鎮軍参軍遷武康令縣人姚係祖專為刼郡縣畏不能討齡石至縣偽與厚召為参軍係祖恃彊乃出應召齡石斬之掩其家悉殺其兄弟由是一部得清後領中兵齡石有武幹又練吏職帝甚親委之平盧循有功為西陽太守義熈九年徙益州刺史為元帥伐蜀初帝與齡石宻謀進取曰劉敬宣往年出黄武無功而退賊謂我今應從外水往而料我當出其不意猶從内水來也必重兵守涪城以備内道若向黄武正墮其計今以大衆自外水取成都疑兵出内水此制敵之竒也而慮此聲先馳賊審虛實别有函封付齡石署曰至白帝乃開諸軍雖進未知處分至白帝發書曰衆軍悉從外水取成都臧熹朱枚於中水取廣漢使羸弱乘髙艦十餘由内水向黄武譙縱果備内水使其大将譙道福戍涪城遣其秦州刺史侯暉僕射譙詵等屯彭摸夾水為城十年六月齡石至彭摸七月齡石率劉鍾蒯恩等於北城斬侯暉譙詵朱枚至廣漢復破譙道福别軍譙縱奔涪城巴西人王志斬送之并獲道福斬於軍門帝之伐蜀将謀元帥乃舉齡石衆咸謂齡石資名尚輕慮不辦克論者甚衆帝不從乃分大軍之半令猛将勁卒悉以配之臧熹敬皇后弟也亦命受其節度及戰尅㨗衆咸服帝知人又羙齡石善於事以平蜀功封豐城侯十四年桂陽公義真被徴以齡石為雍州刺史督闗中諸軍事齡石至長安義真乃發義真敗于青泥齡石亦舉城奔走見殺傳國至孫齊受禪國除齡石弟超石亦果鋭雖出自将家兄弟並閑尺牘桓謙為衛将軍以補行参軍後為武帝徐州主簿收迎桓謙身首躬營殯𦵏義熈十二年北伐超石前鋒入河時軍人緣河南岸牽百丈有漂度北岸者輒為魏軍所殺略帝遣白直隊主丁旿率七百人及車百乘於河北岸為却月陣兩頭抱河車置七仗士事畢使竪一白長毦魏軍不觧其意並未動帝先命超石戒嚴白毦既舉超石赴之幷齎大弩百張一車益二十人設彭排於轅上魏軍見營陣立乃進圍營超石先以弱弓小箭射之魏軍四面俱至魏明元皇帝又遣南平公長孫嵩三萬騎肉薄攻營於是百弩俱發魏軍既多弩不能制超石初行别齎大槌并千餘張矟乃斷矟三四尺以槌之一矟輒洞貫三四人魏軍不能當遂潰大軍進剋蒲坂以超石為河東太守後除中書侍郎封興平縣五等侯闗中亂帝遣超石慰勞河洛與齡石俱没赫連勃勃見殺毛修之字敬文滎陽陽武人也祖武生伯父璩並益州刺史父瑾梁秦二州刺史修之仕桓𤣥為屯騎校尉隨𤣥西奔𤣥欲奔漢川修之誘令入蜀馮遷斬𤣥於枚洄洲修之力也宋武帝以為鎮軍諮議遷右衛将軍既有斬𤣥之謀又父伯並在蜀帝欲引為外助故頻加榮爵及父瑾為譙縱所殺帝表修之為龍􅋮将軍配兵遣奔赴時益州刺史鮑陋不肯進討修之言状帝乃令冠軍将軍劉敬宣伐蜀無功而退譙縱由此送修之父伯及中表䘮柩口累並得還後劉毅西鎮江陵以為衛軍司馬南郡太守修之雖為毅将佐而深結於帝及毅敗見宥時遣朱齡石伐蜀修之固求行帝慮修之至蜀多所誅殺且土人既與毛氏有嫌亦當以死自固不許修之不信鬼神所至必焚房廟時蒋山廟中有好牛馬並奪取之累遷相國右司馬行司州事戍洛陽修立城壘武帝至履行善之賜衣服玩好當時評直二千萬王鎮惡死修之代為安西司馬桂陽公義真敗為赫連勃勃所禽及赫連昌滅入魏修之在洛敬事嵩髙道士冦謙之謙之為魏太武帝信敬營䕶之故不死修之嘗為羊羮薦魏尚書尚書以為絶味獻之太武大悦以為太官令被寵遂為尚書光禄大夫封南郡公太官令常如故後朱修之俘于魏亦見寵修之問朱修之南國當權者為誰答云殷景仁修之笑曰吾昔在南殷尚㓜少我歸罪之日便當巾韝到門經年不忍問家消息乆之乃訪焉修之具答并云賢子元矯甚能自處修之悲不得言直視良乆乃長歎曰嗚呼自此一不復及初北人去來言修之勸魏侵邉并教以在南禮制文帝甚疑責之朱修之後得還具相申理上意乃釋修之在魏多妻妾男女甚衆身遂死於魏孫惠素仕齊為少府卿性至孝母服除後更修母所住處牀帳屏帷每月朝十五向帷悲泣傍人為之感傷終身如此惠素吏才彊濟而臨事清刻敕市銅官碧青一千二百斤供御畫用錢六十五萬有讒惠素納利武帝怒敕尚書評價貴二十八萬餘有司奏伏誅死後家徒四壁武帝後知無罪甚悔恨之傅𢎞之字仲度北地泥陽人也傅氏舊屬靈州漢末失土寄馮翊置泥陽富平二縣廢靈州故傅氏悉屬泥陽晋武帝太康三年復立靈州縣傅氏還屬靈州𢎞之髙祖祗晋司徒後封靈州公不欲封本縣故祗一門還屬泥陽曽祖暢祕書丞没石勒生子洪晋穆帝永和中石氏亂度江洪生梁州刺史歆歆生𢎞之少倜儻有大志厯位太尉行参軍宋武帝北伐𢎞之與扶風太守沈田子等七軍自武闗入𢎞之素習騎乘於姚泓馳道内戲馬甚有姿制羌胡觀者數千並歎稱善留為桂陽公義真雍州中從事史及義真東歸赫連勃勃傾國追躡於青泥大戰𢎞之躬貫甲胄氣冠三軍軍敗䧟没不為之屈時天大寒裸𢎞之𢎞之叫罵見殺朱修之字恭祖義陽平氏人也曽祖燾晋平西将軍祖序豫州刺史父諶益州刺史修之初為州主簿宋元嘉中累遷司徒從事中郎文帝謂曰卿曾祖昔為王導丞相中即卿今又為王𢎞中即可謂不忝爾祖矣後隨右軍到彦之北侵彦之自河南囬修之留戍滑䑓被魏将安頡攻圍糧盡将士熏鼠食之修之被圍既乆母常悲憂忽一旦乳汁驚出母號慟告家人曰我年老非復有乳汁時今如此児必没矣魏果以其日剋滑䑓囚之太武嘉其固守之節以為雲中鎮将妻以宗室女修之潛謀南歸妻疑之每流涕謂曰觀君無停意何不告我以實義不相負修之深嘉其義而不告也及太武伐馮𢎞修之及同没人邢懐明並從又有徐卓者亦没魏復欲率南人竊發事泄見誅修之懐明懼禍同奔馮𢎞不見禮停一年㑹宋使至修之名位素顯傳詔見便拜彼國敬傳詔呼為天子邉人見傳詔致敬乃始禮之時魏屢伐黄龍𢎞遣使求救修之乃使傳詔説而遣之泛海未至東萊舫柂折風猛海師慮向海北垂長索舫乃正海師視上有飛鳥知去岸不逺湏臾至東萊及至以為黄門侍郎孝武初累遷寕蠻校尉雍州刺史加都督修之政在寛簡士庶悦附及荆州刺史南郡王義宣反檄修之舉兵雍土時饑修之偽與之同既而遣使陳情於孝武孝武嘉之以為荆州刺史加都督義宣乃聞修之不同更以魯秀為雍州刺史擊襄陽修之命斷馬鞍山道秀不得前乃退修之率衆向江陵竺超已執義宣修之至於獄殺之以功封南昌縣侯修之立身清約百城貺贈一無所受唯以蠻人宜存撫納有餉皆受得輒與佐史賭之未嘗入已去鎮之日秋毫無犯計在州以來然油及私牛馬食官糓草以私錢六十萬償之而儉刻無潤薄於恩情姊在鄉里饑寒不立修之貴為刺史未曽供贍往姊家姊為設菜羮麤飯以激之修之曰此是貧家好食進之致飽先是新野庾彦逹為益州刺史携姊之鎮資給供奉中分秩禄西土稱焉修之後拜左戸尚書領軍将軍至建鄴牛奔墜車折脚辭尚書徙崇憲太僕仍加特進金紫光禄大夫脚疾不堪獨行見特給扶侍卒諡貞侯王𤣥謨字彦徳太原祁人也六世祖宏河東太守緜竺侯以從叔司徒允之難棄官北居新興仍為新興鴈門太守其自序云爾祖牢仕慕容氏為上谷太守隨慕容徳居青州父秀早卒𤣥謨㓜而不群世父蕤有知人鑒常笑曰此児氣槩髙亮有太尉彦雲之風宋武帝臨徐州辟為從事史與語異之少帝末謝晦為荆州請為南蠻行参軍武寕太守晦敗以非大帥見原元嘉中補長沙王義欣鎮軍中兵参軍領汝隂太守每陳北侵之謀上謂殷景仁曰聞王𤣥謨陳説使人有封狼居胥意後為興安侯義賔輔國司馬彭城太守義賔薨𤣥謨上表以彭城要兼水陸請以皇子撫臨州政乃以孝武出鎮及大舉北侵以𤣥謨為寕朔将軍前鋒入河受輔國将軍蕭斌節度軍至碻磝𤣥謨進向滑䑓圍城二百餘日魏太武自來救之衆號百萬鼓鼙動天地𤣥謨之行也衆力不少噐械精嚴而專仗所見多行殺戮初圍城城内多茅屋衆求以火箭燒之𤣥謨曰損亡軍實不聽城中即撒壊之空地為窟室及魏救将至衆請發車為營又不從将士並懐離怨又營貨利一匹布責人八百棃以此倍失人心及太武軍至乃夜遁麾下散亡略盡蕭斌将斬之沈慶之固諫曰佛狸威震天下控弦百萬豈𤣥謨所當殺戰将以自弱非良計也斌乃止初𤣥謨始将見殺夢人告曰誦觀世音千徧則免𤣥謨夢中曰何可竟也仍見授既覺誦之且得千徧明日将刑誦之不輟忽傳唱停刑遣代守碻磝江夏王義恭為征討都督以碻磝沙城不可守召令還為魏軍所追大破之流矢中臂二十八年正月還至歴城義恭與𤣥謨書曰聞因敗為成臂上金創将非金印之徴邪元凶弑立以𤣥謨為冀州刺史孝武伐逆𤣥謨遣濟南太守垣䕶之等将兵赴義事平除徐州刺史加都督及南郡王義宣與江州刺史臧質反朝廷假𤣥謨輔國将軍為前鋒南討拜豫州刺史質尋至大破之加都督封曲江縣侯中軍司馬劉冲之白孝武言𤣥謨在梁山與義宣通謀檢雖無實上意不能明使有司奏𤣥謨没匿所得賊寳物虛張戰簿與徐州刺史垣䕶之並免官尋為寕蠻校尉雍州刺史加都督雍土多諸僑寓𤣥謨上言所統僑郡無有境土新舊錯亂租課不時宜加并合見許乃省并郡縣自此便之百姓當時不願屬籍其年𤣥謨又令九品以上租使貧富相通境内莫不嗟怨人間訛言𤣥謨欲反時栁元景當權元景弟僧景為新城太守以元景之勢制令雍土南陽順陽上庸新城諸郡並發兵欲討𤣥謨𤣥謨令内外晏然以觧衆惑馳啓孝武具陳本末帝知其虗馳遣主書吳喜公慰撫之又答曰𤣥謨啓明白之日七十老公反欲何求聊復為笑想足以申卿眉頭耳𤣥謨性嚴未曽妄笑時人言𤣥謨眉頭未曽申故以此見戲後為金紫光禄大夫領太常及建明堂以本官領起部尚書又領北選孝武狎侮羣臣各有稱目多湏者謂之羊短長肥瘦皆有比擬顔師伯􅆙齒號之曰齴劉秀之儉恡常呼為老慳黄門侍郎宗靈秀軀體肥壮拜起艱難毎一集㑹輒於坐賜靈秀器服飲食前後相係欲其占謝傾踣以為歡笑又刻木作靈秀父光禄勲叔獻像送其家聽事栁元景垣䕶之雖並北人而𤣥謨獨受老傖之目凡諸稱謂四方書疏亦如之嘗為𤣥謨作四時詩曰菫茹供春膳粟漿充夏飡爮醬調秋菜白鹺觧冬寒又寵一崑崙奴子名白主常在左右令以杖擊羣臣自栁元景以下皆罹其毒𤣥謨尋遷徐州刺史加都督時北土災饉乃散私糓十萬斛牛千頭以賑之孝武崩與羣公俱被顧命時朝政多門𤣥謨以嚴直不容徙青冀二州刺史加都督少帝誅顔師伯栁元景等狂悖滋甚以領軍徴𤣥謨子姪咸勸稱疾𤣥謨曰避難茍免既乖事君之節且吾荷先朝厚恩彌不得逡廵及至屡表諫諍又流涕請緩刑去殺以安元元之意少帝大怒明帝即位禮遇益崇時四方反叛𤣥謨領水軍前鋒南討以脚疾未差聽乘輿出入尋除車騎大将軍江州刺史副司徒建安王休仁於赭圻賜以諸葛亮筩袖鎧頃之以為光禄大夫開府儀同三司領䕶軍将軍遷南豫州刺史加都督薨年八十二諡曰莊公子深早卒深子繢嗣深弟寛泰始初為隨郡太守逢四方反父𤣥謨在建鄴寛棄郡自歸以母在西為賊所執請西行遂襲破隨郡收其母事平明帝嘉之使圖寛形以上齊永明元年為太常坐於宅殺牛免官後卒於光禄大夫寛弟瞻字明逺一字叔鸞負氣慠俗好貶裁人物仕宋為王府参軍嘗詣劉彦節直登榻曰君侯是公孫僕是公子引蒲促膝唯余二人彦節外跡雖酬之意甚不悦齊豫章王嶷少時早與瞻友瞻常候嶷髙論齊武帝時在大牀寝瞻謂嶷曰帳中人物亦復隨人寝興嶷言次忽問王景文兄揩賢愚何如殷道矜瞻曰卿遂復言他人兄邪武帝笑稱嶷小名多王汝兄愚那得忽來王参軍此句瞻曰直恐如卿來談武帝銜之未嘗形色後歴黄門侍郎及齊建元初瞻為永嘉太守詣闕跪拜不如儀武帝知之召入東宫仍送付廷尉殺之命左右啓髙帝曰父辱子死王瞻傲朝廷臣輒已收之髙帝曰此何足計及聞瞻已死乃黙無言𤣥謨從弟𤣥象位下邳太守好發冢地無完槨人間垣内有小冢墳上殆平每朝日初升見一女子立冢上近視則亡或以告𤣥象使命發之有一棺尚全有金蠶銅人以百数剖棺見一女子年可二十姿質若生卧而言曰我東海王家女應生資財相奉幸勿見害女臂有玉釧破冢者斬臂取之於是女復死𤣥謨時為徐州刺史以事上聞𤣥象坐免郡𤣥載字彦休𤣥謨從弟也父蕤東莞太守𤣥載仕宋位益州刺史沈攸之之難𤣥載起義送誠於齊髙帝封鄂縣子齊建元元年為左戸尚書永明四年位兖州刺史卒官諡烈子𤣥載弟𤣥邈字彦逺仕宋位青州刺史齊髙帝之鎮淮隂為宋明帝所疑乃北通魏遣書結𤣥邈𤣥邈長史房叔安進曰夫布衣韋帶之士銜一餐而不忘義使之然也今将軍居方州之重託君臣之義無故舉忠孝而棄之三齊之士寕蹈東海死耳不敢隨将軍也𤣥邈意乃定仍使叔安使建鄴發髙帝謀髙帝於路執之并求𤣥邈表叔安答曰寡君使表上天子不上将軍且僕之所言利國家而不利将軍無所應問茍伯玉勸殺之髙帝曰物各為主無所責也𤣥邈罷州還髙帝塗中要之𤣥邈嚴軍直過還都啓宋明帝稱髙帝有異謀髙帝不恨也昇明中髙帝引為驃騎司馬太山太守𤣥邈甚懼髙帝待之如初再遷西戎校尉梁南泰二州刺史封河陽縣侯兄弟同時為方伯齊建元初亡命李烏奴作亂梁部𤣥邈使人偽降烏奴告之曰王使君兵弱携愛妾二人已去矣烏奴喜輕兵襲州城𤣥邈竒兵破之髙帝聞之曰𤣥邈果不負吾延興元年為中䕶軍明帝使𤣥邈往江州殺晋安王子懋𤣥邈苦辭不行及遣王廣之往廣陵取安陸王子敬𤣥邈不得已奉㫖建武中卒於䕶軍贈雍州刺史諡壮侯叔安字子仁清河人髙帝即位懐其忠正時為益州司馬寕蜀太守就拜前将軍方用為梁州㑹病卒帝歎曰叔安節義古人中求之耳恨不至方伯而終子長瑜亦有義行永明中為州中從事論曰自晋室播遷來宅揚越關邉遥阻汧隴遐荒區甸分其内外山河判其表裏桓温一代英人志移晋鼎自非兵屈灞上戰衂枋頭則光宅之運中年允集宋武帝崛起布衣非藉人譽一旦驅率烏合奄興覇緒功雖有餘而徳猶未洽非樹竒功於難立震大威於四海則不能成配天之業一異同之心故湏外積武功以收人望及金墉請吏元勲既立心欲挂斾龍門折衝冀趙跨功桓氏取髙昔人方復觀兵崤渭陳師天嶮及靈威薄震重闗自闢故知英算所包先勝而後戰也王鎮惡推鋒直指前無彊陣為宋方叔其壮矣乎朱齡石超石毛修之傅𢎞之等以歸衆難固之情逢英勇乘機之運以至顛䧟為不幸矣脩之滑䑓之守有疎勒之難茍誠節在焉所在為重其取榮大國豈徒然哉終假道自歸首丘之義也𤣥謨封狼之心雖簡帝念然天方相魏人豈能支宋氏以三吳之弱卒當八州之勁勇欲以邀勝不亦難乎蹙境亡師固其宜也觀夫慶之言可謂逹於時變瞻傲恨不悔卒至亡軀然齊武追恨魚服匹夫懼矣𤣥邈行已之度有士君子之風乎南史卷十六南史卷十六考證王鎮惡傳鎮惡以五月生家人以俗忌五月下宋書有五日二字鎮惡身被五箭手所執矟手中破折手中上宋書有於字朱齡石弟超石傳長孫嵩三萬騎肉薄攻營肉監本訛内今改正大軍進剋蒲坂坂監本誤坡今改正傅𢎞之傳洪生梁州刺史歆歆宋書及南本俱作韶朱脩之傳有餉皆受得輒與佐史賭之未嘗入已史宋書作吏王𤣥載弟𤣥邈傳乃北通魏遣書結𤣥邈通監本訛勸今从南本南史卷十六考證
