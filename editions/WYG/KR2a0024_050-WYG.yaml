body:
  text: 南史卷五十唐李延壽撰列傳第四十劉瓛弟璡弟㲄族子顯顯從明僧紹子山賔庾易子黔婁肩吾於陵劉虬子之遴坦之亨虬從弟劉瓛字子珪沛郡相人晉丹陽尹惔六世孫也祖𢎞之給事中父惠臨賀太守瓛篤志好學博通訓義年五嵗聞舅孔熙先讀管寧傳欣然欲讀舅更為説之精意聼受曰此可及也宋大明四年舉秀才兄璲亦有名先應州舉至是别駕東海王元曾與瓛父惠書曰此嵗賢子充秀州閭可謂得人除奉朝請不就兄弟三人共處蓬室一間為風所倒無以葺之怡然自樂習業不廢聚徒教授常有數十丹陽尹袁粲於後堂夜集聞而請之指聼事前古栁樹謂瓛曰人謂此是劉尹時樹每想髙風今復見卿清徳可謂不衰矣薦為祕書郎不見用後拜安成王撫軍行參軍公事免瓛素無宦情自此不復仕袁粲誅瓛微服往哭并致賻助齊髙帝踐阼召瓛入華林園談語問以政道荅曰政在孝經宋氏所以亡陛下所以得之是也帝咨嗟曰儒者之言可寳萬世又謂瓛曰吾應天革命物議以為何如瓛曰陛下戒前軌之失加之以寛厚雖危可安若循其覆轍雖安必危及出帝謂司徒褚彦回曰方直乃耳學士故自過人敕瓛使數入而瓛自非詔見未嘗到宫門上欲用瓛為中書郎使吏部尚書何戢喻㫖戢謂瓛曰上意欲以鳯池相處恨君資輕可且就前除少日當轉國子博士便即所授瓛笑曰平生無榮進意今聞得中書郎而拜記室豈本心哉後以母老闕養拜彭城郡丞司徒褚彦回宣旨喻之荅曰自省無廊廟才所願唯保彭城丞耳上又以瓛兼總明觀祭酒除豫章王驃騎記室參軍丞如故瓛終不就武陵王曅為㑹稽太守上欲令瓛為曄講除會稽郡丞學徒從之者轉衆永明初竟陵王子良請為征北司徒記室瓛與張融王思逺書曰奉敎使恭召會當停公事但念生平素抱有乖恩顧吾性拙人間不習仕進昔嘗為行佐便以不能及公事免黜此眷者所共知也量已審分不敢期榮夙嬰貧困加以踈懶衣裳容髪有足駭者中以親老供養褰裳徒歩脱爾逮今二代一紀先朝使其更自修正勉勵於階級之次見其繿縷或復賜以衣裳袁褚諸公咸加勸勵終於不能自反也一不復為安可重為哉昔人有以冠一免不重加於首每謂此得進止之儀又上下年尊益不願居官次廢晨昏也先朝為此曲申從許故得連年不拜既習此嵗久又齒長疾侵豈宜攝齋河間之聼厠迹東平之僚本無絶俗之操亦非能偃蹇為髙此又聼覽所當深察者也近初奉敎便自希得託迹客游之末而固辭榮級其故何邪以古之王侯大人或以此延四方之士有追申白而入楚羡鄒枚而游梁吾非敢叨夫曩賢庶欲從九九之遺迹既於聞道集泮不殊而幸無職司拘礙可得奉温凊展私計志在此耳除步兵校尉不拜瓛姿狀纖小儒業冠於當時都下士子貴游莫不下席受業當世推其大儒以比古之曹鄭性謙率不以髙名自居之詣於人惟一門生持胡牀隨後主人未通便坐門待荅住在檀橋瓦屋數間上皆穿漏學徒敬慕不敢指斥呼為清溪焉竟陵王子良親往修謁七年表武帝為瓛立館以楊烈橋故主第給之生徒皆賀瓛曰室美豈為人哉此華宇豈吾宅邪幸可詔作講堂猶恐見害也未及徙居遇疾子良遣從瓛學者彭城劉繪順陽范縝將厨於瓛宅營齋及卒門人受學者竝弔服臨送瓛有至性祖母病疽經年手持膏藥漬指為爛母孔氏甚嚴明謂親戚曰阿稱便是今世曾子稱瓛小名也年四十餘未有婚對建元中髙帝與司徒褚彦回為瓛娶王氏女王氏穿壁挂履土落孔氏牀上孔氏不悦瓛即出其妻及居母憂住墓下不出廬足為之屈杖不能起此山常有鴝鵒鳥瓛在山三年不敢來服釋還家此鳥乃至梁武帝少時嘗經伏膺及天監元年下詔為瓛立碑諡曰貞簡先生所著文集行於世初瓛講月令畢謂學生嚴植之曰江左以來隂陽律數之學廢矣吾今講此曾不得其彷彿學者美其退讓時濟陽蔡仲熊禮學博聞謂人曰五音本在中土故氣韻調平今既東南土氣偏詖故不能感動木石瓛亦以為然仲熊執經議論往往與時宰不合亦終不改操求同故坎壈不進歴年方至尚書左丞當時恨其不遇又東陽婁幼瑜字季玉著禮捃拾三十卷瓛弟璡字子璥方軌正直儒雅不及瓛而文采過之宋泰豫中為明帝挽郎齊建元初為武陵王曅冠軍征虜參軍曅與僚佐飲自割鵝炙璡曰應刃落爼是膳夫之事殿下親執鸞刀下官未敢安席因起請退與友人會稽孔逷同舟入東於塘上遇一女子逷目送曰美而艶璡曰斯豈君子所宜言乎非吾友也於是解裳自隔或曰與友孔徹同舟入東徹留目觀岸上女子璡舉席自隔不復同坐兄瓛夜隔壁呼璡璡不荅方下牀著衣立然後應瓛怪其久璡曰向束帶未竟其立操如此文惠太子召璡入侍東宫每上事輒削草尋署射聲校尉卒於官時濟陽江重欣亦清介雖處闇室如對嚴賔而不及璡也重欣位至射聲校尉顯字嗣芳瓛族子也父鬷字仲翔博識强正名行自居幼為外祖臧質所鞠養質既富盛恒有音樂質亡後母没十許年鬷每聞絲竹之聲未嘗不歔欷流涕梁天監初終於晉安内史顯幼而聰敏六嵗能誦吕相絶秦賈誼過秦琅邪王思逺吳國張融見而稱之號曰神童族伯瓛儒學有重名卒無嗣齊武帝詔顯為後時年八嵗本名頲齊武帝以字難識改名顯天監初舉秀才解褐中軍臨川王行參軍俄署法曹顯博涉多通任昉嘗得一篇缺簡文字零落示諸人莫能識者顯見云是古文尚書所刪逸篇昉檢周書果如其説昉因大相賞異丁母憂服闋尚書令沈約時領太子少傅引為少傅五官約為丹陽尹命駕造焉於坐策顯經史十事顯對其九約曰老夫昏忘不可受策雖然聊試數事不可至十顯問其五約對其二陸倕聞之擊席喜曰劉郎子可謂差人雖吾家平原詣張壯武王粲謁伯喈必無此對其為名流推賞如此五兵尚書傅昭掌著作撰國史顯自兼廷尉正被引為佐及革選尚書五都顯以法曹兼吏部郎後為尚書儀曹郎嘗為上朝詩沈約見而美之命工書人題之於郊居宅壁後兼中書通事舍人再遷驃騎鄱陽王記室兼中書舍人後為中書郎舍人如故顯與河東裴子野南陽劉之遴吳郡顧協連職禁中遞相師友人莫不慕之顯博聞强記過於裴顧時波斯獻生師子帝問曰師子有何色顯曰黄師子超不及白師子超魏人送古器有隐起字無識者顯案文讀之無滯考校年月一字不差武帝甚嘉焉遷尚書左丞除國子博士時有沙門訟田帝大署曰貞有司未辯徧問莫知顯曰貞字文為與上人帝因忌其能出之後為雲麾邵陵王長史尋陽太守魏使李諧至聞之恨不相識歎曰梁徳衰矣善人國之紀也而出之無乃不可乎王遷鎮郢州除平西府諮議參軍久在府不得志大同九年終于夏口時年六十三凡佐兩府竝事驕王人為之憂而反見禮重友人劉之遴啟皇太子為之銘誌葬於秣陵縣劉真長舊塋子莠恁臻臻早有名載北史顯從弟㲄字仲寳形貌短小儒雅博洽善辭翰隨湘東王在蕃十餘年寵寄甚深當時文檄皆其所為位吏部尚書國子祭酒魏剋江陵入長安明僧紹字休烈平原鬲人一字承烈其先吳太伯之裔百里奚子孟明以名為姓其後也祖玩州中從事父畧給事中僧紹明經有儒術宋元嘉中再舉秀才永光中鎮北府辟功曹並不就隐長廣郡嶗山聚徒立學魏剋淮南乃度江昇明中齊高帝為太傅敎辟僧紹及顧歡臧榮緒以旌幣之禮徵為記室參軍不至僧紹弟慶符為青州僧紹乏糧食隨慶符之鬱洲住弇榆山栖雲精舍欣玩水石竟不一入州城泰始季年岷益有山崩淮水竭齊郡僧紹竊謂其弟曰夫天地之氣不失其序若夫陽伏而不泄隂廹而不蒸於是乎有山崩川竭之變故伊洛竭而夏亡河竭而殷亡三川竭岐山崩而周亡五山崩而漢亡夫有國必依山川而為固山川作變不亡何待今宋徳如四代之季爾誌吾言而勿泄也竟如其言齊建元元年冬徴為正員郎稱疾不就其後帝與崔思祖書令僧紹與慶符俱歸僧紹又曰不食周粟而食周薇古猶發議在今寜得息談邪聊以為笑慶符罷任僧紹隨歸住江乘攝山僧紹聞沙門釋僧逺夙徳往候定林寺髙帝欲出寺見之僧逺問僧紹曰天子若來居士若為相對僧紹曰山藪之人政當鑿坯以遁若辭不獲命便當依戴公故事既而遁還攝山建栖霞寺而居之髙帝甚以為恨昔戴顒髙卧牖下以山人之服加其身僧紹故云髙帝後謂慶符曰卿兄髙尚其事亦堯之外臣朕夢想幽人固已勤矣所謂逕路絶風雲通仍賜竹根如意筍籜冠隐者以為榮焉勃海封延伯者髙行士也聞之歎曰明居士身彌後而名彌先亦宋齊之儒仲也永明中徴國子博士不就卒僧紹長兄僧𦙍能言𤣥仕宋為江夏王義恭參軍王别為立榻比之徐孺子位冀州刺史子慧照元徽中為齊髙帝平南主簿從拒桂陽累至驃騎中兵參軍與伯玉對領直建元元年為巴州刺史綏懐蠻蜒上許為益州刺史未遷卒僧𦙍次弟僧暠亦好學宋大明中再使魏于時新誅司空劉誕孝武謂曰若問廣陵之事何以答之對曰周之管蔡漢之淮南帝大悅及至魏魏問曰卿銜此命當縁上國無相踰者邪荅曰聰明特達舉袂成帷比屋之甿又無下僕晏子所謂看國善惡故再辱此庭位至青州刺史僧紹子元琳仲璋山賓並傳家業山賓最知名山賓字孝若七嵗能言𤣥理十三博通經傳居喪盡禮起家奉朝請兄仲璋痼疾家道屢空山賓乃行干祿後為廣陽令頃之去官會詔使公卿舉士左衞將軍江祏上書薦山賔才堪理劇齊明帝不重學謂祏曰聞山賓談書不輟何堪官邪遂不用梁臺建累遷右軍記室參軍掌吉禮時初置五經博士山賓首應其選歴中書侍郎國子博士太子率更令中庶子天監十五年出為持節都督縁淮諸軍事北兗州刺史普通二年徴為太子右衞率加給事中遷御史中丞以公事左遷黄門侍郎四年為散騎常侍東宫新置學士又以山賓居之俄以本官兼國子祭酒初山賓在州所部平陸縣不稔啓出倉米以賑百姓後刺史檢州曹失簿以山賓為耗損有司追責籍其宅入官山賓不自理更市地造宅昭明太子聞築室不就有令曰明祭酒雖出撫大蕃擁旌推轂珥金拖紫而恒事屢空聞搆宇未成今送薄助并詒詩曰平仲古稱竒夷齊昔擅美令則挺伊賢東秦固多士築室非道傍置宅歸仁里庚桑方有係原生今易擬必來三徑人將招五經士山賓性篤實家中嘗乏困貨所乘牛既售受錢乃謂買主曰此牛經患漏蹄療差已久恐後脫發無容不相語買主遽追取錢處士阮孝緒聞之歎曰此言足使還淳反朴激薄停澆矣五年又假節攝北兗州事後卒官贈侍中諡曰質子山賔累居學官甚有訓導之益然性頗踈通接於諸生多狎比人皆愛之所著吉禮儀注二百二十四卷禮儀二十卷孝經喪服義十五卷子震字興道亦傳父業位太子舍人尚書祠部郎餘姚令山賓弟少遐字處黙亦知名位都官尚書簡文謂人曰我不喜明得尚書更喜朝廷得人後拜青州刺史太清之亂奔魏仕北齊卒于太子中庶子子罕司空記室明氏南度雖晚並有名位自宋至梁為刺史者六人庾易字幼簡新野人也徙居江陵祖玫巴郡太守父道驥安西參軍易志性恬静不交外物齊臨川王映臨州表薦之餉麥百斛易謂使人曰走􅠢採麋鹿之伍終其解之毛衣馳騁日月之車得保自耕之祿於大王之恩亦已深矣辭不受以文義自樂安西長史袁承欽其風贈以鹿角書格蚌盤蚌研白象牙筆并贈詩曰白日清明青雲遼亮昔聞巢許今覩臺尚易以連理几竹翹書格報之建武三年詔徴為司空主簿不就卒子黔婁嗣黔婁字子貞一字貞正少好學多所講誦性至孝不曽失色於人南陽髙士劉虬宗測並歎異之仕齊為編令政有異績先是縣境多猛獸暴黔婁至猛獸皆度往臨沮界時以為仁化所感徙孱陵令到縣未旬易在家遘疾黔婁忽心驚舉身流汗即日棄官歸家家人悉驚其忽至時易疾始二日毉云欲知差劇但嘗糞甜苦易泄利黔婁輒取嘗之味轉甜滑心愈憂苦至夕每稽顙北辰求以身代俄聞空中有聲曰徴君壽命盡不復可延汝誠禱既至政得至月末晦而易亡黔婁居喪過禮廬于冢側梁臺建黔婁自西臺尚書儀曹郎為益州刺史鄧元起表為府長史巴西梓潼二郡太守及成都平城中珍寳山積元起悉分與僚佐唯黔婁一無所取元起惡其異衆厲聲曰長史何獨為髙黔婁示不違之請書數篋尋除蜀郡太守在職清素百姓便之元起死于蜀郡部曲皆散黔婁身營殯斂擕持喪柩歸鄉里東宮建以中軍記室參軍侍皇太子讀甚見知重詔與太子中庶子殷鈞中書舍人到洽國子博士明山賓遞日為太子講五經義遷散騎侍郎卒弟於陵於陵字子介七嵗能言𤣥理及長清警博學有才思齊隨王子隆為荆州召為主簿使與謝朓宗夬抄撰羣書子隆代還又以為送故主簿子隆為明帝所害僚吏畏避莫至唯於陵與夬獨留經理喪事永元末除東陽遂安令為人吏所稱梁天監初為建康獄平遷尚書功論郎待詔文徳殿後兼中書通事舍人拜太子洗馬舊東宫官屬通為清選洗馬掌文翰尤其清者近代用人皆取甲族有才望者時於陵與周捨並擢充此職武帝曰官以人清豈限甲族時論以為美累遷中書黄門侍郎舍人如故後終於鴻臚卿弟肩吾肩吾字慎之八嵗能賦詩為兄於陵所友愛初為晉安王國常侍王毎徙鎮肩吾常隨府在雍州被命與劉孝威江伯摇孔敬通申子悦徐防徐摛王囿孔鑠鮑至等十人抄撰衆籍豐其果饌號髙齋學士王為皇太子兼東宫通事舍人後為安西湘東王中錄事諮議参軍太子率更令中庶子簡文開文徳省置學士肩吾子信徐摛子陵吳郡張長公北地傅𢎞東海鮑至等充其選齊永明中王融謝朓沈約文章始用四聲以為新變至是轉拘聲韻彌為麗靡復踰往時簡文與湘東王書論之曰比見京師文體懦鈍殊常競學浮疎争事闡緩既殊比興正背風騷若夫六典三禮所施則有地吉凶嘉賓用之則有所未聞吟詠情性反擬内則之篇操筆冩志更模酒誥之作遲遲春日翻學歸蔵湛湛江水遂同大傳吾既拙於為文不敢輕有掎摭但以當世之作歴萬古之才人逺則揚馬曹王近則潘陸顔謝觀其遣辭用心了不相似若以今文為是則昔賢為非若以昔賢可稱則今體宜棄俱為盍各則未之敢許又時有効謝康樂裴鴻臚文者亦頗有惑焉何者謝客吐言天拔出於自然時有不拘是其糟粕裴氏乃是良史之才了無篇什之美是為學謝則不届其精華但得其冗長師裴則蔑絶其所長唯得其所短謝故巧不可階裴亦質不宜慕故胸馳臆斷之侣好名忘實之類決羽謝生豈三千之可及伏膺裴氏懼兩唐之不傳故玉徽金銑反為拙目所嗤巴人下俚更合郢中之聼陽春髙而不和妙聲絶而不尋竟不精討錙銖覆量文質有異巧心終愧妍耳是以握瑜懐玉之士瞻鄭邦而知退章甫翠履之人望閩鄉而歎息詩既若此筆又如之徒以煙墨不言受其驅染紙札無情任其摇襞甚矣哉文章横流一至於此至如近世謝朓沈約之詩任昉陸倕之筆斯文章之冠冕述作之楷模張士簡之賦周升逸之辯亦成佳手難可復遇文章未墜必有英絶領袖之者非弟而誰每欲論之無可與語思言子建一共商㩁辯兹清濁使如涇渭論兹月旦類彼汝南朱白既定雌黄有别使夫懐䑕知慙濫竽自恥相思不見我勞如何及簡文即位以肩吾為度支尚書時上流蕃鎮並據州拒侯景景矯詔遣肩吾使江州喻當陽公大心大心乃降賊肩吾因逃入東後賊宋子仙破會稽購得肩吾欲殺之先謂曰吾聞汝能作詩今可即作若能將貸汝命肩吾操筆便成辭采甚美子仙乃釋以為建昌令仍間道奔江陵歴江州刺史領義陽太守封武康縣侯卒贈散騎常侍中書令子信劉虬字靈預一字徳明南陽湼陽人晉豫州刺史喬七世孫也徙居江陵虬少而抗節好學須得祿便隐宋泰始中仕至晉平王驃騎記室當陽令罷官歸家静處常服鹿皮袷斷榖餌术及胡麻齊建元初豫章王嶷為荆州敎辟虬為别駕與同郡宗測新野庾易竝遺書禮請之虬等各修牋荅而不應命永明三年刺史廬陵王子卿表虬及同郡宗測宗尚之庾易劉昭五人請加蒲車束帛之命詔徴為通直郎不就竟陵王致書通意虬荅曰虬四節卧疾病三時營灌植暢餘隂於山澤託暮情於魚鳥寧非唐虞重恩周召宏施虬精信釋氏衣麤布禮佛長齋注法華經自講佛義以江陵西沙洲去人逺乃徙居之建武二年詔徴國子博士不就其冬虬病正晝有白雲徘徊簷戸之内又有香氣及磬聲其日卒年五十八虬子之遴之遴字思貞八嵗能屬文虬曰此兒必以文興吾宗常謂諸子曰若比之顔氏之遴得吾之文由是州里稱之時有沙門僧惠有異識每詣虬必呼之遴小字曰僧伽福徳兒握手而進之年十五舉茂才明經對䇿沈約任昉見而異之吏部尚書王瞻嘗候任昉遇之遴在坐昉謂瞻曰此南陽劉之遴學優未仕水鏡所宜甄擢即調為太學博士昉曰為之美談不如面試時張稷新除尚書僕射託昉為讓表昉令之遴代作操筆立成昉曰荆南秀氣果有異才後位必當過僕御史中丞樂藹即之遴之舅憲臺奏彈皆令之遴草焉後為荆州中從事梁簡文臨荆州仍遷宣惠記室之遴篤學明審博覽羣籍時劉顯韋稜竝稱强記之遴每與討論或不過也累遷中書侍郎後除南郡太守武帝謂曰卿母年徳並髙故令卿衣錦還鄉盡榮養之理轉西中郎湘東王繹長史太守如故初之遴在荆府常寄居南郡忽夢前太守袁彖謂曰卿後當為折臂太守即居此中之遴後牛奔墮車折臂右手偏直不復得屈伸書則以手就筆歎曰豈黥而王乎周捨嘗戲之曰雖復並坐可横政恐陋巷無枕後連相兩王再為此郡歴祕書監出為郢州行事之遴意不願出固辭曰去嵗命絶離巽不敢東下今年所忌又在西方武帝手敕曰朕聞妻子具孝衰於親爵祿具忠衰於君卿既内足理忘奉公之節遂為有司奏免後為都官尚書太常卿之遴好古愛竒在荆州聚古器數十百種有一器似甌可容一斛上有金錯字時人無能知者又獻古器四種於東宮其第一種鏤銅鴟夷榼二枚兩耳有銀鏤銘云建平二年造其第二種金銀錯鏤古罇二枚有篆銘云秦容成侯適楚之嵗造其第三種外國澡灌一口有銘云元封二年龜兹國獻其第四種古製澡盤一枚銘云初平二年造時鄱陽嗣王範得班固所撰漢書眞本獻東宮皇太子令之遴與張纉到溉陸襄等參校異同之遴録其異狀數十事其大畧云案古本漢書稱永平十六年五月二十一日己酉郎班固上而今本無上書年月日子又案古本叙傳號為中篇今本稱為敘傳又今本敘傳載班彪事行而古本云彪自有傳又今本紀及表志列傳不相合為次而古本相合為次總成三十八卷又今本外戚在西域後古本外戚次帝紀下又今本髙五子文三王景十三王孝武六子宣元六王雜在諸傳表中古本諸王悉次外戚下在陳項傳上又今本韓彭英盧吳述云信惟餓隷布實黥徒越亦狗盜芮尹江湖雲起龍驤化為侯王古本述云淮隂毅毅伏劒周章邦之傑子寔惟彭英仕為侯王雲起龍驤又古本第三十七卷解音釋義以助雅詁而今本無此卷也之遴好屬文多學古體與河東裴子野沛國劉顯恒共討論古籍因為交好時周易尚書禮記毛詩並有武帝義疏唯左氏傳尚闕之遴乃著春秋大意十科左氏十科三傳同異十科合三十事上之帝大悦詔荅曰省所撰春秋義比事論書辭微旨逺編年之敎言闡義繁丘明傳洙泗之風公羊宗西河之學鐸椒之解不追瑕丘之説無取繼踵胡母仲舒云盛因循榖梁千秋最篤張蒼之傳左氏賈誼之襲荀卿源本分鑣指歸殊致詳畧紛然其來舊矣昔在弱年久經研味一從遺置迄將五紀兼晚秋晷促機事罕暇夜分求衣未遑披括須待夏景試欲推尋若温故可求别酬所問也始武帝於齊代為荆府諮議時之遴父虬隐在百里洲早相知聞帝偶匱乏遣就虬換榖百斛之遴時在父側曰蕭諮議躓士云何能得舂願與其米虬從之及帝即位常懐之侯景初以蕭正徳為帝之遴時落景所將使授璽紱之遴預知仍剃髪披法服乃免先是平昌伏挺出家之遴為詩嘲之曰傳聞伏不鬬化為支道林及之遴遇亂遂披染服時人笑之尋避難還鄉湘東王繹嘗嫉其才學聞其西上至夏口乃密送藥殺之不欲使人知乃自製誌銘厚其賻贈前後文集五十卷子三達字三善數嵗能清言及屬文州將湘東王繹聞之盛集賓客召而試之説義屬詩皆有理致年十二聼江陵令賀革講禮還仍覆述不遺一句年十八卒之遴深懐悼恨乃題墓曰梁妙士以旌之之遴弟之亨之亨字嘉㑹年四嵗出後叔父嵩及長好學美風姿善占對武帝之臨荆州唯與虬談虬見之遴之亨帝曰之遴必以文章顯之亨當以功名著後州舉秀才除太學博士仍代兄之遴為中書通事舍人累遷歩兵校尉湘東王繹諮議參軍敕賜金策并賜詩焉大通六年出師南鄭詔湘東王節度諸軍之亨以司農卿為行臺承制途出本州北界總督衆軍杖節而西樓船戈甲甚盛老小緣岸觀曰是前舉秀才者鄉部偉之是行也大致剋復軍士有功皆錄唯之亨為蘭欽所訟執政因而陷之故封賞不行但復本位而已久之帝讀陳湯傳恨其立功絶域而為文吏所抵宦者張僧𦙍曰外聞論者竊謂劉之亨似之帝感悟乃封為臨江子固辭不拜之亨美績嘉聲在朱异之右既不協懼為所害故美出之以代之遴為安西湘東王繹長史南郡太守上問朱异曰之亨代兄喜不兄弟因循豈直大馮小馮而已又謂尚書令何敬容曰荆州長史南郡太守皆是僕射出入今者之亨便是九轉在郡有異績吏人稱之卒荆土懐之不復稱名號為大南郡小南郡子廣徳亦好學負才任氣承聖中位湘東太守魏平荆州依于王綝綝平陳太建中歴河東太守卒官之亨弟之遲位荆州中從事史子仲威少有志氣頗涉文史梁承聖中為中書侍郎蕭莊稱尊號以為御史中丞隨莊終鄴中坦字徳度虬從弟也仕齊歴孱陵令南中郎録事參軍所居以幹濟稱梁武帝起兵時輔國將軍楊公則為湘州刺史帥師赴夏口西朝議行州事者坦求行乃除輔國長史長沙太守行湘州刺史坦嘗在湘州多舊恩道迎者甚衆齊東昏遣安成太守劉希祖破西臺所選太守范僧簡於平都希祖移檄湘部於是始興内史王僧粲應之湘部諸郡悉皆蜂起州人咸欲汎舟逃走坦悉聚船焚之前湘州鎮軍鍾𤣥紹潛應僧粲坦聞其謀偽為不知因理訟至夜城門遂不閉以疑之𤣥紹未及發明旦詣坦問其故久留與語宻遣親兵收其家𤣥紹在坐未起而收兵已報具得其文書本末𤣥紹即首伏於坐斬之焚其文書餘黨悉無所問梁天監初論功封荔浦子三年遷西中郎長史蜀郡太守行益州事未至蜀道卒論曰劉瓛弟兄僧紹父子並業盛專門飾以儒行持身之節異夫茍得患失者焉庾易劉虬取髙一代其所以行己事兼隐徳諸子學業之美各著家聲顯及之遴見嫉時主或以非罪而斥或以非疾而亡異夫自古哲王屈己下賢之道有以知武皇之不𢎞元后之多忌梁祚之不永也不亦宜哉南史卷五十南史卷五十考證劉瓛弟璡傳與友孔徹同舟入東與監本訛興今改正劉顯傳陸倕聞之擊席喜曰劉郎子可謂差人梁書聞之下無擊席二字郎字下無子字又喜作歎今各本俱同从之明僧紹傳隐長廣郡嶗山嶗一本作勞顧炎武日知錄本草天麻生太山嶗山諸山則字本作嶗若魏書地形志唐書姜撫傳宋史甄棲真傳作勞並傳寫之訛乃齊乘以為登之者勞又云一作牢邱長春又改為鰲皆鄙淺可笑今从監本勃海封延伯者髙行士也延監本誤追从閣本明山賓傳平仲古稱竒夷齊昔擅美齊梁書作吾誤庾易傳易謂使人曰走􅠢採麋鹿之伍終其解之毛衣終其解之毛衣一本作終嵗鮮毛之衣庾於陵傳遷尚書功論郎功論梁書作工部庾肩吾傳朱白既定雌黄有别白梁書作丹劉之遴傳必呼之遴小字曰僧伽福徳兒監本脱伽字今增正劉之亨傳故美出之以代之遴為安西湘東王繹長史上文云之亨美績嘉聲在朱异之右既不協懼為所害則美字當係异字之誤也今各本俱同姑仍之南史卷五十考證
