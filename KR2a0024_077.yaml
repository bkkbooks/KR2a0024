body:
  text: 南史卷七十七列傳第六十七恩幸戴法興戴明寶徐爰阮佃夫紀僧真劉係宗茹法亮呂文顯茹法珍梅蟲兒周石珍陸驗徐驎司馬申施文慶沈客卿孔範夫鮑魚芳蘭在於所習中人之性可以上下然則謀於管仲齊桓有邵陵之師邇於易牙小白掩陽門之扇夫以霸者一身且有汙隆之別況下於此胡可勝言者乎故古之哲王莫不斯慎自漢氏以來年且千祀而近習用事無乏於時莫不官由近親情因狎重至如中書所司掌在機務漢元以令僕用事魏明以監令專權在晉中朝常為重寄故公曾之歎恨於失職于時舍人之任位居九品江左置通事郎管司詔誥其後郎還為侍郎而舍人亦稱通事元帝用琅邪劉超以謹慎居職宋文世秋當周赳並出寒門孝武以來士庶雜選如東海鮑照以才學知名又用魯郡巢尚之江夏王義恭以為非選帝遣尚之送尚書四十餘牒宣敕論辨義恭乃歎曰人主誠知人及明帝世胡母皓阮佃夫之徒專為佞幸矣齊初亦用久勞及以親信關讞表啓發署詔敕頗涉辭翰者亦為詔文侍郎之局復見侵矣建武世詔命始不關中書專出舍人省內舍人四人所直四省其下有主書令史舊用武官宋改文吏人數無員莫非左右要密天下文簿板籍入副其省萬機嚴祕有如尚書外司領武官有制局監外監領器仗兵役亦用寒人爰及梁陳斯風未改其四代之被恩幸者今立以為篇以繼前史之作云爾戴法興會稽山陰人也家貧父碩子以販紵為業法興二兄延壽延興並修立延壽善書法興好學山陰有陳戴者家富有錢三千萬鄉人或云戴碩子三兒敵陳戴三千萬錢法興少賣葛山陰市後為尚書倉部令史大將軍彭城王義康於尚書中覓了了令史得法興等五人以法興為記室令史義康敗仍為孝武征虜撫軍記室掾及徙江州仍補南中郎典籤帝於巴口建義法興與典籤戴明寶蔡間俱轉參軍督護上即位並為南臺侍御史同兼中書通事舍人法興等專管內務權重當時孝建元年為南魯郡太守解舍人侍太子於東宮大明二年以南下預密謀封法興吳昌縣男明寶湘鄉縣男間時已卒追加爵封法興轉太子旅賁中郎將孝武親覽朝政不任大臣而腹心耳目不得無所委寄法興頗知古今素見親待雖出侍東宮而意任隆密魯郡巢尚之人士之末元嘉中侍始興王濬讀書亦涉獵文史為上所知孝建初補東海國侍郎仍兼中書通事舍人凡選授遷轉誅賞大處分上皆與法興尚之參懷內外諸雜事多委明寶上性嚴暴睚眥之間動至罪戮尚之每臨事解釋多得全免殿省甚賴之而法興明寶大通人事多納貨賄凡所薦達言無不行天下輻湊門外成市家産並纍千金明寶驕縱尤甚長子敬為揚州從事與上爭買御物六宮嘗出敬盛服騎馬於車左右馳驟去來上大怒賜敬死繫明寶尚方尋被原釋委任如初孝武崩前廢帝即位法興遷越騎校尉時太宰江夏王義恭録尚書事任同總己而法興尚之執權日久威行內外義恭積相畏服至是懾憚尤甚廢帝未親萬機凡詔敕施為悉決法興之手尚書中事無大小專斷之顏師伯義恭守空名而已尚之甚聰敏時百姓欲為孝武立寺疑其名尚之應聲曰宜名天保詩云天保下報上也時服其機速廢帝年已漸長凶志轉成欲有所為法興每相禁制謂帝曰官所為如此欲作營陽邪帝意稍不能平所愛幸閹人華願兒有盛寵賜與金帛無算法興常加裁減願兒甚恨之帝嘗使願兒出入市里察聽風謠而道路之言謂法興為真天子帝為天子願兒因此告帝曰外間云宮中有兩天子官是一人戴法興是一人官在深宮中人物不相接法興與太宰顏柳一體往來門客有數百內外士庶無不畏服之法興是孝武左右復久在宮闈今將他人作一家深恐此坐席非復官許帝遂免法興官徙付遠郡尋於家賜死法興臨死封閉庫藏使家人謹録籥牡死一宿又殺其二子截法興棺兩和籍沒財物法興能為文章頗行於世死後帝敕巢尚之曰不謂法興積釁纍愆遂至於此吾今自覽萬機卿等宜竭誠盡力尚之時為新安王子鸞撫軍中兵參軍淮陵太守乃解舍人轉為撫軍咨議參軍太守如故明帝初復以尚之兼中書通事舍人南清河太守纍遷黃門侍郎出為新安太守病卒戴明寶南東海丹徒人亦歷員外散騎侍郎給事中孝武時帶南清河太守前廢帝即位權任悉歸法興而明寶輕矣明帝初天下反叛以明寶舊人屢經戎事復委任之後坐納貨賄繫尚方尋被宥位宣城太守升明初年老拜太中大夫病卒武陵國典書令董元嗣與法興明寶等俱為孝武南中郎典籤元嘉三十年奉使還都會元凶弒立遣元嗣南還報上以徐湛之等反上時在巴口元嗣具言弒狀上遣元嗣下都奉表於劭既而上舉義兵劭詔責元嗣元嗣答云始下未有反謀劭不信備加考掠不服遂死孝武事剋贈員外散騎侍郎使文士蘇寶生為之誄焉大明中又有奚顯度者南東海郯人官至員外散騎侍郎孝武嘗使主領人功而苛虐無道動加捶撲暑雨寒雪不聽暫休人不堪命或自經死時建康縣考囚或用方材壓額及踝脛人間謠曰寧得建康壓額不能受奚度拍又相戲曰勿反顧付奚度其酷暴如此前廢帝嘗戲云顯度刻虐為百姓疾比當除之左右因唱爾即日宣殺焉時人比之孫晧殺岑昏徐爰字長玉南琅邪開陽人也本名瑗後以與傅亮父同名亮啓改為爰初為晉琅邪王大司馬府中典軍從北征微密有意理為武帝所知少帝在東宮入侍左右文帝初又見親任遂至殿中侍御史元嘉十二年轉南臺御史始興王濬後軍行參軍復侍太子於東宮遷員外散騎侍郎文帝每出軍常懸授兵略二十九年重遣王玄謨等北侵配爰五百人隨軍碻磝銜中旨臨時宣示孝武至新亭江夏王義恭南奔爰時在殿內詐劭追義恭因即得南走時孝武將即大位軍府造次不曉朝章爰素諳其事及至莫不喜悅以兼太常丞撰立儀注後兼尚書右丞遷左丞先是元嘉中使著作郎何承天草創國史孝武初又使奉朝請山謙之南臺御史蘇寶生踵成之孝建六年又以爰領著作郎使終其業爰雖因前作而專為一家之書上表起元義熙為王業之始載序宣力為功臣之斷於是內外博議太宰江夏王義恭等三十五人同爰宜以義熙元年為斷散騎常侍巴陵王休若尚書金部郎檀道鸞二人謂宜以元興三年為始太學博士虞和謂宜以開國為宋公元年詔曰項籍聖公編録二漢前史已有成例桓玄傳宜在宋典餘如爰議孝武崩營景寧陵以本官兼將作大匠爰便僻善事人能得人主微旨頗涉書傳尤悉朝儀元嘉初便入侍左右預參顧問長於附會又飾以典文故為文帝所任遇大明世委寄尤重朝廷大禮儀非爰議不行雖復當時碩學所解過之者既不敢立異議所言亦不見從孝武崩公除後晉安王子勛侍讀博士咨爰宜習業與不爰答曰居喪讀喪禮習業何嫌少日始安王子真博士咨爰爰曰小功廢業三年喪何容讀書其專斷乖謬皆如此前廢帝凶暴無道殿省舊人多見罪黜唯爰巧於將迎始終無忤誅羣公後以爰為黃門侍郎領射聲校尉著作如故封吳平縣子寵待隆密羣臣莫二帝每出行常與沈慶之山陰公主同輦爰亦預焉明帝即位以黃門侍郎改領長水校尉兼尚書左丞明年除太中大夫著作並如故爰執權日久上在蕃素所不悅及景和世屈辱卑約爰禮敬甚簡益銜之泰始三年詔暴其罪徙交州及行又詔除廣州統內郡有司奏以為宋隆太守除命既下爰已至交州久之聽還仍除南康郡丞明帝崩還都以爰為濟南太守復除中散大夫元徽三年卒年八十二爰子希秀甚有學解亦間篆隸正覺禪靈二寺碑即希秀書也爰之徙交州明帝召希秀謂曰比當令卿父還希秀再拜答曰臣父年老恐不及後恩帝大嗟賞即召爰還希秀位驍騎將軍淮南太守子泓甚間吏職而在事刻薄於人少恩仕齊歷位臺郎秣陵建康令湘東太守阮佃夫會稽諸暨人也明帝初出閣選為主衣後又請為世子師甚見信待景和末明帝被拘於殿內住在祕書省為帝所疑大禍將至佃夫與王道隆李道兒及帝左右琅邪淳于文祖謀共廢立時直閣將軍柳光世亦與帝左右蘭陵繆方盛丹陽周登之有密謀未知所奉登之與明帝有舊方盛等乃使登之結佃夫佃夫大悅先是帝立皇后普暫撤諸王奄人明帝左右錢藍生亦在例事畢未被遣密使藍生候帝慮事泄藍生不欲自出帝動止輒以告淳于文祖令報佃夫景和元年十一月二十九日晡時帝出華林園建安王休仁山陽王休祐山陰主並侍側明帝猶在祕書省不被召益懼佃夫以告外監典事東陽朱幼又告主衣吳興壽寂之細鎧主南彭城薑産之産之又語所領細鎧將臨淮王敬則幼又告中書舍人戴明寶並響應明寶幼欲取其日向曉佃夫等勸取開門鼓後幼預約勒內外使錢藍生密報建安王休仁等時帝欲南巡腹心直閣將軍宗越等其夕並聽出外裝束唯有隊主樊僧整防華林閣是柳光世鄉人光世要之即受命薑産之又要隊副陽平聶慶及所領壯士會稽富靈符吳郡俞道龍丹陽宋逵之陽平田嗣並聚於慶省佃夫慮力少更欲招合壽寂之曰謀廣或泄不煩多人時巫覡言後堂有鬼其夕帝於竹林堂前與巫共射之建安王休仁等山陰主並從帝素不悅寂之見輒切齒寂之既與佃夫等成謀又慮禍至抽刀前入薑産之隨其後淳于文祖繆方盛周登之富靈符聶慶田嗣王敬則俞道龍宋逵之又繼進休仁聞行聲甚疾謂休祐曰作矣相隨奔景陽山帝見寂之至引弓射之不中乃走寂之追殺之事定宣令宿衛曰湘東王受太后令除狂主今已太平明帝即位論功壽寂之封應城縣侯産之汝南縣侯佃夫建城縣侯王道隆吳平縣侯淳于文祖陽城縣侯李道兒新渝縣侯繆方盛劉陽縣侯周登之曲陵縣侯富靈符惠懷縣子聶慶建陽縣子田嗣將樂縣子王敬則重安縣子俞道龍茶陵縣子宋逵之零陵縣子佃夫遷南臺侍御史薛索兒度淮為寇山陽太守程天祚又反佃夫與諸軍破薛索兒降天祚後轉太子步兵校尉南魯郡太守侍太子於東宮泰始四年以本官兼遊擊將軍及輔國將軍孟次陽與二衛參員直次陽字崇基平昌安丘人也位冠軍將軍卒時佃夫及王道隆楊運長並執權亞於人主巢戴大明之世方之蔑如也嘗正旦應合朔尚書奏遷元會佃夫曰元正慶會國之大禮何不遷合朔日邪其不稽古如此大通貨賄凡事非重賂不行人有餉絹二百匹嫌少不答書宅舍園池諸王邸第莫及女妓數十藝貌冠絶當時金玉錦繡之飾宮掖不逮也每製一衣造一物都下莫不法效焉於宅內開瀆東出十許里塘岸整潔泛輕舟奏女樂中書舍人劉休嘗詣之遇佃夫出行中路相逢要休同反就席便命施設一時珍羞莫不畢備凡諸火劑並皆始熟如此者數十種佃夫常作數十人饌以待賓客故造次便辦類皆如此雖晉世王石不能過也泰始初軍功既多爵秩無序佃夫僕從附隸皆受不次之位捉車人武賁中郎將傍馬者員外郎朝士貴賤莫不自結而矜無所降意入其室者唯吳興沈勃吳郡張淡數人而已明帝晏駕後廢帝即位佃夫權任轉重兼中書通事舍人加給事中輔國將軍餘如故欲用張淡為武陵郡衛將軍袁粲以下皆不同而佃夫稱敕施行又廬江河恢有妓張耀華美而有寵為廣州刺史將發要佃夫飲設樂見張氏悅之頻求恢曰恢可得此人不可得也佃夫拂衣出戶曰惜指失掌邪遂諷有司以公事彈恢凡如此粲等並不敢執元徽三年遷黃門侍郎領右衛將軍明年改領驍騎將軍遷南豫州刺史歷陽太守猶管內任時廢帝猖狂好出遊走始出宮猶整羽儀隊仗俄而棄部伍單騎與數人相隨或出郊野或入市內外莫不憂懼佃夫密與直閣將軍申伯宗步兵校尉朱幼于天寶謀共廢帝立安成王五年春帝欲往江乘射雉帝每出常留隊仗在樂遊苑前棄之而去佃夫欲稱太后令喚隊仗還閉城門分人守石頭東府遣人執帝廢之自為揚州刺史輔政與幼等已成謀會帝不成向江乘故事不行于天寶因以其謀告帝帝乃收佃夫幼伯宗於光祿外部賜死佃夫幼等罪止一身其餘無所問幼泰始初為外監配衣諸軍征討有濟辦之能遂官陟三品為奉朝請南高平太守封安浦縣侯于天寶其先胡人豫竹林堂功元徽中封鄂縣子發佃夫謀以為清河太守右軍將軍升明中齊高帝以其反覆賜死壽寂之位太子屯騎校尉南泰山太守多納貨賄請謁無窮有一不從便切齒罵詈常云利刀在手何憂不辦鞭尉吏斫邏將後為有司所奏徙送越州至豫章謀叛乃殺之薑産之位南濟陽太守後北侵魏戰敗見殺王道隆吳興烏程人兄道迄涉學善書形貌又美吳興太守王韶之謂人曰有子弟如王道迄無所少道隆亦知書泰始二年兼中書通事舍人道隆為明帝所委過於佃夫而和謹自保不妄毀傷人執權既久家産豐積豪麗雖不及佃夫而精整過之元徽二年桂陽王休範舉兵乃以討佃夫道隆及楊運長為名休範奄至新亭見殺楊運長宣城懷安人素善射為射師性謹賣心為明帝委信及即位親遇甚厚後廢帝即位與佃夫俱兼通事舍人以平桂陽王休範功封南城縣子運長質木廉正修身甚清不事園宅不受餉遺而凡鄙無識唯與寒人潘智徐文盛厚善動止施為必與二人量議文盛為奉朝請預平桂陽王休範封廣晉縣男順帝即位運長為宣城太守尋還家沈攸之反運長有異志齊高帝遣驃騎司馬崔文仲誅之紀僧真丹陽建康人也少隨逐征西將軍蕭思話及子惠開皆被賞遇惠開性苛僧真以微過見罰既而委任如舊及罷益州還都不得志而僧真事之愈謹惠開臨終歎曰紀僧真方當富貴我不見也以僧真託劉彥節周顒初惠開在益州土反被圍危急有道人謂之曰城圍尋解檀越貴門後方大興無憂外賊也惠開密謂僧真曰我子弟見在者並無異才政是蕭道成耳僧真憶其言乃請事齊高帝隨從在淮陰以間書題令答遠近書疏自寒官歷至高帝冠軍府參軍主簿僧真夢蒿艾生滿江驚而白之高帝曰詩人採蕭蕭即艾也蕭生斷流卿勿廣言其見親如此後除南臺御史高帝領軍功曹上將廢立謀之袁粲褚彥回僧真啓上曰今朝廷猖狂人不自保天下之望不在袁褚明公豈得默己坐受夷滅存亡之機仰希熟慮高帝納之高帝欲度廣陵起兵僧真又曰主上雖復狂釁而纍代皇基猶固盤石今百口北度何必得俱縱得廣陵城天子居深宮施號令目明公為逆何以避此如其不勝則應北走竊謂此非萬全策也上曰卿顧家豈能逐我行邪僧真頓首稱無二升明元年除員外郎帶東武城令尋除給事中高帝坐東府高樓望石頭城僧真在側上曰諸將勸我誅袁劉我意未願便爾及沈攸之事起從高帝入朝堂石頭反夜高帝遣衆軍掩討宮城中望石頭火光及叫聲甚盛人懷不測僧真謂衆曰叫聲不絶是必官軍所攻火光起者賊不容自燒其城此必官軍勝也尋而啓石頭平上出頓新亭使僧真領千人在帳內初上在領軍府令僧真學上手迹下名至是報答書疏皆付僧真上觀之笑曰我亦不復能別也初上在淮陰修理城得古錫趺九枚下有篆文莫能識者僧真省事獨曰何須辨此文字此自久遠之物錫而有九九錫之徵也高帝曰卿勿妄言及上將拜齊公已剋日有楊祖之謀於臨軒作難僧真請上更選吉辰尋而祖之事覺上曰無卿言亦當致小狼狽此亦何異滹沱之冰轉齊國中書舍人建元初帶東燕令封新陽縣男轉羽林監遷尚書主客郎太尉中兵參軍兼中書舍人高帝疾甚令僧真典遺詔永明元年丁父喪起為建威將軍尋除南泰山太守又為舍人僧真容貌言吐雅有士風武帝嘗目送之笑曰人生何必計門戶紀僧真堂堂貴人所不及也諸權要中最被眄遇後除前軍將軍遭母喪開冢得五色兩頭蛇武帝崩僧真號泣思慕明帝以僧真歷朝驅使建武初除遊擊將軍兼司農待之如舊欲令僧真臨郡僧真啓進其弟僧猛為鎮蠻護軍晉熙太守永泰元年除司農卿明帝崩掌山陵事出為廬陵內史卒于官僧猛後卒於晉熙太守兄弟皆有風姿舉止並善隸書僧猛又能飛白書作飛白賦僧真子交卿甚有解用宋時道人楊法持與高帝有舊元徽末宣傳密謀升明中以為僧正建元初罷道為寧朔將軍封州陵男二年遣法持為軍主領支軍救援朐山永明四年坐役使將客奪其鮭稟削封卒劉係宗丹陽人也少便書畫為宋竟陵王誕子景粹侍書誕舉兵廣陵城內皆死敕沈慶之赦係宗以為東宮侍書泰始中為主書以寒官纍至勳品元徽初為奉朝請兼中書通事舍人員外郎封始興南亭侯帶秣陵令齊高帝廢蒼梧明旦呼正直舍人虞整醉不能起係宗歡喜奉敕高帝曰今天地重開是卿盡力之日使寫諸處分敕令及四方書疏使主書十人書吏二十人配之事皆稱旨高帝即位除龍驤將軍建康令永明初為右軍將軍淮陵太守兼中書通事舍人母喪自解起復本職四年白賊唐𧜛之起宿衛兵東討遣係宗隨軍慰勞遍至遭賊郡縣百姓被驅逼者悉無所問還復人伍係宗還上曰此段有征無戰以時平蕩百姓安怗甚快也賜係宗錢帛上欲修白下城難於動役係宗啓謫役在東人丁隨𧜛之為逆者上從之後車駕出講武上履行白下城曰劉係宗為國家得此一城永明中魏使書常令係宗題答祕書局皆隸之再為少府鬱林即位除寧朔將軍宣城太守係宗久在朝省間於職事武帝常云學士輩不堪經國唯大讀書耳經國一劉係宗足矣沈約王融數百人於事何用其重吏事如此建武二年卒官茹法亮吳興武康人也宋大明中出身為小史歷齋幹扶侍孝武末年鞭罰過度校獵江右選白衣左右百八十人皆面首富室從至南州得鞭者過半法亮憂懼因緣啓出家得為道人明帝初罷道結事阮佃夫纍至齊高帝冠軍府行參軍及武帝鎮盆城須舊驅使人法亮求留為武帝江州典籤除南臺御史帶松滋令法亮便僻解事善於承奉稍見委信建元初度東宮主書除奉朝請補東宮通事舍人武帝即位仍為中書通事舍人除員外郎帶南濟陰太守與會稽呂文度臨海呂文顯並以姦佞諂事武帝文度為外監專制兵權領軍將軍守虛位而已天文寺常以上將星占文度吉凶文度尤見委信上嘗云公卿中有憂國如文度者復何憂天下不寧文度既見委用大納財賄廣開宅宇盛起土山奇禽怪樹皆聚其中後房羅綺王侯不能及又啓上籍被却者悉充遠戍百姓嗟怨或逃亡避咎富陽人唐𧜛之因此聚黨為亂鼓行而東乃於錢唐縣僭號以新城戍為偽宮以錢唐縣為偽太子宮置百官皆備三吳却籍者奔之衆至三萬竊稱吳國偽年號興平其源始於虞玩之而成於文度事見虞玩之傳法亮文度並勢傾天下太尉王儉常謂人曰我雖有大位權寄豈及茹公永明二年封望蔡縣男七年除臨淮太守轉竟陵王司徒中兵參軍巴東王子響於荊州殺僚佐上遣軍西上使法亮宣旨安撫子響法亮至江津子響呼法亮疑畏不肯往又求見傳詔法亮又不遣故子響怒遣兵破尹略軍事平法亮至江陵誅賞處分皆稱敕斷決軍還上悔誅子響法亮被責少時親任如舊廣開宅宇杉齋光麗與延昌殿相埒延昌殿武帝中齋也宅後為魚池釣臺土山樓館長廊將一里竹林花藥之美公家苑囿所不能及鬱林即位除步兵校尉時有綦母珍之居舍人之任凡所論薦事無不允內外要職及郡丞尉皆論價而後施行貨賄交至旬月之間纍至千金帝給珍之宅宅邊又有空宅從即併取輒令材官營作不關詔旨材官將軍細作丞相語云寧拒至尊敕不可違舍人命珍之母隨弟欽之作暨陽令欽之罷縣還珍之迎母至湖熟輒將青氅百人自隨鼓角橫吹都下富人追從者百數欽之自行佐作縣還除廬陵王驃騎正將軍又詐宣敕使欽之領青氅珍之有一銅鏡背有三公字常語人云徵祥如此何患三公不至乃就蔣王廟乞願得三公封郡王啓帝求封朝議未許又自陳曰珍之西州伏事侍從入宮契闊心膂竭盡誠力王融姦謀潛構自非珍之翼衛扶持事在不測今惜千戶侯誰為官使者又有牒自論於朝廷曰當世祖晏駕之時內外紛擾珍之手抱至尊口行處分忠誠契闊人誰不知今希千戶侯於分非過乃許三百戶瞋恚形於言色進為五百戶又不肯受明帝議誅之乃許封汝南縣有杜文謙者吳郡錢唐人帝為南郡王文謙侍五經文句歷太學博士出為溧陽令未之職會明帝知權蕭諶用事文謙乃謂珍之曰天下事可知灰盡粉滅匪朝伊夕不早為計吾徒無類矣珍之曰計將安出答曰先帝故人多見擯斥今召而使之誰不慷慨近聞王洪範與趙越常徐僧亮萬靈會共語皆攘袂捶牀君其密報周奉叔使萬靈會魏僧勔殺蕭諶則宮內之兵皆我用也即勒兵入尚書斬蕭令兩都伯力耳其次則遣荊軻豫讓之徒因咨事左手頓其胸則方寸之刃足以立事亦萬世一時也今舉大事亦死不舉事亦死二死等耳死社稷可乎若遲疑不斷復少日録君稱敕賜死父母為殉在眼中矣珍之不能用時徐龍駒亦當得封珍之恥與龍駒共詔因求別立事未及行而事敗珍之在西州時有一手板相者云當貴每以此言動帝又圖黃門郎帝嘗問之曰西州時手板何在珍之曰此是黃門手板官何須問帝大笑珍之時為左將軍南彭城太守領中書通事舍人正直宿宣旨使即往蔣王廟祈福因收送廷尉與周奉叔杜文謙同死文謙有學行善言吐其父聞其死曰吾所以憂者恐其不得死地耳今以忠義死復何恨哉王經母所以欣經之義也時人美其言龍駒以奄人本給安陸侯後度東宮為齋帥帝即位後以便佞見寵凡諸鄙黷雜事皆所誘勸位羽林監後閣舍人黃門署令淮陵太守帝為龍駒置嬪御妓樂常住含章殿著黃綸帽被貂裘南面向案代帝畫敕內左右侍直與帝不異前代趙忠張讓之徒莫之能比封惠懷縣男事未行明帝請誅之懇至乃見許曹道剛廢帝之日直閣省蕭諶先入若欲論事兵隨後奄進以刀刺之洞胸死因進宮內廢帝直後徐僧亮甚怒大言於衆曰吾等荷恩今日應死報又見殺道剛字景昭彭城人性質直帝雖與之狎而未嘗敢酬帝悅市里雜事以為歡樂道剛輒避之益州人韓護善騎馬帝嘗呼入華林園令騎大賞狎之道剛出謂明帝主上猶是小兒左右皆須正人使日見禮則近聞韓護與天子齊馬並馳此導人君於危地道剛欲殺之既而遣人刺殺護及道剛死張融謂劉繪曰道剛似不為諂亦復不免也答曰夫徑寸之珠非不寶也而之所病云何不療之哉此道剛所以死也明帝即位高武舊人鮮有存者法亮以主署文事故不見疑位任如故先是延昌殿為武帝陰室藏諸服御二少帝並居西殿及明帝居東齋開陰室出武帝白紗帽防身刀法亮歔欷流涕永泰元年王敬則事平法亮復受敕宣慰諸郡無所納受東昏即位出法亮為大司農中書權利之職法亮不樂去固辭不受既而代人已到法亮垂涕而出卒官呂文顯臨海人也升明初為齊高帝録尚書省事纍遷殿中侍御史後為秣陵令封劉陽縣男永明元年為中書通事舍人文顯臨事以刻核被知三年帶南清河太守與茹法亮等迭出入為舍人並見親幸多四方餉遺並造大宅聚山開池時中書舍人四人各住一省世謂之四戶既總重權勢傾天下晉宋舊制宰人之官以六年為限近世以六年過久又以三周為期謂之小滿而遷換去來又不依三周之制送故迎新吏人疲於道路四方守宰餉遺一年咸數百萬舍人茹法亮於衆中語人曰何須覓外祿此一戶內年辦百萬蓋約言之也其後玄象失度史官奏宜修祈禳之禮王儉聞之謂上曰天文乖忤此禍由四戶仍奏文顯等專擅愆和極言其事上雖納之而不能改也文顯纍遷左中郎將南東莞太守故事府州部內論事皆籤前直所論之事後云謹籤日月下又云某官某籤故府州置典籤以典之本五品吏宋初改為七職宋氏晚運多以幼少皇子為方鎮時主皆以親近左右領典籤典籤之權稍重大明泰始長王臨蕃素族出鎮莫不皆出內教命刺史不得專其任也宗賣心為豫州吳喜公為典籤賣心刑政所施喜公每多違執賣心大怒曰宗賣心年將六十為國竭命政得一州如斗大不能復與典籤共臨喜公稽顙流血乃止自此以後權寄彌隆典籤遞互還都一歲數反時主輒與間言訪以方事刺史行事之美惡係於典籤之口莫不折節推奉慮不及於是威行州郡權重蕃君劉道濟柯孟孫等姦慝發露雖即顯戮而權任之重不異明帝輔政深知之始制諸州急事宜密有所論不得遣典籤還都而典籤之任輕矣後以文顯守少府見任使歷建武永元之世至尚書右丞少府卿卒官茹法珍會稽人梅蟲兒吳興人齊東昏時並為制局監俱見愛幸自江祏始安王遙光等誅後及左右應敕捉刀之徒並專國命人間謂之刀敕權奪人主都下為之語曰欲求貴職依刀敕須得富豪事御刀時又有新蔡人徐世檦尤見寵信自殿內主帥為直閣驍騎將軍凡諸殺戮皆世檦所勸殺徐孝嗣後封臨汝縣子陳顯達事起加輔國將軍雖用護軍崔慧景為都督而兵權實在世檦當時權勢傾法珍蟲兒又謂法珍蟲兒曰何世天子無要人但阿儂貨主惡耳法珍等與之爭權遂以白帝帝稍惡其凶強世檦竊欲生心左右徐僧重密知之發其事收得千餘人仗及呪詛文又畫帝十餘形像備為刑斬刻射支解之狀而自作己像著通天冠袞服題云徐氏皇帝永元二年事發乃族之自是法珍蟲兒並為外監口稱詔敕中書舍人王咺之與相脣齒專掌文翰其餘二十餘人皆有勢力崔慧景平後法珍封餘干縣男蟲兒封竟陵縣男崔慧景之平曲赦都下及南兗州本以宥賊黨而羣凶用事刑辟不依詔書無罪家富者不論赦令莫不受戮籍其家産與慧景深相關為盡力而家貧者一無所問始安顯達時亦已如此至慧景平復然或説王咺之云赦書無信人情大惡咺之曰政當復有赦耳復赦羣小誅戮亦復如先帝自羣公誅後無復忌憚無日不遊走所幸潘妃本姓俞名尼子王敬則伎也或云宋文帝有潘妃在位三十年於是改姓曰潘其父寶慶亦從改焉帝呼寶慶及法珍為阿丈蟲兒及東冶營兵俞靈韻為阿兄帝與法珍等俱詣寶慶帝躬自汲水助人作膳為市中雜語以為諧謔又帝輕騎戎服往諸刀敕家遊宴有吉凶輒往慶弔奄人王寶孫年十三四號為倀子最有寵參預朝政雖王咺之蟲兒之徒亦下之控制大臣移易敕詔乃至騎馬入殿詆訶天子公卿見之莫不懾息其佐成昏亂者法珍蟲兒及王咺之俞寶慶俞靈韻祝靈勇范亮之徐僧重時崇濟芮安泰劉文泰呂文慶胡輝光繆買養章道之楊敬子李粲之周管之范曇濟石曇悅張惡奴王勝公王懷藻梅師濟鄒伯兒史元益王靈範席休文解滂及太史令駱文叔大巫朱光尚凡三十一人又有奄官王寶孫王法昭許朗之許伯孫方佛念馬僧猛盛劭王竺兒隨要袁係世等十人梁武平建鄴皆誅又朱興光為茹法珍所疾得罪被繫豐勇之與王珍國相知行殺皆免初左右刀敕之徒悉號為鬼宮中訛云趙鬼食鴨諸鬼盡著調當時莫解梁武平建鄴東昏死羣小一時誅滅故稱為諸鬼也俗間以細銼肉糅以薑桂曰意者以凶黨皆當細銼而烹之也周石珍建康之厮隸也世以販絹為業梁天監中稍遷至宣傳左右身長七尺頗間應對後遂至制局監帶開陽令歷位直閣將軍太清三年封南豐縣侯猶領制局臺城未陷已射書與侯景相結門初開石珍猶侍左右時賊遣其徒入直殿內或驅驢馬出入殿庭武帝方坐文德殿怪問之石珍曰皆丞相甲士上曰何物丞相對曰侯丞相上怒叱之曰是名侯景何謂丞相石珍求媚於賊乃養其黨田遷以為己子遷亦父事之景篡位制度羽儀皆石珍自出景平後及中書舍人嚴亶等送于江陵亶本為齋監居臺省積久多間故實在賊居要亞於石珍及簡文見立亶學北人著靴上殿無肅恭之禮有怪之者亶曰吾豈畏劉禪乎從景圍巴陵郡叫曰荊州那不送降及至江陵將刑于市泣謂石珍曰吾等死亦是罪盈石珍與其子升相抱哭亶謂監刑人曰倩語湘東王不有廢也君何以興俱腰斬自是更殺賊黨以板柙舌釘釘之不復得語陸驗徐驎並吳郡吳人驗少而貧苦落魄無行邑人郁吉卿者甚富驗傾身事之吉卿貸以錢米驗借以商販遂致千金因出都下散資以事權貴朱索其邑子也故嘗有德遂言於武帝拔之與徐驎兩人遞為少府丞太市令驗本無藝業而容貌特醜先是外國獻生犀其形甚陋故閭里咸謂驗為生犀驗驎並以苛刻為務百賈畏之索尤與之昵世人謂之三蠹司農卿傅岐梗直士也嘗謂索曰卿任參國鈞榮寵如此比日所聞鄙穢狼藉若使聖主發悟欲免得乎索曰外間謗讟知之久矣心苟無愧何恤人言岐謂人曰朱彥和將死矣恃諂以求容肆辨以拒諫聞難而不懼知惡而不改天奪其鑒其能久乎驗竟以侵削為能數年遂登列棘鳴佩珥貂並肩英彥仕至太子右衛率卒贈右衛將軍遠近聞其死莫不快之驎素為邵陵王綸所憾太清二年為綸所殺司馬申字季和河內溫人也祖慧遠梁都水使者父玄通梁尚書左戶郎申早有風鑒十四便善奕嘗隨父候吏部尚書到溉時梁州刺史陰子春領軍朱索在焉呼與申每有妙思索觀而奇之因引申遊處太清之難父母俱沒因此自誓擔土菜食終身梁元帝承制纍遷鎮西外兵記室參軍及侯景寇郢州申隨都督王僧辨據巴陵每進策皆見行用僧辨歎曰此生要軖汗馬或非所長若使撫衆守城必有奇績僧辨之討陸納也于時賊衆奄至左右披靡申躬蔽僧辨蒙楯而前會裴之橫救至賊乃退僧辨顧而笑曰仁者必有勇豈虛言哉陳太建中除秣陵令在職以清能見紀有白雀集于縣庭復為東宮通事舍人叔陵之肆逆也事既不捷出據東府申馳召右衛將軍蕭摩訶帥兵先至追斬之後主深嘉焉以功除太子左衛率封文招縣伯兼中書通事舍人遷右衛將軍歷事三帝內掌機密頗作威福性忍害好飛書以譖毀朝之端士遍罹其殃參預謀謨乃於外宣説以為己力省中祕事往往泄漏性又果敢善應對能候人主顏色有忤己者必以微言譖之附己者因機進之是以朝廷內外皆從風靡初尚書右僕射沈君理卒朝廷議以毛喜代之申慮喜預政乃短喜於後主曰喜臣之妻兄高帝時稱陛下有酒德請逐去宮臣陛下寧忘之邪喜由是廢錮又與施文慶李脫兒比周譖殺傅縡奪任忠部曲以配蔡徵孔範是以文武解體至於覆滅申嘗晝寢於尚書下省有烏啄其口流血及地時論以為譖賢之效也後加散騎常侍右衛舍人如故至德四年卒後主嗟悼久之贈侍中護軍將軍進爵為侯諡曰忠及葬後主自為製志銘子琇嗣官至太子舍人施文慶不知何許人也家本吏門至文慶好學頗涉書史陳後主之在東宮文慶事焉及即位擢為中書舍人仍屬叔陵作亂隋師臨境軍國事務多起倉卒文慶聰敏強記明間吏職心算口占應時條理由是大被親幸又自太建以來吏道疏簡百司弛縱文慶盡其力用無所縱捨分官聯事莫不振懼又引沈客卿陽惠朗徐哲暨慧景等云有吏能後主信之然並不達大體督責苛碎聚斂無厭王公大人咸共疾之後主益以文慶為能尤更親重內外衆事無不任委纍遷太子左衛率舍人如故禎明三年湘州刺史晉熙王叔文在職既久大得人和後主以其據有上流陰忌之自度素與羣臣少恩恐不為用無所任者乃擢文慶為都督湘州刺史配以精兵欲令西上仍徵叔文還朝文慶深喜其事然懼居外後執事者持己短長因進其黨沈客卿以自代未發間二人共掌機密時隋軍大舉分道而進尚書僕射袁憲驃騎將軍蕭摩訶及文武羣臣共議請於京口采石各置兵五千并出金翅二百緣江上下以為防備文慶恐無兵從己廢其述職而客卿又利文慶之任己得專權俱言於朝曰必有論議不假面陳但作文啓即為通奏憲等以為然二人齎啓入白後主曰此是常事邊城將帥足以當之若出人船必恐驚擾及隋軍臨江間諜驟至憲等殷勤奏請至于再三文慶等曰元會將逼南郊之日太子多從今若出兵事便廢闕後主曰今且出兵若北邊無事因以水軍從郊何為不可又對曰如此則聲聞鄰境便謂國弱後又以貨動江總總內為之遊説後主重違其意而迫羣官之請乃令付外詳議又抑憲等由是未決而隋師濟江後主性怯懦不達軍事晝夜啼泣臺內處分一以委之文慶既知諸將疾己恐其有功乃奏曰此等怏怏素不服官迫此事機那可專信凡有所啓請經略之計並皆不行尋敕文慶領兵頓于樂遊苑陳亡隋晉王廣以文慶受委不忠曲為諂佞以蔽耳目比黨數人並於石闕前斬之以謝百姓沈客卿吳興武康人也美風采善談論博涉羣書與施文慶少相親昵仕陳纍遷至尚書儀曹郎聰明有口辨頗知故事每朝廷體式吉凶儀注凡所疑議客卿斟酌裁斷理雖有不經而衆莫能屈事多施行至德初以為中書舍人兼步兵校尉掌金帛局以舊制軍人士人二品清官並無關市之稅後主盛修宮室窮極耳目府庫空虛有所興造苦不給客卿每立異端唯以刻削百姓為事奏請不問士庶並責關市之估而又增重其舊於是以陽惠朗為太市令暨慧景為尚書金倉都令史二人家本小吏考校簿領豪釐不差糾謫嚴急百姓嗟怨而客卿居舍人總以督之每歲所入過於常格數十倍後主大悅尋加客卿散騎常侍左衛將軍舍人如故惠朗慧景奉朝請禎明三年客卿遂與文慶俱掌機密隋師至文慶出頓樂遊苑內外事客卿總焉臺城失守隋晉王以客卿重賦厚斂以悅於上與文慶暨慧景陽惠朗等俱斬於石闕前徐哲不知何許人施文慶引為制局監掌刑法亦與客卿同誅孔範字法言會稽山陰人也曾祖景偉齊散騎常侍祖滔梁海鹽令父岱歷職清顯範少好學博涉書史陳太建中位宣惠江夏王長史後主即位為都官尚書與江總等並為狎客範容止都雅文章贍麗又善五言詩尤見親愛後主性愚狠惡聞過失每有惡事範必曲為文飾稱揚贊美時孔貴人絶愛幸範與孔氏結為兄妹寵遇優渥言聽計從朝廷公卿咸畏範範因驕矜以為文武才能舉朝莫及從容白後主曰外間諸將起自行伍匹夫敵耳深見遠慮豈其所知後主以問施文慶文慶畏範益以為然自是將帥微有過失即奪其兵分配文吏隋師將濟江羣官請為備防文慶沮壞之後主未決範奏曰長江天塹古來限隔虜軍豈能飛度邊將欲作功勞妄言事急臣自恨位卑虜若能來定作太尉公矣或妄言北軍馬死範曰此是我馬何因死去後主笑以為然故不深備尋而隋將賀若弼陷南徐州執城主莊元始韓擒陷南豫州敗水軍都督高文泰範與中領軍魯廣達頓于白塔寺後主多出金帛募人立功範素於武士不接莫有至者唯負販輕薄多從之高麗百濟崑崙諸夷並受督時任蠻奴請不戰而己度江攻其大軍又司馬消難言於後主曰弼若登高舉烽與韓擒相應鼓聲交震人情必離請急遣兵北據蔣山南斷淮水質其妻子重其賞賜陛下以精兵萬人守城莫出不過十日食盡二將之頭可致闕下範冀欲立功志在於戰乃曰司馬消難狼子野心任蠻奴淮南傖士語並不可信事遂不行隋軍既逼蠻奴又欲為持久計範又奏請作一決當為官勒石燕然後主從之明日範以其徒居中以抗隋師未陳而北範脫身遁免尋與後主俱入長安初晉王廣所戮陳五佞人範與散騎常侍王瑳王儀御史中丞沈瓘過惡未彰故免及至長安事並露隋文帝以其姦佞諂惑並暴其過惡名為四罪人流之遠裔以謝吳越之人瑳儀並琅邪人瑳刻薄貪鄙忌害才能儀候意承顏傾巧側媚又獻其二女以求親昵瓘險慘苛酷發言邪諂故同罪焉論曰自宋中世以來宰御朝政萬機碎密不關外司尚書八座五曹各有任係以九卿六府事存副職至於冠冕搢紳任疏人貴伏奏之務既寢趨走之勞亦息關宣所寄屬當事有所歸通驛內外切自音旨若夫竭忠盡節仕子圖隨方致用明君盛典舊非本舊因新以成舊者也狎非先狎因疏以成狎者也而任隔疏情殊塗一致權歸近狎異世同揆故環纓斂笏俯仰晨昏瞻幄坐而竦躬陪蘭檻而高眄探求恩色習覩威顏遷蘭變鮑久而彌信因城社之固執開壅之機長主君世振裘持領賞罰事殷能不踰漏宮省咳唾義必先知故窺盈縮於望景獲驪珠於龍睡坐歸聲勢臥震都鄙賄賂日積苞苴歲通富擬公侯威行州郡制局小司專典兵力雲陛天居亘設蘭綺羽林精卒重屯廣衛至於元戎啓轍武候還麾遮迾清道神行按轡督察往來馳騖輦轂驅役分部親承几案領護所攝示成規若徵兵動衆大興人役優劇遠近斷於外監之心譴辱詆訶恣於典事之口抑符緩詔姦偽非一書死為生請謁成市左臂揮金右手刊字紙為銅落筆由利染故門同玉署家號金穴嬙媛侍女燕秦蔡鄭之聲琁池碧梁魚龍雀馬之玩莫不充牣錦室照徹青雲害政傷人於斯為切況乎主幼時昏讒慝亦何可勝紀也
