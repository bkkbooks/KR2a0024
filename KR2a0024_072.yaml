body:
  text: 南史卷七十二列傳第六十二文學丘靈鞠子遲從孫仲孚檀超熊襄吳邁遠超叔道鸞卞彬諸葛勗袁嘏高爽丘巨源孔廣孔逭虞通之虞和司馬憲袁仲明孫詵王智深崔慰祖祖沖之子耳幾之孫皓來嶷賈希鏡袁峻劉昭子縚緩鍾嶸兄岏岏弟嶼周興嗣吳均江洪劉協何思澄子朗王子雲任孝恭顏協紀少瑜杜之偉顏晃岑之敬何之元徐伯陽張正見阮卓易云觀乎人文以化成天下孔子曰煥乎其有文章自漢以來辭人代有大則憲章典誥小則申抒性靈至於經禮樂而緯國家通古今而述美惡非斯則莫可也是以哲王在上咸所敦悅故云言之不文行之不遠自中原沸騰五馬南度綴文之士無乏於時降及梁朝其流彌盛蓋由時主儒雅篤好文章故才秀之士煥乎俱集于時武帝每所臨幸輒命羣臣賦詩其文之善者賜以金帛是以縉紳之士咸知自勵至有陳受命運接亂離雖加奬勵而向時之風流息矣詩云人之云亡邦國殄悴豈金陵之數將終三百年乎不然何至是也宋史不立文學傳齊梁皆有其目今綴而序之以備此篇云爾丘靈鞠吳興烏程人也祖系祕書監父道真護軍長史靈鞠少好學善屬文州辟從事詣領軍沈演之演之曰身昔為州職詣領軍謝晦賓主坐處政如今日卿將來復如此也纍遷員外郎宋孝武殷貴妃亡靈鞠獻挽歌三首云雲橫廣階暗霜深高殿寒帝擲句嗟賞後為烏程令不得志泰始初坐事禁錮數年褚彥回為吳興太守謂人曰此郡才士唯有丘靈鞠及沈勃耳乃啓申之明帝使著大駕南討記論久之除太尉參軍升明中為正員郎兼中書郎時方禪讓齊高帝使靈鞠參掌詔策建元元年轉中書郎敕知東宮手筆嘗還東詣司徒褚彥回別彥回不起曰比腳疾更增不復能起靈鞠曰腳疾亦是大事公為一代鼎臣不可復為覆餗其強切如此不持形儀唯取笑適尋又掌知國史武帝即位為通直常侍尋領東觀祭酒靈鞠曰人居官願數遷使我終身為祭酒不恨也永明二年領驍騎將軍靈鞠不樂武位謂人曰我應還東掘顧榮冢江南地方數千里士子風流皆出此中顧榮忽引諸傖輩度妨我輩塗轍死有餘罪靈鞠好飲酒臧否人物在沈深座見王儉詩深曰王令文章大進靈鞠曰何如我未進時此言達儉靈鞠宋時文名甚盛入齊頗減蓬髮弛縱無形儀不事家業王儉謂人曰丘公仕宦不進才亦退矣位長沙王車騎長史卒著江左文章録序起太興訖元熙文集行於時子遲遲字希範八歲便屬文靈鞠常謂氣骨似我黃門郎謝超宗徵士何點並見而異之在齊以秀才纍遷殿中郎梁武帝平建鄴引為驃騎主簿甚被禮遇時勸進梁王及殊禮皆遲文也及踐阼遷中書郎待詔文德殿時帝著連珠詔羣臣繼作者數十人遲文最美坐事免乃獻責躬詩上優辭答之後出為永嘉太守在郡不稱職為有司所糾帝愛其才寢其奏天監四年中軍將軍臨川王宏北侵魏以為咨議參軍領記室時陳伯之在北與魏軍來拒遲以書喻之伯之遂降還拜中書侍郎遷司空從事中郎卒官遲辭采麗逸時有鍾嶸著詩評云范雲婉轉清便如流風回雪遲點綴映媚似落花依草雖取賤文通而秀於敬子其見稱如此仲孚字公信靈鞠從孫也少好學讀書常以中宵鐘鳴為限靈鞠嘗稱為千里駒也齊永明初為國子生王儉曰東南之美復見丘生舉高第未調還鄉里家貧乃結羣盜為之計劫掠三吳仲孚聰明有智略羣盜畏服所行皆果故亦不發為于湖令有能名太守呂文顯當時幸臣陵詆屬縣仲孚獨不為屈明帝即位為曲阿令會稽太守王敬則反乘朝廷不備反問至而前鋒已屆曲阿仲孚鑿長岡埭瀉瀆水以阻其路敬則軍至遇瀆涸果頓兵不得進遂敗仲孚以拒守功遷山陰令居職甚有聲稱百姓謠曰二傅沈劉不如一丘前世傅琰父子沈憲劉玄明相繼宰山陰並有政績言仲孚皆過之齊末政亂頗有贓賄為有司所舉將見收竊逃還都會赦不問梁武帝踐阼復為山陰令仲孚長於撥煩善適權變吏人敬服號稱神明政為天下第一後為衛尉卿恩任甚厚初起雙闕以仲孚領大匠纍遷豫章內史在郡更勵清節頃之卒贈給事黃門侍郎喪將還豫章老幼號哭攀送車輪不得前仲孚為左丞撰皇典二十卷南宮故事百卷又撰尚書具事雜儀行於世檀超字悅祖高平金鄉人也祖嶷之字弘宗宋南琅邪太守父道彪字萬壽位正員郎超少好文學放誕任氣解褐州西曹蕭惠開為別駕超便抗禮惠開自以地位居前稍相陵辱而超舉動嘯傲不以地勢推之張目謂曰我與卿俱是國家微賤時外戚耳何足以一爵高人蕭太后惠開之祖姑長沙景王妃超祖姑也故超以此議之惠開欣然更為刎頸之交後位國子博士兼左丞超嗜酒好談詠自比晉郗超言高平有二超又謂人曰猶覺我為優也齊高帝賞愛之後為司徒右長史建元二年初置史官以超與驃騎記室江淹掌史職上表立條例開元紀號不取宋年封爵各詳本傳無假年表又制著十志多為左僕射王儉所不同既與物多忤史功未就徙交州於路見殺江淹撰成之猶不備也時有豫章熊襄著齊典上起十代其序云尚書堯典謂之虞書則附所述通謂之齊書名為河洛金匱又有吳邁遠者好為篇章宋明帝聞而召之及見曰此人連絶之外無所復有邁遠好自誇而蚩鄙他人每作詩得稱意語輒擲地呼曰曹子建何足數哉超聞而笑曰昔劉季緒才不逮於作者而好抵訶人文章季緒瑣瑣焉足道哉至於邁遠何為者乎超叔父道鸞字萬安位國子博士永嘉太守亦有文學撰續晉陽秋二十卷卞彬字士蔚濟陰寃句人也祖嗣之中領軍父延之弱冠為上虞令有剛氣會稽太守孟顗以令長裁之積不能容脫幘投地曰我所以屈卿者政為此幘耳今已投之卿矣卿以一世勳門而傲天下國士拂衣而去彬險拔有才而與物多忤齊高帝輔政袁粲劉彥節王蘊等皆不同而沈攸之又稱兵反粲蘊雖敗攸之尚存彬意猶以高帝事無所成乃謂帝曰比聞謠云可憐可念尸著服孝子不在日代哭列管暫鳴死滅族公頗聞不時蘊居父憂與粲同死故云尸著服也服者衣也孝子不在日代哭者褚字也彬謂沈攸之得志褚彥回當敗故言哭也列管謂蕭也高帝不悅及彬退曰彬自作此後常於東府謁高帝高帝時為齊王彬曰殿下即東宮為府則以青溪為鴻溝鴻溝以東為齊以西為宋仍詠詩云誰謂宋遠跂豫望之遂大忤旨因此擯廢數年不得仕進乃擬趙一窮鳥為枯魚賦以喻意後為南康郡丞彬頗飲酒擯棄形骸仕既不遂乃著蚤蝨蝸蟲蝦蟆等賦皆大有指斥其蚤蝨賦序曰余居貧布衣十年不製一袍之縕有生所託資其寒暑無與易之為人多病起居甚疏縈寢敗絮不能自釋兼攝性懈墮懶事皮膚澡刷不謹浣沐失時四體悠悠加以臭穢故葦席蓬纓之間蚤蝨猥流淫癢渭濩無時恕肉探揣擭撮日不替手蝨有諺言朝生暮孫若吾之蝨者無湯沐之慮絶相弔之憂晏聚乎久袴爛布之裳復不勤於討捕孫孫子子三十五歲焉其略言皆實録也又為禽獸決録目禽獸云羊性淫而佷豬性卑而率鵝性頑而狗性險而出皆指斥貴勢其羊淫佷謂呂文顯豬卑率謂朱隆之鵝頑傲謂潘敞狗險出謂文度其險詣如此蝦蟆賦云紆青拖紫名為蛤魚世謂比令僕也又云蝌斗唯唯羣浮暗水唯朝繼夕聿役如鬼比令史咨事也文章傳於閭巷後歷尚書比部郎安吉令車騎記室彬性好飲酒以瓠壺瓢勺杬皮為具著帛冠十二年不改易以大瓠為火籠什物多諸詭異自稱卞田居婦為傅蠶室或謂曰卿都不持操名器何由得升彬曰擲五木子十擲輒鞬豈復是擲子之拙吾好擲政極此耳後為綏建太守卒官永明中琅邪諸葛勗為國子生作雲中賦指祭酒以下皆有形似之目坐事繫東冶作東冶徒賦武帝見赦之又有陳郡袁嘏自重其文謂人云我詩應須大材迮之不爾飛去建武末為諸暨令被王敬則賊所殺時有廣陵高爽博學多材劉蒨為晉陵縣爽經途詣之了不相接爽甚銜之俄而爽代蒨為縣蒨遣迎贈甚厚爽受餉答書云高晉陵自答人問其所以答云劉蒨餉晉陵令耳何關爽事又有人送書與爽告躓云比日守羊困苦爽答曰守羊無食何不貨羊糴米孫抱為延陵縣爽又詣之抱了無故人之懷爽出從縣閣下過取筆書鼓云徒有八尺圍腹無一寸腸面皮如許厚受打未詎央爽機悟多如此坐事被繫作鑊魚賦以自況其文甚工後遇赦免卒抱東莞人父廉吳興太守抱善吏職形體肥壯腰帶十圍爽故以此激之丘巨源蘭陵蘭陵人也少舉丹陽郡孝廉為宋孝武所知大明五年敕助徐爰撰國史帝崩江夏王義恭取掌書記明帝即位使參詔誥引在左右自南臺御史為王景文鎮軍參軍寧喪還家元徽初桂陽王休範在尋陽以巨源有筆翰遣船迎之餉以錢物巨源因齊高帝自啓敕板起之使留都下桂陽事起使於中書省撰符檄事平除奉朝請巨源望有封賞既而不獲乃與尚書令袁粲書自陳竟不被申沈攸之事高帝又使為尚書符荊州以此又望賞異自此意常不滿後除武昌太守拜竟不樂江外行武帝問之巨源曰古人云寧飲建鄴水不食武昌魚臣年已老寧死於建鄴乃以為餘杭令明帝為吳興巨源作秋胡詩有譏刺語以事見殺時又有會稽孔廣孔逭皆才學知名廣字淹源美容止善吐論王儉張緒咸美之儉常云廣來使人廢簿領匠不須來來則莫聽去緒數巾車詣之每歎云孔廣使吾成輕薄祭酒仕至揚州中從事逭抗直有才藻製東都賦于時才士稱之陳郡謝糟年少時遊會稽還父莊問入東何見見孔逭不見重如此著三吳決録不傳終於衛軍武陵王東曹掾又時有虞通之虞和司馬憲袁仲明孫詵等皆有學行與廣埒名通之和皆會稽餘姚人通之善言易至步兵校尉和位中書郎廷尉少好學居貧屋漏恐濕墳典乃舒被覆書書獲全而被大濕時人以比高鳳憲字景思河內溫人待詔東觀為學士至殿中郎口辨有才地使魏見稱於北仲明陳郡人撰晉史未成而卒初仲明與劉融卞鑠俱為袁粲所賞在坐席粲為丹陽尹取鑠為主簿好詩賦多譏刺世人坐徙巴州詵字休羣太原中都人愛文尤賞泉石卒於御史中丞王智深字雲才琅邪臨沂人也少從陳郡謝超宗學屬文好飲酒拙澀乏風儀仕齊為豫章王大司馬參軍兼記室武帝使太子家令沈約撰宋書疑立袁粲傳以審武帝帝曰袁粲自是宋家忠臣約又多載孝武明帝諸褻黷事上遣左右語約曰孝武事迹不容頓爾我昔經事宋明帝卿可思諱惡之義於是多所省除又敕智深撰宋紀召見芙蓉堂賜衣服給宅智深告貧於豫章王王曰須卿書成當相論以祿書成三十卷武帝後召見智深於璿明殿令拜表奏上表未奏而武帝崩隆昌元年敕索其書智深遷為竟陵王司徒參軍免官家貧無人事嘗餓五日不得食掘莞根食之司空王僧虔及子志分與衣食卒於家崔慰祖字悅宗清河東武城人也父慶緒永明中為梁州刺史慰祖解褐奉朝請父喪不食鹽母曰汝既無兄弟又未有子胤毀不滅性政當不進肴羞耳如何絶鹽吾今亦不食矣慰祖不得已從之父梁州之資家財千萬散與宗族漆器題為日字日字之器流乎遠近料得父時假貰文疏謂族子紘曰彼有自當見還彼無吾何言哉悉火焚之好學聚書至萬卷鄰里年少好事者來從假借日數十帙慰祖親自取與未嘗為辭為始安王遙光撫軍刑獄兼記室遙光好數召慰祖對戲慰祖輒辭拙非朔望不見也建武中詔舉士從兄慧景舉慰祖及平原劉孝標並碩學帝欲試以百里慰祖辭不就國子祭酒沈約吏部郎謝朓嘗於吏部省中賓友俱集各問慰祖地理中所不悉十餘事慰祖口吃無華辭而酬據精悉一座稱服之朓歎曰假使班馬復生無以過此慰祖賣宅須四十五萬買者云寧有減不答曰誠異韓伯休何容二價買者又曰君但賣四十六萬一萬見與慰祖曰豈是我心乎少與侍中江祀款及祀貴常來候之而慰祖不往也與丹陽丞劉渢素善遙光據東府反慰祖在城內城未潰一日渢謂之曰卿有老母宜出命門者出之慰祖詣闕自首繫尚方病卒慰祖著海岱志起太公迄西晉人物為四十卷半成臨卒與從弟緯書云常欲更注遷固二史採史漢所漏二百餘事在簏可檢寫之以存大意海岱志良未周悉可寫數本付護軍諸從事人一通及友人任昉徐寅劉洋裴揆令後世知吾微有素業也又令以棺親土不須甎勿設靈座祖沖之字文遠范陽遒人也曾祖台之晉侍中祖昌宋大匠卿父朔之奉朝請沖之稽古有機思宋孝武使直華林學省賜宅宇車服解褐南徐州從事公府參軍始元嘉中用何承天所製歷比古十一家為密沖之以為尚疏乃更造新法上表言之孝武令朝士善歷者難之不能屈會帝崩不施行歷位為婁縣令謁者僕射初宋武平關中得姚興指南車有外形而無機杼每行使人於內轉之升明中齊高帝輔政使沖之追修古法沖之改造銅機圓轉不窮而司方如一馬鈞以來未之有也時有北人索馭驎者亦云能造指南車高帝使與沖之各造使於樂遊苑對共校試而頗有差僻乃毀而焚之晉時杜預有巧思造欹器三改不成永明中竟陵王子良好古沖之造欹器獻之與周廟不異文惠太子在東宮見沖之歷法啓武帝施行文惠尋薨又寢轉長水校尉領本職沖之造安邊論欲開屯田廣農殖建武中明帝欲使沖之巡行四方興造大業可以利百姓者會連有軍事事竟不行沖之解鍾律博塞當時獨絶莫能對者以諸葛亮有木牛流馬乃造一器不因風水施機自運不勞人力又造千里船於新亭江試之日行百餘里於樂遊苑造水碓磨武帝親自臨視又特善算永元二年卒年七十二著易老莊義釋論語孝經注九章造綴述數十篇子之之字景爍少傳家業究極精微亦有巧思入神之妙般倕無以過也當其詣微之時雷霆不能入嘗行遇僕射徐勉以頭觸之勉呼乃悟父所改何承天歷時尚未行梁天監初之更修之於是始行焉位至太舟卿之子皓志節慷慨有文武才略少傳家業善算歷大同中為江都令後拜廣陵太守侯景陷臺城皓在城中將見害乃逃歸江西百姓感其遺惠每相蔽匿廣陵人來嶷乃説皓曰逆豎滔天王室如燬正是義夫發憤之秋志士忘軀之日府君荷恩重世又不為賊所容今逃竄草間知者非一危亡之甚纍非喻董紹先雖景之心腹輕而無謀新剋此州人情不附襲而殺之此一壯士之任耳今若糾率義勇立可得三二百人意欲奉戴府君勦除凶逆遠近義徒自當投赴如其剋捷可立桓文之勳必天未悔禍事生理外百代之下猶為梁室忠臣若何皓曰僕所願也死且甘心為要勇士耿光等百餘人襲殺景兗州刺史董紹先推前太子舍人蕭勔為刺史結東魏為援馳檄遠近將討景景大懼即日率侯子鑒等攻之城陷皓見執被縛射之箭遍體然後車裂以徇城中無少長皆埋而射之來嶷字德山幼有奇節兼資文武既與皓義舉邵陵王承制除步兵校尉秦郡太守封永寧縣侯及皓敗並兄弟子姪遇害者十六人子法敏逃免仕陳為海陵令賈希鏡平陽襄陵人也祖弼之晉員外郎父匪之驃騎參軍家傳譜學宋孝武時青州人發古冢銘云青州世子東海女郎帝問學士鮑照徐爰蘇寶生並不能悉希鏡對曰此是司馬越女嫁苟晞兒檢訪果然由是見遇敕希鏡注郭子升明中齊高帝嘉希鏡世學取為驃騎參軍武陵王國郎中令歷大司馬司徒府參軍竟陵王子良使希鏡撰見客譜出為句容令先是譜學未有名家希鏡祖弼之廣集百氏譜記專心習業晉太元中朝廷給弼之令史書吏撰定繕寫藏祕閣及左戶曹希鏡三世傳學凡十八州士族譜合百帙七百餘卷該究精悉皆如貫珠當時莫比永明中衛將軍王儉抄次百家譜與希鏡參懷撰定建武初希鏡遷長水校尉傖人王泰寶買襲琅邪譜尚書令王晏以啓明帝希鏡坐被收當極法子棲長謝罪稽顙流血朝廷哀之免希鏡罪後為北中郎參軍卒撰氏族要狀及人名書並行於時袁峻字孝高陳郡陽夏人魏郎中令渙之八世孫也早孤篤志好學家貧無書每從人假借必皆抄寫自課日五十紙紙數不登則不止訥言語工文辭梁武帝雅好辭賦時獻文章於南闕者相望焉天監六年峻乃擬揚雄官針奏之帝嘉焉賜束帛除員外郎散騎侍郎直文德學士省抄史記漢書各為二十卷又奉敕與陸倕各製新闕銘云劉昭字宣卿平原高唐人晉太尉實九世孫也祖伯龍居父憂以孝聞宋武帝敕皇太子諸王並往弔慰官至少府卿父彪齊征虜晉安王記室昭幼清警通老莊義及長勤學善屬文外兄江淹早相稱賞梁天監中纍遷中軍臨川王記室初昭伯父肜集衆家晉書注干寶晉紀為四十卷至昭集後漢同異以注范曄後漢世稱博悉卒於剡令集注後漢一百三十卷幼童傳一卷文集十卷子縚字言明亦好學通三禮位尚書祠部郎著先聖本記十卷行於世縚弟緩字含度為湘東王中録事性虛遠有氣調風流迭宕名高一府常云不須名位所須衣食不用身後之譽唯重目前知見鍾嶸字仲偉潁川長社人晉侍中雅七世孫也父蹈齊中軍參軍嶸與兄岏弟嶼並好學有思理嶸齊永明中為國子生明周易衛將軍王儉領祭酒頗賞接之建武初為南康王侍郎時齊明帝躬親細務綱目亦密於是郡縣及六署九府常行職事莫不爭自啓聞取決詔敕文武勳舊皆不歸選部於是憑勢互相通進人君之務粗為繁密嶸乃上書言古者明君揆才頒政量能授職三公坐而論道九卿作而成務天子可恭己南面而已書奏上不懌謂太中大夫顧皓曰鍾嶸何人欲斷朕機務卿識之不答曰嶸雖位末名卑而所言或有可採且繁碎職事各有司存今人主總而親之是人主愈勞而人臣愈逸所謂代庖人宰而為大匠斫也上不顧而他言永元末除司徒行參軍梁天監初制度雖革而未能盡改前弊嶸上言曰永元肇亂坐弄天爵勳非即戎官以賄就揮一金而取九列寄片札以招六校騎都塞市郎將填街服既纓組尚為臧獲之事職雖黃散猶躬胥徒之役名實淆紊茲焉莫甚臣愚謂永元諸軍官是素族士人自有清貫而因斯受爵一宜削除以懲澆競若吏姓寒人聽極其門品不當因軍遂濫清級若僑雜傖楚應在綏撫正宜嚴斷祿力絶其妨正直乞虛號而已敕付尚書行之衡陽王元簡出守會稽引為寧朔記室專掌文翰時居士何胤築室若邪山山發洪水漂拔樹石此室獨存元簡令嶸作瑞室頌以旌表之辭甚典麗遷西中郎晉安王記室嶸嘗求譽於沈約約拒之及約卒嶸品古今詩為評言其優劣云觀休文衆製五言最優齊永明中相王愛文王元長等皆宗附約于時謝朓未遒江淹才盡范雲名級又微故稱獨步故當辭密於范意淺於江蓋追宿憾以此報約也頃之卒官岏字長丘位建康令卒著良吏傳十卷嶼字季望永嘉郡丞周興嗣字思纂陳郡項人也世居姑孰博學善屬文嘗步自姑孰投宿逆旅夜有人謂曰子才學邁世初當見識貴臣卒被知英主言終不測所之齊隆昌中侍郎謝朏為吳興太守唯與興嗣初談文史而已及罷郡因大相談薦梁天監初奏休平賦其文甚美武帝嘉之拜安成王國侍郎直華林省其年河南獻舞馬詔興嗣與待詔到沆張率為賦帝以興嗣為工擢拜員外散騎侍郎進直文德壽光省時武帝以三橋舊宅為光宅寺敕興嗣與陸倕各製寺碑及成俱奏帝用興嗣所製自是銅表銘柵塘碣檄魏文次韻王羲之書千字並使興嗣為文每奏帝稱善賜金帛後佐撰國史興嗣兩手先患風疽十二年又染癘疾左目盲帝撫其手嗟曰斯人而有斯疾手疏疽方以賜之任昉又愛其才常曰興嗣若無此疾旬日當至御史中丞十七年為給事中直西省周捨奉敕注武帝所製歷代賦啓興嗣與焉普通二年卒所撰皇帝實録皇德記起居注職儀等百餘卷文集十卷吳均字叔庠吳興故鄣人也家世寒賤至均好學有俊才沈約嘗見均文頗相稱賞梁天監初柳惲為吳興召補主簿日引與賦詩均文體清拔有古氣好事者或斆之謂為吳均體均嘗不得意贈惲詩而去久之復來惲遇之如故弗之憾也薦之臨川靖惠王王稱之於武帝即日召入賦詩悅焉待詔著作纍遷奉朝請先是均將著史以自名欲撰齊書求借齊起居注及羣臣行狀武帝不許遂私撰齊春秋奏之書稱帝為齊明帝佐命帝惡其實録以其書不實使中書舍人劉之遴詰問數十條竟支離無對敕付省焚之坐免職尋有敕召見使撰通史起三皇訖齊代均草本紀世家已畢唯列傳未就卒均注范曄後漢書九十卷著齊春秋三十卷廟記十卷十二州記十六卷錢唐先賢傳五卷續文釋五卷文集二十卷先是有濟陽江洪工屬文為建陽令坐事死劉協字彥和東莞莒人也父尚越騎校尉協早孤篤志好學家貧不婚娶依沙門僧祐居遂博通經論因區別部類録而序之定林寺經藏協所定也梁天監中兼東宮通事舍人時七廟饗薦已用蔬果而二郊農社猶有犧牲協乃表言二郊宜與七廟同改詔付尚書議依協所陳遷步兵校尉兼舍人如故深被昭明太子愛接初協撰文心雕龍五十篇論古今文體其序略云豫齒在逾立嘗夜夢執丹漆之禮器隨仲尼而南行寤而喜曰大哉聖人之難見也乃小子之垂夢歟自生靈以來未有如夫子者也敷讚聖旨莫若注經而馬鄭諸儒弘之已精就有深解未足立家唯文章之用實經典枝條五禮資之以成六典因之致用於是搦筆和墨乃始論文其為文用四十九篇而已既成未為時流所稱協欲取定於沈約無由自達乃負書候約於車前狀若貨鬻者約取讀大重之謂深得文理常陳諸几案協為文長於佛理都下寺塔及名僧碑志必請協製文敕與慧震沙門於定林寺撰經證功畢遂求出家先燔鬚髮自誓敕許之乃變服改名慧地云何思澄字元靜東海郯人也父敬叔齊長城令有能名在縣清廉不受禮遺夏節至忽榜門受餉數日中得米二千餘斛他物稱是悉以代貧人輸租思澄少勤學工文為遊廬山詩沈約見之大相稱賞自以為弗逮約郊居宅新構閣齋因命工書人題此詩於壁傅昭嘗請思澄製釋奠詩辭文典麗天監十五年敕太子詹事徐勉舉學士入華林撰遍略勉舉思澄顧協劉杳王子雲鍾嶼等五人以應選八年乃書成合七百卷思澄重交結分書與諸賓朋校定而終日造謁每宿昔作名一束曉便命駕朝賢無不悉狎狎處即命食有人方之樓護欣然當之投晚還家所齎名必盡自廷尉正遷書侍御史宋齊以來此職甚輕天監初始重其選車前依尚書二丞給三騶執盛印青囊舊事糾彈官印綬在前故也後除安西湘東王録事參軍兼東宮通事舍人時徐勉周捨以才具當朝並好思澄學常遞日招致之後卒於宣惠武陵王中録事參軍文集十五卷初思澄與宗人遜及子朗俱擅文名時人語曰東海三何子朗最多思澄聞之曰此言誤耳如其不然故當歸遜思澄意謂宜在己也子朗字世明早有才思周捨每與談服其精理嘗為敗冢賦擬莊周馬捶其文甚工世人語曰人中爽爽有子朗卒於國山令年二十四集行於世王子雲太原人及江夏費昶並為閭里才子昶善為樂府又作鼓吹曲武帝重之敕曰才意新拔有足嘉異昔郎惲博物卞蘭巧辭束帛之賜實惟勸善可賜絹十匹子雲嘗為自弔文甚美任孝恭字孝恭臨淮人也曾祖農夫宋南豫州刺史農夫弟候伯位輔國將軍行湘州事並任將帥孝恭幼孤事母以孝聞精力勤學家貧無書常崎嶇從人假借每讀一遍諷誦略無所遺外祖丘它與武帝有舊帝聞其有才學召入西省撰史初為奉朝請進直壽光省為司文侍郎俄兼中書通事舍人敕遣製建陵寺剎下銘又啓撰武帝集序文並富麗自是專掌公家筆翰孝恭為文敏速若不留思每奏稱善纍賜金帛少從蕭寺雲法師讀經論明佛理至是蔬食持戒信受甚篤而性頗自伐以才能尚人於流輩中多有忽略世以此少之太清二年侯景寇逼孝恭啓募兵隸蕭正德正德入賊孝恭還赴臺臺門閉侯景獲之使作檄求還私第檢討景許之因走入東府城陷景斬銼之文集行於世顏協字子和琅邪臨沂人晉侍中含七世孫也父見遠博學有志行初齊和帝鎮荊州以為録事參軍及即位兼御史中丞梁武帝受禪見遠不食發憤數日而卒帝聞之曰我自應天從人何豫天下士大夫事而顏見遠乃至於此協幼孤養於舅氏少以器局稱博涉羣書工於草隸飛白時吳人范懷約能隸書協學其書殆過真也荊楚碑碣皆協所書時又有會稽謝善勛能為八體六文方寸千言京兆韋仲善飛白並在湘東王府善勛為録事參軍仲為中兵參軍府中以協優於韋仲而減於善勛善勛飲酒至數斗醉後輒張眼大罵雖復貴賤親疏無所擇也時謂之謝方眼而胸襟夷坦有士君子之操焉協家雖貧素而修飾邊幅非車馬未嘗出遊湘東王出鎮荊州以為記室時吳郡顧協亦在蕃邸與協同名才學相亞府中稱為二協舅陳郡謝暕卒協以有鞠養恩居喪如伯叔禮議者甚重焉又感家門事義不求顯達辭徵辟遊於蕃府而已卒元帝甚歎惜之為懷舊詩以傷之協所撰晉仙傳五篇日月災異圖兩卷行於世其文集二十卷遇火湮滅子之儀之推並早知名紀少瑜字幼瑒丹陽秣陵人也本姓吳養于紀氏因而命族早孤幼有志節常慕王安期之為人年十三能屬文初為京華樂王僧孺見而賞之曰此子才藻新拔方有高名少瑜嘗夢陸倕以一束青鏤管筆授之云我以此筆猶可用卿自擇其善者其文因此遒進年十九始遊太學備探六經博士東海鮑皎雅相欽悅時皎有疾請少瑜代講少瑜既妙玄言善談吐辨捷如流為晉安國中尉即梁簡文也深被恩遇後侍宣城王讀當陽公為郢州以為功曹參軍轉輕車限內記室坐事免大同七年始引為東宮學士邵陵王在郢啓求學士武帝以少瑜充行少瑜美容貌工草書吏部尚書到溉嘗曰此人有大才而無貴仕將拔之會溉去職後除武陵王記室參軍卒杜之偉字子大吳郡錢唐人也家世儒學以三禮專門父規梁奉朝請之偉幼精敏有逸才年十五遍觀文史及儀禮故事時輩稱其早成僕射徐勉嘗見其文重其有筆力中大通元年梁武帝幸同泰寺捨身敕勉撰儀注勉以先無此禮召之偉草具其儀乃啓補東宮學士與學士劉陟等抄撰羣書各為題目所撰富教政道二篇皆之偉為序後兼太學限內博士大同七年梁皇太子釋奠於國學時樂府無孔子顏子登歌詞令之偉製文伶人傳習以為故事再遷安前邵陵王刑獄參軍之偉年位甚卑特以強識俊才頗有名當世吏部尚書張穓深知之以為廊廟之器陳武帝為丞相素聞其名召補記室參軍遷中書侍郎領大著作及受禪除鴻臚卿餘並如故之偉求解著作優敕不許再遷太中大夫仍敕撰梁史卒官文集十七卷顏晃字元明琅邪臨沂人也少孤貧好學有辭采解褐梁邵陵王兼記室參軍時東宮學士庾信使府中王使晃接對信輕其少曰此府兼記室幾人晃曰猶當少於宮中學士當時以為善對侯景之亂奔荊州承聖初除中書侍郎陳天嘉初纍遷員外散騎常侍兼中書舍人掌詔誥卒贈司農卿諡曰貞子晃家世單門傍無戚援而介然修立為當世所知其表奏詔誥下筆立成便得事理有集二十卷岑之敬字思禮南陽棘陽人也父善紆梁世以經學聞官至吳寧令司義郎之敬年五歲讀孝經每燒香正坐親戚咸加歎異十六策春秋左氏制旨孝經義擢為高第御史奏曰皇朝多士例止明經若顏閔之流乃應高第梁武帝省其策曰何妨我復有顏閔邪因召入面試令之敬升講坐敕中書舍人朱索執孝經唱士孝章武帝親自論難之敬剖釋從橫左右莫不嗟服仍除童子奉車郎賞賜優厚十八預重雲殿法會時武帝親行香熟視之敬曰未幾見兮突而辨兮即日除太學限內博士尋為壽光學士司義郎太清元年表請試吏除南沙令承聖二年除晉安王宣惠府中記室參軍時蕭勃據嶺表敕之敬宣旨慰喻會魏剋江陵仍留廣州陳太建初還朝授東宮義省學士纍遷南臺書侍御史征南府咨議參軍之敬始以經業進而博涉文史雅有詞筆不為醇儒性謙謹未嘗以才學矜物接引後進恂恂如也每母忌日營齋必躬自灑掃涕泣終日士君子以篤行稱之十一年卒有集十卷行於世子德潤有父風位中軍吳興王記室何之元廬江灊人也祖僧達齊南臺書侍御史父法勝以行業聞之元幼好學有才思居喪過禮梁天監末司空袁昂表薦之因得召見纍遷信義令其宗人敬容位望隆重頻相顧訪之元終不造焉或問其故之元曰昔楚人得寵於觀起有馬者皆亡夫德薄任隆必近覆敗吾恐不獲其利而招其禍識者以是稱之侯景之亂武陵王以太尉承制授南梁州刺史北巴西太守武陵王自成都舉兵東下之元與蜀中人庶抗表請無行王以為沮衆囚之元于艦中及武陵兵敗之元從邵陵太守劉棻之郡俄而魏剋江陵劉棻卒王琳召為記室參軍及琳立蕭莊署為中書侍郎王琳敗齊主以為揚州別駕所居即壽春也及衆軍北伐湘州刺史始興王叔陵遣功曹史柳咸齎書召之之元始與陳朝有隙書至大惶恐讀書至孔璋無罪左車見用遂隨咸至湘州再遷中衛府咨議參軍及叔陵誅之元乃屏絶人事著梁典起齊永元元年迄于琳遇獲七十五年行事為三十卷陳亡移居常州之晉陵縣隋開皇十三年卒于家徐伯陽字隱忍東海人也父僧權梁東宮通事舍人領祕書以善書知名伯陽敏而好學善色養家有史書所讀者近三千餘卷梁大同中為候官令甚得人和侯景之亂至廣州依蕭勃勃平還都陳天嘉中除司空侯安都府記室參軍太建初與中記室李爽記室張正見左戶郎賀徹學士阮卓黃門郎蕭詮三公郎王由禮處士馬樞記室祖孫登比部郎賀循長史劉刪等為文會友後有蔡凝劉助陳暄孔範亦預焉皆一時士也遊宴賦詩動成卷軸伯陽為其集序盛傳於世後除鎮北新安王府中記室參軍兼南徐州別駕帶東海郡丞鄱陽王為江州刺史伯陽常奉使造焉王率府僚與伯陽登匡嶺置宴酒酣命筆賦劇韻三十伯陽與祖孫登前成王賜以奴婢雜物後除鎮右新安王府咨議參軍事聞姊喪發疾卒張正見字見賾清河東武城人也祖善之魏散騎常侍勃海長樂二郡太守父修禮魏散騎侍郎歸梁仍拜本職遷懷方太守正見幼好學有清才梁簡文在東宮正見年十三獻頌簡文深贊賞之梁元帝即位為彭澤令屬喪亂避地匡俗山陳武帝受禪正見還都纍遷尚書度支郎撰史著士卒有集十四卷其五言尤善阮卓陳留尉氏人也祖詮梁散騎侍郎父問道梁嶽陽王府記室參軍卓幼聰敏篤志經籍尤工五言性至孝父隨嶽陽王出鎮江州卒卓時年十五自都奔赴水漿不入口者纍日載柩還都度彭蠡湖中流遇疾風船幾沒者數四卓仰天悲號俄而風息人以為孝感之至陳天康元年為新安王府記室參軍隨府轉翊右記室帶撰史著士及平歐陽紇交址夷獠往往聚為寇抄卓奉使招慰交址通日南象郡多金翠珠貝珍怪之産前後使者皆致之唯卓挺身而還時論咸伏其廉後為始興王中衛府記室參軍及叔陵誅後主謂朝臣曰阮卓素不同逆宜加旌異至德元年入為德教殿學士尋兼通直散騎常侍副王話聘隋隋文帝夙聞其名遣河東薛道衡琅邪顏之推等與卓談宴賦詩賜遺加禮還除南海王府咨議參軍以目疾不之官退居里舍改構亭宇修山池卉木招致賓友以文酒自娛陳亡入隋行至江州追感其父所終遘疾卒論曰文章者蓋情性之風標神明之律呂也蘊思含豪遊心內運放言落紙氣韻天成莫不稟以生靈遷乎愛嗜機見殊門賞悟紛雜感召無象變化不窮發五聲之音響而出言異句寫萬物之情狀而下筆殊形暢自心靈而宣之簡素輪扁之言未或能盡然縱假之天性終資好習是以古之賢哲咸所用心至若丘靈鞠等或克荷門業或夙懷慕尚雖位有窮通而名不可滅然則立身之道可無務乎
