body:
  text: 南史卷十一列傳第一后妃上宋孝穆趙皇后孝懿蕭皇后武敬臧皇后武張夫人文章胡太后少帝司馬皇后文元袁皇后潘淑妃孝武昭路太后明宣沈太后孝武文穆王皇后宣貴妃前廢帝何皇后明恭王皇后後廢帝陳太妃後廢帝江皇后順陳太妃順謝皇后齊宣孝陳皇后高昭劉皇后武穆裴皇后文安王皇后鬱林王何妃海陵王王妃明敬劉皇后東昏褚皇后和王皇后六宮位號前史代有不同晉武帝采漢魏之制置貴嬪夫人貴人是為三夫人位視三公淑妃淑媛淑儀修華修容修儀婕妤容華充華是為九嬪位視九卿其餘有美人才人中才人爵視千石以下宋武帝省二才人其餘仍用晉制案貴嬪魏文帝所制夫人魏武初建魏國所制貴人漢光武所制淑妃魏明帝所制淑媛魏文帝所制淑儀修華晉武帝所制修容魏文帝所制修儀魏明帝所制婕妤容華前漢舊號充華晉武帝所制美人漢光武所制及孝武孝建三年省夫人置貴妃位比相國進貴嬪比丞相貴人比三司以為三夫人又置昭儀昭容昭華以代修華修儀修容又置中才人充衣以為散位案昭儀漢元帝所制昭容孝武所制昭華魏明帝所制中才人晉武帝所制充衣前漢舊制及明帝泰始二年省淑妃昭華中才人充衣復置修華修儀修容才人良人三年又省貴人置貴姬以備三夫人之數又置昭華增淑容承徽列榮以淑媛淑儀淑容昭華昭儀昭容修華修儀修容為九嬪婕妤容華充華承徽列榮凡五職亞九嬪美人才人良人三職為散役其後帝留心後房擬百官備置內職焉及齊高帝建元元年有司奏置貴嬪夫人貴人為三夫人修華修儀修容淑妃淑媛淑儀婕妤容華充華為九嬪美人中才人才人為散職三年太子宮置三內職良娣比開國侯保林比五等侯才人比駙馬都尉及永明元年有司奏貴妃淑妃並加金章紫綬佩于置玉淑妃舊擬九棘以淑為溫恭之稱妃為亞后之名進同貴妃以比三司夫人之號不殊蕃國降淑媛以比九卿七年復置昭容位在九嬪焉梁武撥亂反正深鑒奢逸配德早終長秋曠位定令制貴妃貴嬪貴姬為三夫人淑媛淑儀淑容昭華昭儀昭容修華修儀修容為九嬪婕妤容華充華承徽列榮為五職美人才人良人為三職東宮置良娣保林為二職及簡文元帝出自儲蕃或迫在拘縶或逼於寇亂且妃並先殂更不建椒閫陳武光膺天歷以朴素自居故後宮員位其數多闕文帝天嘉之後詔宮職備員其所制立無改梁舊編之令文以為後法然帝性恭儉而嬪嬙不備宣帝後主無所改作今總綴緝以立此篇云宋孝穆趙皇后諱安宗下邳僮人也父裔平原太守后以晉穆帝升平四年嬪于孝皇帝以産武帝殂于丹徒官舍葬晉陵丹徒縣東鄉練壁里雩山宋初追崇號諡陵曰興寧永初二年有司奏追贈裔光祿大夫加金章紫綬裔命婦孫氏封豫章郡建昌縣君其年又追封裔臨賀縣侯裔子倫之自有傳孝懿蕭皇后諱文壽蘭陵人也父卓字子略洮陽令后為孝皇帝繼室生長沙景王道憐臨川烈武王道規義熙七年拜豫章公太夫人武帝為宋公宋王又加太妃太后之號帝踐阼尊曰皇太后居宣訓宮上以恭孝為行奉太后素謹及即大位春秋已高每旦朝太后未嘗失時刻少帝即位加崇曰太皇太后景平元年崩于顯陽殿年八十一遺令漢世帝后陵皆異處今可於塋域之內別為一壙一遵往式乃開別壙與興寧合墳初武帝微時貧約過甚孝皇之殂葬禮多闕帝遺旨太后百歲後不須祔葬至是故稱后遺令云卓初與趙裔俱贈金紫光祿大夫又追封封陽縣侯妻下邳趙氏封吳郡壽昌縣君卓子源之襲爵源之見子思話傳武敬臧皇后諱愛親東莞人也祖汪尚書郎父俊郡功曹后適武帝生會稽宣長公主興弟帝以儉正率下后恭謹不違義熙四年正月甲子殂於東城追贈豫章公夫人還葬丹徒帝臨崩遺詔留葬建鄴於是備法駕迎梓宮祔葬初寧陵宋初追贈俊金紫光祿大夫妻高密叔孫氏遷陵永平鄉君俊子燾熹並自有傳武帝張夫人諱闕不知何許人也生少帝及義興恭長公主惠媛永初元年拜夫人少帝即位有司奏上尊號為皇太后宮曰永樂少帝廢太后還璽紱隨居吳郡文帝元嘉元年拜營陽國太妃二年薨文章胡太后諱道安淮南人也義熙初武帝所納文帝生五年被譴賜死葬丹徒武帝踐阼追贈婕妤文帝即位有司奏上尊號曰章皇太后陵曰熙寧立廟建鄴少帝司馬皇后諱茂英晉恭帝女也初封海鹽公主少帝以公子尚焉宋初拜皇太子妃少帝即位為皇后元嘉元年降為營陽王妃又為南豐王太妃十六年薨文元袁皇后諱齊媯陳郡陽夏人左光祿大夫湛之庶女也母本卑賤后年至六歲方見舉後適文帝初拜宜都王妃生子劭東陽獻公主英娥上待后恩禮甚篤袁氏貧薄后每就上求錢帛以贍之上性儉所得不過五三萬五三十匹後潘淑妃有寵愛傾後宮咸言所求無不得后聞之未知信否乃因潘求三十萬錢與家以觀上意宿昔便得因此恚恨稱疾不復見上遂憤恚成疾元嘉十七年疾篤上執手流涕問所欲言后視上良久乃引被覆面崩于顯陽殿上甚悼痛之詔前永嘉太守顏延之為哀策文甚麗及奏上自益撫存悼亡感今懷昔八字以致意焉有司奏諡宣皇后詔諡曰元初后生劭自詳視之使馳白帝此兒形貌異常必破國亡家不可舉便欲殺之文帝狼狽至后殿戶外手掇幔禁之乃止后亡後常有小小靈應明帝所生沈美人嘗以非罪見責應賜死從后昔所住徽音殿前度此殿有五間自后崩後常閉美人至殿前流涕大言曰今日無罪就死先后若有靈當知之殿戶應聲豁然開職掌者遽白文帝驚往視之美人乃得釋大明五年孝武乃詔追后之所生外祖親王夫人為豫章郡新淦平樂鄉君又詔趙蕭臧光祿袁敬公平樂鄉君墓先未給塋戶各給蠻戶三以供灑掃后公湛之自有傳潘淑妃者本以貌進始未見賞帝好乘羊車經諸房淑妃每莊飾褰帷以候並密令左右以鹹水灑地帝每至戶羊輒舐地不去帝曰羊乃為汝徘徊況於人乎於此愛傾後宮孝武昭路太后諱惠男丹陽建康人也以色貌選入後宮生孝武帝拜為淑媛及年長無寵常隨孝武出蕃孝武即位有司奏奉尊號曰太后宮曰崇憲太后居顯陽殿上於閨房之內禮敬甚寡有所御幸或留止太后房內故人間咸有醜聲宮掖事祕亦莫能辨也孝建二年追贈太后父興之散騎常侍興之妻餘杭縣廣昌鄉君大明四年太后弟子撫軍參軍瓊之上表自陳有司承旨奏贈瓊之父道慶給事中瓊之及弟休之茂之並居顯職太后頗豫政事賜與瓊之等財物家纍千金居處器服與帝子相侔大明五年太后隨上巡南豫州妃主以下並從廢帝立號太皇太后明帝踐阼號崇憲太后初明帝少失所生為太后所攝養撫愛甚篤及即位供奉禮儀不異舊日有司奏宜別居外宮詔欲親奉晨昏盡歡閨禁不如所奏及聞義嘉難作太后心幸之延上飲酒置毒以進侍者引上衣上寤起以其巵上壽是日太后崩祕之喪事如禮遷殯東宮題曰崇憲宮又詔述太后恩慈特齊衰三月以申追遠諡曰昭皇太后葬孝武陵東南號曰修寧陵先是晉安王子勛未平巫者謂宜開昭太后陵毀去梓宮以厭勝修復倉卒不得如禮上性忌慮將來致災泰始四年夏詔有司曰崇憲昭太后修寧陵地大明之世久所考卜前歲遭諸蕃之難禮從權宜未暇營改而塋隧之所山原卑陋可式遵舊典以禮改創有司奏請修寧陵玄宮補葺毀壞權施油殿暫出梓宮事畢即窆詔可廢帝景和中又追贈興之侍中金紫光祿大夫諡曰孝侯道慶光祿大夫府儀同三司諡曰敬侯道慶女為皇后以休之為侍中明宣沈太后諱容姬不知何許人也為文帝美人生明帝拜婕妤元嘉三十年卒葬建康之莫府山孝武即位追贈湘東國太妃明帝即位有司奏上尊號為皇太后諡曰宣陵號崇寧孝武文穆王皇后諱憲嫄琅邪臨沂人也元嘉二十年拜武陵王妃生廢帝豫章王子尚山陰公主楚玉臨淮康哀公主楚佩皇女楚琇康樂公主修明孝武在蕃后甚寵異及即位為皇后焉大明四年后率六宮躬桑于西郊皇太后觀禮妃主以下並加班錫廢帝即位尊曰皇太后宮曰永訓其年崩于含章殿祔葬景寧陵父偃別有傳殷淑儀南郡王義宣女也麗色巧笑義宣敗後帝密取之寵冠後宮假姓殷氏左右宣泄者多死故當時莫知所出及薨帝常思見之遂為通替棺欲見輒引替覩尸如此積日形色不異追贈貴妃諡曰宣及葬給轀輬車虎賁班劍鑾輅九旒黃屋左纛前後部羽葆鼓吹上自於南掖門臨過喪車悲不自勝左右莫不掩泣上痛愛不已精神罔罔頗廢政事每寢先於靈牀酌奠酒飲之既而慟哭不能自反又諷有司奏曰據春秋仲子非魯惠公元嫡尚得考別宮今貴妃蓋天秩之崇班理應創新乃立別廟於都下時有巫者能見鬼說帝言貴妃可致帝大喜令召之有少頃果於帷中見形如平生帝欲與之言默然不對將執手奄然便歇帝尤哽恨於是擬李夫人賦以寄意焉謝莊作哀策文奏之帝臥覽讀起坐流涕曰不謂當今復有此才都下傳寫紙墨為之貴或云貴妃是殷琰家人入義宣家義宣敗入宮云前廢帝何皇后諱令婉廬江灊人也孝建三年納為皇太子妃大明五年薨于東宮徽光殿諡曰獻妃廢帝即位追崇曰獻皇后明帝踐阼遷后與廢帝合葬龍山北后父瑀字幼玉晉尚書左僕射澄曾孫也瑀尚武帝少女豫章康長公主諱次男公主先適徐喬美容色聰敏有智數文帝世禮待特隆瑀豪競於時與平昌孟靈休東海何勗等並以輿馬相尚公主與瑀情愛隆密何氏疏戚莫不霑被恩禮瑀位右衛將軍公主薨瑀墓開孝武追贈瑀金紫光祿大夫子邁尚文帝第十女新蔡公主諱英媚邁少以貴戚居顯官好犬馬馳逐多聚才力士位南濟陰太守廢帝納公主於後宮僞言薨殞殺一婢送出邁第殯葬行喪禮常疑邁有異圖邁亦招聚同志欲因行廢立事覺見誅明帝即位追封建寧縣侯瑀兄子衍性躁動位黃門郎拜竟求司徒司馬得司馬復求太子右率拜一二日復求侍中旬日之間求進無已不得侍中以怨詈賜死明恭王皇后諱貞風琅邪臨沂人也初拜淮陽王妃明帝改封又為湘東王妃生晉陵長公主伯姒建安長公主伯媛明帝即位立為皇后上嘗宮內大集而裸婦人觀之以為歡笑后以扇鄣面獨無所言帝怒曰外舍家寒乞今共作笑樂何獨不視后曰為樂之事其方自多豈有姑姊妹集聚而裸婦人形體以此為樂外舍為歡適與此不同帝大怒令后起后兄揚州刺史景文以此事語從舅陳郡謝綽曰后在家為儜弱婦人不知今段遂能剛正如此廢帝即位尊為皇太后宮曰弘訓廢帝失德太后每加勗譬始猶見順後狂慝稍甚太后嘗賜帝玉柄毛扇帝嫌毛扇不華因此欲加鴆害令太醫煮藥左右止之曰若行此事官便作孝子豈得出入狡獪帝曰汝語大有理乃止順帝即位齊高帝執權宗室劉晃劉綽卜伯興等有異志太后頗與相關順帝禪位太后與帝遜于東邸因遷居丹陽宮拜汝陰王太妃順帝殂于丹陽更立第都下建元元年薨于第追加諡葬以宋禮后父僧朗別有傳後廢帝陳太妃諱妙登丹陽建康屠家女也孝武嘗使尉司采訪人間子女有姿色者太妃家在建康縣居有草屋兩三間上出行問尉曰御道那得此草屋當由家貧賜錢三萬令起瓦屋尉自送錢與之家人並行唯太妃在家時年十二三尉見其美即以白孝武於是迎入宮在路太后房內經二年再呼不見幸太后因言於上以賜明帝始有寵一年衰歇以賜李道兒尋又迎還生廢帝先是人間言明帝不男故皆呼廢帝為李氏子廢帝後每微行自稱李將軍或自謂李統明帝即位拜貴妃秩同皇太子廢帝踐阼有司奏上尊號曰皇太妃輿服一如晉孝武李太妃故事宮曰弘化置家令一人改諸國太妃曰太姬升明初降為蒼梧王太妃後廢帝江皇后諱簡圭濟陽考城人也泰始五年明帝訪太子妃而雅信小數名家女多不合江氏雖為華族而后父祖並已亡弟又弱小以卜筮吉故為太子納之六年拜皇太子妃諷朝士州郡皆令獻物多者將直百金始興太守孫奉伯止獻琴書其外無餘物上大怒封藥賜死既而原之太子即帝位立為皇后帝既廢降后為蒼梧王妃祖智深自有傳順陳太妃諱法容丹陽建康人也明帝素肥晚年廢疾不能內御諸弟姬人有懷孕者輒取以入宮及生男皆殺其母而與六宮所愛者養之順帝桂陽王休範子也以陳昭華為母明帝崩昭華拜安成王太妃順帝即位進為皇太妃順帝禪位去皇存太妃之號順謝皇后諱梵境陳郡陽夏人右光祿大夫莊之孫也父揚車騎功曹升明二年立為皇后順帝禪位降為汝陰王妃祖莊自有傳齊宣孝陳皇后諱道止臨淮東陽人魏司徒矯之後也后家貧少勤織作家人矜其勞或止之后終不改嫁于宣帝宣帝庶生子衡陽元王道度始安貞王道生后生高帝高帝年二歲乳人乏乳后夢人以兩甌麻粥與之覺而乳驚因此豐足宣帝從任在外后常留家有相者謂后曰夫人有貴子而不見之后歎曰我三子誰當應之呼高帝小字曰政應是汝耳宣帝殂後后親執勤婢使有過皆恕而不問高帝雖從宦而家業本貧為建康令時明帝等冬月猶無縑纊而奉膳甚厚后每撤去兼肉曰於我過足矣殂于縣舍升明二年追贈竟陵公國太夫人齊國建為齊國太妃並蜜印畫青綬祠以太牢建元元年追尊孝皇后贈外祖父肇之金紫光祿大夫諡敬侯后母胡氏為永昌縣靖君永明九年詔太廟四時祭宣皇帝薦起麵餅鴨羊競孝皇后薦笋鴨卵脯醬炙白肉高皇帝薦肉膾葅羹昭皇后薦茗粣炙魚並生平所嗜也高昭劉皇后諱智容廣陵人也祖玄之父壽之並員外郎后母桓氏夢吞玉勝生后時有紫光滿室以告壽之壽之曰恨非是男桓笑曰雖女亦足興家矣后寢臥見有羽蓋蔭其上家人試察之常見其上掩藹如有雲氣年十七裴方明為子求婚酬許已定后夢見先有迎車至猶如常家迎法后不肯去次有迎至龍旗豹尾有異於常后喜而從之既而與裴氏不成婚竟嬪于上嚴整有軌度造次必依禮法生太子及豫章王嶷太子初在孕后嘗歸寧遇家奉祠爾日陰晦失曉舉家狼狽共營祭食后助炒胡麻始復內薪未及索火火便自然宋泰豫元年殂歸葬宣帝墓側則泰安陵也門生王清與墓工始下鍤有白兔跳起尋之不得及墳成兔還栖其上升明二年贈竟陵公國夫人三年贈齊國妃印綬齊建元元年尊諡昭皇后二年贈后父壽之金紫光祿大夫母桓氏上虞都鄉君武穆裴皇后諱惠昭河東聞喜人也祖封之給事中父璣之左軍參軍后少與豫章王妃庾氏為娣姒庾氏勤女工奉事高昭后恭謹不倦后不能及故不為舅姑所重武帝亦薄焉性剛嚴竟陵王子良妃袁氏布衣時有過后加訓罰升明三年為齊世子妃建元元年為皇太子妃二年后薨諡穆妃葬休安陵時議欲立石志王儉曰石志不出禮典起宋元嘉中顏延之為王球石志素族無銘策故以紀行自爾以來共相祖習儲妃之重禮絶例既有哀策不煩石志從之武帝即位追尊皇后贈父璣之金紫光祿大夫后母檀氏餘杭廣昌鄉元君舊顯陽昭陽二殿太后皇后所居也永明中無太后皇后羊貴嬪居昭陽殿西范貴妃居昭陽殿東寵姬荀昭華居鳳華柏殿宮內御所居壽昌畫殿南閣置白鷺鼓吹二部乾光殿東西頭置鍾磬兩廂皆宴樂處也上數游幸諸苑囿載宮人從後車宮內深隱不聞端門鼓漏聲置鍾於景陽樓上應五鼓及三鼓宮人聞鍾聲早起莊飾車駕數幸琅邪城宮人常從早發至湖北埭雞始鳴故呼為雞鳴埭婦人吳郡韓蘭英有文辭宋孝武時獻中興賦被賞入宮宋明帝時用為宮中職僚及武帝以為博士教六宮書學以其年老多識呼為韓公云文安王皇后諱寶明琅邪臨沂人也祖韶之吳興太守父曄之太宰祭酒宋世高帝為文惠太子納后建元元年為南郡王妃四年為皇太子妃無寵太子為宮人製新麗衣裳及首飾而后牀帷陳故古舊叉鑷十餘枚永明十一年為皇太孫太妃鬱林即位尊為皇太后稱宣德宮置男左右三十人前代所未有也贈后父曄之金紫光祿大夫母桓氏豐安縣君其年十二月備法駕謁太廟明帝即位出居鄱陽王故第為宣德宮永元三年梁武帝定建鄴迎入宮后稱制至禪位遜居外宮梁天監十一年薨葬崇安陵諡曰安后祖韶之自有傳鬱林王何妃諱婧英廬江灊人撫軍將軍戢女也初將納為南郡王妃文惠太子嫌戢無男門孤不欲與昏王儉以南郡王妃便為將來外戚唯須高胄不須強門今何氏蔭華族弱實允外戚之義永明三年乃成昏妃禀性淫亂南郡王所與無賴人游妃擇其美者皆與交歡南郡王侍書人馬澄年少色美甚為妃悅常與鬬腕較力南郡王以為歡笑澄者本剡縣寒人嘗於南岸逼略人家女為秣陵縣所録南郡王語縣散遣之澄又逼求姨女為妾姨不與澄詣建康令沈徽孚訟之徽孚曰姨女可為婦不可為妾澄曰僕父為給事中門戶既成姨家猶是寒賤政可為妾耳徽孚訶而遣之十一年為皇太孫妃又有女巫子楊珉之亦有美貌妃尤愛悅之與同寢處如伉儷及太孫即帝位為皇后封后嫡母劉為高昌縣都鄉君所生母宋為餘杭廣昌鄉君后將拜鏡在牀無因墮地其冬與太后同日謁太廟楊珉之為帝所幸常居中侍明帝為輔與王晏徐孝嗣王廣之並面請不聽又令蕭諶坦之固請皇后與帝同席坐流涕覆面謂坦之曰楊郎好年少無罪過何可枉殺坦之耳語於帝曰此事別有一意不可令人聞帝謂皇后為阿奴曰阿奴暫去坦之乃曰外間並云楊珉之與皇后有異情彰聞遐邇帝不得已乃為敕坦之馳報明帝即令建康行刑而果有敕原之而珉之已死后既淫亂又與帝相愛褻故帝恣之又迎后親戚入宮嘗賜人百數十萬以武帝曜靈殿處后家屬帝廢后貶為王妃父戢自有傳海陵王王妃諱韶明琅邪臨沂人太常慈之女也永明八年納為臨汝公夫人鬱林王即位為新安王妃延興元年為皇后其年降為海陵王妃妃父慈自有傳明敬劉皇后諱惠端彭城人光祿大夫道弘孫也高帝為明帝納之建元三年除西昌侯夫人永明七年卒葬江乘縣張山延興元年贈宣城王妃明帝即位追尊敬皇后贈父通直郎景猷為金紫光祿大夫母王氏平陽鄉君明帝崩改葬祔于興安陵東昏褚皇后諱令璩河南陽翟人太常澄之女也建武二年納為皇太子妃而無寵帝謂左右曰若得如山陰主無恨矣山陰主明帝長女也後遂與之為亂明年妃謁敬后廟東昏即位為皇后帝寵潘妃后不被遇黃淑儀生太子誦而卒東昏廢后及誦並為庶人后父澄自有傳和王皇后諱蕣華琅邪臨沂人太尉儉之孫也初為隨王妃中興元年為皇后帝禪位后降為妃妃祖儉自有傳
