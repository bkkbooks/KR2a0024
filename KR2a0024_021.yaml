body:
  text: 南史卷二十一列傳第十一王弘子錫錫弟僧達曾孫融弘弟子微微兄遠遠子僧祐僧祐子籍弘從孫瞻弘玄孫沖沖子瑒瑜王弘字休元琅邪臨沂人也曾祖導晉丞相祖洽中領軍父珣司徒弘少好學以清悟知名弱冠為會稽王道子驃騎主簿珣頗好積聚財物布在人間及薨弘悉燔券書一不收責其餘舊業悉委諸弟時內外多難在喪者皆不得終其哀唯弘徵召一無所就桓玄剋建業收道子付廷尉臣吏莫敢瞻送弘時尚居喪獨道側拜辭攀車涕泣論者稱焉宋武帝召補鎮軍咨議參軍以功封華容縣五等侯纍遷太尉左長史從北征前鋒已平洛陽而未遣九錫弘銜使還都諷朝廷時劉穆之掌留任而旨乃從北來穆之愧懼發病遂卒宋國建為尚書僕射掌選領彭城太守奏彈世子左衛率謝靈運為軍人桂興淫其嬖妾靈運殺興棄尸洪流御史中丞王准之曾不彈舉武帝答曰端右肅正風軌誠副所期自今以為永制於是免靈運官後遷江州刺史省賦簡役百姓安之永初元年以佐命功封華容縣公三年入朝進號衛將軍開府儀同三司帝因宴集曰我布衣始望不至此傅亮之徒並撰辭欲盛稱功德弘率爾對曰此所謂天命求之不可得推之不可去時稱其簡舉少帝景平二年徐羡之等謀廢立召弘入朝文帝即位以定策安社稷進位司空封建安郡公固辭見許進號車騎大將軍開府刺史如故徐羡之等以廢弒罪將及誅弘以非首謀且弟曇首又為上所親委事將發密使報弘羡之既誅遷侍中司徒揚州刺史録尚書事給班劍三十人上西征謝晦與彭城王義康居守入住中書下省引隊仗出入司徒府權置參軍元嘉五年春大旱弘引咎遜位先是彭城王義康為荊州剌史鎮江陵平陸令河南成粲與弘書誡以盈滿兼陳彭城王宜入知朝政竟陵衡陽宜出據列藩弘由是固自陳請乃降為衛將軍開府儀同三司六年弘又上表陳彭城王宜入輔并求解州義康由是代弘為司徒與之分録弘又辭分録弘博練政體留心庶事斟酌時宜每存優允與八座丞郎疏曰同伍犯法無人士不罪之科然每至詰謫輒有請訴若常垂恩宥則法廢不行依事糾責則物以為苦恐宜更為其制時議多不同弘以為謂之人士便無庶人之坐署為庶人輒受人士之罰不其頗歟謂人士可不受同伍之謫取罪其奴客庸何傷邪無奴客可令輸贖有修身閭閻與羣小實隔又或無奴僮為衆所明者官長二千石便親臨列上依事遣判又主守偷五匹常偷四十匹並加大辟議者咸以為重弘以為小吏無知臨財易昧或由疏慢事蹈重科宜進主守偷十匹常偷五十匹死四十匹降以補兵至於官長以上荷蒙榮祿冒利五匹乃已為弘士人至此何容復加哀矜且此輩人士可殺不可謫謂宜奏聞決之聖旨文帝從弘議弘又上言舊制人年十三半役十六全役今四方無事應存消息請以十五至十六為半丁十七為全丁從之及弟曇首亡文帝嗟悼不已見弘流涕歔欷弘斂容而已既而彭城王義康言於帝曰曇首既為家寶又為國器弘情不稱何也帝曰賢者意不可度其見體亮如此九年進位太保領中書監餘如故其年薨贈太保中書監給節加羽葆鼓吹增班劍為六十人諡曰文昭公配食武帝廟庭弘既人望所宗造次必存禮法凡動止施為及書翰儀體後人皆依放之謂為王太保家法雖歷藩輔而不營財利薨亡之後家無餘業而輕率少威儀客有疑其諱者弘曰家諱與蘇子高同性褊隘人有忤意輒加詈辱少嘗摴蒱公城子野舍及後當權有人就弘求縣此人嘗以蒱戲得罪弘詰之曰君得錢會戲何用祿為答曰不審公城子野何所在弘默然自領選及當朝總録將加榮爵於人者每先呵責譴辱之然後施行若美相盼接語欣歡者必無所諧人問其故答曰王爵既加於人又相撫勞便成與主分功此所謂姦以事君者也若求者絶官之分既無以為惠又不微借顏色即大成怨府亦鄙薄所不任問者悅伏子錫嗣錫字寡光位太子左衛率江夏內史高自位遇太尉江夏王義恭當朝錫箕踞大坐殆無推敬卒子僧亮嗣齊受禪降爵為侯僧亮弟僧衍位侍中弘少子僧達僧達幼聰敏弘為揚州時僧達六七歲遇有通訟者竊覽其辭謂為有理及大訟者亦進弘意其小留左右僧達為申理暗誦不失一句兄錫質訥乏風采文帝聞僧達早慧召見德陽殿應對間敏上甚知之妻以臨川王義慶女少好學善屬文為太子舍人坐屬疾而於揚列橋觀鬬鴨為有司所糾原不問性好鷹犬與閭里少年相馳逐又躬自屠牛義慶聞之令周旋沙門慧觀造而觀之僧達陳書滿席與論文義慧觀酬答不暇深相稱美訴家貧求郡文帝欲以為秦郡吏部郎庾仲文曰王弘子既不宜作秦郡僧達亦不堪蒞人乃止遷太子洗馬母憂去職與兄錫不協錫罷臨海郡還送故及奉祿百萬以上僧達一夕令奴輦取無餘服闋為宣城太守性好游獵而山郡無事僧達肆意馳騁或五日三日方歸受辭辨訟多在獵所人或逢不識問府君所在僧達且曰在近其後徙義興及元凶弒立孝武發尋陽沈慶之謂人曰王僧達必來赴義人問其所以慶之曰虜馬飲江王出赴難見其在先帝前議論開張執意明決以此言之其必至也僧達尋至孝武即以為長史及即位為尚書右僕射僧達自負才地一二年間便望宰相嘗答詔曰亡父亡祖司徒司空其自負若此後為護軍將軍不得志乃求徐州上不許固陳乃以為吳郡太守時朞歲五遷彌不得意吳郭西臺寺多富沙門僧達求須不稱意乃遣主簿顧曠率門義劫寺內沙門竺法瑤得數百萬荊江反叛加僧達置佐領兵臺符聽置千人而輒立三十隊隊八十人立宅於吳多役功力坐免官後孝武獨召見然了不陳遜唯張目而視及出帝歎曰王僧達非狂如何乃戴面向天子後顏師伯詣之僧達慨然曰大丈夫寧當玉碎安可以沒沒求活師伯不答逡巡便退初僧達為太子洗馬在東宮愛念軍人朱靈寶及出為宣城靈寶已長僧達詐列死亡寄宣城左永之籍注以為子改名元序啓文帝以為武陵國典衛令又以補竟陵國典書令建平國中軍將軍孝建元年事發又加禁錮表謝言不能因依左右傾意權貴上愈怒僧達族子確少美姿容僧達與之私款確叔父休為永嘉太守當將確之郡僧達欲逼留之確知其意避不往僧達潛於所住屋後作大坑欲誘確來別殺埋之從弟僧虔知其謀禁呵乃止御史中丞劉瑀奏請收案上不許二年除太常意尤不悅頃之上表解職文旨抑揚侍中何偃以其言不遜啓付南臺又坐免官先是何尚之致仕復膺朝命於宅設八關齊大集朝士自行香次至僧達曰願郎且放鷹犬勿復游獵僧達答曰家養一老狗放無處去已復還尚之失色大明中以歸順功封寧陵縣五等侯纍遷中書令黃門郎路瓊之太后兄慶之孫也宅與僧達門並嘗盛車服詣僧達僧達將獵已改服瓊之就坐僧達了不與語謂曰身昔門下騶人路慶之者是君何親遂焚瓊之所坐牀太后怒泣涕於帝曰我尚在而人陵之我死後乞食矣帝曰瓊之年少無事詣王僧達門見辱乃其宜耳僧達貴公子豈可以此加罪乎太后又謂帝曰我終不與王僧達俱生先是南彭城蕃縣人高闍沙門釋曇標道方等共相誑惑自言有鬼神龍鳳之瑞常聞簫鼓音與秣陵人藍宏期等謀為亂又結殿中將軍苗乞食等起兵攻宮門事發凡黨與死者數十人僧達屢經犯忤上以為終無悛心因高闍事陷之收付廷尉於獄賜死時年三十六帝亦以為恨謂江夏王義恭曰王僧達遂不免死追思太保餘烈使人慨然於是詔太保華容文昭公門爵國姻一不貶絶時有蘇寶者名寶生本寒門有文義之美官至南臺侍御史江寧令坐知高闍謀反不即聞啓亦伏誅僧達子道琰徙新安元徽中為廬陵內史未至郡卒子融融字元長少而神明警慧母臨川太守謝惠宣女性敦敏教融書學博涉有文才從叔儉謂人曰此兒至四十名位自然及祖舉秀才纍遷太子舍人以父宦不通弱年便欲紹興家業啓齊武帝求自試遷祕書丞從叔儉初有儀同之授贈儉詩及書儉甚奇之笑謂人曰穰侯印詎便可解歷丹陽丞中書郎永明末武帝欲北侵使毛惠秀畫漢武北伐圖融因此上疏開張北侵之議圖成上置琅邪城射堂壁上游幸輒觀焉九年芳林園禊宴使融為曲水詩序當時稱之上以融才辨使兼主客接魏使房景高宋辨辨見融年少問主客年幾融曰五十之年久踰其半景高又云在北聞主客曲水詩序勝延年實願一見融乃示之後日宋辨於瑤池堂謂融曰昔觀相如封禪以知漢武之德今覽王生詩序用見齊主之盛融曰皇家盛明豈直比蹤漢武更慚鄙製無以遠匹相如上以魏所送馬不稱使融問之曰秦西冀北實多駿驥而魏之良馬乃駑不若將旦旦信誓有時而爽駉駉之牧遂不能嗣宋辨曰當是不習地土融曰周穆馬迹遍於天下若騏騮之性因地而遷則造父之策有時而躓辨曰王主客何為勤勤於千里融曰卿國既異其優劣聊復相訪若千里斯至聖上當駕鼓車辨曰向意既須必不能駕鼓車也融曰買死馬之骨亦以郭隗之故辨不能答融躁於名利自恃人地三十內望為公輔初為司徒法曹詣王僧祐因遇沈昭略未相識昭略屢顧盼謂主人曰是何年少融殊不平謂曰僕出於扶桑入於湯谷照耀天下誰云不知而卿此問昭略云不知許事且食蛤蜊融曰物以羣分方以類聚君長東隅居然應嗜此族其高自標置如此及為中書郎嘗撫案歎曰為爾寂寂鄧禹笑人行遇朱雀桁開路人填塞乃捶車壁曰車中乃可無七尺車前豈可乏八騶及魏軍動竟陵王子良於東府募人板融寧朔將軍軍主融文辭捷速有所造作援筆可待子良特相友好晚節大習騎馬招集江西傖楚數百人並有幹用融特為謀主武帝病篤暫絶子良在殿內太孫未入融戎服絳衫於中書省閣口斷東宮仗不得進欲矯詔立子良詔草已立上重蘇朝事委西昌侯鸞梁武謂范雲曰左手據天下圖右手刎其喉愚夫不為主上大漸國家自有故事道路籍籍將有非常之舉卿聞之乎雲不敢答俄而帝崩融乃處分以子良兵禁諸門西昌侯聞急馳到雲龍門不得進乃曰有敕召我仍排而入奉太孫登殿命左右扶出子良指麾音響如鍾殿內無不從命融知不遂乃釋服還省歎曰公誤我鬱林深怨融即位十餘日收下廷尉獄使中丞孔圭倚為奏曰融姿性剛險立身浮競動迹驚羣抗言異類近塞外微塵苦求將領遂招納不逞扇誘荒傖狡弄威聲專行權利反覆唇齒之間傾動頰舌之內威福自己無所忌憚誹謗朝政歷毀王公謂己才流無所推下事暴遠近使融依源據答融辭曰囚實頑蔽觸行多愆但夙忝門素得奉教君子爰自總髮迄將立年州閭鄉黨見許愚過蒙大行皇帝奬育之恩又荷文皇帝識擢之重司徒公賜預士林安陸王曲垂盼接前後陳伐虜之計亦仰簡先朝今段犬羊乍擾令囚草撰符詔及司徒宣敕招募同例非一實以戎事不小不敢承教續蒙軍號賜使招集銜敕而行非敢虛扇且張弄威聲應有形迹專行權利又無贓賄反覆唇齒之間未審悉與誰言傾動頰舌之內不容都無主此自上甘露頌及銀甕啓三日詩序接虜使語辭竭思稱揚得非誹謗囚才分本劣謬被策用悚怍之情夙宵兢惕自循自省並愧流言伏惟明皇臨宇普天蒙澤戊寅赦恩輕重必宥百日曠期始蒙旬日一介罪身獨嬰憲劾融被收朋友部曲參問北寺相繼於道請救於子良子良不敢救西昌侯固爭不得詔於獄賜死時年二十七臨死歎曰我若不為百歲老母當吐一言融意欲指斥帝在東宮時過失也先是太學生會稽魏準以才學為融所賞既欲奉子良而準鼓成其事太學生虞羲丘國賓竊相謂曰竟陵才弱王中書無斷敗在眼中矣及融誅召準入舍人省詰問遂懼而死舉體皆青時人以準膽破融文集行於時微字景玄弘弟光祿大夫孺之子也少好學善屬文工書兼解音律及醫方卜筮陰陽數術之事宋文帝賜以名蓍初為始興王友父憂去職微素無宦情服闋除南平王鑠右軍咨議參軍仍為中書侍郎時兄遠免官歷年微歎曰我兄無事而屏廢我何得而叼忝踰分文帝即以遠為光祿勳微為文好古言頗抑揚袁淑見之謂為訴屈吏部尚書江湛舉微為吏部郎微確乎不拔時論者或云微之見舉廬江何偃亦參其議偃慮為微所咎與之書自陳微報書深言塵外之適其從弟僧綽宣文帝旨使就職因留之宿微妙解天文知當有大故獨與僧綽仰視謂曰此上不欺人非智者其孰能免之遂辭不就尋有元凶之變微常住門屋一間尋書玩古遂足不履地終日端坐牀席皆生塵埃唯當坐處獨淨弟僧謙亦有才譽為太子舍人遇疾微躬自處療而僧謙服藥失度遂卒深自咎恨發病不復自療哀痛僧謙不能已以書告靈僧謙卒後四旬而微終遺令薄葬不設旐鼓挽之屬施五尺牀為靈二宿便毀以常所彈琴置牀上何長史偃來以琴與之無子家人遵之所著文集傳於世贈祕書監微兄遠字景舒位光祿勳時人謂遠如屏風屈曲從俗能蔽風露言能不乖物理也遠子僧祐字胤宗幼聰悟叔父微撫其首曰兒神明意用當不作率爾人雅為從兄儉所重每鳴笳列騶到其門候之僧祐輒稱疾不前儉曰此吾之所望於若人也世皆推儉之愛名德而重僧祐之不趨勢也未弱冠頻經憂居喪至孝服闋髮落略盡殆不立冠帽舉秀才為驃騎法曹羸瘠不堪受命雅好博古善老莊不尚繁華工草隸善鼓琴亭然獨立不交當世沛國劉瓛聞風而悅上書薦之為著作佐郎遷司空祭酒謝病不與公卿游齊高帝謂王儉曰卿從可謂朝隱答曰臣從非敢妄同高人直是愛間多病耳經贈儉詩云汝家在市門我家在南郭汝家饒賓侶我家多鳥雀儉時聲高一代賓客填門僧祐不為之屈時人嘉之稍遷晉安王文學而陳郡袁利為友時人以為妙選齊武帝數閲武僧祐獻講武賦王儉借觀不與竟陵王子良聞其工琴於座取琴進之不從命永明末為太子中舍人在直屬疾不待對人輒去中丞沈約彈之云肆情運氣不顧朝典揚眉闊步直轡高驅坐贖論時何點王思遠之徒請交並不降意自天子至于侯伯未嘗與一人游卒於黃門郎子籍籍字文海仕齊為餘杭令政化如神善於擲伏自下莫能欺也性頗不儉俄然為百姓所訟又為錢唐縣下車布政咸謂數十年來未之有也籍好學有才氣為詩慕謝靈運至其合也殆無愧色時人咸謂康樂之有王籍如仲尼之有丘明老聃之有嚴周梁天監中為輕車湘東王咨議參軍隨府會稽郡至若邪溪賦詩云蟬噪林逾靜鳥鳴山更幽劉孺見之擊節不能已已以公事免及為中散大夫彌忽忽不樂乃至徒行市道不擇交游有時塗中見相識輒以笠傘覆面後為作唐侯相小邑寡事彌不樂不理縣事人有訟者鞭而遣之未幾而卒籍又甚工草書筆勢遒放蓋孔琳之流亞也湘東王集其文為十卷云瞻字思範弘從孫也祖柳字休季位光祿大夫東亭侯父猷字世倫位侍中光祿大夫瞻年六歲從師時有伎經門過同業皆出觀瞻獨不視習業如初從父僧達聞而異之謂其父猷曰大宗不衰寄之此子年十二居父憂以孝聞服闋襲封東亭侯後頗好逸游為閭里患以輕薄稱及長折節修士操涉獵書記善工射歷位驃騎將軍王晏長史晏誅出為晉陵太守潔己為政妻子不免飢寒時號廉平王敬則作亂瞻赴都敬則經晉陵郡人多附之敬則敗臺軍討賊黨瞻言愚人易動不足窮法齊明帝從之所全萬數遷御史中丞梁臺建為侍中吏部尚書性率亮居選部所舉多行其意頗嗜酒每飲或彌日而精神朗贍不廢簿領梁武每稱瞻有三術射酒也卒諡康侯子長玄早卒弘四弟虞柳孺曇首虞字休仲位廷尉卿虞子深字景度有美名位新安太守柳孺事列于前曇首別卷沖字長深弘玄孫也祖僧衍位侍中父茂璋字胤光仕梁位給事黃門侍郎沖母梁武帝妹新安公主卒於齊世武帝深鍾愛沖賜爵東安亭侯纍遷侍中南郡太守習於法令政號平理雖無赫赫之譽久而見思曉音樂習歌善與人交貴游之中聲名籍甚侯景之亂元帝承制沖求解南郡讓王僧辨并獻女伎十人以助軍賞侯景平授丹陽尹魏平江陵敬帝為太宰承制以沖為左長史紹泰中纍遷左光祿大夫尚書左僕射開府儀同三司給扶陳武帝受禪領太子少傅加特進左光祿大夫領丹陽尹參撰律令帝以沖前代舊臣特申長幼之敬文帝即位益加尊重嘗從幸司空徐度宅宴筵之上賜以几光大元年薨年七十六贈司空諡曰元簡沖有子三十人並致通官第十二子瑒瑒字子瑛沈靜有器局美風儀梁元帝時位太子中庶子陳武帝入輔以為司徒左長史文帝即位纍遷太子中庶子散騎常侍侍中父沖嘗為瑒辭領中庶子文帝顧沖曰所以久留瑒於承華正欲使太子微有瑒風法耳宣帝即位歷中書令吏部尚書瑒性寬和務清靜無所抑揚遷尚書左僕射加侍中參選事瑒居家篤睦每歲時饋遺遍及近親敦誘諸弟禀其規訓卒贈特進諡曰光子瑒弟瑜字子圭亦知名美容儀年三十官至侍中永定元年使齊以陳郡袁憲為副齊以王琳故囚之齊文宣每行載死囚以從齊人呼曰供御囚每他怒則召殺之瑜及憲並危殆者數矣齊僕射楊遵彥每救護之天嘉二年還朝復為侍中卒諡曰貞子論曰語云不有君子其能國乎晉自中原沸騰介居江左以一隅之地抗衡上國年移三百蓋有憑焉其初諺云王與馬共天下蓋王氏人倫之盛實始是矣及夫休元弟兄並舉棟梁之任下逮世嗣無虧文雅之風其所以簪纓不替豈徒然也僧達猖狂成性元長躁競不止闕
