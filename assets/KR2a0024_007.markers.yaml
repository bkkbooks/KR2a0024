  - {type: variant, offset: 7684, length: 0, content: '', WYG: 南史卷七南史卷七考證武帝紀三月乙卯巴陵王蕭屏薨乙夘梁書作己夘又下文冬十一月甲申梁書作甲午俱彼此小異辛亥祀明堂辛亥梁書作丙午其北海王顥臨淮王彧汝南王悦並来奔彧監本訛或今改正先是一日丙夜南郊令解滌之等到郊所履行丙夜梁書作柬及將行事奏樂迎神畢迎監本作道今從閣本二郊請用素輦二監本訛三今从梁書詔晉宋齊三代諸陵有職司者勤加守護勤梁書作勒曲阿縣建陵隧口石辟邪起舞辟邪起舞梁書作騏驎動頃聞外間多用九佰錢佰梁書作陌夏四月庚午羣臣以錢一億萬奉贖午監本訛寅上文云三月庚子幸同泰寺乙巳升殿講經下文云戊寅百辟表請丁亥御輦還宫凡四十七日計乙巳後戊寅前不應有庚寅再查是年正月己亥朔則庚子乙巳為三月初旬戊寅丁亥為四月中旬末而庚午至戊寅距八日竊意庚午贖身既已黙許戊寅奉表三請三荅又遲九日丁亥回宫其為午字無疑也撰通史六百卷金海三十卷海梁書作䇿覆述制㫖并撰吉凶軍賓嘉五禮一千餘卷并監本訛拜今從梁書改正南史卷七考證}
