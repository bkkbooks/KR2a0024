  - {type: variant, offset: 11297, length: 0, content: '', WYG: 南史卷七十南史卷七十考證循吏傳敘彫欒綺節珠窓網戸欒監本訛奕一本作栾今从南本杜驥傳年十三父使候同郡韋華韋監本訛世今从閣本改杜慧慶傳慧慶悉出宗族私財以充勸賞出監本訛為今改正傳琰傳久之復除始新令始監本訛如今改从南本虞愿傳帝尤好逐夷以銀鉢盛蜜漬之一食數鉢逐夷鮝魚腸胃之别名也沈瑀傳司徒竟陵王子良聞瑀名引為府行參軍領揚州部傳從事閣本無傳字郭祖深傳僧尼十餘萬資産豐沃監本缺僧字今増入南史卷七十考證}
