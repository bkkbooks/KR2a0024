  - {type: variant, offset: 9412, length: 0, content: '', WYG: 南史卷八南史卷八考證簡文帝紀三月己丑王僧辯平侯景己丑梁書作癸丑𢎞納文學之士𢎞梁書作引孝元帝紀齊将潘樂辛術等攻秦郡梁書齊作魏樂作洛十月乙未前梁州刺史蕭循自魏至江陵乙監本訛已今从梁書及上下文改正齊遣郭元建及将邢杲逺步六汗薩東方老帥衆頓合肥六監本訛大今从閣本其虚矯如此矯監本訛嬌今改从南本敬帝紀十一月庚辰齊安州刺史翟子崇楚州刺史柳逹摩率衆赴任約入石頭梁書陳書皆作楚州刺史劉仕榮淮州刺史柳達摩又見於下卷陳武帝紀此脱去劉仕榮淮州刺史七字齊将蕭軌出柵口向梁山軌監本訛軏今从齊書梁書陳書改正南史卷八考證}
