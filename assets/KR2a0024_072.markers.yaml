  - {type: variant, offset: 10830, length: 0, content: '', WYG: 南史卷七十二南史卷七十二考證文學傳叙大則憲章典誥小則申抒性靈憲監本訛獻今改正丘靈鞠傳在沈淵坐見王儉詩一本淵作深儉注云一作徐子遲傳遲字希範遲監本訛達今改正卞彬傳我詩應湏大材迮之不爾飛去迮監本作迂今从閣本崔慰祖傳悉火焚之火監本訛人从南本改正可冩數本付䕶軍諸從事人一通南本脱事字今以監本為是何思澄傳又作鼓吹曲鼓吹監本誤取次今改从閣本任孝恭傳初為奉朝請奉監本訛舉今改正少從蕭寺雲法師讀經論明佛理師監本訛諦今从閣本改正顔協傳晉侍中含七世孫也含監本訛舍今改从南本杜之偉傳年十五遍觀文史及儀體故事體一本作禮岑之敬傳位中軍呉興王記室呉興監本誤英與今改从閣本史臣論然則立身之道可無務乎身監本誤少今从南本改正南史卷七十二考證}
