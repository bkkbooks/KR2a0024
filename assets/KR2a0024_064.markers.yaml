  - {type: variant, offset: 6791, length: 0, content: '', WYG: 南史卷六十四南史卷六十四考證江子一傳字元亮亮梁書作貞帝怒亦歇歇一夲作止胡僧祐傳以大通三年避尒朱氏之難歸梁梁書作以大通二年歸國徐文盛傳文盛深徳景遂私通信使都無戰心私閣夲作密門外不見卿馬跡使我何䖏得降䖏梁書作􅃍杜崱傳太清三年三梁書作二王琳傳有龍出於門外之地地一夲作池張彪傳彪後至泰等反與岐迎陳文帝入城迎監夲誤後今改从陳書南史卷六十四考證}
