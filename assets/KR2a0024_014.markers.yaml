  - {type: variant, offset: 13307, length: 0, content: '', WYG: 南史卷十四南史卷十四考證文帝十九男傳陳脩容生東海王禕東海目録及本傳俱作廬陵元凶劭傳初使蕭斌作詔斌辭以不文乃使王僧綽監本脫辭字今从宋書増入劭使詹叔児燒輦及衮冕服上文云宻與腹心隊主陳叔児齋帥張超之任建之謀之此作詹叔児二者必有一訛竟陵王誕傳改封隨郡王隨監本作隋今改正開南門者不利其主不利其主監本作其主王今从宋書白虹臨北門亘屬城内屬一本作入晋熈王昶傳在道慷慨為斷句斷監本誤繼今改正先是改謝氏為射氏監本謝與射互誤今改正明年復昶所生謝氏為晋熈國太妃謝監本訛射今改正晋平刺王休祐傳且慮休祐将来難制欲方便除之監本脱欲字今増入孝武帝二十八男傳史昭華生臨海王子頊華一本作容始平孝敬王子鸞傳凡為上眄遇者莫不入于鸞府于一本作子永嘉王子仁傳字孝龢龢監本誤􅀈今改正武陵王賛傳此三行共四十八字監本複見於邵陵殤王友傳後查目録及閣本俱無之不知何人所贅増也今獨存此傳刪其複見者南史卷十四考證}
