  - {type: variant, offset: 10342, length: 0, content: '', krp: 南史卷六十七南史卷六十七考證胡穎傳呉興人也一本吳興東遷人也徐敬成傳起家著作佐郎永定元年陳書無佐字又元誤為九程靈洗傳遣使招諭久之乃降諭監本訛俞今改从陳書子文季傳秦郡前江浦通涂水涂陳書作塗齊軍深憚之謂為程彪彪一本作虎駱文牙傳駱文牙字旗門陳書無文字文牙母陳覩帝儀表知非常人陳監本訛陵今改从閣本魯廣達傳太建初與儀同章昭達入峽口招定安蜀等諸州鎮招陳書作拓時周圖江左一本周字下有氏將二字初隋將韓擒虎濟江廣達長子世真在新蔡乃與其弟世雄及所部奔擒擒遣使致書招廣達各卷或稱擒或稱擒虎此則兩行内亦有異同皆後人或加或刪而未盡者也蕭摩訶傳一旬之中水路遂斷周兵益至陳書無水路遂斷四字南史卷六十七考證}
