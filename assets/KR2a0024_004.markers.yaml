  - {type: variant, offset: 11857, length: 0, content: '', WYG: 南史卷四南史卷四考證齊髙帝紀帝軍容寡闕乃編椶皮為馬具装乃監本訛仍今從南本公奉辭伐罪戒旦晨征征監本訛徴今從南本重窺上國而世故相仍師出已老世監本作勢今從齊書信宿之間宣揚底定揚監本作陽今從南本命司裘而謁蒼昊裘監本誤喪今改從齊書兼太尉守尚書令王僧䖍守各本俱誤以今從齊書改正冬十二月戊戌以司空褚彦回為司徒臣承蒼按上文云春正月戊戌朔大赦以司空褚彦回為司徒此不當重出殆因戊戌日相同而有誤也武帝紀忽生一樹狀若華盖青翠扶疎有殊羣木華監本訛花今從閣本都邑城守防備幢隊一不得還幢監本訛憧今改從齊書南史卷四考證}
