  - {type: variant, offset: 10562, length: 0, content: '', WYG: 南史卷二十六南史卷二十六考證袁顗傳以為不勞攻伐行自離散於是擁甲以待之待監本誤得今从宋書今追蹤竇融猶未晚也猶監本訛獨今从宋書及閣本袁粲傳袁濯兒不逢朕員外郎未可得也濯監本訛灌今从上文改正袁昻傳且范岫申胄久薦誠欵申監夲訛甲今从梁書當其時也負鼎圖者日至執玉帛者相望各本俱脱當字今从梁書以監本為是袁昻子君正傳性不信巫邪有師萬世榮稱道術為一郡巫長師萬一本作萬師袁樞傳永嗣公主先適陳留太守錢蕆蕆各本俱誤藏今考陳書从監本袁憲傳憲以久居清顯累表自求觧監本脱求字今从閣本増袁敬傳諡靖徳靖一本訛曰今从陳書南史卷二十六考證}
