  - {type: variant, offset: 6894, length: 0, content: '', WYG: 南史卷十南史卷十考證宣帝紀乙未桃根又上織成羅紋錦被表各二詔於雲龍門外焚之表陳書作裘二月壬子耕藉田壬子陳書作壬午丙子淳于陵剋柘州城柘陳書作祐後主紀光大二年累遷侍中二監本訛三今以光大止有二年改正之立皇弟叔敦為始興王敦陳書作重庚子詔鏤金銀薄庶物化生土木人綵華之屬庶監本作度今从陳書及南本叔韶為岳山王岳監本訛樂今从本傳改肆艫艦閲武肆南本作肄閣本注一作肄東冶鑄鐵有物赤色大如數升自天墜鎔所升陳書作斗盖升斗二字古文相似易致訛也南史卷十考證}
