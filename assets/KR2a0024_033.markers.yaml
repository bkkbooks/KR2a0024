  - {type: variant, offset: 10859, length: 0, content: '', WYG: 南史卷三十三考證范泰傳上每優容之容監本訛遊今改从宋書匹婦一至亦能有所感激匹監本訛疋今改正范曄傳在生已可知來緣㦎無識㦎監本訛㦎今从宋書改正姉今不來勝人多也姉監本訛妹今改从宋書及閣本荀伯子傳故太保衛瓘本爵菑陽縣公菑宋書作蕭誤鄭鮮之傳先是兖州刺史滕怙為丁零翟所沒怙一本作恬使羣僚博議博監本訛溥今改从宋書政以事有變通不可宗一故耳宗宋書作守今各本俱同仍之使書侍御史丘洹奏彈毅輙宥傳詔羅道盛洹一本作恒裴松之傳義熙初為興故彰令彰一本作鄣裴子野傳從坐免職或勸言請有司可無咎請梁書作諸中書郎范縝與子野未遇聞其行業而善焉梁書無郎字何承天傳丁況三家數十年中𦵏輙無棺櫬丁監本訛下令據上文丁況等乆喪而不𦵏改正遇古冢冢上得一銅斗遇一本作過何遜傳頃觀文人質則過儒麗則傷俗儒一本作懦南史卷三十三考證}
