  - {type: variant, offset: 10144, length: 0, content: '', WYG: 南史卷三十四南史卷三十四考證顔竣傳嚴檢盜鑄並禁剪鑿禁下監本衍私字今从宋書竣上言禁糃一月息米近萬斛糃一本作糃顔師伯傳師伯子舉周旋寒人張竒為公車令寒監本誤塞今改正令史潘道栖諸道恵諸宋書作褚沈懷文傳元凶弑立以為中書侍郎孝武入討呼之使作符檄固辭呼之上應从宋書加上字上方注怒作色怒應从閣本改弩周捨傳雖廣夏華堂夏應改厦周𢎞正傳又請釋乾坤二繫坤監本作巛𢎞讓傳今乾坤易立句同南史卷三十四考證}
