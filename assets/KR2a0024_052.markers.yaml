  - {type: variant, offset: 7158, length: 0, content: '', WYG: 南史卷五十二南史卷五十二考證南平元襄王偉傳倍先置防閣白直左右職局一百人倍監本誤陪今改從梁書平原王曼頴卒家貧無以殯平原梁書作太原子恭傳下官歴觀時人多有不好懽興興一本作樂恭乃多取官米還贍私宅私梁書作𢎞誤鄱陽忠烈王恢傳文帝第十子也十梁書作九盖文帝十男恢居其末此總計髙祖兄弟而稱為第十子耳中山聴樂可得任悦悦梁書作説子範傳乃泝流西上軍於嶷陽嶷梁書作摐大心要還九江欲共兵西上梁書共字下有治字範将侯瑱襲荘鐵於豫章瑱監本訛填今从陳書改始興忠武王憺傳人歌曰始興王人之爹徙我反徙梁書作徒史臣論盤石犬牙寄深梁楚梁書犬牙作凝脂寄深作樹斯南史卷五十二考證}
