  - {type: variant, offset: 10085, length: 0, content: '', WYG: 南史卷六十六南史卷六十六考證杜僧明傳武帝頓豫章命僧明為前驅命陳書作㑹誤周文育傳文育對曰母老家貧兄弟姊並長大陳書無弟字後監州王勱以文育為長流深被委任長流下陳書有令字侯瑱傳是時瑱據中流甚强甚强陳書作兵甚强侯安都傳父捍少仕州郡捍陳書作文捍禽齊儀同乞伏無芳伏閣本作扶又芳陳書作勞放拍碎其樓陳書樓字下有雉字歐陽頠傳蘭欽弟前高州刺史裕攻始興内史蕭昭基奪其郡昭陳書作紹黄法􅉤傳日歩行二百里陳書歩行日三百里於是為抛車及歩艦豎拍以逼之抛陳書作拍章昭逹傳眇其一目眇監本訛𦕈今改正呉明徹傳字通炤炤陳書作昭年十四感墳塋未脩脩陳書作偹到仲舉之矯令出宣帝也毛喜知其詐詐一本作謀又遏肥水灌城又監本訛尺陳書云又迮肥水以灌城今改正南史卷六十六考證}
