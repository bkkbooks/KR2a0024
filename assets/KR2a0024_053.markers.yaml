  - {type: variant, offset: 11192, length: 0, content: '', WYG: 南史卷五十三南史卷五十三考證昭眀太子統傳徐元瑜降而續又荆州使至又監本誤人今从南本時年幼依舊於内梁書於字上有居字應增入五嵗徧讀五經悉通諷誦通一本作融胸中亦填塞成疾填梁書作圯不俟我恒爾懸心俟梁書作使不畜音聲未薨少時敕賜太樂女妓一部畧非所好梁書無未薨二字又太作大詔遣前交州刺史王奕奕梁書作弁唯信義去秋有稔信義梁書作義興為英華集二十卷梁書同應从南本改為文章英華集二十卷復還徐方之象也還監本作逺河東王譽傳譽曰各自軍府何忽疑人疑梁書作𨽻南康簡王績傳天監七年封南康郡王七梁書作八少府有南康國無名錢數千萬梁書無少字子乂理傳大同八年封安樂縣侯八監本誤三今改从閣本又安樂梁書作建安邵陵攜王綸傳以西中郎将權攝南徐州事徐梁書作兖又云中大同元年出為統東将軍南徐州刺史本書不載殆彼此互訛也恒遣心腹馬容戴子髙戴𤓰李撒趙智英等於路尋何智通於白馬巷逢之以槊刺之梁書作令客戴子髙於都巷刺殺之綸遂與子躓等十餘人輕舟走武昌躓梁書作確下文確傳確自臺城出即在景左右旋欲手刃景為賊所殺則確未嘗有走武昌事當以躓為是子確傳後徙封永安安監本訛福今从梁書武陵王紀傳震太陽門成字曰紹宗梁位唯武王解者以武陵王解者以武陵王梁書作解者以為武王者武陵王也較眀六月紀築連城攻絶鐵鎖紀梁書作約誤也上文元帝命陸法和鎖江以斷峽遣劉棻共任約西赴下文元帝復以謝荅仁上赴所謂赴者皆赴法和也則此攻絶鐵鎖自當属紀不當属約矣武陵王紀子圓正傳識者曰王敦祅花非佳事也祅梁書作杖南史卷五十三考證}
