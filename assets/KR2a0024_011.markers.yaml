  - {type: variant, offset: 6382, length: 0, content: '', WYG: 南史卷十一南史卷十一考證后妃傳敘淑妃舊擬九棘以淑為温㳟之稱棘各本訛􅀢查字書􅀈同棘亦从朿不从來今改正宋孝穆趙皇后傳葬晉陵丹徒縣東鄉練璧里雩山練一本作綀璧一本作壁武敬臧皇后傳封永陵平鄉君監本訛作遷陵永平鄉君今从宋書改正文元袁皇后元監本訛帝今从目錄改正前廢帝何皇后傳瑀尚武帝少女豫康公主諱次男凡公主之名皆不書諱獨本傳此處與下文邁尚文帝第十女新蔡公主諱英媚各衍一諱字齊宣孝陳皇后傳並蜜印畫青綬祠以太牢南本蜜作密畫作書武穆裴皇后傳上數游幸諸苑囿載宫人後從車宫内深隐不聞端門鼓漏聲一本後作從宫内作置内海陵王王妃傳諱韶韶閣本作昭南史卷十一考證}
