  - {type: variant, offset: 10632, length: 0, content: '', WYG: 南史卷二南史卷二考證文帝紀冬十一月庚午以武都王世子楊𤣥為北秦州刺史南本無王字誤是冬浚淮起湖熟廢田千餘頃田監本訛四今改從南本冬十月庚子改封廣陵王誕為隨郡王庚監本訛甲下文九月内有癸卯甲辰則誤可知矣今改從各本八月癸酉梁鄒平斬司馬順則酉監本作亥今各本俱作酉故從之淮陽王彧為湘東王彧監本訛或今改正是為文成皇帝改元曰興安安監本誤元今改正孝武皇帝紀文帝第三子也三監本訛二宋書文帝十九男元凶劭居長始興王濬第二孝武帝次之今改正史臣論有一於此足以致霣足監本訛異今改從南本南史卷二考證}
