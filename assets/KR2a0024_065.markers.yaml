  - {type: variant, offset: 8251, length: 0, content: '', WYG: 南史卷六十五南史卷六十五考證遂興侯詳傳少出家為沙門沙陳書作桑衡陽獻王昌傳並為東衡州刺史王勇所害監本脫王字今从陳書増入南康愍王曇朗傳武帝母弟忠壯王休先之子也先監本訛光今改从陳書子方泰傳上登𤣥武門親宴羣臣以觀之親監本訛觀今改正上曰不承則上測測陳書作刑始興王伯茂傳舊制諸王受封未加戎號者不置佐使使据陳書應作史今各本俱同仍之新安王伯固傳目通睛揚白睛陳書作精因趣白楊道臺馬容至為亂兵所殺尸於昌館門陳書容作客應改从之又昌館門上有東字晉安王伯恭傳年十餘嵗便留心政事官曹緝理官閣本作宫今从陳書以監本為是始興王叔陵傳命典藥吏礪切藥刀刀監本訛乃今改从閣本叔陵有部下兵先在新林林監本作安殆因新安王伯固而訛也上文云放東城囚以充戰士又遣人往新林追所部兵馬則為林字之誤無疑矣湘東王叔平傳大業中為胡蘇令胡應从陳書作湖㑹稽王莊傳隋大業中為昌隆令昌隆陳書作㑹昌吳郡王藩傳為任城令任陳書作涪南史卷六十五考證}
