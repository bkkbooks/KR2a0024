  - {type: variant, offset: 12868, length: 0, content: '', WYG: 南史卷一南史卷一考證宋高祖紀裕字徳輿輿監本訛興今從宋書昨見劉裕風骨不恒蓋人傑也恒監本訛其今従南本改正盼山川以増佇盼監本訛盻今改正桓𤣥頗欲釐改竟不能行行監本訛仃今改正毅至西稱疾篤表求從弟兖州刺史藩以為副貳監本脱稱字今從各本增入封帝次子義真為桂陽縣公陽監本訛楊今改從宋書辛卯復置五校三將官増殿中將軍員二十人増監本訛贈今改正是歲魏眀元皇帝太常五年太魏書作泰二年春正月二監本訛五今改正少帝紀突走出昌門追以門關踣之關監本訛開今改從宋書南史卷一考證}
