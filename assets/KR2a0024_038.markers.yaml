  - {type: variant, offset: 7069, length: 0, content: '', WYG: 南史卷三十八南史卷三十八考證栁元景傳時魯夾向虎牢復使元景率安都等北出爽退乃遷遷當係還字之訛給班劒三十人班監本訛斑今改正栁惔傳周書父子兄弟罪不相及梁書無父子兄弟四字栁惔弟惲傳唯與王暕陸果善果應作杲栁忱傳忱以巴峽未賔峽梁書作硤誤栁慶逺傳俄而水退退梁書作過問京兆人杜惲求州綱紀梁書少紀字栁仲禮弟敬禮傳將發建安侯蕭賁告之侯監本訛偞今改正又告之梁書作知而去之南史卷三十八考證}
