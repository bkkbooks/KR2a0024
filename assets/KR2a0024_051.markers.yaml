  - {type: variant, offset: 9613, length: 0, content: '', WYG: 南史卷五十一南史卷五十一考證吳平侯景傳梁武帝從父弟也從父弟監本誤從弟父今从梁書改正長沙宣武王懿子猷傳為吳興郡守性倜儻與楚王廟神交飲至一斗下文遥禱請救大破齊茍兒與南齊書蕭惠休事神謹故得美遷畧同猷子韶傳湘東王徳之改超繼宣武王封長沙王超疑係韶字之訛但各本俱同姑仍之桂陽簡王融子象傳位丹陽尹位監本訛於今改正臨川靜惠王宏傳豈有百萬之師輕言可退輕監本作卿今从閣本親從子女徧游王侯後宫難免兄弟九人因權勢横於都下難一本作男又注云一作難然俱不可解南史卷五十一考證}
