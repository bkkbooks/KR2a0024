  - {type: variant, offset: 9458, length: 0, content: '', WYG: 南史卷六十南史卷六十考證傅昭傳父淡善三禮知名宋世事宋竟陵王誕事監本作仕今从閣本郡有蜜巖監本脱蜜字今从閣本増入縣令常餉栗置絹於簿下栗一本作粟孔休源傳時周捨撰禮疑義監本缺義字又下文休源所有奏議咸預編録句缺録字今俱増入江革傳㑹魏帝請中山王元畧反北請監本誤討今从魏書改正武陵王出鎮江州乃曰我得江革又得革清貧豈能一日忘之又一本作文許亨傳凡七柩皆改窆焉柩監本誤樞今改正南史卷六十考證}
