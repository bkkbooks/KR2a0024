  - {type: variant, offset: 7629, length: 0, content: '', WYG: 南史卷七十八南史卷七十八考證林邑國傳故名曰沈香次浮者棧香棧梁書作􅀢扶南國傳王當樓居當梁書作常今各本俱同仍之開國十餘闢地五六千里餘監本訛徐今改正横幅今干漫也漫梁書作縵穆帝升平元年王竺旃檀奉表獻馴象王各本訛天今从梁書火𦵏則焚為灰燼為監本訛於今从閣本大同元年累遣使獻方物五年復遣使獻生犀三年監本誤九年今從梁書及下五年改正詔遣沙門釋曇寳隨使往迎之曇梁書作雲干陁利國傳宋孝武世王釋婆羅那鄰陁鄰一本作憐婆利國傳有石名坩貝羅梁書坩作蚶其國人披古貝如帊及為都縵王乃用班丝者梁書古作吉者作布南史卷七十八考證}
