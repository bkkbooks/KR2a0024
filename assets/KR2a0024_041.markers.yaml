  - {type: variant, offset: 7298, length: 0, content: '', WYG: 南史卷四十一南史卷四十一考證始安王遥光傳太子右率左興盛屯東府門東籬門屯東府門東離門一本作屯府東籬門焚屋宇且盡屋字一本作居字曲江公遥欣子幾傳好學善草𨽻書草閣本作章南豐伯赤斧子穎胄傳梁武帝復遣天武齎書與穎胄遣監本誤追今改从梁書穎胄使别駕宗史撰定禮儀史應作夬雖梁書宗夬本傳未載此事而云故領軍將軍蕭穎胄深相委仗每事諮焉其為夬無疑也穎胄遣軍拒之而梁武已平江郢圍建康監本缺郢字今从閣本增入衡陽公諶傳諶每請急出宿帝通夕不能寐出宿監本訛宿出今据齊書改正臨汝侯坦之傳少帝以坦之文恵舊人親信不離得入内見皇后離各本誤難今改从齊書建武元年遷左衛將軍建監本訛孝今從閣本坦之科頭著褌踰墻走褌監本誤禪今從齊書羣小畏而惜之惜一本作憎應从之南史卷四十一考證}
