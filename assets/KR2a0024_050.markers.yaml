  - {type: variant, offset: 7854, length: 0, content: '', WYG: 南史卷五十南史卷五十考證劉瓛弟璡傳與友孔徹同舟入東與監本訛興今改正劉顯傳陸倕聞之擊席喜曰劉郎子可謂差人梁書聞之下無擊席二字郎字下無子字又喜作歎今各本俱同从之明僧紹傳隐長廣郡嶗山嶗一本作勞顧炎武日知錄本草天麻生太山嶗山諸山則字本作嶗若魏書地形志唐書姜撫傳宋史甄棲真傳作勞並傳寫之訛乃齊乘以為登之者勞又云一作牢邱長春又改為鰲皆鄙淺可笑今从監本勃海封延伯者髙行士也延監本誤追从閣本明山賓傳平仲古稱竒夷齊昔擅美齊梁書作吾誤庾易傳易謂使人曰走􅠢採麋鹿之伍終其解之毛衣終其解之毛衣一本作終嵗鮮毛之衣庾於陵傳遷尚書功論郎功論梁書作工部庾肩吾傳朱白既定雌黄有别白梁書作丹劉之遴傳必呼之遴小字曰僧伽福徳兒監本脱伽字今增正劉之亨傳故美出之以代之遴為安西湘東王繹長史上文云之亨美績嘉聲在朱异之右既不協懼為所害則美字當係异字之誤也今各本俱同姑仍之南史卷五十考證}
