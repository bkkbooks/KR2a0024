  - {type: variant, offset: 11312, length: 1, content: 邪, WYG: 耶南史卷九南史卷九考證陳武帝紀封新枋縣子陳書封新安子與此小異勃遣腹心譚世逺為曲江令前卷梁太平二年三月内稱衡州刺史譚逺盖以避諱故去世字也兹復作世逺前後互異如此帝先計軍糧五十萬石計陳書作貯乃以䑡䑰貯石沈塞淮口䑡監本誤般今从梁書改正十一月己卯齊遣兵五千度據姑熟度陳書作濟渡楚州刺史劉士榮士梁書陳書皆作仕鞠旅於溟池之南溟陳書作滇吕嘉既獲吳濞已摐摐監本作鏦今从陳書金虎符第一至第五左竹使符第一至第十左陳書無第二左字乃脱去也壬寅立梁邵陵攜王廟室祭以太牢辛丑帝幸大莊嚴寺捨身先壬寅而後辛丑不知何以顛倒至此陳書武帝紀永定二年不載立廟室事又辛丑作辛酉甲子廣州言仙人見於羅浮山寺小石樓上云正月丁酉下云二月辛酉則此二十六日内當是庚子或壬子此作甲訛也若陳書作甲午則更訛矣丙子扶南國遣使朝貢丙子陳書作丙寅文帝紀十月癸丑霍州西山蠻率部内屬乙夘高麗國遣使朝貢十一月甲辰齊孝昭帝殂癸丑陳書作乙巳又乙卯上有十一月三字與此小異丙戌臨川太守駱牙斬周迪駱牙陳書作駱文牙廢帝紀六月丁亥彗星見丁亥陳書作丁卯此諸文迹今以相示此監本作比今从陳書及閣本南史卷九考證}
