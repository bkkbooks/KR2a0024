  - {type: variant, offset: 10427, length: 0, content: '', WYG: 南史卷七十五南史卷七十五考證宗測傳荆州刺史隨王子隆至遣别駕宗忻口致勞問忻一本作昕宗彧之傳宋元嘉初大使陸子眞觀採風俗眞監本作貞今从閣本沈道䖍傳道䖍常無食以立學徒武康令孔欣之厚相資給受業者咸得有成監本脱者字今从閣本増入孔淳之傳祖惔尚書祠部郎惔一本作琰關康之傳河東楊人也楊監本訛揚今改正蚊甚多通夕不得寢而終不道侵螫道監本訛間今改从閣本顧歡傳司徒從事中郎張翮作門律翮南本作融南史卷七十五考證}
