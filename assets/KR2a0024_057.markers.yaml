  - {type: variant, offset: 8602, length: 0, content: '', WYG: 南史卷五十七南史卷五十七考證沈約傳林子輙摧鋒居前摧監本作推今改从閣本子旋傳衆字仲師師一本作興時梁武帝制千文詩衆為之注解顧炎武曰千字文有二本舊唐書經籍志千字文一卷蕭子範撰又一卷周興嗣撰是也今云梁武制千文詩則不獨興嗣子範二人矣又隋書經籍志興嗣千字文國子祭酒蕭子雲注而梁書蕭子範傳謂子範作之記室蔡薳注釋今云衆為之注解亦彼此互異范雲傳雲入境撫以恩德罷亭候亭監本訛停今改从閣本梁武與兄懿卜居東郊之外東監本誤築又下文梁武毎至雲所其妻甞聞蹕聲句蹕誤跋今俱改正家事必先諮而後行先諮監本誤元詔今改从閣本交游不雜監本脱不雜二字今増入南史卷五十七考證}
