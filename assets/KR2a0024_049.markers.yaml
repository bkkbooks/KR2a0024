  - {type: variant, offset: 9085, length: 0, content: '', WYG: 南史卷四十九南史卷四十九考證庾杲之傳父粲為宋南郡王義宣丞相城局參軍監本缺宋南二字今増正孔珪傳王晏嘗鳴鼓吹候之候監本訛侯今改正劉霽傳字士湮湮梁書作烜常有雙白鶴循翔廬側循梁書作馴劉杳傳鄭𤣥答張逸謂為畫鳯皇尾婆娑然婆娑梁書作娑娑杳曰此言未必可安安一木作按有人餉昉􅙢酒而作榐字榐監本訛搌今改从梁書卿有古人之風故遺卿古人之器此與本卷孔珪傳齊高帝餉珪父靈產白羽扇素隱几曰君有古人之風故贈君古人之服二語相同文集十五卷一本無此五字劉歊傳忽有一老人無因而至梁書歊幼時嘗獨坐空室有一老公至門與此小異南史卷四十九考證}
