  - {type: variant, offset: 10466, length: 0, content: '', WYG: 南史卷五十五南史卷五十五考證王茂傳字休連連梁書作逺好讀兵書究其大㫖兵書下梁書有駮畧二字曹景宗傳毎箭殺蠻蠻遂敗走殺字下梁書有一字義之出逐英至洛口義之昌義之也洛梁書作浴誤夏侯亶傳武帝復遣北道軍元樹帥彭寶孫陳慶等稍進慶字下梁書有之字亶對曰臣聞服屬易疏所以不忍言族顧炎武云書以親九族注同族髙祖以下是也非疏逺之謂漢書張敞傳廣川王同族宗室劉調等同族言其與王近親也顏氏家訓凡宗親世數有從父有從祖有族祖此云不忍言族當時雖爲敏對於理未通亶弟夔傳不以貴位自高高監本誤事今改正魚𢎞傳通用銀鏤金花壽福兩重兩監本訛雨今改正羅研傳鄱陽忠烈王恢臨蜀聞其名請爲别駕請監本誤謂今改正史臣論其功則未未梁書作輕今各本俱同姑仍其舊南史卷五十五考證}
