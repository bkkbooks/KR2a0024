body:
  text: 南史卷三十九列傳第二十九殷孝祖族子琰劉勔子悛孫孺覽遵悛弟子苞悛弟繪繪子孝綽繪弟瑱殷孝祖陳郡長平人也曾祖羡晉光祿勳父祖宦並不達孝祖少誕節好酒色有氣幹宋孝武時以軍功仕至積射將軍前廢帝景和元年為兗州刺史明帝初即位四方反叛孝祖外甥司徒參軍潁川荀僧韶建議銜命徵孝祖入朝上遣之時徐州刺史薛安都遣薛索兒等屯據津徑僧韶間行得至説孝祖曰景和凶狂開闢未有朝野憂危假命漏刻主上曾不浹辰夷凶翦暴國亂朝危宜立長主公卿百辟人無異議而羣迷相扇構造無端貪利幼弱競懷希幸舅少有立功之志長以氣節成名若能控濟河義勇還奉朝廷非唯匡主靜亂乃可以垂名竹帛孝祖即日棄妻子率文武二千人隨僧韶還都時普天同逆朝廷唯保丹陽一郡孝祖忽至衆力不少人情於是大安進孝祖號冠軍將軍假節督前鋒諸軍事御仗先有諸葛亮筒袖鎧鐵帽二十五石弩射之不能入上悉以賜孝祖孝祖負其誠節陵轢諸將時賊據赭圻孝祖將進攻之與大將王玄謨別悲不自勝衆並駭怪泰始二年三月三日與賊合戰每戰常以鼓蓋自隨軍中人相謂曰殷統軍可謂死將矣今與賊交鋒而以羽儀自標顯若射者十手攢射欲不斃得乎是日中流矢死追贈建安縣侯諡曰忠琰字敬珉孝祖族子也父道鸞宋衡陽王義季右軍長史琰少為文帝所知見遇與琅邪王景文相埒前廢帝永光元年纍遷黃門侍郎出為山陽王休祐右軍長史南梁郡太守休祐入朝琰乃行府州事明帝泰始元年以休祐為荊州會晉安王子勛反即以琰為豫州刺史土人前右軍參軍杜叔寶等並勸琰同逆琰素無部曲無以自立受制於叔寶二年正月帝遣輔國將軍劉勔西討之築長圍創攻道於東南角並作大蝦車載土牛皮蒙之三百人推以塞塹十二月琰乃始降時琰有疾以板自輿諸將帥面縛請罪勔並撫宥之無所誅戮後除少府加給事中卒官琰性和雅靜素寡嗜欲諳前世舊事事兄甚謹少以名行見稱在壽陽被攻圍積時為城內所懷附揚州刺史王景文征西將軍蔡興宗司空褚彥回並相與友善劉勔字伯猷彭城安上里人也祖懷義父穎之位並郡守勔少有志節兼好文義家貧仕宋初為廣州增城令稍遷鬱林太守大明初還都徐州刺史劉道隆請為寧朔司馬竟陵王誕據廣陵為逆勔隨道隆受沈慶之節度事平封金城縣五等侯除西陽王子尚撫軍參軍入直閣先是費沈伐陳檀不剋乃除勔龍驤將軍西江督護鬱林太守勔既至隨宜翦定大致名馬並獻珊瑚連理樹上甚悅前廢帝即位為屯騎校尉又入直閣明帝即位江州刺史晉安王子勛為逆四方響應勔以本官領建平王景素輔國司馬進據梁山會豫州刺史殷琰反叛召勔還都復兼山陽王休祐驃騎司馬致討時琰嬰城固守自始春至于末冬勔內攻外禦戰無不捷善撫將帥以寬厚為衆所依將軍王廣之求勔所自乘馬諸將並忿廣之貪冒勸勔以法裁之勔歡笑即解馬與廣之及琰請降勔約令三軍不得妄動城內士庶感悅咸曰來蘇還都拜太子右衛率封鄱陽縣侯遷右衛將軍行豫州刺史加都督後徵拜散騎常侍中領軍勔以世路糾紛有懷止足經始鍾嶺之南以為栖息聚石蓄水髣佛丘中朝士雅素者多往遊之明帝臨崩顧命以為守尚書右僕射中領軍廢帝即位加兵五百人元徽初月犯右執法太白犯上將或勸勔解職勔曰吾執心行己無愧幽明若才輕任重災眚必及天道密微避豈能免桂陽王休範為亂奄至建鄴加勔使持節鎮軍將軍置佐鎮扞石頭既而賊衆屯朱雀航南右軍將軍王道隆率宿衛向朱雀聞賊已至急信召勔勔戰敗死之事平贈司空諡曰忠昭公子悛悛字士操隨父征竟陵王誕於廣陵以功拜駙馬都尉後為桂陽王征北中兵參軍與齊武帝同直殿內並為宋明帝所親待由是與武帝款好悛本名忱宋明帝多忌反語劉忱為臨讎改名悛焉齊武帝嘗至悛宅晝臥覺悛自捧金澡罐受四升水以沃盥因以與帝前後所納稱此後遷安遠護軍武陵內史郡南古江堤久廢悛修未畢而江水忽至百姓棄役奔走悛親率厲之於是乃立漢壽人邵榮興六世同爨悛表其門閭悛強濟有世調善於流俗蠻王田僮在山中年垂百餘歲南譙王義宣為荊州僮出謁至是又謁悛明帝崩表求奔赴敕帶郡還都吏人送者數千萬人悛人人執手係以涕泣百姓感之贈送甚厚桂陽之難加寧朔將軍助守石頭父勔於大航戰死悛時遇疾扶伏路次號哭求勔尸勔尸頂後傷缺悛割髮補之持喪墓側冬日不衣絮齊高帝代勔為領軍素與勔善書譬悛殷勤抑勉建平王景素反高帝總衆悛初免喪高帝召悛及弟愃入省欲使領支軍及見皆羸削改貌乃止霸業初建悛先致誠節沈攸之事起加輔國將軍後為廣州刺史襲爵鄱陽縣侯武帝自尋陽還遇悛歡宴舊停十餘日乃下遣文惠太子及竟陵王子良攝衣履備父友之敬齊受禪國除平西記室參軍夏侯恭叔上書以柳元景中興功臣劉勔殞身王事宜存封爵詔以與運隆替不容復厝意也初蒼梧廢高帝集議中華門見悛謂曰君昨直邪悛曰僕昨正直而之急在外至是上謂悛曰功名之際人所不忘卿昔在中華門答我何其欲謝世事悛曰臣世受宋恩門荷齊眷非常之勳非臣所及敢不以實仰答遷太子中庶子領越騎校尉時武帝在東宮每幸悛坊間言至夕賜屏風帷帳武帝即位改領前軍將軍後拜司州刺史悛父勔討殷琰平壽陽無所犯害百姓德之為罍樽銅豆鍾各二口獻之遷長兼侍中車駕數幸悛宅宅盛修山池造甕牖武帝著鹿皮冠披悛菟皮衾於牖中宴樂以冠賜悛至夜乃去後從駕登蔣山上數歎曰貧賤之交不可忘糟粳之妻不下堂顧謂悛曰此況卿也世言富貴好改其素情吾雖有四海今日與卿盡布衣之適悛起拜謝纍遷始興王前軍長史平蠻校尉蜀郡太守行益州府州事適悛起拜謝纍遷始興王前軍長史平蠻校尉蜀郡太守行益州府州事初高帝輔政有意欲鑄錢以禪讓之際未及施行建元四年奉朝請孔覬上鑄錢均貨議辭證甚博其略以為食貨相通理勢自然李悝曰糴甚貴傷人甚賤傷農人傷則離散農傷則國貧甚賤與甚貴其傷一也三吳國之關奧比歲時被水潦而糴不貴是天下錢少非穀穰賤此不可不察也鑄錢之弊在輕重屢變重錢患難用而難用為纍輕輕錢弊盜鑄而盜鑄為禍深人所盜鑄嚴法不禁者由上鑄錢惜銅愛工也惜銅愛工謂錢無用之器以通交易務欲令輕而數多使省工而易成不詳慮其為患也自漢鑄五銖至宋文帝歷五百餘年制度世有廢興而不變五銖錢者明其輕重可法得貨之宜以為宜開置泉府方牧貢金大興鎔鑄錢重五銖一依漢法若官鑄已布於人便嚴斷翦鑿輕小破缺無周郭者悉不得行官錢細小者稱合銖兩銷以為大利貧良之人塞姦巧之路錢貨既均遠近若一百姓樂業市道無爭衣食滋殖矣時議多以錢貨輕轉少宜更廣鑄重其銖兩以防人姦高帝使諸州郡大市銅炭會晏駕事寢永明八年悛啓武帝曰南廣郡界蒙山下有城名蒙城可二頃地有燒爐四所高一丈廣一丈五尺從蒙城度水南百許步平地掘土深二尺得銅又有古掘銅坑深二丈並居宅處猶存鄧通南安人漢文帝賜通嚴道縣銅山鑄錢今蒙山近在青衣水南青衣左側並是故秦之嚴道地青衣縣文帝改名漢嘉且蒙山去南安二百里案此必是通所鑄處近喚蒙山獠出云甚可經略此議若立潤利無極並獻蒙山銅一片又銅石一片平州鑄鐵刀一口上從之遣使入蜀鑄錢得千餘萬功費多乃止悛仍代始興王鑑為益州刺史監益寧二州諸軍事悛既藉舊恩尤能承迎權貴賓客閨房供費奢廣罷廣司二州傾資貢獻家無留儲在蜀作金浴盆餘金物稱是罷任以本號還都欲獻之而武帝晏駕鬱林新立悛奉獻減少鬱林知之諷有司收悛付廷尉將加誅戮明帝啓救之見原禁錮終身雖見廢黜而賓客日至海陵即位以白衣除兼左戶尚書尋除正明帝立加領驍騎將軍復故官駙馬都尉悛歷朝見恩遇高帝為鄱陽王鏘納悛妹為妃明帝又為晉安王寶義納悛女為妃自此連姻帝室王敬則反悛出守琅邪城轉五兵尚書悛兄弟以父死朱雀航終身不行此路明帝崩東昏即位改授散騎常侍領驍騎將軍尚書如故衛送山陵路經朱雀航感慟至曲阿而卒贈太常常侍都尉如故諡曰敬子子孺字季幼幼聰敏七歲能屬文年十四居喪毀瘠骨立宗黨咸異之叔父瑱為義興郡攜以之官常置坐側謂賓客曰此吾家明珠也及長美風采性通和雖家人不見其喜慍本州召迎主簿起家中軍法曹行參軍時鎮軍沈約聞其名引為主簿與遊宴賦詩大為約所嗟賞纍遷太子中舍人孺少好文章性又敏速嘗在御坐為李賦受詔便成文不加點梁武帝甚稱賞之後侍宴壽光殿詔羣臣賦詩時孺與張率並醉未及成帝取孺手板題戲之曰張率東南美劉孺洛陽才攬筆便應就何事久遲回其見親愛如此遷中書郎兼中書通事舍人歷太子中庶子尚書吏部郎纍遷散騎常侍左戶尚書大同五年守吏部尚書出為晉陵太守在郡和理為吏人所稱入為侍中後復為吏部尚書母憂以毀卒諡曰孝子孺少與從兄苞孝綽齊名苞早卒孝綽數坐免黜位並不高唯孺貴顯有文集二十卷孺弟覽覽字孝智十六通老易位中書郎以所生母憂廬于墓再期不嘗鹽酪食麥粥而已隆冬止著單布衣家人慮不勝喪中夜竊置炭於牀下覽因暖得寐及覺知之號慟歐血梁武帝聞其至性數使省視服闋除尚書左丞性聰敏尚書令史七百人一見並記名姓當官清正無所私從兄吏部郎孝綽在職頗通贓貨覽劾奏免官孝綽怨之常謂人曰犬噬行路覽噬家人出為始興內史居郡尤勵清節復為左丞卒官覽弟遵遵字孝陵少清雅有學行工屬文為晉安王綱宣惠雲麾二府記室甚見賓禮王立為皇太子仍除中庶子遵自隨蕃及在東宮以舊恩偏蒙寵遇時輩莫及卒官皇太子深悼惜之與遵從兄陽羡令孝儀令曰賢從弟中庶奄至殞逝痛可言乎其孝友淳深立身貞固內含玉潤外表瀾清言行相符終始如一文史該富琬琰為心辭章博贍玄黃成采既以鳴謙表性又以難進自居吾昔在漢南連翩書記及忝朱方從容坐首鷁舟乍動朱鷺徐鳴未嘗一日而不追隨一時而不會遇益者三友此實其人及弘道下邑未申善政而能使人結去思野多馴翟此亦威鳳一羽足以驗其五德其見愛賞如此苞字孝嘗一字孟嘗悛弟子也父愃位太子中庶子苞三歲而孤至六七歲見諸父常泣時伯叔父悛繪等並顯貴其母謂其畏憚怒之苞曰早孤不及有識聞諸父多相似故心中悲耳因而歔欷母亦悲慟初苞父母及兩兄相繼亡歿悉假瘞焉苞年十六始移墓所經營改葬不資諸父奉君母朱夫人及所生陳氏並扇席溫枕叔父繪常歎伏之少好學能屬文家有舊書例皆殘蠹手自編緝筐篋盈滿梁初以臨川王妃弟故自征虜主簿遷右軍功曹纍遷太子洗馬掌書記侍講壽光殿及從兄孝綽等並以文藻見知多預宴坐受詔詠天泉池荷及採菱調下筆即成天監十年卒臨終呼友人南陽劉之遴託以喪事從儉苞居官有能名性和直與人交面折其非退稱其美士友咸以此歎惜之繪字士章愃弟也初為齊高帝行參軍帝歎曰劉公為不亡也及豫章王嶷鎮江陵繪為鎮西外兵參軍以文義見禮時琅邪王詡為功曹以吏能自進嶷謂僚佐曰吾雖不能得應嗣陳蕃然閣下自有二驥也性通悟出為南康相郡人有姓賴所居名穢里刺謁繪繪戲嘲之曰君有何穢而居穢里此人應聲曰未審孔丘何闕而居闕里繪默然不答亦無忤意歎其辨速後歷位中書郎掌詔誥敕助國子祭酒何胤撰修禮儀永明末都下人士盛為文章談義皆湊竟陵西邸繪為後進領袖時張融以言辭辨捷周顒彌為清綺而繪音采贍麗雅有風則時人為之語曰三人共宅夾清漳張南周北劉中央言其處二人間也魚復侯子響誅後豫章王嶷欲求葬之召繪為表言其事繪須臾便成嶷歎曰禰衡何以過此唯足八字云提攜鞠養俯見成人後魏使至繪以辭辨被敕接使事畢當撰語辭繪謂人曰無論潤色未易但得我語亦難矣隆昌中兄悛坐事將見誅繪伏闕請代兄死明帝輔政救之乃免死明帝即位為太子中庶子安陸王寶晊為湘州以繪為冠軍長史長沙內史行湘州事寶晊妃悛女也寶晊愛其侍婢繪奪取具以啓聞寶晊以為恨與繪不協遭母喪去官有至性服闋為晉安王征北長史南東海太守行南徐州事及梁武起兵朝廷以繪為雍州刺史固讓不就衆以朝廷昏亂為之寒心繪終不受乃改用張欣泰轉繪建安王車騎長史行府國事及東昏見殺城內遣繪及國子博士范雲等齎其首詣梁武帝於石頭轉大司馬從事中郎卒子孝綽孝綽字孝綽本名冉幼聰敏七歲能屬文舅齊中書郎王融深賞異之與同載以適親友號曰神童融每曰天下文章若無我當歸阿士阿士即孝綽小字也父繪齊時掌詔誥孝綽時年十四繪常使代草之父黨沈約任昉范雲等聞其名命駕造焉昉尤相賞好范雲年長繪十餘歲其子孝才與孝綽年並十四五及雲遇孝綽便申伯季乃命孝才拜之兼善草隸自以書似父乃變為別體梁天監初起家著作佐郎為歸沐詩贈任昉昉報曰彼美洛陽子投我懷秋作詎慰耋嗟人徒深老夫託直史兼褒貶轄司專疾惡九折多美疹匪報庶良藥其為名流所重如此後遷兼尚書水部郎奉啓陳謝手敕答曰美錦未可便製簿領亦宜稍習頃之即真武帝時因宴幸令沈約任昉等言志賦詩孝綽亦見引嘗侍宴於坐作詩七首武帝覽其文篇篇嗟賞由是朝野改觀纍遷祕書丞武帝謂舍人周捨云第一官當知用第一人故以孝綽居此職後為太子僕掌東宮管記時昭明太子好士愛文孝綽與陳郡殷藝吳郡陸倕琅邪王筠彭城到洽等同見禮太子起樂賢堂乃使先圖孝綽太子文章羣才咸欲撰録太子獨使孝綽集而序之遷兼廷尉卿初孝綽與到溉兄弟甚狎溉少孤宅近僧寺孝綽往溉許適見黃臥具孝綽謂僧物色也撫手笑溉知其旨奮拳擊之傷口而去又與洽同遊東宮孝綽自以才優於洽每於宴坐嗤鄙其文洽深銜之及孝綽為廷尉攜妾入廷尉其母猶停私宅洽尋為御史中丞遣令史劾奏之云攜少妹於華省棄老母於下宅武帝為隱其惡改妹字為姝孝綽坐免官諸弟時隨蕃皆在荊雍乃與書論共洽不平者十事其辭皆訴到氏又寫別本封至東宮昭明太子命焚之不開視孝綽免職後武帝數使僕射徐勉宣旨慰撫之每朝宴常預焉及武帝為籍田詩又使勉先示孝綽時奉詔作者數十人帝以孝綽詩工即日起為西中郎湘東王咨議參軍遷黃門侍郎尚書吏部郎坐受人絹一束為餉者所訟左遷信威臨賀王長史晚年忽忽不得志後為祕書監初孝綽居母憂冬月飲冷水因得冷癖以大同五年卒官年五十九孝綽少有盛名而仗氣負才多所陵忽有不合意極言詆訾領軍臧盾太府卿沈僧畟等並被時遇孝綽尤輕之每於朝集會同處公卿間無所與語反呼騶卒訪道途間事由此多忤於物前後五免孝綽辭藻為後進所宗時重其文每作一篇朝成暮遍好事者咸誦傳寫流聞河朔亭苑柱壁莫不題之文集數十萬言行於時兄弟及羣從子姪當時有七十人並能屬文近古未之有也其三妹一適琅邪王叔英一適吳郡張嵊一適東海徐悱並有才學悱妻文尤清拔所謂劉三娘者也悱為晉安郡卒喪還建鄴妻為祭文辭甚悽愴悱父勉本欲為哀辭及見此文乃閣筆孝綽子諒字求信小名春少好學有文才尤悉晉代故事時人號曰皮𩹉晉書位中書宣城王記室為湘東王所善王嘗遊江濱歎秋望之美諒對曰今日可謂帝子降於北渚王有目疾以為刺己應曰卿言目眇眇以愁豫邪從此嫌之孝綽弟潛字孝儀幼孤與諸兄弟相勗以學並工屬文孝綽嘗云三筆六詩三即孝儀六謂孝威也舉秀才纍遷尚書殿中郎敕令製雍州平等寺金像碑文甚宏麗晉安王綱鎮襄陽引為安北功曹史及王為皇太子仍補洗馬遷中舍人出為陽羡令甚有稱績後為中書郎以公事左遷安西咨議參軍兼散騎常侍使魏還除中書郎纍遷尚書左丞長兼御史中丞在職多所彈糾無所顧望當時稱之出為臨海太守時政網疏闊百姓多不遵禁孝儀下車宣下條制勵精綏撫境內翕然風俗大變入遷都官尚書太清元年出為豫章內史侯景寇建鄴孝儀遣子勵帥郡兵三千隨前衡州刺史韋粲入援及宮城不守孝儀為前歷陽太守莊鐵所逼失郡卒孝儀為人寬厚內行尤篤第二兄孝熊早卒孝儀奉寡嫂甚謹家內巨細必先咨決與妻子朝夕供事未嘗失禮時人以此稱之有文集二十卷行於世第五弟孝勝位尚書右丞兼散騎常侍聘魏還為安西武陵王紀長史蜀郡太守紀僭號於蜀以為尚書僕射隨紀出峽口兵敗被執元帝宥之以為司徒右長史第六弟孝威氣調爽逸風儀俊舉初為安北晉安王法曹後為太子洗馬中舍人庶子率更令並掌管記大同中白雀集東宮孝威上頌甚美太清中遷中庶子兼通事舍人及侯景寇亂隨司州刺史柳仲禮至安陸卒第七弟孝先位武陵王主簿與兄孝勝俱隨紀軍出峽口兵敗元帝以為黃門郎遷侍中瑱字士溫繪弟也少有行業文藻篆隸丹青並為當世所稱時有滎陽毛惠遠善畫馬瑱善畫婦人並為當世第一瑱妹為齊鄱陽王妃伉儷甚篤王為齊明帝所誅妃追傷遂成痼疾醫所不療有陳郡殷蒨善寫人面與真不別瑱令蒨畫王形像並圖王平生所寵姬共照鏡狀如欲偶寢瑱乃密使媼嬭示妃妃視畫仍唾之因罵云故宜其早死於是恩情即歇病亦除差此姬亦被廢苦因即以此畫焚之瑱仕齊歷尚書吏部郎義興太守先繪卒論曰當泰始之際二殷去就不同原始要終各以名節自立孝祖玩敵而亡蓋其宜也劉勔出征久撫所在流譽行己之節赴蹈為期雖古之忠烈亦何以加此悛至性過人繪辭義克舉諸子各擅雕龍當年方駕文采之盛殆難繼乎孝綽中冓為尤可謂人而無儀者矣
