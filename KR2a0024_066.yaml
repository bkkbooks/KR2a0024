body:
  text: 南史卷六十六列傳第五十六杜僧明周文育子寶安侯瑱侯安都歐陽頠子紇黃法淳于量章昭達吳明徹裴子烈杜僧明字弘照廣陵臨澤人也形貌眇小而有膽氣善騎射梁大同中盧安興為新州刺史南江督護僧明與兄天合及周文育並為安興所啟請與俱行頻征俚獠有功為新州助防天合亦有材幹預在征伐安興死僧明復副其子子雄及交州豪士李賁反逐刺史蕭諮諮奔廣州臺遣子雄與高州刺史孫冏討賁時春草已生瘴癘方起子雄請待秋討之廣州刺史新渝侯蕭映不聽蕭諮又促之子雄等不得已遂行至合浦死者十六七衆並憚役潰散禁之不可乃引其餘兵退還蕭諮啟子雄及冏與賊交通逗遛不進梁武帝敕於廣州賜死子雄弟子略子烈並豪俠家屬在南江天合謀於衆曰盧公累葉待遇我等亦甚厚矣今見枉死而不能為報非丈夫也我弟僧明萬人之敵若圍州城召百姓誰敢不從城破斬二侯然後待臺使至束手詣廷尉死猶勝生縱其不捷亦無恨矣衆咸慷慨曰是所願也唯足下命之乃與周文育等率衆結盟奉子雄弟子略為主以攻刺史蕭映子略頓城南天合頓城北僧明文育分據東西吏人並應之一日之中衆至數萬陳武帝時在高要聞事起率衆來討大破之殺天合禽僧明及文育等並釋之引為主帥武帝征交阯及討元景仲僧明文育並有功侯景之亂俱隨武帝入援建鄴武帝於始興破蘭裕僧明為前鋒斬裕又與蔡路養戰於南野僧明馬被傷武帝馳救之以所乘馬授僧明僧明上馬復進殺數十人因而乘之大敗路養高州刺史李遷仕又據大臯入灨石以逼武帝武帝遣周文育為前軍與僧明擊走之遷仕與寧都人劉孝尚并力將襲南康陳武又令僧明與文育等拒之相持連戰百餘日卒禽遷仕送于武帝及帝下南康留僧明頓西昌督安成廬陵二郡軍事梁元帝承制授新州刺史臨江縣子侯景遣于慶等寇南江武帝頓豫章命僧明為前驅所向剋捷武帝表僧明為長史仍隨東討軍至蔡洲僧明率麾下燒賊水門大艦及景平除南兗州刺史進爵為侯仍領晉陵太守及荊州覆亡武帝使僧明率吳明徹等隨侯瑱西援於江州病卒贈散騎常侍諡曰威陳文帝即位追贈開府儀同三司配享武帝廟庭子晉嗣周文育字景德義興陽羨人也少孤貧本居新安壽昌縣姓項氏名猛奴年十一能反覆游水中數里跳高六尺與羣兒聚戲衆莫能及義興人周薈為壽昌浦口戍主見而奇之因召與語文育對曰母老家貧兄弟姊並長大困於賦役薈哀之乃隨文育至家就其母請文育養為己子母遂與之及薈秩滿與文育還都見太子詹事周捨請制名字捨因為立名為文育字景德命兄子弘讓教之書計弘讓善隸書寫蔡邕勸學及古詩以遺之文育不之省謂弘讓曰誰能學此取富貴但有大槊耳弘讓壯之教之騎射文育大悅司州刺史陳慶之與薈同郡素相善啟薈為前軍軍主慶之使薈將五百人往新蔡懸瓠慰勞白水蠻蠻謀執薈以入魏事覺薈與文育拒之時賊徒甚盛一日中戰數十合文育前鋒陷陣勇冠軍中薈於陣戰死文育馳取其尸賊不敢逼及夕各引去文育身被九創創愈辭請還葬慶之壯其節厚加賵遺而遣之葬訖會盧安興為南江督護啟文育同行累征有功除南海令安興死後文育與杜僧明攻廣州為陳武帝所敗帝赦之後監州王勱以文育為長流深被委任勱被代文育欲與勱俱下至大庾嶺詣卜者卜者曰君北下不過作令長南入則為公侯文育曰足錢便可誰望公侯卜人又曰君須臾當暴得銀至二千兩若不見信以此為驗其夕宿逆旅有賈人求與文育博文育勝之得銀二千兩旦辭勱勱問其故文育以告勱乃遣之武帝聞其還大喜分麾下配焉武帝之討侯景文育與杜僧明為前軍剋蘭裕援歐陽頠皆有功武帝破蔡路養於南野文育為路養所圍四面數重矢石雨下所乘馬死文育右手搏戰左手解鞍潰圍而出與杜僧明等相得并力復進遂大敗之武帝乃表文育為府司馬李遷仕之據大臯遣其將軍杜平虜入灨石魚梁作城武帝命文育擊之平虜棄城走文育據其城遷仕聞平虜敗留老弱於大臯悉選精兵自將以攻文育文育與戰遷仕稍却相持未解會武帝遣杜僧明來援別破遷仕水軍遷仕衆潰不敢過大臯直走新淦梁元帝授文育義州刺史遷仕又與劉孝尚謀拒義軍武帝遣文育與侯安都杜僧明徐度杜稜築城於白口拒之文育頻出與戰遂禽遷仕武帝發自南康遣文育將兵五千開通江路侯景將王伯醜據豫章文育擊走之遂據其城累功封東遷縣侯武帝軍至白茅灣命文育與杜僧明常為軍鋒及至姑孰與侯景將侯子鑒戰破之景平改封南移縣侯累遷散騎常侍武帝誅王僧辯令文育督衆軍會文帝於吳興圍剋杜龕又濟江襲會稽太守張彪得其郡城及文帝為彪所襲文育時頓城北香巖寺文帝夜往趨之彪又來攻文育苦戰遂破平彪武帝以侯瑱擁據江州命文育討之仍除南豫州刺史率兵襲盆城未剋徐嗣徽引齊人度江據蕪湖詔徵文育還都嗣徽等乃列艦於青墩至于七磯以斷文育歸路及夕文育鼓譟而發嗣徽等不能制至旦反攻嗣徽嗣徽驍將鮑砰獨以小艦殿文育乘單舴艋跳入砰艦斬砰仍牽其艦而還賊衆大駭因留船蕪湖自丹陽步上時武帝拒嗣徽於白城適與文育會將戰風急武帝曰矢不逆風文育曰事急矣當決之何用古法抽槊上馬而進衆軍隨之風亦尋轉殺傷數百人嗣徽等移營莫府山文育徙頓對之頻戰功最進爵壽昌縣公給鼓吹一部及廣州刺史蕭勃舉兵踰嶺詔文育督衆軍討之時新吳洞主余孝頃舉兵應勃遣其弟孝勱守郡城自出豫章據于石頭勃使其子孜將兵與孝頃相會又遣其別將歐陽頠頓軍苦竹灘傅泰據咵口城以拒官軍官軍船少孝頃有舴艋三百艘艦百餘乘在上牢文育遣軍主焦僧度羊柬潛軍襲之悉取而歸仍於豫章立柵時官軍食盡欲退還文育不許乃使人間行遺周迪書約為兄弟并陳利害迪得書甚喜許饋以糧於是文育分遣老小乘故船舫沿流俱下燒豫章所立柵偽退孝頃望之大喜因不設備文育由間道信宿達芊韶芊韶上流則歐陽頠蕭勃下流則傅泰余孝頃文育據其中間築城饗士賊徒大駭歐陽頠乃退入泥溪作城自守文育遣嚴威將軍周鐵武與長史陸山才襲頠禽之於是盛陳兵甲與頠乘舟而宴以巡傅泰城下因攻泰剋之蕭勃在南康聞之衆皆股慄其將譚世遠斬勃欲降為人所害世遠軍主夏侯明徹持勃首以降蕭孜余孝頃猶據石頭武帝遣侯安都助文育攻之孜降文育孝頃退走新吳廣州平文育還頓豫章以功授開府儀同三司王琳擁據上流詔侯安都為西道都督文育為南道都督同會武昌與琳戰於沌口為琳所執後得逃歸請罪詔不問復其官爵及周迪破余孝頃孝頃子公颺弟孝勱猶據舊柵擾動南土武帝復遣文育及周迪黃法等討之豫章內史熊曇朗亦率衆來會文育遣吳明徹為水軍配周迪運糧自率衆軍入象牙江築城於金口公颺偽降謀執文育事覺文育囚之送都以其部曲分隸衆軍乃捨舟為步軍進據三陂王琳遣將曹慶救孝勱分遣主帥常衆愛與文育相拒自帥所領攻周迪吳明徹軍迪等敗文育退據金口熊曇朗因其失利謀害文育以應衆愛文育監軍孫白象頗知其事勸令先之文育曰不可我舊兵少客軍多若取曇朗人皆驚懼亡立至矣不如推心撫之初周迪之敗棄船走莫知所在及得迪書文育喜齎示曇朗曇朗害之於坐武帝聞之即日舉哀贈侍中司空諡曰忠愍初文育之據三陂有流星墜地其聲如雷地陷方一丈中有碎炭數斗又軍市中忽聞小兒啼一市並驚聽之在土下軍人掘焉得棺長三尺文育惡之俄而迪敗文育見殺天嘉二年有詔配享武帝廟庭子寶安嗣文育本族兄景曜因文育官至新安太守寶安字安人年十餘歲便習騎射以貴公子驕蹇游逸好狗馬樂驅馳靡衣媮食文育之為晉陵以征討不遑之郡令寶安監知郡事尤聚惡少年武帝患之及文育西征敗績縶於王琳寶安便折節讀書與士君子游綏御文育士卒甚有威惠文育歸復除吳興太守文育為熊曇朗所害徵寶安還起為猛烈將軍領其舊兵仍令南討文帝即位深器重之寄以心膂精卒多配焉及平王琳頗有功周迪之破熊曇朗寶安南入窮其餘燼天嘉二年重拜吳興太守襲封壽昌縣公三年征留異為侯安都前軍異平除給事黃門侍郎衞尉卿再遷左衞將軍領衞尉卿卒諡曰成子禩嗣位晉陵定遠二郡太守侯瑱字伯玉巴西充國人也父弘遠累世為西蜀酋豪蜀賊張文艹口咢據白崖山有衆萬人梁益州刺史鄱陽王蕭範命弘遠討之弘遠戰死瑱固請復讎每戰先鋒遂斬文艹口咢由是知名因事範範委以將帥之任山谷夷獠不附者並遣瑱征之累功授輕車府中兵參軍晉康太守範為雍州刺史瑱除馮翊太守範遷鎮合肥瑱又隨之侯景圍臺城範乃遣瑱輔其世子嗣入援都及城陷瑱嗣同退還合肥仍隨範徙鎮盆城俄而範及嗣皆卒瑱領其衆依于豫章太守莊鐵鐵疑之瑱懼不自安詐引鐵謀事因刃之據豫章之地後降於侯景將于慶慶送瑱於景景以瑱與己同姓託為宗族待之甚厚留其妻子及弟為質遣瑱隨慶平蠡南諸郡及景敗巴陵景將宋子仙任約等並為西軍所獲瑱乃誅景黨與以應義師景亦誅其弟及妻子梁元帝授瑱南兗州刺史郫縣侯仍隨都督王僧辯討景為前鋒既復臺城景奔吳郡僧辯使瑱追景大敗之於吳松江以功除南豫州刺史鎮姑孰及齊遣郭元建出濡須僧辯遣瑱扞之大敗元建魏攻荊州王僧辯以瑱為前軍赴援未至而魏剋荊州瑱頓九江因衞晉安王還都承制以瑱為侍中江州刺史加都督改封康樂縣公及司徒陸法和據郢州引齊兵來寇乃使瑱西討未至而法和入齊齊遣慕容恃德鎮夏首瑱攻之恃德食盡請和瑱還鎮豫章僧辯使其弟僧愔與瑱共討蕭勃及陳武帝誅僧辯僧愔陰欲圖瑱而奪其軍瑱知之盡收僧愔徒黨僧愔奔齊是時瑱據中流甚強又以本事王僧辯雖外示臣節未肯入朝初余孝頃為豫章太守及瑱鎮豫章乃於新吳縣別立城柵與瑱相拒瑱留軍人妻子於豫章令從弟奫知後事悉衆以攻孝頃自夏迄冬弗能剋奫與其部下侯方兒不協方兒下攻奫虜瑱軍府妓妾金玉歸于武帝瑱既失根本輕歸豫章豫章人拒之乃趨盆城就其將焦僧度僧度勸瑱投齊瑱以武帝有大量必能容己乃詣闕請罪武帝復其爵位永定二年進位司空文帝即位進授太尉王琳至柵口又以瑱為都督侯安都等並隸焉天嘉元年二月王琳引合肥漅湖之衆舳艫相次而下瑱率軍進獸檻洲明日合戰琳軍少却及夕東北風吹其舟艦並壞夜中有流星墜于賊營及旦風靜琳入浦以鹿角繞岸不敢復出時西魏將史寧躡其上流瑱聞之知琳不能持久收軍却據湖浦以待其弊及史寧至圍郢州琳恐衆潰乃率船東下去蕪湖十里而泊明日齊人遣兵助琳瑱令軍中晨炊蓐食頓蕪湖洲尾以待之將戰有微風至自東南衆軍施拍縱火定州刺史章昭達乘平虜大艦中江而進琳軍大敗脫走以免者十二三琳因此入齊其年詔以瑱為都督五州諸軍事鎮盆城周將賀若敦獨孤盛等來攻巴湘又以瑱為西討都督大敗盛軍以功授湘州刺史改封零陵郡公二年薨贈大司馬諡曰壯肅配享武帝廟庭子淨藏嗣尚文帝女富陽公主侯安都字成師始興曲江人也為郡著姓父捍少仕州郡以忠謹稱安都貴後官至光祿大夫始興內史安都工隸書能鼓琴涉獵書傳為五言詩頗清靡兼善騎射為邑里雄豪侯景之亂招集兵甲至三千人陳武帝入援臺城安都引兵從武帝攻蔡路養破李遷仕剋平侯景並力戰有功封富川縣子隨武帝鎮京口除蘭陵太守武帝謀襲王僧辯唯與安都定計仍使安都率水軍自京口趣石頭武帝自從江乘羅落會之安都至石頭北棄舟登岸僧辯弗之覺石頭城北接岡阜不甚危峻安都被甲帶長刀軍人捧之投於女垣內衆隨而入進逼僧辯臥室武帝大軍亦至與僧辯戰于聽事前安都自內閤出腹背擊之遂禽僧辯以功授南徐州刺史武帝東討杜龕安都留臺居守徐嗣徽任約等引齊寇入據石頭游騎至于闕下安都閉門示弱令城中登陴看賊者斬及夕賊收軍還石頭安都夜令士卒密營禦敵之具將旦賊騎至安都與戰大敗之賊乃退還石頭不敢逼臺城及武帝至以安都為水軍於中流斷賊糧運又襲秦郡破嗣徽柵收其家口得嗣徽所彈琵琶及所養鷹遣信餉之曰昨至弟住處得此今以相還嗣徽等見之大懼尋求和武帝聽其還北及嗣徽等濟江齊之餘軍猶據采石守備甚嚴又遣安都攻之多所俘獲明年春詔安都率兵鎮梁山以備齊徐嗣徽等復入至湖熟武帝追安都還拒之戰於耕壇南安都率十二騎突其陣破之禽齊儀同乞伏無芳又刺齊將東方老墮馬會賊騎至救老獲免賊北度蔣山安都又與齊將王敬寶戰於龍尾使從弟曉軍主張纂前犯其陣曉被創墜馬張纂死之安都馳往救曉斬其騎士十二人取纂尸而還齊軍不敢逼武帝與齊軍戰於莫府山命安都自白下橫擊其後大敗之以功進爵為侯又進號平南將軍改封西江縣公仍督水軍出豫章助豫州刺史周文育討蕭勃安都未至文育已斬勃并禽其將歐陽頠傅泰等唯余孝頃與勃子孜猶於豫章之石頭作兩城孝頃與孜各據其一又多設船艦夾水而陣安都至乃銜枚夜燒其艦文育率水軍安都領步騎登岸結陣孝頃俄斷後路安都乃令軍士竪柵引營漸進頻致剋獲孜乃降孝頃奔歸新吳請入子為質許之以功加開府儀同三司仍率衆會武昌與周文育西討王琳將發王公以下餞於新林安都躍馬度橋人馬俱墜水中又坐內墜於櫓井時以為不祥至武昌琳將樊猛棄城走文育亦自豫章至時兩將俱行不相統攝因部下交爭稍不平軍至郢州琳將潘純於城中遙射官軍安都怒圍之未剋而王琳至弇口安都乃釋郢州悉衆往沌口以禦之遇風不得進琳據東岸官軍據西岸相持數日乃合戰安都等敗與周文育徐敬成並為琳囚總以一長鎖繫之置于下令所親宦者王子晉掌視之琳下至盆城白水浦安都等甘言許賂子晉子晉乃偽以小船依而釣夜載安都文育敬成上岸入深草步投官軍還都自劾詔並赦之復其官爵尋為丹陽尹出為南豫州刺史令繼周文育攻余孝勱及王琳將曹慶常衆愛等安都自宮亭湖出松門躡衆愛後文育為熊曇朗所害安都回取大艦遇琳將周炅周協南歸與戰破之禽炅協孝勱弟孝猷率部下四千家欲就王琳遇炅敗乃詣安都降安都又進軍於禽奇洲破曹慶常衆愛等焚其船艦衆愛奔廬山為村人所殺餘衆悉平還軍至南皖而武帝崩安都隨文帝還朝乃與羣臣議翼奉文帝時帝謙讓弗敢當太后又以衡陽王故未肯下令羣臣不能決安都曰今四方未定何暇及遠臨川王有功天下須共立之今日之事後應者斬便按劍上殿白太后出璽又手解文帝髮推就喪次文帝即位遷司空仍授南徐州刺史給扶王琳下至柵口大軍出頓蕪湖時侯瑱為大都督而指麾經略多出安都及王琳入齊安都進軍盆城討琳餘黨所向皆下仍別奉中旨迎衡陽獻王昌初昌之將入致書於文帝辭甚不遜帝不懌召安都從容而言曰太子將至須別求一蕃吾其老焉安都對曰自古豈有被代天子愚臣不敢奉詔因自迎昌中流而殺之以功進爵清遠郡公自是威名甚重羣臣無出其右安都父捍為始興內史卒於官文帝徵安都為發喪尋起復本官贈其父散騎常侍金紫光祿大夫拜其母為清遠國太夫人仍迎赴都母固求停鄉里上乃下詔改桂陽郡之汝城縣為盧陽郡分衡州之始興安遠二郡合三郡為東衡州以安都從弟曉為刺史安都第三子祕年九歲上以為始興內史並令在鄉侍養改封安都桂陽郡公王琳敗後周兵入據巴湘安都奉詔西捍及留異擁據東陽又奉詔東討異本謂臺軍自錢唐江上安都乃步由會稽之諸暨出永康異大恐奔桃枝嶺處巖谷間竪柵以拒守安都躬自接戰為流矢所中血流至踝安都乘輿麾軍容止不變因其山隴為堰屬夏潦水漲安都引船入堰樓艦與異城等放拍碎其樓雉異與第二子忠臣脫身奔晉安虜其妻子振旅而歸加侍中征北大將軍仍還本鎮吏人詣闕表請立碑頌美安都功績詔許之自王琳平後安都勳庸轉大又自以功安社稷漸驕矜招聚文武士騎馭馳騁或命以詩筆第其高下以差次賞賜之文士則褚玠馬樞陰鏗張正見徐伯陽劉刪祖孫登武士則蕭摩訶裴子烈等並為之賓齋內動至千人部下將帥多不遵法度檢問收攝則奔歸安都文帝性嚴察深銜之安都日益驕慢表啟封訖有事未盡乃開封自書之云又啟某事及侍宴酒酣或箕踞傾倚嘗陪樂游禊飲乃白帝曰何如作臨川王時帝不應安都再三言之帝曰此雖天命抑亦明公之力宴訖又啟便借供張水飾將載妻妾於御堂歡會帝雖許其請甚不懌明日安都坐於御坐賓客居羣臣位稱觴上壽初重雲殿災安都率將士帶甲入殿帝甚惡之自是陰為之備又周迪之反朝望當使安都討之帝乃使吳明徹討迪又頻遣臺使案問安都部下檢括亡叛安都內不自安天嘉三年冬遣其別駕周弘實自託於舍人蔡景歷并問省中事景歷錄其狀奏之稱安都謀反帝慮其不受召明年春乃除安都為征南大將軍江州刺史自京口還都部伍入於石頭帝引安都宴於嘉德殿又集其部下將帥會于尚書朝堂於坐收安都囚于西省又收其將帥盡奪馬仗而釋之因出景歷表於朝乃下詔暴其罪明日於西省賜死尋有詔宥其妻子家口葬以士禮初武帝嘗與諸將宴杜僧明周文育侯安都為壽各稱功伐帝曰卿等悉良將也而並有所短杜公志大而識暗狎於下而驕於尊矜其功不收其拙周侯交不擇人而推心過差居危履嶮猜防不設侯郎誕而無厭輕佻而肆志並非全身之道卒皆如言太建三年宣帝追封安都陳集縣侯子亶為嗣歐陽頠字靖世長沙臨湘人也為郡豪族少質直有思理以言行著於嶺表父喪哀毀甚至家產累積悉讓諸兄廬於麓山寺傍專精習業博通經史年三十其兄逼令從宦梁左衞將軍蘭欽少與頠善故頠常隨欽征討欽南征夷獠禽陳文徹所獲不可勝計獻大銅鼓累代所無頠預其功還為直閤將軍欽征交州復啟頠同行欽度嶺而卒頠除臨賀內史啟乞送欽喪還都然後之任時湘衡界五十餘洞不賓敕衡州刺史韋粲討之粲委頠為都督悉皆平殄侯景構逆粲自解還都征景以頠監衡州臺城陷後嶺南互相吞併蘭欽弟前高州刺史裕攻始興內史蕭昭基奪其郡以兄欽與頠舊遣招之頠不從謂使曰高州昆季隆顯莫非國恩今應赴難援都豈可自為跋扈及陳武帝入援都將至始興頠乃深自結託裕遣兵攻頠武帝援之裕敗武帝以王懷明為衡州刺史遷頠為始興內史武帝之討蔡路養李遷仕也頠助帝平之梁元帝承制以始興郡為東衡州以頠為刺史封新豐縣伯侯景平元帝徧問朝宰使各舉所知羣臣未對元帝曰吾已得一人矣歐陽頠甚公正本有匡濟才恐蕭廣州不肯致之乃授武州刺史尋授郢州欲令出嶺蕭勃留之不獲拜命尋授衡州刺史進封始興縣侯時蕭勃在廣州兵強位重元帝深患之遣王琳代為刺史琳已至小桂嶺勃遣其將孫瑒監州盡率部下至始興避琳兵鋒頠別據一城不往謁勃閉門高壘亦不拒戰勃怒遣兵襲頠盡收其貲財馬仗尋赦之還復其所復與結盟魏平荊州頠委質於勃及勃度嶺出南康以頠為前軍都督周文育破禽之送于武帝帝釋而禮之蕭勃死後嶺南亂頠有聲南土且與武帝有舊乃授安南將軍衡州刺史封始興縣侯未至嶺頠子紇已剋始興及頠至嶺南皆懾伏仍進廣州盡有越地改授都督交廣等十九州諸軍事平越中郎將廣州刺史王琳據有中流頠自海道及東嶺奉使不絕永定三年即本號開府儀同三司文帝即位進號征南將軍改封陽山郡公初交州刺史袁曇緩密以金五百兩寄頠令以百兩還合浦太守襲蒍四百兩付兒智矩餘人弗之知頠尋為蕭勃所破貲財並盡唯所寄金獨存曇緩亦尋卒至是頠並依信還之時人莫不歎伏之時頠合門顯貴威振南土又多致銅鼓生口獻奉珍異前後委積頗有助軍國天嘉四年薨贈司空諡曰穆子紇嗣紇字奉聖頗有幹略襲父官爵在州十餘年威惠著於百越宣帝以紇久在南服頗疑之太建元年徵為左衞將軍其部下多勸之反遂舉兵攻衡州刺史錢道戢詔儀同章昭達討禽之送至都伏誅子詢以年幼免黃法字仲昭巴山新建人也少勁捷有膽力日步行二百里能距躍三丈頗便書疏閑明簿領出入州郡中為鄉閭所憚侯景之亂於鄉里合徒衆太守賀詡下江州法監知郡事陳武帝將踰嶺入援建鄴李遷仕作梗中途武帝命周文育屯西昌法遣兵助文育時法出頓新淦縣景遣行臺于慶來襲新淦法敗之梁元帝承制授交州刺史資領新淦縣令封巴山縣子敬帝即位改封新建縣侯太平元年割江州四郡置高州以法為刺史鎮巴山蕭勃遣歐陽頠來攻法破之永定二年王琳遣李孝欽樊猛余孝頃攻周迪且謀取法法援迪禽孝頃等三將以功授平南將軍開府儀同三司熊曇朗於金口害周文育法共周迪討平之天嘉三年周迪反法與吳明徹討平迪法功居多廢帝即位進爵為公太建五年大舉北侵法為都督出歷陽於是為拋車及步艦竪拍以逼之砲加其樓堞剋之盡誅其戍卒進兵合肥望旗降款法禁侵掠躬自勞撫而與之盟並放還北以功加侍中改封義陽郡公七年為豫州刺史鎮壽陽薨贈司空諡曰威子玩嗣淳于量字思明其先濟北人也世居建鄴父文成仕梁為將帥位梁州刺史量少善自居處偉姿容有幹略便弓馬梁元帝為荊州刺史文成分量人馬令往事焉以軍功封廣晉縣男侯景之亂梁元帝凡遣五軍入援臺量預其一臺城陷量還荊州元帝承制以為巴州刺史侯景西上攻巴州元帝使都督王僧辯入據巴陵量與僧辯并力拒景大敗之禽其將任約進攻郢州獲宋子仙仍隨僧辯平侯景封謝沐縣侯尋出為都督桂州刺史及魏剋荊州量保桂州王琳擁割湘郢累遣召量量外雖與琳往來而別遣使歸陳武帝武帝受禪進位鎮西大將軍開府儀同三司天嘉五年徵為中撫軍大將軍量所部將率多戀本土並欲逃入山谷不願入朝文帝使湘州刺史華皎征衡州且以兵迎量天康元年至都以在道淹留為有司奏免儀同餘如故華皎構逆以量為征南大將軍西討大都督總率大艦自郢州樊浦拒之皎平并降周將長湖公元定等以功授侍中中軍大將軍開府儀同三司進封醴陵縣公未拜出為南徐州刺史太建元年進號征北大將軍給扶三年就江陰王蕭季卿買梁陵中樹季卿坐免量免侍中尋復侍中吳明徹之北侵也量讚成其事又遣第六子岑率所領從軍淮南剋定量改封始安郡公及周獲吳明徹乃以量為都督水陸諸軍事車騎將軍都督南兗州刺史十四年薨贈司空章昭達字伯通吳興武康人也性倜儻輕財尚氣少時遇相者謂曰卿容貌甚善須小虧則當富貴梁大同中昭達為東宮直後因醉墯馬鬢角小傷昭達喜之相者曰未也侯景之亂昭達率鄉人援臺為流矢所中眇其一目相者見之曰卿相善矣不久當富貴臺城陷昭達還鄉里與陳文帝游因結君臣分侯景平文帝為吳興太守昭達杖策來謁文帝見之大喜因委以將帥恩寵超於儕等陳武帝謀討王僧辯令文帝還長城招聚兵衆以備杜龕頻使昭達往京口禀承計畫僧辯誅後杜龕遣其將杜泰來攻長城昭達因從文帝進軍吳興以討龕龕平又從討張彪於會稽剋之累功除定州刺史時留異擁據東陽武帝患之乃使昭達為長山令居其心腹天嘉元年追論長城功封欣樂縣侯尋隨侯安都拒王琳昭達乘平虜大艦中流而進先鋒發拍中賊艦王琳平昭達策勳第一二年除都督郢州刺史周迪據臨川反詔昭達便道征之迪敗走徵為護軍將軍改封邵武縣侯四年陳寶應納周迪共寇臨川又以昭達為都督討迪迪走昭達乃踰嶺討陳寶應與戰不利因據上流為筏施拍其上壞其水柵又出兵攻其步軍方大合戰會文帝遣余孝頃出自海道適至因并力乘之遂定閩中盡禽留異寶應以功授鎮軍將軍開府儀同三司初文帝嘗夢昭達升台鉉及旦以夢告之至是侍宴酒酣顧昭達曰卿憶夢不何以償夢昭達對曰當效犬馬之用以盡臣節自餘無以奉償尋出為都督江州刺史廢帝即位改封邵陵郡公華皎之反其移文並假以昭達為辭又頻遣使招之昭達盡執其使送都秩滿徵為中撫大將軍宣帝即位進號車騎大將軍以還朝遲留為有司所劾降號車騎將軍歐陽紇據嶺南反詔昭達都督衆軍征之紇聞昭達奄至乃出頓洭口聚沙石盛以竹籠置於水柵之外用遏舟艦昭達居其上流裝艦造拍以臨賊柵又令人銜刀潛行水中以斫竹籠籠篾皆解因縱大艦突之大敗紇禽之送都廣州平進位司空太建二年征江陵時梁明帝與周軍大蓄舟艦於青泥中昭達分遣偏將錢道戢程文季乘輕舟焚之周又於峽口南岸築壘名安蜀城於江上橫引大索編葦為橋以度軍糧昭達乃命軍士為長戟施樓船上仰割其索索斷糧絕因縱兵攻其城降之三年於軍中病薨贈大將軍昭達性嚴刻每奉命出征必晝夜倍道然其所剋必推功將帥膳飲食並同羣下將士亦以此附之每飲會必盛設女伎雜樂備羌胡之聲音律姿容並一時之妙雖臨敵弗之廢也四年配享文帝廟庭子大寶襲邵陵郡公位豐州刺史在州貪縱百姓怨酷後主以太僕卿李暈代之乃襲殺暈而反尋被禽梟首朱雀航夷三族吳明徹字通炤秦郡人也父樹梁右軍將軍明徹幼孤性至孝年十四感墳塋未修家貧無以取給乃勤力耕種時天下亢旱苗稼焦枯明徹哀憤每之田中號哭仰天自訴居數日有自田還者云苗已更生明徹疑其紿己及往如言秋而大穫足充葬用時有伊氏者善占墓謂其兄曰君葬日必有乘白馬逐鹿者經墳此是最小孝子大貴之徵至時果有應明徹即樹之小子也及侯景寇都明徹有粟麥三千餘斛而鄰里飢餧乃白諸兄曰今人不圖久奈何不與鄉里共此於是計口平分同其豐儉羣盜聞而避焉賴以存者甚衆陳武帝鎮京口深相要結明徹乃詣武帝帝為之降堦執手即席明徹亦微涉書史經傳就汝南周弘正學天文孤虛遁甲略通其術頗以英雄自許武帝亦深奇之及受禪授安南將軍與侯安都周文育將兵討王琳及衆軍敗沒明徹自拔還都文帝即位以本官加右衞將軍及周迪反詔以明徹為江州刺史領豫章太守總衆軍以討迪明徹雅性剛直統內不甚和文帝聞之遣安成王頊代明徹令以本號還朝天嘉五年遷吳興太守及引辭之郡帝謂曰吳興雖郡帝鄉之重故以相授廢帝即位授領軍將軍尋遷丹陽尹仍詔以甲仗四十人出入殿省到仲舉之矯令出宣帝也毛喜知其詐宣帝懼遣喜與明徹籌焉明徹曰嗣君諒闇萬機多闕殿下親實周召德冠伊霍願留中深計慎勿致疑及湘州刺史華皎陰有異志詔授明徹都督湘州刺史仍與征南大將軍淳于量等討皎皎平授開府儀同三司進爵為公太建五年朝議北征公卿互有異同明徹決策請行詔加侍中都督征討諸軍事總衆軍十餘萬發都緣江城鎮相續降款軍至秦郡齊大將軍尉破胡將兵為援破走之秦郡降宣帝以秦郡明徹舊邑詔具太牢令拜祠上冢文武羽儀甚盛鄉里榮之進剋仁州授征北大將軍進封南平郡公進逼壽陽齊遣王琳拒守明徹乘夜攻之中宵而潰齊兵退據相國城及金城明徹令軍中益修攻具又遏肥水灌城城中苦濕多腹疾手足皆腫死者十六七會齊遣大將皮景和率兵數十萬來援去壽春三十里頓軍不進諸將咸曰計將安出明徹曰兵貴在速而彼結營不進自挫其鋒吾知其不敢戰明矣於是躬擐甲冑四面疾攻城中震恐一鼓而禽王琳等送建鄴景和懼而遁走詔以為車騎大將軍豫州刺史增封并前三千五百戶遣謁者蕭淳就壽陽授策明徹於城南設壇士卒二十萬陳旗鼓戈甲登壇拜受成禮而退六年自壽陽入朝輿駕幸其第賜鐘磬一部七年進攻彭城軍至呂梁又大破齊軍八年進位司空給大都督鈇鉞龍麾尋授都督南兗州刺史及周滅齊宣帝將事徐兗九年詔明徹北侵令其世子慧覺攝行州事軍至呂梁周徐州總管梁士彥率衆拒戰明徹頻破之仍迮清水以灌其城攻之甚急環列舟艦於城下周遣上大將軍王軌救之軌輕行自清水入淮口橫流竪木以鐵鎖貫車輪遏斷船路諸將聞之甚恐議欲破堰拔軍以舫載馬馬明戌裴子烈曰君若決堰下船船必傾倒豈可得乎不如前遣馬出適會明徹苦背疾甚篤知事不濟遂從之乃遣蕭摩訶帥馬軍數千前還明徹仍自決其堰乘水力以退軍及至清口水力微舟艦並不得度衆軍皆潰明徹窮蹙乃就執周封懷德郡公位大將軍以憂遘疾卒於長安後故吏盜其柩歸至德元年詔追封邵陵侯以其息慧覺嗣裴子烈字大士河東聞喜人梁員外散騎常侍猗之子少孤有志氣以驍勇聞位北譙太守岳陽內史封海安伯論曰古人云知臣莫若君書曰知人則哲觀夫陳武論將而周侯遇禍有以知斯言之非妄矣若不然者亦何以驅駕雄傑而創基撥亂者乎故瑱頠並自奔囚翻同有亂量望風景附自等誠臣良有以也昭達勤王之略遠符耿弇行己之方頗同吳漢既眇而貴亦黥而王吉凶之算豈人事也明徹屬運否之期當闢土之任才非韓白識暗孫吳知進而不知止知得而不知喪犯斯不韙師亡國蹙宜矣哉
