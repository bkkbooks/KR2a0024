body:
  text: 南史卷二宋本紀中第二太祖文皇帝諱義隆小字車兒武帝第三子也晉義熙三年生於京口十一年封彭城縣公永初元年封宜都郡王位鎮西將軍荊州刺史加都督時年十四長七尺五寸博涉經史善隸書是歲來朝會武帝當聽訟仍遣上訊建康獄囚辨斷稱旨武帝甚悅景平初有黑龍見西方五色雲隨之二年江陵城上有紫雲望氣者皆以為帝王之符當在西方其年少帝廢百官議所立徐羡之傅亮等以禎符所集備法駕奉迎入奉皇統行臺至江陵尚書令傅亮奉表進璽紱州府佐吏並稱臣請題榜諸門一依宮省上皆不許教州府國綱紀宥所統內見刑是時司空徐羡之等新有弒害及鑾駕西迎人懷疑懼惟長史王曇首司馬王華南蠻校尉到彥之共期朝臣未有異志帝曰諸公受遺不容背二且勞臣舊將內外充滿今兵力又足以制物夫何所疑甲戌乃發江陵命王華知州府留鎮陝西令到彥之監襄陽車駕在道有黑龍躍負上所乘舟左右莫不失色上謂王曇首曰此乃夏禹所以受天命我何德以堪之及至都羣臣迎拜於新亭先謁初寧陵還次中堂百官奉璽紱沖讓未受勸請數四乃從之元嘉元年秋八月丁酉皇帝即位于中堂備法駕入宮御太極前殿大赦改元文武賜位二等戊戌拜太廟詔追復廬陵王先封奉迎靈柩辛丑謁臨川烈武王陵癸卯進司空徐羡之位司徒江州刺史王弘位司空尚書令傅亮左光祿大夫開府儀同三司甲辰追尊所生胡婕妤為章皇太后封皇弟義恭為江夏王義宣為竟陵王義季為衡陽王己酉減荊湘二州今年稅布之半九月丙子立妃袁氏為皇后是歲魏太武皇帝始光元年二年春正月丙寅司徒徐羡之尚書令傅亮奉表歸政上始親覽萬機辛未祀南郊大赦秋八月乙酉驃騎將軍南徐州刺史彭城王義康以本號開府儀同三司改授司空王弘車騎大將軍開府儀同三司冬十一月癸酉以武都王世子楊玄為北秦州刺史襲封武都王是歲赫連屈丐死三年春正月丙寅司徒徐羡之尚書令傅亮有罪伏誅遣中領軍到彥之征北將軍檀道濟討荊州刺史謝晦上親率六師西征大赦丁卯以江州刺史王弘為司徒録尚書事二月戊午以金紫光祿大夫王敬弘為尚書左僕射豫章太守鄭鮮之為右僕射戊辰到彥之檀道濟大破謝晦於隱磯丙子車駕自蕪湖反旆己卯禽晦於延頭送都伏誅夏五月乙未以征北將軍南兗州刺史檀道濟為征南大將軍開府儀同三司江州刺史乙巳驃騎大將軍涼州牧大且渠蒙遜改為車騎大將軍詔大使巡行四方觀省風俗丙午臨延賢堂聽訟自是每歲三訊秋旱且蝗冬十二月前吳郡太守徐佩之謀反伏誅四年春正月乙亥朔曲赦建鄴百里內辛巳祀南郊二月乙卯行幸丹徒謁京陵三月丙子宴丹徒宮帝鄉父老咸與焉蠲丹徒今年租布原五歲刑以下丁亥車駕還宮戊子尚書右僕射鄭鮮之卒壬寅採富陽令諸葛闡議禁斷夏至日五絲命縷之屬夏五月都下疾疫遣使存問給醫藥死無家屬者賜以棺器六月癸卯朔日有蝕之五年春正月乙亥詔以陰陽愆序求讜言甲申臨玄武館閲武戊子都下大火遣使巡慰振恤夏六月庚戌司徒王弘降為衛將軍開府儀同三司都下大水乙卯遣使檢行振贍十二月天竺國遣使朝貢是歲魏神元年太武皇帝伐赫連昌滅之乞伏熾盤死六年春正月辛丑祀南郊癸丑以荊州刺史彭城王義康為司徒録尚書事三月丁巳立皇子劭為皇太子戊午大赦賜文武位一等夏四月癸亥以尚書左僕射王敬弘為尚書令丹陽尹臨川王義慶為尚書左僕射吏部尚書江夷為右僕射五月壬辰朔日有蝕之秋七月百濟國遣使朝貢冬十一月己丑朔日有蝕之星晝見十二月河西河南國並遣使朝貢七年春二月壬戌雪且雷三月戊子遣右將軍到彥之侵魏夏六月己卯封氐楊難當為武都王冬十月戊午立錢署鑄四銖錢戊寅魏剋金墉城十一月癸未又剋虎牢壬辰遣征南大將軍檀道濟拒魏右將軍到彥之自滑臺奔退十二月都下火延燒于太社北牆是歲馮跋死倭百濟呵羅單林邑呵羅他師子等國並遣使朝貢吳興晉陵義興大水遣使巡行振恤八年春二月辛酉魏剋滑臺癸酉檀道濟引軍還自是河南復亡三月大雩夏六月乙丑大赦旱故又大雩閏六月乙巳遣使省行獄訟簡息徭役九年春二月辛卯詔曰故太傅長沙景王故大司馬臨川烈武王故司徒南康文宣公穆之衛將軍華容公弘征南大將軍永修公道濟故左將軍龍陽侯鎮惡或履道廣深執德沖邈或雅量高劭風鑒明遠或識準弘正才略開邁咸文德以弘帝載武功以隆景業而太常未銘從祀闕享寤寐屬慮永言興懷便宜配祭廟庭勒功天府三月庚戌進衛將軍王弘為太保丁巳加江州刺史檀道濟為司空夏五月壬申新除太保王弘薨六月癸未置積射強弩將軍官乙未以征西將軍沙州刺史吐谷渾慕璝為征西大將軍西秦河二州刺史隴西王壬寅以撫軍將軍江夏王義恭為征北將軍開府儀同三司南兗州刺史秋七月庚午以領軍將軍殷景仁為尚書僕射冬十二月庚寅立皇子紹為廬陵王奉孝獻王祀江夏王義恭子朗為南豐王奉營陽王祀是歲魏延和元年十年春正月甲寅改封竟陵王義宣為南譙王己未大赦夏林邑闍婆娑州訶羅單國並遣使朝貢秋七月戊戌曲赦益梁秦三州冬十一月氐楊難當據有梁州是月且渠蒙遜死十一年夏四月梁秦二州刺史蕭思話破氐梁州平五月丁卯曲赦梁南秦二州劍閣以北戊寅以大且渠茂虔為征西大將軍涼州刺史封河西王是歲林邑扶南訶羅單國並遣使朝貢十二年春正月辛酉大赦辛未祀南郊癸酉封馮弘為燕王夏四月丙辰詔內外舉士都下地震六月禁酒師子國遣使朝貢丹陽淮南吳吳興義興大水都下乘船己酉以徐豫南兗三州會稽宣城二郡米穀百萬斛賜五郡遭水人秋七月辛酉闍婆娑達扶南國並遣使朝貢八月乙亥原除遭水郡諸逋負九月蜀賊張尋為寇是歲魏太延元年十三年春正月癸丑朔上有疾不朝會三月己未誅司空江州刺史檀道濟庚申大赦夏六月高麗武都等國並遣使朝貢秋七月己未零陵王太妃殂追崇為晉皇后葬以晉禮九月癸丑立皇子濬為始興王駿為武陵王是歲馮弘奔高麗十四年春正月辛卯祀南郊大赦戊戌鳳凰二見于都下衆鳥隨之改其地曰鳳凰里夏四月蜀賊張尋趙廣降遷之建鄴冬十二月辛酉初停賀雪河南河西訶羅單國並遣使朝貢十五年春二月以平東將軍吐谷渾慕延為鎮西將軍秦河二州刺史封隴西王秋七月辛未地震新作東宮是歲武都河南高麗倭扶南林邑等國並遣使朝貢立儒學館于北郊命雷次宗居之十六年春正月戊寅閲武于北郊庚寅進彭城王義康為大將軍領司徒以開府儀同三司江夏王義恭為司空夏六月己酉改封隴西王吐谷渾慕延為河南王秋八月庚子立皇子鑠為南平王九月魏滅且渠茂虔冬十二月乙亥皇太子冠大赦是歲武都河南林邑高麗等國並遣使朝貢上好儒雅又命丹陽尹何尚之立玄素學著作佐郎何承天立史學司徒參軍謝元立文學各聚門徒多就業者江左風俗於斯為美後言政化稱元嘉焉十七年夏四月戊午朔日有蝕之秋七月壬子皇后袁氏崩八月徐兗青冀四州大水遣使振恤九月壬子葬元皇后于長寧陵冬十月戊午前丹陽尹劉湛有罪伏誅大赦文武賜爵一級以大將軍領司徒録尚書事彭城王義康為江州刺史大將軍如故甲戌以司空江夏王義恭為司徒録尚書事十一月尚書僕射揚州刺史殷景仁卒十二月癸亥以光祿大夫王球為尚書僕射戊辰武都河南百濟等國並遣使朝貢是歲魏太平真君元年十八年春三月庚子雨雹戊申置尚書刪定郎官夏五月壬午衛將軍南兗州刺史臨川王義慶征北將軍南徐州刺史南譙王義宣並開府儀同三司甲申沔水泛溢害居人六月戊辰遣使巡行賑贍冬十一月戊子尚書僕射王球卒己亥以丹陽尹孟顗為尚書僕射氐楊難當寇漢川十二月晉寧太守爨松子舉兵反寧州刺史徐循討平之是歲河南肅特高麗蘇摩黎林邑等國並遣使來朝貢十九年夏四月甲戌上以久疾愈始奉初礿大赦五月庚寅梁秦二州刺史劉真道龍驤將軍裴方明破楊難當仇池平閏月都下水遣使巡行賑恤六月以大且渠無諱為征西大將軍涼州刺史封河西王秋七月甲戌晦日有蝕之九月丙辰有客星在北斗因為彗入文昌貫五車掃畢拂天節經天苑季冬乃滅冬十二月丙申詔奉聖之胤速議承襲及令修廟四時饗祀並命蠲近墓五家供灑掃栽松柏六百株是歲蠕蠕河南扶南婆皇國並遣使朝貢西涼武昭王孫李寶始歸于魏二十年春正月辛亥祀南郊二月甲申閲武於白下魏軍剋仇池夏四月甲午立皇子誕為廣陵王秋七月癸丑以楊文德為征西將軍北秦州刺史封武都王冬十月雷十二月壬午置藉田是歲河西高麗百濟倭國並遣使朝貢自去歲至是諸州郡水旱傷稼人大飢遣使開倉賑恤二十一年春正月己亥南徐南兗南豫州揚州之浙江西並禁酒辛酉親耕藉田大赦二月己丑司徒録尚書事江夏王義恭進位太尉領司徒辛卯立皇子宏為建平王秋八月戊辰以荊州刺史衡陽王義季為征北大將軍開府儀同三司南兗州刺史九月甲辰以大且渠安周為征西將軍涼州刺史封河西王冬十月己亥命刺史郡守修東耕丙子雷且電二十二年春正月辛卯朔改用御史中丞何承天元嘉新曆二月甲戌立皇子褘為東海王昶為義陽王秋七月己未以尚書僕射孟顗為左僕射中護軍何尚之為右僕射九月己未開酒禁癸酉宴于武帳堂上將行敕諸子且勿食至會所賜饌日旰食不至有飢色上誡之曰汝曹少長豐佚不見百姓艱難今使爾識有飢苦知以節儉期物冬十二月乙未太子詹事范曄謀反及黨與皆伏誅丁酉免大將軍彭城王義康為庶人絶屬籍是冬浚淮起湖熟廢田千餘頃二十三年夏四月丁未大赦六月癸未朔日有蝕之交州刺史檀和之伐林邑國剋之是歲大有年築北堤立玄武湖於樂游苑北興景陽山于華林園役重人怨二十四年春正月甲戌大赦賜文武位一等夏四月河濟俱清六月都下疫癘使巡省給醫藥以貨貴制大錢一當兩秋八月乙未徐州刺史衡陽王義季薨冬十一月甲寅立皇子渾為汝陰王是歲徐兗青冀四州大水二十五年春閏二月己酉大搜於宣武場三月庚辰校獵夏四月乙巳新作閶闔廣莫二門改先廣莫門曰承明開陽門曰津陽五月己卯罷當兩大錢六月庚戌零陵王司馬元瑜薨丙寅加荊州刺史南譙王義宣位司空八月甲子立皇子彧為淮陽王九月辛未以尚書右僕射何尚之為左僕射冬青州城南遠望見地中如水有影謂之地鏡二十六年春正月辛巳祀南郊二月己亥幸丹徒謁京陵三月丁巳宴于丹徒宮大赦復丹徒縣僑舊今歲租布之半行所經過蠲田租之半癸亥使祭晉故司空忠肅公何無忌墓五月壬午至自丹徒丙戌婆皇國壬辰婆達國並遣使朝貢冬十月庚子改封廣陵王誕為隨郡王癸卯彗星見于太微甲辰以揚州刺史始興王濬為征北將軍開府儀同三司徐兗二州刺史二十七年春正月辛卯百濟國遣使朝貢二月魏軍攻縣瓠以軍興減百官奉祿三分之一三月乙丑淮南太守諸葛闡求減奉祿同內百官於是諸州郡縣丞尉並悉同減戊寅罷國子學秋七月庚午遣寧朔將軍王玄謨拒魏太尉江夏王義恭出次彭城總統諸軍冬十一月丁未大赦十二月庚午魏太武帝率大衆至瓜步聲欲度江都下震懼咸荷擔而立壬午內外戒嚴緣江六七百里舳艫相接始議北侵朝士多有不同至是帝登烽火樓極望不悅謂江湛曰北伐之計同議者少今日士庶勞怨不得無慚貽大夫之憂在豫過矣甲申使饋百牢于魏二十八年春正月丁亥魏太武帝自瓜步退歸俘廣陵居人萬餘家以北徐豫青冀二兗六州殺略不可勝算所過州郡赤地無餘二月甲戌降太尉領司徒江夏王義恭為驃騎將軍開府儀同三司壬午幸瓜步是日解嚴三月乙酉車駕還宮丙申拜初寧陵大旱夏四月癸酉婆達國遣使朝貢己卯彗星見于昴是月都下疾疫使巡省給醫藥五月乙酉亡命司馬順則自號齊王據梁鄒城丁巳婆皇國戊戌河南國並遣使朝貢戊申以尚書左僕射何尚之為尚書令太子詹事徐湛之為左僕射護軍將軍壬子彗星見太微中對帝坐秋七月甲辰進安東將軍倭王綏濟為安東大將軍八月癸亥梁鄒平斬司馬順則是秋猛獸入郭內為災冬十月癸亥高麗國遣使朝貢十一月壬寅曲赦二兗徐豫青冀六州徙彭城流人於瓜步淮西流人于姑孰合萬許家是歲魏正平元年二十九年春正月甲午詔經寇六州仍逢災潦可量加救贍二月乙卯雷且雪戊午立皇子休仁為建安王三月壬午大風拔木都下火夏四月戊午訶羅單國遣使朝貢秋七月壬辰改封汝陰王渾為武昌王淮陽王彧為湘東王丁酉省大司農太子僕廷尉監官九月丁亥以平西將軍吐谷渾拾寅為安西將軍秦河二州刺史封河南王冬十一月壬寅揚州刺史廬陵王紹薨十二月戊辰黃霧四塞辛未以南兗州刺史江夏王義恭為大將軍南徐州刺史録尚書如故是歲魏中常侍宗愛構逆太武皇帝崩乃奉南安王余為帝改元為承平後又賊余於是殿中尚書長孫渴侯尚書陸麗奉皇孫是為文成皇帝改元曰興安三十年春正月乙亥朔會羣臣於太極前殿有青黑氣從東南來覆映宮上戊寅以司空荊州刺史南譙王義宣為司徒中軍將軍揚州刺史壬午以南徐州刺史始興王濬為衛將軍開府儀同三司荊州刺史戊子使江州刺史武陵王駿統衆軍伐西陽蠻二月甲子元凶劭搆逆帝崩于合殿時年四十七諡景皇帝廟號中宗三月癸巳葬長寧陵孝武帝踐阼追改諡曰文帝廟號太祖帝聰明仁厚雅重文儒躬勤政事孜孜無怠加以在位日久惟簡靖為心于時政平訟理朝野悅睦自江左之政所未有也又性存儉約不好奢侈車府令嘗以輦故請改易之又輦席舊以烏皮緣故欲代以紫皮上以竹未至於壞紫色貴並不聽改其率素如此云世祖孝武皇帝諱駿字休龍小字道人文帝第三子也元嘉七年八月庚午夜生有光照室少機穎神明爽發讀書七行俱下才藻甚美雄決愛武長於騎射十二年立為武陵王二十二年纍遷雍州刺史自晉江左以來襄陽未有皇子重鎮時文帝欲經略關河故有此授及魏太武大舉至淮南時帝鎮彭城魏使尚書李孝伯至帝遣長史張暢與語而帝改服觀之孝伯目帝不輟及出謂人曰張侯側有人風骨視瞻非常士也二十八年為都督江州刺史時緣江蠻為寇文帝遣太子步兵校尉沈慶之等伐之使上總統衆軍三十年正月出次西陽之五洲會元凶弒逆上率衆入討荊州刺史南譙王義宣雍州刺史臧質並舉義兵三月乙未建牙于軍門是時多不悉舊儀有一翁斑白自稱少從武帝征伐頗悉其事因使指麾事畢忽失所在自冬至春常東北風連陰不霽其日牙立之後風轉而西南景色開霽有紫雲二蔭于牙上四月辛酉上次溧洲丙寅次江寧丁卯大將軍江夏王義恭來奔奉表上尊號戊辰上至新亭己巳即皇帝位大赦改文帝號諡以大將軍江夏王義恭為太尉南徐州刺史庚午以荊州刺史南譙王義宣為中書監丞相揚州刺史並録尚書六條事以安東將軍隨王誕為衛將軍荊州刺史加雍州刺史臧質車騎將軍江州刺史並開府儀同三司撫軍將軍蕭思話為尚書左僕射壬申以征虜將軍王僧達為右僕射改新亭為中興亭夏五月乙亥輔國將軍朱修之剋東府丙子剋建鄴二凶及同逆並伏誅庚辰詔分遣大使巡省方俗是日解嚴辛巳幸東府城甲申尊所生路淑媛為皇太后乙酉立妃王氏為皇后壬辰以太尉江夏王義恭為太傅領大司馬甲午謁初寧陵曲赦建鄴二百里內並蠲今年租稅戊戌以撫軍將軍南平王鑠為司空建平王宏為尚書左僕射六月丙午車駕還宮初置殿門及上閣門屯兵庚午以丹陽尹褚湛之為尚書右僕射庚申詔有司論功班賞各有差辛酉安西將軍西秦河二州刺史吐谷渾拾寅進號鎮西大將軍開府儀同三司辛未改封南譙王義宣為南郡王隨王誕為竟陵王閏月丙子遣兼散騎常侍樂詢等十五人巡行風俗庚申加太傅江夏王義恭録尚書事以荊州刺史竟陵王誕為侍中驃騎大將軍開府儀同三司揚州刺史甲申蠲尋陽西陽郡租布三年是月置衛尉官秋七月辛丑朔日有蝕之辛酉詔崇儉約禁淫侈己巳司空南平王鑠薨以侍中南郡王世子恢為尚書右僕射冬十月癸未聽訟於閲武堂十一月丙辰停臺省衆官朔望問訊丙寅高麗國遣使朝貢十二月甲戌省都水使者官置水衡令官癸未以將置東宮省太子率更令步兵翊軍校尉旅賁中郎將冗從僕射左右積弩將軍官中庶子中舍人庶子舍人洗馬各減舊員之半孝建元年春正月己亥朔祀南郊大赦改元壬戌更鑄四銖錢丙寅立皇子子業為皇太子賜天下為父後者爵一級是月起正光殿二月庚午豫州刺史魯爽車騎將軍江州刺史臧質丞相荊州刺史南郡王義宣兗州刺史徐遺寶舉兵反壬午曲赦豫州三月己亥內外戒嚴夏五月甲寅義宣等攻梁山左衛將軍王玄謨大破之己未解嚴癸亥以吳興太守劉延孫為尚書右僕射六月戊辰臧質走至武昌為人所斬傳首建鄴甲戌撫軍將軍柳元景進號撫軍大將軍及鎮北大將軍沈慶之並開府儀同三司癸未罷南蠻校尉官戊子省録尚書官庚寅義宣於江陵賜死秋七月丙申朔日有蝕之既丙辰大赦賜文武爵一級冬十月戊寅詔開建仲尼廟制同諸侯之禮詳擇爽塏厚給祭秩十一月癸卯復置都水使者官始課南徐州僑人租是歲魏興光元年二年春二月己丑婆皇國遣使朝貢丙寅以南兗州刺史沈慶之為左光祿大夫開府儀同三司夏四月壬申河南國遣使朝貢五月乙未熒惑入南斗戊戌以湘州刺史劉遵考為尚書右僕射六月甲子以國哀除釋大赦秋七月癸巳立皇弟休祐為山陽王休茂為海陵王休業為鄱陽王己酉槃槃國遣使朝貢八月庚申雍州刺史武昌王渾有罪廢為庶人自殺辛酉干陀利國遣使朝貢三吳饑詔所在振貸九月丁亥閲武於宣武場冬十月壬午以揚州刺史竟陵王誕為司空南徐州刺史以尚書左僕射建平王宏為尚書令十一月辛亥高麗國遣使朝貢是歲魏太安元年三年春正月庚寅立皇弟休範為順陽郡王休若為巴陵郡王戊戌立皇子子尚為西陽郡王辛丑祀南郊以驃騎將軍建昌忠公到彥之衛將軍左光祿大夫新建文宣侯王華豫寧文侯王曇首配饗文帝廟庭壬子皇太子納妃甲寅大赦羣臣上禮二月丁丑制朔望臨西堂接羣下受奏事閏三月癸酉鄱陽王休業薨夏四月甲子初禁人車及酒肆器用銅五月辛酉制荊徐兗豫雍青冀七州統內家有馬一匹者蠲復一丁秋九月壬戌以丹陽尹劉遵考為尚書右僕射冬十月丙午太傅江夏王義恭進位太宰領司徒大明元年春正月辛亥朔大赦改元庚午都下雨水辛未遣使檢行賜以樵米三月壬戌制大臣加班劍者不得入宮城門夏四月都下疾疫丙申遣使巡賜給醫藥死而無收斂者官為斂埋五月吳興義興大水人飢乙卯遣使開倉振恤癸酉聽訟于華林園自是非巡狩軍役則車駕歲三臨訊丙寅芳香琴堂東西有雙橘連理景陽樓上層西南梁栱間有紫氣清暑殿西甍鴟尾中央生嘉禾一株五莖改景陽樓為慶雲樓清暑殿為嘉禾殿芳香琴堂為連理堂乙亥以輔國將軍梁瑾葱為河州刺史封宕昌王秋七月辛未土斷雍州諸僑郡縣九月建康秣陵二縣各置都官從事一人司水火劫盜冬十月甲辰以百濟王餘慶為鎮東大將軍十二月丁亥改封順陽王休範為桂陽王二年春正月辛亥祀南郊丙辰復郡縣田秩並九親祿奉壬戌拜初寧陵二月丙戌衛將軍尚書令建平王宏以本號開府儀同三司以丹陽尹褚湛之為尚書左僕射三月丁未尚書令建平王宏薨乙卯以田農要月命太官停殺牛夏四月甲申立皇子子綏為安陸王辛丑地震六月戊寅增置吏部尚書一人省五兵尚書官丁亥加左光祿大夫何尚之開府儀同三司秋八月丙戌中書令王僧達下獄死九月壬戌襄陽大水遣使巡行振恤庚午置武衛將軍武騎常侍官冬十二月己亥制諸王及妃主庶姓位從公者喪事聽設凶門餘悉斷是歲河南高麗林邑等國並遣使朝貢三年春正月己丑以領軍將軍柳元景為尚書令二月乙卯以揚州所統六郡為王畿以東揚州為揚州甲子復置廷尉監官夏四月乙卯司空南兗州刺史竟陵王誕有罪貶爵誕不受命據廣陵反以沈慶之為車騎大將軍開府儀同三司南兗州刺史討誕秋七月己巳剋廣陵城斬誕悉誅城內男丁以女口為軍賞是日解嚴辛未大赦丙子以丹陽尹劉秀之為尚書右僕射丙戌加南兗州刺史沈慶之位司空九月壬辰於玄武湖北立上林苑甲午移南郊壇於牛頭山以正陽位冬十一月甲子立皇后蠶宮於西郊十二月辛酉置謁者僕射官是歲婆皇河西高麗肅慎等國各遣使朝貢西域獻馬四年春正月辛未祀南郊甲戌宕昌國遣使朝貢乙亥親耕藉田大赦庚寅立皇子子勛為晉安王子房為尋陽王子頊為歷陽王子鸞為襄陽王三月甲申皇后親桑于西郊夏四月丙午詔四時供限詳減太半辛亥太宰江夏王義恭等表請封岱宗詔不從辛酉詔以都下疾疫遣使存問並給醫藥其亡者隨宜賑恤五月丙戌尚書左僕射褚湛之卒秋七月甲戌左光祿大夫開府儀同三司何尚之薨八月雍州大水甲寅遣加賑恤九月丁亥改封襄陽王子鸞為新安王冬十月庚寅遣新除司空沈慶之討緣江蠻十一月戊辰改細作署令為左右御府令丙戌復置大司農官十二月辛丑幸廷尉寺宥繫囚魏遣使通和丁未幸建康縣原放獄囚倭國遣使朝貢是歲魏和平元年五年春正月戊午朔華雪降散為六出上悅以為瑞二月癸巳閲武軍幢以下普加班錫多所原宥三月甲戌行幸江乘遣祭故太保王弘光祿大夫王曇首墓夏四月癸巳改封西陽王子尚為豫章王丙申加尚書令柳元景左光祿大夫開府儀同三司丙午雍州刺史海陵王休茂殺司馬庾深之舉兵反參軍尹玄慶起義斬之傳首建鄴五月起明堂於國學南丙巳之地癸亥制帝室朞親官非祿官者月給錢十萬秋七月丁卯高麗國遣使朝貢庚午曲赦雍州八月戊子立皇子子仁為永嘉王子真為始安王己丑詔以來歲修葺庠序旌延國胄庚寅制方鎮所假白板郡縣年限依臺除食祿三分之一不給送故衛將軍東海王褘以本號開府儀同三司九月甲寅日有蝕之丁卯行幸琅邪郡原遣囚繫庚午河濟清閏月丙申初立馳道自閶闔門至于朱雀門又自承明門至于玄武湖壬寅改封歷陽王子頊為臨海王冬十月甲寅以南徐州刺史劉延孫為尚書左僕射十二月壬申以領軍將軍劉遵考為尚書右僕射甲戊制天下人戶歲輸布四匹六年春正月辛卯祀南郊是日又宗祀文皇帝于明堂以配上帝大赦乙未置五官中郎將左右中郎將官二月乙卯復百官祿三月庚寅立皇子子元為邵陵王壬寅以倭世子興為安東將軍倭國王夏四月庚申新作大航門五月丙戌置凌室于覆舟山修藏冰之禮六月辛酉尚書左僕射劉延孫卒秋七月甲申地震有聲如雷兗州尤甚於是魯郡山搖者二乙未立皇子子雲為晉陵王八月乙丑置清臺令官九月制沙門致敬人主乙未以尚書右僕射劉遵考為左僕射以丹陽尹王僧朗為右僕射冬十月丁卯詔上林苑內士庶丘墓欲還合葬者勿禁十一月己卯陳留王曹虔秀薨七年春正月癸未詔克日於玄武湖大閲水師並巡江右講武校獵丁亥以右衛將軍顏師伯為尚書左僕射二月甲寅車駕巡南豫南兗二州丁巳校獵烏江己未登烏江縣六合山壬戌大赦行幸所經無出今年租布賜人爵一級女子百戶牛酒郡守邑宰及人夫從搜者普加霑賚又詔蠲歷陽郡租輸三年遣使巡慰問人疾苦癸亥行幸尉氏觀溫泉壬申車駕至都拜二廟乃還宮夏四月甲子詔自今非臨軍戰陳一不得專殺其罪入重辟者皆依舊先上須報有司嚴加聽察犯者以殺人罪論五月丙子詔自今刺史守宰動人興軍皆須手詔施行惟邊隅外警及姦釁內發變起倉卒者不從此例六月戊申蠕蠕高麗等國並遣使朝貢秋七月乙亥進高麗王高璉位車騎大將軍開府儀同三司八月乙丑立皇子子孟為淮南王子産為臨賀王車駕幸建康秣陵縣訊獄囚九月庚寅以南徐州刺史新安王子鸞為兼司徒乙未幸廷尉訊獄囚丙申立皇子子嗣為東平王冬十月壬寅皇太子冠賜王公以下帛各有差戊申車駕巡南豫州奉太后以行癸丑行幸江寧縣訊獄囚加車騎將軍揚州刺史豫章王子尚開府儀同三司癸亥以開府儀同三司東海王褘為司空加中軍將軍義陽王昶開府儀同三司己巳校獵於姑孰十一月丙子曲赦南豫州殊死以下巡幸所經詳減今歲田租乙酉詔祭晉大司馬桓溫征西將軍毛璩墓上於行所訊溧陽永世丹陽縣囚癸巳祀梁山大閲水師於中江有白雀二集華蓋有司奏改元為神雀詔不許乙未原放行獄徒繫浙江東諸郡大旱十二月壬寅遣使開倉賑恤聽受雜物當租丙午行幸歷陽甲寅大赦賜歷陽郡女子百戶牛酒蠲郡租十年己未加太宰江夏王義恭尚書令於博望梁山立雙闕癸亥至自歷陽八年春正月辛巳祀南郊是日還宗祀文帝于明堂甲戌詔曰東境去歲不稔宜廣商貨遠近販鬻米粟者可停道中雜稅其以仗自防悉勿禁夏閏五月壬寅以太宰江夏王義恭領太尉庚申帝崩於玉燭殿時年三十五七月丙午葬于丹陽秣陵縣巖山景寧陵帝末年為長夜之飲每旦寢興盥糍畢仍復命飲俄頃數斗憑几惛睡若大醉者或外有奏事便肅然整容無復酒色外內服其神明莫敢弛惰前廢帝諱子業小字法師孝武帝長子也元嘉二十六年正月甲申生孝武鎮尋陽帝留都下三十年孝武入伐元凶囚帝於侍中下省將加害者數矣卒得無恙及孝武踐阼立為皇太子始未之東宮中庶子二率並入直永福省大明二年出居東宮七年加元服八年閏五月庚申孝武崩其日太子即皇帝位大赦加驃騎大將軍柳元景尚書令甲子置録尚書官以太宰江夏王義恭録尚書事加驃騎大將軍柳元景開府儀同三司秋七月庚戌婆皇國遣使朝貢崇皇太后為太皇太后皇后曰皇太后乙卯罷南北二馳道改孝建以來所變制度還依元嘉丙辰追崇獻妃為獻皇后八月己丑皇太后崩九月乙卯文穆皇后祔葬景寧陵冬十二月乙酉以尚書左僕射顏師伯為尚書僕射壬辰以王畿諸郡為揚州以揚州為東揚州癸巳加車騎將軍揚州刺史豫章王子尚位司徒去歲及是歲東諸郡大旱甚者米一斗數百都下亦至百餘餓死者十六七孝建以來又立錢署鑄錢百姓因此盜鑄錢轉僞小商貨不行景和元年春正月乙未朔大赦改元為永光乙巳省諸州臺傳二月乙丑減州郡縣田祿之半庚寅鑄二銖錢夏五月魏文成皇帝崩秋八月庚午以尚書僕射顏師伯為左僕射吏部尚書王景文為右僕射癸酉帝自率宿衛兵誅太宰江夏王義恭尚書令柳元景左僕射顏師伯廷尉劉德願改元為景和甲戌以司徒揚州刺史豫章王子尚領尚書令乙亥帝釋素服御錦衣以始興公沈慶之為太尉庚辰以石頭城為長樂宮東府城為未央宮甲申以北邸為建章宮南第為長楊宮己丑復立南北二馳道九月癸巳幸湖熟奏鼓吹戊戌還宮帝自以為昔在東宮不為孝武所愛及即位將掘景寧陵太史言於帝不利而止乃縱糞於陵肆罵孝武帝為奴又遣發殷貴嬪墓忿其為孝武所寵初貴嬪薨武帝為造新安寺乃遣壞之又欲誅諸遠近僧尼辛丑免南徐州刺史新安王子鸞為庶人賜死丁未加衛將軍湘東王彧開府儀同三司己酉車駕討徐州刺史義陽王昶內外戒嚴昶奔魏戊午解嚴開百姓鑄錢冬十月癸亥曲赦徐州丁卯東陽太守王藻下獄死以文帝第十女新蔡公主為貴嬪夫人改姓謝氏加武賁鈒戟鸞輅龍旗出警入蹕矯言公主薨空設喪事焉乙酉以豫州刺史山陽王休祐為鎮軍大將軍開府儀同三司十一月壬辰寧朔將軍何邁下獄死癸巳殺新除太尉沈慶之壬寅立皇后路氏四廂奏樂曲赦揚南徐二州丁未皇子生少府劉矇之子也大赦贓樜淫盜悉皆原蕩賜為父後者爵一級壬子以護軍將軍建安王休仁為驃騎大將軍開府儀同三司戊午南平王敬猷廬陵王敬先安南侯敬深並賜死時帝凶悖日甚誅殺相繼內外百官不保首領先是訛言湘中出天子帝將南巡荊湘以厭之期旦誅除四叔然後發引是夜湘東王彧與左右阮佃夫王道隆李道兒密結帝左右壽寂之姜産之等十一人謀共廢帝先是帝好遊華林園竹林堂使婦人倮身相逐有一婦人不從命斬之經少時夜夢游後堂有一女子罵曰帝悖虐不道明年不及熟矣帝怒於宮中求得似所夢者一人戮之其夕復夢所戮女罵曰汝枉殺我已訴上帝至是巫覡云此堂有鬼帝與山陰公主及六宮綵女數百人隨羣巫捕鬼屏除侍衛帝親自射之事畢將奏靡靡之聲壽寂之懷刀直入姜産之為副諸姬迸逸廢帝亦走追及之大呼寂寂如此者三手不能舉乃崩於華光殿時年十七太皇太后令奉湘東王彧纂承皇統於是葬帝於丹陽秣陵縣南郊壇西帝𧔧目鳥喙長頸鋭下幼而狷急在東宮每為孝武所責孝武西巡帝啓參承起居書迹不謹上詰讓之曰書不長進此是一條耳聞汝比素業都懈狷戾日甚何以頑固乃爾初踐阼受璽紱然無哀容蔡興宗退而歎曰昔魯昭不戚叔孫請死國家之禍其在此乎帝始猶難諸大臣及戴法興等既殺法興諸大臣莫不震懾於是又誅羣公元凱以下皆被毆捶牽曳內外危懼殿省騷然太后疾篤遣呼帝帝曰病人間多鬼可畏那可往太后怒語侍者曰將刀來破我腹那得生寧馨兒及太后崩後數日帝夢太后謂曰汝不仁不孝本無人君之相子尚愚悖如此亦非運祚所及孝武險虐滅道怨結人神兒子雖多並無天命大命所歸應還文帝之子故帝聚諸叔都下慮在外為患山陰公主淫恣過度謂帝曰妾與陛下雖男女有殊俱託體先帝陛下後宮數百妾惟駙馬一人事不均平一何至此帝乃為立面首左右三十人進爵會稽郡長公主秩同郡王湯沐邑二千戶給鼓吹一部加班劍二十人帝每出公主與朝臣常共陪輦帝少好讀書頗識古事粗有文才自造孝武帝誄及雜篇章往往有辭采以魏武有發丘中郎將摸金校尉乃置此二官以建安王休仁山陽王休祐領之其餘事迹分見諸列傳論曰文帝幼年特秀自禀君德及正位南面歷年長久綱維備舉條禁明密罰有科爵無濫品故能內清外晏四海謐如而授將遣師事乖分閫才謝光武而遙制兵略至於攻戰日時咸聽成旨雖覆師喪旅將非韓白而延寇蹙境抑此之由及至言泄衾衽難結凶豎雖禍生非慮蓋亦有以而然夫盡人命以自養蓋惟桀紂之行觀夫大明之世其將盡人命乎雖周公之才之美亦當終之以亂由此言之得歿亦為幸矣至如廢帝之事行著于篇假以中才之君有一於此足以致霣況乎兼斯衆惡不亡其可得乎
