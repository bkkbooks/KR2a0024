body:
  text: 南史卷四十六列傳第三十六李安人子元履戴僧靜桓康焦度曹武子世宗呂安國周山圖周盤龍子奉叔王廣之子珍國張齊李安人蘭陵承人也祖嶷衛軍參軍父欽之薛令安人少有大志常拊髀歎曰大丈夫處世富貴不可希取三將五校何難之有隨父在縣宋元嘉中縣被魏剋安人尋率部曲自拔南歸明帝時稍遷武衛將軍領水軍討晉安王子勛所向剋捷事平明帝大會新亭樓勞諸軍主摴蒱官賭安人五擲皆盧帝大驚目安人曰卿面方如田封侯相也安人少時貧有一人從門過相之曰君後當大富貴與天子交手共戲至是安人尋此人不知所在後為廣陵太守行南兗州事齊高帝在淮陰安人遙相結事元徽初除司州刺史領義陽太守及桂陽王休範起事安人遣軍援都建平王景素起兵安人破其軍於葛橋景素誅留安人行南徐州事城局參軍王回素為安人所親盜絹二匹安人流涕謂曰我與卿契闊備嘗今日犯王法乃卿負我也於軍門斬之厚為斂祭軍府皆震服轉東中郎司馬行會稽郡事時蒼梧縱虐齊高帝憂迫無計安人白高帝欲於東奉江夏王躋起兵高帝不許乃止高帝即位為中領軍封康樂侯自宋泰始以來內外頻有賊寇將帥以下各募部曲屯聚都下安人上表以為自非淮北常備其外餘軍悉皆輸遣若親近宜立隨身者聽限人數上納之故詔斷衆募時王敬則以勳誠見親至於家國密事上唯與安人論議謂曰署事有卿名我便不復細覽也尋為領軍將軍魏攻壽春至馬頭詔安人禦之魏軍退安人沿淮進壽春先是宋時亡命王元初聚黨六合山僭大號自云垂手過膝州郡討不能禽積十餘年安人生禽之斬建康市高帝崩遺詔加侍中武帝即位為丹陽尹遷尚書左僕射安人時屢啓密謀見賞又善結尚書令王儉故世傳儉啓有此授尋上表以年疾求退為吳興太守於家載米往郡時服其清吳興有項羽神護郡聽事太守到郡必須祀以軛下牛安人奉佛法不與神牛著屐上聽事又於聽上八關齊俄而牛死葬廟側今呼為李公牛冢安人尋卒世以神為祟諡肅侯子元履幼有操業甚間政體為司徒竟陵王子良法曹參軍與王融游狎及王融誅鬱林敕元履隨右衛將軍王廣之北征密令於北殺之廣之先為安人所厚又知元履無過甚擁護之會鬱林敗死元履拜謝廣之曰二十二載父母之年自此以外丈人之賜也仕梁為吳郡太守度支尚書衡廣青冀四州刺史戴僧靜會稽永興人也少有膽力便弓馬事刺史沈文秀俱被魏虜後將家屬叛還淮陰齊高帝撫畜常在左右後於都私齎錦出事發繫南兗州獄高帝遣薛深餉僧靜酒食以刀子置魚腹中僧靜與獄吏飲酒及醉以刀刻械手自折鎖發屋而出歸高帝帝匿之齊內以其家貧年給穀千斛會魏軍至僧靜應募出戰單刀直前魏軍奔退又追斬三級時天寒甚乃脫衣口銜三頭拍浮而還沈攸之事起高帝入朝堂遣僧靜將腹心先至石頭經略袁粲時蘇烈據倉城門僧靜射書與烈夜縋入城粲登城西南門列燭火坐臺軍至射之火乃滅回登東門其黨孫曇瓘驍勇善戰每蕩一合輒大殺傷官軍死者百餘人軍主王天生殊死拒戰故得相持自亥至丑有流星赤色照地墜城中僧靜率力攻倉門手斬粲於東門外軍燒門入以功除前軍將軍寧朔將軍高帝即位封建昌縣侯位太子左衛率武帝踐阼出為北徐州刺史買牛給貧人令耕種甚得荒情後除南中郎司馬淮南太守永明八年巴東王子響殺僚佐武帝召僧靜使領軍向江陵僧靜面啓上曰巴東王年少長史司馬捉之太急忿不思難故耳天子兒過誤殺人有何大罪今急遣軍西上人情惶懼無所不至臣不敢奉敕上不答而心善之徙廬陵王中軍司馬高平太守卒諡壯侯桓康北蘭陵承人也勇果驍悍宋大明中隨齊高帝為軍容從武帝在贛縣泰始初武帝起義為郡所縶衆皆散康裝擔一頭貯穆后一頭貯文惠太子及竟陵王子良自負置山中與門客蕭欣祖等四十餘人相結破郡獄出武帝郡追兵急康等死戰破之隨武帝起兵摧堅陷陳膂力絶人所經村邑恣行暴害江南人畏之以其名怖小兒畫其形於寺中病瘧者寫形帖著牀壁無不立愈後除襄賁令桂陽王休範事起康棄縣還都就高帝會事已平除員外郎元徽五年七月六日夜少帝微行至領軍府帝左右人曰一府皆眠何不緣牆入帝曰我今夕欲一處作適待明日夜康與高帝所養健兒盧荒向黑於門間聽得其語明旦王敬則將帝首至扣府門康謂是變與荒黑拔白刃欲出仍隨高帝入宮高帝鎮東府除武陵王中兵寧朔將軍帶蘭陵太守常衛左右高帝誅黃回回時為南兗州部曲數千欲收恐為亂召入東府停外齊使康數回罪然後殺之時人為之語曰欲侜張問桓康除後軍將軍直閣將軍南濮陽太守建元元年封吳平縣侯高帝謂康曰卿隨我日久未得方伯亦當未解我意正欲與卿先共滅虜耳三年魏軍動康大破魏軍於淮陽武帝即位卒於驍騎將軍焦度字文績南安氐也祖文圭避難居仇池宋元嘉中裴方明平楊難當度父明與千餘家隨居襄陽乃立天水郡略陽縣以居之度少有氣幹便弓馬孝武初青州刺史顏師伯出鎮臺差度領幢主送之與魏豹皮公遇交槊鬬豹皮公墯地禽其具裝馬手殺數十人師伯啓孝武稱度氣力弓馬並絶人帝召還充左右見度形狀謂師伯曰此真健人也補晉安王子勛夾轂隊主隨鎮江州子勛起兵以度為龍驤將軍為前鋒所向無不勝事敗逃宮亭湖為賊朝廷聞其勇甚患之使江州刺史王景文誘降之景文以為己鎮南參軍領中軍直兵厚待之隨景文還都常在府州內景文被害夕度大怒勸景文拒命景文不從明帝不知也以度武勇補晉熙王燮防閣隨鎮夏口武陵王贊代燮為郢州度仍留鎮為贊前軍參軍沈攸之事起轉度中直兵齊高帝又使假度輔國將軍屯騎校尉轉右將軍度容貌壯醜皮膚若漆質直木訥口不能出言晉熙王夾轂主周彥與度俱在郢州彥有左右人與度父同名彥常呼其名使役之度積忿呵責彥曰汝知我諱明而呼明何也及在郢城尤為沈攸之所忿攸之大衆至夏口將直下都留偏兵守郢而已度於城樓上肆言罵辱攸之至自發露形體穢辱之故攸之怒改計攻城度親力戰攸之衆蒙楯將登度令投以穢器賊衆不能冒後呼此樓為焦度樓事寧度功居多封東昌縣子東宮直閣將軍還都為貴戚追郢城時褰露穢褻之事其戇如此為人朴澀欲就高帝求州比及見竟不涉一語帝以其不間政事竟不用後求竟陵郡不知所以置辭親人授之辭百餘言度習誦數日皆得上口會高帝履行石頭城度於大衆中欲自陳臨時卒忘所教乃大言曰度啓公度啓公度無食帝笑曰卿何憂無食即賜米百斛建元四年乃除淮陵太守性好酒醉輒暴怒上常使人節之年雖老而氣力如故除游擊將軍卒曹武字士威下邳人也本名虎頭齊高帝鎮東府使武與戴僧靜各領白直三百人後為屯騎校尉帶南城令石頭平封羅江縣男及高帝受禪改封監利縣武帝即位纍遷驍騎將軍帝以虎頭名鄙敕改之鬱林即位進號前將軍隆昌元年為雍州刺史建武二年進爵為侯東昏即位為前將軍鎮軍司馬永元元年始安王遙光反武領軍屯青溪大橋事寧轉散騎常侍右衛將軍武形幹甚毅善於誘納晚節在雍州致見錢七千萬皆厚輪大郭他物稱是馬八百匹僕妾蔬食膳無膏腴嘗為梅蟲兒茹法珍設女伎金翠曜眼器服精華蟲兒等因是欲誣而奪之人傳武每好風景輒開庫招拍張武戲帝疑武舊將領兼利其財新除未及拜遇誅及收兵至歎曰諸人知我無異意所以殺我政欲取吾財貨伎女耳恨令衆輩見之諸子長成者皆見誅唯子世宗兄弟三人未冠繫尚方梁武帝兵至得免武雖武士頗有知人鑒梁武及崔慧景之在襄陽于時崔方貴盛武性儉嗇無所餉遺獨饋梁武謂曰卿必大貴我當不及見今以弱子相託每密送錢物并好馬時帝在戎多乏就武換借未嘗不得遂至十七萬及帝即位忘其惠天監二年帝忽夢如田塍下行兩邊水深無底夢中甚懼忽見武來負武帝得過曰卿今為天下主乃爾忘我顧託之言邪我兒飢寒無依昔所換十七萬可還其市宅帝覺即使主書送錢還之使用市宅子世澄世宗並蒙抽擢三二年間迭為大郡世宗性嚴明頗識兵勢末遂封侯富顯歷位太子左衛率卒贈左散騎常侍左衛將軍諡曰壯侯呂安國廣陵人也宋大明末以將領見任隱重有幹局為劉勔所稱泰始二年為勔軍副征殷琰以功封鍾武縣男纍遷兗州刺史及沈攸之事起齊高帝以安國為湘州刺史建元元年進爵為侯轉右衛將軍加給事中後改封湘鄉侯武帝即位纍遷光祿大夫加散騎常侍安國欣有文授謂其子曰汝後勿袴褶驅使單衣猶恨不稱當為朱衣官也歷都官尚書太子左率領軍將軍安國纍居將率在朝以宿舊見遇尋遷散騎常侍金紫光祿大夫給扶永明八年卒諡肅侯周山圖字季寂義興義鄉人也家世寒賤年十五六氣力絶衆食噉兼數人鄉里獵戲集聚常為主帥指麾處分皆見從不事産業願為將雖勇健而不間弓馬於書題甚拙謹直少言不嘗說人短長與人周旋皆白首不異宋元嘉二十七年魏軍至瓜步臺符取健兒山圖應募領白衣隊主軍功除員外郎加振武將軍及鎮軍將軍張永侵魏山圖領二千人迎運至武原為魏軍所追合戰多傷殺魏軍稱其勇呼為武原將及永軍大敗山圖收散卒守下邳城還除給事中冗從僕射直閣將軍山圖好酒多失明帝數加怒誚後遂自改纍遷淮南太守時盜發桓溫冢大獲寶物客竊取以遺山圖山圖不受簿以還官遷左中郎將齊高帝輔政山圖密啓沈攸之久有異圖宜為之備帝笑而納之攸之事起武帝為西討都督啓山圖為軍副攸之攻郢城武帝令山圖量其形勢山圖曰攸之為人性度險刻無以結固士心如頓兵堅城之下適所以為離散之漸耳及攸之敗高帝謂曰周公前言可謂明於見事矣建元元年封晉興縣男武帝踐阼遷竟陵王鎮北司馬帶南平昌太守以盆城之舊出入殿省甚見親信義鄉縣長風廟神姓鄧先經為縣令死遂發靈山圖啓乞加神位輔國將軍上答曰足狗肉便了事何用階級為轉黃門郎領羽林監四廂直衛山圖於新林立墅舍晨夜往還上謂曰卿罷萬人都督而輕行郊外自今往墅可以仗身自隨以備不虞及疾上手敕問疾尋卒年六十四周盤龍北蘭陵人也膽氣過人尤便弓馬宋泰始中以軍功封晉安子元徽二年桂陽構難盤龍時為冗從僕射隨齊高帝頓新亭稍至驍騎將軍改封沌陽侯高帝即位進號右將軍建元元年魏攻壽春以盤龍為軍主假節助豫州刺史垣崇祖拒魏大破之上聞之喜下詔稱美送金叉以二十枚與其愛妾杜氏手敕曰餉周公阿杜明年魏攻淮陽圍角城先是上遣軍主成買戍角城辭於王儉曰今段之行必以死報衡門蓬戶不朱斯白小人弱息當得一子儉問其故答曰若不殺賊便為賊殺弱息不為世子便為孝子孝子則門加素堊世子則門施丹赭至是買被圍上遣領軍將軍李安人救之敕盤龍率馬步下淮陽就李安人買與魏拒戰手所傷殺無數晨起手中忽有數升血其日遂戰死首見斬猶尸據鞍奔還軍然後僵盤龍子奉叔單馬率二百餘人陷陳魏軍萬餘騎張左右翼圍之一騎走還報奉叔已沒盤龍方食棄筯馳馬奮矟直奔魏陳自稱周公來魏人素畏盤龍驍名莫不披靡時奉叔已大殺魏軍得出在外盤龍不知乃東西觸擊魏軍莫敢當奉叔見其父久不出復躍馬入陳父子兩騎縈攪數萬人魏軍大敗盤龍父子由是名播北國形甚羸而臨軍勇果諸將莫逮永明五年為大司馬加征虜將軍濟陽太守武帝數講武嘗令盤龍領馬軍校騎騁矟後以疾為光祿大夫尋出為兗州刺史進爵為侯角城戍將張蒲與魏潛通因大霧乘船入清中採樵載魏人直向城東門坐為有司所奏詔白衣領職八坐尋奏復位加領東平太守盤龍表年老才弱不可鎮邊求解職見許還為散騎常侍光祿大夫武帝戲之曰卿著貂蟬何如兜鍪盤龍曰此貂蟬從兜鍪中生耳尋病卒年七十九子奉叔勇力絶人少隨盤龍征討所在暴掠為東宮直閣將軍鬱林在西州奉叔密得自進及即位與直閣將軍曹道剛為心膂奉叔善騎馬帝從其學騎尤見親寵得入內無所忌憚陵轢朝士就司空王敬則換米二百斛敬則以百斛與之不受敬則大懼乃更餉二百斛并金鉿等物敬則有一內妓帝令奉叔求奉叔不通徑前從者執單刀皆半拔敬則跣走入內既而自計不免乃出遙呼奉叔曰弟那忽能顧奉叔宣旨求妓意乃得釋與綦母珍曹道剛朱隆之共相脣齒煽弄威權奉叔常翼單刀二十口出入禁闈既無別詔門衛莫敢訶每語人云周郎刀不識君求武帝御角及輿并求御仗以給左右事無不從又求黃門郎明帝作輔固執不能得乃令蕭諶蕭坦之說帝出奉叔為外鎮樹腹心又說奉叔以方伯之重奉叔納其言隆昌元年出為青冀二州刺史奉叔就帝求千戶侯帝許之明帝以為不可忽謂蕭諶曰若不能見與千戶侯不復應減五百戶不爾周郎當就刀頭取辦耳既而封曲江縣男奉叔大怒於衆中攘刀厲目切齒明帝說諭乃受及將之鎮明帝慮其不可復制因其早入引往後堂執送廷尉盡之王廣之字士林一字林之沛郡相人也少好弓馬便捷有勇力初為馬隊主隨劉勔征殷琰兵既盛而合肥戍又阻兵為寇勔宣令軍中求征合肥者以大郡賞之廣之曰若得將軍所乘馬判能制之勔幢主皇甫肅謂勔曰廣之敢奪節下馬可斬勔曰觀其意必能立功即推鞍下馬與之及行合肥果拔勔大賞之即擢為軍主廣之於勔前謂肅曰節下若從卿言非唯斬壯士亦自無以平賊卿不賞才乃至此邪廣之由此知名初封蒲圻子肅有學術善舉止廣之亦雅相推慕勔亡後肅更依廣之廣之盛相賞接啓武帝以為東海太守不念舊惡如此廣之後以征伐功位給事中冠軍將軍改封寧都縣子齊高帝廢蒼梧出廣之為徐州刺史鍾離太守沈攸之事起廣之留都下豫平石頭仍從高帝頓新亭高帝誅黃回回弟駟及從弟馬兄子奴亡逸高帝與廣之書曰黃回雖有微勳而罪過轉不可容近遂啓請御大小二輿為刺史服飾吾乃不惜為其啓聞政恐得輿復求畫輪車此外罪不可勝數弟自悉之今啓依法令廣之於江西搜捕駟等建元元年進爵為侯武帝即位纍遷右衛將軍散騎常侍前軍將軍延興元年為豫州刺史豫廢鬱林後拜鎮南將軍江州刺史進應城縣公建武中位侍中鎮軍將軍給扶後卒贈車騎將軍諡壯公子珍國字德重仕齊為南譙太守有能名時郡境苦饑乃發米散財以振窮乏高帝手敕云卿愛人活國甚副吾意永明初遷桂陽內史討捕賊盜境內肅清罷任還都路經江州刺史柳世隆臨渚餞別見珍國還裝輕素歎曰此真良二千石也還為大司馬中兵參軍武帝雅相知賞謂其父廣之曰珍國應堪大用卿可謂老蚌也廣之曰臣不敢辭帝大笑帝每歎曰晚代將家子弟如珍國者少矣纍遷游擊將軍父憂去職建武末魏軍圍司州明帝使徐州刺史裴叔業攻拔渦陽以為聲援起珍國為輔國將軍助焉魏將楊大眼大衆奄至叔業懼棄軍走珍國率其衆殿故不至大敗及會稽太守王敬則反珍國又率衆拒之永元中為北徐州刺史將軍如故梁武起兵東昏召珍國以衆還都使出屯朱雀門為王茂所敗乃入城密遣郗纂奉明鏡獻誠於梁武帝帝斷金以報之時侍中衛尉張稷都督衆軍珍國潛結稷腹心張齊要稷稷許之十二月丙寅旦珍國引稷於衛尉府勒兵入自雲龍門殺東昏於內殿與稷會尚書僕射王亮等於西鍾下使國子博士范雲等奉東昏首歸梁武後因侍宴帝曰卿明鏡尚存昔金何在珍國曰黃金謹在臣肘不敢失墜歷位左衛將軍加散騎常侍封灄陽侯遷都官尚書初珍國自以廢殺東昏意望台鼎先是出為梁秦二州刺史心常鬱怏酒後於坐啓云臣近入梁山便哭帝大驚曰卿若哭東昏則已晚若哭我我復未死珍國起拜謝竟不答坐即散因此疏退久方有此進天監五年魏任城王澄攻鍾離帝遣珍國為援因問討賊方略對曰臣常患魏衆少不苦其多武帝壯其言乃假節與衆軍同赴魏軍退班師又出為南秦梁二州刺史會梁州長史夏侯道遷以州降魏珍國步道出魏興將襲之不果遂留鎮焉改封宜陽縣侯纍遷丹陽尹卒贈車騎將軍諡曰威子僧度嗣張齊字子嚮馮翊郡人少有膽氣初事荊州司馬垣歷生歷生酗酒遇下嚴酷不禮之及吳郡張稷為荊府司馬齊復從之甚見重以為腹心齊盡心事稷稷為南兗州擢為府中兵參軍梁武帝起兵東昏徵稷歸都督宮城諸軍事齊夜引珍國就稷齊手自執燭定謀明旦與稷珍國即東昏於殿內齊手殺焉武帝受禪封齊安昌侯位歷陽太守齊手不知書目不識字在郡清整吏事甚修天監四年魏將王足攻蜀圍巴西帝以齊為輔國將軍救蜀未至足退齊進戍南安遷巴西太守初南鄭沒于魏乃於益州西置南梁州州鎮草創皆仰益州取足齊上夷獠義租得米二十萬斛十一年進假節督益州外水諸軍齊在益部纍年討擊蠻獠身無寧歲其居軍中能身親勞辱與士卒同勤苦自頓舍城壘皆委曲得其便調給衣糧資用人無困乏既為物情所歸蠻獠亦不敢犯是以威名行於庸蜀巴西郡居益州之半又當東道衝要刺史經過軍府遠涉多窮匱齊緣路聚糧食種蔬菜行者皆取給焉歷南梁州刺史遷信武將軍征西鄱陽王司馬新興永寧二郡太守未發卒諡曰壯論曰宋氏將季亂離日兆家懷逐鹿人有異圖高帝觀釁深視將符興運李安人戴僧靜桓康焦度曹武呂安國周山圖周盤龍王廣之等或早見誠款或備盡心力或受委方面或功成麾下其所以自致榮寵夫豈徒然蓋亦驗人心之有歸樂推之非妄也語云勇而無禮則亂觀夫奉叔取進之道不亦幾於亂乎其致屠戮亦其宜矣珍國明鏡雖在而斷金莫驗報罵之義理則宜然台輔之冀其何爽也張齊人位本下志望易充績宣所蒞其殆優也
