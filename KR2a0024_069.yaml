body:
  text: 南史卷六十九列傳第五十九沈炯虞荔弟寄傅縡章華顧野王蕭濟姚察沈炯字初明吳興武康人也祖瑀梁尋陽太守父續王府記室參軍炯少有儁才為當時所重仕梁為尚書左戶侍郎吳令侯景之難吳郡太守袁君正入援建鄴以炯監郡臺城陷景將宋子仙據吳興使召炯方委以書記炯辭以疾子仙怒命斬之炯解衣將就戮礙於路間桑樹乃更牽往他所或救之僅而獲免子仙愛其才終逼之令掌書記及子仙敗王僧辯素聞其名軍中購得之酬所獲者錢十萬自是羽檄軍書皆出於炯及簡文遇害四方岳牧上表勸進僧辯令炯制表當時莫有逮者陳武帝南下與僧辯會白茅灣登壇設盟炯為其文及景東奔至吳郡獲炯妻虞氏及子行簡並殺之炯弟攜其母逃免侯景平梁元帝愍其妻子嬰戮特封原鄉侯僧辯為司徒以炯為從事中郎梁元帝徵為給事黃門侍郎領尚書左丞魏剋荊州被虜甚見禮遇授儀同三司以母在東思歸國恐以文才被留閉門却掃無所交接時有文章隨即棄毀不令流布嘗獨行經漢武通天臺為表奏之陳己思鄉之意曰臣聞橋山雖掩鼎湖之竈可祠有魯遂荒大庭之跡無泯伏惟陛下降德猗蘭纂靈豐谷漢道既登神仙可望射之罘於海浦禮日觀而稱功橫中流於汾河指栢梁而高宴何其甚樂豈不然歟既而運屬上僊道窮晏駕甲帳珠簾一朝零落茂陵玉盌遂出人間陵雲故基與原田而膴膴別風餘跡帶陵阜而芒芒羈旅縲臣豈不落淚昔承明見厭嚴助東歸駟馬可乘長卿西反恭聞故實竊有愚心黍稷非馨敢望徼福但雀臺之弔空愴魏君雍丘之祠未光夏后瞻仰煙霞伏增悽戀奏訖其夜夢有宮禁之所兵衞甚嚴炯便以情事陳訴聞有人言甚不惜放卿還幾時可至少日便與王克等並獲東歸歷司農卿御史中丞陳武帝受禪加通直散騎常侍表求歸養詔不許文帝嗣位又表求去詔答曰當敕所由相迎尊累使卿公私無廢也初武帝嘗稱炯宜居王佐軍國大政多預謀謨文帝又重其才欲寵貴之會王琳入寇大雷留異擁據東境帝欲使炯因是立功乃解中丞加明威將軍遣還鄉里收徒衆以疾卒于吳中贈侍中諡恭子有集二十卷行於世虞荔字山披會稽餘姚人也祖權梁廷尉卿永嘉太守父檢平北始興王諮議參軍荔幼聰敏有志操年九歲隨從伯闡候太常陸倕倕問五經十事荔對無遺失倕甚異之又嘗詣徵士何胤時太守衡陽王亦造之胤言於王王欲見荔荔辭曰未有板刺無容拜謁王以荔有高尚之志雅相欽重還郡即辟為主簿荔又辭以年小不就及長美風儀博覽墳籍善屬文仕梁為西中郎法曹外兵參軍兼丹陽詔獄正梁武帝於城西置士林館荔乃制碑奏上帝命勒之于館仍用荔為士林學士尋為司文郎遷通直散騎侍郎兼中書舍人時左右之任多參權軸內外機務互有帶掌唯荔與顧協泊然靜退居于西省但以文史見知尋領大著作及侯景之亂荔率親屬入臺除鎮西諮議參軍舍人如故臺城陷逃歸鄉里侯景平元帝徵為中書侍郎貞陽侯僭位授揚州別駕並不就張彪之據會稽荔時在焉及文帝平彪武帝及文帝並書招之迫切不得已乃應命至都而武帝崩文帝嗣位除太子中庶子仍侍太子讀尋領大著作初荔母隨荔入臺卒於臺內尋而城陷情禮不申由是終身蔬食布衣不聽音樂雖任遇隆重而居止儉素淡然無營文帝深器之常引在左右朝夕顧訪荔性沈密少言論凡所獻替莫有見其際者第二弟寄寓于閩中依陳寶應荔每言之輒流涕文帝哀而謂曰我亦有弟在遠此情甚切他人豈知乃敕寶應求寄寶應終不遣荔因以感疾帝欲數往臨視令將家口入省荔以禁中非私居之所乞停城外帝不許乃令住蘭臺乘輿再三臨問手敕中使相望於道又以蔬食積久非羸疾所堪乃敕曰卿年事已多氣力稍減方欲仗委良須克壯今給卿魚肉不得固從所執荔終不從卒贈侍中諡曰德子及喪柩還鄉里上親出臨送當時榮之子世基世南並少知名寄字次安少聰敏年數歲客有造其父遇寄於門嘲曰郎子姓虞必當無智寄應聲曰文字不辨豈得非愚客大慚入謂其父此子非常人文舉之對不是過也及長好學善屬文性沖靜有栖遁志弱冠舉秀才對策高第起家梁宣城王國左常侍大同中嘗驟雨殿前往往有雜色寶珠梁武觀之甚有喜色寄因上瑞雨頌帝謂寄兄荔曰此頌典裁清拔卿之士龍也將如何擢用寄聞之歎曰美盛德之形容以申擊壤之情耳吾豈買名求仕者乎乃閉門稱疾唯以書籍自娛岳陽王詧為會稽太守寄為中記室領郡五官掾在職簡略煩苛務存大體曹局之內終日寂然侯景之亂寄隨兄荔入臺及城陷遁還鄉里張彪往臨川強寄俱行寄與彪將鄭瑋同舟而載瑋嘗忤彪意乃劫寄奔晉安時陳寶應據有閩中得寄甚喜陳武帝平侯景寄勸令自結寶應從之乃遣使歸誠承聖元年除中書侍郎寶應愛其才託以道阻不遣每欲引寄為僚屬委以文翰寄固辭獲免及寶應結昏留異潛有逆謀寄微知其意言說之際每陳逆順之理微以諷諫寶應輒引說他事以拒之又嘗令左右讀漢書臥而聽之至蒯通說韓信曰相君之背貴不可言寶應蹶然起曰可謂智士寄正色曰覆酈驕韓未足稱智豈若班彪王命識所歸乎寄知寶應不可諫慮禍及己乃為居士服以拒絕之常居東山寺偽稱脚疾不復起寶應以為假託遣人燒寄所臥屋寄安臥不動親近將扶寄出寄曰吾命有所懸避欲安往所縱火者旋自救之寶應自此方信之及留異稱兵寶應資其部曲寄乃因書極諫曰東山居士虞寄致書於明將軍使君節下寄流離艱故飄寓貴鄉將軍待以上賓之禮申以國士之眷意氣所感何日忘之而寄沈痼彌留愒陰將盡常恐卒填溝壑涓塵莫報是以敢布腹心冒陳丹款願將軍留須臾之慮少思察之則冥目之日所懷畢矣夫安危之兆禍福之機匪獨天時亦由人事失之毫釐差以千里是以明智之士據重位而不傾執大節而不失豈惑於浮辭哉將軍文武兼資英威動俗往因多難仗劍興師援旗誓衆抗威千里豈不以四郊多壘共謀王室匡時報主寧國庇人乎此所以五尺童子皆願荷戟而隨將軍者也及高祖武皇帝肇基草昧初濟艱難于時天下沸騰人無定主豺狼當道鯨鯢橫擊海內業業未知所從將軍運動微之鑒折從衡之辯策名委質自託宗盟此將軍妙算遠圖發於衷誠者也及主上繼業欽明睿聖選賢與能羣臣輯睦結將軍以維城之重崇將軍以裂土之封豈非宏謨廟略推赤心於物者也屢申明詔款篤殷勤君臣之分定矣骨肉之恩深矣不意將軍惑於邪說翻然異計寄所以疾首痛心泣盡繼之以血萬全之策竊為將軍惜之寄雖疾侵耄及言無足采千慮一得請陳愚算願將軍少戢雷霆賒其晷刻使得盡狂瞽之說披肝膽之誠則雖死之日猶生之年也自天厭梁德多難荐臻寰宇分崩英雄互起不可勝紀人人自以為得之然夷凶翦亂拯溺扶危四海樂推三靈眷命揖讓而居南面者陳氏也豈非歷數有在惟天所授當璧應運其事甚明一也主上承基明德遠被天綱再張地維重紐夫以王琳之強侯瑱之力進足以搖蕩中原爭衡天下退足以屈強江外雄張偏隅然或命一旅之師或資一士之說琳即瓦解冰泮投身異域瑱則厥角稽顙委命闕庭斯又天假之威而除其患其事甚明二也今將軍以藩戚之重擁東南之衆盡忠奉上勠力勤王豈不勳高竇融寵過吳芮析珪判野南面稱孤其事甚明三也且聖朝棄瑕忘過寬厚待人改過自新咸加擢至如余孝頃潘純陀李孝欽歐陽頠等悉委以心腹任以爪牙胸中豁然曾無纖芥況將軍釁非張繡罪異畢諶當何慮於危亡何失於富貴此又其事甚明四也方今周齊鄰睦境外無虞幷兵一向匪朝伊夕非有劉項競逐之機楚趙連從之事可得雍容高拱坐論西伯其事甚明五也且留將軍狼顧一隅亟經摧衄聲實虧喪膽氣衰沮高瓖向文政留瑜黃子玉此數人者將軍所知首鼠兩端唯利是視其餘將帥亦可見矣孰能被堅執銳長驅深入繫馬埋輪奮不顧命以先士卒者乎此又其事甚明六也且將軍之強孰如侯景將軍之衆孰如王琳武皇滅侯景於前今上摧王琳於後此乃天時非復人力且兵革已後人皆厭亂其孰能棄墳墓捐妻子出萬死不顧之計從將軍於白刃之間乎此又其事甚明七也歷觀前古鑒之往事子陽季孟傾覆相尋餘善右渠危亡繼及天命可畏山川難恃況將軍欲以數郡之地當天下之兵以諸侯之資拒天子之命強弱逆順可得侔乎此又其事甚明八也且非我族類其心必異不愛其親豈能及物留將軍身縻國爵子尚王姬猶且棄天屬而弗顧背明君而孤立危急之日豈能同憂共患不背將軍者乎至於師老力屈懼誅利賞必有韓智晉陽之謀張陳井陘之事此又其事甚明九也且北軍萬里遠鬬鋒不可當將軍自戰其地人多顧後梁安背向為心修旿匹夫之力衆寡不敵將帥不侔師以無名而出事以無機而動以此稱兵未知其利夫以漢朝吳楚晉室穎顒連城數十長戟百萬拔本塞源自圖家國其有成功者乎此又其事甚明十也為將軍計者莫若不遠而復絕親留氏秦郎快郎隨遣入質釋甲偃兵一遵詔旨且朝廷許以鐵券之要申以白馬之盟朕不食言誓之宗社寄聞明者鑒未形智者不再計此成敗之效將軍勿疑吉凶之幾間不容髮方今蕃維尚少皇子幼沖凡預宗枝皆蒙寵樹況以將軍之地將軍之才將軍之名將軍之勢而能克修蕃服北面稱臣寧與劉澤同年而語其功業哉豈不身與山河等安名與金石相弊願加三思慮之無忽寄氣力緜微餘陰無幾感恩懷德不覺狂言鈇鉞之誅甘之如薺寶應覽書大怒或謂寶應曰虞公病篤言多錯謬寶應意乃小釋亦以寄人望且容之及寶應敗走夜至蒲田顧謂其子扞秦曰早從虞公計不至今日扞秦但泣而已寶應既禽凡諸賓客微有交涉者皆誅唯寄以先識免禍初沙門慧標涉獵有才思及寶應起兵作五言詩以送之曰送馬猶臨水離旗稍引風好看今夜月當照紫微宮寶應得之甚悅慧標以示寄寄一覽便止正色無言慧標退寄謂所親曰標公既以此始必以此終後竟坐是誅文帝尋敕都督章昭達發遣寄還朝及至謂曰管寧無恙甚慰勞懷頃之帝謂到仲舉曰衡陽王既出閤須得一人旦夕游處兼掌書記宜求宿士有行業者仲舉未知所對帝曰吾自得之乃手敕用寄寄入謝帝曰所以暫屈卿游蕃非止以文翰相煩乃令以師表相事也後除東中郎建安王諮議加戎昭將軍寄乃辭以疾不堪旦夕陪列王於是令長停公事其有疑議就以決之但朔旦牋修而已太建八年加太中大夫後卒寄少篤行造次必於仁厚雖僮豎未嘗加以聲色至臨危執節則辭氣凜然白刃不憚也自流寓南土與兄荔隔絕因感氣病每得荔書氣輒奔劇危殆者數矣前後所居官未嘗至秩滿裁朞月便自求解退常曰知足不辱吾知足矣及謝病私庭每諸王為州將下車必造門致禮命釋鞭板以几杖侍坐嘗出游近寺閭里傳相告語老幼羅列望拜道左或言誓為約者但指寄便不欺其至行所感如此所制文筆遭亂並多散失傅縡字宜事北地靈州人也父彝梁臨沂令縡幼聰敏七歲誦古詩賦至十餘萬言長好學能屬文太清末丁母憂在兵亂中居喪盡禮哀毀骨立士友以此稱之後依湘州刺史蕭循循頗好士廣集墳籍縡肆志尋閱因博通羣書王琳聞其名引為府記室琳敗隨琳將孫瑒還都時陳文帝使顏晃賜瑒雜物瑒託縡啟謝詞理周洽文無加點晃還言之文帝召為撰史學士再遷驃騎安成王中記室撰史如故縡篤信佛教從興皇寺慧朗法師受三論盡通其學尋以本官兼通直散騎侍郎使齊還累遷太子庶子僕後主即位遷祕書監右衞將軍兼中書通事舍人掌詔誥縡為文典麗性又敏速雖軍國大事下筆輒成未嘗起草沈思者亦無以加甚為後主所重然性木強不持檢操負才使氣陵侮人物朝士多銜之會施文慶沈客卿以佞見幸專制衡軸而縡益疎文慶等因共譖之後主收縡下獄縡素剛因憤恚於獄中上書曰夫人君者恭事上帝子愛黔黎省嗜慾遠諂佞未明求衣日旰忘食是以澤被區宇慶流子孫陛下頃來酒色過度不虔郊廟之神專媚淫昏之鬼小人在側宦豎弄權惡忠直若仇讎視百姓如草芥後宮曳綺繡馬餘菽粟兆庶流離轉尸蔽野貨賄公行帑藏損耗神怒人怨衆叛親離恐東南王氣自斯而盡書奏後主大怒頃之稍解使謂曰我欲赦卿卿能改過不縡對曰臣心如面臣面可改則臣心可改後主於是益怒令宦者李善度窮其事賜死獄中有集十卷縡雖強直有才而毒惡傲慢為當世所疾及死有惡蛇屈尾來上靈牀當前受祭酹去而復來者百餘日時時有彈指聲時有吳興章華字仲宗家本農夫至華獨好學與士君子游處頗通經史善屬文侯景之亂游嶺南居羅浮山寺專精習業歐陽頠為廣州刺史署為南海太守頠子紇敗乃還都後主時除太市令非其所好乃辭以疾禎明初上書極諫其大略曰陛下即位于今五年不思先帝之艱難不知天命之可畏溺於嬖寵惑於酒色祠七廟而不出拜妃嬪而臨軒老臣宿將棄之草莽諂佞讒邪升之朝廷今疆埸日蹙隋軍壓境陛下如不改絃易張臣見麋鹿復游於姑蘇矣書奏後主大怒即日斬之顧野王字希馮吳郡吳人也祖子喬梁東中郎武陵王府參軍事父烜信威臨賀王記室兼本郡五官掾以儒術知名野王幼好學七歲讀五經略知大旨九歲能屬文嘗制日賦領軍朱䌇見而奇之十二隨父之建安撰建安地記二篇長而徧觀經史精記默識天文地理蓍龜占候蟲篆奇字無所不通為臨賀王府記室宣城王為揚州刺史野王及琅邪王襃並為賓客王甚愛其才野王又善丹青王於東府起齋令野王畫古賢命王襃書贊時人稱為二絕及侯景之亂野王丁父憂歸本郡乃召募鄉黨隨義軍援都野王體素清羸裁長六尺又居喪過毀殆不勝哀及杖戈被甲陳君臣之義逆順之理抗辭作色見者莫不壯之城陷逃歸會稽陳天嘉中敕補撰史學士太建中為太子率更令尋領大著作掌國史知梁史事後為黃門侍郎光祿卿知五禮事卒贈祕書監右衞將軍野王少以篤學至性知名在物無過辭失色觀其容貌似不能言其厲精力行皆人所莫及所撰玉篇三十卷輿地志三十卷符瑞圖十卷顧氏譜傳十卷分野樞要一卷續洞冥記一卷玄象表一卷並行於時又撰通史要略一百卷國史紀傳二百卷未就而卒有文集二十卷時有蕭濟字孝康東海蘭陵人也好學博通經史仕梁為太子舍人預平侯景功封松陽縣侯陳文帝為會稽太守以濟為宣毅府長史及即位授侍中太建中歷位五兵度支祠部三尚書卒姚察字伯審吳興武康人吳太常卿信之九世孫也父僧垣梁太醫正及元帝在荊州為晉安王諮議參軍後入周位遇甚重察幼有至性六歲誦書萬餘言不好戲弄勵精學業十二能屬文僧垣精醫術知名梁代二宮所得供賜皆回給察兄弟為游學之資察並用聚蓄圖書由是聞見日博年十三梁簡文帝時在東宮盛修文義即引於宣猷堂聽講論難為儒者所稱及簡文嗣位尤加禮接起家南海王國左常侍兼司文侍郎後兼尚書駕部郎遇梁室喪亂隨二親還鄉里在亂離間篤學不廢元帝於荊州即位授察原鄉令後為佐著作撰史陳永定中吏部尚書徐陵領大著作復引為史佐太建初補宣明殿學士尋為通直散騎常侍報聘于周江左耆舊先在關右者咸相傾慕沛國劉臻竊於公館訪漢書疑事十餘條並為剖析皆有經據臻謂所親曰名下定無虛士著西聘道里記使還補東宮學士遷尚書祠部侍郎舊魏王肅奏祀天地設宮懸之樂八佾之爾後因循不革至梁武帝以為事人禮縟事神禮簡古無宮懸之文陳初承用莫有損益宣帝欲設備樂付有司立議以梁武為非時碩學名儒朝端在位咸希旨注同察乃博引經籍獨違羣議據梁樂為是當時驚駭莫不慚服僕射徐陵因改同察議其不順時隨俗皆此類也後歷仁威淮南王平南建安王二府諮議參軍丁內憂去職俄起為戎昭將軍知撰梁史後主立兼東宮通事舍人知撰史至德元年除中書侍郎轉太子僕餘並如故初梁室淪沒察父僧垣入長安察蔬食布衣不聽音樂至是凶問因聘使到江南時察母韋氏喪制適除後主以察羸瘠慮加毀頓乃密遣中書舍人司馬申就宅發哀仍敕申專加譬抑尋以忠毅將軍起兼東宮通事舍人察頻讓不許俄敕知著作郎事服闋除給事黃門侍郎領著作察既累居憂戚齋素日久因加氣疾後主嘗別召見為之動容命停長齋令從晚食又詔授祕書監領著作奏撰中書表集歷度支吏部二尚書察自居顯要一不交通嘗有私門生不敢厚餉送南布一端花綀一匹察謂曰吾所衣著止是麻布蒲綀此物於吾無用既欲相款接幸不煩爾此人遜請察厲色驅出自是莫敢饋遺陳亡入隋詔授祕書丞別敕成梁陳二史又敕於朱華閣長參文帝知察蔬菲別日獨召入內殿賜果菜指謂朝臣曰聞姚察學行當今無比我平陳唯得此一人開皇十三年襲封北絳郡公察在陳時聘周因得與父僧垣相見將別之際絕而復蘇至是承襲愈更悲感見者莫不為之歔欷丁後母杜氏喪解職在服制之中有白鳩巢于戶上仁壽二年詔除員外散騎常侍晉王侍讀煬帝即位授太子內舍人及改易衣冠刪定朝式預參對問大業二年終于東都遺命薄葬以松板薄棺纔可容身土周於棺而已葬日止麤車即送厝舊塋北不須立靈置一小牀每日設清水六齋日設齋食菜果任家有無不須別經營也初察欲讀一藏經並已究竟將終曾無痛惱但西向坐正念云一切空寂其後身體柔軟顏色如兩宮悼惜贈賵甚厚察至孝有人倫鑒識沖虛謙遜不以所長矜人專志著書白首不倦所著漢書訓纂三十卷說林十卷西聘玉璽建康三鍾等記各一卷文集二十卷所撰梁陳史雖未畢功隋開皇中文帝遣中書舍人虞世基索本且進臨亡戒子思廉撰續思廉在陳為衡陽王府法曹參軍會稽王主簿論曰沈炯才思之美足以繼踵前良然仕於梁朝年已知命主非不文而位裁邑宰及於運逢交喪驅馳戎馬所在稱美用捨信有時焉虞荔弟兄才行兼著崎嶇喪亂保茲貞一並取貴時主豈虛得乎傅縡聰警特達才氣自負行之平日其猶殆諸處以危邦死其宜矣顧姚栖託藝文蹈履清直文質彬彬各踐通賢之域美矣乎
