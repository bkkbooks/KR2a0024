body:
  text: 南史卷三十四列傳第二十四顏延之子竣從子師伯沈懷文子沖從兄曇慶周朗族孫顒顒子捨捨弟子弘正弘讓弘直弘直子確顏延之字延年琅邪臨沂人也曾祖含晉右光祿大夫祖約零陵太守父顒護軍司馬延之少孤貧居負郭好讀書無所不覽文章冠絶當時好飲酒不護細行年三十猶未昏妹適東莞劉穆之子憲之穆之聞其美才將仕之先欲相見延之不往也後為宋武帝豫章公世子中軍行參軍及武帝北伐有宋公之授府遣延之慶殊命行至洛陽周視故宮室盡為禾黍悽然詠黍離篇道中作詩二首為謝晦傅亮所賞武帝受命補太子舍人雁門周續之隱廬山儒學著稱永初中徵詣都下開館以居之武帝親幸朝彥畢至延之宮官列卑引升上席上使問續之三義續之雅仗辭辨延之每以簡要連挫續之上又使還自敷釋言約理暢莫不稱善再遷太子中舍人時尚書令傅亮自以文義一時莫及延之負其才不為之下亮甚疾焉廬陵王義真待之甚厚徐羡之等疑延之為同異意甚不悅少帝即位纍遷始安太守領軍將軍謝晦謂延之曰昔荀勗忌阮咸斥為始平郡今卿又為始安可謂二始黃門郎殷景仁亦謂之曰所謂人惡俊異世疵文雅延之之郡道經汨潭為湘州刺史張邵祭屈原文以致其意元嘉三年羡之等誅徵為中書侍郎轉太子中庶子領步兵校尉賞遇甚厚延之既以才學見遇當時多相推服唯袁淑年倍小延之不相推重延之忿於衆中折之曰昔陳元方與孔元駿齊年文學元駿拜元方於牀下今君何得不見拜淑無以對延之疏誕不能取容當世見劉湛殷景仁專當要任意有不平常言天下事豈一人之智所能獨了辭意激揚每犯權要又少經為湛父柳後將軍主簿至是謂湛曰吾名器不升當由作卿家吏耳湛恨焉言於彭城王義康出為永嘉太守延之甚怨憤乃作五君詠以述竹林七賢山濤王戎以貴顯被黜詠嵇康云鸞翮有時鎩龍性誰能馴詠阮籍云物故不可論途窮能無慟詠阮咸云屢薦不入官一麾乃出守詠劉伶云韜精日沈飲誰知非荒宴此四句蓋自序也湛及義康以其辭旨不遜大怒欲黜為遠郡文帝與義康詔曰宜令思愆里閭猶復不悛當驅往東土乃至難恕者自可隨事録之於是延之屏居不豫人間者七載中書令王球以名公子遺務事外與延之雅相愛好每振其罄匱晉恭思皇后葬應須百官皆取義熙元年除身以延之兼侍中邑吏送札延之醉投札於地曰顏延之未能事生焉能事死文帝嘗召延之傳詔頻不見常日但酒店裸袒挽歌了不應對他日醉醒乃見帝嘗問以諸子才能延之曰竣得臣筆測得臣文奐比得臣義躍得臣酒何尚之嘲曰誰得卿狂答曰其狂不可及尚之為侍中在直延之以醉詣焉尚之望見便陽眠延之發簾熟視曰朽木難雕尚之謂左右曰此人醉甚可畏間居無事為庭誥之文以訓子弟劉湛誅後起延之為始興王濬後軍咨議參軍御史中丞在任從容無所舉奏遷國子祭酒司徒左長史何尚之素與延之狎書與王球曰延之有後命教府無復光暉坐啓買人田不肯還直尚書左丞荀赤松奏之曰求田問舍前賢所鄙延之唯利是視輕冒陳聞依傍詔恩抵捍餘直垂及周年猶不畢了昧利苟得無所顧忌延之昔坐事屏斥復蒙抽進而曾不悛革怨誹無已交游闒茸沈迷麴糵橫興譏謗詆毀朝士仰竊過榮增憤薄之性私恃顧眄成強梁之心外示寡求內懷奔競干祿祈遷不知極已預宴班觴肆詈上席山海容含每存遵養愛兼雕蟲未忍遐棄而驕放不節日月彌甚臣聞聲問過情孟軻所恥況聲非外來問由己出雖心智薄劣而高自比擬客氣虛張曾無愧畏豈可復弼亮五教增耀台階請以延之訟田不實妄干天聽以強陵弱免所居官詔可後為祕書監光祿勳太常時沙門釋慧琳以才學為文帝所賞朝廷政事多與之謀遂士庶歸仰上每引見常升獨榻延之甚疾焉因醉白上曰昔同子參乘袁絲正色此三台之坐豈可使刑餘居之上變色延之性既褊激兼有酒過肆意直言曾無回隱故論者多不與之謂之顏彪居身儉約不營財利布衣蔬食獨酌郊野當其為適傍若無人三十年致事元凶弒立以為光祿大夫長子竣為孝武南中郎咨議參軍及義師入討竣定密謀兼造書檄劭召延之示以檄文問曰此筆誰造延之曰竣之筆也又問何以知之曰竣筆體臣不容不識劭又曰言辭何至乃爾延之曰竣尚不顧老臣何能為陛下劭意乃釋由是得免孝武登阼以為金紫光祿大夫領湘東王師嘗與何偃同從上南郊偃於路中遙呼延之曰顏公延之以其輕脫怪之答曰身非三公之公又非田舍之公又非君家阿公何以見呼為公偃羞而退竣既貴重權傾一朝凡所資供延之一無所受器服不改宅宇如舊常乘羸牛車逢竣鹵簿即屏住道側又好騎馬遨游里巷遇知舊輒據鞍索酒得必傾盡欣然自得嘗語竣曰平生不喜見要人今不幸見汝見竣起宅謂曰善為之無令後人笑汝拙也表解師職加給親信二十人嘗早候竣遇賓客盈門竣方臥不起延之怒曰恭敬撙節福之基也驕佷傲慢禍之始也況出糞土之中而升雲霞之上傲不可長其能久乎延之有愛姬非姬食不飽寢不安姬憑寵嘗蕩延之墜牀致損竣殺之延之痛惜甚至常坐靈上哭曰貴人殺汝非我殺汝以冬日臨哭忽見妾排屏風以壓延之延之懼墜地因病孝建三年卒年七十三贈特進諡曰憲子延之與陳郡謝靈運俱以辭采齊名而遲速縣絶文帝嘗各敕擬樂府北上篇延之受詔便成靈運久之乃就延之嘗問鮑照己與靈運優劣照曰謝五言如初發芙蓉自然可愛君詩若鋪錦列繡亦雕繢滿眼延之每薄湯惠休詩謂人曰惠休制作委巷中歌謠耳方當誤後生是時議者以延之靈運自潘嶽陸機之後文士莫及江右稱潘陸江左稱顏謝焉竣字士遜延之長子也早有文義為宋孝武帝撫軍主簿甚被嘉遇竣亦盡心補益元嘉中上不欲諸王各立朋黨將召竣補尚書郎江湛以為在府有稱不宜回改乃止隨府轉安北鎮軍北中郎府主簿初沙門釋僧含精有學義謂竣曰貧道常見讖記當有真人應符名稱次第屬在殿下後竣在彭城嘗於親人之言遂宣布聞於文帝時元凶巫蠱事已發故上不加推案孝武鎮尋陽遷南中郎記室三十年春以父延之致仕固求解職賜假未發而文帝崩問至孝武舉兵入討轉咨議參軍領録事任總內外並造檄書孝武發尋陽便有疾自沈慶之以下並不堪相見唯竣出入臥內斷決軍機時孝武屢經危篤不任咨禀凡厥衆務竣皆專斷施行孝武踐阼歷侍中左衛將軍封建城縣侯孝建元年轉吏部尚書領驍騎將軍留心選舉自強不息任遇既隆奏無不可後謝莊代竣領選意多不行竣容貌嚴毅莊風姿甚美賓客喧訴常歡笑答之人言顏竣瞋而與人官謝莊笑而不與人官南郡王義宣臧質等反以竣兼領右將軍義宣質諸子藏匿建康秣陵湖熟江寧縣界孝武大怒免丹陽尹褚湛之官收四縣官長以竣為丹陽尹加散騎常侍先是竣未有子而大司馬江夏王義恭諸子為元凶所殺至是各産男上自為制名名義恭子為伯禽以比魯公伯禽周公之子名竣子為辟強以比漢侍中辟強張良之子也先是元嘉中鑄四銖錢輪郭形制與五銖同用費損無利故百姓不盜鑄及孝武即位又鑄孝建四銖所鑄錢形式薄小輪郭不成於是人間盜鑄者雜以鉛錫並不牢固又翦鑿古錢以取其銅錢轉薄小稍違官式雖重制嚴刑人吏官長坐死免者相係而盜鑄彌甚百物踊貴人患苦之乃立品格薄小無輪郭者悉加禁斷始興公沈慶之議宜聽人鑄錢置署樂鑄之家皆居署內去春所禁新品一時施用今鑄悉依此格萬稅三千嚴檢盜鑄並禁翦鑿數年之間公私豐贍銅盡事息姦僞自止禁鑄則銅轉成器開鑄則器化為財上下其事於公卿竣議曰今云開署放鑄誠所欲同但慮采山事絶器用日耗銅既轉少器亦彌貴設器直一千則鑄之減半為之無利雖令不行時議者又以銅難得欲鑄二銖錢竣又議曰今鑄二銖恣行新細於官無解於乏而人姦巧大興天下之貨將糜碎至盡空曰嚴禁而利深難絶不過一二年間其弊不可復救此其甚不可一也使姦人意騁而貽厥愆謀此又甚不可二也富商得志貧人因窘此又甚不可三也若使交益深重尚不可行況又未見利而衆弊如此失算當時取笑百代乎前廢帝即位鑄二銖形式轉細官錢每出人間即模效之而大小厚薄皆不及也無輪郭不磨鑢如今之翦鑿者謂之耒子錢景和元年沈慶之啓通私鑄由是錢貨亂敗一千錢長不盈三寸大小稱此謂之鵝眼錢劣於此者謂之綖環錢貫之以縷入水不沈隨手破碎市井不復料數十萬錢不盈一掬斗米一萬商貨不行明帝初唯禁鵝眼綖環其餘皆通用復禁人鑄官署亦廢尋復普斷唯用古錢竣自散騎常侍丹陽尹加中書令表讓中書令見許時歲旱人飢竣上言禁餳一月息米近萬斛復代謝莊為吏部尚書領太子右衛率未拜丁父憂裁踰月起為右將軍丹陽尹如故竣固辭表十上不許遣中書舍人戴明寶抱竣登車載之郡舍賜以布衣一襲絮以綵綸遣主衣就衣諸體竣藉蕃朝之舊臣每極陳得失上自即吉之後宮內頗有醜論又多所興造竣諫爭懇切並無所回避上意甚不悅多不見從竣自謂才足幹時恩舊莫比當贊務居中永執朝政而所陳多不被納疑上欲疏之乃求出以卜時旨大明元年以為東揚州刺史所求既許便憂懼無計至州又丁母艱不許去職聽送喪還都恩待猶厚竣彌不自安每對親故頗懷怨憤又言朝廷違謬人主得失及王僧達被誅謂為所讒構臨死陳竣前後忿懟恨言不見從僧達所言頗相符會上乃使御史中丞庾徽之奏竣窺覘國柄潛圖久執受任選曹驅扇滋甚出尹京輦形勢彌放傳詔犯憲舊須啓聞而竣以通訴忤己輒加鞭辱罔顧威靈莫此為甚懷挾姦數包藏隱慝豫聞中旨罔不宣露罰則委上善必歸己脅懼上宰激動閭閻末慮上聞內懷猜懼僞請東牧以卜天旨既獲出藩怨詈方肆反脣腹誹方之已輕前冬母亡詔賜還葬事畢不去盤桓經時方構間勳貴造立同異遂以己被斥外國道將顛兼行闕於家早負世議天倫怨毒親交震駭街談道說非復風聲宜加顯戮以昭盛化請以見事免竣所居官下太常削爵土上未欲便加大戮且止免官竣頻啓謝罪並乞性命上愈怒詔答曰憲司所奏非宿昔所以相期卿受榮遇政當極此訕訐怨憤已孤本望乃復過煩思慮懼不全立豈為下事上誠節之至邪及竟陵王誕為逆因此陷之言通於誕召御史中丞庾徽之於前立奏奏成詔先打折足然後於獄賜死妻息宥之以遠子辟強徙交州又於宮亭湖沈殺之竣文集行於世竣弟測亦以文章見知官至江夏王義恭大司馬録事參軍以兄貴為憂先竣卒明帝即位詔曰延之昔師訓朕躬情契兼重前記室參軍濟陽太守奐比伏事蕃朝綢繆恩舊可擢為中書侍郎奐比延之第三子也顏師伯字長深竣族兄也父邵剛正有局力為謝晦領軍司馬晦鎮江陵請為咨議參軍領録事軍府之務悉委焉邵慮晦有禍求為竟陵太守未及之郡會晦見討邵飲藥死師伯少孤貧涉獵書傳頗解聲樂弟師仲妻臧質女也質為徐州辟師伯為主簿孝武為徐州師伯仍為輔國安北行參軍王景文時為咨議參軍愛其諧敏進之孝武以為徐州主簿善於附會大被知遇及去鎮師伯以主簿送故孝武鎮尋陽啓文帝請為南中郎府主簿文帝不許謂典籤曰中郎府主簿那得用顏師伯孝武啓為長流正佐帝又曰朝廷不能除之郎可自板然亦不宜署長流乃板為參軍刑獄及討元凶轉主簿孝武踐阼以為黃門侍郎纍遷侍中大明元年封平都縣子親幸隆密羣臣莫二多納貨賄家纍千金孝武嘗與師伯摴蒱帝擲得雉大悅謂必勝師伯後得盧帝失色師伯遽斂子曰幾作盧爾日師伯一輸百萬仍遷吏部尚書右軍將軍上不欲威權在下前後領選者唯奉行文書師伯專情獨斷奏無不可七年為尚書右僕射時分置二選陳郡謝莊琅邪王曇生並為吏部尚書師伯子舉周旋寒人張奇為公車令上以奇資品不當使兼市買丞以蔡道惠代之令史潘道栖褚道惠顏禕之元從夫任淡之石道兒黃難周公選等抑道惠敕使奇先到公車不施行奇兼市買丞事師伯坐以子預職莊曇生免官道栖道惠棄市禕之等六人鞭杖一百師伯尋領太子中庶人雖被黜挫受任如初孝武臨崩師伯受遺詔輔幼主尚書中事專以委之廢帝即位復還即真加領衛尉師伯居權日久天下輻凑游其門者爵位莫不踰分多納貨賄家産豐積妓妾聲樂盡天下之選園池第宅冠絶當時驕奢淫恣為衣冠所疾又遷尚書僕射領丹陽尹廢帝欲親朝政轉師伯為左僕射以吏部尚書王景文為右僕射奪其京尹又分臺任師伯至是始懼與柳元景謀廢立初師伯專斷朝事不與沈慶之參懷謂令史曰沈公爪牙者耳安得預政事慶之聞而切齒乃泄其謀尋與太宰江夏王義恭同誅六子皆見殺明帝即位諡曰荒沈懷文字思明吳興武康人也祖寂晉光祿勳父宣新安太守懷文少好玄理善為文章為楚昭王二妃詩見稱於世為江夏王義恭東閣祭酒丁父憂新安郡送故豐厚奉終禮畢餘悉班之親戚一無所留文帝聞而嘉之賜奴婢六人服闋除尚書殿中郎隱士雷次宗被徵居鍾山後南還廬江何尚之設祖道文義之士畢集為連句詩懷文所作尤美辭高一座隨王誕鎮襄陽出為後軍主簿與咨議參軍謝莊共掌辭令領義成太守元嘉二十八年誕當為廣州欲以懷文為安南府記室先除通直郎懷文固辭南行上不悅弟懷遠納東陽公主養女王鸚鵡為妾元凶行巫蠱鸚鵡豫之事泄懷文因此失調為治書侍御史元凶弒立以為中書侍郎孝武入討呼之使作符檄固辭劭大怒會殷沖救得免託疾落馬間行奔新亭以為竟陵王誕驃騎録事參軍淮陵太守時國哀未釋誕欲起內齊懷文以為不可乃止尋轉揚州中從事史時議省録尚書懷文以為非宜上議不從遷別駕從事史及江夏王義恭遷西陽王子尚為揚州居職如故時熒惑守南斗上乃廢西州舊館使子尚移居東城以厭之懷文曰天道示變宜應之以德今雖空西州恐無益也不從而西州竟廢大明二年遷尚書吏部郎時朝議欲依古制置立王畿揚州移居會稽猶以星變故也懷文曰周制封畿漢置司隸各因時宜非存相反安人定國其揆一也苟人心所安天亦從之未必改今追古乃致平一神州舊壤歷代相承異於邊州或置或罷既物情不悅容虧化本又不從三年子尚移鎮會稽遷撫軍長史行府州事時囚繫甚多動經年月懷文到任訊五郡九百三十六獄衆咸稱平入為侍中寵待隆密竟陵王誕據廣陵反及城陷士庶皆裸身鞭面然後加刑聚所殺人首於石頭南岸謂之髑髏山懷文陳其不可上不納孝武嘗有事圓丘未至期而雨晦竟夜明旦風霽雲色甚美帝升壇悅懷文稱慶曰昔漢后郊祀太一白日重輪神光四燭今陛下有事茲禮而膏雨迎夜清景麗朝斯實聖明幽感所致臣願與侍臣賦之上笑稱善揚州移會稽上忿浙江東人情不和欲貶其勞祿唯西州舊人不改懷文曰揚州徙居既乖人情一州兩格尤失大體上不從懷文與顏竣周朗素善竣以失旨見誅朗亦以忤意得罪上謂懷文曰竣若知我殺之亦當不敢如此懷文默然又嘗以歲夕與謝莊王景文顏師伯被敕入省未及進景文因談言次稱竣朗人才之美懷文與相酬和師伯後因語次白上景文等此言懷文屢經犯忤至此上倍不悅上又壞諸郡士族以充將吏並不服役至悉逃亡加以嚴制不能禁乃改用軍法得便斬之莫不奔竄山湖聚為盜賊懷文又以為言齊庫上絹年調巨萬匹綿亦稱此期限嚴峻人間買絹一匹至三二千綿一兩三四百貧者賣妻子甚者或自縊死懷文具陳人困由是綿絹薄有所減俄復舊子尚等諸皇子皆置邸舍逐什一之利為患遍天下懷文又曰列肆販賣古人所非卜式明不雨之由弘羊受致旱之責若以用度不充故宜量加減省不聽孝建以來抑黜諸弟廣陵平後復欲更峻其科懷文曰漢明不使其子比光武之子前史以為美談陛下既明管蔡之誅願崇唐衛之寄及海陵王休茂誅欲遂前議太宰江夏王義恭探得密旨先發議端懷文固請不可由是得息時游幸無度太后六宮常乘副車在後懷文與王景文每諫不宜亟出後因從坐松樹下風雨甚驟景文曰卿可以言矣懷文曰獨言無繼宜相與陳之江智深臥草側亦謂之善俄而被召俱入雉場懷文曰風雨如此非聖躬所宜景文又曰懷文所啓宜從智深未及有言上方注弩作色曰卿欲效顏竣邪何以知人事又曰顏竣小子恨不得鞭其面上每宴集在坐者咸令沈醉懷文素不飲酒又不好戲上謂故欲異己謝莊嘗誡懷文曰卿每與人異亦何可久懷文曰吾少來如此豈可一朝而變非欲異物性之所不能耳五年出為晉安王子勛征虜長史廣陵太守明帝坐朝正事畢被遣還北以女病求申臨辭又乞停三日訖猶不去為有司所糾免官禁錮十年既被免賣宅還東上大怒收付廷尉賜死弟懷遠為始興王濬征北長流參軍深見親待坐納王鸚鵡為妾孝武徙之廣州刺史宗賣心欲殺之會南郡王義宣反懷遠頗間文筆賣心起義使造檄書並銜命至始興與始興相沈法系論起義事事平賣心具為陳請由此見原終孝武不得還前廢帝世歸位武康令撰南越志及懷文文集並傳於世懷文三子淡深沖沖字景綽涉獵文義仕宋歷位撫軍正佐兼記室及懷文得罪被繫沖兄弟行謝情哀貌苦見者傷之柳元景欲救懷文言於孝武曰沈懷文三子塗炭不可見願陛下速正其罪帝曰宜急殺之使其意分竟殺之元景為之歎息沖兄弟以此知名纍遷司徒録事齊武帝為江州沖為征虜長史尋陽太守齊建元中纍遷太子中庶子武帝在東宮待以恩舊及即位轉御史中丞侍中永明四年為五兵尚書沖與兄淡深名譽有優劣世號為腰鼓兄弟淡深並歷御史中丞兄弟三人皆為司直晉宋所未有也中丞案裁之職被惡者多結怨永明中深彈吳興太守袁彖建武中彖從弟昂為中丞到官數日奏彈深子繢父在僦白幰車免官禁錮沖母孔氏在東鄰家失火疑為人所焚爇大呼曰我三兒皆作御史中丞與人豈有善者方恐肌分骨散何但焚如兄弟後並歷侍中武帝方欲任沖尋卒追贈太常諡曰恭子曇慶懷文從父兄也父發員外散騎侍郎曇慶仕宋位尚書左丞時歲有水旱曇慶議立常平倉以救人急文帝納其言而事不行大明元年為徐州刺史時殿中員外將軍裴景仁助戍彭城景仁本北人多悉關中事曇慶使撰秦記十卷苻氏事其書傳於世曇慶謹實清正所蒞有稱績常謂子弟曰吾處世無才能圖作大老子耳世以長者稱之卒於祠部尚書周朗字義利汝南安成人也父淳宋初歷位侍中太常兄嶠尚武帝第四女宣城德公主二女適建平王宏廬江王褘以貴戚顯官朗少而愛奇雅有風氣與嶠志趨不同嶠甚疾之為江夏王義恭太尉參軍元嘉二十七年春朝議北侵魏當遣義恭出鎮彭城為諸軍大統朗聞之解職及義恭出鎮府主簿羊希從行與朗書戲之勸令獻奇進策朗報書援引古義辭意倜儻孝武即位除建平王宏中軍録事參軍時普責百官讜言朗上書陳述得失多自矜誇書奏忤旨自解去職後為廬陵內史郡界荒蕪頗有野獸母薛氏欲見獵朗乃合圍縱火令母觀之火逸燒郡解朗悉以秩米起屋償所燒之限稱疾去官為州司所糾還都謝孝武曰州司舉臣愆失多不允臣在郡猛獸三食人蟲鼠犯稼以此二事上負陛下上變色曰州司不允或可有之蟲獸之災寧關卿小物朗尋丁母憂每哭必慟其餘頗不依居喪常大明四年上使有司奏其居喪無禮詔曰朗悖禮利口宜合翦戮微物不足亂典刑特鎖付邊郡於是傳送寧州於道殺之朗族孫顒顒字彥倫晉左光祿大夫顗七世孫也祖虎頭員外常侍父恂歸鄉相顒少為族祖朗所知解褐海陵國侍郎益州刺史蕭惠開賞異顒攜入蜀為厲鋒將軍帶肥鄉成都二縣令仍為府主簿常謂惠開性太險每致諫惠開不悅答顒曰天險地險王侯設險但問用險何如耳隨惠開還都宋明帝頗好玄理以顒有辭義引入殿內親近宿直帝所為慘毒之事顒不敢顯諫輒誦經中因緣罪福事帝亦為之小止元徽中詔為剡令有恩惠百姓思之齊高帝輔政為齊殿中郎建元初為長沙王後軍參軍山陰令還為文惠太子中軍録事參軍文惠在東宮顒遷正員郎始興王前軍咨議直侍殿省深見賞遇顒音辭辨麗長於佛理著三宗論言空假義西涼州智林道人遺顒書深相贊美言捉麈尾來四十餘載頗見宗録唯此塗白黑無一人得者為之發病非意此音猥來入耳其論見重如此顒於鍾山西立隱舍休沐則歸之轉太子僕兼著作撰起居注遷中書郎兼著作如故常游侍東宮少從外氏車騎將軍臧質家得衛散隸書法學之甚工文惠太子使顒書玄圃茅齊壁國子祭酒何胤以倒薤書求就顒換之顒笑答曰天下有道丘不與易也每賓友會同顒虛席晤語辭韻如流聽者忘倦兼善老易與張融相遇輒以玄言相滯彌日不解清貧寡欲終日長蔬雖有妻子獨處山舍甚機辨衛將軍王儉謂顒曰卿山中何所食顒曰赤米白鹽緑葵紫蓼文惠太子問顒菜食何味最勝顒曰春初早韭秋末晚菘何胤亦精信佛法無妻太子又問顒卿精進何如何胤顒曰三塗八難共所未免然各有纍太子曰纍伊何對曰周妻何肉其言辭應變如此轉國子博士兼著作如故太學諸生慕其風爭事華辨始著四聲切韻行於時後卒於官子捨捨字升逸幼聰穎顒異之臨終謂曰汝不患不富貴但當將之以道德及長博學尤精義理善誦詩書音韻清辨弱冠秀才除太學博士從兄綿為剡縣贓汙不少籍沒資財捨乃推宅助焉建武中魏人吳苞南歸有儒學尚書僕射江祏招苞講捨造坐折苞辭理遒逸由是名為口辨王亮為丹陽尹聞而悅之辟為主簿政事多委焉遷太常丞梁武帝即位吏部尚書范雲與顒素善重捨才器言之武帝召拜尚書祠部郎禮儀損益多自捨出先是帝與諸王及吳平侯書皆云弟捨立議引武王周公故事皆曰汝從之纍遷鴻臚卿時王亮得罪歸家故人莫至捨獨敦恩舊及亮卒身營殯葬時人稱之遷尚書吏部郎太子右衛率右衛將軍雖居職屢徙而常留省內罕得休下國史詔誥儀體法律軍旅謀謨皆兼掌之日夜侍上豫機密二十餘年未嘗離左右帝以為有公輔器初范雲卒僉以沈約允當樞管帝以約輕易不如徐勉於是勉捨同參國政勉小嫌中廢捨專掌權轄雅量不及勉而清簡過之兩人俱稱賢相時議國史疑文帝紀傳之名捨以為帝紀之籠百事如乾象之包六爻今若追而為紀則事無所包若直書功德則傳而非紀應於上紀之前略有仰述從之捨占對辨捷嘗居直廬語及嗜好裴子野言從來不嘗食薑捨應聲曰孔稱不徹裴乃不嘗一坐皆悅與人論謔終日不絶而竟不言漏泄機事衆尤服之性儉素衣服器用居處牀席如布衣之貧者每入官府雖廣廈華堂閨閣重邃捨居之則塵埃滿積以荻為障壞亦不修歷侍中太子詹事普通五年南津校尉郭祖深獲始興相白渦書餉捨衣履及婢以聞坐免官以右驍騎將軍知詹事卒上臨哭哀動左右追贈侍中護軍將軍諡曰簡子初帝鋭意中原羣臣咸言不可唯捨贊成之普通中纍獻捷帝思其功下詔述其德美以為往者南司白渦之劾恐外議謂朕有私致此黜免追愧若人一介之善外可量加褒異以旌善人捨集二十卷二子弘義弘信弟子弘正弘正字思行父寶始梁司徒祭酒弘正幼孤及弟弘讓弘直俱為伯父捨所養年十歲通老子周易捨每與談論輒異之曰觀汝清理警發後世知名當出吾右河東裴子野深相賞納請以女妻之十五召補國子生仍於國學講易諸生傳習其義以季春入學孟冬應舉學司以日淺不許博士到洽曰周郎弱冠講經豈俟策試普通中初置司文義郎直壽光省以弘正為司義侍郎弘正醜而不陋吃而能談俳諧似優剛腸似直善玄理為當世所宗藏法師於開善寺講說門徒數百弘正年少未知名著紅褌錦絞髻踞門而聽衆人蔑之弗譴也既而乘間進難舉坐盡傾法師疑非世人覘知大相賞狎劉顯將之尋陽朝賢畢祖道顯縣帛十匹約曰險衣來者以賞之衆人競改常服不過長短之間顯曰將有甚於此矣既而弘正緑絲布袴繡假種軒昂而至折標取帛中大通三年昭明太子薨其嗣華容公不得立乃以晉安王綱為皇太子弘正奏記請抗目夷上仁之義執子臧大賢之節其抗直守正如此常自稱有才無相僕射徐勉掌選以其陋不堪為尚書郎乃獻書於勉其言甚切稍遷國子博士學中有宋元凶講孝經碑歷代不改弘正始到官即表刊除時於城西立士林館弘正居以講授聽者傾朝野焉弘正啓周易疑義凡五十條又請釋乾坤二繫復詔答之後為平西邵陵王府咨議參軍有罪應流徙敕以賜干利國未去寄繫尚方於獄上武帝講武詩降敕原罪仍復本位弘正博物知玄象善占候大同末嘗謂弟弘讓曰國家在數年當有兵起吾與汝不知何所逃之及武帝納侯景弘正謂弘讓曰亂階此矣臺城陷弘正諂附王偉又與周石珍合族避景諱改姓姬氏拜太常景將篡之際使掌禮儀及王僧辨東討元帝謂僧辨曰王師近次朝士孰當先來王僧辨曰其周弘正乎弘正智不後機體能濟勝無妻子之顧有獨決之明其餘碌碌不逮也俄而前部傳云弘正至僧辨飛騎迎之及見歡甚曰吾固知王僧達非後機者公可坐吾膝上對曰可謂進而若將加諸膝老夫何足以當僧辨即日啓元帝元帝手書與弘正仍遣使迎之謂朝士曰晉氏平吳喜獲二陸今我討賊亦得兩周及至禮數甚優朝臣無比授黃門侍郎直侍中省俄遷左戶尚書加散騎常侍夏月著犢鼻褌衣朱衣為有司所彈其放達如此元帝嘗著金樓子曰余於諸僧重招提琰法師隱士重華陽陶貞白士大夫重汝南周弘正其於義理清轉無窮亦一時之名士也弘正善清談梁末為玄宗之冠及侯景平僧辨啓送祕府圖籍敕弘正讎校時朝議遷都但元帝再臨荊陝前後二十餘年情所安戀不欲歸建業兼故府臣僚皆楚人並欲即都江陵云建康蓋是舊都雕荒已極且王氣已盡兼與北止隔一江若有不虞悔無所及且臣等又聞荊南有天子氣今其應矣元帝無去意時尚書左僕射王褒及弘正咸侍帝顧曰卿意何如褒等以帝猜忌弗敢衆中公害唯唯而已褒後因清閒密諫還丹陽甚切帝雖納之色不悅及明日衆中謂褒曰卿昨勸還建鄴不為無理吾昨夜思之猶懷疑惑褒知不引納乃止他日弘正乃正色諫至于再三曰若如士大夫唯聖王所都本無定處至如黔首未見入建鄴城便謂未是天子猶列國諸王今日赴百姓之心不可不歸建鄴當時頗相酬許弘正退後黃羅漢宗懍乃言弘正王褒並東人仰勸東下非為國計弘正竊知其言他日乃復上前面折二人曰若東人勸下東謂之私計西人勸住西亦是私計不衆人默然而人情並勸遷都上又曾以後堂大集文武其預會者四五百人帝欲遍試人情曰勸吾去者左袒於是左袒者過半武昌太守朱買臣上舊左右而閹人也頗有幹用故上擢之及是勸上遷曰買臣家在荊州豈不願官長住但恐是買臣富貴非官富貴邪上深感其言卒不能用及魏平江陵弘正遁歸建鄴太平元年授侍中領國子祭酒遷太帝卿都官尚書陳武帝授太子詹事天嘉元年遷侍中國子祭酒往長安迎宣帝三年自周還廢帝嗣位領都官尚書總知五禮事宣帝即位遷特進領國子祭酒加扶太建五年授尚書右僕射尋敕侍東宮講論語孝經太子以弘正德望素重有師資之敬焉弘正特善玄言兼明釋典雖碩德名僧莫不請質疑滯六年卒官年七十九贈侍中中書監諡曰簡子所著周易講疏十六卷論語疏十一卷莊子疏八卷老子疏五卷孝經疏二卷集二十卷行于代子豫玄年十四與俱載入東乘小船度岸見藤花弘正挽之船覆俱溺弘正僅免豫玄遂得心驚疾次子墳尚書吏部郎弘讓性簡素博學多通始仕不得志隱於句容之茅山頻徵不出晚仕侯景為中書侍郎人問其故對曰昔王道正直得以禮進退今乾坤易位不至將害於人吾畏死耳始彭城劉孝先亦辭辟命隨兄孝勝在蜀武陵建號仕為世子府咨議參軍二隱並獲譏於代弘讓承聖初為國子祭酒二年為仁威將軍城句容以居之命曰仁威壘陳天嘉初以白衣領太常卿光祿大夫加金章紫綬弘讓弟弘直字思方幼而聰敏仕梁為西中郎湘東王外兵記室參軍與東海鮑泉南陽宗懍平原劉緩沛國劉瑴同掌書記王出鎮江荊二州纍除咨議參軍及承制封湘濱縣侯纍遷昌州刺史王琳之舉兵弘直在湘州琳敗乃入陳位太帝卿光祿大夫加金章紫綬弘直方雅敦厚氣調高於次昆或問三周孰賢人曰若蜂腰矣太建七年卒遺疏氣絶之後便買市中見材小形者斂以時服古人通制但下見先人必須備禮可著單衣裙衫故履既應侍養宜備紛帨或逢善友又須香煙棺內唯安白布手巾粗香爐而已此外無所用卒於家年七十六有集二十卷子確字士潛美容儀寬大有行檢博涉經史篤好玄言位都官尚書禎明初卒論曰文人不護細行古令之所同焉由夫聲裁所知故取忤於人者也觀夫顏謝之於宋朝非不名高一代靈運既以取斃延之亦躓當年向之所謂貴身翻成害己者矣士遜援筆數罪陵讎犯難餌彼慈親棄之獸吻以此為忠無聞前誥夫自忍其親必將忍人之親士遜自忘其孝期以申人之孝自非嚴父之辭允而義愜則難乎免矣師伯行己縱欲好進忘退既以此始亦以此終宜乎懷文蹈履之地足以追蹤古烈孔母致懼中丞其誡深矣周朗始終之節亦倜儻為尤顒捨父子文雅不墜弘正兄弟義業幾乎德門者焉
