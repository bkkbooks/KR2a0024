body:
  text: 南史卷五十七列傳第四十七沈約子旋孫衆范雲從兄縝沈約字休文吳興武康人也昔金天氏有裔子曰昧為玄冥師生子允格臺駘臺駘能業其官宣汾洮障大澤以處太原帝顓頊嘉之封諸汾川其後四國沈姒蓐黃沈子國今汝南平輿沈亭是也春秋之時列於盟會魯昭四年晉使蔡滅沈其後因國為氏自茲以降譜諜罔存秦末有沈逞徵丞相不就漢初逞曾孫保封竹邑侯保子遵自本國遷居九江之壽春官至齊王太傅封敷德侯遵生驃騎將軍達達生尚書令乾乾生南陽太守弘弘生河內太守勗勗生御史中丞奮奮生將作大匠恪恪生尚書關內侯謙謙生濟陽太守靖靖生戎戎字威卿仕為州從事説降劇賊尹良漢光武嘉其功封為海昏縣侯辭不受因避地徙居會稽烏程縣之餘不鄉遂家焉順帝永建元年分會稽為吳郡復為吳郡人靈帝初平五年分烏程餘杭為永安縣吳孫晧寶鼎二年分吳郡為吳興郡晉太康三年改永安為武康縣復為吳興武康人焉雖邦邑屢改而築室不遷戎子酆字聖通位零陵太守致黃龍芝草之瑞第二子仲高安平相少子景河間相演之慶之曇慶懷文其後也仲高子鸞字建光少有高名州舉茂才公府辟州別駕從事史時廣陵太守陸稠鸞之舅也以義烈政績顯名漢朝復以女妻鸞早卒又直字伯平州舉茂才亦有清名卒子瑜儀俱少有至行瑜十歲儀九歲而父亡居喪毀瘁過於成人外祖會稽盛孝章漢末名士也深加憂傷每撫慰之曰汝並黃中英爽終成奇器何遽逾制自取殄滅邪三年禮畢殆至滅性故兄弟並以孝著瑜早卒儀字仲則篤學有雅才以儒素自業時海內大亂兵革並起經術廢弛士少全行而儀淳深隱默守道不移風操貞整不妄交納唯與族子仲山叔山及吳郡陸公紀友善州郡禮請二府交辟公車徵並不屈以壽終子曼字元禪左中郎新都都尉定陽侯才志顯於吳朝子矯字仲桓以節氣立名仕為立武校尉偏將軍孫晧時有將帥之稱吳平為鬱林長沙二郡太守不就太康末卒子陵字景高晉元帝之為鎮東將軍命參軍事子延字思長潁川太守始居縣東鄉之博陸里餘烏村延子賀字子寧桓沖南中郎參軍賀子警字世明惇篤有行業學通左氏春秋家産纍千金後將軍謝安命為參軍甚相敬重警內足於財為東南豪士無進仕意謝病歸安固留不止乃謂曰沈參軍卿有獨善之志不亦高乎警曰使君以道御物前所以懷德而至既無用佐時故遂飲啄之願爾還家積載以素業自娛前將軍王恭鎮京口與警有舊好復引為參軍手書殷勤苦相招致不得已而應之尋復謝去子穆夫字彥和少好學通左氏春秋王恭命為前將軍主簿謂警曰足下既執不拔之志高臥東南故屈賢子共事非吏職嬰之也初錢唐人杜炅字子恭通靈有道術東土豪家及都下貴望並事之為弟子執在三之敬警纍世事道亦敬事子恭子恭死門徒孫泰泰弟子恩傳其業警復事之隆安三年恩於會稽作亂自稱征東將軍三吳皆響應穆夫在會稽恩以為餘姚令及恩為劉牢之所破穆夫見害先是穆夫宗人沈預與穆夫父警不協至是告警及穆夫弟仲夫任夫預夫佩夫並遇害唯穆夫子深子雲子田子林子虔子獲全田子林子知名田子字敬光從武帝剋京城進平建鄴參鎮軍事封營道縣五等侯帝北伐廣固田子領偏師與龍驤將軍孟龍符為前鋒龍符戰沒田子力戰破之及盧循逼都帝遣田子與建威將軍孫季高海道襲破廣州還除太尉參軍淮陵內史賜爵都鄉侯義熙八年從討劉毅十一年從討司馬休之除振武將軍扶風太守十二年武帝北伐田子與順陽太守傅弘之各領別軍從武關入屯據青泥姚泓將自禦大軍慮田子襲其後欲先平田子然後傾國東出乃率步騎數萬奄至青泥田子本為疑兵所領裁數百欲擊之傅弘之曰彼衆我寡難可與敵田子曰師貴用奇不必在衆弘猶固執田子曰衆寡相傾勢不兩立若使賊圍既固人情喪沮事便去矣及其未整薄之必剋所謂先人有奪人之志也便獨率所領鼓譟而進賊合圍數重田子乃棄糧毀舍躬勒士卒前後奮擊賊衆一時潰散所殺萬餘人得泓偽乘輿服御武帝表言其狀長安既平武帝宴于文昌殿舉酒賜田子曰咸陽之平卿之功也即以咸陽相賞即授咸陽始平二郡太守大軍既還桂陽公義真留鎮長安以田子為安西中兵參軍龍驤將軍始平太守時赫連勃勃來寇田子與安西司馬王鎮惡俱出北地禦之初武帝將還田子及傅弘之等並以鎮惡家在關中不可保信屢言之帝曰今留卿文武將士精兵萬人彼若欲為不善政足自滅耳勿復多言及俱出北地論者謂鎮惡欲盡殺諸南人以數十人送義真南還因據關中反叛田子乃於弘之營內請鎮惡計事使宗人敬仁於坐殺之率左右數十人自歸義真長史王修收殺田子於長安倉門外是歲十四年正月十五日也武帝表天子以田子卒發狂易不深罪也林子字敬士少有大度年數歲隨王父在京口王恭見而奇之曰此兒王子師之流也嘗與衆人共見遺寶咸爭趨之林子直去不顧年十三遇家禍既門陷祅黨兄弟並應從誅而沈預家甚強富志相陷滅林子兄弟沈伏山澤無所投厝會孫恩屢出會稽武帝致討林子乃自歸陳情率老弱歸罪請命因流涕哽咽三軍為之感動帝甚奇之乃載以別船遂盡室移京口帝分宅給焉林子博覽衆書留心文義從剋京城進平都邑時年十八身長七尺五寸沈預慮林子為害常被甲持戈至是林子與兄田子還東報讎五月夏節日至預政大集會子弟盈堂林子兄弟挺身直入斬預首男女無論長幼悉屠之以預首祭父祖墓及帝為揚州辟為從事領建熙令封資中縣五等侯從伐慕容超平盧循並著軍功後從征劉毅參太尉軍事復從討司馬休之武帝每征討林子輒推鋒居前時賊黨郭亮之招集蠻晉屯據武陵武陵太守王鎮惡出奔林子率軍討之斬亮之於七里澗而納鎮惡武陵既平復討魯軌於石城軌棄衆走襄陽復追躡之襄陽既定權留守江陵武帝伐姚泓復參征西軍事加建武將軍統軍為前鋒從汴入河偽並州刺史河東太守尹昭據蒲坂林子於陝城與冠軍檀道濟同攻蒲坂龍驤王鎮惡攻潼關姚泓聞大軍至遣偽東平公姚紹爭據潼關林子謂道濟曰潼關天岨所謂形勝之地鎮惡孤軍勢危力屈若使姚紹據之則難圖也及其未至當並力爭之若潼關事捷尹昭可不戰而服道濟從之及至紹舉關右之衆設重圍圍林子及道濟鎮惡等道濟議欲度河避其鋒或欲棄捐輜重還赴武帝林子按劍曰下官今日之事自為將軍辦之然二三君子或同業艱難或荷恩罔極以此退撓亦何以見相公旗鼓邪塞井焚舍示無全志率麾下數百人犯其西北紹衆小靡乘其亂而薄之紹乃大潰俘虜以千數悉獲紹器械資實時諸將破賊皆多其首級而林子獻捷書至每以實聞武帝問其故林子曰夫王者之師本有征無戰豈可復增張虜獲以示誇誕昔魏尚以盈級受罰此亦後乘之良轍也武帝曰乃所望於卿也初紹退走還保定城留偽武衛將軍姚鸞精兵守嶮林子銜枚夜襲即屠其城劓鸞而坑其衆紹復遣撫軍將軍姚讚將兵屯河上林子連破之紹又遣長史姚伯子等屯據九泉憑河固險以絶糧援武帝復遣林子纍戰大破之即斬伯子所俘獲悉以還紹使知王師之弘紹志節沈勇林子每戰輒勝白武帝曰姚紹氣蓋關右而力以勢屈但恐凶命先盡不得以釁齊斧爾尋紹疽發背死武帝以林子之驗乃賜書嘉美之於是讚統後軍復襲林子林子禦之連戰皆捷帝至閿鄉姚泓掃境內兵屯嶢柳時田子自武關北入屯軍藍田泓自率大衆攻之帝慮衆寡不敵遣林子步自秦嶺以相接援比至泓已破走田子欲窮追進取長安林子止之曰往取長安如指掌爾復剋賊城便為獨平一國不賞之功也田子乃止林子威震關中豪右望風請附帝以林子田子綏略有方頻賜書褒美並令深慰納之長安既平姚氏十餘萬口西奔隴上林子追討至寡婦水轉鬬至槐里大軍東歸林子領水軍於石門以為聲援還至彭城帝令林子差次勳勤隨才授用文帝出鎮荊州議以林子及謝晦為蕃佐帝曰吾不可頓無二人林子行則晦不宜出乃以林子為西中郎中兵參軍領新興太守林子以行役久士有歸心乃深陳事宜並言聖王所以戒慎祗肅非以崇威立武實乃經國長氓宜廣建蕃屏崇嚴宿衛武帝深相酬納俄而謝翼謀反帝歎曰林子之見何其明也文帝進號鎮西隨府轉加建威將軍河東太守時武帝以方隅未靜復欲親戎林子固諫帝答曰吾輒當不復自行帝踐阼以佐命功封漢壽縣伯固讓不許永初三年卒追贈征虜將軍元嘉二十五年諡曰懷少子璞嗣璞字道真童孺時神意間審文帝召見奇璞應對謂林子曰此非常兒也初除南平王左常侍文帝引見謂之曰吾昔以弱年出蕃卿家以親要見輔今日之授意在不薄王家之事一以相委勿以國官乖清塗為罔罔也元嘉十七年始興王濬為揚州刺史寵愛殊異以為主簿時順陽范曄為長史行州事曄性頗疏文帝謂璞曰范曄性疏必多不同卿腹心所寄當密以在意彼行事其實卿也璞以任遇既深所懷輒以密啓每至施行必從中出曄政謂聖明留察故深更恭慎而莫見其際也在職八年神州大寧人無謗黷璞有力焉二十二年范曄坐事誅時濬雖曰親覽州事一以付璞濬年既長璞固求辭事以璞為濬始興國大農纍遷淮南太守三十年元凶弒立璞以奉迎之晚見殺有子曰約其制自序大略如此約十三而遭家難潛竄會赦乃免既而流寓孤貧篤志好學晝夜不釋卷母恐其以勞生疾常遣減油滅火而晝之所讀夜輒誦之遂博通羣籍善屬文濟陽蔡興宗聞其才而善之及為郢州引為安西外兵參軍兼記室興宗常謂其諸子曰沈記室人倫師表宜善師之及為荊州又為征西記室帶厥西令齊初為征虜記室帶襄陽令所奉主即齊文惠太子太子入居東宮為步兵校尉管書記直永壽省校四部圖書時東宮多士約特被親遇每旦入見景斜方出時王侯到宮或不得進約每以為言太子曰吾生平懶起是卿所悉得卿談論然後忘寢卿欲我夙興可早入遷太子家令後為司徒右長史黃門侍郎時竟陵王招士約與蘭陵蕭琛琅邪王融陳郡謝朓南鄉范雲樂安任昉等皆遊焉當世號為得人隆昌元年除吏部郎出為東陽太守齊明帝即位徵為五兵尚書遷國子祭酒明帝崩政歸冢宰尚書令徐孝嗣使約撰定遺詔永元中復為司徒左長史進號征虜將軍南清河太守初梁武在西邸與約遊舊建康城平引為驃騎司馬時帝勳業既就天人允屬約嘗扣其端帝默然而不應他日又進曰今與古異不可以淳風期萬物士大夫攀龍附鳳者皆望有尺寸之功以保其福祿今童兒牧豎悉知齊祚之終且天文人事表革運之徵永元以來尤為彰著讖云行中水作天子此又歷然在記天心不可違人情不可失帝曰吾方思之約曰公初起兵樊沔此時應思今日王業已就何所復思昔武王伐紂始入人便曰吾君武王不違人意亦無所思公自至京邑已移氣序比於周武遲速不同若不早定大業稽天人之望脫一人立異便損威德且人非金石時事難保豈可以建安之封遺之子孫若天子還都公卿在位則君臣分定無復異圖君明於上臣忠於下豈復有人方更同公作賊帝然之約出召范雲告之雲對略同約旨帝曰智者乃爾暗同卿明早將休文更來雲出語約約曰卿必待我雲許諾而約先期入帝令草其事約乃出懷中詔書並諸選置帝初無所改俄而雲自外來至殿門不得入徘徊壽光閣外但云咄咄約出雲問曰何以見處約舉手向左雲笑曰不乖所望有頃帝召雲謂曰生平與沈休文羣居不覺有異人處今日才智縱橫可謂明識雲曰公今知約不異約今知公帝曰我起兵於今三年矣功臣諸將實有其勞然成帝業者乃卿二人也梁臺建為散騎常侍吏部尚書兼右僕射及受禪為尚書僕射封建昌縣侯又拜約母謝為建昌國太夫人奉策之日吏部尚書范雲等二十餘人咸來致拜朝野以為榮俄遷左僕射天監二年遭母憂輿駕親出臨弔以約年衰不宜致毀遣中書舍人斷客節哭起為鎮軍將軍丹陽尹置佐史服闋遷侍中右光祿大夫領太子詹事奏尚書八條事遷尚書令纍表陳讓改授左僕射領中書令尋遷尚書令領太子少傅九年轉左光祿大夫初約久處端揆有志台司論者咸謂為宜而帝終不用乃求外出又不見許與徐勉素善遂以書陳情於勉言己老病百日數旬革帶常應移孔以手握臂率計月小半分欲謝事求歸老之秩勉為言於帝請三司之儀弗許但加鼓吹而已約性不飲酒少嗜欲雖時遇隆重而居處儉素立宅東田矚望郊阜常為郊居賦以序其事尋加特進遷中軍將軍丹陽尹侍中特進如故十二年卒官年七十三諡曰隱約左目重瞳子腰有紫志聰明過人好墳籍聚書至二萬卷都下無比少孤貧約干宗黨得米數百斛為宗人所侮覆米而去及貴不以為憾用為郡部傳嘗侍宴有妓婢師是齊文惠宮人帝問識座中客不曰唯識沈家令約伏地流涕帝亦悲焉為之罷酒約歷仕三代該悉舊章博物洽聞當世取則謝玄暉善為詩任彥升工於筆約兼而有之然不能過也自負高才昧於榮利乘時射勢頗纍清談及居端揆稍弘止足每進一官輒殷勤請退而終不能去論者方之山濤用事十餘年未常有所薦達政之得失唯唯而已初武帝有憾於張稷及卒因與約言之約曰左僕射出作邊州刺史已往之事何足復論帝以為約昏家相為怒約曰卿言如此是忠臣邪乃輦歸內殿約懼不覺帝起猶坐如初及還未至憑空頓於戶下因病夢齊和帝劍斷其舌召巫視之巫言如夢乃呼道士奏赤章於天稱禪代之事不由己出先此約嘗侍宴會豫州獻栗徑寸半帝奇之問栗事多少與約各疏所憶少帝三事約出謂人曰此公護前不讓即羞死帝以其言不遜欲抵其罪徐勉固諫乃止及疾上遣主書黃穆之專知省視穆之夕還增損不即啓聞懼罪竊以赤章事因上省醫徐奘以聞又積前失帝大怒中使譴責者數焉約懼遂卒有司諡曰文帝曰懷情不盡曰隱故改為隱約少時常以晉氏一代竟無全書年二十許便有撰述之意宋泰始初征西將軍蔡興宗為啓明帝有敕許焉自此踰二十年所撰之書方就凡一百餘卷條流雖舉而採綴未周永明初遇盜失第五帙又齊建元四年被敕撰國史永明二年又兼著作郎撰次起居注五年春又被敕撰宋書六年二月畢功表上之其所撰國史為齊紀二十卷天監中又撰梁武紀十四卷又撰邇言十卷諡例十卷文章志三十卷文集一百卷皆行於世又撰四聲譜以為在昔詞人纍千載而不悟而獨得胸襟窮其妙旨自謂入神之作武帝雅不好焉嘗問周捨曰何謂四聲捨曰天子聖哲是也然帝竟不甚遵用約也子旋字士規襲爵位司徒右長史太子僕以母憂去官因蔬食辟穀服除猶絶粳粱終于南康內史諡曰恭集注邇言行於世旋弟趨字孝鯉亦知名位黃門郎旋卒子實嗣實弟衆衆字仲師好學頗有文詞仕梁為太子舍人時梁武帝制千文詩衆為之注解與陳郡謝景同時召見于文德殿帝令衆為竹賦賦成奏之手敕答曰卿文體翩翩可謂無忝爾祖纍遷太子中舍人兼散騎常侍聘魏還為驃騎廬陵王咨議參軍侯景之亂表求還吳興召募故義部曲以討賊梁武許之及景圍臺城衆率宗族及義附五千餘人入援都軍容甚整景深憚之梁武於城內遙授太子右衛率臺城陷衆乃降景景平元帝以為司徒左長史魏剋江陵見虜尋亦逃歸陳武帝受命位中書令帝以衆州里知名甚敬重之賞賜超於時輩性吝嗇財帛億計無所分遺自奉甚薄每朝會中衣裳破裂或躬提冠履永定二年兼起部尚書監起太極殿服布袍芒屩以麻繩為帶又囊麥飯以噉之朝士咸共誚其所為衆性狷急因忿恨遂歷詆公卿非毀朝廷武帝大怒以衆素有令望不欲顯誅因其休假還武康遂於吳中賜死范雲字彥龍南鄉舞陰人晉平北將軍汪六世孫也祖璩之宋中書侍郎雲六歲就其姑夫袁叔明讀毛詩日誦九紙陳郡殷琰名知人候叔明見之曰公輔才也雲性機警有識具善屬文下筆輒成時人每疑其宿構父抗為郢府參軍雲隨在郢時吳興沈約新野庾杲之與抗同府見而友之起家郢州西曹書佐轉法曹行參軍俄而沈攸之舉兵圍郢城抗時為府長流入城固守留家屬居外雲為軍人所得攸之召與語聲色甚厲雲容貌不變徐自陳説攸之笑曰卿定可兒且出就舍明旦又召雲令送書入城內餉武陵王酒一石犢一頭餉長史柳世隆鱠魚二十頭皆去其首城內或欲誅雲雲曰老母弱弟懸命沈氏若其違命禍必及親今日就戮甘心如薺世隆素與雲善乃免之後除員外散騎郎齊建元初竟陵王子良為會稽太守雲為府主簿王未之知後剋日登秦望山乃命雲雲以山上有秦始皇刻石此文三句一韻人多作兩句讀之並不得韻又皆大篆人多不識乃夜取史記讀之令上口明日登山子良令賓僚讀之皆茫然不識末問雲雲曰下官嘗讀史記見此刻石文乃進讀之如流子良大悅因以為上賓自是寵冠府朝王為丹陽尹復為主簿深相親任時進見齊高帝會有獻白烏帝問此何瑞雲位卑最後答曰臣聞王者敬宗廟則白烏至時謁廟始畢帝曰卿言是也感應之理一至此乎子良為南徐州南兗州雲並隨府遷每陳朝政得失於子良尋除尚書殿中郎子良為雲求祿齊武帝曰聞范雲諂事汝政當流之子良對曰雲之事臣動相針諫諫書存者百有餘紙帝索視之言皆切至咨嗟良久曰不意范雲乃爾方令弼汝子良為司徒又補記室時巴東王子響在荊州殺上佐都下胸胸人多異志而豫章王嶷鎮東府多還私邸動移旬日子良築第西郊遊戲而已而梁武帝時為南郡王文學與雲俱為子良所禮梁武勸子良還石頭並言大司馬宜還東府子良不納梁武以告雲時廷尉平王植為齊武帝所狎雲謂植曰西夏不靜人情甚惡大司馬詎得久還私第司徒亦宜鎮石頭卿入既數言之差易植因求雲作啓自呈之俄而二王各鎮一城文惠太子嘗幸東田觀穫稻雲時從文惠顧雲曰此刈甚快雲曰三時之務亦甚勤勞願殿下知稼穡之艱難無徇一朝之宴逸也文惠改容謝之及出侍中蕭緬先不相識就車握雲手曰不謂今日復見讜言永明十年使魏魏使李彪宣命至雲所甚見稱美彪為設甘蔗黃甘粽隨盡復益彪笑謂曰范散騎小復儉之一盡不可復得使還再遷零陵內史初零陵舊政公田奉米之外別雜調四千石及雲至郡止其半百姓悅之深為齊明帝所知還除正員郎時高武王侯並懼大禍雲因帝召次曰昔太宰文宣王語臣言嘗夢在一高山上上有一深坑見文惠太子先墜次武帝次文宣望見僕射在室坐御備王者羽儀不知此是何夢卿慎勿向人道明帝流涕曰文宣此惠亦難負於是處昭胄兄弟異於餘宗室雲之幸於子良江祏求雲女婚姻酒酣巾箱中取翦刀與雲曰且以為娉雲笑受之至是祏貴雲又因酣曰昔與將軍俱為黃鵠今將軍化為鳳皇荊布之室理隔華盛因出翦刀還之祏亦更姻他族及祏敗妻子流離每相經理又為始興內史舊郡界得亡奴婢悉付作部曲即貨去買銀輸官雲乃先聽百姓志之若百日無主依判送臺又郡相承後堂有雜工作雲悉省還役並為帝所賞郡多豪猾大姓二千石有不善者輒共殺害不則逐之邊帶蠻俚尤多盜賊前內史皆以兵刃自衛雲入境撫以恩德罷亭候商賈露宿郡中稱為神明遷廣州刺史平越中郎將至任遣使祭孝子南海羅威唐頌蒼梧丁密頓琦等墓時江祏姨弟徐藝為曲江令祏深以託雲有談儼者縣之豪族藝鞭之儼以為恥至都訴雲雲坐徵還下獄會赦免初梁武為司徒祭酒與雲俱在竟陵王西邸情好歡甚永明末梁武與兄懿卜居東郊之外雲亦築室相依梁武每至雲所其妻常聞蹕聲又嘗與梁武同宿顧皓之舍皓之妻方産有鬼在外曰此中有王有相雲起曰王當仰屬相以見歸因是盡心推事及帝起兵將至都雲雖無官自以與帝素款慮為昏主所疑將求入城先以車迎太原孫伯翳謀之伯翳曰今天文顯於上災變應於下蕭征東以濟世雄武挾天子而令諸侯天時人事寧俟多説雲曰此政會吾心今羽翮未備不得不就籠檻希足下善聽之及入城除國子博士未拜而東昏遇弒侍中張稷使雲銜命至石頭梁武恩待如舊遂參讚謨謀毗佐大業仍拜黃門侍郎與沈約同心翊贊俄遷大司馬咨議參軍領録事梁臺建遷侍中武帝時納齊東昏余妃頗妨政事雲嘗以為言未之納後與王茂同入臥內雲又諫王茂因起拜曰范雲言是公必以天下為念無宜留惜帝默然雲便疏令以余氏賚茂帝賢其意而許之明日賜雲茂錢各百萬及帝受禪柴燎南郊雲以侍中參乘禮畢帝升輦謂雲曰朕之今日所謂懍乎若朽索之馭六馬雲對曰亦願陛下日慎一日帝善其言即日遷散騎常侍吏部尚書以佐命功封霄城縣侯雲以舊恩超居佐命盡誠翊亮知無不為帝亦推心仗之所奏多允雲本大武帝十三歲嘗侍宴帝謂臨川王宏鄱陽王恢曰我與范尚書少親善申四海之敬今為天下主此禮既革汝宜代我呼范為兄二王下席拜與雲同車還尚書下省時人榮之帝嘗與雲言及舊事云朕司州還在三橋宅門生王道牽衣云聞外述圖讖云齊祚不久別應有王者官應取富貴朕齋中坐讀書內感其言而外迹不得無怪欲呼人縛之道叩頭求哀乃不復敢言今道為羽林監文德主帥知管籥雲曰此乃天意令道發耳帝又云布衣時嘗夢拜兩舊妾為六宮有天下此嫗已卒所拜非復其人以為恨其年雲以本官領太子中庶子二年遷尚書右僕射猶領吏部頃之坐違詔用人免吏部猶為右僕射雲性篤睦事寡嫂盡禮家事必先咨而後行好節尚奇專趨人之急少與領軍長史王畡善雲起宅新成移家始畢畡亡於官舍尸無所歸雲以東廂給之移尸自門入躬自營唅招復如禮時人以為難及居選官任寄隆重書牘盈案賓客滿門雲應答如流無所壅滯官曹文墨發擲若神時人咸服其明贍性頗激厲少威重有所是非形於造次士或以此少之初雲為郡號廉潔及貴重頗通饋遺然家無蓄積隨散之親友武帝九錫之出雲忽中疾居二日半召醫徐文伯視之文伯曰緩之一月乃復欲速即時愈政恐二年不復可救雲曰朝聞夕死而況二年文伯乃下火而壯焉重衣以覆之有頃汗流於背即起二年果卒帝為流涕即日輿駕臨殯詔贈侍中衛將軍禮官請諡曰宣敕賜諡曰文有集三十卷子孝才嗣孫伯翳太原人晉祕書監盛之玄孫曾祖放晉國子博士長沙太守父康起部郎貧常映雪讀書清介交遊不雜伯翳位終驃騎鄱陽王參軍事雲從父兄縝縝字子真父濛奉朝請早卒縝少孤貧事母孝謹年未弱冠從沛國劉瓛學瓛甚奇之親為之冠在瓛門下積年芒屩布衣徒行於路瓛門下多車馬貴遊縝在其間聊無恥愧及長博通經術尤精三禮性質直好危言高論不為士友所安唯與外弟蕭琛善琛名曰口辨每服縝簡詣年二十九髮白皤然乃作傷暮詩白髮詠以自嗟仕齊位尚書殿中郎永明中與魏氏和親簡才學之士以為行人縝及從弟雲蕭琛琅邪顏幼明河東裴昭明相繼將命皆著名鄰國時竟陵王子良盛招賓客縝亦預焉嘗侍子良子良精信釋教而縝盛稱無佛子良問曰君不信因果何得富貴貧賤縝答曰人生如樹花同發隨風而墮自有拂簾幌墜於茵席之上自有關籬牆落於糞溷之中墜茵席者殿下是也落糞溷者下官是也貴賤雖復殊途因果竟在何處子良不能屈然深怪之退論其理著神滅論以為神即形也形即神也形存則神存形謝則神滅形者神之質神者形之用是則形稱其質神言其用形之與神不得相異神之於質猶利之於刀形之於用猶刀之於利利之名非刀也刀之名非利也然而捨利無刀捨刀無利未聞刀沒而利存豈容形亡而神在此論出朝野喧譁子良集僧難之而不能屈太原王琰乃著論譏縝曰嗚呼范子曾不知其先祖神靈所在欲杜縝後對縝又對曰嗚呼王子知其祖先神靈所在而不能殺身以從之其險詣皆此類也子良使王融謂之曰神滅既自非理而卿堅執之恐傷名教以卿之大美何患不至中書郎而故乖刺為此可便毀棄之縝大笑曰使范縝賣論取官已至令僕矣何但中書郎邪後為宜都太守性不信神鬼時夷陵有伍相廟唐漢三神廟胡里神廟縝乃下教斷不祠後以母憂去職居于南州梁武至縝墨縗來迎武帝與縝有西邸之舊見之甚悅及建康城平以縝為晉安太守在郡清約資公祿而已遷尚書左丞及還雖親戚無所遺唯餉前尚書令王亮縝在齊時與亮同臺為郎舊相友愛至是亮擯棄在家縝自以首迎武帝志在權軸而所懷未滿亦怏怏故私相親結以矯於時竟坐亮徙廣州在南纍年追為中書郎國子博士卒文集十五卷子胥字長才傳父業位國子博士有口辨大同中常兼主客郎應接北使卒於鄱陽內史論曰齊德將謝昏虐君臨喋喋黔黎命懸晷刻梁武撫茲歸運嘯召風雲范雲恩結龍潛沈約情深惟舊並以茲文義首居帷幄追蹤亂傑各其時之遇也而約以高才博洽名亞董遷末迹為躓亦鳳德之衰乎縝婞直之節著于終始其以王亮為尤亦不足非也
