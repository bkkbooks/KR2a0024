body:
  text: 南史卷三十列傳第二十何尚之子偃孫戢偃弟子求求弟點點弟胤胤從弟炯尚之弟子昌𧜛昌𧜛子敬容何尚之字彥德廬江灊人也曾祖準高尚不應徵辟祖惔南康太守父叔度恭謹有行業姨適沛郡劉璩與叔度母情愛甚篤叔度母早卒奉姨若所生姨亡朔望必往致哀幷設祭奠食並珍新躬自臨視若朔望應有公事則先遣送祭皆手自料簡流涕對之公事畢即往致哀以此為常至三年服竟義熙五年吳興武康縣人王延祖為劫父睦以告官新制凡劫身斬刑家人棄市睦既自告於法有疑時叔度為尚書議曰設法止姦必本於情理非謂一人為劫闔門應刑所以罪及同產欲開其相告以出造惡之身睦父子之至容可悉共逃亡而割其天屬還相縛送解腕求存於情可愍並合從原從之後為金紫光祿大夫吳郡太守太保王弘每稱其清身潔己尚之少頗輕薄好摴蒱及長折節蹈道以操立見稱為陳郡謝混所知與之游處家貧初為臨津令宋武帝領征西將軍補主簿從征長安以公事免還都因患勞病積年飲婦人乳乃得差以從征之勞賜爵都鄉侯少帝即位為廬陵王義真車騎諮議參軍義真與司徒徐羨之尚書令傅亮等不協每有不平之言尚之諫戒不納義真被廢入為中書侍郎遷吏部郎告休定省傾朝送別於冶渚及至郡叔度謂曰聞汝來此傾朝相送可有幾客答曰殆數百人叔度笑曰此是送吏部郎耳非關何彥德也昔殷浩亦嘗作豫章定省送別者甚衆及廢徙東陽船泊征虜亭積日乃至親舊無復相窺者後拜左衞將軍領太子中庶子尚之雅好文義從容賞會甚為文帝所知元嘉十三年彭城王義康欲以司徒長史劉斌為丹陽尹上不許乃以尚之為之立宅南郭外立學聚生徒東海徐秀廬江何曇黃回潁川荀子華太原孫宗昌王延秀魯郡孔惠宣並慕道來游謂之南學王球常云尚之西河之風不墜尚之亦云球正始之風尚在尚之女適劉湛子黯而湛與尚之意好不篤湛欲領丹陽乃徙尚之為祠部尚書領國子祭酒尚之甚不平湛誅遷吏部尚書時左衞將軍范曄任參機密尚之察其意趣異常白文帝宜出為廣州若在內釁成不得不加以鈇鉞屢誅大臣有虧皇化上曰始誅劉湛等方欲引升後進曄事跡未彰便豫相黜斥萬姓將謂卿等不能容才以我為信受讒說但使共知如此不憂致大變也曄後謀反伏誅上嘉其先見二十二年為尚書左僕射是歲造玄武湖上欲於湖中立方丈蓬萊瀛洲三神山尚之固諫乃止時又造華林園並盛暑役人尚之又諫上不許曰小人常日曝背此不足為勞時上行幸還多侵夜尚之又表諫上優詔納之先是患貨少鑄四銖錢人間頗盜鑄多翦鑿古錢以取銅上患之二十四年錄尚書江夏王義恭議以一大錢當兩以防翦鑿議者多同尚之議曰凡創制改法宜順人情未有違衆矯物而可久也泉布廢興未容驟議前代赤仄白金俄而罷息六貨憒亂人泣於市良由事不畫一難用遵行自非急病權時宜守長世之業若今制遂行富人之貲自倍貧者彌增其困懼非所以欲均之意中領軍沈演之以為若以大錢當兩則國傳難朽之寶家贏一倍之利不俟加憲巧源自絕上從演之議遂以一錢當兩行之經時公私非便乃罷二十八年為尚書令太子詹事二十九年致仕於方山著退居賦以明所守而議者咸謂尚之不能固志文帝與江夏王義恭詔曰羊孟尚不得告謝尚之任遇有殊便當未宜申許尚之還攝職羊即羊玄保孟即孟顗尚之既任事上待之愈隆於是袁淑乃錄古來隱士有迹無名者為真隱傳以嗤焉時或遣軍北侵資給戎旅悉以委之元凶弒立進位司空尚書令時三方興義將佐家在都者劭悉欲誅之尚之誘說百端並得全免孝武即位復為尚書令丞相南郡王義宣車騎將軍臧質反義宣司馬竺超質長史陸展兄弟並應從誅尚之上言於法為重超從坐者由是得原時欲分荊州置郢州議其所居江夏王義恭蕭思話以為宜在巴陵尚之議曰夏口在荊江之中正對沔口通接雍梁寔為津要於事為允上從其議荊揚二州戶口居江南之半江左以來揚州為根本委荊州以閫外至是並分欲以削臣下之權而荊揚並因此虛耗尚之建言宜復合二州上不許大明二年以為左光祿開府儀同三司侍中如故尚之在家常著鹿皮帽及拜開府天子臨軒百僚陪位沈慶之於殿庭戲之曰今日何不著鹿皮冠慶之累辭爵命朝廷敦勸甚苦尚之謂曰主上虛懷側席詎宜固辭慶之曰沈公不效何公去而復還也尚之有愧色尚之愛尚文義老而不休與太常顏延之少相好狎二人並短小尚之常謂延之為猨延之目尚之為猴同游太子西池延之問路人云吾二人誰似猴路人指尚之為似延之喜笑路人曰彼似猴耳君乃真猴有人嘗求為吏部郎尚之歎曰此敗風俗也官當圖人人安得圖官延之大笑曰我聞古者官人以才今官人以勢彼勢之所求子何疑焉所與延之論議往反並傳於世尚之立身簡約車服率素妻亡不娶又無姬妾執衡當朝畏遠權柄親故一無薦舉既以此致怨亦以此見稱復以本官領中書令薨年七十九贈司空諡曰簡穆公子偃偃字仲弘元嘉中位太子中庶子元凶弒立以偃為侍中掌詔誥時尚之為司空尚書令偃居門下父子並處權要時為寒心而尚之及偃善攝機宜曲得時譽會孝武即位任遇無改歷位侍中領太子中庶子時求讜言偃以為宜重農卹本幷官省事考課以知能否增奉以除吏姦責成良守久於其職都督刺史宜別其任改領驍騎將軍親遇隆密有加舊臣轉吏部尚書尚之去選未五載偃復襲其迹世以為榮侍中顏竣至是始貴與偃俱在門下以文義賞會相得甚歡竣既任遇隆密謂宜居重大而位次與偃等未殊意稍不悅及偃代竣領選竣逾憤懣與偃遂隙竣時權傾朝野偃不自安遂發悸病意慮乖僻上表解職告靈不仕孝武遇偃既深備加醫療乃得差偃素好談玄注莊子逍遙篇傳於時卒官孝武與顏竣詔甚傷惜之諡曰靖子戢戢字慧景選尚宋孝武長女山陰公主拜駙馬都尉累遷中書郎景和世山陰主就帝求吏部郎褚彥回侍己彥回雖拘逼終不肯從與戢同居止月餘日由是特申情好元徽初彥回參朝政引戢為侍中時年二十九戢以年未三十苦辭內侍改授司徒左長史齊高帝為領軍與戢來往數申歡宴高帝好水引餅戢每設上焉久之復為侍中累遷高帝相國左長史建元元年遷散騎常侍太子詹事尋改侍中詹事如故上欲轉戢領選問尚書令褚彥回以戢資重欲加散騎常侍彥回曰宋時王球從侍中中書令單作吏部尚書資與戢相似領選職方昔小輕不容頓加常侍聖旨每以蟬冕不宜過多臣與王儉既已左珥若復加戢則八座便有三蟬若帖以驍游亦不為少廼以戢為吏部尚書加驍騎將軍戢美容儀動止與褚彥回相慕時人號為小褚公家業富盛性又華侈衣被服飾極為奢麗出為吳興太守上頗好畫扇宋孝武賜戢蟬雀扇善畫者顧景秀所畫時吳郡陸探微顧寶先皆能畫歎其巧絕戢因王晏獻之上令晏厚酬其意卒年三十六諡懿子女為鬱林王后又追贈侍中右光祿大夫求字子有偃弟子也父鑠仕宋位宜都太守求元嘉末為文帝挽郎歷位太子洗馬丹陽郡丞清退無嗜慾後為太子中舍人泰始中妻亡還吳葬舊墓除中書郎不拜仍住吳隱居波若寺足不踰戶人莫見其面宋明帝崩出奔國哀除永嘉太守求時寄住南澗寺不肯詣臺乞於野外拜受見許一夜忽乘小船逃歸吳隱武丘山齊永明四年拜太中大夫不就卒初求父鑠素有風疾無故害求母王氏坐法死求兄弟以此無宦情求弟點點字子年十一居父母憂幾至滅性及長感家禍欲絕昏宦尚之強為娶琅邪王氏禮畢將親迎點累涕泣求執本志遂得罷點明目秀眉容貌方雅真素通美不以門戶自矜博通羣書善談論家本素族親姻多貴仕點雖不入城府性率到好狎人物遨游人間不簪不帶以人地並高無所與屈大言踑踞公卿敬下或乘柴車躡草屩恣心所適致醉而歸故世論以點為孝隱士弟胤為小隱士大夫多慕從之時人稱重其通號曰游俠處士兄求亦隱吳郡武丘山求卒點菜食不飲酒訖于三年腰帶減半宋泰始末徵為太子洗馬齊初累徵中書侍郎太子中庶子並不就與陳郡謝𦵩吳國張融會稽孔德璋為莫逆友點門世信佛從弟遁以東籬門園居之德璋為築室焉園有卞忠貞冢點植花於冢側每飲必舉酒酹之招攜勝侶乃名德桑門清言賦詠優游自得初褚彥回王儉為宰相點謂人曰我作齊書已竟贊云回既世族儉亦國華不賴舅氏遑恤國家王儉聞之欲候點知不可見乃止豫章王嶷命駕造點點從後門遁去司徒竟陵王子良聞之曰豫章王尚望塵不及吾當望岫息心後點在法輪寺子良就見之點角巾登席子良欣悅無已遺點嵇叔夜酒盃徐景山酒鎗點少時嘗患渴利積歲不愈後在吳中石佛寺建講於講所晝寢夢一道人形貌非常授丸一掬夢中服之自此而差時人以為淳德所感性通侻好施遠近致遺一無所逆隨復散焉嘗行經朱雀門街有自車後盜點衣者見而不言旁人禽盜與之點乃以衣施盜盜不敢受點令告有司盜懼乃受之點雅有人倫鑒多所甄拔知吳興丘遲於幼童稱濟陽江淹於寒素悉如其言哀樂過人嘗行逢葬者歎曰此哭者之懷豈可思邪於是悲慟不能禁老又娶魯國孔嗣女嗣亦隱者點雖昏亦不與妻相見築別室以處之人莫諭其意吳國張融少時免官而為詩有高言點答詩曰昔聞東都日不在簡書前雖戲而融久病之及點後昏融始為詩贈點曰惜哉何居士薄暮遘荒淫點亦病之永元中崔慧景圍城人間無薪點悉伐園樹以贍親黨慧景性好佛義先慕交點點不顧之至是乃逼召點點裂裙為袴往赴其軍終日談說不及軍事其語默之迹如此慧景平後東昏大怒欲誅之王瑩為之懼求計於蕭暢暢謂茹法珍曰點若不誘賊共講未必可量以此言之乃應得封東昏乃止梁武帝與點有舊及踐阼手詔論舊賜以鹿皮巾等幷召之點以巾褐引入華林園帝贈詩酒恩禮如舊仍下詔徵為侍中捋帝鬚曰乃欲臣老子辭疾不起復下詔詳加資給並出在所日費所須太官別給天監二年卒詔給第一品材一具喪事所須內監經理點弟胤胤字子季出繼叔父曠故更字胤叔年八歲居憂毀若成人及長輕薄不羈晚乃折節好學師事沛國劉瓛受易及禮記毛詩又入鍾山定林寺聽內典其業皆通而縱情誕節時人未之知也唯瓛與汝南周顒深器異之仕齊為建安太守政有恩信人不忍欺每伏臘放囚還家依期而反歷黃門侍郎太子中庶子尚書令王儉受詔撰新禮未就而卒又使特進張緒續成緒又卒屬在司徒竟陵王子良子良以讓胤乃置學士二十人佐胤撰錄後以國子祭酒與太子中庶子王瑩並為侍中時胤單作祭酒疑所服陸澄博古多該亦不能據遂以玄服臨試爾後詳議乃用朱服祭酒朱服自此始也及鬱林嗣位胤為后族甚見親待為中書令領臨海巴陵王師胤雖貴顯常懷止足建武初已築室郊外與學徒游處其內至是遂賣園宅欲入東未及發聞謝朏罷吳興郡不還胤恐後之乃拜表解職不待報輒去明帝大怒使御史中丞袁昂奏收胤尋有詔許之胤以會稽山多靈異往游焉居若邪山雲門寺初胤二兄求點並棲遁求先卒至是胤又隱世號點為大山胤為小山亦曰東山兄弟發迹雖異克終皆隱世謂何氏三高永元中徵為太常太子詹事並不就梁武帝霸朝建引為軍謀祭酒幷與書詔不至及帝踐阼詔為特進光祿大夫遣領軍司馬王杲之以手敕諭意幷徵謝朏杲之先至胤所胤恐朏不出先示以可起乃單衣鹿皮巾執經卷下牀跪受詔出就席伏讀胤因謂杲之曰吾昔於齊朝欲陳三兩條事一者欲正郊丘二者欲更鑄九鼎三者欲樹雙闕世傳晉室欲立闕王丞相指牛頭山云此天闕也是則未明立闕之意闕者謂之象魏懸法於其上浹日而收之象者法也魏者當塗而高大貌也鼎者神器有國所先圓丘南郊舊典不同南郊祠五帝靈威仰之類圓丘祠天皇大帝北極大星是也往代合之郊丘先儒之巨失今梁德告始不宜遂因前謬卿宜陳之杲之曰僕之鄙劣豈敢輕議國典此當敬俟叔孫生耳及杲之從謝朏所還問胤以出期胤知朏已應召答杲之曰吾年已五十七月食四斗米不盡何容復有宦情杲之失色不能答胤反謂曰卿何不遣傳詔還朝拜表留與我同游邪杲之愕然曰古今不聞此例胤曰檀弓兩卷皆言物始自卿而始何必有例胤朏俱前代高士胤處名譽尤邁矣杲之還以胤意奏聞有敕給白衣尚書祿胤固辭又敕山陰庫錢月給五萬又不受乃敕何子朗孔壽等六人於東山受學太守衡陽王元簡深加禮敬月中常命駕式閭談論終日胤以若邪處勢迫隘不容學徒乃遷秦望山山有飛泉廼起學舍即林成援因巖為堵別為小閤室寢處其中躬自啟閉僮僕無得至者山側營田二頃講隙從生徒游之胤初遷將築室忽見二人著玄冠容貌甚偉問胤曰君欲居此邪乃指一處云此中殊吉忽不復見胤依言而卜焉尋而山發洪水樹石皆倒拔唯胤所居室巋然獨存元簡乃命記室參軍鍾嶸作瑞室頌刻石以旌之及元簡去郡入山與胤別胤送至都賜埭去郡三里因曰僕自棄人事交游路斷自非降貴山藪豈容復望城邑此埭之游於今絕矣執手涕零何氏過江自晉司空充並葬吳西山胤家世年皆不永唯祖尚之至七十二胤年登祖壽乃移還吳作別山詩一首言甚悽愴至吳居武丘山西寺講經論學僧復隨之東境守宰經途者莫不畢至胤常禁殺有虞人逐鹿鹿徑來趨胤伏而不動又有異鳥如鶴紅色集講堂馴狎如家禽初開善寺藏法師與胤遇於秦望山後還都卒於鍾山死日胤在波若寺見一名僧授胤香爐奩幷函書云貧道發自揚都呈何居士言訖失所在胤開函乃是大莊嚴論世中未有訪之香爐乃藏公所常用又於寺內立明珠柱柱乃七日七夜放光太守何遠以狀啟昭明太子太子欽其德遣舍人何思澄致手令以褒美之中大通三年卒年八十六先是胤疾妻江氏夢神告曰汝夫壽盡既有至德應獲延期爾當代之妻覺說焉俄得患而卒胤疾乃瘳至是胤夢見一神女幷八十許人並衣帢行列在前俱拜牀下覺又見之便命營凶具既而疾困不復瘳初胤侈於味食必方丈後稍欲去其甚者猶食白魚幵脯糖蟹以為非見生物疑食蚶蠣使門人議之學生鍾岏曰幵之就脯驟於屈申蟹之將糖躁擾彌甚仁人用意深懷如怛至於車螯蚶蠣眉目內闕慚渾沌之奇獷殼外緘非金人之慎不悴不榮曾草木之不若無馨無臭與瓦礫其何算故宜長充庖永為口實竟陵王子良見岏議大怒汝南周顒與胤書勸令食菜曰變之大者莫過死生生之所重無逾性命性命之於彼極切滋味之在我可賒若云三世理誣則幸矣良快如使此道果然而受形未息一往一來生死常事則傷心之慘行亦自及丈人於血氣之類雖不身踐至於晨鳧夜鯉不能不取備屠門財貝之經盜手猶為廉士所棄生性之一啟鑾刀寧復慈心所忍騶虞雖飢非自死之草不食聞其風者豈不使人多媿丈人得此有素聊復片言發起耳故胤末年遂絕血味胤注百論十二門論各一卷注周易十卷毛詩總集六卷毛詩隱義十卷禮記隱義二十卷禮答問五十五卷子撰亦不仕有高風何炯字士光胤從弟也父撙太中大夫炯年十五從胤受業一朞並通五經章句白美容貌從兄求點每曰叔寶神清杜乂膚清今觀此子復見衞杜在目從兄戢謂人曰此子非止吾門之寶亦為一代偉人炯常慕恬退不樂進仕從叔昌𧜛謂曰求點皆已高蹈汝無宜復爾且君子出處亦各一途年十九解褐揚州主簿舉秀才累遷梁仁威南康王限內記室書侍御史以父疾陳解炯侍疾踰旬衣不解帶頭不櫛沐信宿之間形貌頓改及父卒號慟不絕聲藉地腰脚虛腫醫云須服猪蹄湯炯以有肉味不肯服親友請譬終於不回遂以毀卒先是謂家人曰王孫玄晏所尚不同長魚慶緒於事為得必須儉而中禮無取苟異月朝十五日可置一甌粗粥如常日所進又傷兩兄並淡仕進故祿所不及恐而今而後溫飽無資乃漼然下泣自外無所言何昌𧜛字儼望尚之弟子也父佟之位侍中昌𧜛少而清靖獨立不羣所交者必當世清名是以風流籍甚仕宋為尚書儀曹郎建平王景素征北南徐州府主簿以風素見重母老求祿出為湘東太守還為齊高帝驃騎功曹昌𧜛在郡景素被誅昌𧜛痛之至是啟高帝理其寃又與司空褚彥回書極言之高帝嘉其義歷位中書郎王儉衞軍長史儉謂昌𧜛曰後任朝事者非卿而誰臨海王昭秀為荊州以昌𧜛為西中郎長史南郡太守行荊州事明帝將踐阼先使裴叔業仭旨詔昌𧜛令以便宜從事昌𧜛拒之曰國家委身以上流之重付身以萬里之事臨海王未有失寧得從君單詔邪即時自有啟聞須反更議叔業曰若爾便是拒詔拒詔軍法行事耳答曰能見殺者君也能拒詔者僕也君不能見殺政有沿流之計耳昌𧜛素有名德叔業不敢逼而退上聞而嘉之昭秀由此得還都昌𧜛後為吏部尚書嘗有一客姓閔求官昌𧜛謂曰君是誰後答曰子騫後昌𧜛團扇掩口而笑謂坐客曰遙遙華冑昌𧜛不雜交游通和汎愛歷郡皆以清白稱後卒於侍中領驍騎將軍贈太常諡曰簡子子敬容敬容字國禮弱冠尚齊武帝女長城公主拜駙馬都尉梁天監中為建安內史清公有美績吏人稱之累遷守吏部尚書銓序明審號為稱職出為吳郡太守為政勤卹人隱辯訟如神視事四年政為天下第一吏人詣闕請樹碑詔許之復為吏部尚書侍中領太子中庶子敬容身長八尺白美鬚眉性矜莊衣冠鮮麗武帝雖衣浣衣而左右衣必須潔嘗有侍臣衣帶卷摺帝怒曰卿衣帶如繩欲何所縛敬容希旨故益鮮明常以膠清刷鬚衣裳不整伏牀熨之或暑月背為之焦每公庭就列容止出人為尚書右僕射參掌選事遷左僕射丹陽尹並參掌大選如故敬容接對賓朋言詞若訥酬答二宮則音韻調暢大同中朱雀門災武帝謂羣臣曰此門制狹我始欲改構遂遭天火相顧未答敬容獨曰此所謂先天而天不違時以為名對五年改為尚書令參選事如故敬容久處臺閣詳悉晉魏以來舊事且聰明識達勤於簿領詰朝理事日旰不休職隆任重專預機密而拙於草隸淺於學術通包苴餉餽無賄則略不交語自晉宋以來宰相皆文義自逸敬容獨勤庶務貪吝為時所嗤鄙其署名敬字則大作苟小為文容字大為父小為口陸倕戲之曰公家苟既奇大父亦不小敬容遂不能答又多漏禁中語故嘲誚日至嘗有客姓吉敬容問卿與邴吉遠近答曰如明公之與蕭何時蕭琛子巡頗有輕薄才因製卦名離合等詩嘲之亦不屑也帝嘗夢具朝服入太廟拜伏悲感旦於延務殿說所夢敬容對曰臣聞孝悌之至通於神明陛下性與天通故應感斯夢上極然之便有拜陵之議後坐妾弟費慧明為倉丞夜盜官米為禁司所執送領軍府時河東王譽為領軍敬容以書解慧明譽前經屬事不行因此即封書以奏帝大怒付南司推劾御史中丞張綰奏敬容協私罔上合棄市詔特免職到溉謂朱异曰天時便覺開霽其見嫉如此初沙門釋寶誌嘗謂敬容曰君後必貴終是何敗耳及敬容為宰相謂何姓當為其禍故抑沒宗族無仕進者至是竟為河東所敗中大同元年三月武帝幸同泰寺講金字三慧經敬容啟預聽敕許之又起為金紫光祿大夫未拜又加侍中敬容舊時賓客門生諠譁如昔冀其復用會稽謝郁致書戒之曰草萊之人聞諸道路君侯已得瞻望朝夕出入禁門醉尉將不敢呵灰然不無其漸甚休敢賀於前又將弔也昔流言裁至公旦東奔燕書始來子孟不入夫聖賢被虛過以自斥未有嬰時釁而求親者也且暴鰓之魚不念杯酌之水雲霄之翼豈顧籠樊之糧何者所託已盛也昔君侯納言加首鳴玉在腰回豐貂以步文昌聳高蟬而趨武帳可謂盛矣不以此時薦才拔士少報聖主之恩今卒如爰絲之說受責見過方復欲更窺朝廷觖望萬分竊不為左右取也昔竇嬰楊惲亦得罪明時不能謝絕賓客猶交黨援卒無後福終益前禍僕之所弔實在於斯人人所以頗猶有踵君侯之門者未必皆感惠懷仁有灌夫任安之義乃戒翟公之大署冀君侯之復用也夫在思過之日而挾復用之意未可為智者說矣夫君侯宜杜門念失無有所通築茅茨於鐘阜聊優游以卒歲見可憐之意著待終之情復仲尼能改之言惟子貢更也之譬少戢言於衆口微自救於竹帛所謂失之東隅收之桑榆如此令明主聞知尚有冀也僕東臯鄙人入穴幸無銜寠恥天下之士不為執事道之故披肝膽示情素君侯豈能鑒焉太清元年遷太子詹事侍中如故二年侯景襲建鄴敬容自府移家臺內初景渦陽退敗未得審實傳者乃云其將暴顯反景身與衆並沒朝廷以為憂敬容尋見東宮簡文謂曰淮北始更有信侯景定得身免敬容曰得景遂死深是朝廷之福簡文失色問其故對曰景翻覆叛臣終當亂國是年簡文頻於玄圃自講老莊二書學士吳孜時寄詹事府每日入聽敬容謂孜曰昔晉氏喪亂頗由祖尚虛玄胡賊遂覆中夏今東宮復襲此殆非人事其將為戎乎俄而侯景難作其言有徵也三年卒于圍內何氏自晉司空充宋司空尚之奉佛法並建立塔寺至敬容又捨宅東為伽藍趨權者因助財造搆敬容並不拒故寺堂宇頗為宏麗時輕薄者因呼為衆造寺及敬容免職出宅止有常用器物及囊衣而已竟無餘財貨時亦以此稱之敬容特為從兄胤所親愛胤在若邪山嘗疾篤有書云田疇館宇悉奉衆僧書經並歸從弟敬容其見知如此敬容唯有一子年始八歲在吳臨還與胤別胤問名敬容曰仍欲就兄求名胤即命紙筆名曰瑴曰書云兩玉曰瑴吾與弟二家共此一子所謂瑴也位祕書丞早卒論曰尚之以雅道自居用致公輔行己之迹動不踰閑及乎洗閤取譏皮冠獲誚貞粹之地高人未之全許然父子一時並處權要雖經屯詖咸以功名自卒古之所謂巧宦此之謂乎點胤弟兄俱云遁逸求其蹈履則非曰山林察其持身則未捨名譽觀夫子之赴慧景子季之矯敬沖以迹以心居然可測而高自標致一代歸宗以之入用未知所取斯殆虛勝之風江東所尚不然何以至於此也昌𧜛雅仗名節殆曰人望敬容材實幹蠱賄而敗業惜乎
