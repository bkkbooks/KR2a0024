body:
  text: 南史卷二十四列傳第十四王裕之孫秀之延之阮韜延之子綸之曾孫峻峻子琮王鎮之弟弘之弘之孫晏晏從弟思遠王韶之王悅之王準之從弟逡之圭之族子素王裕之字敬弘晉驃騎將軍廙之曾孫司州刺史胡之之孫也名與宋武帝諱同故以字行父茂之字興元晉陵太守敬弘少有清尚起家本國左常侍衛軍參軍性恬靜樂山水求為天門太守及之郡妻弟荊州刺史桓玄遣信要令過己敬弘至巴陵謂人曰靈寶正當欲見其姊我不能為桓氏贅壻乃遣別船送妻往江陵彌年不迎山郡無事恣其遊適意甚好之後為南平太守去官居作唐縣界玄輔政及篡位屢召不下宋武帝以為車騎從事中郎徐州中從事史征西將軍道規咨議參軍時府主簿宗協亦有高趣道規並以事外相期嘗共酣飲敬弘因醉失禮為外司所白道規即更引還重申初宴永初中纍遷吏部尚書敬弘每被召即便祗奉既到宜退旋復解官武帝嘉其志不苟違也除廬陵王師加散騎常侍自陳無德不可師範令王固讓不拜元嘉三年為尚書僕射關署文案初不省讀嘗豫聽訟上問疑獄敬弘不對上變色問左右何故不以訊牒副僕射敬弘曰臣乃得訊牒讀之正自不解上甚不悅雖加禮敬亦不以時務及之六年遷尚書令固讓表求還東上不能奪改授侍中特進左光祿大夫給親信三十人及東歸車駕幸冶亭餞送十二年徵為太子少傅敬弘詣都上表固辭不拜東歸上時不豫自力見焉十六年以為左光祿大夫開府儀同三司侍中如故又詣都表辭竟不拜東歸二十三年復申前命復辭明年薨於餘杭之舍亭山年八十八順帝升明三年追諡文貞公敬弘形狀短而起坐端方桓玄謂之彈發八勢所居舍亭山林澗環周備登臨之美故時人謂之王東山文帝嘗問為政得失對曰天下有道庶人不議上高其言左右嘗使二老婦女戴五條辮著青紋袴飾以朱粉女適尚書僕射何尚之弟述之敬弘嘗往何氏看女遇尚之不在因寄齋中臥俄頃尚之還敬弘使二婦女守閣不聽尚之入云正熱不堪相見君可且去尚之於是移於他室上將為廬陵王納其女辭曰臣女幼既許孔淳之息子恢之被召為祕書郎敬弘為求奉朝請與恢之書曰彼祕書有限故有競朝請無限故無競吾欲使汝處不競之地文帝嘉之並見許敬弘見兒孫歲中不過一再相見見輒剋日未嘗教子孫學問各隨所欲人或問之答曰丹朱不應乏教寧越不聞被捶恢之位新安太守嘗請假定省敬弘剋日見之至日輒不果假日將盡恢之求辭敬弘呼前至閣復不見恢之於閣外拜辭流涕而去恢之弟瓚之位吏部尚書金紫光祿大夫諡貞子瓚之弟升之位都官尚書瓚之子秀之秀之字伯奮幼時祖父敬弘愛其風采仕宋為太子舍人父卒廬於墓側服闋復職吏部尚書褚彥回欲與結婚秀之不肯以此頻為兩府外兵參軍後為晉平太守期年求還或問其故答曰此郡沃壤珍阜日至人所昧者財財生則禍逐智者不昧財亦不逐禍吾山資已足豈可久留以妨賢路乃上表請代時人以為王晉平恐富求歸仕齊為豫章王嶷驃騎長史嶷於荊州立學以秀之領儒林祭酒武帝即位纍遷侍中祭酒轉都官尚書秀之祖父敬弘性貞正徐羡之傅亮當朝不與來往及致仕隱吳興與秀之父瓚之書深勗以靜退瓚之為五兵尚書未嘗詣一朝貴江湛謂何偃曰王瓚之今便是朝隱及柳元景顏師伯貴要瓚之竟不侯之至秀之為尚書又不與王儉款接三世不事權貴時人稱之轉侍中領射聲校尉出為隨王鎮西長史南郡內史後為輔國將軍吳興太守秀之先為諸王長史行事便歎曰仲祖之識見於已多便無復仕進止營理舍亭山宅有終焉之志及除吳興郡隱業所在心願為之到郡修舊山移置輜重隆昌元年卒遺令朱服不得入棺祭則酒脯而已世人以僕妾直靈助哭當由喪主不能淳至欲以多聲相亂魂而有靈吾當笑之諡曰簡子延之字希季升之子也少靜默不交人事仕宋為司徒左長史清貧居宇穿漏褚彥回以啓宋明帝即敕材官為起三間齋屋歷吏部尚書尚書左僕射宋德既衰齊高帝輔政朝野之情人懷彼此延之與尚書令王僧虔中立無所去就時人語曰二王居平不送不迎高帝以此善之升明三年出為江州刺史加都督齊建元元年進號鎮南將軍延之與金紫光祿大夫阮韜俱宋領軍將軍劉湛外甥並有早譽湛甚愛之曰韜後當為第一延之為次也延之甚不平每致餉下都韜與朝士同例高帝聞之與延之書曰韜云卿未嘗有別意當由劉家月旦故邪韜字長明陳留人晉金紫光祿大夫裕玄孫也為南兗州別駕刺史江夏王義恭逆求資費錢韜曰此朝廷物執不與宋孝武選侍中四人並以風貌王彧謝莊為一雙韜與何偃為一雙常充兼假至始興王師卒延之居身簡素清靜寡欲凡所經歷務存不擾在江州祿俸外一無所納獨處齋內未嘗出戶吏人罕得見焉雖子弟亦不妄前時時見親舊未嘗及世事從容談詠而已後為尚書左僕射尋領竟陵王師卒諡簡子子綸之字元章為安成王記室參軍偃仰召會退居僚末司徒袁粲聞而歎曰格外之官便今日為重貴遊居此位者遂以不掌文記為高自綸之始也齊永明中歷位侍中出為豫章太守下車祭徐孺子許子將墓圖畫陳蕃華歆謝鯤像於郡朝堂為政寬簡稱良二千石武帝幸琅邪城綸之與光祿大夫全景文等二十一人坐不參承為有司奏免官後位侍中都官尚書卒自敬弘至綸之並方嚴皆剋日乃見子孫蓋家風也綸之子昕有業行居父憂過禮謝糟欲遣參之孔圭曰何假參此豈有全理以憂卒峻字茂遠秀之子也少美風姿善容止仕齊為桂陽內史梁天監初為中書侍郎武帝甚悅其風采與陳郡謝覽同見賞擢纍遷侍中吏部尚書處選甚得名譽峻性詳雅無趨競心嘗與謝覽約官至侍中不復謀進仕覽自吏部尚書出為吳興郡平心不畏強禦亦由處俗情薄故也峻為侍中已後雖不退身亦淡然自守無所營務遷金紫光祿大夫未拜卒諡惠子子琮為國子生尚始興王女繁昌主琮不慧為學生所嗤遂離婚峻謝王王曰此自上意僕極不願如此峻曰下官曾祖是謝仁祖外孫亦不藉殿下姻媾為門戶耳王鎮之字伯重晉司州刺史胡之之從孫而裕之從祖弟也祖耆之位中書郎父隨之上虞令鎮之為剡上虞令並有能名桓玄輔晉以為大將軍録事參軍時三吳飢荒遣鎮之銜命賑恤而會稽內史王愈不奉符旨鎮之依事糾奏愈子綏玄之外甥當時貴盛鎮之為所排抑以母老求補安成太守以母憂去職在官清潔妻子無以自反乃棄家致喪還上虞舊墓葬畢為子標之求安復令隨子之官服闋為征西道規司馬南平太守後為御史中丞執正不撓百僚憚之出為建威將軍平越中郎將廣州刺史加都督宋武帝謂人曰鎮之少著清績必將繼美吳隱嶺南弊俗非此不康也在鎮不受俸祿蕭然無營去官之日不異初至武帝初建相國府為咨議參軍領録事善於吏職嚴而不殘遷宋臺祠部尚書武帝踐阼卒於宣訓衛尉弟弘之弘之字方平少孤貧為外祖徵士何準所撫育從叔獻之及太原王恭並貴重之仕晉為司徒主簿家貧性好山水求為烏傷令桓玄輔晉桓謙以為衛軍參軍時殷仲文還姑孰祖送傾朝謙要弘之同行答曰凡祖離送別必在有情下官與殷風馬不接無緣扈從謙貴其言母隨兄鎮之之安成郡弘之解職同行義熙中何無忌及宋武帝辟召一無所就家在會稽上虞從兄敬弘為吏部尚書奏弘之為太子庶子不就文帝即位敬弘為尚書左僕射陳弘之高行徵為通直散騎常侍又不就敬弘嘗解貂裘與之即著以採藥性好釣上虞江有一處名三石頭弘之常垂綸於此經過者不識之或問漁師得魚賣不弘之曰亦自不得得亦不賣日夕載魚入上虞郭經親故門各以一兩頭置門內而去始寧沃川有佳山水弘之又依巖築室謝靈運顏延之並相欽重靈運與廬陵王義真箋曰會境既豐山水是以江左嘉遁並多居之至若王弘之拂衣歸耕踰歷三紀孔淳之隱約窮岫自始迄今阮萬齡辭事就間纂戎先業既遠同羲唐亦激貪厲競若遣一個有以相存真可謂千載盛美也弘之元嘉四年卒顏延之欲為作誄書與其子曇生曰君家高世之善有識歸重豫染豪翰所應載述況僕託慕末風竊以德為事但恨短筆不足書美誄竟不就曇生好文義以謙和見稱歷吏部尚書太常卿孝武末為吳興太守明帝初興與四方同逆戰敗歸降被宥終於中散大夫阮萬齡陳留尉氏人祖思曠左光祿大夫父寧黃門侍郎萬齡少知名為孟昶建威長史時袁豹江夷相係為昶司馬時人謂昶府有三素望萬齡家在會稽剡縣頗有素情位左戶尚書太常出為湘州刺史無政績後為散騎常侍金紫光祿大夫卒曇生弟普曜位祕書監普曜子晏晏字休默一字士彥仕宋初為建安國左常侍稍至車騎晉熙王燮安西板晏主簿時齊武帝為長史與晏相遇府轉鎮西板晏為記室沈攸之事難隨武帝鎮盆城齊高帝時威權雖重而衆情猶有疑惑晏便專心奉事軍旅書翰皆見委性甚便僻漸見親待常參議機密建元初為太子中庶子武帝在東宮專斷朝事多不聞啓晏慮及罪稱疾自疏武帝即位為長兼侍中意任如舊遷侍中祭酒遭母喪起為司徒左長史晏父普曜藉晏勢多歷通官普曜卒晏居喪有禮永明六年為丹陽尹晏位任親重自豫章王嶷尚書令王儉皆降意接之而晏每以疏漏被責連稱疾久之轉為江州刺史泣不願出留為吏部尚書太子右率終以舊恩見寵時尚書令王儉雖貴而疏晏既領選權行臺閣與儉頗不平儉卒禮官欲依王導諡為文獻晏啓上曰導乃得此諡但宋來不加素族謂親人曰平頭憲事已行矣十一年為右僕射領太孫右衛率武帝崩遺旨以尚書事付晏及徐孝嗣鬱林即位轉左僕射及明帝謀廢立晏便響應推奉轉尚書令封曲江縣侯給鼓吹一部甲仗五十人入殿時明帝形勢已布而莫敢先言蕭諶兄弟握兵權遲疑未決晏頻三夜微步詣諶議時人以此窺之明帝與晏東府語及時事晏抵掌曰公常言晏怯今定如何建武元年進號驃騎大將軍給班劍二十人又加兵百人領太子少傅進爵為公以魏軍動給兵千人晏篤於親舊為時所稱至是自謂佐命惟新言論常非武帝故事衆始怪之明帝雖以事際須晏而心相疑斥料簡武帝中詔得與晏手詔三百餘紙皆是論國家事永明中武帝欲以明帝代晏領選晏啓曰鸞清幹有餘然不諳百氏恐不可居此職乃止及見此詔愈猜薄之帝初即位始安王遙光便勸誅晏帝曰晏於我有勳且未有罪遙光曰晏尚不能為武帝安能為陛下帝默然變色時帝常遣心腹左右陳世範等出塗巷采聽異言由是以晏為事晏性浮動志欲無厭自謂旦夕開府又望録尚書每謂人曰徐公應為令又和徐詩云槐序候方調其名位在徐前徐若三槐則晏不言自顯人或譏之晏人望未重又與上素疏中興初雖以事計委任而內相疑阻晏無防意既居朝端事多專決內外要職並用周旋門義每與上爭用人數呼相工自視云當大貴與客語好屏人上聞疑晏欲反遂有誅晏意有鮮于文粲與晏子德元往來密探朝旨告晏有異志又左右單景俊陳世範等采巫覡言啓上云晏懷異圖是時南郊應親奉景俊等言晏因此與武帝故主帥於道中竊發會獸犯郊壇帝愈懼未郊前一日上乃停行先報晏及徐孝嗣孝嗣奉旨而晏陳郊祀事大必宜自力景俊言益見信元會畢乃召晏於華林省誅之下詔顯其罪稱以河東王鉉識用微弱欲令守以虛器並令收付廷尉晏之為員外郎也父普曜齋前柏樹忽變成梧桐論者以為梧桐雖有栖鳳之美而失後凋之節及晏敗果如之又未敗前見屋桷子悉是大蛇就視之猶木也晏惡之乃以紙裹桷子猶紙內搖動蔌蔌有聲又於北山廟答賽夜還晏醉部伍人亦飲酒羽儀錯亂前後十餘里中不復禁制識者云此不復久也未幾而敗晏子德元有意尚位車騎長史德元初名湛武帝曰劉湛江湛並不善終此非佳名也晏乃改之至是及誅晏弟詡位少府卿敕未登黃門郎不得畜女伎詡與射聲校尉陰玄智坐畜伎免官禁錮十年敕特原詡詡亦篤舊後拜廣州刺史晏誅上遣殺之思遠晏從父弟也父羅雲平西長史思遠八歲父卒祖弘之及外祖新安太守羊敬元並栖退高尚故思遠少無仕心宋建平王景素辟南徐州主簿深見禮遇景素被誅左右離散思遠親視殯葬手種松柏與廬江何昌𧜛沛郡劉璡上表理之事感朝廷景素女廢為庶人思遠分衣食以相資贍年長為備笄總訪求素對傾家送遣齊建元初歷竟陵王司徒録事參軍太子中舍人文惠太子與竟陵王子良素好士並蒙賞接思遠求出為遠郡除建安內史長兄思玄卒思遠友于甚至表乞自解不許及祥日又固陳武帝乃許之仍除中書郎大司馬咨議詔舉士竟陵王子良薦思遠及吳郡顧皓之陳郡殷睿時邵陵王子貞為吳郡除思遠為吳郡丞以本官行郡事論者以為得人後拜御史中丞臨海太守沈昭略贓私思遠依事劾奏明帝及思遠從兄晏昭略叔父文季並請止之思遠不從案事如故建武中遷吏部郎思遠以晏為尚書令不欲並居內臺權要之職上表固讓乃改授司徒左長史初明帝廢立之際思遠謂晏曰兄荷武帝厚恩今一旦贊人如此事彼或可以權計相須未知兄將何以自立及此引決猶可保全門戶不失後名晏曰方噉粥未暇此事及拜驃騎會子弟謂思遠兄思徵曰隆昌之末阿戎勸吾自裁若用其語豈有今日思遠遽應曰如阿戎所見猶未晚也晏既不能謙退位處朝端事多專斷內外要職並用門生帝外迹甚美內相疑異思遠謂曰時事稍異兄覺不凡人多拙於自謀而巧於謀人晏默然不答思遠退後晏方歎曰天下人遂勸人自殺旬日晏及禍明帝後知思遠有此言謂江祏曰王晏早用思遠語當不至此思遠立身簡潔諸客有詣己者覘知衣服垢穢方便不前形儀新楚乃與促膝雖然及去之後猶令二人交帚拂其坐處明帝從祖弟季敞性甚豪縱使詣思遠令見禮度都水使者李圭之常曰見王思遠終日匡坐不妄言笑簪帽衣領無不整潔便憶丘明士見明士蓬頭散帶終日酣醉吐論從橫唐突卿宰便復憶見思遠言其兩反也上既誅晏思遠遷為侍中掌優策及起居注卒年四十九贈太常諡曰貞子思遠與顧皓之善皓之卒後家貧思遠迎其妻子經恤甚至皓之字士明少孤好學有義信位太子中舍人兼尚書左丞王韶之字休泰胡之從孫而敬弘從祖弟也祖羡之鎮軍掾父偉之少有志尚當世詔命表奏輒手自書寫太元隆安時事大小悉撰録位本國郎中令韶之家貧好學嘗三日絶糧而執卷不輟家人誚之曰困窮如此何不耕答曰我常自耕耳父偉之為烏程令韶之因居縣境好史籍博涉多聞初為衛將軍謝琰行參軍得父舊書因私撰晉安帝陽秋及成時人謂宜居史職即除著作佐郎使續後事訖義熙九年善事辭論可觀遷尚書祠部郎晉帝自孝武以來常居內殿武官主書於中通呈以省官一人管詔誥住西省因謂之西省郎傅亮羊徽相代在職義熙十一年宋武帝以韶之博學有文辭補通直郎領西省事轉中書侍郎晉安帝之崩武帝使韶之與帝左右密加鴆毒恭帝即位遷黃門侍郎領著作西省如故凡諸詔黃皆其辭也武帝受命加驍騎將軍黃門如故西省職解復掌宋書坐璽封謬誤免黃門事在謝晦傳韶之為晉史序王珣貨殖王廞作亂珣子弘廞子華並貴顯韶之懼為所陷深附結徐羡之傅亮等少帝即位遷侍中出為吳郡太守羡之被誅王弘入相領揚州刺史弘雖與韶之不絶諸弟未相識者皆不復往來韶之在郡常慮為弘所繩夙夜勤勵政績甚美弘亦抑其私憾文帝兩嘉之韶之稱為良守徵為祠部尚書加給事中坐去郡長取送故免官後為吳興太守卒撰孝傳三卷文集行於世宋廟歌辭韶之所制也子曄位臨賀太守王悅之字少明晉右軍將軍羲之曾孫也祖獻之中書令父靖之司徒左長史為劉穆之所厚就穆之求侍中如此非一穆之曰卿若不求久自得之遂不果悅之少厲清操亮直有風檢為吏部郎鄰省有會同者遺悅之餅一甌辭不受曰此費誠小然少來不願當之宋明帝泰始中為黃門郎御史中丞上以其廉介賜良田五頃以為侍中在門下盡其心力掌檢校御府太官太醫諸署時承奢之後姦竊者衆悅之按覆無所避得姦巧甚多於是衆署共呪詛悅之病甚見兩烏衣人捶之及卒上乃收典掌者十許人桎梏之送淮陰密令度瓜步江投之中流王準之字元魯晉尚書僕射彬玄孫也曾祖彪之位尚書令祖臨之父訥之並御史中丞彪之博聞多識練悉朝儀自是家世相傳並諳江左舊事緘之青箱世謂之王氏青箱學準之兼明禮傳贍於文辭桓玄篡位以為尚書祠部郎宋武帝起兵為太尉主簿出為山陰令有能名預討盧循功封都亭侯宋臺建除御史中丞為百僚所憚自彪之至準之四世居此職準之嘗作五言詩范泰嘲之卿唯解彈事耳準之正色答猶差卿世載雄狐坐世子左衛率謝靈運殺人不舉免官武帝受命拜黃門侍郎永初中奏曰鄭玄注禮三年之喪二十七月而吉古今學者多謂得禮之宜晉初用王肅議祥禫共月故二十五月而除遂以為制江左以來唯晉朝施用搢紳之士多遵玄義夫先王制禮以大順羣心喪也寧戚著自前經今大宋開泰品物遂理愚謂宜同即物情以玄義為制朝野一禮則家無殊俗從之元嘉中歷位侍中都官尚書改領吏部出為丹陽尹準之究識舊儀問無不對時大將軍彭城王義康録尚書事每歎曰何須高論玄虛正得如王準之兩三人天下便足然寡風素情悁急不為時流所重撰儀注咸見遵用卒贈太常子輿之征虜主簿輿之子進之仕齊位給事黃門侍郎扶風太守梁武帝之舉兵也所在響應鄰郡多請進之同遣修謁進之曰非吾志也竟不行武帝嘉之梁臺建歷尚書左丞廣平天門二郡太守左衛將軍封建寧公進之子清位散騎常侍金紫光祿大夫鎮東府長史新野東陽二郡太守安南將軍封中廬公承聖末陳武帝殺太尉王僧辨遣文帝攻僧辨壻杜龕龕告難於清引兵援龕大敗陳文帝於吳興追奔至晉陵時廣州刺史歐陽頠亦同清援龕中更改異殺清而歸陳武帝子猛猛字世雄本名勇五歲而父清遇害陳文帝軍度浙江訪之將加夷滅母韋氏攜之遁于會稽遂免及長勤學不倦博涉經史兼習孫吳兵法以父遇酷終文帝之世不聽音樂蔬食布衣以喪禮自處宣帝立乃始求位太建初釋褐鄱陽王府中兵參軍再遷永陽王府録事參軍猛慷慨常慕功名先是上疏陳安邊拓境之策甚見嘉納至是詔隨大都督吳明徹略地以軍功封應陽縣子纍遷太子右衛率徙晉陵太守威惠兼舉姦盜屏迹富商野次云以付王府君郡人歌之以比漢之趙廣漢至德初徵為左驍騎將軍加散騎常侍深見信重時孔範施文慶等並相與比周害其梗直議將出之而未有便會廣州刺史馬靖不受徵乃除猛都督東衡州刺史領始興內史與廣州刺史陳方慶共取靖猛至即禽靖送建鄴進爵為公加光勝將軍平越中郎將大都督發廣桂等二十州兵討嶺外荒梗所至皆平禎明二年詔授鎮南大將軍都督二十四州諸軍事尋命徙鎮廣州未之鎮而隋師濟江猛總督所部赴援時廣州刺史臨汝侯方慶西衡州刺史衡陽王伯信並隸猛督府各觀望不至猛使高州刺史戴智烈清遠太守曾孝遠各以輕兵就斬之而發其兵及聞臺城不守乃舉哀素服藉不食歎曰申包胥獨何人哉因勒兵緣江拒守以固誠節及審後主不死乃遣其部將辛昉馳驛赴京師歸款隋文帝大悅謂昉曰猛懷其舊主送故情深即是我之誠臣保守一方不勞兵甲又是我之功臣即日拜昉開府儀同三司仍詔猛與行軍總管韋洸便留嶺表經略猛母妻子先留建鄴因隨後主入京詔賜宅及什物甚厚別賚物一千段及遣璽書勞猛仍討平山越馳驛奏聞時文帝幸河東會猛使至大悅楊素賀因曰昔漢武此地聞喜用改縣名王猛今者告捷遠符前事於是又降璽書褒賞以其長子繕為開府儀同三司猛尋卒於廣州文帝聞而痛之遣使弔祭贈上開府儀同三司封歸仁縣公命其子繕襲仍授普州刺史仁壽元年繕弟續表陳猛志求葬關中詔許之仍贈使持節大將軍宋州刺史三州諸軍事諡曰成訥之弟瓌之字道茂位司空咨議參軍瓌之子逡之逡之字宣約少禮學博聞仕宋位吳令升明末尚書右僕射王儉重儒術逡之以著作郎兼尚書左丞參定齊國儀禮初儉撰古今喪服集記逡之難儉十一條更撰世行五卷國學久廢齊建元二年逡之先上表立學轉國子博士又兼著作撰永明起居注後位南康相光祿大夫加給事中逡之率素衣裳不浣几案塵黑年老手不釋卷建武二年卒從弟圭之位長水校尉撰齊職儀永明九年其子中軍參軍皓啓上其書凡五十卷詔付祕閣素字休業彬五世孫而逡之族子也高祖翹之晉光祿大夫曾祖望之祖泰之並不仕父元弘位平固令素少有志行家貧母老隱居不仕宋孝建大明泰始中屢徵不就聲譽甚高山中有蚿聲清長聽之使人不厭而其形甚醜素乃為蚿賦以自況卒年五十四論曰昔晉初度江王導卜其家世郭璞云淮流竭王氏滅觀夫晉氏以來諸王冠冕不替蓋亦人倫所得豈唯世祿之所專乎及于陳亡之年淮流實竭曩時人物掃地盡矣斯乃興亡之兆已有前定天之所廢豈智識之所謀乎
