body:
  text: 南史卷三十五列傳第二十五劉湛庾悅族弟登之仲文仲文子弘遠仲文族孫仲容顧琛顧覬之孫憲之劉湛字弘仁南陽涅陽人也祖耽父柳並晉左光祿大夫開府儀司三同湛出繼伯父淡襲封安衆縣五等男少有局力不尚浮華博涉史傳諳前代舊典弱年便有宰物情常自比管葛不為文章不喜談議除宋武帝太尉行參軍賞遇甚厚父柳亡於江州府州送故甚豐一無所受時論稱之服闋為相國參軍謝晦王弘並稱其器幹武帝入受晉命以第四子義康為冠軍將軍豫州刺史留鎮壽陽以湛為長史梁郡太守義康弱年未親政府州事悉委湛進號右將軍仍隨府轉義康以本號徙南豫州湛改領歷陽太守為人剛嚴用法姦吏犯贓百錢以上皆殺之自下莫不震肅廬陵王義真出為車騎將軍南豫州刺史湛又為長史太守如故義真時居武帝憂使帳下備膳湛禁之義真乃使左右人買魚肉珍羞於齋內別立廚帳會湛入因命臑酒炙車螯湛正色曰公當今不宜有此設義真曰旦甚寒杯酒亦何傷長史事同一家望不為異酒至湛起曰既不能以禮自處又不能以禮處人後為廣州刺史嫡母憂去職服闋為侍中時王華王曇首殷景仁亦為侍中文帝於合殿與四人宴飲甚悅華等出帝目送良久歎曰此四賢一時之秀同管喉脣恐後世難繼及撫軍將軍江夏王義恭鎮江陵以湛為使持節南蠻校尉領撫軍長史行府州事王弘輔政而王華王曇首任事居中湛自謂才能不後之不願外出是行也謂為弘等所斥意甚不平常曰二王若非代邸之舊無以至此可謂遭遇風雲湛負其才氣常慕汲黯崔琰為人故名長子曰黯字長孺第二子曰琰字季圭琰於江陵病卒湛求自送喪還都義恭亦為之陳情文帝答義恭曰吾亦得湛啓事為之酸懷乃不欲苟違所請但汝弱年新涉軍務八州殷曠專斷事重疇咨委仗不可不得其人量算二三未獲便相順許今答湛啓權停彼葬頃朝臣零落相係寄懷轉寡湛實國器吾乃欲引其令還直以西夏任重要且停此事耳汝慶賞黜罰預關得失者必宜悉相委寄義恭性甚狷隘年又漸大欲專政事每為湛所裁主佐之間嫌隙遂搆文帝聞之密遣詰讓義恭義恭陳湛無居下之禮又自以年長未得行意雖奉詔旨每出怨言上友于素篤欲加酬順乃詔之曰當今之才委受已爾宜盡相彌縫取其可取棄其可棄先是王華既亡曇首又卒領軍將軍殷景仁以時賢零落白文帝徵湛八年召為太子詹事加給事中與景仁並被任遇湛云今代宰相何難此正可當我南陽郡漢代功曹耳明年景仁轉尚書僕射領選護軍將軍湛代為領軍十二年又領詹事湛與景仁素款又以其建議徵之甚相感悅及俱被時遇猜隙漸生以景仁專內任謂為間己時彭城王義康專執朝權而湛昔為上佐遂以舊情委心自結欲因宰相之力回主心傾黜景仁獨當時務義康屢言之於文帝其事不行義康僚屬及湛諸附隸潛相約勒無敢歷殷氏門者湛黨劉敬文父成未悟其機詣景仁求郡敬文遽謝湛曰老父悖耄遂就殷鐵干祿由敬文暗淺上負生成合門慚懼無地自處敬文之姦諂如此義康擅權專朝威傾內外湛愈推崇之無復人臣之禮上稍不能平湛初入朝委任甚重善論政道並諳前代故事聽者忘疲每入雲龍門御者便解駕左右及羽儀隨意分散不夕不出以此為常及晚節驅煽義康陵轢朝廷上意雖內離而接遇不改上謂所親曰劉斑初自西還吾與語常看日早晚慮其當去比入亦看日早晚慮其不去湛小字斑獸故云斑也遷丹陽尹詹事如故十七年所生母亡上與義康形迹既乖釁難將結湛亦知無復全地及至丁艱謂所親曰今年必敗常日賴口舌爭之故得推遷耳今既窮毒無復此望禍至其能久乎伏甲於室以待上臨弔謀又泄竟弗之幸十月詔收付廷尉於獄伏誅時年四十九子黯等從誅弟素黃門郎徙廣州湛初被收歎曰便是亂邪又曰不言無我應亂殺我日自是亂法耳入獄見素曰乃復及汝邪相勸為惡惡不可為相勸為善正見今日如何湛生女輒殺之為時流所怪庾悅字仲豫潁川鄢陵人也晉太尉亮之曾孫也祖羲吳興內史父準西中郎將荊州刺史悅仕晉為司徒右長史桓玄篡位為中書侍郎宋武平建鄴纍遷建威將軍江州刺史加都督初劉毅家在京口酷貧嘗與鄉曲士大夫往東堂共射時悅為司徒右長史要府州僚佐出東堂毅已先至遣與悅相聞曰身並貧躓營一遊甚難君如意人無處不可為適豈不能以此堂見讓悅素豪徑前不答毅語衆人並避唯毅留射如故悅廚饌甚盛不以及毅毅既不去悅甚不歡毅又相聞曰身今年未得子鵝豈能以殘炙見惠悅又不答至是毅表解悅都督將軍官以刺史移鎮豫章以親將趙恢領千兵守尋陽建威府文武三千人悉入毅將府深相挫辱悅不得志疽發背到豫章少日卒登之字元龍悅族弟也曾祖冰晉司空祖蘊廣州刺史父廓東陽太守登之少以強濟自立初為宋武帝鎮軍參軍預討桓玄功封曲江縣五等男纍遷新安太守謝晦為荊州刺史請為長史南郡太守仍為衛軍長史登之與晦俱曹氏壻名位本同一旦為之佐意甚不愜到廳箋唯言即日恭到初無感謝之言每入覲見備持箱囊几席之屬一物不具則不肯坐嘗於晦坐誦西征賦云生有修短之命位有通塞之遇晦雖恨而常優容之晦拒王師欲登之留守登之不許晦敗登之以無任免官禁錮還家何承天戲之曰因禍為福未必皆知登之曰我亦幾與三豎同戮承天為晦作表云當浮舟東下戮此三豎故登之為嘲後為司徒長史南東海太守府公彭成王義康專覽政事不欲自下厝意而登之性剛每陳己志義康不悅出為吳郡太守以贓貨免官後拜豫章太守徵為中護軍未拜卒子仲遠初為宋明帝府佐廢帝景和中明帝疑防賓客故人無到門者唯仲遠朝謁不替明帝即位謂曰卿所謂疾風知徑草自軍録事參軍擢拜太子中庶子卒於豫章太守贈侍中登之弟仲文仲文位廣平太守兄登之為謝晦長史仲文往省之時晦權重朝士並加敬仲文獨與抗禮後為彭城王義康驃騎主簿未就徙為丹陽丞既未到府疑於府公禮敬下禮官博議中書侍郎裴松之議曰案春秋桓公八年祭公逆王后于紀公羊傳曰女在國稱女此其稱王后何王者無外其辭成矣推此而言則仲文為吏之道定於受敕之日矣名器既正則禮亦從之安可未到廢其節乎宜執吏禮從之後始興王濬當鎮湘州以仲文為司馬濬不之任仍除南梁太守司馬如故于時領軍劉湛協附大將軍彭城王義康而與僕射殷景仁隙凡朝士遊殷氏者不得入劉氏之門獨仲文遊二人間密盡忠於朝廷景仁稱疾不朝見者歷年文帝常令仲文銜命去來湛不疑也義康出蕃湛伏誅以仲文為尚書吏部郎與右衛將軍沈演之俱參機密歷侍中吏部尚書領義陽王師內外歸附勢傾朝野仲文為人強急不耐煩賓客訴非理者忿罵形於辭色素無術學不為衆望所推性好潔士大夫造之者未出戶輒令人拭席洗牀時陳郡殷沖亦好淨小史非淨浴新衣不得近左右士大夫小不整潔每容接之仲文好潔反是每以此見譏領選既不緝衆論又頗通貨賄用少府卿劉道錫為廣州刺史道錫至鎮餉白檀牽車常自乘焉或以白文帝帝見問曰道錫餉卿小車裝飾甚麗有之乎仲文懼起謝又仲文請急還家吏部令史錢泰主客令史周伯齊出仲文宅咨事泰能彈琵琶伯齊善歌仲文因留停宿尚書制令史咨事不得宿停外雖八座命亦不許為有司所奏上於仲文素厚將恕之召問尚書右僕射何尚之具陳仲文得失奏言仲文事如丘山若縱而不糾復何以為政晉武不為明主斷鬲令事遂能奮發華廙見待不輕廢錮纍年後起改作城門校尉耳若言仲文有誠於國未知的是何事政當云與殷景仁不失其舊與劉湛亦復不疏且景仁當時意事豈復可蔑縱有微誠復何足掩其惡賈充勳烈晉之重臣雖事業不稱不聞有大罪諸臣進説便即遠出陛下聖睿反更遲遲於此仲文身上之釁既自過於范曄所少賊一事耳伏願深加三思試以諸聲傳普訪諸可顧問者羣下見陛下顧遇既重恐不敢苦侵傷顧問之日宜布嫌責之旨若不如此亦當不辨有所得失時仲文自理不諳臺制令史並言停外非嫌帝以小事不足傷大臣尚之又陳令史具向仲文説不得停之意仲文了不聽納非為不解直是苟相留耳雖是令史出乃遠虧朝典又不得謂之小事謝晦望實非今者之疇一事錯誤免侍中官王珣時賢少失桓胤春搜之謬皆白衣領職況公犯憲制邪孔萬祀居左局言仲文貴要異他尚書又云不癡不聾不成姑公敢作此言亦為異也文帝猶優遊使尚之更陳其意尚之備言仲文愆曰臣思張遼之言關羽雖兄弟曹公父子豈得不言觀今人臣憂國甚寡臣復結舌日月之明或有所蔽然不知臣者豈不謂臣有爭競之心亦追以悵悵臣與仲文周旋俱被恩接不宜復生厚薄太尉昨與臣言説仲文有諸不可非唯一條遠近相崇畏震動四海仲文先與劉德願殊惡德願自持琵琶甚精麗遺之便復款然市令盛馥進數百口材助營宅恐人知作虛買券劉道錫驟有所輸傾南奉之半劉雍自謂得其力助事之如父夏中送甘蔗若新發於州國吏運載藮蘇無輟於道諸見人有物鮮或不求聞劉遵考有材便乞材見好燭槃便復乞之選用不平不可一二太尉又言仲文都無共事之體凡所選舉悉是其意政令太尉知耳論虞秀之作黃門太尉不正答和故得停太尉近與仲文疏欲用德願兒作州西曹仲文乃啓用為主簿即語德願以謝太尉前後漏泄賣恩亦復何極縱不罪故宜出之自從裴劉刑罰已來諸將陳力百倍今日事實好惡可問若赫然發憤顯明法憲陛下便可間臥紫闥無復一事也帝欲出仲文為丹陽又以問尚之答言仲文蹈罪負恩陛下遲遲舊恩未忍窮法方復有尹京赫赫之授恐悉心奉國之人於此而息貪狼恣意歲月滋甚如臣所聞天下議論仲文塵纍日月未見一毫增輝乃更成形勢是老王雅也古人言無賞罰雖堯舜不能為政陛下豈可坐損皇家之重迷一凡人令賈誼劉向重生豈不慷慨流涕於聖世邪臣昔啓范曄當時亦懼犯觸之尤苟是愚懷所挹政自不能不舒達所謂雖九死而不悔也臣謂仲文且外出若能修改在職著稱還亦不難而得少明國典粗酬四海之誚今愆釁如山榮任不損仲文若復有彰大之罪誰敢以聞亦知陛下不能採臣之言故是臣不能以己之意耳又曰臣見劉伯龍大慷慨仲文所行言有人送張幼緒語人吾雖得一縣負錢三十萬庾仲遠仍當送至新林見縛束猶未得解手荀萬秋嘗詣仲文逢一客姓夏侯主人問有好牛不言無問有好馬不又言無政有佳驢耳仲文便答甚是所欲客出門遂相聞索之劉道錫言是仲文所舉就道錫索嫁女具及祠器乃當百萬數猶謂不然選令史章龍向臣説亦歎其受納之過言實得嫁女銅爐四人舉乃勝細葛斗帳等物不可稱數在尚書中令奴酤酃酒利其百十亦是立臺閣所無不審少簡聖聽不帝乃可有司之奏免仲文官卒于家帝録其宿誠追贈本官子弘遠弘遠字士操清實有士譽仕齊為江州長史刺史陳顯達舉兵敗斬於朱雀航將刑索帽著之曰子路結纓吾不可以不冠而死謂看者曰吾非賊乃是義兵為諸君請命耳陳公太輕事若用吾言天下將免塗炭弘遠子子曜年十四抱持父乞代命遂併殺之仲文從弟徽之位御史中丞徽之子漪齊邵陵王記室漪子仲容仲容字子仲幼孤為叔父泳所養及長杜絶人事專精篤學晝夜手不輟卷初為安西法曹行參軍泳時貴顯吏部尚書徐勉擬泳子晏嬰為宮僚泳泣曰兄子幼孤人才粗可願以晏嬰所忝回用之勉許焉轉仲容為太子舍人遷安成王主簿時平原劉峻亦為府佐並以強學為王所禮接後為永康錢唐武康令並無績多被推劾久之除安成王中記室當出隨府皇太子以舊恩降餞賜詩曰孫生陟陽道吳子朝歌縣未若樊林舉置酒臨華殿時輩榮之後為尚書左丞坐推糾不直免官仲容博學少有盛名頗任氣使酒好危言高論士友以此少之唯與王籍謝幾卿情好相得二人時亦不調遂相追隨誕縱酣飲不持檢操遇太清亂遊會稽卒仲容抄子書三十卷諸集三十卷衆家地理書二十卷列女傳三卷文集二十卷並行於代顧琛字弘瑋吳郡吳人晉司空和之曾孫也祖履之父惔並為司徒左西曹掾琛謹確不尚浮華起家州從事駙馬都尉纍遷尚書庫部郎元嘉七年文帝遣到彥之經略河南大敗悉委棄兵甲武庫為之空虛文帝宴會有歸化人在座上問琛庫中仗猶有幾許琛詭辭答有十萬人仗舊庫仗祕不言多少上既發問追悔失言及琛詭對上甚善之尚書寺門有制八坐以下門生隨入者各有差不得雜以人士琛以宗人顧碩寄尚書張茂度門名而與顧碩同席坐明年坐譴出免中正凡尚書官大罪則免小罪譴出譴出者百日無代人聽還本職琛仍為彭城王義康所請再補司徒録事參軍十五年出為義興太守初義康請琛入府欲委以腹心琛不能承事劉湛故尋見斥外十九年徙東陽太守欲使琛防守彭城王義康固辭忤旨廢黜還家積年及元凶弒立分會稽五郡置州以隨王誕為刺史即以琛為會稽太守誕起義加冠軍將軍事平遷吳興太守孝建元年為吳郡太守以起義功封永新縣五等侯大明元年吳縣令張闓坐居母喪無禮下廷尉錢唐令沈文秀判劾違謬應坐被彈琛宣言於衆闓被劾之始屢相申明又云當啓文秀留縣孝武聞之大怒謂琛賣惡歸上免官琛母老仍停家琛及前西陽太守張牧並事司空竟陵王誕誕反遣客陸延稔齎書板琛及子弟官時孝武以琛素結事誕或有異志遣信就吳郡太守王曇生誅琛父子會延稔先至琛等即執斬之遣二子送延稔首啓聞孝武所遣誅琛使其日亦至而獲免琛母孔氏時年百餘歲晉安帝隆安初琅邪王廞於吳中作亂以女為貞烈將軍悉以女人為官屬以孔氏為司馬及孫恩亂後東土飢荒人相食孔氏散家糧以振邑里得活者甚衆生子皆以孔為名焉琛仍為吳興太守明年坐郡人多翦錢及盜鑄免官歷位都官尚書廢帝即位為吳郡太守初琛景平中為朝請假還東日晚至方山于時商旅數十船悉泊岸側有一人玄衣介幘執鞭屏諸船云顧吳郡部伍尋至應泊此岸於是諸船各東西俄有一假裝至事力甚寡仍泊向處人問顧吳郡早晚至船人答無顧吳郡又問何船曰顧朝請耳莫不驚怪琛意竊知為善徵因誓之曰若得郡當於此立廟至是果為吳郡乃立廟方山號白馬廟云明帝泰始初與四方同反兵敗奉母奔會稽臺軍既至歸降後為員外常侍中散大夫卒次子寶先大明中為尚書水部郎先是琛為左丞荀萬秋所劾及寶先為郎萬秋猶在職自陳不拜孝武詔曰敕違糾慢憲司之職若有不公自當更有釐改而自頃劾無輕重輒致私絶此風難長主者嚴為其科先是宋世江東貴達者會稽孔季恭子靈符吳興丘深之及琛吳音不變深之字思玄吳興烏程人位侍中都官尚書卒於太常顧覬之字偉仁吳郡吳人也高祖謙字公讓晉平原內史陸機姊夫祖崇大司農父黃老司徒左西曹掾覬之為謝晦衛軍參軍晦愛其雅素深相知待歷位尚書都官郎殷劉隙著覬之不欲與殷景仁久接乃辭腳疾免歸每夜常於床上行腳家人竊異之而莫曉其意及義康徙廢朝廷多受禍覬之竟免後為山陰令山陰劇邑三萬戶前後官長晝夜不得休事猶不舉覬之御繁以約縣用無事晝日垂簾門階間寂自宋世為山陰務簡而事理莫能尚也後為尚書吏部郎嘗於文帝坐論江東人物言及顧榮袁淑謂覬之曰卿南人怯懦豈辦作賊覬之正色曰卿乃復以忠義笑人淑有愧色孝建中為湘州刺史以政績稱大明元年徵守度支尚書轉吏部尚書時沛郡相縣唐賜往比村彭家飲酒還因得病吐蠱二十餘物賜妻張從賜臨終言死後親刳腹五藏悉糜碎郡縣以張忍行刳剖賜子副又不禁止論妻傷夫五歲刑子不孝父母子棄市並非科例三公郎劉協議賜妻痛遵往言兒識謝及理考事原心非在忍害謂宜哀矜覬之議以妻子而行忍酷不宜曲通小情謂副為不孝張同不道詔如覬之議後為吳郡太守幸臣戴法興權傾人主而覬之未嘗低意左光祿大夫蔡興宗與覬之善嫌其風節過峻覬之曰辛毗有云孫劉不過使吾不為三公耳後卒於湘州刺史諡曰簡子覬之家門雍穆為州郡所重子綽私財甚豐鄉里士庶多負責覬之禁不能止及後為吳郡誘出文券一大悉令焚之宣語遠近皆不須還綽懊歎彌日覬之常執命有定分非智力所移唯應恭己守道信天任運而暗者不達妄意徼幸徒虧雅道無關得喪乃以其意命弟子願作定命論願字子恭父深之散騎侍郎願好學有才辭卒於太子舍人覬之孫憲之憲之字士思性尤清直宋元徽中為建康令時有盜牛者與本主爭牛各稱己物二家辭證等前後令莫能決憲之至覆其狀乃令解牛任其所去牛徑還本宅盜者始伏其罪時人號曰神明至於權要請托長吏貪殘據法直繩無所阿縱性又清儉強力為政甚得人和故都下飲酒者醇旨輒號為顧建康謂其清且美焉仕齊為衡陽內史先是郡境連歲疾疫死者太半棺槨尤貴悉裹以瞬席棄之路傍憲之下車分告屬縣求其親黨悉令殯葬其家人絶滅者憲之出公祿使紀綱營護之又土俗山人有病輒云先亡為禍皆開冢剖棺水洗枯骨名為除祟憲之曉喻為陳生死之別事不相由風俗遂改時刺史王奐初至唯衡陽獨無訟者乃歎曰顧衡陽之化至矣若九郡率然吾將何事後為東中郎長史行會稽郡事山陰人呂文度有寵於齊武帝於餘姚立邸頗縱橫憲之至郡即日除之文度後還葬郡縣爭赴弔憲之不與相聞文度甚銜之亦卒不能傷也時西陵戍主杜元懿以吳興歲儉會稽年登商旅往來倍歲西陵牛埭稅官格日三千五百求加至一倍計年長百萬浦陽南北津及柳浦四埭乞為官領攝一年格外長四百許萬武帝以示會稽使陳得失憲之議曰尋始立牛埭非苟通僦以納稅也當以風濤迅險人力不捷濟急以利物耳既公私是樂故輸直無怨京師航渡即其例也而後之監領各務己功或禁遏別道互生理外凡如此類不經埭煩牛者上詳被報蒙停格外十條從來喧訴始得暫弭案吳興頻歲失稔今茲尤饉去乏從豐良田飢棘舊格新減尚未議登格外加倍將以何術皇慈恤隱振釰蠲調而元懿幸災榷利重增困瘼人而不仁古今共疾且比見加格置市者前後相屬非唯新加無贏並皆舊格有闕愚恐元懿今啓亦當不殊若事不副言懼貽譴詰便百方侵苦為公賈怨其所欲舉腹心亦當獸而冠耳書云與其有聚斂之臣寧有盜臣言盜公為損蓋微斂人所害乃大也然掌斯任者應簡廉平則無害於人愚又以便宜者蓋謂便於公宜於人也竊見頃之言便宜者非能於人力之外用天分地者也率皆即日不宜於人方來未便於公名與實反有乖政體凡如此等誠宜深察山陰一縣課戶二萬其人資不滿三千者殆將居半刻又刻之猶且三分餘一凡有資者多是士人復除其貧極者悉皆露戶役人三五屬官蓋惟分定百端輸調又則常然比衆局檢校首尾尋續橫相質纍者亦復不少一人被攝十人相追一緒裁萌千孽互起蠶事弛而農業廢賤取庸而貴舉責應公贍私日不暇給欲無為非其可得乎死且不憚矧伊刑罰身且不愛何況妻子是以前檢未窮後巧復滋網辟徒峻猶不能悛竊尋人之多偽實由宋季軍旅繁興役賦殷重不堪勤劇奇巧所優積習生常遂迷忘反四海之大庶黎之衆心用參差難卒澄之化宜以漸不可疾責誠存不擾藏疾納汙務詳寬簡則稍自歸淳又被簡符前後纍千符旨既嚴不敢暗信縣簡送郡郡簡呈使殊形詭狀千變萬源聞者忽不經懷見者實足傷駭兼親屬里伍流離道路時轉窮涸事方未已其士人婦女彌難厝衷不簡則疑其有巧欲簡復未知所安愚謂此條宜委縣保舉其綱領略其毛目乃當有漏不出貯中庶嬰疾沉痼者重荷生造之恩也又永興諸暨離唐𧜛寇擾公私殘燼彌復特甚儻逢水旱實不易思俗諺云會稽打鼓送恤吳興步擔令史會稽舊稱沃壤今猶若此吳興本是塉土事在可知因循餘弊誠宜改張武帝並從之由是深以方直見知遷南中郎巴陵王長史南兗南豫二州事典籤咨事未嘗接以顏色動遵法制時司徒竟陵王於宣城臨成定陵三縣界立屯封山澤數百里禁人樵採憲之固陳不可言甚切直王曰非君無以聞此德音即命罷屯禁遷給事黃門兼尚書吏部郎中宋時其祖覬之嘗為吏部於庭列植嘉樹謂人曰吾為憲之植耳至是憲之果為此職永元中為豫章內史在任清簡務存寬惠有貞婦萬晞者少孀居無子事舅姑尤孝父母欲奪而嫁之誓死不許憲之賜以束帛表其節義梁武帝平建鄴為揚州牧徵憲之為別駕從事史比至而已受禪憲之風疾漸篤因求還吳就加太中大夫憲之雖纍經宰郡資無儋石及歸環堵不免飢寒天監八年卒於家臨終為制敕其子曰夫出生入死理均晝夜生既不知所從死亦安識所往延陵云精氣上歸于天骨肉下歸於地魂氣則無所不之良有以也雖復茫昧難徵要若非妄百年之期迅若馳隙吾今預為終制瞑目之後念並遵行勿違吾志也莊周淡臺達生者也王孫士安矯俗者也吾進不及達退無所矯常謂中都之制允理愜情衣周於身示不違禮棺周於衣足以蔽臭入棺之物一無所須載以輴車覆以粗布為使人勿惡也漢明帝天子之尊猶祭以杅水脯糗范史雲列士之高亦奠以寒水乾飯況吾卑庸之人其可不節衷也喪易寧戚自是親親之情禮奢寧儉差可得由吾意不須常施靈筵可止設香燈使致哀者有憑耳朔望祥忌可權安小牀暫施几席唯下素饌勿用牲牢蒸嘗之祠貴賤罔替備物難辦多致疏怠祠先自有舊典不可有闕自吾已下止用蔬食時果勿同於上世示令子孫四時不忘其親耳孔子云雖菜羹瓜祭必齋如者本貴誠敬豈求備物哉所著詩賦銘讚並衡陽郡記數十篇論曰古人云利令智昏甚矣利害之相傾也劉湛識用才能實包經國之略豈知移弟為臣則君臣之道用變兄成主則兄弟之義殊而執數懷姦苟相崇悅與夫推長戟而犯順何以異哉昔華元敗則以羊羹而取禍觀夫庾悅亦鵝炙以速尤乾餱以愆斯相類矣登之因禍而福倚伏無常仲文賄而為災乃徇財之過也顧琛吳郡徵兆於初筮覬之清白之迹見於暮年憲之蒞政所在稱美時移三代一德無虧求之古人未為易遇觀其遺命可謂有始有卒者矣
