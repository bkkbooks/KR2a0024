body:
  text: 南史卷三十六列傳第二十六羊欣羊玄保子戎兄子希沈演之子勃兄孫顗演之從子憲憲孫浚江夷子湛曾孫斆玄孫蒨祿五世孫紑六世孫總夷弟子智深江秉之孫謐羊欣字敬元泰山南城人也曾祖忱晉徐州刺史祖權黃門郎父不疑桂陽太守欣少靖默無競於人美言笑善容止泛覽經籍尤長隸書父不疑為烏程令欣年十二時王獻之為吳興太守甚知愛之欣嘗夏月著新絹裙晝寢獻之入縣見之書裙數幅而去欣書本工因此彌善起家輔國參軍府解還家隆安中朝廷漸亂欣優遊私門不復進仕會稽王世子元顯每使書扇常不奉命元顯怒乃以為其後軍府舍人此職本用寒人欣意貌恬然不以高卑見色論者稱焉嘗詣領軍謝混混拂席改服然後見之時混族子靈運在坐退告族兄瞻曰望蔡見羊欣遂改席易衣欣由此益知名桓玄輔政以欣為平西主簿參豫機要欣欲自疏時漏密事玄覺其此意愈更重之以為楚臺殿中郎謂曰尚書政事之本殿中禮樂所出卿昔處股肱方此為輕欣就職少日稱病自免屏居里巷十餘年義熙中弟徽被知於武帝帝謂咨議參軍鄭鮮之曰羊徽一時美器世論猶在兄後即板欣補右軍劉藩司馬後為新安太守在郡四年簡惠著稱除臨川王義慶輔國長史廬陵王義真車騎咨議參軍並不就文帝重以為新安太守在郡十三年樂其山水嘗謂子弟曰人生仕宦至二千石斯可矣及是便懷止足轉義興太守非其好也頃之稱病篤免歸除中散大夫素好黃老常手自書章有病不服藥飲符水而已兼善醫術撰藥方數十卷欣以不堪拜伏辭不朝覲自非尋省近親不妄行詣行必由城外未嘗入六門武帝文帝並恨不識之元嘉十九年卒弟徽字敬猷時譽多欣位河東太守卒羊玄保泰山南城人也祖楷晉尚書都官郎父綏中書侍郎玄保初為宋武帝鎮軍參軍少帝景平中纍遷司徒右長史府公王弘甚知重之謂左長史庾登之吏部尚書王準之曰卿二賢明美朗詣會悟多通然弘懿之望故當共推羊也頃之入為黃門侍郎善奕品第三文帝亦好奕與賭郡玄保戲勝以補宣城太守先是劉式之為宣城立吏人亡叛制一人不禽符伍里吏送州作部能禽者賞位二階玄保以為非宜陳之曰臣伏尋亡叛之由皆出於窮逼今立殊制於事為苦又尋此制施一邦而已若其是邪則應與天下為一若其非邪亦不宜獨行一郡由此制停歷丹陽尹會稽太守太常吳郡太守文帝以玄保廉素寡欲故頻授名郡為政雖無殊績而去後常必見思不營財利産業儉薄文帝嘗曰人仕宦非唯須才亦須運命每有好官缺我未嘗不先憶羊玄保元凶弒立以為吏部尚書領國子祭酒及孝武入伐朝士多南奔劭集羣僚橫刀怒曰卿等便可去矣衆並懼莫敢言玄保容色不異徐曰臣其以死奉朝劭為解孝武即位為金紫光祿大夫以謹敬見知大明五年加散騎常侍特進玄保自少至老謹於祭奠四時珍新未得祠薦者口不妄嘗卒諡曰定子子戎少有才氣而輕薄少行檢語好為雙聲江夏王義恭嘗設齋使戎布牀須臾王出以牀狹乃自開牀戎曰官家恨狹更廣八分王笑曰卿豈唯善雙聲乃辨士也文帝好與玄保嘗中使至玄保曰今日上何召我邪戎曰金溝清泚銅池搖揚既佳光景當得劇玄保常嫌其輕脫云此兒必亡我家位通直郎坐與王僧達謗時政賜死死後孝武帝引見玄保玄保謝曰臣無日磾之明以此上負上美其言戎二弟文帝並賜名曰咸曰粲謂玄保曰欲令卿二子有林下正始餘風玄保既善而何尚之亦雅好其事吳郡褚胤年七歲便入高品及長冠絶當時胤父榮期與臧質同逆胤應從誅何尚之固請曰胤奕之妙超古冠今魏犨犯令以材獲免父戮子宥其例甚多特乞與其微命使異術不絶不許時人痛惜之玄保兄子希字泰聞少有才氣為尚書左丞時揚州刺史西陽王子尚上言山湖之禁雖有舊科人俗相因替而不奉熂山封水保為家利自頃以來頽弛日甚富強者兼嶺而占貧弱者薪蘇無託至漁採之地亦又如茲斯實害人之深弊為政所宜去絶損益舊條更申制有司檢壬辰詔書占山護澤強盜律論贓一丈以上皆棄市希以壬辰之制其禁嚴刻事既難遵理與時弛而占山封水漸染復滋更相因仍便成先業一朝頓去易致嗟怨今更刊革立制五條凡是山澤先熂爈養種竹木雜果為林箟及陂湖江海魚梁鰌鮆場加功修作者聽不追奪官品第一第二聽占山三頃第三第四品二頃五十畝第五第六品二頃第七第八品一頃五十畝第九品及百姓一頃皆依定格條上資簿若先已占山不得更占先占闕少依限占足若非前條舊業一不得禁有犯者水土一尺以上並計贓依常盜律論停除咸康二年壬辰之科從之時益州刺史劉瑀先為右衛將軍與府司馬何季穆共事不平季穆為尚書令建平王宏所親待屢毀瑀於宏會瑀出為益州奪士人妻為妾宏使希舉察之瑀坐免官瑀恨希切齒有門生謝元伯往來希間瑀密令訪訊被免之由希曰此奏非我意瑀即日到宏門奉箋陳謝云聞之羊希希坐漏泄免官泰始三年為寧朔將軍廣州刺史四年希以沛郡劉思道行晉康太守領軍伐俚思道違節失利希遣收之思道不受命率所領襲州希踰城走思道獲而殺之希子崇字伯遠尚書主客郎丁母憂哀毀過禮及聞廣州亂即日便徒跣出新亭不能步涉頓伏江渚門義以小船致之父葬畢乃不勝哀而卒沈演之字臺真吳興武康人也高祖充晉車騎將軍吳國內史曾祖徑冠軍陳祐長史戍金墉為燕將慕容恪所陷不屈見殺贈東陽太守祖赤黔廷尉卿父叔任少有幹質朱齡石伐蜀為齡石建威府司馬平蜀之功亞於元帥以功封寧新縣男後拜益州刺史卒演之年十一尚書僕射劉柳見而知之曰此童終為令器沈氏家世為將而演之折節好學讀老子百遍以義理業尚知名襲父別爵吉陽縣五等侯舉秀才為嘉興令有能名元嘉中纍遷尚書吏部郎先是劉湛劉斌等結黨欲排廢尚書僕射殷景仁演之雅仗正義與景仁素善盡心朝廷文帝甚嘉之及彭城王義康出蕃誅劉湛等以演之為右衛將軍景仁尋卒乃以後軍長史范曄為左衛將軍與演之對掌禁旅同參機密尋加侍中文帝謂之曰侍中領衛望實優顯此蓋宰相便坐卿其勉之上欲伐林邑朝臣多不同唯廣州刺史陸徽與演之贊成上意及林邑平賜羣臣黃金生口銅器等物演之所得偏多上謂曰廟堂之謀卿參其力平此遠夷未足多建茅土俟廓清舊都鳴鸞東岱不憂河山之不開也二十一年詔以演之為中領軍太子詹事范曄懷逆謀演之覺其有異言之文帝曄尋伏誅歷位吏部尚書領太子右衛率素有心氣寢病歷年上使臥疾理事性好舉才申濟屈滯而謙約自持上賜女伎不受暴卒文帝痛惜贈金紫光祿大夫諡曰貞子睦位黃門侍郎與弟西陽王文學勃忿鬩坐徙始興郡勃輕薄好利位太子右衛率加給事中坐贓賄徙梁州後還結事阮佃夫王道隆等位司徒左長史為後廢帝所誅演之兄子坦之仕齊位都官郎坦之子顗顗字處默幼清靜有至行慕黃叔度徐孺子之為人讀書不為章句著述不尚浮華常獨處一室人罕見其面從叔勃貴顯每還吳興賓客填咽顗不至其門勃就之顗送迎不越閫勃歎曰吾乃今知貴不如賤也顗內行甚修事母兄孝友兄昂一名顒亦退素以家貧仕為始安令兄弟不能分離相隨之任齊永明年中徵拜著作郎太子舍人通直郎並不起文惠太子嘗擬古詩云磊磊落落玉山崩顗聞之曰此讖言也既而太子薨至秋武帝崩鬱林海陵相次黜辱顗素不事家産及昂卒逢齊末兵荒與家人並日而食或有饋其粱肉者閉門不受唯採蓴荇根供食以樵採自資怡怡然不改其樂梁天監四年大舉北侵南陽樂藏為武康令以顗從役到建鄴揚州別駕陸任以書與吳興太守柳惲責之不能甄善別賢惲大慚即表停之卒家所著文章數十篇憲字彥璋演之從祖弟子也祖説道巴西梓潼二郡太守父璞之北中郎行參軍憲少有幹局為駕部郎宋明帝與憲謂曰卿廣州刺史材也補烏程令甚著政績太守褚彥回歎美以為方圓可施少府管掌煩冗材幹者並更其職憲以吏能纍遷少府卿武陵王曄為會稽以憲為左軍司馬齊高帝以山陰戶衆欲分為兩縣武帝啓曰縣豈不可御但用不得人耳乃以憲帶山陰令政聲大著孔圭請假東歸謂人曰沈令料事特有天才後為晉安王後軍長史廣陵太守西陽王子明代為南兗州憲仍留為冠軍長史太守如故永明八年子明典籤劉道濟贓私百萬為有司所奏賜死憲坐不糾免官後除散騎常侍未拜卒當時稱為良吏憲同郡丘仲起先是為晉平郡清廉自立褚彥回歎曰目見可欲心能不亂此楊公所以遺子孫也仲起字子震位至廷尉卒憲孫浚字叔源少涉學有才幹仕梁歷山陰吳建康三縣並有能名太清二年纍遷御史中丞時臺城為侯景所圍外援並至景表請和求解圍還江北詔許之遣右衛將軍柳津對景盟歃景知城內疾疫稍無守備因緩去期城內知其背盟復舉烽鼓譟後數日景復進表請和簡文使浚往景所景曰即日向熱非復行時政欲立效求停君可見為申聞浚曰大將軍此意意在得城下風所聞久已乏食城內雖困尚有兵糧朝廷恐和好乖二已密敕外軍若臺城傾覆勿以二宮為念當以死雪恥若不能決戰當深壁自守大將軍十萬之衆將欲何資景橫刀於膝瞋目叱之浚乃正色責景曰河南王人臣而舉兵向闕今朝廷已赦王罪結盟口血未乾而復翻背沈浚六十之年且天子使也奉命而行何用見脅徑去不顧景歎曰是真司直也然密銜之又勸張嵊立義後得殺之江夷字茂遠濟陽考城人也祖霦晉護軍將軍父敳驃騎咨議參軍夷少自藻厲為後進之美宋武帝板為鎮軍行參軍豫討桓玄功封南郡州陵縣五等侯纍遷大司馬武帝命大司馬府琅邪國事一以委焉武帝受命歷位吏部尚書吳郡太守營陽王於吳縣見害夷臨哭盡禮以兄疾去官後為右僕射夷美風儀善舉止歷任以和簡著稱出為湘州刺史加散騎常侍未之職卒遺令薄斂蔬奠務存儉約子湛湛字徽深居喪以孝聞愛文義善彈鼓琴兼明算術為彭城王義康司徒主簿之盛人競求自昵唯湛自疏固求外出乃以為武陵內史隨王誕為北中郎將南徐州刺史以湛為長史南東海太守委以政事元嘉二十五年徵為侍中任以機密遷左衛將軍時改選學職以太尉江夏王義恭領國子祭酒湛領博士轉吏部尚書家甚貧不營財利餉饋盈門一無所受無兼衣餘食嘗為上所召遇浣衣稱疾經日衣成然後起牛餓御人求草湛良久曰可與飲在選職頗有刻核之譏而公平無私不受請謁論者以此稱焉初上大舉北侵舉朝謂為不可唯湛贊成之及魏太武至瓜步以湛兼領軍軍事處分一以委焉魏遣使求昏上召太子劭以下集議衆並謂宜許湛謂許之無益劭怒謂湛曰今三王在厄詎宜苟執異議聲色甚厲坐散俱出劭使班劍及左右推排之殆於傾倒劭後宴集未嘗命湛上乃為劭長子偉之娉湛第三女欲以和之上將廢劭使湛具詔草劭之入弒湛直上省聞叫乃匿傍小屋劭遣求之舍吏紿云不在此兵即殺舍吏乃得見湛湛據窗受害意色不橈五子恁恕憼遜法壽皆見殺初湛家數見怪異未敗少日所眠牀忽有數斗血孝武即位追贈左光祿大夫開府儀同三司諡曰忠簡公恁位著作佐郎恁子斆斆字叔文母宋文帝女淮陽長公主幼以戚屬召見孝武謂謝莊曰此小兒方當為名器少有美譽尚孝武女臨汝公主拜駙馬都尉為丹陽丞時袁粲為尹見斆歎曰風流不墜政在江郎數與宴賞留連日夜遷中書郎斆庶祖母王氏老疾斆視膳嘗藥七十餘日不解衣及纍居內官每以侍養陳請朝廷優其朝直初湛娶褚秀之女大義不終褚彥回為衛軍重斆為人先通意引為長史隨府轉司空長史領臨淮太守轉齊高帝太尉從事中郎齊臺建為吏部郎高帝即位斆以祖母久疾啓求自解初宋明帝敕斆出繼其叔遜為從祖淳後於是僕射王儉啓禮無後小宗之文近代緣情皆由父祖之命未有既孤之後出繼宗族也雖復臣子一揆而義非天屬江忠簡胤嗣所寄唯斆一人傍無期屬斆宜還本若不欲江遜絶後可以斆小兒繼遜為孫尚書參議謂間世立後禮無其文荀顗無子立孫墜禮之始何琦又立此論義無所據於是斆還本家詔使自量立後者出為豫章內史還除太子中庶子未拜門客通贓利武帝遣信檢覆斆藏此客而躬自引咎上甚有怪色王儉從容啓上曰江斆若能臨郡此便是具美耳上意乃釋永明中為竟陵王司馬斆好文辭圍第五品為朝貴中最遷侍中歷五兵尚書東海吳二郡太守復為侍中轉都官尚書領驍騎將軍王晏啓武帝曰江斆今重登禮閣兼掌六軍慈渥所覃實有優忝但語其事任殆同間輩天旨既欲升其名位愚謂以侍中領驍騎望實清顯有殊納言上曰斆常啓吾為其鼻中惡今既以何胤王瑩還門下故有此回換耳先是中書舍人紀僧真幸於武帝稍歷軍校容表有士風謂帝曰臣小人出自本縣武吏邀逢聖時階榮至此為兒昏得荀昭光女即時無復所須唯就陛下乞作士大夫帝曰由江斆謝糟我不得措此意可自詣之僧真承旨詣斆登榻坐定斆便命左右曰移吾牀讓客僧真喪氣而退告武帝曰士大夫故非天子所命時人重斆風格不為權幸降意隆昌元年為侍中領國子祭酒鬱林廢朝臣皆被召入宮斆至雲龍門方知廢立託散動醉吐車中而去明帝即位改領祕書監又改領晉安王師卒遺令不受賻贈詔賻錢三萬布百匹子蒨啓遵斆命不受詔嘉美之從其所請贈散騎常侍太常卿諡曰敬子子蒨蒨字彥標幼聰警讀書過口便誦選為國子生舉高第起家祕書郎纍遷廬陵王主簿居父憂以孝聞廬于墓側明帝敕遣齋仗二十人防之墓所服闋纍遷建安內史梁武帝起兵遣寧朔將軍劉諓之為郡蒨拒之及建鄴平蒨坐禁錮俄被原歷太尉臨川王長史尚書吏部郎領右軍方雅有風格僕射徐勉權重唯蒨及王規與抗禮不為之屈勉因蒨門客翟景為子繇求昏於蒨女不答景再言之乃杖景四十由此與勉忤勉又為子求蒨弟葺及王泰女二人並拒之葺為吏部郎坐杖曹中幹免官泰以疾假出宅乃遷散騎常侍皆勉意也初天監六年詔以侍中常侍並侍帷幄分門下二局入集書其官品視侍中而非華胄所悅故勉斥泰為之蒨尋遷司徒左長史初王泰出閣武帝謂勉云江蒨資歷應居選部勉曰蒨有眼患又不悉人物乃止遷光祿大夫卒諡肅蒨好學尤悉朝儀故事撰江左遺典三十卷未就卒文集十五卷蒨弟曇字彥德少學涉有器度位侍中太子詹事承聖初卒曇弟祿祿字彥遐幼篤學有文章工書善琴形貌短小神明俊發位太子洗馬湘東王録事參軍以氣陵府王王深憾焉廬陵威王續代為荊州留為驃騎咨議參軍獻書告別王答書乃致恨祿先為武寧郡頗有資産積錢於壁壁為之倒迮銅物皆鳴人戲之曰所謂銅山西傾洛鐘東應者也湘東王恨之既深以其名祿改字曰榮財以志其忿後為作唐侯相卒撰列仙傳十卷行於世及井潔臯木人賦敗船詠並以自喻子徽亦有文采而清狂不慧常以父為戲蒨子紑紑字含潔幼有孝性年十三父蒨患眼紑侍疾將期月衣不解帶夜夢一僧云患眼者飲慧眼水必差及覺説之莫能解者紑第三叔祿與草堂寺智者法師善往訪之智者曰無量壽經云慧眼見真能度彼岸蒨乃因智者啓捨同夏縣界牛屯里舍為寺乞賜嘉名敕答云純臣孝子往往感應晉時顏含遂見冥中送藥又近見智者以卿第二息夢云飲慧眼水慧眼則五眼之一號可以慧眼為名及就創造泄故井井水清洌異於泉依夢取水洗眼及煮藥稍覺有瘳因此遂差時人謂之孝感南康王為徐州召為迎主簿紑性沈靜好莊老玄言尤善佛義不樂進仕及父卒紑廬于墓終日號慟不絶聲月餘乃卒子總總字總持七歲而孤依于外氏幼聰敏有至性元舅吳平侯蕭勱名重當世特所鍾愛謂曰爾神采英拔後之知名當出吾右及長篤學有文辭仕梁為尚書殿中郎武帝撰正言始畢製述懷詩總預同此作帝覽總詩深見嗟賞轉侍郎尚書僕射范陽張纘度支尚書琅邪王筠都官尚書南陽劉之遴並高才碩學總時年少有名纘等雅相推重為忘年友會之遴嘗酬總詩深相欽挹纍遷太子中舍人侯景寇建鄴詔以總權兼太常卿守小廟臺城陷避難會稽郡憩於龍華寺乃製修心賦總第九舅蕭勃先據廣州又自會稽往依焉及元帝平侯景徵為始興內史會魏剋江陵不行自此流寓嶺南積歲陳天嘉四年以中書侍郎徵還纍遷左戶尚書轉太子詹事總性寬和溫裕尤工五言七言溺於浮靡及為宮端與太子為長夜之飲養良娣陳氏為女太子亟微行遊總家宣帝怒免之後又歷侍中左戶尚書後主即位歷吏部尚書僕射尚書令加扶既當權任宰不持政務但日與後主遊宴後庭多為豔詩好事者相傳諷玩于今不絶唯與陳暄孔範王瑳等十餘人當時謂之狎客由是國政日頽綱紀不立有言之者輒以罪斥之君臣昏亂以至于滅禎明三年陳亡入隋拜上開府開皇十四年卒於江都年七十六其為自序云太建之時權移羣小諂嫉作威屢被摧黜奈何命也識者譏其言迹之乖有文集三十卷長子溢頗有文辭性誕驕物雖近屬故友不免詆欺歷中書黃門侍郎太子中庶子入隋為秦王文學卒江智深夷之弟子也父僧安宋太子中庶子夷有盛名夷子湛又有清譽父子並貴達智深父少無名問湛禮敬甚簡智深常以為恨自非節歲不入湛門及為隨王誕後軍參軍在襄陽誕待之甚厚時咨議參軍謝莊主簿沈懷文與智深友善懷文每稱曰人所應有盡有所應無盡無者其江智深乎元嘉末除尚書庫部郎時高流官序不為臺郎智深門孤援寡獨有此選意甚不悅固辭不拜後為竟陵王誕司空主簿記室參軍領南濮陽太守遷從事中郎誕將為逆智深悟其機請假先反誕事發即除中書侍郎智深愛好文雅辭采清贍孝武深相知待恩禮冠朝上宴私甚數多命羣臣五三人遊集智深常為其首同侶未及前輒獨蒙引進每以越衆為慚未嘗有喜色每從遊幸與羣僚相隨見傳詔馳來知當呼己聳動愧恧形於容貌論者以此多之遷驍騎將軍尚書吏部郎上每酣宴輒詆羣臣並使自相嘲訐以為歡笑智深素方退漸不會旨上嘗使以王僧朗戲其子景文智深正色曰恐不宜有此戲上怒曰江僧安癡人癡人自相惜智深伏席流涕由此恩寵大衰出為新安王子鸞北中郎長史南東海太守行南徐州事初上寵姬宣貴妃殷氏卒使羣臣議諡智深上議曰懷上以不盡嘉號甚銜之後車駕幸南山乘馬至殷氏墓羣臣皆騎從上以馬鞭指墓石柱謂智深曰此柱上不容有懷字智深益惶懼以憂卒子筠太子洗馬早卒後廢帝皇后筠之女也廢帝即位以后父追贈金紫光祿大夫筠妻王平望鄉君智深兄子概早孤智深養之如子概歷黃門吏部郎侍中武陵王贊北中郎長史江秉之字玄叔濟陽考城人也祖逌晉太常父纂給事中秉之少孤弟妹七人並幼撫育姻娶盡其心力宋少帝時為永世烏程令以善政著名東土徵為建康令為政嚴察部下肅然後為山陰令人戶三萬政事繁擾訟訴殷積階庭常數百人秉之御繁以簡常得無事宋世唯顧覬之亦以省務著績其餘雖復刑政修理而未能簡事以在縣有能出補新安太守元嘉十二年轉在臨海並以簡約見稱卒於官所得秩悉散之親故妻子常飢寒人有勸其營田秉之正色答曰食祿之家豈可與農人競利在郡作書案一枚去官留以付庫秉之宗人邃之字玄遠頗有文義撰文釋傳於世位司徒記室參軍秉之子徽尚書都官郎吳令元凶殺徐湛之徽以黨與見誅子謐謐字令和父徽遇禍謐繫尚方宋孝武平建鄴乃得出為于湖令強濟稱職宋明帝為兗州謐傾身奉事為帝所待即位以為驃騎參軍弟蒙貌醜帝常召見狎侮之謐再遷右丞兼比部朗泰始四年江夏王義恭第十五女卒年十九未笄禮官議從成人服諸王服大功左丞孫敻重奏禮記女子十五而笄鄭玄云應年許嫁者也其未許嫁者則二十而笄射慈云十九猶為殤禮官違越經典於理無據太常以下結免贖論謐坐杖督五十奪勞百日謐又奏敻先不研辨混同謬議準以事例亦宜及咎敻又結免贖論詔可出為建平王景素冠軍長史長沙內史行湘州事政教苛刻僧遵道又與謐情款隨謐蒞郡犯小事餓繫郡獄僧遵道裂三衣食之盡而死為有司奏徵還明帝崩遇赦免齊高帝領南兗州謐為鎮軍長史廣陵太守入為遊擊將軍性流俗善趨時利元徽末朝野咸屬意建平王景素謐深自委結景素事敗僅得免禍蒼梧王廢後物情尚懷疑二謐獨竭誠歸事齊高帝升明元年為黃門侍郎領尚書左丞沈攸之事起議加高帝黃鉞謐所建也事寧遷吏部郎齊建元元年位侍中既而驃騎豫章王嶷領湘州以謐為長史封永新縣伯三年為左戶尚書諸皇子出閣用文武主帥悉以委謐尋敕選曰江謐寒士誠當不得競等華儕然甚有才幹可遷掌吏部謐才長刀筆所在幹職高帝崩謐稱疾不入衆頗疑其怨不預顧命武帝即位謐又不遷官以此怨望時武帝不豫謐詣豫章王嶷請間曰至尊非起疾東宮又非才公今欲何計武帝知之出謐為鎮北長史南東海太守未發憂甚乃以奕占卦云有客南來金碗玉杯上使御史中丞沈沖奏謐前後罪惡請收送廷尉詔賜死果以金罌盛藥鴆之子介建武中為吳令政亦深苛人間榜死人髑髏為謐首介棄官而去論曰敬元夷簡歸譽玄保弘懿見推其取重於世豈虛名也然玄保時隆帝念雖命稟於玄天迹其恩寵蓋亦猶賢之助沈氏世傳武節而演之以業尚見知綢繆帷幄遂參機務處默保間篤素叔源節見臨危懿德高風所謂世有人矣茂遠自晉及陳雅道相係奕世載德斯之謂焉而總溺於寵狎反以文雅為敗然則士之成名所貴彬彬而已玄叔清介著美足以追蹤古烈令和窺覘成性終取躓於險塗宜矣
