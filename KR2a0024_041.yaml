body:
  text: 南史卷四十一列傳第三十一齊宗室衡陽元王道度始安貞王道生始安王遙光曲江公遙欣子幾安陸昭王緬新吳侯景先南豐伯赤斧子穎冑穎達衡陽公諶臨汝侯坦之衡陽元王道度齊高帝長兄也始與高帝俱受學于雷次宗宣帝問次宗二子學業次宗答曰其兄外朗其弟內潤皆良璞也仕宋位安定太守卒齊建元元年高帝追加封諡無子高帝以第十一子鈞繼鈞字宣禮年五歲所生區貴人病便加慘悴左右依常以五色飴之不肯食曰須待姨差年七歲出繼衡陽元王見高帝未拜便涕泗橫流高帝執其手曰伯叔父猶父勿怨所以令汝出繼以汝有意堪奉蒸嘗故耳即敕外如先給通幰車雉尾扇等事事依正王區貴人卒居喪盡禮服闋當問訊武帝羸骨立登車三上不能升乃止典籤曹道人具以聞武帝即幸鈞邸見之愴然還謂褚蓁曰昨見衡陽猶奇毀損卿可數相撫悅先是貴人以華釵子幷翦刻錦繡中倒炬鳳皇蓮芰星月之屬賜鈞以為玩弄貴人亡後每歲時及朔望輒開視再拜鯁咽見者皆為之悲性好學善屬文與琅邪王智深以文章相會濟陽江淹亦遊焉武帝謂王儉曰衡陽王須文學當使華實相稱不得止取貴游子弟而已乃以太子舍人蕭敷為文學鈞常手自細書寫五經部為一卷置于巾箱中以備遺忘侍讀賀玠問曰殿下家自有墳素復何須蠅頭細書別藏巾箱中答曰巾箱中有五經於檢閱既易且一更手寫則永不忘諸王聞而爭効為巾箱五經巾箱五經自此始也居身清率言未嘗及時事會稽孔珪家起園列植桐柳多構山泉殆窮真趣鈞往遊之珪曰殿下處朱門遊紫闥詎得與山人交邪答曰身處朱門而情遊江海形入紫闥而意在青雲珪大美之吳郡張融清抗絕俗雖王公貴人視之如也唯雅重鈞謂從兄緒曰衡陽王飄飄有凌雲氣其風情素韻彌足可懷融與之遊不知老之將至見賞如此歷位祕書監延興元年為明帝所殺明帝立以永陽王子珉仍本國繼元王為孫子珉字雲璵武帝第二十子也初封義安郡王後改永陽永泰元年見害復以武陵昭王曄子子坦奉元王後始安貞王道生字孝伯高帝次兄也仕宋位奉朝請卒高帝即位追加封諡三子長鳳次鸞是為明帝次是為安陸昭王鳳字景慈仕宋位正員郎卒高帝即位諡靖世子建武元年明帝追尊道生為景皇妃江氏為后立寢廟於御道西陵曰脩安追封鳳始安靖王改華林鳳莊門為望賢門太極東堂畫鳳鳥題為神鳥而改鸞鳥為神雀子遙光嗣始安王遙光字元暉生而躄疾高帝謂不堪奉拜祭祀欲封其弟武帝諫乃以遙光襲爵位中書郎明帝輔政誅賞諸事唯與遙光共謀議勸明帝併殺高武諸子弟見從建武元年為揚州刺史三年進號撫軍將軍好吏事頗多慘害足疾不得同朝列常乘輿自望賢門入每與明帝久清閑言畢帝索香火明日必有所誅太子不悅學唯曼遊是好朝議令蔡仲熊為太子講禮未半遙光從容曰文義之事此是士大夫以為伎藝欲求官耳皇太子何用講為上以為然乃停講永泰元年即本號為大將軍給油絡車帝不豫遙光數入侍疾帝疾漸甚河東王鉉等十王一夕見殺遙光意也帝崩遺詔加遙光侍中中書令給扶永元元年給班劍二十人即本號開府儀同三司遙光多忌人有餉履者以為戲己大被嫌責劉繪嘗為牋云智不及葵亦以忤旨既輔東昏潛結江祏兄弟謀自樹立弟遙欣在荊楚擁兵居上流密相影響遙光當據東府號令使遙欣急下潛謀將發而遙欣病死江祏被誅東昏召遙光入殿告以祏罪遙光懼還省便陽狂號哭自此稱疾不復入臺先是遙光行還入城風飄儀繖出城外遙光弟遙昌先卒壽春豫州部曲皆歸遙光及遙欣喪還葬武進停東府前渚荊州衆力送者甚盛東昏誅江祏後慮遙光不自安欲轉為司徒還第召入喻旨遙光慮見殺收集荊豫二州部曲於東府門衆頗怪其異莫知其指趣也遙光召親人丹陽丞劉渢及城局參軍劉晏中兵參軍曹樹生等幷諸傖楚欲以討劉暄為名夜遣數百人破東冶出囚尚方取仗又召驍騎將軍垣歷生歷生隨信至便勸遙光令率城內兵夜攻臺輦荻燒城門曰公但乘輿隨後反掌可得遙光意疑不敢出天稍曉遙光戎服至聽事停輿處分上仗登城行賞賜歷生復勸出軍遙光不肯望臺內自變及日出臺軍稍至於是戒嚴赦都下領軍蕭坦之屯湘宮寺鎮軍司馬曹武屯青溪大橋太子右率左興盛屯東府東籬門衆軍圍東城遙光遣垣歷生從西門出戰臺軍屢北殺軍主桑天愛初遙光問諮議參軍蕭暢暢正色拒不從既而暢與撫軍長史沈昭略奔臺人情大沮又垣歷生從南門出戰為曹武所禽謂武曰卿以主上為聖明梅茹為賢相者則我當死且我今死卿明亦死遂殺之遙光聞歷生見獲大怒於牀上自竦踊使殺歷生兒其晚臺軍射火箭燒東北角樓至夜城潰遙光還小齋令人反拒左右並踰屋出臺軍主劉國寶時當伯等先入遙光聞外兵至吹滅火扶匐下牀軍人排閤入斬之遙光舉事四日而卒舉事之夕月蝕識者以月為大臣蝕而既必滅之道未敗之夕城內皆夢羣蛇緣城四出各共說之咸以為異臺軍入城焚屋宇且盡遙光幼時甚貞正明帝傾意待之東昏為兒童時明帝使與遙光共齋居止呼遙光為安兄恩情甚至及遙光誅後東昏登舊宮土山望東府愴然呼曰安兄乃嗚咽左右不忍視見思如此天下知名之士劉渢渢弟溓陸閑閑子絳司馬端崔慶遠皆坐誅曲江公遙欣字重暉始安王遙光弟也宣帝兄西平太守奉之無後以遙欣繼為曾孫遙欣髫齔中便嶷然明帝謂江祏曰遙欣雖幼觀其神采殊有局幹必成令器未知年命何如耳安陸昭王曰不患其兄弟不富貴但恐不及見耳言之慘然而悲始年七歲出齋時有一左右小兒善彈飛鳥無不應弦墜落遙欣謂曰凡戲多端何急彈此鳥自空中翔飛何關人事無趣殺此生亦復不急左右感其言遂不復彈鳥時少年通好此事所在遂止年十五六便博覽經史弱冠拜中書郎明帝入輔遙欣與始安王遙光等參預政事凡所談薦皆得其人由是朝野輻湊軒蓋盈門延興元年明帝以遙欣為兗州刺史時豐城公遙昌亦出鎮壽春帝於便殿密宴始安王遙光亦在座帝慘然謂遙欣曰昭王云不患汝兄弟不富貴而言不及見如何因悲慟不自勝君臣皆嗚咽侍者雨淚及泊歐陽岸忽謂左右曰比何都不見彈左右云有門生因彈見勗遂以此廢所在皆止遙欣笑曰我小兒時聊復語耳那復遂斷邪建武元年進號西中郎將封聞喜縣公遷荊州刺史加都督改封曲江公明帝子弟弱小晉安王寶義有廢疾故以遙光為揚州居中遙欣居陝西在外威權幷在其門遙欣好勇聚畜武士以為形援永泰元年詔遙欣以本官領雍州刺史寧蠻校尉移州鎮襄陽魏軍退不行卒贈司空諡康公葬用王禮子幾字德玄年十歲便能屬文早孤有弟九人並幼幾恩愛篤睦聞於朝廷性溫和與物無競清貧自立好學善草隸書湘州刺史楊公則曲江公故吏也每見幾謂人曰康公此子可謂桓靈寶重出及公則卒幾為之誄時年十五沈約見而奇之謂其舅蔡撙曰昨見賢甥楊平南誄文不減希逸之作始驗康公積善之慶位中書侍郎尚書左丞末年專尚釋教為新安太守郡多山水特其所好適性遊履遂為之記卒于官子清亦有文才位永康令遙欣弟遙昌字季暉建武元年封豐城縣公位豫州刺史卒諡憲公安陸昭王字景業善容止仕宋位中書郎建元元年封安陸侯為五兵尚書出為吳郡太守政有能名竟陵王子良與之書曰竊承下風數十年來姑蘇未有此政武帝嘉其能累遷寧蠻校尉雍州刺史加都督留心辭訟人人呼至案前親自顧問有不得理者勉喻之退皆無恨為百姓所畏愛及卒喪還百姓緣沔水悲泣設祭於峴山為立祠諡曰昭侯明帝少相友愛時為僕射領衞尉表求解職私第展哀詔不許每臨靈輒慟絕哭不成聲建武元年贈司徒安陸王子寶晊嗣永元元年改封湘東王東昏廢寶晊望物情歸己坐待法駕既而城內送款于梁武帝宣德太后臨朝拜太常不自安謀反及弟江陵公寶覽霄城公寶宏皆伏誅新吳侯景先高帝從子也祖爰之員外郎父敬宗始興王國中軍景先少孤有至性隨母孔氏為舅氏鞠養高帝嘉之常相提攜及鎮淮陰以景先領軍主自隨防衞城內委以心腹武帝為廣興郡啟高帝求景先同行除武帝寧朔府司馬自此常相隨逐建元元年為太子左衞率封新吳縣伯甚見委任勢傾天下景先本名道先乃改為景先以避上諱初武帝少年與景先共車行泥路車久故壞至領軍府西門車轅折俱狼狽景先謂帝曰兩人脫作領軍亦不得忘今日艱辛及武帝踐阼詔以景先為兼領軍將軍拜日羽儀甚盛傾朝觀矚拜還未至府門中詔相聞領軍今日故當無折轅事邪景先奉謝景先事上盡心故恩寵特密初西還上坐景陽樓召景先語故舊唯豫章王一人在席而已轉中領軍車駕射雉郊外景先常甲仗從廉察左右尋進爵為侯始昇明中沈攸之於荊州舉兵武帝時鎮江州盆城景先夜乘城忽聞塹中有小兒呼蕭丹陽未測何人聲聲不絕試問誰空中應云賊尋當平何事嚴防語訖不復言即窮討之了不見明旦以白帝帝曰攸之自無所至焉知汝後不作丹陽尹景先曰寧有作理尋而攸之首至及永明三年詔以景先為丹陽尹謂曰此授欲驗往年盆城塹空中言耳後假節司州諸軍事卒諡曰忠侯子毅位北中郎司馬性奢豪好弓馬為明帝所疑忌王晏事敗並陷誅之南豐伯赤斧高帝從祖弟也祖隆子衞軍錄事參軍父始之冠軍中兵參軍赤斧以和謹為高帝所知高帝輔政為黃門侍郎淮陵太守順帝遜位于丹陽故所立宮上令赤斧輔送至因留防衞薨乃還後為雍州刺史在州不營產利勤於奉公遷散騎常侍左衞將軍武帝親遇與蕭景先相比封南豐縣伯遷給事中太子詹事卒家貧無絹為衾武帝聞之愈加惋惜諡懿伯子穎冑襲爵穎冑字雲長弘厚有父風起家祕書郎高帝謂赤斧曰穎冑輕朱被身覺其趨進轉美足慰人意遷太子舍人遭父喪感脚疾數年然後能行武帝有詔慰勉之賜以醫藥除竟陵王司徒外兵參軍晉熙王文學穎冑好文義弟穎基好武勇武帝登烽火樓詔羣臣賦詩穎冑詩合旨上謂穎冑曰卿文弟武宗室便不乏才上以穎冑勳戚子弟自中書郎除左軍將軍知殿內文武事得入便殿出為新安太守吏人懷之後除黃門郎領四廂直遷衞尉明帝廢立穎冑從容不為同異乃引穎冑預功建武二年進爵為侯賜以常所乘白日門牛明帝每存儉約欲鑄壞太官元日上壽銀酒鎗尚書令王晏等咸稱盛德穎冑曰朝廷盛禮莫過三元此一器既是舊物不足為侈帝不悅後預曲宴銀器滿席穎冑曰陛下前欲壞酒鎗恐宜移在此器也帝甚慚後為廬陵王後軍長史廣陵太守行南兗州府州事是年魏揚聲當飲馬長江帝懼敕穎冑移居人入城百姓驚恐席卷欲南度穎冑以魏軍尚遠不即施行魏軍亦尋退仍為南兗州刺史加都督和帝為荊州以穎冑為西中郎長史南郡太守行荊州府州事時江祏專執朝權此行由祏穎冑不平曰江公盪我輩出東昏侯誅戮羣公委任厮小崔陳敗後方鎮各懷異計永元二年十月尚書令臨湘侯蕭懿及弟衞尉暢見害先遣輔國將軍劉山陽就穎冑兵襲梁武帝帝時為雍州刺史將起兵慮穎冑不同遣穎冑親人王天武詣江陵聲云山陽西上幷襲荊雍書與穎冑勸同舉兵穎冑意猶未決初山陽出南州謂人曰朝廷以白虎幡追我亦不復還矣席捲妓妾盡室西行至巴陵遲回十餘日不進梁武帝復遣天武齎書與穎冑設奇略以疑之是時或云山陽謀殺穎冑以荊州同舉山陽至果不敢入城穎冑計無所出夜遣錢唐人朱景思呼西中郎城局參軍席闡文諮議參軍柳忱閉齋定議闡文曰蕭雍州畜養士馬非復一日江陵素畏襄陽人人衆又不敵取之不可必制制之歲寒復不為朝廷所容今若殺山陽與雍州舉事立天子以令諸侯霸業成矣山陽持疑不進是不信我今斬送天武則彼疑可釋至而圖之罔不濟矣忱亦勸焉穎冑乃斬天武以示山陽山陽大喜輕將步騎數百到州闡文勒兵斬之傳首于梁武東昏聞山陽死發詔討荊雍穎冑有器局既唱大事衆情歸之長沙寺僧鑄黃金為龍數千兩埋土中歷相傳付稱為下方黃鐵穎冑因取此龍以充軍實乃歎曰往年江祏斥我至今始知禍福之無門也十二月移檄建鄴三年正月和帝為相國穎冑為左長史進號鎮軍將軍於是始選用方伯梁武屢表勸和帝即尊號穎冑使別駕宗夬撰定禮儀上尊號改元於江陵立宗廟南北郊州府城門悉依建康宮置尚書五省以城南射堂為蘭臺南郡太守為尹建武中荊州大風雨龍入柏齋中柱壁上有爪足處刺史蕭遙欣恐畏不敢居之至是以為嘉福殿中興元年三月穎冑為侍中尚書令監八州軍事荊州刺史留衞西朝以弟穎達為冠軍將軍及楊公則等率師隨梁武圍郢城穎達會軍於漢口與王茂曹景宗等攻陷郢城梁武進漂州使與曹景宗破東昏將李居士又從下東城初梁武之起也巴東太守蕭惠訓子璝巴西太守魯休烈弗從舉兵侵荊州敗輔國將軍任漾之於峽口穎冑遣軍拒之而梁武已平江郢圍建康時穎冑輔帝主有安重之勢素能飲酒噉白肉膾至三斗自以職居上將不能拒制璝等憂愧發疾而卒州中祕之使似其書者假為教命時梁武圍建康住石頭和帝密詔報穎冑凶問亦祕不發喪及建康平蕭璝亦衆懼而潰和帝乃始發喪詔贈穎冑丞相前後部羽葆鼓吹班劍三十人轀輬車黃屋左纛梁天監元年追封巴東郡公喪還武帝車駕臨哭渚次葬依晉王導齊豫章王故事諡曰獻武弟穎達少好勇使氣穎冑齊建武末行荊州事穎達亦為西中郎外兵參軍俱在西府齊季多難頗不自安因與兄穎冑舉兵穎達弟穎孚自建鄴為廬陵人脩景智潛引與南歸穎孚緣山逾嶂僅免道中絕糧後因食過飽而卒建康平梁武帝以穎達為前將軍丹陽尹及受禪贈穎孚右衞將軍封穎達作唐侯位侍中衞尉卿出為豫章內史意甚憤憤未發前預華林宴酒後於座辭氣不悅沈約因勸酒欲以釋之穎達大罵約曰我今日形容正是汝老鼠所為何忽復勸我酒舉坐驚愕帝謂之曰汝是我家阿五沈公宿望何意輕脫若以法繩汝汝復何理穎達竟無一言唯大涕泣帝心愧之未幾遷江州刺史少時懸瓠歸化穎達長史沈瑀等苛刻為盜所害衆頗疑穎達或傳謀反帝遣直閤將軍張豹子稱江中討盜實使防之穎達知朝廷之意唯飲酒不知州事後卒於左衞將軍諡康侯子敏嗣位新安太守好射雉未嘗在郡辭訟者遷於畎焉後張弩損腰而卒第七子斅太清初為魏興太守梁州刺史宜豐侯循以為府長史梁州有古墓名曰尖冢或云張騫墳欲有發者輒聞鼓角與外相拒椎埋者懼而退斅謂無此理求自監督及開唯有銀鏤銅鏡方尺斅時居母服清談所貶衡陽公諶字彥孚高帝絕服族子也祖道清員外郎父仙伯桂陽國下軍宋元徽末武帝在郢欲知都下消息高帝遣諶就武帝宣傳謀計留為腹心昇明中為武帝中軍刑獄參軍南東莞太守以勞封安復縣男建元初武帝在東宮諶領宿衞高帝殺張景真武帝令諶啟乞景真命高帝不悅諶懼而退武帝即位除步兵校尉南蘭陵太守領御仗主齋內兵仗悉委付之心膂密事皆使參掌為左中郎將後軍將軍太守如故武帝臥疾延昌殿諶在左右宿直上崩遺敕諶領殿內事如舊鬱林即位深委信諶諶每請急出宿帝通夕不能寐諶還乃安轉衞軍司馬兼衞尉丁母憂敕還本位守衞尉明帝輔政諶回附明帝勸行廢立密召諸王典籤約語之不許諸王外接人物諶親要日久衆皆憚而從之鬱林被廢日初聞外有變猶密為手敕呼諶其見信如此諶性險無護身計及廢帝日領兵先入後宮齋內仗身素隸服諶莫有動者海陵立轉中領軍進爵為公甲仗五十人入直殿內月十日還府建武元年轉領軍將軍左將軍南徐州刺史給扶進爵衡陽郡公明帝初許事剋用諶為揚州及有此授諶恚曰見炊飯推以與人王晏聞之曰誰復為蕭諶作甌筯者諶恃勳重干豫朝政明帝新即位遣左右要人於外聽察具知諶言深相疑阻二年六月上幸華林園宴諶及尚書令晏等數人盡歡坐罷留諶晚出至華林閤仗身執還入省上遣左右莫智明數諶曰隆昌之際非卿無有今日今一門二州兄弟三封朝廷相報政可極此卿懷怨望乃云炊飯已熟合甑與人邪今賜卿死諶謂智明曰天去人亦復不遠我與至尊殺高武諸王是卿傳語來去我今死還取卿矣於省殺之至秋而智明死見諶為祟詔乃顯其過惡收付廷尉諶好左道吳興沈文猷相諶云相不減高帝諶喜曰感卿意無為人言也至是文猷伏誅諶兄誕字彥偉永明中為建康令與秣陵令司馬迪之同乘行車前導四卒左丞沈昭略奏凡有鹵簿官共乘不得兼列騶寺請免誕等官詔贖論延興元年歷徐司二州刺史明帝立封安復侯徵為左衞將軍上欲殺諶以誕在邊鎮拒魏故未及行魏軍退六旬諶誅遣梁武帝為司州別駕使誅誕誕子稜妻江淹女字才君聞誕死曰蕭氏皆盡妾何用生慟哭而絕諶弟誄字彥文與諶同豫廢立封西昌侯位太子左衞率誅諶之日輔國將軍蕭季敞啟求收誄深加排苦乃至手相摧辱誄徐曰已死之人何足至此君不憶相提拔時邪幽冥有知終當相報季敞粗猛無行善於彌縫高帝時為誄諶所奬說故累為郡守在政貪穢諶輒掩之後為廣州刺史白日見誄將兵入城收之少日果為西江都護周世雄所襲軍敗奔山中為蛭所嚙肉都盡而死慘楚備至後為村人所斬論者以為有天道焉臨汝侯坦之字君平高帝絕服族子也祖道濟太中大夫父欣祖武進令坦之與蕭諶同族為東宮直閤以勤直為文惠所知除給事中蘭陵令武帝崩坦之率太孫文武度上臺除射聲校尉令如故未拜除正員郎南魯郡太守少帝以坦之文惠舊人親信不離得入內見皇后帝於宮中及出後堂雜狡獪坦之皆得在側或遇醉後倮袒坦之輒扶持諫喻見帝不可奉乃改附明帝密為耳目隆昌元年追錄坦之父勳封臨汝縣男少帝微聞外有異謀憚明帝在臺內敕移西州後在華林園華光殿露著黃縠褌跂牀垂脚謂坦之曰人言鎮軍與王晏蕭諶欲共廢我似非虛傳蘭陵所聞云何坦之嘗作蘭陵令故稱之坦之曰天下寧當有此誰樂無事廢天子邪昔元徽獨在路上走三年人不敢近政坐枉殺孫超杜幼文等故敗耳官有何事一旦便欲廢立朝貴不容造此論政當是諸尼師母言耳豈可以尼姥言為信官若無事除此三人誰敢自保安陸諸王在外寧肯復還道剛之徒何能抗此帝曰蘭陵可好聽察作事莫在人後帝以為除諸執政應須當事人意在沈文季夜遣內左右密賂文季文季不受帝大怒謂坦之曰我賜文季不受豈有人臣拒天子賜坦之曰官遣誰送帝曰內左右坦之曰官若詔敕出賜令舍人主書送往文季寧敢不受政以事不方幅故仰遣耳帝又夜醉乘馬從西步廊向北馳走如此兩三將倒坦之諫不從執馬控帝運拳擊坦之不著倒地坦之與曹道剛扶抱還壽昌殿瑁牀上臥又欲起走坦之不能制坦之馳信報皇后至請譬良久乃眠時明帝謀廢殺既與蕭諶及坦之定謀少帝腹心直閤將軍曹道剛疑外間有異密有處分諶未能發始興內史蕭季敞南陽太守蕭穎基並應還都諶欲待二蕭至藉其威力以舉事明帝慮事變以告坦之坦之馳謂諶曰廢天子古來大事比聞曹道剛朱隆之等轉已猜疑衞尉明日若不就事無所復及弟有百歲母豈能坐聽禍敗政應作餘計耳諶惶遽明日遂廢帝坦之力也海陵即位除黃門郎兼衞尉建武元年遷左衞將軍進爵為侯東昏立為侍中領軍將軍永元元年母憂起復職加右將軍置府江祏兄弟欲立始安王遙光密告坦之坦之曰明帝取天下已非次第天下人至今不服今若復作此事恐四海瓦解我其不敢言及遙光起事遣人夜掩取坦之坦之科頭著褌踰牆走逢臺遊邏主顏端執之坦之謂曰始安作賊遣人見取向於宅奔走欲還臺耳君何見錄端不答而守防逾嚴坦之謂曰身是大臣夜半奔走君理見疑以為得罪朝廷若不信自可步往東府參視亦不答端至小街審知遙光舉事乃走還未至三十餘步下馬再拜曰今日乞垂將接坦之曰向語君何所道豈容相欺端以馬與坦之相隨去比至新亭道中收遙光所虜之餘得二百許人幷有粗仗乃進西掖門開鼓後得入殿內其夕四更主書馮元嗣叩北掖門告遙光反殿內為之備向曉召徐孝嗣入左衞將軍沈約五更初聞難馳車走趨西掖門或勸戎服約慮外軍已至若戎衣或者謂同遙光無以自明乃朱服而入臺內部分既立坦之假節督衆軍討遙光事平遷尚書左僕射丹陽尹右將軍如故進爵為公坦之肥黑無鬚語聲嘶時人號為蕭瘂剛佷專執羣小畏而憎之遙光事平二十餘日帝遣延明主帥黃文濟圍坦之宅誅之坦之從兄翼宗為海陵郡將發坦之謂文濟曰從兄海陵宅故應無他文濟曰海陵宅在何處坦之告之文濟曰政應得罪仍遣收之檢家赤貧唯有質錢帖子數百還以啟帝原其死和帝中興元年追贈坦之中軍將軍開府儀同三司論曰有齊宗室唯始安之後克昌明帝取之以非道遙光濟之以殘酷其卒至顛仆所謂亦以此終者也穎冑荊州之任蓋惟失職及其末途倚伏豈預圖之所致乎諶與坦之俱應顧託既以傾國亦以覆身各其宜矣
