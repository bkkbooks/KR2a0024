body:
  text: 南史卷七十六列傳第六十六隱逸下臧榮緒吳苞趙僧巖蔡薈孔嗣之徐伯珍婁幼瑜沈麟士阮孝緒鄧郁陶弘景釋寶誌諸葛璩劉慧斐兄慧鏡慧鏡子曇淨范元琰庾詵張孝秀庾承先馬樞臧榮緒東莞莒人也祖奉先建陵令父庸人國子助教榮緒幼孤躬自灌園以供祭祀母喪後乃著嫡寢論掃洒堂宇置筵席朔望輒拜薦焉甘珍未嘗先食純篤好學括東西晉為一書紀錄志傳百一十卷隱居京口教授齊高帝為揚州刺史徵榮緒為主簿不到建元中司徒褚彥回啟高帝稱述其美以置祕閣榮緒惇愛五經謂人曰昔呂尚奉丹書武王致齋降位李釋教誡並有禮敬之儀因甄明至道乃著拜五經序論常以宣尼庚子日生其日陳五經拜之自號披褐先生又以飲酒亂德言常為誡永明六年卒初榮緒與關康之俱隱在京口時號為二隱吳苞字天蓋一字懷德濮陽鄄城人也儒學善三禮及老莊宋泰始中過江聚徒教學冠黃葛巾竹麈尾蔬食二十餘年與劉瓛俱於褚彥回宅講授瓛講禮苞講論語孝經諸生朝聽瓛晚聽苞也齊隆昌元年徵為太學博士不就始安王遙光及江祏徐孝嗣共為立館於鍾山下教授朝士多到門焉當時稱其儒者自劉瓛以後聚徒講授唯苞一人而已以壽終時有趙僧巖蔡薈皆有景行慕苞為人僧巖北海人寥廓無常人不能測與劉善明友善明為青州欲舉為秀才大驚拂衣而去後忽為沙門栖遲山谷常以一壺自隨一旦謂弟子曰吾今夕當死壺中大錢一千以通九泉之路蠟燭一挺以照七尺之尸至夜而亡時人以為知命蔡薈字休明陳留人清抗不與俗人交李撝謂江斅曰古人稱安貧清白曰夷涅而不緇曰白至如蔡休明者可不謂之夷白乎又有魯國孔嗣之字敬伯宋時與齊高帝俱為中書舍人並非所好自廬江郡守去官隱居鍾山朝廷以為太中大夫卒徐伯珍字文楚東陽太末人也祖父並郡掾史伯珍少孤貧學書無紙常以竹箭箬葉甘蕉及地上學書山水暴出漂溺宅舍村鄰皆奔走伯珍累牀而坐誦書不輟叔父璠之與顏延之友善還祛蒙山立精舍講授伯珍往從學積十年究尋經史游學者多依之太守琅邪王曇生吳郡張淹並加禮辟伯珍應召便退如此者凡十二焉徵士沈儼造膝談論申以素交吳郡顧歡擿出尚書滯義伯珍詶答甚有條理儒者宗之好釋氏老莊兼明道術歲嘗旱伯珍筮之如期而雨舉動有禮過曲木之下趍而避之早喪妻晚不復重娶自比曾參宅南九里有高山班固謂之九巖山後漢龍丘萇隱處也山多龍鬚檉柏望之五采世呼為婦人巖二年伯珍移居之階戶之間木生皆連理門前生梓樹一年便合抱館東石壁夜忽有赤光洞照俄爾而滅白雀一雙棲其戶牖論者以為隱德之感焉刺史豫章王辟議曹從事不就家甚貧窶兄弟四人皆白首相對時人呼為四皓建武四年卒年八十四受業生凡千餘人伯珍同郡婁幼瑜字季玉亦聚徒教授不應徵辟彌為臨川王映所賞異著禮捃拾三十卷沈麟士字雲禎吳興武康人也祖膺期晉太中大夫父虔之宋樂安令麟士幼而俊敏年七歲聽叔父岳言玄賓散言無所遺失岳撫其肩曰若斯文不絕其在爾乎及長博通經史有高尚之心親亡居喪盡禮服闋忌日輒流淚彌旬居貧織簾誦書口手不息鄉里號為織簾先生嘗為人作竹誤傷手便流淚而還同作者謂曰此不足損何至涕零答曰此本不痛但遺體毀傷感而悲耳嘗行路隣人認其所著屐麟士曰是卿屐邪即跣而反隣人得屐送前者還之麟士曰非卿屐邪笑而受之宋元嘉末文帝令僕射何尚之抄撰五經訪舉學士縣以麟士應選不得已至都尚之深相接及至尚之謂子偃曰山藪故多奇士沈麟士黃叔度之流也豈可澄清淆濁邪汝師之麟士嘗苦無書因游都下歷觀四部畢乃歎曰古人亦何人哉少時稱疾歸鄉不與人物通養孤兄子義著鄉曲或勸之仕答曰魚縣獸檻天下一契聖人玄悟所以每履吉先吾誠未能景行坐忘何為不希企日損乃作玄散賦以絕世太守孔山士辟不應宗人徐州刺史曇慶侍中懷文左率勃來候之麟士未嘗答也隱居餘不吳差山講經教授從學士數十百人各營屋宇依止其側時為之語曰吳差山中有賢士開門教授居成市麟士重陸機連珠每為諸生講之征北張永為吳興請麟士入郡麟士聞郡後堂有好山水即戴安道游吳興因古墓為山池也欲一觀之乃往停數月永欲請為功曹麟士曰明府德履冲素留心山谷是以被褐負杖忘其疲病必欲飾渾沌以蛾眉冠越客於文冕走雖不敏請附高節有蹈東海死耳不忍受此黔劓永乃止昇明末太守王奐永明中中書郎沈約並表薦之徵皆不就乃與約書曰名者實之賓本所不庶中央無心空勤南北為惠反凶將在於斯麟士無所營求以篤學為務憑素几鼓素琴不為新聲負薪汲水幷日而食守操終老讀書不倦遭火燒書數千卷年過八十耳目猶聰明以反故抄寫火下細書復成二三千卷滿數十篋時人以為養身靜默所致製黑蝶賦以寄意著周易兩繫莊子內篇訓註易經禮記春秋尚書論語孝經喪服老子要略數十卷梁天監元年與何點同徵又不就二年卒於家年八十五以楊王孫皇甫謐深達生死而終禮矯俗乃自為終制遺令氣絕剔被取三幅布以覆屍及斂仍移布於屍下以為斂服反被左右兩際以周上不復製覆被不須沐浴唅珠以本裙衫先着褌凡二服上加單衣幅巾履枕棺中唯此依士安用孝經既殯不復立靈座四節及祥權鋪席於地以設玄酒之奠人家相承漆棺今不復爾亦不須旐成服後即葬作冢令小後祔更作小冢於濱合葬非古也冢不須聚土成墳使上與地平王祥終制亦爾葬不須車靈舫魌頭也不得朝夕下食祭奠之法至于葬唯清水一盃子彝奉而行之州鄉皆稱歎焉阮孝緒字士宗陳留尉氏人也父彥之宋太尉從事中郎以清幹流譽孝緒七歲出繼從伯胤之胤之母周氏卒遺財百餘萬應歸孝緒孝緒一無所納盡以歸胤之姊琅邪王晏之母聞者咸歎異之乳人憐其傳重辛苦輒竊玉羊金獸等物與之孝緒見而駭愕啟彥之送還王氏幼至孝性靜雖與童兒游戲以穿池築山為樂年十三徧通五經十五冠而見其父彥之彥之誡曰三加彌尊人倫之始宜思自勗以庇爾躬答曰願迹松子於瀛海追許由於穹谷庶保促生以免塵累自是屏居一室非定省未嘗出戶家人莫見其面親友因呼為居士年十六父喪不服緜纊雖蔬菜有味亦吐之外兄王晏貴顯屢至其門孝緒度之必至顛覆聞其笳管穿籬逃匿不與相見曾食醬美問之云是王家所得便吐餐覆醬及晏誅親戚咸為之懼孝緒曰親而不黨何坐之及竟獲免梁武起兵圍建鄴家貧無以爨僮妾竊隣人墓樵以繼火孝緒知之乃不食更令撤屋而炊所居以一鹿牀為精舍以樹環繞天監初御史中丞任昉尋其兄履之欲造而不敢望而歎曰其室雖邇其人甚遠其為名流所欽尚如此自是欽慕風譽者莫不懷刺斂衽望塵而息殷芸欲贈以詩昉曰趣舍既異何必相干芸乃止唯與比部郎裴子野交子野薦之尚書徐勉言其年十餘歲隨父為湘州行事不書官紙以成親之清白論其志行粗類管幼安比以采章如似皇甫謐天監十二年詔公卿舉士祕書監傅照上疏薦之與吳郡范元琰俱徵並不到陳郡袁峻謂曰往者天地閉賢人隱今世路已清而子猶遁可乎答曰昔周德雖興夷齊不厭薇蕨漢道方盛黃綺無悶山林為仁由己何關人世況僕非往賢之類邪初謝朏及伏耳幾應徵天子以為隱者苟立虛名以要顯譽故孝緒與何胤並得遂其高志後於鍾山聽講母王氏忽有疾兄弟欲召之母曰孝緒至性冥通必當自到果心驚而反隣里嗟異之合藥須得生人葠舊傳鍾山所出孝緒躬歷幽險累日不逢忽見一鹿前行孝緒感而隨後至一所遂滅就視果獲此草母得服之遂愈時皆言其孝感所致有善筮者張有道曰見子隱迹而心難明自非考之龜蓍無以驗也及布卦既揲五爻曰此將為咸應感之法非嘉遯之兆孝緒曰安知後爻不為上九果成遯卦有道歎曰此所謂肥遯無不利象實應德心迹幷也孝緒曰雖獲遯卦而上九爻不發升遐之道便當高謝許生乃著高隱傳上自炎皇終于天監末斟酌分為三品言行超逸名氏弗傳為上篇始終不耗姓名可錄為中篇挂冠人世栖心塵表為下篇湘東王著忠臣傳集釋氏碑銘丹陽尹錄研神記並先簡孝緒而後施行南平元襄王聞其名致書要之不赴曰非志驕富貴但性畏廟堂若使麚可驂何以異夫驥騄初建武末青溪宮東門無故自崩大風拔東宮門外楊樹或以問孝緒孝緒曰青溪皇家舊宅齊為木行東為木位今東門自壞木其衰矣武帝禁畜讖緯孝緒兼有其書或勸藏之答曰昔劉德重淮南秘要適為更生之禍杜瓊所謂不如不知此言美矣客有求之答曰己所不欲豈可嫁禍於人乃焚之鄱陽忠烈王妃孝緒姊也王嘗命駕欲就之游孝緒鑿垣而逃卒不肯見王悵然歎息王諸子篤渭陽之情歲時之貢無所受納未嘗相見竟不之識或問其故孝緒曰我本素賤不應為王侯姻戚邂逅所逢豈關始願劉歊曾以米饋之孝緒不納歊亦棄之末年蔬食斷酒其供養石像先有損壞心欲補之罄心敬禮經一夜忽然完復衆並異之大同二年正月孝緒自筮卦吾壽與劉著作同年及劉杳卒孝緒曰劉侯逝矣吾其幾何其年十月卒年五十八梁簡文在東宮隆恩厚贈子恕等述先志不受顧協以為恩異常均議令恭受門徒追論德行諡曰文貞處士所著七錄削繁等一百八十一卷並行於世初孝緒所撰高隱傳中篇所載一百三十七人劉歊劉訏覽其書曰昔嵇康所贊缺一自擬今四十之數將待吾等成邪對曰所謂荀君雖少後事當付鍾君若素車白馬之日輒獲麟於二子歊訏果卒乃益二傳及孝緒亡訏兄絜錄其所遺行次篇末成絕筆之意云南嶽鄧先生名郁荊州建平人也少而不仕隱居衡山極峻之嶺立小板屋兩間足不下山斷穀三十餘載唯以澗水服雲母屑日夜誦大洞經梁武帝敬信殊篤為帝合丹帝不敢服起五嶽樓貯之供養道家吉日躬往禮拜白日神仙魏夫人忽來臨降乘雲而至從少嫗三十並着絳紫羅繡袿王老年皆可十七八許色豔桃李質勝瓊瑤言語良久謂郁曰君有仙分所以故來尋當相候至天監十四年忽見二青鳥悉如鶴大鼓翼鳴舞移晷方去謂弟子等曰求之甚勞得之甚逸近青鳥既來期會至矣少日無病而終山內唯聞香氣世未嘗有武帝後令周捨為鄧玄傳具序其事陶弘景字通明丹陽秣陵人也祖隆王府參軍父貞孝昌令初弘景母郝氏夢兩天人手執香鑪來至其所已而有娠以宋孝建三年景申歲夏至日生幼有異操年四五歲以荻為筆畫灰中學書至十歲得葛洪神仙傳晝夜研尋便有養生之志謂人曰仰青雲覩白日不覺為遠矣父為妾所害弘景終身不娶及長身長七尺七寸神儀明秀朗目疎眉細形長額聳耳耳孔各有十餘毛出外二寸許右膝有數十黑子作七星文讀書萬餘卷一事不知以為深恥善琴工草隸未弱冠齊高帝作相引為諸王侍讀除奉朝請雖在朱門閉影不交外物唯以披閱為務朝儀故事多所取焉家貧求宰縣不遂永明十年脫朝服挂神武門上表辭祿詔許之賜以束帛敕所在月給伏苓五斤白蜜二升以供服餌及發公卿祖之征虜亭供帳甚盛車馬填咽咸云宋齊以來未有斯事於是止于句容之句曲山曰此山下是第八洞宮名金壇華陽之天周回一百五十里昔漢有咸陽三茅君得道來掌此山故謂之茅山乃中山立館自號華陽陶隱居人間書札即以隱居代名始從東陽孫游嶽受符圖經法徧歷名山尋訪仙藥身既輕捷性愛山水每經澗谷必坐臥其間吟詠盤桓不能已已謂門人曰吾見朱門廣厦雖識其華樂而無欲往之心望高巖瞰大澤知此難立止自欲就之且永明中求祿得輒差舛若不爾豈得為今日之事豈唯身有仙相亦緣勢使之然沈約為東陽郡守高其志節累書要之不至弘景為人員通謙謹出處冥會心如明鏡遇物便了言無煩舛有亦隨覺永元初更築三層樓弘景處其上弟子居其中賓客至其下與物遂絕唯一家僮得至其所本便馬善射晚皆不為唯聽吹笙而已特愛松風庭院皆植松每聞其響欣然為樂有時獨游泉石望見者以為仙人性好著述尚奇異顧惜光景老而彌篤尤明陰陽五行風角星算山川地理方圖產物醫術本草著帝代年曆以算推知漢熹平三年丁丑冬至加時在日中而天實以乙亥冬至加時在夜半凡差三十八刻是漢曆後天二日十二刻也又以歷代皆取其先妣母后配饗地祇以為神理宜然碩學通儒咸所不悟又嘗造渾天象高三尺許地居中央天轉而地不動以機動之悉與天相會云修道所須非止史官是用深慕張良為人云古賢無比齊末為歌曰水丑木為梁字及梁武兵至新林遣弟子戴猛之假道奉表及聞議禪代弘景援引圖讖數處皆成梁字令弟子進之武帝既早與之游及即位後恩禮愈篤書問不絕冠蓋相望弘景既得神符祕訣以為神丹可成而苦無藥物帝給黃金朱砂曾青雄黃等後合飛丹色如霜雪服之體輕及帝服飛丹有驗益敬重之每得其書燒香虔受帝使造年曆至己巳歲而加朱點實太清三年也帝手敕招之錫以鹿皮巾後屢加禮聘並不出唯畫作兩牛一牛散放水草之間一牛著金籠頭有人執繩以杖驅之武帝笑曰此人無所不作欲斅曳尾之龜豈有可致之理國家每有吉凶征討大事無不前以諮詢月中常有數信時人謂為山中宰相二宮及公王貴要參候相繼贈遺未嘗脫時多不納受縱留者即作功德天監四年移居積金東澗弘景善辟穀導引之法自隱處四十許年年逾八十而有壯容仙書云眼方者壽千歲弘景末年一眼有時而方曾夢佛授其菩提記云名為勝力菩薩乃詣鄮縣阿育王塔自誓受五大戒後簡文臨南徐州欽其風素召至後堂以葛巾進見與談論數日而去簡文甚敬異之天監中獻丹於武帝中大通初又獻二刀其一名善勝一名威勝並為佳寶無疾自知應逝逆剋亡日仍為告逝詩大同二年卒時年八十一顏色不變屈申如常香氣累日氛氳滿山遺令既沒不須沐浴不須施牀止兩重席於地因所著舊衣上加生裙及臂衣靺冠巾法服左肘錄鈴右肘藥鈴佩符絡左腋下繞腰穿環結於前釵符於髻上通以大袈裟覆衾蒙首足明器有車馬道人道士並在門中道人左道士右百日內夜常然燈旦常香火弟子遵而行之詔贈太中大夫諡曰貞白先生弘景妙解術數逆知梁祚覆沒預制詩云夷甫任散誕平叔坐論空豈悟昭陽殿遂作單于宮詩祕在篋𩹉化後門人方稍出之大同末人士競談玄理不習武事後侯景篡果在昭陽殿初弘景母夢青龍無尾自己升天弘景果不妻無子從兄以子松喬嗣所著學苑百卷孝經論語集注帝代年曆本草集注効驗方肘後百一方古今州郡記圖像集要及玉匱記七曜新舊術疏占候合丹法式共祕密不傳及撰而未訖又十部唯弟子得之時有沙門釋寶誌者不知何許人有於宋泰始中見之出入鍾山往來都邑年已五六十矣齊宋之交稍顯靈跡被髮徒跣語默不倫或被錦袍飲啖同於凡俗以銅鏡剪刀鑷屬挂杖負之而趍或徵索酒肴或累日不食預言未兆識他心智一日中分身易所遠近驚赴所居噂齊武帝忿其惑衆收付建康獄旦日咸見游行市里既而檢校猶在獄中其夜又語獄吏門外有兩輿食金鉢盛飯汝可取之果是文惠太子及竟陵王子良所供養縣令呂文顯以啟武帝帝乃迎入華林園少時忽重著三布帽亦不知於何得之俄而武帝崩文惠太子豫章文獻王相繼薨齊亦於此季矣靈咊寺沙門釋寶亮欲以納被遺之未及有言寶誌忽來牽被而去蔡仲熊嘗問仕何所至了自不答直解杖頭左索繩擲與之莫之解仲熊至尚書左丞方知言驗永明中住東宮後堂從平旦門中出入末年忽云門上血汙衣褰裳走過至鬱林見害果以犢車載屍出自此門舍故閹人徐龍駒宅而帝頸血流於門限焉梁武帝尤深敬事嘗問年祚遠近答曰元嘉元嘉帝欣然以為享祚倍宋文之年雖剃鬚髮而常冠帽下裙納袍故俗呼為誌公好為讖記所謂誌公符是也高麗聞之遣使齎緜帽供養天監十三年卒將死忽移寺金剛像出置戶外語人云菩薩當去旬日無疾而終先是琅邪王筠至莊嚴寺寶誌遇之與交言歡飲至亡敕命筠為碑蓋先覺也諸葛璩字幼玫琅邪陽都人也世居京口璩幼事徵士關康之博涉經史復師徵士臧榮緒榮緒著晉書稱璩有發擿之功方之壺遂齊建武初南徐州行事江祀薦璩於明帝言璩安貧守道悅禮敦詩如其簡退可揚清厲俗請辟為議曹從事帝許之璩辭不赴陳郡謝朓為東海太守下教揚其風概餉穀百斛梁天監中舉秀才不就璩性勤於誨誘後生就學者日至居宅狹陋無以容之太守張友為起講舍璩處身清正妻子不見喜慍之色旦夕孜孜講誦不輟時人益以此宗之卒於家璩所著文章二十卷門人劉暾集而錄之劉慧斐字宣文彭城人也父元直淮南太守慧斐少博學能屬文起家梁安成王法曹行參軍嘗還都途經尋陽游於匡山遇處士張孝秀相得甚歡遂有終焉之志因不仕居東林寺又於山北構園一所號曰離垢園時人仍謂為離垢先生慧斐尤明釋典工篆隸在山手寫佛經二千餘卷常所誦者百餘卷晝夜行道孜孜不怠遠近欽慕之簡文臨江州遺以几杖論者云自遠法師沒後將二百年始有張劉之盛矣元帝及武陵王等書問不絕大同三年卒慧斐兄慧鏡安成內史初元直居郡得罪慧鏡歷詣朝士乞哀懇惻甚至遂以孝聞子曇淨字元光篤行有父風解褐安成王國左常侍父卒於郡曇淨奔喪不食飲者累日絕而又蘇每哭輒嘔血服闋因毀成疾會有詔士姓各舉四科曇淨叔父慧斐舉以應孝行武帝用為海寧令曇淨又以兄未為縣因以讓兄乃除安西參軍父亡後事母尤淳至身營飡粥不以委人母疾衣不解帶及母亡水漿不入口者殆一旬母喪權瘞藥王寺時天寒曇淨身衣單布衣廬於瘞所晝夜哭臨不絕聲哀感行路未朞而卒范元琰字伯珪一字長玉吳郡錢塘人也祖悅之太學博士徵不至父靈瑜居父憂以毀卒元琰時童孺哀慕盡禮親黨異之及長好學博通經史兼精佛義然謙敬不以所長驕人祖母患癰自含吮與人言常恐傷物居家不出城市雖獨居如對賓客見者莫不改容憚之家貧唯以園蔬為業嘗出行見人盜其菘元琰遽退走母問其故具以實答母問盜者為誰答曰向所以退畏其愧恥今啟其名願不泄也於是母子祕之或有涉溝盜其筍者元琰因伐木為橋以度之自是盜者大慚一鄉無復草竊齊建武初徵為曹武平西參軍不至于時始安王遙光為揚州謂徐孝嗣曰曹武參軍豈是禮賢之職欲以西曹書佐聘之會遙光敗不果時人以為恨沛國劉瓛深加器異嘗表稱之天監九年縣令管慧辯上言義行揚州刺史臨川王宏辟命不至卒于家庾詵字彥寶新野人也幼聰警篤學經史百家無不該綜緯候書射算機巧並一時之絕而性託夷簡特愛林泉十畝之宅山池居半蔬食弊衣不修產業遇火止出書數簣坐於池上有為火來者答云唯恐損竹乘舟從沮中山舍還載米一百五十石有人寄載三十石及至宅寄載者曰君三十斛我百五十斛詵默然不言恣其取足隣人有被誣為盜見劾妄發詵矜之乃以書質錢二萬令門生詐為其親代之酬備隣人獲免謝詵詵曰吾矜天下無辜豈期謝也梁武帝少與詵善及起兵署為平西府記室參軍詵不屈平生少所游狎河東柳惲欲與交拒而弗納普通中詔以為黃門侍郎稱疾不起晚年尤遵釋教宅內立道場環繞禮懺六時不輟誦法華經每日一徧後夜中忽見一道人自稱願公容止甚異呼詵為上行先生授香而去中大通四年因寢忽驚覺曰願公復來不可久住顏色不變言終而亡年七十八舉室咸聞空中唱上行先生已生彌淨域矣武帝聞而下詔諡貞節處士以顯高烈詵所撰帝歷二十卷易林二十卷續伍端休江陵記一卷晉朝雜事五卷總抄八十卷行於世子曼倩字世華亦早有令譽元帝在荊州為中錄事每出帝常目送之謂劉之遴曰荊南信多君子後轉諮議參軍所著喪服儀文字體例老子義疏算經及七曜歷術幷所製文章凡九十五卷子季才有學行承聖中位中書侍郎江陵平隨例入長安張孝秀字文逸南陽宛人也徙居尋陽曾祖須無祖僧監父希並別駕從事孝秀長六尺餘白美鬚眉仕州中從事史遇刺史陳伯之叛孝秀與州中士大夫謀襲之事覺逃於盆水側有商人置諸褚中展轉入東林伯之得其母郭以蠟灌殺之孝秀遣妻妾入匡山修行學道服闋建安王召為別駕因去職歸山居于東林寺有田數十頃部曲數百人率以力田盡供山衆遠近歸慕赴之如市孝秀性通率不好浮華常冠穀皮巾躡蒲履手執幷閭皮麈尾服寒食散盛冬臥於石上博涉羣書專精釋典僧有虧戒律者集衆佛前作羯磨而笞之多能改過善談論工隸書凡諸藝能莫不明習普通三年卒室中皆聞非常香梁簡文甚傷悼焉與劉慧斐書述其貞白云庾承先字子通潁川鄢陵人也少沉靜有志操是非不涉於言喜慍不形於色人莫能窺也弱歲受學於南陽劉虬強記敏識出於羣輩玄經釋典靡不該悉九流七略咸所精練辟功曹不就乃與道士王僧鎮同游衡岳晚以弟疾還鄉里遂居土臺山梁鄱陽忠烈王在州欽其風味要與游處令講老子遠近名僧咸來赴集論難鋒起異端競至承先徐相酬答皆得所未聞忠烈王尤所欽重中大通三年廬山劉慧斐至荊州承先與之有舊往從之荊陝學徒因請承先講老子湘東王親命駕臨聽論議終日留連月餘乃還山王親祖道幷贈篇什隱者美之其年卒刺史厚有贈賻門人黃士龍讓曰先師平素食不求飽衣不求輕凡有贈遺皆無所受臨終之日誡約家門薄棺周形巾褐為斂雖蒙賚及不敢輕承教旨以違平生之操錢布輒付使反時論高之馬樞字要理扶風郿人也祖靈慶齊竟陵王錄事參軍樞數歲而孤為其姑所養六歲能誦孝經論語老子及長博極經史尤善佛經及周易老子義梁邵陵王綸為南徐州刺史素聞其名引為學士綸時自講大品經令樞講維摩老子周易同日發題道俗聽者二千人王欲極觀優劣乃謂衆曰與馬學士論義必使屈服不得空立客主於是數家學者各起問端樞乃依次剖判開其宗旨然後枝分派別轉變無窮論者拱默聽受而已綸甚嘉之尋遇侯景之亂綸舉兵援臺乃留書二萬卷付樞樞肆志尋覽殆將周遍乃喟然歎曰吾聞貴爵位者以巢由為桎梏愛山林者以伊呂為管庫束名實則芻芥柱下之言翫清虛則糠粃席上之說稽之篤論亦各從其好也比求志之士望塗而息豈天之不惠高尚何山林之無聞甚乎乃隱于茅山有終焉之志陳天嘉元年文帝徵為度支尚書辭不應命時樞親故並居京口每秋冬之際時往游焉及鄱陽王為南徐州刺史欽其高尚鄙不能致乃卑辭厚意令使者邀之樞固辭以疾門人勸請不得已乃行王別築室以處之樞惡其崇麗乃於竹林間自營茅茨而居每以王公餽餉辭不獲已者率十分受一樞少屬亂離凡所居處盜賊不入依託者常數百家目精洞黃能視闇中物有白灯一雙巢其庭樹馴狎廡時至几案春來秋去幾三十年太建十三年卒撰道覺論行於世論曰夫獨往之人皆禀偏介之性不能摧志屈道借譽期通若使夫遇見信之主逢時來之運豈其放情江海取逸丘樊不得已而然故也且巖壑閑遠水石清華雖復崇門八襲高城萬雉莫不蓄壤開泉髣髴林澤故知松山桂渚非止素玩碧澗清潭翻成麗矚挂冕東都夫何難之有
