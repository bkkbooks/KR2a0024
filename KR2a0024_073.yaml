body:
  text: 南史卷七十三列傳第六十三孝義上龔穎劉瑜董陽賈恩郭世通子原平嚴世期吳逵潘綜陳遺秦綿張進之俞僉張楚丘傑師覺授王彭蔣恭徐耕孫法宗范叔孫吳國夫卜天與弟天生許昭先余齊人孫棘妻許徐元妻許錢延慶何子平崔懷順王虛之顧昌衍江柔之江軻吳慶之蕭睿明鮮于文宗蕭矯妻羊羊緝之女佩任吳康之妻趙蔣俊之妻黃吳翼之母丁會稽陳氏三女永興概中里王氏女諸暨屠氏女吳興乘公濟妻姚吳郡范法恂妻褚公孫僧遠吳欣之韓係伯丘冠先孫淡華寶薛天生劉懷胤解叔謙宗元卿庾震朱文濟匡昕魯康祚謝昌𧜛韓靈敏劉渢弟溓柳叔夜封延伯陳玄子邵榮興文獻叔徐生之范安祖李聖伯范道根談弘寶何弘陽黑頭王續祖郝道福吳達之蔡曇智何伯璵王文殊樂頤之弟預沈升之江泌庾道愍族孫沙彌沙彌子持易曰立人之道曰仁與義夫仁義者合君親之至理實忠孝之所資雖義發因心情非外感然企及之旨聖哲貽言至於風漓化薄禮違道喪忠不樹國孝亦愆家而一代之氓權利相引仕以勢招榮非行立乏翺翔之感棄含生之分霜露未改大痛已忘於心名節不變戎車遽為其首斯並軌訓之理未弘汲引之塗多闕若夫情發於天行成乎己捐軀捨命濟主安親雖乘理暗至匪由勸賞而宰世之人曾微誘激乃至事隱閭閻無聞視聽考于載籍何代無之故宜被之圖篆用存旌勸今搜綴湮落以備闕文云爾龔穎遂寧人也少好學益州刺史毛璩辟為勸學從事璩為譙縱所殺故佐吏並逃亡穎號哭奔赴殯送以禮縱後設宴延穎不獲已而至樂奏穎流涕起曰北面事人亡不能死何忍舉觴聞樂蹈迹逆亂乎縱大將譙道福引出將斬之道福母即穎姑也跣出救之得免及縱僭號備禮徵又不至乃脅以兵刃執志終無回改至于蜀平遂不屈節其後刺史至輒加辟引歷府參軍州別駕從事史宋文帝元嘉二十四年刺史陸徽表穎節義遂不被朝命終於家劉瑜歷陽歷陽人也七歲喪父事母至孝年五十二又喪母三年不進鹽酪號泣晝夜不絶聲勤身力以營葬事服除二十餘年布衣蔬食言輒流涕常居墓側未嘗暫違宋文帝元嘉初卒又元嘉七年南豫州舉所統西陽縣人董陽三世同居外無異門內無異煙詔榜門曰篤行董氏之閭蠲一門租布賈恩會稽諸暨人也少有志行元嘉三年母亡居喪過禮未葬為鄰火所逼恩及妻桓氏號哭奔救鄰近赴助棺櫬得免恩及桓俱燒死有司奏改其里為孝義里蠲租布三世追贈恩天水郡顯親左尉郭世通會稽永興人也年十四喪父居喪殆不勝哀家貧傭力以養繼母婦生一男夫妻恐廢侍養乃垂泣瘞之母亡負土成墳親戚或共賻助微有所受葬畢傭賃還先直服除後思慕終身如喪者未嘗釋衣幍仁孝之風行於鄉黨鄰村小大莫有呼其名者嘗與人共於山陰市貨物誤得一千錢當時不覺分背方悟追還本主錢主驚歎以半直與之世通委之而去元嘉四年大使巡行天下散騎常侍袁愈表其淳行文帝嘉之敕榜表門閭蠲其租調改所居獨楓里為孝行焉太守孟顗察孝廉不就子原平字長恭又稟至行養親必以己力傭賃以給供養性甚巧每為人作正取散夫價主人設食原平自以家貧父母不辦有肴味唯赧鹽飯而已若家或無食則虛中竟日義不獨飽須日暮作畢受直歸家於里糴買然後舉爨父篤疾彌年原平衣不解帶口不嘗鹽菜者跨積寒暑又未嘗睡臥父亡哭踊慟絶數日方蘇以為奉終之義情禮自畢塋壙凶功不欲假人本雖巧而不解作墓乃訪邑中有營墓者助人運力經時展勤久乃間練又自賣十夫以供衆費窀穸之事儉而當禮性無術學因心自然葬畢詣所買主執役無懈與諸奴分務讓逸取勞主人不忍使每遣之原平服勤未嘗暫替傭賃養母有餘聚以自贖既學構冢尤善其事每至吉歲求者盈門原平所起必自貧始既取賤價又以夫日助之及父喪終自起兩間小屋以為祠堂每至節歲常於此數日中哀思絶飲粥父服除後不復食肉高陽許瑤之罷建安郡丞還家以綿一斤遺之不受瑤之乃自往曰今歲過寒而建安綿好以此奉尊上下耳原平乃拜而受之及母終毀瘠彌甚僅乃免喪墓前有數十畝田不屬原平每至農月耕者裸袒原平不欲使人慢其墳墓乃貿家資貴買此田三農之月輒束帶垂泣躬自耕墾每出賣物裁求半價邑人皆共識悉輒加本價與之彼此相讓要使微賤然後取直宅上種竹夜有盜其筍者原平遇見之盜者奔走墜溝原平乃於所植竹處溝上立小橋令通又採筍置籬外鄰里慚愧無復取者宋文帝崩原平號慟日食麥一枚如此五日人曰誰非王臣何獨如此原平泣而答曰吾家見異先朝蒙褒贊之賞不能報恩私心感動耳又以種瓜為業大明七年大旱瓜瀆不復通船縣令劉僧秀愍其窮老下瀆水與之原平曰普天大旱百姓俱困豈可減溉田之水以通運瓜之船乃步從他道往錢唐貨賣每行來見人牽埭未過輒迅楫助之己自引船不假旁人若自船已度後人未及常停住須待以此為常嘗於縣南郭鳳埭助人引船遇有鬬者為吏所録鬬者逃散唯原平獨住吏執以送縣縣令新到未相諳悉將加嚴罰原平解衣就罪義無一言左右大小咸稽顙請救然後得免由來不謁官長自此乃始修敬太守蔡興宗臨郡深加貴異以私米饋原平及山陰朱百年妻各百斛原平誓死不受百年妻亦固辭會稽郡貴重望計及望孝盛族出身不減祕著明帝泰始七年興宗欲舉山陰孔仲智子為望計原平次息為望孝仲智會土高門原平一邦至行欲以相敵會明帝別敕用人故二選並寢興宗徵還都表其殊行舉為太學博士會興宗薨事不行卒於家三子一弟並有門行嚴世期會稽山陰人也性好施同里張邁等三人妻各産子歲飢欲棄而不舉世期分食解衣以贍其乏三子並得成長同縣俞陽妻莊年九十莊女蘭七十並老病無所依世期飴之二十年死並殯葬宗親嚴弘鄉人潘伯等十五人荒年並餓死露骸不收世期買棺殯埋存育孩幼宋元嘉四年有司奏榜門曰義行嚴氏之門復其身徭役蠲租稅十年吳逵吳興烏程人也經荒飢饉係以疾疫父母兄嫂及羣從小功之親男女死者十三人逵時病困鄰里以葦席裹之埋于村側既而親屬皆盡唯逵夫妻獲全家徒四壁立冬無被袴晝則傭賃夜則伐木燒磚妻亦同逵此誠無有懈倦逵夜行遇猛獸猛獸輒下道避之期年中成七墓葬十三棺鄰里嘉之葬日悉出赴助送終之事亦儉而周禮逵時逆取鄰人夫直葬畢衆悉以放之逵一無所受皆傭力報答焉太守張崇之三加禮命太守王韶之擢補功曹史逵以門寒固辭不就舉為孝廉潘綜吳興烏程人也孫恩之亂祅黨攻破村邑綜與父驃共走避賊驃年老行遲賊轉逼驃驃語綜我不能去汝走可脫幸勿俱死驃困乏坐地綜迎賊叩頭曰父年老乞賜生命賊至驃亦請賊曰兒年少自能走今為老子不去老子不惜死乞活此兒賊因斫驃綜抱父於腹下賊斫綜頭面凡四創綜當時悶絶有一賊從傍來相謂曰卿欲舉大事此兒以死救父云何可殺殺孝子不祥賊乃止父子並得免鄉人祕書監丘系祖廷尉沈赤黔以綜異行薦補左戶令史除遂昌長歲滿還家太守王韶之臨郡發教列上州臺陳其行迹及將行設祖道贈以四言詩元嘉四年有司奏改其里為純孝里蠲租布三世又宋初吳郡人陳遺少為郡吏母好食鎗底飯遺在役帶一囊每煮食輒録其焦以貽母後孫恩亂聚得數升帶自隨及敗逃竄多有餓死遺以此得活母晝夜泣涕目為失明耳無所聞遺還入戶再拜號咽母豁然即明後又有河南孝廉秦綿遭母喪送葬不忍復還鄉人為作茅菴仍止其中若遇有米則食粥無米食菜而已哀號之聲行者為之潸淚服訖猶不還家遇疾不療卒臨亡告人曰若死者無知固不宜獨存有知則大獲吾志張進之永嘉安固人也為郡大族少有志行歷五官主簿永寧安固二縣領校尉家世富足經荒年散財救贍鄉里遂以貧罄全濟者甚多太守王味之有罪當見收逃避進之家供奉經時盡其誠力味之嘗避地墮水沈沒進之投水拯救相與沈淪久而得免時劫掠充斥每入村抄暴至進之門輒相約勒不得侵犯其信義所感如此元嘉初詔在所蠲其徭役又孫恩之亂永嘉太守司馬逸之被害妻子並死兵寇之際莫敢收藏郡吏俞僉以家財冒難棺斂逸之等六喪送致都葬畢乃歸鄉里元嘉中老病卒時又有益州梓潼人張楚母疾命在屬纊楚祈禱苦至燒指自誓精誠感悟疾時得愈見榜門曰孝行張氏之閭易其里為孝行里蠲租布三世身加旌命丘傑字偉跱吳興烏程人也十四遭母喪以熟菜有味不嘗於口歲餘忽夢見母曰死止是分別耳何事乃爾荼苦汝噉生菜遇蝦毒靈牀前有三丸藥可取服之傑驚起果得甌甌中有藥服之下科斗子數升丘氏世保此甌大明七年災火焚失之師覺授字覺授南陽涅陽人也與外兄宗少文並有素業以琴書自娛於路忽見一人持書一函題曰至孝師君苫前俄而不見捨車奔歸聞家哭聲一叫而絶良久乃蘇後撰孝子傳八卷宋臨川王義慶辟為州祭酒主簿並不就乃表薦之會卒王彭盱眙直瀆人也少喪母元嘉初父又喪亡家貧力弱無以營葬兄弟二人晝則傭力夜則號感鄉里並哀之乃各出夫力助作磚磚須水而天旱穿井數十丈泉不出墓處去淮五里荷擔遠汲困而不周彭號天自訴如此積日一旦大霧霧歇磚竈前忽生泉水鄉鄰助之者並嗟神異縣邑近遠悉往觀之葬竟水便自竭元嘉九年太守劉伯龍依事表言改其里為通靈里蠲租布三世蔣恭義興臨津人也元嘉中晉陵蔣崇平為劫見禽云與恭妻弟吳晞張為侶晞張先行不在本村遇水妻息避水移寄恭家時録晞張不獲禽收恭及兄協付獄科罪恭協並款舍住晞張家口而不知劫情恭列晞張妻息是婦之親親今有罪恭身甘分求免兄協協列是戶主求免弟恭兄弟二人爭求受罪郡縣不能判依事上詳州議以為並不合罪後除恭義成令協義招令徐耕晉陵延陵人也元嘉二十一年大旱人飢耕詣縣陳辭以米千斛助官振貸縣為言上當時議以耕比漢卜式詔書褒美酬以縣令大明八年東土飢旱東海嚴成東莞王道蓋各以私穀五百餘斛助官振恤孫法宗一名宗之吳興人也父隨孫恩入海澨被害尸骸不收母兄並餓死法宗年小流迸至十六方得還單身勤苦霜行草宿營辦棺槨造立冢墓葬送母兄儉而有禮以父尸不測入海尋求聞世間論是至親以血瀝骨當悉漬浸乃操刀沿海見枯骸則刻肉灌血如此十餘年臂脛無完皮血脈枯竭終不能逢遂衰絰終身常居墓所山禽野獸皆悉馴附每麕鹿觸網必解放之償以錢物後忽苦頭創夜有女人至曰我是天使來相謝行創本不關善人使者遠相及取牛糞煮傅之即驗一傅便差一境賴之終身不娶饋遺無所受宋孝武初揚州辟為文學從事不就卒范叔孫吳郡錢唐人也少而仁厚周窮濟急同里范法先父母兄弟七人同時疫死唯餘法先病又危篤喪尸經月不收叔孫悉備棺器親為殯埋又同里施夫疾病父死不殯范苗父子並亡范敬宗家口六人俱得病二人喪沒親鄰畏遠莫敢營視叔孫並為殯瘞躬恤病者並皆得全鄉曲貴其義行莫有呼其名者宋孝武孝建初除竟陵王國中軍不就義興吳國夫亦有義讓之美人有竊其稻者乃引還為設酒食以米送之卜天與吳興餘杭人也父名祖宋武帝聞其有幹力召補隊主從征伐封關中侯歷二縣令天與善射弓力兼倍容貌嚴毅笑不解顏文帝以其舊將子使教皇子射元嘉二十九年為廣威將軍領左細仗元凶入弒事變倉卒舊將羅訓徐罕皆望風屈附天與不暇被甲執刀持弓疾呼左右出戰徐罕曰殿下入汝欲何為天與罵曰殿下常來去云何即時方作此語只汝是賊手射劭於東堂幾中逆徒擊之臂斷乃見殺其隊將張弘之朱道欽陳滿與天與同出拒戰並死孝武即位贈天與龍驤將軍益州刺史諡曰壯侯車駕臨哭弘之等各贈郡守給天與家長稟子伯宗殿中將軍明帝泰始初領幢擊南賊於赭圻戰沒伯宗弟伯興官至南平昌太守直閣領細仗隊主升明元年與袁粲同謀伏誅天與弟天生少為隊將十人同火屋後有一坑廣二丈餘十人共跳之皆度唯天生墜天生乃取實中苦竹剡其端使利交橫布坑內更呼等類共跳並懼不敢天生乃復跳之往反十餘曾無留礙衆並歎服以兄死節為孝武所留心大明末為弋陽太守明帝泰始初與殷琰同逆被斬許昭先義興人也叔父肇之坐事繫獄七年不判子姪二十許人昭先家最貧薄專獨料訴無日在家餉饋肇之莫非珍新資産既盡賣宅以充之肇之諸子倦怠唯昭先無有懈息如是七載尚書沈演之嘉其操行肇之事由此得釋昭先舅夫妻並疫病死亡家貧無以殯送昭先賣衣物以營殯葬舅子三人並幼贍護皆得成長昭先父母皆老病家無僮役竭力致養甘旨必從宗黨嘉其孝行雍州刺史劉真道板為征虜參軍昭先以親老不就補迎主簿昭先以叔未仕又固辭余齊人晉陵晉陵人也少有孝行為邑書吏宋大明二年父殖在家病亡信未至齊人謂人曰比肉痛心煩有如割截居常惶駭必有異故信尋至以父病報之四百餘里一日而至至門方知父死號踊慟絶良久乃蘇問父所遺言母曰汝父終恨不見汝齊人即曰相見何難於是號叫殯所須臾便絶州縣上言有司奏改其里為孝義里蠲租布賜其母穀百斛孫棘彭城人也宋大明五年發三五丁弟薩應充行坐違期不至棘詣郡辭列棘為家長令弟不行罪應百死乞以身代薩薩又辭列自引太守張岱疑其不實以棘薩各置一處報云聽其相代顏色並悅甘心赴死棘妻許又寄語屬棘君當門戶豈可委罪小郎且大家臨亡以小郎屬君竟未妻娶家道不立君已有二兒死復何恨岱依事表上孝武詔特原罪州加辟命並賜帛二十匹先是新蔡徐元妻許二十一喪夫子甄年三歲父攬愍其年少以更適同縣張買許自誓不行父逼載送買許自經氣絶家人奔赴良久乃蘇買夜送還攬許歸徐氏養元父季元嘉中八十餘卒又明帝泰始二年長城吳慶恩殺同郡錢仲期子延慶屬役在都聞父死馳還於庾浦埭逢慶恩手刃殺之自繫烏程獄吳興太守郗顒表不加罪許之何子平廬江灊人也曾祖楷晉侍中祖友會稽王道子驃騎咨議參軍父子先建安太守子平世居會稽少有志行事母至孝揚州辟從事史月奉得白米輒貨巿粟麥人曰所利無幾何足為煩子平曰尊老在東不辦得米何心獨饗白粲每有贈鮮肴者若不可寄致至家則不肯受母本側庶籍注失實實未及養而籍年已滿便去職歸家時鎮軍將軍顧覬之為州上綱謂曰尊上年實未八十親故所知州中差有微祿當啓相留子平曰公家正取信黃籍籍年既至便應扶侍何容苟冒榮利乃歸家竭力供養元嘉三十年元凶弒逆隨王誕入討以為行參軍子平以凶逆滅理故廢己受職事寧自解末除吳郡海虞令縣祿唯供養母一身不以及妻子人疑其儉薄子平曰希祿本在養親不在為己問者慚而退母喪去官哀毀踰禮每至哭踊頓絶方蘇屬大明末東土飢荒繼以師旅八年不得營葬晝夜號哭常如袒括之日冬不衣絮暑避清涼一日以數合米為粥不進鹽菜所居屋敗不蔽風日兄子伯興欲為葺理子平不肯曰我情事未申天地一罪人耳屋何宜覆蔡興宗為會稽太守甚加矜賞為營冢壙子平居喪毀甚及免喪殆至不立幼持操檢敦厲名行雖處暗室如接大賓學義堅明處之以默安貧守善不求榮進好退之士彌以此貴之卒年六十崔懷順清河東武城人也父邪利魯郡太守宋元嘉中為魏所獲懷順與妻房氏篤愛聞父見虜即日遣妻布衣蔬食如居喪禮歲時北向流涕邪利後仕魏書戒懷順不許如此懷順得書更號泣懷順從叔模為滎陽太守亦入魏模子雖居處改節不廢婚宦宋大明中懷順宗人冀州刺史元孫北使魏魏人問之曰崔邪利模並力屈歸命二家子姪出處不同義將安在元孫曰王尊驅驥王陽回車欲令忠孝並弘臣子兩遂泰始初淮北入魏懷順因此歸北至代都而邪利已卒懷順絶而後蘇載喪還青州徒跣氷雪土氣寒酷而手足不傷時人以為孝感喪畢以弟在南齊建元初又逃歸而弟已亡懷順孤貧宗黨哀之日斂給其斗米永明中卒王虛之字文靜廬江石陽人也十三喪母三十三喪父二十五年鹽酢不入口疾病著牀忽有一人來問疾謂之曰君病尋差俄而不見病果尋差庭中楊梅樹隆冬三實又每夜所居有光如燭墓上橘樹一冬再實時人咸以為孝感所致齊永明中詔榜門蠲其三世時又有顧昌衍江柔之江軻並以篤行知名昌衍吳人居喪幾致滅性王儉言之天子曰昌衍既有至行且張永之甥宜居禮闈以光郎署乃以為尚書庫部郎柔之軻並濟陽人柔之字叔遠孝悌通亮亦至臺郎軻字伯倫貞嚴有行宗人江概位至侍中性豪侈唯見軻則敬挹焉吳慶之字文悅濮陽人也寓居吳興宋江夏王義恭為揚州召為西曹書佐及義恭誅慶之自傷為吏無狀不復肯仕終身蔬食後王琨為吳興太守欲召為功曹答曰走素無人世情直以明府見接有禮所以奔走歲時若欲見吏則是蓄魚於樹栖鳥於泉耳不辭而退琨追謝之望塵不及矣蕭睿明字景濟南蘭陵人也母病風積年沉臥睿明晝夜祈禱時寒睿明下淚為之冰如筯額上叩頭血亦冰不溜忽有一人以小石函授之曰此療夫人病睿明跪受之忽不見以函奉母函中唯有三寸絹丹書為日月字母服之即平復于時秣陵朱緒無行母病積年忽思菰羹緒妻到市買菰為羹欲奉母緒曰病復安能食先嘗之遂併食盡母怒曰我病欲此羹汝何心併啖盡天若有知當令汝哽死緒聞便心中介介然即利血明日而死睿明聞之大悲慟不食積日問緒尸在何處欲手自戮之既而曰汙吾刀乃止永明五年居母喪不勝哀卒詔贈中書郎時又有鮮于文宗漁陽人年七歲喪父父以種芋時亡至明年芋時對芋嗚咽如此終身姊文英適荀氏七日而夫亡執節不嫁及母卒晝夜哭泣遂喪明蕭矯妻羊字淑禕性至孝居父喪哭輒吐血母嘗有疾淑禕於中夜祈禱忽見一人在樹下自稱枯桑君曰若人無患今泄氣在亥西南求白石鎮之言訖不見明日如言而疾愈又時有羊緝之女佩任者烏程人隨母還舅氏母亡晝夜號哭不飲食三日而亡鄉里號曰女表又有晉陵吳康之妻趙氏父亡弟幼遇歲飢母老病篤趙詣鄉里告乞言辭哀苦鄉里憐之各分升米遂得免及嫁康之少時夫亡家欲更嫁誓言不二焉又義興蔣俊之妻黃氏夫亡不重嫁家逼之欲自殺乃止建元三年詔蠲表門閭又會稽永興吳翼之母丁氏少喪夫性仁愛遭年荒分衣食以飴里中飢餓者鄰里求借未嘗違同里陳攘父母死孤單無親戚丁收養之及長為營婚娶又同里王禮妻徐氏荒年客死山陰丁為買棺器自往斂葬元徽末大雪商旅斷行村里比室飢餓丁自出鹽米計口分賦同里左僑家露四喪無以葬丁為辦冢椁有三調不登者代為輸送丁長子婦王氏守寡執志不再醮州郡上言詔表門閭蠲租稅又會稽寒人陳氏有三女無男祖父母年八九十老無所知父篤癃病母不安其室遇歲飢三女相率於西湖採菱蓴更日至市貨賣未嘗虧怠鄉里稱為義門多欲娶為婦長女自傷煢獨誓不肯行祖父母尋相繼卒三女自營殯葬為菴舍居墓側又永興概中里王氏女年五歲得毒病兩目皆盲性至孝年二十父死臨尸一叫眼皆血出小妹娥舐其血左目即開時人稱為孝感又諸暨東汙里屠氏女父失明母痼疾親戚相棄鄉里不容女移父母遠住苧羅晝採樵夜紡績以供養父母俱卒親營殯葬負土成墳忽空中有聲云汝至性可重山神欲相驅使汝可為人療病必得大富貴女謂是搸魅弗敢從遂得病積時鄰舍人有中溪蜮毒者女試療之自覺病便差遂以巫道為人療疾無不愈家産日益鄉里多欲娶之女以無兄弟誓守墳墓不嫁為山劫所殺又吳興乘公濟妻姚氏生二男而公濟及兄公願乾伯並卒各有一子姚養育之賣田宅為取婦自與二男寄止鄰家明帝詔為其二子婚表閭復徭役又吳郡范法恂妻褚氏亦勤苦執婦業宋升明中孫曇瓘謀反亡命褚謂其子僧簡曰孫越州先姑之姊子與汝父親則從母兄弟交則義重古人逃竄脫不免汝宜收之曇瓘尋伏法褚氏令僧簡往斂葬年七十餘永明中卒僧簡在都聞病馳歸未至褚已卒將殯舉尸不起尋而僧簡至焉公孫僧遠會稽剡人也居父喪至孝事母及伯父甚謹年飢僧遠省赧減食以養母及伯父弟亡貧無以葬身自販貼與鄰里供斂送終之費躬負土手種松柏兄姊未婚嫁乃自賣為之成禮名聞郡縣齊高帝即位遣兼散騎常侍虞炎等十二部使行天下表列僧遠等二十三人詔並表門閭蠲租稅吳欣之晉陵利城人也宋元嘉末弟慰之為武進縣吏隨王誕起義元凶遣軍主華欽討之吏人皆散慰之獨留見執將死欣之詣欽乞代弟命辭淚哀切兄弟皆見原齊建元三年有詔蠲表之永明初廣陵人童超之二息犯罪爭死太守劉悛表以聞韓係伯襄陽人也事父母謹孝襄陽人鄰居種桑樹於界上為志係伯以桑枝蔭妨他地遷界上開數尺鄰畔隨復侵之係伯輒更改種久之鄰人慚愧還所侵地躬往謝之齊建元三年蠲表門閭以壽終時有吳興人聞人敻年十七結客報父仇為高帝所賞位至長水校尉丘冠先字道玄吳興烏程人也少有節義齊永明中位給事中時求使蠕蠕國尚書令王儉言冠先雖名位未升而義行甚重若為行人則蘇武鄭衆之流也於是使蠕蠕蠕蠕逼令拜冠先執節不從以刃臨之冠先曰能殺我者蠕蠕也不能以天子使拜戎狄者我也遂見殺武帝以冠先不辱命賜其子雄錢一萬布三十匹雄不受詣闕上書曰臣父執節如蘇武守死如谷吉遂不書之良史甄之褒策萬代之後誰死社稷建元四年車僧朗銜使不異抗節是同詔贈正員外郎此天朝舊準臣父成例也今僧朗反葬冢塋臣父湮棄絶域語忠烈則亦不謝車論荼苦則彼優而此劇名位不殊禮數宜等乞申哀贈書奏不省孫淡太原人也世居長沙事母至孝母疾不眠食以差為期母哀之後有疾不使知也齊建元三年蠲表門閭卒於家華寶晉陵無錫人也父豪晉義熙末戍長安寶年八歲臨別謂寶曰須我還當為汝上頭長安陷寶年至七十不婚冠或問之寶輒號慟彌日不忍答也同郡薛天生母遭艱菜食天生亦菜食母未免喪而死天生終身不食魚肉又同郡劉懷胤與弟懷則年十歲遭父喪不衣絮帛不食鹽菜齊建元三年並表門閭解叔謙字楚梁雁門人也母有疾叔謙夜於庭中稽顙祈福聞空中語云此病得丁公藤為酒便差即訪醫及本草注皆無識者乃求訪至宜都郡遙見山中一老公伐木問其所用答曰此丁公藤療風尤驗叔謙便拜伏流涕具言來意此公愴然以四段與之並示以漬酒法叔謙受之顧視此人不復知處依法為酒母病即差齊建武初以奉朝請徵不至時又有宗元卿庾震朱文濟匡昕魯康祚謝昌𧜛皆有素履而叔謙尤高元卿字希蔣南陽人有至行早孤為祖母所養祖母病元卿在遠輒心痛大病則大痛小病則小痛以此為常鄉里宗事之號曰宗曾子震字彥文新野人喪父母居貧無以葬賃書以營事至手掌穿然後葬事獲濟南陽劉虬因此為撰孝子傳文濟字敬達吳興人自賣以葬母太守謝糟命為儒林不就昕字令先廬陵人有至性隱金華山服食不與俗人交母病亡已經日昕奔還號叫母即蘇皆以為孝感所致康祚扶風人亦有至行母患乳癰諸醫療不愈康祚乃跪兩手捧癰大悲泣母即覺小寬因此漸差時人以其有冥應康祚位至屯騎校尉昌𧜛陳郡人也為劉悛廣州參軍孝性甚至嘗養一鵠昌𧜛病二旬而鵠二旬不食昌𧜛亡而鵠遂飛去韓靈敏會稽剡人也早孤與兄靈珍並有孝性母尋又亡家貧無以營凶兄弟共種瓜朝採瓜子暮生已復遂辦葬事靈珍亡無子妻朝氏守節不嫁慮家人奪其志未嘗告歸靈敏事之如母劉渢字處和南陽人也父紹仕宋位中書郎渢母早亡紹被敕納路太后兄女為繼室渢年數歲路氏不以為子奴婢輩捶打之無期度渢母亡日輒悲啼不食彌為婢輩所苦路氏生溓兄渢憐愛之不忍捨在牀帳側輒被驅捶終不肯去路氏病經年渢晝夜不離左右每有增加輒流涕不食路氏病差感其意慈愛遂隆路氏富盛一旦為渢立齋宇筵席不減侯王溓有識事渢過於同産事無大小必咨兄而後行渢妹適江祏弟禧與祏兄弟異常自尚書比部郎後為遙光咨議專知腹心任時遙光任當顧託朝野向渢如雲渢忌之求出為丹陽丞雖外遷而意任無改及遙光舉事旦方召渢渢以為宜悉呼佐史渢之徙丹陽丞也遙光以蕭懿第四弟晉安王之文學暢為咨議領録事及召入遙光謂曰劉暄欲有異志今夕當取之遙光去歲暴風性理乖錯多時方愈暢曰公去歲違和今欲發動顧左右急呼師視脈遙光厲聲曰咨議欲作異邪因訶令出須臾渢入暢謂曰公昔年風疾今復發渢曰卿視今夕處分云何而作此語及迎垣歷生至與渢俱勸夜攻臺既不見納渢歷生並撫膺曰今欲作賊而坐守此城今年坐公滅族矣及遙光敗渢靜坐圍舍溓為度支郎亦奔亡遇渢仍不復肯去渢曰吾為人作吏自不避死汝可去無相守同盡答曰向若不逢兄亦草間苟免今既相逢何忍獨生因以衣帶結兄衣俱見殺何胤聞之歎曰兄死君難弟死兄禍美哉又柳叔夜河東人父宗宋黃門郎叔夜年十六為新野太守甚有名績補遙光咨議參軍及事敗左右扶上馬欲與俱亡答曰吾已許始安以死豈可負之邪遂自殺封延伯字仲連勃海人也世為州郡著姓寓居東海三世同財為北州所宗附延伯好學退讓事寡嫂甚謹垣崇祖為兗州請為長史不就崇祖軾其門不肯相見後為豫州上表薦之詔書優禮起家為平西長史梁郡太守為政清靜有高士風俄以疾免還東海于時四州入魏士子皆依海曲爭往宗之如遼東之仰邴原也建元三年大使巡行天下義興陳玄子四世同居一百七口武陵邵榮興文獻叔並八世同居東海徐生之武陵范安祖李聖伯范道根並五世同居零陵談弘寶衡陽何弘華陽陽黑頭疏從四世同居詔俱表門閭蠲租稅又蜀郡王續祖華陽郝道福並纍世同爨建武三年明帝詔表門蠲調役吳達之義興人也嫂亡無以葬自賣為十夫客以營冢椁從祖弟敬伯夫妻荒年被略賣江北達之有田十畝貨以贖之與同財共宅郡命為主簿固以讓兄又讓世業舊田與族弟弟亦不受田遂間廢齊建元三年詔表門閭先是有蔡曇智鄉里號蔡曾子廬江何伯璵兄弟鄉里號為何展禽並為高士沈顗所重常云聞蔡曇智之風怯夫勇鄙夫有立志聞何伯璵之風偽夫正薄夫厚云伯璵與弟幼璵俱厲節操養孤兄子及長為婚推家業盡與之安貧枯誨人不倦郡守下車莫不修謁伯璵卒幼璵末好佛法翦落長齋持行精苦梁初卒兄弟年八十餘王文殊字令章吳興故鄣人也父沒魏文殊思慕泣血終身蔬食不衣帛服麻縕而已不婚不交人物吳興太守謝糟聘為功曹不就立小屋於縣西端拱其中歲時伏臘月朝十五未嘗不北望長悲如此三十餘年太守孔琇之表其行鬱林詔榜門改所居為孝行里樂頤之字文德南陽涅陽人也世居南郡少而言行和謹仕為京府參軍父在郢病亡頤之忽悲戀涕泣因請假還中路果得父凶問便徒跣號咷出陶家後渚遇商人附載西上水漿不入口數日嘗遇病與母隔壁忍病不言嚙被至碎恐母之哀己也湘州刺史王僧虔引為主簿以同僚非人棄官去吏部郎庾杲之嘗往候頤之為設食唯枯魚菜葅杲之曰我不能食此母聞之自出常膳魚羹數種杲之曰卿過於茅季偉我非郭林宗仕至郢州中從事弟預字文介亦至孝父臨亡執手以託郢州行事王奐預悲感悶絶吐血數升遂發病官至驃騎録事參軍隆昌末預謂丹陽尹徐孝嗣曰外傳藉藉似有伊周之事君蒙武帝殊常之恩荷託付之重恐不得同人此事人笑褚公至今齒冷無為效尤孝嗣故吏吳興沈升之亦説之曰升之與君俱有項領之功今一言而二功俱解豈願聞之乎君受恩二祖而更參惟新之政以君為反覆人事成則無處逃咎矣升之草萊百姓言出禍已隨之孰與超然謝病高枕家園則與松柏比操風霜等烈豈不美邪孝嗣並改容謝之預建武中為永世令人懷其德卒官時有一媼年可六七十擔檞蔌葉造市貨之聞預亡大泣棄溪中曰失樂令我輩孤獨老姥政應就死耳市人亦皆泣其惠化如此江泌字士清濟陽考城人也父亮之員外郎泌少貧晝日斫屧為業夜讀書隨月光光斜則握卷升屋睡極墮地則更登性行仁義衣弊蝨多綿裹置壁上恐蝨飢死乃復置衣中數日間終身無復蝨母亡後以生闕供養遇鮭不忍食菜不食心以其有生意唯食老葉而已母墓為野火所燒依新宮災三日哭淚盡係之以血歷仕南中郎行參軍所給募吏去役得時病莫有舍之者吏扶杖投泌泌自隱恤吏死泌為買棺無僮役兄弟共輿埋之後領國子助教乘牽車至染烏頭見一老公步行下車載之躬自步去染武帝以為南康王子琳侍讀建武中明帝害諸王後泌憂念子琳訪志公道人問其禍福志公覆香爐灰示之曰都盡無餘及子琳被害泌往哭之淚盡續以血親視殯葬畢乃去泌尋卒族人兗州中從事泌黃門郎悆子也與泌同名世謂泌為孝泌以別之庾道愍潁川陵人晉司空冰之玄孫也有孝行頗能屬文少出孤悴時人莫知其所生母流漂交州道愍尚在襁褓及長知之求為廣州綏寧府佐至南而去交州尚遠乃自負擔冒嶮僅得自達及至交州尋求母雖經年日夜悲泣嘗入村日暮雨驟乃寄止一家旦有一嫗負薪外還而道愍心動因訪之乃其母也於是行伏號泣遠近赴之莫不揮淚道愍尤精相板宋明帝時山陽王休祐屢以言語忤顏見道愍託以己板為他物令道愍占之道愍曰此乃甚貴然使人多愆忤休祐以褚彥回詳密求換其板他日彥回侍明帝自稱下官帝多忌甚不悅休祐具以狀言帝乃意解道愍仕齊位射聲校尉族孫沙彌亦以孝行著沙彌晉司空冰之六世孫也父佩玉仕宋位長沙內史升明中坐沈攸之事誅時沙彌始生及年五歲所生母為製采衣輒不肯服母問其故流涕對曰家門禍酷用是何為及長終身布衣蔬食為中軍田曹行參軍嫡母劉氏寢疾沙彌晨昏侍側衣不解帶或應針灸輒以身先試及母亡水漿不入口纍日初進大麥薄飲經十旬方為薄粥終喪不食鹽酢冬日不衣綿纊夏日不解衰絰不出廬戶晝夜號慟鄰人不忍聞所坐薦淚霑為爛墓在新林忽生旅松百許株枝葉鬱茂有異常松劉好噉甘蔗沙彌遂不食焉宗人都官尚書詠表言其狀應純孝之舉梁武帝召見嘉之以補歙令還除輕車邵陵王參軍事隨府會稽復丁所生母憂喪還都濟浙江中流遇風舫將覆沒沙彌抱柩號哭俄而風靜咸以為孝感所致後卒於長城令子持持字元德少孤性至孝父憂居喪過禮篤志好學仕梁為尚書左戶郎後兼建康監陳文帝為吳興太守以為郡丞兼掌書翰天嘉初為尚書左丞封崇德縣子拜封之日請令史為客受其餉遺文帝怒之因坐免後為臨安令坐杖殺人免封還為給事黃門侍郎歷鹽官令祕書監知國史事又為少府卿遷太中大夫領步兵校尉卒持善字書每屬辭好為奇字文士亦以此譏之有集十卷
