body:
  text: 南史卷六十五列傳第五十五陳宗室諸王永修侯擬遂興侯詳宜黃侯慧紀衡陽獻王昌子伯信南康愍王曇朗子方泰方慶文帝諸子宣帝諸子後主諸子永修侯擬字公正陳武帝之疏屬也少孤貧質直強記武帝南征交址擬從焉梁紹泰二年除員外散騎常侍明威將軍以雍州刺史資監南徐州事武帝踐阼廣封宗室詔從子監南徐州擬封永修縣侯北徐州刺史褒封鍾陵縣侯晃封建城縣侯炅封上饒縣侯從孫明威將軍訬封虔化縣侯吉陽縣侯喧仍前封信威將軍祏封豫寧縣侯青州刺史詳封遂興縣侯貞威將軍慧紀封宜黃縣侯敬雅封寧都縣侯敬泰封平固縣侯文帝嗣位擬除丹陽尹坐事以白衣知郡尋復本職卒諡曰定天嘉二年配享武帝廟庭子黨嗣遂興侯詳字文幾少出家為沙門善書記談論清雅武帝討侯景召令還俗配以兵馬從定建鄴永定二年封遂興縣侯天嘉三年纍遷吳州刺史五年討周迪戰敗死之以所統失律無贈諡子正理嗣宜黃侯慧紀字元方武帝之從孫也涉獵書史負材任氣從武帝平侯景及帝踐阼封宜黃縣侯除黃門侍郎太建十年吳明徹北侵敗績以慧紀為緣江都督兗州刺史至德二年為都督荊州刺史及梁安平王蕭巖晉熙王蕭瓛等詣慧紀請降慧紀以兵迎之以應接功位開府儀同三司禎明三年隋師濟江慧紀率將士三萬人船艦千餘乘沿江而下欲趣臺城遣南康太守呂肅將兵據巫峽以五條鐵鎖橫江肅竭其私財以充軍用隋將楊素奮兵擊之四十餘戰爭馬鞍山及磨刀澗守險隋軍死者五千餘人陳人盡取其鼻以求功賞既而隋軍屢捷獲陳之士三縱之肅乃遁保延洲別帥廖世寵領大舫詐降欲燒隋艦更決一死戰於是有五黃龍備衆色各長十餘丈驤首連接順流而東風浪大起雲霧晦冥陳人震駭不覺火自焚隋軍乘高艦張大弩以射之陳軍大敗風浪應時頓息肅收餘衆東走慧紀時至漢口為隋秦王俊拒不得進聞肅敗盡燒公安之儲僞引兵東下因推湘州刺史晉熙王叔文為盟主水軍都督周羅與郢州刺史荀法尚守江夏及建鄴平隋晉王廣遣一使以慧紀子正業來喻又使樊毅喻羅其上流城戍悉解甲於是慧紀及巴州刺史畢寶並慟哭俱降慧紀入隋依例授儀同三司卒子正平頗有文學衡陽獻王昌字敬業武帝第六子也梁太清末武帝南征李賁命昌與宣后隨沈恪還吳興及武帝東討侯景昌與宣后文帝並為景囚景平拜長城國世子吳興太守時年十六昌容貌偉麗神情秀朗雅性聰辨明習政事武帝遣陳郡謝哲濟陽蔡景歷輔昌臨郡又遣吳郡杜之偉授昌以經昌讀書一覽便誦明於義理剖析如流尋與宣帝俱往荊州魏剋荊州又與宣帝俱遷長安武帝即位頻遣使請宣帝及昌周人許而未遣及武帝崩乃遣之時王琳作梗中流昌不得還居于安陸王琳平後天嘉元年二月昌發自安陸由魯山濟江而巴陵王蕭沇等率百僚上表請以昌為湘州牧封衡陽郡王詔曰可三月甲戌入境詔令主書舍人緣道迎接丙子濟江於中流殞之使以溺告四月庚寅喪柩至都上親臨哭乃下詔贈假黃鉞都督中外諸軍事太宰揚州牧葬送之儀一依漢東平憲王齊豫章文獻王故事諡曰獻無子文帝以第七皇子伯信嗣伯信字孚之位西衡州刺史及隋師濟江與臨汝侯方慶並為東衡州刺史王勇所害南康愍王曇朗武帝母弟忠壯王休先之子也休先少倜儻有大志梁簡文之在東宮深被知遇為文德主帥頃之卒敬帝即位追贈南徐州刺史封武康縣公武帝受禪贈司徒封南康郡王諡曰忠壯曇朗少孤尤為武帝所愛有膽力善綏御侯景平後起家著作郎武帝誅王僧辨留曇朗鎮京口知留府事紹泰元年除中書侍郎監南徐州二年齊兵攻逼建鄴因請和求武帝子姪為質時四方州郡並多未賓本根虛弱糧運不繼在朝文武咸願與齊和親武帝難之而重違衆議乃決遣曇朗恐曇朗憚行或當奔竄乃自率步騎往京口迎之使質於齊齊背約遣蕭軌等隨徐嗣徽度江武帝大破之虜蕭軌東方老等誅之齊人亦害曇朗于晉陽時陳與齊絶弗之知武帝踐阼猶以曇朗襲封南康郡王奉忠壯王祀禮秩一同皇子天嘉二年齊人結好始知其亡文帝詔贈開府儀同三司南徐州刺史諡曰愍乃遣兼郎中令隨聘使江德藻迎曇朗喪柩三年春至都初曇朗未質於齊生子方泰方慶及將適齊以二妾自隨在北又生二子方華方曠亦同得還方泰少粗獷與諸惡少年羣聚游逸無度文帝以南康王故特寬宥之天嘉二年以為南康王世子及聞曇朗薨於是襲爵南康王太建四年為都督廣州刺史為政殘暴為有司奏免六年授豫章內史在郡不修政事秩滿之際屢放部曲為劫又縱火延燒邑居因行暴掠驅録富人徵求財賄代至又淹留不還至都以為宗正卿未拜為御史中丞宗元饒所劾免官以王還第十一年起為寧遠將軍直殿省尋加散騎常侍其年八月宣帝幸大壯觀因大閲武命都督任忠領步騎十萬陳於玄武湖都督陳景領樓艦五百出於瓜步江上登玄武門觀宴羣臣以觀之因幸樂游苑設絲竹會仍重幸大壯觀集衆軍振旅而還時方泰當從啓稱所生母疾不行因與亡命楊鍾期等二十人微行往人間淫淳于岑妻為州長流所録又率人仗抗拒傷損禁司為有司所奏上大怒下方泰獄方泰初承行淫不承拒格禁司上曰不承則上測方泰乃投列承引於是兼御史中丞徐君整奏請解方泰所居官下宗正削爵土上可其奏禎明初為侍中陳亡與後主俱入長安隋大業中為掖縣令方慶少清警涉獵書傳及長有幹略天嘉中封臨汝縣侯至德二年纍遷智武將軍武州刺史初廣州刺史馬靖久居嶺表大得人心士馬強盛朝廷疑之以方慶為廣州刺史以兵襲靖靖誅進號宣毅將軍方慶性清謹甚得人和禎明三年隋師濟江都督東衡州刺史王勇徵兵於方慶欲與赴援臺城時隋行軍總管韋洸帥兵度嶺宣隋文帝敕云若嶺南平定留勇與豐州刺史鄭萬頃且依舊職方慶聞之恐勇賣己且欲觀變乃不從勇使高州刺史戴智烈斬方慶於廣州而收其兵鄭萬頃滎陽人梁司州刺史紹叔之始族子也父旻梁末入魏萬頃通達有材幹周武帝時為司城大夫出為溫州刺史至德中與司馬消難奔陳拜散騎常侍昭武將軍豐州刺史在州甚有惠政吏人表請立碑詔許焉初萬頃在周甚被隋文帝知遇及隋文帝踐阼常思還北及王勇殺方慶萬頃乃率州兵拒勇降隋隋授上儀同尋卒文帝十三男沈皇后生廢帝始興王伯茂嚴淑媛生鄱陽王伯山晉安王伯恭潘容華生新安王伯固劉昭華生衡陽王伯信王充華生廬陵王伯仁張修容生江夏王伯義韓修華生武陵王伯禮江貴妃生永陽王伯智孔貴妃生桂陽王伯謀二男早卒無名伯信出繼衡陽王昌始興王伯茂字鬱之文帝第二子也初武帝兄始興昭烈王道談仕梁為東宮直閣將軍侯景之亂援臺中流矢卒太平二年贈南兗州刺史封長城縣公諡曰昭烈武帝受禪重贈太傅改封始興郡王道談生文帝及宣帝宣帝以梁承聖末遷於長安至是武帝遙以宣帝襲封始興嗣王以奉昭烈王祀武帝崩文帝入纂帝位時宣帝在周未還文帝以本宗乏饗徙封宣帝為安成王封伯茂為始興王以奉昭烈王祀賜天下為父後者爵一級舊制諸王受封未加戎號者不置佐史於是尚書八坐奏加伯茂寧遠將軍置佐史除揚州刺史伯茂性聰敏好學謙恭下士又以太子母弟文帝深愛重之時軍人於丹徒盜發晉郗曇墓大獲晉右軍將軍王羲之書及諸名賢遺跡事覺其書並沒縣官藏于祕府文帝以伯茂好古多以賜之由是伯茂大工草隸書甚得右軍法遷東揚州刺史鎮東將軍開府儀同三司廢帝時伯茂在都劉師知等矯詔出宣帝伯茂勸成之師知等誅後宣帝恐伯茂扇動朝廷乃進號中衛將軍令入居禁中專與廢帝游處時四海之望咸歸宣帝伯茂深不平數肆惡言宣帝以其無能不以為意及建安人蔣裕與韓子高等謀反伯茂並陰豫其事光大二年皇太后令黜廢帝為臨海王其日又下令降伯茂為溫麻侯時六門之外有別館以為諸王冠昏之所名為昏第至是命伯茂出居之宣帝遣盜殞之於車中年十八鄱陽王伯山字靜之文帝第三子也偉容儀舉止間雅喜慍不形於色武帝時天下草創諸王受封儀注多闕及伯山受封文帝欲重其事天嘉元年七月丙辰尚書八坐奏封鄱陽郡王乃遣度支尚書蕭睿持節兼太宰告于太廟又遣五兵尚書王質持節兼太宰告于太社其年十月上臨軒策命策訖令王公以下並宴於王第六年為緣江都督平北將軍南徐州刺史宣帝輔政不欲令伯山處邊光大元年徙為東揚州刺史纍遷征南將軍護軍將軍加開府儀同三司給鼓吹并扶伯山性寬厚美風儀又於諸王最長後主深敬重之每朝庭有冠昏饗宴使為主及遭所生憂居喪以孝聞後主嘗幸吏部尚書蔡徵宅因往弔之伯山號慟殆絶因為鎮衛將軍乃謂羣臣曰鄱陽王至性可嘉又是西第之長豫章已兼司空其亦須遷太尉未及發詔禎明三年薨尋屬陳亡遂無贈諡長子君範未襲爵而隋師至時宗室王侯在都者百餘人後主恐其為變乃並召入屯朝堂使豫章王叔英總督之又陰為之備六軍敗績相率出降因從後主入長安隋文帝並配隴右及河西諸州各給田業以處之大業二年隋煬帝以後主第六女婤為貴人絶愛幸因召陳氏子弟盡還京師隨才用由是並為守宰遍於天下君範位溫縣令新安王伯固字牢之文帝第五子也生而龜胸目通睛揚白形狀眇小而俊辨善言論天嘉六年立為新安郡王太建七年纍遷都督南徐州刺史伯固性嗜酒不好積聚所得祿奉用度無節酣醉以後多所乞丐於諸王中最為貧窶宣帝每矜之特加賞賜性輕率好行鞭捶在州不知政事日出田獵或乘眠輿至於草間輒呼人從游動至旬日所捕麞鹿多使生致宣帝頗知之遣使責讓者數矣十年為國子祭酒頗知玄理而墯業無所通至於擲句問難往往有奇意為政嚴苛國學有墯游不修習者重加檟楚生徒懼焉由是學業頗進十三年為都督揚州刺史後主初在東宮與伯固甚親狎伯固又善謿謔宣帝每宴集多引之叔陵在江州心害其寵陰求瑕疵將中以法及叔陵入朝伯固懼罪諂求其意乃共訕毀朝賢歷詆文武雖耆年高位皆面折無所畏忌伯固性好射雉叔陵又好開發冢墓出游田野必與偕行於是情好大協遂謀不軌伯固侍禁中每有密語必報叔陵及叔陵奔東府遣使告之伯固單馬馳赴助叔陵指麾知事不捷便欲走會四門已閉不得出因趣白楊道臺馬容至為亂兵所殺尸於東昌館門時年二十八詔特許以庶人禮葬子及所生王氏並特宥為庶人國除晉安王伯恭字肅之文帝第六子天嘉六年封尋為吳郡太守時年十餘歲便留心政事官曹緝理歷位尚書左僕射後為中衛將軍右光祿大夫陳亡入長安大業初為成州刺史太常少卿廬陵王伯仁字壽之文帝第八子天嘉六年立為侍中國子祭酒領太子中庶子陳亡卒于長安江夏王伯義字堅之文帝第九子天嘉六年封位金紫光祿大夫陳亡入長安遷於瓜州道卒武陵王伯禮字用之文帝第十子天嘉六年立太建初為吳興太守在郡恣行暴掠後為有司所劾十一年被代徵還遂遷延不發為御史中丞徐君整所劾免陳亡入長安大業中為臨洮太守永陽王伯智字策之文帝第十二子少敦厚有器局博涉經史太建中立纍遷尚書左僕射後為特進陳亡入長安大業中為國子司業桂陽王伯謀字深之文帝第十三子太建中立位散騎常侍薨子酆大業中為番禾令宣帝四十二男柳皇后生後主彭貴人生始興王叔陵曹淑華生豫章王叔英何淑儀生長沙王叔堅宜都王叔明魏昭華生建安王叔卿錢貴妃生河東王叔獻劉昭儀生新蔡王叔齊袁昭容生晉熙王叔文義陽王叔達新會王叔坦王姬生淮南王叔彪巴山王叔雄吳姬生始興王叔重徐姬生尋陽王叔儼淳于姬生嶽陽王叔慎王修華生武昌王叔虞韋修容生湘東王叔平施姬生臨賀王叔敖沅陵王叔興曾姬生陽山王叔宣楊姬生西陽王叔穆申婕妤生南安王叔儉南郡王叔澄嶽山王叔韶太原王叔匡袁姬生新興王叔純吳姬生巴東王叔謨劉姬生臨海王叔顯秦姬生新寧王叔隆新昌王叔榮其皇子叔睿叔忠叔泓叔毅叔訓叔武叔處叔封八人並未及封三子早卒無名始興王叔陵字子嵩宣帝之第二子也梁承聖中生於江陵魏剋江陵宣帝遷關右叔陵留穰城宣帝之還以後主及叔陵為質天嘉三年隨後主還朝封康樂縣侯叔陵少機辨狥聲名強梁無所推屈太建元年封始興王奉昭烈王祀位都督江州刺史時年十六政自己出僚佐莫預焉性嚴刻部下懾憚諸公子姪及罷縣令長皆逼令事己豫章內史錢法成詣府進謁即配其子季卿將領馬仗季卿慚不時至叔陵大怒侵辱法成法成憤怨自縊而死州縣非其部內亦徵攝案之朝貴及下吏有乖忤者輒誣奏其罪陷以重辟四年遷都督湘州刺史諸州鎮聞其至皆震恐股栗叔陵日益橫征伐夷獠所得皆入己絲毫不以賞賜徵求役使無有紀極夜常不臥執燭達曉呼召賓客說人間細事戲謔無所不為性不飲酒唯多置肴胾晝夜食噉而已自旦至中方始寢寐曹局文案非呼不得輒白笞罪者皆繫獄動數年不省視瀟湘以南皆逼為左右里殆無遺者其中脫有逃竄輒殺其妻子州縣無敢上言宣帝弗之知九年除都督揚州刺史十年至都加扶給油幢車叔陵居東府事務多關涉省閣執事之司承意順旨即諷上進用之微致違忤必抵大罪重者至殊死道路藉藉皆言其有非常志叔陵修飾虛名每入朝常於車中馬上執卷讀書高聲長誦陽陽自若歸坐齊中或自執斧斤為沐猴百戲又好游冢墓間遇有塋表主名可知者輒命左右發掘取其石志古器并骸骨肘脛持為玩弄藏之府庫人間少妻處女微有色貌者並即逼納十一年丁所生母彭氏憂去職頃之起為本職晉世王公貴人多葬梅嶺及彭氏卒叔陵啓求梅嶺葬之乃發故太傅謝安舊墓棄去安柩以葬其母初喪日僞為哀毀自稱刺血寫涅槃經未及十旬乃日進甘膳又私召左右妻女與之姦合所作尤不軌侵淫上聞宣帝責御史中丞王政以不舉奏免政官又黜其典籤親事仍加鞭捶宣帝素愛叔陵不繩以法但責讓而已服闋又為侍中中軍大將軍及宣帝不豫後主諸王並入侍疾叔陵陰有異志命典藥吏礪切藥刀及倉卒之際又命左右取劍左右不悟乃取朝服所佩木劍以進叔陵怒及翌日小斂後主哀頓俯伏叔陵以銼藥刀斫後主中項太后馳來救焉叔陵又斫太后數下後主乳媼樂安君吳氏時在太后側自後掣肘後主因得起叔陵仍持後主衣後主自奮得免長沙王叔堅以手扼叔陵奪去其刀仍牽就柱以其褶袖縛之棄池水中將殺之問後主曰即盡之為待也時吳媼已扶後主避賊叔堅求後主所在將受命叔陵多力因奮袖得脫突出雲龍門馳車還東府呼其甲士斷青溪橋道放東城囚以充戰士又遣人往新林追所部兵馬仍自被甲著白帽登城西門招募百姓散金銀以賞賜外召諸王將帥無有應者唯新安王伯固聞而赴之叔陵聚兵僅得千人欲據城保守時衆軍並緣江防守臺內空虛叔堅白太后使太子舍人司馬申急召右衛將軍蕭摩訶將兵至府西門叔陵事急遣記室韋諒送鼓吹與摩訶謂曰事捷以公為台鼎摩訶紿報曰須王心膂節將自來方敢從命叔陵即遣戴洫談騏驎二人詣摩訶摩訶執以送臺斬於閣道下持其首徇東城仍懸於朱雀門叔陵自知不濟遂入沈其妃張氏及寵妾七人于井中叔陵有部下兵先在新林於是率人馬數百自小航度欲趣新林以舟艦入北行至白楊路為臺軍所邀伯固見兵至旋避入巷叔陵拔刀追之伯固復還叔陵部下多棄甲潰散摩訶馬容陳智深迎刺叔陵閹豎王飛禽斫之數十下馬容陳仲華就斬首送臺自寅至巳乃定尚書八坐奏請依宋世故事流尸江中汙瀦其室并毀其所生彭氏墳廟還謝氏之塋後主從所奏叔陵諸子即日並賜死豫章王叔英字子烈宣帝第三子也寬厚仁愛太建元年封後位司空隋大業中位涪陵太守卒長沙王叔堅字子成宣帝第四子也母本吳中酒家婢相者言當生貴子宣帝微時因飲通焉生叔堅及貴召拜淑儀叔堅少而嚴整又頗使酒兄弟憚之好數術卜筮風角鎔金琢玉並究其妙初封豐城侯太建元年封纍遷丹陽尹初叔堅與始興王叔陵並招聚賓客各爭權寵甚不平每朝會鹵簿不肯為先後必分道而趨左右或爭道而鬬至有死者及宣帝不豫叔堅與叔陵等並從後主侍疾叔陵陰有異志叔堅疑之微伺其所為及行逆賴叔堅以免以功進驃騎將軍開府儀同三司揚州刺史尋遷司空將軍刺史如故時後主患創不能視事政無大小悉決于叔堅權傾朝廷後主由是疏忌之孔範管斌施文慶等並東宮舊臣日夕陰持其短至德元年乃詔令即本號用三司之儀出為江州刺史未發尋以為司空實欲奪其權又陰令人造其厭魅刻木為偶人衣以道士服施機關能拜跪晝夜於星月下醮之祝詛於上又令人上書告其事案驗令實後主召叔堅囚于西省將黜之令近侍宣敕數之叔堅自陳為佞人所構死日慚見叔陵後主感其前功乃赦之免所居官以王還第後位中軍大將軍開府儀同三司荊州刺史秩滿還都陳亡入隋遷于瓜州叔堅素貴不知家人生産至是與妃沈氏酣酒不以耕種為事大業中為遂寧郡守卒建安王叔卿字子弼宣帝第五子也性質直有材器容貌甚偉太建四年立位中書監陳亡入隋大業中為都官郎上黨通守宜都王叔明字子昭宣帝第六子也儀容美麗舉止和柔狀似婦人太建五年立位侍中陳亡入隋大業中為鴻臚少卿河東王叔獻字子恭宣帝第九子也性恭謹聰敏好學太建五年立位南徐州刺史薨贈司空諡康簡子孝寬嗣隋大業中為汶城令新蔡王叔齊字子肅宣帝第十一子也風采明贍博涉經史善屬文太建七年立位侍中陳亡入隋大業中為尚書主客郎晉熙王叔文字子才宣帝第十二子也性輕險好虛譽頗涉書史太建七年立位都督湘州刺史徵為侍中未還而隋軍濟江隋秦王至漢口時叔文自湘州還朝至巴州乃率巴州刺史畢寶等請降致書於秦王王遣使往巴州迎勞叔文叔文與畢寶荊州刺史陳慧紀及文武將吏赴漢口秦王並厚待之及至京隋文帝坐于廣陽門觀叔文從後主至朝堂文帝使內史令李德林宣旨責其君臣不能相弼以致喪亡後主與其羣臣並愧懼拜伏莫能仰視叔文獨欣然有自得志後上表陳在巴州先送款望異常例文帝嫌其不忠而方懷柔江表遂授開府宜州刺史淮南王叔彪字子華宣帝第十三子也少聰慧善屬文太建八年立位侍中入隋卒于長安始興王叔重字子厚宣帝第十四子也性質朴無伎藝宣帝崩始興王叔陵為逆誅其年立叔重為始興王以奉昭烈王後位江州刺史隋大業中為太府少卿尋陽王叔儼字子思宣帝第十五子也性凝重舉止方正後主即位立位侍中入隋卒嶽陽王叔慎字子敬宣帝第十六子也少聰敏十歲能屬文太建十四年立至德中為丹陽尹時後主尤愛文章叔慎與衡陽王伯信新蔡王叔齊等日夕陪侍賦詩被嗟賞禎明元年出為湘州刺史加都督及隋師濟江清河公楊素兵下荊門遣將龐暉略地至湘州州內將士剋日請降叔慎置酒會文武酒酣歎曰君臣之義盡於此乎長史謝基伏而流涕湘州助防遂興侯正理在坐起曰主辱臣死諸君獨非陳國臣乎縱其無成猶見臣節青門之外有死不能今日後應者斬衆咸許諾乃刑牲結盟遣人詐奉降書於龐暉叔慎伏甲待之暉入伏兵發縛暉等以徇皆斬之叔慎招士衆數日中兵至五千人隋遣內陽公薛胄為湘州刺史聞龐暉死乃益請兵隋又遣行軍總管劉仁恩救之未至薛胄禽叔慎秦王斬之漢口義陽王叔達字子聰宣帝第十七子也太建十四年立位丹陽尹入隋大業中為內史舍人絳郡通守武德中位侍中封江國公歷禮部尚書卒巴山王叔雄字子猛宣帝第十八子也太建十四年立入隋卒于長安武昌王叔虞字子安宣帝第十九子也太建十四年立入隋大業中為高苑令湘東王叔平字子康宣帝第二十子也至德元年立入隋大業中為胡蘇令臨賀王叔敖字子仁宣帝第二十一子也至德元年立入隋大業中位儀同三司陽山王叔宣字子通宣帝第二十二子也至德元年立入隋大業中為涇城令西陽王叔穆字子和宣帝第二十三子也至德元年立入隋卒于長安南安王叔儉字子約宣帝第二十四子也至德元年立入隋卒于長安南郡王叔澄字子泉宣帝第二十五子也至德元年立入隋大業中為靈武令沅陵王叔興字子推宣帝第二十六子也至德元年立入隋大業中為給事郎嶽山王叔韶字子欽宣帝第二十七子也至德元年立位丹陽尹入隋卒于長安新興王叔純字子洪宣帝第二十八子也至德元年立入隋大業中為河北令巴東王叔謨字子軌宣帝第二十九子也至德四年立入隋大業中為汧陽令臨海王叔顯字子亮宣帝第三十子也至德四年立入隋大業中為鶉觚令新會王叔坦字子開宣帝第三十一子也至德四年立入隋大業中為涉縣令新寧王叔隆字子遠宣帝第三十二子也至德四年立入隋卒于長安新昌王叔榮字子徹宣帝第三十三子也禎明二年立入隋大業中為內黃令太原王叔匡字子佐宣帝第三十四子也禎明二年立入隋大業中為壽光令後主二十二男張貴妃生太子深會稽王莊孫姬生吳興王胤高昭儀生南平王嶷呂淑媛生永嘉王彥邵陵王兢龔貴嬪生南海王虔錢唐王恬張淑華生信義王祗徐淑儀生東陽王恮孔貴人生吳郡王藩其皇子總觀明綱統沖洽縚綽威辨十一人並未及封太子深字承源後主第四子也少聰慧有志操容止儼然左右近侍未嘗見其喜慍以母張貴妃故特為後主所愛至德元年封始安王位揚州刺史禎明二年皇太子胤廢後主乃立深為皇太子隋師濟江隋將韓擒自南掖門入百僚奔散深時年十餘歲閉閣而坐舍人孔伯魚侍隋軍排閣入深使宣令勞之曰軍旅在道不乃勞也軍人咸致敬焉隋大業中為枹罕太守武德初為祕書丞卒官吳興王胤字承業後主長子也太建五年二月乙丑生於東宮母孫姬因産卒沈皇后哀而養之以為己子後主年長未有嗣宣帝命以為嫡孫詔為父後者賜爵一級十年封永康公後主即位為皇太子胤性聰敏好學執經肄業終日不倦博通大義兼善屬文時張貴妃孔貴嬪並愛幸沈皇后無寵日夜構成后及太子之短孔範之徒又於外合成其事禎明二年廢為吳興王加侍中中衛將軍入隋卒于長安南平王嶷字承嶽後主第二子也方正有器局年數歲風采舉動有若成人至德元年立位揚州刺史遷都督郢州刺史入隋卒于長安永嘉王彥字承懿後主第三子也至德元年立位都督江州刺史入隋大業中為襄武令南海王虔字承恪後主第五子也至德元年立位南徐州刺史入隋大業中為涿令信義王祗字承敬後主第六子也至德元年立位琅邪彭城二郡太守入隋大業中為通議郎邵陵王兢字承檢後主第七子也禎明元年立入隋大業中為國子監丞會稽王莊字承肅後主第八子也容貌蕞陋性嚴酷數歲時左右有不如意輒剟刺其面或加燒性嗜酒愛博以母張貴妃寵後主甚愛之至德四年立位揚州刺史入隋大業中為昌隆令東陽王恮字承厚後主第九子也禎明二年立入隋大業中為通議郎吳郡王藩字承廣後主第十子也禎明二年封隋大業中為任城令錢唐王恬字承惔後主第十一子也禎明二年封入隋卒于長安江左承西晉諸王開國並以戶數相差為大小三品大國置上中下三將軍又置司馬一人次國置中下二將軍小國置將軍一人餘官亦準此為差武帝受命自永定訖于禎明唯衡陽王昌特加禮命至五千戶自餘大國不過二千小國則千戶云論曰有陳受命雖疆土日蹙然封建之典無革先王永修等並以疏屬列居蕃屏慧紀始終之迹其殆優乎衡陽南康地皆懿戚提攜以殞惟命也夫文宣二帝諸子不一鄱陽嶽陽風迹可紀古所謂維城盤石叔慎其近之乎
