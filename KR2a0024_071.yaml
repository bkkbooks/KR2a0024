body:
  text: 南史卷七十一列傳第六十一儒林伏曼容子子挺何佟之嚴植之司馬筠卞華崔靈恩孔僉盧廣沈峻太史叔明峻子文阿孔子袪皇侃沈洙戚衮鄭灼張崖陸詡沈德威賀德基全緩張譏顧越龔孟舒沈不害王元規陸慶蓋今之儒者本因古之六學以弘風正俗斯則王政之所先也自秦氏坑焚其道用缺及漢武帝時開設學校立五經博士置弟子員射策設科勸以官祿傳業者故益衆矣其後太學生徒動至萬數郡國黌舍悉皆充滿其學於山澤者或就而為列肆焉故自兩漢登賢咸資經術洎魏正始以後更尚玄虛公卿士庶罕通經業時荀顗摯虞之徒雖議創制未有能易俗移風者也自是中原橫潰衣冠道盡逮江左草創日不暇給以迄宋齊國學時或開置而勸課未博建之不能十年蓋取文具而已是時鄉里莫或開館公卿罕通經術朝廷大儒獨學而弗肯養衆後生孤陋擁經而無所講習大道之鬱也久矣乎至梁武創業深愍其弊天監四年乃詔開五館建立國學總以五經教授置五經博士各一人於是以平原明山賓吳郡陸璉吳興沈峻建平嚴植之會稽賀瑒補博士各主一館館有數百生給其餼稟其射策通明經者即除為吏於是懷經負笈者雲會矣又選學生遣就會稽雲門山受業於廬江何胤分遣博士祭酒到州郡立學七年又詔皇太子宗室王侯始就學受業武帝親屈輿駕釋奠於先師先聖申之以讌語勞之以束帛濟濟焉洋洋焉大道之行也如是及陳武創業時經喪亂衣冠殄瘁寇賊未寧敦奬之方所未遑也天嘉以後稍置學官雖博延生徒成業蓋寡其所采綴蓋亦梁之遺儒今並集之以備儒林云伏曼容字公儀平昌安丘人晉著作郎滔之曾孫也父胤之宋司空主簿曼容早孤與母兄客居南海少篤學善老易倜儻好大言常云何晏疑易中九事以吾觀之晏了不學也故知平叔有所短聚徒教授以自業為驃騎行參軍宋明帝好周易嘗集朝臣於清暑殿講詔曼容執經曼容素美風采明帝以方嵇叔夜使吳人陸探微畫叔夜像以賜之為尚書外兵郎嘗與袁粲罷朝相會言玄理時論以為一臺二絕昇明末為輔國長史南海太守至石門作貪泉銘齊建元中上書勸封禪高帝以為其禮難備不從仕為太子率更令侍皇太子講衞將軍王儉深相愛好令與河內司馬憲吳郡陸澄共撰喪服義及竟又欲與定禮樂會儉薨建武中拜中散大夫時明帝不重儒術曼容宅在瓦官寺東施高坐於聽事有賓客輒升高坐為講說生徒常數十百人梁臺建召拜司徒司馬出為臨海太守天監元年卒官年八十二曼容多伎術善音律射馭風角醫算莫不閑了為周易毛詩喪服集解老莊論語義子字玄曜幼傳父業能言玄理與樂安任昉彭城劉曼俱知名仕齊位東陽郡丞鄞令時曼容已致仕故頻以外職處令得養焉梁武帝踐阼兼五經博士與吏部尚書徐勉中書侍郎周捨總知五禮事出為永陽內史在郡清潔政務安靜郡人何貞秀等一百五十四人詣州言狀湘州刺史以聞詔勘有十五事為吏人所懷帝善之徙新安太守在郡清恪如永陽時人賦稅不登者輒以太守田米助之郡多麻苧家人乃至無以為繩其厲志如此屬縣始新遂安海寧並同時生為立祠徵為國子博士領長水校尉時始興內史何遠累著清績武帝擢為黃門侍郎俄遷信武將軍監吳郡事自以名輩素在遠前為吏俱稱廉白遠累見擢循階而已意望不滿多託疾居家尋求假到東陽迎妹喪因留會稽築宅自表解職詔以為豫章內史乃出拜書侍御史虞奏曰風聞豫章內史伏去歲啟假以迎妹喪為辭因停會稽不去入東之始貨宅賣車以此而推則是本無還意歷典二邦少免貪濁此自為政之本豈得稱功常謂人才品望居何遠之右而遠以清見擢名位轉隆深懷誹怨形於辭色天高聽卑無私不照去年十二月二十一日下詔曰國子博士領長水校尉伏為政廉平宜加將養勿使恚望致虧士風可豫章內史豈有人臣奉如此之詔而不亡魂破膽歸罪有司而冒寵不辭吝斯苟得故以士流解體行路沸騰辨跡求心無一可恕請以大不敬論有詔勿論遂得就郡徵為給事黃門侍郎領國子博士未赴卒初父曼容與樂安任遙皆昵於齊太尉王儉遙子昉及並見知頃之昉才遇稍盛齊末已為司徒左長史獨滯於參軍事及終名位略相侔性儉素車服粗惡外雖退靜內不免心競故見譏於時然能推薦後來常若不及少年士子或以此依之子挺挺字士標幼敏悟七歲通孝經論語及長博學有才思為五言詩善効謝康樂體父友樂安任昉深相歎異常曰此子日下無雙齊末州舉秀才對策為當時第一梁武帝師至挺迎謁於新林帝見之甚悅謂之顏子引為征東行參軍時年十八天監初除中軍參軍事居宅在潮溝於宅講論語聽者傾朝挺三世同時聚徒教授罕有其比累為晉陵武康令罷縣還仍於東郊築室不復仕挺少有盛名又善處當世朝中勢素多與交游故不能久事隱靜後遂出仕除南臺書侍御史因事納賄被劾懼罪乃變服出家名僧挺久之藏匿後遇赦乃出天心寺會邵陵王為江州挻之鎮王好文義深被恩禮挺不堪蔬素因此還俗侯景亂中卒著邇說十卷文集二十卷子知命以其父宦途不進怨朝廷後遂盡心侯景襲郢州圍巴陵軍中書檄皆其文也言及西臺莫不劇筆及景篡位為中書舍人權傾內外景敗被送江陵於獄幽死挺弟捶亦有才名為邵陵王記室參軍何佟之字士威廬江灊人晉豫州刺史惲六世孫也祖邵之宋員外散騎常侍父歆齊奉朝請佟之少好三禮師心獨學強力專精手不輟卷讀禮論三百餘篇略皆上口太尉王儉雅相推重起家揚州從事仍為總明館學士仕齊初為國子助教為諸生講喪服結草為絰屈手巾為冠諸生有未曉者委曲誘誨都下稱其醇儒建武中為鎮北記室參軍侍皇太子講時步兵校尉劉瓛徵士吳苞皆已卒都下碩儒唯佟之而已當時國家吉凶禮則皆取決焉後為驃騎司馬永元末都下兵亂佟之常集諸生講論孜孜不怠性好潔一日之中洗滌者十餘過猶恨不足時人稱為水淫有至性父母亡後常設一屋晦朔拜伏流涕如此者二十餘年當世服其孝行于時又有遂安令劉澄為性彌潔在縣掃拂郭邑路無橫草水翦蟲穢百姓不堪命坐免官然甚貞正善醫術與徐嗣伯埒名子聰能世其家業佟之自東昏即位以其兇虐乃謝病終身不涉其流梁武帝踐阼以為尚書左丞時百度草創佟之依禮定議多所裨益天監二年卒官故事左丞無贈官者帝特詔贈黃門侍郎儒者榮之所著文章禮議百許篇子朝隱朝晦嚴植之字孝源建平秭歸人也少善莊老能玄言精解喪服孝經論語及長徧習鄭氏禮周易毛詩左氏春秋性淳孝謹厚不以所長高人少遭父憂因菜食二十三載仕齊為廣漢王國右常侍仍侍王讀及王誅國人莫敢視植之獨奔哭手營殯斂徒跣送喪墓所為起冢葬畢乃還當時義之後為康樂令植之在縣清白人吏稱之梁天監二年詔求通儒修五禮有司奏植之主凶禮四年初置五經博士各開館教授以植之兼五經博士植之館在潮溝生徒常百數講說有區段次第析理分明每當登講五館生畢至聽者千餘人遷中撫記室參軍猶兼博士卒於館植之自疾後便不受稟奉妻子困乏及卒喪無所寄生徒為市宅乃得成喪植之性慈仁好行陰德在闇室未嘗怠也少嘗山行見一患者問其姓名不能答載與俱歸為營醫藥六日而死為棺斂殯之卒不知何許人也又嘗緣柵塘行見患人臥塘側問之云姓黃家本荊州為人傭賃疾篤船主將發棄之于岸植之惻然載還療之經年而愈請終身充奴僕以報厚恩植之不受遺以資糧遣之所撰凶禮儀注四百七十九卷司馬筠字貞素河內溫人也晉譙王承七代孫祖亮宋司空從事中郎父端字敬文齊奉朝請始安王遙光使掌文記遙光之敗曹武入城見之端曰身蒙始安厚恩君宜見殺武叱令速去答曰死生命也君見事不捷便以義師為賊武捨之去尋兵至見殺筠少孤貧好學師沛國劉瓛強力專精深為瓛所器及長博通經術尤明三禮梁天監初為暨陽令有清績入拜尚書祠部郎七年安成國太妃陳氏薨江州刺史安成王秀荊州刺史始興王憺並以慈母表解職詔不許還攝本任而太妃在都喪祭無主中書舍人周捨議曰賀彥先稱慈母之子不服慈母之黨婦又不從夫而服慈姑小功服無從故也庾蔚之云非徒子不從母而服其黨孫又不從父而服其慈母由斯而言慈祖母無服明矣尋門內之哀不容自同於常案父之祥禫子並受弔今二王諸子宜以成服日單衣一日為位受弔制曰二王在遠世子宜攝祭事捨又曰禮云縞冠玄武子姓之冠則世子衣服宜異於常可著細布衣絹為領帶三年不聽樂又禮及春秋庶母不世祭蓋謂無王命者耳吳太妃既朝命所加得用安成禮秩則當祔廟五世親盡乃毀陳太妃命數之重雖則不異慈孫既不從服廟食理無傳祀子祭孫止是會經文武帝由是敕禮官議皇子慈母之服筠議宋朝五服制皇子服訓養母依禮庶母慈己宜從小功之制案曾子問云子游曰喪慈母如母禮歟孔子曰非禮也古者男子外有傅內有慈母君命所使教子也何服之有鄭玄注云此指謂國君之子也若國君之子不服則王者之子不服可知又喪服經云君子子為庶母慈己者傳曰君子子者貴人子也鄭玄引內則三母止施於卿大夫以此而推則慈母之服上不在五等之嗣下不逮三士之息儻其服者止卿大夫尋諸侯之子尚無此服況乃施之皇子謂宜依禮刊除以反前代之惑武帝以為不然曰禮言慈母凡有三條一則妾子之無母使妾之無子者養之命為母子服以三年喪服齊衰章所言慈母如母是也二則嫡妻之子無母使妾養之慈撫隆至雖均乎慈愛但嫡妻之子妾無為母之義而恩深事重故服以小功喪服小功章所以不直言慈母而云庶母慈己者明異於三年之慈母也其三則子非無母正是擇賤者視之義同師保而不無慈愛故亦有慈母之名師保既無其服則此慈母亦無服矣內則云擇於諸母與可者使為子師其次為慈母其次為保母此其明文此言擇諸母是擇人而為此三母非謂擇取兄弟之母也何以知之若是兄弟之母其先有子者則是長妾長妾之禮實有殊加何容次妾生子乃退成保母斯不可也又有多兄弟之人於義或可若始生之子便應三母俱闕邪由是推之內則所言諸母是謂三母非兄弟之母明矣子游所問自是師保之慈母非三年小功之慈母也故夫子得有此對豈非師保之慈母無服之證乎鄭玄不辨三慈混為訓釋引彼無服以注慈己後人致謬實此之由經言君子子者此雖起於大夫明大夫猶爾自斯以上彌應不異故傳云君子子者貴人之子也總言曰貴無所不包經傳互文交相顯發則知慈加之義通乎大夫以上矣宋代此科不乖禮意便加除削良是所疑於是筠等請依制改定嫡妻之子母沒為父妾所養服之五月貴賤並同以為永制後為尚書左丞卒於始興內史子壽傳父業明三禮位尚書祠部郎曲阿令卞華字昭岳濟陰宛句人晉驃騎將軍壼六世孫也父倫之齊給事中華幼孤貧好學年十四召補國子生通周易及長徧習五經與平原明山賓會稽賀瑒同業友善梁天監中為安成王功曹參軍兼五經博士聚徒教授華博涉有機辯說經析理為當時之冠江左以來鍾律絕學至華乃通焉位尚書儀曹郎吳令卒崔靈恩清河東武城人也少篤學徧習五經尤精三禮三傳仕魏為太常博士天監十三年歸梁累遷步兵校尉兼國子博士靈恩聚徒講授聽者常數百人性拙朴無風采及解經析理甚有精致都下舊儒咸稱重之助教孔僉尤好其學靈恩先習左傳服解不為江東所行乃改說杜義每文句常申服以難杜遂著左氏條義以明之時助教虞僧誕又精杜學因作申杜難服以答靈恩世並傳焉僧誕會稽餘姚人以左氏教授聽者亦數百人該通義例當世莫及先是儒者論天互執渾蓋二義論蓋不合渾論渾不合蓋靈恩立義以渾蓋為一焉出為長沙內史還除國子博士講衆尤盛又出為桂州刺史卒官靈恩集注毛詩二十二卷集注周禮四十卷制三禮義宗三十卷左氏經傳義二十二卷左氏條例十卷公羊穀梁文句義十卷孔僉會稽山陰人少師事何胤通五經尤明三禮孝經論語講說並數十徧生徒亦數百人三為五經博士後為海鹽山陰二縣令僉儒者不長政術在縣無績太清亂卒於家子淑玄頗涉文學官至太學博士僉兄子元素又善三禮有盛名早卒盧廣范陽涿人自云晉司空從事中郎諶之後也少明經有儒術天監中歸梁位步兵校尉兼國子博士徧講五經時北來人儒學者有崔靈恩孫詳蔣顯並聚徒講說而音辭鄙拙唯廣言論清雅不類北人僕射徐勉兼通經術深相賞好後為尋陽太守武陵王長史卒官沈峻字士嵩吳興武康人也家世農夫至峻好學與舅太史叔明師事宗人沈麟士在門下積年晝夜自課睡則以杖自擊其篤志如此遂博通五經尤長三禮為兼國子助教時吏部郎陸倕與僕射徐勉書薦峻曰凡聖賢所講之書必以周官立義則周官一書實為羣經源本此學不傳多歷年世北人孫詳蔣顯亦經聽習而音革楚夏故學徒不至唯助教沈峻特精此書比日時開講肆羣儒劉喦沈宏沈熊之徒並執經下坐北面受業莫不歎服人無間言弟謂宜即用此人令其專此一學周而復始使聖人正典廢而更興勉從之奏峻兼五經博士於館講授聽者常數百人及中書舍人賀琛奉敕撰梁官乃啟峻及孔子袪補西省學士助撰錄書成入兼中書通事舍人出為武康令卒官傳峻業者又有吳郡張及會稽孔子雲官皆至五經博士尚書祠部郎太史叔明吳興烏程人吳太史慈後也少善莊老兼通孝經論語禮記尤精三玄每講說聽者常五百餘人為國子助教邵陵王綸好其學及出為江州叔明之鎮王遷郢州又隨府所至輒講授故江外人士皆傳其學峻子文阿文阿字國衞性剛強有膂力少習父業研精章句祖舅太史叔明舅王慧興並通經術而文阿頗傳之又博采先儒異同自為義疏通三禮三傳位五經博士梁簡文引為東宮學士及撰長春義記多使文阿撮異聞以廣之及侯景寇逆簡文別遣文阿募士卒援都臺城陷與張嵊保吳興嵊敗文阿竄于山野景素聞其名求之甚急文阿窮迫登樹自縊遇有所親救之自投而下折其左臂及景平陳武帝以文阿州里表為原鄉令監江陰郡紹泰元年入為國子博士尋領步兵校尉兼掌儀禮自太清之亂臺閣故事無有存者文阿父峻梁武時常掌朝儀頗有遺䤝於是斟酌裁撰禮度皆自之出及陳武帝受禪文阿輒棄官還武康帝大怒發使往誅之時文阿宗人沈恪為郡請使者寬其死即面縛鎖頸致於上前上視而笑之曰腐儒復何為者遂赦之武帝崩文阿與尚書左丞徐陵中書舍人劉師知等議大行皇帝靈座俠御衣服之制語在師知傳及文帝即位剋日謁廟尚書左丞庾持奉詔遣博士議其禮文阿議曰人物推移質文殊軌聖賢因機而立教王公隨時以適宜夫千人無君不敗則亂萬乘無主不危則亡當隆周之日公旦叔父呂召爪牙成王在喪禍幾覆國是以既葬便有公冠之儀始殯受麻冕之策斯蓋示天下以有主慮社稷之艱難逮乎末葉從橫漢承其弊雖文景刑厝而七國連兵或踰月即尊或崩日稱詔此皆有為而為之非無心於禮制也今國諱之日雖抑哀於璽紱之重猶未序於君臣之儀古禮朝廟退坐正寢聽羣臣之政今皇帝拜廟還宜御太極前殿以正南面之尊此即周康在朝一二臣衞者也其壤奠之節周禮以玉作贄公侯以珪子男執璧此以玉作瑞也奠贄竟又復致享天子以璧王后用琮秦燒經典威儀散滅叔孫通定禮尤失前憲奠贄不珪致享無帛公王同璧鴻臚奏賀若此數事未聞於古後相沿襲至梁行之夫稱觴奉壽家國大慶四廂雅樂歌奏歡欣今君臣吞哀兆庶抑割豈同於惟新之禮乎且周康賓稱奉珪無萬壽之獻此則前準明矣愚以今坐正殿止行薦璧之儀無賀酒之禮謹撰謁廟還升正寢羣臣陪薦儀注如別詔可施行尋遷通直散騎常侍兼國子博士領羽林監仍令於東宮講孝經論語天嘉中卒贈廷尉卿所撰儀禮八十餘條春秋禮記孝經論語義記七十餘卷經典大義十八卷並行於時儒者多傳其學孔子袪會稽山陰人也少孤貧好學耕耘樵採常懷書自隨役閑則誦讀勤苦自勵遂通經術尤明古文尚書為兼國子助教講尚書四十徧聽者常數百人為西省學士助賀琛撰錄書成兼司文侍郎不就累遷兼中書通事舍人加步兵校尉梁武帝撰五經講疏及孔子正言專使子袪檢閱羣書以為義證事竟敕子袪與右衞朱䌇左丞賀琛於士林館遞日執經後加通直正員郎卒官子袪凡著尚書義二十卷集注尚書三十卷續朱䌇集注周易一百卷續何承天集禮論一百五十卷皇侃吳郡人青州刺史皇象九世孫也少好學師事賀瑒精力專門盡通其業尤明三禮孝經論語為兼國子助教於學講說聽者常數百人撰禮記講疏五十卷書成奏上詔付祕閣頃之召入壽光殿說禮記義梁武帝善之加員外散騎侍郎侃性至孝常日限誦孝經二十徧以擬觀世音經丁母憂還鄉里平西邵陵王欽其學厚禮迎之及至因感心疾卒所撰論語義禮記義見重於世學者傳焉沈洙字弘道吳興武康人也祖休季梁餘杭令父山卿梁國子博士中散大夫洙少方雅好學不妄交游通三禮春秋左氏傳精識強記五經章句諸子史書問無不答仕梁為尚書祠部郎時年蓋二十餘大同中學者多涉獵文史不為章句而洙獨積思經術吳郡朱䌇會稽賀琛甚嘉之及䌇琛於士林館講制旨義常使洙為都講侯景之亂洙竄於臨安時陳文帝在焉親就習業及陳武帝入輔除國子博士與沈文阿同掌儀禮武帝受禪加員外散騎常侍位揚州別駕從事史大匠卿有司奏建康令沈孝軌門生陳三兒牒稱主人翁靈柩在周主人奉使關右因欲迎喪久而未反此月晦即是再周主人弟息見在此者為至月末除靈內外即吉為待主人還情禮申竟以事諮左丞江德藻德藻議謂王衞軍云久喪不葬唯主人不變其餘親各終月數而除此蓋引禮文論在家內有事故未得葬者耳孝軌既在異域雖已迎喪還期無指諸弟若遂不除永絕昏嫁此於人情或未為允中原淪陷以後理有事例宜諮沈常侍詳議洙議曰禮有變正又有從宜禮小記云久而不葬者唯主喪者不除其餘以麻終月數者除喪則已注云其餘謂傍親如鄭所解衆子皆應不除王衞軍所引此蓋禮之正也但魏氏東關之役既失亡屍柩葬禮無期時議以為禮無終身之喪故制使除服晉氏喪亂或死於虜庭無由迎殯江左故復申明其制李胤之祖王華之父並存亡不測其子制服依時釋衰此並變禮之宜也孝軌雖因奉使便欲迎喪而還期未剋宜依東關故事在此者並應釋除衰麻毀靈祔祭若喪柩得還別行改葬之禮自天下寇亂西朝傾覆若此之徒諒非一二寧可喪期無數而弗除衰服朝廷自應為之限制以義斷恩德藻依洙議奏可文帝即位累遷光祿卿侍東宮讀廢帝嗣位歷尚書左丞衡陽王長史行府國事梁代舊律測囚之法日一上起自晡鼓盡于二更及比部郎范泉刪定律令以舊法測立時久非人所堪分其刻數日再上廷尉以為新制過輕請集八座丞郎幷祭酒孔奐行事沈洙五舍人會尚書省詳議時宣帝錄尚書集衆議之都官尚書周弘正議曰凡小大之獄必應以情政言依準五聽驗其虛實豈可令恣考掠以判刑罪且測人時節本非古制近代以來方有此法起自晡鼓迄于二更豈是常人所能堪忍所以重械之下危墮之上無人不服誣枉者多朝晚二時同等刻數進退而求於事為衷若謂小促前期數致實罪不服如復時節延長則無愆妄款且人之所堪既有強弱人之立意固亦多途至如貫高榜笞刺爇身無完者戴就熏針並極困篤不移豈關時刻長短掠測優劣夫與殺不辜寧失不經罪疑惟輕功疑惟重斯則古之聖王垂此明法愚謂依范泉著制為允洙議曰夜中測立緩急易欺兼用晝漏於事為允但漏刻賒促今古不同漢書律歷何承天祖冲之祖之父子漏經並自關鼓至下鼓自晡鼓至關鼓皆十三刻冬夏四時不異若其日有長短分在中時前後今用梁末改漏下鼓之後分其短長夏至之日各十七刻冬至之日各十二刻廷尉今牒以時刻短促致罪人不款愚意願去夜測之昧從晝漏之明斟酌今古之間參會二漏之義捨秋冬之少刻從夏日之長晷不問寒暑並依今之夏至朝夕上測各十七刻比之古漏則一上多昔四刻即用今漏則冬至多五刻雖冬至之時數刻侵夜正是少日於事非疑庶罪人不以漏短而為捍獄囚無以在夜而致誣求之鄙意竊謂為宜依范泉前制宣帝曰沈長史議得中宜更博議左丞宗元饒議曰沈議非頓異范正是欲使四時均其刻數請寫還刪定曹詳改前制宣帝依事施行洙以太建元年卒戚衮字公文吳郡鹽官人也少聰慧游學都下受三禮於國子助教劉文紹一二年中大義略舉年十九梁武帝敕策孔子正言幷周禮禮記義衮對高第除揚州祭酒從事史就國子博士宋懷方質儀禮義懷方北人自魏攜儀禮禮記疏祕惜不傳及將亡謂家人曰吾死後戚生若赴便以儀禮禮記義本付之若其不來即隨屍而殯為儒者推許如此尋兼太學博士簡文在東宮召衮講論又嘗置宴集玄儒之士先命道學互相質難次令中庶子徐摛馳騁大義間以劇談摛辭辯從橫難以答抗諸儒懾氣時衮說朝聘義摛與往復衮精采自若領答如流簡文深加歎賞敬帝立為江州長史仍隨沈泰鎮南豫州泰之奔齊逼衮俱行後自齊逃還又隨程文季於呂梁軍敗入周久之得歸卒於始興王府錄事參軍衮於梁代撰三禮義記逢亂亡失禮記義四十卷行於世鄭灼字茂昭東陽信安人也幼聰敏勵志儒學少受業於皇侃梁簡文在東宮雅愛經術引灼為西省義學士承聖中為兼中書通事舍人仕陳武帝文帝時累遷中散大夫後兼國子博士未拜卒灼性精勤尤明三禮少時嘗夢與皇侃遇於途侃謂曰鄭郎開口侃因唾灼口中自後義理益進灼家貧抄義疏以日繼夜筆豪盡每削用之常蔬食講授多苦心熱若瓜時輒偃臥以瓜鎮心起便讀誦其篤志如此時有晉陵張崖吳郡陸詡吳興沈德威會稽賀德基俱以禮學自命張崖傳三禮於同郡劉文紹天嘉元年為尚書儀曹郎廣沈文阿儀注撰五禮後為國子博士陸詡少習崔靈恩三禮義宗梁時百濟國表求講禮博士詔令詡行天嘉中位尚書祠部郎沈德威字懷遠少有操行梁太清末遁於天目山築室以居雖處亂離而篤學無倦天嘉元年徵出都後為國子助教每自學還私室講授道俗受業數百人率常如此遷太常丞兼五禮學士後為尚書祠部郎陳亡入隋官至秦王府主簿卒年五十五賀德基字承業世傳禮學祖文發父淹仕梁俱為祠部郎並有名當世德基少游學都下積年不歸衣資罄乏又恥服故弊盛冬止衣裌襦袴嘗於白馬寺前逢一婦人容服甚盛呼德基入寺門脫白綸巾以贈之仍謂曰君方為重器不久貧寒故以此相遺耳問姓名不答而去德基於禮記稱為精明位尚書祠部郎雖不至大官而三世儒學俱為祠部郎時論美其不墜全緩字弘立吳郡錢唐人也幼受易于博士褚仲都篤志研翫得其精微陳太建中位鎮南始興王府諮議參軍緩通周易老莊時人言玄者咸推之張譏字直言清河武城人也祖僧寶梁太子洗馬父仲悅梁尚書祠部郎譏幼聰俊有思理年十四通孝經論語篤好玄言受學于汝南周弘正每有新意為先輩推服梁大同中召補國子正言生梁武帝嘗於文德殿釋乾坤文言譏與陳郡袁憲等預焉敕令論議諸儒莫敢先出譏乃整容而進諮審循環辭令溫雅帝甚異之賜裙襦絹等云表卿稽古之力譏幼喪母有錯綵經帕即母之遺制及有所識家人具以告之每歲時輒對帕哽噎不能勝及丁父憂居喪過禮為士林館學士簡文在東宮出士林館發孝經題譏論義往復甚見嗟賞及侯景寇逆於圍城之中獨侍哀太子於武德後殿講老莊臺城陷譏崎嶇避難卒不事景陳天嘉中為國子助教時周弘正在國學發周易題弘正第四弟弘直亦在講席譏與弘正論議弘正屈弘直危坐厲聲助其申理譏乃正色謂弘直曰今日義集辯正名理雖知兄弟急難四公不得有助弘直謂曰僕助君師何為不可舉坐以為笑樂弘正嘗謂人曰吾每登坐見張譏在席使人懍然宣帝時為武陵王限內記室兼東宮學士後主在東宮集宮僚置宴時造玉柄麈尾新成後主親執之曰當今雖復多士如林至於堪捉此者獨張譏耳即手授譏仍令於溫文殿講莊老宣帝幸宮臨聽賜御所服衣一襲後主嗣位為國子博士東宮學士後主嘗幸鍾山開善寺召從臣坐於寺西南松林下敕譏竪義時索麈尾未至後主敕取松枝手以屬譏曰可代麈尾顧羣臣曰此即張譏後事陳亡入隋終於長安年七十六譏性恬靜不求榮利常慕閑逸所居宅營山池植花果講周易老莊而教授焉吳郡陸元朗朱孟博一乘寺沙門法才法雲寺沙門慧拔至真觀道士姚綏皆傳其業譏所撰周易義三十卷尚書義十五卷毛詩義二十卷孝經義八卷論語義二十卷老子義十一卷莊子內篇義十二卷外篇義二十卷雜篇義十卷玄部通義十二卷游玄桂林二十四卷後主嘗敕就其家寫入祕閣子孝則官至始安王記室參軍顧越字允南吳郡鹽官人也所居新坂黃岡世有鄉校由是顧氏多儒學焉祖道望齊散騎侍郎父仲成梁護軍司馬豫章王府諮議參軍家傳儒學並專門教授越幼明慧有口辯勵精學業不捨晝夜弱冠游學都下通儒碩學必造門質疑討論無倦至於微言玄旨九章七曜音律圖緯咸盡其精微時太子詹事周捨以儒學見重名知人一見越便相歎異命與兄子弘正弘直游厚為之談由是聲譽日重時又有會稽賀文發學兼經史與越名相埒故都下謂之發越焉初為南平元襄王偉國右常侍與文發俱入府並見禮重尋轉行參軍大通中詔飈勇將軍陳慶之送魏北海王顥還北主魏慶之請越參其軍事時慶之所向剋捷直至洛陽既而顥遂肆驕縱又上下離心越料其必敗以疾得歸裁至彭城慶之果見摧衂越竟得先反時稱其見機及至除安西湘東王府參軍及武帝撰制旨新義選諸儒在所流通遣越還吳敷揚講說越徧該經藝深明毛詩傍通異義特善莊老尤長論難兼工綴文閑尺牘長七尺三寸美鬚眉武帝嘗於重雲殿自講老子僕射徐勉舉越論義越抗首而請音響若鍾容止可觀帝深贊美之由是擢為中軍宣城王記室參軍尋除五經博士仍令侍宣城王講大同八年轉安西武陵王府內中錄事參軍尋遷府諮議及侯景之亂越與同志沈文阿等逃難東歸賊黨數授以爵位越誓不受命承聖二年詔授宣惠晉安王府諮議參軍領國子博士越以世路未平無心仕進因歸鄉栖隱于武丘山與吳興沈炯同郡張種會稽孔奐等每為文會紹泰元年復徵為國子博士陳天嘉中詔侍東宮讀除東中郎鄱陽王府諮議參軍甚見優禮尋領羽林監遷給事黃門侍郎國子博士侍讀如故時朝廷草創疑議多所取決咸見施用每侍講東宮皇太子常虛己禮接越以宮僚未盡時彥且太子仁弱宣帝有奪宗之兆內懷憤激乃上疏曰臣梁世薄宦祿不代耕季年板蕩竄身窮谷幸屬聖期得奉昌運朝廷以臣微涉藝學遠垂徵引擢臣以貴仕資臣以厚秩二宮恩遇有異凡流木石知感犬馬識養臣獨何人罔懷報德伏惟皇太子天下之本養善春宮臣陪侍經籍於今五載如愚所見多有曠官輔弼丞疑未極時選至如文宗學府廉潔正人當趨奉龍樓晨游夕論聞前聖格言往賢政道如此則非僻之語無從而入臣年事侵迫非有邀求政是懷此不言則為有負明聖敢奏狂瞽願留中不泄疏奏帝深感焉而竟不能改革及廢帝即位拜散騎常侍兼中書舍人黃門侍郎如故領天保博士掌儀禮猶為帝師入講授甚見尊寵時宣帝輔政華皎舉兵不從越因請假東還或譖之宣帝言越將扇動蕃鎮遂免官太建元年卒於家年七十七所著喪服毛詩老子孝經論語等義疏四十餘卷詩頌碑誌牋表凡二百餘篇時有東陽龔孟舒者亦通毛詩善談名理仕梁位尋陽郡丞元帝在江州遇之甚重躬師事焉天嘉中位太中大夫沈不害字孝和吳興武康人也幼孤而修立好學陳天嘉初除衡陽王府中記室參軍兼嘉德殿學士自梁季喪亂至是國學未立不害上書請崇建儒宮帝優詔答之又表改定樂章詔使製三朝樂歌詞八首合二十曲行之樂府後為國子博士領羽林監敕修五禮掌策文諡議等事太建中位光祿卿通直散騎常侍兼尚書左丞卒不害通經術善屬文雖博綜經典而家無卷軸每製文操筆立成曾無尋檢汝南周弘正常稱之曰沈生可謂意聖人乎著五禮儀一百卷文集十四卷子志道字崇基少知名位安東新蔡王記室參軍陳亡入隋卒王元規字正範太原晉陽人也祖道實齊晉安郡守父瑋梁武陵王府中記室參軍元規八歲而孤兄弟三人隨母依舅氏往臨海郡時年十二郡土豪劉瑱者資財巨萬欲妻以女母以其兄弟幼弱欲結強援元規泣請曰因不失親古人所重豈得苟安異壤輒昏非類母感其言而止元規性孝事母甚謹晨昏未嘗離左右梁時山陰縣有暴水流漂居宅元規唯有一小船倉卒引其母妹幷姑姪入船元規自執檝棹而去留其男女三人閣於樹杪及水退俱獲全時人稱其至行少從吳興沈文阿受業十八通春秋左氏孝經論語喪服仕梁位中軍宣城王記室參軍陳天嘉中為鎮東鄱陽王府記室參軍領國子助教後主在東宮引為學士就受禮記左傳喪服等義遷國子祭酒新安王伯固嘗因入宮適會元規將講乃啟請執經時論榮之俄除尚書祠部郎自梁代諸儒相傳為左氏學者皆以賈逵服虔之義難駁杜預凡一百八十條元規引證通析無復疑滯每國家議吉凶大禮常參預焉後為南平王府限內參軍王為江州元規隨府之鎮四方學徒不遠千里來請道者常數十百人陳亡入隋卒於秦王府東閤祭酒元規著春秋發題辭及義記十一卷續經典大義十四卷孝經義記兩卷左傳音三卷禮記音兩卷子大業聰敏知名時有吳郡陸慶少好學徧通五經尤明春秋左氏傳節操甚高仕梁為婁令陳天嘉初徵為通直散騎侍郎不就永陽王為吳郡太守聞其名欲與相見慶辭以疾時宗人陸榮為郡五官掾慶嘗詣焉王乃微服往榮宅穿壁以觀之王謂榮曰觀陸慶風神凝峻殆不可測嚴君平鄭子真何以尚茲鄱陽晉安王俱以記室徵不就乃築室屏居以禪誦為事由是傳經受業者蓋鮮焉論曰語云上好之下必有甚焉者是以鄒纓齊紫且以移俗況祿在其中可無尚歟當天監之際時主方崇儒業如崔嚴何伏之徒前後互見升寵于時四方學者靡然向風斯亦曩時之盛也自梁迄陳年且數十雖時經屯詖郊生戎馬而風流不替豈俗化之移人乎古人稱上德若風下應猶草美矣豈斯之謂也
