body:
  text: 南史卷六十三列傳第五十三王神念子僧辨羊侃羊鴉仁王神念太原祁人也少好儒術尤明內典仕魏位潁川太守與子僧辨據郡歸梁封南城縣侯歷安成武陽宣城內史皆著政績後為青冀二州刺史神念性剛正所更州郡必禁止淫祠時青州東北有石鹿山臨海先有神廟祅巫欺惑百姓遠近祈禱糜費極多及神念至便令毀撤風俗遂改後徵為右衛將軍卒於官諡曰壯及元帝初追贈侍中中書令改諡忠公神念少善騎射及老不衰嘗於武帝前手執二刀楯左右交度馭馬往來冠絶羣伍時復有楊華者能作驚軍騎亦一時妙捷帝深賞之華本名白花武都仇池人父大眼為魏名將華少有勇力容貌瓌偉魏胡太后逼幸之華懼禍及大眼死擁部曲載父尸改名華來降胡太后追思不已為作楊白花歌辭使宮人晝夜連臂踏蹄歌之聲甚悽斷華後位太子左衛率卒於侯景軍中神念長子遵業位太僕卿次子僧辨僧辨字君才學涉該博尤明左氏春秋言辭辨捷器宇肅然雖射不穿札而有陵雲之氣元帝為江州刺史僧辨隨府為中兵參軍時有安成望族劉敬躬者田間得白蛆化為金龜將銷之龜生光照室敬躬以為神而禱之所請多驗無賴者多依之平生有德有怨者必報遂謀作亂遠近響應元帝命中直兵參軍曹子郢討之使僧辨襲安成子郢既破其軍敬躬走安成僧辨禽之又討平安州反蠻由是以勇略稱元帝除荊州僧辨為貞毅府咨議參軍代柳仲禮為竟陵太守及侯景反元帝命僧辨總督舟師一萬赴援及至臺城陷沒侯景悉收其軍實而厚加綏撫遣歸竟陵於是倍道兼行西就元帝元帝承制以為領軍將軍及荊湘疑二元帝令僧辨及鮑泉討之時僧辨以竟陵間部下皆徑勇猶未盡來意欲待集然後上頓與泉俱入使泉先言之泉入不敢言元帝問僧辨僧辨以情對元帝性忌以為遷延不去大怒厲聲曰卿憚行拒命欲同賊邪今唯死耳僧辨對曰今日就戮甘心但恨不見老母帝自斫之中其髀流血至地悶絶久之方蘇即送廷尉並收其子姪並繫之其母脫簪珥待罪帝意解賜以良藥故不死會嶽陽軍襲江陵人情搔擾元帝遣就獄出僧辨以為城內都督俄而嶽陽奔退而鮑泉力不能剋長沙帝命僧辨代之僧辨仍部分將帥並力攻圍遂平湘土還復領軍將軍侯景浮江西寇軍次夏首僧辨為大都督軍次巴陵景既陷郢城將進寇荊州於是緣江屯戍望風請服僧辨並沉公私船於水分命衆軍乘城固守偃旗臥鼓安若無人翌日賊衆濟江輕騎至城下謂城中曰語王領軍何不早降僧辨使答曰大軍但向荊州此城自當非礙僧辨百口在人掌握豈得便降景軍肉薄苦攻城內同時鼓譟矢石雨下賊乃引退元帝又命平北將軍胡僧祐率兵援僧辨是日賊復攻城不剋又為火艦燒柵風不便自焚而退有流星墮其營中賊徒大駭相顧失色賊帥任約又為陸法和所禽景乃燒營夜遁旋軍夏首元帝以僧辨為征東將軍開府儀同三司江州刺史封長寧縣公命即率巴陵諸軍沿流討景攻拔魯山仍攻郢即入羅城又有大星如車輪墜賊營去地十丈變成火一時碎散有龍自城出五色光曜入城前鸚鵡洲水中景聞之倍道歸建鄴賊帥宋子仙等困蹙求輸郢城身還就景僧辨僞許之子仙謂為信然浮舟將發僧辨命杜龕鼓譟掩至大破之禽子仙丁和等送江陵元帝命生釘和舌臠殺之郢州既平僧辨進師尋陽軍人多夢周何二廟神云吾已助天子討賊自稱征討大將軍並乘朱航俄而反曰已殺景同夢者數十百焉元帝加僧辨侍中尚書令征東大將軍僧辨頻表勸進並蒙優答於是發江州直指建鄴乃先命南兗州刺史侯瑱襲南陵鵲頭等戍並剋之先是陳武帝率衆五萬出自南江前軍五千行至盆口陳武名蓋僧辨僧辨憚之既至盆口與僧辨會于白茅洲為盟於是升壇歃血共讀盟文辭氣慷慨皆淚下霑襟及發鵲頭中江而風浪師人咸懼僧辨再拜告天曰僧辨忠臣奉辭伐罪社稷中興當使風息若鼎命中淪請從此逝言訖風止自此遂泛安流有羣魚躍水飛空引導賊望官軍上有五色雲雙龍挾艦行甚迅疾景自出戰於石頭城北僧辨等大破之盧暉略聞景戰敗以石頭城降僧辨引軍入據之景走朱方僧辨命衆將入據臺城其夜軍人失火燒太極殿及東西堂僧辨雖有滅賊之功而馭下無法軍人鹵掠驅逼居人都下百姓父子兄弟相哭自石頭至于東城被執縛者男女裸露衵衣不免緣淮號叫翻思景焉僧辨命侯瑱裴之橫東追景僞行臺趙伯超自吳松江降侯瑱瑱送至僧辨僧辨謂曰卿荷國重恩遂復同逆今日之事將欲如何因命送江陵伯超既出僧辨顧坐客曰朝廷昔唯知有趙伯超豈識王僧辨乎社稷既傾為我所復人之興廢亦復何常賓客皆前稱歎功德僧辨戄然乃謬答曰此乃聖上威德羣帥用命老夫雖濫居戎首何力之有焉於是逆寇悉平元帝即位授鎮衛將軍司徒加班劍二十人改封永寧郡公侍中尚書令如故先是天監中沙門釋寶志為讖云太歲龍將無理蕭經霜草應死餘人散十八子時言蕭氏當滅李氏代興及湘州賊陸納等攻破衡州刺史丁道貴而李洪雅又自零陵稱助討納既而朝廷未達其心詔徵僧辨就宜豐侯循南征為都督東上諸軍事以陳武帝為都督西下諸軍事先是陳武讓都督於僧辨僧辨不受故元帝分為東西都督而俱南討焉尋而洪雅降納納以為應符於是共議拜洪雅為大將軍尊事為主洪雅乘平肩大輿繖蓋鼓吹羽儀悉備翼從入長沙城時納等據車輪夾岸為城士卒皆百戰之餘器甲精嚴徒黨勇鋭蒙衝鬬艦亘水陵山時天日清明初無雲霧軍發之際忽然風雨時人謂為泣軍百姓竊言知其敗也三月庚寅有兩龍自城西江中騰躍升天五色分明遙映江水百姓咸仰面目之父老或聚而悲竊相謂曰地龍已去國其亡乎初納造大艦一名曰三王艦者邵陵王河東王桂陽嗣王三人並為元帝所害故立其像於艦祭以太牢加其節蓋羽儀鼓吹每戰輒祭之以求福又造二艦一曰青龍艦一曰白虎艦皆衣以牛皮並高十五丈選其中尤勇健者乘之僧辨憚之稍作連城以逼焉賊不敢交鋒並懷懈怠僧辨因其無備親執旗鼓以誡進止羣賊大敗歸保長沙僧辨乃命築壘圍之而自出臨視賊知不設備其黨吳藏李賢明等蒙楯直進僧辨尚據胡牀不為之動指麾勇敢遂斬賢明賊乃退歸初陵納作逆以王琳為辭云若放琳則自服時衆軍未之許而武陵王紀擁衆上流內外駭懼元帝乃遣琳和解之湘州乃平因被詔會衆軍西討尋而武陵敗績是時齊遣郭元建謀襲建鄴又遣其大將東方老等繼之陳武帝聞之馳報江陵元帝即詔僧辨急下赴援僧辨次姑孰即留鎮焉先命豫州刺史侯瑱築壘於東關以拒北軍徵吳郡太守張彪吳興太守裴之橫會瑱而大敗之僧辨振旅歸建鄴承聖三年二月詔以僧辨為太尉車騎大將軍頃之丁母憂母姓魏氏性甚安和善於綏接家門內外莫不懷之初僧辨下獄母流淚徒行將入謝罪元帝不與相見時貞惠世子有寵母詣閣自陳無訓涕泗嗚咽衆並矜之及僧辨罪免母深相責厲辭色俱嚴雖剋復舊都功蓋宇宙母自謙損不以富貴驕物朝野稱之謂為明哲婦人及亡甚見愍悼且以僧辨勳重故喪禮加焉命侍中謁者監護喪事諡曰貞敬太夫人靈柩將歸建康又遣謁者至舟渚弔祭其年十月魏遣兵及梁王察合衆將襲江陵元帝徵僧辨於建鄴為大都督荊州刺史未至而荊州已滅及敬帝初即梁王位僧辨預援立功承制進驃騎大將軍中書監都督中外諸軍事録尚書與陳武帝參謀討伐時齊文宣又納貞陽侯明以為梁嗣與僧辨書並貞陽亦頻與僧辨書論還國繼統之事僧辨不納及貞陽與齊上黨王高渙至東關散騎常侍裴之橫軍敗僧辨遂謀納貞陽仍書定君臣之禮因遣第七子顯顯所生劉並弟子珍往充質遣左戶尚書周弘正至歷陽迎明又遣吏部尚書王通送啓因求以敬帝為皇太子明報書許之僧辨遣使送質于鄴貞陽求度衛士三千僧辨慮其為變止受散卒千人而已並遣龍舟法駕往迎貞陽濟江之日僧辨擁楫中流不敢就岸末乃同會于江寧浦明踐位授僧辨大司馬領太子太傅揚州牧餘如故陳武帝時為司空南徐州刺史因自京口舉兵襲之僧辨常處石頭城是日視事軍人已踰城北而入南門又白有兵來僧辨與子頠遽走出閣計無所出乃據南門樓拜請求哀陳武縱火焚之方共頠下就執陳武謂曰我有何辜公欲與齊師賜討又曰何意全無防備僧辨曰委公北門何謂無備是夜及子頠俱被絞殺初僧辨平建鄴遣陳武守京口推以赤心結廉藺之分且為第三子頠許娶陳武章后所生女未昏而僧辨母亡然情好甚密其長子顗屢諫不聽至是會江淮人報云齊兵大舉至壽春僧辨謂齊軍必出江表因遣記室參軍江旰以事報陳武仍使整舟艦器械陳武宿有圖僧辨志乃聞命留旰城中銜枚而進知謀者唯侯安都周文育而已外人但謂江旰徵兵扞北安都舟艦將趣石頭陳武控馬未進安都大懼乃追陳武罵曰今日作賊事勢已成生死須決在後欲何所望若敗俱死後期得免斫頭邪陳武曰安都嗔我乃敢進遂剋之時壽春竟無齊軍又非陳武之譎殆天授也顗承聖初位侍中魏剋江陵隨王琳入齊為竟陵郡守齊遣王琳鎮壽春將圖江左及陳平淮南殺琳顗聞之乃出郡城南登高冢上號哭一慟而絶顗弟頒少有志節隨梁元帝及荊州覆滅入于魏僧辨既亡弟僧智得就任約敗走僧智肥不能行又遇害僧智弟僧愔位譙州刺史征蕭勃及聞兄死引軍還時吳州刺史羊亮隸在僧愔下與僧愔不平密召侯瑱見禽僧愔以名義責瑱瑱乃委罪於將羊鯤斬之僧愔復得奔齊與徐嗣徽等挾齊軍攻陳軍敗竄逸荒野莫知所之仰天嘆曰讎恥不雪未欲身膏野草若精誠有感當得道路誓不受辱人手拔刀將自刎聞空中催令急去僧愔異之勉力馳進行一里許顧向處已有陳人踰越江山僅得歸齊徐嗣徽高平人父雲伯自青部南歸位終新蔡太守侯景之亂嗣徽歸荊州元帝以為羅州刺史及弟嗣宗嗣産並有武用嗣徽從征巴丘以功為太子右衛率監南荊州徐州之亡任秦州刺史嗣産先在建鄴嗣宗自荊州滅亡中逃得至都從弟嗣先即僧辨之甥復為比丘慧暹藏得脫俱還及僧辨見害兄弟抽刀裂眦志在立功俱逃就兄嗣徽密結南豫州刺史任約與僧辨故舊圖陳武帝帝遣江旰說之嗣徽執旰送鄴乞師焉齊文宣帝授為儀同命將應赴及石頭敗退復請兵於齊與任約王曄席臯同心度江及戰敗嗣徽墮馬嗣宗援兄見害嗣産為陳武軍所禽辭色不撓而死任約王曄得北歸羊侃字祖欣泰山梁父人也父祉北史有傳侃少而瓌偉身長七尺八寸雅愛文史弱冠隨父在梁州立功初為尚書郎以力聞魏帝常謂曰郎官謂卿為虎豈羊質虎皮乎試作虎狀侃因伏以手抉殿沒指魏帝壯之賜以珠劍正光中秦州羌莫折念生據州反仍遣其弟天生攻陷岐州寇雍州侃為偏將隸蕭寶寅往討之射殺天生其衆即潰以功為征東大將軍東道行臺領泰山太守進爵巨平侯初其父祉使侃南歸侃至是將舉濟河以成先志其從兄兗州刺史敦密知之據州拒侃侃乃率精兵三萬襲之不剋仍築十餘城以守之梁朝賞授一與元法僧同魏帝聞之使授侃驃騎大將軍司徒泰山郡公長為兗州刺史侃斬其使魏人大駭令僕射于暉率衆十萬及高歡爾朱陽都等相繼而至柵中矢盡南軍不進乃夜潰圍而出一日一夜乃出魏境至渣口衆尚萬餘人馬二千匹將入南士卒竟夜悲歌侃乃謝曰卿等懷土幸適去留各拜辭而去侃以大通三年至建鄴授徐州刺史併其兄默及三弟忱給元皆拜刺史侃封高昌縣侯纍遷太子左衛率中車駕幸樂游苑侃預宴時少府奏新造兩刃矟成長二丈四尺圍一尺三寸帝因賜侃河南國紫騮令試之侃執矟上馬左右擊刺特盡其妙觀者登樹帝曰此樹必為侍中折矣俄而果折因號此矟為折樹矟北人降者唯侃是衣冠餘緒帝寵之踰於他者謂曰朕少時捉矟形勢似卿今失其舊體殊覺不奇上又製武宴詩三十韻示侃侃即席上應詔帝覽曰吾聞仁者有勇今見勇者有仁可謂鄒魯遺風英賢不絶是日詔入直殿省啓尚方仗不堪用上大怒坐者非一及侯景作逆果弊於仗粗後遷都官尚書尚書令何敬容用事與之並省未嘗游造左衛蘭欽同侍宮宴詞色少交侃於坐折之曰小子汝以銅鼓買朱虉作父韋粲作兄何敢無宜適朱時在席後華林法會欽拜謝於省中王銓謂欽曰卿能屈膝廉公彌見盡美然羊公意猶未釋容能更置一拜欽從之宦者張僧胤嘗候侃侃曰我牀非閹人所坐竟不前之時論美其貞正太清元年為侍中會大舉北侵以侃為冠軍將軍監作寒山堰事堰立侃勸元帥貞陽侯明乘水攻彭城不見納既而魏援大至侃頻言乘其遠來可擊旦日又勸出戰並不從侃乃率所領頓堰上及衆軍敗侃結陳徐還二年復為都官尚書侯景反攻陷歷陽帝問侃討景之策侃求以二千人急據采石令邵陵王襲取壽春使景進不得前退失巢窟烏合之衆自然瓦解議者謂景未敢便逼都遂寢其策令王質往侃曰今茲敗矣乃令侃率千餘騎頓望國門景至新林追侃入副宣城王都督城內諸軍事時景既卒至百姓競入公私混亂無復次序侃乃區分防擬皆以宗室間之軍人爭入武庫自取器甲所司不能禁侃命斬數人方得止是時梁興四十七年境內無事公卿在位及閭里士大夫莫見兵甲賊至卒迫公私駭震時宿將已盡後進少年並出在外城中唯有侃及柳津韋黯津年老且疾黯懦而無謀軍旅指撝一決於侃膽力俱壯簡文深仗之及賊逼城衆皆凶懼侃僞稱得外射書云邵陵西昌侯已至近路衆乃少安賊攻東掖門縱火甚盛侃以水沃滅火射殺數人賊乃退加侍中軍師將軍有詔送金五千兩銀萬兩絹萬匹賜戰士侃辭不受部曲千餘人並私加賞賚賊為尖頂木驢攻城矢石所不能制侃作雉尾炬施鐵鏃以油灌之擲驢上焚之俄盡賊又東西起二土山以臨城城中震駭侃命為地道潛引其土山不能立賊又作登城樓車高十餘丈欲臨射城中侃曰車高塹虛彼來必倒可臥而觀之及車動果倒衆皆服焉賊既頻攻不捷乃築長圍朱虉張綰議出擊之帝以問侃侃曰不可賊多日攻城既不能下故立長圍欲引城中降者耳今擊之出人若少不足破賊若多則一旦失利門隘橋小必大致挫衄不從遂使千餘人出戰未及交鋒望風退走果以爭橋赴水死者太半初侃長子鷟為景所獲執來城下示侃侃謂曰我傾宗報主猶恨不足豈復計此一子幸早殺之數日復持來侃謂鷟曰久以汝為死猶在邪吾以身許國誓死行陳終不以爾而生進退因引弓射之賊以其忠義亦弗之害景遣儀同傅士哲呼侃與語曰侯王遠來問訊天子何為閉拒不時進納尚書國家大臣宜啓朝廷侃曰侯將軍奔亡之後歸命國家重鎮方城懸相任寄何所患苦忽致稱兵豈有人臣而至於此吾不能妄受浮說開門揖盜士哲曰在北之日久挹風猷願去戎服得一相見侃為免胄士哲瞻望之而去其為北人所欽慕如此後大雨城內土山崩賊乘之垂入苦戰不能禁侃乃令多擲火為火城以斷其路徐於城內築城賊不能進尋以疾卒於城內贈侍中護軍將軍子球嗣侃少雄勇膂力絶人所用弓至二十石馬上用六石弓嘗於兗州堯廟踏壁直上至五尋橫行得七跡泗橋有數石人長八尺大十圍侃執以相擊悉皆破碎性豪侈善音律自造采蓮棹歌兩曲甚有新致姬妾列侍窮極奢靡有彈箏人陸太喜著鹿角爪長七寸人張淨琬腰圍一尺六寸時人咸推能掌上又有孫荊玉能反腰帖地銜得席上玉簪敕賚歌人王娥兒東宮亦賚歌者屈偶之並妙盡奇曲一時無對初赴衡州於兩艖霛起三間通梁水齊飾以珠玉加之錦繢盛設帷屏列女樂乘潮解纜臨波置酒緣塘傍水觀者填咽大同中魏使陽斐與侃在北嘗同學有詔命侃延斐同宴賓客三百餘人食器皆金玉雜寶奏三部女樂至夕侍婢百餘人俱執金花燭侃不飲酒而好賓游終日獻酬同其醉醒性寬厚有器局嘗南還至漣口置酒有客張孺才者醉於船中失火延燒七十餘艘所燔金帛不可勝數侃聞聊不挂意命酒不輟孺才慚懼自逃侃慰喻使還待之如舊第三子鵾字子鵬隨侃臺內城陷竄於陽平侯景以其妹為小妻呼還待之甚厚以為庫真都督及景敗鵾密圖之乃隨其東走景於松江戰敗惟餘三舸下海欲向蒙山會景晝寢鵾語海師此中何處有蒙山汝但聽我處分遂直向京口至胡豆洲景覺大驚問岸上云郭元建猶在廣陵景大喜將依之鵾拔刀叱海師使向京口鵾與王元禮謝答仁弟葳蕤並景之昵也三人謂景曰我等為王百戰百勝自謂無敵卒至於此豈非天乎今就王乞頭以取富貴景欲透水鵾抽刀斫之景乃走入船中以小刀抉船鵾以矟入刺殺之景僕射索超世在別船葳蕤以景命召之斬于京口元帝以鵾為青州刺史封昌國縣侯又領東陽太守征陸納加散騎常侍除西晉州刺史破郭元建於東關遷東晉州刺史承聖三年西魏圍江陵鵾赴援不及從王僧愔征蕭勃於嶺表聞僧辨敗乃還為侯瑱所破遇害年二十八羊鴉仁字孝穆泰山巨平人也少驍勇仕郡為主簿並通中率兄弟自魏歸梁封廣晉侯征伐青齊間纍有功績位至都督北司州刺史及侯景降詔鴉仁督土州刺史桓和之仁州刺史湛海珍等趣縣瓠應接景至仍為都督司豫二州刺史鎮縣瓠會侯景敗於渦陽魏軍漸逼鴉仁恐糧運不繼遂還北司上表陳謝帝大怒鴉仁鴉仁懼頓軍於淮上及侯景反鴉仁率所部入援太清二年景既背盟鴉仁乃與趙伯超及南康王會理共攻賊於東府城反為賊敗臺城陷景以為五兵尚書鴉仁常思奮發謂所親曰吾以凡流受寵朝廷竟無報效以答重恩今若以此終沒有餘責因泣下見者傷焉三年出奔江西將赴江陵至東莞為故北徐州刺史荀伯道子晷所害臨死以報效不終因而泣下後鴉仁兄子海珍知之掘晷父伯道並祖及所生母合五喪各分其半骨共棺焚之半骨雜他骨作五袋盛之銘袋上曰荀晷祖父母某之骨鴉仁子亮侯景亂後移至吳州刺史隨王琳以名將子見禮甚隆為人多酒無賴酒醉為閹豎所殺論曰王神念羊侃羊鴉仁等自北徂南咸受寵任既而侃及鴉仁晚遇屯剝侃則臨危不撓鴉仁則守義以殞古人所謂心同鐵石此之謂乎僧辨風格秀舉有文武奇才而逢茲酷濫幾致隕覆幸全首領卒樹奇功事人之道於斯為得及時鍾交喪地居元宰內有奧主而外求君遂使尊卑易位親疏貿序既同兒戲且類奕延敵開釁實基於此喪國傾宗為天下笑豈天將啓陳何斯人而斯謬也哀哉
