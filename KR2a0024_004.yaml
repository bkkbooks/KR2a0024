body:
  text: 南史卷四齊本紀上第四齊太祖高皇帝諱道成字紹伯小字鬬將姓蕭氏其先本居東海蘭陵縣中都鄉中都里晉元康元年惠帝分東海郡為蘭陵故復為蘭陵郡人中朝喪亂皇高祖淮陰令整字公齊過江居晉陵武進縣之東城里寓居江左者皆僑置本土加以南名更為南蘭陵人也皇曾祖俊字子武位即丘令皇祖樂子字閨子位輔國參軍宋升明中贈太常皇考承之字嗣伯少有大志才力過人仕宋為漢中太守梁州之平以功加龍驤將軍後為南泰山太守封晉興縣五等男遷右軍將軍元嘉二十四年殂梁土思之於峨公山立廟祭祀升明二年贈散騎常侍金紫光祿大夫高帝以宋元嘉四年丁卯歲生姿表英異龍顙鍾聲長七尺五寸鱗文遍體舊宅在武進縣宅南有一桑樹擢本三丈橫生四枝狀似華蓋帝年數歲好戲其下從兄敬宗曰此樹為汝生也儒生雷次宗立學於雞籠山帝年十三就受禮及左氏春秋十七年宋大將軍彭城王義康被黜徙豫章皇考領兵防守帝捨業南行十九年竟陵蠻動宋文帝遣帝領偏軍討沔北蠻二十三年雍州刺史蕭思話鎮襄陽啓帝自隨初為左軍中兵參軍二十九年領偏軍征仇池破其武興蘭臯二壘遂從谷口入關未至長安八十里梁州刺史劉秀之遣司馬馬注助帝攻拔談提城魏救兵至帝軍力疲少又聞文帝崩乃燒城還南鄭後襲爵晉興縣五等男為建康令有能名少府蕭惠開雅有知人鑒謂人曰昔魏武為洛陽北部時人服其英今看蕭建康但當過之耳宋明帝即位為右軍將軍時四方叛會稽太守尋陽王子房及在東諸郡皆起兵明帝加帝輔國將軍東討至晉陵一日破賊十二壘分軍定諸縣及徐州刺史薛安都據彭城歸魏遣從子索兒攻淮陰又徵帝討破之索兒走鍾離帝追至黯黮而還除驍騎將軍封西陽縣侯遷巴陵王衛軍司馬隨鎮會稽江州刺史晉安王子勛遣臨川內史張淹自鄱陽嶠道入三吳明帝遣帝討之時朝廷器甲皆充南討帝軍容寡闕乃編棕皮為馬具裝折竹為寄生夜舉火進軍賊望見恐懼未戰而走還除桂陽王征北司馬南東海太守行南徐州事及張永等敗於彭城淮南孤弱以帝為假冠軍將軍持節都督北討前鋒諸軍事鎮淮陰遷南兗州刺史加督五州督北討如故明帝嫌帝非人臣相而人間流言帝當為天子明帝愈以為疑遣冠軍將軍吳喜留軍破釜自持銀壺酒封以賜帝帝戎服出門迎懼鴆不敢飲將出奔喜告以誠先飲之帝即酌飲之喜還明帝意乃悅泰始七年徵還都部下勸勿就徵帝曰主上自誅諸弟為太子幼弱作萬歲後計何關他族惟應速發事緩當見疑今骨肉相害自非靈長之運禍難將興方與卿等勠力耳至拜散騎常侍太子左衛率明帝崩遺詔為右衛將軍領衛尉加兵五百人與尚書令袁粲護軍褚彥回領軍劉勔共掌機事尋解衛尉加侍中領石頭戍軍事元徽二年五月江州刺史桂陽王休範舉兵於尋陽朝廷惶駭帝與褚彥回等集中書省計議莫有言者帝曰昔上流謀逆皆因淹緩以敗休範必遠懲前失輕兵急下乘我無備請頓新亭以當其鋒因索筆下議餘並注同中書舍人孫千齡與休範有密契獨曰宜依舊遣軍據梁山帝正色曰賊今已近梁山豈可得至新亭既是兵衝所欲以死報國耳乃單車白服出新亭加帝使持節都督征討諸軍事平南將軍加鼓吹一部築新亭城壘未畢賊前軍已至帝方解衣高臥以安衆心乃索白虎幡登西垣使寧朔將軍高道慶羽林監陳顯達員外郎王敬則浮舸與賊水戰大破之未時張敬兒斬休範首臺軍及賊衆俱不知其別率杜黑蠡急攻東壘帝挺身上馬帥數百人出戰與黑蠡拒戰自晡達明旦矢石不息其夜大雨鼓叫不復相聞將士積日不得寢食軍中馬夜驚城內亂走帝執燭正坐厲聲呵止之如是者數四賊帥丁文豪設伏破臺軍於皂莢橋直至朱雀航王道隆劉勔並戰沒初勔高尚其意託造園宅名為東山頗忽時務帝謂曰將軍以顧命之重此是艱難之日而深尚從容廢省羽翼一朝事至悔可追乎勔不納竟敗及賊進至杜姥宅車騎典籤茅恬開東府納賊冠軍將軍沈懷明於石頭奔散張永潰於白下宮內傳新亭亦陷太后執蒼梧王手泣曰天下事敗矣帝遣軍主陳顯達任農夫張敬兒周盤龍等從石頭濟淮間道自承明門入衛宮闕時休範典籤許公與詐稱休範在新亭士庶惶惑詣壘期赴休範投名者千數及至乃是帝隨得輒燒之登城北謂曰劉休範父子先昨皆已死戮尸在南岡下身是蕭平南諸君善見觀汝等名皆已焚除勿懼也臺分遣衆軍擊平賊帝振旅凱入百姓緣道聚觀曰全國家者此公也帝與袁粲褚彥回劉彥節引咎解職不許遷散騎常侍中領軍都督南兗州刺史鎮軍將軍進爵為公與袁粲褚彥回劉彥節等更日入直決事號為四貴休範平後蒼梧王漸行凶暴屢欲害帝嘗率數十人直入鎮軍府時暑熱帝晝臥裸袒蒼梧立帝於室內畫腹為射的自引滿將射之帝神色不變斂板曰老臣無罪蒼梧左右王天恩諫曰領軍腹大是佳射堋而一箭便死後無復射不如以雹箭射之乃取雹箭一發即中帝臍蒼梧投弓於地大笑曰此手何如時建平王景素為朝野歸心潛為自全計布誠於帝帝拒而不納景素尋舉兵帝出屯玄武湖事平乃還帝威名既重蒼梧深相猜忌刻木為帝形畫腹為射堋自射之又命左右射中者加賞皆莫能中時帝在領軍府蒼梧自來燒之冀帝出因作難帝堅臥不動蒼梧益懷忿恚所見之物呼之為帝加以手自磨鋋曰明日當以刃蕭道成陳太妃罵之曰蕭道成有大功於國今害之誰為汝盡力故止高帝謀與袁褚廢立皆不見從五年七月戊子楊玉夫等與直閣將軍王敬則通謀弒蒼梧齎首使左右陳奉伯藏衣袖中依常行法稱敕開承明門出囊貯之以與敬則敬則馳至領軍府叩門大呼自言報帝門猶不開敬則自門窐中以首見帝帝猶不信乃於牆上投進其首帝索水洗視敬則乃踰垣入帝跣出敬則叫曰事平矣帝乃戎服乘常所騎赤馬夜入殿中殿中驚怖及知蒼梧死咸稱萬歲至帝踐阼號此馬為龍驤赤明旦召袁粲褚彥回劉彥節入會西鍾槐樹下計議帝以事讓彥節彥節未答帝鬚髯盡張眼光如電次讓袁粲又不受敬則乃拔刀在牀側躍麾衆曰天下之事皆應關蕭公敢有開一言者血染敬則刀仍呼虎賁劍戟羽儀手自取白紗帽加帝首令帝即位曰今日誰敢復動事須及熱帝正色呵之曰卿都不自解粲欲有言敬則又叱之乃止帝乃下議備法駕詣東城迎立順帝於是長刀遮粲彥節等失色而去甲午帝移鎮東府與袁粲褚彥回劉彥節各甲仗五十人入殿丙申加侍中司空録尚書事驃騎大將軍封竟陵郡公給油幢絡車班劍三十人帝固辭上台即授以驃騎大將軍開府儀同三司十二月荊州刺史沈攸之反稱太后詔己下都丁卯帝入居朝堂命諸將西討平西將軍黃回為都督前驅先是太后兄子前湘州刺史王蘊遭母喪罷任還至巴陵停舟與攸之密謀乃下達郢州武帝時為郢州長史蘊伺武帝出弔因作亂據郢城武帝知之不出蘊還至東府前又期見高帝帝又不出弔再計不行外謀愈固司徒袁粲尚書令劉彥節見帝威權稍盛慮不自安與蘊及黃回等相結舉事殿內宿衛主帥無不協同及攸之反問初至帝往石頭詣粲謀粲稱疾不相見剋壬申夜起兵據石頭其夜丹陽丞王遜告變彥節從弟領軍韞及直閣將軍卜伯興等嚴兵為內應帝命王敬則於宮內誅之遣諸將攻石頭王蘊將數百精手帶甲赴粲城門已閉官軍又至乃散衆軍攻石頭斬粲彥節走擔湖蘊逃鬬場並禽斬之粲典籤莫嗣祖同粲謀蘊嬖人張承伯藏匿蘊高帝亦並赦而用之時黃回頓新亭聞石頭已下因稱救援高帝知而不言撫之愈厚遣回西上流涕告別二年正月沈攸之平二月宋帝進高帝太尉都督十六州諸軍事高帝表送黃鉞三月己酉增班劍四十人甲仗百人入殿丙子加羽葆鼓吹大明泰始以來相承奢侈百姓成俗及高帝輔政奏罷御府省二尚方諸飾玩至是又上表禁人間華偽雜物凡十七條其中宮及諸王服用雖依舊例亦請詳制九月丙午加帝假黃鉞都督中外諸軍事太傅領揚州牧劍履上殿入朝不趨贊拜不名置左右長史司馬從事中郎掾屬各四人固辭詔遣敦勸乃受黃鉞辭殊禮甲寅給三望車三年正月乙巳高帝表蠲百姓逋責丙辰加前部羽葆鼓吹丁巳命太傅府依舊辟召丁卯給高帝甲仗五百人出入殿省甲午重申前命劍履上殿入朝不趨贊拜不名三月甲辰宋帝詔進帝位相國總百揆封十郡為齊公備九錫禮加遠遊冠位在諸侯王上加相國緑綟綬甲寅使以備物典禮進策曰朕以不造夙罹閔凶嗣君失德書契未紀威侮五行虔劉九縣神歇靈繹海水羣飛綴旒之殆未足為譬豈直小宛興刺黍離作歌而已哉天贊皇宋實啓明宰爰登寡昧纂承大業高勳至德振古絶倫雖保衡翼殷博陸匡漢方斯蔑如也今將授公典禮其敬聽朕命乃者袁鄧構禍實繁有徒子房不臣稱兵協亂顧瞻宮掖將成茂草言念邦國翦為仇讎當此之時人無固志公投袂徇難超然奮發登寅車而戒路執金板而先驅麾鉞一臨凶黨冰泮此則霸業之基勤王之始也安都背叛竊據徐方敢率犬羊陵虐淮浦索兒愚悖同惡相濟天祚無象背順歸逆北鄙黔黎奄墜塗炭公受命宗祊精貫朝日擁節和門氣踰霄漢破釜之捷斬馘蔽野石梁之戰禽其渠帥保境全人江陽即序此又公之功也張淹迷昧弗顧本朝爰自南區志圖東夏潛軍間入竊覬不虞于時江服未夷皇塗荐沮公忠誠慷慨在險彌亮以寡制衆所向風偃朝廷無東顧之憂閩越有來蘇之慶此又公之功也胸奴野心侵掠疆埸醜羯侜張勢振彭泗公奉辭伐罪戒旦晨征兵車始交氛時蕩弔死扶傷弘宣皇澤俾我淮肥復霑盛化此又公之功也自茲厥後獫狁孔熾封豕長蛇重窺上國而世故相仍師出已老角城高壘指日淪陷公眷言王事發憤忘食躬擐甲胄視險若夷分疆畫界開創青兗此又公之功也桂陽負衆輕問九鼎裂冠毀冕拔本塞源烈火焚于王城飛矢集乎君屋羣后憂惶元戎無主公按劍凝神則奇謨冠世把旄指麾則懦夫成勇信宿之間宣陽底定此又公之功也皇室多難釁起戚藩建平失圖興兵內侮公指授六師義形于色役未踰旬朱方寧晏此又公之功也蒼梧肆虐諸夏糜沸淫刑以逞誰則無辜黔首相悲朝不謀夕高祖之業已淪文明之軌誰嗣公遠稽殷漢之義近遵魏晉之典猥以眇身入奉宗祏七廟清謐九區反政此又公之功也袁劉攜二成此亂階醜圖潛溝危機竊發據有石頭志犯應路公神謀內運霜鋒外舉祅沴載澄國塗悅穆此又公之功也沈攸苞禍歲月滋彰𧔧目豺聲阻兵安忍乃眷西顧緬同異域而經綸惟始九伐未申長惡不悛遂逞凶逆公把鉞出關凝威江甸正情與皎日同亮明略與秋雲競爽至義所感人百其心積年逋誅一朝顯戮沮浦安流章臺順軌此又公之功也公有濟天下之勳重之以明哲道庇生靈志匡宇宙勠力肆心劬勞王室險阻艱難備嘗之矣若乃締構宗稷之勤造物資始之澤雲布霧散光被六幽弼豫一人永清四海是以秬草騰芳於郊園景星垂暉於清漢遐方發關而慕義荒服重譯而來庭汪哉邈乎無得而名也朕聞疇庸表德前王盛典崇樹侯伯有國攸同所以文命成功玄圭顯錫姬旦宣哲曲阜啓藩或改玉以弘風或胙土以宣化禮絶常班寵冠羣辟爰逮桓文車服異數惟公勳業超於先烈而褒賞闕於舊章古今之道何其爽歟靜言欽歎良有缺然今進授相國以青州之齊郡徐州之梁郡南徐州之蘭陵魯郡琅邪東海晉陵義興揚州之吳郡會稽凡十郡封公為齊公錫茲玄土苴以白茅定爾邦家用建冢社斯實尚父故藩世作盟主紀綱侯甸率由舊則往者周召建國師保兼任毛畢執圭入作卿士內外之寵同規在昔今命使持節兼太尉侍中中書監司空衛將軍雩都縣開國侯彥回授公相國印綬齊公璽紱持節兼司空副守尚書令僧虔授齊公茅土金虎符第一至第五左竹使符第一至第十左相國位總百辟秩踰三事職以禮移號隨事革其以相國總百揆去録尚書之稱送所假節侍中貂蟬中外都督太傅太尉印綬竟陵公印策其驃騎大將軍揚州牧南徐州刺史如故又加公九錫其敬聽後命以公執禮弘律儀刑區宇遐邇一體人無異業是用錫公大輅戎輅各一玄牡二駟公崇修南畝所寶惟穀王府充實百姓繁衍是用錫公袞冕之服赤舄副焉公居身以謙導物以義鎔鈞庶品罔不和悅是用錫公軒縣之樂六佾之公翼贊王猷聲教遠洽蠻夷竭歡回首內附是用錫公朱戶以居公明鑒人倫澄辨涇渭官方與能英乂克舉是用錫公納陛以登公保佑皇朝厲身化下杜漸防萌含生寅式是用錫公虎賁之士三百人公禦宄以刑禦姦以德君親無將將而必誅是用錫公鈇鉞各一公鳳舉四維龍騰八表威靈所振異類同乂是用錫公彤弓一彤矢百盧弓十盧矢千公明發載懷肅恭禋祀孝敬之重義感靈祇是用錫公秬鬯一卣圭瓚副焉齊國置丞相以下敬遵舊式往欽哉其祗服朕命經緯乾坤宏亮洪業茂昭爾大德闡揚我高祖之休命高帝三讓公卿敦勸固請乃受之丁巳下令赦國內殊死以下宋帝詔齊公十郡之外隨宜除用以齊國初建給錢五百萬布五千匹絹五千匹以太尉左長史王儉為尚書右僕射領吏部四月癸酉宋帝又詔進齊公為王以豫州之南梁陳潁川陳留南兗州之盱眙山陽秦廣陵海陵南沛增王封為二十郡使司空褚彥回奉策授璽紱改立王社餘如故丙戌命齊王冕十有二建天子旌旗出警入蹕乘金根車駕六馬備五時副車置旄頭雲罕樂八佾設鍾虡宮縣王世子為太子王女王孫爵命一如舊儀辛卯宋帝以歷數在齊乃下詔禪位是日遜于東邸壬辰遣使奉策曰咨爾齊王伊太古初陳萬化紛綸開曜靈以鑒品物立元后以馭黎元若夫容成大庭之世伏羲五龍之辰靡得而詳焉自軒黃以降墳索所紀略可言者莫崇乎堯舜披金繩而握天鏡開玉匣而總地維德之休明宸居靈極期運有終歸禪與能所以大唐遜位耳我然興歌有虞揖讓卿雲發采遺風餘烈光被無垠漢魏因循不敢失墜爰逮有晉亦遵前典昔我祖宗英睿旁格幽明末葉不造仍世多故惟王聖哲欽明榮鏡區宇仁育羣生義征不譓聲化遠洎荒服無虞殊類同規華戎一族是以五色來儀於軒庭九穗含芳於郊牧象緯昭徹布新之符已顯圖讖彪煥受終之義既彰靈祇乃眷兆庶引領朕聞至道深微惟人是弘天命無常惟德是與所以仰鑒玄情俯察羣議敬禪神器授帝位于爾躬四海困窮天祿永終於戲王其允執厥中儀刑前式以副率土之欣望命司裘而謁蒼昊奏雲門而升圓丘時膺大禮永保洪業豈不盛歟並命璽書遣兼太保司空褚彥回兼太尉守尚書令王僧虔奉皇帝璽綬受終之禮一依唐虞故事高帝固讓宋朝王公以下陳留王粲等詣門陳請帝猶未許齊世子卿士以下固請兼太史令將作匠陳文建奏符瑞因言漢自建武至建安二十五年一百九十六年而禪魏魏自黃初至咸熙二年四十六年而禪晉晉自泰始至元熙二年一百五十六年而禪宋宋自永初元年至升明三年凡六十年咸以六終六受六亢位也驗往揆今若斯昭著敢以職任備陳管穴伏願順天時膺符瑞二朝百辟又固請尚書右僕射王儉奏被宋詔遜位臣等參議宜剋日受禪高帝乃許焉建元元年夏四月甲午皇帝即位於南郊柴燎告天曰皇帝臣道成敢用玄牡昭告于皇皇后帝夫肇自生靈樹以司牧所以闡極立則開元創物肆茲大道天下惟公命不于常昔在虞夏受終上代粵自漢魏揖讓中葉咸煥諸方策載在典謨水德既微仍世多故實賴道成匡救之功以弘濟乎厥艱大造顛墜再構區宇誕惟天人罔弗和會乃仰協歸運景屬與能用集大命于茲辭德匪嗣至于纍仍而羣公卿士庶尹御事爰及黎獻暨乎百蠻僉曰皇天眷命不可以固違人神無統不可以曠主畏天之威敢不祗順鴻曆敬簡元辰虔奉皇符升壇受禪告類上帝以答人衷式敷萬國惟明靈是饗禮畢備大駕幸建康宮臨太極前殿大赦改元賜人爵二級文武位二等魚衆寡孤獨不能自存者穀人五斛逋租宿責勿收犯鄉論清議贓汙淫盜者一皆蕩滌洗除先注與之更始長徒敕繫者特加原遣亡官失爵禁錮奪勞一依舊典封宋帝為汝陰王築宮於丹陽故縣行宋正朔車旗服色一如晉宋故事上書不為表答表不稱詔宋諸王皆降為公郡公主為縣君縣公主為鄉君詔降宋南康郡公為縣公華容公為侯萍鄉侯為伯減戶有差以奉劉穆之王弘何無忌之祀追尊皇考曰宣皇帝皇妣曰孝皇后陵曰永安妃曰昭皇后陵曰泰安詔劫賊餘口沒在臺府者悉原赦諸負釁流徙者皆聽還本土戊戌以荊州刺史嶷為尚書令驃騎大將軍開府儀同三司斷四方上慶禮己亥詔二宮諸王悉不得營立屯邸封略山湖乃停太官池稅庚子詔宋帝后藩王諸陵量置守衛五月丙午以河南王吐谷渾拾寅為驃騎大將軍詔宋氏第秩量所廢置有司奏留襄陽郡公張敬兒等六十二人除廣興郡公沈曇亮等一百二十二人改元嘉曆為建元曆祖以正月卯臘以十二月未丁未詔曰設募取將縣賞購士蓋出權宜自今可斷衆募乙卯河南國遣使朝貢丙辰詔遣兼散騎常侍十二人巡行四方己未汝陰王殂齊志也追諡為宋順帝辛酉誅陰安公劉燮等六月乙亥詔宋末以來枯骸毀櫬宣下埋藏庚辰備法駕奉七廟主于太廟甲申立齊太子賾為皇太子斷諸州郡禮慶降死罪以下刑並申前赦恩百日立皇子嶷為豫章王映為臨川王晃為長沙王曄為武陵王皓為安成王鏘為鄱陽王鑠為桂陽王鑑為廣興王皇孫長懋為南郡王乙酉葬宋順帝于遂寧陵秋七月丁未曲赦交州部內丁巳詔南蘭陵桑梓本鄉長蠲租布武進王業所基給復十年八月癸巳省陳留國丁巳立皇子鈞為衡陽王九月辛丑詔以二吳義興三郡遭水減今年田租乙巳復置南蠻校尉官丙午加司空褚彥回尚書令冬十月丙子立彭城劉胤為汝陰王奉宋後己卯享太廟辛巳汝陰王太妃王氏薨追贈宋恭皇后己丑荊州天井湖出綿人用與常綿不異二年春正月戊戌朔大赦以司空褚彥回為司徒以尚書右僕射王儉為左僕射辛丑祀南郊二月丁卯魏軍攻壽陽豫州刺史垣崇祖破走之癸巳遣大使巡慰淮肥徐豫邊人尤貧遘難者三月百濟國遣使朝貢以其王牟都為鎮東大將軍夏四月丙寅進高麗王樂浪公高璉號驃騎大將軍五月立六門都牆秋九月甲午朔日有蝕之丙子蠕蠕國遣使朝貢冬十二月戊戌以司空褚彥回為司徒壬子以驃騎豫章王嶷為司空三年春正月壬戌朔詔王公卿士薦讜言丙子立皇子鋒為江夏王二月癸丑罷南蠻校尉官夏四月辛亥始制東宮臣僚用下官禮敬聞喜公子良等六月壬子大赦秋七月己未朔日有蝕之九月辛未蠕蠕國王遣使欲俱攻魏獻師子皮袴褶烏程令吳郡顧昌玄坐父法秀宋泰始中北征死亡尸骸不反而昌玄宴樂嬉遊與常人無異有司請加以清議丙戌置會稽山陰縣獄丞冬十月戊子以河南王世子吐谷渾度易侯為西秦河二州刺史河南王十二月丁亥高麗國遣使朝貢命散騎常侍虞炎等十二人巡行諸州郡觀省風俗四年春二月乙未上不豫庚戌詔原都下囚繫有差免元年以前逋責三月庚申召司徒褚彥回左僕射王儉受顧託壬戌皇帝崩于臨光殿年五十六羣臣上諡曰高皇帝廟號太祖梓宮於東府前渚升龍舟四月丙午葬於武進泰安陵於龍舟卒哭內外反吉上少有大量喜怒不形於色深沈靜默常有四海之心博學善屬文工草隸書奕第二品雖經綸夷險不廢素業及即位後身不御精細之物主衣中有玉介導以長侈奢之源命打破之凡異物皆令隨例毀棄後宮器物欄檻以銅為飾者皆改用鐵內殿施黃紗帳宮人著紫皮履華蓋除金華爪用鐵回釘每曰使我臨天下十年當使黃金與土同價欲以身率下移風易俗性寬嘗與直閣將軍周覆給事中褚思莊共纍局不倦覆乃抑上手不許易行其弘厚如此所著文詔中書侍郎江淹撰次之又詔東觀學士撰史林三十篇魏文帝皇覽之流也始帝年十七時嘗夢乘青龍上天西行逐日帝舊塋在武進彭山岡阜相屬數百里不絶其上常有五色雲又有龍出焉上時已貴矣宋明帝甚惡之遣善占墓者高靈文往墓所占相靈文先給事太祖還詭答曰不過出方伯耳密白太祖曰貴不可言明帝意猶不已遣人踐藉以左道厭之上後於所樹華表柱忽龍鳴震響山谷明帝寢疾為身後之慮多翦功臣上亦見疑每云蕭道成有不臣相時鎮淮陰每懷憂懼忽見神人謂上曰無所憂子孫當昌盛泰始三年宋明帝遣前淮南太守孫奉伯往淮陰監元會奉伯舊與帝發是行也帝與奉伯同室臥奉伯夢上乘龍上天於下捉龍腳不得及覺夢因謂曰兗州當大庇生靈而弟不得與也奉伯竟卒於宋世又參軍崔靈建夢天謂己蕭道成是我第十九子我去年已使授其天子位考自三皇五帝以降受命之次至帝為十九也及為領軍望氣者陳安寶見上身上有紫黃氣安寶謂王洪範曰此人貴不可言所居武進縣有一道相傳云天子路或謂秦皇所遊或云孫氏舊迹時訛言東城天子出其後建安王休仁鎮東府宋明帝懼殺休仁而常閉東府不居明帝又屢幸改代作伐以厭王氣又使子安成王代之及蒼梧王敗安成王代立時咸言為驗術數者推之上舊居武進東城村東城之言其在此也升明二年冬延陵縣季子廟沸井之北忽聞金石聲疑其異鑿深三尺得沸井奔涌若浪其地又響即復鑿之復得一井涌沸亦然井中得一木簡長一尺廣二分上有隱起字曰廬山道人張陵再拜詣闕起居簡木堅白字色乃黃瑞應圖云浪井不鑿自成王者清靜則仙人主之會稽剡縣有山名刻石父老相傳云山雖名刻石而不知文字所在升明末縣人兒襲祖行獵忽見石上有文字凡三處苔生其上字不可識乃去苔視之其大石文曰此齊者黃石公之化氣也立石文曰黃天星姓蕭字道成得賢帥天下太平小石文曰刻石者誰會稽南山李斯刻秦望之封也孝經鉤命決曰誰者起視名將將帝小字也河洛讖曰歷年七十水滅緒風雲俱起龍鱗舉又曰肅肅草成道德盡備案宋水德也義熙元年宋武帝王業之始至齊受命七十年又讖曰蕭為二士天下樂案二士主字也郭文舉金雄記曰當復有作肅入草易曰聖人作萬物覩當復有作言聖人作也王子年歌曰欲知其姓草肅肅穀中最細低頭熟鱗身甲體永興福穀中精細者稻也即道也熟猶成也又歌曰金刀利刃齊刈之金刀劉字刈猶翦也孔子河洛讖曰堨河梁塞龍泉消除水災泄山川水即宋也宋氏為災害故曰水災梁亦水也堨河梁則行路成矣路猶道也消除水災除宋水氏之災害也河圖讖又曰上參南斗第一星下立草屋為紫庭神龍之岡梧桐生鳳鳥戢翼朔旦鳴南斗吳分野草屋者居上蕭字象也先是益州有山古老相傳曰齊后山升明三年四月二十三日有沙門玄暢者於此山立精舍其日上登尊位其月二十四日滎陽郡人尹千於嵩山東南隅見天雨石墜地石開有玉璽在其中璽方三寸文曰戊丁之人與道俱肅然入草應天符掃平河洛清魏都又曰皇帝運興千奉璽詣雍州刺史蕭赤斧赤斧以獻案宋武帝於嵩高山得玉璧三十二枚神人云此是宋卜世之數三十二者二三十也宋自受命至禪齊凡六十年然則帝之符應也若是今備之云世祖武皇帝諱賾字宣遠高帝長子也以宋元嘉十七年六月己未生於建康縣之青溪宮將産之夕孝皇后昭皇后並夢龍據屋故小字上為龍兒年十三夢人以筆畫身左右為兩翅又著孔雀羽衣裳空中飛舉體生毛髮長至足有人指上所踐地曰周文王之田又於所住堂內得璽一枚文曰皇帝行璽又得異錢文為北斗星雙刀雙貝及有人形帶劍焉仕宋為贛令江州刺史晉安王子勛反上不從命南康相沈肅之縶上郡獄族人蕭欣祖門客桓康等破郡迎出上上遂率部曲百餘人起義避難揭陽山有白雀來集聞山中有清聲傳漏響又於山纍石為佛圖其側忽生一樹狀若華蓋青翠扶疏有殊羣木上將討戴凱之大饗士卒是日大熱上各令折荊枝自蔽言未終而有雲垂蔭正當會所會罷乃散及為廣興相嶺南積旱連水阻涸商旅不通上部伍既至無雨而川流暴起遂得利涉元徽四年纍遷晉熙王鎮西長史江夏內史行郢州事順帝立徵晉熙王燮為撫軍揚州刺史以上為左衛將軍輔燮俱下沈攸之事起未得朝廷處分上以中流可以待敵即據盆口城為戰守備高帝聞之曰此真我子也於盆城掘得一大錢文曰太平百歲于時城內乏水欲引水入城始鑿城內遇伏泉涌出如此者九處用之不竭上表求西討不許乃遣偏軍援郢平西將軍黃回等皆受上節度升明二年事平遷江州刺史封聞喜縣侯其年徵侍中領軍將軍尋加督京畿諸軍事三年又加尚書僕射中軍大將軍開府儀同三司進爵為公給班劍二十人齊國建為齊公世子改加侍中南豫州刺史給油絡車羽葆鼓吹增班劍為三十人以石頭為世子宮官置二率以下坊省服章一如東宮進為王太子高帝即位為皇太子建元四年三月壬戌高帝崩是日皇太子即皇帝位大赦征鎮州郡令長軍屯營部各行喪三日不得離任都邑城守防備幢隊一不得還乙丑稱先帝遺詔以司徒褚彥回録尚書事尚書左僕射王儉為尚書令車騎將軍張敬兒開府儀同三司詔曰喪禮雖有定制先旨每存簡約內官可三日一還臨外官間日一還臨後有大喪皆如之丁卯以前將軍王奐為尚書左僕射庚午以司空豫章王嶷為太尉癸酉詔免逋城錢自今以後申明舊制初晉宋舊制受官二十日輒送修城錢二千宋泰始初軍役大起受官者萬計兵戎機急事有未遑自是令僕以下並不輸送二十年中大限不可勝計文符督切擾亂在所至是除蕩百姓悅焉夏四月辛卯追尊穆妃為皇后五月庚申以高皇帝配南郊高昭皇后配北郊六月甲申朔立南郡王長懋為皇太子詔申壬戌赦恩百日丙申立皇太子妃王氏進封聞喜公子良為竟陵王臨汝公子卿為廬陵王應城公子敬為安陸王江陵公子懋為晉安王枝江公子隆為隨王皇子子真為建安王皇孫昭業為南郡王戊戌以水潦為患星緯乖序剋日訊都下囚諸遠獄委刺史以時察判建康秣陵二縣貧人加振賜必令周悉吳興義興遭水縣蠲除租調以司徒褚彥回為司空秋八月癸卯司空褚彥回薨九月丁巳以國哀故罷國子學辛未以征南將軍王僧虔為左光祿大夫開府儀同三司冬十月乙未以中書令王延之為尚書左僕射十二月己丑詔曰緣淮戍將久處邊勞三元行始宜霑恩慶可遣中書舍人宣旨臨會後每歲如之永明元年春正月辛亥祀南郊大赦改元壬子詔內外羣僚各進讜言王公卿士各舉所知又詔守宰祿奉蓋有準往以邊虜告警故沿時損益今區宇寧晏宜加優奬郡縣丞尉可還田秩壬戌立皇弟鋭為南平王鏗為宜都王皇子子明為武昌王子罕為南海王望氣者云新林婁湖東府西有天子氣甲子築青溪舊宮作新林婁湖苑以厭之二月庚寅以征虜將軍楊炅為沙州刺史封陰平王三月丙辰詔以星緯失序陰陽愆度申辛亥赦恩五十日以期訖為始戊寅詔四方見囚罪無輕重及劫賊餘口長徒敕繫悉皆原赦夏五月丁酉車騎將軍張敬兒有罪伏誅秋八月壬申魏人來聘冬十月丙寅使驍騎將軍劉穓聘于魏十一月己卯雷十二月乙巳朔日有蝕之二年春正月乙亥以護軍將軍柳世隆為尚書右僕射以南兗州刺史竟陵王子良為護軍將軍兼司徒壬寅以新除尚書右僕射柳世隆為左僕射以丹陽尹李安人為右僕射秋七月甲申立皇子子倫為巴陵王八月丙午幸舊宮申都下獄及三署見徒量所降宥戊申幸玄武湖講武壬子扶南國遣使朝貢並獻頌章云甲子詔都下二縣墳墓毀發隨宜掩埋遺骸未櫬者並加斂瘞疾困不能存者詳加霑賚冬十二月庚申魏人來聘三年春正月辛卯祀南郊大赦都邑三百里內罪應入重者降一等餘依赦制三月甲寅使輔國將軍劉穓聘于魏夏五月省總明觀秋七月甲戌左光祿大夫開府儀同三司王僧虔薨辛卯於益州置平蠻校尉官八月乙未幸中堂聽訟乙巳以行宕昌王梁彌頡為河涼二州刺史封隴西公宕昌王冬十月丙辰魏人來聘十二月以江州刺史王奐為尚書右僕射改封武昌王子明為西陽王四年春閏正月癸巳立皇子子貞為邵陵王丁未以武都王楊集始為北秦州刺史辛亥耕藉田詔宥殊死以下甲寅幸閲武堂勞酒小會賜王公以下在位者帛有差戊午幸宣武堂講武二月丙寅大風吳興偏甚樹葉皆赤己未立皇弟銶為晉熙王鉉為河東王壬午使通直郎裴昭明聘于魏五年春正月戊子以太尉豫章王嶷為大司馬車騎將軍竟陵王子良為司徒驃騎將軍臨川王映衛將軍王儉中軍將軍王敬則並以本號開府儀同三司以尚書右僕射王奐為尚書左僕射辛卯賜孤寡老疾各有差夏四月庚午殷祀太廟降諸囚徒先是立商飈館於孫陵岡世呼為九日臺秋九月辛卯車駕幸焉冬十月初起新林苑六年春三月甲申詔皇太子於東宮玄圃園宣猷堂臨訊及三署徒隸己亥封皇子子響為巴東王夏五月庚辰左衛殿中將軍邯鄲超表陳射雉書奏賜死又潁川荀丕亦以諫諍託他事及誅六月辛未詔省州郡縣送故輸錢者秋七月齊興太守劉元寶於郡城得錢三十七萬皆輪厚徑一寸半以獻上以為瑞班賜公卿九月壬寅於琅邪城講武習水步軍冬十月庚申立冬初臨太極殿讀時令十一月丙戌土霧竟天如煙入人眼鼻二日乃止七年春正月丙午以鎮南將軍柳世隆為尚書左僕射以豫州刺史西昌侯鸞為右僕射辛亥祀南郊大赦申明不舉子之科若有産子者復其父壬戌驃騎將軍開府儀同三司臨川王映薨戊辰詔以諸大夫年秩隆重增俸給見役三月甲寅立皇子子嶽為臨賀王子峻為廣漢王子琳為宣城王子珉為義安王夏五月乙巳尚書令衛將軍開府儀同三司王儉薨甲子以新除尚書左僕射柳世隆為尚書令秋九月壬寅魏人來聘冬十一月戊申詔平南參軍顏幼明聘于魏八年春正月庚子以領軍王奐為尚書左僕射丁巳以行百濟王泰為鎮東大將軍百濟王二月辛卯零陵王司馬藥師薨夏四月戊辰朔詔公卿以下各舉所知六月己巳魏人來聘庚午長沙王晃薨丙申大雷雨有黃光竟天照地狀如金乙酉都下大風發屋秋七月癸卯詔以陰陽舛和緯象愆度儲胤嬰患淹歷旬晷可大赦八月乙酉以河南王世子休留代為西秦河二州刺史封河南王壬辰荊州刺史巴東王子響反遣丹陽尹蕭順之討之子響伏誅冬十二月戊寅詔量增尚書丞郎賜祿己卯改封宣城王子琳為南康王立皇子子建為湘東王九年春正月甲午省平蠻府辛丑祀南郊降都下見囚戊午詔射聲校尉裴昭明聘于魏三月癸巳明堂災夏五月丙申林邑國獻金簟丁未魏人來聘安成王皓薨己未樂遊正陽堂災秋八月己亥使司徒參軍蕭琛聘于魏吳興義興大水乙卯蠲二郡租九月戊辰幸琅邪城講武觀者傾都普頒酒肉冬十月甲寅魏人來聘十年春正月戊午以司徒竟陵王子良領尚書令以尚書右僕射西昌侯鸞為左僕射詔增內外有務衆官祿奉丙戌詔故太宰褚彥回故太尉王儉故司空柳世隆驃騎大將軍王敬則鎮軍大將軍陳顯達故鎮東將軍李安人配饗太祖廟庭十二月乙巳使司徒參軍蕭琛聘于魏十一年春正月戊午以驃騎大將軍豫州刺史王敬則為司空乙亥皇太子長懋薨二月雍州刺史王奐有罪伏誅三月丙寅以金紫光祿大夫王晏為尚書右僕射夏四月癸未魏人來聘甲午立皇孫昭業為皇太孫賜天下為父後者爵一級五月戊辰以旱故都下二縣朱方姑孰權斷酒秋七月丁巳曲赦南兗兗豫司徐五州南豫州之歷陽譙臨江廬江四郡三調衆逋宿責並同原除其緣淮及青冀新附僑人復除已訖更申五年先是魏地謠言赤火南流喪南國是歲有沙門從北齎此火而至色赤於常火而微云以療疾貴賤爭取之多得其驗二十餘日都下大盛咸云聖火詔禁之不止火灸至七炷而疾愈吳興丘國賓密以還鄉邑人楊道慶虛疾二十年依法灸即差是月上不豫徙御延昌殿始登階而殿屋鳴吒上惡之魏軍將至上慮朝野憂惶力疾召樂府奏正聲伎戊寅大漸詔曰始終大期聖賢不免吾行年六十亦復何恨但皇業艱難萬機自重不能無遺慮耳太孫進德日茂社稷有寄子良善相毗輔思弘正道內外衆事無大小悉與鸞參懷尚書是職務根本悉委王晏徐孝嗣軍旅捍邊之略委王敬則陳顯達王廣之王玄邈沈文季張瓌薛深等百辟庶僚各奉爾職謹事太孫勿有懈怠又詔曰我識滅後身上著夏衣畫天衣純烏犀導絓諸器服悉不得用寶物及織成等唯裝復夾衣各一通常所服刀長短二口鐵環者隨入梓宮祭敬之典本在因心靈上慎勿以牲為祭祭惟設餅茶飲干飯酒脯而已天下貴賤咸同此制未山陵前朔望設菜食陵墓萬世所宅意常恨休安陵未稱今可用東三處地最東邊以葬我名為景安陵喪禮每存省約不須煩人百官停六時入臨朔望祖日可依舊諸主六宮並不須從山陵內殿鳳華壽昌曜靈三處是吾所改制夫貴有天下富兼四海宴處寢息不容乃陋謂此為奢儉之中慎勿壞去顯陽殿玉像諸佛及供養具如別牒可盡心禮拜供養之應有功德事可專在中自今公私皆不得出家為道及起立塔寺以宅為精舍並嚴斷之惟年六十必有道心聽朝賢選序已有別詔諸小小賜乞及閣內處分亦有別牒內外禁衛勞舊主帥左右悉令蕭諶優量驅使之是日上崩于延昌殿年五十四羣臣上諡曰武皇帝廟號世祖九月丙寅葬景安陵上剛毅有斷政總大體以富國為先頗喜遊宴雕綺之事言常恨之未能頓遣臨崩又詔凡諸遊費宜從休息自今遠近薦獻務存節儉不得出界營求相高奢麗金粟繒纊敝人已甚珠玉玩好傷俗尤重嚴加禁絶論曰齊高帝基命之初武功潛用泰始開運大拯時艱及蒼梧暴虐釁結朝野而百姓命縣朝夕權道既行兼濟天下元功振主利器難以假人羣方勠力實懷尺寸之望豈惟天厭水行固已人希木德歸功與能事極乎此武帝雲雷伊始功參佐命雖為繼體事實艱難御袞垂旒深存政典文武授任不革舊章明罰厚恩皆由己出外表無塵內朝多豫機事平理職貢有府藏內充人鮮勞役宮室苑圃未足以傷財安樂延年衆庶所同幸亦有齊之良主也據齊梁紀録並云出自蕭何又編御史大夫望之以為先祖之次案何及望之於漢俱為勳德而望之本傳不有此陳齊典所書便乖實録近祕書監顏師古博考經籍注解漢書已正其非今隨而改削云
