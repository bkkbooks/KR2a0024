body:
  text: 南史卷十六列傳第六王鎮惡朱齡石弟超石毛修之孫惠素傅弘之朱修之王玄謨子瞻從弟玄象玄載玄邈王鎮惡北海劇人也祖猛仕苻堅任兼將相父休為河東太守鎮惡以五月生家人以俗忌欲令出繼疏宗猛曰此非常兒昔孟嘗君惡月生而相齊是兒亦將興吾門矣故名為鎮惡年十三而苻氏敗寓食澠池人李方家方善遇之謂方曰若遭英雄主要取萬戶侯當厚相報方曰君丞相孫人材如此何患不富貴至時願見用為本縣令足矣後隨叔父曜歸晉客荊州頗讀諸子兵書喜論軍國大事騎射非長而從橫善果斷宋武帝伐廣固鎮惡時為天門郡臨澧令人或薦之武帝召與語異焉因留宿旦謂諸佐曰鎮惡王猛孫所謂將門有將即以署前部賊曹拒盧循有功封博陸縣五等子武帝謀討劉毅鎮惡曰公若有事西楚請給百舸為前驅及西討轉鎮惡參軍事使率龍驤將軍蒯恩百舸前發鎮惡受命便晝夜兼行揚聲劉兗州上毅謂為信不知見襲鎮惡去江陵城二十里舍船步上蒯恩軍在前鎮惡次之舸留一二人對舸岸上竪旗安鼓語所留人曰計我將至城便長嚴令如後有大軍狀又分隊在後令燒江津船鎮惡徑前襲城津戍及百姓皆言劉藩實上晏然不疑將至城逢毅要將朱顯之馳前問藩所在軍人答云在後及至軍後不見藩又望見江津船艦被燒而鼓聲甚盛知非藩上便躍馬告毅令閉城門鎮惡亦馳進得入城便因風放火燒大城南門及東門又遣人以詔及赦文並武帝手書凡三函示毅毅皆燒不視金城內亦未信帝自來及短兵接戰鎮惡軍人與毅下將或是父兄子弟中表親親且鬬且語知武帝在後人情離懈初毅常所乘馬在城外不得入倉卒無馬使就子肅取馬肅不與朱顯之謂曰人取汝父而惜馬汝走欲何之奪馬以授毅從大城東門出奔牛牧佛寺自縊鎮惡身被五箭手所執矟於手中破折江陵平後二十日大軍方至以功封漢壽縣子及武帝北伐為鎮西咨議行龍驤將軍領前鋒將發前將軍劉穆之謂曰昔晉文王委蜀於鄧艾今亦委卿以關中卿其勉之鎮惡曰吾等因託風雲並蒙抽擢今咸陽不剋誓不濟江三秦若定而公九錫不至亦卿之責矣鎮惡入賊境戰無不捷破虎牢及柏谷塢進次澠池造故人李方家升堂見母厚加酬賚即授方澠池令方軌徑據潼關將士乏食乃親到弘農督人租百姓競送義粟軍食復振初武帝與鎮惡等期若剋洛陽須待大軍未可輕前既而鎮惡等至潼關為僞大將軍姚紹所拒不得進馳告武帝求糧援時帝軍入河魏軍屯河岸軍不得進帝呼所遣人開舫北戶指河上軍示之曰我語令勿進而深入岸上如此何由得遣軍鎮惡既得義租紹又病死僞撫軍將軍姚讚代紹守嶮衆力猶盛武帝至湖城讚引退大軍次潼關謀進取計鎮惡請率水軍自河入渭直至渭橋鎮惡所乘皆蒙衝小艦行船者悉在艦內泝渭而進艦外不見有行船人北土素無舟楫莫不驚以為神鎮惡既至令將士食畢便棄船登岸渭水流急諸艦悉逐流去鎮惡撫慰士卒曰此是長安城北門外去家萬里而舫乘衣糧並已逐流唯宜死戰可立大功乃身先士卒即陷長安城城內六萬餘戶鎮惡撫慰初附號令嚴肅於灞上奉迎武帝勞之曰成吾霸業者真卿也謝曰此明公之威諸將之力帝笑曰卿欲學馮異邪時關中豐全鎮惡性貪收斂子女玉帛不可勝計帝以其功大不問時有白帝言鎮惡藏姚泓僞輦有異志帝使覘之知鎮惡剔取飾輦金銀棄輦於垣側帝乃安帝留第二子桂陽公義真為安西將軍雍秦二州刺史鎮長安鎮惡以征虜將軍領安西司馬馮翊太守委以扞禦之任及大軍東還赫連勃勃逼北地義真遣中兵參軍沈田子拒之虜甚盛田子退屯劉因堡遣使還報鎮惡鎮惡對田子使謂安西長史王修曰公以十歲兒付吾等當共思竭力今擁兵不進賊何由得平使反言之田子甚懼王猛之相苻堅也北人以方諸葛亮入關之功又鎮惡為首時論者深憚之田子嶢柳之捷威震三輔而與鎮惡爭功武帝將歸留田子與鎮惡私謂田子曰鍾會不得遂其亂者為有衛瓘等也語曰猛獸不如羣狐卿等十餘人何懼王鎮惡故二人常有猜心時鎮惡師于涇上與田子俱會傅弘之壘田子求屏人因斬之幕下並兄基弟鴻遵深從弟昭朗弘凡七人弘之奔告義真義真率王智王修被甲登橫門以察其變俄而田子至言鎮惡反修執田子以專戮斬焉是歲義熙十四年正月十五日也追贈左將軍青州刺史及帝受命追封龍陽縣侯諡曰壯傳國至曾孫睿齊受禪國除朱齡石字伯兒沛郡沛人也世為將伯父憲及斌並為西中郎袁真將佐桓溫伐真於壽陽真以憲兄弟潛通溫並殺之齡石父綽逃歸溫壽陽平真已死綽輒發棺戮尸溫怒將斬之溫弟冲請得免綽受冲更生之恩事冲如父位西陽廣平太守及冲薨綽歐血而死齡石少好武不事崖檢舅淮南蔣氏才劣齡石使舅臥聽事翦紙方寸帖著舅枕以刀子縣擲之相去八九尺百擲百中舅畏齡石終不敢動舅頭有大瘤齡石伺眠密割之即死武帝剋京城以為建武參軍從至江乘將戰齡石言世受桓氏恩不容以兵刃相向乞在軍後帝義而許之以為鎮軍參軍遷武康令縣人姚係祖專為郡縣畏不能討齡石至縣僞與厚召為參軍係祖恃強乃出應召齡石斬之掩其家悉殺其兄弟由是一部得清後領中兵齡石有武幹又練吏職帝甚親委之平盧循有功為西陽太守義熙九年徙益州刺史為元帥伐蜀初帝與齡石密謀進取曰劉敬宣往年出黃武無功而退賊謂我今應從外水往而料我當出其不意猶從內水來也必重兵守涪城以備內道若向黃武正墮其計今以大衆自外水取成都疑兵出內水此制敵之奇也而慮此聲先馳賊審虛實別有函封付齡石署曰至白帝乃開諸軍雖進未知處分至白帝發書曰衆軍悉從外水取成都臧熹朱枚於中水取廣漢使羸弱乘高艦十餘由內水向黃武譙縱果備內水使其大將譙道福戍涪城遣其秦州刺史侯暉僕射譙詵等屯彭模夾水為城十年六月齡石至彭模七月齡石率劉鍾蒯恩等於北城斬侯暉譙詵朱枚至廣漢復破譙道福別軍譙縱奔涪城巴西人王志斬送之并獲道福斬于軍門帝之伐蜀將謀元帥乃舉齡石衆咸謂齡石資名尚輕慮不克辦論者甚衆帝不從乃分大軍之半令猛將徑卒悉以配之臧熹敬皇后弟也亦命受其節度及戰克捷衆咸服帝知人又美齡石善於事以平蜀功封豐城侯十四年桂陽公義真被徵以齡石為雍州刺史督關中諸軍事齡石至長安義真乃發義真敗于青泥齡石亦舉城奔走見殺傳國至孫齊受禪國除齡石弟超石亦果鋭雖出自將家兄弟並間尺牘桓謙為衛將軍以補行參軍後為武帝徐州主簿收迎桓謙身首躬營殯葬義熙十二年北伐超石為前鋒入河時軍人緣河南岸牽百丈有漂度北岸者輒為魏軍所殺略帝遣白直隊主丁旿率七百人及車百乘於河北岸為却月陳兩頭抱河車置七仗士事畢使竪一長白毦魏軍不解其意並未動帝先命超石戒嚴二千人白毦既舉超石赴之並齎大弩百張一車益二十人設彭排於轅上魏軍見營陳立乃進圍營超石先以弱弓小箭射之魏軍四面俱至魏明元皇帝又遣南平公長孫嵩三萬騎肉薄攻營於是百弩俱發魏軍既多弩不能制超石初行別齎大槌並千餘張矟乃斷矟三四尺以槌槌之一矟輒洞貫三四人魏軍不能當遂潰大軍進克蒲坂以超石為河東太守後除中書侍郎封興平縣五等侯關中亂帝遣超石慰勞河洛與齡石俱沒赫連勃勃見殺毛修之字敬文滎陽陽武人也祖武生伯父璩並益州刺史父瑾梁秦二州刺史修之仕桓玄為屯騎校尉隨玄西奔玄欲奔漢川修之誘令入蜀馮遷斬玄於枚洄洲修之力也宋武帝以為鎮軍咨議遷右衛將軍既有斬玄之謀又父伯並在蜀帝欲引為外助故頻加榮爵及父瑾為譙縱所殺帝表修之為龍驤將軍配兵遣奔赴時益州刺史鮑陋不肯進討修之言狀帝乃令冠軍將軍劉敬宣伐蜀無功而退譙縱由此送修之父伯及中表喪柩口纍並得還後劉毅西鎮江陵以為衛軍司馬南郡太守修之雖為毅將佐而深結於帝及毅敗見宥時遣朱齡石伐蜀修之固求行帝慮修之至蜀多所誅殺且土人既與毛氏有嫌亦當以死自固不許修之不信鬼神所至必焚房廟時蔣山廟中有好牛馬並奪取之纍遷相國右司馬行司州事戍洛陽修立城壘武帝至履行善之賜衣服玩好當時評直二千萬王鎮惡死修之代為安西司馬桂陽公義真敗為赫連勃勃所禽及赫連昌滅入魏修之在洛敬事嵩高道士寇謙之謙之為魏太武帝信敬營護之故不死修之嘗為羊羹薦魏尚書尚書以為絶味獻之太武大悅以為太官令被寵遂為尚書光祿大夫封南郡公太官令尚書如故後朱修之俘于魏亦見寵修之問朱修之南國當權者為誰答云殷景仁修之笑曰吾昔在南殷尚幼少我歸罪之日便當巾韝到門經年不忍問家消息久之乃訪焉修之具答並云賢子元矯甚能自處修之悲不得言直視良久乃長歎曰嗚呼自此一不復及初北人去來言修之勸魏侵邊并教以在南禮制文帝甚疑責之朱修之後得還具相申理上意乃釋修之在魏多妻妾男女甚衆身遂死於魏孫惠素仕齊為少府卿性至孝母服除後更修母所住處帳屏帷每月朔十五向帷悲泣傍人為之感傷終身如此惠素吏才強濟而臨事清刻敕市銅官碧青一千二百斤供御畫用錢六十五萬有讒惠素納利武帝怒敕尚書評價貴二十八萬餘有司奏伏誅死後家徒四壁武帝後知無罪甚悔恨之傅弘之字仲度北地泥陽人也傅氏舊屬靈州漢末失土寄馮翊置泥陽富平二縣廢靈州故傅氏悉屬泥陽晉武帝太康三年復立靈州縣傅氏還屬靈州弘之高祖祗晉司徒後封靈州公不欲封本縣故祗一門還屬泥陽曾祖暢祕書丞沒石勒生子洪晉穆帝永和中石氏亂度江洪生梁州刺史歆歆生弘之少倜儻有大志歷位太尉行參軍宋武帝北伐弘之與扶風太守沈田子等七軍自武關入弘之素習騎乘於姚泓馳道內戲馬甚有姿制羌胡觀者數千並歎稱善留為桂陽公義真雍州中從事史及義真東歸赫連勃勃傾國追躡於青泥大戰弘之躬貫甲胄氣冠三軍軍敗陷沒不為之屈時天大寒裸弘之弘之叫罵見殺朱修之字恭祖義陽平氏人也曾祖燾晉平西將軍祖序豫州刺史父諶益州刺史修之初為州主簿宋元嘉中纍遷司徒從事中郎文帝謂曰卿曾祖昔為王導丞相中郎卿今又為王弘中郎可謂不忝爾祖矣後隨右軍到彥之北侵彥之自河南回修之留戍滑臺被魏將安頡攻圍糧盡將士熏鼠食之修之被圍既久母常悲憂忽一旦乳汁驚出母號慟告家人曰我年老非復有乳汁時今如此兒必沒矣魏果以其日剋滑臺囚之太武嘉其固守之節以為雲中鎮將妻以宗室女修之潛謀南歸妻疑之每流涕謂曰觀無停意何不告我以實義不相負修之深嘉其義而不告也及太武伐馮弘修之及同沒人邢懷明並從又有徐卓者亦沒魏復欲率南人竊發事泄見誅修之懷明懼禍同奔馮弘不見禮停一年會宋使至修之名位素顯傳詔見便拜彼國敬傳詔呼為天子邊人見傳詔致敬乃始禮之時魏屢伐黃龍弘遣使求救修之乃使傳詔說而遣之泛海未至東萊舫柂折風猛海師慮向海北垂長索舫乃正海師視上有鳥飛知去岸不遠須臾至東萊及至以為黃門侍郎孝武初纍遷寧蠻校尉雍州刺史加都督修之政在寬簡士庶悅附及荊州刺史南郡王義宣反檄修之舉兵雍土時饑修之僞與之同既而遣使陳情於孝武孝武嘉之以為荊州刺史加都督義宣乃聞修之不同更以魯秀為雍州刺史擊襄陽修之命斷馬鞍山道秀不得前乃退修之率衆向江陵竺超已執義宣修之至於獄殺之以功封南昌縣侯修之立身清約百城貺贈一無所受唯以蠻人宜存撫納有餉皆受得輒與佐史賭之未嘗入己去鎮之日秋毫無犯計在州以來然油及私牛馬食官穀草以私錢六十萬償之而儉刻無潤薄於恩情姊在鄉里飢寒不立修之貴為刺史未曾供贍往姊家姊為設菜羹粗飯以激之修之曰此是貧家好食進之致飽先是新野庾彥達為益州刺史攜姊之鎮資給供奉中分秩祿西土稱焉修之後拜左戶尚書領軍將軍至建鄴牛奔墜車折腳辭尚書徙崇憲太僕仍加特進金紫光祿大夫腳疾不堪獨行見特給扶侍卒諡貞侯王玄謨字彥德太原祁人也六世祖宏河東太守綿竹侯以從叔司徒允之難棄官北居新興仍為新興雁門太守其自序云爾祖牢仕慕容氏為上谷太守隨慕容德居青州父秀早卒玄謨幼而不羣世父蕤有知人鑒常笑曰此兒氣概高亮有太尉彥雲之風宋武帝臨徐州辟為從事史與語異之少帝末謝晦為荊州請為南蠻行參軍武寧太守晦敗以非大帥見原元嘉中補長沙王義欣鎮軍中兵參軍領汝陰太守每陳北侵之規上謂殷景仁曰聞王玄謨陳說使人有封狼居胥意後為興安侯義賓輔國司馬彭城太守義賓薨玄謨上表以彭城要兼水陸請以皇子撫臨州政乃以孝武出鎮及大舉北侵以玄謨為寧朔將軍前鋒入河受輔國將軍蕭斌節度軍至碻磝玄謨進向滑臺圍城二百餘日魏太武自來救之衆號百萬鼓鞞動天地玄謨之行也衆力不少器械精嚴而專仗所見多行殺戮初圍城城內多茅屋衆求以火箭燒之玄謨曰損亡軍實不聽城中即撤壞之穴地為窟室及魏救將至衆請發車為營又不從將士並懷離怨又營貨利一匹布責人八百梨以此倍失人心及太武軍至乃夜遁麾下散亡略盡蕭斌將斬之沈慶之固諫曰佛狸威震天下控弦百萬豈玄謨所能當殺戰將以自弱非良計也斌乃止初玄謨始將見殺夢人告曰誦觀世音千遍則免玄謨夢中曰何可竟也仍見授既覺誦之且得千遍明日將刑誦之不輟忽傳唱停刑遣代守碻磝江夏王義恭為征討都督以碻磝沙城不可守召令還為魏軍所追大破之流矢中臂二十八年正月還至歷城義恭與玄謨書曰聞因敗為成臂上金創將非金印之徵邪元凶弒立以玄謨為冀州刺史孝武伐逆玄謨遣濟南太守垣護之等將兵赴義事平除徐州刺史加都督及南郡王義宣與江州刺史臧質反朝廷假玄謨輔國將軍為前鋒南討拜豫州刺史質尋至大破之加都督封曲江縣侯中軍司馬劉冲之白孝武言玄謨在梁山與義宣通謀檢雖無實上意不能明使有司奏玄謨沒匿所得賊寶物虛張戰簿與徐州刺史垣護之並免官尋為寧蠻校尉雍州刺史加都督雍土多諸僑寓玄謨上言所統僑郡無有境土新舊錯亂租課不時宜加並合見許乃省並郡縣自此便之百姓當時不願屬籍其年玄謨又令九品以上租使貧富相通境內莫不嗟怨人間訛言玄謨欲反時柳元景當權元景弟僧景為新城太守以元景之勢制令雍土南陽順陽上庸新城諸郡並發兵欲討玄謨玄謨令內外晏然以解衆惑馳啓孝武具陳本末帝知其虛馳遣主書吳喜公慰撫之又答曰玄謨啓明白之日七十老公反欲何求聊復為笑想足以申卿眉頭耳玄謨性嚴未曾妄笑時人言玄謨眉頭未曾申故以此見戲後為金紫光祿大夫領太常及建明堂以本官領起部尚書又領北選孝武狎侮羣臣各有稱目多須者謂之羊短長肥瘦皆有比擬顏師伯齒號之曰齴劉秀之儉吝常呼為老慳黃門侍郎宗靈秀軀體肥壯拜起艱難每一集會輒於坐賜靈秀器服飲食前後相係欲其占謝傾踣以為歡笑又刻木作靈秀父光祿勳叔獻像送其家聽事柳元景垣護之雖並北人而玄謨獨受老傖之目凡諸稱謂四方書疏亦如之嘗為玄謨作四時詩曰堇茹供春膳粟漿充夏餐匏醬調秋菜白醝解冬寒又寵一崑崙奴子名白主常在左右令以杖擊羣臣自柳元景以下皆罹其毒玄謨尋遷徐州刺史加都督時北土災饉乃散私穀十萬斛牛千頭以賑之孝武崩與羣公俱被顧命時朝政多門玄謨以嚴直不容徙青冀二州刺史加都督少帝誅顏師伯柳元景等狂悖滋甚以領軍徵玄謨子姪咸勸稱疾玄謨曰避難苟免既乖事君之節且吾荷先朝厚恩彌不得逡巡及至屢表諫諍又流涕請緩刑去殺以安元元之意少帝大怒明帝即位禮遇益崇時四方反叛玄謨領水軍前鋒南討以腳疾未差聽乘輿出入尋除車騎將軍江州刺史副司徒建安王休仁於赭圻賜以諸葛亮筒袖鎧頃之以為左光祿大夫開府儀同三司領護軍將軍遷南豫州刺史加都督薨年八十二諡曰莊公子深早卒深子繢嗣深弟寬泰始初為隨郡太守逢四方反父玄謨在建鄴寬棄郡自歸以母在西為賊所執請西行遂襲破隨郡收其母事平明帝嘉之使圖寬形以上齊永明元年為太常坐於宅殺牛免官後卒於光祿大夫寬弟瞻字明遠一字叔鸞負氣俗好貶裁人物仕宋為王府參軍嘗詣劉彥節直登榻曰君侯是公孫僕是公子引滿促膝唯余二人彥節外跡雖酬之意甚不悅齊豫章王嶷少時早與瞻友瞻常候嶷高論齊武帝時在大寢瞻謂嶷曰帳中人物亦復隨人寢興嶷言次忽問王景文兄楷賢愚何如殷道矜瞻曰卿遂復言他人兄邪武帝笑稱嶷小名阿玉汝兄愚那得忽來王參軍此句瞻曰直恐如卿來談武帝銜之未嘗形色後歷黃門侍郎及齊建元初瞻為永嘉太守詣闕跪拜不如儀武帝知之召入東宮仍送付廷尉殺之命左右啓高帝曰父辱子死王瞻傲朝廷臣輒已收之高帝曰此何足計及聞瞻已死乃默無言玄謨從弟玄象位下邳太守好發冢地無完槨人間垣內有小冢墳上殆平每朝日初升見一女子立冢上近視則亡或以告玄象便命發之有一棺尚全有金蠶銅人以百數剖棺見一女子年可二十姿質若生臥而言曰我東海王家女應生資財相奉幸勿見害女臂有玉釧破冢者斬臂取之於是女復死玄謨時為徐州刺史以事上聞玄象坐免郡玄載字彥休玄謨從弟也父蕤東莞太守玄載仕宋位益州刺史沈攸之之難玄載起義送誠於齊高帝封鄂縣子齊建元元年為左戶尚書永明四年位兗州刺史卒官諡烈子玄載弟玄邈字彥遠仕宋位青州刺史齊高帝之鎮淮陰為宋明帝所疑乃北勸魏遣書結玄邈玄邈長史房叔安進曰夫布衣韋帶之士銜一餐而不忘義使之然也今將軍居方州之重託君臣之義無故舉忠孝而棄之三齊之士寧蹈東海死耳不敢隨將軍也玄邈意乃定仍使叔安使建鄴發高帝謀高帝於路執之並求玄邈表叔安答曰寡君使表上天子不上將軍且僕之所言利國家而不利將軍無所應問荀伯玉勸殺之高帝曰物各為主無所責也玄邈罷州還高帝塗中要之玄邈嚴軍直過還都啓宋明帝稱高帝有異謀高帝不恨也升明中高帝引為驃騎司馬泰山太守玄邈甚懼高帝待之如初再遷西戎校尉梁南秦二州刺史封河陽縣侯兄弟同時為方伯齊建元初亡命李烏奴作亂梁部玄邈使人僞降烏奴告之曰王使君兵弱攜愛妾二人已去矣烏奴喜輕兵襲州城玄邈奇兵破之高帝聞之曰玄邈果不負吾延興元年為中護軍明帝使玄邈往江州殺晉安王子懋玄邈苦辭不行及遣王廣之往廣陵取安陸王子敬玄邈不得已奉旨建武中卒於護軍贈雍州刺史諡壯侯叔安字子仁清河人高帝即位懷其忠正時為益州司馬寧蜀太守就拜前將軍方用為梁州會病卒帝歎曰叔安節義古人中求之耳恨不至方伯而終子長瑜亦有義行永明中為州中從事論曰自晉室播遷來宅揚越關邊遙阻汧隴遐荒區甸分其內外山河判其表𩹉桓溫一代英人志移晉鼎自非兵屈霸上戰衄枋頭則光宅之運中年允集宋武帝屈起布衣非藉人譽一旦驅率烏合奄興霸緒功雖有餘而德猶未洽非樹奇功於難立震大威於四海則不能成配天之業一異同之心故須外積武功以收人望及金墉請吏元勳既立心欲挂斾龍門折衝冀趙跨功桓氏取高昔人方復觀兵崤渭陳師天嶮及靈威薄震重關自闢故知英算所包先勝而後戰也王鎮惡推鋒直指前無強陳為宋方叔其壯矣乎朱齡石超石毛修之傅弘之等以歸衆難固之情逢英勇乘機之運以至顛陷為不幸矣修之滑臺之守有疏勒之難苟誠節在焉所在為重其取榮大國豈徒然哉終假道自歸首丘之義也玄謨封狼之心雖簡帝念然天方相魏人豈能支宋氏以三吳之弱卒當八州之徑勇欲以邀勝不亦難乎蹙境亡師固其宜也觀夫慶之言可謂達於時變瞻傲佷不悔卒至亡軀然齊武追恨魚服匹夫懼矣玄邈行己之度有士君子之風乎
