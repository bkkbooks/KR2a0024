body:
  text: 南史卷二十列傳第十謝弘微子莊孫朏曾孫譓玄孫哲朏弟皓皓弟𦵩𦵩子覽覽弟舉舉子嘏舉兄子僑謝密字弘微晉西中郎萬之曾孫尚書左僕射景仁從子也祖韶車騎司馬父思武昌太守弘微年十歲繼從叔峻名犯所繼內諱故以字行童幼時精神端審時然後言所繼叔父混名知人見而異之謂思曰此兒深中夙敏方成佳器有子如此足矣峻司空琰子也於弘微本服緦親戚中表素不相識率意承接皆合禮衷義熙初襲爵建昌縣侯弘微家素貧儉而所繼豐泰唯受數千卷書國吏數人而已遺財祿秩一不關預混聞而驚歎謂國郎中令漆凱之曰建昌國祿本應與北舍共之國侯既不厝意今可依常分送弘微重違混言乃少有所受北舍弘微本家也混風格高峻少所交納唯與族子靈運瞻晦曜弘微以文義賞會常共宴處居在烏衣巷故謂之烏衣之游混詩所言昔為烏衣游戚戚皆親姓者也其外雖復高流時譽莫敢造門瞻等才辭辨富弘微每以約言服之混特所敬貴號曰微子謂瞻等曰汝諸人雖才義豐辨未必皆愜衆心至於領會機賞言約理要故當與我共推微子常言阿遠剛躁負氣阿客博而無檢曜仗才而持操不篤晦自知而納善不周設復功濟三才終亦以此為恨至如微子吾無間然又言微子異不傷物同不害正若年造六十必至公輔嘗因酣宴之餘為韻語以奬勸靈運瞻等曰康樂誕通度實有名家韻若加繩染功剖瑩乃瓊瑾宣明體遠識穎達且沈俊若能去方執穆穆三才順阿多標獨解弱冠纂華胤質勝誡無文其尚又能峻通遠懷清悟采采摽蘭訊直轡鮮不躓抑用解偏吝微子基微尚無倦由慕藺勿輕一簣少進往必千仞數子勉之哉風流由爾振如不犯所知此外無所慎靈運瞻等並有誡厲之言唯弘微獨盡褒美曜弘微兄多其小字通遠即瞻字客兒靈運小名也晉世名家身有國封者起家多拜員外散騎侍郎弘微亦拜員外散騎侍郎琅邪王大司馬參軍義熙八年混以劉毅黨見誅混妻晉陵公主改適琅邪王練公主雖執意不行而詔與謝氏離絶公主以混家事委之弘微混仍世宰相一門兩封田業十餘處僮役千人唯有二女年並數歲弘微經紀生業事若在公一錢尺帛出入皆有文簿宋武受命晉陵公主降封東鄉君以混得罪前代東鄉君節義可嘉聽還謝氏自混亡至是九年而室宇修整倉廩充盈門徒不異平日田疇墾闢有加於舊東鄉君歎曰僕射生平重此子可謂知人僕射為不亡矣中外姻親道俗義舊見東鄉之歸者入門莫不歎息或為流涕感弘微之義也性嚴正舉止必循禮度事繼親之黨恭謹過常伯叔二母歸宗兩姑晨夕瞻奉盡其誠敬內外或傳語通訊輒正其衣冠婢僕之前不妄言笑由是尊卑大小敬之若神時有蔡湛之者及見謝安兄弟謂人曰弘微貌類中郎而性似文靖文帝初封宜都王鎮江陵以琅邪王球為友弘微為文學母憂去職居喪以孝稱服闋蔬素踰時文帝即位為黃門侍郎與王華王曇首殷景仁劉湛等號曰五臣遷尚書吏部郎參機密尋轉右衛將軍諸故吏臣佐並委弘微選擬居身清約器服不華而飲食滋味盡其豐美兄曜歷御史中丞彭城王義康驃騎長史卒官弘微哀戚過禮服雖除猶不噉魚肉沙門釋慧琳嘗與之食見其猶蔬素謂曰檀越素既多疾即吉猶未復膳若以無益傷生豈所望於得理弘微曰衣冠之變禮不可踰在心之哀實未能已遂廢食歔欷不自勝弘微少孤事兄如父友睦之至舉世莫及口不言人短見兄曜好臧否人物每聞之常亂以他語歷位中庶子加侍中志在素宦畏忌權寵固讓不拜乃聽解中庶子每獻替及陳事必手書焚草人莫之知上以弘微能膳羞每就求食弘微與親舊經營及進之後親人問上所御弘微不答別以餘語酬之時人比之漢世孔光及東鄉君薨遺財千萬園宅十餘所又會稽吳興琅邪諸處太傅安司空琰時事業奴僮猶數百人公私咸謂室內資財宜歸二女田宅僮僕應屬弘微弘微一不取自以私祿營葬混女夫殷睿素好摴蒱聞弘微不取財物乃濫奪其妻妹及伯母兩姑之分以還戲責內人皆化弘微之讓一無所爭弘微舅子領軍將軍劉湛謂弘微曰天下事宜有裁衷卿此不問何以居官弘微笑而不答或有譏以謝氏纍世財産充殷君一朝戲責譬棄物江海以為廉耳弘微曰親戚爭財為鄙之甚今內人尚能無言豈可導之使爭今分多共少不至有乏身死之後豈復見關東鄉君葬混墓開弘微牽疾臨赴病遂甚元嘉十年卒年四十二文帝歎惜甚至謂謝景仁曰謝弘微王曇首年踰四十名位未盡其才此朕之責也弘微性寬博無喜慍末年嘗與友人友人西南有死勢復一客曰西南風急或有覆舟者友悟乃救之弘微大怒投局於地識者知其暮年之事果以此歲終時有一長鬼寄司馬文宣家言被遣殺弘微弘微疾每劇輒豫告文宣及弘微死與文宣分別而去弘微臨終語左右曰有二書須劉領軍至可於前燒之慎勿開也書是文帝手敕上甚痛惜之使二衛千人營畢葬事追贈太常弘微與琅邪王惠王球並以簡淡稱人謂沈約曰王惠何如約曰令明簡次問王球約曰蒨玉淡又次問弘微約曰簡而不失淡而不流古之所謂名臣弘微當之其見美如此子莊莊字希逸七歲能屬文及長韶令美容儀宋文帝見而異之謂尚書僕射殷景仁領軍將軍劉湛曰藍田生玉豈虛也哉為隨王誕後軍咨議領記室分左氏經傳隨國立篇製木方丈圖山川土地各有分理離之則州郡殊別合之則宇內為一元嘉二十七年魏攻彭城遣尚書李孝伯與鎮軍長史張暢語孝伯訪問莊及王微其名聲遠布如此二十九年除太子中庶子時南平王金欒獻赤鸚鵡普詔羣臣為賦太子左衛率袁淑文冠當時作賦畢示莊及見莊賦歎曰江東無我卿當獨秀我若無卿亦一時之傑遂隱其賦元凶弒立轉司徒左長史孝武入討密送檄書與莊令加改正宣布之莊遣腹心門生具慶奉啓事密詣孝武陳誠及帝踐阼除侍中時魏求通互市上詔羣臣博議莊議以為拒而觀釁有足表強驃騎竟陵王誕當為荊州徵丞相荊州刺史南郡王義宣入輔義宣固辭不入而誕便剋日下船莊以丞相既無入志而驃騎發便有期如似欲相逼切帝乃申誕發日義宣竟亦不下孝建元年遷左將軍莊有口辨孝武嘗問顏延之曰謝希逸月賦何如答曰美則美矣但莊始知隔千里兮共明月帝召莊以延之答語語之莊應聲曰延之作秋胡詩始知生為久離別沒為長不歸帝撫掌竟日又王玄謨問莊何者為雙聲何者為疊韻答曰玄護為雙聲碻磝為疊韻其捷速若此初孝武嘗賜莊寶劍莊以與豫州刺史魯爽後爽叛帝因宴問劍所在答曰昔以與魯爽別竊為陛下杜郵之賜上甚悅當時以為知言于時搜才路狹莊表陳求賢之義曰臣聞功傾魏后非特照車之珍德柔秦客豈徒祕璧之貴隆陂所漸成敗之由何嘗不興資得才替因失士故楚書以善人為寶虞典以則哲為難而進選之舉既隳中代登造之律未聞當今必欲豐本康務庇人濟俗匪更惉懘奚取九成夫才生於時古今豈二士出於世屯泰焉殊升曆中陽英賢起於徐沛受籙白水茂異出於荊宛寧二都智之所産七隩愚之所育實遇與不遇用與不用耳今大道光亨萬務俟德而九服之曠九流之艱提鈞懸衡委之選部一人之鑒易限天下之才難源以易限之鑒鏡難源之才使國罔遺賢野無滯器其可得乎昔公叔登臣管仲升盜趙文非私親疏嗣祁奚豈諂讎比子茹茅以彙作範前經舉爾所知式昭往牒且自古任薦弘明賞罰成子舉三哲而身致魏輔應侯任二士而已捐秦相臼季稱冀缺而疇以田采張勃進陳湯而坐之褫爵此則先事之盛準亦後王之彝鑒臣謂宜普命大臣各舉所知以付尚書依分銓用若任得其才舉主延賞有不稱職宜及其坐重者免黜輕者左遷被舉之身加以禁錮年數多少隨愆議制若犯大辟則任者刑論又政平訟理莫先親人親人之要實歸守宰故黃霸蒞潁川纍稔杜畿居河東歷載或就加恩秩或入崇暉寵今蒞人之職宜遵六年之限進得章明庸惰退得人不勤勞如此則上靡棄能下無浮謬考績之風載泰薪槱之歌克昌初文帝世限年三十而仕郡縣六周乃選代刺史或十年餘至是皆易之仕者不拘長少蒞人以三周為滿宋之善政於是乎衰是年拜吏部尚書莊素多疾不願居選部與大司馬江夏王義恭箋自陳兩脅癖疢殆與生俱一月發動不減兩三每痛來逼心氣餘如綖利患數年遂成痼疾岋岋惙惙常如行尸眼患五月來便不復得夜坐閉帷避風晝夜惛懵為此不復得朝謁諸王慶弔親舊今之所止唯在小閣下官微命於天下至輕在己不能不重家世無年亡高祖四十曾祖三十三亡祖四十七下官新歲便三十五加以疾患如此當復幾時入年當申前請以死自固願侍坐言次賜垂接助三年坐疾多免官大明元年起為都官尚書上時親覽朝政慮權移臣下以吏部尚書選舉所由欲輕其勢力二年吏部尚書依郎分置并詳省間曹又別詔太宰江夏王義恭曰吏部尚書由來與録共選良以一人之識不辨洽通兼與奪威權不宜專一故也於是置吏部尚書二人省五兵尚書莊及度支尚書顧覬之並補選職遷左衛將軍加給事中時河南獻舞馬詔羣臣為賦莊所上甚美又使莊作舞馬歌令樂府歌之五年又為侍中領前軍將軍時孝武出行夜還敕開門莊居守以棨信或虛須墨詔乃開上後因宴從容曰卿欲效郅君章邪對曰臣聞搜巡有度郊祀有節盤于游田著之前誡陛下今蒙犯塵露晨往宵還容致不逞之徒妄生矯詐臣是以伏須神筆六年又為吏部尚書領國子博士坐選公車令張奇免官事在顏師伯傳後除吳郡太守前廢帝即位以為金紫光祿大夫初孝武寵姬殷貴妃薨莊為誄言贊軌堯門引漢昭帝母趙婕妤堯母門事廢帝在東宮銜之至是遣人詰莊曰卿昔作殷貴妃誄知有東宮不將誅之孫奉伯說帝曰死是人之所同政復一往之苦不足為困莊少長富貴且繫之尚方使知天下苦劇然後殺之未晚帝曰卿言有理繫於左尚方明帝定亂得出使為赦詔莊夜出署門方坐命酒酌之已微醉傳詔停待詔成其文甚工後為尋陽王師加中書令散騎常侍尋加金紫光祿大夫給親信二十人卒贈右光祿大夫諡憲子所著文章四百餘首行于世五子揚朏皓𦵩世謂莊名子以風月景山水揚位晉平太守女為順帝皇后追贈金紫光祿大夫朏字敬沖幼聰慧莊器之常置左右十歲能屬文莊游土山使朏命篇攬筆便就琅邪王景文謂莊曰賢子足稱神童復為後來特達莊撫朏背曰真吾家千金宋孝武帝游姑孰敕莊攜朏從駕詔為洞井讚於坐奏之帝曰雖小重也仕宋為衛將軍袁粲長史粲性簡峻時人方之李膺朏謁退粲曰謝令不死矣宋明帝嘗敕朏與謝鳳子超宗從鳳莊門入二人俱至超宗曰君命不可以不往乃趨而入朏曰君處臣以禮遂退不入時人兩稱之以比王尊王陽後為臨川內史以賄見劾袁粲寢其事齊高帝為驃騎將軍輔政選朏為長史高帝方圖禪代欲以朏佐命遷左長史每夕置酒獨與朏論魏晉故事言石苞不早勸晉文死方慟哭方之馮異非知機也朏曰昔魏臣有勸魏武即帝位魏武曰有用我者其周文王乎晉文世事魏氏將必終身北面假使魏早依唐虞故事亦當三讓彌高帝不悅更引王儉為左長史以朏為侍中領祕書監及齊受禪朏當日在直百僚陪位侍中當解璽朏佯不知曰有何公事傳詔云解璽授齊王朏曰齊自應有侍中乃引枕臥傳詔懼乃使稱疾欲取兼人朏曰我無疾何所道遂朝服出東掖門乃得車仍還宅是日遂以王儉為侍中解璽既而武帝請誅朏高帝曰殺之則成其名正應容之度外又以家貧乞郡辭旨抑揚詔免官禁錮五年永明中為義興太守在郡不省雜事悉付綱紀曰吾不能作主者吏但能作太守耳歷都官尚書中書令侍中領新安王師求出仍為吳興太守明帝謀入嗣位引朝廷舊臣朏內圖止足且實避事弟𦵩時為吏部尚書朏至郡致𦵩數斛酒遺書曰可力飲此勿豫人事朏居郡每不理常務聚斂衆頗譏之亦不屑也建武四年徵為侍中中書令不應遣諸子還都獨與母留築室郡之西郭明帝詔加優禮旌其素概賜牀帳褥席奉以卿祿時國子祭酒廬江何胤亦抗表還會稽永元中詔徵朏胤並不屈時東昏皆命迫遣會梁武帝起兵及建鄴平徵朏胤並補軍咨祭酒皆不至及即位詔徵朏為侍中左光祿大夫開府儀同三司胤散騎常侍特進右光祿大夫又並不屈仍遣領軍司馬王果敦譬朏朏謀於何胤胤欲獨高其節紿曰興王之世安可久處明年六月朏輕舟出詣闕自陳帝笑曰子陵遂能屈志詔以為侍中司徒尚書令朏辭腳疾不堪拜謁乃角巾肩輿詣雲龍門謝詔見於華林園乘小車就席明旦乘輿出幸朏宅宴語盡歡朏固陳本志不許又固請自還迎母許之臨發輿駕臨幸賦詩餞別王人送迎相望於道到都敕材官起府於舊宅武帝臨軒遣謁者於府拜授詔停諸公事及朔望朝謁三年元會詔朏乘小輿升殿朏素憚煩及居台鉉兼掌內臺職事多不覽以此頗失衆望其年母憂尋有詔攝職如故五年改授中書監司徒衛將軍固讓不受遣謁者敦授留府門及暮至於經春夏八月乃拜受焉是冬薨車駕出臨哭諡曰孝靖建武初朏為吳興以雞卵賦人收雞數千及遁節不全為清談所少著書及文章行於世子諼位司徒右長史坐殺牛廢黜為東陽內史及還五官送錢一萬止留一百答曰數多劉寵更以為愧次子譓不妄交接門無雜賓有時獨醉曰入吾室者但有清風對吾飲者唯當明月位右光祿大夫子哲字穎豫美風儀舉止醞藉襟情豁朗為士君子所重仕梁至廣陵太守侯景之亂因寓居焉仕陳歷吏部尚書中書令侍中司徒左長史卒諡康子皓字仁悠朏弟也少簡靜宋末為豫章太守至石頭遂白服登烽火樓坐免官詣齊高帝自占謝言辭清麗容儀端雅左右為之傾目宥而不問齊永明初高選友學以皓為竟陵王友歷吏部郎有簡秀之目卒於北中郎長史皓弟𦵩字義潔年七歲王景文見而異之言於宋孝武召見於人衆中𦵩舉止間詳應對合旨帝悅詔尚公主景和敗事寢僕射褚彥回以女妻之厚為資送性甚敏贍嘗與劉悛飲推讓久之悛曰謝莊兒不可云不能飲𦵩曰苟得其人自可流湎千日悛甚慚無言仕齊纍遷中書侍郎衛軍王儉引為長史雅相禮遇後拜吏部尚書明帝廢鬱林領兵入殿左右驚走報𦵩𦵩與客圍每下子輒云其當有意竟局乃還齊臥竟不問外事明帝即位𦵩又屬疾不知公事蕭諶以兵臨起之𦵩曰天下事公卿處之足矣且死者命也何足以此懼人後宴會功臣上酒尚書令王晏等興席𦵩獨不起曰陛下受命應天王晏以為己力獻觴遂不見報上大笑解之座罷晏呼𦵩共載欲相撫悅𦵩又正色曰君巢窟在何處晏初得班劍𦵩謂曰身家太傅裁得六人若何事頓得二十晏甚憚之謂江祏曰彼上人者難為酬對加領右軍將軍兄朏在吳興論啓公事稽晚𦵩輒代朏為啓上知非朏手迹被問見原永泰元年卒於太子詹事贈金紫光祿大夫諡簡子初朏為吳興𦵩於征虜渚送別朏指𦵩口曰此中唯宜飲酒𦵩建武之朝專以長酣為事與劉瑱沈昭略交飲各至數斗齊武帝問王儉當今誰能為五言儉曰朏得父膏腴江淹有意上起禪靈寺敕𦵩撰碑文𦵩子覽覽字景滌選尚齊錢唐公主拜駙馬都尉梁武平建鄴朝士王亮王瑩等數人揖自餘皆拜覽時年二十餘為太子舍人亦長揖而已意氣間雅視瞻聰明武帝目送良久謂徐勉曰覺此生芳蘭竟體想謝莊政當如此自此仍被賞味天監元年為中書侍郎掌吏部事頃之即真嘗侍坐受敕與侍中王暕為詩答贈其文甚工乃使重作復合旨帝賜詩云雙文既後進二少實名家豈伊爾棟隆信乃俱國華為侍中頗樂酒因宴席與散騎常侍蕭琛辭相詆毀為有司所奏武帝以覽年少不直出為中權長史後拜吏部尚書出為吳興太守中書舍人黃睦之家居烏程子弟專橫前太守皆折節事之覽未到郡睦之子弟迎覽覽逐去其船杖吏為通者自是睦之家杜門不出郡境多劫為東道患覽下車肅然初齊明帝及覽父𦵩東海徐孝嗣並為吳興號為名守覽皆過之覽昔在新安頗聚斂至是遂稱廉潔時人方之王述卒於官贈中書令覽弟舉字言揚幼好學與覽齊名年十四嘗贈沈約詩為約所賞弱冠丁父憂幾致毀滅服闋為太常博士與兄覽俱預元會江淹一見並相欽挹曰所謂馭二龍於長塗者也為太子家令掌管記深為詔明太子賞接祕書監任昉出為新安郡別舉詩云詎念耋嗟人方深老夫託其屬意如此梁武嘗訪舉於覽覽曰識藝過臣甚遠唯飲酒不及於臣帝大悅尋除安成郡守母往於郡喪辭不赴歷位左戶尚書遷掌吏部尚書舉祖莊父𦵩兄覽並經此職前代少比舉尤長玄理及釋氏義為晉陵郡時常與義學僧遞講經論徵士何胤自虎丘山出赴之其盛如此先是北度人盧廣有儒術為國子博士於學發講僕射徐勉以下畢至舉造坐屢折廣辭理遒邁廣深歎服仍以所執麈尾斑竹杖滑石書格薦之以況重席焉加侍中遷尚書右僕射大同三年出為吳郡太守先是何敬容居郡有美績世稱為何吳郡及舉為政聲跡略相比曾要何徵君講中論何難以巾褐入南門乃從東園進致詩往復為虎丘山賦題于寺入為侍中太子詹事翊左將軍舉父𦵩齊時終此官纍表乞改敕不許後遷尚書僕射侍中將軍如故舉雖屢居端揆未嘗肯預時政保身固寵不能有所發明因疾陳解敕輒賜假並敕處方加給上藥其恩遇如此侯景來降帝詢訪朝臣舉及朝士皆請拒之帝從朱异言納之以為景能立功趙魏舉等不敢復言太清二年遷尚書令卒于內臺上曰舉非止歷官已多亦人倫儀表久著公望悵恨未授之可贈侍中中衛將軍開府儀同三司舉宅內山齊捨以為寺泉石之美殆若自然臨川始興諸王常所游踐邵陵王綸於婁湖立園廣宴酒後好聚衆賓冠手自裂破投之唾壺皆莫敢言舉嘗預宴王欲取舉幘舉正色曰裂冠毀冕下官弗敢聞命拂衣而退王屢召不返甚有慚色舉託情玄勝尤長佛理注淨名經常自講說有文集二十卷子嘏嘏字含茂風神清雅頗善屬文仕梁為太子中庶子建安太守侯景之亂之廣州依蕭勃勃敗在周迪門後依陳寶應寶應平方詣闕歷侍中中書令都官尚書卒諡曰光子有文集行於世子儼位侍中御史中丞太常卿胄位尚書僕射舉兄子僑字國美父玄大仕梁侍中僑素貴嘗一朝無食其子啓欲以班史質錢答曰寧餓死豈可以此充食乎太清元年卒集十卷長子褘僑弟札字世高亦博涉文史位湘東王咨議先僑卒論曰易云積善之家必有餘慶弘微立履所蹈人倫播美其世濟不隕蓋有馮焉敬沖出入三代驟經遷革遁俗之志無聞貞固之道居官之方未免貨財之纍因傴成敬偃仰當年古人云處士全盜虛聲斯之謂矣
