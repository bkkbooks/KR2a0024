body:
  text: 南史卷十八列傳第八趙倫之子伯符蕭思話子惠開惠明惠明子視素惠明弟惠基惠基子洽惠基弟惠休惠休弟子介介子允引惠開從孫琛臧燾玄孫嚴嚴族叔未甄未甄子盾厥燾弟熹熹子質趙倫之字幼成下邳僮人宋孝穆皇后之弟也幼孤貧事母以孝稱宋武帝起兵以軍功封閬中縣五等侯纍遷雍州刺史武帝北伐倫之遣順陽太守傅弘之扶風太守沈田子出嶢柳大破姚泓於藍田及武帝受命以佐命功封霄城縣侯少帝即位徵拜護軍元嘉三年拜領軍將軍倫之雖外戚貴寵而居身儉素性野拙澀於人間世事多所不解久居方伯公私富貴入為護軍資力不稱以為見貶光祿大夫范泰好戲笑謂曰司徒公缺必用汝老奴我不言汝資地所任要是外戚高秩次第所至耳倫之大喜每載酒肴詣泰五年卒諡元侯子伯符嗣伯符字潤遠少好弓馬為寧遠將軍總領義徒以居宮城北每火起及有劫盜輒身貫甲胄助郡縣赴討武帝甚嘉之文帝即位纍遷徐兗二州刺史為政苛暴吏人畏懼如與虎狼居而劫盜遠迸無敢入境元嘉十八年徵為領軍將軍先是外監不隸領軍宜相統攝者自有別詔至此始統領焉後為丹陽尹在郡嚴酷曹局不復堪命或委叛被戮透水而死典筆吏取筆失旨頓與五十鞭子倩尚文帝第四女海鹽公主甚愛重倩嘗因言戲以手擊主事上聞文帝怒離婚伯符慚懼發病卒諡曰肅傳國至孫勗齊受禪國除蕭思話南蘭陵人宋孝懿皇后弟子也父源之字君流歷徐兗二州刺史永初元年卒贈前將軍思話十許歲時未知書好騎屋棟打細腰鼓侵暴鄰曲莫不患毒之自此折節數年中遂有令譽頗工隸書善彈琴能騎射後襲爵封陽縣侯元嘉中為青州刺史亡命司馬朗之兄弟聚黨謀為亂思話遣北海太守蕭汪之討斬之八年魏軍大至乃棄鎮奔平昌魏軍定不至由是徵繫尚方初在青州常所用銅斗覆在藥下忽於斗下得二死雀思話歎曰斗覆而雙雀殞其不祥乎既而被繫及梁州刺史甄法護在任失和氐帥楊難當因此寇漢中乃自徒中起思話為梁南秦二州刺史平漢中悉收侵地置戍葭萌水思話遷鎮南鄭法護中山無極人也過江寓居南郡弟法崇自少府為益州刺史法護委鎮之罪為府所收於獄賜死文帝以法崇受任一方命言法護病卒文帝使思話上定漢中本末下之史官十四年遷臨川王義慶平西長史南蠻校尉文帝賜以弓琴手敕曰前得此琴言是舊物今以相借並往桑弓一張材理乃快良材美器宜在盡用之地丈人真無所與讓也嘗從文帝登鍾山北嶺中道有盤石清泉上使於石上彈琴因賜以銀鍾酒謂曰相賞有松石間意歷寧蠻校尉雍州刺史監四州軍事徵為吏部尚書思話以去州無復事力倩府軍身九人文帝戲之曰丈人終不為田父於閭里何憂無人使邪未拜遷護軍將軍是時魏攻懸瓠文帝將大舉北侵朝士僉同思話固諫不從魏軍退即代孝武為徐兗二州刺史監四州軍事後為圍碻磝城不拔退師歷下為江夏王義恭所奏免官元凶弒立以為徐兗二州刺史即起義以應孝武孝武即位徵為尚書左僕射固辭改為中書令丹陽尹散騎常侍時都下多劫掠二旬中十七發引咎陳遜不許後拜郢州刺史加都督卒贈征西將軍開府儀同三司諡曰穆侯思話外戚令望早見任待歷十二州杖節監督者九焉所至雖無皎皎清節亦無穢黷之纍愛才好士人多歸之長子惠開少有風氣涉獵文史家雖貴戚而居服簡素初為祕書郎意趣與人多不同比肩或三年不共語外祖光祿大夫沛郡劉成戒之曰汝恩戚家子無多異以取天下之疾轉太子舍人與汝南周朗同官友善以偏奇相尚孝建元年為黃門侍郎與侍中何偃爭推積射將軍徐冲之事偃任遇甚隆怒使門下推彈惠開乃上表解職由此忤旨別敕有司以屬疾多免之思話素恭謹與惠開不同每加嫌責及見惠開自解表歎曰兒不幸與周朗周旋理應如此杖之二百尋除中庶子丁父艱居喪有孝性家素事佛凡為父起四寺南岡下名曰禪岡寺曲阿舊鄉宅名曰禪鄉寺京口墓亭名曰禪亭寺所封封陽縣名曰禪封寺謂國僚曰封秩鮮而兄弟甚多若全關一人則在我所讓若人人等分又事可悲寺衆既立自宜悉供僧衆襲封封陽縣侯為新安王子鸞冠軍長史惠開妹當適桂陽王休範女又當適孝武子發遣之資應須二千萬乃以為豫章內史聽其肆意聚納由是在郡著貪暴之聲再遷御史中丞孝武與劉秀之詔曰今以蕭惠開為憲司冀當稱職但一往眼額已自殊有所震及在職百僚憚之後拜益州刺史路經江陵時吉翰子在荊州共惠開有舊為設女樂樂人有美者惠開就求不得又欲以四女妓易之不許惠開怒收吉斬之即納其妓啓云吉為劉義宣所遇交結不逞向臣訕毀朝政輒已戮之孝武稱快惠開素有大志至蜀欲廣樹經略善於述聞其言者皆以為大功可立才疏意廣竟無成功嚴用威刑蜀人號曰臥虎明識過人嘗供三千沙門一閲其名退無所失明帝即位晉安王子勛反惠開乃集將佐謂曰吾荷世祖之眷當投袂萬里推奉九江蜀人素怨惠開嚴及是所遣兵皆不得前晉原郡反諸郡悉應並來圍城城內東兵不過二千凡蜀人惠開疑之悉皆遣出子勛尋敗蜀人並欲屠城以望厚賞明帝以蜀土險遠赦其誅責遣其弟惠基使蜀宣旨而蜀人志在屠城不使王命速達遏留惠基惠基破其渠帥然後得前惠開奉旨歸順城圍得解明帝又遣惠開宗人寶首水路慰勞益州寶首欲以平蜀為功更奬說蜀人處處蜂起惠開乃啓陳情事遣宋寧太守蕭惠訓州別駕費欣業分兵並進大破之禽寶首送之惠開至都明帝問其故侍衛左右莫不悚然側目惠開舉動自若從容答曰臣唯知逆順不識天命又云非臣不亂非臣不平初惠開府録事參軍劉希微負蜀人責將百萬為責主所制未得俱還惠開與希微共事不厚而中凡有馬六十匹悉以乞希微償責其意趣不常如是惠開還資二千餘萬悉散施道俗一無所留後除桂陽王休範征北長史南東海太守其年會稽太守蔡興宗之郡惠開自京口請假還都相逢於曲阿惠開先與興宗名位略同又經情款自以負釁摧屈慮興宗不能詣己戒勒部下蔡會稽部伍若問慎不得答惠開素嚴部下莫敢違興宗見惠開舟力甚盛遣人訪訊事力二三百人皆低頭直去無一人答者尋除少府加給事中惠開素剛至是益不得志曰大丈夫入管喉舌出蒞方伯乃復低頭入中邪寺內所住齊前嚮種花草甚美惠開悉剗除別種白楊每謂人曰人生不得行胸懷雖壽百歲猶為夭也發病嘔血吐物如肝肺者卒子睿嗣齊受禪國除惠開與諸弟並不睦惠基使至益州遂不相見與同産弟惠明亦致嫌隙云惠明其次弟也亦有時譽泰始初為吳興太守郡界有卞山山下有項羽廟相承云羽多居郡聽事前後太守不敢上惠明謂綱紀曰孔季恭嘗為此郡未聞有災遂盛設筵榻接賓數日見一人長丈餘張弓挾矢向惠明既而不見因發背旬日而卒子視素梁天監中位丹陽尹丞初拜日武帝賜錢八萬視素一朝散之親友遷司徒左西屬南徐州中從事性靜退少嗜欲好學能清言榮利不關於中喜怒不形於色在人間及居職並任情通率不自矜尚天然簡素及在京口便有終焉之志後為中書侍郎在位少時求為諸暨令到縣十餘日挂衣冠於縣門而去獨居屏事非親戚不得至其籬門妻即齊太尉王儉女久與別居遂無子卒親故迹其事行諡曰貞文先生惠明弟惠基幼以外戚見宋江夏王義恭歎其詳審以女結婚歷中書黃門郎惠基善隸書及奕齊高帝與之情好相得桂陽王休範妃惠基姊也高帝謂之曰卿家桂陽遂復作賊高帝頓新亭壘以惠基為軍副惠基弟惠朗親為休範攻戰惠基在城內了不自疑後為長兼侍中袁粲劉彥節起兵之夕高帝以彥節是惠基妹夫惠基時直在省遣王敬則觀其指趣見惠基安靜不與彥節相知由是益加恩信仕齊為都官尚書掌吏部永明中為侍中領驍騎將軍尚書令王儉朝宗貴望惠基同在禮閣非公事不私覿焉遷太常加給事中自宋大明以來聲伎所尚多鄭衛而雅樂正聲鮮有好者惠基解音律尤好魏三祖曲及相和歌每奏輒賞悅不能已當時能人琅邪王抗第一品吳郡褚思莊會稽夏赤松第二品赤松思速善於大行思莊戲遲巧於鬬宋文帝時羊玄保為會稽帝遣思莊入東與玄保戲因置局圖還於帝前覆之齊高帝使思莊與王抗交賭自食時至日暮一局始竟上倦遣還省至五更方決抗睡於局後寢思莊達旦不寐時或云思莊所以品第致高緣其用思深久人不能對抗思莊並至給事中永明中敕使抗品竟陵王子良使惠基掌其事初思話先於曲阿起宅有間曠之致惠基常謂所親曰須婚嫁畢當歸老舊廬立身退素朝廷稱為善士卒贈金紫光祿大夫子洽字宏稱幼敏寤年七歲誦楚辭略上口及長好學博涉善屬文仕梁位南徐州中從事近畿重鎮職吏數千人前後居者皆致巨富洽清身率職饋遺一無所受妻子不免飢寒纍遷臨海太守為政清平不尚威猛人俗便之還拜司徒左長史敕撰當塗堰碑辭甚贍麗卒於官文集二十卷行於世惠基弟惠休齊永明四年為廣州刺史罷任獻奉傾資上敕中書舍人茹法亮曰可問蕭惠休故當不復私邪吾欲分受之也後封建安縣子永元元年徙吳興太守徵為尚書右僕射吳興郡項羽神舊酷烈人云惠休事神謹故得美遷于時朝士多見殺二年惠休還至平望帝令服藥而卒贈金紫光祿大夫惠休弟惠朗同桂陽賊齊高帝赦之後為西陽王征虜長史行南兗州事坐法免官惠朗弟惠蒨仕齊左戶尚書子介介字茂鏡少穎悟有器識梁大同中武陵王紀為揚州刺史以介為府長史在職以清白稱武帝謂何敬容曰蕭介甚貧可處以一郡復曰始興郡頻無良守可以介為之由是出為始興太守及至甚著威德徵為少府卿尋加散騎常侍會侍中闕選司舉王筠等四人並不稱旨帝曰我門中久無此職宜用蕭介為之應對左右多所匡正帝甚重之遷都官尚書每軍國大事必先訪介帝謂朱虉曰端右材也中大同二年辭疾致仕帝優詔不許終不肯起乃遣謁者僕射魏祥就拜光祿大夫太清中侯景於渦陽敗走入壽陽帝敕助防韋黯納之介聞而上表致諫極言不可帝省表歎息卒不能用介性高簡少交游唯與族兄琛從兄視素及洽從弟淑等文酒賞會時人以比謝氏烏衣之游初武帝招延後進二十餘人置酒賦詩臧盾以詩不成罰酒一斗盾飲盡顏色不變言笑自若介染翰便成文無加點帝兩美之曰臧盾之飲蕭介之文即席之美也年七十三卒於家第三子允字叔佐少知名風神凝遠通達有識鑒容止醞藉仕梁位太子洗馬侯景攻陷臺城百僚奔散允獨整衣冠坐于宮坊景軍敬焉弗之逼也尋出居京口時寇賊縱橫百姓波駭允獨不行人問其故允曰性命自有常分豈可逃而免乎方今百姓爭欲奮臂而論大功何事於一書生哉莊周所謂畏影避迹吾弗為也乃閉門靜處併日而食卒免於患陳永定中侯安都為南徐州刺史躬造其廬以申長幼之敬宣帝即位為黃門侍郎晉安王為南豫州以為長史時王尚少未親人務故委允行府事入為光祿卿允性敦重未嘗以榮利干懷及晉安出鎮湘州又苦攜允允少與蔡景歷善子徵修父黨之敬聞允將行乃詣允曰公年德並高國之元老從容坐鎮旦夕自為列曹何為方辛苦蕃外答曰已許晉安豈可忘信其恬榮勢如此至德中鄱陽王出鎮會稽允又為長史帶會稽郡丞行經延陵季子廟設蘋藻之薦託異代之交為詩以意辭理清典後主嘗問蔡徵允之為人徵曰其清虛玄遠殆不可測至於文章可得而言因誦允詩以對後主嗟賞久之尋拜光祿大夫及隋師濟江允遷于關右時南士至長安者例皆授官允與尚書僕射謝胄辭以老疾隋文帝義之並厚賜帛尋卒年八十四弟引字叔休方正有器度性聰敏博學善屬文仕梁位西昌侯儀同府主簿侯景之亂梁元帝為荊州刺史朝士多歸之引曰諸王力爭禍患方始今日逃難未是擇君之秋吾家再世為始興郡遺愛在人政可南行以存家門耳乃與弟肜及宗親等百餘人南奔嶺表時始興人歐陽頠為衡州刺史乃往依焉頠遷廣州病死子紇領其衆引疑紇異圖因事規正由是情禮漸疏及紇反時都下士人岑之敬公孫挺等並惶駭唯引怡然謂之敬等曰管幼安袁曜卿亦但安坐耳君子正身以明道直己以行義亦何憂乎及章昭達平番禺引始北還拜尚書金部侍郎引善隸書為當時所重宣帝嘗披奏事指引署名曰此字筆趣翩翩似鳥之欲飛引謝曰此乃陛下假其毛羽耳帝又謂引曰我每有所忿見卿輒意解何也引曰此自陛下不遷怒臣何預此恩引性抗直不事權貴宣帝每欲遷用輒為用事者所裁及呂梁覆師戎儲空匱轉引為庫部侍郎掌知營造引在職一年而器械充足歷中書黃門吏部侍郎廣州刺史馬靖甚得嶺表人心而甲兵精練每年深入俚洞數有戰功朝野頗生異議宣帝以引悉嶺外物情且遣引觀靖審其舉措諷令送質及至靖即悟旨遣兒弟為質後主即位為中庶子建康令時殿內隊主吳璡及宦者李善度蔡脫兒等多所請屬引一皆不許引始族子密時為黃門郎諫引曰李蔡之權在位皆憚亦宜少為身計引曰吾之立身自有本末亦安能為李蔡致屈就令不平不過免職耳吳璡竟作飛書李蔡證之坐免官卒於家子德言最知名引弟肜位太子中庶子南康王長史琛字彥瑜惠開從子也祖僧珍宋廷尉卿父惠訓齊末為巴東相梁武帝起兵齊和帝於荊州即位惠訓與巴西太守魯休烈並以郡相抗惠訓使子璝據上明建康城平始歸降武帝宥之以為太中大夫卒官琛少明悟有才辨數歲時從伯惠開見而奇之撫其背曰必興吾宗起家齊太學博士時王儉當朝琛年少未為儉所識負其才氣候儉宴于樂游乃著虎皮靴策桃枝杖直造儉坐儉與語大悅儉時為丹陽尹辟為主簿永明九年魏始通好琛再銜命北使還為通直散騎侍郎時魏遣李彪來使齊武帝宴之琛於御筵舉酒勸彪彪不受曰公庭無私禮不容受勸琛答曰詩所謂雨我公田遂及我私坐者皆悅服彪乃受琛酒纍遷尚書左丞時齊明帝用法嚴峻尚書郎坐杖罰者皆即科行琛乃密啓曰郎有杖起自後漢爾時郎官位卑親主文案與令史不異故郎三十五人令史二十人是以古人多為此職自魏晉以來郎官稍重今方參用高華吏部又近於通貴不應官高昔品而罰遵曩科所以從來彈舉雖在空文而許以推遷或逢赦恩或入春令便得息停宋元嘉大明中經有被罰者別由犯忤主心非關常準自泰始建元以來未經施行事廢已久人情未習自奉敕之後已行倉部郎江重欣杖督五十皆無不人懷慚懼兼有子弟成長彌復難為儀適其應行罰可特賜輸贖使與令史有異以彰優緩之澤帝納之自是應受罰者依舊不行東昏初嗣立時議無廟見文琛議據周頌烈文閔豫皆為即位朝廟之典於是從之梁武在西邸與琛有舊梁臺建以為御史中丞天監九年纍遷平西長史江夏太守始琛為宣城太守有北僧南度唯齎一瓠蘆中有漢書序傳僧云三輔舊老相傳以為班固真本琛固求得之其書多有異今者而紙墨亦古文字多如龍舉之例非隸非篆琛甚祕之及是以書餉鄱陽王範獻于東宮後為吳興太守郡有項羽廟土人名為憤王甚有靈驗遂於郡聽事安牀幕為神座公私請禱前後二千石皆於聽拜祠以軛下牛充祭而避居他室琛至著履登聽事聞室中有叱聲琛厲色曰生不能與漢祖爭中原死據此聽事何也因遷之於廟又禁殺牛解祀以脯代肉琛頻蒞大郡不事産業有闕則取不以為嫌歷左戶度支二尚書侍中帝每朝宴接琛以舊恩嘗犯武帝偏諱帝斂容琛從容曰二名不偏諱陛下不應諱順上曰各有家風琛曰其如禮何又經預御筵醉伏上以棗投琛琛仍取栗擲上正中面御史中丞在坐帝動色曰此中有人不得如此豈有說邪琛即答曰陛下投臣以赤心臣敢不報以戰栗上笑悅上每呼琛為宗老琛亦奉陳昔恩以早簉中陽夙忝同閈雖迷興運猶荷洪慈上答曰雖云早契闊乃自非同志勿談興運初且道狂奴異琛常言少壯三好音律書酒年長以來二事都廢唯書籍不衰而琛性通脫常自解竈事畢餘餕必陶然致醉位特進金紫光祿大夫卒遺令諸子與妻同墳異藏祭以蔬菜葬止車十乘事存率素乘輿臨哭甚哀諡曰平子琛所撰漢書文府齊梁拾遺並諸文集數十萬言子遊位少府卿遊子密字士幾幼聰敏博學有文詞位黃門郎太子中庶子散騎常侍臧燾字德仁東莞莒人宋武敬皇后兄也少好學善三禮貧約自立操行為鄉里所稱晉太元中衛將軍謝安始立國學徐兗二州刺史謝玄舉燾為助教晉孝武帝追崇庶祖母宣太后議者或謂宜配食中宗燾議曰陽秋之義母以子貴故仲子成風咸稱夫人經言考仲子宮若配食惠廟則宮無緣別築前漢孝文孝昭太后並繫子為號祭於寢園不配於高祖孝武之廟後漢和帝之母曰恭懷皇后安帝祖母曰敬隱皇后順帝之母曰恭愍皇后雖不繫子為號亦祭於陵寢不配章安二帝此則二漢雖有太后皇后之異至於並不配食義同陽秋唯光武追廢呂后故以薄后配高廟又衛后既廢霍光追尊李夫人為皇后配孝武廟此非母以子貴之例直以高武二廟無配故耳又漢世立寢於陵自是晉制所異謂宜遠準陽秋考宮之義近慕二漢不配之典尊號既正則罔極之情申別建寢廟則嚴禰之義顯繫子為稱兼明母貴之所由一舉而允三義固哲王之高致也議者從之頃之去官以父母老家貧與弟熹俱棄人事躬耕自業約己養親者十餘年父母喪亡居喪六年以毀瘠著稱宋武帝義旗建參右將軍何無忌軍事隨府轉鎮南參軍武帝鎮京口參帝中軍軍事入補尚書度支郎改掌祠部襲封高陵亭侯時太廟鴟尾災燾謂著作郎徐廣曰昔孔子在齊聞魯廟災曰必桓僖也今征西京兆四府君宜在毀落而猶列廟饗此其徵乎乃上議曰臣聞國之大事在祀與戎將營宮室宗廟為首古先哲王莫不致肅恭之誠心盡崇嚴乎祖考然後能流淳化於四海通幽感於神明固宜詳廢興於古典循情禮以求中者也禮天子七廟三昭三穆與太祖而七自考廟以至祖考五廟皆月祭之遠廟為祧有二祧享嘗乃止去祧為壇去壇為墠有禱然後祭之此宗廟之次親疏之序也鄭玄以為祧者文王武王之廟王肅以為五世六世之祖尋去祧之言則祧非文武之廟矣文武周之祖宗何云去祧為壇乎明遠廟為祧者無服之祖也又遠廟則有享嘗之降去祧則有壇墠之殊明世遠者其義彌疏也若祧是文武之廟宜同月祭於太祖雖推后稷以配天由功德之所始非尊崇之義每有差降也又禮有以多為貴者故傳稱德厚者流光德薄者流卑又言自上以下降殺以兩禮也此則尊卑等級之典上下殊異之文而云天子諸侯俱祭五廟何哉又王祭嫡殤下及來孫而上祀之禮不過高祖推隆恩於下流替誠敬於尊廟亦非聖人制禮之意也是以泰始建廟從王氏議以禮父為士子為天子諸侯祭以天子諸侯其尸服以士服故上及征西以備六世之數宣皇雖為太祖尚在子孫之位至於殷祭之日未申東向之禮所謂子雖齊聖不先父食者矣今京兆以上既遷太祖始得居正議者以昭穆未足欲屈太祖於卑坐臣以為非禮典之旨也所謂與太祖而七自是昭穆既足太廟在六世之外非為須滿七廟乃得居太祖也議者又以四府君神主宜永同於殷祫臣又以為不然傳所謂毀廟之主陳乎太祖謂太祖以下先君之主也故白虎通云禘祫祭遷廟者以其繼君之體持其統而不絶也豈如四府君在太祖之前乎非繼統之主無靈命之瑞非王業之基昔以世近而及今則情禮已遠而當長饗殷祫永虛太祖之位求之禮籍未見其可昔永和之初大議斯禮于時虞喜范宣並以洪儒碩學咸謂四府君神主無緣永存於百世或欲瘞之兩階或欲藏之石室或欲為之改築雖所執小異而大歸是同若宣皇既居羣廟之上而四主禘祫不已則大晉殷祭長無太祖之位矣夫理貴有中不必過厚禮與世遷豈可順而不斷故臣子之情雖篤而靈厲之諡彌彰追遠之懷雖切而遷毀之禮為用豈不有心於加厚顧禮制不可踰耳石室則藏於廟北改築則未知所處虞主所以依神神移則有瘞埋之禮四主若饗祀宜廢亦神之所不依也準傍事例宜同虞主之瘞埋然經典難詳羣言錯繆非臣淺識所能折中時學者多從燾議竟未施行宋武帝受命拜太常雖外戚貴顯而彌自沖約茅屋蔬𧹞不改其舊所得奉祿與親戚共之永初三年致事拜光祿大夫加金章紫綬卒少帝贈左光祿大夫長子邃宜都太守邃子凝之學涉有當世才與司空徐湛之為異常交年少時與傅僧祐俱以通家子始為文帝所引見時上與何尚之論鑄錢事凝之便干其語次上因回與語僧祐引凝之衣令止凝之大言曰明主難再遇便應政盡所懷上與往復十餘反凝之辭韻詮序上甚賞焉後為尚書左丞以徐湛之黨為元凶所殺凝之子寅字士若事在沈攸之傳寅弟稜後軍參軍稜子嚴嚴字彥威幼有孝性居父憂以毀聞孤貧勤學行止書卷不離手從叔未甄為江夏郡攜嚴之官於途作屯游賦又作七算辭並典麗性孤介未嘗造請梁僕射徐勉欲識之嚴終不詣纍遷湘東王宣惠輕車府參軍兼記室嚴於學多所諳記尤精漢書諷誦略皆上口王嘗自執四部書目試之嚴自甲至丁卷中各對一事並作者姓名遂無遺失王遷荊州隨府轉西中郎安西録事參軍歷義陽武寧郡守郡界蠻左前郡守常選武人以兵鎮之嚴獨以數門生單車入境羣蠻悅服後卒於鎮南咨議參軍文集十卷嚴族叔未甄燾曾孫也父潭之左戶尚書未甄有才幹少為外兄汝南周顒所知仕梁為太尉長史丁所生母憂三年廬于墓側歷廷尉卿江夏太守卒子盾盾字宣卿幼從徵士琅邪諸葛璩受五經璩學徒常有數十百人盾處其間無所狎比璩曰此生王佐才也為尚書中兵郎美風姿善容止每趨奏梁武帝甚悅焉入兼中書通事舍人盾有孝性嘗隨父宿直廷尉府母劉氏在宅夜暴亡盾左手中指忽痛不得寢及旦宅信果報凶問其感通如此服未終父卒居喪五年不出廬戶形骸枯悴家人不識武帝纍敕抑譬後纍遷御史中丞性公強甚稱職中大通五年帝幸同泰寺開講設四部大會衆數萬人南越所獻馴象忽於衆中狂逸衆皆駭散唯盾與散騎侍郎裴之禮嶷然自若帝甚嘉焉大同二年為中領軍領軍管天下兵要監局事多盾為人敏贍有風力長於撥繁職事甚理先是吳平侯蕭景居此職著聲至是盾復繼之後卒於領軍將軍諡曰忠盾弟厥字獻卿亦以幹局稱為晉安太守郡居山海常結聚逋逃前二千石討捕不能止厥下車宣化凶黨皆襁負而出自是居人復業然政嚴百姓謂之臧彪前後再兼中書通事舍人卒於兼司農卿厥前後居職所掌之局大事及蘭臺廷尉所不能決者敕並付厥辨斷精明咸得其理卒後有撾登聞鼓訴求付清直舍人帝曰臧厥既亡此事便無所付其見知如此子操尚書三公郎熹字義和燾之弟也與燾並好經學隆安初兵起熹乃習騎射志立功名嘗與溧陽令阮崇獵遇猛獸突圍獵徒並散熹射之應弦而倒從宋武入京城進至建鄴桓玄走武帝便使熹入宮收圖書器物封府庫有金飾樂器武帝問熹卿欲此乎熹正色曰主上幽逼播越非所將軍首建大義劬勞王室雖復不肖實無情於樂帝笑曰聊以戲耳以建義功封始興縣五等侯參武帝車騎中軍軍事武帝將征廣固議者多不同熹贊成其行武帝遣朱齡石統大衆伐蜀命熹奇兵出中水領建平巴東二郡太守蜀主譙縱遣大將譙撫之屯牛脾又遣譙小苟重兵塞打鼻熹至牛脾撫之敗走追斬之成都平熹遇疾卒於蜀追贈光祿勳子質字含文少好鷹犬善蒱博意錢之戲長六尺七寸出面露口頽頂拳髮初為世子中軍參軍嘗詣護軍趙倫之倫之名位已重不相接質憤然起曰大丈夫各以老嫗作門戶何至以此中相輕倫之慚謝質拂衣而去後為江夏王義恭撫軍參軍以輕薄無檢為文帝所嫌徙給事中會稽長公主每為之言乃出為建平太守甚得蠻楚心歷竟陵內史巴東建平二郡太守吏人便之質年始出三十屢居名郡涉獵文史尺牘便敏有氣幹好言兵文帝謂可大任以為徐兗二州刺史加都督在鎮奢費爵命無章為有司所糾遇赦與范曄徐湛之等厚善曄謀反量質必與之同會事發復為義興太守二十七年遷南譙王義宣司空司馬南平內史未之職會魏太武帝圍汝南戍主陳憲固守告急文帝遣質輕往壽陽與安蠻司馬劉康祖等救憲後太武率大衆數十萬向彭城以質為輔國將軍北救始至盱眙太武已過淮二十八年正月太武自廣陵北返悉力攻盱眙就質求酒質封溲便與之太武怒甚築長圍一夜便合質報太武書云爾不聞童謠言邪虜馬飲江水佛狸死卯年冥期使然非復人事寡人受命相滅期之白登師行未遠爾自送死豈容復令爾饗有桑乾哉假令寡人不能殺爾爾由我而死爾若有幸得為亂兵所殺爾若不幸則生相鎖縛載以一驢負送都市爾識智及衆豈能勝苻堅邪頃年展爾陸梁者是爾未飲江太歲未卯故耳時魏地童謠曰軺車北來如穿雉不意虜馬飲江水虜主北歸石濟死虜欲度江天不徙故答書引之太武大怒乃作鐵牀於上施鐵鑱云破城得質當坐之此上質又與魏軍書寫臺格購斬太武封萬戶侯賜布絹各萬匹魏以鉤車鉤垣樓城內繫絙數百人叫呼引之車不能退質夜以木桶盛人縣出城外截其鉤獲之明日又以衝車攻城土堅密每至頽落下不過數斗魏軍乃肉薄登城墜而復升莫有退者殺傷萬計死者與城平如此三旬死者過半太武乃解圍而歸上嘉質功以為寧蠻校尉雍州刺史監四州諸軍事明年文帝又北侵使質率見力向潼關質頓兵不肯時發又顧戀嬖妾棄軍營壘單馬還城散用臺庫見錢六七百萬為有司所糾上不問元凶弒立以質為丹陽尹質家遣門生師顗報質具言文帝崩問質使告司空義宣及孝武帝而自率衆五千馳下討逆自陽口進江陵見義宣時質諸子在都聞質舉義並逃亡義宣始得質報即日舉兵馳信報孝武板進質號征北將軍孝武即位加質車騎將軍開府儀同三司都督江州諸軍事使質自白下步上薛安都程天祚等亦自南掖門入與質同會太極殿庭生禽元凶仍使質留守朝堂封始興郡公之鎮舫千餘乘部伍前後百餘里六平乘並施龍子幡時孝武自攬威權而質以少主遇之刑政慶賞不復咨禀朝廷自謂人才足為一世英傑始聞國禍便有異圖以義宣凡暗易制欲外相推奉以成其志及至江陵便致拜稱名質於義宣雖為兄弟而年近大十歲義宣驚曰君何意拜弟質曰事中宜然時義宣已推崇孝武故其計不行每慮事泄及至新亭又拜江夏王義恭義恭愕然問質所以質曰天下屯危禮異常日前在荊州亦拜司空會義宣有憾於孝武質因此密信說誘陳朝廷得失又謂震主之威不可持久質女為義宣子悰妻謂質無復異同納其說且義宣腹心將佐蔡超竺超人等咸有富貴情願又勸義宣義宣時未受丞相質子敦為黃門侍郎奉詔敦勸道經尋陽質令敦具更譬說義宣義宣意乃定馳報豫州刺史魯爽期孝建元年秋同舉爽失旨即起兵遣人至都報弟瑜席卷奔叛瑜弟弘為質府佐孝武馳使報質誅弘於是執臺使狼狽舉兵馳報義宣孝武遣撫軍將軍柳元景統豫州刺史王玄謨等屯梁山洲兩岸築偃月壘水陸待之元景檄書宣告而義宣亦相次係至江夏王義恭書曰昔桓玄借兵於仲堪有似今日義宣由此與質相疑質進計曰今以萬人取南州則梁山中絶萬人綴玄謨必不敢輕動質浮舟外江直向石頭此上略也義宣將從之義宣客顏樂之說義宣曰質若復拔東城則大功盡歸之矣宜遣麾下自行義宣遣腹心劉諶之就質陳軍城南玄謨留羸弱守城悉精兵出戰薛安都騎軍前出垣護之督諸將繼之乃大潰質求義宣欲計事密已走矣質不知所為亦走至尋陽焚府舍載妓妾入南湖摘蓮噉之追兵至以荷覆頭沈於水出鼻軍主鄭俱兒望見射之中心兵刃亂至腹胃纏縈水草隊主裘應斬質傳首建鄴録尚書江夏王義恭等奏依漢王莽事漆其頭藏于武庫詔可論曰趙倫之蕭思話俱以外戚之親並接風雲之會言親則在趙為密論望則於蕭為重古人云人能弘道蓋此之謂乎惠開親禮雖篤弟隙尤著方寸之內孝友異情嶮於山川有驗於此臧氏文義之美傳于纍代含文以致誅滅好亂之所致乎
