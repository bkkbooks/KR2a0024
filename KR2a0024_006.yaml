body:
  text: 南史卷六梁本紀上第六梁高祖武皇帝諱衍字叔達小字練兒南蘭陵中都里人姓蕭氏與齊同承淮陰令整整生皇高祖位濟陰太守生皇曾祖副子位州治中從事副子生皇祖道賜位南臺治書侍御史道賜生皇考諱順之字文緯於齊高帝為始族弟皇考外甚清和而內懷英氣與齊高少而款狎嘗共登金牛山路側有枯骨縱橫齊高謂皇考曰周文王以來幾年當復有掩此枯骨者乎言之然動色皇考由此知齊高有大志常相隨逐齊高每外討皇考常為軍副及北討薛索兒夜遣人入營提刀徑至齊高眠牀皇考手刃之頻為齊高鎮軍司馬長史時宋帝昏虐齊高謀出外皇考以為一旦奔亡則危幾不測不如因人之欲行伊霍之事齊高深然之歷黃門郎安西長史吳郡內史所經皆著名吳郡張緒常稱文武兼資有德有行吾敬蕭順之袁粲之據石頭黃回與之通謀皇考聞難作率家兵據朱雀橋回覘人還告曰朱雀橋南一長者英威毅然坐胡牀南向回曰蕭順之也遂不敢出時微皇考石頭幾不據矣及齊高創造皇業推鋒決勝莫不垂拱仰成焉齊建元末齊高從容謂皇考曰當令阿玉解揚州相授玉豫章王嶷小名也齊武帝在東宮皇考嘗問訊及退齊武指皇考謂嶷曰非此翁吾徒無以致今日及即位深相忌憚故不居台輔以參豫佐命封臨湘縣侯歷位侍中衛尉太子詹事領軍將軍丹陽尹贈鎮北將軍諡曰懿帝以宋孝武大明八年歲次甲辰生于秣陵縣同夏里三橋宅初皇妣張氏嘗夢抱日已而有娠遂産帝帝生而有異光狀貌殊特日角龍顏重嶽虎顧舌文八字項有浮光身映日無影兩胯駢骨項上隆起有文在右手曰武帝為兒時能蹈空而行及長博學多通好籌略有文武才幹所居室中常若雲氣人或遇者體輒肅然初為衛軍王儉東閣祭酒儉一見深相器異請為戶曹屬謂廬江何憲曰此蕭郎三十內當作侍中出此則貴不可言竟陵王子良開西邸招文學帝與沈約謝朓王融蕭琛范雲任昉陸倕等並遊焉號曰八友融俊爽識鑒過人尤敬異帝每謂所親曰宰制天下必在此人纍遷隨王鎮西咨議參軍行經牛渚逢風入泊龍瀆有一老人謂帝曰君龍行虎步相不可言天下方亂安之者其在君乎問其名氏忽然不見尋以皇考艱去職歸建鄴及齊武帝不豫竟陵王子良以帝及兄懿王融劉繪王思遠顧皓之范雲等為帳內軍主融欲因帝晏駕立子良帝曰夫立非常之事必待非常之人融才非負圖視其敗也范雲曰憂國家者惟有王中書帝曰憂國欲為周召欲為豎刁邪懿曰直哉史魚何其木強也初皇考之薨不得志事見齊魚復侯傳至是鬱林失德齊明帝作輔將為廢立計帝欲助齊明傾齊武之嗣以雪心恥齊明亦知之每與帝謀時齊明將追隨王恐不從又以王敬則在會稽恐為變以問帝帝曰隨王雖有美名其實庸劣既無智謀之士爪牙惟仗司馬垣歷生武陵太守卞白龍耳此並惟利是與若啖以顯職無不載馳隨王止須折簡耳敬則志安江東窮其富貴宜選美女以娛其心齊明曰亦吾意也即徵歷生為太子左衛率白龍遊擊將軍並至續召隨王至都賜自盡豫州刺史崔慧景既齊武舊臣不自安齊明憂之乃起帝鎮壽陽外聲備魏實防慧景師次長瀨慧景懼罪白服來迎帝撫而宥之將軍房伯玉徐玄慶並曰慧景反迹既彰實是見賊我曹武將譬如韝上鷹將軍一言見命便即制之帝笑曰其如掌中嬰兒殺之不武於是曲意和釋之慧景遂安隆昌元年拜中書侍郎遷黃門侍郎建武二年魏將王肅劉昶攻司州刺史蕭誕甚急齊明遣左衛將軍王廣之赴救帝為偏帥隸廣之行次尉斗洲有人長八尺餘容貌衣冠皓然皆白緣江呼曰蕭王大貴帝既屢有徵祥心益自負時去誕百里衆軍以魏軍盛莫敢前帝欲大振威略謂諸將曰今屯下梁之城塞鑿峴之險守雉燧之路據賢首之山以通西關以臨賊壘三方掎角出其不備破賊必矣廣之等不從後遣徐玄慶進據賢首山魏絶其糧道衆懼莫敢援之惟帝獨奮請先進於是廣之益帝精甲銜枚夜前失道望見如持兩炬者隨之果得道徑上賢首山廣之軍因得前魏軍來脅帝堅壁不進時王肅自攻城一鼓而退劉昶有疑心帝因與書間成其隙一旦有風從西北起陳雲隨之來當肅營尋而風回雲轉還向西北帝曰此所謂歸氣魏師遁矣令軍中曰望麾而進聽鼓而動肅乃傾壁十萬陳于水北帝揚麾鼓譟響振山谷敢死之士執短兵先登長戟翼之城中見援至因出軍攻魏柵魏軍表𩹉受敵因大崩肅昶單騎走斬獲千計流血絳野得肅昶巾箱中魏帝敕曰聞蕭衍善用兵勿與爭鋒待吾至若能禽此人則江東吾有也以功封建陽縣男尋為司州刺史有沙門自稱僧惲謂帝曰君項有伏龍非人臣也復求莫知所之帝在州甚有威名嘗有人餉馬帝不受餉者密以馬繫齋柱而去帝出見馬答書殷勤縛之馬首令人驅出城外馬自還還都為太子中庶子領四廂直出鎮石頭齊明性猜忌帝避時嫌解遣部曲常乘折角小牛車齊明每稱帝清儉勗勵朝臣四年魏孝文帝自率大衆逼雍州刺史曹武度沔守樊城武舊齊武腹心齊明忌之欲使后弟劉暄為雍州暄不願出外因江祏得留齊明帝擬帝雍州受密旨出頓聲為軍事發遣又命五兵尚書崔慧景征南將軍陳顯達相續援襄陽慧景與帝進行鄧城魏孝文帥十餘萬騎奄至慧景引退帝止之不從於是大敗帝帥衆拒戰獨得全軍及魏軍退以帝為輔國將軍監雍州事先是雍州相傳樊城有王氣至是謠言更甚及齊明崩遺詔以帝為都督雍州刺史時揚州刺史始安王遙光尚書令徐孝嗣右僕射江祏右將軍蕭坦之侍中江祀衛尉劉暄更直內省分日帖敕世所謂六貴又有御刀茹法珍梅蟲兒豐勇之等八人號為八要及舍人王咺之等四十餘人皆口擅王言權行國憲帝謂張弘策曰政出多門亂其階矣當今避禍惟有此地勤行仁義可坐作西伯但諸弟在都恐離時患須與益州圖之耳時上長兄懿罷益州還仍行郢州事乃使弘策詣郢陳計於懿語在懿傳言既不從弘策還帝乃召弟偉及憺是歲至襄陽乃潛造器械多伐竹木沉於檀溪密為舟裝之備時帝所住齋常有氣五色回轉狀若蟠龍季秋出九日臺忽暴風起煙塵四合帝所居獨白日清朗其上紫雲騰起形如繖蓋望者莫不異焉尋而大臣相次誅戮永元二年冬懿又被害信至帝密召長史王茂中兵呂僧珍別駕柳慶遠功曹史吉士瞻等謀之既定以十一月乙巳召僚佐集於聽事告以舉兵是日建牙出檀溪竹木裝舸艦旬日大辦百姓願從者得鐵馬五千匹甲士三萬人先是東昏以劉山陽為巴西太守使過荊州就行事蕭穎胄以襲襄陽帝知其謀乃遣參軍王天武龐慶國詣江陵遍與州府人書論軍事天武既發帝謂咨議參軍張弘策曰今日天武坐收天下矣荊州得天武至必回遑無計若不見同取之如拾地芥耳斷三峽據巴蜀分兵定湘中便全有上流以此威聲臨九派斷彭蠡傳檄江南風之靡草不足比也政小引日月耳江陵本憚襄陽人加脣亡齒寒必不孤立寧得不暗見同邪挾荊雍之兵掃定東夏韓白重出不能為計況以無算之昏主役御刀應敕之徒哉及山陽至巴陵帝復令天武齎書與穎胄兄弟去後帝謂張弘策曰用兵之道攻心為上攻城次之心戰為上兵戰次之今日是也近遣天武往州府人皆有書今段止有兩封與行事兄弟云一二天武口具及問天武口無所説天武是行事心膂彼聞必謂行事與天武共隱其事則人人生疑山陽惑於衆口判相嫌二則行事進退無以自明是馳兩空函定一州矣山陽至江安聞之果疑不上柳忱勸斬天武送首山陽穎胄乃謂天武曰天下之事縣之在卿今就卿借頭以詐山陽昔樊於期亦以頭借荊軻於是斬之送首山陽山陽信之馳入城將踰閾縣門發折其車轅投車而走中兵參軍陳秀拔戟逐之斬于門外傳首于帝仍以南康王尊號之議來告且曰時有未利當須來年二月遽便進兵恐非廟算帝答曰今坐甲十萬糧用自竭若頓兵十旬必生悔吝且太白出西方仗義而動天時人謀有何不利昔武王伐紂行逆太歲復須待年月乎竟陵太守曹景宗遣杜思沖勸帝迎南康都襄陽待正尊號帝不從王茂又私于張弘策曰今以南康置人手中彼挾天子以令諸侯節下前去為人所使此豈歲寒之計弘策言之於帝帝曰若前途大事不捷故自蘭艾同焚若功業克建誰敢不從豈是碌碌受人處分於沔南立新野郡以集新附三年二月南康王為相國以帝為征東將軍戊申帝發襄陽自冬積霰至是開霽士卒咸悅帝遂留弟偉守襄陽城謂曰當置心於襄陽人腹中推誠信之勿有疑也天下一家乃當相見遂移檄建鄴闡揚威武及至竟陵命長史王茂與太守曹景宗為前軍中兵參軍張法安守竟陵城茂景宗帥衆濟岸進頓九里其日郢州刺史張沖迎戰茂等大破之荊州遣冠軍將軍鄧元起軍主王世興田安等會大軍於夏口帝築漢口城以守魯山命水軍主張惠紹朱思遠等遊遏中江絶郢魯二城信使時張沖死其衆推軍主薛元嗣及沖長史程茂為主三月乙巳南康王即帝位於江陵遙廢東昏為涪陵王以帝為尚書左僕射加征東大將軍都督征討諸軍假黃鉞西臺又遣冠軍將軍蕭穎達領兵來會四月帝出沔命王茂蕭穎達等逼郢城五月己酉帝移屯漢南是日有紫雲如蓋蔭于壘幕甲寅東昏遣寧朔將軍吳子陽光子襟等十三軍救郢州進據巴口七月帝命王茂帥軍主曹仲宗康絢武會超等潛師襲加湖將逼子陽水涸不通艦子襟喜其夜流星墜其城四更中無雨而水暴長衆軍乘流齊進鼓譟攻之俄而大潰子陽等竄走衆盡溺于江王茂虜其餘而旋郢魯二城相視奪氣先是東昏遣冠軍將軍陳伯之鎮江州為子陽等聲援帝謂諸將曰夫征討未必須實力所聽威聲耳今加湖之敗誰不讋服陳武牙即伯之之子狼狽奔歸彼間人情理當凶懼我謂九江傳檄可定也因命搜所獲俘囚得伯之幢主蘇隆之厚加賞賜使致命焉戊午魯山城主孫樂祖降己未夜郢城有數百毛人踰堞且泣因投黃鵠磯蓋城之精也及旦其城主程茂薛元嗣遣參軍朱曉求降帝謂曰城中自可不識天命何意罵曉曰明公未之思耳桀犬何嘗不吠堯初郢城之閉將佐文武男女口十餘萬人疾疫流腫死者十七八及城開帝並加隱恤其死者命給棺槥東昏聞郢城沒乃為城守計簡二尚方二冶囚徒以配軍其不可活者於朱雀門內日斬百餘人尚書令王亮苦諫不從陳伯之遣蘇隆之反命求未便進軍帝曰伯之此言意懷首鼠可及其猶豫逼之乃命鄧元起即日沿流八月天子遣兼黃門郎蘇回勞軍帝登舟命諸軍以次進路留上庸太守韋睿守郢城行州事鄧元起將至尋陽陳伯之猶懼乃收兵退保湖口留其子武牙守盆城及帝至乃束甲請罪九月天子詔帝平定東夏以便宜從事前軍之次蕪湖南豫州刺史申胄棄姑孰走至是大軍進據之自發雍州帝所乘艦有兩龍導引左右莫不見者緣道奉迎百姓皆如挾纊仍遣曹景宗蕭穎達領馬步進頓江寧東昏遣征虜將軍李居士迎戰景宗擊走之於是王茂鄧元起呂僧珍進據赤鼻邏曹景宗陳伯之為遊兵是日新亭城主江道林率兵出戰衆軍禽之於陳大軍次新林建康士庶傾都而至送款或以血為書命王茂進據越城曹景宗據皂莢橋鄧元起據道士墩陳伯之據籬門道林餘衆退屯航南迫之因復散走退保朱雀憑淮自固時李居士猶據新亭壘請東昏燒南岸邑屋以開戰場自大航以西新亭以北蕩然矣十月東昏石頭軍主朱僧勇歸降東昏又遣征虜將軍王珍國列陳於航南大路悉配精手利器尚十餘萬閹人王倀子持白虎幡督諸軍王茂曹景宗等掎角奔之珍國之衆一時土崩衆軍追至宣陽門李居士以新亭壘徐元瑜以東府城降石頭白下諸軍並宵潰壬午帝鎮石頭命衆軍圍六門東昏悉焚門內驅逼營署官府並入城有衆二十萬青州刺史桓和紿東昏出戰因降先是俗語謂密相欺變者為和欺於是蟲兒法珍等曰今日敗於桓和可謂和欺矣帝命諸軍築長圍初衆軍既逼東昏遣軍主左僧慶鎮京口常僧景鎮廣陵李叔獻屯瓜步及申胄自姑孰奔歸又使屯破墩以為東北聲援至是帝遣曉喻並降帝乃遣弟輔國將軍秀鎮京口輔國將軍恢屯破墩從弟寧朔將軍景鎮廣陵吳郡太守蔡夤棄郡赴降十二月丙寅兼衛尉張稷北徐州刺史王珍國斬東昏其夜以黃油裹首送軍帝命呂僧珍張彌勒兵封府庫及圖籍帝乃入收嬖妾潘妃誅之及凶黨王咺之以下四十八人屬吏以宮女二千人分賚將士宣德皇后令追廢涪陵王為東昏侯授帝中書監大司馬録尚書驃騎大將軍都督揚州刺史封建安郡公食邑萬戶給班劍四十人黃鉞侍中征討諸軍事並如故依晉武陵王遵承制故事百僚致敬己卯帝入屯閲武堂下令大赦丙戌入鎮殿內是日鳳皇集建鄴又下令凡昏制謬賦淫刑濫役外可詳檢前源悉皆除蕩其主守散失諸所損耗精立科條咸從原例丁亥遣豫州刺史李元履以兵五千慰勞東方十二郡二年正月辛卯下令通檢尚書衆曹東昏時諸諍訟失理及主者淹停不時施行者精加訊辨依事議奏其義師臨陳致命疾病死亡者並加葬斂收恤遺孤甲午天子遣兼侍中席闡文兼黃門侍郎樂法才慰勞都下追贈皇祖散騎常侍左光祿大夫皇考侍中丞相乙未下令朱雀之捷逆徒送死者特許家人殯葬若無親屬或有貧苦二縣長尉即為埋掩建康城內不達天命自取淪滅亦同此科又下令減損浮費自非奉粢盛修紱冕習禮樂之容繕甲兵之備此外一皆禁絶御府中署量宜罷省命外詳為條格戊戌宣德皇后臨朝入居內殿拜帝大司馬解承制百僚致敬如前壬寅詔進帝都督中外諸軍事劍履上殿入朝不趨贊拜不名加前後部羽葆鼓吹置左右長史司馬從事中郎掾屬各四人依舊辟士餘並如故甲寅齊帝進帝位相國總百揆封十郡為梁公備九錫之禮加遠遊冠緑綟綬位在諸王上策曰上天不造難鍾皇室世祖以休明早崩世宗以仁德不嗣高宗襲統宸居弗永雖夙夜劬勞而隆平不洽嗣君昏暴書契弗睹朝權國柄委之羣孽勦戮忠賢誅殘台輔含寃抱痛噍類靡餘公藉昏明之期因兆庶之願爰率羣后翊成中興宗社之危已固天人之望允塞此實公紐我絶綱大造皇家者也永明季年邊隙大啓荊河連率招引戎荒公受言本朝輕兵赴襲排危冒險剛柔遞用坦然一方還成藩服此又公之功也在昔隆昌洪基已謝高宗慮深社稷將行權道公定策帷帳激揚大節廢帝立王謀猷深著此又公之功也建武闡業厥猷雖遠戎狄內侵憑陵關塞司部危逼淪陷指期公總兵外討卷甲長騖焚廬毀帳胡哭言歸此又公之功也樊漢阽切羽書續至公星言鞠旅稟命徂征拯我邊危重獲安堵此又公之功也漢南迥弱咫尺勍寇公作藩爰始因資靡託練兵訓卒搜狩有序俾我危城翻為強鎮此又公之功也永元紀號瞻烏已及雖廢昏有典而伊霍難行公首建大策爰立明聖義踰邑綸勳高代入此又公之功也文王之風雖被江漢京邑蠢蠢湮為洪流公投袂萬里事惟拯溺義聲所覃無思不韙此又公之功也魯城夏汭梗據中流乘山置壘縈川自固公御此烏集陵茲地險費無遺矢戰未窮兵踐華之固相望俱拔此又公之功也惟此羣凶同惡相濟緣江負險蟻聚加湖桴旝一臨應時褫潰此又公之功也姦孽震皇復懷舉斧畜兵九派用擬勤王公稜威直指勢踰風電旌斾小臨全州稽服此又公之功也姑孰衝要密邇京畿凶徒熾聚斷塞津路公兵威所震望旗自駭此又公之功也羣豎猖狂志在借一豕突淮涘武騎如雲公爰命英勇因機騁鋭氣冠阪泉勢踰洹水此又公之功也琅邪石首襟帶岨固新壘東墉金湯是埒憑險作守兵食兼資風激電駭莫不震疊城復于隍於是乎在此又公之功也獨夫昏佷憑城靡懼鼓鍾鞜若有餘狎是邪孽忌斯冠冕凶狡因之將逞孥戮公奇謀密運威略潛回忠勇之徒得申厥效白旗宣室未之或比此又公之功也公有拯億兆之勳重之以明德爰初厲志服道儒門濯纓來仕清猷映世時運艱難宗社危殆昆岡已燎玉石同焚驅率貔貅抑揚霆電義等南巢功齊牧野若夫禹功寂寞微管誰嗣拯其將魚驅其袒髮解茲亂網理此棼絲復禮衽席反樂河海永平故事聞之者歎息司隸舊章見之者隕涕請我人命還之斗極憫憫縉紳重符戴天之慶哀哀黔首復蒙履地之恩德踰於嵩岱功鄰於造物超哉邈矣越無得而言焉朕又聞之疇庸命德建侯作屏咸用克固四維永隆萬葉是以二南流化九伯斯征王道淳洽刑厝罔用惟公經綸天地寧濟區夏道冠乎伊稷賞薄於桓文豈所以憲章齊魯長轡宇宙敬惟前烈朕甚懼焉今進授相國改揚州刺史為牧以豫州之梁郡歷陽南徐州之義興揚州之淮南宣城吳吳興會稽新安東陽十郡封公為梁公錫茲白土苴以白茅爰定爾邦用建冢社在昔旦奭入居保佑逮于畢毛亦作卿士任兼內外禮實宜之今命使持節兼太尉王亮授相國揚州牧印綬梁公璽紱使持節兼司空王志授梁公茅土金虎符第一至第五左竹使符第一至第十左相國位冠羣后任總百司典彝數宜與事革其以相國總百揆去録尚書之號上所假節侍中貂蟬中書監印中外都督大司馬印綬建安公印策驃騎大將軍如故又加公九錫其敬聽後命以公禮律兼修刑德備舉哀矜折獄罔不用情是用錫公大輅戎輅各一玄牡二駟公勞心稼穡念在人天丕崇務本惟穀是寶是用錫公兗冕之服赤舄副焉公鎔鈞所被變風以雅易俗陶人載和邦國是用錫公軒縣之樂六佾之公文德廣覃義聲遠洽椎髻髽首夷歌請吏是用錫公朱戶以居公揚清抑濁官方有序多士聿興棫朴流詠是用錫公納陛以登公正色御下以身範物式遏不虞折衝惟遠是用錫公虎賁之士三百人公威同夏日志清姦宄放命圮族刑茲罔赦是用錫公鈇鉞各一公跨躡嵩溟陵厲區宇譬諸日月容光必至是用錫公彤弓一彤矢百盧弓十盧矢千公永言惟孝至感通神恭嚴祀典祭有餘敬是用錫金秬鬯一卣圭瓚副焉梁國置丞相以下一遵舊式欽哉其敬循往策祗服大禮對揚天眷用膺多福以弘我太祖之休命帝固辭府僚勸進不許二月辛酉府僚重請曰近以朝命蘊策冒奏丹誠奉被還令未蒙虛受縉紳顒顒深所未達蓋聞受金於府通人之弘致高蹈海隅匹夫之小節是以履乘石而周公不以為疑贈玉璜而太公不以為讓況世哲繼軌先德在人經綸草昧歎深微管加以朱方之役荊河是依班師振旅大造王室雖復纍繭救宋重胝存楚居今觀古曾何足云而惑甚盜鍾功疑不賞皇天后土不勝其酷是以玉馬駿奔表微子之去金板出地告龍逄之寃明公據鞍輟哭厲三軍之志獨居掩涕激義士之心故能使海若登祇罄圖效祉山戎孤竹束馬景從伐罪弔人一匡靜亂匪叨天功實勤濡足龜玉不毀誰之功歟獨為君子將使伊周何地於是始受相國梁公之命命焚東昏淫奢異服六十二種於都街齊帝追贈梁公夫人為梁國妃乙丑南兗州隊主陳文興於宣武城內鑿井得玉鏤騏驎金鏤玉璧水精環各二又鳳凰見建康縣桐下里宣德皇后稱美符瑞歸于相國府丙寅詔梁國依舊選諸要職悉依天朝之制帝上表以前代選官皆立選簿請自今選曹精加隱括依舊立簿使冠履無爽名實不違庶人識涯涘造請自息且聞中間立格甲族以二十登仕後門以過立試吏豈所以弘奬風流希向後進此實巨蠹尤宜刊革詔依表施行丙戌詔進梁公爵為王以豫州之南譙廬江江州之尋陽郢州之武昌西陽南徐州之南琅邪南東海晉陵揚州之臨海永嘉十郡益梁國並前為二十郡其相國揚州牧驃騎大將軍如故帝固辭有詔斷表相國左長史王瑩等率百僚敦請三月癸巳受梁王之命下令赦國內殊死以下魚衆寡孤獨不能自存者賜穀五斛府州所統亦同蠲蕩丙午齊帝命帝冕十有二旒建天子旌旗出警入蹕乘金根車駕六馬備五時副車置旄頭雲樂八佾設鍾虡宮縣王妃王子王女爵命之號一如舊儀丙辰齊帝下詔禪位即安姑孰四月辛酉宣德皇后令曰西詔至帝憲章前代敬禪神器于梁明可臨軒遣使恭授璽紱未亡人便歸于別宮壬戌策曰咨爾梁王惟昔邃古之載肇有生靈皇雄大庭之辟赫胥尊盧之后斯並龍圖鳥迹以前慌惚杳冥之世固無得而詳焉洎乎農軒炎皡之代放勛重華之主莫不以大道君萬姓公器御八紘居之如執朽索去之若釋重負一駕汾陽便有窅然之志暫適箕嶺即動讓王之心故知戴黃屋服玉璽非所以示貴稱尊乘大輅建旗旗蓋欲令歸趣有地是故忘己而字兆庶徇物而君四海及於菁華內竭畚橇外勞則撫茲歸運惟能是與四百告終有漢所以高揖黃德既謝魏氏所以樂推爰及晉宋亦弘斯典我太祖握河受歷應符啓運二葉重光三聖係軌嗣君喪德昏棄紀度毀紊天綱雕絶地紐是以谷滿川枯山飛鬼哭七廟已危人神無主惟王體茲上哲明聖在躬端冕而協雍熙推鋒而拯塗炭武功與日車並運文教與鵬翼齊舉固以幽顯宅心謳訟斯屬豈徒桴鼓播地卿雲叢天而已哉至於晝睹爭明夜飛枉矢除舊之徵必顯更姓之符允集今便仰祗乾象俯從人願敬禪神器授帝位于爾躬大祚告窮天祿永終於戲王允執其中式遵前典以副昊天之望禋上帝而臨億兆格文祖而膺大業以傳無疆之祚豈不盛與並命璽書遣兼太保中書監兼尚書令王亮兼太尉中書令王志奉皇帝璽紱受終之禮一依唐虞故事帝抗表陳讓表不獲通於是齊百官豫章王元琳等八百一十九人及梁臺侍中范雲等一百一十七人並上表勸進帝謙讓不受是日太史令蔣道秀陳天文符讖六十四條事並明著羣臣重表固請乃從之天監元年夏四月丙寅皇帝即位于南郊設壇柴燎告天曰皇帝臣衍敢用玄牡昭告于皇皇后帝齊氏以歷運斯既否終則亨欽若天應以命于衍夫任是司牧惟能是授天命不于常帝王非一族唐謝虞受漢替魏升爰及晉宋憲章在昔咸以君德馭四海元功子萬姓故能大庇氓黎光宅區宇齊代云季世主昏凶狡焉羣慝是崇是長肆厥姦回暴亂以播虐于我有邦俾九服八荒之內連率嶽牧之君蹶角頓顙匡救無術衍投袂星言推鋒萬里厲其挂冠之情用拯兆庶之切遂因時來宰司邦國濟物康世實有厥勞而晷緯呈祥川嶽效祉代終之符既顯革運之期已萃殊俗百蠻重譯獻款人神遠邇罔不和會於是羣公卿士咸致厥誠並以皇乾降命難以謙拒衍自惟匪德辭不獲遂仰迫上玄之眷俯惟億兆之心宸極不可久曠人神不可乏主遂藉樂推膺此嘉祚以茲寡薄臨馭萬方顧求夙志永言祗惕敬簡元辰恭茲大禮升壇受禪告類上帝克播休祉以弘盛烈式傳厥後用永保于我有梁惟明靈是饗禮畢有詔放觀乃備法駕還建康宮臨太極前殿大赦改元賜人爵二級文武位二等魚衆寡孤獨不能自存者人穀五斛逋布口錢宿責勿復收其犯鄉論清議贓汙淫盜一皆蕩滌洗除前注與之更始封齊帝為巴陵王全食一郡載天子旌旗乘五時副車行齊正朔郊祀天地禮樂制度皆用齊典以齊宣德皇后為齊文帝妃齊帝后王氏為巴陵王妃齊代王侯封爵悉皆降省其效著艱難者別有後命惟宋汝陰王不在除例劫賊餘口沒在臺府者悉皆蠲放諸流徙之家並聽還本以兼尚書令王亮為尚書令兼尚書右僕射沈約為尚書僕射封皇弟中護軍宏為臨川王南徐州刺史秀為安成王雍州刺史偉為建安王左衛將軍恢為鄱陽王荊州刺史憺為始興王自郡王以下列爵為縣六等皇弟皇子封郡王二千戶王之庶子為縣侯五百戶謂之諸侯功臣爵邑無定科鳳凰集南蘭陵丁卯詔凡後宮樂府西解暴室諸如此例被幽逼者一皆放遣若衰老不能自存者官給廩食戊辰遺巴陵王錢二百萬絹布各千匹綿二千斤車騎將軍高麗王高雲進號車騎大將軍鎮東大將軍百濟王餘太進號征東大將軍鎮東大將軍倭王武進號征東大將軍己巳巴陵王殂于姑孰追諡為齊和帝終禮一依故事庚午詔分遣內侍周省四方觀政聽謠訪賢舉滯其有田野不闢獄訟無章忘公徇私侵漁是務者悉隨事以聞若懷寶迷邦蘊奇待價蓄響藏真不求聞達各依名騰奏罔或遺隱又詔曰金作贖刑有聞自昔入縑以免施於中代永言叔季偷薄成風嬰愆入罪厥塗匪一死者不可復生刑者無因自反由此而望滋實庸可致乎可依周漢舊典有罪入贖外詳為條格以時奏聞辛未以新除謝沐公蕭寶義為巴陵王以奉齊祀復南蘭陵武進縣依前代之科徵新除相國軍咨祭酒謝朏為侍中左光祿大夫開府儀同三司改南東海為蘭陵郡土斷南徐州諸僑郡縣癸酉詔於公車府謗木肺石傍各置一函若肉食莫言山阿欲有橫議投謗木函若從我江漢功在可策犀兕徒弊龍蛇方縣次身才高妙擯壓莫通懷傅呂之術抱屈賈之歎其理有皎然受困包匭夫大政侵小豪門陵賤百姓已窮九重莫達若欲自申並可投肺石函甲戌詔斷遠近上慶禮閏月丁酉以行宕昌王梁彌雍為安西將軍河涼二州刺史正封宕昌王壬寅詔以憲綱日弛漸以為俗令端右以風聞奏事依元熙舊制有司奏追尊皇考為文皇帝廟號太祖皇妣張氏為獻皇后陵曰建陵郗氏為德皇后陵曰修陵五月乙亥夜盜入南北掖燒神武門總章觀害衛尉卿張弘策戊子江州刺史陳伯之舉兵反以領軍將軍王茂為征南將軍江州刺史率衆討之六月庚戌封北秦州刺史楊紹先為武都王是月陳伯之奔魏江州平前益州刺史劉季連據成都反秋七月丁巳朔日有蝕之八月戊戌置建康三官癸卯鸞鳥見樂遊苑乙巳平北將軍西涼州刺史象舒彭進號安西將軍封鄧至王丁未命中書監王瑩等八人參定律令詔尚書郎依昔奏事交州獻能歌鸚鵡詔不納林邑干利國各遣使朝貢冬十一月己未立小廟甲子立皇子統為皇太子賜天下為父後者爵一級十二月大雪深三尺是歲大旱米斗五千人多餓死二年春正月乙卯以尚書僕射沈約為左僕射吏部尚書范雲為右僕射辛酉祀南郊降死罪以下囚庚辰以仇池公楊靈珍為北梁州刺史封仇池王夏四月癸卯尚書刪定郎蔡法度上梁律二十卷令三十卷科四十卷五月尚書右僕射范雲卒乙丑益州刺史鄧元起剋成都曲赦益州六月丁亥以新除左光祿大夫謝朏為司徒尚書令甲午以中書監王瑩為尚書右僕射是夏多癘疫秋七月扶南龜茲中天竺國各遣使朝貢冬十月皇子綱生降都下死罪以下囚十一月乙卯雷電大雨晦三年春正月癸丑以尚書右僕射王瑩為左僕射太子詹事柳惔為右僕射二月魏剋梁州三月隕霜殺草夏五月丁巳以扶南王憍陳如闍耶跋摩為安南將軍六月丙子詔分遣使巡察州部視人寃酷癸未大赦秋七月甲子立皇子綜為豫章王八月魏剋司州九月壬子以河南王世子伏連籌為鎮西將軍西秦河二州刺史封河南王北天竺國遣使朝貢冬十一月甲子詔除贖罪科是歲魏正始元年四年春正月癸卯詔自今九流常選年未三十不通一經不得解褐若有才同甘顏勿限年次置五經博士各一人有司奏吳令唐傭鑄盤龍火爐翔鳳硯蓋詔禁錮終身丙午省鳳凰銜書伎戊申詔往代多命宮人帷宮觀禋郊之禮非所以仰虔蒼昊自今停止辛亥祀南郊大赦二月初置胄子律博士壬午遣衛尉卿楊公則率宿衛兵塞洛口壬辰交州刺史李凱據州反長史李畟討平之曲赦交州是月立建興苑於秣陵建興里夏四月丁巳以行宕昌王梁彌博為安西將軍河涼二州刺史正封宕昌王六月庚戌立孔子廟冬十月使中軍將軍揚州刺史臨川王宏都督北討諸軍事侵魏以興師費用王公以下各上國租及田穀以助軍資是歲大穰米斛三十五年春正月丁卯朔詔凡諸郡國舊族邦內無在朝位者選官搜括使郡有一人乙亥起前司徒謝朏為中書監司徒甲申立皇子綱為晉安王三月丙寅朔日有蝕之夏四月甲寅初立詔獄詔建康縣置三官與廷尉三官分掌獄事號建康為南獄廷尉為北獄五月置集雅館以招遠學秋七月乙丑鄧至國遣使朝貢八月辛酉作東宮九月臨川王宏軍至洛口大潰所亡萬計宏單騎而歸冬十一月甲子都下地震生白毛乙丑以師出淹時大赦魏人乘勝攻鍾離十二月癸卯司徒謝朏薨六年春三月庚申隕霜殺草是月有三象入建鄴夏四月壬辰置左右驍騎左右遊擊將軍官癸巳曹景宗韋睿等破魏師於邵陽洲斬獲萬計己酉以江州刺史王茂為尚書右僕射丁巳以揚州刺史臨川王宏為驃騎大將軍開府儀同三司以右光祿大夫沈約為尚書左僕射五月己巳置中衛中權將軍改驍騎為雲騎遊擊為遊騎秋八月戊子赦戊戌都下大水九月乙亥改閲武堂為德陽堂聽訟堂為儀賢堂冬閏十月乙丑以開府臨川王宏為司徒以行太子太傅尚書左僕射沈約為尚書令以行太子少傅吏部尚書袁昂為兼尚書右僕射甲申以左光祿大夫夏侯詳為左僕射十二月丙辰左僕射夏侯詳卒七月春正月戊子以元樹為朔二州都督封魏郡王戊戌詔作神龍仁獸闕於端門大司馬門外二月乙卯新作國門于越城南乙丑增置鎮衛將軍以下為十品以法日數凡二十四班以法氣序不登十品別有八班以象八風又置施外國將軍二十四班合一百九號庚午詔於州郡縣置州望郡宗鄉豪各一人專掌搜薦乙亥以車騎大將軍高麗王高雲為撫東大將軍開府儀同三司夏四月乙卯以皇太子納妃故赦大辟以下頒賜朝臣及近侍各有差五月都下大水戊子詔蘭陵縣建修二陵周回五里內居人賜復終身己亥詔復置宗正太僕大匠鴻臚又增太府太舟仍先為十二卿及置朱衣直閣將軍官六月辛酉改陵監為令秋八月丁巳皇子繹生赦大辟以下未結正者九月壬辰置童子奉車郎癸巳立皇子績為南康王冬十月丙寅以吳興太守張稷為尚書左僕射丙子詔大舉北侵丁丑魏縣瓠鎮主白皂生豫州刺史胡遜以城內屬是歲魏永平元年八年春正月辛巳祀南郊大赦壬辰魏鎮東參軍成景雋以宿預城內屬夏四月戊申以司徒臨川王宏為司空揚州刺史以車騎將軍領太子詹事王茂即本號開府儀同三司秋七月癸巳巴陵王蕭寶義薨冬十一月壬寅立皇子續為廬陵王九年春正月乙亥以右光祿大夫王瑩為尚書令庚寅新作緣淮塘三月己丑幸國子學親臨講肄賜祭酒以下各有差乙未詔皇太子及王侯之子年在從師者皆入學夏四月丁巳選尚書五都令史革用士流六月癸丑盜殺宣城太守朱僧勇閏六月己丑宣城盜轉寇吳興太守蔡撙討平之冬十二月癸未幸國子學策試胄子賜訓授之司各有差是歲于闐林邑國並遣使朝貢十年春正月辛丑祀南郊大赦戊申荊州言騶虞見三月盜殺東莞琅邪二郡太守劉晣以朐山引魏徐州刺史盧昶夏六月以國子祭酒張充為尚書右僕射冬十二月山車見臨城縣振遠將軍馬仙琕大破魏軍斬馘十餘萬復朐山城是歲初作宮城門三重樓及開二道宕昌國遣使朝貢婆利國貢金席十一年春正月壬辰詔自今逋謫之家及罪應質作若年有老小可停將送加鎮南將軍江州刺史建安王偉開府儀同三司司空揚州刺史臨川王宏進位太尉以驃騎將軍王茂為司空二月戊辰新昌濟陽二郡野蠶成繭三月丁巳為旱故曲赦揚徐二州庚申高麗國遣使朝貢夏四月百濟扶南林邑等國各遣使朝貢秋九月宕昌國遣使朝貢冬十一月乙未以吳郡太守袁昂為兼尚書右僕射己酉降太尉揚州刺史臨川王宏為驃騎將軍開府同三司之儀癸丑齊宣德太妃王氏薨是歲魏延昌元年十二年春正月辛卯祀南郊赦大辟罪以下二月辛酉兼尚書右僕射袁昂即正丙寅詔明下遠近若委骸不葬或篨衣莫改量給棺具收斂辛巳新作太極殿改為十三間以從閏數閏三月乙丑特進中軍將軍沈約卒夏四月都下大水六月癸巳新作太廟增基九尺秋九月加揚州刺史臨川王宏位司空以司空王茂為驃騎將軍開府同三司之儀江州刺史冬十月丁亥詔曰明堂地居卑濕可量就埤起以盡誠敬十三年春二月庚辰朔震于西南天如裂丁亥耕藉田大赦賜孝悌力田爵一級夏六月都下訛言有棖棖取人肝肺及血以飴天狗百姓大懼二旬而止秋七月乙亥立皇子綸為邵陵王繹為湘東王紀為武陵王是歲林邑扶南于闐國各遣使朝貢作浮山堰十四年春正月乙巳朔皇太子冠大赦賜為父後者爵一級王公以下班賚各有差停遠近上慶禮辛亥祀南郊詔班下遠近博採英異又前以墨刑用代重辟者除其條丙辰汝陰王劉胤薨丁巳魏宣武皇帝崩夏四月丁丑驃騎將軍開府同三司之儀江州刺史王茂薨冬十月浮山堰壞是歲蠕蠕狼牙修國各遣使來朝貢十五年春三月戊辰朔日有蝕之既夏四月高麗國遣使朝貢六月庚子以尚書令王瑩為左光祿大夫開府儀同三司尚書右僕射袁昂為左僕射吏部尚書王暕為右僕射秋八月蠕蠕河南國各遣使朝貢九月辛巳左光祿大夫開府儀同三司王瑩薨壬辰大赦冬十一月交州刺史李畟斬反者阮宗孝傳首建鄴曲赦交州是歲魏孝明皇帝熙平元年十六年春正月辛未祀南郊詔尤貧家勿收今年三調無田業者所在量宜賦給及優蠲産子之家恤理寃獄並賑孤老魚衆寡不能自存者二月辛亥耕藉田甲寅赦罪人三月丙子敕太醫不得以生類為藥公家織官紋錦飾並斷仙人鳥獸之形以為褻衣裁翦有乖仁恕於是祈告天地宗廟以去殺之理欲被之含識郊廟牲牷皆代以其山川諸祀則否時以宗廟去牲則為不復血食雖公卿異議朝野喧囂竟不從冬十月宗廟薦羞始用蔬果是歲河南扶南婆利等國各遣使朝貢十七年春二月癸巳雍州刺史安成王秀薨甲辰大赦三月丙寅改封建安郡王偉為南平王夏六月乙酉中軍將軍中書監臨川王宏以本號行司徒秋八月壬寅詔兵騶奴婢男年六十六女年六十免為編戶閏八月干利國遣使朝貢冬十月乙亥以行司徒臨川王宏即正十一月辛亥以南平王偉為左光祿大夫開府儀同三司是歲魏神龜元年十八年春正月甲申以領軍將軍鄱陽王恢為征西將軍荊州刺史以荊州刺史始興王憺為中撫將軍並開府儀同三司以尚書左僕射袁昂為尚書令以右僕射王暕為左僕射以太子詹事徐勉為右僕射辛卯祀南郊孝悌力田賜爵一級夏四月丁巳帝於無礙殿受佛戒赦罪人秋七月于闐扶南國各遣使朝貢
