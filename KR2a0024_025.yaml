body:
  text: 南史卷二十五列傳第十五王懿到彥之孫撝撝子沆沆從兄溉洽洽子仲舉垣護之弟子崇祖崇祖從兄榮祖榮祖從父閎閎弟子曇深張興世子欣泰王懿字仲德太原祁人自言漢司徒允弟幽州刺史懋七世孫也祖宏仕石季龍父苗仕苻堅皆至二千石仲德少沈審有意略事母甚謹學通陰陽精解聲律苻氏之敗仲德年十七及兄睿同起義兵與慕容垂戰敗仲德被重創走與家屬相失路經大澤困未能去臥林中有一小兒青衣年可七八歲騎牛行見仲德驚曰漢已食未仲德言飢小兒去須臾復來得飯與之食畢欲行而暴雨莫知津徑有一白狼至前仰天而號號訖銜仲德衣因度水仲德隨後得濟與睿相及度河至滑臺復為翟遼所留使為將帥積年仲德欲南歸乃棄遼奔泰山遼追騎急夜行忽見前有猛炬導之乘火行百許里以免晉太元末徙居彭城兄弟名犯晉宣元二帝諱故皆以字行睿字元德北土重同姓並謂之骨肉有遠來相投者莫不竭力營贍若有一人不至者以為不義不為鄉邑所容仲德聞王愈在江南貴盛是太原人乃遠來歸愈愈接遇甚薄因至姑孰投桓玄值玄篡見輔國將軍張暢言及世事仲德曰自古革命誠非一族然今之起者恐不足以濟大事元德果徑有計略宋武帝甚知之告以義舉使於都下襲玄仲德聞其謀謂元德曰天下事不可不密且兵亦不貴遲巧玄情無遠慮好冒夜出入今取之正須一夫力耳事泄元德為玄誅仲德竄走會義軍剋建鄴仲德抱元德子方回出候武帝帝於馬上抱方回與仲德相對號慟追贈元德給事中封安復縣侯以仲德為鎮軍中兵參軍武帝伐廣固仲德為前驅戰輒破之大小二十餘戰盧循寇逼衆議並欲遷都仲德正色曰今天子當陽南面明公命世作輔新建大功威震六合祅寇豕突恃我遠征既聞凱入將自奔散今日投草莽則同匹夫匹夫號令何以威物此謀若立請從此辭帝悅及武帝與循戰於左里仲德功冠諸將封新淦縣侯義熙十二年北伐進仲德征虜將軍加冀州刺史督前鋒諸軍事冠軍將軍檀道濟龍驤將軍王鎮惡向洛陽寧朔將軍劉遵考建武將軍沈林子出石門寧朔將軍朱超石胡藩向半城咸受統於仲德仲德率龍驤將軍朱牧寧遠將軍竺靈秀嚴綱等開巨野入河乃總衆軍進據潼關長安平以仲德為太尉咨議參軍武帝欲遷都洛陽衆議咸以為宜仲德曰非常之事人所駭今暴師經載士有歸心故當以建鄴為王基遷都宜候文軌大同帝深納之使衛送姚泓先還彭城武帝受命纍遷徐州刺史加都督元嘉中到彥之北侵仲德同行魏棄河南司兗三州平定三軍咸喜而仲德有憂色曰諸賢不諳北土情偽必墮其計諸軍進屯靈昌魏軍於委粟津度河虎牢洛陽並不守彥之聞二城並沒欲焚舟步走仲德曰洛陽既敗虎牢無以自立理數必然也今賊去我猶自千里滑臺尚有強兵若便捨舟士卒必散且當入濟至馬耳谷口更詳所宜乃回軍沿濟南歷城步上焚舟棄甲還至彭城仲德坐免官尋與檀道濟救滑臺糧盡乃歸自是復失河南九年又為徐州刺史仲德三臨徐州威德著於彭城立佛寺作白狼童子像於塔中以在河北所遇也進號鎮北大將軍十五年卒諡曰桓侯亦於廟立白狼童子壇每祭必祠之子正循嗣為家僮所殺仲德兄孫文和景和中為征北義陽王昶府佐昶於彭城奔魏部曲皆散文和獨送至界上昶謂曰諸人皆去卿有老母何獨不去文和乃去升明中為巴陵內史沈攸之事起文和斬其使馳白齊武帝及齊永明年中歷青冀兗益四州刺史到彥之字道豫彭城武原人楚大夫屈到後也宋武帝討孫恩以鄉里樂從每有戰功義旗將起彥之家在廣陵臨川武烈王道規剋桓弘彥之時近行聞事捷馳歸而道規已南度江倉卒晚方獲濟及至京口武帝已向建鄴孟昶居守留之及見武帝被責不自陳昶又不申理故不加官義熙元年補鎮軍行參軍六年盧循逼都彥之與檀道濟掩循輜重與循黨荀林戰敗免官後以軍功封佷山縣子為太尉中兵參軍驃騎將軍道憐鎮江陵以彥之為驃騎咨議參軍尋遷司馬南郡太守又從文帝西鎮除使持節南蠻校尉武帝受命進爵為侯彥之佐守荊楚垂二十載威信為士庶所懷及文帝入奉大統以徐羡之等新有篡虐懼欲使彥之領兵前驅彥之曰了彼不二便應朝服順流若使有虞此師既不足恃更開嫌隙之端非所以副遠邇之望也會雍州刺史褚叔度卒乃遣彥之權鎮襄陽羡之等欲即以彥之為雍州上不許徵為中領軍委以戎政彥之自襄陽下謝晦已至鎮慮彥之不過己彥之至楊口步往江陵深布誠款晦亦厚自結納彥之留馬及利劍名刀以與晦晦由此大安元嘉三年討晦進彥之鎮軍於彭城洲戰不利咸欲退還夏口彥之不回會檀道濟至晦乃敗走江陵平因監荊州州府事改封建昌縣公其秋遷南豫州刺史監六州諸軍事鎮歷陽上於彥之恩厚將加開府欲先令立功七年遣彥之制督王仲德竺靈秀尹沖段宏趙伯符竺靈真庾俊之朱修之等北侵自淮入泗泗水滲日裁行十里自四月至七月始至東平須昌縣魏滑臺虎牢洛陽守兵並走彥之留朱修之守滑臺尹沖守虎牢杜驥守金墉十月魏軍向金墉城次至虎牢杜驥奔走尹沖衆潰而死魏軍仍進滑臺時河冰將合糧食又罄彥之先有目疾至是大動將士疾疫乃回軍焚舟步至彭城初遣彥之資實甚盛及還凡百蕩盡府藏為空文帝遣檀道濟北救滑臺收彥之下獄免官兗州刺史竺靈秀棄軍伏誅明年夏起為護軍九年復封邑固辭明年卒乃復先戶邑諡曰忠公孝建三年詔彥之與王華王曇首配食文帝廟庭長子元度位益州刺史少子仲度嗣位驃騎從事中郎兄弟並有才用皆早卒仲度子撝撝字茂謙襲爵建昌公宋明帝立欲收物情以撝功臣之後自長兼左戶郎中擢為太子洗馬撝資藉豪富厚自奉養供一身一月十萬宅宇山池伎妾姿藝皆窮上品才調流贍善納交遊愛伎陳玉珠明帝遣求不與逼奪之撝頗怨帝令有司誣奏將殺之撝入獄數宿鬚鬢皆白免死繫尚方奪封與弟賁撝由是更以貶素自立明帝崩弟賁讓封還撝朝議許之弟遁元徽中為南海太守在廣州升明元年沈攸之反刺史陳顯達起兵應朝廷遁猶豫見殺遁家人在都從野夜歸見兩三人持堊刷其家門須臾而滅明日而遁死問至撝懼詣齊高帝謝即板撝武帝中軍咨議參軍建元初國除武帝即位纍遷司徒左長史宋時武帝與撝同從宋明帝射雉郊野渴倦撝得早青瓜與上對剖食之上又數遊撝家懷其舊德至是一歲三遷永明元年為御史中丞車駕幸丹陽郡宴飲撝恃舊酒後狎侮同列謂庾杲之曰蠢爾蠻荊其俗鄙復謂虞悰曰斷髮文身其風陋王晏既貴雅步從容又問曰王散騎復何故爾晏先為國常侍轉員外散騎郎此二職清華所不為故以此嘲之王敬則執查以刀子削之又曰此非元徽頭何事自契之為左丞庾杲之所糾以贖論再遷左衛將軍隨王子隆帶彭城郡撝問訊不修部下敬為有司舉免官後為五兵尚書廬陵王中軍長史卒子沆嗣沆字茂瀣幼聰敏五歲時父撝於屏風抄古詩沆請教讀一遍便能諷誦及長善屬文工篆隸美風神容止可悅梁天監初為征虜主簿東宮建以為太子洗馬時文德殿置學士省召高才碩學待詔沆通籍焉武帝宴華光殿命羣臣賦詩獨詔沆為二百字三刻便成沆於坐立奏其文甚美俄以洗馬管東宮書記及散騎省優策文三年詔尚書郎在職清能者為侍郎以沆為殿中曹侍郎此曹以文才選沆從父兄溉洽並有才名時相代為之見榮當世遷太子中舍人沆為人謙敬口不論人短任昉范雲皆與善後卒於北中郎咨議參軍所著詩賦百餘篇溉字茂灌撝弟子也父坦齊中書郎溉少孤貧與兄沼弟洽俱知名起家王國左常侍樂安任昉大相賞好提攜溉洽二人廣為聲價所生母魏本寒家悉越中之資為二兒推奉昉梁天監初昉出守義興要溉洽之郡為山澤之遊昉還為御史中丞後進皆宗之時有彭城劉孝綽劉苞劉孺吳郡陸倕張率陳郡殷藝沛國劉顯及溉洽車軌日至號曰蘭臺聚陸倕贈昉詩云和風雜美氣下有真人遊壯矣荀文若賢哉陳太丘今則蘭臺聚方古信為儔任君本達識張子復清修既有絶塵到復見黃中劉時謂昉為任君比漢之三君到則溉兄弟也除尚書殿中郎後為建安太守昉以詩贈之求二衫段云鐵錢兩當一百代易名實為惠當及時無待涼秋日溉答云余衣本百結閩中徒八蠶假令金如粟詎使廉夫貪還為太子中舍人溉長八尺眉目如點白美鬚髯舉動風華善於應答上用為通事舍人中書郎兼吏部太子中庶子湘東王繹為會稽太守以溉為輕車長史行府郡事武帝勑繹曰到溉非直為汝行事足為汝師溉嘗夢武帝遍見諸子至湘東而脫帽與之於是密敬事焉遭母憂居喪盡禮所處廬開方四尺毀瘠過人服闋猶蔬食布衣者纍載歷御史中丞都官左戶二尚書掌吏部尚書時何敬容以令參選事有不允溉輒相執敬容謂人曰到溉尚有餘臭遂學作貴人敬容日方貴寵人皆下之溉忤之如初溉祖彥之初以擔糞自給故世以為譏云後省門鴟尾被震溉左遷光祿大夫所蒞以清白自修性又率儉不好聲色虛室單牀傍無姬侍冠履十年一易朝服或至穿補傳呼清路示有朝章而已後為散騎常侍侍中國子祭酒表求列武帝所撰正言於學請置正言助教二人學生二十人尚書左丞賀琛又請加置博士一人溉特被武帝賞接每與對從夕達旦或復失寢加以低睡帝詩嘲之曰狀若喪家狗又似懸風槌當時以為笑樂溉第居近淮水齋前山池有奇礓石長一丈六尺帝戲與賭之并禮記一部溉並輸焉未進帝謂朱虉曰卿謂到溉所輸可以送未斂板對曰臣既事君安敢失禮帝大笑其見親愛如此石即迎置華林園宴殿前移石之日都下傾城縱觀所謂到公石也溉奕入第六品常與朱虉韋黯於御坐校比勢復局不差一道後因疾失明詔以金紫光祿大夫散騎常侍就第養疾溉少有美名遂不為僕射人為之恨溉淡如也家門雍睦兄弟特相友愛初與弟洽共居一齋洽卒後便捨為寺蔣山有延賢寺溉家世所立溉得祿俸皆充二寺因斷腥膻終身蔬食別營小室朝夕從僧徒禮誦武帝每月三致淨饌恩禮甚篤性不好交遊唯與朱虉劉之遴張綰同志友密及臥疾門可羅雀唯三人每歲時鳴騶枉道以相存問置酒極歡而去以太清二年卒臨終託張劉勒子孫薄葬之禮曰氣絶便斂斂以法服先有冢竁斂竟便葬不須擇日凶事必存約儉孫姪不得違言便屏家人請僧讀經贊唄及卒顏色如手屈二指即佛道所云得果也時朝廷多事遂無贈諡有集二十卷行於時子鏡鏡字圓照初在孕其母夢懷鏡及生因以名焉鏡五歲便口授為詩婉有辭況位太子舍人作七悟文甚美先溉卒鏡子藎早聰慧位尚書殿中郎嘗從武帝幸京口登北顧樓賦詩藎受詔便就上以示溉曰藎定是才子翻恐卿從來文章假手於藎因賜絹二十匹後溉每和御詩上輒手詔戲溉曰得無貽厥之力乎又賜溉連珠曰硯磨墨以騰文筆飛毫以書信如飛蛾之赴火豈焚身之可吝必耄年其已及可假之於少藎其見知賞如此後除丹陽尹丞太清亂赴江陵卒溉弟洽洽字茂清警有才學父坦以洽無外家乃求娶於羊玄保以為外氏洽年十八為徐州迎西曹行事謝朓文章盛於一時見洽深相賞好每稱其兼資文武朓後為吏部欲薦之洽覩時方亂深相拒絶遂築室巖阿幽居積歲時人號曰居士任昉與洽兄沼溉並善嘗訪洽於田舍歎曰此子日下無雙遂申拜親之禮梁武帝嘗問待詔丘遲曰到洽何如沆溉遲曰正情過於沆文章不減溉加以清言殆將難及即召為太子舍人御幸華光殿詔洽及沆蕭琛任昉侍宴賦二十韻詩以洽辭為工賜絹二十匹上謂昉曰諸到可謂才子昉曰臣常竊議宋得其武梁得其文遷司徒主簿直待詔省敕使抄甲部書為十二卷遷尚書殿中郎後為太子中舍人與庶子陸倕對掌東宮管記俄為侍讀侍讀省仍置學士二人洽充其選遷國子博士奉敕撰太學碑纍遷尚書吏部郎請託不行徙左丞準繩不避貴戚時帝欲親戎軍國禮容多自洽出尋遷御史中丞號為徑直少與劉孝綽善下車便以名教隱穢首彈之孝綽託與諸弟書實欲聞之湘東王公事左降猶居職舊制中丞不得入尚書下舍洽兄溉為左戶尚書洽引服親不應有礙刺省詳決左丞蕭子雲議許入溉省亦以其兄弟素篤不相別也出為尋陽太守卒贈侍中諡理子洽美容質善言吐弱年聽伏曼容講未嘗傍膝伏深歎之文集行於世子仲舉仲舉字德言無他藝業而立身耿正仕梁為長城令政號廉平陳文帝居鄉里嘗詣仲舉時天陰雨仲舉獨坐齋內聞城外有蕭鼓聲俄而文帝至仲舉異之乃深自結帝又嘗因飲夜宿仲舉帳中忽有神光五采照于室內由是祗事益恭及侯景平文帝為吳興太守以仲舉為郡丞與潁川庾持俱為文帝賓客文帝嗣位授侍中參掌選事天嘉元年守都官尚書封寶安縣侯三年遷尚書左僕射丹陽尹參掌如故改封建昌縣侯仲舉既無學術朝章非其所長選舉引用皆出自袁樞性疏簡不干時務與朝士無所親狎但聚財酣飲而已文帝積年寢疾不親萬機尚書中書事皆使仲舉斷決天康元年遷侍中尚書僕射文帝疾甚入侍醫藥及帝崩宣帝受遺詔為尚書令入輔仲舉與左丞王暹中書舍人劉師知殷不佞以朝望有歸乃遣不佞宣旨遣宣帝還東府事發師知下獄賜死暹不佞並付推乃以仲舉為貞毅將軍金紫光祿大夫初仲舉子郁尚文帝妹信義長公主官至中書侍郎出為宣城太守文帝配以士馬是年遷南康內史以國哀未之任仲舉既廢居私宅與郁皆不自安時韓子高在都人馬素盛郁每乘小輿蒙婦人衣與子高謀子高軍主告其事宣帝收子高仲舉及郁並於獄賜死郁諸男女以帝甥獲免垣護之字彥宗略陽桓道人也族姓豪強石季龍時自略陽徙鄴祖敞仕苻氏為長樂國郎中令伯父遵父苗仕慕容超並見委任遵為尚書苗為京兆太守宋武帝圍廣固遵苗踰城歸降並以為太尉行參軍元嘉中遵為員外散騎常侍苗屯騎校尉仍家下邳護之少倜儻不拘小節形狀短陋而氣幹強果元嘉初為殿中將軍隨到彥之北侵魏彥之將回師護之書諫彥之不納散敗而歸文帝聞而善之纍遷鍾離太守隨王玄謨入河玄謨攻滑臺護之百舸為前鋒進據石濟及魏救將至馳書勸玄謨急攻之不見從玄謨敗退不暇報護之而魏軍悉牽玄謨水軍大艚連以鐵鎖三重斷河以絶護之還路河水迅急護之中流而下每至鐵鎖以長柯斧斷之魏人不能禁唯失一舸餘舸並全留戍麋溝城還為江夏王義恭驃騎戶曹參軍戍淮陰領濟北太守三十年文帝崩還屯歷下孝武入討率所領馳赴帝以為冀州刺史及南郡王義宣反兗州刺史徐遺寶護之妻弟也與護之書勸使同逆護之馳使以聞率軍隨沈慶之等擊魯爽義宣率大衆至梁山與王玄謨相持柳元景率護之及護之弟詢之柳叔仁鄭琨等出鎮新亭玄謨求救上遣元景等進據南州護之水軍先發大破賊將龐法起元景乃以精兵配護之追討會朱修之已平江陵至尋陽而還遷徐州刺史封益陽縣侯後拜青冀二州刺史鎮歷城大明三年徵為右衛將軍還於道聞竟陵王誕據廣陵反護之即率部曲受車騎大將軍沈慶之節度事平轉臨淮太守徙豫州刺史護之所蒞多聚斂賄貨七年坐下獄免官明年起為太中大夫未拜以憤卒諡壯侯崇祖字敬遠一字僧寶護之弟子也父詢之驍敢有氣力元凶弒逆副輔國將軍張柬時張超之手行大逆亦領軍隸柬詢之規殺之慮柬不同柬宿有此志又未測詢之同否互相觀察會超之來論事柬色動詢之覺之即共定謀遣召超之超之疑之不至改宿他所詢之不知徑往斫之殺其僕於牀因與柬南奔時孝武已即位以為積射將軍梁山之役力戰中流矢卒贈冀州刺史崇祖年十四有幹略伯父護之謂門宗曰此兒必大吾門後隨徐州刺史薛安都入魏尋又率門宗據朐山歸宋求淮北立功明帝以為北琅邪蘭陵二郡太守封下邳子及齊高帝鎮淮陰崇祖時戍朐山既受都督祗奉甚至帝以其武勇善待之崇祖謂其妹夫皇甫肅曰此真吾君也遂密布誠節高帝威名已著宋明帝尤所忌疾徵為黃門郎規害高帝崇祖建策以免由是甚見親參豫密謀元徽末高帝懼禍令崇祖入魏崇祖即以家口託皇甫肅勒數百人將入魏界更聽後旨會蒼梧廢召崇祖還都及齊高帝新踐阼恐魏致討以送劉昶為辭以為軍衝必在壽春非崇祖莫可為捍徙為豫州刺史監豫司二州諸軍事封望蔡侯建元二年魏遣劉昶攻壽春崇祖乃於城西北立堰塞肥水堰北起小城使數千人守之謂長史封延伯曰虜必悉力攻小城若破此堰放水一激急逾三峽自然沈溺豈非小勞而大利邪及魏軍由西道集堰南分軍東路肉薄攻小城崇祖著白紗帽肩輿上城手自轉式日晡時決小史埭水勢奔下魏攻城之衆溺死千數大衆退走初崇祖於淮陰見高帝便自比韓白唯上獨許之及破魏軍啓至上謂朝臣曰崇祖自擬韓白今真其人也進為都督崇祖聞陳顯達李安人皆增給軍儀乃啓求鼓吹橫吹上敕曰韓白何可不與衆異給鼓吹一部崇祖慮魏復攻淮北啓徙下蔡戍於淮東其冬魏果欲攻下蔡及聞內徙乃揚聲平除故城衆疑魏當於故城立戍崇祖曰下蔡去鎮咫尺魏豈敢置戍實是欲除此城正恐奔走殺之不盡耳魏果夷掘下蔡城崇祖大破之武帝即位為五兵尚書領驍騎將軍初豫章王有盛寵武帝在東宮崇祖不自附及破魏軍詔使還朝與共密議武帝疑之曲加禮待酒後謂曰世間流言我已豁懷抱自今已後富貴見付也崇祖拜謝及去後高帝復遣荀伯玉敕以邊事受旨夜發不得辭東宮武帝以為不盡誠心銜之永明元年詔稱其與荀伯玉搆扇邊荒誅之故人無敢至者獨有前豫州主簿夏侯恭叔出家財為殯時人以比欒布恭叔譙國人崇祖為豫州聞其才義辟為主簿兼掌書翰高帝即位方鎮皆有賀表王儉見崇祖啓咨嗟良久曰此恭叔辭也時宋氏封爵隨運遷改恭叔以柳元景中興元勳劉勔殞身王事不宜見廢上表論之甚有義理事雖不從優詔見答後為竟陵令惠化大行木連理上有光如燭咸以善政所致榮祖字華先崇祖從父兄也父諒之宋北中郎府參軍榮祖少學騎射或曰何不學書榮祖曰曹操曹丕上馬橫槊下馬談論此可不負飲食矣君輩無自全之伎何異犬羊乎宋孝建中為後軍參軍伯父豫州刺史護之子襲祖為淮陽太守孝武以事徙之嶺南護之不食而死帝疾篤又使殺襲祖臨死與榮祖書曰弟嘗勸我危行言遜今果敗矣明帝初即位四方反除榮祖冗從僕射遣還徐州説刺史薛安都曰天之所廢誰能興之使君今不同八百諸侯如下官所見非計中也安都曰今京都無百里地莫論攻圍取勝自可相拍手笑殺且我不欲負孝武榮祖曰孝武之行足致餘殃今雖天下雷同正是速死無能為也安都曰不知諸人云何我不畏此大蹄馬在近急便作計榮祖被拘不得還因為安都將領安都引魏軍入彭城榮祖家屬南奔朐山齊高帝在淮陰榮祖歸附高帝保持之及宋明帝崩高帝書送榮祖詣僕射褚彥回除東海太守彥回謂曰蕭公稱卿幹略故以郡相處榮祖善彈登西樓見翔鵠雲中謂左右當生取之於是彈其兩翅毛脫盡墜地無傷養毛生後飛去其妙如此元徽末蒼梧凶狂欲危害高帝帝欲奔廣陵起事荀伯玉等皆贊成之榮祖諫曰領府去臺百步公走人豈不知若單騎輕行廣陵人一旦閉門不相受公欲何之公今動足下牀恐便有叩臺門者公事去矣蒼梧明夕自至領府扣門欲害帝帝嘗以書案下安鼻為楯以鐵為書鎮如意甚壯大以備不虞欲以代杖蒼梧至府而曰且申今夕須至一處作適還當取奴尋遇殺齊高帝謂榮祖曰不用卿言幾無所成豫佐命勳封將樂縣子永明二年為尋陽相南新蔡太守被告作大形棺材盛仗使鄉人載度江北案驗無實見原後拜兗州刺史初巴東王子響事方鎮皆啓稱子響為逆榮祖曰此非所宜言政應云劉寅等孤負恩奬逼迫巴東使至於此時諸啓皆不得通事平後上乃省視以榮祖為知言九年卒從弟歷生亦為驍將位太子右率性苛暴與始安王遙光同反伏誅閎字叔通榮祖從父也父遵位員外常侍閎為宋孝武帝南中郎參軍孝武帝即位以為交州刺史時交土全實閎罷州還資財巨萬孝武末年貪欲刺史二千石罷任還都必限使獻奉又以蒱戲取之要令罄盡乃止閎還至南州而孝武晏駕擁南資為富人明帝初以為司州刺史北破薛道摽封樂鄉縣男出為益州刺史蜀還之貨亦數千金先送獻物傾西資之半明帝猶嫌其少及閎至都詣廷尉自簿先詔獄官留閎於是悉送資財然後被遣凡蠻夷不受鞭罰輸財贖罪謂之賧時人謂閎被賧刺史歷度支尚書衛尉齊高帝輔政使褚彥回為子晃求閎女閎辭以齊大非偶帝雖嘉其退讓而心不能歡即以晃婚王胄女謂豫章王嶷曰前欲以白象與垣公婚者重其夷淡事雖不遂心常依然白象晃小字也及高帝即位以有誠心封爵如故卒於金紫光祿大夫諡曰定子憘伯襲爵憘伯少負氣豪俠妙解射雉尤為武帝所重以為直閣將軍與王文和俱任頗以地勢陵之後出為巴西梓潼二郡太守時文和為益州刺史曰每憶昔日俱在閣下卿時視我如我今日見卿因誣其罪馳信啓之又輒遣蕭寅代憘伯為郡憘伯亦別遣啓臺閉門待報寅以兵圍之齊明帝輔政知其無罪不欲乖文和乃敕憘伯解郡還為寅軍所躡束手受害閎弟子曇深以行義稱為臨城縣罷歸得錢十萬以買宅奉兄退無私蓄先是劉楷為交州謂王儉曰欲一人為南土所聞者同行儉良久曰得之矣昔垣閎為交州閎弟閲又為九真郡皆著信南中羽林監曇深者閲之子也雅有學行當令同行及隨楷未至交州而卒楷惆悵良久曇深妻鄭氏字獻英滎陽人時年二十子文凝始生仍隨楷到鎮晝夜紡織傍無親援年既盛美甚有容德自厲冰霜無敢望其門者居一年私裝了乃告楷求還楷大驚曰去鄉萬里固非孀婦所濟遂不許鄭又曰垣氏羇魂不反而其孤藐幼妾若一同灰壤則何面目以見先姑因大悲泣楷愴然許之厚為之送於是間關危險遂得至鄉葬畢乃曰可以下見先姑矣時文凝年甫四歲親教經禮訓以義方州里稱美又有吳興丘景賓字彥先亦以節義聞父康祖無錫令亡後僮僕數十人及宅宇産畜景賓悉讓與兄鎮之鎮之又推齋屋三間與之亦不肯受太守孔山士歎曰聞柳下惠之風貪夫廉懦夫有立志復見之矣終於奉朝請張興世字文德竟陵人也本單名世宋明帝益為興世少家貧白衣隨王玄謨代蠻後隨孝武鎮尋陽補南中郎參軍督護從入討元凶及南郡王義宣反又隨玄謨出梁山有戰功明帝即位四方反叛進興世龍驤將軍領水軍拒南賊時臺軍據赭圻朝廷遣吏部尚書褚彥回就赭圻行選是役也皆先戰授位檄板不供由是有黃紙札南賊屯在鵲尾既相持久不決興世建議曰賊據上流兵張地勝今以奇兵潛出其上使其首尾周惶進退疑沮糧運艱礙乃制勝之奇沈攸之吳喜並贊其計分戰士七千配之興世乃令輕舸泝流而上旋復回還一二日中輒復如此使賊不為之防賊帥劉胡聞興世欲上笑之曰我尚不敢越彼下取揚州興世何人欲據我上興世謂攸之等曰上流唯有錢溪可據乃往據之及劉胡來攻將士欲迎擊之興世曰賊來尚遠而氣驟盛矣夫驟既力盡盛亦易衰此曹劌所以破齊也將士不得妄動賊來轉近興世乃命壽寂之任農夫率壯士擊走之袁顗慍曰賊據人肝藏𩹉云何得活是月朔赭圻軍士伐木為柵於青山遇一童子曰賊下旬當平無為自苦忽不見至是果敗興世又遏其糧道賊衆漸飢劉胡棄軍走袁顗仍亦奔散興世遂與吳喜共平江陵遷右軍將軍封作唐縣侯歷雍州刺史左衛將軍以疾徙光祿大夫尋卒興世居臨沔水自襄陽以下至于江二千里先無洲嶼興世初生當其門前水中一旦忽生洲年年漸大及興世為方伯而洲上遂十餘頃父仲子由興世致位給事中興世欲將往襄陽愛鄉里不肯去嘗謂興世曰我雖田舍老公樂聞鼓角汝可送一部行田時欲吹之興世素恭謹畏法譬之曰此是天子鼓角非田舍公所吹興世欲拜墓仲子謂曰汝衛從太多先人必當驚怖興世減撤而行子欣泰欣泰字義亨不以武業自居好隸書讀子史年十餘詣吏部尚書褚彥回彥回問張郎弓馬多少答曰性怯畏馬無力牽弓彥回甚異之歷諸王府佐宋元徽中興世在家擁雍州還資見錢三千萬蒼梧王自領人劫之一夜垂盡興世憂懼病卒欣泰兄欣華時為安成郡欣泰悉封餘財以待之齊建元初為尚書都官郎武帝與欣泰早款遇及即位以為直閣將軍後為武陵內史坐贓私殺人被糾見原還復為直閣步兵校尉領羽林監欣泰通涉雅俗交結多是名素下直輒著鹿皮冠衲衣錫杖挾素琴有以啓武帝帝曰將家兒何敢作此舉止後從駕出新林敕欣泰廉察欣泰停仗於松樹下飲酒賦詩制局監呂文度以啓武帝帝大怒遣出數日意釋召謂曰卿不樂武職當處卿清貴除正員郎出為鎮軍中兵參軍南平內史巴東王子響殺僚佐上遣中庶子胡諧之西討使欣泰為副欣泰謂諧之曰今太歲在西南逆歲行軍兵家深忌若且頓軍夏口宣示禍福可不戰而禽也諧之不從進江津尹略等見殺事平欣泰徙為隨王子隆鎮西中兵改領河東內史子隆深相愛重數與談宴意遇與謝朓相次典籤密啓之武帝怒召還都屏居家巷置宅南岡下面接松山欣泰負弩射雉恣情間放聲伎雜藝頗多開解明帝即位為領軍長史遷咨議參軍上書陳便宜二十條其一條言宜毀廢塔寺帝並優詔報答建武二年魏圍鍾離欣泰為軍主隨崔慧景救援及魏軍退而邵陽洲上餘兵萬人求輸馬五百匹假道慧景欲斷路攻之欣泰説慧景曰歸師勿遏古人畏之死地兵不可輕也慧景乃聽過時領軍蕭坦之亦援鍾離還啓明帝曰邵陽洲有死賊萬人慧景欣泰放而不取帝以此皆不加賞四年出為永陽太守永元初還都崔慧景圍城欣泰入城守備事寧除廬陵王安東司馬梁武帝起兵東昏以欣泰為雍州刺史欣泰與弟前始安內史欣時密謀結太子右率胡松前南譙太守王靈秀直閣將軍鴻選含德主帥苟勵直後劉靈運等並同契會帝遣中書舍人馮元嗣監軍救郢茹法珍梅蟲兒及太子右率李居士制局監楊明泰等十餘人相送中興堂欣泰等使人懷刀於坐斫元嗣碩墜果柈中又斫明泰破其腹蟲兒傷數創手指皆墜居士踰牆得出茹法珍亦散走還臺靈秀仍往石頭迎建安王寶寅率文武數百唱警蹕至杜姥宅欣泰初聞事發馳馬入宮冀法珍等在外城內處分必盡見委因行廢立既而法珍得返處分關門上仗不配欣泰兵鴻選在殿內亦不敢發城外衆尋散少日事覺欣泰胡松等皆伏誅欣泰少時有人相其當得三公而年裁三十後屋瓦墜傷又問相者云無復公相年壽更增亦可得方伯耳死時年三十六論曰王仲德受任二世能以功名始終入關之役檀王咸出其下元嘉北討則受督於人有藺生之志而無關公之憤長者哉道豫雖地居豐沛榮非恩假時歷四代人焉不絶文武之道不墜斯門殆為優矣垣氏宋齊之際世著武節崇祖陳力疆埸以韓白自許竟而杜郵之酷可為痛哉興世鵲浦之奇遠有深致其垂組建斾豈徒然也
