body:
  text: 南史卷三宋本紀下第三太宗明皇帝諱彧字休景小字榮期文帝第十一子也元嘉十六年十月生二十五年封淮陽王二十九年改封湘東王孝武踐阼纍遷鎮軍將軍雍州刺史是歲入朝時廢帝疑畏諸父以上付廷尉明日將加禍害上乃與腹心阮佃夫李道兒等密謀時廢帝左右直閣將軍宗越談金童太一等是夜並外宿佃夫道兒因結壽寂之等十一月二十九日弒廢帝於後堂建安王休仁便稱臣奉引升西堂登御坐事出倉卒上失履跣猶著烏紗帽休仁呼主衣以白紗代之未即位凡衆事悉稱令書己未司徒豫章王子尚山陰公主並賜死宗越談金童太一伏誅十二月庚申朔令書以東海王褘為中書監太尉以晉安王子勛為車騎將軍開府儀同三司癸亥以建安王休仁為司徒尚書令揚州刺史乙丑改封安陸王子綏為江夏王泰始元年即大明九年也魏和平六年冬十二月丙寅皇帝即位于太極前殿大赦改元辛未改封臨賀王子産為南平王晉熙王子輿為廬陵王壬申以王景文為尚書僕射乙亥追尊所生沈婕妤曰宣皇太后戊寅改太皇太后為崇憲皇太后立皇后王氏罷二銖錢江州刺史晉安王子勛舉兵反鎮軍長史鄧琬為其謀主雍州刺史袁顗赴之壬午謁太廟甲申郢州刺史安陸王子綏會稽太守尋陽王子房臨海王子頊並舉兵同逆二年春正月乙未晉安王子勛僭即僞位於尋陽年號義嘉壬辰徐州刺史薛安都舉兵反甲午內外戒嚴司徒建安王休仁都督諸軍南討丙申徐州刺史申令孫司州刺史龐孟虯豫州刺史殷琰青州刺史沈文秀冀州刺史崔道固湘州行事何慧文廣州刺史袁曇遠益州刺史蕭惠開梁州刺史柳元怙並同逆丙午車駕親御六軍頓中興堂辛亥南豫州刺史山陽王休祐改為豫州刺史西討吳郡太守顧琛吳興太守王曇生義興太守劉延熙晉陵太守袁標山陽太守程天祚並舉兵反鎮東將軍巴陵王休若統軍東討壬子崇憲皇太后崩二月乙丑以蔡興宗為尚書右僕射壬申吳興太守張永右軍將軍蕭道成東討平晉陵丁亥建武將軍吳喜公率諸軍破賊於吳吳興會稽平定三郡同逆皆伏誅輔國將軍蕭道成前鋒北討輔國將軍劉勔前鋒西討劉胡衆四萬據赭圻三月庚寅撫軍將軍殷孝祖攻赭圻死之以輔國將軍沈攸之代為南討前鋒賊衆稍盛袁顗頓鵲尾連營至濃湖衆十餘萬丙申南徐州刺史桂陽王休範總統北討諸軍事戊戌貶尋陽王子房爵為松滋縣侯癸卯令人入米七百石者除郡減此各有差壬子斷新錢專用古錢夏五月甲寅葬崇憲皇太后於修寧陵秋七月丁酉以仇池太守楊僧嗣為北秦州刺史封武都王八月己卯司徒建安王休仁率衆軍大破賊斬僞尚書僕射袁顗進討江郢荊湘雍五州平之晉安王子勛安陸王子綏臨海王子頊邵陵王子元並賜死同黨皆伏誅諸將帥封賞各有差九月癸巳六軍解嚴戊戌以王玄謨為左光祿大夫開府儀同三司領護軍將軍冬十月乙卯永嘉王子仁始安王子真淮南王子孟南平王子産廬陵王子輿松滋侯子房並賜死丁卯以沈攸之為中領軍與張永俱北討戊寅立皇子昱為皇太子十一月壬辰立建平王景素子延年為新安王十二月薛安都要引魏軍張永沈攸之大敗於是遂失淮北四州及豫州淮西地是歲魏天安元年三年春正月庚子以農役將興詔太官停宰牛癸卯曲赦豫南豫二州閏正月庚午都下大雨雪遣使巡行振貸各有差二月甲申為戰亡將士舉哀丙申曲赦青冀二州夏四月丙戌詔以故丞相江夏文獻王故太尉巴東忠烈公柳元景故司空始興襄公沈慶之故征西將軍洮陽肅侯宗賣心陪祭孝武廟庭庚子立桂陽王休範第二子德嗣為廬陵王立侍中劉韞第二子銑為南豐王以奉廬江昭王南豐哀王祀五月丙辰詔宣太后崇寧陵禁內墳瘞遷徙者給葬直蠲復其家壬戌以太子詹事袁粲為尚書僕射秋八月壬寅以中領軍沈攸之行南兗州刺史率衆北伐九月戊午以皇后六宮以下雜衣千領金叉千枚賜北伐將士冬十月壬午改封新安王延年為始平王辛丑以鎮西大將軍西秦河二州刺史吐谷渾拾寅為征西大將軍十一月立建安王休仁第二子伯猷為江夏王是歲魏皇興元年四年春正月丙辰朔雨草于宮乙亥零陵王司馬勗薨二月乙巳左光祿大夫開府儀同三司王玄謨薨三月交州人李長仁據州叛祅賊攻廣州殺刺史羊希龍驤將軍陳伯紹討平之夏四月丙申改封東海王褘為廬江王山陽王休祐為晉平王秋九月戊辰詔定黥刖之制有司奏自今凡劫竊執官仗拒戰邏司攻剽亭寺及傷害吏人並監司將吏自為劫皆不限人數悉依舊制斬刑若遇赦黥及兩頰劫字斷去兩腳筋徙付交梁寧州五人以下止相逼奪者亦依黥作劫字斷去兩腳筋徙付遠州若遇赦原斷徒猶黥面依舊補冶士家口應及坐悉依舊結謫及上崩其例乃寢庚午上備法駕幸東宮冬十月癸酉朔日有蝕之發諸州兵北伐五年春正月癸亥親耕藉田乙丑魏剋青州執刺史沈文秀以歸二月丙申以廬江王褘為車騎將軍開府儀同三司南豫州刺史夏六月辛未立晉平王休祐子宣曜為南平王秋七月壬戌改輔國將軍為輔師將軍九月甲寅立長沙王纂子延之為始平王冬十月丁卯朔日有蝕之十一月丁未魏人來聘十二月庚申分荊益之五郡置三巴校尉六年春正月乙亥初制間二年一祭南郊間一年一祭明堂夏四月癸亥立皇子燮為晉熙王六月癸卯以王景文為尚書左僕射揚州刺史以袁粲為右僕射己未改臨賀郡為臨慶郡秋七月丙戌臨慶王智井薨九月戊寅立總明觀徵學士以充之置東觀祭酒訪舉各一人舉士二十人分為儒道文史陰陽五部學言陰陽者遂無其人冬十月辛卯立皇子贊為武陵王十二月癸巳以邊難未息制父母隔在異域者悉使婚宦七年春正月甲戌置散騎奏舉郎二月癸丑征西將軍荊州刺史巴陵王休若進號征西大將軍及征南大將軍江州刺史桂陽王休範並開府儀同三司甲寅南徐州刺史晉平王休祐薨三月辛酉魏人來聘夏五月戊午鴆司徒建安王休仁庚午以袁粲為尚書令褚彥回為右僕射丙戌追免晉平王休祐為庶人秋七月丁巳罷散騎奏舉郎乙丑江州刺史巴陵王休若賜死八月戊子以皇子躋繼江夏文獻王義恭庚寅帝疾間戊戌立皇子準為安成王是歲魏孝文帝延興元年泰豫元年春正月甲寅朔上以疾未痊故改元丁巳巨人跡見西池冰上夏四月己亥上疾大漸加江州刺史桂陽王休範位司空以劉勔為尚書右僕射蔡興宗為征西將軍開府儀同三司荊州刺史郢州刺史沈攸之進號安西將軍袁粲褚彥回劉勔蔡興宗沈攸之入閣被顧命是日上崩于景福殿時年三十四五月戊寅葬臨沂縣莫府山高寧陵帝好讀書愛文義在藩時撰江左以來文章志又續衛瓘所注論語二卷及即大位舊臣才學之士多蒙引進末年好鬼神多忌諱言語文書有禍敗凶喪疑似之言應回避者犯即加戮改騧馬字為馬邊瓜以騧字似禍故也嘗以南苑借張永云且給三百年期盡更請宣陽門謂之白門上以白門不祥諱之尚書右丞江謐嘗誤犯上變色曰白汝家門路太后停尸漆牀移出東宮上幸宮見之怒免中庶子以之坐死者數十人內外常慮犯觸人不自保移牀修壁先祭土神使文士為祝策如大祭饗阮佃夫楊運長王道隆皆擅威權言為詔敕郡守令長一缺十除內外混然官以賄命王阮家富於公室中書舍人胡母皓專權奏無不可時人語曰禾絹閉眼諾胡母大張橐禾絹謂上也及泰始泰豫之際左右失旨往往有刳剒斷截禁中懍懍若踐刀劍夜夢豫章太守劉愔反遣就郡殺之軍旅不息府藏空虛內外百官並斷祿奉在朝造官者皆市井傭販之子而又令小黃門於殿內埋錢以為私藏以蜜漬鱁一食數升噉臘肉常至二百臠奢費過度每所造制必為正御三十副御次副又各三十須一物輒造九十枚天下騷然民不堪命宋氏之業自此衰矣後廢帝諱昱字德融明帝長子也大明七年正月辛丑生於衛尉府帝母陳氏李道兒妾明帝納之故人呼帝為李氏子帝亦自稱李將軍明帝諸子在孕皆以周易筮之即以所得卦為小字故帝小字慧震泰始二年立為皇太子六年出東宮又制太子元正朝賀服袞冕九章衣明帝崩庚子太子即皇帝位大赦尚書令袁粲護軍將軍褚彥回共輔朝政班劍依舊入殿六月乙巳尊皇后曰皇太后立皇后江氏秋七月戊辰拜帝所生陳貴妃為皇太妃八月戊午中書監左光祿大夫開府儀同三司蔡興宗薨冬十一月己亥新除郢州刺史劉彥節為尚書左僕射元徽元年春正月戊寅大赦改元詔自元年以前徙放者並聽還本魏人來聘夏六月乙卯壽陽大水秋八月都下旱庚午陳留王曹銑薨九月丁亥立衡陽王嶷子伯玉為南平王冬十二月癸卯朔日有蝕之乙巳進桂陽王休範位太尉癸亥立前建安王世子伯融為始安縣王二年夏五月壬午江州刺史桂陽王休範舉兵反庚寅內外戒嚴中領軍劉勔右衛將軍蕭道成前鋒南討出屯新亭征北將軍張永屯白下前南兗州刺史沈懷明戍石頭衛將軍袁粲中軍將軍褚彥回入衛殿省壬辰賊奄至攻新亭壘道成拒擊大破之越騎校尉張苟兒斬休範賊黨杜黑蠡丁文豪分軍向朱雀航劉勔拒賊敗績死之右將軍王道隆奔走遇害張永潰于白下沈懷明自石頭奔散甲午車騎典籤茅恬開東府納賊賊入屯中堂羽林監陳顯達擊大破之丙申張苟兒等又破賊進平東府城梟禽羣賊丁酉大赦解嚴荊州刺史沈攸之南徐州刺史建平王景素郢州刺史晉熙王燮湘州刺史王僧虔雍州刺史張興世並舉義兵赴建鄴六月癸卯晉熙王燮遣軍剋尋陽江州平壬戌改輔師將軍還為輔國秋七月庚辰立皇弟友為邵陵王乙酉南徐州刺史建平王景素進號征北將軍開府儀同三司九月丁酉以袁粲為中書監領司徒加護軍將軍褚彥回為尚書令冬十一月丙戌帝加元服十二月癸亥立皇弟躋為江夏王贊為武陵王三年春三月己巳都下大水夏六月魏人來聘秋七月庚戌以袁粲為尚書令九月丙辰征西大將軍河南王吐谷渾拾寅進號車騎大將軍四年夏六月乙亥加蕭道成尚書左僕射秋七月戊子建平王景素據京城反己丑內外纂嚴遣驍騎將軍任農夫冠軍將軍黃回北討蕭道成總統衆軍始安王伯融都鄉侯伯猷並賜死乙未剋京城斬景素同逆皆伏誅八月丁卯立皇弟翽為南陽王嵩為新興王禧為始建王九月戊子驍騎將軍高道慶有罪賜死己丑車騎將軍揚州刺史安成王準進號驃騎大將軍開府儀同三司冬十月辛酉以王僧虔為尚書右僕射五年夏四月甲戌豫州刺史阮佃夫步兵校尉申伯宗朱幼謀廢立皆伏誅五月地震六月甲戌誅司徒左長史沈勃散騎常侍杜幼文游擊將軍孫超之長水校尉杜叔文七月戊子夜帝遇弒於仁壽殿時年十五己丑皇太后令貶帝為蒼梧郡王葬丹陽秣陵縣郊壇西初帝之生夕明帝夢人乘馬馬無頭及後足有人曰太子也及在東宮五六歲能緣漆帳竿去地丈餘如此者半食久乃下漸長喜怒乖節左右失旨者手加撲打徒跣蹲踞及嗣位內畏太后外憚大臣猶未得肆志自加元服三年好出入單將左右或十里二十里或入市里遇慢罵則悅而受焉四年無日不出與左右解僧智張五兒夜出開承明門夕去晨反晨出暮歸從者並執鋌矛行人男女及犬馬牛驢逢無免者人間擾懼晝日不開門道無行人嘗著小袴不服衣冠有白棓數十各有名號鉗鑿錐鋸不離左右為擊腦槌陰剖心之誅日有數十見臥尸流血然後為樂左右人見有嚬眉者帝令其正立以矛刺洞之曜靈殿上養驢數十頭所自乘馬養於御牀側與右衛翼輦營女子私通每從之遊持數千錢為酒肉之費出逢婚姻葬送輒與挽車小兒羣聚飲酒以為歡適阮佃夫腹心人張羊為佃夫委信佃夫敗叛走復捕得自於承明門以車轢殺之殺杜延載杜幼文躬運矛鋌手自臠割察孫超有蒜氣剖腹視之執楯馳馬自往刺杜叔文於玄武北湖孝武帝二十八子明帝殺其十六餘皆帝殺之吳興沈勃多寶貨往劫之揮刀獨前左右未至勃時居喪在廬帝望見之便投鋌不中勃知不免手搏帝耳唾罵之曰汝罪踰桀紂屠戮無日遂見害帝自臠割制露車一乘施乘以出入從數十人羽儀追之不相及又各慮禍亦不敢追但整部伍別在一處瞻望而已凡諸鄙事過目則能鍛銀裁衣作帽莫不精絶未嘗吹箎執管便韻天性好殺一日無事輒慘慘不樂內外憂惶夕不及旦領軍將軍蕭道成與直閣將軍王敬則謀之七月戊子帝微行出北湖單馬先走羽儀不及左右張五兒馬墜湖帝怒自馳騎刺馬屠割之與左右作羌胡伎為樂又於蠻岡賭跳因乘露車無復鹵簿往青園尼寺晚至新安寺偷狗就曇度道人煮之飲酒楊玉夫常得意忽然見憎遇輒切齒曰明日當殺小子取肝肺是夜七夕令玉夫伺織女度報己因與內人穿針訖大醉臥於仁壽殿東阿檳幄中帝出入無禁王敬則先結玉夫陳奉伯楊萬年等合二十五人其夕玉夫候帝眠熟至乙夜與萬年同入檳幄內取千牛刀殺之順皇帝諱準字仲謨小字知觀明帝第三子也泰始五年七月癸丑生七年封安成王帝姿貌端華眉目如畫見者以為神人廢帝即位加揚州刺史元徽二年加都督揚南豫二州諸軍事四年進號驃騎大將軍及廢帝殞蕭道成奉太后令迎王入居朝堂升明元年秋七月壬辰皇帝即位大赦改元徽五年為升明元年甲午蕭道成出鎮東城輔政荊州刺史沈攸之進號車騎大將軍蕭道成司空録尚書事以袁粲為中書監司徒以褚彥回為衛將軍劉彥節為尚書令加中軍將軍辛丑以王僧虔為尚書僕射癸卯車駕謁太廟八月癸亥司徒袁粲鎮石頭戊辰崇拜帝所生陳昭華為皇太妃庚午以蕭道成為驃騎大將軍開府儀同三司録尚書如故九月己酉廬陵王皓薨十二月丁巳荊州刺史沈攸之舉兵不從執政丁卯蕭道成入守朝堂侍中蕭嶷鎮東府戊辰中外纂嚴壬申司徒袁粲據石頭謀誅道成不果旋見覆滅乙亥以王僧虔為左僕射王延之為右僕射吳郡太守劉遐據郡不從執政令張瓌攻斬之閏月辛巳屯騎校尉王宜興二於執政見誅癸巳沈攸之攻郢城前軍長史柳世隆固守己亥中外戒嚴假蕭道成黃鉞乙巳道成出頓新亭是歲魏太和元年二年春正月丁卯沈攸之敗己巳華容縣人斬攸之首送之辛未雍州刺史張敬兒剋江陵荊州平丙子解嚴以柳世隆為尚書右僕射蕭道成旋鎮東府二月庚辰以王僧虔為尚書令王延之為左僕射癸未蕭道成加授太尉以褚彥回為中書監司空丙戌撫軍將軍揚州刺史晉熙王燮進號中軍將軍三月己酉朔日有蝕之夏四月南兗州刺史黃回二于執政賜死五月戊午以倭國王武為安東大將軍六月丁酉以輔國將軍楊文弘為北秦州刺史封武都王秋九月乙巳朔日有蝕之丙午加太尉蕭道成黃鉞都督中外諸軍事太傅領揚州牧賜殊禮以揚州刺史晉熙王燮為司徒冬十月壬寅立皇后謝氏十一月立故武昌太守劉琨息頒為南豐縣王癸亥誅臨澧侯劉晃甲子改封南陽王翽為隨郡王十二月丙戌皇后見于太廟三年春正月辛亥領軍將軍蕭賾加尚書右僕射進號中軍大將軍開府儀同三司二月丙子南豫州刺史邵陵王友薨丙申地震建陽門三月癸卯朔日有蝕之甲辰加蕭道成相國總百揆封十郡為齊公備九錫之禮庚戌誅臨川王綽夏四月壬申進齊公蕭道成爵為王壬午安西將軍武陵王贊薨辛卯帝禪位於齊壬辰遜于東邸是日王敬則以兵陳于殿庭帝猶居內聞之逃于佛蓋下太后懼自帥閹豎索扶幸板輿黃門或促之帝怒抽刀投之中項而殞帝既出宮人行哭俱遷備羽儀乘畫輪車出東掖門封帝為汝陰王居丹徒宮齊兵衛之建元元年五月己未帝聞外有馳馬者懼亂作監人殺王而以疾赴齊人德之賞之以邑六月乙酉葬于遂寧陵諡曰順帝宋之王侯無少長皆幽死矣論曰文帝負扆南面實有人君之美經國之義雖弘而隆家之道不足彭城照不窺古本無卓爾之資徒見昆弟之義深未識君臣之禮異以此家情行之國道主忌而猶犯恩離而未悟致以陵逼之愆遂成滅親之禍開端樹隙垂之後人明帝因猜忍之情據已行之典翦落洪枝不待慮既而本根莫庇幼主孤立下無磐石之託上有纍卵之危方復藏璽懷紱魚服忘反危冠短制匹馬孤征以至覆亡理固然矣神器以勢弱傾移靈命隨樂推回改斯蓋履霜有漸夫豈一夕何止區區汝陰揖讓而已
