body:
  text: 南史卷九陳本紀上第九陳高祖武皇帝諱霸先字興國小字法生吳興長城下若里人姓陳氏其本甚微自云漢太丘長實之後也實玄孫晉太尉準準生匡匡生達永嘉中南遷為丞相掾太子洗馬出為長城令悅其山水遂家焉嘗謂所親曰此地山川秀麗當有王者興焉二百年後我子孫必鍾斯運達生康復為丞相掾咸和中土斷故為長城人康生盱眙太守英英生尚書郎公弼公弼生步兵校尉鼎鼎生散騎侍郎高高生懷安令詠詠生安成太守猛猛生太常卿道巨道巨生皇考文讚帝以梁天監二年癸未歲生少俶儻有大志長於謀略意氣雄傑不事生産及長涉獵史籍好讀兵書明緯候孤虛遁甲之術多武藝明達果斷為當時推服身長七尺五寸日角龍顏垂手過膝嘗游義興館於許氏夢天開數丈有四人朱衣捧日而至納之帝口及覺腹內猶熱帝心獨喜初仕鄉為里司後至建鄴為油庫吏徙為新喻侯蕭映傳教勤於其事為映所賞及映為吳興太守甚重帝謂僚佐曰此人將來遠大必勝於我及映為廣州帝為中直兵參軍隨之鎮映令帝招集士馬先是武林侯蕭咨為交州刺史以嚴刻失和土人李賁連結數州豪傑同時反臺遣高州刺史孫冏新州刺史盧子雄將兵擊賁冏等不時進皆於廣州伏誅子雄弟子略與冏子姪及其主帥杜天合杜僧明共舉兵執南江督護沈顗進寇廣州晝夜苦攻州中震恐帝率精兵救之賊衆大潰僧明後有功業遂降梁武帝深歎異焉授直閣將軍封新安縣子仍遣圖帝貌而觀之其年冬蕭映卒明年帝送喪還至大庾嶺會有詔以帝為交州司馬與刺史楊壜南討帝益招勇敢器械精利壜委帝經略時蕭勃為定州刺史於西江相會勃知軍士憚遠役因詭說留壜壜集諸將問計帝曰交址叛換罪由宗室節下奉辭伐罪故當死生以之於是鼓行而進軍至交州壜推帝為前鋒所向摧陷賁竄入屈獠洞中屈獠斬賁傳首建鄴是歲太清元年也賁兄天寶遁入九真與劫帥李紹隆收餘兵殺德州刺史陳文戒進圍愛州帝討平之除西江督護高要太守督七郡諸軍事二年冬侯景寇逼帝將赴援廣州刺史元景仲陰將圖帝帝知之與成州刺史王懷明等集兵於南海馳檄以討景仲景仲縊於閣下帝迎蕭勃鎮廣州時臨賀內史歐陽頠監衡州蘭裕蘭京禮扇誘始興等十郡共攻頠頠請援於勃勃令帝救之悉禽裕等仍監始興郡事帝遣杜僧明胡穎將二千人頓于嶺上並厚結始興豪傑同謀義舉侯安都張偲等率衆來附蕭勃聞之遣鍾休悅說停帝帝泣謂休悅曰君辱臣死誰敢愛命僕行計決矣時蔡路養起兵據南康勃遣腹心談世遠為曲江令與路養相結同遏義軍大寶元年正月帝發始興次大庾嶺大破路養軍進頓南康湘東王繹承制授帝交州刺史改封南野縣伯於是修理崎頭古城徙居之劉惠騫等望見有紫氣冒城上遠近驚異故惠騫等深自結於帝尋改封長城縣侯南江州刺史時寧都人劉藹等資高州刺史李遷仕舟艦兵仗將襲南康帝遣杜僧明等據白口禦之二年僧明禽遷仕送南康斬之承制授帝江州刺史帝發南康贛石舊有二十四灘灘多巨石行旅以為難帝之發水暴起數丈三百里間巨石皆沒進軍頓西昌有龍見水濱高五丈五采鮮曜軍民觀者數萬人帝又嘗獨坐胡牀於閣下忽有神光滿閣廊廡之間並得相見趙知禮侍側怪而問帝帝笑不答時承制遣征東將軍王僧辨督衆軍討侯景次盆城帝率杜僧明等合三萬人將會焉時西軍乏食帝先貯軍糧五十萬石至是分三十萬石以資之仍頓巴丘會侯景廢簡文立豫章嗣王棟帝遣兼長史沈袞奉表於江陵勸進承制授帝東揚州刺史領會稽太守三年帝帥師發自豫章二月次桑落洲時僧辨已發盆城會帝于白茅灣乃登岸結壇刑牲盟約進次大雷軍人杜稜夢雷池君周何神自稱征討大將軍乘朱航陳甲仗稱下征侯景須臾便還云已殺景竟三月帝與諸軍進剋姑孰仍次蔡洲侯景登石頭城望官軍之盛不悅曰一把子人何足可打密謂左右曰此軍上有紫氣不易可當乃以翅貯石沈塞淮口緣淮作城自石頭迄青溪十餘里中樓雉相接僧辨遣杜崱問計於帝帝以諸將不敢當鋒請先往立柵即於石頭西橫壠築柵衆軍次連八城直出東北賊恐西州路斷亦於東北果林作五城以遏大路帝曰善用兵者如常山之蛇使救首救尾困而無暇今我師既衆賊徒甚寡應分賊兵力以強制弱乃命諸將分處置兵帝與王琳杜龕等悉力乘之景衆大潰僧辨啓命帝鎮京口五月齊遣將辛術圍嚴超達于秦郡帝命徐度領兵助其固守齊衆起土山穿地道攻之甚急帝乃自率萬人解其圍振旅南歸承制授帝征北大將軍開府儀同三司南徐州刺史進封長城縣公及王僧辨征陸納於湘州承制命帝代鎮揚州承聖二年湘州平帝旋鎮京口三年三月進帝位司空及魏平江陵帝與王僧辨等進啓請晉安王以太宰承制十二月晉安王至自尋陽入居朝堂給帝班劍二十人四年五月齊送貞陽侯明還主社稷王僧辨納之明即位改元天成以晉安王為皇太子初齊之納貞陽也帝固爭之以為不可不見從帝居常憤歎曰嗣主高祖之孫元皇之子竟有何辜坐致廢黜假立非次此情可知乃密具袍數千領及錦綵金銀以為賞賜之資九月壬寅帝召徐度侯安都周文育仍部列將士水陸俱進夜發南徐州討王僧辨甲辰帝至石頭前遣勇士自城北踰入時僧辨方視事聞外白有兵遽走帝大兵尋至因風縱火僧辨就禽是夜縊之及其子頠於是廢貞陽侯而奉晉安王即位改承聖四年為紹泰元年壬子詔授帝侍中大都督中外諸軍事車騎將軍揚南徐二州刺史持節司空班劍鼓吹並如故仍詔甲仗百人出入殿省震州刺史杜龕據吳興與義興太守韋載舉兵逆命辛未帝表自東討留高州刺史侯安都石州刺史杜稜宿衛臺省甲戌軍至義興秦州刺史徐嗣徽據城入齊又要南豫州刺史任約舉兵應龕齊人資其兵食嗣徽乘虛奄至闕下侯安都出戰嗣徽等退據石頭丁丑載及龕從弟北叟來降帝撫而釋之仍以載兄鼎知郡事以嗣徽寇逼卷甲還都命周文育進討杜龕十一月己卯齊遣兵五千度據姑孰又遣安州刺史翟子崇楚州刺史劉士榮淮州刺史柳達摩領兵萬人於胡墅度米粟三萬石馬千匹入石頭帝乃遣侯安都領水軍夜襲胡墅燒齊船周鐵武率舟師斷齊運輸帝領鐵騎自西明門襲之齊人大潰嗣徽留達摩等守城自率親屬腹心往南州采石以迎齊援先是太白自十一月丙戌不見十二月乙卯出于東方丙辰帝盡命衆軍分部甲卒對冶城立航度兵攻其水南二柵柳達摩等度淮置陳帝督兵疾戰縱火燒柵煙塵漲天齊人大潰盡收其船艦是日嗣徽約等領齊兵還據石頭帝遣侯安都領水軍襲破之嗣徽等單舸脫走丁巳拔石頭南岸柵移度北岸起柵以絶其汲路又堙塞東門故城中諸井齊所據城中無水水一合貿米一升一升米貿絹一匹或炒米食之達摩謂其衆曰頃在北童謠云石頭搗兩襠搗青復搗黃侯景服青已倒於此今吾徒衣黃豈謠言驗邪庚申達摩遣侯子欽劉士榮等請和帝許之乃於城外盟約其將士恣其南北辛酉帝出石頭南門陳兵送齊人歸北者及至齊人殺之壬戌齊和州長史烏丸遠自南州奔還歷陽江寧令陳嗣黃門侍郎曹朗據姑孰不從帝命侯安都徐度等討平之聚其首為京觀是月杜龕以城降二年正月癸未誅龕其弟翕從弟北叟司馬沈孝敦並賜死三月戊戌齊遣水軍儀同蕭軌庫狄伏連堯難宗東方老侍中裴英起東廣州刺史獨狐辟惡洛州刺史李希光并任約徐嗣徽王僧愔等衆十萬出柵口向梁山帳內蕩主黃叢逆擊敗之燒其前軍船艦齊頓軍保蕪湖五月丙申齊兵至秣陵故城己亥帝率宗室王侯及朝臣於大司馬門外白虎闕下刑牲告天以齊人背約發言慷慨涕泗交流士卒觀者益奮辛丑齊軍於秣陵故城跨淮立橋柵引度兵馬癸卯自方山進及兒塘游騎至臺都下震駭帝潛以精卒三千配沈泰度江襲齊行臺趙彥深於瓜步獲其舟粟六月甲辰齊兵潛至鍾山龍尾丁未進至莫府山帝遣錢明領水軍出江乘要擊齊人糧運盡獲之齊軍大餒殺馬驢而食之壬子齊軍至玄武湖西北莫府山南將據北郊壇衆軍自覆舟東移頓郊壇北與齊人相對其夜大雨震電暴風拔木平地水丈餘齊軍晝夜坐立泥中縣鬲以爨足指皆爛而臺中及潮溝北水退路燥官軍每得番易甲寅少霽是時食盡調市人餽軍皆是麥屑為飯以荷葉裹而分給間以麥兵士皆困會文帝遣送米三千石鴨千頭帝即炊米鴨誓申一戰士及防身計糧數臠人人裹飯以鴨肉帝命衆軍蓐食攻之齊軍大潰執嗣徽及其弟嗣宗斬之以徇虜蕭軌東方老王敬寶李希光裴英起王僧智等將帥四十六人其軍士得竄至江者縳筏以濟中江而溺流尸至京口者彌岸惟任約王僧愔獲免先是童謠云虜萬夫入五湖城南酒家使虜奴自晉宋以後經絓在魏境江淮以北南人皆謂為虜于時以賞俘貿酒者一人裁得一醉丁巳衆軍出南州燒賊舟己未斬劉歸義徐嗣産傅野猪于建康市是日解嚴庚申誅蕭軌東方老王敬寶李希光裴英起等太平元年九月壬寅帝進位丞相録尚書事鎮衛大將軍揚州牧進封義興郡公庚申追贈皇考侍中光祿大夫封義興郡公諡曰恭十月甲戌梁帝敕丞相自今問訊可施別榻以近扆坐二年正月壬寅詔加帝班劍十人並前為三十丁未詔贈皇兄道談南兗州刺史長城縣公諡曰昭烈皇弟休先侍中南徐州刺史武康縣侯諡曰忠壯甲寅遣兼侍中謁者僕射陸繕策拜長城縣夫人章氏為義興國夫人丁卯詔贈皇祖侍中太常卿諡曰孝追封皇祖妣許氏吳郡嘉興縣君諡曰敬皇妣張氏義興國太夫人諡曰宣二月庚午蕭勃舉兵自廣州度嶺頓南康遣其將歐陽頠傅泰及其子孜為前軍至豫章分屯要險南江州刺史余孝頃起兵應勃帝命周文育侯安都率衆討平之八月甲午帝進位太傅加黃鉞劍履上殿入朝不趨贊拜不名丙申加前後部羽葆鼓吹是時湘州刺史王琳擁兵不應命遣周文育侯安都率衆討之九月辛丑梁帝進帝位相國總百揆封十郡為陳公備九錫之禮加璽紱遠游冠緑綟綬位在諸侯王上策曰大哉乾元資日月以貞觀至哉坤元憑山川以載物故惟天為大陟配者欽明惟王建國翼輔者齊聖是以文武之佐磻溪蘊其玉璜堯舜之臣榮河鏤其金板況乎體得一之鴻姿寧陽九之危厄拯橫流於碣石撲燎火於崑岡驅馭於韋彭跨蹍於齊晉神功行而靡用聖道運而無名者乎今將授公典策其敬聽朕命日者昊天不弔鍾亂于我國家網漏吞舟強胡內贔茫茫宇宙惵惵黎元方趾圓顱萬不遺一太清否亢橋山之痛以深大寶屯如平陽之禍相繼上宰膺運康救黔黎鞠旅於溟池之南揚旌於桂嶺之北縣三光於已墜謐四海於羣飛光啓中興蕩寧上國此則公之大造於皇家者也既而天未悔禍夷醜荐臻南夏崩騰西京蕩覆冢司昏撓旁引寇讎既見貶於桐宮方謀危於漢閣皇運已殆何殊贅旒中國搖然非徒如線公赫然投袂匡救本朝復莒齊都平戎王室朕所以還膺寶歷重履宸居挹建武之風猷歌宣王之雅頌此又公之再造於皇家者也公應務之初登庸惟始孫盧肇釁越貊為災番部阽危勢將淪殄公赤旗所指祅壘洞開白羽才撝凶徒紛潰此又公之功也大同之末邊政不修李賁狂迷竊我交愛公英雅算電掃風行馳御樓船直跨滄海三山獠洞八角蠻陬逖矣水寓之鄉悠哉火山之國馬援之所不屆陶璜之所未開莫不懼我王靈爭朝邊候歸賝天府獻狀鴻臚此又公之功也自寇虜陵江宮闈幽辱而番禺連率本自諸夷言得其朋是懷同惡公仗此忠誠乘機勦定執沛令而釁鼓平新野而據鞍此又公之功也世道初艱方隅多難公以國盜邊警知無不為恤是同盟誅其醜類南土黔黎重保蘇息此又公之功也長驅嶺嶠夢想京畿緣道酋豪遞為榛梗路養渠帥全據大都蓄聚逋逃方謀阻亂公龍驤虎步嘯吒風雲山靡堅城野無強陳清祅氛於贛石滅沴氣於雩都此又公之功也遷仕凶慝屯據大臯乞活類馬騰之軍流人多杜韜之衆公坐揮三略遙制六奇義勇同心貔貅騁力雷奔電擊谷靜山空列郡無犬吠之驚叢祠罷狐鳴之盜此又公之功也王師討虜次屆淪波兵乏兼儲士有飢色公回麾彭蠡積穀巴丘億庾之詠斯豐壺漿之氓是衆故使三軍勇鋭百戰無前承此兵糧遂殄凶逆此又公之功也盆壘猜攜用淹戎略公志惟同奬師克在和屈禮交盟神祇感咽故能使舟師並路遠邇朋心此又公之功也姑孰襟要崤函所憑寇虜據其關梁大盜負其扃鐍公一校才撝三雄並奮左賢右角沙潰土崩鄂坂之隘斯開夷庚之道無塞此又公之功也義軍大衆俱集帝京逆豎凶徒猶屯皇邑公回茲地軸抗此天羅曾不崇朝俾無遺噍此又公之功也內難初靜諸侯出關外郡傳烽鮮卑犯塞公舟師步甲亘野橫江殲厥羣氐遂殫封豕此又公之功也公克黜禍難劬勞皇室而孫寧之黨翻啓狄人伊洛之間咸為虜戍朝暗戎塵夜喧胡鼓公三籌既畫八陳斯張裁舉靈鉟亦抽金僕咸俘醜類悉反高墉此又公之功也任約叛渙梟聲不悛戎羯貪婪狼心無改公左甄右落箕張翼舒掃是欃槍驅其獫狁投秦坑而盡沸噎濉水而不流此又公之功也一相居中自折彝鼎五湖小守妄懷同惡公夙駕兼道衣製杖戎玉斧將揮金鉦且戒祅酋震懾遽請灰釘此又公之功也賊龕凶橫陵虐具區阻兵安忍憑災怙亂公雖宗居汝潁世寓東南眷言桑梓公私憤切戮此大憝如烹小鮮此又公之功也同姓有扈頑凶不賓憑藉宗盟圖危社稷公論兵於廟堂之上決勝於尊俎之間寇賈樊滕浮江下瀨一朝翦撲無待甸師此又公之功也豫章祅寇依憑山澤繕甲完聚多歷歲時結從連橫爰洎交廣呂嘉既獲吳濞已鏦命我還師征其不恪連營盡拔僞黨斯禽此又公之功也自八紘九野瓜剖豆分竊帝偷王連州比縣公武靈已暢文德又宣折簡馳書風猷斯遠此又公之功也京師禍亂亟積寒暄雙闕低昂九門寥豁公求衣昧旦昃食高舂興構宮闈具瞻遐邇郊庠宗稷之典六符十等之章還聞泰始之風流重覩永平之遺事此又公之功也公有濟天下之勳重之以明德凝神體道合德符天用百姓以為心隨萬機而成務上德不德無為以為夏長春生顯仁藏用功成化洽樂奏咸雲安上御人禮兼文質是以天無蘊寶地有呈祥既景煥於圖書方葳蕤於史牒高勳踰於象緯積德冠於嵩華固無得而稱者矣朕又聞之前王宰世茂賞尊賢式樹藩長總征羣伯二南崇絶四履遐曠泱泱表海祚土維齊巖巖泰山俾侯于魯況復經營宇宙寧惟斷鼇足之功弘濟蒼生非直鑿龍門之險而疇庸報德寂爾無聞朕所以垂拱當寧載懷慚悸者也今授公相國以南豫州之陳留南丹陽宣城揚州之吳興東陽新安新寧南徐州之義興江州之鄱陽臨川十郡封公為陳公錫茲青土苴以白茅爰定爾邦用建冢社昔旦奭分陝俱為保師晉鄭諸侯咸作卿士兼其內外禮實攸宜今命使持節兼太尉王通授相國印綬陳公璽紱使持節兼司空王瑒授陳公茅土金虎符第一至第五左竹使符第一至第十左相國秩踰三鉉任總百司位絶朝班禮由事革以相國總百揆除録尚書之號上所假節侍中貂蟬中書監印章中外都督太傅印綬義興公印策其鎮衛大將軍揚州牧如故又加公九錫其敬聽後命以公禮為楨幹律等銜策四維皆舉八柄有章是用錫公大輅戎輅各一玄牡二駟以公賤寶崇穀疏爵待農室富京坻人知榮辱是用錫公袞冕之服赤舄副焉以公調理陰陽燮諧風雅三靈允降萬國同和是用錫公軒縣之樂六佾之以公宣導王猷弘闡風教光景所照鞮象必通是用錫公朱戶以居以公抑揚清濁褒德進賢髦士盈朝幽人虛谷是用錫公納陛以登以公嶷然廊廟為世鎔範折衝四表臨御八荒是用錫公虎賁之士三百人以公軌茲明罰期在刑厝象恭無赦干紀必誅是用錫公斧鉞各一以公英猷遠量跨厲嵩溟包一車書括囊寰宇是用錫公彤弓一彤矢百盧弓十盧矢千以公天經地義貫徹幽明春露秋霜允供粢盛是用錫公秬鬯一卣圭瓚副焉陳國置丞相以下一遵舊式往欽哉其恭循朕命克相皇天弘建邦家允興鴻業以光我高祖之休命十月戊辰又進帝爵為王以揚州之會稽臨海永嘉建安南徐州之晉陵信安江州之尋陽豫章安成廬陵並前為二十郡益封陳國其相國揚州牧鎮衛大將軍並如故又命陳王冕十有二旒建天子旌旗出警入蹕乘金根車駕六馬備五時副車置旄頭雲罕樂八佾設鍾虡宮縣王妃王子王女爵命之號陳臺百官一依舊典辛未梁帝禪位于陳策曰咨爾陳王惟昔上古厥初生人驪連栗陸之前容成大庭之世杳冥慌忽故靡得而詳焉自羲農軒昊之君陶唐有虞之主或垂衣而御四海或無為而子萬姓居之如馭朽索去之如脫弊屣裁遇許由便能捨帝暫逢善卷即以讓王故知玄扈琁璣非關尊貴金根玉輅示表君臨及南觀河渚東刻璧菁華既竭耄勤已倦則抗首而笑惟賢是與耳我然作歌簡能斯授遺風餘烈昭晰圖書漢魏因循是為故實宋齊授受又弘斯義我高祖應期撫運握樞御宇三后重光祖宗齊聖及時屬陽九封豕荐食西都失馭夷狄交侵乃暨天成輕弄龜鼎惵惵黔首若崩厥角徽徽皇極將甚綴旒惟王乃聖乃神欽明文思二儀並運四時合序天錫智勇人挺雄傑珠庭日角龍行虎步爰初投袂曰乃勤王電掃番禺雲撤彭蠡翦其元惡定我京畿及王賀帝弘貿茲冠履既行伊霍用保冲人震澤稽陰並懷叛逆獯羯醜虜三亂皇都裁命偏師二邦自殄薄伐獫狁六戎盡殪嶺南叛換湘郢連結賊帥既禽凶渠傳首用能百揆時序四門允穆無思不服無遠不屆上達穹昊下漏深泉蛟魚並見謳歌攸屬況乎長彗橫天已徵布新之兆璧日斯既實表更姓之符七百無常期皇王非一族昔木德既季而傳祚于我有梁天之歷數允集明哲式遵前典廣詢羣議王公卿尹莫不攸屬敬從人祇之願授帝位于爾躬四海困窮天祿永終王其允執厥中軌儀前式以副溥天之望禋郊祀帝時膺大禮永固洪業豈不盛與又命璽書遣兼太保尚書左僕射王通兼太尉司徒左長史王瑒奉皇帝璽紱受終之禮一依唐虞故事是日梁帝遜于別宮帝謙讓再三羣臣固請乃許之永定元年冬十月乙亥皇帝即位于南郊柴燎告天曰皇帝臣霸先敢用玄牡昭告于皇皇后帝梁氏以圮剝荐臻歷運有極欽若天應以命于霸先夫肇有黎蒸乃樹司牧選賢與能未常厥姓有梁末運仍葉遘屯獯醜憑陵久移神器承聖在外非能祀夏天未悔禍復罹寇逆嫡嗣廢黜宗枝僭詐天地板蕩紀綱泯絶霸先爰初投袂大拯橫流重舉義兵實戡多難廢王立帝實有厥功安國定社用盡其力是謂小康方期大道既而煙雲表色日月呈祥除舊布新既彰玄象遷虞事夏且協謳歌九域八荒同布衷款百神羣祀皆有誠願梁帝高謝萬邦授以大寶霸先自惟菲薄讓德不嗣至于再三辭弗獲許僉以百姓須主萬機難曠皇靈眷命非可謙拒畏天之威用膺嘉祚永言夙志能無慚德敬簡元辰升壇受禪告類上帝用答氓心永保于我有陳惟明靈尚饗先是氛霧雨雪晝夜晦冥至是日景氣清晏禮畢輿駕還宮臨太極前殿大赦改元賜百姓爵二級文武二等魚衆寡孤獨不能自存者人穀五斛逋租宿責皆勿復收有犯鄉論清議贓樜淫盜者皆洗除先注與之更始其長徒敕繫特皆原之亡官失爵禁錮奪勞一依舊典又詔以江陰郡奉梁主為江陰王行梁正朔車旗服色一依前準梁皇太后為江陰國太妃皇后為江陰國妃又詔百司各依位攝職丙子幸鍾山祭蔣帝廟戊寅幸華林園覽辭訟臨赦囚徒己卯分遣大使宣勞四方庚辰詔出佛牙於杜姥宅集四部設無遮大會辛巳追尊皇考曰景皇帝廟號太祖皇妣董太夫人曰安皇后前夫人錢氏為昭皇后世子克為孝懷太子立夫人章氏為皇后癸未尊景帝陵曰瑞陵昭皇后陵曰嘉陵依梁初園陵故事立刪定郎刊定律令戊子遷景皇帝神主祔于太廟是月西討都督周文育侯安都於郢州敗績沒于王琳十一月丙申封皇兄子長城縣侯蒨為臨川郡王頊襲封始興郡王皇弟子曇朗襲封南康郡王庚申都下火十二月庚辰皇后謁太廟是歲周閔帝元年及九月冢宰宇文護廢閔帝而奉明帝又為明帝元年二年春正月乙未以車騎將軍開府儀同三司侯瑱為司空辛丑祀南郊大赦甲寅遣中書舍人韋鼎策吳興楚王神為帝戊午祀明堂二月壬申南豫州刺史沈泰奔齊辛卯詔司空侯瑱總督水陸衆軍以禦齊三月王琳立梁永嘉王蕭莊以奉梁後即位于郢州夏四月甲子祀太廟乙丑江陰王殂陳志也追諡梁敬帝詔太宰弔祭司空監護喪事以梁武林侯蕭咨子季卿嗣為江陰王戊辰重雲殿東鴟尾有紫煙屬天五月乙未都下地震壬寅立梁邵陵攜王廟室祭以太牢辛酉帝幸大莊嚴寺捨身壬戌羣臣表請還宮六月己巳詔司空侯填領軍將軍徐度討王琳初侯景之平也太極殿被焚承聖中議欲營之獨闕一柱秋七月有樟木大十八圍長四丈五尺流泊陶家後渚監軍鄒子度以聞詔中書令沈衆兼起部尚書構太極殿八月周文育侯安都等於王琳所逃歸自劾廷尉即日引見宥之並復本官丁亥加江州刺史周迪平南將軍開府儀同三司冬十月庚午遣鎮南將軍周文育都督衆軍出豫章討余孝勱乙亥幸莊嚴寺發金光明經題丁酉加高州刺史黃法平南將軍開府儀同三司十二月甲子幸大莊嚴寺設無礙大會捨乘輿法物羣臣備法駕奉迎即日還宮丙戌加北江州刺史熊曇朗平西將軍開府儀同三司三年春正月丁酉鎮南將軍廣州刺史歐陽頠即本號開府儀同三司是夜大雪及旦太極殿前有龍跡見甲子廣州言仙人見于羅浮山寺小石樓二月辛酉加平西將軍桂州刺史淳于量鎮西大將軍開府儀同三司夏閏四月甲午詔依前代置西省學士兼取伎術士是時久不雨丙午幸鍾山祭蔣帝廟是日降雨迄于月晦五月丙辰朔日有蝕之有司奏舊儀帝御前殿服朱紗袍通天冠詔曰此乃前代承用意有未同合朔仰助太陽宜備袞冕之服自今永可為準丙子扶南國遣使朝貢乙酉北江州刺史熊曇朗殺都督周文育舉兵反王琳遣其將常衆愛曹慶率兵援余孝勱六月戊子儀同侯安都敗衆愛等於左里獲琳從弟襲主帥羊暕等四十餘人衆愛遁走庚寅廬山人斬之傳首建鄴甲午衆軍凱歸丁酉帝不豫遣兼太宰尚書右僕射王通以疾告太廟兼太宰中書令謝哲告太社南北郊辛丑帝小瘳故司空周文育之柩至自建昌壬寅帝素服哭于朝堂哀甚癸卯上臨訊獄訟是夜熒惑在天尊上疾甚丙午帝崩于璿璣殿時年五十七遺詔追臨川王蒨入纘大業甲寅殯于太極殿西階八月甲午羣臣上諡曰武皇帝廟號高祖丙申葬萬安陵帝雄武多英略性甚仁愛及居阿衡崇寬簡雅尚儉素常膳不過數品私饗曲宴皆瓦器盤肴核庶羞裁令充足不為虛費初平侯景及立敬帝子女玉帛皆班將士其充闈房者衣不重采飾無金翠聲樂不列於前踐阼之後彌厲恭儉故能隆功茂德光于江左云世祖文皇帝諱蒨字子華始興昭烈王之長子也少敏有識量美容儀留意經史武帝甚愛之常稱吾家英秀梁太清初帝夢兩日鬬一大一小大者光滅墜地色正黃其大如斗帝三分取一懷之侯景之亂避地臨安縣郭文舉舊宅及武帝舉兵南下景遣吳興太守信都遵收帝及衡陽獻王出都帝乃密袖小刀候見景欲圖之及至以付郎中王翻幽守故其事不遂武帝圍石頭景欲加害者數矣會景敗乃得出起家吳興太守武帝之討王僧辨也先召帝與謀時僧辨壻杜龕據吳興兵衆甚盛武帝密令帝還長城立柵備之龕遣將杜泰乘虛掩至將士相視失色帝言笑自若部分益明於是衆心乃定及武帝遣周文育討龕帝遣將軍劉澄蔣元舉攻下龕拜會稽太守武帝受禪立為臨川王夢梁武帝以寶刀授己周文育侯安都之敗於沌口武帝詔帝入總軍政尋命率兵城南皖永定三年六月丙午武帝崩皇后稱遺詔徵帝入纂皇統甲寅至自南皖入居中書省皇后令帝嗣膺寶籙帝辭讓至于再三公卿固請其日即皇帝位於太極前殿大赦詔州郡悉停奔赴秋七月丙辰尊皇后為皇太后辛酉以司空侯瑱為太尉以南豫州刺史侯安都為司空以南徐州刺史徐度為侍中中撫軍將軍開府儀同三司乙丑重雲殿災八月庚戌立皇子伯茂為始興王奉昭烈王後徙封始興嗣王頊為安成王九月辛酉立皇子伯宗為皇太子王公以下賜帛各有差乙亥立妃沈氏為皇后冬十月甲子齊文宣帝殂十一月乙卯王琳寇大雷詔太尉侯瑱司空侯安都儀同徐度禦之是歲周明帝改天王稱皇帝復建年號曰武成元年天嘉元年春正月癸丑大赦改元詔賜魚衆寡孤獨不能自存者人粟五斛孝悌力田殊行異等加爵一級甲寅分遣使者宣勞四方辛酉祀南郊詔賜人爵一級二月丙申太尉侯瑱敗王琳于梁山敗齊兵于博望禽齊將劉伯球王琳及其主蕭莊奔齊庚子分遣使者齎璽書宣勞四方乙巳遣太尉侯瑱鎮盆城庚戌立武帝第六子昌為衡陽王三月丙辰蕭莊所署郢州刺史孫瑒舉州內附丁巳江州刺史周迪平南中斬賊帥熊曇朗傳首建鄴戊午齊軍棄魯山城走詔南豫州刺史程靈洗守之丙子衡陽王昌于江夏四月丁亥立皇子伯信為衡陽王奉獻王後辛丑周明帝崩六月辛巳改諡皇祖妣景安皇后曰景文皇后壬辰詔改葬梁元帝於江寧舊塋車旗禮章悉用梁典仍依魏葬漢獻帝故事甲午追策故始興昭烈王妃曰孝妃辛丑國哀周忌上臨于太極前殿百僚陪哭赦建鄴殊死以下秋七月丙辰立皇子伯山為鄱陽王八月壬午齊孝昭帝廢其主殷而自立戊子詔非兵器及國容所須金銀珠玉衣服雜玩悉皆禁斷丁酉幸正陽堂閲武九月癸丑彗星見乙卯周將獨孤盛領水軍趣巴湘與賀若敦水陸俱進太尉侯瑱自尋陽禦之冬十月癸巳侯瑱襲破獨孤盛於楊葉洲盛登岸築城自保丁酉詔司空侯安都率衆會侯瑱南拒周軍十二月己亥周巴陵城主尉遲憲降庚子獨孤盛潛遁走二年春正月庚戌大赦辛未周湘州城主殷亮降湘州平二月庚寅曲赦湘州諸郡三月乙卯太尉湘州刺史侯瑱薨夏六月己亥齊人通好秋七月丙午周將賀若敦遁歸武陵天門南平義陽河東宜都郡悉平九月甲寅詔以故太尉侯瑱故司空周文育故開府儀同三司杜僧明故中護軍胡穎故領軍陳擬配食武帝廟庭冬十月癸丑霍州西山蠻率部內屬乙卯高麗國遣使朝貢十一月甲辰齊孝昭帝殂十二月甲申立始興國廟于都下用王者禮以國用不足立煮海鹽賦及榷酤科先是縉州刺史留異應王琳丙戌詔司空侯安都討之是歲周武帝保定元年三年春正月庚戌設帷宮於南郊幣告胡公以配天辛亥祀南郊詔賜人爵一級孝悌力田加一等二月梁宣帝殂閏月己酉以百濟王餘明為撫東大將軍高麗王高湯為寧東將軍江州刺史周迪舉兵應留異甲子改鑄五銖錢三月丙子安成王頊至自周丁丑以安右將軍吳明徹為安南將軍江州刺史督衆軍南討甲申大赦庚寅司空侯安都破留異於桃枝嶺異奔晋安東陽郡平夏四月癸卯曲赦東陽郡乙巳齊人來聘秋七月己丑皇太子納妃王氏在位文武賜帛各有差孝悌力田為父後者賜爵二級九月戊辰朔日有蝕之以侍中到仲舉為尚書右僕射丁亥周迪請降四年春正月丙子干利國遣使朝貢甲申周迪走投閩州刺史陳寶應納之夏四月辛丑設無礙大會捨身於太極前殿乙卯加驃騎將軍揚州刺史安成王頊開府儀同三司六月癸巳司空侯安都賜死秋九月壬戌開府儀同三司廣州刺史歐陽頠薨癸亥曲赦都下辛未周迪復寇臨川詔護軍將軍章昭達討平之冬十二月丙申大赦詔昭達進軍建安討陳寶應五年春三月壬午詔以故護軍將軍周鐵武配食武帝廟庭夏五月周齊並遣使來聘秋七月丁丑曲赦都下九月城西城冬十一月己丑章昭達禽陳寶應留異送建鄴晉安郡平甲辰以護軍將軍章昭達為鎮軍將軍開府儀同三司十二月甲子曲赦建安晉安二郡討陳寶應將士死王事者並給棺槥送還本鄉並復其家癸未齊人來聘六年春正月甲午皇太子加元服王公以下賜帛各有差孝悌力田為父後者賜爵一級魚衆寡孤獨不能自存者穀人五斛夏四月甲寅以開府儀同三司揚州刺史安成王頊為司空五月齊武成帝傳位於太子緯自號太上皇帝六月辛酉彗星見于上台北周人來聘秋七月癸未有大風自西南至廣百餘步激壞靈臺候樓甲申儀賢堂無故自壞丙戌臨川太守駱牙斬周迪傳首建鄴梟於朱雀航八月己卯立皇子伯固為新安王伯恭為晉安王伯仁為廬陵王伯義為江夏王九月新作大航冬十月辛亥齊人來聘十二月乙卯立皇子伯禮為武陵王癸亥曲赦都下天康元年春二月丙子大赦改元三月己卯以司空安成王頊為尚書令夏四月乙卯皇孫至澤生賜在位文武帛各有差為父後者賜爵一級癸酉皇帝崩于有覺殿遺詔皇太子可即君臨山陵務存儉速大斂竟羣臣三日一臨公除之制率依舊典六月甲子羣臣上諡曰文皇帝廟號世祖丙寅葬永寧陵文帝起自布衣知百姓疾苦國家資用務從儉約妙識真僞下不容姦一夜內刺閨取外事分判者前後相續每雞人伺漏傳籤於殿中者令投籤於階石上鎗然有聲云吾雖得眠亦令驚覺其自強若此云廢帝諱伯宗字奉業小字藥王文帝嫡長子也梁承聖三年五月庚寅生永定二年二月戊辰拜臨川王世子三年文帝嗣位八月庚戌立為皇太子自梁室亂離東宮焚燼太子居于永福省天康元年四月癸酉文帝崩是日太子即皇帝位于太極前殿大赦詔內外文武各復其職遠方悉停奔赴五月己卯尊皇太后曰太皇太后皇后曰皇太后庚寅以司空揚州刺史新除尚書令安成王頊為司徒録尚書都督中外諸軍事丁酉以中軍大將軍開府儀同三司徐度為司空以鎮東將軍東揚州刺史始興王伯茂為征東將軍開府儀同三司以吏部尚書袁樞為尚書左僕射以吳興太守沈欽為右僕射秋七月丁酉立妃王氏為皇后冬十月庚申享太廟十一月乙亥周人來弔十二月甲子高麗國遣使朝貢是歲周天和元年光大元年春正月癸酉尚書左僕射袁樞卒乙亥大赦改元賜孝悌力田爵一級辛卯祀南郊二月辛亥南豫州刺史余孝頃謀反伏誅三月甲午以尚書右僕射沈欽為侍中尚書僕射夏五月乙未湘州刺史華皎不從執政丙申以中撫軍大將軍淳于量為征南大將軍總舟師討之六月壬寅以中軍大將軍司空徐度為車騎將軍總督都下衆軍自步道襲湘州秋七月戊申立皇子至澤為皇太子賜天下為父後者爵一級王公以下賚帛各有差九月丙辰百濟國遣使朝貢是月周將拓拔定入郢州與華皎水陸俱進都督淳于量吳明徹等大破之皎單舸奔江陵禽定送建鄴冬十月辛巳曲赦湘巴二州為皎所詿誤者十一月甲子中權將軍開府儀同三司王沖薨十二月庚寅以儀同三司兼從事中郎孔英哲為奉聖亭侯奉孔子祀二年春正月己亥司徒安成王頊進位太傅領司徒加殊禮以新除征南大將軍淳于量為中軍大將軍及安南將軍湘州刺史吳明徹即本號並開府儀同三司庚子詔討華皎軍人死王事者並給棺槥送還本鄉仍復其家甲子司空徐度薨夏五月丙辰太傅安成王頊獻玉璽一六月丁亥彗星見秋七月戊申新羅國遣使朝貢壬戌立皇弟伯智為永陽王伯謀為桂陽王九月林邑狼牙修國並遣使朝貢冬十一月甲寅慈訓太后令曰伯宗昔在儲宮本無令問及居崇極遂騁凶淫太傅親承顧託義深垣屏而攢塗未御翌日無淹仍遣劉師知殷不佞等顯言排斥陰謀禍亂賴元相維持但除君側又以余孝頃密邇京師便相徵召宗社之靈祅氛是滅於是密詔華皎稱兵上流國祚憂惶幾移醜類又別敕歐陽紇等攻逼衡州嶺表紛紜殊淹弦望但賊豎皆亡日望懲改而悖禮忘德情性不悛蕩主侯法喜等太傅麾下游府內啖以深利謀興肘腋又蕩主孫泰等潛相連結大有交通天誘其衷自然開發此諸文迹今以相示豈可復肅恭禋祀臨御生靈今可特降為臨海郡王送還藩邸太傅安成王固天生德齊聖廣深二后鍾心三靈佇眷自前朝不豫任總邦家威惠相宣刑禮兼設且地彰靈璽天表長彗布新除舊禎祥咸顯文皇知子之鑒事甚帝堯傳弟之懷久符太伯今可還申舊志崇立賢君外宜依舊典奉迎輿駕是日帝出居別第太建二年四月乙卯薨時年十九帝性仁弱無人君之器及即尊位政刑皆歸冢宰故宣太后稱文帝遺志而廢焉論曰陳武帝以雄毅之姿屬殷憂之運功存拯溺道濟橫流應變無方蓋惟人傑及乎西都蕩覆江表阽危僧辨任同伊尹空結桐宮之恨貞陽入假秦兵不息穆嬴之泣帝乘隙以舉乃蹈玄機王業所基始自於此柴天改物蓋有憑云文帝以宗枝承統情存兢惕加以崇尚儒術愛悅文義恭儉行己勤勞濟物志度弘遠有前哲之風至於臨下明察得永平之政矣臨海懦弱有同於帝摯文后雖欲不鑒殷道蓋亦其可得邪
