body:
  text: 南史卷七十列傳第六十循吏吉翰杜驥申恬杜慧度阮長之甄法崇孫彬傅琰孫岐虞願王洪範李圭之沈瑀范述曾孫謙從子廉何遠郭祖深昔漢宣帝以為政平訟理其惟良二千石乎前史亦云今之郡守古之諸侯也故長吏之職號曰親人至於道德齊禮移風易俗未有不由之矣宋武起自匹庶知人事艱難及登庸作宰留心吏職而王略外舉未遑內務奉師之費日耗千金播茲寬簡雖所未暇而黜己屏欲以儉御身左右無幸謁之私閨房無文綺之飾故能戎車歲駕邦甸不擾文帝幼而寬仁入纂大業及難興陝服六戎薄伐興師命將動在濟時費由府實事無外擾自此方內晏安氓庶蕃息奉上供徭止於歲賦晨出暮歸自事而已守宰之職以六朞為斷雖沒世不徙未及曩時而人有所係吏無苟得家給人足即事雖難轉死溝渠於時可免凡百戶之鄉有市之邑歌謠舞蹈觸處成羣蓋宋世之極盛也暨元嘉二十七年舉境外捍於是傾資掃蓄猶有未供深賦厚斂天下騷動自茲迄于孝建兵連不息以區區江東蕞爾迫隘荐之以師旅因之以凶荒向時之盛自此衰矣晉世諸帝多處內房朝宴所臨東西二堂而已孝武末年清暑方構及永初受命無所改作所居唯稱西殿不制嘉名文帝因之亦有合殿之稱及孝武承統制度滋長犬馬餘菽粟土木衣綈繡追陋前規更造正光玉燭紫極諸殿雕欒綺節珠窗網戶嬖女幸臣賜傾府藏竭四海不供其欲殫人命未快其心明皇繼祚彌篤浮侈恩不恤下以至橫流蒞人之官遷變歲屬突不得黔席未暇暖蒲密之化事未易階豈徒吏不及古人乖於昔蓋由為上所擾致化莫從齊高帝承斯奢縱輔立幼主思振人瘼風移百城為政未朞擢山陰令傅琰為益州刺史乃損華反朴恭己南面導人以躬意存勿擾以山陰大邑獄訟繁滋建元三年別置獄丞與建康為比永明繼運垂心政術杖威善斷猶多漏網長吏犯法封刃行誅郡縣居職以三周為小滿水旱之災輒加振恤十許年中百姓無犬吠之驚都邑之盛士女昌逸歌聲舞節袨服華葬桃花淥水之間秋月春風之下無往非適明帝自在布衣達于吏事及居宸扆專務刀筆未嘗枉法申恩守宰由斯而震屬以魏軍入伐疆埸大擾兵車連歲不遑啓居軍國糜耗從此衰矣繼以昏亂政由羣孽賦調雲起徭役無度守宰多倚附權門互長貪虐裒刻聚斂侵擾黎氓天下搖動無所措其手足梁武在田知人疾苦及定亂之始仍下寬書東昏時雜調咸悉除省於是四海之內始得息肩及踐皇極躬覽庶事日昃聽政求瘼恤隱乃命輶軒以省方俗置肺石以達窮人勞己所先事唯急病元年始去人資計丁為布在身服浣濯之衣御府無文錦之飾太官常膳唯以菜蔬圓案所陳不過三盞蓋以儉先海內也故每選長吏務簡廉平皆召見於前親勗政道始擢尚書殿中郎到溉為建安內史左戶侍郎劉鬷為晉安太守溉等居官並以廉潔著又著令小縣有能遷為大縣令大縣有能遷為二千石於是山陰令丘仲孚有異績以為長沙內史武康令何遠清公以為宣城太守剖符為吏者往往承風焉斯亦近代奬勸之方也案前史各立循吏傳序其德美今並掇采其事以備此篇云吉翰字休文馮翊池陽人也初為龍驤將軍劉道憐參軍隨府轉征虜左軍參軍隨道憐北征廣固賜爵建城縣五等侯參宋武帝中軍軍事臨淮太守復為道憐驃騎中兵參軍從事中郎為將佐十餘年清謹勤正甚為武帝所知賞元嘉中歷位梁南秦二州刺史徙益州刺史加督在任著美績甚得方伯之體論者稱之纍遷徐州刺史監徐兗二州豫州之梁郡諸軍事時有死罪囚典籤意欲活之因翰八關齊呈事翰省訖語令且去明可更呈明旦典籤不敢復入呼之乃來取昨所呈事視訖謂曰卿意當欲宥此囚死命昨於齊坐見其事亦有心活之但此囚罪重不可全貸既欲加恩卿便當代任其罪因命左右收典籤付獄殺之原此囚生命其刑政類如此自下畏服莫敢犯禁卒於官杜驥字度世京兆杜陵人也高祖預晉征南將軍曾祖耽避難河西因仕張氏苻堅平涼州父祖始還關中兄坦頗涉史傳宋武帝平長安隨從南還元嘉中位青冀二州刺史晚度北人南朝常以傖荒遇之雖復人才可施每為清途所隔坦以此慨然嘗與文帝言及史籍上曰金日磾忠孝淳深漢朝莫及恨今世無復此輩人坦曰日磾之美誠如聖詔假使出乎今世養馬不暇豈辦見知上變色曰卿何量朝廷之薄也坦曰請以臣言之臣本中華高族亡曾祖因晉氏喪亂播遷涼土直以南度不早便以荒傖賜隔日磾胡人身為牧圉便超入內侍齒列名賢聖朝雖復拔才臣恐未必能也上默然北土舊法問疾必遣子弟驥年十三父使候同郡韋華華子玄有高名見而異之以女妻焉纍遷長沙王義欣後軍録事參軍元嘉七年隨到彥之入河南加建武將軍魏撤河南戍悉歸河北彥之使驥守洛陽洛陽城廢久又無糧食及彥之敗退驥欲棄城走慮為文帝誅初武帝平關洛致鍾虡舊器南還一大鍾墜洛水中至是帝遣將姚聳夫領千五百人迎致之時聳夫政率所領牽鍾於洛水驥乃遣使紿之曰虜既南度洛城勢弱今修理城池並已堅固軍糧又足所乏者人耳君率衆見就共守此城大功既立取鍾無晚聳夫信之率所領就驥及至城不可守又無糧食於是引衆去驥亦委城南奔白文帝本欲以死固守姚聳夫入城便走人情沮敗不可復禁上怒使建威將軍鄭順之殺聳夫於壽陽聳夫吳興武康人勇果有氣力宋偏裨小將莫及十七年驥為青冀二州刺史在任八年惠化著於齊土自義熙至于宋末刺史唯羊穆之及驥為吏人所稱詠後徵為左軍將軍兄坦代為刺史北土以為榮焉坦長子琬為員外散騎侍郎文帝嘗有函詔敕坦琬輒開視信未及發又追取之敕函已發大相推檢上遣主書詰責驥并檢開函之主驥答曰開函是臣第四息季文伏待刑坐上特原不問卒官第五子幼文薄於行明帝初以軍功封邵陽縣男尋坐巧妄奪爵後以發太尉廬江王褘謀反事拜給事黃門侍郎廢帝元徽中為散騎常侍幼文所蒞貪橫家纍千金與沈勃孫超之居止接近又並與阮佃夫厚善佃夫既死廢帝深疾之帝微行夜輒在幼文門墉間聽其絃管積久轉不能平於是自率宿衛兵誅幼文勃超之等兄叔文為長水校尉亦誅申恬字公休魏郡魏人也曾祖鍾為石季龍司徒宋武帝平廣固恬父宣宣從父兄永皆得歸晉並以幹用見知武帝踐阼拜太中大夫宣元嘉初歷兗青二州刺史恬兄謨與朱修之守滑臺魏剋滑臺見虜後得還為竟陵太守恬初為驃騎劉道憐長兼行參軍宋受命辟東宮殿中將軍度還臺直省十年不請休急歷下邳北海二郡太守所至皆有政績又為北譙梁二郡太守郡境邊接任榛屢被寇抄恬到任密知賊來乃伏兵要害出其不意悉皆禽殄元嘉十二年遷督魯東平濟北三郡諸軍事泰山太守威惠兼著吏人便之二十一年冀州移鎮歷下以恬為冀州刺史加督明年加濟南太守孝武踐阼為青州刺史尋加督齊地連歲興兵百姓雕弊恬防禦邊境勸課農桑二三年間遂皆優實性清約頻處州郡妻子不免飢寒世以此稱之後拜豫州刺史以疾徵還道卒死之日家無遺財子實南譙太守謨子元嗣海陵太守元嗣弟謙臨川內史永子坦孝建初為太子右衛率徐州刺史大明元年魏攻兗州孝武遣太子左衛率薛安都東陽太守沈法系北捍至兗州魏軍已去坦建議任榛亡命屢犯邊人今軍出無功宜因此翦撲上從之亡命先已聞知舉村逃走安都法系坐白衣領職坦棄市羣臣為請莫得將行刑始興公沈慶之入市抱坦慟哭曰卿無罪為朝廷所枉誅我入市亦當不久市官以白上乃原生命繫尚方尋被宥復為驍騎將軍疾卒子令孫明帝時為徐州刺史討薛安都行至淮陽即與安都合弟闡時為濟陰太守戍睢陵城奉順不同安都安都攻圍不能剋會令孫至遣往睢陵說闡闡降殺之令孫亦見殺杜慧度交址朱人也本屬京兆曾祖元為寧浦太守遂居交址父瑗字道言仕州府為日南九德交址太守初九真太守李遜父子勇壯有權力威制交土聞刺史滕遁之當至分遣二子斷遏水陸津要瑗收衆斬遜州境獲寧後為龍驤將軍交州刺史宋武帝義旗建進號冠軍將軍盧循竊據廣州遣使通好瑗斬之義熙六年卒年八十四贈右將軍慧度瑗第五子也七年除交州刺史詔書未到其年春盧循襲破合浦徑向交州慧度乃率文武六千人拒循於石崎破之循雖破餘黨皆習兵事李遜子孫李奕李移李脫等皆奔竄石崎盤結俚獠各有部曲循知奕等與杜氏有怨遣使招之奕等受循節度六月庚子循晨造南津令三軍入城乃食慧度悉出宗族私財以充勸賞自登高艦合戰放火箭循衆艦俱然一時散潰循中箭赴水死斬循及父嘏并循二子並傳首建鄴封慧度龍編縣侯武帝踐阼進號輔國將軍其年南討林邑林邑乞降輸生口大象金銀古貝等乃釋之遣長史江攸奉表獻捷慧度布衣蔬食儉約質素能彈琴頗好莊老禁斷淫祀崇修學校歲荒人飢則以私祿振給為政纖密有如居家由是威惠霑洽姦盜不起乃至城門不夜閉道不拾遺卒追贈左將軍以慧度長子弘文為振遠將軍交州刺史初武帝北征關洛慧度板弘文行九真太守及繼父為刺史亦以寬和得衆襲爵龍編侯元嘉四年文帝以廷尉王徽為交州刺史弘文被徵會得重疾牽以就路親舊見其患篤勸待病愈弘文曰吾世荷皇恩杖節三世常欲投軀帝庭以報所荷況親被徵命而可晏然者乎弘文母阮年老見弘文輿疾就路不忍別與到廣州遂卒臨死遣弟弘猷詣建鄴朝廷甚哀之孝建中以豫章太守檀和之為豫州刺史和之先歷始興太守交州刺史所在有威名盜賊屏迹每出獵猛獸伏不敢起阮長之字景茂一字善業陳留尉氏人也祖思曠金紫光祿大夫父普驃騎咨議參軍長之年十五喪父有孝性哀感傍人除服蔬食者猶積載間居篤學未嘗有惰容初為諸府參軍母老求補襄垣令督郵無禮鞭之去職後拜武昌太守時王弘為江州雅相知重引為車騎從事中郎元嘉十一年除臨海太守在官常擁敗絮至郡少時母亡葬畢不勝憂卒時郡田祿以芒種為斷此前去官者則一年秩祿皆入後人始以元嘉末改此科計月分祿長之去武昌郡代人未至以芒種前一日解印綬初發都親故或以器物贈別得便緘録後歸悉以還之為中書郎直省夜往鄰省誤著屐出閣依事自列門下以暗夜人不知不受列長之固遣送曰一生不侮暗室前後所蒞官皆有風政為後人所思宋世言善政者咸稱之文帝深惜之曰景茂方堪大用豈直以清苦見惜子師門原鄉令元嘉初文帝遣大使巡行四方兼散騎常侍王歆之等上言宣威將軍陳南頓二郡太守李元德清勤均平姦盜止息彭城內史魏恭子廉惜修慎在公忘私安約守儉久而彌固前宋縣令成浦為政寬濟遺詠在人前鮦陽令李熙國在事有方人思其政故山桑令何道自少清廉白首彌厲應加褒賚以勸于後各被褒賜歆之字叔道河東人曾祖愆期有名晉世官至南蠻校尉歆之位左戶尚書光祿大夫卒官甄法崇中山人也父匡位少府卿以清聞法崇宋永初中為江陵令在任嚴整縣境肅然于時南平繆士通為江安令卒官至其年末法崇在聽事士通前見法崇知其已亡愕然未言坐定云卿縣人宋雅見負米千餘石不還令兒窮弊不自存故自訴法崇因命口受為辭因遜謝下席而法崇為問宋家狼狽輸送太守王華聞而歎美之法崇孫彬彬有行業鄉黨稱善嘗以一束苧就州長沙寺庫質錢後贖苧還於苧束中得五兩金以手巾裹之彬得送還寺庫道人驚云近有人以此金質錢時有事不得舉而失檀越乃能見還輒以金半仰酬往復十餘彬堅然不受因謂曰五月披羊裘而負薪豈拾遺金者邪卒還金梁武帝布衣而聞之及踐阼以西昌侯藻為益州刺史乃以彬為府録事參軍帶郫縣令將行同列五人帝誡以廉慎至彬獨曰卿昔有還金之美故不復以此言相屬由此名德益彰及在蜀藻禮之甚厚云傅琰字季圭北地靈州人也曾祖弘仁宋武帝之外弟以中表歷顯官位太常卿祖劭字彥先員外散騎侍郎父僧祐山陰令有能名琰美姿儀仕宋為武康令遷山陰令並著能名二縣皆謂之傅聖賜爵新亭侯元徽中遷尚書左丞母喪鄰家失火延燒琰屋抱柩不動鄰人競來赴救乃得俱全琰股髀之間已被烟焰齊高帝輔政以山陰獄訟煩積復以琰為山陰令賣針賣糖老姥爭團絲來詣琰琰挂團絲於柱鞭之密視有鐵屑乃罰賣糖者又二野父爭雞琰各問何以食雞一人云粟一人云豆乃破雞得粟罪言豆者縣內稱神明無敢為偷琰父子並著奇績時云諸傅有理縣譜子孫相傳不以示人升明中遷益州刺史自縣遷州近世罕有齊建元四年徵驍騎將軍黃門郎永明中為廬陵王安西長史南郡內史行荊州事卒琰喪西還有詔出臨哭時長沙太守王沈新蔡太守劉聞慰晉平太守丘仲起長城縣令何敬叔故鄣縣令丘寂之皆有能名而不及琰也沈字彥流東海人歷錢唐山陰秣陵令南平長沙太守清廉戒慎身居祿而居處日貧死之日無宅可故吏為營棺柩聞慰自有傳仲起見沈憲傳敬叔見子思澄傳寂之字德玄吳興烏程人年十七為州西曹兼直主簿刺史王彧行縣夜還前驅已至而寂之不肯開門曰不奉墨旨彧方於車中為教然後開彧歎曰不意郅君章近在閣下即轉為主簿在縣專以廉潔御下于時丹徒縣令沈巑之以清廉抵罪寂之聞之曰清吏真不可為也政當處季孟之間乎巑之吳興武康人性疏直在縣自以清廉不事左右浸潤日至遂鎖繫尚方歎曰一見天子足矣上召問曰復欲何陳答曰臣坐清所以獲罪上曰清復何以獲罪曰無以承奉要人上曰要人為誰巑之以手板四面指曰此赤衣諸賢皆是若臣得更鳴必令清譽日至巑之雖危言上亦不責後知其無罪重除丹徒令入縣界吏人候之謂曰我今重來當以人肝代米不然清名不立又有汝南周洽歷句容曲阿上虞吳令廉約無私卒於都水使者無以殯斂吏人為買棺器齊武帝聞而非之曰洽纍歷名邑而居處不理遂坐無車宅死令吏衣棺之此故宜罪貶無論褒恤乃敕不給贈賻琰子翽為官亦有能名後為吳令別建康令孫廉廉因問曰聞丈人發姦擲伏惠化如神何以至此答曰無他也唯勤而清清則憲綱自行勤則事無不理憲綱自行則吏不能欺事自理則物無疑滯欲不理得乎時臨淮劉玄明亦有吏能歷山陰建康令政常為天下第一終於司農卿後翽又代玄明為山陰令問玄明曰願以舊政告新令尹答曰我有奇術卿家譜所不載臨別當相示既而曰作縣令唯日食一升飯而莫飲酒此第一策也翽天監中為建康令復有能名位驃騎咨議子岐岐字景平仕梁起家南康王左常侍後兼尚書金部郎母憂去職居喪盡禮服闋後疾廢久之復除始新令縣人有因鬬相毆而死死家訴郡郡録其仇人考掠備至終不引咎郡乃移獄於縣岐即令脫械以和言問之便即首服法當償死會冬節至岐乃放其還家獄曹掾固爭曰古者有此今不可行岐曰其若負信縣令當坐竟如期而反太守深相歎異遽以狀聞岐後去縣人無老少皆出境拜送號哭聞數十里至都除廷尉正入兼中書通事舍人纍遷安西中記室兼舍人如故岐美容止博涉能占對大同中與魏和親其使歲中再至常遣岐接對焉太清元年纍遷太僕司農卿舍人如故岐在禁省十餘年機事密勿亞於朱䌇此年冬貞陽侯蕭明伐彭城兵敗囚於魏二年明遣使還述魏欲通和好敕有司及近臣定議左衛朱䌇曰邊境且得靜寇息人於事為便議者並然之岐獨曰高澄既新得志何事須和必是設間故令貞陽遣使令侯景自疑當以貞陽易景景意不安必圖禍亂若許通好政是墮其計中且彭城去歲喪師渦陽復新敗退今使就和益示國家之弱和不可許䌇等固執帝遂從之及遣使景果有此疑遂舉兵入寇請誅朱䌇三年遷中領軍舍人如故二月侯景於闕前通表乞割江右四州安置部下當解圍還鎮敕許之乃於城西立盟求遣召宣城王出送岐固執宣城王嫡嗣之重不宜許之乃遣石城公大款送之及與景盟訖城中文武喜躍冀得解圍岐獨言於衆曰賊舉兵為逆豈有求和及景背盟莫不歎服尋有詔以岐勤勞封南豐縣侯固辭不受宮城失守岐帶疾出圍卒於宅虞願字士恭會稽餘姚人也祖賚給事中監利侯父望之早卒賚中庭橘樹冬熟子孫競來取之願年數歲獨不取賚及家人皆異之宋元嘉中為湘東王國常侍及明帝立以願儒吏學涉兼蕃國舊恩意遇甚厚除太常丞尚書祠部郎通直散騎侍郎帝性猜忌體肥憎風夏月常著小皮衣拜左右二人為司風令史風起方面輒先啓聞星文災變不信太史不聽外奏敕靈臺知星二人給願常內省直有異先啓以相檢察帝以故宅起湘宮寺費極奢侈以孝武莊嚴剎七層帝欲起十層不可立分為兩剎各五層新安太守巢尚之罷郡還見帝曰卿至湘宮寺未我起此寺是大功德願在側曰陛下起此寺皆是百姓賣兒貼婦錢佛若有知當悲哭哀愍罪高佛圖有何功德尚書令袁粲在坐為之失色帝大怒使人驅曳下殿願徐去無異容以舊恩少日中已復召入帝好圍甚拙去格七八道物議共欺為第三品與第一品王抗圍依品賭戲抗饒借帝曰皇帝飛臣抗不能斷帝終不覺以為信然好之愈篤願又曰堯以此教丹朱非人主所宜好也雖數忤旨而蒙賞賜猶異餘人遷兼中書郎帝寢疾願常侍醫藥帝尤好逐夷以銀鉢盛蜜漬之一食數鉢謂揚州刺史王景文曰此是奇味卿頗足不景文答曰臣夙好此物貧素致之甚難帝甚悅食逐夷積多胸腹痞脹氣將絶左右啓飲數升酢酒乃消疾大困一食汁滓猶至三升水患積久藥不復效大漸日正坐呼道人合掌便絶願以侍疾久轉正員郎出為晉平太守在郡不事生業前政與百姓交關質録其兒婦願遣人於道奪取將還在郡立學堂教授郡舊出髯蛇膽可為藥有遺願蛇者願不忍殺放二十里外山中一夜蛇還牀下復送四十里山經宿復歸論者以為仁心所致海邊有越王石常隱雲霧相傳云清廉太守乃得見願往就觀視清徹無所隱蔽後琅邪王秀之為郡與朝士書曰此郡承虞公之後善政猶存遺風易遵差得無事以母老解職除後軍將軍褚彥回嘗詣願願不在見其眠牀上積塵埃有書數袠彥回歎曰虞君之清至於此令人掃地拂牀而去遷中書郎領東觀祭酒兄季為上虞令卒願從省步出還家不待詔便歸東除驍騎將軍遷廷尉祭酒如故願嘗事宋明帝齊初神主遷汝陰廟願拜辭流涕建元元年卒願著五經論問撰會稽記文翰數十篇王洪範上谷人也宋泰始中魏剋青州洪範得別駕清河崔祖歡女仍以為妻祖歡女說洪範南歸宋桂陽王之難隨齊高帝鎮新亭常以身捍矢高帝曰我自有楯卿可自防答曰天下無洪範何有哉蒼生方亂豈可一日無公帝甚賞之後為晉壽太守多昧贓賄為州所按大懼棄郡奔建鄴高帝輔政引為腹心建武初為青冀二州刺史悔為晉壽時貨賕所敗更勵清節先是青州資魚鹽之貨或強借百姓麥地以種紅花多與部下交易以祈利益洪範至一皆斷之啓求侵魏得黃郭鹽倉等數戍後遇敗死傷塗地深自咎責乃於謝祿山南除地廣設茵席殺三牲招戰亡者魂祭之人人呼名躬自沃酹仍慟哭不自勝因發病而亡洪範既北人而有清正州人呼為虜父使君言之咸落淚永明中有江夏李圭之字孔璋位尚書右丞兼都水使者歷職稱為清能後兼少府卒沈瑀字伯瑜吳興武康人也父昶事宋建平王景素景素謀反昶先去之及敗坐繫獄瑀詣臺陳請得免罪由是知名為奉朝請嘗詣齊尚書左丞殷濔濔與語及政事甚器之謂曰觀卿才幹當居吾此職司徒竟陵王子良聞瑀名引為府行參軍領揚州部傳從事時建康令沈徽孚恃勢瑀瑀以法繩之衆憚其強子良甚相知賞雖家事皆以委瑀子良薨瑀復事刺史始安王遙光嘗使送人丁速而無怨遙光謂同使吏曰爾何不學沈瑀所為乃令瑀專知州獄事湖熟縣方山埭高峻冬月公私行侶以為艱明帝使瑀行修之瑀乃開四洪斷行客就作三日便辦揚州書佐私行詐稱州使不肯就作瑀鞭之四十書佐歸訴遙光遙光曰沈瑀必不枉鞭汝覆之果有詐明帝復使瑀築赤山塘所費減材官所量數十萬帝益善之為建德令教人一丁種十五株桑四株柿及梨栗女子丁半之人咸歡悅頃之成林去官還都兼行選曹郎隨陳伯之軍至江州會梁武起兵圍郢城瑀說伯之迎武帝伯之泣曰余子在都瑀曰不然人情胸胸皆思改計若不早圖衆散難合伯之遂降初瑀在竟陵王家素與范雲善齊末嘗就雲宿夢坐屋梁柱上仰見天中有字曰范氏宅至是瑀為帝說之帝曰雲得不死此夢可驗及帝即位雲深薦瑀自暨陽令擢兼尚書右丞時天下初定陳伯之言瑀催督運輸軍國獲濟帝以為能遷尚書駕部郎兼右丞如故瑀薦族人沈僧隆僧照有吏幹帝並納之以母憂去職起為餘姚令縣大姓虞氏千餘家請謁如市前後令長莫能絶自瑀到非訟訴無所通以法繩之縣南又有豪族數百家子弟縱橫遞相庇廕厚自封植百姓甚患之瑀召其老者為石頭倉監少者補縣僮皆號泣道路自是權右屏跡瑀初至富吏皆鮮衣美服以自彰別瑀怒曰汝等下縣吏何得自擬貴人悉使著芒屨粗布侍立終日足有蹉跌輒加榜捶瑀微時嘗至此鬻瓦器為富人所辱故因以報焉由是士庶駭怨瑀廉潔自守故得遂行其意後為安南長史尋陽太守江州刺史曹景宗卒仍為信威蕭穎達長史太守如故瑀性屈強每忤穎達穎達銜之天監八年因入咨事辭又激厲穎達作色曰朝廷用君作行事邪瑀出謂人曰我死而後已終不能傾側面從是日於路為人所殺多以為穎達害焉子續纍訟之遇穎達尋卒事不窮竟續乃布衣蔬食終其身范述曾字子玄一字穎彥吳郡錢唐人也幼好學從餘杭呂道惠受五經略通章句道惠曰此子必為王者師齊文惠太子竟陵文宣王幼時齊高帝引述曾為之師友起家宋晉熙王國侍郎齊初至南郡王國郎中令遷太子步兵校尉帶開陽令述曾為人騫諤在宮多所諫爭太子雖不能全用然亦弗之罪也竟陵王深相器重號為周舍太子左衛率沈約亦以述曾方汲黯齊明帝即位為永嘉太守為政清平不尚威猛氓俗便之所部橫陽縣山谷嶮峻為逋逃所聚前後二千石討捕莫能息述曾下車開示恩信凡諸凶黨襁負而出編戶屬籍者二百餘家自是商旅流通居人安業勵志清白不受饋遺明帝下詔褒美徵為游擊將軍郡送故舊錢二十餘萬一無所受唯得白桐木火籠朴十餘枚而已東昏時拜中散大夫還鄉里梁武帝踐阼乃輕行詣闕仍辭還武帝下詔褒美以為太中大夫述曾生平所得奉祿皆以分施及老遂壁立無資以天監八年卒注易文言著雜詩賦數十篇後有吳興丘師施亦廉潔稱罷臨安縣還唯有二十籠簿書並是倉庫券帖當時以比述曾位至臺郎孫謙字長遜東莞莒人也客居歷陽躬耕以養弟妹鄉里稱其敦睦仕宋為句容令清慎強記縣人號為神明宋明帝以為巴東建平二郡太守郡居三峽以威力鎮之謙將述職敕募千人自隨謙曰蠻夷不賓蓋待之失節耳何煩兵役以為國費固辭不受至郡布恩惠之化蠻獠懷之競餉金寶謙慰喻而遣一無所納及掠得生口皆放還家奉秩出吏人者悉原除之郡境翕然威恩大著視事三年徵還為撫軍中兵參軍遷越騎校尉征北司馬府主建平王將稱兵患謙強直託事遣使至都然後作亂及建平誅遷左軍將軍齊初為錢唐令御煩以簡獄無繫囚及去官百姓以謙在職不受餉遺追載縑帛以送之謙辭不受每去官輒無私宅借空車居焉永明初為江夏太守坐被代輒去郡繫尚方頃之免為中散大夫明帝將廢立欲引謙為心膂使兼衛尉給甲仗百人謙不願處際會輒散甲士帝雖不罪而弗復任焉梁天監六年為零陵太守年已衰老猶強力為政吏人安之先是郡多猛獸暴謙至絶迹及去官之夜猛獸即害居人謙為郡縣常勤勸課農桑務盡地利收入常多於鄰境九年以老徵為光祿大夫及至帝嘉其清潔甚禮異焉每朝見猶請劇職自效帝笑之曰朕當使卿智不使卿力十四年詔加優秩給親信二十人並給扶謙自少及老歷二縣五郡所在廉潔居身儉素牀施蘧蒢屏風冬則布被莞席夏日無幬帳而夜臥未嘗有蚊蚋人多異焉年逾九十強壯如五六十者每朝會輒先衆到公門力於仁義行己過人甚遠從兄靈慶嘗病寄謙謙行出還問起居靈慶曰向飲冷熱不調即時猶渴謙退遣其妻有彭城劉融行乞疾篤無所歸友人輿送謙舍謙開聽事以受之及融死以禮殯葬衆咸服其行義末年頭生二肉角各長一寸十五年卒官時年九十二臨終遺命諸子曰吾少無人間意故自不求聞達而仕歷三代官成兩朝如我資名或蒙贈諡自公體耳氣絶即以幅巾就葬每存儉率比見車過精非吾志也士安束以蘧蒢王孫倮入后地雖是匹夫之節取於人情未允今使棺足周身壙足容柩旐書爵里無曰不然旒表命數差可停息直僦牀裝之以以常所乘者為魂車他無所用第二子貞巧乃織細裝以篾為鈴佩雖素而華帝為舉哀甚悼惜之從子廉字思約父奉伯位少府卿淮南太守廉便辟巧宦齊時已歷大縣尚書右丞天監初沈約范雲當朝用事廉傾意奉之及中書舍人黃睦之等亦尤所結附凡貴要每食廉必日進滋旨皆手自煎調不辭勤劇遂得為列卿御史中丞晉陵吳興太守廣陵高爽有險薄才客於廉廉委以文記爽嘗有求不遂乃為屐謎以喻廉曰刺鼻不知嚏踏面不知嗔齧齒作步數持此得勝人譏其不計恥辱以此取名位然處官平直遂以善政稱武帝嘗曰東莞二孫謙廉而已何遠字義方東海郯人也父慧炬齊尚書郎遠仕齊為奉朝請豫崔慧景敗亡事抵尚書令蕭懿懿深保匿焉會赦出頃之懿遭難子弟皆潛伏遠求得懿弟融藏之既而發覺遠踰垣以免融遇禍遠家屬繫尚方遠遂亡度江因降魏入壽陽見刺史王肅求迎梁武帝肅遣兵援送武帝見遠謂張弘策曰何遠丈夫而能破家報舊德未易及也武帝踐阼以奉迎勳封廣興男為後軍鄱陽王恢録事參軍遠與恢素善在府盡其志力知無不為恢亦推心仗之恩寄甚密遷武昌太守遠本倜儻尚輕俠至是乃折節為吏杜絶交游饋遺秋毫無所受武昌俗皆汲江水盛夏遠患水溫每以錢買人井寒水不取錢者則摙水還之其他事率多如此跡雖似僞而能委曲用意車服尤弊素器物無銅漆江左水族甚賤遠每食不過乾魚數片而已然性剛嚴吏人多以細事受鞭罰遂為人所訟徵下廷尉被劾十數條當時士大夫坐法皆不受測遠度己無贓就測立三七日不款猶以私藏禁仗除名後為武康令愈厲廉節除淫祀正身率職人甚稱之太守王彬巡屬縣諸縣皆盛供帳以待焉至武康遠獨設糗水而已彬去遠送至境進斗酒隻鵝而別彬戲曰卿禮有過陸納將不為古人所笑乎武帝聞其能擢為宣城太守自縣為近畿大郡近代未之有也郡經寇抄遠盡心綏理復著名迹朞年遷樹功將軍始興內史時泉陵侯朗為桂州緣道多剽掠入始興界草木無所犯遠在官好開途巷修葺牆屋人居市里城隍庫所過若營家焉田秩奉錢並無所取歲暮擇人尤窮者充其租調以此為常然其聽訟猶人也不能過絶而性果斷人畏而惜之所至皆生為立祠表言政狀帝每優詔答焉後歷給事黃門侍郎信武將軍監吳郡在吳頗有酒失遷東陽太守遠處職疾強富如仇讎視貧細如子弟特為豪右所畏憚在東陽歲餘復為受罰者所謗坐免歸遠性耿介無私曲居人間絶請謁不造詣與貴賤書疏抗禮如一其所會遇未嘗以顏色下人是以多為俗士所疾惡其清公實為天下第一居數郡見可欲終不變其心妻子飢寒如下貧者及去東陽歸家經年歲口不言榮辱士類益以此多之其輕財好義周人之急言不虛妄蓋天性也每戲語人云卿能得我一妄語則謝卿以一縑衆共伺之不能記也後為征西咨議參軍中撫軍司馬卒郭祖深襄陽人也梁武帝初起以客從後隨蔡道恭在司州陷北還上書言境上事不見用選為長兼南梁郡丞徙後軍行參軍帝溺情內教朝政縱弛祖深輿櫬詣闕上封事其略曰大梁應運功高百王慈悲既弘憲律如替愚輩罔識褫慢斯作各競奢侈貪穢遂生頗由陛下寵勳太過馭下太寬故廉潔者自進無途貪苛者取入多徑直弦者淪溺溝壑曲鉤者升進重沓飾口利辭競相推薦訥直守信坐見埋沒勞深勳厚祿賞未均無功側入反加寵擢昔宋人賣酒犬惡致酸陛下之犬其甚矣哉臣聞人為國本食為人命故禮曰國無六年之儲謂非其國也推此而言農為急務而郡縣苛暴不加勸奬今年豐歲稔猶人有飢色設遇水旱何以救之陛下昔歲尚學置立五館行吟坐詠誦聲溢境比來慕法普天信向家家齊戒人人禮不務農桑空談彼岸夫農桑者今日濟育功德者將來勝因豈可墮本勤末置邇效賒也今商旅轉繁游食轉衆耕夫日少杼軸日空陛下若廣興屯田賤金貴粟勤農桑者擢以階級惰耕織者告以明刑如此數年則家給人足廉讓可生夫君子小人智計不同君子志於道小人謀於利志於道者安國濟人志於利者損物圖己道人者害國小人也忠良者捍國君子也臣見疾者詣道士則勸奏章僧尼則令齊講俗師則鬼禍須解醫診則湯尉散丸皆先自為也臣謂為國之本與療病相類療病當去巫鬼尋華扁為國當黜佞邪用管晏今之所任腹背之毛耳論外則有勉捨說內則有雲旻雲旻所議則傷俗盛法勉捨之志唯願安枕江東主慈臣恇息謀外甸使中國士女南望懷寃若賈誼重生豈不慟哭臣今直言犯顏罪或容宥而乖忤貴臣則禍在不測所以不憚鼎鑊區區必聞者正以社禝計重而螻蟻命輕使臣言入身滅臣何所恨夫謀臣良將何代無之貴在見知要在用耳陛下皇基兆運二十餘載臣子之節諫爭是誰執事皆同而不和答問唯唯而已入對則言聖旨神衷出論則云誰敢逆耳過實在下而謫見於上遂使聖皇降誠躬自引咎宰輔晏然曾無謙退且百僚卿士鮮有奉公尸祿競利不尚廉潔纍金積鏹侍列如仙不田不商何故而爾法者人之父母惠者人之仇讎法嚴則人思善德多則物生惡惡不可長欲不可縱伏願去貪濁進廉平明法令嚴刑罰禁奢侈薄賦斂則天下幸甚謹上封事二十九條伏願抑獨斷之明少察愚瞽時帝大弘釋典將以易俗故祖深尤言其事條以為都下佛寺五百餘所窮極宏麗僧尼十餘萬資産豐沃所在郡縣不可勝言道人又有白徒尼則皆畜養女皆不貫人籍天下戶口幾亡其半而僧尼多非法養女皆服羅紈其蠹俗傷法抑由於此請精加檢括若無道行四十已下皆使還俗附農罷白徒養女聽畜奴婢婢唯著青布衣僧尼皆令蔬食如此則法興俗盛國富人殷不然恐方來處處成寺家家剃落尺土一人非復國有朝廷擢用勳舊為三陲州郡不顧御人之道唯以貪殘為務迫脅良善害甚豺狼江湘人尤受其弊自三關以外是處遭毒而此勳人投化之始但有一身及被任用皆募部曲而揚徐之人逼以衆役多投其募利其貨財皆虛名上簿止送出三津名在遠役身歸鄉里又懼本屬檢問於是逃亡他境僑戶之興良由此故又梁興以來發人征役號為三五及投募將客主將無恩存恤失理多有物故輒刺叛亡或有身殞戰場而名在叛目監符下討稱為逋叛録質家丁合家又叛則取同籍同籍又叛則取比伍比伍又叛則望村而取一人有犯則合村皆空雖肆眚時降蕩滌惟始而監符猶下舊日限以嚴程上不任信下轉相督促臺使到州州又遣押使至郡州郡競急切同趣下城令宰多庸才望風畏伏於是斂戶課薦其筐篚使人納重貨許立空文其百里微欲矯俗則嚴科立至自是所在恣意貪利以事上官又請斷界首將生口入北及關津廢替須加糾擲又言廬陵年少不宜鎮襄陽左僕射王暕在喪被起為吳郡曾無辭讓其言深刻又請復郊四星帝雖不能悉用然嘉其正直擢為豫章鍾陵令員外散騎常侍普通七年改南州津為南津校尉以祖深為之加雲騎將軍秩二千石使募部曲二千及至南州公嚴清刻由來王侯勢家出入津不忌憲綱俠藏亡命祖深搜檢姦惡不避強禦動致刑辟奏江州刺史邵陵王太子詹事周捨贓罪遠近側足莫敢縱恣淮南太守畏之如上府常服故布襦素木案食不過一肉有姥餉一早青瓜祖深報以匹帛後有富人效之以貨鞭而徇衆朝野憚之絶於干請所領皆精兵令行禁止有所討逐越境追禽江中嘗有賊祖深自率討之列陳未敢進仍令所親人先登不時進斬之遂大破賊威振遠近長江肅清論曰善政之於人猶良工之於埴也用功寡而成器多焉漢世戶口殷盛刑務簡闊郡縣之職外無橫擾勸賞威刑事多專斷尺一詔書希經邦邑吏居官者或長子孫皆敷德政以盡人和興義讓以存簡久故龔黃之化易以有成降及晚代情僞繁起人減昔時務殷前世立績垂風難易百倍若以上古之化御此世之人今吏之良撫前代之俗則武城弦歌將有未暇淮陽臥鎮如或可勉未必今才陋古蓋化有醇薄者也
