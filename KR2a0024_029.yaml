body:
  text: 南史卷二十九列傳第十九蔡廓子興宗孫約約弟撙曾孫凝蔡廓字子度濟陽考城人晉司徒謨之曾孫也祖系撫軍長史父綝司徒左西屬廓博涉羣書言行以禮起家著作佐郎後為宋武帝太尉參軍中書黃門郎以方鯁閑素為武帝所知載遷太尉從事中郎未拜遭母憂性至孝三年不櫛沐殆不勝喪宋臺建為侍中建議以為鞫獄不宜令子孫下辭明言父祖之罪虧教傷情莫此為大自今但令家人與囚相見無乞鞫之訴便足以明伏罪不須責家人下辭朝議從之世子左衞率謝靈運輒殺人御史中丞王准之坐不糾免官武帝以廓剛直補御史中丞多所糾奏百僚震肅時中書令傅亮任寄隆重學冠當時朝廷儀典皆取定於亮亮每事諮廓然後行亮意若有不同廓終不為屈遷司徒左長史出為豫章太守徵為吏部尚書廓因北地傅隆問亮選事若悉以見付不論不然不能拜也亮以語錄尚書徐羨之羨之曰黃門郎以下悉以委蔡吾徒不復厝懷自此以上故宜共參同異廓曰我不能為徐干木署紙尾遂不拜干木羨之小字也選案黃紙錄尚書與吏部尚書連名故廓言署紙尾也羨之亦以廓正直不欲使居權要徙為祠部尚書文帝入奉大統尚書令傅亮率百官奉迎廓亦俱行至尋陽遇疾不堪前亮將進路詣別廓謂曰營陽在吳宜厚加供奉一旦不幸卿諸人有殺主之名欲立於世將可得邪時亮已與羨之議害少帝乃馳信止之信至已不及羨之大怒曰與人共計云何裁轉背便賣惡於人及文帝即位謝晦將之荊州與廓別屏人問曰吾其免乎廓曰卿受先帝顧命任以社稷廢昏立明義無不可但殺人二昆而以之北面挾震主之威據上流之重以古推今自免為難也廓年位並輕而為時流所推重每至歲時皆束帶詣門奉兄軌如父家事大小皆諮而後行公祿賞賜一皆入軌有所資須悉就典者請焉從武帝在彭城妻郗氏書求夏服廓答書曰知須夏服計給事自應相供無容別寄時軌為給事中元嘉二年廓卒武帝常云羊徽蔡廓可平世三公少子興宗興宗字興宗幼為父廓所重謂有己風與親故書曰小兒四歲神氣似可不入非類室不與小人游故以興宗為之名以興宗為之字年十歲喪父哀毀有異凡童廓罷豫章郡還起二宅先成東宅以與兄軌軌罷長沙郡還送錢五十萬以裨宅直興宗年十一白母曰一家由來豐儉必共今日宅直不宜受也母悅而從焉軌深有愧色謂其子淡曰我年六十行事不及十歲小兒尋又喪母少好學以業尚素立見稱為中書侍郎中書令建平王宏侍中王僧綽並與之厚善元凶弒立僧綽被誅凶威方盛親故莫敢往興宗獨臨哭盡哀孝武踐阼累遷尚書吏部郎時尚書何偃疾患上謂興宗曰卿詳練清濁今以選事相付便可開門當之無所讓也後拜侍中每正言得失無所顧憚孝武新年拜陵興宗負璽陪乘及還上欲因以射雉興宗正色曰今致虔園陵情敬兼重從禽猶有餘日請待他辰上大怒遣令下車由是失旨竟陵王誕據廣陵為逆事平孝武輿駕出宣陽門敕左右文武叫稱萬歲興宗時陪輦帝顧曰卿獨不叫興宗從容正色答曰陛下今日政應涕泣行誅豈得軍中皆稱萬歲帝不悅興宗奉旨慰勞廣陵州別駕范義與興宗素善在城內同誅興宗至躬自收殯致喪還豫章舊墓上聞謂曰卿何敢故爾觸網興宗抗言答曰陛下自殺賊臣自葬周旋既犯嚴制政當甘於斧鉞耳帝有慚色又廬陵內史周朗以正言得罪鎖付寧州親戚故人無敢瞻送興宗時在直請急詣朗別上知尤怒坐屬疾多日白衣領職後為廷尉卿有解士先者告申坦昔與丞相義宣同謀時坦已死子令孫作山陽郡自繫廷尉興宗議曰若坦昔為戎首身今尚存累經肆眚猶應蒙宥令孫天屬理相為隱況人亡事遠追相誣訐斷以禮律義不合關見從出為東陽太守後為左戶尚書轉掌吏部時上方盛淫宴虐侮羣臣自江夏王義恭以下咸加穢辱唯興宗以方直見憚不被侵媟尚書僕射顏師伯謂儀曹郎王耽之曰蔡尚書常免昵戲去人實遠耽之曰蔡豫章昔在相府亦以方嚴不狎武帝宴私之日未嘗相召每至官賭常在勝朋蔡尚書今日可謂能負荷矣大明末前廢帝即位興宗告太宰江夏王義恭應須策文義恭曰建立儲副本為今日復安用此興宗曰累朝故事莫不皆然近永初之末營陽王即位亦有文策今在尚書可檢視也不從時義恭錄尚書受遺輔政阿衡幼主而引身避事政歸近習越騎校尉戴法興中書舍人巢尚之專制朝權威行近遠興宗職管九流銓衡所寄每至上朝輒與令錄以下陳欲登賢進士之意又箴規得失博論朝政義恭素性恇撓阿順法興慮失旨每聞興宗言輒戰懼無計先是大明世奢侈無度多所造立賦調煩嚴徵役過苦至是發詔悉皆削除由此紫極殿南北馳道之屬皆被毀壞自孝建以來至大明末凡諸制度無或存者興宗於都坐慨然謂顏師伯曰先帝雖非盛德要以道始終三年無改古典所貴今殯宮始撤山陵未遠而凡諸制度興造不論是非一皆刊削雖復禪代亦不至爾天下有識當以此窺人師伯不能用興宗每奏選事法興尚之等輒點定回換僅有存者興宗於朝堂謂義恭及師伯曰主上諒闇不親萬機選舉密事多被刪改非復公筆迹不知是何天子意王景文謝莊等遷授失序興宗又欲改為美選時薛安都為散騎常侍征虜將軍太子率殷為中庶子興宗先選安都為左衞將軍常侍如故殷為黃門領校太宰嫌安都為多欲單為左衞興宗曰率衞相去幾何之間且已失征虜非乃超越復奪常侍則頓為降貶若謂安都晚過微人本宜裁抑令名器不輕宜有選序謹依選體非私安都義恭曰若宮官宜加越授者殷便應侍中那得為黃門而已興宗又曰中庶侍中相去實遠且安都作率十年殷中庶百日今又領校不為少也使選令史顏禕之薛慶先等往復論執義恭然後署案既而中旨以安都為右衞加給事中由是大忤義恭及法興等出興宗為吳郡太守固辭又轉南東海太守又不拜苦求益州義恭於是大怒上表言興宗之失詔付外詳議義恭因使尚書令柳元景奏興宗及尚書袁愍孫私相許與自相選署亂羣害政混穢大猷於是除興宗新昌太守郡屬交州朝廷喧然莫不嗟駭先是興宗納何后寺尼智妃為妾姿貌甚美迎車已去而師伯密遣人誘之潛往載取興宗迎人不得及興宗被徙論者並言由師伯師伯甚病之法興等既不欲以徙大臣為名師伯又欲止息物議由此停行頃之法興見殺尚之被繫義恭師伯並誅復起興宗為臨海王子頊前軍長史南郡太守行荊州事不行時前廢帝凶暴興宗外甥袁顗為雍州刺史固勸興宗行曰朝廷形勢人情所見在內大臣朝夕難保舅今出居陝西為八州行事顗在襄沔地勝兵強去江陵咫尺水陸通便若一朝有事可共立桓文之功豈與受制凶狂禍難不測同年而語乎興宗曰吾素門平進與主上甚疎未容有患宮省內外既人不自保比者會應有變若內難得弭外釁未必可量汝欲在外求全我欲居內免禍各行所見不亦善乎時士庶危懼衣冠咸欲遠徙後皆流離外難百不一存重除吏部尚書太尉沈慶之深慮危禍閉門不通賓客嘗遣左右范羨詣興宗屬事興宗謂羨曰公關門絕客以避悠悠之請謁耳身非有求何為見拒羨復命慶之使要興宗興宗因說之曰主上比者所行人倫道盡今所忌憚唯在於公公威名素著天下所服今舉朝惶惶人懷危怖指撝之日誰不影從如其不斷旦暮禍及僕昔佐貴府蒙眷異常故敢盡言願思其計慶之曰僕比日前慮不復自保但盡忠奉國始終以之正當委天任命耳加老罷私門兵力頓闕雖有其意事亦無從興宗曰當今懷謀思奮者非復要富貴期功賞各欲救死朝夕耳殿內將帥正聽外間消息若一人唱首則俯仰可定況公威風先著統戎累朝諸舊部曲布在宮省誰敢不從僕在尚書中自當唱率百僚案前世故事更簡賢明以奉社稷又朝廷諸所行造人間皆言公悉豫之今若沉疑不決當有先公起事者公亦不免附惡之禍也且車駕屢幸貴第酣醉彌留又聞斥屏左右獨入閤內此萬世一時機不可失僕荷眷深重故吐去梯之言公宜詳其禍福慶之曰此事大非僕所能行事至政當抱忠以沒耳頓之慶之果以見忌致禍時領軍將軍王玄謨大將有威名邑里訛言玄謨當建大事或言已見誅玄謨典籤包法榮家在東陽興宗故郡人也為玄謨所信使至興宗間興宗謂曰領軍比日殊當憂懼法榮曰頃者殆不復食夜亦不眠言收已在門不保俄頃興宗因法榮勸玄謨舉事玄謨又使法榮報曰此亦未易可行其當不泄君語右衞將軍劉道隆為帝所寵信專統禁兵乘輿當夜幸著作佐郎江斅宅興宗乘馬車從道隆從車後過興宗謂曰劉公比日思一閑寫道隆深達此旨掐興宗手曰蔡公勿言時帝每因朝宴棰毆羣臣自驃騎大將軍建安王休仁以下侍中袁愍孫等咸見陵曳唯興宗得免頃之明帝定大事玄謨責所親故吏郭季產女壻韋希真等曰當艱難時周旋輩無一言相扣發者季產曰蔡尚書令包法榮所道非不會機但大事難行耳季產言亦何益玄謨有慚色當明帝起事之夜廢帝橫屍太醫閤口興宗謂尚書右僕射王景文曰此雖凶悖是天下之主宜使喪禮粗足若直如此四海必將乘人時諸方並舉兵反朝廷所保丹陽淮南數郡其間諸縣或已應賊東兵已至永世宮省危懼上集羣臣以謀成敗興宗曰宜鎮之以靜以至信待人比者逆徒親戚布在宮省若繩之以法則土崩立至宜明罪不相及之義上從之遷尚書右僕射尋領衞尉明帝謂興宗曰頃日人情言何事當濟不興宗曰今米甚豐賤而人情更安以此算之清蕩可必但臣之所憂更在事後猶羊公言既平之後方當勞聖慮耳尚書褚彥回以手板築興宗興宗言之不已上曰如卿言赭圻平函送袁顗首敕從登南掖門樓以觀之興宗口自本然流涕上不悅事平封興宗始昌縣伯固讓不許改封樂安縣伯國秩吏力終以不受時殷琰據壽陽為逆遣輔國將軍劉勔攻圍之四方既平琰嬰城固守上使中書為詔譬琰興宗曰天下既定是琰思順之日陛下宜賜手詔數行今直使中書為詔彼必疑非真不從琰得詔謂劉勔詐造果不敢降久乃歸順先是徐州刺史薛安都據彭城反後遣使歸發泰始二年冬遣鎮軍將軍張永率軍迎之興宗曰安都遣使歸順此誠不虛今不過須單使一人咫尺書耳若以重兵迎之勢必疑懼或能招引北虜為患不測時張永已行不見信安都聞大軍過淮果引魏軍永戰大敗遂失淮北四州其先見如此初永敗問至上在乾明殿先召司徒建安王休仁又召興宗謂休仁曰吾慚蔡僕射以敗書示興宗曰我愧卿三年出為郢州刺史初吳興丘珍孫言論常侵興宗珍孫子景先人才甚美興宗與之周旋及景先為鄱陽郡會晉安王子勛為逆轉在竟陵為吳喜所殺母老女幼流離夏口興宗至郢州親自臨哭致其喪柩家累皆得東還遷會稽太守領兵置佐加都督會稽多諸豪右不遵王憲幸臣近習參半宮省封略山湖妨人害政興宗皆以法繩之又以王公妃主多立邸舍子息滋長督責無窮啟罷省之幷陳原諸逋負解遣雜役並見從三吳舊有鄉射禮元嘉中羊玄保為吳郡行之久不復修興宗行之禮儀甚整明帝崩興宗與尚書令袁粲右僕射褚彥回中領軍劉勔鎮軍將軍沈攸之同被顧命以興宗為征西將軍開府儀同三司都督荊州刺史加班劍二十人被徵還都時右軍將軍王道隆任參國政權重一時躡履到興宗前不敢就席良久方去竟不呼坐元嘉初中書舍人秋當詣太子詹事王曇首不敢坐其後中書舍人弘興宗為文帝所愛遇上謂曰卿欲作士人得就王球坐乃當判耳殷劉並雜無所益也若往詣球可稱旨就席及至球舉扇曰君不得爾弘還依事啟聞帝曰我便無如此何至是興宗復爾道隆等以興宗強正不欲使擁兵上流改為中書監左光祿大夫開府儀同三司固辭不拜興宗行己恭恪光祿大夫北地傅隆與父廓善興宗常修父友之敬又太原孫敬玉嘗通興宗侍兒被禽反接興宗命與杖敬玉了無怍容興宗奇其言對命釋縛試以伎能高其筆札因以侍兒賜之為立室宇位至尚書右丞其遏惡揚善若此敬玉子廉仕梁以清能位至御史中丞興宗家行尤謹奉歸宗姑事寡嫂養孤兄子有聞於世太子左率王錫妻范聰明婦人也有才學書讓錫弟僧達曰昔謝太傅奉寡嫂王夫人如慈母今蔡興宗亦有恭和之稱其為世所重如此妻劉氏早卒一女甚幼外甥袁覬始生子彖而妻劉氏亦亡興宗姊即覬母也一孫一姪躬自撫養年齒相比欲為婚姻每見興宗輒言此意大明初詔興宗女與南平王敬猷婚興宗以姊生平之懷屢經陳啟帝答曰卿諸人欲各行己意則國家何由得婚且姊言豈是不可違之處邪舊意既乖彖亦他娶甚後彖家好不終顗又禍敗彖亦淪廢當時孤微理盡敬猷遇害興宗女無子嫠居名門高冑多欲結姻明帝亦敕適謝氏興宗並不許以女適彖泰豫元年卒年五十八遺命薄葬奉還封爵追贈後授子順固辭不受又奉表疏十餘上詔特申其請以旌克讓之風初興宗為郢州府參軍彭城顏敬以式卜曰亥年當作公官有大字者不可受也及有開府之授而太歲在亥果薨於光祿大夫云文集傳於子順字景玄方雅有父風位太尉從事中郎昇明末卒弟約約字景撝少尚宋孝武女安吉公主拜駙馬都尉仕齊累遷太子中庶子領屯騎校尉永明八年八月合朔約脫武冠解劍於省眠至下鼓不起為有司所奏贖論出為宜都王冠軍長史淮南太守行府州事武帝謂曰今用卿為近蕃上佐想副我所期約曰南豫密邇京師不化自理臣亦何人爝火不息時諸王行事多相裁割約居右任主佐之間穆如也遷司徒左長史齊明帝為錄尚書輔政百僚脫屐到席約躡屐不改帝謂江祏曰蔡氏是禮度之門故自可悅祏曰大將軍有揖客復見於今約好飲酒夷淡不與世雜永元二年卒於太子詹事年四十四贈太常弟撙撙字景節少方雅退默與第四兄寅俱知名仕齊位給事黃門侍郎丁母憂廬于墓側齊末多難服闋因居墓所除太子中庶子太尉長史並不就梁臺建為侍中遷臨海太守公事左遷太子中庶子復為侍中吳興太守初撙在臨海百姓楊元孫以婢采蘭貼與同里黃權約生子酬乳哺直權死後元孫就權妻吳贖婢母子五人吳背約不還元孫訴撙判還本主吳能為巫出入撙內以金釧賂撙妾遂改判與吳元孫撾登聞鼓訟之為有司劾時撙已去郡雖不坐而常以為恥口不言錢及在吳興不飲郡井齋前自種白莧紫茄以為常餌詔褒其清加信武將軍時帝將為昭明太子納妃意在謝氏袁昂曰當今貞素簡勝唯有蔡撙乃遣吏部尚書徐勉詣之停車三通不報勉笑曰當須我召也遂投刺乃入天監九年宣城郡吏吳承伯挾祅道聚衆攻宣城殺太守朱僧勇轉寇吳興吏人並請避之撙堅守不動命衆出戰摧破斬承伯餘黨悉平累遷吏部尚書在選弘簡有名稱又為侍中領祕書監武帝嘗謂曰卿門舊尚有堪事者多少撙曰臣門客沈約范岫各已被升擢此外無人約時為太子少傅岫為右衞將軍撙風骨鯁正氣調英嶷當朝無所屈讓嘗奏用琅邪王筠為殿中郎武帝嫌不取參掌通署乃推白牒於香橙地下曰卿殊不了事撙正色俯身拾牒起曰臣謂舉爾所知許允已有前事既是所知而用無煩參掌署名臣撙少而仕宦未嘗有不了事之目因捧牒直出便命駕而去仍欲抗表自解帝尋悔取事為畫帝嘗設大臣撙在坐帝頻呼姓名撙竟不答食如故帝覺其負氣乃改喚蔡尚書撙始放筯執笏曰爾帝曰卿向何聾今何聰對曰臣預為右戚且職在納言陛下不應以名垂喚帝有慚色性甚凝厲善自居適女為昭明太子妃自詹事以下咸來造謁往往稱疾相聞間遣之及其引進但暄寒而已此外無復餘言後為中書令卒於吳郡太守諡曰康子司空袁昂嘗謂諸賓曰自蔡侯卒不復更見此人其為名輩所知如此子彥深宣城內史彥深弟彥高給事黃門侍郎彥高子凝凝字子居美容止及長博涉經傳有文詞尤工草隸陳太建元年累遷太子中舍人以名公子選尚信義公主拜駙馬都尉中書侍郎遷晉陵太守及將之郡更令左右修中書廨宇謂賓友曰庶來者無勞尋授吏部侍郎凝年位未高而才地為時所重常端坐西齋自非素貴名流罕所交接趣時者多譏焉宣帝嘗謂凝曰我欲用義興主壻錢肅為黃門侍郎卿意如何凝正色曰帝鄉舊戚恩由聖旨則無所復問若格以僉議黃散之職故須人門兼美帝默然而止肅聞而不平義興公主日譖之尋免官遷交趾頃之追還後主嗣位為給事黃門侍郎後主嘗置酒歡甚將移宴弘範宮衆人咸從唯凝與袁憲不行後主曰何為凝曰長樂尊嚴非酒後所過臣不敢奉詔衆人失色後主曰卿醉矣令引出他日後主謂吏部尚書蔡徵曰蔡凝負地矜才無所用也尋遷信威晉熙王府長史鬱鬱不得志乃喟然歎曰天道有廢興夫子云樂天知命斯理庶幾可達因著小室賦以見志陳亡入隋道病卒年四十七子君知頗知名論曰蔡廓體業弘正風格峻舉興宗出內所踐不隕家聲位在具臣而情懷伊霍仁者有勇驗在斯乎然自廓及凝年移四代高風素氣無乏於時其所以取貴不徒然矣至於矜倨之失蓋其風俗所通格以正道故亦名教之深尤也
