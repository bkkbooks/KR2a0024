body:
  text: 南史卷五十九列傳第四十九江淹任昉王僧孺江淹字文通濟陽考城人也父康之南沙令雅有才思淹少孤貧常慕司馬長卿梁伯鸞之為人不事章句之學留情於文章早為高平檀超所知常升以上席甚加禮焉起家南徐州從事轉奉朝請宋建平王景素好士淹隨景素在南兗州廣陵令郭彥文得罪辭連淹言受金淹被繫獄自獄中上書曰昔者賤臣叩心飛霜擊於燕地庶女告天振風襲於齊臺下官每讀其書未嘗不廢卷流涕何者士有一定之論女有不易之行信而見疑貞而為戮是以壯夫義士伏死而不顧者以此也下官聞仁不可恃善不可依謂徒虛語乃今知之伏願大王暫停左右少加矜察下官本蓬戶桑樞之人布衣韋帶之士退不飾詩書以驚愚進不買聲名於天下日者謬得升降承明之闕出入金華之殿何嘗不局影凝嚴側身扃禁者乎竊慕大王之義復為門下之賓備鳴盜淺術之餘豫三五賤伎之末大王惠以恩光顧以顏色實佩荊卿黃金之賜竊感豫讓國士之分矣常欲結纓伏劍少謝萬一剖心摩踵以報所天不圖小人固陋坐貽謗缺迹墜昭憲身限幽圄履影弔心酸鼻痛骨下官聞虧名為辱虧形次之是以每一念來忽若有遺加以涉旬月迫季秋天光沈陰左右無色身非木石與獄吏為伍此少卿所以仰天捶心泣盡而繼之以血者也下官雖乏鄉曲之譽然嘗聞君子之行矣其上則隱於簾肆之間臥於巖石之下次則結綬金馬之庭高議雲臺之上退則虜南越之君係單于之頸俱啓丹册並圖青史寧爭分寸之末競錐刀之利哉下官聞積毀銷金積讒摩骨遠則直生取疑於盜金近則伯魚被名於不義彼之二才猶或如是況在下官焉能自免昔上將之恥絳侯幽獄名臣之羞史遷下室至如下官當何言哉夫以魯連之智辭祿而不反接輿之賢行歌而忘歸子陵閉關於東越仲蔚杜門於西秦亦良可知也若使下官事非其虛罪得其實亦當鉗口吞舌伏匕首以殞身何以見齊魯奇節之人燕趙悲歌之士乎方今聖歷欽明天下樂業青雲浮洛榮光塞河西洎臨洮狄道北距飛狐陽原莫不寖仁沐義照景飲醴而下官抱痛圜門含憤獄戶一物之微有足悲者仰惟大王少垂明白則梧丘之魂不愧於沈首鵠亭之鬼無恨於灰骨景素覽書即日出之尋舉南徐州秀才對策上第再遷府主簿景素為荊州淹從之鎮少帝即位多失德景素專據上流咸勸因此舉事淹每從容進諫景素不納及鎮京口淹為鎮軍參軍領南東海郡丞景素與腹心日夜謀議淹知禍機將發乃贈詩十五首以諷焉會東海太守陸澄丁艱淹自謂郡丞應行郡事景素用司馬柳世隆淹固求之景素大怒言於選部黜為建安吳興令及齊高帝輔政聞其才召為尚書駕部郎驃騎參軍事俄而荊州刺史沈攸之作亂高帝謂淹曰天下紛紛若是君謂何如淹曰昔項強而劉弱袁衆而曹寡羽卒受一劍之辱紹終為奔北之虜此所謂在德不在鼎公何疑哉帝曰試為我言之淹曰公雄武有奇略一勝也寬容而仁恕二勝也賢能畢力三勝也人望所歸四勝也奉天子而伐叛逆五勝也彼志鋭而器小一敗也有威無恩二敗也士卒解體三敗也搢紳不懷四敗也懸兵數千里而無同惡相濟五敗也雖豺狼十萬而終為我獲焉帝笑曰君談過矣桂陽之役朝廷周章詔檄久之未就齊高帝引淹入中書省先賜酒食淹素能飲啖食鵝炙垂盡進酒數升訖文誥亦辦相府建補記室參軍高帝讓九錫及諸章表皆淹製也齊受禪復為驃騎豫章王嶷記室參軍建元二年始置史官淹與司徒左長史檀超共掌其任所為條例並為王儉所駁其言不行淹任性文雅不以著述在懷所撰十三篇竟無次序又領東武令參掌詔策後拜中書侍郎王儉嘗謂曰卿年三十五已為中書侍郎才學如此何憂不至尚書金紫所謂富貴卿自取之但問年壽何如爾淹曰不悟明公見眷之重永明三年兼尚書左丞時襄陽人開古冢得玉鏡及竹簡古書字不可識王僧虔善識字體亦不能諳直云似是科斗書淹以科斗字推之則周宣王之前也簡殆如新少帝初兼御史中丞明帝作相謂淹曰君昔在尚書中非公事不妄行在官寬猛能折衷今為南司足以振肅百僚也淹曰今日之事可謂當官而行更恐不足仰稱明旨爾於是彈中書令謝朏司徒左長史王繢護軍長史庾弘遠並以託疾不預山陵公事又奏收前益州刺史劉悛梁州刺史陰智伯並贓貨巨萬輒收付廷尉臨海太守沈昭略永嘉太守庾曇隆及諸郡二千石並大縣官長多被劾內外肅然明帝謂曰自宋以來不復有嚴明中丞君今日可謂近世獨步纍遷祕書監侍中衛尉卿初淹年十三時孤貧常采薪以養母曾於樵所得貂蟬一具將鬻以供養其母曰此故汝之休徵也汝才行若此豈長貧賤也可留待得侍中著之至是果如母言永元中崔慧景舉兵圍都衣冠悉投名刺淹稱疾不往及事平時人服其先見東昏末淹以祕書監兼衛尉又副領軍王瑩及梁武至新林淹微服來奔位相國右長史天監元年為散騎常侍左衛將軍封臨沮縣伯淹乃謂子弟曰吾本素宦不求富貴今之忝竊遂至於此平生言止足之事亦以備矣人生行樂須富貴何時吾功名既立正欲歸身草萊耳以疾遷金紫光祿大夫改封醴陵伯卒武帝為素服舉哀諡曰憲淹少以文章顯晚節才思微退云為宣城太守時罷歸始泊禪靈寺渚夜夢一人自稱張景陽謂曰前以一匹錦相寄今可見還淹探懷中得數尺與之此人大恚曰那得割截都盡顧見丘遲謂曰餘此數尺既無所用以遺君自爾淹文章躓矣又嘗宿於冶亭夢一丈夫自稱郭璞謂淹曰吾有筆在卿處多年可以見還淹乃探懷中得五色筆一以授之爾後為詩絶無美句時人謂之才盡凡所著述自撰為前後集並齊史十志並行於世嘗欲為赤縣經以補山海之闕竟不成子蒍嗣任昉字彥升樂安博昌人也父遙齊中散大夫遙兄遐字景遠少敦學業家行甚謹位御史中丞金紫光祿大夫永明中遐以罪將徙荒裔遙懷名請訴言淚交下齊武帝聞而哀之竟得免遙妻河東裴氏高明有德行嘗晝臥夢有五色采旗蓋四角懸鈴自天而墜其一鈴落入懷中心悸因而有娠占者曰必生才子及生昉身長七尺五寸幼而聰敏早稱神悟四歲誦詩數十篇八歲能屬文自製月儀辭義甚美褚彥回嘗謂遙曰聞卿有令子相為喜之所謂百不為多一不為少由是聞聲藉甚年十二從叔晷有知人之量見而稱其小名曰阿堆吾家千里駒也昉孝友純至每侍親疾衣不解帶言與淚並湯藥飲食必先經口初為奉朝請舉兗州秀才拜太學博士永明初衛將軍王儉領丹陽尹復引為主簿儉每見其文必三復殷勤以為當時無輩曰自傅季友以來始復見於任子若孔門是用其入室升堂於是令昉作一文及見曰正得吾腹中之欲乃出自作文令昉點正昉因定數字儉拊几歎曰後世誰知子定吾文其見知如此後為司徒竟陵王記室參軍時琅邪王融有才俊自謂無對當時見昉之文恍然自失以父喪去官泣血三年杖而後起齊武帝謂昉伯遐曰聞昉哀瘠過禮使人憂之非直亡卿之寶亦時才可惜宜深相全譬遐使進飲食當時勉勵回即歐出昉父遙本性重檳榔以為常餌臨終嘗求之剖百許口不得好者昉亦所嗜好深以為恨遂終身不嘗檳榔遭繼母憂昉先以毀瘠每一慟絶良久乃蘇因廬於墓側以終喪禮哭泣之地草為不生昉素強壯腰帶甚充服闋後不復可識齊明帝深加器異欲大相擢引為愛憎所白乃除太子步兵校尉掌東宮書記齊明帝廢鬱林王始為侍中中書監驃騎大將軍開府儀同三司揚州刺史録尚書事封宣城郡公使昉具草帝惡其辭斥甚慍昉亦由是終建武中位不過列校昉尤長為筆頗慕傅亮才思無窮當時王公表奏無不請焉昉起草即成不加點竄沈約一代辭宗深所推挹永元中紆意於梅蟲兒東昏中旨用為中書郎謝尚書令王亮亮曰卿宜謝梅那忽謝我昉慚而退末為司徒右長史梁武帝剋建鄴霸府初開以為驃騎記室參軍專主文翰每制書草沈約輒求同署嘗被急召昉出而約在是後文筆約參製焉始梁武與昉遇竟陵王西邸從容謂昉曰我登三府當以卿為記室昉亦戲帝曰我若登三事當以卿為騎兵以帝善騎也至是引昉符昔言焉昉奉箋云昔承清宴屬有緒言提挈之旨形乎善謔豈謂多幸斯言不渝蓋為此也梁臺建禪讓文誥多昉所具奉世叔父母不異嚴親事兄嫂恭謹外氏貧闕營奉供養祿奉所收四方餉遺皆班之親戚即日便盡性通脫不事儀形喜慍未嘗形於色車服亦不鮮明武帝踐阼歷給事黃門侍郎吏部郎出為義興太守歲荒民散以私奉米豆為粥活三千餘人時産子者不舉昉嚴其制罪同殺人孕者供其資費濟者千室在郡所得公田奉秩八百餘石昉五分督一餘者悉原兒妾食麥而已友人彭城到溉溉弟洽從昉共為山澤遊及被代登舟止有絹七匹米五石至都無衣鎮軍將軍沈約遣裙衫迎之重除吏部郎參掌大選居職不稱尋轉御史中丞祕書監自齊永元以來祕閣四部篇卷紛雜昉手自讎校由是篇目定焉出為新安太守在郡不事邊幅率然曳杖徒行邑郭人通辭訟者就路決焉為政清省吏人便之卒於官唯有桃花米二十石無以為斂遺言不許以新安一物還都雜木為棺浣衣為斂闔境痛惜百姓共立祠堂於城南歲時祠之武帝聞問方食西苑緑沈瓜投之於盤悲不自勝因屈指曰昉少時常恐不滿五十今四十九可謂知命即日舉哀哭之甚慟追贈太常諡曰敬子昉好交結奬進士友不附之者亦不稱述得其延譽者多見升擢故衣冠貴遊莫不多與交好坐上客有數十時人慕之號曰任君言如漢之三君也在郡尤以清潔著名百姓年八十以上者遣戶曹掾訪其寒溫嘗欲營佛齋調楓香二石始入三斗便出教長斷曰與奪自己不欲貽之後人郡有蜜嶺及楊梅舊為太守所采昉以冒險多物故即時停絶吏人咸以百餘年未之有也為家誡殷勤甚有條貫陳郡殷藝與建安太守到溉書曰哲人云亡儀表長謝元龜何寄指南何託其為士友所推如此昉不事生産至乃居無室宅時或譏其多乞貸亦隨復散之親故常自歎曰知我者亦以叔則不知我者亦以叔則既以文才見知時人云任筆沈詩昉聞甚以為病晚節轉好著詩欲以傾沈用事過多屬辭不得流便自爾都下士子慕之轉為穿鑿於是有才盡之談矣博學於書無所不見家雖貧聚書至萬餘卷率多異本及卒後武帝使學士賀縱共沈約勘其書目官無者就其家取之所著文章數十萬言盛行於時東海王僧孺嘗論之以為過於董生揚子昉樂人之樂憂人之憂虛往實歸忘貧去吝行可以厲風俗義可以厚人倫能使貪夫不取懦夫有立其見重如此有子東里西華南容北叟並無術業墜其家聲兄弟流離不能自振生平舊交莫有收恤西華冬月著葛帔綀裙道逢平原劉孝標泫然矜之謂曰我當為卿作計乃著廣絶交論以譏其舊交曰客問主人曰朱公叔絶交論為是乎為非乎主人曰客奚此之問客曰夫草蟲鳴則阜螽躍雕虎嘯而清風起故氛氳相感霧涌雲蒸嚶鳴相召星流電激是以王陽登則貢公喜罕生逝而國子悲且心同琴瑟言鬱郁於蘭茝道叶膠漆志婉孌於塤篪聖賢以此鏤金板而鐫盤盂書玉牒而刻鍾鼎若乃匠石輟成風之妙巧伯牙息流波之雅引范張款款於下泉尹班陶陶於永夕駱驛從橫煙霏雨散巧歷所不知心計莫能測而朱益州汨彝粵謨訓捶直切絶交遊視黔首以鷹鸇媲人靈於豺虎蒙有猜焉請辨其惑主人聽然曰客所謂撫弦徽音未達燥濕變響張羅沮澤不睹鴻雁高飛蓋聖人握金鏡闡風烈龍驤蠖屈從道汙隆日月連璧贊亹亹之弘致雲飛雷薄顯棣華之微旨若五音之變化濟九成之妙曲此朱生得玄珠於赤水謨神睿以為言至夫組織仁義琢磨道德歡其愈樂恤其陵夷寄通靈臺之下遺迹江湖之上風雨急而不輟其音霜雪零而不渝其色斯賢達之素交歷萬古而一遇逮叔世人訛狙詐飈起溪谷不能踰其險鬼神無以究其變競毛羽之輕趨錐刀之末於是素交盡利交興天下蚩蚩鳥驚雷駭然利交同源派流則異較言其略有五術焉若其寵均董石權壓梁竇雕刻百工爐錘萬物吐嗽興雲雨呼吸下霜露九域聳其風塵四海疊其熏灼靡不望影星奔藉響川鶩雞人始唱鶴蓋成陰高門旦開流水接軫皆願摩頂至踵隳膽抽腸約同要離焚妻子誓殉荊卿湛七族是曰勢交其流一也富埒陶白資巨程羅山擅銅陵家藏金穴出平原而聯騎居里閈而鳴鐘則有窮巷之賓繩樞之士冀宵燭之末光邀潤屋之微澤魚貫鳧踊颯沓鱗萃分雁鶩之稻粱霑玉斝之餘瀝銜恩遇進款誠援青松以示心指白水而旌信是曰賄交其流二也陸大夫宴喜西都郭有道人倫東國公卿貴其籍甚搢紳羡其登仙加以顩頤蹙頞涕唾流沫騁黃馬之劇談縱碧雞之雄辨溫燠則寒谷成暄論嚴苦則春叢零葉飛沈出其顧指榮辱定其一言於是有弱冠王孫綺紈公子道不挂於通人聲未遒於雲閣攀其鱗翼丐其餘論附騏驥之旄端軼歸鴻於碣石是曰談交其流三也陽舒陰慘生靈大情憂合歡離品物性故魚以泉涸而詬沫鳥因將死而鳴哀同病相憐綴河上之悲曲恐懼置懷昭谷風之盛典斯則斷金由於湫隘刎頸起於苫蓋是以伍員濯溉於宰嚭張王撫翼於陳相是曰窮交其流四也馳鶩之俗澆薄之倫無不操權衡執纖纊衡所以揣其輕重纊所以屬其鼻息若衡不能舉纊不能飛雖顏冉龍翰鳳雛曾史蘭薰雪白舒向金玉泉海卿雲黼黻河漢視若遊塵遇同土梗莫肯費其半菽罕有落其一毛若衡重錙銖纊微彯撇雖共工之搜慝歡兜之掩義南荊之跋扈東陵之巨猾皆為匍匐委蛇折枝舐痔金膏翠羽將其意脂韋便辟導其誠故輪蓋所遊必非夷惠之室包苴所入實行張霍之家謀而後動芒豪寡忒是曰量交其流五也凡斯五交義同賈鬻故桓談譬之於闤闠林回諭之於甘醴夫寒暑遞進盛衰相襲或前榮而後悴或始富而終貧或初存而末亡或古約而今泰循環翻覆迅若波瀾此則徇利之情未嘗異變化之道不得一由是觀之張陳所以凶終蕭朱所以隙末斷焉可知矣而翟公方規規然勒門以針客何所見之晚乎然因此五交是生三釁敗德殄義禽獸相若一釁也難固易攜讎訟所聚二釁也名陷叨餮貞介所羞三釁也古人知三釁之為梗懼五交之速尤故王丹威子以檟楚朱穆昌言而示絶有旨哉有旨哉近世有樂安任昉海內髦傑早綰銀黃夙昭人譽遒文麗藻方駕曹王英跱俊邁聯衡許郭類田文之愛客同鄭莊之好賢見一善則盱衡扼腕遇一才則揚眉抵掌雌黃出其脣吻朱紫由其月旦於是冠蓋輻湊衣裳雲合輜車並擊轊坐客滿蹈其閫閾若升闕里之堂入其隩隅謂登龍門之坂至於顧眄增其倍價翦拂使其長鳴彯組雲臺者摩肩趨走丹墀者疊迹莫不締恩狎結綢繆想惠莊之清塵庶羊左之徽烈及瞑目東粵歸骸洛浦繐帳猶懸門罕漬酒之彥墳未宿草野絶動輪之賓藐爾諸孤朝不謀夕流離大海之南寄命瘴癘之地自昔把臂之英金蘭之友曾無羊舌下泣之仁寧慕郈成分宅之德嗚呼世路嶮一至於此太行孟門豈云絶是以耿介之士疾其若斯裂裳裹足棄之長鶩獨立高山之頂歡與麋鹿同羣曒曒然絶其氛濁誠恥之也誠畏之也到溉見其論抵几於地終身恨之昉撰雜傳二百四十七卷地記二百五十二卷文章三十三卷東里位尚書外兵郎王僧孺字僧孺東海郯人也魏衛將軍肅八世孫也曾祖雅晉左光祿大夫儀同三司祖準之宋司徒左長史父延年員外常侍未拜卒僧孺幼聰慧年五歲便機警初讀孝經問授者曰此書何所述曰論忠孝二事僧孺曰若爾願常讀之又有餽其父冬李先以一與之僧孺不受曰大人未見不容先嘗七歲能讀十萬言及長篤愛墳籍家貧常傭書以養母寫畢諷誦亦了仕齊為太學博士尚書僕射王晏深相賞好晏為丹陽尹召補功曹使撰東宮新記司徒竟陵王子良開西邸招文學僧孺與太學生虞羲丘國賓蕭文琰丘令楷江洪劉孝孫並以善辭藻遊焉而僧孺與高平徐夤俱為學林文惠太子欲以為宮僚乃召入直崇明殿會薨出為晉安郡丞仍除候官令建武初舉士為始安王遙光所薦除儀曹郎遷書侍御史出為錢唐令初僧孺與樂安任昉遇於竟陵王西邸以文學會友及將之縣昉贈詩曰唯子見知唯余知子觀行視言要終猶始敬之重之如蘭如芷形應影隨曩行今止百行之首立人斯著子之有之誰毀誰譽修名既立老至何遽誰其執鞭吾為子御劉略班藝虞志荀録伊昔有懷交相欣勗下帷無倦升高有屬嘉爾晨登惜余夜燭其為士友推重如此梁天監初除臨川王後軍記室待詔文德省出為南海太守南海俗殺牛曾無限忌僧孺至便禁斷又外國舶物高涼生口歲數至皆外國賈人以通貨易舊時州郡就市回而即賣其利數倍歷政以為常僧孺歎曰昔人為蜀部長史終身無蜀物吾欲遺子孫者不在越裝並無所取視事二歲聲績有聞詔徵將還郡中道俗六百人詣闕請留不許至拜中書侍郎領著作復直文德省撰起居注中表簿遷尚書左丞俄兼御史中丞僧孺幼貧其母鬻紗布以自業嘗攜僧孺至市道遇中丞鹵簿驅迫墜溝中及是拜日引騶清道悲感不自勝頃之即真時武帝制春景明志詩五百字敕沈約以下辭人同作帝以僧孺為工歷少府卿尚書吏部郎參大選請謁不行出為仁威南康王長史蘭陵太守行府州國事初帝問僧孺妾媵之數對曰臣室無傾視及在南徐州友人以妾寓之行還妾遂懷孕為王典籤湯道愍所糾逮詣南司坐免官久之不調友人廬江何炯猶為王府記室僧孺乃與炯書以見其意後為安成王參軍事鎮右中記室參軍僧孺工屬文善楷隸多識古事侍郎全元起欲注素問訪以砭石僧孺答曰古人當以石為針必不用鐵説文有此砭字許慎云以石刺病也東山經高氏之山多針石郭璞云可以為砭針春秋美疢不如惡石服子慎注云石砭石也季世無復佳石故以鐵代之爾轉北中郎咨議參軍入直西省知撰譜事先是尚書令沈約以為晉咸和初蘇峻作亂文籍無遺後起咸和二年以至于宋所書並皆詳實並在下省左戶曹前廂謂之晉籍有東西二庫此籍既並精詳實可寶惜位宦高卑皆可依案宋元嘉二十七年始以七條徵發既立此科人姦互起偽狀巧籍歲月滋廣以至于齊患其不實於是東堂校籍置郎令史以掌之競行姦貨以新換故昨日卑細今日便成士流凡此姦巧並出愚下不辨年號不識官階或注隆安在元興之後或以義熙在寧康之前此時無此府此時無此國元興唯有三年而猥稱四五詔書甲子不與長曆相應校籍諸郎亦所不覺不才令史固自忘言臣謂宋齊二代士庶不分雜役減闕職由於此竊以晉籍所餘宜加寶愛武帝以是留意譜籍州郡多離其罪因詔僧孺改定百家譜始晉太元中員外散騎侍郎平陽賈弼篤好簿狀乃廣集衆家大搜羣族所撰十八州一百一十六郡合七百一十二卷凡諸大品略無遺闕藏在祕閣副在左戶及弼子太宰參軍匪之匪之子長水校尉深世傳其業太保王弘領軍將軍劉湛並好其書弘日對千客不犯一人之諱湛為選曹始撰百家以助銓序而傷於寡略齊衛將軍王儉復加去取得繁省之衷僧孺之撰通范陽張等九族以代雁門解等九姓其東南諸族別為一部不在百家之數焉普通二年卒僧孺好墳籍聚書至萬餘卷率多異本與沈約任昉家書埒少篤志精力於書無所不覩其文麗逸多用新事人所未見者時重其富博集十八州譜七百一十卷百家譜集抄十五卷東南譜集抄十卷文集三十卷兩臺彈事不入集別為五卷及東宮新記並行於世虞羲字士光會稽餘姚人盛有才藻卒於晉安王侍郎丘國賓吳興人以才志不遇著書以譏揚雄蕭文琰蘭陵人丘令楷吳興人江洪濟陽人竟陵王子良嘗夜集學士刻燭為詩四韻者則刻一寸以此為率文琰曰頓燒一寸燭而成四韻詩何難之有乃與令楷江洪等共打銅鉢立韻響滅則詩成皆可觀覽劉孝孫彭城人博學通敏而仕多不遂常歎曰古人或開一説而致卿相立談間而降白璧書籍妄耳徐夤高平人有學行父榮祖位祕書監嘗有罪繫獄旦日原之而髮皓白齊武問其故曰臣思愆於內而髮變於外當時稱之論曰二漢求士率先經術近代取人多由文史觀江任之所以效用蓋亦會其時焉而淹實先覺加之以沈靜昉乃舊恩持之以內行其所以名位自畢各其宜乎僧孺碩學而中年遭躓非為不遇斯乃窮通之數也
