body:
  text: 南史卷十陳本紀下第十高宗孝宣皇帝諱頊字紹世小字師利始興昭烈王第二子也梁中大通二年七月辛酉生有赤光滿室少寬容多智略及長美容儀身長八尺三寸垂手過膝有勇力善騎射武帝平侯景鎮京口梁元帝徵武帝子姪入侍武帝遣帝赴江陵纍官為中書侍郎時有軍主李總與帝有舊每同游處帝嘗夜被酒張燈而寐總適出尋反乃見帝是大龍便驚走他室魏平江陵遷于長安帝貌若不慧魏將楊忠門客張子煦見而奇之曰此人虎頭當大貴也永定元年遙襲封始興郡王文帝嗣位改封安成王天嘉三年自周還授侍中中書監中衛將軍置佐史歷位司空尚書令廢帝即位拜司徒録尚書都督中外諸軍事光大二年正月進位太傅領司徒加殊禮劍履上殿十一月甲寅慈訓太后黜廢帝為臨海王以帝入纘皇統是月齊武成帝殂太建元年春正月甲午皇帝即位於太極前殿大赦改元文武賜位一階孝悌力田及為父後者賜爵一級魚衆寡不能自存者人賜穀五斛復太皇太后尊號曰皇太后立妃柳氏為皇后世子叔寶為皇太子封皇子江州刺史康樂侯叔陵為始興王奉昭烈王祀乙未謁太廟丁酉分命大使觀省四方風俗以尚書僕射沈欽為左僕射度支尚書王勱為右僕射辛丑祀南郊壬寅封皇子建安侯叔英為豫章王豐城侯叔堅為長沙王二月乙亥耕藉田夏五月甲午齊人來聘丁巳以吏部尚書徐陵為尚書右僕射秋七月辛卯皇太子納妃沈氏王公以下賜帛各有差冬十月新除左衛將軍歐陽紇據廣州反辛未遣開府儀同三司章昭達討之二年春二月癸未章昭達禽歐陽紇送都斬于建康市廣州平三月丙申皇太后崩丙午曲赦廣衡二州丁未大赦又詔自討周迪華皎以來兵所有死亡者並令收斂並給棺槥送還本鄉夏四月乙卯臨海王伯宗薨戊寅皇太后祔葬于萬安陵五月壬午齊人來弔六月戊子新羅國遣使朝貢辛卯大雨雹乙巳分遣大使巡州郡省寃屈冬十一月辛酉高麗國遣使朝貢十二月癸巳雷三年春正月癸丑以尚書右僕射徐陵為尚書僕射辛酉祀南郊二月辛巳祀明堂丁酉耕藉田三月丁丑大赦夏四月壬辰齊人來聘五月辛亥高麗新羅丹丹天竺盤盤等國並遣使朝貢六月丁亥江陰王蕭季卿以罪免甲辰封東中郎長沙王府咨議參軍蕭彝為江陰王冬十月乙酉周人來聘十二月壬辰司空章昭達薨四年春正月丙午以尚書僕射徐陵為左僕射中書監王勱為右僕射二月乙酉立皇子叔卿為建安王三月乙丑扶南林邑國並遣使朝貢夏五月癸卯尚書右僕射王勱卒是月周人誅冢宰宇文護秋八月辛未周人來聘九月庚子朔日有蝕之辛亥大赦丙寅以故太尉徐度儀同三司杜稜程靈洗配食武帝廟庭故司空章昭達配食文帝廟庭冬十一月己亥地震是歲周建德元年五年春正月癸酉以吏部尚書沈君理為尚書右僕射領吏部辛巳祀南郊二月辛丑祀明堂乙卯夜有白氣如虹自北方貫北斗紫宮三月壬午以開府儀同三司吳明徹都督征討諸軍事略地北邊丙戌西衡州獻馬生角己丑皇孫胤生內外文武賜帛各有差為父後者賜爵一級夏六月癸亥周人來聘秋九月癸未尚書右僕射沈君理卒壬辰晦夜明冬十月己亥以特進周弘正為尚書右僕射乙巳吳明徹剋壽陽城斬王琳傳首建鄴梟于朱雀航十二月壬辰詔熊曇朗留異陳寶應周迪鄧緒等及王琳首並還親屬以弘廣宥乙巳立皇子叔明為宜都王叔獻為河東王是歲諸軍略地所在剋捷六年春正月壬戌赦江右淮北諸州甲申周人來聘高麗國遣使朝貢二月壬辰朔日有蝕之辛亥耕藉田夏四月庚子彗星見六月壬辰尚書右僕射周弘正卒冬十一月乙亥詔北邊行軍之所並給復十年十二月戊戌以吏部尚書王瑒為尚書右僕射七年春正月辛未祀南郊三月辛未詔豫二兗譙徐合霍南司定九州及南豫江郢所部在江北諸郡置雲旗義士往大軍及諸鎮備防夏四月丙戌有星孛于大角庚寅監豫州陳桃根獻青牛詔以還百姓乙未桃根又上織成羅紋錦被表各二詔於雲龍門外焚之壬子郢州獻瑞鍾六六月丙戌詔為北行將士死王事者剋日舉哀壬辰以尚書右僕射王瑒為尚書僕射己酉改作雲龍神獸門秋八月癸卯周人來聘閏九月壬辰都督吳明徹大破齊軍於呂梁是月甘露頻降樂游苑丁未輿駕幸苑採甘露宴羣臣詔於苑龍舟山立甘露亭冬十月己巳立皇子叔齊為新蔡王叔文為晉熙王十二月壬戌以尚書僕射王瑒為左僕射太子詹事陸繕為右僕射甲子南康郡獻瑞鍾一八年春二月壬申以開府儀同三司吳明徹為司空夏五月庚寅尚書左僕射王瑒卒六月甲寅以尚書右僕射陸繕為左僕射新除晉陵太守王克為右僕射秋九月戊戌立皇子叔彪為淮南王九年春正月乙亥齊主傳位於其太子自號太上皇是月周滅齊二月壬子耕藉田秋七月己卯百濟國遣使朝貢庚辰大雨震萬安陵華表己丑震慧日寺剎及瓦官寺重門一女子震死冬十月戊午司空吳明徹破周將梁士彥於呂梁十二月戊申東宮成皇太子移于新宮十年春二月甲子周軍救梁士彥大敗司空吳明徹於呂梁及將卒皆見囚俘不反三月辛未震武庫丙子分命衆軍以備周乙酉大赦夏四月庚戌詔絓在軍者並賜爵二級又詔御府堂署所營造禮樂儀服軍器之外悉皆停息掖庭常供王侯妃主諸有奉恤者並各量減庚申大雨雹六月丁酉周武帝崩閏六月丁卯大雨震大皇寺剎莊嚴寺露盤重陽閣東樓千秋門內槐樹及鴻臚府門秋七月戊戌新羅國遣使朝貢八月戊寅隕霜殺稻菽九月乙巳立方明壇于婁湖戊申以揚州刺史始興王叔陵兼王官伯臨盟甲寅幸婁湖臨誓衆乙卯分遣大使以盟誓班下四方以上下相警冬十月戊子以尚書左僕射陸繕為尚書僕射十二月乙亥合州廬江蠻田伯興出寇樅陽刺史魯廣達討平之是歲周宣政元年十一年春正月丁酉南兗州言龍見二月癸亥耕藉田秋七月辛卯初用大貨六銖錢八月丁卯幸大壯觀閲武冬十月甲戌以尚書僕射陸繕為尚書左僕射以祠部尚書晉安王伯恭為右僕射十一月辛卯大赦戊戌周將梁士彥圍壽陽剋之辛亥又剋霍州癸丑以揚州刺史始興王叔陵為大都督總督水步衆軍十二月乙丑南北兗晉三州及盱眙山陽陽平馬頭秦歷陽沛北譙南梁等九郡民並自拔向建鄴周又剋譙北徐二州自是淮南之地盡歸于周矣己巳詔非軍國所須多所減損歸于儉約是歲周宣帝大象元年十二年夏四月癸亥尚書左僕射陸繕卒己卯大雩壬午雨五月癸巳以尚書右僕射晉安王伯恭為尚書僕射己酉周宣帝崩六月壬戌大風吹壞臯門中闥秋八月己未周鄖州總管司馬消難以所統九州八鎮之地來降詔因以消難為大都督加司空封隨郡公庚申詔鎮西將軍樊毅進督沔漢諸軍事遣南豫州刺史任忠率衆趨歷陽超武將軍陳慧紀為前軍都督趨南兗州戊辰以司空司馬消難為大都督水陸諸軍事庚午通直散騎常侍淳于陵剋臨江郡癸酉智武將軍魯廣達剋郭默城甲戌大雨霖丙子淳于陵剋祐州城九月癸未周臨江太守劉顯光率衆來降是夜天東南有聲如風水相激三夜乃止丁亥周將王延貴率衆援歷陽任忠擊破之禽延貴等己酉周廣陵義軍主曹藥率衆來降冬十月癸丑大雨震電十二月庚辰南徐州刺史河東王叔獻薨十三年春正月壬午以中權將軍護軍將軍鄱陽王伯山即本號開府儀同三司以尚書僕射晉安王伯恭為左僕射吏部尚書袁憲為右僕射二月乙亥耕藉田秋九月癸亥夜大風從西北來發屋拔樹大雨雹冬十月壬寅丹丹國遣使朝貢十二月辛巳彗星見西南是歲周靜帝大定元年遜位于隋文帝改元開皇元年十四年春正月己酉上弗豫甲寅崩于宣福殿時年五十三遺詔凡厥終制事從省約金銀之飾不以入壙明器皆用瓦以日易月及公除之制悉依舊準在位百司三日一臨四方州鎮五等諸侯各守所職並停奔赴二月辛卯羣臣上諡曰孝宣皇帝廟號高宗癸巳葬顯寧陵帝之在田本有恢弘之度及居尊位實允天人之屬于時國步初弭創痍未復淮南之地並入于齊帝志復舊境意反侵地強弱之形理則縣絶犯斯不韙適足為禽及周兵滅齊乘勝而舉略地還至江際自此懼矣既而修飾都城為扞禦之備獲銘云二百年後當有癡人修破吾城者時莫測所從云後主諱叔寶字元秀小字黃奴宣帝嫡長子也梁承聖二年十一月戊寅生于江陵明年魏平江陵宣帝遷于長安留後主於穰城天嘉三年歸建鄴立為安成王世子光大二年纍遷侍中太建元年正月甲午立為皇太子十四年正月甲寅宣帝崩乙卯始興王叔陵構逆伏誅丁巳太子即皇帝位于太極前殿大赦在位文武及孝悌力田為父後者並賜爵一級孤老魚衆寡不能自存者賜穀人五斛帛二匹癸亥以侍中丹陽尹長沙王叔堅為驃騎將軍開府儀同三司揚州刺史乙丑尊皇后為皇太后丁卯立皇弟叔重為始興王奉昭烈王祀己巳立妃沈氏為皇后辛未立皇弟叔儼為尋陽王叔慎為嶽陽王叔達為義陽王叔熊為巴山王叔虞為武昌王甲戌設無礙大會於太極前殿三月癸亥詔內外衆官九品以上各薦一人又詔求忠讜無所隱諱己巳以新除翊左將軍永陽王伯智為尚書僕射夏四月丙申立皇子永康公胤為皇太子賜天下為父後者爵一級王公以下賚帛各有差庚子詔鏤金銀薄庶物化生土木人綵華之屬及布帛短狹輕疏者並傷財廢業尤成蠹患又僧尼道士挾邪左道不依經律人間淫祀祅書諸珍怪事詳為條制並皆禁絶秋七月辛未大赦是月自建鄴至荊州江水色赤如血八月癸未天有聲如風水相激乙酉夜又如之九月丙午設無礙大會於太極前殿捨身及乘輿御服大赦辛亥夜天東北有聲如蟲飛漸移西北丙寅以驃騎將軍開府儀同三司揚州刺史長沙王叔堅為司空征南將軍江州刺史豫章王叔英即本號開府儀同三司至德元年春正月壬寅大赦改元以征南將軍江州刺史豫章王叔英為中衛大將軍以司空驃騎將軍開府儀同三司揚州刺史長沙王叔堅為江州刺史征東將軍開府儀同三司東揚州刺史司馬消難進號車騎將軍癸卯立皇子深為始安王秋八月丁卯以驃騎將軍開府儀同三司長沙王叔堅為司空九月丁巳天東南有聲如蟲飛冬十一月丁酉立皇弟叔平為湘東王叔敖為臨賀王叔宣為陽山王叔穆為西陽王叔儉為南安王叔澄為南郡王叔興為沅陵王叔韶為嶽山王叔純為新興王十二月丙辰頭和國遣使朝貢司空長沙王叔堅有罪免戊午夜天開自西北至東南其內有青黃雜色隆隆若雷聲二年春正月丁卯分遣大使巡省風俗癸巳大赦夏五月戊子以吏部尚書江總為尚書僕射秋七月壬午皇太子加元服在位文武賜帛各有差孝悌力田為父後者賜爵一級魚衆寡癃老不能自存者人穀五斛冬十一月丙寅大赦是月盤盤百濟國並遣使朝貢三年春正月戊午朔日有蝕之庚午鎮左將軍長沙王叔堅即本號開府儀同三司三月辛酉前豐州刺史章大寶舉兵反夏四月庚戌豐州義軍主陳景詳斬大寶傳首建鄴冬十月己丑丹丹國遣使朝貢十一月己未詔修復仲尼廟辛巳幸長干寺大赦十二月癸卯高麗國遣使朝貢是歲梁明帝殂四年春正月甲寅詔王公以下各薦所知無隔輿皂二月丙申立皇弟叔謨為巴東王叔顯為臨江王叔坦為新會王叔隆為新寧王夏五月丁巳立皇子莊為會稽王秋九月甲午幸玄武湖肄艫艦閲武丁未百濟國遣使朝貢冬十月癸亥以尚書僕射江總為尚書令吏部尚書謝胄為尚書僕射十一月己卯大赦禎明元年春正月戊寅大赦改元乙未地震秋九月庚寅梁太傅安平王蕭巖荊州刺史蕭瓛遣其都官尚書沈君公詣荊州刺史陳慧紀請降辛卯巖等帥其文武官男女濟江甲午大赦冬十一月丙子以蕭巖為平東將軍開府儀同三司東揚州刺史丁亥以驃騎大將軍開府儀同三司豫章王叔英為兼司徒十二月丙辰以前鎮衛大將軍開府儀同三司東揚州刺史鄱陽王伯山為鎮衛大將軍開府儀同三司二年春正月辛巳立皇子恮為東陽王恬為錢唐王夏四月戊申有羣鼠無數自蔡洲岸入石頭渡淮至于青塘兩岸數日自死隨流出江是月郢州南浦水黑如墨五月甲午東冶鑄鐵有物赤色大如數升自天墜鎔所有聲隆隆如雷鐵飛出牆外燒人家六月戊戌扶南國遣使朝貢庚子廢皇太子胤為吳興王立揚州刺史始安王深為皇太子辛丑以太子詹事袁憲為尚書僕射丁巳大風自西北激濤水入石頭城淮渚暴溢漂沒舟乘冬十月己亥立皇子藩為吳王己酉幸莫府山大校獵十一月丁卯詔剋日於大政殿訊獄丙子立皇弟叔榮為新昌王叔匡為太原王初隋文帝受周禪甚敦鄰好宣帝尚不禁侵掠太建末隋兵大舉聞宣帝崩乃命班師遣使赴弔修敵國之禮書稱姓名頓首而後主益驕書末云想彼統內如宜此宇宙清泰隋文帝不說以示朝臣清河公楊素以為主辱再拜請罪及襄邑公賀若弼並奮求致討後副使袁彥聘隋竊圖隋文帝狀以歸後主見之大駭曰吾不欲見此人每遣間諜隋文帝皆給衣馬禮遣以歸後主愈驕不虞外難荒于酒色不恤政事左右嬖佞珥貂者五十人婦人美貌麗服巧態以從者千餘人常使張貴妃孔貴人等八人夾坐江總孔範等十人預宴號曰狎客先令八婦人襞采箋製五言詩十客一時繼和遲則罰酒君臣酣飲從夕達旦以此為常而盛修宮室無時休止稅江稅市徵取百端刑罰酷濫牢獄常滿覆舟山及蔣山柏林冬月常多采醴後主以為甘露之瑞前後災異甚多有神自稱老子游於都下與人對語而不見形言吉凶多驗得酒輒釂之經三四年乃去船下有聲云明年亂視之得嬰兒長三尺而無頭蔣山衆鳥鼓兩翼以拊膺曰奈何帝奈何帝又建鄴城無故自壞青龍出建陽門井涌霧赤地生黑白毛大風拔朱雀門臨平湖草舊塞忽然自通後主又夢黃衣人圍城乃盡去繞城橘樹又見大蛇中分首尾各走夜中索飲忽變為血有血霑階至於坐牀頭而火起有狐入其牀下捕之不見以為祅乃自賣於佛寺為奴以禳之於郭內大皇佛寺起七層塔未畢火從中起飛至石頭燒死者甚衆又采木湘州擬造正寢至牛渚磯盡沒水中既而漁人見浮於海上起齊雲觀國人歌曰齊雲觀寇來無際畔始北齊末諸省官人多稱省主未幾而滅至是舉朝亦有此稱識者以為省主主將見省之兆隋文帝謂僕射高熲曰我為百姓父母豈可限一衣帶水不拯之乎命大作戰船人請密之隋文帝曰吾將顯行天誅何密之有使投柿於江若彼能改吾又何求及納梁蕭瓛蕭巖隋文愈忿以晉王廣為元帥督八十總管致討乃送璽書暴後主二十惡又散寫詔書書三十萬紙遍喻江外諸軍既下江濱鎮戍相繼奏聞新除湘州刺史施文慶中書舍人沈客卿掌機密並抑而不言初蕭巖蕭瓛之至也德教學士沈君道夢殿前長人朱衣武冠頭出欄上攘臂怒曰那忽受叛蕭誤人事後主聞之忌二蕭故遠散其衆以巖為東揚州刺史瓛為吳州刺史使領軍任忠出守吳興郡以襟帶二州使南平王嶷鎮江州永嘉王彥鎮南徐州尋召二王赴期明年元會命緣江諸防船艦悉從二王還都為威勢以示梁人之來者由是江中無一鬬船上流諸州兵皆阻楊素軍不得至都下甲士尚十餘萬人及聞隋軍臨江後主曰王氣在此齊兵三度來周兵再度至無不摧沒虜今來者必自敗孔範亦言無渡江理但奏伎縱酒作詩不輟三年春正月乙丑朔朝會大霧四塞入人鼻皆辛酸後主昏睡至晡時乃罷是日隋將賀若弼自北道廣陵濟韓擒趨橫江濟分兵晨襲采石取之進拔姑孰次於新林時弼攻下京口緣江諸戍望風盡走弼分兵斷曲阿之衝而入丙寅采石戍主徐子建至告變戊辰乃下詔曰犬羊陵縱侵竊郊畿𧔧蠆有毒宜時掃定朕當親御六師廓清八表內外並可戒嚴於是以蕭摩訶為皇畿大都督樊猛為上流大都督樊毅為下流大都督司馬消難施文慶並為大監軍重立賞格分兵鎮守要害僧尼道士盡皆執役庚午賀若弼攻陷南徐州辛未韓擒又陷南豫州隋軍南北道並進辛巳賀若弼進軍鍾山頓白土岡之東南衆軍敗績弼乘勝進軍宮城燒北掖門是時韓擒率衆自新林至石子岡鎮東大將軍任忠出降擒仍引擒經朱雀航趣宮城自南掖門入城內文武百司皆遁出唯尚書僕射袁憲後閣舍人夏侯公韻侍側憲勸端坐殿上正色以待之後主曰鋒刃之下未可及當吾自有計乃逃於井二人苦諫不從以身蔽井後主與爭久之方得入沈后居處如常太子深年十五閉閣而坐舍人孔伯魚侍焉戍士叩閣而入深安坐勞之曰戎旅在塗不至勞也既而軍人窺井而呼之後主不應欲下石乃聞叫聲以繩引之驚其太重及出乃與張貴妃孔貴人三人同乘而上隋文帝聞之大驚開府鮑宏曰東井上於天文為秦今王都所在投井其天意邪先是江東謠多唱王獻之桃葉辭云桃葉復桃葉度江不用楫但度無所苦我自接迎汝及晉王廣軍於六合鎮其山名桃葉果乘陳船而度丙戌晉王廣入據臺城送後主于東宮三月己巳後主與王公百司同發自建鄴之長安隋文帝權分京城人宅以俟內外修整遣使迎勞之陳人謳詠忘其亡焉使還奏言自後主以下大小在路五百里纍纍不絶隋文帝嗟歎曰一至於此及至京師列陳之輿服器物於庭引後主於前及前後二太子諸父諸弟衆子之為王者凡二十八人司空司馬消難尚書令江總僕射袁憲驃騎蕭摩訶護軍樊毅中領軍魯廣達鎮軍將軍任忠吏部尚書姚察侍中中書令蔡徵左衛將軍樊猛自尚書郎以上二百餘人文帝使納言宣詔勞之次使內史令宣詔讓後主後主伏地屏息不能對乃見宥隋文帝詔陳武文宣三帝陵總給五戶分守之初武帝始即位其夜奉朝請史普直宿省夢有人自天而下導從數十至太極殿前北面執玉策金字曰陳氏五帝三十二年及後主在東宮時有婦人突入唱曰畢國主有鳥一足集其殿庭以嘴畫地成文曰獨足上高臺盛草變為灰欲知我家處朱門當水開解者以為獨足蓋指後主獨行無衆盛草言荒穢隋承火運草得火而灰及至京師與其家屬館於都水臺所謂上高臺當水也其言皆驗或言後主名叔寶反語為少福亦敗亡之徵云既見宥隋文帝給賜甚厚數得引見班同三品每預宴恐致傷心為不奏吳音後監守者奏言叔寶云既無秩位每預朝集願得一官號隋文帝曰叔寶全無心肝監者又言叔常耽醉罕有醒時隋文帝使節其酒既而曰任其性不爾何以過日未幾帝又問監者叔寶所嗜對曰嗜驢肉問飲酒多少對曰與其子弟日飲一石隋文帝大驚及從東巡登芒山侍飲賦詩曰日月光天德山川壯帝居太平無以報願上東封書並表請封禪隋文帝優詔謙讓不許後從至仁壽宮常侍宴及出隋文帝目之曰此敗豈不由酒將作詩功夫何如思安時事當賀若弼度京口彼人密啓告急叔寶為飲酒遂不省之高熲至日猶見啓在牀下未開封此亦是可笑蓋天亡也昔苻氏所征得國皆榮貴其主苟欲求名不知違天命與之官乃違天也隋文帝以陳氏子弟既多恐京下為過皆分置諸州縣每歲賜以衣服以安全之後主以隋仁壽四年十一月壬子終於洛陽時年五十二贈大將軍封長城縣公諡曰煬葬河南洛陽之芒山論曰陳宣帝器度弘厚有人君之量文帝知冢嗣仁弱早存太伯之心及乎弗悆咸已委託矣至於纘業之後拓土開疆蓋德不逮文智不及武志大不已晚致呂梁之敗江左日蹙抑此之由也後主因削弱之餘鍾滅亡之運刑政不樹加以荒淫夫以三代之隆歷世數十及其亡也皆敗於婦人況以區區之陳外鄰明德覆車之跡尚且追蹤叔季其獲支數年亦為幸也雖忠義感慨致慟井隅何救麥秀之深悲適足取笑乎千祀嗟乎始梁末童謠云可憐巴馬子一日行千里不見馬上郎但見黃塵起黃塵汙人衣皂莢相料理及僧辨滅羣臣以謠言奏聞曰僧辨本乘巴馬以擊侯景馬上郎王字也塵謂陳也而不解皂莢之謂既而陳滅於隋說者以為江東謂羖羊角為皂莢隋氏姓楊楊羊也言終滅於隋然則興亡之兆蓋有數云
