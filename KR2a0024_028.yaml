body:
  text: 南史卷二十八列傳第十八褚裕之弟淡之玄孫球裕之兄子湛之湛之子彥回彥回子賁蓁蓁子向向子翔彥回弟澄從父弟照炫炫子澐澐子蒙蒙子玠褚裕之字叔度河南陽翟人晉太傅裒之曾孫也祖歆祕書監父爽金紫光祿大夫長兄秀之字長倩歷大司馬琅邪王從事中郎黃門侍郎宋武帝鎮西長史秀之妹晉恭帝后也秀之雖晉氏姻戚而盡心於武帝遷侍中出補大司馬右司馬晉恭帝即位為祠部尚書宋受命徙太常元嘉初卒於官秀之弟淡之字仲原亦歷顯官為宋武帝車騎從事中郎尚書吏部郎廷尉卿左衛將軍宋受命為侍中淡之兄弟並盡忠事武帝恭帝每生男輒令方便殺焉或誘賂內人或密加毒害前後如此非一及恭帝遜位居秣陵宮常懼見禍與褚后共止一室慮有鴆毒自煮食於前武帝將殺之不欲遣人入內令淡之兄弟視后褚后出別室相見兵人乃踰垣而入進藥於恭帝帝不肯飲曰佛教自殺者不得復人身乃以被掩殺之後會稽郡缺朝議欲用蔡廓武帝曰彼自是蔡家佳兒何關人事可用褚佛佛淡之小字也乃用淡之為會稽太守景平元年富陽孫氏聚合門宗謀逆其支黨在永興縣潛相影響永興令羊恂覺其謀以告淡之淡之不信乃以誣人之罪收縣職局於是孫法先自號冠軍大將軍與孫道慶等攻沒縣邑更相樹置遙以鄮令司馬文宣為征西大將軍建旗鳴鼓直攻山陰淡之自假陵江將軍以山陰令陸邵領司馬加振武將軍前員外散騎常侍王茂之為長史前國子博士孔欣前員外散騎常侍謝苓之並參軍事召行參軍七十餘人前鎮西咨議參軍孔寧子左光祿大夫孔季恭子山士並在艱中皆起為將軍遣隊主陳願郡議曹掾虞道納二軍過浦陽江願等戰敗賊遂推鋒而前去城二十餘里淡之遣陸邵水軍禦之而身率所領出次近郊邵與行參軍漏恭期合力大敗賊於柯亭淡之尋卒諡曰質子裕之名與武帝同故行字焉初為太宰琅邪王行參軍武帝車騎參軍司徒左西屬中軍咨議參軍署中兵加建威將軍從征鮮卑盡其誠力盧循攻查浦叔度力戰有功循南走武帝板行廣州刺史加督建威將軍領平越中郎將在任四年廣營資貨資財豐積坐免官禁錮終身還至都凡諸親舊及一面之款無不厚加贈遺尋除太尉咨議參軍相國右司馬武帝受命為右衛將軍武帝以其名家而能竭盡心力甚嘉之封番禺縣男尋加散騎常侍永初三年出為雍州刺史領寧蠻校尉在任三年以清簡致稱景平二年卒子恬之嗣恬之弟寂之著作佐郎早卒寂之子曖尚宋文帝第六女琅邪貞長公主位太宰參軍亦早卒曖子繢位太子舍人亦尚宋公主繢子球字仲寶少孤貧篤志好學有才思宋建平王景素元徽中誅滅唯有一女存故吏何昌寓王思遠聞球清立以此女妻之仕齊為溧陽令在縣清白資公奉而已仕梁歷都官尚書通直散騎常侍祕書監領著作司徒右長史常侍著作如故自魏孫禮晉荀組以後台佐加貂始自球也後為散騎常侍光祿大夫加給事中湛之字休玄秀之子也尚宋武帝第七女始安哀公主拜駙馬都尉著作佐郎哀公主薨復尚武帝第五女吳郡宣公主諸尚主者並因世胄不必皆有才能湛之謹實有意幹故為文帝所知歷顯位為太子中庶子司徒左長史侍中左衛將軍左戶尚書丹陽尹元凶弒逆以為吏部尚書復出為丹陽尹統石頭戍事孝武入伐劭自攻新亭壘使湛之率水師俱進湛之因攜二息彥回澄登輕舟南奔彥回始生一男為劭所殺孝武即位以為尚書右僕射孝建元年為中書令丹陽尹後拜尚書左僕射以南奔賜爵都鄉侯大明四年卒諡敬侯子彥回彥回幼有清譽宋元嘉末魏軍逼瓜步百姓咸負擔而立時父湛之為丹陽尹使其子弟並著芒屩於齊前習行或譏之湛之曰安不忘危也彥回時年十餘甚有慚色湛之有一牛至所愛無故墮聽事前井湛之率左右躬自營救之郡中喧擾彥回下簾不視也又有門生盜其衣彥回遇見謂曰可密藏之勿使人見此門生慚而去不敢復還後貴乃歸罪待之如初尚宋文帝女南郡獻公主拜駙馬都尉除著作佐郎纍遷祕書丞湛之卒彥回悉推財與弟澄唯取書數千卷湛之有兩寶物在彥回所生郭氏間嫡母吳郡主求之郭欲不與彥回曰但令彥回在何患無物猶不許彥回流涕固請乃從之襲爵都鄉侯歷位尚書吏部郎景和中山陰公主淫恣窺見彥回悅之以白帝帝召彥回西上閣宿十日公主夜就之備見逼迫彥回整身而立從夕至曉不為移志公主謂曰君鬚髯如戟何無丈夫意彥回曰回雖不敏何敢首為亂階宋明帝即位纍遷吏部尚書有人求官密袖中將一餅金因求請間出金示之曰人無知者彥回曰卿自應得官無假此物若必見與不得不相啓此人大懼收金而去彥回其事而不言其名時人莫之知也帝之在蕃與彥回以風素相善至是深相委仗陳事皆見從改封雩都伯歷侍中領尚書右衛將軍彥回美儀貌善容止俯仰進退咸有風則每朝會百僚遠國使莫不延首目送之明帝嘗嘆曰褚彥回能遲行緩步便得宰相矣時人以方何平叔嘗聚袁粲舍初秋涼夕風月甚美彥回援琴奏別鵠之曲宮商既調風神諧暢王彧謝莊並在粲坐撫節而歎曰以無纍之神合有道之器宮商暫離不可得已時傖人常珍奇與薛安都為逆降叛非一後又求降明帝加以重位彥回謂全其首領於事已弘不足大加寵異帝不從珍奇尋又叛彥回後為吳興太守帝寢疾危殆馳使召之欲託後事及至召入帝坐帳中流涕曰吾近危篤故召卿欲使著黃羅指牀頭大函曰文書皆函內置此函不得復開彥回亦悲不自勝黃羅乳母服也帝雖小間猶懷身後慮建安王休仁人才令美物情宗向帝與彥回謀誅之彥回以為不可帝怒曰卿癡不足與議事彥回懼而奉旨復為吏部尚書衛尉卿尚書右僕射以母老疾晨昏須養辭衛尉不許明帝崩遺詔以為中書令護軍將軍與尚書令袁粲受顧命輔幼主粲等雖同見託而意在彥回彥回同心理事務弘儉約百姓賴之既而王道隆阮佃夫用事姦賂公行彥回不能禁也遭所生喪毀頓不復可識朞年不盥櫛唯泣淚處乃見其本質焉詔斷哭禁弔客葬畢起為中軍將軍本官如故元徽二年桂陽王休範反彥回與衛將軍袁粲入衛宮省鎮集衆心彥回初為丹陽與從弟照同載道逢齊高帝彥回舉手指高帝車謂照曰此非常人也出為吳興高帝餉物別彥回又語人曰此人才貌非常將來不可測也及顧命之際引高帝豫焉高帝既平桂陽遷中領軍領南兗州高帝固讓與彥回及衛軍袁粲書陳情彥回粲答書不從高帝乃受命其年加彥回尚書令侍中給班劍二十人固讓令三年進爵為侯服闋改授中書監侍中護軍如故給鼓吹一部時淮北屬江南無復鰒魚或有間關得至者一枚直數千錢人有餉彥回鰒魚三十枚彥回時雖貴而貧薄過甚門生有獻計賣之云可得十萬錢彥回變色曰我謂此是食物非曰財貨且不知堪賣錢聊爾受之雖復儉乏寧可賣餉取錢也悉與親游噉之少日便盡明年嫡母吳郡公主薨毀瘠骨立葬畢詔攝職固辭又以朞祭禮及表解職並不許蒼梧暴虐稍甚齊高帝與彥回及袁粲言世事粲曰主上幼年微過易改伊霍之事非季世所行縱使功成亦終無全地彥回默然歸心高帝及廢蒼梧羣公集議袁粲劉彥節既不受任彥回曰非蕭公無以了此手取事授高帝高帝曰相與不肯我安得辭事乃定順帝立改號衛將軍開府儀同三司侍中如故甲仗五十人入殿及袁粲懷二曰褚公眼睛多白所謂白虹貫日亡宋者終此人也他日粲謂彥回曰國家所倚唯公與劉丹陽及粲耳願各自勉無使竹帛所笑彥回曰願以鄙心寄公之腹則可矣然竟不能貞固及高帝輔政王儉議加黃鉞任遐曰此大事應報褚公帝曰褚脫不與卿將何計遐曰彥回保妻子愛性命非有奇才異節遐能制之果無違異及沈攸之事起高帝召彥回謀議彥回曰西夏釁難事必無成公當先備其內耳高帝密為其備事平進中書監司空齊臺建彥回白高帝引何曾自魏司徒為晉丞相求為齊官高帝謙而不許建元元年進位司徒侍中中書監如故改封南康郡公彥回讓司徒乃與僕射王儉書欲依蔡謨事例儉以非所宜言勸彥回受命終不就尋加尚書令二年重申前命為司徒又固讓魏軍動高帝欲發王公以下無官者從軍彥回諫以為無益實用空致擾動上乃止三年七月帝親嘗酎盛暑欲夜出彥回與左僕射王儉諫以為自漢宣帝以來不夜入廟所以誡非常人君之重所宜克慎從之時朝廷機事彥回多與議謀每見從納禮遇甚重上大宴集酒後謂朝臣曰卿等並宋時公卿亦當不言我應得天子王儉等未及答彥回斂板曰陛下不得言臣不早識龍顏上笑曰吾有愧文叔知公為朱祐久矣彥回善彈琵琶齊武帝在東宮宴集賜以金鏤柄銀柱琵琶性和雅有器度不妄舉動宅嘗失火煙爓甚逼左右驚擾彥回神色怡然索輿徐去然世頗以名節譏之于時百姓語曰可憐石頭城寧為袁粲死不作彥回生高帝崩遺詔以為録尚書事江左以來無單拜録者有司疑立優策尚書令王儉議以為見居本官別拜録應有策書而舊事不載中朝以來三公王侯則優策並設官品第二策而不優優者褒美策者兼明委寄尚書職居天官政化之本故尚書令品雖第三拜必有策録尚書品秩不見而總任彌重前代多與本官同拜故不別有策即事緣情不容均之凡僚宜有策書用申隆寄既異王侯不假優文從之尋增彥回班劍三十人五日一朝頃之寢疾彥回少時嘗篤病夢人以卜蓍一具與之遂差其一至是年四十八矣歲初便寢疾而太白熒惑相係犯上將彥回慮不起表遜位武帝不許乃改授司空驃騎將軍侍中録尚書事如故薨年四十八家無餘財負責數十萬詔給東園祕器時司空掾屬以彥回未拜疑應為吏敬以不王儉議依禮婦在塗聞夫家喪改服而入今掾屬雖未服勤而吏節稟於天朝宜申禮敬司徒府史又以彥回既解職而未恭後授府應上服以不儉又議依中朝士孫德祖從樂陵遷為陳留未入境卒樂陵郡吏依見君之禮陳留迎吏依聚女有吉日齎衰弔司徒府宜依居官制服又詔贈太宰侍中録尚書公如故增班劍為六十人葬送禮悉依宋太保王弘故事諡曰文簡先是庶姓三公車未有定格王儉議官品第一皆加幢絡自彥回始也又詔彥回妻宋故巴西主埏要暫啓宜贈南康郡公夫人長子賁字蔚先少耿介父背袁粲等附高帝賁深執不同終身愧恨之有棲退之志位侍中彥回薨服闋見武帝賁流涕不自勝上甚嘉之以為侍中領步兵校尉左戶尚書常謝病在外上以此望之遂諷令辭爵讓與弟蓁仍居墓下及王儉薨乃騎水牛出弔以繫門外柱入哭盡哀而退家人不知也會疾篤其子霽載以歸疾小間知非故處大怒不肯復飲食內外閣悉釘塞之不與人相聞數日裁餘氣息謝𦵩聞其弊往候之排閣不可開以杵捶破進見賁曰事之不可得者身也身之不可全者名也名與身俱滅者君也豈不全之哉賁曰吾少無人間心豈身名之可慕但願啓手歸全必在舊隴兒輩不才未達余趣移尸徙殯失吾素心更以此為恨耳永明七年卒蓁字茂緒位義興太守八年改封巴東郡公明年表讓封還賁子霽詔許之建武末蓁位太子詹事度支尚書領前軍將軍永元元年卒贈太常諡穆子蓁子向字景政年數歲父母相繼亡沒哀毀若成人親表異之及長淹雅有器量位長兼侍中向風儀端麗眉目如畫每公庭就列為衆所瞻望焉仕梁卒於北中郎廬陵王長史子翔翔字世舉起家祕書郎纍遷宣城王主簿中大通五年梁武帝宴羣臣樂游苑別詔翔與王訓為二十韻詩限三刻成翔於坐立奏帝異焉即日補宣城王文學俄遷友時宣城友文學加正王二等翔超為之時論美焉出為義興太守在政潔己省繁苛去游費百姓安之郡西亭有古樹積年枯死翔至郡忽更生枝葉咸以為善政所感以秩滿吏人詣闕請之敕許焉尋徵為吏部郎去郡百姓無老少追送出境涕泣拜辭翔居小選公清不為請屬易意號為平允遷侍中太清二年守吏部尚書丁母憂以毀卒翔少有孝行為侍中時母病篤請沙門祈福中夜忽見戶外有異光又聞空中彈指及旦疾遂愈咸以為精誠所致云澄字彥道彥回弟也初湛之尚始安公主薨納側室郭氏生彥回後尚吳郡主生澄彥回事主孝謹主愛之湛之亡主表彥回為嫡澄尚宋文帝女廬江公主拜駙馬都尉歷官清顯善醫術建元中為吳郡太守百姓李道念以公事到郡澄見謂曰汝有重疾答曰舊有冷疾至今五年衆醫不差澄為診脈謂曰汝病非冷非熱當是食白瀹雞子過多所致令取蘇一升煮服之始一服乃吐出一物如升涎裹之動開看是雞雛羽翅爪距具足能行走澄曰此未盡更服所餘藥又吐得如向者雞十三頭而病都差當時稱妙豫章王感病高帝召澄為療立愈尋遷左戶尚書彥回薨澄以錢一萬一千就招提寺贖高帝所賜彥回白貂坐褥壞作裘及又贖彥回介幘犀導及彥回常所乘黃牛永明元年為御史中丞袁彖所奏免官禁錮見原遷侍中領右軍將軍以勤謹見知澄女為東昏皇后永元元年卒追贈金紫光祿大夫照字彥宣彥回從父弟也父法顯鄱陽太守照少有高節王儉嘗稱才堪保傅為安成郡還以一目眇召為國子博士不拜常非彥回身事二代彥回子賁往問訊照照問曰司空今日何在賁曰奉璽紱在齊大司馬門照正色曰不知汝家司空將一家物與一家亦復何謂彥回拜司徒賓客滿坐照歎曰彥回少立名行何意披猖至此門戶不幸乃復有今日之拜使彥回作中書郎而死不當是一名士邪名德不昌遂有期頤之壽彥回性好戲以軺車給之照大怒曰著此辱門戶那可令人見索火燒之馭人奔車乃免照弟炫炫字彥緒少清簡為從舅王景文所知從兄彥回謂人曰從弟廉勝獨立乃十倍於我為正員郎從宋明帝射雉帝至日中無所得甚猜羞召問侍臣曰吾旦來如臯遂空行可笑坐者莫答炫獨曰今節候雖適而雲霧尚凝故斯翬之禽驕心未警但得神駕游豫羣情便可載歡帝意解乃於雉場置酒遷中書侍郎司徒右長史升明初炫以清尚與彭城劉俁陳郡謝朏濟陽江斆入殿侍文義號為四友齊臺建為侍中領步兵校尉以家貧建元初出補東陽太守前後三為侍中與從兄彥回操行不同故彥回之世不至大官永明元年為吏部尚書炫居身清立非弔問不雜交游論者以為美及在選部門庭蕭索賓客罕至出行左右常捧一黃紙帽箱風吹紙剝殆盡罷江夏郡還得錢十七萬於石頭並分與親族病無以市藥以冠劍為質表自陳解改授散騎常侍領安成王師國學建以本官領博士未拜卒無以殯斂時年四十一贈太常諡貞子子澐澐字士洋仕梁為曲阿令歷晉安王中録事正員郎烏程令兄游亡棄縣還為太尉屬延陵令中書侍郎太子率更令御史中丞湘東王府咨議參軍卒澐之為縣令清慎可紀好學解音律重賓客雅為湘東王所親愛澐子蒙位太子舍人蒙子玠玠字溫理九歲而孤為叔父驃騎從事中郎隨所養早有令譽先達多以才器許之及長美風儀善占對博學能屬文詞義典實不尚淫靡陳天嘉中兼通直散騎常侍聘齊還遷中書侍郎太建中山陰縣多豪猾前後令皆以贓污免宣帝謂中書舍人蔡景歷曰稽陰大邑久無良宰卿文士之內試思其人景歷進玠帝曰甚善卿言與朕意同乃除山陰令縣人張次的王休達等與諸猾吏賄賂通姦全丁大戶類多隱沒玠鎖次的等具狀啓臺宣帝手敕慰勞並遣使助玠搜括所出軍人八百餘戶時舍人曹義達為宣帝所寵縣人陳信家富諂事義達信父顯文恃勢橫暴玠乃遣使執顯文鞭之一百於是吏人股栗信後因義達譖玠竟坐免官玠在任歲餘守祿俸而已去官之日不堪自致因留縣境種蔬菜以自給或以玠非百里才玠曰吾委輸課最不後列城除殘去暴姦吏局蹐若謂其不能自潤脂膏則如來命以為不達從政吾未服也時人以為信然皇太子知玠無還裝手書賜粟米二百斛於是還都後纍遷御史中丞玠剛毅有膽決善騎射嘗從司空侯安都於徐州出獵遇猛獸玠射之載發皆中口入腹俄而獸斃及為御史中丞甚有直繩之稱卒於官皇太子親製志銘以表惟舊至德二年贈祕書監所製章奏雜文二百餘篇皆切事理由是見重於世子亮位尚書殿中侍郎論曰褚氏自至江左人焉不墜彥回以此世資時譽早集及於逢迎興運謗議沸騰既以人望見推亦以人望而責也照貞徑之性炫廉勝之風求之古人亦何以加此玠公平諒直文武兼資可謂世業無隕者矣
