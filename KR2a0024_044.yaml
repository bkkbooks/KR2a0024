body:
  text: 南史卷四十四列傳第三十四齊武帝諸子文惠諸子明帝諸子武帝二十三男穆皇后生文惠太子竟陵文宣王子良張淑妃生廬陵王子卿魚復侯子響周淑儀生安陸王子敬建安王子真阮淑媛生晉安王子懋衡陽王子峻王淑儀生隨郡王子隆蔡婕妤生西陽王子明樂容華生南海王子罕傅充華生巴陵王子倫謝昭儀生邵陵王子貞江淑儀生臨賀王子岳庾昭容生西陽王子文荀昭華生南康王子琳顏婕妤生永陽王子珉宮人謝生湘東王子建何充華生南郡王子夏第六第十二第十五第二十二皇子早亡子珉繼衡陽元王後文惠皇太子長懋字雲喬小字白澤武帝長子也武帝年未弱冠而生太子姿容豐美為高帝所愛宋元徽末除祕書郎不拜板輔國將軍遷晉熙王撫軍主簿事寧武帝遣太子還都高帝方創霸業心存嫡嗣謂太子曰汝還吾事辦矣處之府東齋令通文武賓客謂荀伯玉曰我出行日城中軍悉受長懋節度我雖不行內外直防及諸門甲兵悉令長懋時時履行轉祕書丞以與宣帝諱同不就歷中書黃門侍郎昇明三年高帝將受禪以襄陽兵馬重鎮不欲處他族出太子為雍州刺史加都督北中郎將寧蠻校尉建元元年封南郡王江左嫡皇孫封王始自此也先是梁州刺史范柏年頗著威名沈攸之事起候望形勢事平朝廷遣王玄邈代之玄邈已至柏年遲回魏興不肯下太子慮其為變乃遣說之許啟為府長史及至襄陽因執誅之二年徵為侍中中軍將軍置府鎮石頭穆妃薨成服日車駕出臨喪朝議疑太子應出門迎左僕射王儉曰尋禮記服問君所主夫人妻太子嫡婦言國君為此三人為主喪也今鑾輿臨降自以主喪而至雖因事撫慰義不在弔南郡以下不應出門奉迎但尊極所臨禮有變革權去杖絰移立戶外足表情敬無煩止哭皇太子既一宮之主自應以車駕幸宮依常奉候既當成服之日吉凶不相干宜以衰幘行事望拜止哭率由舊章尊駕不以臨弔奉迎則惟常體求之情禮如為可安又其年九月有閏小祥疑應計閏儉又議以為三百六旬尚書明義文公納幣春秋致譏故先儒朞喪歲數沒閏大功以下月數數閏所以吳商云含閏以正朞允協情理沒閏之理固在言先並從之武帝即位為皇太子初高帝好左氏春秋太子承旨諷誦以為口實及正位東儲善立名尚解聲律工射飲酒至數斗而未嘗舉盃從容有風儀音韻和辯引接朝士人人自以為得意文武士多所招集會稽虞炎濟陽范岫汝南周顒陳郡袁廓並以學行才能應對左右而武人略陽垣歷生襄陽蔡道貴拳勇秀出當時以比關羽張飛其餘安定梁天惠平原劉孝慶河東王世興趙郡李居士襄陽黃嗣祖魚文康絢之徒並為後來名將永明三年於崇正殿講孝經少傅王儉令太子僕周顒撰為義疏五年冬太子臨國學親臨策試諸生於坐問少傅王儉曲禮云無不敬義儉及竟陵王子良等各有酬答太子又以此義問諸學生謝幾卿等一十人並以筆對太子問王儉周易乾卦本施天位而說卦云帝出乎震震本非天義豈當相主儉曰乾健震動天以運為德故言帝出乎震儉又諮太子孝經仲尼居曾子侍義臨川王映諮孝為德本義太子並應機酬答甚有條貫明年上將訊丹陽所領囚及南北二百里內獄詔太子於玄圃園宣猷堂錄三署囚原宥各有差上晚年好游宴尚書曹事亦分送太子省視太子與竟陵王子良俱好釋氏立六疾館以養窮人而性頗奢麗宮內殿堂皆雕飾精綺過於上宮開拓玄圃園與臺城北塹等其中起出土山池閣樓觀塔宇窮奇極麗費以千萬多聚異石妙極山水慮上宮中望見乃旁列修竹外施高鄣造游牆數百間施諸機巧宜須鄣蔽須臾成立若應毀撤應手遷徙製珍玩之物織孔雀毛為裘光采金翠過於雉頭遠矣以晉明帝為太子時立西池乃啟武帝引前例求於東田起小苑上許之永明中二宮兵力全實太子使宮中將吏更番築役營城包巷制度之盛觀者傾都上性雖嚴太子所為無敢啟者後上幸豫章王宅還過太子東田見其彌亘華遠壯麗極目於是大怒收監作主帥太子懼皆藏之由是見責太子素疾體又過壯常在宮內簡於遨遊玩弄羽儀多所僭擬雖咫尺宮禁而上終不知又使徐文景造輦及乘輿御物虎賁雲罕之屬上嘗幸東宮怱怱不暇藏輦文景乃以佛像內輦中故上不疑文景父陶仁時為給事中謂文景曰終當滅門政當掃墓待喪耳及移家避之其後文景竟賜死陶仁遂不哭時人以為有古人風十年豫章王嶷薨太子見上友于既至造碑文奏之未及鐫勒十一年春正月太子有疾上自臨視有憂色疾篤上表告辭薨于東宮崇明殿時年三十六太子年始過立久在儲宮得參政事內外百司私咸謂旦暮繼體及薨朝野驚惋焉上幸東宮臨哭盡哀詔斂以袞冕之服諡曰文惠葬崇安陵有司奏御服朞朝臣齊衰三月南郡國臣齊衰朞臨汝曲江國臣並不服六宮不從服武帝履行東宮見太子服玩過制大怒敕有司隨事毀除以東田殿堂處為崇虛館鬱林立追尊為文帝廟稱世宗初太子惡明帝密謂竟陵王子良曰我意色中殊不悅此人當由其福德薄所致子良便苦救解後明帝立果大相誅害竟陵文宣王子良字雲英武帝第二子也幼聰敏武帝為贛縣時與裴后不諧遣人船送后還都已登路子良時年小在庭前不悅帝謂曰汝何不讀書子良曰孃今何處何用讀書帝異之即召后還縣仕宋為邵陵王友時宋道衰謝諸王微弱故不廢此官昇明三年為會稽太守都督五郡封聞喜公宋元嘉中凡事皆責成郡縣孝武後徵求急速以郡縣遲緩始遣臺使自此公役勞擾高帝踐阼子良陳之請息其弊子良敦義愛古郡人朱百年有至行先卒賜其妻米百斛蠲一人給其薪蘇郡閤下有虞翻舊牀罷任還乃致以歸後於西邸起古齋多聚古人器服以充之夏禹廟盛有禱祀子良曰禹泣辜表仁菲食旌約服玩果粽足以致誠使歲獻扇簟而已時有山陰人孔平詣子良訟嫂市米負錢不還子良歎曰昔高文通與寡嫂訟田義異於此乃賜米錢以償平建元二年穆妃薨去官仍為丹陽尹開私倉振屬縣貧人先是太妃以七月薨子良以八月奉凶問及小祥疑南郡王應相待尚書左僕射王儉議以為禮有倫序義無徒設如令遠則不待近必相須禮例既乖即心無取若疑兄弟同居吉凶舛雜則遠還之子自應開立別門以終喪事靈筵祭奠隨在家之人再朞而毀庶子在家亦不待嫡而況儲妃正體王室中軍長嫡之重天朝又行權制進退彌復非疑謂應不相待中軍祥縞之日聞喜致哀而已不受弔慰至聞喜變除昆弟亦宜相就寫情不對客從之武帝即位封竟陵郡王南徐州刺史加都督永明二年為護軍將軍兼司徒四年進號車騎將軍子良少有清尚禮好士居不疑之地傾意賓客天下才學皆游集焉善立勝事夏月客至為設瓜飲及甘果著之文教士子文章及朝貴辭翰皆發教撰錄是時上新視政水旱不時子良密啟請原除逋租又陳寬刑息役輕賦省徭并陳泉鑄歲遠類多翦鑿江東大錢十不一在公家所受必須輪郭完全遂買本一千加子七百求請無地捶革相繼尋完者為用既不兼兩回復遷貿會非委積徒令小人每嬰困苦且錢布相半為制永久或聞長宰須令輸直進違舊科退容姦利五年正位司徒給班劍二十人侍中如故移居雞籠山西邸集學士抄五經百家依皇覽例為四部要略千卷招致名僧講論佛法造經唄新聲道俗之盛江左未有武帝好射雉子良啟諫先是左衞殿中將軍邯鄲超上書諫射雉武帝為止久之超竟被誅永明末上將復射雉子良復諫前後所陳上雖不盡納而深見寵愛又與文惠太子同好釋氏甚相友悌子良敬信尤篤數於邸園營齋戒大集朝臣衆僧至賦食行水或躬親其事世頗以為失宰相體勸人為善未嘗厭倦以此終致盛名八年給三望車九年都下大水吳興偏劇子良開倉振救貧病不能立者於第北立廨收養給衣及藥十年領尚書令揚州刺史本官如故尋解尚書令加中書監文惠太子薨武帝檢行東宮見太子服御羽儀多過制度上大怒以子良與太子善不啟聞頗加嫌責武帝不豫詔子良甲仗入延昌殿侍醫藥子良啟進沙門於殿戶前誦經武帝為感夢見優曇鉢花子良案佛經宣旨使御府以銅為花插御牀四角日夜在殿內太孫間日入參武帝暴漸內外惶懼百僚皆已變服物議疑立子良俄頃而蘇問太孫所在因召東宮器甲皆入遺詔使子良輔政明帝知尚書事子良素仁厚不樂時務乃推明帝詔云事無大小悉與鸞參懷子良所志也太孫少養於子良妃袁氏甚著慈愛既懼前不得立自此深忌子良大行出太極殿子良居中書省帝使虎賁中郎將潘敞二百人仗屯太極西階之下成服後諸王皆出子良乞停至山陵不許進位太傅增班劍為三十人本官如故解侍中隆昌元年加殊禮劍履上殿入朝不趨贊拜不名進督南徐州其年疾篤謂左右曰門外應有異遣人視見淮中魚無算皆浮出水上向城門尋薨年三十五帝常慮子良異志及薨甚悅詔給東園溫明祕器斂以袞冕之服東府施喪位大鴻臚持節監護太官朝夕送祭又詔追崇假黃鉞侍中都督中外諸軍事大宰領大將軍揚州牧綠綟綬備九服錫命之禮使持節中書監王如故給九旒鸞輅黃屋左纛轀輬車前後部羽葆鼓吹挽歌二部虎賁班劍百人葬禮依晉安平王孚故事初豫章王嶷葬金牛山文惠太子葬夾石子良臨送望祖硎山悲感歎曰北瞻吾叔前望吾兄死而有知請葬茲地及薨遂葬焉所著內外文筆數十卷雖無文采多是勸戒子良既亡故人皆來奔赴陸惠曉於邸門逢袁彖問之曰近者云云定復何謂王融見殺而魏準破膽道路籍籍又云竟陵不永天年有之乎答曰齊氏微弱已數年矣爪牙柱石之臣都盡命之所餘政風流名士耳若不立長君無以鎮安四海王融雖為身計實安社稷恨其不能斷事以至於此道路之談自為虛說耳蒼生方塗炭矣政當瀝耳聽之建武中故吏范雲上表為子良立碑事不行子昭冑嗣昭冑字景胤汎涉書史有父風位太常以封境邊魏永元元年改封巴陵王先是王敬則事起南康侯子恪在吳郡明帝慮有同異召諸王侯入宮晉安王寶義及江陵公寶覽住中書省高武諸孫住西省敕人各兩左右自隨過此依軍法孩抱者乳母隨入其夜並將加害賴子恪至乃免自建武以來高武王侯居常震怖朝不保夕至是尤甚及陳顯達起事王侯復入宮昭冑懲往時之懼與弟永新侯昭穎逃奔江西變形為道人崔慧景舉兵昭冑兄弟出投之慧景敗昭冑兄弟首出投臺軍主胡松各以王侯還第不自安謀為身計子良故防閤桑偃為梅蟲兒軍副結前巴西太守蕭寅謀立昭冑昭冑許事剋用寅為尚書左僕射護軍以寅有部曲大事皆委之時胡松領軍在新亭寅遣人說之松許諾又張欣泰嘗為雍州亦有部曲昭冑又遣房天寶以謀告之欣泰聞命響應蕭寅左右華永達知其謀以告御刀朱光尚光尚挾左道以惑東昏因謂東昏曰昨見蔣王云巴陵王在外結黨欲反須官出行仍從萬春門入事不可量時東昏日游走聞此說大懼不復出四十餘日偃等議募健兒百餘人從萬春門入突取之昭冑以為不可偃同黨王山沙慮事久無成以事告御刀徐僧重寅遣人殺山沙於路吏於麝中得其事迹昭冑兄弟與同黨皆伏誅梁受禪降封昭冑子同為監利侯同弟賁字文奐形不滿六尺神識耿介幼好學有文才能書善畫於扇上圖山水咫尺之內便覺萬里為遙矜慎不傳自娛而已好著述嘗著西京雜記六十卷起家湘東王法曹參軍得一府歡心及亂王為檄賁讀至偃師南望無復儲胥露寒河陽北臨或有穹廬氈帳迺曰聖製此句非為過似如體目朝廷非關序賊王聞之大怒收付獄遂以餓終又追戮賁尸乃著懷舊傳以謗之極言誣毀廬陵王子卿字雲長武帝第三子也建元元年封臨汝縣公武帝即位為郢州刺史加都督子卿諸子中無德又與魚復侯子響同生故無寵徙都督荊州刺史始興王為益州子卿解督子卿在鎮營造服飾多違制度作瑁乘具詔責之令速送都又作銀鐙金薄裹箭脚亦便速壞去凡諸服章自今不啟專輒作者當得痛杖又曰汝比令讀學今年轉成長學既勿就得敕如風過耳使吾失氣永明十年為都督南豫州刺史之鎮道中戲部伍為水軍上聞大怒殺其典籤遣宜都王鏗代之子卿還第至崩不與相見隆昌元年為衞將軍開府儀同三司置兵佐鄱陽王鏘見害以子卿代為司徒所居屋梁柱際血出溜于地旬日而見殺魚復侯子響字雲音武帝第四子也豫章王嶷無子養子響後嶷有子表留為嫡武帝即位為南彭城臨淮二郡太守子響勇力絕人開弓四斛力數在園池中帖騎馳走竹樹下身無虧傷既出繼車服異諸王每入朝輒忿拳打車壁武帝知之令車服與皇子同永明六年有司奏子響宜還本乃封巴東郡王七年為都督荊州刺史直閤將軍董蠻粗有氣力子響要與同行蠻曰殿下癲如雷敢相隨邪子響笑曰君敢出此語亦復奇癲上聞而不悅曰人名蠻復何容得蘊藉乃改名為仲舒謂曰今日仲舒何如昔日仲舒答曰昔日仲舒出自私庭今日仲舒降自天帝以此言之勝昔遠矣上稱善子響少好武帶仗左右六十人皆有膽幹數在內齋殺牛置酒與之聚樂令私作錦袍絳襖欲餉蠻交易器仗長史劉寅等連名密啟上敕精檢寅等懼欲祕之子響聞臺使至不見敕乃召寅及司馬席恭穆諮議參軍江悆殷曇粲中兵參軍周彥典籤吳脩之王賢宗魏景深等俱入於琴臺下併斬之上聞之怒遣衞尉胡諧之游擊將軍尹略中書舍人茹法亮領羽林三千人檢捕羣小敕子響若束手自歸可全其性命諧之等至江津築城燕尾洲子響白服登城頻遣信與相聞曰天下豈有兒反身不作賊直是粗疎今便單舸還闕何築城見捉邪尹略獨答曰誰將汝反父人共語子響聞之唯灑泣又送牛數十頭酒二百石果饌三十輿略棄之江流子響膽力之士王衝天不勝忿乃率黨度洲攻壘斬略而諧之法亮單艇奔逸上又遣丹陽尹蕭順之領兵繼之子響即日將白衣左右三十人乘舴艋中流下都初順之將發文惠太子素忌子響密遣不許還令便為之所子響及見順之欲自申明順之不許於射堂縊之有司奏絕子響屬籍賜為蛸氏子響密作啟數紙藏妃王氏裙腰中具自申明云輕舫還闕不得此苦之深唯願矜憐無使竹帛齊有反父之子父有害子之名及順之還上心甚怪恨百日於華林為子響作齋上自行香對諸朝士嚬蹙及見順之嗚咽移時左右莫不掩涕他日出景陽山見一猨透擲悲鳴問後堂丞此猨何意答曰猨子前日墮崖致死其母求之不見故爾上因憶子響歔欷良久不自勝順之慚懼感病遂以憂卒於是豫章王嶷上表曰故庶人蛸子響識懷靡樹見淪不逞肆憤一朝取陷凶德身膏草野未云塞釁但歸罪司戮迷而知返撫事惟往載傷心目伏願一下天矜使得旋窆餘麓豈伊窮骸被德實且天下歸仁上不許貶為魚復侯安陸王子敬字雲端武帝第五子也初封應城縣公先是子敬所生早亡帝命貴妃范氏母養之及范氏薨而子及婦服制禮無明文永明中尚書令王儉議孫為慈孫婦為慈婦姑為慈姑宜制朞年服從之十年位散騎常侍撫軍將軍丹陽尹十一年加車騎將軍隆昌元年遷都督南兗州刺史延興元年加侍中明帝除諸蕃王遣中護軍王玄邈征九江王廣之襲殺子敬初子敬為武帝所留心帝不豫有意立子敬為太子代太孫子敬與太孫俱入參畢同出武帝目送子敬良久曰阿五鈍由此代換之意乃息晉安王子懋字雲昌武帝第七子也諸子中最為清恬有意思廉讓好學年七歲時母阮淑媛嘗病危篤請僧行道有獻蓮華供佛者衆僧以銅甖盛水漬其莖欲華不萎子懋流涕禮佛曰若使阿姨因此和勝願諸佛令華竟齋不萎七日齋畢華更鮮紅視甖中稍有根鬚當世稱其孝感永明五年為南兗州刺史監五州軍事六年徙監湘州刺史八年撰春秋例苑三十卷奏之武帝敕付祕閣十一年為都督雍州刺史給鼓吹一部豫章王喪服未畢上以邊州須威望許得奏之啟求所好書武帝曰知汝常以書讀在心足為深欣賜以杜預手所定左傳及古今善言隆昌元年為征南大將軍江州刺史敕留西楚部曲助鎮襄陽單將白直俠轂自隨陳顯達時屯襄陽入別子懋謂之曰朝廷命身單身而反身是天王豈可過爾輕率今欲將二三千人自隨公意何如顯達曰殿下若不留部曲便是大違敕旨顯達因辭出便發去子懋計未立還鎮尋陽延興元年加侍中聞鄱陽隨郡二王見殺欲起兵赴難與參軍周英防閤陸超之議傳檄荊郢入討君側事成則宗廟獲安不成猶為義鬼防閤董僧慧攘袂曰此州雖小孝武亦嘗用之今以勤王之師橫長江指北闕以請鬱林之過誰能對之於是部分兵將入匡社稷母阮在都遣書欲密迎上阮報同產弟于瑤之為計瑤之馳告明帝於是纂嚴遣中護軍王玄邈平西將軍王廣之南北討使軍主裴叔業與瑤之先襲尋陽聲云為郢府司馬子懋知之遣三百人守盆城叔業泝流直上襲盆城子懋先已具船於稽亭渚聞叔業得盆城乃據州自衞子懋部曲多雍土人皆踴躍願奮叔業畏之遣于瑤之說子懋曰今還都必無過憂政當作散官不失富貴也子懋既不出兵攻叔業衆情稍沮中兵參軍于琳之瑤之兄也說子懋重賂叔業子懋使琳之往琳之因說叔業請取子懋叔業遣軍主徐玄慶將四百人隨琳之入城僚佐皆奔散唯周英及外兵參軍王皎更移入城內子懋聞之歎曰不意吾府有義士二人琳之從二百人仗自入齋子懋笑謂之曰不意渭陽翻成梟鏡琳之以袖障面使人害之故人懼罪無敢至者唯英皎僧慧號哭盡哀為之喪殯董僧慧丹陽姑孰人出自寒微而慷慨有節義好讀書甚驍果能反手於背彎五斛弓當世莫有能者玄邈知其豫子懋之謀執之僧慧曰晉安舉義兵僕實豫議古人云非死之難得死之難僕得為主人死不恨矣願至主人大斂畢退就湯鑊雖死猶生玄邈義而許之還具白明帝乃配東冶言及九江時事輒悲不自勝子懋子昭基九歲以方二寸絹為書參其消息并遺錢五百以金假人崎嶇得至僧慧覩書對錢曰此郎君書也悲慟而卒陸超之吳人以清靜雅為子懋所知子懋既敗于琳之勸其逃亡答曰人皆有死此不足懼吾若逃亡非唯孤晉安之眷亦恐田橫客笑人玄邈等以其義欲囚將還都而超之亦端坐待命超之門生姓周者謂殺超之當得賞乃伺超之坐自後斬之頭墜而身不僵玄邈嘉其節厚為殯斂周又助舉棺未出戶棺墜政壓其頭折頸即死聞之者莫不以為有天道焉隨郡王子隆字雲興武帝第八子也性和美有文才娶尚書令王儉女為妃武帝以子隆能屬文謂儉曰我家東阿也永明八年為都督荊州刺史隆昌元年為侍中撫軍將軍領兵置佐延興元年轉中軍大將軍侍中如故子隆年二十一而體過充壯常使徐嗣伯合蘆茹丸以服自銷損猶無益明帝輔政謀害諸王武帝諸子中子隆最以才貌見憚故與鄱陽王鏘同夜先見殺文集行於世建安王子真字雲仙武帝第九子也永明七年累遷郢州刺史加都督隆昌元年為散騎常侍護軍將軍延興元年明帝遣裴叔業就典籤柯令孫殺之子真走入牀下令孫手牽出之叩頭乞為奴贖死不從見害年十九西陽王子明字雲光武帝第十子也永明元年封武昌王三年失國璽改封西陽十年為會稽太守督五郡軍事子明風姿明凈士女觀者咸嗟嘆之建武元年為撫軍將軍領兵置佐二年誅蕭諶子明及弟子罕子貞同諶謀見害年十七南海王子罕字雲華武帝第十一子也頗有學母樂容華有寵故武帝留心母嘗寢疾子罕晝夜祈禱于時以竹為燈纘照夜此纘宿昔枝葉大茂母病亦愈咸以為孝感所致主簿劉鬷及侍讀賀子喬為之賦頌當時以為美談建武元年位護軍將軍二年見殺年十七巴陵王子倫字雲宗武帝第十三子也永明十年為北中郎將南琅邪彭城二郡太守鬱林即位以南彭城祿力優厚奪子倫與中書舍人綦母珍之更以南蘭陵代之延興元年明帝遣中書舍人茹法亮殺子倫子倫時鎮琅邪城有守兵子倫英果明帝恐不即罪以問典籤華伯茂伯茂曰公若遣兵取之恐不即可辦若委伯茂一小吏力耳既而伯茂手自執鴆逼之左右莫敢動者子倫正衣冠出受詔謂法亮曰積不善之家必有餘殃昔高皇帝殘滅劉氏今日之事理數固然舉酒謂法亮曰君是身家舊人今銜此命當由事不獲已此酒差非勸酬之爵因仰之而死時年十六法亮及左右皆流涕先是高帝武帝為諸王置典籤帥一方之事悉以委之每至覲接輒留心顧問刺史行事之美惡係於典籤之口莫不折節推奉慮弗及於是威行州部權重蕃君武陵王曄為江州性烈直不可忤典籤趙渥之曰今出都易刺史及見武帝相誣曄遂免還南海王子罕戍琅邪欲暫游東堂典籤姜秀不許而止還泣謂母曰兒欲移五步亦不得與囚何異秀後輒取子罕屐繖飲器等供其兒昏武帝知之鞭二百繫尚方然而擅命不改邵陵王子貞嘗求熊白人答典籤不在不敢與西陽王子明欲送書參侍讀鮑僎病典籤吳脩之不許曰應諮行事乃止言行舉動不得自專徵衣求食必須諮訪永明中巴東王子響殺行事劉寅等武帝聞之謂羣臣曰子響遂反戴僧靜大言曰諸王都自應反豈唯巴東武帝問其故答曰天王無罪而一時被囚取一挺藕一杯漿皆諮籤帥不在則竟日忍渴諸州唯聞有籤帥不聞有刺史竟陵王子良嘗問衆曰士大夫何意詣籤帥參軍范雲答曰詣長史以下皆無益詣籤帥便有倍本之價不詣謂何子良有愧色及明帝誅異己者諸王見害悉典籤所殺竟無一人相抗孔珪聞之流涕曰齊之衡陽江夏最有意而復害之若不立籤帥故當不至於此邵陵王子貞字雲松武帝第十四子也建武二年見誅年十五臨賀王子岳字雲嶠武帝第十六子也明帝誅武帝諸子唯子岳及弟六人在後時呼為七王朔望入朝上還後宮輒歎息曰我及司徒諸兒子皆不長高武子孫日長大永泰元年上疾甚絕而復蘇於是誅子岳等延興建武中凡三誅諸王每一行事明帝輒先燒香嗚咽涕泣衆以此輒知其夜當殺戮也子岳死時年十四西陽王子文字雲儒武帝第十七子也永明七年封蜀郡王建武中改封西陽永泰元年見殺年十四衡陽王子峻字雲嵩武帝第十八子也永明七年封廣漢郡王建武中改封永泰元年見殺年十四南康王子琳字雲璋武帝第十九子也母荀昭華盛寵後宮才人位登采女者依例舊賜玉鳳凰荀時始為采女得玉鳳凰投地曰我不能例受此武帝乃拜為昭華子琳以母寵故最見愛太尉王儉因請昏武帝悅而許之羣臣奉寶物名好盡直數百金武帝為之報答亦如此及應封而好郡已盡乃以宣城封之既而以宣城屬揚州不欲為王國改封南康公褚蓁為巴東公以南康為王國封子琳永泰元年見殺年十四湘東王子建字雲立武帝第二十一子也母謝無寵武帝度為尼明帝即位使還母子建永泰元年見殺年十三南郡王子夏字雲廣武帝第二十三子也上春秋高子夏最幼寵愛過諸子初武帝夢金翅鳥下殿庭搏食小龍無數乃飛上天及明帝初其夢方驗永泰元年子夏誅年七歲文惠太子四男安皇后生廢帝鬱林王昭業宮人許氏生廢帝海陵恭王昭文陳氏生巴陵王昭秀褚氏生桂陽王昭粲巴陵王昭秀字懷尚太子第三子也鬱林即位封臨海郡王隆昌元年為都督荊州刺史延興元年徵為車騎將軍明帝建武二年改封巴陵王永泰元年見殺年十六桂陽王昭粲太子第四子也鬱林立封永嘉郡王延興元年出為荊州刺史加都督建武二年改封桂陽王四年為太常永泰元年見殺年八歲明帝十一男敬皇后生廢帝東昏侯寶卷江夏王寶玄鄱陽王寶寅和帝殷貴嬪生巴陵隱王寶義晉熙王寶嵩袁貴妃生廬陵王寶源管淑妃生邵陵王寶脩許淑媛生桂陽王寶貞餘皆早夭巴陵隱王寶義字智勇明帝長子也本名明基建武元年封晉安郡王寶義少有廢疾不堪出人間止加除授為都督揚州刺史仍以始安王遙光代之轉為右將軍領兵置佐鎮石頭二年為南徐州刺史加都督東昏即位進征北將軍開府儀同三司給扶永元元年為都督揚州刺史三年進位司徒和帝西臺建以為侍中司空梁武平建鄴宣德太后令以寶義為太尉領司徒詔云不言之化形于自遠時人皆云此實錄也梁受禪封謝沐公尋封巴陵郡王奉齊後天監中薨江夏王寶玄字智深明帝第三子也建武元年封江夏郡王東昏即位為都督南徐兗二州刺史寶玄娶尚書令徐孝嗣女為妃孝嗣被誅離絕東昏送少姬二人與之寶玄恨望有異計明年崔慧景舉兵還至廣陵遣使奉寶玄為主寶玄斬其使因是發將吏防城慧景將度江寶玄密與相應開門納慧景乘八掆輿手執絳麾幡隨慧景至都百姓多往投集慧景敗收得朝野投寶玄及慧景軍名東昏令燒之曰江夏尚爾豈復可罪餘人寶玄逃奔數日乃出帝召入後堂以步鄣裹之令羣小數十人鳴鼓角馳繞其外遣人謂曰汝近圍我亦如此少日乃殺之廬陵王寶源字智泉明帝第五子也建武元年封和帝即位為車騎將軍開府儀同三司中興二年薨鄱陽王寶寅字智亮明帝第六子也建武初封建安郡王東昏即位為都督郢州刺史永元三年為車騎將軍開府儀同三司鎮石頭其秋雍州刺史張欣泰等謀起事於新亭殺臺內諸主帥難作之日前南譙太守王靈秀奔往石頭帥城內將吏去車腳載寶寅向臺城百姓數千人皆空手隨後至杜姥宅日已欲暗城門閉城上人射之衆棄寶寅走寶寅逃亡三日戎服詣草市尉尉馳以啟帝帝迎入宮問之寶寅涕泣稱制不自由帝笑乃復爵位宣德太后臨朝改封寶寅鄱陽王中興二年謀反奔魏邵陵王寶脩字智宣明帝第九子也建武元年封南平郡王二年改封中興二年謀反宣德太后令賜死晉熙王寶嵩字智靖明帝第十子也中興元年和帝以為中書令二年誅桂陽王寶貞明帝第十一子也中興二年誅論曰守器之重邦家所馮觀文惠之在東儲固已有虧令德向令負荷斯集猶當及於禍敗況先期夙隕愆失已彰而武帝不以擇賢傳之昏孽推此而論有冥數矣子良物望所集失在儒雅當斷不斷以及于災非止自致喪亡乃至宗祀覆滅哀哉夫帝王子弟生長尊貴情偽之事不經耳目雖卓爾天悟自得懷抱孤寡為識所陋猶多齊氏諸王並幼踐方岳故輔以上佐簡自帝心勞舊左右用為主帥州國府第先令後行飲食游居動應聞啟端拱守祿遵承法度張弛之要莫敢厝言行事執其權典籤掣其肘處地雖重行止莫由威不在身恩未接下倉卒一朝事難總集望其釋位扶危不可得矣路溫舒云秦有十失其一尚存斯宋氏之餘風及在齊而彌弊寶玄親兼一體欣受家殃曾不知執柯所指跗萼相從而敗以此而圖萬事未知其髣髴也
