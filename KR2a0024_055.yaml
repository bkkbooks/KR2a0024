body:
  text: 南史卷五十五列傳第四十五王茂曹景宗席闡文夏侯詳子亶夔魚弘吉士瞻蔡道恭楊公則鄧元起羅研李膺張惠紹馮道根康絢昌義之王茂字休連一字茂先太原祁人也祖深北中郎司馬父天生宋末為列將剋司徒袁粲以勳歷位郡守封上黃縣男茂年數歲為大父深所異常曰此吾家千里駒成門戶者必此兒也及長好讀兵書究其大指性隱不交遊身長八尺潔白美容儀齊武帝布衣時嘗見之歎曰王茂先年少堂堂如此必為公輔後為臺郎纍年不調亦知齊之將亡求為邊職久之為雍州長史襄陽太守梁武便以王佐許之事無大小皆詢焉人或譖茂反帝弗之信譖者驟言之遣視其甲矟則蟲網焉乃誅言者或云茂與帝不睦帝諸腹心並勸除之而茂少有驍名帝又惜其用曰將舉大事便害健將此非上策乃令腹心鄭紹叔往候之遇其臥因問疾茂曰我病可耳紹叔曰都下殺害日甚使君家門塗炭今欲起義長史那猶臥茂因擲枕起即袴褶隨紹叔入見武帝大喜下牀迎因結兄弟被推赤心遂得盡力發雍部遣茂為前驅郢魯既平從武帝東下為軍鋒師次秣陵東昏遣大將王珍國盛兵朱雀門衆號二十萬及戰梁武軍引却茂下馬單刀直前外甥韋欣慶勇力絶人執鐵矟翼茂而進故大破之茂勳第一欣慶力也建康城平以茂為護軍將軍遷侍中領軍將軍時東昏妃潘玉兒有國色武帝將留之以問茂茂曰亡齊者此物留之恐貽外議帝乃出之軍主田安啓求為婦玉兒泣曰昔者見遇時主今豈下匹非類死而後已義不受辱及見縊潔美如生輿出尉吏俱行非禮乃以余妃賜茂亦潘之亞也羣盜之燒神獸門茂率所領應赴為盜所射茂躍馬而進羣盜反走茂以不能式遏姦盜自表解職優詔不許加鎮軍將軍封望蔡縣公是歲江州刺史陳伯之叛茂出為江州刺史南討之伯之奔魏時九江新經軍寇茂務農省役百姓安之四年魏攻漢中茂受詔西禦魏乃班師歷位侍中中衛將軍太子詹事車騎將軍開府儀同三司丹陽尹時天下無事武帝方敦文雅茂心頗怏怏侍宴醉後每見言色武帝宥而不責進位司空茂性寬厚居官雖無美譽亦為吏人所安居處方正在一室衣冠儼然雖僕妾莫見其惰容姿表瓌麗須眉如畫為衆所瞻望徙驃騎將軍開府同三司之儀江州刺史在州不取奉獄無滯囚居處被服同於儒者薨于州武帝甚悼惜之詔贈太尉諡曰忠烈公初茂以元勳武帝賜鐘磬之樂茂在州夢鐘磬在格無故自墮心惡之及覺命奏樂既成列鐘磬在格果無故編皆絶墮地茂謂長史江詮曰此樂天子所以惠勞臣也樂既極矣能無憂乎俄而病卒子貞秀嗣以居憂無禮為有司所奏徙越州後詔留廣州與魏降人杜景欲襲州城刺史蕭昂斬之曹景宗字子震新野人也父欣之仕宋位徐州刺史景宗幼善騎射好畋獵常與少年數十人澤中逐麞鹿每衆騎赴鹿鹿馬相亂景宗於衆中射之人皆懼中馬足鹿應弦輒斃以此為樂未弱冠欣之於新野遣出州以匹馬將數人於中路卒逢蠻賊數百圍之景宗帶百餘箭每箭殺蠻蠻遂散走因以膽勇聞頗愛史書每讀穰苴樂毅傳輒放卷歎息曰丈夫當如是少與州里張道門善道門車騎將軍敬兒少子也為武陵太守敬兒誅道門於郡伏法親屬故吏莫敢收景宗自襄陽遣船到武陵收其尸迎還殯葬鄉里以此義之仕齊以軍功纍加遊擊將軍建武四年隨太尉陳顯達北圍馬圈以奇兵二千破魏援中山王英四萬人及剋馬圈顯達論功以景宗為後景宗退無怨言魏孝文率衆大至顯達宵奔景宗導入山道故顯達父子獲全梁武為雍州刺史景宗深自結附數請帝臨其宅時天下方亂帝亦厚加意焉表為竟陵太守及帝起兵景宗聚衆並率五服內子弟三百人從軍遣親人杜思沖勸先迎南康王於襄陽即位武帝不從及至竟陵以景宗為軍鋒道次江寧東昏將李居士以重兵鎮新亭景宗被甲馳戰居士棄甲奔走景宗皆獲之又與王茂呂僧珍掎角破王珍國於大航景宗軍士皆桀黠無賴御道左右莫非富室抄掠財物略奪子女景宗不能禁及武帝入頓西城嚴申號令然後稍息城平封湘西縣侯除郢州刺史加都督天監元年改封竟陵縣侯景宗在州鬻貨聚斂於城南起宅長堤以東夏口以北開街列門東西數里而部曲殘橫人頗厭之二年十月魏攻司州圍刺史蔡道恭城中負板而汲景宗望關門不出但耀軍遊獵而已及司州城陷為御史中丞任昉所奏帝以功臣不問徵為右衛將軍五年魏中山王英攻鍾離圍徐州刺史昌義之武帝詔景宗督衆軍援義之豫州刺史韋睿亦援焉而受景宗節度詔景宗頓道人洲待衆軍齊集俱進景宗欲專其功乃違敕而進遇暴風卒起頗有沈溺復還守先頓帝聞之曰此所以破賊也景宗不進蓋天意乎若孤軍獨往城不時立必見狼狽今得待衆軍同進始可大捷矣及韋睿至與景宗進頓邵陽洲立壘與魏城相去百余步魏連戰不能却傷殺者十二三自是魏軍不敢逼景宗等器甲精新魏人望而奪氣魏將楊大眼對橋北岸立城以通糧運每牧人過岸伐芻藁皆為大眼所略景宗乃募勇敢士千餘人徑度大眼城南數里築壘親自舉築大眼來攻景宗破之因得壘成使別將趙草守之因謂為趙草城是後恣芻牧馬大眼遣抄掠輒為趙草所獲先是詔景宗等預裝高艦使與魏橋等為火攻計令景宗與睿各攻一橋睿攻其南景宗攻其北六年三月因春水生淮水暴長六七尺睿遣所督將馮道根李文釗裴邃韋寂等乘艦登岸擊魏洲上軍盡殪景宗使衆軍復鼓噪亂登諸城呼聲震天地大眼於西岸燒營英自東岸棄城走諸壘相次土崩悉棄其器甲爭投水死淮水為之不流景宗命軍主馬廣躡大眼至濊水上四十餘里伏尸相枕義之出逐英至洛口英以匹馬入梁城緣淮百餘里尸骸相藉虜五萬餘人收其軍糧器械山積牛馬驢騾不可稱計景宗乃搜所得生口萬餘人馬千匹遣獻捷先是旱甚詔祈蔣帝神求雨十旬不降帝怒命載荻欲焚蔣廟並神影爾日開朗欲起火當神上忽有雲如繖忽驟雨如寫臺中宮殿皆自振動帝懼馳詔追停少時還靜自此帝畏信遂深自踐阼以來未嘗躬自到廟於是備法駕將朝臣修謁是時魏軍攻圍鍾離蔣帝神報敕必許扶助既而無雨水長遂挫敵人亦神之力焉凱旋之後廟中人馬腳盡有泥濕當時並目覩焉景宗振旅凱入帝於華光殿宴飲連句令左僕射沈約賦韻景宗不得韻意色不平啓求賦詩帝曰卿伎能甚多人才英拔何必止在一詩景宗已醉求作不已詔令約賦韻時韻已盡唯餘競病二字景宗便操筆斯須而成其辭曰去時兒女悲歸來笳鼓競借問行路人何如霍去病帝歎不已約及朝賢驚嗟竟日詔令上左史於是進爵為公拜侍中領軍將軍景宗為人自恃尚勝每作書字有不解不以問人皆以意造雖公卿無所推唯以韋睿年長且州里勝流特相敬重同宴御筵亦曲躬謙遜武帝以此嘉之景宗好內妓妾至數百窮極錦繡性躁動不能沉默出行常欲褰車帷幔左右輒諫以位望隆重人所具瞻不宜然景宗謂所親曰我昔在鄉里騎快馬如龍與年少輩數十騎拓弓弦作礔讔箭如餓鴟叫平澤中逐麞數肋射之渴飲其血飢食其脯甜如甘露漿覺耳後生風鼻頭出火此樂使人忘死不知老之將至今來揚州作貴人動轉不得路行開車幔小人輒言不可閉置車中如三日新婦此邑邑使人氣盡為人嗜酒好樂臘月於宅中使人作邪呼逐除遍往人家乞酒食本以為戲而部下多剽輕因弄人婦女奪人財貨帝頗知之景宗懼乃止帝數宴見功臣共道故舊景宗酒後謬妄或誤稱下官帝故縱之以為笑樂後為江州刺史赴任卒於道贈雍州刺史開府儀同三司諡曰壯子皎嗣景宗齊永元初任竟陵郡其第九弟義宗年少未有位宦居在雍州既方伯之弟又是豪強之門市邊富人姓向以見錢百萬欲埤義宗以妹適之義宗遣人送書竟陵咨景宗景宗題書後答曰買猶未得云何已賣義宗貪鏹遂成後隨武帝西下歷位梁秦二州刺史向家兄弟憑附曹氏位登列卿後義宗為都督征穰城軍敗見獲於魏卒席闡文安定臨涇人也孤貧涉獵書史齊初為雍州刺史蕭赤斧中兵參軍由是與其子穎胄善復歷西中郎中兵參軍領城局梁武帝之將起兵闡文勸穎胄同焉仍遣客田祖恭私報帝並獻銀裝刀帝報以金如意和帝稱尊號為衛尉卿穎胄暴卒州府騷擾闡文以和帝幼弱中流任重時始興王憺留鎮雍部乃與西朝羣臣迎憺總州事故賴以寧輯帝受禪除都官尚書封山陽伯出為東陽太守在郡有能名冬至悉放獄中囚依期而至改封湘西侯卒官諡曰威夏侯詳字叔業譙郡譙人也年十六遭父艱居喪哀毀三年廬于墓側嘗有三足雀來集其廬戶衆咸異焉仕宋為新汲令政有異績豫州刺史段佛榮班下境內為屬城表轉中從事史仍遷別駕歷事八將州部稱之齊明帝為刺史雅相器遇及輔政引詳及裴叔業日夜與語詳輒不酬帝以問叔業叔業以告詳詳曰不為福始不為禍先由此微有忤出為征虜長史義陽太守及南康王為荊州詳為西中郎司馬新興太守梁武帝起兵長史蕭穎胄同創大舉慮詳不同以告柳忱忱曰易耳近詳求昏未之許令成昏而告之不憂立異於是以女適其子夔大事方建西臺以詳為中領軍加散騎常侍南郡太守凡軍國大事穎胄多決於詳頃之穎胄卒梁武弟始興王憺留守襄陽詳乃遣使迎憺共參軍國遷侍中尚書右僕射尋授荊州刺史詳又固讓于憺天監元年徵為侍中車騎將軍封寧都縣侯詳纍讓乃更授右光祿大夫侍中如故給親信二十人改封豐城縣公三年遷湘州刺史詳善吏事在州四載為百姓所稱州城南臨水有峻峯舊傳云刺史登此山輒代由是歷政莫敢至詳於其地起臺榭延僚屬以表損挹之志後徵為尚書左僕射金紫光祿大夫道病卒上為素服舉哀贈開府儀同三司諡曰景子亶嗣亶字世龍齊永元末父詳為西中郎南康王司馬隨府鎮荊州亶留都下為東昏聽政主帥及崔慧景作亂亶以捍禦功除驍騎將軍及梁武起兵詳與長史蕭穎胄協同密遣迎亶亶乃齎宣德皇后令令南康王纂承大統建鄴平以亶為尚書吏部郎俄遷侍中奉璽於帝天監六年纍遷南郡太守父憂解職居喪盡禮廬于墓側遺財悉推諸弟八年起為司州刺史領安陸太守服闋襲封豐城縣公居州甚有威惠為邊人悅服歷都官尚書遷給事中右衛將軍纍遷吳興太守在郡復有惠政吏人圖其像立碑頌美焉普通五年為中護軍六年大舉北侵先遣豫州刺史裴邃帥譙州刺史湛僧智等自南道攻壽陽未剋而邃卒乃加亶使持節代邃與魏將河間王琛臨淮王彧等相拒頻戰剋捷尋敕班師合肥須堰成復進七年夏淮堰水盛壽陽城將沒武帝復遣北道軍元樹帥彭寶孫陳慶之等稍進亶帥湛僧智魚弘張澄等通清流澗將入淮肥魏軍夾肥築城出亶後亶與僧智還襲破之進攻黎漿貞威將軍韋放自北道會焉兩軍既合所向皆降凡降城五十二獲男女口七萬五千人詔以壽陽依前代置豫州合肥鎮改為南豫州以亶為豫南豫二州刺史加都督壽春久離兵荒百姓多流散亶輕刑薄賦務農省役頃之人戶充復卒于州鎮帝聞之即日素服舉哀贈車騎將軍諡曰襄州人夏侯簡等表請為亶立碑置祠詔許之亶美風儀寬厚有器量涉獵文史能專對宗人夏侯溢為衡陽內史辭日亶侍御坐帝謂亶曰夏侯溢於卿疏近亶答云是臣從弟帝知溢於亶已疏乃曰卿傖人如何不辨族從亶對曰臣聞服屬易疏所以不忍言族時以為能亶歷六郡三州不為産業祿賜所得隨散親故性儉率居處服用充足而已不事華侈晚年頗好音樂有妓妾十數人並無被服姿容每有客常隔簾奏之時謂簾為夏侯妓衣子誼襲封豐城縣公亶弟夔字季龍位大匠卿纍遷司州刺史領安陸太守帥壯武將軍裴之禮直閣將軍任思祖出義陽道攻平靜穆陵陰山三關剋之時譙州刺史湛僧智圍東豫州刺史元慶和於廣陵入其郛魏將元顯伯率軍赴援僧智逆擊破之夔自武陽出會僧智斷魏軍歸路慶和於內築柵自固及夔至遂請降凡降男女口萬餘人顯伯聞之夜遁衆軍追虜二萬餘人斬獲不可勝數由是義陽北道遂與魏絶及郢州刺史元願達降詔改為北司州以夔為刺史兼督司州封保城縣侯中大通六年為豫州刺史加督豫州積歲連兵人頗失業夔乃率軍人於蒼陵立堰溉田千餘頃歲收穀百餘萬石以充儲備兼贍貧人境內賴之夔兄亶先經此任至是夔又居焉兄弟並有恩惠於鄉里百姓歌曰我之有州頻得夏侯前兄後弟布政優優夔在州七年遠近多附之有部曲萬人馬二千匹並服習精強為當時之盛性奢豪後房伎妾曳羅綺飾金翠者百數愛好人士不以貴位自高文武賓客常滿坐時亦以此稱之卒于州諡曰桓子撰嗣官至太僕卿撰弟譒少粗險薄行常停鄉里領其父部曲為州助防刺史貞陽侯明引為府長史明被魏囚復為侯景長史景反譒前驅濟江頓兵士林館破邸第及居人富室子女財貨盡略有之明在州有四妾章於王阮並有國色明被魏囚其妾並還都第譒至破第納焉魚弘襄陽人身長八尺白晢美姿容纍從征討常為軍鋒歷南譙盱眙竟陵太守嘗謂人曰我為郡有四盡水中魚鱉盡山中麞鹿盡田中米穀盡村里人庶盡丈夫生如輕塵棲弱草白駒之過隙人生但歡樂富貴在何時於是恣意酣賞侍妾百餘人不勝金翠服玩車馬皆窮一時之驚絶有眠牀一張皆是蹙柏四面周匝無一有異通用銀鏤金花壽福兩重為腳為湘東王鎮西司馬述職西上道中乏食緣路採菱作菱米飯給所部弘度之所後人覓一菱不得又於窮洲之上捕得數百獼猴膊以為脯以供酒食比及江陵資食復振逢敕迎瑞像王令送像下都弘率部曲數百悉衣錦袍赫奕滿道頗為人所慕塗經夏首李抗斆其為人抗舅元法僧聞之杖抗三百後為新興永寧太守卒官吉士瞻字梁容馮翊蓮勺人也少有志氣不事生業時徵士吳苞見其姿容勸以經學因誦鮑照詩云豎儒守一經未足識行藏拂衣不顧年逾四十忽忽不得志乃就江陵卜者王先生計祿命王生曰君擁旄杖節非一州後一年當得戎馬大郡及梁武起兵義陽太守王撫之天門太守王智遜武陵太守蕭強等並不從命鎮軍蕭穎胄遣士瞻討平之齊和帝即位以為領軍司馬士瞻少時嘗於南蠻府中擲博無褌褰露為儕輩所侮及平魯休烈軍得絹三萬匹乃作百褌其外並賜軍士不以入室以軍功除輔國將軍步兵校尉建康平為巴東相建平太守初士瞻為荊府城局參軍浚萬人仗庫防池得一金革鉤隱起鏤甚精巧篆文曰錫爾金鉤且公且侯士瞻娶夏侯詳兄女女竊以與詳詳喜佩之及是革命詳果封侯而士瞻不錫茅土天監二年入為直閣將軍歷位秦梁二州刺史加都督後為太子右衛率又出為西陽武昌二郡太守在郡清約家無私積始士瞻夢得一積鹿皮從而數之有十一領及覺喜曰鹿者祿也吾當居十一祿乎自其仕進所蒞已九及除二郡心惡之遇疾不肯療普通七年卒於郡贈左衛將軍諡曰胡子子琨時在戎役聞問一踊而絶良久乃蘇不顧軍制輒離所部遂以孝聞詔下旌異蔡道恭字懷儉南陽冠軍人也父那宋益州刺史道恭少寬厚有大量仕齊為西中郎中兵參軍加輔國將軍梁武帝起兵蕭穎胄以道恭素著威略專相委任齊和帝即位為右衛將軍出為司州刺史梁天監初論功封漢壽縣伯進號平北將軍三年魏圍司州時城中衆不滿五千人食裁半歲魏軍攻之晝夜不息乃作大車載土四面俱前欲以填道恭內列艨艟鬬艦以待之魏人不得進又潛作伏道以決水道恭載土塞之相持百餘日前後斬獲不可勝計魏大造梯衝攻圍日急道恭用四石烏漆大弓射所中皆洞甲飲羽一發或貫兩人敵人望弓皆靡又於城內作土山多作大矟長二丈五尺施長刃使壯士執以刺魏人魏軍甚憚之將退會道恭疾篤乃呼兄子僧協從弟靈恩及將率謂曰吾所苦勢不能久汝等當以死固節無令吾沒有遺恨又令取所持節授僧協曰稟命出疆既不得奉以還朝方欲攜之同逝可與棺柩相隨衆皆流涕其年五月卒魏知道恭死攻之轉急先是朝廷遣郢州刺史曹景宗赴援景宗不前至八月城內糧盡魏剋之贈鎮西將軍並尋購喪櫬八年魏許還道恭喪其家以女樂易之葬襄陽傳國至孫固早卒國除楊公則字君翼天水西縣人也父仲懷為宋豫州刺史殷琰將琰叛輔國將軍劉勔討琰仲懷力戰死於橫塘公則隨父在軍年未弱冠冒陳抱尸號哭氣絶良久勔命還仲懷首公則斂畢徒步負喪歸鄉里由此著名後梁州刺史范柏年板為宋熙太守領白馬戍主時氐賊李烏奴攻白馬公則矢盡糧竭陷于寇抗聲罵賊烏奴壯之耍與同事公則偽許而圖之謀泄單馬逃歸齊高帝下詔褒美除晉壽太守在任清潔自守遷扶風太守母憂去官雍州刺史陳顯達起為寧朔將軍復領太守頃之荊州刺史巴東王子響構亂公則進討事平遷武寧太守百姓便之入為前軍將軍和帝為荊州刺史公則為西中郎中兵參軍及蕭穎胄協同梁武以公則為輔國將軍領西中郎咨議參軍率兵東下和帝即位授湘州刺史梁武軍次沔口公則率湘府之衆會于夏口時荊州諸軍悉受公則節度雖蕭穎達宗室之貴亦隸焉郢城平武帝命衆軍即日俱下公則受命先驅江州既定連旌東下直造建鄴公則號令嚴明秋豪不犯所在莫不賴焉大軍至新林公則自越城移屯領軍府壘北樓與南掖門相對嘗登樓望戰城中遙見麾蓋縱神鋒弩射之矢貫胡牀左右皆失色公則曰虜幾中吾腳談笑如初東昏夜選勇士攻公則柵軍中驚擾公則堅臥不起徐命擊之東昏軍乃退公則所領多是湘溪人性懦怯城內輕之以為易與每出蕩輒先犯公則壘公則奬厲軍士剋獲更多及城平城內出者或被剝奪公則親率麾下列陳東掖門衛送公卿士庶故出者多由公則營焉進號左將軍還鎮南藩初公則東下湘部諸郡多未賓從及公則還州然後諸屯聚並散天監元年進號平南將軍封寧都縣侯湘州寇亂纍年人多流散公則輕刑薄斂頃之戶口充復為政雖無威嚴然勵己廉慎為吏人所悅湘俗單門多以賂求州職公則至皆斷之所辟皆州郡著姓武帝班下諸州以為法三年徵中護軍代至乘二舸便發送故一無所取遷衛尉卿時朝廷始議北侵公則威名素著至都詔假節先屯洛口公則受命將發遘疾謂親人曰昔廉頗馬援以年老見遺猶自力請用今國家不以吾朽懦任以前驅方於古人見知重矣雖臨塗疾苦豈可僶俯辭事馬革還葬此吾志也遂強起登舟至洛口壽春士女歸降者數千戶魏豫州刺史薛恭度遣長史石榮等前鋒接戰即斬石榮逐北至壽春去城數十里而返疾篤卒于師武帝深痛惜之即日舉哀諡烈侯公則為人敦厚慈愛居家篤睦視兄子過於己子家財悉委焉性好學雖居軍旅手不輟卷士大夫以此稱之子瞟嗣有罪國除帝以公則勳臣特聽庶長子眺嗣眺固讓歷年乃受鄧元起字仲居南郡當陽人也少有膽幹性任俠仕齊為武寧太守梁武起兵蕭穎胄與書招之即日上道率衆與武帝會于夏口齊和帝即位拜廣州刺史中興元年為益州刺史仍為前軍建康城平進號征虜將軍天監初封為當陽縣侯始述職焉初梁武之起益州刺史劉季連持兩端及聞元起至遂發兵拒守元起至巴西巴西太守朱士略開門以待先時蜀人多逃亡至是競出投元起皆稱起義應朝廷元起在道久軍糧乏絶或説之曰蜀郡政慢若檢巴西一郡籍注因而罰之所獲必厚元起然之涪令李膺諫曰使君前有嚴敵後無繼援山人始附於我觀德若糾以刻薄人必不堪衆心一離雖悔無及膺請出圖之不患資糧不足也元起曰善一以委卿膺退率富人上軍資米俄得三萬斛元起進屯西平季連始嬰城自守時益州兵亂既久人廢耕農內外苦飢人多相食道路斷絶季連計窮會明年武帝使赦季連罪許之降季連即日開城納元起元起送季連于建康元起以鄉人庾黔婁為録事參軍又得荊州刺史蕭遙欣故客蔣光濟並厚待之任以州事黔婁甚清潔光濟多計謀並勸為善政元起之剋季連也城內財寶無所私勸恤人事口不論財色性能飲酒至一斛不亂及是絶之為蜀土所稱元起舅子梁矜孫性輕脫與庾黔婁志行不同乃言於元起曰城中稱有三刺史節下何以堪之元起由此疏黔婁而政迹稍損在政二年以母老乞歸供養詔許焉徵為右衛將軍以西昌侯蕭藻代之時梁州長史夏侯道遷以南鄭叛引魏將王景胤孔陵攻東西晉壽並遣告急衆勸元起急救之元起曰朝廷萬里軍不卒至若寇賊浸淫方須撲討董督之任非我而誰何事匆匆便相催督黔婁等苦諫之皆不從武帝亦假元起節都督征討諸軍將救漢中比是魏已攻剋兩晉壽蕭藻將至元起頗營還裝糧儲器械略無遺者蕭藻入城求其良馬元起曰年少郎子何用馬為藻恚醉而殺之元起麾下圍城哭且問其故藻懼曰天子有詔衆乃散遂誣以反帝疑焉有司追劾削爵土詔減邑之半封松滋縣侯故吏廣漢羅研詣闕訟之帝曰果如我所量也使讓藻曰元起為汝報讎汝為讎報讎忠孝之道如何乃貶藻號為冠軍將軍贈元起征西將軍給鼓吹諡忠侯羅研字深微少有材辨元起平蜀辟為主簿後為信安令故事置觀農謁者圍桑度田勞擾百姓研請除其弊帝從之鄱陽忠烈王恢臨蜀聞其名請為別駕及西昌侯藻重為刺史州人為之懼研舉止自若侯謂曰非我無以容卿非卿無以事我齊苟兒之役臨汝侯嘲之曰卿蜀人樂禍貪亂一至於此對曰蜀中積弊實非一朝百家為村不過數家有食窮迫之人什有八九束縛之使旬有二三貪亂樂禍無足多怪若令家畜五母之雞一母之豕牀上有百錢布被甑中有數升麥飯雖蘇張巧説於前韓白按劍於後將不能使一夫為盜況貪亂乎大通二年為散騎侍郎嗣王範將西忠烈王恢謂曰吾昔在蜀每事委羅研汝遵而勿失範至復以為別駕升堂拜母蜀人榮之數年卒官蜀土以文達者唯研與同郡李膺膺字公胤有才辨西昌侯藻為益州以為主簿使至都武帝悅之謂曰今李膺何如昔李膺對曰今勝昔問其故對曰昔事桓靈之主今逢堯舜之君帝嘉其對以如意擊席者久之乃以為益州別駕著益州記三卷行於世初元起在荊州刺史隨王板元起為從事別駕庾蓽堅執不可元起恨之及大軍至都蓽在城內甚懼城平而元起先遣迎蓽語人曰庾別駕若為亂兵所殺我無以自明因厚遺之少時又嘗至其西沮田舍有沙門造之乞元起有稻幾二千斛悉以施之時人稱其二者有大度元起初為益州過江陵迎其母母事道方居館不肯出元起拜請同行母曰汝貧賤家兒忽得富貴詎可久保我寧死此不能與汝共入禍敗及至巴東聞蜀亂使蔣光濟筮之遇蹇喟然歎曰吾豈鄧艾而及此乎後果如筮子鏗嗣張惠紹字德繼義陽人也少有武幹仕齊為竟陵橫桑戍主母喪歸鄉里聞梁武帝起兵乃自歸纍有戰功武帝踐阼封石陽縣侯位驍騎將軍直閣左細仗主時東昏餘黨數百人竊入南北掖門夜燒神獸門害衛尉張弘策惠紹馳率所領赴戰賊乃散走遷太子右衛率以軍功纍增爵邑歷位衛尉卿左衛將軍司州刺史領安陸太守在州和理吏人親愛之徵還為左衛將軍加通直散騎常侍甲仗百人直衛殿中卒諡曰忠子澄嗣纍有戰功與湛僧智胡紹世魚弘並為當時驍將歷官衛尉卿太子左衛率卒官諡曰愍馮道根字巨基廣平酇人也少孤家貧傭賃以養母行得甘肥未嘗先食必遽還以遺母年十三以孝聞郡召為主簿不就曰吾當使封侯廟食安能為儒吏邪年十六鄉人蔡道班為湖陽戍主攻蠻錫城反為蠻困道根救之匹馬轉戰提雙劍左右奮擊殺傷甚多道班以免由是知名齊建武末魏孝文攻陷南陽等五郡明帝遣太尉陳顯達爭之師入汮口道根説顯達曰汮水急不如悉棄船於酇城方道步進顯達不聽道根猶以私屬從軍及顯達敗夜走賴道根指路以全尋為汮口戍副以母喪還家聞梁武帝起兵乃謂所親曰金革奪禮古人不避揚名後世豈非孝乎因率鄉人歸武帝隸於王茂常為前鋒武帝即位為驍騎將軍封增城縣男天監二年為南梁太守領阜陵城戍初到阜陵修城隍遠斥候如敵將至者衆頗笑之道根曰怯防勇戰此之謂也修城未畢魏將黨法宗傅竪眼率衆二萬奄至城下道根壘未固城中衆少莫不失色道根命開城門緩服登城選精鋭二百人出與魏軍戰敗之魏軍因退遷輔國將軍六年魏攻鍾離武帝詔豫州刺史韋睿救之道根為睿前驅至徐州建計據邵陽洲築壘掘逼魏城道根能走馬步地計馬足以賦功城隍立辦及淮水長道根乘戰艦斷魏連橋魏軍敗績進爵為伯改封豫寧縣八年拜豫州刺史領汝陰太守為政清簡境內安之纍遷右衛將軍道根性謹厚木訥少言為將能檢御部曲所過村陌將士不敢虜掠每征伐終不言功其部曲或怨非之道根喻曰明主自鑒功之多少吾將何事武帝嘗指道根示尚書令沈約美其口不論勳約曰此陛下之大樹將軍也歷處州郡和理清靜為下所懷在朝廷雖貴顯而性儉約所居宅不修牆屋無器服侍衛入室則蕭然如素士之貧賤者當世服其清退武帝亦雅重之微時不學既貴粗讀書自謂少文常慕周勃之器量十六年復為豫州將行武帝引朝臣宴別道根於武德殿召畫工使圖其形道根踧踖謝曰臣所可報國家唯餘一死但天下太平恨無可死之地豫部重得道根人皆喜悅武帝每稱曰馮道根所在能使朝廷不復憶有一州居州少時遇疾乞還朝廷徵為散騎常侍左軍將軍卒於官是日輿駕春祠二廟及出宮有司以聞帝問中書舍人朱索曰吉凶同日今可行乎對曰昔柳莊寢疾衛獻公當祭請尸曰有臣柳莊非寡人之臣社稷之臣也聞其死請往不釋祭服而往遂以襚之道根雖未為社稷臣亦有勞王室臨之禮也帝即駕幸其宅哭之甚慟諡曰威子懷嗣康絢字長明華山藍田人也其先出自康居初漢置都護盡臣西域康居亦遣侍子待詔河西因留不去其後遂氏焉晉時隴右亂遷于藍田絢曾祖因為苻堅太子詹事生穆穆為姚萇河南尹宋永初中穆率鄉族三千餘家入襄陽之峴南宋為置華山郡藍田縣寄立於襄陽以穆為秦梁二州刺史未拜卒絢伯元隆父元撫並為流人所推相繼為華山太守絢少俶儻有志氣仕齊為華山太守推誠撫循荒餘悅服梁武起兵絢舉郡以應天監元年封南陽縣男除竟陵太守纍遷太子左衛率甲仗百人與領軍蕭景直殿內絢身長八尺容貌絶倫雖居顯職猶習武藝帝幸德陽殿戲馬敕絢馬射撫弦貫的觀者悅之其日上使畫工圖絢形遣中使持以問絢曰卿識此圖不其見親如此時魏降人王足陳計求堰淮水以灌壽陽足引北方童謠曰荊山為上格浮山為下格潼沱為激溝並灌巨野澤帝以為然使水工陳承伯材官將軍祖耳幾視地形咸謂淮內沙土漂輕不堅實其功不可就帝弗納發徐揚人率二十戶取五丁以築之假絢節都督淮上諸軍事並護堰作役人及戰士有衆二十萬於鍾離南起浮山北抵巉石依岸築土合脊於中流十四年四月堰將合淮水漂疾復決潰衆患之或謂江淮多蛟能乘風雨決壞崖岸其性惡鐵因是引東西二冶鐵器大則釜鬲小則鋘鋤數千萬斤沈於堰所猶不能合乃伐樹為井幹填以巨石加土其上緣淮百里內岡陵木石無巨細必盡負擔者肩穿夏日疾疫死者相枕蠅蟲晝夜聲合武帝愍之遣尚書右僕射袁昂侍中謝舉假節慰勞並加蠲復是冬寒甚淮泗盡凍士卒死者十七八帝遣賜以衣袴十一月魏遣將楊大眼揚聲決堰絢命諸軍撤營露次以待之遣其子悅挑戰斬魏咸陽王府司馬徐方興魏軍小却十五年四月堰成其長九里下闊一百四十丈上廣四十五丈高二十丈深十九丈五尺夾之以堤並樹嵵柳軍人安堵列居其上其水清潔俯視邑居墳墓了然皆在其下或謂絢曰四瀆天所以節宣其氣不可久塞若鑿湫東注則遊波寬緩堰得不壞絢然之開湫東注又縱反間於魏曰梁所懼開湫魏人信之果鑿山深五丈開湫北注水日夜分流湫猶不減其月魏軍竟潰而歸水之所及夾淮方數百里地魏壽陽城戍稍徙頓八公山此南居人散就岡壟初堰起徐州界刺史張豹子謂己必尸其事既而絢以他官來監作豹子甚慚由是譖絢與魏交通帝雖不納猶以事畢徵絢尋除司州刺史領安陸太守絢徵還豹子不修堰至其秋淮水暴長堰壞奔流于海殺數萬人其聲若雷聞三百里水中怪物隨流而下或人頭魚身或龍形馬首殊類詭狀不可勝名祖耳幾坐下獄絢在州三年大修城隍號為嚴整普通元年除衛尉卿未拜卒輿駕即日臨哭諡曰壯絢寬和少喜懼在朝廷見人如不能言號為長厚在省每寒月見省官有縷者輒遣遺以繻衣其好施如此子悅嗣昌義之歷陽烏江人也少有武幹為馮翊戍主梁武帝為雍州因事帝帝亦厚遇之及起兵板為輔國將軍軍主每戰必捷天監元年封永豐侯纍遷北徐州刺史鎮鍾離四年大舉北侵臨川王宏督衆軍向洛口義之為前軍攻魏梁城戍剋之五年冬武帝以征役久詔班師魏中山王元英乘勢追躡攻沒馬頭等城城內糧貯魏悉移歸北議者咸謂無復南向帝曰此必進兵非其實也乃遣修鍾離城敕義之為戰守備是冬英果率衆數十萬圍鍾離衝車毀西墉時城中衆才三千義之督帥隨方抗禦前後殺傷萬計魏軍死者與城平六年帝遣曹景宗韋睿率衆二十萬救焉大破魏軍義之率輕兵追至洛口而還以功進號軍師將軍再遷都督南兗州刺史坐以禁物出蕃為有司所奏免十三年纍遷左衛將軍是冬帝遣太子右衛率康絢督衆軍作荊山堰魏將李曇定大衆逼荊山揚聲決堰詔假義之節救絢軍未至絢等已破魏軍魏又遣大將軍李平攻硤石義之又率朱衣直閣王神念救之魏克硤石義之班師為有司所奏帝以其功臣不問十五年授北徐州刺史義之不知書所識不過十字性寬厚為將能得人死力及居藩任吏人安之改封營道縣侯徵為護軍將軍卒於官帝深痛惜之諡曰烈子寶景嗣論曰永元之季雖時主昏狂荊雍二州尚未有釁武皇迹緣家酷首唱孟津之師王茂等運接昌期自致勤王之舉若非天人啓期豈得若斯之速乎其隆名顯級亦各風雲之感會也元起勤乃胥附功惟闢土勞之不圖禍機先陷冠軍之貶於罰已輕梁之政刑於斯為失私戚之端自斯而啓年之不永不亦宜乎張惠紹馮道根康絢昌義之攀附之始其功則末及羣盜焚門張以力戰自著鍾離邵陽之逼馮昌勞效居多浮山之役而康絢實典其事互有厥勞寵進宜矣先是鎮星守天江而堰實興退舍而決豈人事乎其天道也
