body:
  text: 南史卷二十七列傳第十七孔靖孫琇之琇之曾孫奐孔琳之孫覬殷景仁從祖弟淳孔靖字季恭會稽山陰人也名與宋武帝祖諱同故以字稱祖愈晉車騎將軍父誾散騎常侍季恭始察孝廉纍遷司徒左西掾未拜遭母憂隆安五年被起為山陰令不就宋武帝東征孫恩屢至會稽過季恭宅季恭正晝臥有神人衣服非常謂曰起天子在門既而失之遽出適見帝延入結交執手曰卿後當大貴願以身為託於是曲意禮接贍給甚厚帝後討孫恩時桓玄篡形已著帝欲於山陰建義季恭以山陰路遠且玄未居極位不如待其篡後於京口圖之帝亦以為然時虞嘯父為會稽內史季恭求為府司馬不得乃出詣都及帝定桓玄以季恭為會稽內史使齎封板拜授正與季恭遇季恭便回舟夜還至即叩扉入郡嘯父本為桓玄所授聞玄敗開門請罪季恭慰勉使且安所住明日乃移季恭到任釐整浮華翦罰遊惰由是境內肅清纍遷吳興太守加冠軍先是吳興頻喪太守言項羽神為卞山王居郡聽事二千石常避之季恭居聽事竟無害也遷尚書左僕射固讓義熙八年復為會稽內史修飾學校督課誦習十年復為右僕射又讓不拜除領軍加散騎常侍十二年致仕拜金紫光祿大夫是歲武帝北伐季恭求從以為太尉軍咨祭酒從平關洛宋臺初建以為尚書令又讓乃拜侍中特進左光祿大夫辭事東歸帝親餞之戲馬臺百僚咸賦詩以述其美及受命加開府儀同三司讓纍年不受薨以為贈子靈符位丹陽尹會稽太守尋加豫章王子尚撫軍長史靈符家本豐富産業甚廣又於永興立墅周回三十三里水陸地二百六十五頃含帶二山又有果園九處為有司所糾詔原之而靈符答對不實坐免尋又復官靈符賣心實有材幹不存華飾每所蒞官政績修理廢帝景和中犯忤近臣為所讒構遣使鞭殺之二子湛之深之於都賜死明帝即位追贈靈符金紫光祿大夫深之大明中為尚書比部郎時安陸應城縣人張江陵與妻吳共罵母黃令死黃忿恨自經死已值赦案律子賊殺傷毆父母梟首罵詈棄市謀殺夫之父母亦棄市會赦免刑補冶江陵罵母母以自裁重於傷毆若同殺科則疑重用傷毆及詈科則疑輕制唯有打母遇赦猶梟首無詈母致死會赦之科深之議曰夫題里逆心而仁者不入名且惡之況乃人事故毆傷呪詛法所不原詈之致盡則理無可宥罰有從輕蓋疑失善求之文旨非此之謂江陵雖遇赦恩故合梟首婦本以義愛非天屬黃之所恨情不在吳原死補冶有允正法詔如深之議吳免棄市靈符弟靈運位著作郎靈運子琇之琇之有吏能仕齊為吳令有小兒年十歲偷刈鄰家稻一束琇之付獄案罪或諫之琇之曰十歲便能為盜長大何所不為縣中皆震肅遷尚書左丞又以職事知名後兼左戶尚書廷尉卿出為臨海太守在任清約罷郡還獻乾薑二千斤齊武帝嫌其少及知琇之清乃歎息出監吳興郡尋拜太守政稱清嚴明帝輔政防備諸蕃致密旨於上佐使便宜從事隆昌元年遷琇之晉熙王冠軍長史江夏內史行郢州事欲令殺晉熙琇之辭不許欲自引決友人陸間諫之琇之不從遂不食而死子臻至太子舍人尚書三公郎臻子幼孫梁寧遠枝江公主簿無錫令幼孫子奐奐字休文數歲而孤為叔父虔孫所養好學善屬文沛國劉顯以博學稱每深相歎美執其手曰昔伯喈墳素悉與仲宣吾當希彼蔡君足下無愧王氏所保書籍尋以相付仕梁為尚書儀曹侍郎時左戶郎沈炯為飛書所謗將陷重辟連官臺閣人懷憂懼奐廷議理之竟得明白侯景陷建鄴朝士並被拘縶或薦奐於賊率侯子鑒乃脫桎梏厚遇之令掌書記時子鑒景之腹心朝士莫不卑屈奐獨無所下或諫奐曰不宜高抗奐曰吾性命有在豈有取媚凶醜以求全乎時賊徒剝掠子女拘逼士庶奐保持得全者甚衆尋遭母憂時天下喪亂皆不能終三年喪唯奐及吳國張種在寇亂中守法度並以孝聞及景平司徒王僧辨先下辟書引為左西掾梁元帝於荊州即位徵奐及沈炯僧辨纍表請留之帝手敕報曰孔沈二士今且借公其為朝廷所重如此僧辨為揚州刺史又補中從事史時侯景新平每事草創憲章故事無復存者奐博物強識甄明故實問無不知儀注體式箋書表翰皆出於奐陳武帝作相除司徒左長史遷給事黃門侍郎齊遣東方老蕭軌來寇四方壅隔糧運不繼三軍取給唯在都下乃除奐建康令武帝剋日決戰乃令奐多營麥飯以荷葉裹之一宿之間得數萬裹軍人旦食訖盡棄其餘因而決戰大破賊武帝受禪遷太子中庶子永定三年除晉陵太守晉陵自宋齊以來為大郡雖經寇擾猶為全實前後二千石多行侵暴奐清白自守妻子並不之官唯以單船臨郡所得秩俸隨即分贍孤寡郡中號曰神君曲阿富人殷綺見奐居處儉素乃餉以衣檳一具奐曰太守身居美祿何為不能辦此但百姓未周不容獨享溫飽勞卿厚意幸勿為煩陳文帝即位徵為御史中丞奐性剛直多所糾劾朝廷甚敬憚之又達於政體每所奏未嘗不稱善百司滯事皆付咨決遷散騎常侍領步兵校尉中書舍人重除御史中丞尋為五兵尚書時文帝不豫臺閣衆事並令僕射到仲舉共決及帝疾篤奐與宣帝及到仲舉並吏部尚書袁樞中書舍人劉師知等入侍醫藥文帝嘗謂奐等曰今三方鼎峙宜須長君朕欲近則晉成遠隆殷法卿等須遵此意奐乃流涕歔欷跪而對曰陛下御膳違和痊復非久皇太子春秋鼎盛聖德日躋廢立之事臣不敢聞帝曰古之遺直復見之卿乃用奐為太子詹事廢帝即位除散騎常侍國子祭酒出為南中郎康樂侯長史尋陽太守行江州事宣帝即位為始興王長史奐在職清儉多所規正宣帝嘉之賜米五百斛並纍降敕書殷勤勞問太建六年為吏部尚書八年加侍中時有事北邊剋復淮泗封賞用紛紜重疊奐應接引進門無停賓加以識鑒人物詳練百氏凡所甄拔衣冠搢紳莫不悅服性耿介絶諸請託雖儲副之尊公侯之重溺情相及終不為屈始興王叔陵之在湘州纍諷有司固求台鉉奐曰袞章本以德重未必皇枝因抗言於宣帝帝曰始興那忽望公且朕兒為公須在鄱陽王後奐曰臣之所見亦如聖旨後主時在東宮欲以江總為太子詹事令管記陸瑜言之奐奐曰江有潘陸之華而無園綺之實輔弼儲二竊謂非材後主深以為恨乃自言於宣帝宣帝將許之奐乃奏曰江總文華之人今皇太子文華不少無藉於總如臣愚見願選敦重之才以居輔導帝曰誰可奐曰都官尚書王廓代有懿德識性敦敏可以居之後主時亦在側乃曰廓王泰之子不可居太子詹事奐又曰宋朝范曄即范泰之子亦為太子詹事後主固爭之帝以總為詹事由是忤旨初後主欲官其私寵微諷於奐奐不從及左僕射陸繕遷職宣帝欲用奐代繕已草詔訖後主抑遂不行十四年為散騎常侍金紫光祿大夫領前軍將軍未行改領弘範宮衛尉至德元年卒年七十餘有集十五卷彈文四卷子紹安紹薪紹忠紹忠字孝揚亦有才學位太子洗馬鄱陽王東曹掾孔琳之字彥琳會稽山陰人也曾祖羣晉御史中丞祖沈丞相掾父廞光祿大夫琳之強正有志力少好文義解音律能彈妙善草隸桓玄輔政為太尉以為西閣祭酒玄時議欲廢錢用穀帛琳之議曰洪範八政以貨次食豈不以交易之所資為用之至要者乎故聖王制無用之貨以通有用之財既無毀敗之費又省難運之苦此錢所以嗣功龜貝歷代不廢者也穀帛為寶本充衣食今分以為貨則致損甚多又勞煩於商販之手耗棄於割截之用此之為弊著於自曩故鍾繇曰巧僞之人競濕穀以要利制薄絹以充資魏世制以嚴刑弗能禁也是以司馬芝以為用錢非徒豐國亦所以省刑今既用而廢之則百姓頓亡其利是有錢無糧之人皆坐而飢困此斷之之弊也魏明帝時錢廢穀用四十年矣以不便於人乃舉朝大議精才達政之士莫不以為宜復用錢彼尚舍穀帛而用錢足以明穀帛之弊著於已試也玄又議復肉刑琳之以為唐虞象刑夏禹立辟蓋淳薄既異致化不同書曰世輕世重言隨時也夫三代風純而事簡故罕蹈刑辟季末俗巧而務殷故動陷憲網若三千行於叔世必有踊貴之尤此五帝不相循法肉刑不可悉復者也漢文發仁惻之意傷自新之路莫由革古創制號稱刑厝然名輕而實重反更傷人故孝景嗣位輕之以緩緩而人慢又不禁邪期于刑罰之中所以見美於昔歷代詳論而未獲厥中者也兵荒已後罹法更多棄市之刑本斬右趾漢文一謬承而弗革所以前賢悵恨議之而未辨鍾繇陳羣之意雖小有不同欲以右趾代棄市若從其言則所活者衆矣降死之生誠為輕法可以全其性命蕃其産育仁既濟物功亦益衆又今之所患逋逃為先屢叛不革宜令逃身靡所亦以肅戒未犯永絶惡原至於餘條宜且依舊玄好人附悅而琳之不能順旨是以不見知纍遷尚書左丞揚州中從事史所居著績時責衆官獻便宜議者以為宜修庠序恤典刑審官方明黜陟舉逸拔才務農簡調琳之於衆議之外別建言曰夫璽印者所以辨章官爵立契符信官莫大於皇帝爵莫尊於公侯而傳國之璽歷代遞用襲封之印奕世相傳貴在仍舊無取改作今世唯尉一職獨用一印至於內外羣官每遷悉改討尋其義私所未達若謂官各異姓與傳襲不同則未若異代之為殊也若論其名器雖有公卿之貴未若帝王之重若以或有誅夷之臣忌其凶穢則漢用秦璽廷祚四百未聞以子嬰身戮國亡而棄不佩帝王公侯之尊不疑於傳璽人臣衆僚之卑何嫌於即印載籍未聞其說推例自乖其準而終年刻鑄喪功消實金銀銅炭之費不可稱言非所以因循舊貫易簡之道愚請衆官即用一印無煩改作若新置官又官多印少文或零失然後乃鑄則仰裨天府非唯小益又曰凶門柏裝不出禮典起自末代積習生常遂成舊俗爰自天子達于庶人誠行之有由卒革必駭然苟無關於情而有愆禮度存之未有所明去之未有所失固當式遵先典釐革後謬況復兼以游費實為人患者乎凡人士喪儀多出閭里每有此須動十數萬損人財力而義無所取至於寒庶則人思自竭雖復室如懸罄莫不傾産單財所謂葬之以禮其若此乎謂宜一罷凶門之式遷尚書吏部郎義熙十一年除宋武帝平北征西長史遷侍中宋臺初建除宋國侍中永初二年為御史中丞明憲直法無所屈橈奏劾尚書令徐羡之虧違憲典時羡之領揚州刺史琳之弟璩之為中從事羡之使璩之解釋琳之使停寢其事琳之不許曰我觸忤宰相政當罪止一身汝必不應從坐何須勤勤邪自是百僚震肅莫敢犯禁武帝甚嘉之行經蘭臺親加臨幸遷祠部尚書不事産業家尤貧素景平元年卒追贈太常子邈有父風官至揚州中從事邈子覬覬字思遠少骨鯁有風力以是非為己任口吃好讀書早知名歷位中書黃門侍郎初晉安帝時散騎常侍選望甚重與侍中不異其後職任間散用人漸輕孝建三年孝武欲重其選於是吏部尚書顏竣奏以覬及司徒左長史王景文應舉帝不欲威權在下其後分吏部尚書置二人以輕其任侍中蔡興宗謂人曰選曹要重常侍間淡改之以名而不以實雖主意欲為輕重人心豈可變邪既而常侍之選復卑選部之貴不異大明元年徙太子中庶子領翊軍校尉歷祕書監廷尉卿為御史中丞鞭令史為有司所糾原不問六年除安陸王子綏後軍長史江夏內史性使酒仗氣每醉輒彌日不醒僚類間多所陵忽尤不能曲意權幸莫不畏而疾之居常貧罄無有豐約未嘗關懷為府長史典籤咨事不呼前不敢前不令去不敢去雖醉日居多而明曉政事醒時判決未嘗有壅衆咸曰孔公一月二十九日醉勝世人二十九日醒也孝武每欲引見先遣人覘其醉醒性真素不尚矯飾遇得寶玩服用不疑而他物粗敗終不改易時吳郡顧覬之亦尚儉素衣裘器服皆擇其陋者宋世清儉稱此二人覬弟道存從弟徽頗營産業二弟請假東還覬出渚迎之輜重十餘船皆是綿絹紙席之屬覬見之僞喜謂曰我比乏得此甚要因命置岸側既而正色謂曰汝輩忝預士流何至還東作賈客邪命燒盡乃去先是庾徽之為御史中丞性豪麗服玩甚華覬代之衣冠器用莫不粗率蘭臺令史並三吳富人咸有輕之之意覬蓬首緩帶風貌清嚴皆重跡屏氣莫敢欺犯庾徽之字景猷潁川陵人也後卒於南東海太守覬後為司徒左長史道存代覬為後軍長史江夏內史時東土大旱都邑米貴一斗將百錢道存慮覬甚乏遣吏載五百斛米餉之覬呼吏謂之曰我在彼三載去官之日不辦有路糧郎至彼未幾那能得此米邪可載米還彼吏曰自古以來無有載米上水者都下米貴乞於此貨之不聽吏乃載米而去永光元年遷侍中後為尋陽王右軍長史行會稽郡事明帝即位召為太子詹事遣故佐平西司馬庾業為右軍司馬代覬行會稽郡事時上流反叛上遣都水使者孔璪入東慰勞璪至說覬以廢帝侈費倉儲耗盡都下罄匱資用已竭今南北並起遠近離叛若擁五郡之鋭招動三吳事無不剋覬然其言遂發兵馳檄覬子長公璪二子淹玄並在都馳信密報泰始二年正月並逃叛東歸遣書要吳郡太守顧琛琛以母年篤老又密邇建鄴與長子寶素謀議未判少子寶先時為山陰令馳書報琛以南師已近朝廷孤弱不時順從必有覆滅之禍覬前鋒軍已度浙江琛遂據郡同反吳興太守王曇生義興太守劉延熙晉陵太守袁標一時響應庾業既東明帝即以代延熙為義興以延熙為巴陵王休若鎮東長史業至長塘湖即與延熙合明帝遣建威將軍沈懷明東討尚書張永係進巴陵王休若董統東討諸軍時覬所遣孫曇瓘等軍頓晉陵九里部陳甚盛懷明至奔牛所領寡弱張永至曲阿未知懷明安否退還延陵就休若諸將帥咸勸退破岡休若宣令敢有言退者斬衆小定軍主劉亮又繼至兵力轉集人情乃安時齊高帝率軍東討與張永等於晉陵九里曲結營與東軍相持上遣積射將軍江方興南臺御史王道隆至晉陵視賊形勢賊帥孫曇瓘程扞宗陳景遠凡有五城互相連帶扞宗城猶未固道隆率所領急攻之俄頃城陷斬扞宗首劉亮果徑便刀楯乃負楯而進直入重柵衆軍因之即皆摧破齊高帝與永等乘勝馳擊之又大破之曇瓘因此敗走孔璪與曇生焚倉庫奔錢唐會稽聞西軍稍近將士多奔亡覬不能復制上虞令王晏起兵攻郡覬憂遽不知所為其夕率千人聲云東討實趨石瀃遇潮涸不得去衆叛都盡門生載以小船竄于山樊冖目寸村村人縛以送晏晏調曰此事孔璪所為無豫卿事可作首辭當相為申上覬曰江東處分莫不由身委罪求活便是君輩行意耳晏乃斬之東閣外臨死求酒曰此是平生所好顧琛王曇生袁標等並詣吳喜歸罪喜皆宥之東軍主凡七十六人於陳斬十七人餘皆原宥覬之起兵也夢行宣陽門道上顧望皆丘陵覬寤私告人曰丘陵者弗平建康其殆難剋覬弟道存位黃門吏部郎南郡太守晉安王子勛建僞號以為侍中行雍州事事敗見殺殷景仁陳郡長平人也曾祖融晉太常祖茂之特進左光祿大夫父道裕早亡景仁少有大成之量司徒王謐見而以女妻之為宋武帝太尉行參軍歷位中書侍郎景仁不為文而敏有思致不談義而深達理至於國典朝儀舊章記注莫不撰録識者知其有當世之志也嘗建議請百官舉才以所薦能否黜陟武帝甚知之少帝即位補侍中纍表辭讓優詔申其請以為黃門侍郎歷左衛將軍文帝即位委遇彌厚俄遷侍中左衛如故時與王華王曇首劉湛四人並為侍中以風力局幹冠冕一時同升之美近代莫及元嘉三年車駕征謝晦司徒王弘入居中書下省景仁長直共掌留任晦平代到彥之為中領軍侍中如故文帝所生章太后早亡上奉太后所生蘇氏甚謹六年蘇氏卒車駕親往臨哭詔欲遵二漢推恩之典景仁議以為漢氏推恩加爵于時承秦之弊儒術蔑如懼非盛明所宜軌蹈晉監二代朝政之所因君舉必書哲王之所慎體至公者懸爵賞於無私奉天統者每屈情以申制所以作孚萬國貽則後昆上從之丁母憂葬竟起為領軍將軍固辭上使綱紀代拜遣中書舍人周赳輿載詣府服闋遷尚書僕射太子詹事劉湛代為領軍湛與景仁素善皆被遇於武帝俱以宰相許之湛常居外任會王弘王華王曇首相係亡景仁引湛還朝共參朝政湛既入以景仁位遇本不踰己一旦居前意甚憤憤知文帝信仗景仁不可移奪乃深結司徒彭城王義康欲倚宰相之重以傾之十二年景仁遷中書令護軍將軍僕射如故尋復加領吏部湛愈怒義康納湛言毀景仁於文帝帝遇之益隆景仁密陳相王權重非社稷計上以為然景仁對親舊嘆曰引之令入便噬人乃稱疾請解不見許使停家養病湛議欲遣人若劫盜者於外殺之以為文帝雖知當不能傷至親之愛上微聞之徙景仁於西掖門外晉鄱陽主第以為護軍府密邇宮禁故其計不行景仁臥疾者五年雖不見上而密函去來日中以十數朝政大小必以問焉影迹周密莫有窺其際者及將收湛之日景仁便拂拭衣冠寢疾既久左右皆不悟其意其夜上出華林園延賢堂召之景仁猶稱腳疾小牀輿以就坐誅討處分一皆委之代義康為揚州刺史僕射吏部如故遣使者授印綬主簿代拜畢便覺疾甚情理乖錯性本寬厚而忽更苛暴問左右曰今年男婚多女嫁多是冬大雪景仁乘輿出廳事觀望忽驚曰當閣何得有大樹既而曰我誤耳疾篤文帝謂不利在州使還住僕射下省為州凡月餘日卒或云見劉湛為祟追贈侍中司空諡曰文成公大明五年孝武行經景仁墓詔遣致祭子道矜幼而不慧位太中大夫道矜子明帝時位侍中度支尚書屬父疾積久為有司所奏詔曰道矜生便有病更無橫疾因愚習惰久妨清序可除散騎常侍淳字粹遠景仁從祖弟也祖允晉太常父穆以和謹致稱自五兵尚書為宋武帝相國左長史元嘉中位特進右光祿大夫領始興王師卒官諡曰元子淳少好學有美名歷中書黃門侍郎黃門清切直下應留下省以父老特聽還家高簡寡言早有清尚愛好文義未嘗違捨在祕書閣撰四部書大目凡四十卷行於世元嘉十一年卒朝廷痛惜之子孚有父風嘗與侍中何勗共食孚羹盡勗云益殷蓴羹勗司空無忌子也孚徐輟筯曰何無忌諱孚位吏部郎為順帝撫軍長史子臻字後同幼有名行袁粲褚彥回並賞異之每造二公之席輒清言畢景王儉為丹陽尹引為郡丞袁昂先拜祕書丞求臻為到省表臻答曰何不見倩拜而見倩作表遂不為作歷位太子洗馬淳弟沖字希遠位御史中丞有司直之稱再遷度支尚書元凶妃即淳女而沖在東宮為劭所知遇劭弒立以為司隸校尉沖有學義文辭劭使為尚書符罪狀孝武亦為劭盡力建鄴平賜死沖弟淡字夷遠亦歷黃門吏部郎太子中庶子大明中又以文章見知論曰季恭命偶興王恩深惟舊及位致崇寵而每存謙挹觀夫持滿之戒足以追蹤古人琇之貞素之風不踐無義之地易曰王臣蹇蹇其動也直休文行己之度可謂近之琳之二議深達變通之道覬持身之節亦曰一時之良而聽言則悖晚致覆沒痛矣哉景仁遠大之情著於初筮元嘉之盛卒致宗臣言聽計從於斯為重美矣乎
