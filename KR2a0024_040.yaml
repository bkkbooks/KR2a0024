body:
  text: 南史卷四十列傳第三十魯爽薛安都從子深鄧琬劉胡宗越吳喜黃回魯爽小字女生扶風郿人也祖宗之字彥仁仕晉官至南陽太守義熙元年起義以功為雍州刺史宋武帝討劉毅與宗之同會江陵封南陽郡公自以非武帝舊隸屢建大功有自疑之志會司馬休之見討猜懼因與休之北奔盡室入姚氏頃之病卒父軌一名象齒便弓馬膂力絕人為竟陵太守隨父入姚氏及武帝定長安軌休之北奔魏魏以軌為荊州刺史襄陽公鎮長社孝武鎮襄陽軌遣親人程整奉書規欲歸南致誠以殺劉康祖徐湛之父不敢歸文帝累遣招納許以為司州刺史爽少有武藝魏太武知之常置左右及軌死爽代為荊州刺史襄陽公鎮長社粗中使酒數有過失太武怒將誅之爽懼密懷歸南計次弟秀小字天念頗有意略仕魏以軍功為中書郎封廣陵侯或告太武鄴人欲反復遣秀檢察幷燒石季龍殘餘宮殿秀常乘驛往返是時病還遲為太武所詰秀復恐懼太武尋南攻因從度河先是廣平人程天祚為殿中將軍有武力元嘉二十七年助戍彭城為魏軍所獲以善針術深被太武賞愛封南安公常置左右勸秀南歸秀納之及太武北還與爽俱來奔文帝悅以爽為司州刺史秀為滎陽潁川二郡太守是歲元嘉二十八年也魏毀其墳墓明年四月入朝時太武已崩上更謀經略五月遣爽秀及程天祚等出許洛王玄謨攻碻磝不拔敗退爽亦收衆南還三十年元凶弒逆南譙王義宣起兵入討爽與雍州刺史臧質俱詣江陵事平以爽為豫州刺史加都督至壽陽便曲意賓客爵命士人畜仗聚馬如寇將至元凶之為逆也秀在建鄴元凶謂秀曰我為卿誅徐湛之矣方相委任以秀為右將軍使攻新亭秀因此歸順孝武即位以為司州刺史加都督領汝南太守孝建元年二月義宣與爽謀反報秋當同舉爽狂酒乖謬即日便起兵使其衆戴黃標稱建平元年竊造法服義宣質聞爽已處分便狼狽同反爽於是送所造輿服詣江陵板義宣及臧質等文曰丞相劉今補天子名義宣車騎臧今補丞相名質平西朱今補車騎名脩之皆板到奉行義宣駭愕爽所送法物並留竟陵縣不聽進使爽直出歷陽自采石濟軍與質水陸俱下左軍將軍薛安都與爽相遇刺殺之傳首建鄴進平壽陽子弟並伏誅薛安都河東汾陰人也世為強族族姓有三千家父廣為宗豪宋武帝定關河以為上黨太守安都少以勇聞身長七尺八寸便弓馬仕魏以軍功為雍州秦州都統元嘉二十一年來奔求北還構扇河陝文帝許之孝武鎮襄陽板為北弘農太守魏軍漸強安都乃歸襄陽二十七年隨王誕板安都為建武將軍隨柳元景向關陝率步騎居前所向剋捷後孝武伐逆安都領馬軍與柳元景俱發孝武踐阼除右軍將軍率所領騎為前鋒直入殿庭以功封南鄉縣男安都初征關陝至臼口夢仰視天見天門開謂左右曰汝等見天門開不至是歎曰夢天門開乃中興之象邪從弟道生亦以軍功為大司馬參軍犯罪為秣陵令庾淑之所鞭安都大怒即日乃乘馬從數十人令左右執矟欲往殺淑之行至朱雀航逢柳元景遙問曰薛公何之安都躍馬至車後曰小子庾淑之鞭我從弟今指往刺殺之元景慮其不可駐車紿之曰小子無宜適卿往與手甚快安都既回馬元景復呼之令下馬入車因讓之曰卿從弟服章言論與寒細不異且人身犯罪理應加罰卿為朝廷勳臣云何放恣輒於都邑殺人非惟科律所不容主上亦無辭相宥因載俱歸安都乃止其年以憚直免官孝建元年除左軍將軍及魯爽反叛遣安都及沈慶之濟江安都望見爽便躍馬大呼直往刺之應手倒左右范雙斬爽首爽世梟猛咸云萬人敵安都單騎直入斬之而反時人皆云關羽斬顏良不是過也進爵為侯時王玄謨拒南郡王義宣臧質於梁山安都復領騎為支軍義宣遣將劉諶之及臧質攻玄謨玄謨命衆軍擊之使安都引騎出賊陣右橫擊陷之賊遂大潰轉太子右衞率大明元年魏軍向無鹽遣安都領馬軍東陽太守沈法系統水軍並受徐州刺史申坦節度時魏軍已去坦求回軍討任榛見許會天旱水泉多竭人馬疲困不能遠追安都法系白衣領職坦繫尚方任榛大抵在任城界積世逋叛所聚棘榛深密難為用師故能久自保藏屢為人患安都明年復職改封武昌縣侯景和元年為平北將軍徐州刺史加都督明帝即位安都舉兵同晉安王子勛時安都從子索兒在都明帝以為左軍將軍直閤安都將為逆遣報之又遣人至瓜步迎接時右衞將軍柳光世亦與安都通謀二人俱逃攜安都諸子及家累席卷北奔青州刺史沈文秀冀州刺史崔道固並皆同反明帝遣齊高帝率前將軍張永等北討所至奔散斬薛索兒時武衞將軍王廣之領軍隸劉勔攻殷琰於壽陽道固部將傅靈越為廣之軍人所禽厲聲曰我傅靈越也汝得賊何不即殺時生送詣勔勔躬自慰勞詰其叛逆對曰九州唱義豈獨在我勔又問卿何不早歸天闕乃逃命草間靈越曰薛公舉兵淮北威震天下不能專任智勇委付子姪致敗之由實在於此人生歸於一死實無面求活勔壯其意送還建鄴明帝欲加原宥靈越辭對如一終不回改乃殺之靈越清河人也子勛平定安都遣別駕從事史畢衆愛下邳太守王煥等奏啟事詣明帝歸款索兒之死也安都使柳光世守下邳至是亦率所領歸降帝以四方已平欲示威於淮外遣張永沈攸之以重軍迎安都懼不免罪遂降魏深安都從子也本名道深避齊高帝偏諱改焉安都以彭城降魏親族皆入北高帝鎮淮陰深遁來委身自結於高帝果幹有氣力宋元徽末以軍功至驍騎將軍軍主封竟陵侯沈攸之之難齊高帝入朝堂豫章王嶷代守東府使深領軍屯司徒右府分備建鄴袁粲據石頭豫章王嶷夜登西門遙呼深深驚起率軍赴難高帝即位除淮陰太守尋為直閤將軍轉太子左率武帝即位遷左衞將軍隆昌元年為司州刺史右將軍卒鄧琬字元琰豫章南昌人也父胤之宋孝武征虜長史光祿勳孝武起義初琬為南海太守以弟瓊與臧質同逆遠徙仍停廣州久之得還歷位丹陽丞大明七年車駕幸歷陽追思在蕃之舊擢琬為給事黃門侍郎明年出為晉安王子勛鎮軍長史尋陽內史行江州事前廢帝以文帝孝武並次居第三以登極位子勛次第既同深致嫌疑因何邁之謀乃遣使齎藥賜死使至子勛典籤謝道遇主帥潘欣之侍書褚靈嗣等馳以告琬泣涕請計琬曰身南土寒士蒙先帝殊恩以愛子見託當以死報効景和元年冬子勛戎服出聽事宣旨欲舉兵四坐未答錄事參軍陶亮曰請効死前驅衆並奉旨會明帝定亂進子勛號車騎將軍開府儀同三司令書至諸佐史並喜造琬曰暴亂既除殿下又開黃閤實為公私大慶琬以子勛次第居三又以尋陽起事有符孝武理必萬剋乃取令書投地曰殿下當開端門黃閤是吾徒事耳衆並駭愕琬與陶亮等繕甲器徵兵四方郢州刺史安陸王子綏荊州刺史臨海王子頊會稽太守尋陽王子房雍州刺史袁顗梁州刺史柳元怙益州刺史蕭惠開廣州刺史袁曇遠徐州刺史薛安都青州刺史沈文秀冀州刺史崔道固湘州行事何慧文吳郡太守顧琛吳興太守王曇生晉陵太守袁標義興太守劉延熙並同叛逆琬乃建牙於桑尾傳檄建鄴購明帝萬戶侯布絹二萬匹金銀五百斤其餘各有差明帝遣荊州典籤邵宰乘驛還江陵經過襄陽袁顗馳書報琬勸勿解甲幷奉勸子勛即偽位琬乃稱說符瑞令顧昭之撰為瑞命記造乘輿御服立宗廟設壇場矯作崇憲太后璽令羣僚上偽號於子勛泰始二年正月七日即位於尋陽城改景和三年為義嘉元年其日雲雨晦合行禮忘稱萬歲取子勛所乘車除脚以為輦置偽殿之西其夕有鳩棲其中鴞集其幰又有禿鶖鳥集城上拜安陸王子綏為司徒因雷電晦冥震其黃閤柱鴟尾墮地又有鴟棲其帳上琬性鄙闇貪吝過甚財貨酒食皆身自量校至是父子並賣官鬻爵使婢僕出市道販賣酣歌博弈日夜不休賓客到門者歷旬不得前內事悉委褚靈嗣等三人羣小競為威福士庶忿怨內外離心矣明帝遣領軍將軍王玄謨領水軍南討吳興太守張永為繼尚書下符奉詔以四王幼弱不幸陷難兵交之日不得妄加侵犯若有逼損誅翦無貸琬遣孫沖之等前鋒一萬據赭圻沖之於道與子勛書欲沿流挂帆直取白下請速遣陶亮衆軍相接分據新亭亮本無幹略聞建安王休仁自上殷孝祖又至不敢進及孝祖中流矢死沈攸之代為前鋒沖之謂陶亮曰孝祖梟將一戰便死天下事定矣不須復戰便當直取京都亮不從明帝遣員外散騎侍郎王道隆至赭圻督戰衆軍奮擊大破之琬又遣豫州刺史劉胡來屯鵲尾胡宿將攸之等甚憚之胡鄉人蔡那佼長生張敬兒各領軍隸攸之在赭圻胡因要那等共語那等說令歸順胡回軍入鵲尾無他權略建安王休仁自武檻進據赭圻時胡等兵衆強盛遠近疑惑明帝欲綏慰人情遣吏部尚書褚彥回至武檻選用將帥以下申謙杜幼文因此求黃門沈懷明劉亮求中書郎建安王休仁即使彥回擬選上不許曰忠臣殉國不謀其報臨難以干朝典豈為下之節沈攸之等與劉胡相持久不決上又遣強弩將軍任農夫等領兵繼至攸之繕修船舸板材不周計無所出會琬送五千片榜供胡軍用俄而風潮奔迅榜突柵出江胡等力不能制趁流而下泊攸之等營於是材板大足琬進袁顗都督征討諸軍事率樓船千艘來入鵲尾張興世建議越鵲尾上據錢溪斷其糧道胡累攻之不能剋乃遣龍驤將軍陳慶領三百舸向錢溪戒慶不須戰陳慶至錢溪不敢攻越溪於梅根立砦胡別遣將王起領百舸攻興世擊大破之胡率其餘舸馳還顗更使胡攻興世休仁因此命沈攸之吳喜佼長生劉靈遺劉伯符等進攻濃湖造皮艦千乘拔其營柵苦戰移日大破之顗被攻急馳信召胡令還張興世既據錢溪江路阻斷胡軍乏食琬大送資糧畏興世不敢下胡遣將迎之為錢溪所破夜走徑趣梅根顗聞胡走亦棄衆西奔至青林見殺琬惶擾無計時張悅始發兄子浩喪乃稱疾呼琬計事令左右伏甲戒之若聞索酒便出琬至謀斬晉安王封府庫以謝罪悅曰寧可賣殿下求活邪因呼求酒再呼左右震懾不能應第二子詢提刀出餘人續至即斬琬悅因齎琬首詣建安王休仁降蔡那子道深以父為明帝効力被繫作部因亂脫鎖入城執子勛囚之沈攸之諸軍至江州斬子勛於桑尾牙下傳首建鄴劉胡走入沔竟陵郡丞陳懷直憲子也斷道邀之胡人馬既疲困因隨懷直入城告渴得酒飲酒畢引佩刀自刺不死斬首送建鄴張興世弟僧彥追殺懷直取胡首竊有其功荊州聞濃湖平更議奉子頊奔益州就蕭惠開典籤阮道預邵宰不同曰雖復欲西豈可得至遣使歸罪荊州中從事宗景土人姚儉等勒兵入城執子頊以降劉胡南陽涅陽人也本以面坳黑似胡故名坳胡及長單名胡焉出身郡將稍至隊主討伐諸蠻往無不捷蠻甚畏憚之明帝即位除越騎校尉蠻畏之小兒啼語云劉胡來便止宗越南陽葉人也本為南陽次門安北將軍趙倫之鎮襄陽襄陽多雜姓越更被黜為役門出身補郡吏父為蠻所殺越於市中刺殺讎人太守夏侯穆嘉其意擢為隊主蠻有為寇盜者常使越討伐往輒有功家貧無以市馬刀楯步出單身挺戰衆莫能當每一捷郡將輒賞錢五千因此得買馬元嘉二十四年啟文帝求復次門移戶屬冠軍縣許之二十七年隨柳元景侵魏領馬幢隸柳元怙有戰功還補後軍參軍督護隨王誕戲之曰汝何人遂得我府四字越答曰佛狸未死不憂不得諮議參軍誕大笑孝武即位以為江夏王義恭大司馬行參軍濟陽太守臧質魯爽反朝廷致討越戰功居多追奔至江陵時荊州刺史朱脩之未至越多所誅戮又逼略南郡王義宣子女坐免官繫尚方尋被宥追論前功封范陽縣子大明三年為長水校尉竟陵王誕據廣陵反越領馬軍隸沈慶之攻誕及城陷孝武使悉殺城內男丁越受旨行誅躬臨其事莫不先加捶撻或有鞭其面者欣欣然若有所得凡殺數千人改封始安縣子前廢帝景和元年進爵為侯召為游擊將軍直閤領南濟陰太守改領南東海太守帝凶暴無道而越譚金童太一並為之用命誅戮羣公及何邁等莫不盡心竭力故帝憑其爪牙無所忌憚賜與越等美女金帛充牣其家越等武人粗強識不及遠感一往意氣皆無復二心帝時南巡明旦便發其夕悉聽越等出外宿明帝因此定亂明晨越等並入被撫接甚厚越改領南濟陰太守本官如故越等既為廢帝盡心慮明帝不能容之上接待雖厚內並懷懼上意亦不欲使其居中從容謂曰卿遭離暴朝勤勞日久兵馬大郡隨卿等所擇越等素已自疑及聞此旨皆相顧失色因謀作難以告沈攸之攸之具白帝即日下獄死越善立營陣每數萬人止頓自騎馬前行使軍人隨其後馬止營合未嘗參差及沈攸之代殷孝祖為南討前鋒時孝祖新死衆心並懼攸之歎曰宗公可惜故有勝人處而性嚴酷好行刑誅時王玄謨御下亦少恩將士為之語曰寧作五年徒不逐王玄謨玄謨猶尚可宗越更殺我譚金在魏時與薛安都有舊後出新野居牛門村及安都歸國金常隨征討副安都排堅陷陣氣力兼人孝建三年為屯騎校尉直閤領南清河太守景和元年前廢帝誅羣公金等並為之用封金平都縣男童太一宜陽縣男沈攸之東興縣男越州里又有武念佼長生曹欣之蔡那並以將帥顯武念位至南陽太守長生寧蠻校尉曹欣之驍騎將軍蔡那見子道恭傳吳喜吳興臨安人也本名喜公明帝減為喜出身為領軍府白衣吏少知書領軍將軍沈演之使寫起居注所寫既畢闇誦略皆上口演之嘗作讓表未奏失本喜經一見即寫無所漏脫演之甚知之因此涉獵史漢頗見古今演之門生朱重人入為主書薦喜為主書吏進為主圖令史文帝嘗求圖書喜開卷倒進之帝怒遣出會太子步兵校尉沈慶之征蠻啟文帝請喜自隨為孝武所知稍遷至河東太守殿中御史明帝即位四方反叛喜請得精兵三百致死於東帝大悅即假建武將軍簡羽林勇士配之議者以喜刀筆吏不嘗為將不可遣中書舍人巢尚之曰喜隨沈慶之累經軍旅性既勇決又習戰陣若能任之必有成績喜乃東討喜在孝武世既見驅使性寬厚所至人並懷之及東討百姓聞吳河東來便望風降散故喜所至剋捷遷步兵校尉封竟陵縣侯東土平定又率所領南討遷尋陽太守泰始四年改封東興縣侯除右軍將軍淮陽太守兼太子左衞率五年轉驍騎將軍太守兼率如故其年大破魏軍於荊亭六年又率軍向豫州拒魏軍加都督豫州諸軍事明年還建鄴初喜東征白明帝得尋陽王子房及諸賊帥即於東梟斬東土既平喜見南賊方熾慮後翻覆受禍乃生送子房還都凡諸大主帥顧琛王曇生之徒皆被全活上以喜新立大功不問而心銜之及平荊州恣意剽虜贓私萬計又嘗對客言漢高魏武本是何人上聞之益不悅後壽寂之死喜內懼因乞中散大夫上尤疑之及上有疾為身後之慮疑其將來不能事幼主乃賜死上召入內殿與言謔酬接甚款賜以名饌並金銀御器敕將命者勿使食器宿喜家上素多忌諱不欲令食器停凶禍之室故也及喜死發詔賻贈子徽人襲黃回竟陵郡軍人也出身充郡府雜使稍至傳教臧質為郡轉為齋帥及去職以回自隨質討元凶回隨從有功免軍戶後隨質於梁山敗走被錄遇赦因下都於宣陽門與人相打詐稱江夏王義恭馬客被鞭二百付右尚方會中書舍人戴明寶被繫差回為戶伯奉事明寶竭心盡力明寶尋得原赦委任如初啟免回以領隨身隊統知宅及江西墅事性巧觸類多能明寶甚寵任之回拳捷果勁勇力兼人在江西與諸楚子相結屢為劫盜會明帝初即位四方反叛明寶啟帝使回募江西楚人得快手八百隸劉勔西討累遷至將校以功封葛陽縣男元徽初桂陽王休範為逆回以屯騎校尉領軍隸齊高帝於新亭創詐降之計回見休範可乘謂張敬兒曰卿可取之我誓不殺諸王敬兒即日斬休範事平進爵為侯改封聞喜縣四年遷冠軍將軍南琅邪濟陽二郡太守建平王景素反回又率軍前討城平之日回軍先入又以景素讓張倪奴明年遷右衞將軍沈攸之反以回為平西將軍郢州刺史率衆出新亭為前鋒未發而袁粲據於石頭不從齊高帝回與新亭諸將任候伯彭文之王宜興等謀應粲攻高帝於朝堂事既不果高帝撫之如舊回與宜興素不協斬之宜興吳興人也形狀短小而果勁有膽力少年時為劫不須伴郡縣討逐圍繞數十重終莫能擒嘗舞刀楯回使十餘人以水交灑不能著明帝泰始中為將在壽陽間與魏戰每以少制多挺身深入以平建平王景素功封長壽縣男至是為屯騎校尉見殺回進軍未至郢州而沈攸之敗走回不樂停郢州固求南兗遂率部曲輒還改封安陸郡公徙南兗州刺史加都督齊高帝以回專殺終不附己乃使召之及上車愛妾見赤光冠其頭至足苦止不肯住及至見誅回既貴祗事戴明寶甚謹言必自名未嘗敢坐躬至帳下及入內料檢有無隨乏供送以此為常回同時為將有南郡高道慶凶險暴橫求欲無已有失其意者輒加捶拉往往有死者朝廷畏之如虎狼齊高帝與袁粲等議收付廷尉賜死論曰凶人之濟其身業非世亂其莫由焉魯爽以亂世之請而行之於平日其取敗也宜哉安都自致奔亡亦為幸矣鄧琬以亂濟亂終致顛隕宗越釁稔惡盈旋至夷戮各其職也吳喜以定亂之功勞未酬而禍集黃回以助順之志福未驗而災生唯命也哉
